body:
  text: 合訂刪補大易集義粹言卷八頭等侍衛納喇性德編坎下艮上伊川先生曰蒙序卦屯者盈也屯者物之始生也物生必蒙故受之以蒙蒙者蒙也物之稚也屯者物之始生物始生稚小蒙昧未發蒙所以次屯也為卦艮上坎下艮為山為止坎為水為險山下有險遇險而止莫知所之蒙之象也水必行之物始出未有所之故為蒙及其進為亨義易傳蒙亨匪我求童蒙童蒙求我初筮告再三瀆瀆則不告利貞濓溪先生曰童蒙求我我正果行如筮焉筮叩神也再三則瀆矣瀆則不告也山下出泉靜而清也汨則亂亂不決也慎哉其唯時中乎通書伊川先生曰蒙有開發之理亨之義也卦才時中乃致亨之道六五為蒙之主而九二發蒙者也我謂二也二非蒙主五既順巽於二二乃發蒙者也故主二而言匪我求童蒙童蒙求我五居尊位有柔順之德而方在童蒙與二為正應而中德又同能用二之道以發其蒙也二以剛中之德在下為君所信嚮當以道自守待君至誠求已而後應之則能用其道匪我求於童蒙乃童蒙來求於我也筮占決也初筮告謂至誠一意以求已則告之再三則瀆慢矣故不告也發蒙之道利以貞正又二雖剛中然居隂故宜有戒易傳橫渠先生曰禮聞來學不聞往教來學者就道義而學之往教者致其人而取教也童蒙求我匪我求童蒙是也教人當以次守得定不妄施易曰初筮告再三瀆瀆則不告是剛中之德也又曰禮聞取道義於人不聞取其人之身來之為言屬有道義者謂之來來學者就道義而學之往教者致其人而取教也童蒙求我匪我求童蒙是也並易説白雲郭氏曰屯之所以為屯者險而動也蒙之所以為蒙者險而止也屯者物之始生生而後稚卦之序也物稚有必亨之理聖人發蒙有致亨之道此蒙之所以亨也童蒙處蒙者也我所以發蒙者也一德以筮之則我一德以告之彼二三其德是以不能告也蒙之時行此為利貞耳筮者問而決之也著之稱筮義蓋同此利貞或義斷易説新安朱氏曰艮亦三畫卦之名一陽止於二隂之上故其德為止其象為山蒙昧也物生之初蒙昧未明也其卦以坎遇艮山下有險蒙之地也內險外止蒙之意也故其名為蒙亨以下占辭也九二內卦之主以剛居中能發人之蒙者而與六五隂陽相應故遇此卦者有亨道也我二也童蒙幼稚而蒙昧謂五也筮者明則人當求我而其亨在人筮者暗則我當求人而亨在我人求我者當視其可否而應之我求人者當致其精一而扣之而明者之養蒙與蒙者之自養又皆利於以正也本義彖曰蒙山下有險險而止蒙蒙亨以亨行時中也匪我求童蒙童蒙求我志應也初筮吉以剛中也再三瀆瀆則不告瀆蒙也蒙以養正聖功也濓溪先生曰聖可學乎曰可有要乎曰有請問焉曰一為要一者無欲也無欲則靜虗動直靜虗則明明則通動直則公公則溥明通公溥庶矣乎通書伊川先生曰山下有險內險不可處外止莫能進未知所為故為昏蒙之義蒙亨以亨行時中也蒙之能亨以亨道行也所謂亨道時中也時謂得君之應中謂處得其中得中則一有得字時也匪我求童蒙童蒙求我志應也二以一無以字剛明之賢處於下五以童蒙居上非是二求於五蓋五之志應於二也賢者在下豈可自進以求於君苟自求之必無能信用之理古之人所以必待人君致敬盡禮而後往者非欲自為尊大蓋其尊德樂道不如是不足與有為也初筮謂誠一而來求決其蒙則當以剛中之德告而開發之再三煩數也來筮之意煩數不能誠一則瀆慢矣不當告也告之必不能信受徒為煩瀆故曰瀆蒙也求者告者皆煩瀆矣卦辭曰利貞彖復申其義以明不止為戒於二實養蒙之道也未發之謂蒙以純一未發之蒙而養其正乃作聖之功也發而後禁則扞格而難勝養正於蒙學之至善也蒙之六爻二陽為治蒙者四隂皆處蒙者也並易傳橫渠先生曰險而止蒙夫於不當止而止是險也如告子之不動心必以義為外是險而止也蒙險在內是蒙昧之義蒙方始務求學而得之始是得所止也若蹇則是險在外者也易説後險而止蒙蒙亨以亨行時中也夫險而不止則入於坎入於蹇不止則是安其危之類也以其知險而止也故成蒙之義方以有求童蒙求我匪我求童蒙以蒙而求故能時中所以亨也時一有中字之義甚大如蒙亨以亨行時中也者蒙何嘗有亨以九二之亨行蒙者之時中故蒙所以得亨也蒙無遽亨之理以九二循循行時中之亨也蒙卦之義主之者全在九二彖之所論皆二之義教者但觀蒙者時之所及則道之此是亨行時一有中字也此時也正所謂如時雨化之若既引之中道而不使之通則是教者之過當時而道之使不失其正則是教者之功一有蒙以養正聖功也是以字養其蒙使正者聖人之功也並易説非禮之禮非義之義但非時中者皆是也大率時措之宜者即中也時中非易得謂非時中而行禮義為非禮之禮非義之義又不可一槩如此如孔子喪出母子思不喪出母不可以子思為非也又如制禮者小功不稅使曾子制禮又不知如何以此不可易言時中之宜甚大須精義入神始得觀其會通行其典禮此方是真義理也行其典禮而不達會通則有非時中者矣今學者須是執禮蓋禮亦是自會通制之者然言不足以盡天下之事守禮亦未為失但大人見之則為非禮非義不時中也君子要多識前言往行以畜其德者以其看得前言往行熟則自能比物醜類亦能見得時中語解蒙以養正使蒙者不失其正教人者之功也盡其道其惟聖人乎正蒙藍田吕氏曰蒙者物有所蔽而未發也是卦也主發蒙而言故曰蒙亨以發為亨也發蒙教者也蒙學者也教者之心所施於學者皆亨道也君子之教者五所謂以亨行時中也匪我求童蒙童蒙求我有來學無往教也不憤不啓不悱不發彼有來學之誠乃可授之以教志應也童蒙之質德性未喪特未發耳由是而養之以正不流于邪雖聖人之學不越於是故曰聖功也利貞者貞則不失其性也廣平遊氏曰含德之厚比於赤子抱一不離此蒙以養正之謂也夫唯抱一不離故智雖滿天地而不自慮能雖窮海內而不自為付百職於衆賢而我無為焉其致功也吾不尸其事其成功也吾不處其名此聖人之功也筮者占以決疑也占以決疑無不致誠故易以致誠以謀赤以筮言之非假布䇿也蒙之初筮者致一以有求比之原筮者再思以有擇若夫假爾泰筮則不可以有原也並易説龜山楊氏曰險在前往斯陷險矣見險而能止蹇之所以為智也險在下往斯出險矣險而止卦之所以為蒙也物生必蒙則生而未失赤子之心也有亨之道焉以亨之道行則時中矣中也者喜怒哀樂未發之謂也居蒙之時有剛明之材唯九二而已蒙所資以為明者也六五柔順而得中童蒙之能求我者也古者大有為之君必有不召之臣故湯之於伊尹學焉而後臣之伊尹非有求於湯也而湯實求之故曰匪我求童蒙童蒙求我志應也蓋志不應則尊德樂義之心不至尊德樂義之心不至則雖有謀焉而就之猶不告也况可召之乎故又曰初筮告再三瀆瀆則不告初筮誠一也再三誠不一也誠不一而告之則上下皆瀆矣瀆滋蒙也筮謂占決也蒙以養正聖功也者正以蒙養之則不失赤子之心矣作聖之功也並易説兼山郭氏曰山下有險險而止蒙有不知而止者童蒙是也有無所事於知而安之者聖之事也詩曰帝謂文王不大聲以色不長夏以革不識不知順帝之則其養正之謂乎志應也者非體應也誠應也彼一德而筮之則一德而告之彼二三其德是以不能告也故蒙之辭皆有二義易説白雲郭氏曰險而止蒙畏而止之者童蒙也安而止之者聖人也童言物之稚也物稚則求亨求亨有亨之道患不以亨之道行耳九二處得其中應得其時是亨之道也我有治蒙之志童蒙有求我之志故云志應初筮告者剛中之性無二三也再三不告蓋以瀆我而亦所以瀆蒙也瀆則愈惑是以窒者不復通晦者不復光非所以治蒙也蒙之道養正則不惑而不取於二三養正不已終成聖功是以不失赤子之心為大人養正猶孟子言以直養而無害蓋正直皆謂天之所命也易説漢上朱氏曰止於外不可進也險在內不可止也險而止莫知所適蒙也此以艮坎二體言蒙也蒙者屯之反屯者物之稚故蒙而未亨有屯塞之義九二引而達之屯塞者亨矣屯九五大者亨五反為二以亨道行也蒙有可亨之理當其可亨之時而亨之使不失其中者時中也學者禁於未發發而後禁則過時而弗勝故曰蒙亨以亨行時中也此以九二言亨也艮為少男童蒙也我者二自謂也二在下不動有剛中之德以自守匪我求童蒙也二柔順與五相應艮為手有求之象童蒙求我也童蒙求我然後二以志應五志謂剛中也二為衆隂之主四隂皆求於二而志應者應五也震為草以手持草筮也筮占決也五動二應初筮告也初筮告者以剛中也不問而告與問一而告二皆非剛中矣不憤不啓不悱不發蒙塞極矣於是求達焉則一發而通通則不復塞矣此初筮所以告也六三六四不與二相應再三瀆瀆則不告也不待其欲達隨其屢問而告之決之不一不知所從則必燕辟廢學褻其師訓瀆與黷同此以二三四爻言亨蒙之道也蒙自二至上體頤頤養也九二一爻自發蒙者言之剛中也然而未正故戒之以利貞自蒙者言之純一之德未發童蒙養之至於成德躋位乎中正則聖功成矣蓋學未至於聖未足謂之成德故夫子十五志於學至於七十而從心所欲不踰矩則蒙以養正作聖之功也虞翻曰二志應五變得正而蒙亡此以二五言利貞也在卦氣為正月卦太玄準之以童易傳五峰胡氏曰太甲成王以幼沖未有所知而居君位童蒙也伊尹周公以剛陽之才任顧托之重為發蒙之主者也夫伊周非有求於太甲成王太甲成王非伊周則無以保其尊位守其宗廟社稷故匪我求童蒙乃童蒙求我也初筮告若伊尹於太甲方其居憂之時即放之桐宫密邇先王其訓是也若不決之於初待其聽政然後隨事之失而言其非則瀆蒙矣周公於成王自幼沖之中不順其意而行姑息之恩故左右侍御僕從即以正人為之以檢束其行使幼而見正言聞正行亦不待其臨尊位然後因事一一以教之也是以太甲成王雖無過人之才而卒皆為大賢者以伊尹周公能養其正於蒙有作聖之功此蒙之所以亨也夫當天子蒙蔽未發之時當發蒙之任負天下之責苟不持正自信不疑則必有乘間投隙而起者矣故聖人又戒以利在於貞也惟貞然後足以弭姦邪窺伺之心厲忠賢進為之志事功可就而禍難不生矣易外傳新安朱氏曰蒙山下有險以卦象卦德釋卦名有兩義蒙亨以亨行以卦體釋卦辭也九二以可亨之道發人之蒙而又得其時之中謂如下文所指之事皆以亨行而當其可也志應者二剛明五柔暗故二不求五而五求二其志自相應也以剛中者以剛而中故能告而有節也瀆筮者二三則問者固瀆而告者亦瀆矣蒙以養正乃作聖之功所以釋利貞之義也本義山下有險是卦象險而止是卦德蒙有二義險而止險在內止在外自家這裏先自不安穩了外面更去不得便是蒙昧之象若見險而能止則為蹇却是險在外自家這裏見得去不得所以不去故曰知矣哉嘗説八卦看這幾箇字形容最好看如險止健順麗入説動都包括得盡唤做卦之情卦中説剛中處最好看剛故能包蒙不剛則方且為物所蒙安能包蒙剛而不中亦不能包蒙如上九過剛而不中所以為擊蒙六三説勿用取女者大率隂爻又不中不正合是那一般無主宰底女人金夫不必解做剛夫此一卦要緊是九二一爻為主所以治蒙者只在兩箇陽爻而上九過剛故只在此九二為主而二與五應亦助得那五去治蒙大抵蒙卦除了初爻統説治蒙底道理其餘三四五皆是蒙者所以唯九二一爻為治蒙之主蒙以養正聖功也蓋言蒙昧之時先自養教正當了到那開發時便有作聖之功若蒙昧之中己自不正他日何由得會有聖功伊川説蒙亨髣佛是指九二一爻説所以云剛中問蒙彖辭言蒙亨以亨行時中也九二以可亨之道發人之蒙而又得其時之中如下文所謂二五以志相應而初筮則告之再三瀆則不告皆時中也初筮告以剛中者亦指九二有剛中之德故能告而有節夫能告而有節即所謂以剛而中也因問匪我求童蒙童蒙求我我指二童蒙指五五柔暗而二剛明五來求二二不求五也但占者若是九二之明則為人求我而亨在人占者若是九五之暗則為我求人而亨在我與乾九二九五利見大人之占同例否先生曰某作如此説却僅勝近世人硬裝一件事説得來窒礙費氣力但亦恐是如此耳因問初筮告再三瀆瀆則不告若作占者説則如何先生曰人來求我我則當視其可否而告之蓋視其來求我發蒙者有初筮之誠則告之再三煩瀆則不告之也我求人則當致其精一以叩之蓋我而求人以發蒙則當盡初筮之誠而不可有再三之瀆也曰發此一例即所謂稽實待虗先生曰然易中取象不如卦德上命字較親切如蒙險而止復剛反動而順行此皆親切如山下出泉地中有雷恐是後來又在那上面添出所以易中取象處亦有難理會者或問蒙以養正聖功也曰蒙童之心純一而未發可與為善可與為不善在所以發其蒙者何如耳此養之以正則易進於德及其至處則聖人也並語録廣漢張氏曰以純一未發之蒙而養其正可謂善矣若夫為不善則是為物誘而欲動非蒙之可與為不善也動則失其正矣南軒集答俞秀才問東萊吕氏曰説者多謂發蒙者不可自屈必待童蒙先來求我志與我相應然後可教苟急於教人不待學者有志而強告之必不能入矣此固是正理然人或錯會此説亢然不復與學者相接學者亦望風不敢進少徒寡與道卒不明要須詳玩志應二字此無以感之彼安得而應之應生於感也古之教人雖不區區先求學者然就不求之中自有感發之理不然學者之志何自而應乎初筮告以剛中也九二發蒙者也九剛也二中也剛中九二之全體也當學者初來請問之時其心誠一故徑以全體告之再三瀆瀆則不告瀆蒙也再三瀆是蒙者瀆發蒙者今不曰瀆發蒙者而反曰瀆蒙何也蓋聖人教人不倦豈嘗厭蒙者之瀆我哉所以再三瀆而不告者蓋至理不容擬議一言之下便當領解苟未領解吾置之而不告彼雖未達其胸中天理完然不動也若再三瀆告之則彼將入於擬議億度反瀆亂其天理矣此所謂瀆蒙也並紀聞象曰山下出泉蒙君子以果行育德伊川先生曰山下出泉出而遇險未有所之蒙之象也若人蒙稚未知所適也君子觀蒙之象以果行育德觀其出而未能通行則以果決其所行觀其始出而未有所向則以養育其明德也易傳藍田吕氏曰險而止蒙山下出泉蒙涵蓄而未發也廣平遊氏曰山下出泉其一未散其勢未達觀其勢之未達則果行觀其一之未散則育德易説龜山楊氏曰山下出泉泉之始達也萬折必東避礙而通諸海果行者取之盈科而進不舍晝夜育德者取之易説兼山郭氏曰蒙之為蒙可以達材可以成己是或一道也今夫山一卷石之多及其廣大草木生之禽獸居之寶藏興焉今夫水一勺之多及其不測黿鼉蛟龍魚鱉生焉貨財殖焉是以導之可以達材蓄之可以成己詩曰如山之苞如川之流其果行育德之謂乎易説白雲郭氏曰先人有言蒙之為蒙可以達材可以成己也雍曰山下出泉行之所以果行止之所以育德非以泉行而山止也蓋山下之泉必養其源然後決而為江河君子必育德深厚然後可以果行也其所以生利萬物者所謂達材歟易説漢上朱氏曰坎水在山下有源之水泉也山下出泉未有所之蒙也泉積盈科其進莫之能禦故君子果其行必育其德德者行之源育德者養源也果行則發而必至震為行乾剛為德坎水上為雲下為雨在山下為泉象其物宜也易傳新安朱氏曰泉水之始出者必行而有漸也本義果行育德又是别説一箇道理山下出泉却是箇流行底物事暫時被他礙住在這裏觀這意思却是説自家當恁地做工夫卦中如此者多或説育德有山之象果行有水之象先生曰亦好並語録廣漢張氏曰番陽余端蒙請豫名蒙齋至於再三豫未有以言也它日因有感於果行育德之義乃為之辭曰乾坤既畫八卦是生八卦相乘方象以明下坎上艮其卦曰蒙其蒙伊何源泉在中泉之始萌其行未達雖則未達而理孰遏君子體之于以果行黽勉躬行動畏天命泉之始萌其勢則止止乃曰澄源源曷己君子體之于以育德篤敬不渝靜保天則惟養于中大本攸立惟敏于外達道攸飭內外交修相須以成久而有常則能日新我銘蒙齋敢越斯義惟言之難實以自厲凡百君子有觀于斯毋忽乎近尚其懋之蒙齋銘或問蒙山下出泉蒙程先生曰水必行之物始出未有所之此意最深水由地中行行其性也遇險而止而行之性則未始止也若積盈則行矣故曰盈科而後進在人蒙昧之時而天命流行之理未始止也若果決其行涵養其明德而至於盛乃養蒙之聖功也答曰象之義亦謂泉始出而遇險未有所之如人蒙稚未有所適貴于果行育德充而達之也育德之義尤當深體答俞秀才並南軒集東萊吕氏曰易傳曰出而遇險未有所之蒙之象也惟其未有所之故導之為江為海無所不可若已有所之則必難回矣君子以果行育德果決其所行養育其明德二者最難兼果決者多不能涵養涵養者多不能果決殊不知二者本並行而不相悖果決中自有涵養之理涵養中自有果決之理並紀聞初六發蒙利用刑人用説桎梏以往吝象曰利用刑人以正法也伊川先生曰初以隂暗居下下民之蒙也爻言發之之道發下民之蒙當明刑禁以示之使之知畏然後從而教導之自古聖王為治設刑罰以齊其衆明教化以善其俗刑罰立而後教化行雖聖人尚德而不尚刑未嘗偏廢也故為政之始立法居先治蒙之初威之以刑者所以説去其昏蒙之桎梏桎梏謂拘束也不去其昏蒙之桎梏則善教無由而入既以刑率之雖使心未能喻亦當畏威以從不敢肆其昏蒙之欲然後漸能知善道而革其一無其字非心則可以移風易俗矣苟專用刑以為治則蒙雖畏而終不能發苟免而無恥治化不可得而成矣故以往則可吝治蒙之始立其防限明其罪罰正其法也使之由之漸至于化也或疑發蒙之初遽用刑人無乃不教而誅乎不知立法制刑乃所以教也蓋後之論刑者不復知教化在其中矣並易傳橫渠先生曰以柔下賢居於坎陷然無所私系用心存公雖不能論人於道以辨曲直正法可也善行法者多説于任刑道非𢎞矣故以往吝故君子哀矜而勿喜也易説藍田吕氏曰初六處蒙之初前遇陽明正性不流矣利用刑人有所斷也用説桎梏無所拘也不知自反而唯克以勝之術斯以往吝道也廣平遊氏曰蒙之初六發蒙而利用刑人何也蓋民之迷則目無所見耳無所聞若以物蒙其首也今欲發其蒙而示之以好惡則彼且不見利不勸不威不懲誥令所不能加行義所不能率必欲以利誘之邪則爵無德而祿無功愈非所以勸也故當小懲而大戒罰一以警百然後蒙者畏刑之將至相與從上之所好而避其所惡故其蒙可得而發也雖然有發蒙之志則刑人而為利矣苟惡其蒙而刑之不幾於不教而誅乎故曰利用刑人以正法也正法云者示之以好惡之謂也易説龜山楊氏曰蒙無知也告之而弗喻引之而弗達非威之以刑莫之能從也故發蒙之初利用刑人蓋威之使從也用説桎梏縱之以往則吝矣桎梏者所以禁切之使無妄適也吝則不復自新矣昔成王以商之餘民封康叔則告以敬明乃罰為先商之餘民頑民也蒙而無知者也故所先如此至康王命畢公保釐東郊則世變風移矣故命之曰惟德惟義時乃大訓成王之誥康叔蓋利用刑人之意先王之施德刑非異也因時而已矣易説兼山郭氏曰人之生不知學問之可成不知罟擭陷穽之可避凡以蒙故也故初則發之利用刑人乃所以為説桎梏之道也不能發之於初至於過而後擊之不亦晚乎謂以往者過也説者謂脫之則吝是一罹於刑終身不可弛也豈其然乎易説白雲郭氏曰先人曰人之生不知學問之可成不知罟擭陷穽之可避凡以蒙故也雍曰初六發蒙是使之知學問之可成也利用刑人是使之知陷穽之可避也聖人懼民性之日遷故欲辨之于初也雖舜之刑期無刑不過於此豈非説桎梏之道哉不知此道而以往能無吝乎或以用刑為發蒙之道疑聖人先刑後教非也發蒙所以教之也用刑所以輔教也此舜戒臯陶明于五刑以弼五教之意聖人豈有先刑罰而後教化之理哉易説漢上朱氏曰初六之動發蒙也蒙蔽之民不善其始至死於桎梏而不悔初六發蒙利用刑人此刑人非惡之也以正法也於其始也正法以示之蒙蔽者知戒終不陷于刑辟用説桎梏之道也艮手震足交於坎水桎梏之象坎為律法也初六動而正正法也兊為刑殺兊見坎毁説桎梏也治蒙之初威之以刑然後漸知善道過此以往則吝矣卦言童蒙爻言刑人刑所以輔教也程傳曰立法制刑乃所以教也後之論刑者不復知教化在其中矣易傳五峰胡氏曰大舜之有天下也先誅四凶孔子之執魯政也先誅少正卯唐太宗之起義兵也先誅髙德儒蓋時方蒙蔽未知好惡之所在惟先威之以刑則觀聽聳動而民知所從矣是説去其不知所從之桎梏也雖然刑加于惡之尤者然後足以正法新民之耳目而施教化也若用之不正以及衆人則不足以得民心民苟免而無恥於治安之道為可吝矣易外傳新安朱氏曰以隂居下蒙之甚也占者遇此當發其蒙然發之之道當痛懲而暫舍之以觀其後若遂往而不舍則致羞吝矣戒占者當如是也發蒙之初法不可不正懲戒所以正法也本義卦辭有平易底有難曉底利用刑人用説桎梏粗説時如今人打人棒也須與他脫了那枷方可一向枷他不得若一向枷他便是以往吝這只是説治蒙者當寬慢蓋法當如此語録廣漢張氏曰或問蒙之初六利用刑人人之昏蒙不教而誅之可乎蓋人之不善始發而絶之則易為力待其已發而後禁則扞格而難勝故曰童牛之牿元吉答曰此爻且詳玩伊川之説答俞秀才南軒集東萊吕氏曰初六發蒙利用刑人上九擊蒙師嚴然後道尊故始終皆以嚴易説又曰初六發蒙利用刑人用説桎梏以往吝剪爪稍深則侵膚己丑課程九二包蒙吉納婦吉子克家象曰子克家剛柔接也伊川先生曰包含容也二居蒙之世有剛明之才而與六五之君相應中德又同當時之任者也必廣其含容哀矜昏愚則能發天下之蒙成治蒙之功其道廣其施博如是則吉也卦唯二陽爻上九剛而過唯九二有剛中之德而應於五用於時而獨明者也苟恃其明專於自任則其德不𢎞故雖婦人之柔暗尚當納其所善則其明廣矣又以諸爻皆隂故云婦堯舜之聖天下所莫及也尚曰清問下民取人為善也二能包納則克濟其君之事猶子能治其家也五既隂柔故發蒙之功皆在於二以家言之五父也二子也二能主蒙之功乃人子克治其家也子而克治其家者父之信任專也二能主蒙之功者五之信任專也二與五剛柔之情相接故得行其剛中之道成發蒙之功苟非上下之情相接則二雖剛中安能尸其事乎並易傳橫渠先生曰九二以剛居中故能包蒙而吉擇婦而納之則吉九二以下卦之中主卦德故曰子克家以子任家必剛柔得中乃濟不可嚴厲也並易説上蔡謝氏曰易之蒙九二包蒙吉納婦吉子克家蔽蒙不通者包之順從者納之而不拒子克家之道也舜不藏怒不宿怨包蒙也以愛兄之道來誠信而喜之納婦也語録藍田吕氏曰九二以陽居二隂之中含德而不用故曰包蒙婦從夫子從親者也以順為正故納婦吉幹蠱無違言必稱親子克家者也龜山楊氏曰無忿疾于頑包蒙也苟以是心至斯受之矣納婦也九二以剛中之才居發蒙之任羣蒙資之以為明者也頑而疾之己甚則亂順而拒之遷善者沮非所以治蒙也故包蒙納婦吉婦者順而從我者也臣之任國事與子之治其家其道一也舜之父頑母嚚象傲日以殺舜為事舜則負罪引慝而已彼以愛兄之道來則誠信而喜之此舜之所以包蒙納婦而克家也使舜偽而為之則誠信不孚誠信不孚則剛柔不接以是而處頑傲之間欲其不格姦難矣易説白雲郭氏曰九二以剛中之德為治蒙之主所謂尊賢而容衆嘉善而矜不能者也故雖昏愚之蒙包而容之柔道之善取而納之長幼之節不廢而君臣之倫不亂是雖為治蒙之主而上下之分嚴矣是以吉也然包蒙者包衆蒙而為之主以隂陽言之九夫道也六婦道也以尊卑言之五父道也二子道也包蒙納婦必子克家而後吉苟無子道獨能包而容之是為強僣不制之臣矣故二者皆以克家為吉包蒙納婦剛克也子克家柔克也孟子曰有伊尹之志則可其九二之謂乎剛柔接者謂二之剛中上接於柔五之巽順下接於剛也易説漢上朱氏曰六五柔也九二剛也五以柔接剛為二所包含章有美而效之君臣道之正也二之吉也故曰包蒙吉二以剛接柔為五所納艮男為夫巽女為婦婦有相成之道虗其中以納之君道之正五之吉也故曰納婦吉二在內為家坎為乾之子父有子而至於納婦子克荷其家者也九二而致其君虗中以納之非其道廣其施博積誠以包蒙能若是乎譬之子克家者也二不能包則五不肯納剛柔不接家道廢矣故曰子克家剛柔接也二為家何也曰二內也大夫之位大夫有家雜卦曰家人內也易傳五峰胡氏曰諸葛孔明執蜀政柄上有劉禪孱暗之君下有楊儀魏延昧於大體之屬北有蔽欺天下竊命之魏東有不知天命稱尊之吳可謂蒙之世矣然孔明盡禮劉禪聽信無所嫌忤圓融儀延使各展其才力結好江東而不明其稱帝之罪志在北征亦必閉關息民然後用之其志大其量𢎞雖未能致其亨而有安強之吉矣廣開言路棄非猶弊屩得是如珠玉孜孜盡下故事無不察算無遺數納婦吉也豈有凶禍之及哉大臣事君猶子事父九二剛陽之才而六五柔順之君與之相應故雖居蒙世而有吉聖人舉而示人以近故云子克家也易外傳新安朱氏曰九二以剛陽為內卦之主統治羣隂當發蒙之任也然所治既廣物性不齊不可一槩取必而爻之德剛而不過為能有所包容之象又以陽受隂為納婦之象又居下位而能任上事為子克家之象故占者有其德而當其事則如是而吉也剛柔接指二五之應本義六三勿用取女見金夫不有躬無攸利象曰勿用取女行不順也伊川先生曰三以隂柔處蒙暗不中不正女之妄動者也正應在上不能逺從近見九二為羣蒙所歸得時之盛故舍其正應而從之是女之見金夫也女之從人當由正禮乃見人之多金説而從之不能保有其身者也無所往而利矣女之如此其行邪僻不順不可取也並易傳不有躬無攸利不立己後雖向好事猶為化物不得以天下萬物撓己已立後自能了當得天下萬物語録橫渠先生曰金夫二也不有躬履非正則不能固於一也易説藍田吕氏曰六三以隂居陽不正不中流於邪者也舍正應於上而近比於二行不順也金夫正也以不正而見于正故不有躬無攸利若斯之女勿用取也龜山楊氏曰六三隂柔而不中正不從正應而下從九二見金夫不有躬者也見金而恱從行不順矣婦人以順為正行不順則父母國人皆賤之二雖納婦非順而從之也何利之有易説白雲郭氏曰六三不正之女舍應從二見利忘身與貞不字者異矣何所利哉易於有應言婦無應言女三舍應從二行不順矣稱女可也易説漢上朱氏曰六三蒙而不正之隂坎有伏離離目為見上九不正下接六三成兊兊為少女取女也艮少男夫也乾變為金見金夫也坤為身兊折之為躬三之上不有躬坤為順三不正行不順無攸利故戒以勿用取女取女貴正女正則家人吉六三見利而恱不能自有其躬上九説之以利於德為不正於理為不順取是女而欲正家是亦蒙矣易傳新安朱氏曰六三隂柔不中不正女之見金夫而不能有其身之象也占者遇之則其取女必得如是之人無所利矣金夫蓋以金賂已而挑之若魯秋胡之為者行不順也順當作慎蓋順慎古字通用荀子順墨作慎墨且行不謹於經意尤親切今當從之並本義問不有躬無攸利不立已後雖向好事猶為化物不得以天下萬物撓己巳立後自能了當得天下萬物曰下面是伊川解易上句後二句又是覆解此意在乎以立己為先應事為後而今人平日好論所以治國平天下之道而自家身已全未理會得若能理會自家身已雖與外事若茫然不相接然明德在這裏了新民只見成推將去金夫不必解做剛夫並語録東萊吕氏曰蒙之六三為教者設戒也教者必擇質美者然後可受如三之隂柔偏暗正應在上不能逺從近見九二為羣隂所歸舍其正應而從之是女之見利而動棄其正匹見人之多金從之而不顧其身者也女而如此豈可復取人而如此豈可復教故曰勿用取女行不順也豈非所以戒教者乎學者資質既弱必須親近賢者然後可以變弱為強苟如四之柔弱乃與二陽隔絶相逺是柔弱之人又與賢者相逺必終困於昏蒙而可吝矣故曰困蒙之吝獨逺實也豈非所以戒學者乎紀聞六四困蒙吝象曰困蒙之吝獨逺實也伊川先生曰四以隂柔而蒙暗無剛明之親援無由自發其蒙困於昏蒙者也其可吝甚矣吝不足也謂可少也蒙之時陽剛為發蒙者四隂柔而最逺于剛乃愚蒙之人而不比近賢者無由得明矣故困于蒙可羞吝者以其獨逺于賢明之人也不能親賢以致因可吝之甚也實謂陽剛也並易傳龜山楊氏曰隂資陽以為明六四之困蒙逺于陽故也陽實而隂虗實謂陽也不能親賢以發其蒙其困吝宜矣易説兼山郭氏曰六四上下逺於二剛無所資焉謂之困蒙是以君子慎其獨也君子賢其賢而親其親沒世不忘也困蒙何有焉易説白雲郭氏曰先人曰上下逺於二剛無所資焉謂之困蒙是以君子慎其獨也雍曰逺於二剛無所發蒙則困陽實而隂虗故稱逺實孟子曰夫苟好善則人將輕千里而來告之以善何困之有夫苟不好善則訑訑之聲音顔色距人於千里之外是其所以困也故以此而居上則失道而寡助以此務學則孤陋而寡聞然則困蒙亦自取之歟伊川以吝為不足謂可少之也然有嗇而可鄙之意易説漢上朱氏曰陽為實九二剛實發蒙之主二與五應三動而近二四獨逺之若動而應初則與二相近四懷居不動獨逺于二介于不正無以發其蒙困不知學吝自取也二坎三動成兊澤無水困也故曰困蒙之吝獨逺實也陽為實何也曰隂消為虗陽息為實消息盈虗相為去來消則降息則升實則滿虗則耗升者貴也降者賤也滿者富也耗者貧也隂陽相循禍福更纒故又為貴賤貧富禍福之象太玄曰盛則入衰窮則更生有實有虗流止無常又曰息與消糾貴與賤交禍至而福避易傳五峰胡氏曰漢元初立蕭望之以師傅下行端揆之職為發蒙之主史髙與望之同受顧命位望之上為親近大臣以隂柔庸劣之才輔暗懦之君而昵比於恭顯閹宦不中正之人疏逺望之不與同心輔政於先帝付託之意豈不負哉是亦自逺於剛陽篤實之賢故有困蒙之吝耳易外傳新安朱氏曰既逺於陽又無正應為困于蒙之象占者如是可羞吝也能求剛明之德而親近之則可免矣獨逺實實協韻去聲本義六五童蒙吉象曰童蒙之吉順以巽也伊川先生曰五以柔順居君位下應於二以柔中之德任剛明之才足以治天下之蒙故吉也童取未發而資於人也為人君者苟能至誠任賢以成其功何異乎出於已也舍己從人順從也降志下求卑巽也能如是優於天下矣並易傳橫渠先生曰不願不信蒙之失正者也故蒙正如童吉與夫彖之義同易説藍田吕氏曰六五居蒙之時在上居中大人不失赤子之心者也龜山楊氏曰五居尊位而下求九二之臣不挾貴也以童蒙自居不挾長挾賢也苟有求焉有所挾則皆在所不告自天子至於庶人君子所以俟之一也故惟童蒙乃吉夫湯之於伊尹髙宗之於傅説皆學焉而後臣之由斯道也易説兼山郭氏曰夫是道也豈獨受學事師為然其微乃在於成德之序也順也者順於理也巽也者入於道也孔子曰吾與回言終日不違如愚退而省其私亦足以發夫然後知顔氏之子殆庶幾也易説白雲郭氏曰柔順居尊下應九二學焉而後臣此童蒙之吉也太甲之於伊尹髙宗之於傅説是也太甲克終允德髙宗克邁乃訓皆順以巽之義易説漢上朱氏曰艮少男童也五求於二成坤坤順也二往資五成巽巽順也順則易從巽則易入順則樂告之以善道巽則優柔以開導之以此治蒙優於天下矣童蒙之吉也五君位成王求助之爻乎易傳五峰胡氏曰漢昭所以委政霍光者沖幼未明習國家事耳非天資愚蒙乃童蒙也以其童蒙而天性聰明故能上順先帝之志下任霍光之賢而燕蓋之謀不成篡弒之禍不作故為吉也易外傳新安朱氏曰柔中居尊下應九二純一未發以聽於人故其象為童蒙而其占為如是則吉也本義上九擊蒙不利為寇利禦寇象曰利用禦寇上下順也伊川先生曰九居蒙之終是當蒙極之時人之愚蒙既極如苖民之不率為寇為亂者當擊伐之然九居上剛極而不中故戒不利為寇治人之蒙乃禦寇也肆為剛暴乃為寇也若舜之征有苗周公之誅三監禦寇也秦皇漢武窮兵誅伐為寇也利用禦寇上下皆得其順也上不為過暴下得擊去其蒙禦寇之義也並易傳橫渠先生曰蒙暗犯寇禦之可也以剛明極顯而寇蒙暗則傷義而衆不率也易説藍田吕氏曰上九以陽居上羣蒙之主上下順以從之可以擊蒙者也蒙而怙終不可教也故至於擊蒙蒙之時明者勝而暗者不勝寇者在彼禦之者在我凡為寇者以暗寇明也彼蒙不發必來為寇不利為寇者彼暗而物莫之助也利禦寇者我明而上下順也廣平遊氏曰蒙之上九擊蒙若齊之伐燕利其土地重器所謂為寇也若葛伯仇餉而湯往征之所謂禦寇也易説龜山楊氏曰上九蒙之極也以剛之才處之故至於擊蒙也然擊之以正其罪則禦寇也已甚而至於殘民則為寇也故戒之曰不利為寇利禦寇若有苗之昏迷而舜征之擊蒙而禦寇也孟子謂燕可伐而齊王伐之誅其君而弔其民則是亦禦寇也而齊王遷其重器係纍其子弟是乃為寇耳故諸侯將謀救之上下不順故也何利之有易説兼山郭氏曰上九下愚之不可移怙終之不可戒是以不得已而至於擊也師之毒天下猶曰民從之吉况於蒙乎故知其為上下順也不利為寇利禦寇彼我賔主之辭非有時而利為寇也易為君子謀不為小人謀斯言至矣上下皆蒙故戒之如此上九非剛中之德也易説白雲郭氏曰先人曰不利為寇利禦寇彼我賔主之辭非有時而利為寇也雍曰既利禦寇則彼來寇者不利明矣夫不能戒之於蚤終至於過而後擊之亦非特教之不正也蓋有積惡不移之質如何校滅耳者也上九剛過之才發蒙則暴包蒙則不能容以之禦寇則利矣能禦寇亦去衆蒙之害上下得不順之乎易説漢上朱氏曰為寇者九二也擊蒙禦寇者上九也坎為盜體師盜用師寇也艮為手擊也為寇者利於蒙暗昏亂之時蒙極而解則是非定蒙昧明故曰不利為寇上九乘其蒙解之時自上之三擊之坎毁成兊民恱而從之上下之情順也孟子謂取之而燕民恱也坤為順故曰利用禦寇上下順也易傳曰若舜征三苗周公誅三監禦寇也蒙屯之反何也曰姤變者六復變者六遁變者十有二臨變者十有二否變者十有二泰變者十有二反復相變聖人所以酬酢也陸震亦曰卦有反合爻有升降所以明天人之際見盛衰之理焉易傳五峰胡氏曰大舜之征苗文王之伐崇湯之放桀武王之伐紂皆以其昏蒙之極不得已故擊而去之耳若後世漢髙之誅秦項漢宣之誅先零之類禦寇者也平城之兵馬邑之伏唐太宗之伐髙麗為寇者也禦寇者出於不得已故天人順之漢武為寇於四夷而望天下之人皆如卜式之順己其可得乎易外傳新安朱氏曰以剛居上治蒙過剛故為擊蒙之象然取必太過攻治太深則必反為之害惟捍其外誘以全其真純則雖過於嚴密乃為得宜故戒占者如此凡事皆然不止為誨人也上下順禦寇以剛上下皆得其道本義不利為寇只是要去害他故戒之如此問擊蒙不利為寇如本義只是就自身克治上説是如何先生曰事之大小都然治身也恁地若治人做得太甚亦反成為寇占得此爻凡事不可過當如伊川作用兵説亦是然只做得一事用不如且就淺處説去却事事上有用若便説深了則此一事用得别事用不得並語録合訂刪補大易集義粹言卷八
