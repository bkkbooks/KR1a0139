body:
  text: 合訂刪補大易集義粹言卷五十六頭等侍衛納喇性德編艮下艮上伊川先生曰艮序卦震者動也物不可以終動止之故受之以艮艮者止也動靜相因動則有靜靜則有動物無常動之理艮所以次震也艮者止也不曰止者艮山之象有安重堅實之意非止義可盡也乾坤之交三索而成艮一陽居二隂之上陽動而上進之物既至於上則止矣隂者靜也上止而下靜故為艮也然則與畜止之義何異曰畜止者制畜之義力止之也艮止者安止之義止其所也易傳看一部華嚴經一本作法華不如看一艮卦經只言一止觀艮卦只明使萬物各有止止分便定並語録艮其背不獲其身行其庭不見其人無咎濓溪先生曰艮其背背非見也靜則止止非為也通書明道先生曰艮其背止於所不見也劉絢師訓人之情各有所蔽故不能適道大率患在自私而用智自私則不能以有為為應迹一作物用智則不能以明覺為自然今以惡外物之心而求照無物之地是反鑑而索照也易曰艮其背不獲其身行其庭不見其人孟子亦曰所惡於智者為其鑿也與其非外而是內不若內外之兩忘兩忘則澄然無事矣無事則定定則明明則尚何應物之為纍哉與橫渠書伊川先生曰人之所以不能安其止者動於欲也欲牽於前而求其止不可得也故艮之道當艮其背所見者在前而背乃背之是所不見也止於所不見則無欲以亂其心而止乃安不獲其身不見其身也謂忘我也無我則止矣不能無我無可止之道行其庭不見其人庭除之間至近也在背則雖至近不見謂不交於物也外物不接內欲不萌如是而止乃得止之道於止為無咎也一無也字易傳艮其背乃止也背無欲無思也故可止陳氏拾遺兼山郭氏曰艮止也天下之欲無窮而人每患於不能止者蓋不知無欲之地而止之也止於無欲之地所謂艮其背也人之耳目口鼻皆有欲也至於背則無欲也內欲不動則外境不入是以行其庭不見其人也不獲其身止其止矣不見其人止於行矣內外兼止故人欲自滅而天理固存孟子曰養心莫善於寡欲其艮其背之義乎自一身言之庭與四海皆一也聖人舉而措之天下謂之事業皆行其庭之事也此道可明以理不可窮以辭即所謂中庸之道也艮止圖説白雲郭氏曰伊川曰艮與畜止之義何異曰畜止者制畜之義力止之也艮止者安止之義止其所也雍曰艮止之義最為近道而知之行之者鮮且天下之欲無窮而人每患於不能止者蓋不知無欲之地而止之也有欲而止之大畜是也故有説輹豶豕之象伊川所謂力止之者也止於無欲之地所謂艮其背也人之有目欲於色者也耳欲於聲者也口欲於味者也鼻欲於臭者也至於背則無見無知故無欲常與物背馳而不相向使欲無自而生故得安於止之道一身且不獲況外物乎內欲不動則外境不入是以行其庭不見其人也不獲其身忘我也不見其人忘人也忘我者在止之止也忘人者在行之止也以止而忘我之止施之於行施之於人皆一也內外兼止則人欲自滅而天理固存是以無咎孟子言養心莫善於寡欲與艮其背之義正同易説新安朱氏曰艮止也一陽止於二隂之上陽自下升極上而止也其象為山取坤地而隆其上之狀亦止於極而不進之意也其占則必能止於背而不有其身行其庭而不見其人乃無咎也蓋身動物也唯背為止艮其背則止於所當止也止於所當止則不隨身而動矣是不有其身也如是則雖行於庭除有人之地而亦不見其人矣蓋艮其背而不獲其身者止而止也行其庭而不見其人者行而止也動靜各止其所而皆主夫靜焉所以得無咎也本義艮其背不獲其身只見個道理不見自家行其庭不見其人一似不曽見人一般不獲其身不得其身也猶言討自家身已不得語録艮止也背非有見之地也艮其背者止於不見之地也止於不見之地則靜靜則止而無為一有為之之心則非止之道矣通書釋義東萊吕氏曰艮背之用前説誠過髙而未切竊謂在學者用之政當操存戒懼實從事於夫子告顔子視聽言動之目馴致不已然後可造安止之地耳問艮背之指在學者當如何用答曰艮背之義在學者用之莫若止其所有所止則外物之交乎前不能汨之故夫子釋彖之辭不曰艮其背而曰艮其止其意可見答朱元晦彖曰艮止也時止則止時行則行動靜不失其時其道光明艮其止止其所也上下敵應不相與也是以不獲其身行其庭不見其人無咎也明道先生曰艮其止止其所也八元有善而舉之四凶有罪而誅之各止其所也釋氏只曰止安知止乎劉絢所録艮其止止其所也各止其所父子止於恩君臣止於義之謂艮劉絢師訓艮止也止則便生不止則不生艮始終萬物語録伊川先生曰艮為止止之道唯其時行止動靜不以時則妄也不失其時則順理而合義在物為理處物為義動靜合理義不失其時也乃其道之光明也君子所貴乎時仲尼行止久速是也艮體篤實有光明之義艮其止謂止之而止也止之而能止者由止得其所也止不得其所則無可止之理夫子曰於止知其所止謂當止之所也夫有物必有則父止於慈子止於孝君止於仁臣止於敬萬物庶事莫不各有其所得其所則安失其所則悖聖人所以能使天下順治非能為物作則也唯止之各於其所而已上下敵應不相與也以卦才言也上下二體以敵相應無相與之義隂陽相應則情通而相與乃以其敵故不相與也不相與則相背為一作與艮其背止之義一有同字也是以不獲其身至無咎也相背故不獲其身不見其人是以能止能止則無咎也並易傳聖人只言止所謂止如人君止於仁人臣止於敬之類是也易之艮言止之義曰艮其止止其所也言隨其所止而止之人多不能止劉元承手編艮其背止欲於無見若欲見於彼而止之所施各異若艮其止止其所也止各當其所也聖人所以應萬變而不窮一作勞者事各止當其所也若鑑在此而物之妍媸自見於彼也聖人不與焉時止則止時行則行時行對時止而言亦止其所也動靜不失其時皆止其所也陳氏拾遺橫渠先生曰雖處喧閧亦無害於為學有人於此或日月而至焉亦有終日而不至者及其久也去者常少若居於家聞嬰孩之啼則有不忍之心聞奴婢喧戾則有不容之意至於市井紛囂一不與我事何傷於存誠養志易曰艮其背不獲其身行其庭不見其人無咎夫入它人之庭不見其人可止也艮其背至近於人也然且不見以其上下無應也時止則止時行則行動靜不失其時其道光明學者必時其動靜則其道乃不蔽昧而明白今人從學之久不見進長正以莫識動靜見它人擾擾非關已事而所修亦廢由聖學觀之冥冥悠悠以是終身謂之光明可乎易説艮一陽為主於兩隂之上各得其位而其勢止也易言光明者多艮之象著則明之義也動靜不失其時義之極也義極則光明著見唯其時物前定而不疚並正蒙藍田吕氏曰艮止而不相交也背之於身五官之用四體之運動皆所不與止其所而與物不相交者也止道施於背則一身之運動皆所不與故曰艮其背不獲其身止其所而與物不相交故行其庭不見其人時止則止止不失時所以無咎時行而止時止而不止皆失之固止而不止其所則亂而失其所矣耳司聽目司視火之炎水之潤各止其用而不可亂也達於父子夫婦長幼君臣尊卑貴賤親踈之分各安其所而不亂此道所以光明也龜山楊氏曰艮止也止其所也故繫辭曰止萬物者莫善乎艮又曰成言乎艮艮者萬物之所成終而成始也止於此矣復出乎震不終止也故艮卦曰時止則止時行則行餘杭語録白雲郭氏曰夫止有止之止有行之止其行止之間又有時焉蓋行止繫乎時而不繫乎止也止所以應行止者也時所以為行止者也是則艮止之止在我而行止之止則在彼矣行止為時則艮止為道矣故彖言時止則止又曰艮其止所以兼明有二義也且艮之道時方止則止其止時方行則行其止行止在時艮止在此在時者不可必在此者可必不以在此之可必而易時之不可必則止道盡矣是以艮止之中復有行而行止之行復有艮之止是所謂行其道者也孔子曰用之則行舍之則藏孟子曰窮則獨善其身達則兼善天下是皆以止道應時也莊子曰寧其死為留骨而貴乎寧其生而曳尾於塗中乎二大夫往矣吾將曳尾於塗中是為知止不知行有我廢時者也欲孰甚焉且天下之欲常生於必而無欲生於不必孔子所以毋必者止其欲也莊子不知必之可止而欲必其生之樂是以失時止則止時行則行之義老氏有曰絶聖棄智絶仁棄義莊子又曰焚符破璽掊斗折衡彼時有之而我絶之欲不在時與物而在我也易在彼之欲而為我之欲其惑甚矣故雖艮止之道聖人不能廢時老莊氏未之知也動靜統言之也行止亦動靜也動靜俱不失時其道至矣故光明也道大成則明故中庸曰誠則明其道光明則艮道大成矣艮始於止施之於行止又施之於行止之時此其所以為大成也止其所者又言止無它義知其所而止之耳上下敵應不相與者艮之六爻皆敵也敵所以成艮也知敵而相與則為交戰之道失艮止之義逺矣知敵而不相與則與敵背馳情欲自逺是以能不獲其身不見其人無咎也無咎者於道無失其為義大矣易説艮曰時止則止時行則行雖止之道有行而行之時復有止焉蓋艮以止為主故也艮之止中庸之中是或一道中庸解漢上朱氏曰以三畫卦言之陽止於二隂之上止也以重卦言之上下內外各得其止故曰艮止也止非一定之止也行止相為用所以明道也猶寒暑之成歲晝夜之成日時焉而已矣艮者震之反艮止也靜也震動也行也艮直坤之初六可止之時也震直大壯之九四可行之時也不可止而止猶不可行而行其失道一也是以一動一靜震艮相反而不失其時則其道光明矣坎月在東光明之時也夫子可以仕則仕可以止則止又曰無可無不可者此也彼入而不出往而不反者豈知道之大全哉故曰時止則止時行則行其道光明此以震艮反復言乎艮也艮之所以能止者止之於其所也背止之象韓愈曰艮為背夫動生於欲欲生於見背止於其所不見也上下兩體爻不相應譬則兩人震之初九越五而之上一人背而往也九四去四而之三一人背而來也五四中爻體艮中在門闕之中庭也庭交際之地兩人背行於庭雖往來於交際之地然背行則不與物交無所見也且自顧其後不獲其身矣安能見人乎不獲其身忘我也不見其人忘物也所以能各止其止也以人倫言之君止於仁臣止於敬父止於慈子止於孝以至萬物庶事各有所止古人繡黻於裳兩已相背其艮之象乎故曰艮其止止其所也上下敵應不相與也是以不獲其身行其庭不見其人無咎也上下敵應不相與可止之時故無咎若施之於他卦則有咎矣此以震艮相反推明艮其背也在卦氣為十月故太玄準之以堅易傳新安朱氏曰艮止也至其道光明此釋卦名艮之義則止也然行止各有其時故時止而止止也時行而行亦止也艮體篤實故又有光明之義大畜於艮亦以輝光言之艮其止此釋卦辭易背為止以明背即止也背者止之所也以卦體言內外之卦隂陽敵應而不相與也不相與則內不見已外不見人而無咎矣朝氏曰艮其止當依卦辭作背本義艮其背便不獲其身不獲其身便不見其人行其庭對艮其背只是對得輕身是動物不道動都是妄然而動斯妄矣不動自無妄艮其背渾只見得道理合當如此入自家一分不得著一些私意不得不獲其身不干自家事這四句須是説艮其背了靜時不獲其身動時不見其人所以彖辭傳中説是以不獲其身至無咎也周先生所以説定之以仁義中正而主靜這依舊只是就艮其背邊説下來不是內不見已外不見人這兩卦各自是一箇物不相偢睬八純卦都不相與只是艮卦是止尤不相與內不見已是內卦外不見人是外卦兩卦各自去伯豐問兼山所得於程門者云艮內外皆止是內止天理外止人欲又如門限然在外者不得入在內者不得出此意如何先生云何故恁地説因論艮其背彖云止其所便是解艮其背蓋人之四肢皆能運轉惟背不動止其所之義也程傳解作止於所不見恐未安若是天下之事皆止其所已何與焉人亦何與焉此所謂不獲其身行其庭不見其人也又問莫是舜有天下而不與之意否曰不相似如所謂百官萬務金革百萬之衆飲水曲肱樂在其中萬變皆在人其實無一事是也又曰艮其背靜而止也行其庭動而止也萬物皆止其所只有理而已不獲其身不見其人也問伊川艮其背傳看來所謂止者正謂應事接物之時各得其所也今云止於所不見又云不交於物則是無所見無所交方得其所止而安若有所見有所交時是全無可止之處矣曰這處無所見底意思周先生也恁地説是它偶看這一處錯了相傳如此但看孔子釋彖之辭云艮其止止其所也蓋此一句即是説艮其背人身皆動惟背不動這便是所當止處此句伊川却説得好若移此處説它腦子便無許多勞攘伊川易傳艮其背一段只是非禮勿視聽言動則止於所不見無欲以亂其心不獲其身者蓋外既無非禮之視聽言動則內自不見有私己之欲矣外物不接便是姦聲亂色不留聰明淫樂慝禮不接心術惰慢邪僻之氣不設於身體之意又曰艮其背不獲其身行其庭不見其人易中只是説艮其止止其所人之四肢百體皆能動作惟背不能動止於背是止得其當止之所明道答橫渠定性書舉其語是此意伊川説却不同又自是一説不知伊川解艮其止止其所也又説得分曉却解艮其背又自有異想是照顧不到周先生通書之説却與伊川同也又曰艮其背看伊川説只是那非禮勿視聽言動今人又説得深少間恐便走作如釋老氏之説屏去外物也又因説止於所不見曰非禮之事物須是常去防間他不成道我恁地了便一向去事物裏面衮問艮其背不獲其身是靜中之止行其庭不見其人是動中之止伊川云內欲不萌外物不接如是而止乃得其正似只説得靜中之止否先生曰然此段當分作兩截艮其背不獲其身為靜之止行其庭不見其人為動之止總説則艮其背是止之時當其所而止耳所以止時自不獲其身行時自不見其人此三句乃艮其背之效驗所以彖辭先説止其所也上下敵應不相與也却云是以不獲其身行其庭不見其人也又問止有兩義得所止之止則是指義理之極行止之止則是就人事所為而言先生曰然時止之止止字小得其所止之止止字大此段工夫全在艮其背上人多是將行其庭對此句説便不是了行其庭是輕説過緣艮其背既盡得了則不獲其身行其庭不見其人矣問艮之象何以為光明先生云定則光明凡人胸次煩擾則愈見昏昧中有定止則自然光明莊子所謂宇泰定者天光發焉是也艮其背不獲其身只見道理所當止處不見自家自已不見害不見利不見痛癢只見道理如古人殺身成仁舍生取義皆是見得道理合當恁地處置皆不見是張三與是李四伊川説艮其背是止於所不見其意如説間邪存誠如所謂制之於外以安其內如所謂姦聲亂色不留於聰明淫樂慝禮不接於心術此意亦自好但易之本意未必是如此伯恭又錯會伊川之意謂止於所不見者眼雖見而心不見恐無此理伊川之意却不如此劉公度問老子所謂不見可欲使心不亂與易傳同否答云老子之意是要得使人不見故溫公解此一段認得老子本意聖人之治虛其心是要得人無思無欲實其腹是要得人充飽弱其志是要得人不爭強其骨是要得人作勞後人解得皆過髙了通書云背非見也亦似伊川説止非為也亦不是易本意語録中有云周茂叔謂看一部華嚴經不如看一艮卦下面注云言各止其所他這裏却看得止字好外物不接內欲不萌之際南軒以為之際二字當除去今程傳已無之際字又曰欲出於身人才要一件物事便須以身已去對副他若無所欲則只恁地平平過便似無此身一般又曰伊川解艮其背一段若别做一段看却好只是移放易上説便難通須費心力口舌方始為説得出又曰上下敵應不相與猶言各不相管只是各止其所又曰明道曰與其非外而是內不若內外之兩忘也説得最好便是不獲其身行其庭不見其人不見有物不見有我只見其所當止也如為人君止於仁不知下面道如何只是我當止於仁為人臣止於敬不知上面道如何只是我當止於敬只認我所當止也以至父子兄弟夫婦朋友大事小事莫不皆然從伊川之説到不獲其身處便説不來至行其庭不見其人越難説只做止其所止更不費力又曰艮其背不獲其身只見道理不見自家行其庭不見其人只見道理不見是那人艮其背字恐是止字彖中分明解云艮其止止其所也伊川易傳解止其所也極解得好艮卦是箇最好底卦動靜不失其時其道光明又剛健篤實輝光日新其德皆艮之象也艮居外卦者入而皆吉惟蒙卦半吉半凶如賁之上九白賁無咎上得志也大畜上九何天之衢道大行也蠱上九不事王侯志可則也頤上九由頤厲吉大有慶也損上九弗損益之大得志也艮卦敦艮之吉以厚終也蒙卦上九擊蒙不利為寇利禦寇雖小不利然卦爻亦自好蓋上九以剛陽居上擊去蒙蔽只要恰好不可太過太過則於彼有傷而我亦失其所以擊蒙之道艮其背不獲其身行其庭不見其人此是説廓然而大公孟子曰所惡於智者為其鑿也此是説物來而順應李守約問伊川易傳艮其背之義曰此説似差了不可曉若據夫子説止其所也只是物各有所止之意伊川又却於解艮其止止其所也又自説得分明恐上面是失點檢時止則止時行則行行固非止然行而不失其理乃所以為止也並語録廣漢張氏艮齋銘曰艮齋建安魏元履燕居之室也在易艮為止止其所也某嘗考大學始終之序以知止為始得其所止為終而知止則有道矣易與大學其義一也敬為之銘物之感人其端無窮人為物誘欲動乎中不能反躬殆滅天理聖昭厥猷在知所止天心粹然道義俱全是曰至善萬化之源人所固存曷自違之求之有道夫何逺而四端之著我則察之豈惟慮思躬以達之工深力到大體可明匪由外鑠如春發生知既至矣必由其知造次克念戰兢自持事物雖衆各循其則其則匪它吾性之德動靜以時光明篤實艮止之妙於斯為得任重道逺時不我留嗟我同志勉哉勿休繄我小子懼弗克力咨爾同志以起以掖南軒集象曰兼山艮君子以思不出其位康節先生曰莊子曰庖人雖不治庖尸祝不越樽俎而代之此君子思不出其位素其位而行之意也觀物外篇伊川先生曰上下皆山故為兼山此而并彼為兼謂重復一作復也重艮之象也君子觀艮止之象而思安所止不出其位也位者所處之分也萬事各有其所得其所則止而安若當行而止當速而久或過或不及皆出其位也況踰分非據乎易傳艮思不出其位乃止其所也陳氏拾遺橫渠先生曰位所安之分也如素夷狄行乎夷狄素患難行乎患難易説白雲郭氏曰艮之為卦上下皆艮故曰兼山下卦內也內為身上卦外也外為人兼內外而統之所以有不獲其身不見其人之象也止無它義止其所而已以君子之位言之則思不出其位者亦止其所也位非獨爵祿而已所守之分皆位也必曰思者未有事之時也未有事之時則無欲矣待其有欲而止則非艮也中庸曰喜怒哀樂之未發謂之中然則艮之為止其在兹時乎易説漢上朱氏曰兩山相兼而峙然各止其所焉位者所處之分君子據正循分亦各止其所而已周公之忠大舜之孝皆分當然也橫渠曰如素夷狄行乎夷狄素患難行乎患難也二四坤爻在中而正思不出位也夫易言思者皆坤也故太玄以五五土為思或曰心火也脾土也心乃有思以為土何也曰心火也有所思則繫之於土猶悲主肺怒主肝悲怒有不由於心者乎故曰心居中而治五官易傳初六艮其趾無咎利永貞象曰艮其趾未失正也伊川先生曰六在最下趾之象趾動之先也艮其趾止於動之初也事止於初未至失正故無咎也以柔處下當趾之時也行則失其正矣故止乃無咎隂柔患其不能常也不能固也故方止之初戒以利在常永貞固則不失止一作正之道也當止而行非正也止之於初故未至失正事止於始則易而未至於失也並易傳自雲郭氏曰趾初象也凡動之先莫先於趾止於動之先則易而止於既動之後則難止於其先故得無咎止於既動之後不能無得失也利永貞者利在久於其道而固守之也中庸曰人皆曰豫知擇乎中庸而不能期月守也是不知利永者也又曰得一善則拳拳服膺而弗失之是能利貞者也象言未失正者止於未動之先未有失正之事也小畜於復自道言吉復於不逺復言元吉艮之初六有過於二者而不言吉蓋吉凶者失得之象也二卦之復雖與正相近然有失而能止則謂之復凡言復皆先失後得復則吉不復則凶吉凶可得而言也艮其趾則止於未失得之前吉凶失得皆在所止矣是以不言吉也然則艮之無咎豈不足於小畜與復之吉哉蓋不使纍於得失而已故象言未失正則止於無失止於無失則未嘗有得矣然世多以吉為過於無咎是不知吉與無咎自為二道論有為則莫善於吉論守道則無咎為大是以易辭或言吉或言無咎或吉而無咎或凶而無咎不可同也易説漢上朱氏曰初在下體之下動而應足者趾也四震為足艮其趾者止其動之初也六居初不正宜有咎事止之於初其止早矣未失正也可動而動則正矣利永貞者非永止也動而正也正則行止一也不能止則亦不能行矣初四相易成巽為長永貞也初六隂柔患不能久故戒之以利永貞易傳新安朱氏曰以隂柔居艮初為艮趾之象占者如之則無咎而又以其隂柔故又戒其利永貞也本義六二艮其腓不拯其隨其心不快象曰不拯其隨未退聽也伊川先生曰六二居中得正得止之道者也上無應援不獲其君矣三居下之上成止之主主乎止者也乃剛而失中不得止之宜剛止於上非能降而下求二雖有中正之德不能從也二之行止繫乎所主非得自由故為腓之象股動則腓隨動止在股而不在腓也二既不得以中正之道拯救三之不中則必勉而隨之不能拯而唯隨也雖咎不在已然豈其所欲哉言不聽道不行也故其心不快不得行其志也士之處髙位則有拯無隨在下位則有當拯有當隨有拯之不得而後隨所以不拯之而唯隨者在上者未能下隨也退聽下從也並易傳橫渠先生曰腓體之隨也不能禁其趾而徒止其腓腓所未聽故心不能快易説藍田吕氏曰六二居趾之上腓之象也腓之行止一隨於趾不可得而専也二以隂靜欲止其腓而柔弱隨下不能止其趾乃欲止而不得止者也腓既主隨當退聽於趾以為行止則無患矣今不能救趾之不止又不聽趾之行止此心所以不快如孟子所謂既不能令又不受命是也白雲郭氏曰腓腨腸也下體之所主也上而股下而足皆隨之故為六二之象也六二下卦之主也初六九三之所隨也六二雖居中得正得止之道然以柔用柔才有不足是以不能舉其隨而其心不快也方止之時忘我忘人而六二不拯其隨其心不快何哉蓋六二有為之臣位也君子正心誠意之初故艮其背不獲其身行其庭不見其人及其道之大成施之於天下國家欲天下各安其所止蓋伊尹使是君為堯舜之君使是民為堯舜之民孟子欲正人心之時而不能極其隨者是以其心不快也此謂其隨失隨之義故君子其心不快象言未退聽謂隨者也易説漢上朱氏曰二動成巽巽為股二艮之柔膚也膚在下應股腓也腓膞腸也二不能動三剛而失中止之於上不獲往應於五艮其腓也九三止矣六二亦隨而止則所謂其隨者隨九三也三震二動成兊澤雷之象故曰隨拯一作拯音承馬融曰舉也三震起也三若之五成艮為手有舉之象二未能使三退處於二而聽從於已不能上行一舉手以濟五之柔不拯其隨也其隨猶言其事當隨也三坎為耳退處於二退聽也易傳曰退聽下從也故曰未退聽也二又不能自動應五故其心不快二動成兊兊為決其心快也二不能動坎為心病不快也六二止於下制於九三之強而拳拳然不忘納忠於君非中正君子孰能如是乎孟子出弔王歡輔行之時乎易傳曰言不聽道不行也故其心不快不得行其志也士之處髙位則有拯無隨在下位則有當拯者有當隨者有拯之不得而後隨者也易傳新安朱氏曰六二居中得正既止其腓矣三為限則腓所隨也而過剛不中以止乎上二雖中正而體柔弱不能往而拯之是以其心不快也此爻占在象中下爻放此三止乎上亦不肯退而聽乎二也本義東萊吕氏曰不拯其隨之義固由有所制然必可隨者蓋我既盡所以拯之者非未嘗拯而遽隨也又隨之一字甚有意味常人於是常爭之而不從者不得已而為之必有乖戾不平氣象非所謂隨也隨者委曲妥帖若己欲為之者但其心不快而已無迹見於外也答潘叔度九三艮其限列其夤厲薰心象曰艮其限危薰心也伊川先生曰限分隔也謂上下之際三以剛居剛而不中為成艮之主決止之極也已在下體之上而隔上下之限皆為止義故為艮其限是確乎止而不復能進退者也在人身如列其夤夤膂也上下之際也列絶其夤則上下不相從屬言止於下之堅也止道貴乎得宜行止不能以時而定於一其堅強如此則處世乖戾與物睽絶其危甚矣人之固止一隅而舉世莫與宜者則艱蹇忿畏焚撓其中豈有安裕之理厲薰心謂不安之一作其勢薰爍其中一有心字也謂其固止不能進退危懼之慮常薰爍其中心也並易傳橫渠先生曰一身而動止中列危至薰心易説藍田吕氏曰九三當止之時陽剛當位分别名分嚴不可犯物情不安故危薰心白雲郭氏曰不能止之於初至於三則難矣九三用剛有力止之象猶大畜説輹豶豕之道也限所以制內外也內欲不生外境不入所謂艮其限也亦猶列身之夤而制其左右也厲薰心者常以危亡之憂薰爍其心使不亡也所謂其亡其亡繫于苞桑者也曰薰者與詩言憂心如薰同意凡此者皆以九三之止失於早辨故必極於用力以限止之方之初六則甚難矣然艮止之道行無不善是以六爻終無凶危特有難易之别也雖然止而言厲何也中庸曰人皆曰豫知驅而納諸罟擭陷阱之中而莫之知辟也君子失性之危中庸謂之陷阱則艮之言厲一道也易説漢上朱氏曰薰子夏傳王弼本同孟喜京房馬融王肅作熏馬王曰熏灼其心虞翻本作閽虞曰艮為閽閽守門人坎盜動門故厲閽心古閽作熏字又曰馬君言熏灼其心未聞易道以坎水熏灼人也荀爽曰以熏為勳或誤作動蓋古本當作動心動心二字傳者誤併作勳字耳再傳者又脫其偏傍作熏而後來者又加草遂成薰字故荀以熏為勳虞亦曰古閽字作熏字今以象考之宜作動心三在上下體之際限也限腰也帶之所限三止之極止而不動艮其限也夤膂也一作䏖馬融曰夾脊肉鄭氏本作􅘡古之人不動其心者善養吾浩然之氣而已進退綽然有餘裕故其心不動九三知止之止而不知無止之止堅強固止與物睽絶無安裕之理譬之一身下體欲靜上體動而爭之則上下不相屬列絶其􅘡危厲動其心宜矣坎為心病故曰厲動心觀此知孟子之不動心非體易者不能也易傳新安朱氏曰限身上下之際即腰胯也夤膂也止於腓則不進而已九三以過剛不中當限之處而艮其限則不得屈伸而上下判隔如列其夤矣危厲熏心不安之甚也本義六四艮其身無咎象曰艮其身止諸躬也伊川先生曰四大臣之位止天下之當止者也以隂柔而不遇剛陽之君故不能止物唯自止其身則可無咎所以能無咎者以止於正也言止其身無咎則見其不能止物施於政則有咎矣在上位而僅能善其身無取之甚也不能為天下之止能止於其身而已豈足稱大臣之位也並易傳橫渠先生曰止於心故能艮其身咸之九四朋從爾思義近之易説藍田吕氏曰六四以隂居隂止乎至靜在上體之下任一身之事故曰止諸躬也白雲郭氏曰以初論四則初為早辨者也然有初之艮其趾然後四能艮其身先後之序理亦宜然艮其身則一身之內合於自然無不止也是以無咎止諸躬者謂能成己而已未能成物也易説漢上朱氏曰坤為身三坎折之為躬四在大臣之位而六五柔中不足於剛健故不能止天下之當止惟止其身自止於正故無咎若責以天下則安得無咎夫身有大身萬物與我同體者是也六四下不能止天下之當止上不能正其君局局然自止其身不亦小哉故夫子易身為躬王弼謂自止其躬不分全體輔嗣其知之歟易傳曰僅能善其身豈足稱大臣之任乎易傳新安朱氏曰以隂居隂時止而止故為艮其身之象而占得無咎也本義六五艮其輔言有序悔亡象曰艮其輔以中正也伊川先生曰五君位艮之主也主天下之止者也而隂柔之才不足以當此義故止以在上取輔一有之字義言之一無之字人之所當慎而止者唯言行也五在上故以輔言輔言之所由出也艮於一作其輔則不妄出而有序也言輕發而無序則有悔止之於輔則一作故悔亡也有序中節有次序也輔與頰舌皆言所由出而輔在中艮其輔謂止於中也五之所善者中也艮其輔謂止於中也言以得中為正正之於輔使不失中乃得正也並易傳橫渠先生曰不能施止於心而能止其言故悔可亡也易説藍田吕氏曰六五柔得尊位輔之象也中正無邪故止其輔而言有序也白雲郭氏曰六五君位一卦之主蓋主天下之止者也天下命令之所由出可不慎乎故艮其輔言有序而後悔亡也輔頰車也言之所出也有序中節也君子居其室出其言善則千里之外應之有序者固如此也是以其悔可亡惟中正之君故能慎而止之如此庸主忽其言故天下亦共違之也觀舜命九官則知艮其輔言有序之道而商紂謂己有天命謂敬不足行謂祭無益謂暴無傷蓋有間矣豈孔子所謂喪邦之言哉易説漢上朱氏曰三至上體頤五動成巽五應二五成艮二成兊艮在首下動而上止為輔兊為口舌言之象五巽而出之與二相應答艮其輔言有序也六五不正宜有悔施止道於其輔頰言必中正斯可以止天下之動矣是以悔亡易傳新安朱氏曰六五當輔之處故其象如此而其占悔亡也悔謂以隂居陽正字羡文協韻可見本義上九敦艮吉象曰敦艮之吉以厚終也伊川先生曰九以剛實居上而又成艮之主在艮之終止之至堅篤者也敦篤實也居止之極故不過而為敦人之止難於久終故節或移於晚守或失於終事或廢於久人之所同患也一無上字九能敦厚於終止道之至善所以吉也六爻之德唯此為吉天下之事唯終守之為難能敦於止有終者也上之吉以其能厚於終也並易傳藍田吕氏曰上九止之時以剛居上所守不遷敦重其所止以終其事也白雲郭氏曰居止之極止之過中者也過中則疑於有失矣然慎厥終惟其始者古人之戒有始有卒者聖人之事能過於止是厚於終也又安有失哉故言敦艮吉易説漢上朱氏曰艮為山篤實也動成坤厚也篤實而厚敦之象上艮之極止極者有不止焉九以剛居上動而必正能厚其終知止於至善之道正故吉非篤實之君子能之乎易傳曰人之止難於久故節或移於晚守或失於終事或變於久人之所同患也易傳新安朱氏曰以陽剛居止之極敦厚於止者也本義合訂刪補大易集義粹言卷五十六
