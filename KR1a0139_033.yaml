body:
  text: 頭等侍衛納喇性徳編震下艮上伊川先生曰頤序卦物畜然後可養故受之以頤夫物既畜聚則必有以養之无養則不能存息頤所以次大畜也卦上艮下震上下二陽爻中含四隂上止而下動外實而中虚人頤頷之象也頤養也人口所以飲食養人之身故名為頤聖人設卦推養之義大至於天地養育萬物聖人養賢以及萬民與人之養生養形養德養人皆頤養之道也動息節宣以養生也飲食衣服以養形也威儀行義以養德也推己及物以養人也易傳新安朱氏曰互體亦有取不得處如頤大過之類是也語錄東萊吕氏曰易傳曰无養則不能存息此一句最當㸔凡人未嘗无良心良知也若能知所以養之則此理自存至於生生不窮矣息生也易說頤貞吉觀頤自求口實伊川先生曰頤之道以正則吉也人之養身養德養人養於人皆以正道則吉也天地造化育養萬物各得其宜者亦正而已矣觀頤自求口實觀人之所頤與其自求口實之道則善惡吉凶可見矣易傳横渠先生曰觀頤辨養道得失欲觀人處己之方易說白雲郭氏曰頤之為象上下二陽中含四隂虚中而實外上止下動飲食之象也頤養也飲食所以自養也天下之養自養生養心養德養人其養雖不一然非如頤之虚中則口實无自而致養必有虚以容之斯足以受養矣故卦辭秪以觀頤口實為言以明頤之道以虚中為主故也況飲食之養朝夕有常不可變者如此然後盡頤養之道所以必取飲食之象而頤非止於飲食而已也聖人立象以盡意故言簡而理明如此易説新安朱氏曰頤口旁也口食物以自養故為養義為卦上下二陽内含四隂外實内虛上止下動為頤之象養之義也貞吉者占者得正則吉觀頤謂觀其所養之道自求口實謂觀其所以養身之術皆得正則吉也本義東萊吕氏曰頤貞吉頤須是正得正如堯舜禹湯文武則吉如邪説養之則凶易說彖曰頤貞吉養正則吉也觀頤觀其所養也自求口實觀其自養也天地養萬物聖人養賢以及萬民頤之時大矣哉伊川先生曰貞吉所養者正則吉也所養謂所養之人與養之之道自求口實謂其自求養身之道皆以正則吉也聖人極言頤之道而贊其大天地之道則養育萬物養育萬物之道正而已矣聖人則養賢才與之共天位使之食天禄俾施澤於天下養賢以及萬民也養賢所以養萬民也夫天地之中品物之衆非養則不生聖人裁成天地之道輔相天地之宜以養天下至於鳥獸草木皆有養之政其道配天地故夫子推頤之道贊天地與聖人之功曰頤之時大矣哉或云義或云用或止云時以其大者也萬物之生與養時為大故云時並易傳藍田吕氏曰頤盡其所以養也上止下動外實内虚頤之象也莫非養也養正則吉所養自養皆欲觀其邪正也觀天地養萬物則自養得其正觀聖人養賢以及萬民則所養得其正龜山楊氏曰上止而下動外實而中虚頤之象也口之於飲食人所資以為養也故頤養也夫觀頤觀其所養也天地養萬物聖人養賢以及萬民是也自求口實觀其自養也體有小大不以小害大自養之道也天地養萬物失其正則隂陽繆戾而物不遂其生矣聖人養賢不以正賢者不安其位而民不被其澤矣一人之身无尺寸之膚不養也務養其小體則飲食之人而人賤之矣故頤正則吉反是則凶之道也夫天地之養萬物聖人之養賢與人之自養各當其可而後得其正得其正而後吉則頤之時豈不大矣哉易說白雲郭氏曰人與萬物莫不有所養然有養之以正養之非正者養之以正則得所養養之非正則失所養是以養正則吉也欲觀天下之所養必觀口實自養之義則得頤之道矣莫非天下之所養也雖夫至於天地養萬物聖人養賢以及萬民皆是也以其頤之大者自求於口實頤養之中皆得之矣則頤之時非止飲食口體而已豈不大矣哉卦言觀頤彖稱其大皆謂不可以飲食小者為盡頤也易說漢上朱氏曰鄭康成曰頤者口車之名震動於下艮止於上口車動而止因輔嚼物以養人故曰頤此合震艮兩體而成頤也頤者養也養之以正則吉養之以不正則凶故曰頤貞吉此以初九之正言頤養之道也頤自臨九二之變一變明夷離為目觀也自内觀外觀其人之所養也所養正歟君子也所養不正歟小人也觀其所養是非美惡無所逃矣故曰觀頤此以臨二初變明在人者養之之道當正也四變頤自離變艮艮為手求也自外觀内反觀己之自養以考正與不正也口實者頤中之物也四爻皆隂隂為虚虚則无物故自求口實无物而求正與不正未定也二四正三五上不正自養者正歟君子之道也雖貧賤不去也自養者不正歟小人之道也雖富貴不處也故曰自求口實觀其自養也此以上九及頤中四爻明在己者養之之道當正也觀人之所養然後觀吾之自養則所養正矣養之道甚大天地之養萬物聖人養賢以及萬民亦不過震動艮止也乾天也坤地也震東方萬物發生天地之養萬物也上九尚賢在五位之上坤衆為民聖人養賢以及萬民也天地之生其動以正陽降隂升萬物自遂其盛至於盈乎天地之閒各極其分而後止天地不勞也動以正而已養萬民者本於養賢賢者在上萬民自遂其生聖人不勞也止於養賢而已故震動艮止之象自己之養推之至於人之養自人之養推之至於天地聖人然養之道不過乎此頤之時豈不大乎故曰天地養萬物聖人養賢以及萬民頤之時大矣哉此以頤之成卦終言頤之道也易傳曰或云用或云義或云時以其大者也萬物之生養以時為大故云時以卦氣言之十一月卦故太𤣥準之以養或曰初變明夷則有離四變成頤非離也何以有觀之象曰此可以意會難以言傳明夷之離為小過之飛鳥訟之坎為中孚之豚魚小過中孚豈有離坎論其所生也變卦之法一卦七變八卦為六十四四五六之變无復本體矣而五行盛衰皆以本卦言之何哉故曰察性知命原始見終易傳新安朱氏曰觀其自養也釋卦辭頤之時大矣哉極言養道而贊之本義頤須是正則吉何以觀其正不正蓋觀頤是觀其養德是正不正自求口實是觀其養身是正不正未說到養人處觀其所養亦只是說君子之所養養浩然之氣模様自養則如爵禄下至於飲食之類是說自求口實問頤卦先生曰頤卦最難㸔問本義言觀頤謂觀其所養之道自求口實謂觀其所以養身之術與程傳以觀頤為所以養人之道求口實為所以自養之道如何先生沈吟良久曰程傳似勝蓋下體三爻皆是自養上體三爻皆是養人不能自求所養而求人以養已則凶故下三爻皆凶求於人以養其下雖不免於顛拂畢竟皆好故上三爻皆吉問觀頤觀其所養之道觀其自養則是所以養身之術先生曰所養之道如學聖賢之道則為正黄老申韓則為非凡見於修身行義皆是也所養之術則飲食起居皆是也問伊川以觀其所養作觀人之養如何先生曰這兩句是解養正則吉以所養之道與養生之術正則吉不正則不吉如何是觀人之養不曉程說是如何並語録東萊吕氏曰彖繇辭既言貞吉而孔子復彖之曰養正則吉疑若贅也殊不知聖人一字之間自有无窮之意學者若識則之一字庶乎知之矣觀頤觀其所養也自求口實觀其自養也觀我之所以自養正與不正也天地養萬物聖人養賢以及萬民人皆知萬物之自生自息而不知天地有以養之聖人德與天地合故養賢以及萬民然萬民之多安得人人而養之惟得其要會則所養甚約而所及甚博其要先在於養賢而已易說象曰山下有雷頤君子以慎言語節飲食伊川先生曰以二體言之山下有雷雷震於山下山之生物皆動其根荄發其萌芽為養之象以上下之義言之艮止而震動上止下動頤頷之象一有也字以卦形言之上下二陽中含一无含字四隂外實中虚頤口之象口所以養身也故君子觀其象以養其身慎言語以養其德節飲食以養其體不惟就口取養一无養字義事之至近而所繫至大者莫過於言語飲食也在身為言語於天下則凡命令政教出於身者皆是慎之則必當而无失在身為飲食於天下則凡貨財資用養於人者皆是節之則適宜而无傷推養身之道一有則字養德養天下莫不然也易傳横渠先生曰山下有雷畜養之象易說藍田吕氏曰山下有雷所震未逺則慎其所發陽氣未盈則節其所養龜山楊氏曰言語飲食皆取頤之象也出其言不善則千里之外違之則亂之階也故書曰惟口出好興戎可不慎乎飲食以養人務養其口悦而不知節則取賤之道也夫如是皆非頤正之義也易說兼山郭氏曰山以形雷以氣故言語主於氣飲食主於味方其知所養也則味生形而有餘不足随之氣生精而善惡隨之此君子宜知慎也易說白雲郭氏曰山附於地其養物以形也雷動於天其養物以氣也此天地致養萬物之道也在人之養亦无異此故天地以形氣而養物而人亦受養於形氣之閒是以君子慎言語而節飲食也然頤以虚中為主雖以言語飲食為致養之道而為虚中之患者亦言語飲食也言語出於虚者也飲食入於虚者也出而為患於是慎之入而為患於是節之頤養之道斯為至矣蓋君子知言語飲食之不能無也使不為養之之患者其惟慎而節之乎天下之虚其患皆如是所以去其患者亦莫不然也易說漢上朱氏曰山下有雷以養萬物而動亦不可過也震為決躁艮止之慎言語也噬嗑有飲食之象頤中无物節飲食也言語不慎則招禍飲食不節則生疾皆非養之道易傳曰慎言語以養德節飲食以養體事之至近而所繫至大者莫過於言語飲食在身為言語於天下則命令政教出於身者皆是慎之則无失在身為飲食於天下則貨財資用養於人者皆是節之則无傷易傳新安朱氏曰二者養德養身之切務本義或曰諺有禍從口出病從口入甚好曰此語前輩曽用以解頤之象慎言語節飲食一日侍食先生曰只易中節飲食三字人不曽行得並語録東萊吕氏曰伊川曰雷震於山下山之生物皆動其根荄發其萌芽為養之象凡人之言天地養萬物不過雨露之澤而已而此言雷者其義甚深故易傳有發動之意此意當自體會易說初九舍爾靈龜觀我朶頤凶象曰觀我朶頤亦不足貴也伊川先生曰蒙之初六蒙者也爻乃主發蒙而言頤之初九亦假外而言爾謂初也舍爾之靈龜乃觀我而朶頤我對爾而設初之所以朶頤者四也然非四謂之也假設之辭爾九陽體剛明其才智足以養正者也龜能咽息不食靈龜喻其明智而可以不求養於外也才雖如是然以陽居動體而在頤之時求頤人所欲也上應於四不能自守志在上行說所欲而朶頤者也心既動則其自失必矣迷欲而失己以陽而從隂則何所不至是以凶也朶頤為朶動其頤頷人見食而欲之則動頤垂涎故以為象九動體朶頤謂其説隂而志動既為欲所動則雖有剛健明智之才終必自失故其才亦不足貴也人之貴乎剛者為其能立而不屈於欲也貴乎明者為其能照而不失於正也既惑所欲而失其正何剛明之有為可賤也並易傳横渠先生曰體躁應上觀我而朶其頤求養而無恥者也易說龜山楊氏曰龜能前知靈於物者也咽息不食非志於養者也初自外來而為主於内震之體也四止於上而初動於下以應之朶頤之象也朶動其頤也一陽在下有剛明之才而求養於上則匪正矣舍靈龜之象也舍靈龜而觀朶頤則人賤之矣故凶而不足貴也爾對我之辭爾謂初四謂我爾非四謂之也假之辭耳易說兼山郭氏曰初九龜之所養也内内以氣為主人之所養也外外以食為主故食氣者夀食味者夭理固然也故曰舍爾靈龜觀我朶頤凶然養氣有三下焉者强其氣而已若孟施舍之養勇是也曰視不勝猶勝也舍豈能為必勝哉能无懼而已矣中焉者保其氣如莊子所謂吹嘘呼吸吐故納新彭祖夀考之所好也上焉者充其氣若孟子所謂我知言我善養吾浩然之氣其為氣也至大至剛以直養而無害則塞乎天地之閒此養正之大也孟子言養其小者為小人養其大者為大人則朶頤口體之養又何足為貴乎初九頤之始未知所進故戒之如此易說白雲郭氏曰頤之善者莫善於龜之為物也蓋言語飲食人所以致養亦所以為頤之患遠取諸物獨龜不以食而夀舉頤之患息矣不亦善乎初九在頤之初可求善道自養而舍之反觀朶頤之患是失其所守之貞者也頤之道貞則吉非貞則凶初九之凶自取之也然初九與六四為應舍陽求隂舍善求不善是舍君子而為小人又何足貴乎頤之取龜亦猶艮之取背易說漢上朱氏曰頤自明夷之離四變而成頤故頤初九有龜之象伏於坤土之下龜蟄時也龜所以靈者蟄則咽息不動无求於外故能神明而夀君子在下自養以正靈龜之類也六四安位無下賢之意初不待求往之四成離離為目觀我也初震動體下頤而動口雖徒嚼志已先動是舍爾所以為靈龜者觀我而朶其頤也爾言初九我言六四舍爾觀我㤀已從欲動而不正凶之道也夫貴乎陽者為其特立不屈於欲故能无禄而富无爵而貴守道修已澹然无營今躁妄以求无恥自辱亦不足貴也易傳又曰王弼謂頤初九不能使物由己養誤也夫使物由己養有命存焉初九在下未能養人而當自養以正故以朶頤戒之叢說新安朱氏曰靈龜不食之物朶垂也朶頤欲食之貌初九陽剛在下足以不食乃上應六四之隂而動於欲凶之道也故其象占如此本義東萊吕氏曰初九觀我朶頤凶六二顛頤拂經于丘頤征凶六三拂頤貞凶頤自初至三皆震體也震動也頤養也動而求養故三爻皆凶是知躁動以求富貴利禄无時而不凶也易說六二顛頤拂經于丘頤征凶象曰六二征凶行失類也伊川先生曰女不能自處必從男隂不能獨立必從陽二隂柔不能自養待養於人者也天子養天下諸侯養一國臣食君上之禄民賴司牧之養皆以上養下理之正也二既不能自養必求養於剛陽若反下求於初則為顛倒故云顛頤顛則拂違經常不可行也若求養於丘則往必有凶丘在外而髙之物謂上九也卦止二陽既不可顛頤於初若求頤於上九往則有凶在頤之時相應則相養者也上非其應而往求養非道妄動是以凶也顛頤則拂經不獲其養爾妄求於上往則得凶也今有人才不足以自養見在上者勢力足以養人非其族類妄往求之取辱得凶必矣六二中正在他卦多吉而凶何也曰時然也隂柔既不足以自養初上二爻皆非其與故往求則悖理而得凶也征而從上則凶者非其類故也往求而失其類得凶宜矣行往也並易傳横渠先生曰凡頤之正以貴養賤以陽養隂所謂經也頤卦羣隂皆當聽養於上六二違之反比於初以隂養陽顛頤者也羣隂上所聚養者也六二亂經於聚養之義失隂類之常故以進則凶易說廣平游氏曰聖人推言頤之為道以為天地養萬物聖人養賢以及萬民則以上養下頤之正也若在上而反資養於下則於頤為倒置矣此二與四所以俱為顛頤也然二之志在物而四之志在道故四顛頤而吉而二則征凶也何以知其然邪蓋六二居中得正宜足以自守矣然在下體疎遠而未有禄又動體也宜於處約未能自安故降志以求初初方一意於應四而不答也則又將求其類以趨五五非其應又力不足以自養而何暇養人乎故二為行失類此以知其志之在物也夫自養以有所養養德以需天下之求頤之常理也今至於屈己以求諸人則失理之常矣此二之求於五五之資於上所以俱為拂經也並易說龜山楊氏曰以上養下相應以相養理之經也二以隂柔不能自養而卦惟二陽皆非其應而下求於初顛頤拂經也丘在外而髙上九之象也上而求之則行失類矣故征凶易說兼山郭氏曰雜卦曰頤養正也彖曰養正則吉也而六二六四皆謂之顛頤何也王輔嗣曰養下曰顛或謂以下養上為顛經曰天地養萬物聖人養賢以及萬民謂養下曰顛者非也孟子曰无君子莫治野人无野人莫養君子謂以下養上為顛亦非也且頤之象下動而上止交相為養者也然則何以謂之顛乎王昭素曰以隂養陽謂之顛老子言天之道損有餘以補不足蓋隂常乏而陽常有餘以不足奉有餘是以謂之顛也然六二六四吉凶不同何也曰六四之應正六二之比不正是以或以吉或以凶也二之應五常道也五才不足於山丘之象也既顛以養初又不應於五以是征行失類之象也蓋隂與隂陽與陽類也五雖无應當自靖以待之而致養於初且失類而凶凶由於失類也易説白雲郭氏曰天下之理陽足以養隂而隂則受養而已蓋隂道不足无及人之力也二五相應者也二隂不足而求養於五五隂不足无以致養失頤養之道故曰顛頤若是則二五又違經常相應之理矣故又曰拂經五艮也艮為山而曰于丘頤者山之養物之道不足故也是為五之象也必欲征行求養徒凶而已二五類也不得其養故言失類先儒謂頤征凶當作于丘頤蓋言丘之所養異乎山也易說漢上朱氏曰二比於初不能養其下而反資初九之賢以自養乾為首在下顛頤也六二經也顛頤則拂違其經矣養之經陽養隂上養下陽當在上養之隂當在下而受養故天子養天下諸侯養一國士庶人各以其職受養五處君位二當受養於五六五養道不足然二亦不可越五而上征丘者上九應二之象也艮為山山半為丘王肅曰丘小山也物之所聚以養人者也蓋二近於初而相得資之以養雖曰顛頤未為无所養若近舍初九逺資上九征行亦凶何哉五雖養道不足以隂陽言之己類又在相應之地上九應二則失其類矣易傳新安朱氏曰求養於初則顛倒而違於常理求養於上則往而得凶丘上之髙者上之象也初上皆非其類也本義六三拂頤貞凶十年勿用无攸利象曰十年勿用道大悖也伊川先生曰頤之道惟正則吉三以隂柔之質而處一有又字不中正又在動之極是柔邪不正而動者也其養如此拂違於頤之正道是以凶也得頤之正則所養皆吉求養養人則合於義自養則成其德三乃拂違正道故戒以十年勿用十數之終謂終不可用无所往而利也所以戒終不可用以其所由之道大悖義理也並易傳横渠先生曰履邪好動繫說於上一作繫而說上不但拂經而已害頤之正莫甚焉故凶易說龜山楊氏曰頤正則吉六三頤不中正而居動之極拂頤之正也故十年勿用十年勿用則終不可用矣夫何利之有易說兼山郭氏曰十年數之終也孔子曰三多凶凡以三不當位而居上下之際違本卦之義所以多凶也易說白雲郭氏曰二言拂經謂違二五相應之常此言拂頤則違頤之道矣故象言其大悖也六二之凶宜矣六三有應而凶者蓋上止下動為頤之道今居上下之際過於動而不知止以動為貞則凶矣是以十年勿用无所利也易每以十年然後反常則人之一失必十年而後復可不慎哉易説漢上朱氏曰六三當受養於上九而六三不正動而正則上九不來不動以待初九則初九不應既不受之於上又无以資之於下拂頤也故貞凶十坤數之極坤為年十年勿用言十年不可動上下无所利養道大悖也易傳新安朱氏曰隂柔不中正以處動極拂於頤矣既拂於頤雖正亦凶故其象占如此本義六四顛頤吉虎視耽耽其欲逐逐无咎象曰顛頤之吉上施光也伊川先生曰四在人上大臣之位六以隂居之隂柔不足以自養况養天下乎初九以陽剛居下在下之賢也與四為應四又柔順而正是能順於初賴初之養也以上養下則為順今反求下之養顛倒也故曰顛頤然已不勝其任求在下之賢而順從之以濟其事則天下得其養而已无曠敗之咎故為吉也夫居上位者必有一作其才德威望為下民所尊畏則事行而衆心服從若或下易其上則政出而人違刑施而怨起輕於陵犯亂之由也六四雖能順從剛陽不廢厥職然質本隂柔賴人以濟人之所輕故必養其威嚴耽耽然如虎視則能重其體貌下不敢易又從於人者必有常若間或无繼則其政敗矣其欲謂所須用者必逐逐相繼而不乏則其事可濟若取於人而无繼則困窮矣既有威嚴又所施不窮故能无咎也二顛頤則拂經四則吉何也曰二在上而反求養於下下非其應類故為拂經四則居上位以貴下賤使在一无在字下之賢由己以行其道上下之志相應而一有澤字施於民何吉如之自三以下養口體者也四以上養德義者也以君而資養於臣以上位而賴養於下皆養德也顛倒求養而所以吉者蓋得剛陽之應以濟其事致己居上之德施光明被於天下吉孰大焉並易傳横渠先生曰體順位隂得頤之正以貴養賤而得賢者雖反陽爻養隂之義以上養下其施光矣然以柔養剛非嚴重其德廣大其志則未免於咎易說廣平游氏曰六二行失類至於六四則其志正矣其位近君矣官尊禄厚足以无求矣而汲汲於應初非好善㤀勢又將與賢者共之不能為此若孟獻子之家有友五人焉者近是矣且嗜欲深者其天機淺而士大夫之志或涉於重外則人人得而易之矣今六四之所取重者在此而不在彼則瞻視尊嚴儼然人望而畏之故如虎視耽耽而所欲皆得也欲仁而得仁則无惡於欲矣誰能推咎之哉故四之顛頤乃為上施光此以知其志之在道也易說龜山楊氏曰四與初正應也以上養下頤之正也隂柔不足以致養而下求於初顛頤也然隂資於陽得所養矣故吉與二之拂頤異也居近尊之位大臣任頤之責者也才雖不足而履正居位人所欽畏也故有虎視耽耽之象初以剛明之才應於上一於奉上者也上之所資能充其欲也故有其欲逐逐之象逐逐言相繼不乏也如是故无咎易説兼山郭氏曰六四之顛頤以約為養宜有虎視之威制逐逐之欲故能上施而光古人謂禦夷狄者不一而足其在兹乎易説白雲郭氏曰居上而求養於下者亦失頤養之道故謂之顛頤顛頤一也所以為顛頤則異也經曰頤養正也又曰養正則吉故知求養正於下者是能養其德也故吉不知求養正於下則是厲民而以自養也故凶此其所以異也六四所居者正所應者正獨得養正之道故一爻之中具求養自養養内養外之義是以吉且无咎而為上施之光也且顛頤求養也虎視耽耽其欲逐逐自養也虎視耽耽然所以養威容於外又逐逐然去其多欲所以養心於内也詩云他山之石可以攻玉故古之人以能問於不能以多問於寡有若無實若虚此顛頤求養之道也君子正其衣冠尊其瞻視所謂虎視耽耽以養其外者如此顔子克己而非禮勿視是也孟子曰養心莫善於寡欲所謂其欲逐逐以養其内者如此夫子絶四而毋意毋必是也彖曰觀頤觀其所養也自求口實觀其自養也觀六四之所養則顛頤求養是也觀六四之自養則虎視養其外逐欲養其内是也六四雖无養賢及萬民之位而其養德之正亦可謂大人之事矣不然則不知養正之道而失顛頤之吉其求下也不過上下征利養口體而已所謂觀我朶頤凶者也若是者外安得有可畏之威而内安得无欲哉上施光者易以謙為光以益為光謙卦曰天道下濟而光明又曰謙尊而光益卦曰自上下下其道大光六四求下養德亦庶幾謙益之光者歟易説漢上朱氏曰頤以上養下六四當位下交初九乾首在下顛也求賢自助於剛柔為正正則吉故曰顛頤吉虎視謂四交初也初往成艮離艮有伏兌為虎離為目虎視也易通卦驗小寒虎始交際垂其首垂其首者下視也艮坤互有坎重厚而深沈耽耽也虎首下視耽耽然下交不瀆矣六四其欲在於初九不瀆則初九逐逐而往震為作足逐也古文作跾初往之四不正宜有咎然无咎者以不瀆故无咎虎視耽耽其欲逐逐无咎六四在上施之下者光也光坎離下照之象或曰虞仲翔曰坤為虎又曰艮為虎馬融曰兌為虎郭璞以兌艮為虎三者孰是曰三者異位而同象坤為虎者坤交乾也其文𤣥黄天地之文艮為虎者寅位也泰卦乾坤交也在天文尾為虎艮也大雪十一月節後五日復卦六二爻虎始交兑為虎者參伐之次占家以庚辛為虎者兑也龍德所衝為虎亦兌也兌下伏艮具此三者之象故先儒並傳之舉兌則三象具矣易傳新安朱氏曰柔居上而得正所應又正而賴其養以施於下故雖顛而吉虎視耽耽下而專也其欲逐逐求而繼也又能如是則无咎矣本義六五拂經居貞吉不可涉大川象曰居貞之吉順以從上也伊川先生曰六五頤之時居君位養天下者也然其隂柔之質才不足以養天下上有剛陽之賢故順從之賴其養己以濟天下君者養人者也反賴人之養是違拂於經常既以己之不足而順從於賢師傅上師傅之位也必居守貞固篤於委信則能輔翼其身澤及天下故吉也隂柔之質无貞剛之性故戒以能居貞則吉以隂柔之才雖倚賴剛賢能持循於平時不可處艱難變故之際故云不可涉大川也以成王之才不至甚柔弱也當管蔡之亂幾不保於周公况其下者乎故書曰王亦未敢誚公賴二公得終信故艱險一作難之際非剛明之主不可恃也不得已而濟艱險者則有矣發此義者所以深戒於為君也於上九則據為臣致身盡忠之道言故不同也居貞之吉者謂能堅固順從於上九之賢以養天下也並易傳横渠先生曰聽養於上正也以隂居頤卦之尊拂經也易説廣平游氏曰六五履尊位而德不稱德雖不稱位而其富固无敵矣所以不足者非物也乃能親上九之賢委己以聽之亦庶乎有以養萬民矣而六二之有求方且養其私而已此五之拂經所以異於二也雖然六五質柔而止體也喜蹈常畏興事其資然也見善未必明用心未必剛故以之守文以之持正可也若應變以成務則非其任矣蓋疑間一生則危亂之機將不可解故居正則吉而不可涉大川也不可涉大川為六五之君言之也利涉大川為上九之臣言之也使大臣之才如上九足以養天下而人主順以從之其蔑不濟矣此周公復政之後成王所以四征不庭制禮作樂六服承德也並易説龜山楊氏曰人君養天下頤之經也五居君位從上以資養拂頤之經也居不失正則吉以是涉難則不可矣易説白雲郭氏曰五為一卦之主其才不足非徒无以養天下雖六二之應亦不能致養非養賢以及萬民之道也故亦曰拂經苟能以柔道自居守正不失足以自養其身凶禍亦无自而至是以吉也然柔道不可以有為故不可涉大川柔道好從人故順以從上上九有剛陽之才而知止者是以得其所從而成己之吉也六二拂經蓋違相應之理六五拂經以違大君之道其言雖同而各有所辯易説漢上朱氏曰正者養之經上養下陽養隂正也六五柔得尊位養道不足資上九之賢以為養拂經也上九助五之養有正之道五寛以居之順從於上則得正而吉艮止也有居之象故曰居貞之吉順以從上也人君養天下以正得衆以用其健乃可涉難六五拂經其才不足故不可涉難上五相易成坎无震足巽股之象不可涉也易傳曰艱難之際非剛明之主不可恃不得已而濟險難者有之矣其可常乎易傳新安朱氏曰六五隂柔不正居尊位而不能養人反賴上九之養故其象占如此本義上九由頤厲吉利涉大川象曰由頤厲吉大有慶也伊川先生曰上九以剛陽之德居師傅之任六五之君柔順而從於己賴己之養是當天下之任天下由之以養也以人臣而當是任必常懐危厲則吉也如伊尹周公何嘗不憂勤兢畏故得終吉夫以君之才不足而倚賴於己身當天下一有之字大任宜竭其才力濟天下之艱危成天下之治安故曰利涉大川得君如此之專受任如此之重苟不濟天下之艱危何足稱委遇而謂之賢乎當盡誠竭力而不顧慮然惕厲則不可㤀也若上九之當大任如是能兢畏如是天下被其德澤是大有福慶也並易傳横渠先生曰由頤自危然後乃吉者下有衆隂順從之慶驕則有他吝此卦得養之正者方利涉大川蓋養然後可動耳易説廣平游氏曰六五居正則吉乃如上九之賢則頤之時所謂養賢以及萬民者皆自我出匹夫匹婦无不與被其澤矣夫然故天下信之衆賢助之人主親見其功業而深知其所存徧知其所為任之必專小人莫得以間之天亦誘其衷矣故其迹雖厲而其理則吉此所以利涉大川而大有慶也夫以身徇國𢎞濟於艱難固大臣之職也詎肯臨危而顧其身哉惟欲善其後以冀成功則亦審其時而已矣若成王未知周公之時則不可涉大川六五是也若周公既見察於成王之後則渉大川而利矣上九是也說者謂以上養下為顛頤是以顛為正矣故用伊川説易説龜山楊氏曰卦惟二陽而上九居一卦之上衆隂由之以養也履師傅之位任人君之責危疑所集也危者安其位者也故厲乃吉厲者不安其位之謂也如是雖涉難有慶矣易説兼山郭氏曰以善服人未有能服人者也以善養人然後能服天下天下不心服而王未之有也上九雖不居有為之地自下而升為頤之主能養賢以及萬民之象也故能涉險濟難雖危而吉也故孔子曰頤之時大矣哉易説白雲郭氏曰豫之由豫以九四之剛德也頤之由頤以上九之剛德也初九非不剛也在頤之初未足以自養况養天下乎此天下之養所以必由於上九也上九居人臣之極位以養天下其事危矣知其危而不㤀是以吉也不知其危而安其位則凶矣利涉大川者由頤之才也大有慶者天下得其所養也禹思天下有溺者由己溺之稷思天下有飢者由己飢之伊尹思天下匹夫匹婦有不被堯舜之澤者如己推而納之溝中周公思兼三王以施四事由頤之道蓋自任天下之重者如禹稷伊周為能盡之易說漢上朱氏曰一陽處上下有四隂六五體柔无應才不足以養天下而天下由之以養者也故曰由頤然非養道之正也權重位髙衆忌之則必危人臣當此任可不兢畏而懐危懼乎故厲以剛居柔位厲也厲則不敢安其位下從王事无成有終上下並受其福故大有慶鄭康成曰君以得人為慶虞仲翔曰陽得位故大有慶上之三成坎有震足象利涉大川也上九佐五以養道養天下而得民利於涉難也象不言者大有慶則涉難在其中上艮體頤以靜止為善故三爻皆吉易傳新安朱氏曰六五賴上九之養以養人是物由上九以養也位髙任重故厲而吉陽剛在上故利涉川本義合訂刪補大易集義粹言卷三十一
