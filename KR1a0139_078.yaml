body:
  text: 合訂刪補大易集義粹言卷七十六頭等侍衛納喇性德編繫辭下傳白雲郭氏曰上篇所言多易道之大者與其精微神變之用下篇多卦義及上所未終粗顯之説又不可不明之者則上下二篇略有辨也且上篇言天尊地卑乾坤定矣卑髙以陳貴賤位矣以其有是言故下篇可言八卦成列象在其中因而重之爻在其中也上篇言乾以易知坤以簡能至易簡而天下之理得以其有是言故下篇可言夫乾確然示人易矣夫坤隤然示人簡矣也孔頴逹謂天地之道貞觀者也日月之道貞明者也此豈復為易之小事然貞觀貞明時引天地日月以明吉凶貞勝之辭非在易之義又不若廣大配天地變通配四時隂陽之義配日月易簡之善配至德為易之道也觀此數義則二篇精粗略可見矣易説新安朱氏曰六十四卦只是上經説得整齊下經便亂董董地繫辭也如此只是上繫好看下繫便沒理會語録八卦成列象在其中矣因而重之爻在其中矣康節先生曰體者八變用者六變是以八卦之象不易者四反易者二以六卦變而成八也重卦之象不易者八反易者二十八以三十六變而成六十四也故爻止於六卦盡於八策窮於三十六而重卦極於六十四也卦成於八重於六十四爻成於六策窮於三十六而重於三百八十四也觀物外篇廣漢張氏曰四象生八卦方八卦成列而象已在其中矣然上有八卦而八卦之道未偹故因而重之則立天之道曰隂與陽立地之道曰柔與剛立人之道曰仁與義而爻已在其中矣易説白雲郭氏曰上篇始於乾坤之成卦繼以易簡賢人之德業下篇始於八卦成列繼以乾坤示人易簡其道雖相類然上篇言所未盡者見於下篇是相為終始之道也象非重卦而後有也蓋始於八卦成列之初三竒三偶皆象也爻因重卦而後有六位剛柔是也觀此則知象始於包犧畫卦之時而爻立於文王重卦之後故聖人設卦觀象則易之為書以象為本矣是以成列則有象重之則有爻有剛柔則有變有繫辭則有動也易説漢上朱氏曰伏羲始畫八卦八卦成列而乾坤定位震巽一交也坎離艮兌二交也兌以一陽與艮坎以一隂奉離震巽以二相易六十四卦之象在其中矣三畫天地人也伏羲因而重之六位成章兼三才而兩之則三百八十四爻在其中矣歸藏初經八卦六爻則知因而重之者伏羲也姚信曰連山氏得河圖夏人因之曰連山歸藏氏得河圖商人因之曰歸藏伏羲氏得河圖周人因之曰周易連山神農氏也歸藏黃帝氏也其經卦皆八本伏羲也其别皆六十有四因八卦也易傳先儒論重卦者六家王弼虞翻曰伏羲鄭康成曰神農孫盛曰夏禹司馬遷揚雄曰文王而孔頴逹陸德明陸希聲則以弼論為是某曰皆是也繫辭曰古者庖犧氏之王天下也仰則觀象於天俯則觀法於地觀鳥獸之文與地之宜近取諸身逺取諸物於是始作八卦以通神明之德以類萬物之情則伏羲所畫者八卦而已然結繩而為網罟以佃以漁則已取重離之象何則離麗也離為目巽為繩以巽變離結繩而為網罟之象也罟網目也雜為雉巽為魚以漁之象也下繫曰八卦成列象在其中矣因而重之爻在其中矣謂之在其中者蓋既畫八卦因而重之雖未為六十四卦而三百八十爻之變固已自然存乎其中矣是以神農氏黃帝氏堯舜氏因其所重八卦觸類而長取於益取於噬嗑取於乾坤取於渙取於隨取於豫取於小過取於睽不特四聖人然也自伏羲氏沒其間聖人取重卦以利天下者多矣是以取大壯取大過取夬謂之後世聖人則夏后氏商人亦在其中矣伏羲氏畫卦因而重之者襲其氣之母也羣聖人重之者用其子孫也莊生曰伏羲得之以襲氣母是也考之歸藏之書其初經者庖犧氏之本旨也卦有初乾初奭坤也初艮初兊初犖坎也初離初釐震也初巽八卦其卦皆六畫周禮大卜掌三易之法一曰連山二曰歸藏三曰周易其經卦皆八其别皆六十有四謂經卦則初經之卦也又山海經伏羲氏得河圖夏后氏因之曰連山黃帝氏得河圖商人因之曰歸藏列山氏得河圖周人因之曰周易列山氏世譜所謂神農氏也以是觀之則弼翻所論舉其大要康成孫盛遷雄之言各舉其一而遷雄又指周易言之也然三易之卦其次各異首艮者連山也首坤者歸藏也首乾者周易也即周禮所謂其别各六十四者也故説卦之文敘天地山澤雷風水火健順動入陷麗止説之性八卦之象則先經卦而以文王八卦震巽離坤兌乾坎艮次之而序卦所次皆文王所重之卦也聖人猶慮後世未知三易之變故於雜卦一篇雜糅衆卦錯綜其義以示變易之無窮虞氏曰聖人之與因時而作隨其事宜不必因襲當有損益之意其知三易之説歟叢説又曰伏羲八卦圖王豫傳于邵康節而鄭夬得之歸藏初經者伏羲初畫八卦因而重之者也其經初乾初奭坤初艮初兊初犖坎初離初釐震初巽卦皆六畫即此八卦也八卦既重爻在其中薛氏曰昔神農氏既重為六十四卦而初經更本庖犧八卦成列而六十四具焉神農氏因之也繫辭曰神農氏作斫木為耜揉木為耒耒耨之利以教天下蓋取諸益王輔嗣以為伏羲重卦鄭康成以為神農重卦其説源於此子曰天地定位山澤通氣雷風相薄水火不相射天地定位則乾與坤對山澤通氣則艮與兊對雷風相薄則震與巽對水火不相射則離與坎對而説卦健順動入陷麗止説馬牛龍雞豕雉狗羊首腹足股耳目手口與夫别象次序皆初卦也乾之初交於坤之初得震故為長男坤之初交於乾之初得巽故為長女乾之二交於坤之二得坎故為中男坤之二交於乾之二得離故為中女乾之上交於坤之上得艮故為少男坤之上交於乾之上得兊故為少女乾坤大父母也故能生八卦復姤小父母也故能生六十四卦復之初九交於姤之初六得一陽姤之初六交於復之初九得一隂復之二交於姤之二得二陽姤之二交於復之二得二隂復之三交於姤之三得四陽姤之三交於復之三得四隂復之四交於姤之四得八陽姤之四交於復之四得八隂復之五交於姤之五得十六陽姤之五交於復之五得十六隂復之上交於姤之上得三十二陽姤之上交於復之上得三十二隂隂陽男女皆順行所以生六十四卦也伏羲八卦圖説新安朱氏曰成列謂乾一兌二離三震四巽五坎六艮七坤八之類象謂卦之形體也因而重之謂各因一卦而以八卦次第加之為六十四也爻六爻也既重而後卦有六爻也本義問八卦成列只是説乾兊離震巽坎艮坤先生解云之類如何曰所謂成列者不止只論此橫圖若乾南坤北又是一列所以云之類問象在其中象只是乾兑離震之象未説到天地雷風處否曰是然八卦成列是做一項看象在其中又是逐箇看又問成列是自一竒一耦畫到三畫處其中逐一分便有乾兌離震之象否曰是並語録剛柔相推變在其中矣繫辭焉而命之動在其中矣吉凶悔吝者生乎動者也剛柔者立本者也變通者趣時者也吉凶者貞勝者也橫渠先生曰變其勢也動其情也情有邪正故吉凶生變能通之則盡利能正夫一則吉凶可勝而天地不能藏其迹日月不能眩其明辭各指其所之聖人之情也指之以趣時盡利順性命之理臻三極之道也能從之則不陷於凶悔矣所謂變動以利言者也然爻有攻取愛惡本情素動因生吉凶悔吝而不可變者乃所謂吉凶以情遷者也能深存繫辭所命則二者之動見矣又有義命當吉當凶當否當亨者聖人不使避凶趨吉一以貞勝而不顧如大人否亨有隕自天過涉滅頂凶無咎損益龜不克違及其命亂也之類三者異情不可不察易説感而後有通不有兩則無一故聖人以剛柔立本乾坤毁則無以見易又曰隂陽剛柔仁義之本立而後知趨時應變並正蒙已上一條補廣漢張氏曰爻有剛柔或以剛推柔或以柔推剛而變已在其中矣聖人觀其會通以行其典禮繫辭焉而命之而不能自已者其動已在其中矣或吉或凶而有得失或悔或吝而有憂虞皆生於動者乎謂在其中者言非自外至者也六爻之義有竒有耦此剛柔所以立本也至於九六迭居此剛柔變通以趨時者也或以剛位而居之以柔或以柔位而居之以剛無非趨時以盡變者乎夫變動以利言吉凶以情遷故吉凶所以生乎動也若得貞固之道則寂然不動確乎不拔禍亦不至吉凶無得而動之者此吉凶以貞勝者也聖人以此齋戒以神明其德者乎並易説白雲郭氏曰有象而後可重重而後有爻有爻則有剛柔剛柔推而有變剛柔相推以此易彼迭盛迭衰猶日月相推之義也象爻易見而變為難知故聖人必有繫辭而明其吉凶以命之也因動則生吉凶因吉凶則聖人繫之以辭故繫辭雖本於明吉凶以告人而君子必觀吉凶而後動是繫辭所以命之故曰動在其中矣上言繫辭焉而命之而動之説未詳故繼言吉凶悔吝生乎動所以終其言也蓋謂聖人繫之以辭者所以明其吉凶悔吝以告人使人知吉凶悔吝莫不生乎動也剛柔者爻之剛柔也爻有剛柔則可相推相推故變變故自乾坤而成八卦自八卦而為六十四卦所以剛柔為易之本也變通謂剛柔之變通也一剛一柔即變也相推不窮即通也剛柔相推所以明時之異故曰趣時也吉凶者繫辭之所明也君子玩易之辭而知吉凶故以貞勝也貞正也吉凶之道正則勝而常吉匪正則弗勝而常凶如是則吉凶在夫正與不正之間故惟貞可以勝吉凶也上言爻在其中故此復言剛柔立本上言變在其中故此復言變通趣時上言動在其中故此復言吉凶貞勝皆所以明在上未終之意易説漢上朱氏曰六爻剛柔互相推蕩六十四卦之變在其中矣鄭康成曰伏羲作十言之教曰乾坤震巽坎離艮兊消息無文字謂之易乃知周易繫辭於卦下者文王也文王繫辭指其象而命之以名則周公之爻辭所以鼓天下之動者在其中矣彖辭曰吉凶而已吉凶悔各者爻辭也是亦生乎卦之動也爻動靜當則吉當靜而動當動而靜則凶悔吝矣言吉凶悔吝生乎動者主動爻言之也自神農氏而下演為三易贊為十翼非聖人能為是也引而伸之不外是也爻有剛柔不有兩則一不立所以立本也剛柔相變通其變以盡利者趣時也趣時者時中也故曰乾坤毁則無以見易也剛柔相錯有當有否則吉凶生又曰吉凶者貞勝也何謂邪此於動中明乎不動者也韓康伯謂不纍乎吉凶是已張載曰有義命當吉當凶當否當亨者聖人不使避凶趨吉一以貞勝而不顧如大人否亨有隕自天過涉滅頂凶無咎損益龜不克違及其命亂也之類易傳又曰內外者卦之位進退者爻之時叢説新安朱氏曰剛柔相推而卦爻之變往來交錯無不可見聖人因其如此而皆繫之辭以命其吉凶則占者所值當動之爻象亦不出乎此矣吉凶悔吝皆辭之所命也然必因卦爻之動而後見一剛一柔各有定位自此而彼變以從時貞正也常也物以其所正為常者也天下之事非吉則凶非凶則吉常相勝而不已也並本義問變字是揔卦爻之有往來交錯者言動字是専指占者所值當動底爻象而言否曰變是就剛柔交錯而成卦爻上言動是専主當占之爻言如二爻變則占者以上爻為主這上爻便是動處如五爻變一爻不變則占者以不變之爻為主則這不變者便是動處也剛柔者立本者也變通者趨時者也此兩句亦相對説剛柔者隂陽之質是移易不得之定體故謂之本若剛變為柔柔變為剛便是變通之用剛柔者立本者也變通者趨時者也便與變化者進退之象也剛柔者晝夜之象也是一樣剛柔兩箇是本變通只是其往來者吉凶者貞勝者也這一句最好看這箇物事常在這裏相勝一箇吉便有一箇凶在後面來這兩箇物事不是一定住在這裏底物各以其所正為常正是説他當然之理蓋言其本相如此與利貞之貞一般所以説利貞者性情也橫渠説得别他説道貞便能勝得他如此則下文三箇貞字説不通這箇只是説吉凶相勝天地間一隂一陽如環無端便是相勝底道理隂符經説天地之道浸故隂陽勝浸字最下得妙天地間不陡頓恁地隂陽勝又説那五箇物事在這裏相生相尅曰五賊在心施行於天用不好心去看他便都是賊了五賊乃言五性之德施行於天言五行之氣陳子昂感遇詩亦略見得這般意思大槩説相勝是説他常底他以本相為常問吉凶貞勝一段橫渠説何如曰説貞勝處巧矣却恐不如此只伊川説作常字甚佳易傳解此字多云正固固乃常也但不曾發出貞勝之理蓋吉凶二義無兩立之理迭相為勝非吉勝凶則凶勝吉矣故吉凶常相勝所以訓貞字作常字者貞是正固只一正字盡貞字義不得故又著一固字謂此雖是正又須常固守之然後為貞在五常屬智孟子所謂知之實知斯二者弗去是也正是知之固是守之徒知之而不能守之則不可須是知之又固守之問張子貞勝之説曰此雖非經意然其説自好便只行得他底説有甚不可大凡看人解經雖一時有與經意稍逺然其説底自是一説自有用處不可廢也不特後人古來已如此如元亨利貞文王重卦只是大亨利於守正而已到夫子却自解分作四德看文王卦辭當看文王意思到孔子文言當看孔子意思豈可以一説為是一説為非並語録天地之道貞觀者也日月之道貞明者也天下之動貞夫一者也伊川先生曰天地之道常垂象以示人故曰貞觀日月常明而不息故曰貞明吕與叔東見録橫渠先生曰著天地日月以剛柔立其本也其變雖大蓋不能遷夫正者也一本下有剛柔立本故又著見之正明不為日月所眩正觀不為天地所遷貞正也本也不眩不惑不倚之謂也天地之道至廣至大貞乃能觀也日月之明貞乃能明也天下之動貞乃能一也蓋言天地之道不眩惑者始能觀之日月之明不眩惑者始能明之天下之動不眩惑者始能見夫一者也所以不眩惑者何正以是本也本立則不為聞見所轉其見其聞所透徹所從來乃不眩惑此蓋謂人以貞而觀天地明日月一天下之動也貞明不為日月之所眩貞觀不為天地之所遷貞觀貞明是已以正而明日月觀天地也為日月之明與天地變化所眩惑故必已以正道觀之能如是不越乎窮理豈惟耳目所聞見必從一德見其大源至於盡處則可以不惑也存默識實有信有此茍不自信則終為物役事千變萬化其究如此而已天下之動貞夫一者也並易説龜山楊氏曰貞正也正者靜一之性雖天地日月聖人有所不能外天運於上地處乎下終古不息者以正觀也日顯乎晝月顯乎夜其明不已者以正明也天下之動紛至沓來皆有以一之者以正幹也經曰貞者事之幹非此之謂歟會通條已上一補廣漢張氏曰天位乎上地位乎下為法象之大而以觀於天下者以貞而能長久也日顯乎晝月顯乎夜為垂象之大而以著明於天下者以貞而能久照也觀天下之動知者之所謀勇者之所爭紛紛籍籍不能自已者此天下之動貞夫一者也易説白雲郭氏曰上言吉凶以貞勝故此復以天地日月天下之動明貞之義也天地之所以示人日月之所以常明皆正也天下之動所以貞夫一者亦以一則正二則非正也吉凶貞勝之道亦若是而已矣然聖人之辭所以盡意意盡則辭止意之未盡則再三言之所以復言三貞之義於以見聖人之情也易説漢上朱氏曰天地之道有升降然上下之觀不動也故曰天地之道貞觀也日月之道有往來然晝夜之明不動也故曰日月之道貞明也天下之動吉凶之變多矣而君子安其義命一以貞勝吉凶不能動何纍之有故曰天下之動貞夫一也一者貞也貞所以一天下之動此彖辭爻辭所以貴夫貞也吉凶以貞勝故能立天下之本趣天下之時易傳新安朱氏曰觀示也天下之動其變無窮然順理則吉逆理則凶則其所正而常者亦一理而已本義貞只是常吉凶常相勝故曰貞勝天地之道則常示日月之道則常明天下之動貞夫一者也天下之動雖不齊常有一箇是底故曰貞夫一語録夫乾確然示人易矣夫坤隤然示人簡矣爻也者效此者也象也者像此者也爻象動乎內吉凶見乎外功業見乎變聖人之情見乎辭橫渠先生曰因爻象之既動明吉凶於未形故曰爻象動乎內吉凶見乎外隨爻象之變以通其利故功業見也聖人之情存乎教人而已並易説廣漢張氏曰人人能法乾坤之易簡則聖人之易不復作矣竊觀乾確然在上其日月星辰虹霓雲霧與夫晝夜有常而可準寒暑有數而可推此示人以易也奈何仰觀諸天者不明乎乾之易轉而為難者有之坤隤然在下其山川草木蟲魚鳥獸與夫勤勞則所獲者厚荒棄則不能有秋此示人以簡也奈何俯察於地者不明乎坤之簡轉而為繁者有之此衆人在天地之間行矣而不著習矣而不察終身不能與天地相似而至其易簡之至德聖人憂之所謂見天下之動而立爻者乃象乾坤之易簡以示人者歟使人人明乎乾坤之易簡聖人必不為之譊譊也夫爻象動於內者謂指其易簡於幽隱之中也吉凶見乎外者謂示其易簡於得失之際也功業見乎變者謂易簡其功業於從權者也聖人之情見乎辭者謂命其易簡而見於言者也易説白雲郭氏曰乾之示人以易也確然不易坤之示人以簡也隤然無變是為天地貞觀之道也由乾坤示人易簡觀之則八卦六十四莫不有所示故效其所示之謂爻像其所示之謂象於是風雷水火山澤之異與夫震動巽入坎陷離麗艮止兌説之情莫不具於爻象矣爻象動乎卦中而吉凶見於人事聖人用其道故觀變以成功業學者究其微則由辭以知聖人之情能事畢矣然自八卦成列以及於斯與上篇首章互有發明其歸一致也易説漢上朱氏曰八卦本乾坤者也夫乾陽至剛確然不易示人為君為父為夫之道不亦易乎夫坤隂至柔隤然而順示人為子為臣為婦之道不亦簡乎乾剛坤柔以立本者也爻也者效乾坤之動者也天道下濟地道上行剛柔相推變通以趣時者也象者像乾坤之象者也爻有變動象亦像之爻象動乎內者有當有否則人事之見於外者有吉有凶人與乾坤一也吉凶之變有術通之凶者反之則吉功業不期於見而見矣觀此則乾坤示人足矣聖人必以彖言乎象爻言乎變繫辭以言吉凶者聖人之情愛人無己也恐其陷於凶咎是以指其所之故考乎其辭則聖人之情見矣易傳新安朱氏曰確然健貌隤然順貌所謂貞觀者也此謂上文乾坤所示之理爻之竒耦卦之消息所以效而象之內謂蓍卦之中外謂蓍卦之外變即動乎內之變辭即見乎外之辭並本義問爻者效此者也曰爻是兩箇交看來只是交變之義卦分明是將一片木畫挂於壁上所以為卦問效此是效乾坤之變化而分六爻像此是象乾坤之虛實而為竒耦曰像此效此此便是乾坤象只是像其竒耦先生問如何是爻象動乎內吉凶見乎外或曰隂陽老少在分蓍揲卦之時而吉凶乃見於成卦之後曰也是如此然內外字猶言先後微顯功業見乎變是就那動底爻見得這功業字似吉凶生大業之業猶言事變庶事相似並語録天地之大德曰生聖人之大寶曰位何以守位曰仁何以聚人曰財理財正辭禁民為非曰義明道先生曰天地之大德曰生天地絪緼萬物化醇生之謂性萬物之生意最可觀此元者善之長也斯所謂仁也人與天地一物也而人特自小之何邪劉絢師訓條已上一補橫渠先生曰將陳理財養物於下故先敘天地生物失位則無以參天地而措諸民也並易説龜山楊氏曰理財作人兩事其説非不善然世儒所謂理財者務為聚斂而所謂作人者起其奔競好進之心而已易之言理財詩之言作人似不如此荆州語録廣漢張氏曰天以陽而運於上萬物資始是以大生焉地以隂而載於下品物流形是以廣生焉此生者乃天地之大德也聖人贊天地之化育必得大寶之位然後可配天地之大德也有仁焉以守位所以博施濟衆乃利其生者也有財焉以聚衆人所以近悅逺來乃養其生者也有義焉理其財而使之流通正其辭而使之輯洽禁民為非者慮其有以害其生者也天地之道簡而大聖人之道曲而詳簡而大者所以止曰大德曰生至聖人則以位而繼之以仁以財而繼之以義所以推行天地之大德者歟易説白雲郭氏曰天地以生物為德故人以大德歸之聖人得崇髙之位然後成位乎中而贊化育故以位為大寶也大寶者亦非聖人自以為寶也天下有生幸聖人之得位以蒙其澤故天下以為寶也然位唯仁可守不仁則失之故孟子曰惟仁者宜在髙位且足以資人之生者皆曰財得其所資則人聚失其所資則人去斯民一日不可以無者也聖人理財非自用也生聚人而已又正其辭以出號令禁民為非以明法禁此五教五刑之用有義存焉然天地易簡一於生而已聖人法天地亦一於生曰仁曰財曰義皆所以生斯民者也易説漢上朱氏曰胡旦分天地之大德曰生為一章陽卦多隂為一章考之文義當從旦龔原本亦然乾大生也坤廣生也乾坤合而成德生物而已故曰天地之大德曰生聖人之情見乎辭者亦天地之德也聖人成位乎兩間有其德無其位不能兼善天下於其位也慎之重之在卦則尊位也故曰聖人之大寶曰位天地之大德曰生者仁也聖人成位乎兩間者仁而已矣不仁不足以參天地聖人者聰明睿知神武而不殺不殺者好生也故曰何以守位曰仁仁被萬物取材於天地則財不可勝用其民養生喪死無憾可以保四海守宗廟社稷故曰何以聚人曰財理財者節之以制度也節之類是也正辭者正邪説也六辭是也禁民為非者禁其非歸之於是也如是乃得其宜故曰義義所以為仁非二本也故曰立人之道仁與義莫非義也義至於禁民為非盡矣易傳新安朱氏曰曰人之人今本作仁吕氏從古蓋所謂非衆罔與守邦本義聖人之情見乎辭下連接説天地大德曰生此不是相連乃各自説去聖人之大寶曰位後世只為這兩箇不相對有位底無德有德底無位有位則事事做得問人君臨天下許多大事只言理財正辭如何曰是因上文而言聚得許多人無財何以養之有財不能理又不得正辭便只是分别是非又是教化便在正辭裏面理財正辭禁非是三事大槩是辨别是非理財言你底還你我底還我正辭言是底説是不是底説不是猶所謂正名並語録右第一章新安朱氏本義曰此章言卦爻吉凶造化功業古者庖犧氏之王天下也仰則觀象於天俯則觀法於地觀鳥獸之文與地之宜近取諸身逺取諸物於是始作八卦以通神明之德以類萬物之情伊川先生曰近取諸身一身之上百理具備甚物是沒底背在上故為陽胸在下故為隂至如男女之生已有此象天有五行人有五藏心火也著些天地間熱氣乘之則便須發躁肝木也著些天地間風氣乘之則便須發怒推之五藏亦然孟子將四端便為四體仁便有箇木底氣象惻隱之心便是生物春底氣象羞惡之心便是一箇秋底氣象只有一箇去就割制底氣象便是義也附吕與叔東見録作易自天地幽明至於昆蟲草木微物無不合胡氏拾遺橫渠先生曰此皆是聖人取之於糟粕也地之宜如為黑為剛鹵為大塗神明之德通於萬殊萬物之情類於形器易説龜山楊氏曰或問正叔先生云或説易曰乾天道坤地道正是亂説曰乾坤非天地之道邪曰乾豈止言天坤豈止言地又問乾坤不止言天而乾卦多言天坤卦多言地何邪曰本乎天者親上本乎地者親下則各從其類也乾卦言天坤卦言地只為語其類耳如説卦於乾雖言為天又言為金為玉以至為駁馬良馬為木果之類豈盡言天故繫辭曰伏羲始作八卦以通神明之德以類萬物之情若此者所謂類萬物之情也只如説卦所類亦不止此為之每發其端使後之學易者觸類而求之耳蓋作易者仰則觀象於天俯則觀法於地觀鳥獸之文與地之宜近取諸身逺取諸物故孔子繫辭推明之曰此卦於天文地理則為某物於鳥獸草木則為某物於身於物則為某物各以例舉不盡言也學者觸類而求之則思過半矣不然説卦所敘何所用之餘杭語録廣漢張氏曰聖人之於易覺之於心悟之於性神而明之默而成之見天下之賾見天下之動抑何待於俯仰以觀逺近以取哉蓋聖人以作易之法傳諸天下後世亦其有循而體自然乎仰則觀象於天如觀其日月星辰虹霓雲霧皆取其自然之象也俯則觀法於地如觀其江河山嶽草木魚蟲皆取其自然之法也觀鳥獸之文如鴻之儀如虎之炳是也觀其植物之文則闕之理從可知矣觀地之宜如邱園之物産如坎窞之幽晦則四時之氣從可知矣近取諸身則乾為首坤為腹之類是也逺取諸物則乾為馬坤為牛之類是也於是始作八卦以通神明之德以類萬物之情者乎易説白雲郭氏曰易之道道之大全也有古以來聖人用之未嘗絶也自庖犧畫而有卦文王重而有書於是斯道明矣故始言易始於庖犧者蓋言因易之書而後其道明也故繫辭論卦亦以庖犧為始然聖人必觀天下之象而後畫卦故庖犧觀象於天觀法于地觀鳥獸之文與地之宜細大無不察也近則取諸身逺則取諸物內外無不取也如此而後能畫卦八卦既成則神明之德於是乎通萬物之情於是乎類所謂通於天地應於物類者也前乎庖犧未之有也故言始作八卦然為天地雷風山澤水火者皆法象於天地也動物之屬馬牛雞雉皆鳥獸之文也植物之屬木果竹葦反生果蓏皆地之宜也為首為腹寡髮廣顙心病耳痛取諸身也自身之外皆取諸物也易説漢上朱氏曰自此以下明備物致用立成器以為天下利者無非有取於易皆仁也曰王天下者明守位也所謂崇髙莫大乎富貴也鳥獸之文即天文太玄曰察龍虎之文觀鳥龜之理舉鳥獸則龜見矣仰觀龍虎鳥龜之文其形成於地俯觀山川原隰之宜其象見於天凡在地者皆法天者也近取諸身則八卦具於百骸而身無非物逺取諸物則八卦具於萬物而物無非我故神明之德雖異而可通萬物之情雖衆而可類其道至於一以貫之此庖犧氏所以作易一者何仁也易傳新安朱氏曰王昭素曰與地之間諸本多有天字俯仰逺近所取不一然不過以驗隂陽消息兩端而已神明之德如健順動止之性萬物之情如雷風山澤之象本義觀鳥獸之文與地之宜近取身逺取物仰觀天俯察地只是一箇隂陽聖人看這許多般事物都不出隂陽兩字便是河圖洛書也則是隂陽粗説時即是竒耦聖人却看見這箇上面都有那隂陽底道理故説道讀易不可恁逼桚他歐公只是執定那仰觀俯察之説便與河圖相礙遂至不信他伏羲觀鳥獸之文與地之宜那時未有文字只是仰觀俯察而已想得聖人心細雖以鳥獸羽毛之微也盡察得有隂陽今人心粗如何察得或曰伊川見兔曰察此亦可以畫卦便是此義曰就是這一端上亦可以見凡草木禽獸無不有隂陽鯉魚脊上有三十六鱗隂數龍脊上有八十一鱗陽數龍不曾見鯉魚必有之又龜背上文中間一簇成五段文兩邉各插四段共成八段於八段之外兩邊周圍共有二十四段中間五段者五行也兩邉插八段者八卦也周圍二十四段者二十四氣也箇箇如此又如草木之有雌雄銀杏桐楮牝牡麻竹之類皆然又樹木向陽處則堅實其背隂處必虛軟男生必伏女生必偃其死於水也亦然蓋男陽氣在背女陽氣在腹也以通神明之德以類萬物之情盡於八卦而震巽坎離艮兊又總於乾坤曰動曰陷曰止皆健底意思曰入曰麗曰悅皆順底意思聖人下此八字極狀得八卦性情盡聖人作易之初蓋是仰觀俯察見得盈乎天地之間無非一隂一陽之理有是理則有是象有是象則其數便自在這裏非特河圖洛書然也蓋所為數者祗是氣之分限節度處得陽必竒得隂必耦凡物皆然而圖書為特巧而著耳於是聖人因之而畫卦其始也只是畫一竒以象陽畫一偶以象隂而已但才有兩則便有四才有四則便有八又從而再倍之便是十六蓋自其無眹之中而無窮之數已具不待安排而其勢有不容己者並語録作結繩而為網罟以佃以漁蓋取諸離伊川先生曰聖人制器不待見卦而後知象以衆人由之而不能知之故因卦以示之耳經説條已上一補橫渠先生曰柔附於物飲血茹毛之教古所先有易説廣漢張氏曰上古之時禽獸多而人民少獸蹄鳥迹之道交於中國故庖犧氏為之網罟以教民佃漁者非徒使民知鮮食之利抑亦去其害而俾民得安其居也蓋取諸離者夫離以一隂而麗乎二陽之間鳥獸之麗於網魚鱉之麗於罟其義其畫皆可得而推者乎易説白雲郭氏曰自以類萬物之情也上言包犧所以畫八卦自作結繩之下言取諸離之義八卦者道之大全也作之所以明道於萬世也離者道之一也聖人遭時用道以利天下趣時者也聖人不能獨盡天下之時故亦不能盡用天下之道是以明大全之道於方來而其遭時所立不過一二而已故明與不明係乎聖人而用與不用又係乎時焉雖聖人不能必也包犧之時未有犧牲故作結繩為網罟以佃以漁而已當時之人知為網罟佃漁不知有所取也孔子以易道觀之然後知是道有取於離故曰蓋取諸離離麗也網罟麗道也然包犧始作八卦所謂係乎聖人者也作結繩而為網罟所謂係乎時者也此聖人道與時之辨也易説漢上朱氏曰上古茹毛飲血故教之以佃漁蓋取諸重離巽繩離目網目謂之罟兩目相連結繩為之網罟也離為雉佃也兌巽為魚漁也觀此則伏羲畫八卦因而重之明矣易説網舉綱紀通言之罟止言其紀而已傳言斷罟又言罟目是也巽為繩變為離為目結繩為目罟也重目為綱自二爻至四爻有巽體巽為魚多白眼也自三至五有兑體兊為澤網罟入澤而魚麗之以漁也離為雉以佃也觀乎此包犧氏既重六爻矣叢説新安朱氏曰兩目相承而物麗焉本義庖犧氏沒神農氏作斫木為耜揉木為耒耒耨之利以教天下蓋取諸益橫渠先生曰天施地生損上益下播種次之易説廣漢張氏曰夫天産之物食之所以生精地産之物食之所以生氣民之初生搏裂禽獸茹毛飲血非徒暴殄天物而淫亂之風滋熾聖人憂之故為耒耜以教稼穯而地産所以養其氣也蓋耒耜之利所以取諸益者下震為動上巽為入農人所以深耕易耨發土膏而成五榖其致用在耒耜所以獲其益也易説白雲郭氏曰包犧有犧牲而未粒食炎帝氏為耒耨之利以教天下故號曰神農然則粒食自神農始也取諸益者益以重巽震二木成卦故有斫木為耜揉木為耒之象而其彖則曰木道乃行粒食木類也耒耨木教也故言取諸益然則益以益下為道又有天施地生其益無方之義耒耨之利是亦益下之道也亦其益無方之道也皆備益之三義易説漢上朱氏曰神農氏時民厭鮮食而食草木之實聖人因是以達其不忍之心故教以耒耜之利蓋取諸益益否乾之初也乾金斫巽木斫木也四之三成坎坎為揉之義初成震揉木也入坤土而巽於前斫木為耜也動於後揉木為耒也耒耜之利其益無方矣易傳新安朱氏曰二體皆木上入下動天下之益莫大於此本義蓋取諸益等蓋字乃模樣是恁地蓋字便是一箇半間半界底字語録日中為市致天下之民聚天下之貨交易而退各得其所蓋取諸噬嗑橫渠先生曰聚而通交相有無次之易説廣漢張氏曰山居者足於鳥獸而不知水之所生水居者足於魚鱉而不知山之所産故物貨貿遷以其所有易其所無者日中為市致天下之民則逺近可以輻輳交易而退各得其所則出入可以相友必取諸噬嗑者蓋噬嗑成卦離上而震下離明乎上萬物皆相見為市之時也震動乎下除物之間無所不合交易而退各得其所也易説白雲郭氏曰古之聖人所以利天下者非用其私智皆有取於易此聖人洗心之道也為市以合民取諸噬嗑者嗑合也凡合之道皆本於噬嗑此言致天下之民聚天下之貨是又合之大者故曰取諸噬嗑也方神農時有八卦而已文王未重未有益與噬嗑也而此言取諸益取諸噬嗑者蓋六十四卦之畫象雖始於文王而六十四卦之道未嘗無也百世之下獨有孔子能追明其道若曰耒耜之教雖始於神農考其所取蓋益道也為市合民亦雖始於神農考其所取蓋噬嗑之道也於是而為言曰蓋取諸益蓋取諸噬嗑以明雖未有易之時而自古聖人所用之道亦不過六十四者而已天下之道不能外是所謂百世聖人而不惑者也是道固有久矣文王知而重之為書故曰因而重之由孔子之辭則知文王之所作者易之書其非文王之所作者易之道也以書言之神農之時未有益與噬嗑也以道言之神農之時蓋有益與噬嗑也先儒惑於二卦故謂神農重易誤矣渙隨諸卦皆同易説漢上朱氏曰是時民甘其食美其服至死不相往來故教之以交易蓋取諸噬嗑噬嗑否五之初也離日在上為日中坤衆在下為市衆為民離有伏兊為螺貝坤往之乾致天下之民聚天下之貨也以坤交乾交易也乾五退初而得位各得其所也佃漁不言利於耒耜言利佃漁非聖人本心也佃有猛虎之害漁有蛟龍之害不若耒耜之利為市不言利者聚天下之貨利在其中矣易傳新安朱氏曰日中為市上明而下動又借噬為市嗑為合也本義神農氏沒黃帝堯舜氏作通其變使民不倦神而化之使民宜之易窮則變變則通通則久是以自天祐之吉無不利明道先生曰識變知化為難古今風氣不同故器用亦異是以聖人通其變使民不倦各隨其時而已矣後世雖有作者虞帝為不可及已蓋當是時風氣未開而虞帝之德又如此故後世莫可及也若三代之治後世決可復不以三代為治者終茍道也劉絢師訓橫渠先生曰鴻荒之世食足而用未備堯舜而下通其變而教之也神而化之使不知所以然運之無形以通其變不類革之使民宜之也立法須是過人者乃能之若常人安能立法凡變法須是通通其變使民不倦豈有聖人變法而不通也並易説廣平遊氏曰聖人稽古之禮不過三王而師古之道上及五帝若通其變使民不倦神而化之使民宜之雖百世聖人不能易也中庸解龜山楊氏曰或問邵堯夫云誰信畫前元有易自從刪後更無詩畫前有易何以見曰畫前有易其理甚微然即用夫子之已發明者言之未有畫前蓋可見也如云神農氏之耒耜蓋取諸益日中為市蓋取諸噬嗑黃帝堯舜之舟楫蓋取諸渙服牛乘馬蓋取諸隨益噬嗑渙隨重卦也當神農黃帝堯舜之時重卦未畫此理已具聖人有以見天下之賾故通變以宜民而易之道得矣然則非畫前元有易乎京師語録廣漢張氏曰包犧神農黃帝堯舜皆制器以利天下者也獨至於黃帝堯舜乃曰通其變使民不倦神而化之使民宜之何也蓋伏羲神農制為網罟以教之佃漁耒耜以教之耕耨為市以教之交易夫民知飲食則嗜欲既滋民有貨財則貪求愈熾黃帝堯舜不能通其變則攘奪誕謾之俗生而乖爭陵犯之變起此無他以其飽食暖衣逸居而無教也況伏羲神農至黃帝堯舜之時上下數千百年無一簡册之可傳言語之相授所謂易窮則變變則通通則久者皆先聖後聖以心相傳故也故在黃帝堯舜之時不得不通其變也惟通易之變則從之者無斁使民不倦也惟神而化之則由之而不失故使民宜之也此無他以伏羲神農創業於前知萬世之下必有得易之道如黃帝堯舜者窮而能變變而能通通而能久者也故其運量無窮上下與天地同流而無紀極故曰自天祐之吉無不利也易説白雲郭氏曰時異則事異於是乎有變唯聖人能通其變則民不困於事是以不倦於有行也故雖聖人神道設教不過宜斯民而已宜民則非甚髙難行之道亦不過為舟車臼杵弧矢宫室書契之類凡可以利斯民後世之所不能易者皆是也知道之人固以是為聖人之道不知道之人謂聖人之道變化超忽如神豈在舟車臼杵之問哉故聖人先言宜民而知後之制器皆宜民之道也然自易之道觀之道窮則必變變而後通通則可久況用之於民者乎故自包犧神農黃帝堯舜氏皆能通其變者也是以自天祐之吉無不利非天私此數聖人也天之所祐民之所宜皆在夫通變之間耳易凡三言自天祐之吉蓋謂如是之祐皆聖人有以自致則無不利易説漢上朱氏曰唐虞氏時洪水之患庶民鮮食然後教民稼穡懋遷有無化居其道萬世一揆神農氏沒民情已厭黃帝堯舜作因其可變變而通之使民日用其道而不倦而又微妙入神化而無迹天下各得其宜蓋易道陽極變隂隂極變陽變則不窮不窮則可久而不息善乎變通以趣時也是以自天祐之吉無不利聖人先後天故也易傳新安朱氏曰黃帝堯舜氏作到這時候合當如此變易窮則變道理亦如此垂衣裳而天下治是大變他以前底事了十三卦是大槩説則這幾箇卦也自難曉使民不倦須是得一箇人通其變若聽其自變如何得並語録黃帝堯舜垂衣裳而天下治蓋取諸乾坤伊川先生曰古之宓羲豈不能垂衣裳必待堯舜然後垂衣裳據如此事只是一箇聖人都做得了然必須數世然後成亦因時而已入問語録橫渠先生曰君逸臣勞上古無君臣尊卑勞逸之别故制以禮垂衣裳而天下治必是前世未得如此其文章禮樂簡易朴略至堯則煥乎其有文章然傳上世者止是宓犧神農此仲尼道古也猶據聞見而言以上則不可得而知所傳上世者未必有自從來如此而已安知其間固嘗有禮文一時磨滅耳又安知上世無不如三代之文章者乎然而如周禮則不過矣可謂周盡今言治世且指堯舜而言可得傳者也歷代文章自夫子而損益之見其禮而知其政聞其樂而知其德不可加損矣並易説廣漢張氏曰夫乾確然示人易矣坤隤然示人簡矣天地以簡易示人而天下之人習矣而不著行矣而不察於是聖人作衣裳以被於身以啓迪天下之民故垂綃為衣其色玄而象道襞幅為裳其色纁而象事所以法乾坤而易之俾民知有君臣知有父子知有尊卑貴賤之分以至飛潛動植山川鬼神莫不有各安其分者蓋取諸乾坤者乎易説白雲郭氏曰垂衣裳而天下治謂無為而治也能無為而治者無他焉法乾坤易簡而已易説漢上朱氏曰神農氏時與民並耕而食饔飧而治至是尊卑定位君逸臣勞乾坤無為六子自用垂衣裳而天下治蓋取諸乾坤乾在上為衣坤在下為裳易傳新安朱氏曰乾坤變化而無為本義刳木為舟剡木為楫舟楫之利以濟不通致逺以利天下蓋取諸渙橫渠先生曰舟車之作舟易車難故舟先於車易説廣漢張氏曰衣裳之垂固欲逺近之民不觀而化然川塗之險阻則有所不通惟夫舟車之利既興則日月所照霜露所墜莫不拭目觀天下如一家中國如一人矣是以刳其木而中虛剡其木而上鋭舟所以載物而楫所以進舟致逺以利天下而取諸渙者蓋渙之成卦上巽而下坎象曰利涉大川乘木有功也而渙者又有散釋之義舟楫之用豈非散釋險難之器乎易説白雲郭氏曰渙之為卦木上而水下是以有舟楫之象故其彖曰利涉大川乘木有功也易説漢上朱氏曰上古山無蹊澤無梁至是舟楫之利以濟不通蓋取諸渙渙否四之二也乾金刳巽木浮於坎上刳木為舟也離火上鋭剡木為楫也否塞者渙散濟不通也易傳新安朱氏曰木在水上也致逺以利天下疑衍本義服牛乘馬引重致逺以利天下蓋取諸隨明道先生曰服牛乘馬皆因其性而為之胡不服馬而乘牛乎理之所不可也劉絢師訓橫渠先生曰不勞而得其欲故動而説易説廣漢張氏曰物之重者人力不能勝故聖人穿牛鼻者所以引其重地之逺者人力不能致故聖人絡馬首者所以致其逺夫牛之角能觸人也聖人因其順而俾之引重夫馬之蹄能踢人也聖人因其健而俾之致逺皆因其性而不逆故動以説而隨其人也故於卦取隨易説白雲郭氏曰致逺之道人之所難也不有所隨安能有所至哉故服牛乘馬引重致逺所以取諸隨也且聖人之所以致逺者道也故聖人隨時之義在道衆人之所以致逺者牛馬也故衆人之所隨牛馬而已然舟車者皆人所恃以致逺故隨渙皆言致逺之利使天下之民得舟楫牛馬之用知舟楫牛馬之為利又安知聖人取諸隨渙哉此所謂百姓日用而不知也易説漢上朱氏曰上古牛未穿馬未絡至是服牛乘馬引重致逺以利天下蓋取諸隨隨否上九之初也坤牛而震足驅之服牛也震作足馬而巽股據之乘馬也坤輿震輹上六引之引重也內卦近外卦逺上六在外卦之外致逺也牛馬隨人而動否不通也上之初濟不通也易傳新安朱氏曰下動上説本義重門擊柝以待暴客蓋取諸豫橫渠先生曰有備則無患故豫易説廣漢張氏曰夫川有舟楫陸有牛馬塗既通則居民資之水者坐而至越陸者坐而至燕然暴客亦可至也故重門以禦之所以為寇者不能攻擊柝以警之所以為盜者不能竊然必取於豫者成卦二隂在前其耦也如重門一陽在中其動也如擊柝又有能豫備而能恱懌之象易説白雲郭氏曰豫備豫也備豫之義蓋非一也此獨舉重門擊柝者黃帝堯舜之世獨有此耳不若後世防禁備豫之密也以黃帝堯舜之世猶設是焉則後世之君可不豫為之防哉豫之一卦本無備豫之義而孔子又明備豫於此者以見諸卦之象無窮不可以一義盡也易説漢上朱氏曰上古外户不閉禦風氣而已至是重門擊柝以待暴客蓋取諸豫豫謙之反也謙艮為門九三之四又為門重門也艮為手坎為堅木震為聲手擊堅木而有聲擊柝也坤為闔户而坎盜逼之暴客也易傳新安朱氏曰豫備之意本義如十三卦中重門擊柝以待暴客只是豫備之意却須待用互體推艮為門闕雷震乎外之意剡木為矢弦木為弧只為睽乖故有威天下之象亦必待穿鑿附會就卦中推出制器之義殊不知卦中但有此理而已故孔子各以蓋取諸某卦言之亦曰其大意云爾漢書謂獲一角獸蓋麟云皆疑辭也語録斷木為杵掘地為臼臼杵之利萬民以濟蓋取諸小過橫渠先生曰備物致用過以養物易説廣漢張氏曰心懷恐懼則口御芻豢而不知味今也川塗險阻有舟車牛馬以代其勞暴客之侵有重門擊柝以為之備於是斷木為杵掘地為臼以去其粳粃以治其稻粱粒食既精饔飧既備而萬民以濟者蓋取諸小過也小過之成卦上動而下止聖人教人知艱食矣復為杵臼以治其五榖此小有所過者乎易説白雲郭氏曰小過有實中之象而臼杵致實中之利神農氏興耒耜之教臼杵之制不可無也故黃帝繼之萬民以濟此皆備物致用立成器以為天下利者也易説漢上朱氏曰知耒耜而不知杵臼之利則利天下者有未盡故教之以杵臼之利蓋取諸小過小過明夷初之四也兊金斷巽木斷木為杵也巽木入坤土掘地為臼也坎陷也臼之象杵動於上臼止於下四應初三應上上下相應杵臼之利也坎變巽股萬民濟也易傳新安朱氏曰下止上動本義弦木為弧剡木為矢弧矢之利以威天下蓋取諸睽橫渠先生曰養道雖至禁網尚疏但懲其乖亂而已易説廣漢張氏曰外有門柝以防其暴客內有杵臼以治其粒食而無以威其不軌則雖有險而不能守雖有粟而不能食此弧矢之利不可緩也夫弦木為弧剡木為矢此聖人非取其利於攻取也將以威天下之大不軌使強梗變心姦回易慮有所懼耳蓋取諸睽者睽之為卦火動而上澤動而下此事雖不同乃相須以為用也不特逺方睽乖之民必待弧矢以威之又有取睽之義者後世有六弓之制竹矢之利所以極其巧者乎易説白雲郭氏曰睽無弧矢之象而弧矢取諸睽者非謂物乖爭而弧矢足以威之也蓋弧矢之用以睽而發也弧矢相睽則發而為用睽之至則為用亦至故弧矢二物有至睽之道存焉睽之象曰君子以同而異同而異者其唯弧矢異物而同功乎易説漢上朱氏曰知門柝而不知弧矢之利則威天下者有未盡故教之以弧矢之利蓋取諸睽睽家人反也家人巽為木巽離為絲坎為弓弦木為弓也兊金剡木而鋭之剡木為矢也兊決乾剛威天下也易傳新安朱氏曰睽乖然後威以服之本義上古穴居而野處後世聖人易之以宫室上棟下宇以待風雨蓋取諸大壯明道先生曰上古之時民皆巢居而穴處後世易之以棟宇而不以巢居穴處為不可變者以棟宇之利故也語録橫渠先生曰剛以承上柔以覆下上其棟下其宇之象棟屋脊檩也宇椽也若指第二檩為棟則其間已有宇不得云上棟也若指栿為棟又益逺矣宇垂而下故言下宇並易説廣漢張氏曰冬則穴居以避其寒夏則野處以逃其暑當是時也鳬居雁處而無常者以外有侵軼之患故也今也弧矢以威其不軌然後可以營宫室之制棟則上之而有所承宇則下之而有所覆然震雷風雨賴其帡幪則為壯也亦大矣蓋大壯之成卦二隂在上有風雨之象四陽在下有棟宇之象姑取其壯而已非取其宫室之美而丹楹刻桷也易説白雲郭氏曰宫室之制上棟下宇有覆物之象天之道也大壯有天之道而動則人事故為宫室之象易説漢上朱氏曰聖人以百姓之心為心民之所欲不以強去民之所惡不以強留然變而通之者亦因其典禮以損益之而已且上古穴居而野處後世聖人易之以宫室自黃帝而來夏后氏之世室商人之重屋周人之明堂宫室之制有不同而上棟下宇以待風雨取諸大壯者同也大壯自遁來三復三變也一變中孚艮為居兊為口穴之象穴居也再變大畜乾在上天際也野之象巽入變艮而止野處也三變大壯震木在上棟也乾天在下宇也巽風隱兊澤流待風雨也大壯則不撓矣易傳新安朱氏曰壯固之意本義古之葬者厚衣之以薪葬之中野不封不樹喪期無數後世聖人易之以棺椁蓋取諸大過廣漢張氏曰生而庇大厦死而棄之中野不可也生而居奧室死而蠅蚋姑嘬之又不可也不封不樹則無以識之喪期無數則無以節之聖人易之以棺椁故棺周於身椁周於土棺椁之制既興則封之樹之不忘其地也喪期有數不忘其時也必取諸大過者大過之成卦二隂周乎四方有棺椁之象君子不以天下儉其親於此而過亦無害也易説白雲郭氏曰上古之世知簡不知禮故葬親之薄有至於此喪期無數者哀盡則止也聖人為之制禮然後棺椁有度則喪期可知矣大過雖取其過於厚然四剛居中有堅中之象故取以為棺椁也養生不足以當大事惟送死可以當大事可不過於厚乎上世嘗有其親死則舉而委之於壑者孟子謂孝子仁人之掩其親亦必有道矣此蓋聖人易之以棺椁取諸大過之意也易説漢上朱氏曰古之葬者厚衣之以薪葬之中野不封不樹喪期無數後世聖人易之以棺椁自堯舜以來有虞氏之瓦棺夏后氏之堲周商人之梓棺椁之制有不同而取諸大過者同也大過自遁四變一變訟乾見坤隱不封也再變巽木而兊金毁之不樹也三變鼎離為目兊澤流喪也上九變而應三坎兊為節不變喪期無數也木在澤下中有乾人棺椁也葬則棺周於身椁周於棺土周於椁大過也易傳新安朱氏曰送死大事而過於厚本義上古結繩而治後世聖人易之以書契百官以治萬民以察蓋取諸夬橫渠先生曰禮成教備一作修養道足而後刑可行政可明明而不疑制作之意蓋取諸某卦止是取義與象契非必見卦而後始有為也然則是言夫子之言耳並易説廣漢張氏曰門柝之制足以防民之侵軼弓矢之利足以威民之不軌此皆小人之過惡顯然易見可得而治也若夫事之情偽是非有無虛實此包藏於內有不可測者是以聖人制為書契故書以記久而明逺契以結信而止訟百官之務雖煩而以此治萬民之情雖隱而以此察此決去小人無所容縱於其間也故必取諸夬者蓋夬者決去小人而君子之道長者乎易説白雲郭氏曰未結繩之初結繩所以為治也結繩之後書契所以為治也結繩書契皆所以防小人之偽非待君子也夬之為道以剛決柔君子道長小人道憂書契所以取諸夬者亦以決去小人之偽也自離至夬十三卦與本卦之義多不同以見卦之象義皆不可一例窮盡能變而通之則其利亦無窮於天下矣此之所言亦其一也故曰通其變使民不倦易説漢上朱氏曰上古結繩而治後世聖人易之以書契象形會意轉注指事假借諧聲書契之制有不同而百官以治萬民以察取諸夬者同也夬自姤五變一變同人二變履三變小畜四變大有姤巽為繩結繩也巽變成離坤離為文書也兊金刻木契也乾為君坤為臣民坤居二四上百官以治也離明上達萬民以察也以是決天下疑者夬也以是推之後世畋獵捕魚之器雖不同而取於離則同也井牧溝洫之事雖不同而取於益則同也朝市夕市雖不同而取於噬嗑則同也餘卦可以類推矣自離至夬十三卦序聖人備物致用立成器以為天下利者皆取重卦之象故其制器取法皆有內外之象其用亦然網罟耒耜市貨衣裳舟楫牛馬門柝杵臼弧矢棟宇棺椁書契兩象也佃漁耒耨交易垂衣裳濟不通引重致逺待暴客濟萬民威天下待風雨治百官察萬民封木喪期亦兩象也叢説新安朱氏曰明決之意本義上古結繩而治後世聖人易之以書契天下事有古未之為而後人為之因不可無者此類是也如年號一事古所未有後來既置便不可廢胡文定却以後世建年號為非以為年號之美有時而窮不若只作元年二年此殊不然三代以前事迹多有不可考者正緣無年號所以事無統紀難記如云某年王某月箇箇相似無理會處及漢既建年號於是事乃各有紀屬而可記今有年號猶自姦偽百出若只寫一年二年三年則官司詞訟簿厯憑何而決少間都無理會處結繩今溪洞諸蠻猶有此俗又有刻板者凡年月日時以至人馬糧草之數皆刻板為記都不相亂並語録右第二章新安朱氏本義曰此章言聖人制器尚象之事合訂刪補大易集義粹言卷七十六
