body:
  text: 合訂刪補大易集義粹言卷五十四頭等侍衛納喇性德編巽下離上伊川先生曰鼎序卦革物者莫若鼎故受之以鼎鼎之為用所以革物也變腥而為熟易堅而為柔水火不可同處也能使相合為用而不相害是能革物也鼎所以次革也為卦上離下巽所以為鼎則取其象焉取其義焉取其象者有二以全體言之則下植為足中實為腹中實受物在中之象對峙於上者耳也橫亘乎上者鉉也鼎之象也以上下二體言之則中虛在上下有足以承之亦一無亦字鼎之象也取其義則木從火也巽入也順從之義以木從火為然之象火之用唯燔與烹燔不假器故取烹象而為鼎以木巽火烹飪之象也制器取其一作諸象也乃象器以為卦乎曰制器取於象也象存乎卦而卦不必先器聖人制器不待見卦而後知象以衆人之不能知象也故設卦一無卦字以示之卦器之先後不害於義也或疑鼎非自然之象乃人為也曰固人為也然烹飪可以成物形制如是則可用此非人為自然也在井亦然器雖在卦先而所取者乃卦之象卦復用器以為義也易傳龜山楊氏曰易六十四卦其在鼎也取象為備語録鼎元吉亨伊川先生曰以卦才言也如卦之才可以致元亨也止當云元亨文羡吉字卦才可以致元亨未便有元吉也彖復止云元亨其羡明矣易傳白雲郭氏曰易以器物各卦者井鼎二卦而已聖人名卦必以道獨二卦以器者以明道器皆一也由道可見器由器可推道也井以不改為德以動出為功井之道也鼎用以享上帝養聖賢鼎之道也伊川謂吉為羡字卦才可以致元亨未便有元吉也易説新安朱氏曰鼎亨飪之器為卦下隂為足二三四陽為腹五隂為耳上陽為鉉有鼎之象又以巽木入離火而致亨飪鼎之用也故其卦為鼎下巽巽也上離為目而五為耳有內巽順而外聰明之象卦自巽來隂進居五而下應九二之陽故其占曰元亨吉衍文也本義彖曰鼎象也以木巽火亨飪也聖人亨以享上帝而大亨以養聖賢巽而耳目聰明柔進而上行得中而應乎剛是以元亨伊川先生曰卦之為鼎取鼎之象也鼎之為器法卦之象也一作法象之器也有象而後有器卦復用器而為義也鼎大器也重寶也故其制作形模法象尤嚴鼎之名正也古人訓方方實正也以形言則耳對植於上足分峙於下周圓內外髙卑厚薄莫不有法而至正至正然後成安重之象故鼎者法象之器卦之為鼎以其象也以二體言鼎之用也以木巽火以木從火所以亨飪也鼎之為器生人所賴至切者也極其用之大則聖人亨以享上帝大亨以養聖賢聖人古之聖王大言其廣上既言鼎之用矣復以卦才言人能如卦之才可以致元亨也下體巽為巽順於理離明而中虛於上為耳目聰明之象凡離在上者皆云柔進而上行柔在下之物乃居尊位進而上行也以明居尊而得中道應乎剛能用剛陽之道也五居中而又以柔而應剛為得中道其才如是所以能元亨也並易傳藍田吕氏曰鼎新民以法度也木入於火亨飪之象鼎所以名卦也鼎器也制器必有法象故曰鼎象也鼎之用至乎亨飪故聖人以享上帝養聖賢也享上帝奉天道以取法象也養聖賢尊有道敬有德以取法象也柔上行而得中所以能奉天道應乎剛所以能尊有道敬有德凡鼎之義皆主於柔巽順於天人而不自用此所以能元吉亨也白雲郭氏曰井鼎皆物也彖於鼎言鼎象而於井不言象者蓋井之象水在下今取於巽乎水而上水之義非象也鼎取以木巽火亨飪之象故曰鼎象也聖人之亨豈口腹之奉而已哉享上帝養聖賢而已享上帝交天也養聖賢交人也交通天人則亨飪之用大矣巽而耳目聰明者人君之視聽以天而其明四目達四聰也以人能享上帝養聖賢則其耳目聰明之用廣大矣故可以垂旒充耳而聽天下也柔進而上行得中而應乎剛五之德也自聖人亨以享上帝以至得中而應乎剛皆致元亨之道也易説漢上朱氏曰以全卦言之初六足也二三四腹也腹而中實受物也六五耳也上九鉉也有鼎之象以二體言之虛者在上其足在下而承之亦鼎之象也有是象而又以木巽火木入而火出亨飪之象在他卦雖有木火而無鼎象不為亨飪矣於此言象則他卦以爻畫為象者可以類推故曰鼎象也以木巽火亨飪也此以六爻兩體言乎鼎也聖人在上尊之則亨以享上帝大之則亨以養聖賢天帝一也以其宰制萬物而為之主則謂之帝聖人者賢人之極得天之道而能盡天之聰明者也乾為天在上為帝指上九也在下為聖賢指二三四爻也以享上帝之心推之以養聖賢人有不樂盡其心者乎鼎器也極其用則道也故曰聖人亨以享上帝大亨以養聖賢此復以六爻言鼎之用也觀乾之象則知天帝聖賢一也聖賢之任即天地之任其任豈不重乎鼎自遁三變而成一變訟坎為耳在下聽卑聰也再變巽離為目在四三變鼎離目在五其視愈逺明也所以聰明者聖人卑巽下人兼天下之耳以為聽故其耳聰兼天下之目以為視故其目明六二之柔進而上行至於五居尊位而得中下應九二之剛柔履尊位則無亢滿之纍得中則無過與不及之咎應乎剛則君臣道合萬物皆得其養具此四者是以元亨坤柔之亨始於六二之正元吉亨也故不曰大亨曰巽而耳目聰明柔進而上行得中而應乎剛是以元亨言元亨則吉在其中矣此以卦爻三變言鼎之才也在卦氣為六月故太玄準之以竈易傳新安朱氏曰以木巽火以卦體二象釋卦名義因極其大而言之享帝貴誠用犢而已養聖賢則饔飱牢禮當極其盛故曰大亨柔巽進而上得中應剛以卦象卦變卦體釋卦辭本義象曰木上有火鼎君子以正位凝命伊川先生曰木上有火以木巽火也亨飪之象故為鼎君子觀鼎之象以正位凝命鼎者法象之器其形端正其體安重取其端正之象則以正其位謂正其所居之位君子所處必正其小至於席不正不坐毋跛毋倚取其安重之象則以凝其命令安重其命令也凝聚止之義謂安重也今世俗有凝然之語以命令而言耳凡動為皆當安重也易傳橫渠先生曰正始而取新莫先於正位而定命也易説藍田吕氏曰正位凝命言所以新民以法度也皆不自用恭已正南面而已白雲郭氏曰鼎能革物而已君子法之何取於正位凝命哉究鼎之用上足以享上帝下足以養聖賢雖人君垂旒充耳而聰明無不及焉故君子正其位以凝命以成垂拱無為之治者如此易説漢上朱氏曰鄭三月鑄鼎士文伯曰火見鄭其火乎火未出而作火以鑄刑器周三月夏之正月也火以三月昏見於辰上故司爟以季春出火月令季春之月命工師令百工而金鐵在焉則古者鑄鼎以火出而作火矣辰東方木也火在木上其鑄鼎之時乎兊乾為金而又火在木上亦鑄鼎之象也鼎有趾腹耳鉉其位不可易故正位尊卑上下用之各有數故凝命離南面正位也巽為命九三獨正凝命也定命之謂凝木火鑄金巽風入之有凝之象正位凝命所以趨鼎之時易傳新安朱氏曰鼎重器也故有正位凝命之意凝猶至道不凝之凝傳所謂協於上下以承天休者也本義凝命恐伊川説得未然此言人君臨朝也須端莊安重一似那鼎相似安在這裏不動然後可以凝住那天之命如所謂協于上下以承天休語録初六鼎顛趾利出否得妾以其子無咎象曰鼎顛趾未悖也利出否以從貴也伊川先生曰六在鼎下趾之象也上應於四趾而向上顛之象也鼎覆則趾顛趾顛則覆其實矣非順道也然有當顛之時謂傾出敗惡以致潔取新則可也故顛趾利在於出否否惡也四近君大臣之位初下之人而相應乃上求於下下從其上也上能用下之善下能輔上之為可以成事功乃善道如鼎之顛趾有當顛之時未為悖理也得妾以其子無咎六隂而卑故為妾得妾謂得其人也若得良妾則能輔助其主使無過咎也子主也以其子致其主於無咎也六隂居下而卑巽從陽妾之象也以六上應四為顛趾而發此義初六本無才德可取故云得妾言得其人則如是也鼎覆而趾顛悖道也然非必為悖者蓋有傾出否惡之時也去故而納新瀉惡而受美從貴之義也應於四上從於貴者也並易傳橫渠先生曰柔牽於上必有義乃可鼎顛趾必出否妾從子貴必以有子乃不悖於義也易説藍田吕氏曰初六以一隂承二陽上強下弱者也上強下弱其勢必顛故鼎顛趾也妾賤者也子貴者也君子以賤者進御不以為非正者以其子也取妾以子不以為非正者所謂舍其賤而從其貴猶鼎顛覆實未以為悖者所以出其否白雲郭氏曰趾下道也凡物之顛趾皆悖也惟鼎之用初必顛趾利於出敗惡以致潔取新故在鼎獨為未悖也妾下人也使妾有子悖也子足以奉祭祀承先祖亦未悖之道也是以無咎以從貴者否為賤而潔新為貴也易説漢上朱氏曰初六在下體之下動而應足趾也乾為首四來下初首在下顛也初往四成震為足顛趾也否者不善初不正否之象初四得正未悖也古者鼎足空潔鼎者顛趾出否則能致新雖曰顛倒於鼎之用未為悖亂也乾為君兊為妾震為子妾不以正合以其有子故無咎無咎者正也妾奔女在女體之不善者穢也利出否者出穢納新舍賤從貴而後得子也公羊謂妾以子貴非也貴賤之分豈可亂哉以君臣言之以貴而下人卑有時而踰尊矣得賤臣者茍利於宗廟社稷則或出於屠販奴隸夷裔俘虜不問其素賤可也易傳又曰爻有一爻而取兩象者丁寧重復而非繁也鼎之初六取顛趾出否又取得妾以其子皆喻得人叢説新安朱氏曰居鼎之下鼎趾之象也上應九四則顛矣然當卦初鼎未有實而舊有否惡之積焉因其顛而出之則為利矣得妾而因得其子亦由是也此爻之象如此而其占無咎蓋因敗以為功因賤以致貴也鼎而顛趾悖道也而因可出否以從貴則未為悖也從貴謂應四亦為取新之意本義鼎顛趾利出否無咎或曰據此爻是凡事須用與他翻轉了却能致福曰不然只是偶然如此此本是不好底爻却因禍致福所謂不幸中幸蓋鼎顛趾本是不好却因顛覆而傾出鼎中惡穢之物所以反得利而無咎非是故意欲翻轉鼎趾而求利也得妾以其子得妾是無緊要其重却在以其子處顛趾利出否伊川説是得妾以其子無咎彼謂子為王公在喪之稱者恐不然並語録九二鼎有實我仇有疾不我能即吉象曰鼎有實慎所之也我仇有疾終無尤也伊川先生曰二以剛實居中鼎中有實之象鼎之有實上出則為用二陽剛有濟用之才與五相應上從六五之君則得正而其道可亨然與初密比隂從陽者也九二居中而應中不至失正已雖自守彼必相求故戒能逺之使不來即我則吉也仇對也隂陽相對之物謂初也相從則非正而害義是有疾也二當以正自守使之不能來就已人能自守以正則不正不能一有以字就之矣所以吉也鼎之有實乃人之有才業也當慎所趨向不慎所往則亦陷於非義二能不䁥於初而上從六五之正應乃是慎所之也我仇有疾舉上文也我仇對己者謂初也初比己而非正是有疾也既自守以正則彼不能即我所以終無過尤也並易傳橫渠先生曰以陽居中故有實實而與物競則所喪多矣故所之不可不慎也我仇謂三也三為革為塞固已路而為患者也使其有疾而不能加我則美實可保而吉可致也然四亦惡三三常懼焉是有疾而無尤也易説藍田吕氏曰九二剛中不虛有加必盈五雖正應居二剛之間為其所間有疾者也九二不以有應為盈乃以彼不能應我為吉懼其盈以為尤也白雲郭氏曰凡陽為實而隂為虛九二剛中故為有實明鼎之方用非虛鼎也仇為我之害者也虛則方有容故害我者不來實則盈滿之時故害我者必至必使我仇不我能即然後吉此聖人持滿之戒也古之人爵髙祿厚不免凶禍者多矣皆仇能即之故也仇非一也既滿而仇人則人為仇既滿而驕則驕為仇既滿而貪則貪為仇凡能害我者無彼無此皆仇也是以古之君子慎之欹器之戒以虛則欹中則正滿則覆九二之仇不我能即者用中故也象言慎所之者方是時尤當慎其所之也之怨耦之驕之貪皆所之也有所之則有所致鼎既有實何致之有是求益也盈而求益損之道也故害且至焉是以君子慎之也我仇有疾終無尤者仇雖有害我之理然我能用中則仇自病之而不我能即故終吉而無尤矣易説漢上朱氏曰陽為實九二剛實得中其可為鼎用二之五鼎有實也怨耦曰仇子夏曰仇謂四也九二九四匹敵也九二據初九四比五二四失其應故相與為仇四近君與我為仇二之五其可不慎所之乎二動成艮艮止也欲動而止慎之象九居四陽失位仇有疾也我仇有疾不能之初則不能即我二之五鼎得實而吉不喪其實終無尤也四兊為口尤之者也二往兊毁故終無尤也易傳又曰我仇有疾王弼以六五為九二仇伊川以初六為九二仇鄭虞以九四為九二仇案先儒説我據四之應四承我之應故曰我仇四為毁折之象故曰有疾而子夏傳亦曰四以近權惡我専任四之覆餗正無幾矣豈輒謀我哉怨耦曰仇當以四為仇叢説新安朱氏曰以剛居中鼎有實之象也我仇謂初隂陽相求而非正則相陷於惡而為仇矣二能以剛中自守則初雖近不能以就之是以其象如此而其占為如是則吉也有實而不謹其所往則為仇所即而陷於惡矣本義九三鼎耳革其行塞雉膏不食方雨虧悔終吉象曰鼎耳革失其義也伊川先生曰鼎耳六五也為鼎之主三以陽居巽之上剛而能巽其才足以濟務然與五非應而不同五中而非正三正而非中不同也未得於君者也不得於君則其道何由而行革變革為一作謂異也三與五異而不合也其行塞不能亨也不合於君則不得其任無以施其用膏甘美之物象祿位雉指五也有文明之德故謂之雉三有才用而不得六五之祿位是不得雉膏食之也君子藴其德久而必彰守其道其終必亨五有聰明之象而三終上進之物隂陽交暢則雨方雨且將雨也言五與三方將和合虧悔終吉一無此二字謂不足之悔一再有不足之悔字終當獲吉也三懷才而不偶故有不足之悔然其有陽剛之德上聰明而下巽正終必相得故吉也三雖不中以巽體故無過剛之失若過剛則豈能吉始與鼎耳革異者失其相求之義也與五非應失求合之道也不中非同志之象也是以其行塞而不通然上明而下才終必和合故方雨而吉也並易傳橫渠先生曰耳革行塞處二陽之間上下俱實也上下革塞則雖有美實而不見取若二使應五四使應初則其悔可虧故曰方雨虧悔能終不固塞其路則吉可召也革塞之則失其義矣以陽居陽承乘皆剛悔也有九四之革其行不得上通皆鼎耳之失義也易説白雲郭氏曰鼎以虛中故能受耳以虛中所以納鉉九三居下體之上有鼎耳之象以陽居陽其實甚矣不能虛中以待是所以鼎道革而其行塞也凡物之行以足獨鼎待鉉故以耳耳實則其行塞其行塞則不為用雖有雉膏烏得而食之雉文明之物也離之象也膏祿食也上有文明之君至美之祿其行既塞不可得而食也必待隂陽之和然後虧悔而終吉矣豈髙明柔克之戒乎失其義者失鼎耳虛中之義也易説漢上朱氏曰三動成離坎坎為耳鼎耳也三應上九鉉也耳虛受鉉則舉鼎而行九三當剛柔相應之時剛正自守以動為不正且有悔故上來之三而不受是鼎耳距鉉所以行鼎者塞絶而不亨矣離兊革之象鼎耳革失其為鼎耳之義也其能成亨飪之功乎離為雉兊澤為膏雉膏食之美者兊口在上不食也九三自守雖有美而不食五安知其旨哉夫君子不為已甚與其獨善其身曷若兼善天下然剛正自守人必有知者上感而動坎水上兊澤流方雨而其悔虧矣坎變兊兊為毁虧悔也始不正而正終吉也易傳新安朱氏曰以陽居鼎腹之中本有美實者也然以過剛失中越五應上又居下之極為變革之時故為鼎耳方革而不可舉移雖承上卦文明之腴有雉膏之美而不得以為人之食然以陽居陽為得其正茍能自守則隂陽將和而失其悔矣占者如是則初雖不利而終得吉也本義問九三鼎耳革是如何先生曰他與五不相應五是鼎耳鼎無耳則移動不得革是變換之義他在上下之間與五不相當是鼎耳變革了不可舉移雖有雉膏而不食此是陽爻隂陽終必和故有方雨之吉語録九四鼎折足覆公餗其形渥凶象曰覆公餗信如何也伊川先生曰四大臣之位任天下之事者也天下之事豈一人所能獨任必當求天下之賢智與之協力得其人則天下之治可不勞而致也用非其人則敗國家之事貽天下之患四下應於初初隂柔小人不可用者也而四用之其不勝任而敗事猶鼎之折足也鼎折足則傾覆公上之餗餗鼎實也居大臣之位當天下之任而所用非人至於覆敗乃不勝其任可羞愧之甚也其形渥謂赧汗也其凶可知繫辭曰德薄而位尊知小而謀大力小而任重鮮不及矣言不勝其任也蔽於所私德薄知小也大臣當天下之任必能成天下之治安則不誤君上之所倚下民之所望與己致身任道之志不失所期乃所謂信也不然則失其職誤上之委任得為信乎故曰信如何也並易傳藍田吕氏曰九四居上體之下以陽居隂下應初六位則近尊陽剛不足鼎折足之象也四以陽居上體其實宜美故曰公餗折足覆餗位髙力柔不勝其任者也形體沾濡污辱已甚出於不度取凶宜也白雲郭氏曰二與四同功之爻也二方有持滿之戒慎其所之故四以近君而任天下之重曽不自量其力至於喪身敗事沾汗狼藉其凶甚矣信如何者言力小任重之理信當如何言必至於敗覆也易説漢上朱氏曰四近君九處不當位既不堪其任矣下信初六之小人又無助德與智力皆不足安能謀大事任重寄哉故動則傾覆其所有矣四動之初成震兊震為足兊折之鼎折足也餗鼎實也李鼎祚曰雉之屬虞仲翔曰八珍之具鼎祚指五離言雉雉八珍之一也三公位初之四乾首在下三見離毁覆公餗也其形渥凶鄭康成虞仲翔本作其刑剭凶王沿曰古之大刑有剭誅之法周官掌戮凡爵者殺之于甸師氏子夏傳作握蓋傳之久字誤而音存也王輔嗣作其形渥易傳從輔嗣既曰其刑剭則凶可知矣如離之九四焚如死如棄如不言凶也離為目震動也乾首在下俯也目動首俯羞赧之象兊為澤兊乾為面巽為股澤流被面沾濡其體其形渥也如是者必害于家凶于國豈惟戮辱之凶哉四不智信任小人禍至於覆公餗信任如何也如何兊口發聲與大畜何天之衢亨同象易傳新安朱氏曰朝氏曰形渥諸本作刑剭謂重刑也今從之九四居上任重者也而下應初六之隂則不勝其任矣故其象如此而其占凶也信如何言失信也本義刑剭班固使來若作形渥却只是澆濕渾身語録六五鼎黃耳金鉉利貞象曰鼎黃耳中以為實也伊川先生曰五在鼎上耳之象也鼎之舉措在耳為鼎之主也五有中德故云黃耳鉉加耳者也二應於五來從於耳一作五者鉉也二有剛中之德陽體剛中色黃故為金鉉五文明得中而應剛二剛中巽體而上應才無不足也相應至善矣所利在貞固而已六五居中應中不至於失正而質本隂柔故戒以貞固於中也六五以得中為善是以中為實德也五之所以聰明應剛為鼎之主得鼎之道皆由得中也並易傳橫渠先生曰居中故其耳黃體柔故其鉉金柔故利於貞一作利於徑正易説白雲郭氏曰六五文明之主柔順居中故有黃耳金鉉之象黃中也中虛故能納鉉金堅剛也故足與有行能如是焉鼎道備矣固守是道終無革耳折足之憂也中以為實者六五隂虛以黃中之德為實也亦猶坤之六五美在其中之道也易説漢上朱氏曰離坤為黃黃者坤之中言有中德也伏坎為耳耳虛而納者也二自遁九五變乾為金金剛德也二應五舉鼎耳而行為金鉉故曰鼎黃耳金鉉六五之二巽變艮艮手為也六五有中德虛中而納九二九二剛中而實舉五而行以中為鼎之實也鼎之行在耳剛中為耳之實則剛柔得中而鼎道行矣故曰鼎黃耳中以為實也中以為實釋金鉉也五雖虛納二應之不以正失耳之實君臣相合不正其可乎故利貞九二之五正也言中以為實則正在其中矣易傳新安朱氏曰五於象為耳而有中德故云黃耳金堅剛之物鉉貫耳以舉鼎者也五虛中以應九二之堅剛故其象如此而其占則利在貞固而已或曰金鉉以上九而言更詳之本義六五金鉉只為上已當玉鉉了却下取九二之應來當金鉉蓋推排到這裏無去處了語録上九鼎玉鉉大吉無不利象曰玉鉉在上剛柔節也伊川先生曰井與鼎以上出為用處終鼎功之成也在上鉉之象剛而溫者玉也九雖剛陽而居隂履柔不極剛而能溫者也居成功之道唯善處而已剛柔適宜動靜不過則為大吉無所不利矣在上為鉉雖居無位之地實當用也與他卦異矣井亦然剛而溫乃有節也上居成功致用之地而剛柔中節所以大吉無不利也井鼎皆以終為成功而鼎不云元吉何也曰井之功用皆在上出又有博施有常之德是以元吉鼎以亨飪為功居上為成德與井異以剛柔節故得大吉也並易傳橫渠先生曰以剛居上能貞潔如玉以成鼎道不牽隂柔以固其節則吉無不利鼎象也足隂腹陽耳虛鉉剛故曰剛柔節也易説白雲郭氏曰上九鼎道大成剛柔適宜故得玉鉉之象玉剛而溫非一於剛者也是以大吉無不利與井之上六元吉在上之義同剛柔節者以剛節柔以柔節剛相與以相濟猶所謂欲剛必以柔守之之意也九三剛過於中無節也九四用剛自任之過無節也故獨上九得剛柔之節而盡玉鉉之美以成鼎道之吉斯為至矣易説漢上朱氏曰上九遁乾之不變者也故為玉三動坎為耳上來應三舉鼎耳而上行玉鉉也蓋上九不變則九三之剛正應之其道上行矣故曰鼎玉鉉上九之三坎變成兊水澤節也九居三而正大者吉也言上九為三而屈則大者吉小者無往不利上下之道行矣故曰大吉無不利鼎道既成九三復位玉鉉在上而處成功夫上九動而下三知柔也靜而在上知剛也動靜適宜剛柔有節是以動則吉無不利斯所以能保其成功歟易傳新安朱氏曰上於象為鉉而以陽居隂剛而能溫故有玉鉉之象而其占為大吉無不利蓋有是德則如其占也本義合訂刪補大易集義粹言卷五十四
