body:
  text: 合訂刪補大易集義粹言卷五十八頭等侍衛納喇性德編兊下震上伊川先生曰歸妹序卦漸者進也進必有所歸故受之以歸妹進則必有所至故漸有歸義歸妹所以繼漸也歸妹者女之歸也妹少女之稱為卦震上兊下以少女從長男也男動而女説又以説而動皆男説女女從男之義卦有男女配合之義者四咸恆漸歸妹也咸男女之相感也男下女二氣感應止而説男女之情相感之象恆常也男上女下巽順而動隂陽皆相應是男女居室夫婦唱隨之常道漸女歸之得其正也男下女而各得正位止靜而巽順其進有漸男女配合得其道也歸妹女之嫁歸也男上女下女一無女字從男也而有説少之義以説而動動以一作而字説則不得其正矣故位皆不當初與上雖當隂陽之位而陽在下隂在上亦不當位也與漸正相對咸恆夫婦之道漸歸妹女歸之義咸與歸妹男女之情也咸止而説歸妹動於説皆以説也恆與漸夫婦之義也恆巽而動漸止而巽皆以巽順也男女之道夫婦之義備於是矣歸妹為卦澤上有雷雷震而澤動從之象也物之隨動莫如水男動於上而女從之嫁歸從男之象震長男兊少女少女從長男以説而動動而相説也人之所説者少女故云妹為女歸之象又有長男説少女之義故為歸妹也易傳歸妹征凶無攸利伊川先生曰以説而動動而不當故凶不當位不當也征凶動則凶也如卦之義不獨女歸無所往而利也易傳橫渠先生曰歸妹與革均是澤為大卦義不相干故革具四德而歸妹初不言德也易説白雲郭氏曰歸者女子之嫁也妹言少女也少女從長男非正之道樂於自進則凶也何所利哉卦辭言征凶者獨歸妹一卦然而非樂於自進亦無凶矣王輔嗣以歸妹為娣媵故其言曰雖與長男交嫁而係娣是以説也孔子因之曰以妹從娣而嫁謂之歸妹誤矣娣媵謂之媵非歸也夫子言天地之大義謂夫婦也娣媵豈能具此義哉諸爻言娣義自不同輔嗣以初九有歸妹以娣之辭故誤以妹為娣媵耳六五曰其君之袂不如其娣之袂良孔子象曰帝乙歸妹不如其娣之袂良以見妹稱君而娣為媵矣易説新安朱氏曰婦人謂嫁曰歸妹少女也兊以少女而從震之長男而其情又為以説而動皆非正也故卦為歸妹而卦之諸爻自二至五皆不得正三五又皆以柔乘剛故其占征凶而無所利也本義彖曰歸妹天地之大義也天地不交而萬物不興歸妹人之終始也説以動所歸妹也征凶位不當也無攸利柔乘剛也伊川先生曰一隂一陽之謂道隂陽交感男女配合天地之常理也歸妹女歸於男也故云天地之大義也男在女上隂從陽動故為女歸之象天地不交則萬物何從而生女之歸男乃生生相續之道男女交而後有生息有生息而後其終不窮前者有終而後者有始相續不窮是人之終始也説以動以二體釋歸妹之義男女相感説而動者少女之事故以説而動所歸者妹也所以征則凶者以諸爻皆不當位也所處皆不正何動而不凶大率以説而動安有不失正者柔乘剛不惟位不當也又有乘剛之過三五皆乘剛男女有尊卑之序夫婦有唱隨之禮此一無此字常理也如恆是也茍不由常正之道徇情肆欲唯説是動則夫婦瀆亂男牽欲而失其剛婦狃説而忘其順如歸妹之乘剛是也所以凶無所往而利也夫隂陽之配合男女之交媾理之常也然從欲而流放不由義理則淫邪無所不至傷身敗德豈人理哉歸妹之所以一有征字凶也並易傳橫渠先生曰泰之九三進而在四六四降而在三故曰天地之大義也然泰道將終征將為否故曰凶妹者是少女之稱也對長男而言之故言少女先儒為姪娣之義於卦不見於爻辭則有君與娣之稱長男而與長女是人之常也少女而與少男是人之感也説以動須是歸妹聖人直是盡人情三五皆乘剛必退反乃吉並易説藍田吕氏曰歸妹配不敵也妹少女之稱女弟謂之妹亦少女也古之諸侯娶女同姓之國以姪娣媵即歸妹之義也姪娣尚幼則待年於父母之國其少可知也女子之色有時而衰少者以繼長者以退所以待其君子之有始終也少女之配長男配雖不敵説以動也隂陽皆不當位則嫡媵之分不明柔乘剛則姪娣之寵正於女君故征凶無攸利也大臣不以而近臣用事大賢不足而小賢獲用皆歸妹之義也白雲郭氏曰有乾坤則有六子有天地則有男女夫婦天地夫婦之義一也繫辭曰天地絪緼萬物化醇男女構精萬物化生故彖以歸妹為天地之大義蓋主夫婦生化之道而言也歸妹人之終始者夫婦生化之道終則有始猶天地之無窮也説以動所歸妹者孔子先言女嫁皆曰歸至此論歸妹之卦所以征凶無攸利也關睢之義樂得淑女蓋以德為主而此長男以所歸者妹遂説以動則不以德矣彼既不以德而説此又不以德而進是以征凶位不當者卦爻皆不當位是以有不以德進者矣以少女而歸長男非以柔乘剛而何宜其無攸利也或謂少女説而動如此則去淫奔不逺矣孔子曰説以動所歸妹也觀此則説動者男也易説漢上未氏曰諸卦先釋卦名此彖先言天地之大義人之終始者明夫婦之道原於天地重人倫之本也歸妹自泰來三之四為震四之三為兊天地相交而成坎離坎離者天地之用也天地以坎離交隂陽隂陽之義配日月乾天也乾納甲壬坤地也坤納乙癸離日也坎月也故觀月知日觀日月而知天地以一月論之日遲月速東西相望震兊也月至於晦則自東而北乃與日會東乙也北癸也消乙入癸會於乾壬壬癸北方氣之所歸十有二會萬物畢昌而月復見於震兊矣故曰歸妹者天地之大義也天地不交則萬物不興天地交而後有震震者天地之始交萬物興之時也夫坤終乙癸則乾始震庚終者乾終於坤也前者以是終也始者坤終而乾始也後者以是始也夫婦始終之際也父命子而醮之代父之道終之也壻受女于主人人道之始始之也終始相續化生無窮是也月晦生自震而兊之象故曰夫婦者人之終始也此以三四相易言歸妹之義也九三六四正也三四相易而天地各得其宜義也故曰天地之大義也諸儒以爻位不當謂所歸之妹為姪娣誤也爻變矣乃有姪娣之衆古者男三十而娶女二十而嫁故所歸以妹言之妹少女也男説女以動者以其所歸者妹也説少女者人之情慕少艾也乾上交坤坤下交乾震兊相交以説而動與咸同意故曰説以動所歸妹也言歸則兊女在內從震夫之外矣此合兩體而言歸妹之義也婚姻之禮隂陽交際天地之大義也故三四皆不當位退而各復其所乃吉六之四九之三征也征而不已必凶古者昏禮冕而親迎壻御婦車男下女也壻乘其車待於門外女從男也男下女則天地之義明女從男則天地之位定是以位雖不當而無征凶斯道之並行所以不偏廢歟若以説而動所履不正其凶必矣氓是也故曰征凶位不當也六三六五柔也九二九四剛也以柔乘剛則其柔日長剛為柔所乘則其剛日消夫弱婦強不能正室必至於夫妻反目其道不可以推行矣三不利於內四不利於外故曰無攸利此以中爻言説以動之戒也在卦氣為霜降故太玄準之以內易傳新安朱氏曰歸妹至萬物不興釋卦名義也歸者女之終生育者人之始説以動又以卦德言之柔乘剛又以卦體釋卦辭男女之交本皆正理惟若此卦則不得其正也本義象曰澤上有雷歸妹君子以永終知敝伊川先生曰雷震於上澤隨而動陽動於上隂説而從女從男之象也故為歸妹君子觀男女配合生息相續之象而以永其終知有敝也永終謂生息嗣續永久其傳也知敝謂知物有敝壞而為相繼之道也女歸則有生息故有永終之義又夫婦之道當常永有終必知其有敝壞之理而戒慎之敝壞謂離隙歸妹説以動者也異乎恆之巽而動漸之止而巽也少女之説情之感動動則失正非夫婦正而可常之道久必敝壞知其必敝則當思永其終也天下之反目者皆不能永終者也不獨夫婦之道天下之事莫不有終有敝莫不有可繼可久之道觀歸妹則當思永終之戒也易傳橫渠先生曰永常理之終知人情之敝易説藍田吕氏曰雷在澤上資澤之氣以震動萬物長男資少女之氣以廣嗣續君子慮其所終稽其所敝故始娶必歸妹也白雲郭氏曰衛人作氓詩蓋言男女無别遂相奔誘華落色衰復相棄背此所謂男女不終之敝也歸妹之義雖非奔誘然以長説少志在容色失夫婦之大義其去奔誘不逺矣是以君子於此欲思永終偕老之道而戒不終之敝也禮曰一與之齊終身不改故夫死不嫁所謂永終者如此易説漢上朱氏曰震雷也為東方兊澤也為西方天運八月東方如西方澤上有雷也為男下女之象二月西方如東方澤中有雷也為女從男之象始於下女終於從男天地之正未始有敝也故嫁娶者法之然人之於夫婦不能如震兊相從久而不息者何哉不能正其初也説少而動衰則棄之其能永終乎君子知其然必謹於夫婦之際下之者有義率之者有禮而其初正其初正則其末必正故永終而無敝歸妹初九上六之義也坎離合為知知敝者其唯九四君子乎易傳新安朱氏曰雷動澤隨歸妹之象君子觀其合之不正知其終之有敝也推之事物莫不皆然本義初九歸妹以娣跛能履征吉象曰歸妹以娣以恆也跛能履吉相承也伊川先生曰女之歸居下而無正應娣之象也剛陽在婦人為賢一作堅貞之德而處卑順娣之賢正者也處説居下為順義娣之卑下雖賢何所能為不過自善其身以承助其君而已如跛之能履言不能及逺也然在其分為善故以是而行則吉也歸妹之義以説而動非夫婦能常之道九乃剛陽有賢一作堅貞之德雖娣之微乃能以常者也雖在下不能有所為如跛者之能履然征而吉者以其能一無能字相承助也能助其君娣之吉也並易傳橫渠先生曰陽處於上不可不隨故征吉以兊應震合卦之義常道也爻為陽故能履非匹故跛易説藍田吕氏曰剛柔之象男剛而女柔男女均則長剛而少柔姪娣均少女也娣長而姪少初九以剛居歸妹之始先娣而後姪合常道也故曰歸妹以娣以少女配長男其配不敵然理之所不得不行如足跛偏任不得已而行故曰跛能履以娣承嫡以姪承娣長少相承有序所以成家故吉白雲郭氏曰初在下賤者之位也上無正應無所歸焉娣之象也自無所歸因人之歸而為娣媵故言歸妹以娣也跛能履者娣雖非正亦足以有行猶跛者之能履也故進而佐其君則吉恆者可久之道也娣媵古之道非妄為也故可久吉相承者言娣以進而承君為吉也易説漢上朱氏曰三兊者震所歸之妹也初在三後無應三以巽下之初九自卑而進説以從之歸妹以娣也三下初成巽初九應震有雷風相與之象恆也姪巽而娣説動故能歸妹以娣如有嫡不以其媵備數豈能以娣哉初九正進之從三又正能恆者也故曰歸妹以娣以恆也震為足兊折其左跛也跛者不足以行而從三則有應可行跛能履也跛能履故征吉征以正行也正則吉所以吉者以從三而承四四震夫道也三承四初又從三相與以承內事相承也是以吉易傳新安朱氏曰初九居下而無正應故為娣象然陽剛在女子為賢正之德但為娣之賤僅能承助其君而已故又為跛能履之象而其占則征吉也恆謂有常久之德本義九二眇能視利幽人之貞象曰利幽人之貞未變常也伊川先生曰九二陽剛一作剛陽而得中女之賢正者也上有正應而反隂柔之質動於説者也乃女賢而配不良故二雖一作之賢不能自遂以成其內助之功適可以善其身而小施之如眇者之能視而已言不能及逺也男女之際當以正禮五雖不正二自守其幽靜貞正乃所利也二有剛正之德幽靜之人也二之才如是而言利貞者一無此五字利言宜於如是之貞一無之貞字非不足而為之戒也守其幽貞未失夫婦常正之道也世人以媟狎為常故以貞靜為變常不知乃常久之道也並易傳橫渠先生曰震動乎上雖匹而不正所以眇陽中故能視不援上幽人之正也易説藍田吕氏曰九二一卦之中獨與六五應逺而相應如視也雖有剛中居隂處內不在尊位故不可與有明如眇能視也不可與有明則不可與有為靜而守中不變其常所以利幽人之貞白雲郭氏曰九二剛中賢女也長男説少艾而動則夫之非賢可知矣女從男者也夫之不賢女不能制也一賢一否眇之象也眇而能視以見九二之獨賢也然夫之不賢豈可變常而從之哉守其幽獨之操不為不賢之人奪其志可謂女子之貞者矣斯其所以為利也故曰利幽人之貞九二蓋能獲其利者非才不足而戒之也易説漢上朱氏曰九二離為目兊毁其右眇也眇者不足以明然二有應之五能視也女待男而行六五未下二二以剛中自持處內而不動不足以明也有眇之象初動而二不動在坎中坎為隱伏二貞於五處內而説為幽人幽人者女在窈窕幽間之中五下之則二行復成兊女自若也故利幽人之貞利幽人之貞者五下之而後兊變坤為常此爻無娣象故以女子守常為義易傳新安朱氏曰眇能視承上爻而言九二陽剛得中女之賢也上有正應而反隂柔不正乃女賢而配不良不能大成內助之功故為眇能視之象而其占則利幽人之貞也幽人亦抱道守正而不偶者也本義六三歸妹以須反歸以娣象曰歸妹以須未當也伊川先生曰三居下之上本非賤者以失德而無正應故為欲有歸而未得其歸須待也待者未有所適也六居三不當位德不正也柔而尚一作上剛行不順也為説之主以説求歸動非禮也上無應無受之者也無所適故須也女子之處如是人誰取之不可以為人配矣當反歸而求為娣媵則可也以不正而失其所也未當者其處其德其求歸之道皆不當故無取之者所以須也並易傳橫渠先生曰三隂本彚征在上今六三反下而為兊故曰歸妹以須反歸以娣女當待年於家今待年夫家而反歸故曰未當易説藍田吕氏曰六三未當進故反歸以須九四當進而未進故遲以愆期六三以隂居陽位既不當無退避之意上無正應復不得其所欲反歸待年以娣而行者也白雲郭氏曰六三之女不正也不正之女人之所棄故難其歸而有待也雖有待而終難其歸固不若反歸妹之義而從娣媵之事也未當者居位未當是以不能有所歸而待也下卦唯九二得中有歸妹之象初居下位三失正德故為娣媵義殊不同而謂一卦皆為娣媵之象則非也娣媵非天地大義安足以盡歸妹之象易説漢上朱氏曰初至五體需需須也須待也初從三得應二與五應三獨無應須也天官書須女四星賤妾之稱織女三星天女也陸震曰天文織女貴須女賤則須為賤女可知蓋二應五已行矣三往無應而猶須之女之強顔而不見售者也故曰歸妹以須夫女之可貴者為其正也順也動以理也六三居不當位德不正也柔而上剛行不順也為説之主以説而歸動非理也上無應無受之者也如是其賤矣故曰未當也易傳曰未當者言其處其德其求歸之理皆未當故無取之反歸以娣何也女謂嫁曰歸自內之外也三本泰之四爻三無所適反歸於四則得正其應在初初正也娣之位也諸娣從婦同行者也故應初乃有以娣之意魯春薑之女三往三逐春薑召其女留之三年乃復嫁之率知為人婦之道春薑知反歸以娣之義也六三既曰所歸之妹又曰須何也自變卦言泰四之三成兊兊者震所歸之妹也自爻位言之二往歸五矣三無所歸須也故曰曲而當易傳新安朱氏曰六三隂柔而不中正又為説之主女之不正人莫之取者也故為未得所適而反歸為娣之象或曰須女之賤者本義九四歸妹愆期遲歸有時象曰愆期之志有待而行也伊川先生曰九以陽居四四上體地之髙也陽剛在女子為正德賢明者也無正應未得其歸也過時未歸故云愆期女子居貴髙之地有賢明之資人情所願娶故其愆期乃為有時蓋自有待非不售也待得佳配而後行也九居四雖不當位而處柔乃婦人之道一有也字以無應一作悔故為愆期之義而聖人推理以女賢而愆期蓋有待也所以愆期者由己而不由彼賢女人所願娶所以愆期乃其志欲有所待待得佳配而後行也並易傳橫渠先生曰九四當速交而為泰今獨後者三有所待也故曰愆期易説白雲郭氏曰三之與四其不當相似而辭有不同何哉蓋六三以柔用剛又為過中而九四以剛用柔有未中之義是其所以不同也以其不當無應亦不免愆期有待而己其歸終有時故無反歸之事象言有待而行者行如詩言女子有行是也又以見所以愆期者在我有所待非人不求之也以是知過中與未中用剛與用柔其不同如此所以繫辭言三多凶也易説漢上朱氏曰離為中女九四居上體女貴髙之象九剛明而守柔靜女之賢者也六五歸妹九二往從之而九四不行成兊兊正秋是以愆期女歸以仲春為期秋不行愆期也四本泰之九三六四以坎男下之而後三之四成震女以外歸震仲春也遲歸以時也觀九四待坎男下之得仲春而後行則愆期之志有待而行也易傳新安朱氏曰九四以陽居上體而無正應賢女不輕從人而愆期以待所歸之象正與六三相反本義六五帝乙歸妹其君之袂不如其娣之袂良月幾望吉象曰帝乙歸妹不如其娣之袂良也其位在中以貴行也伊川先生曰六五居尊位妹之貴髙者也下應於二為下嫁之象王姬下嫁自古而然至帝乙而後正婚姻之禮明男女之分雖至貴之女不得失柔巽之道有貴驕之志故易中隂尊而謙降者則曰帝乙歸妹泰六五是也貴女之歸唯謙降以從禮乃尊髙之德也不事容飾以説於人也娣媵者以容飾為事者也衣袂所以為容飾也六五尊貴之女尚禮而不尚飾故其袂不及其娣之袂良也良美好也月望隂之盈也盈則敵陽矣幾望未至於盈也五之貴髙常不至於盈極則不亢其夫乃為吉也女之處尊貴之道也以帝乙歸妹之道言其袂不如其娣之袂良尚禮而不尚飾也五以柔中在尊髙之位以尊貴而行中道也柔順降屈尚禮而不尚飾乃中道也並易傳橫渠先生曰歸妹交泰之事備矣與泰六五同又於此見聖人為之戒也以其貴行故戒其滿以幾望一作又於此見新故之戒也易説藍田吕氏曰六五歸妹之時以柔處尊少女之至貴者如天子之女下嫁於諸侯也天子之女雖以貴行以為女君則不如其娣歸妹之時娣受寵也袂所以承君子言寵之也月幾望吉隂雖盛而不敢盈能退下而無疾妬之心故吉白雲郭氏曰六五以柔居尊得謙下之道故為帝乙歸妹與泰之六五同意此王姬下嫁之象帝而稱乙亦言其謙柔也其君之袂不如其娣之袂良者君謂妹也妹以德自飾不以服飾為事故不如其娣之袂良也詩序言王姬車服不繫其夫下王后一等猶執婦道以成肅雍之德則詩人所美者係乎肅雍之德不獨取於車服也月幾望者不自滿假之意也其娣袂良猶能謙下而無嫉妒之心蓋樛木逮下之義也帝乙歸妹下於其夫也月幾望下於其娣也夫如是吉孰大焉故樛木之詩每章必以福履終之是亦月幾望而繼以吉之義也月隂類也小畜上九曰婦貞厲月幾望則月為女子之象矣其位居中以貴行者天下未有不得中而能謙下於人者六五之位在中也以尊歸卑是為以貴行也惟在中故能不失貴行之義聖人之意尚德而已易説漢上朱氏曰女以外為歸五君位九二兊女歸五乾天為帝兊少女自長男觀之為妹帝乙歸妹也歸妹自泰變故六五同象子夏曰湯之嫁妹也五坤居君位嫡夫人小君位也袂衣褎手飾也所以為禮容二乾為衣離為文章二之五離毁變坎成兊坎為水兊有伏艮為手小君之袂無文而加浣濯之象初九娣之位乾兊伏艮為衣袂而初九不動君之袂不如其娣之袂良也為小君如是善矣良至善也乾美為良貴女之歸惟以謙降從禮為尊髙之德不以容飾為説故曰帝乙歸妹不如其娣之袂良也九二下也何以為帝女之象以其所歸之位在五而二以貴行也五位在中二亦中也貴者陽也古者王姬嫁於諸侯車服不係其夫下王后一等以貴行也不謙降從禮則亢而失中不稱其位矣譬之天道月幾望矣其可盈乎坎月在震東離日在兊西日月相望隂之盈也二之五坎離象毁月幾望也月幾望而不盈則不亢其夫故吉不然凶之道也夫消長之理陽消則隂生故日下而月西見隂盛則敵陽故既望則月東出婦道已盛聖人於此深慮之後世猶有以列侯奉事舅姑通問盈滿之禍可勝言哉易傳新安朱氏曰六五柔中居尊下應九二尚德而不貴飾故為帝女下嫁而服不盛之象然女德之盛無以加此故又為月幾望之象而占者如之則吉也以貴行謂以其有中德之貴而行故不尚飾本義上六女承筐無實士刲羊無血無攸利象曰上六無實承虛筐也伊川先生曰上六女歸之終而無應女歸之無終者也婦者所以承先祖奉祭祀不能奉祭祀則不可以為婦矣筐篚之實婦職所供也古者房中之爼葅歜一作醢之類后夫人職之諸侯之祭親割牲卿大夫皆然割取血以祭禮云血祭盛氣也女當承事筐篚而無實無實則無以祭謂不能奉祭祀也夫婦共承宗廟婦不能奉祭祀乃天不能承祭祀也故刲羊而無血亦無以祭也謂不可以承祭祀也婦不能奉祭祀則當離絶矣一無矣字是夫婦之無終者也何所往而利哉筐無實是空筐也空筐可以祭乎言不可以奉祭祀也女不可以承祭祀則離絶而已是女歸之無終者也並易傳橫渠先生曰上六與六三皆隂故士女無實易説白雲郭氏曰上六居一卦之極失謙下之義無以奉祭祀則非夫婦之道矣故稱女士焉未嫁曰女未娶曰士筐所以載實也承筐無實失婦道也禮云血祭盛氣也親割牲而無血失夫道也夫不夫婦不婦何所利哉是以夫婦之道有不能永終者以此聖人貴其知敝故夫夫婦婦而家道正矣言無實無血無攸利於上六之爻皆不能永終之敝也易説漢上朱氏曰震為竹上六坤動為方竹器而方筐也六三兊女之上隂虛無實承虛筐也三兊為羊四坎為血上動之三坎毁兊見兊為刑殺士刲羊無血也祭祀之禮主人割牲而主婦佐之房中牲體在俎乃設兩硎而芼之女承虛筐者以士刲羊無血無以為筐之實也故史蘇曰士刲羊亦無血也女承筐亦無貺也無血則無以貺女矣何以奉祭祀哉震兊夫婦也而曰士女言夫婦之道不成也女不得其所承矣退而歸三三亦失位無攸利也上六女歸而無終者也故其象如此子夏傳曰血謂四士刲羊謂三而無血是則自子夏以來傳易者以互體言矣易傳新安朱氏曰上六以隂柔居歸妹之終而無應約婚而不終者也故其象如此而於占為無所利也本義合訂刪補大易集義粹言卷五十八
