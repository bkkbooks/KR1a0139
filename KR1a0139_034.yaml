body:
  text: 合訂刪補大易集義粹言卷三十二頭等侍衛納喇性徳編巽下兊上伊川先生曰大過序卦曰頤者養也不養則不可動故受之以大過凡物養而後能成成則能動動則有過大過所以次頤也為卦上兊下巽澤在木上滅木也澤者潤養於木乃至滅沒於木為大過之義大過者陽過也故為大者過過之大與大事過也聖賢道徳功業大過於人凡事之大過於常者皆是也夫聖人盡人道非過於理也其制事以天下之正理矯失之用小過於中者則有之如行過乎恭喪過乎哀用過乎儉是也盖矯之小過而後能及於中乃求中之用也所謂大過者常事之大者耳非有過於理也惟其大故不常見以其比常所見者大故謂之大過如堯舜之禪讓湯武之放伐皆由一有此字道也道无不中无不常以世人所不常一作嘗見故謂之大過於常也易傳大過棟橈利有攸往亨伊川先生曰小過隂過於上下大過陽過於中陽過於中而上下弱矣故為棟橈之象棟取其勝重四陽聚於中可謂重矣九三九四皆取棟象謂任重也橈取其本末弱中強而本末弱是以橈也一作橈取其中强而本末弱本末弱是以橈也隂弱而陽强君子盛而小人衰故利有攸往而亨也棟今人謂之檁易傳白雲郭氏曰頤之虚中虚故受實實則剛剛而後過二卦之象相終始也故頤以虚為主而過以剛為義過非人之失也過於用剛也過於用剛所以為大者過也當本末弱而棟橈之時非過於用剛不可也夫大厦將顛梁棟傾橈不可扶持是以必當大過治之也亦猶衰亂之世天下蕩蕩无綱紀文章非聖人大過常道以治之豈能復治哉利有攸往亨者大過棟橈之時利於聖賢大過治之然後亨也由此觀之大過之時亦非不可治之世特蠱弊之大者耳患无剛過而中之徳以行大過之事也易説新安朱氏曰大陽也四陽居中過盛故為大過上下二隂不勝其重故有棟橈之象又以四陽雖過而二五得中内巽外說有可行之道故利有所往而得亨也本義四陽居中如何是大過二陽在中又如何是小過這兩卦曉不得今且只逐爻略曉得便也可占所謂大過如當潛而不潛當見而不見當飛而不飛皆是過如坤之初六須知履霜有堅冰之漸欲人恐懼修省便是過易大概欲人恐懼修省並語録彖曰大過大者過也棟橈本末弱也剛過而中巽而說行利有攸往乃亨大過之時大矣哉康節先生曰大過本末弱也必有大徳大位然後可救常分有可過者有不可過者有大徳大位可過者也伊周其人也不可懼也有大徳无大位不可過也孔孟其人也不可悶也其位不勝徳耶大哉位乎待才一云時用之宅也觀物外篇伊川先生曰大者過謂陽過也在事為事之大者過與其過之大本末弱謂上下二隂衰弱陽盛則隂衰故為大者過在小過則曰小者過隂過也剛過而中言卦才之善也剛雖過而二五皆得中是處不失不失一作得中道也下巽上兊是以巽順和說之道而行也在大過之時以中道巽説而行故利有攸往乃所以能亨也大過之時其事甚大故贊之曰大矣哉如立非常之大事興不世之大功成絶俗之大徳皆大過之事也並易傳横渠先生曰陽剛過實於中本末過弱於外故當過矯相與也易説藍田吕氏曰大過非常情之所及也二剛居二體之中有二剛以輔之大者過也二柔居二體之中有二柔以輔之小者過也本末皆弱非大過不足以持之必大有為而後濟故利有攸往乃亨剛過而不失其中可與權也巽而説行得道者多助也漢上朱氏曰大過陽過隂大者過越也鄭康成曰陽爻過也卦四陽二隂陽居用事之地故曰大過大者過也此以六爻言大過也巽為木為長上兊者巽之反長木反在上為棟巽風橈萬物者也而體弱陽為重四陽在中任重也長木在上而任重本末皆弱棟橈也天地之理剛柔不可以相无剛以柔為用柔以剛為體柔既不足剛亦无自而託譬之棟也中雖剛強兩端柔弱棟豈能勝其任哉故曰棟橈本末弱也此以巽兊兩體言大過之時也大過自遯六二變剛過者九三九四中者九二九五興衰救弊補其偏而不起之處非剛過不可也中則无剛過之患剛過而中所謂時中也過非過於理也以過為中也猶之治疾疾勢沈痼必攻之以瞑眩之藥自其治微疾之道觀之則謂之過自藥病相對言之則謂之中巽在内者巽乎内也兊在外者說乎外也内巽外說而志行抑剛之有餘以濟柔之不足則剛來柔往隂得位不窮大者不過乃亨乃者難辭也君子強小人弱九二不往以濟之亦何由亨夫剛過而不反不肖之心應之未有不為君子害者也東漢之季清議太勝君子小人至不相容大過已極而不知反是以不亨故曰剛過而中巽而說行乃亨此以卦變合二體而言濟大過之道也大過之時君子過越常分以濟弱能達乎時中矣又巽而說行以是而往利於有為建大功立大事非大過人者不能趨此時故曰大過之時大矣哉在卦氣為小雪故太𤣥凖之以失劇易傳龜山楊氏曰上下二隂本末弱也四陽聚於中大者過也剛過而聚於中剛過而中也巽而說行合二體言也所謂大過者立非常之事成希世之功是己禮器曰禮時為大堯授舜舜授禹湯放桀武王伐紂時也時也者當其可之謂也苟當其可則雖堯舜之禪遜湯武之放伐是亦過而中者也故堯典之書為遜舜而作而名之曰典典言常道也堯雖以天下與人而舜以匹夫受人之天下以人之常情言之可謂大過矣自聖人觀之亦曰常道而已也然而非巽而說行則不可往也故堯舜禹三聖之相授而謳歌獄訟皆歸之焉湯武之用師則東征西夷怨南征北狄怨簞食壺漿以迎王師故能成大功非巽而說行何以有此反是則子之之遜白公之爭耳何亨之有哉易説兼山郭氏曰大過一卦陳氏從遯變王原叔從離變二者不同要之取剛過中則一也遯以六二之上六王氏以離之巽遯以上九之九二王氏以離之兊然各有理可以互推也初上二隂是以言棟橈本末弱也其事則大過之初過亦淺也故為藉用白茅上六過之終過亦大也故為過涉滅頂凶要之大過大者之事小過小者之事推其象辭斷可知矣易説白雲郭氏曰伊川曰聖賢道徳功業大過於人凡事之大過於常者皆是也又曰堯舜之禪遜湯武之征伐皆由此道也又曰立天下之大事興不世之大功成絶俗之大徳皆大過之事也雍曰彖言大者過也盖明大過之義非言小者之過也棟橈大過之時也大過之時外則棟橈故宜用剛内則剛過而中是以其剛可用所以成大過之象然剛過而中非剛徳過中也乃剛過之徳又不失中者也剛過之徳既不失中又巽而說行者罔咈百姓以從己之欲也所謂致天下之大利成天下之大順者也以是而有攸往寧无利亨乎大過之時大矣非大人孰能當之易説新安朱氏曰大者過也以卦體釋卦名義棟橈復以卦體釋卦辭本謂初末謂上弱謂隂柔利有攸往乃亨又以卦體卦徳釋卦辭大過之時非有大過人之材不能濟也故歎其大本義問大過小過先生與伊川之說不同曰然伊川此論正如以反經合道為非相似殊不知大過自有大過時節小過自有小過時節處大過之時則當為大過之事處小過之時則當為小過之事如堯舜之禪授湯武之放伐此便是大過之事喪過乎哀用過乎儉此便是小過之事只是在事雖是過然適當其時便是合當如此做便是合義如堯舜之有朱均豈不能多擇賢輔而立其子且恁地平善過然道理去不得須是禪授方合義湯武豈不能出師以恐嚇桀紂且使其悔悟修省然道理去不得必須放伐而後已此所以事雖過而皆合理也問大過棟橈利有攸往亨既棟橈是不好了又却如何利有攸往先生曰看彖辭可見棟橈是以卦體本末弱而言卦體自不好了却因剛過而中巽而說行如此所以利有攸往乃亨也並語録東萊吕氏曰大過兊上巽下兊說也巽順也為非常大過人之事自常人論之必須剛毅勇力之人乃能辦此不知辦此事者却是巽順和悦元不須動聲色易説象曰澤滅木大過君子以獨立不懼遯世无悶伊川先生曰澤潤養於木者也乃至滅沒於木則過甚矣故為大過君子觀大過之象以立其大過人之行君子所以大過人者以其能獨立不懼遯世无悶也天下非之而不顧獨立不懼也舉世不見知而不悔遯世无悶也如此然後能自守所以為大過人一无人字也易傳藍田吕氏曰木資澤之潤以長茂澤水之盛至於滅木大過之象也君子達命之變得其所自信雖大過之世不與物推移故能以不懼无悶處之龜山楊氏曰澤雖滅木而木之植自若也君子體之故獨立不懼遯世无悶易説兼山郭氏曰獨立不懼遯世无悶此大者之過也今以一人譽之則喜一人非之則沮不能過者也昔者伯夷叔齊推位遜國以歸文王及武王興師叩馬而諌其後卒不食周粟餓於首陽方武王興師商之賢人有如微子之徒已歸周周之賢臣有如太公召公之徒皆以為當伐而不疑四方諸侯會者盖八百國是天下舉以為是也獨伯夷非之盖推父子之親立君臣之義不得不如是也非獨當世之是非又將窮天地亘萬世而不顧也由是言之獨立不懼遯世无悶非伯夷之徒孰能為之此其所謂大過之時大者之過也易説白雲郭氏曰澤上而木下滅木之象也滅木澤之過也君子於大過之時有二道或進則大有為或退則窮處而已進而大有為則反天下之衰弊獨立不懼可也退而窮處則遯世无悶可也禹之治水伊尹之相湯伯夷之諌武王皆大過之事可謂獨立不懼者矣孔子反魯而刪詩書繫周易作春秋顔子人不堪其憂回也不改其樂亦皆大過之事可謂遯世无悶者矣若接輿荷蓧長沮桀溺皆失徳之人非遯世之士也遯世无悶幾於潛龍之義二者皆聖賢出處之大致非止於行過恭喪過哀用過儉而已易説漢上朱氏曰澤養木者也過而滅沒其木大過也初六以一柔巽於四剛之下而不變巽為股立也巽見震伏震為恐懼獨立而不懼也所謂以天下非之而不顧者乎上六處一卦之外遯也兊為說无悶也遯世无悶所謂舉世不知而不悔者乎二者非大過人不能也王輔嗣曰非凡所及也易傳新安朱氏曰澤滅於木大過之象也不懼无悶大過之行也本義小過是収斂入來底大過是放底如獨立不懼遯世无悶是也澤滅木大過澤在下而木在上今澤水髙漲或至浸滅了木是為大過又曰木雖為水浸而木未嘗動故君子觀之而獨立不懼遯世无悶語録東萊吕氏曰象君子以獨立不懼遯世无悶盖大過雖本於理不過然其事皆常人數百年所不曾見必大驚駭无一人以我為是非有大力量何以當之若見理不明者見衆人紛紛安得不懼見理明者見理而不見人何懼之有我所行者左右前後縱横顛倒无非此理又何嘗獨立乎彼衆人紛紛之論人數雖衆然其說皆无根蒂乃獨立也至此則我反為衆衆反為獨矣易説初六藉用白茅无咎象曰藉用白茅柔在下也伊川先生曰初以隂柔巽體而處下過於畏慎者也以柔在下用茅藉物之象不錯諸地而藉以茅過於慎也是以无咎茅之為物雖薄而用可重者以用之能成敬慎之道也慎守斯術而行豈有失乎大過之用也繫辭云苟錯諸地而可矣藉之用茅何咎之有慎之至也夫茅之為物薄而用可重也慎斯術也以往其无所失矣言敬慎之至也茅雖至薄之物然用之可甚重以之藉薦則為重慎之道是用之重也人之過於敬慎為之非難而可以保其安而无過苟能慎一有思字斯道推而行之於事其無所失矣以隂柔處卑下之道唯當過於敬慎而已以柔在下為以茅藉物之象敬慎之道也並易傳藍田吕氏解見九二龜山楊氏曰大過之時四陽聚於中无所待而足以有為矣故曰苟錯諸地可也而以柔濟之藉用白茅之象也茅之為物所以供祭祀故至潔而其用重藉之用茅慎之至也故无咎易説兼山郭氏曰大人之過也過於厚小人之過也過於薄藉用白茅厚之至也易説白雲郭氏曰大過之初未可大有為而初六既柔居下又不可以有為者故特可用於過厚而已此藉用白茅之義也藉用白茅在初六則无咎二則失之不及矣上六不知柔道之難濟是以凶也易説漢上朱氏曰巽為白為草交乎乾剛草白而剛白茅也先儒謂秋茅也以柔藉剛藉也大過爻畫有足有腹有耳器之象坤為地置器者苟措諸地可也而藉用潔白之茅茅之為物薄而用重過慎也過慎者慎之至也大過君子將有事焉以任至大之事過而无咎者其惟過於慎乎過非正也初六執柔處下不犯乎剛於此而過其誰咎之雖不當位无咎也故曰慎斯術也以往其无所失矣易傳新安朱氏曰當大過之時以隂柔居巽下過於畏慎而无咎者也故其象占如此白茅物之潔者本義藉用白茅亦有過慎之意此是大過之初所以其過尚在小語録九二枯楊生稊老夫得其女妻无不利象曰老夫女妻過以相與也伊川先生曰陽之大過比隂則合故二與五皆有生象九二當大過之初得中而居柔與初密比而相與初既切比於二二復无應於上其相與可知是剛過之人而能以中自處用柔相濟者也過剛則不能有所為九三是也得中用柔則能成大過之功九二是也楊者陽氣易感之物陽過則枯矣楊枯槁而復生稊陽過而未至於極也九二陽過而與初老夫得女妻之象老夫而得女妻則能成生育之功二得中居柔而與初故能復生稊而无過極之失无所不利也在大過陽爻居隂則善二與四是也二不言吉方言无所不利未遽至吉也稊根也劉琨勸進表云生繁華於楛荑謂枯根也鄭𤣥易亦作荑字與稊同老夫之説少女少女之順老夫其相與過於常分謂九二初六隂陽相與之和過於常也並易傳横渠先生曰扶衰於上使枯木生稊拯弱於下使微隂獲助此剛中下濟之功亦自獲助於物也易説藍田吕氏曰初六以柔在下大過乎慎者也茅柔物藉在下也大過之世老少不得當其耦陽過於隂則老陽與少隂耦隂過於陽則老隂與少陽耦初六少隂女也上六老隂老婦也九二在初六之上老於初六故曰老夫九五在上六之下少於上六故曰士夫士未娶女未嫁者也大過剛過也柔過則不濟矣九二比於初六剛過乎柔上六比於九五柔過乎剛過則為老故枯楊為老夫老婦稊柔物也枯楊生稊再秀也華陽物也枯楊生華再榮也九二剛過故得柔之助楊之再秀尚可久也老夫女妻未失宜也上六柔過九五以少陽配之剛不足以助之雖榮易落也老婦士夫雖配非耦也龜山楊氏曰楊隂木也感於陽而易生也九二居隂而乘柔枯楊之象二居大過之時陽雖大過而隂已感之矣生稊之象也老夫猶枯楊也得女妻有生育之道焉猶生稊也盖巽乾體也一索而得女二居乾體老夫也而下比於初得女妻之象也大者過而隂比之成生育之功焉何不利之有易説白雲郭氏曰澤潤養木者也木之枯者不可復生其澤之潤養至於枯楊生稊生華則潤之大過可知故二五取以為象然則聖賢當棟橈之世其用剛也必如澤之潤養枯木使之生榮而後可豈不大哉且枯楊不可復生猶老夫之不能復妻也今枯楊生稊有實之漸潤澤之力也老夫女妻有子息之理過以相與之致也用剛如是何所往而不利哉九二下比初六之柔故有女妻之象盖大過之得其道者稊之字它書無見王輔嗣曰稊者陽之秀也爾雅云木之華草謂之榮不榮而實謂之秀如此則秀主草言且楊一木也既言其華又不得兼不榮而實之名也虞翻曰稊稚也説文云穉幼禾也後世作稚䄺皆同音如虞言則為䄺可矣鄭氏作荑陸云謂山榆之實如此則爾雅所謂莁荑蔱蘠也益非矣説文又有荑草即詩之柔荑亦无荑義獨伊川曰稊根也稊字之釋終不可明如此以爻義推之則老夫女妻有實之象而老婦士夫徒華而不實也實則可久華不可久也然則稊字之疑其來尚矣易説漢上朱氏曰兊為澤巽為木澤木楊也兊正秋枯楊也言陽已過也二變而與初二成艮巽木在土下根也枯楊有根則其穉秀出稊穉也楊之秀也伏震之象故曰枯楊生稊鄭氏易作荑艮為夫陽過老夫也巽為艮妻初隂女妻也老夫得女妻過而相與猶足成生育之功无不利也盖九二剛中用柔以濟之則无過極之失矣易傳新安朱氏曰陽過之始而比初隂故其象占如此稊根也榮於下者也榮於下則生於上矣夫雖老而得女妻猶能成生育之功也本義九三棟橈凶象曰棟橈之凶不可以有輔也伊川先生曰夫居大過之時興大過之功立大過之事非剛柔得中取於人以自輔則不能也既過於剛強則不能與人同常常之功尚不能獨立況大過之事乎以聖人之才雖小事必取於人當天下之大任則可知矣九三以大過之陽復以剛自居而不得中剛過之甚者也以過甚之剛動則違於中和而拂於衆心安能當大過之任乎故不勝其任如棟之橈傾敗其室是以凶也取棟為象者以其无輔而不能勝重任也或曰三巽體而應於上豈无用柔之象乎曰言易者貴乎識勢一作易之重輕時之變易三居過而用剛巽既終而且變豈復有用柔之義應者謂志相從也三方過剛尚能係其志乎剛強之過則不能取於人人亦不能一作肯親輔之如棟橈折不可支輔也棟當室之中不可加助是不可以有輔也並易傳藍田吕氏解見九四龜山楊氏曰棟謂之極極中也居中而衆材輔之也九三以剛居陽剛過而不中也剛過而不中則不可以有輔矣棟之所以橈也夫大舜有大焉以其善與人同也剛過而不中獨立而無輔不足以有其大矣居大過之時由是而能勝其任者未之有也其橈而凶不亦宜乎易説兼山郭氏曰九三應乎上六故曰楝橈初六應乎九四故曰棟隆孔子曰不可以有輔者應上也橈乎下者初應乎四也棟在上者也易説白雲郭氏曰木之所以能任重者剛之材也君子之所以任重者剛之徳也欲剛必以柔守之是以能成其材與徳也九二之生稊得其女妻有柔以輔之也九三之棟橈无柔以輔之也上應上六而无柔以輔之者盖卑不能有尊以為輔故也且任重雖在我而輔我之任者在人是猶一棟之強不能獨任室屋之用必資衆材之輔焉无以輔之則棟橈矣能无凶乎彖曰剛過而中巽而説行是為柔輔剛之義也易説漢上朱氏曰九三巽為長木居中任重棟也大過隂弱爻以陽濟隂為濟過之道九三有上六正應當相濟六濟九則陽不過隂不窮矣則上六者九三之輔助也九三以大過之陽復以剛自居而不中過乎剛者也以過甚之剛動又不正不正則上六不應人所不與安能當大過之任如是有摧折敗橈而己凶之道也所以致凶者以不可以有其輔也易傳曰三居過而用剛巽既終而且變豈復有用柔之義應者謂志相從也三方過剛上能係其志乎易傳新安朱氏曰三四二爻居卦之中棟之象也九三以剛居剛不勝其重故象橈而占凶本義九四棟隆吉有它吝象曰棟隆之吉不橈乎下也伊川先生曰四居近君之位當大過之任者也居柔為能用柔相濟既不過剛則能勝其任如棟之隆起是以吉也隆起一作兼字取不下橈之義大過之時非陽剛不能濟以剛處柔為得宜矣若又與初六之隂相應則過也既剛柔得宜而志復應隂是有它也有它則有累於剛雖未志於大害亦可吝也盖大過之時動則過也有他謂更有它志吝為不足之義謂可少也或曰二比初則无不利四若應初則為吝何也曰二得中而比於初為以柔相濟之義四與初為正應志相係者也九既居四剛柔得宜矣復牽係於隂以害其剛則可吝也楝隆起則吉不橈曲以就下也謂不下係於初也並易傳横渠先生曰志在拯弱則棟隆而吉若私應為心則橈乎下吝也易説藍田吕氏曰九三應上柔上而剛下棟橈者也九四應初剛上而柔下棟隆者也棟在上之物也大過主於剛過柔在乎上剛不足以輔之故橈而凶剛在乎上雖不橈乎下然係應在初其志不𢎞猶有它吝龜山楊氏曰以剛居柔剛過而中也履近尊之位任大過之責者剛而中可以有輔矣不橈乎下能成大過之功也故棟隆吉然剛過而中足以自立不可有它也下比於初則柔過矣故有它則吝易說白雲郭氏曰九三之應上六卑不能有尊是以无輔初六之應九四得居下輔上之義是以九四之棟隆而不橈乎下也在大過之時九四非大有為之才僅足小用任重不橈其剛而已它用之則吝矣故九四之不能有它雖愈於三之不能有輔其於大過之道亦未優也易説漢上朱氏曰九四反巽在上巽為長木棟之象陽處隂而不過能用柔以相濟者也動而正正則不橈乎在下之柔故曰棟隆之吉不橈乎下也易傳曰隆謂不係於初不曲以從下也大過之時以剛濟柔為得宜剛柔得宜而志復應初有它也初六九四非正應故以初六為它九四近君當大過之任不能絶去偏係不足以任九五之重吝道也曰二比初則无不利四應初則為吝何也曰二得中而比於初以柔相濟之義也四與初志相係者也剛柔得宜而係於隂則害剛矣故可吝也易傳新安朱氏曰以陽居隂過而不過故其象隆而占吉然下應初六以柔濟之則過於柔矣故又戒以有它則吝也本義九五枯楊生華老婦得其士夫无咎无譽象曰枯楊生華何可久也老婦士夫亦可醜也伊川先生曰九五當大過之時本以中正居尊位然下无應助固不能成大過之功而上比過極之隂其所相濟者如枯楊之生華枯楊下生根稊則能復生如大過之陽興成事功也上生華秀雖有所發无益於枯也上六過極之隂老婦也五雖非少比老婦則為壯矣一作壯夫一作士夫於五无所賴也故反稱婦得過極之隂得陽之相濟不為无益也以士夫而得老婦雖无罪咎殊非美也故云无咎无譽象復言其可醜也枯楊不生根而生華旋復枯矣安能乆乎老婦而得士夫豈能成生育之功亦為可醜也並易傳横渠先生曰九五上係上六故不能下濟大事徒益其末耳无拯物之心所施者狹老婦士夫所與者不足道枯楊生華勢不能乆故无譽未至長亂故无咎易説龜山楊氏曰獨隂不生獨陽不成楊易生之物也陽過而枯矣陽雖過而生理存焉下應九二之陽无隂不成也故生華而已上六隂極矣老婦之象也而五比之老婦得士夫之象也五雖重剛而下无應故謂之士夫士未有婦之稱也居大過之終隂陽皆過以老婦而得士夫不能成生育之功則失大過之義矣雖无咎无譽是亦可醜也易説兼山郭氏曰九二乗初故云老夫女妻九五承上故云老婦士夫原叔謂坎離之過理或然矣易説白雲郭氏曰三四之應同故皆曰棟而其應有隆橈之異二五之道同故皆言枯楊夫婦然五之承上二之乘初尊卑上下之位不同而老少夫婦之情自異也三下體也是以不能有輔五尊位也故得夫婦之道焉然上承於隂不如下比之順也上六之過不如初六之慎也故二五之辭二為優矣華見於外敷榮而已不若稊之可久也老婦之得士夫反婚姻男女之正方之女妻為可醜也觀象之辭盖言不若初二之相與也无咎无譽者僅得无咎幸矣何譽之有二之枯楊謂老夫也五之枯楊謂老婦也老夫女妻則剛為主而柔輔之大過之得者也故无不利老婦士夫則柔為主而剛輔之大過之失者也故无譽而象言何可乆亦可醜之意也然大過之道在臣下為多故象言獨立不懼遯世无悶而九五亦不以君道責之亦猶君道之无明夷也曰人君亦有大過如此者其義何如曰人君大過如此則九五休否之君也易説漢上朱氏曰兊為澤巽為木澤木楊也五兊變而與上兊成震兊說也震為旉為蕃鮮其旉蕃鮮可説生華也巽為長而伏何可乆也巽為婦上六隂已窮老婦也震為長男得士夫也九變六隂居陽宜有咎以陽濟隂故无咎兊為口震成兊毁故无譽雖曰无咎无譽然以陽而配窮隂又不能濟得无醜乎盖上六過極之隂雖五當位剛中濟之以柔不能成功也以陽濟隂其在於未極之時乎易傳新安朱氏曰九五陽過之極又比過極之隂故其象占皆與二反本義上六過涉滅頂凶无咎象曰過涉之凶不可咎也伊川先生曰上六以隂柔處過極是小人過常之極者也小人之所謂大過非能為大過人之事也直過常越理不恤危亡履險蹈禍而已如過涉於水至滅沒其頂其凶可知小人狂躁以自禍盖其宜也復將何尤故曰无咎言自為之无所怨咎也因澤之象而取涉義過涉至溺乃自為之不可以有咎也言无所怨咎並易傳横渠先生曰隂居上極雖過而不足涉難故凶大過之極故滅頂而无咎也易説藍田吕氏曰上六深則厲淺則揭涉而至於滅頂過涉者也以柔居大過之末過涉而不濟者也涉雖不濟義不得已滅頂取凶命不可逃義命合一非其咎也龜山楊氏曰居大過之終則過極矣故有過涉滅頂之象焉若比干諌而死之類是也在比干之身則凶矣於義則不可咎也易説兼山郭氏曰詩云深則厲淺則揭如之何過涉滅頂也曰大過之時則然也方大過之時本末衰弱在上者不可以有輔在下者過弱而不可以為恃非得剛過而中巽而說行不恤其危涉險以求濟何可及也象曰獨立不懼遯世无悶上六非斯人之徒而誰與易説和靖尹氏曰過涉滅頂凶小人之過至滅頂可謂極矣其凶可知无咎者无可咎於人也語録白雲郭氏曰上六以柔道居過之極不知以濟剛為己任而欲自同剛徳以有為是以有過涉滅頂之象焉其凶自為之不可咎於人也易之无咎多有其義異者象言不可咎又誰咎之類是也伊川曰以言无所怨咎盖因象以明之矣先儒以上六為龍逢比干之事亦以凶而无咎為義然龍逢比干剛徳之賢非隂柔自任之人其道殊不相類故伊川獨以上六為小人履險自禍之事不然則龍逢比干豈不量力度徳之人也哉易説漢上朱氏曰乾為首上六在首之上頂也上六本遯之六二自二進而上行涉四爻至上成兊兊澤滅沒其頂涉難之過也九二九四剛陽過越以濟難乃克有濟上六柔而處大過之極不量其力至於滅頂然上六正也志在拯溺不可咎也過涉之凶所謂以貞勝也象有言不可咎者義不可咎也有言又誰咎者自取禍也易傳新安朱氏曰處過極之地才弱不足以濟然於義為无咎矣盖殺身成仁之事故其象占如此本義或問大過卦先生曰大過陽剛過盛不相對值之義故六爻中无全吉者除了初六是過於畏慎无咎外九二雖无不利然老夫得女妻畢竟是不相當所以象言過以相與也九四雖吉而又有它則吝九五所謂老婦者乃是指客爻而言老婦而得士夫但能无咎无譽亦不為全吉至於上六過涉滅頂凶无咎則是事雖凶而義則无咎也問大過楝橈是初上二隂不能勝四陽之重故有此象九三是其重剛不中自不能勝其任亦有此象兩義自不同否先生曰是如此九三又與上六正應亦皆不好不可以有輔自是過於剛強輔它不得九四楝隆只是隆便不橈乎下過涉滅頂凶不可咎也恐是他做得是了不可以咎它不似伊川説易中无咎有兩義如不節之嗟无咎王輔嗣云是它自做得又將誰咎出門同人无咎又是他做得好了人咎他不得所以亦云又誰咎也此處恐不然大過過涉滅頂凶无咎象曰不可咎也某嘗謂東漢諸人不量淺深至於殺身亡家此是凶然而其心何罪故不可咎也並語録合訂刪補大易集義粹言卷三十二
