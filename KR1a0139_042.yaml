body:
  text: 合訂刪補大易集義粹言卷四十頭等侍衛納喇性德編離下坤上伊川先生曰明夷序卦晉者進也進必有所傷故受之以明夷夷者傷也夫進之一作而不已必有所傷理自然也明夷所以次晉也為卦坤上離下明入地中也反晉成明夷故義與晉正相反晉者明盛之卦明君在上羣賢並進之時也明夷昏暗之卦暗君在上明者見傷之時也日入於地中明傷而昏暗也故為明夷易傳東萊吕氏曰其卦離下坤上離文明也坤柔順也文明在下而上為柔順蔽塞不得光明所以為傷之象也易説明夷利艱貞伊川先生曰君子當明夷之時利在知艱難而不失其貞正也在昏暗艱難之時而能不失其正所以為明一有為字君子也易傳白雲郭氏曰聖人之德惟明為大有明德以在上大有之君是也有明德以居下晉之臣是也明夷者明傷也故為明德遭難之時非聖人其難其慎用晦而明殆且傷矣所以利艱貞也易説新安朱氏曰夷傷也為卦下離上坤日入地中明而見傷之象故為明夷又其上六為暗之主六五近之故占者利於艱難以守正而自晦其明也本義東萊吕氏曰利艱貞夫當太平之時上下相通君子道長上為君所信下為人所歸故正則易惟是艱難之時小人道長君子不見信於上當此之時欲守其正所以至難故明傷之時利艱貞也易説彖曰明入地中明夷內文明而外柔順以蒙大難文王以之利艱貞晦其明也內難而能正其志箕子以之伊川先生曰明入於地其明滅也故為明夷內卦離離者文明之象外卦坤坤者柔順之象為人內有文明之德而外能柔順也昔者文王如是故曰文王以之當紂之昏暗乃明夷之時而文王內有文明之德外柔順以事紂蒙犯大難而內不失其明聖而外足以逺禍患一作害此文王所用之道也故曰文王以之明夷之時利於處艱厄而不失其貞正謂能晦藏其明也不晦其明則被禍患不守其正則非賢明箕子當紂之時身處其國內切近其難故云內難然箕子能一無能字藏晦其明而自守其正志箕子所用之道也故曰箕子以之並易傳橫渠先生曰文王體一卦之用箕子以六五一爻之德文王難在外箕子難在內也易説藍田吕氏曰明夷藏而不顯也明夷之義文王箕子事紂之道也君子之德非所尚於明夷而涖衆之道不用明焉於是乎取之龜山楊氏曰箕子以一爻言之也文王總一卦言之也繫辭曰易之興也其當商之末世周之盛德邪文王與紂之事邪其明夷之謂乎易説白雲郭氏曰在易卦彖之辭異者獨晉言康侯明夷言文王箕子革言湯武是也蓋康侯能盡晉之義故文王言之以見卦之德與人之德一也孔子明文王之意故繼以湯武文王箕子為言然明夷之彖自分二義文王箕子之道蓋不同也孔子曰文王既沒文不在茲乎文明言文王有明德所謂內文明也三分天下有其二以服事殷所謂外柔順也文王盡坤離之義所謂得明夷之大者矣箕子用晦而明得其艱貞而已此文王箕子之辨也觀其與微子比干人自獻於先王所謂內難而能正其志也自為之奴卒陳洪範所謂艱貞用晦而明矣明夷大象獨為聖人明德遭難之事初無衆人之象故正言文王箕子也易説漢上朱氏曰離為日為明坤為地為晦坤上離下明入地中夷傷也晉日在上旦晝也明夷日入地中暮夜也鄭康成曰日在地上其明乃光至其入也明乃傷矣晉者明君在上羣賢並進麗乎大明之時明夷者暗君在上明者在下見傷之時故曰明夷此以坤離兩體言明夷也明夷晉之反離為文明坤為柔順坎為險難陽為大文王當紂之時內含文明外體柔順蒙大難而免於難故曰內文明而外柔順以蒙大難文王以之言文王用明夷之一卦也初九六二九三正也明夷之時不晦其明則有禍失其正則其明熄滅處之者利在於艱貞而已艱貞者有其明而晦之也如日在地中其明可晦正不可動故曰利艱貞晦其明也坎險在內內難也箕子紂同姓近則身在商邑之中難在內者也佯狂被髮自守其志囚奴而不變其於正也難矣故曰內難而能正其志箕子以之箕子用明夷利艱貞之三爻也文王箕子雖若不同其用明夷之道則一也在卦氣為九月故太玄準之以晦易傳新安朱氏曰明入地中以卦象釋卦名內文明外柔順以卦德釋卦義蒙大難謂遭紂之亂而見囚也利艱貞以六五一爻之義釋卦辭內難謂為紂近親在其國內如六五之近於上六也本義明夷未是説暗之主只是説明而被傷者乃君子也上六方是説暗君于出門庭言君子去暗尚逺可以得其本心而逺去文王箕子大槩皆是晦其明然文王之外柔順是本分自然做底箕子晦其明又云艱是他那佯狂底意思便是艱難底氣象爻説利貞而不言艱者蓋言箕子則艱可見不必更言之語録東萊吕氏曰坤上離下明入於地也人皆視明入於地而明自此滅殊不知明本不能滅特暫入於地而已人皆以君子之道見傷而道滅殊不知本不曾滅何者正道本不可無如日入地中其明初未嘗絶觀於渾天之法則可見也內文明而外柔順以蒙大難文王以之離內文明坤外柔順夫當見傷之時若外恃其文明則必見仇於小人何以蒙難哉惟是內藴文明之德外以柔順而行則入獸不亂羣入鳥不亂行兵無所投其刃藥無所投其毒斯可蒙大難矣故文王當紂昏亂之時雖囚於羑里而以柔順處之終不能害己柔順文明本非二事內之文明則外自然柔順外之躁動者即內之無文明亦非韜光埋彩之謂也日之在地中世上元不覺有日文王之在殷紂元不覺有文王此所以能蒙大難也利艱貞晦其明也內難而能正其志箕子以之當患難之時須艱守正道所以為晦其明聖人恐人錯認晦其明之義以為和光同塵故又以內難而能正其志明之以見所謂艱貞者乃艱難而正志者也凡處患難昭昭若揭日月而行與夫隨波同塵者皆不足道惟能正志然後可謂晦其明所謂素患難行乎患難者也彖言文王及箕子至於爻則獨言箕子而不言文王何也蓋箕子之行應六五一爻而已至於文王則一卦之全體皆文王之用也豈可以一爻指名之乎何以知之明夷為卦坤上離下離之在內即文王之內文明也坤之在外即文王之外柔順也內文明而外柔順以蒙大難是知明夷一卦全體皆文王之用也易説象曰明入地中明夷君子以涖衆用晦而明伊川先生曰明所以照君子無所不照然用明之過則傷於察太察則盡事而無含𢎞之度故君子觀明入地中之象於涖衆也不極其明察而用晦然後能容物和衆衆親而安是用晦乃所以為明也若自任其明無所不察則己不勝其忿疾而無寬厚含容一作𢎞之德人情睽疑而不安失涖衆之道適所以為不明也古之聖人設前旒屏樹者不欲明之盡乎隱也易傳橫渠先生曰不任察而不失其治也易説龜山楊氏曰君子之涖衆惟不用其明故能合天下而為明若察察而用明則蔽之者至矣易説白雲郭氏曰離日也方其明出地上晉晝之時也及其日中照天下則為豐矣至於明入地中而後為明夷夷之為傷非毁其明也晦其明而己晦其明則有終明之道是以艱貞之君子所以能用晦而明也然日所以照臨下土故君子之涖衆者其象似之易説漢上朱氏曰明夷者晉之反坤為衆為晦離為明初九九三入而治之涖衆也天下至衆以明涖之則知有時而困人情不安用晦而明則親疏小大無所不容衆為我用此垂旒塞纊而明目達聰之道也易傳東萊吕氏曰明入地中明夷君子以涖衆用晦而明此君子養明之道日至暮則入乎地人皆見其入於地而不知所以養其明故不有虞淵之入烏有㿩谷之明故古人曰雖有千丈清不如一尺渾無其渾不足以養其清且如舜之時罪疑惟輕功疑惟重與其殺不辜寧失不經觀此則舜之賞罰猶未盡明若漢宣帝信賞必罰截然無差則是舜不免於疑而宣帝乃能明察則謂宣帝賢於舜可也而後世論舜則以為聖人之盛宣帝乃雜霸之君其所以異必有所在矣學者須仔細玩味易説初九明夷于飛垂其翼君子于行三日不食有攸往主人有言象曰君子于行義不食也伊川先生曰初九明體而居明夷之初見傷之始也九陽明上升者也故取飛象昏暗在上傷陽之明使不得上進是于飛而傷其翼也翼見傷故垂朵凡小人之害君子害其所以行者君子于行三日不食君子明照見事之微雖始有見傷之端未顯也君子則能見之矣故行去避之君子于行謂去其祿位而退藏也三日不食言困窮之極也事未顯而處甚艱非見幾之明不能也夫知幾者君子之獨見非衆人所能識也故明夷之始其見傷未顯而去之則世俗孰不疑怪故有所往適則主人有言也然君子不以世俗之見怪而遲疑其行也若俟衆人盡識則傷己及而不能去矣此薛方所以為明而揚雄所以不獲其去也或曰傷至於垂翼傷己明矣何得衆人猶未識也曰初傷之始也云垂其翼謂傷其所以飛爾其事則未顯也君子見幾故亟去之世俗之人未能見也故異而非之如穆生之去楚申公白公且非之況世俗之人乎但譏其責小禮而不知穆生之去避胥靡之禍也當其言曰不去楚人將鉗我於市雖二儒者亦以為過甚之言也又如袁閎於黨事未起之前名德之士方鋒起而獨潛身土室故人以為狂生卒免黨錮之禍所往而人有言胡足怪也君子遁藏而困窮義當然也惟義之當然故安處而無悶雖不食可也並易傳橫渠先生曰進應於上為三所困故曰于飛垂翼君子避患當速勢不與抗退而逺行不遑暇食靜以自守非有所往之時也易説藍田吕氏曰初九明當升而反在下飛而垂翼之象也君子明者也明夷不明者也明與不明義與不義之分也不義者之食義者不受也明者所為不明者不信也故于行則三日不食有攸往則主人有言龜山楊氏曰居明夷之初在下而未蒙難也其翔而後集卑以自牧而已不矯激以為髙也故曰明夷于飛垂其翼其去而違之則宜速矣故君子于行三日不食若孔子接淅而行是也然直道而事人則焉往而不三黜故有攸往主人有言易説白雲郭氏曰卦之初爻皆有進無退而明夷之初聖人三釋之其辭皆不能果於進者以明傷之時其義不可果於進而其勢亦不得進也何謂三明夷于飛垂其翼一也君子于行三日不食二也有攸往主人有言三也且譬之鳥焉欲進則飛之疾而今言垂其翼者以明明傷之時義不可進也知義不可進而不進是為初九垂翼之道也此戒於未進之前也君子當斯時而欲有行是自取困窮之道象言義不食者君子于行義有不得祿食之象然則三日不食自取之也此言勢不得進而自取困辱也苟不知義之不可進不知勢之不得進而終欲有所往是以至於主人有言主人主我者也主人有言則難將作矣故聖人欲垂其翼於前不欲主人有言於後斯能用晦而明矣是以辨之於初也易説漢上朱氏曰晉上九反而為明夷之初九離為鳥自上下下于飛也見傷而垂其翼者也柔為毛剛其翼也小人之害君子必害其所以行使不得進君子明足以見微故去位而行離為日之四歷三爻兌口在上三日不食也斷之以義雖困窮飢餓而不悔故曰君子于行義不食也之四有攸往也巽東南方主人位兌口為有言君子所為衆人固不識也方初九以正見傷於明夷之始其事隱而難見微而未著自常情觀之豈不離世異俗乎此所以主人有言然君子不恤也義之當然納履而行何往而不貧賤哉易傳曰待其已顯則無及矣此薛方所以為明而揚雄所以不獲去也穆生之去楚二儒且非之況世俗之人乎故袁閎之於東漢亦以為狂也所往而人有言何足怪哉易傳新安朱氏曰飛而垂翼見傷之象占者行而不食所如不合時義當然不得而避也本義東萊吕氏曰初九乃明之初見傷之始也方小人道長亦未為君子之害而君子必見幾而去正如鳥雀方飛為人所傷其翼雖垂亦未至於墜地君子於此時雖未至大傷便有所行蓋君子見幾而作才有小傷便去雖前有三日之至險亦不顧主人有言主人在朝之人凡去者為客則居者為主君子于行在朝必咎君子之輕動象曰義不食也義字不可不精看且好安惡佚君子小人同然君子棄富貴而就勞苦亦義不得不然耳義之在人如影隨形義當去則去故不食乃義當然易説六二明夷夷于左股用拯馬壯吉象曰六二之吉順以則也伊川先生曰六二以至明之才得中正而體順順時自處處之至善也雖君子自處之善然當陰暗小人傷明之時亦不免為其所傷但君子自處有道故不能深相傷害終能違避之爾足者所以行也股在脛足之上於行之用為不甚切左又非便用者手足之用以右為便唯蹶張用左蓋右立為本也夷于左股謂傷害其行而不甚切也雖然亦必自免有道拯用一作其壯健之馬則獲免之速而吉也君子為陰暗所傷其自處有道故其傷不甚自拯有道故獲免之疾用拯之道不壯則被傷深矣故云馬壯則吉也二以明居陰暗之下所謂吉者得免傷害而已非謂可以有為於斯時也六二之得吉者以其順處而有法則也則謂中正之道能順而得中正所以處明傷之時而能保其吉也並易傳橫渠先生曰與三同體三為六應故曰夷于左股居中履順難不能及故曰用拯馬壯吉馬謂初九亦為己用故欲拯暗同易説藍田吕氏曰六二以隂柔居中在二陽之間不自明而賴物以為明不自行而賴物以為行順物之則而不自用晦其明者也故曰夷于左股用拯馬壯吉夷于左股則不能自行用拯斯難馬壯乃吉也龜山楊氏曰六二以至明之才當傷明之時惟其自處有道故雖傷也止于左股不至乎甚矣馬健順之物用拯馬壯蓋其自處之道言其中正而體順不違乎則是以吉也易説白雲郭氏曰離之所以為明者以二也明夷之時初則以進為傷二則不進亦傷矣不用其明則其傷淺故有夷于左股之象雖傷于左股而有用拯之道用拯之道健順則吉故言馬壯吉馬壯猶明夷于飛也順以則者猶垂其翼也以是知明夷之道固不能一於明亦不可一於晦也六二以柔順中正至明之才是以能順時不違則以盡用拯之道而獲吉也易説漢上朱氏曰此爻因初九之往以取象初往二成巽震為左巽股也二為小人所傷不可動以應五明夷夷于左股小人之傷君子天也君子無如之何亦順之而已六二在位不可以苟去用九三拯之可也拯子夏傳説文字林作拯音升一音承上舉也三震起也九三之五成艮手有起手上舉之象夷于左股既不可動用之上舉其手以濟六五之柔者當資九三之力九三坎馬震為作足坎震得位馬之壯健者也馬壯乃可載上而行以濟弱六二不動亦保其吉雖傷左股猶無傷也此六二順以致吉不失其事君之則也則者理之所不能違也故曰六二之吉順以則也夫風雷相益水火相用見於萬物異體而同功者多矣況二三同體乎然非中正明德君子其能如是書曰告于顛隮若之何其六二之謂與鄭本作明夷睇于左股睇傾視也離目變巽左股見傷故睇之或當從鄭或曰卦爻有因前爻何也曰亦彰往察來之一端也前爻既往後爻方來來往相為用故有因爻成象者如同人九四因九三九五因九三九四明夷六二因初九也有因前卦為象者如明夷之上六因晉夬之初九因大壯玩其辭則可知故曰斷辭則備矣太玄亦然一首不盡其義乃以二首明之易傳新安朱氏曰傷而未切救之速則免矣故其象占如此本義東萊吕氏曰凡人之情害己迫患已至奔而避之者常也惟患未迫害未至小有所傷能疾驅而避之非天下之至明不能六二居下體之中為明夷之主明之極者也方傷其左股而拯其壯馬疾去而避之可謂明也已矣拯者策馬言去之疾也象曰六二之吉順以則也最要看順以則也一句蓋所以疾去者非為避患以求安乃順其法則義所當去也易説九三明夷于南狩得其大首不可疾貞象曰南狩之志乃大得也伊川先生曰九三離之上明之極也又處剛而進上六坤之上暗之極也至明居下而為下之上至暗在上而處窮極之地正相敵應將以明去暗者也斯義也其湯武之事乎南在前而明方也狩畋而去害之事也南狩謂前進而除害也當克獲其大首大首謂暗之魁首上六也三與上正相應為至明克至暗之象不可疾貞謂誅其元惡舊染汙俗未能遽革必有其漸革之遽則駭懼而不安故酒誥云惟殷之迪諸臣惟工乃湎于酒勿庸殺之姑惟教之至於既久尚曰餘風未殄是漸漬之俗不可以遽革也故曰不可疾貞正之不可急也上六雖非君位以其居上而暗之極故為暗之至謂之大首夫以下之明除上之暗其志在去害而已如啇周之湯武豈有意於利天下乎得其大首是能去害而大得其志矣志苟不然乃悖亂之事也並易傳橫渠先生曰九三進獲明夷之主故曰南狩得其大首易説藍田吕氏曰九三居離之極至明之主也上六居坤之極至暗之主也離南方之卦離至南而益明得其地也故曰明夷于南狩明夷之世至明之主得其地以攻至暗之主必大有得故曰得其大首君子之於物無不愛也雖有甚惡閔之而己正之而己不可疾也持不可疾之心以為正則君子用兵皆出於不得已也龜山楊氏曰南狩文王作興之象也而二老歸之二老者天下之大老也大老所謂得其大首也易説白雲郭氏曰伊川曰九三離之上明之極也又處剛而進上六坤之上暗之極也斯義也其湯武之事乎湯武非利人之天下也去其害而已南在前明方也狩畋而去害之事也大首謂暗之魁首上六也三與上正相敵應為至明克至暗之象不可疾貞謂誅其元惡舊染汚俗未能遽革必有其漸故酒誥云惟殷之迪諸臣惟工乃湎于酒勿庸殺之姑惟教之是也雍曰初九其傷未至六二其傷已至九三則其傷已過矣濟之以剛明上進之才是所以南狩而大得志也不可疾貞者離之性失之過則暴故戒之以此伊川謂九三為湯武則夷于左股者其文王乎易説漢上朱氏曰三公之位上六明夷之主九三極明至剛得位而應不得已而動以克極暗之主湯武之事也自二至上體師坎為中冬狩之時離為南三動之上南狩也故曰明夷于南狩狩者為民去害離之三陽乾也乾為首陽為大南狩克之得其大首大首元惡也得者易辭故曰得其大首離為鳥飛而上逆不可疾也九居上未正也民迷久矣遽正則駭懼不安當以疾貞為戒故曰不可疾貞動於中志也京房曰動乃見志故曰南狩之志乃大得也易傳曰以下之明除上之暗其志在於去害而已啇周之湯武豈有意於利天下乎志苟不然乃悖亂之事也易傳新安朱氏曰以剛居剛又在明體之上而屈於至暗之下正與上六暗主為應故有向明除害得其首惡之象然不可以亟也故有不可疾貞之戒成湯起於夏臺文王興於羑里正合此爻之義而小事亦有然者本義東萊吕氏曰九三以下之明攻上之暗此爻在下而伐上者也下之伐上聖人不得已而為者是湯武革命之象也湯武革命固非有心如此蓋上受天命之傳下迫民心之歸猶且徘徊有不忍意如湯必使伊尹五就桀然後有鳴條之誅武王必五年觀政於啇然後有牧野之誓皆非一舉而為待彼不能遷善改過然後征之蓋所以正君臣之分存忠厚之心故曰南狩不可疾貞象所謂大得者蓋有成湯武王之志然後大得應天心順民心也無湯武之志則篡矣易説六四入于左腹獲明夷之心于出門庭象曰入于左腹獲心意也伊川先生曰六四以隂居隂而在隂柔之體處近君之位是陰邪小人居高位以柔邪順於君者也六五明夷之君位傷明之主也四以柔邪順從之以固其交夫小人之事君未有由顯明以道合者也必以隱僻之道自結於上右當用故為明顯之所左不當用故為隱僻之所人之手足皆以右為用世謂僻所為僻左是左者隱僻之所也四由一有是字隱僻之道深入其君故云入于左腹入腹謂其交深也其交之深故得其心凡姦邪之見信於其君皆由奪其心也不奪其心能無悟乎于出一作出于門庭既信之於心一作既奪其心而後行之於外也邪臣之事暗君必先蠱其心而後能行於外入于左腹謂以邪僻之道入於君而得其心意也得其心所以終不悟也並易傳橫渠先生曰與上六同為一體故曰入于左腹與五親比故曰出門獲明夷之心蓋用柔履中其志相得故曰獲心意也易説藍田吕氏曰坤體純柔至暗者也六四當明夷之世以隂居隂入于至暗之始在上者亦皆昏暗然能獲在上者心意出之于門庭之間者必以隂柔之資逆探在上之邪心在上者既暗不能察而拒之此所以為其所得也龜山楊氏曰腹坤象也坤體之下故曰左腹尊右故也入于左腹不用其明也與聖人為腹不為目之意同獲明夷之心所謂求仁而得仁也于出門庭則與慎密而不出者異矣故自靖人自獻于先王我不顧行遁此微子之明夷也易説白雲郭氏曰伊川以六四為隂邪小人居高位以柔邪順於君者也雍曰小人之事其君也務引其君於不正之道然後能獲其心意而作威福於天下也大學之道欲明明德於天下者必先正心誠意而後可以治國平天下是以明君務知本而後小人不得啓其邪心又烏有入于左腹獲心意之事哉明夷之君暗主也暗主不知正心誠意故小人得以不正之道乘間而入以獲其心意適所以喪其君之明也好大喜功者以攻戰入之好貨財者以聚斂入之好奢侈者以土木文繡入之好淫泆驕樂者以鄭衛聲色入之故入于左腹言投其不正之道也明夷之心暗主之心也于出門庭作威福於天下也君子務引其君於當道而格君心之非小人則務投其不正之道而得其心意以作威福君子小人之事君其辨如此是以爭臣多君子而功利之臣多小人易説漢上朱氏曰上六極暗九三極明四逺上近三應初震為左離為大腹四自震應初入離入于左腹也坎為心坤中為意初六之四離變艮為門四為夜獲明夷之心于出門庭也初之四則坎坤變兌為説獲心意之象故又曰獲心意也其微子去商之事乎上六極暗將亡其意豈願亡哉去暗就明亡者復存則獲明夷之心意矣震為反生故也六四柔順而正與上六同體比於三而逺於上六以譬則微子之類也腹之為物能容者也自外而之內自上而之下九三所受也易傳新安朱氏曰此爻之義未詳竊疑左腹者幽隱之處獲明夷之心于出門庭者得意於逺去之義言筮而得此者其自處當如是也蓋離體為至明之德坤體為至暗之地下三爻明在暗外故隨其逺近高下而處之不同六四以柔正居暗地而尚淺故猶可以得意於逺去五以柔中居暗地而已迫故為內難正志以晦其明之象上則極乎暗矣故為自傷其明以至於暗而又足以傷人之明蓋下五爻皆為君子獨上一爻為暗君也本義東萊吕氏曰大抵君子之攻小人當攻其根本苟不攻其根本見小人在於聚斂則攻其聚斂見小人在於諂諛則攻其諂諛見小人在於開邉則攻其開邉則終不勝夫小人蓋小人所以為根本以其先能以左道壞人君之心術故人君深信之而不疑今之攻小人若但攻其門庭而不攻其內此君子所以常不勝而小人所以常勝君子之攻小人蓋亦反其本矣本者何在正君心也孟子曰惟大人為能格君心之非易説六五箕子之明夷利貞象曰箕子之貞明不可息也伊川先生曰五為君位乃常也然易之取義變動隨時上六處坤之上而明夷之極陰暗傷明之極者也五切近之聖人因以五為切近至暗之人以見處之之義故不專以君位一作義言上六隂暗傷明之極故以為明夷之主五切近傷明之主若顯其明則見傷害必矣故當如箕子之晦藏則可以一無以字免於難箕子商之舊臣而同姓之親可謂切近於紂矣若不自晦其明被禍可必也故佯狂為奴以免於害雖晦藏其明而內守其正所謂內難而能正其志所以謂之仁與明也若箕子可謂貞矣以五陰柔故為之戒云利貞謂宜如箕子之貞固也若以君道言義亦如是人君有當含晦之時亦外晦其明而內正其志也箕子晦藏不失其貞固雖遭患難其明自存不可滅息也若逼禍患遂失其所守則是亡其明乃滅息也古之人如揚雄者是也並易傳橫渠先生曰雖近於暗然柔順履中暗不能掩箕子之正也易説藍田吕氏曰六五居二陰至暗之間不可與明所以利貞者知守中以為正也此箕子事紂之義乎龜山楊氏曰履尊位大中而承上六所謂內難而能正其志者明之不可息以正而已故書曰囚奴正士以其蒙難而不失正也凡卦皆以五為君位而明夷之君貴而無位高而無民天下不以為君也其存者名號而已故以上六當之而父師其次也故以六五當之上下無常剛柔相易不可為典要惟其時而已易説白雲郭氏曰君子以正道處已而以道之權濟時明者聖人之正道也用晦而明者權也雖權而其明未嘗息者箕子之明夷是也當明夷之時不知用晦而明則見傷必矣此箕子所以為利貞也五為尊位以君臣之分言之則君也以君子小人言之則君子也故君子處晦與人君處晦皆同易説漢上朱氏曰六五動則正正成離離明也不動成坤坤為晦自晦其明也五上同體迫於昏亂而不可去是以自晦其明以免禍箕子之明夷也自晦者不動而已未嘗失正也明在其中失正則其明遂亡故佯狂者自晦也不受封去之朝鮮者正也聖人慮後世讀易者以自晦即守正而蒙垢愛生失其所守故曰箕子之貞明不可息也易傳新安朱氏曰居至暗之地近至暗之君而能正其志箕子之象也貞之至也利貞以戒占者本義東萊吕氏曰上六為明夷之主昏昧之極而六五近之最為難處方欲毅然剛強既不可隨波逐流又不可須是如箕子之正夫箕子為商舊臣紂之叔父乃佯狂為奴可謂能守正故此爻特發明其處傷之道大抵當顯明之中而用正正最易見惟是當暗傷之時用其正則難矣自常情觀之箕子甘心處於奴莫不謂其明已滅殊不知暗中有正處箕子雖處暗弱之時甘心為奴而箕子自靖人自獻于先王一念之正初未嘗息象言明不可息也以此易説上六不明晦初登于天後入于地象曰初登于天照四國也後入于地失則也伊川先生曰上居卦之終為明夷之主又為明夷之極上至高之地明在至高本當逺照明既夷傷故不明而反昏晦也本居於高明當及逺初登于天也乃夷傷其明而昏晦後入于地也上明夷之終又坤陰之終明傷之極者也初登于天居高而明則當照及四方也乃被傷而昏暗是後入于地失明之道也失則失其道也並易傳藍田吕氏曰明當在上而入于地上六所以失明之則暗當在下而不用其明六二所以順以則也龜山楊氏曰明夷至於不明晦則極矣初登于天用其明也後入于地則其明夷矣易曰乾元用九乃見天則蓋窮則變變則通天之則也明夷至於極而不知變失則亦甚矣易説白雲郭氏曰明晝之極一於晦也故言不明晦不明而晦則非若于飛垂翼者也又非用拯馬壯之道也其明息矣聖人原始要終言之故曰初登于天後入于地入于地所謂不明晦而明之道失矣易説漢上朱氏曰晉明出地上反為明夷則明入地中不明而晦上六極坤坤為晦故曰不明晦晉時離出坤登於乾五下照坤六四坤在上為國故曰初登于天照四國也晉反則離入於坤後入于地也五者君之位以明德居尊位者人君之則後入于地則失位失位者以不明晦而失為君之則也人君近君子逺小人兢兢焉唯懼不明乎善者所以守其則也得失無不自己為之者得之明失之晦晝夜之象故聖人舉晉明夷二卦反復以釋爻義原初懲後為人君萬世之戒雜卦曰明夷誅也為明夷之主而不誅者鮮矣易傳新安朱氏曰以陰居坤之極不明其德以至於晦始則處高位以傷人之明終必至於自傷而墜厥命故其象如此而占亦在其中矣照四國以位言本義問明夷卦先生曰下三爻皆説明夷是明而見傷者六四爻説者却以為是姦邪之臣先蠱惑其君心而後肆行於外殊不知上六是暗主六五却不作君説六四之與上六既非正應又不相比又況下三爻皆説明夷是好底何獨此爻却作不好説故某於此爻之義未詳但以意觀之六四居暗地尚淺猶可以得意而逺去故雖入於幽隱之處猶能獲明夷之心于出門庭也故小象曰獲心意也上六不明晦則是合下已是不明故初登于天可以照四國而不免後入于地則是始於傷人之明而終於自傷以墜其命矣吕原明以為唐明皇可以當之蓋言始明而終暗也語録東萊吕氏曰上六處傷之極最是不明處夫居離之上本當明而反不明蓋始雖明而其後入于地所以晦其明也此一爻唐明皇當之當開元之初姚宋為相而致太平可謂明照四國及後用李林甫楊國忠至於竄身失國是入于地也象曰失則也則字最當看乃是開人君自悔之道蓋言始固明矣後所以晦者以其失夫初之軌則也若常守其則何由而暗故曰其則不逺人君當自思之易説合訂刪補大易集義粹言卷四十
