body:
  text: 合訂刪補大易集義粹言卷六十頭等侍衛納喇性徳編艮下離上伊川先生曰旅序卦豐大也窮大者必失其居故受之以旅豐盛至於窮極則必失其所安旅所以次豐也為卦離上艮下山止而不遷火行而不居違去為不處之象故為旅也又麗乎外亦旅之象易傳旅小亨旅貞吉伊川先生曰以卦才言也如卦之才可以小亨得旅之貞正而吉也易傳白雲郭氏曰旅者失其所居也序卦曰窮大者必失其居故受之以旅是以豐之上六豐其屋蔀其家闚其户閴其无人而旅之象已形焉旅雖失其所居而未困故亦有可小亨之象然自亨之道論之則旅得其小者耳自貞吉論之亦不能大全獨得旅之貞吉也故在亨得其小者在旅得其貞吉是以言小亨又曰旅貞吉也由是觀之則小亨未必不大於貞吉而旅之貞吉未必不小於小亨也諸卦亦有是義因旅可明之耳易説新安朱氏曰旅羇旅也山止於下火炎於上為去其所止而不處之象故為旅以六五得中於外而順乎上下之二陽艮止而離麗於明故其占可以小亨而能守其旅之貞則吉旅非常居若可茍者然道无不在故自有其正不可須㬰離也本義不知聖人特地做一个卦説這旅則甚語録彖曰旅小亨柔得中乎外而順乎剛止而麗乎明是以小亨旅貞吉也旅之時義大矣哉伊川先生曰六上居五柔得中乎外也麗於上下之剛順乎剛也下艮止上離麗止而麗於明也柔順而得在外之中所止能麗於明是以小亨得旅之貞正而吉也旅困之時非陽剛中正有助於下不能致大亨也所謂得在外之中中非一揆旅有旅之中也止麗於明則不失時宜然後得一作能處旅之道天下之事當随時各適其宜而旅為難處故稱其時義之大易傳藍田吕氏曰旅失居而未得也旅在外者也處旅之道柔而得中以順乎剛則知屈以求伸也止而麗乎明則知所以安而不之於邪闇也此善處旅者所以得旅之小亨得旅之貞吉也白雲郭氏曰旅自否來以六五為成卦之主六五柔得中也自否三而為旅之六五是柔得中乎外也上承上九順乎剛也艮止也離明也止而麗乎明則止不失其所者也是皆所以小亨而貞吉也旅之時義所以為大者居尊得中順剛麗明安得不為大義乎故大有之所以為大火在天上而已旅之所以為大義亦以山上有火故也以火在天上而為元亨則山上有火又宜為小亨矣觀此則知君人之道其以明為大也如此是以詩人於闇亂之世則思古明王盖下民之至情也易説漢上朱氏曰旅否之變也剛當居上柔當居下六居五失其所居而在外旅也然六居五柔得中矣得中則其柔不過得為旅之中道易説曰中非一揆旅有旅之中也柔得中則能順乎上下之剛不為剛所揜而小者亨順乎剛而柔失中旅道窮矣坤順也君子入國問禁興之日従新國之法順乎剛也故曰柔得中而順乎剛此以六五言旅小亨也九居三未為失其所居也然剛自五而反居於下猶為旅也居三成艮屈其剛而止於下自謙屈之道也雖止乎下矣然九三正止而不失其正上麗乎離之明君子之居是邦也事其大夫之賢者友其士之仁者麗乎明也正然後能麗乎明不正人將拒我矣正則吉故曰止而麗乎明此以九三言旅貞吉也旅難處也旅如六五柔得中乎外而順乎剛在我者不失已矣乃可以小亨旅如九三止而麗乎明在彼者亦不失人矣乃可以貞吉是以旅一也而再言之易傳曰旅困之時非陽剛中正有助於下則不能致大亨如卦之才則可以小亨得旅貞而吉也四方固男子之事居者必有旅也顧處之如何耳夫子歴國應聘甞去父母之邦矣去他國矣欲浮於海居九夷矣盖得旅之時義也旅之時不一而義者時措之宜知其時而不知其宜不可也非大人孰能盡之故曰旅之時義大矣哉在卦氣為四月故太𤣥準之以裝易傳新安朱氏曰柔得中乎外而順乎剛止而麗乎明以卦體卦徳釋卦辭旅之時義大矣旅之時為難處本義象曰山上有火旅君子以明慎用刑而不留獄伊川先生曰火之在髙明无不照君子觀明照之象則以明慎用刑明不可恃故戒於慎明而止亦慎象觀火行不處之象則不留獄獄者不得已而設民有罪而入豈可留滯淹久也易傳藍田吕氏曰火非山上之物山上有火火寓於山故為旅山上有火近者蒙其照逺者觀其明近者察而逺者服故明慎用刑而不留獄心服則情得獄以其立斷故不留也不留亦旅人之義白雲郭氏曰易於火在天上明出地上山上有火雖象有大小不同其為至明則一也君子法之是以明慎用刑而不留獄也獄者天下之至難明者也以舜之聖猶至於再三訓戒有曰欽哉欽哉惟刑之恤哉有曰惟明克允有曰明於五刑由是觀之則明慎用刑宜聖人之致意也留獄則為不明矣聖人深懼其不明故又申言之旅之明義見於卦象而不見於卦辭故孔子於象明之此盖義之大者也易説漢上朱氏曰山上有火明而止止而不處旅也君子之用刑也雖明而止故明而慎於用刑雖止而不處故亦不留獄明者或不慎慎者或留獄失旅之象也雖有伏坎為獄兊為刑殺艮止慎也易傳新安朱氏曰謹刑如山不留獄如火本義明慎用刑而不留獄却只是火在山上之象又不干旅事語録初六旅瑣瑣斯其所取災象曰旅瑣瑣志窮災也伊川先生曰六以隂柔在旅之時處於卑下是柔弱之人處旅困而在卑賤所存汚下者也志卑之人既處旅困鄙猥瑣細无所不至乃其所以致侮辱取災咎也瑣瑣猥細之狀當旅困之時才質如是上雖有援无能為也四陽性而離體亦非就下者也又在旅與它卦為大臣之位者異矣志意窮廹益自取災也災眚對言則有分獨言則謂災患矣並易傳横渠先生曰瑣瑣不能致命遂志身窮而志卑也冗細其所為取災之道也易説藍田吕氏曰居旅之時以柔居下方在羈旅而不能自振柔弱卑下其細已甚為物所陵志窮而災皆自取也白雲郭氏曰旅雖有失其所居之義而卦象之中至明存焉故君子之處旅也必思其至明而法以行事然後足以得旅之大義此象所以言明慎用刑之意不知出此反致意於瑣瑣細末之務則闇於大義是其所以為取災之道歟夫窮志畢力於瑣瑣之務者終不能大有為於天下也初六隂柔之才自居於卑故无髙逺之見如此孟子曰養其大體為大人養其小體為小人旅之大義與其瑣瑣皆在人自養之而已可不審哉易説漢上朱氏曰瑣瑣小也艮為小動而之四復成艮小之又小瑣瑣也初六小人之旅卑柔而不中正恃應而求於四者煩䙝其細已甚故曰旅瑣瑣四巽極而躁火性炎上不能容初艮止也厭止妄動往而復止人亦厭之志窮也坎險災也志窮遇險斯其所取災也艮為手有求取之象楚申侯是已曰斯曰其者初四上下皆有艮手取災之象故指兩爻言之易傳新安朱氏曰當旅之時以隂柔居下位故其象占如此本義六二旅即次懐其資得童僕貞象曰得童僕貞終无尤也伊川先生曰二有柔順中正之徳柔順則衆與之中正則處不失當故能保其所有童僕亦盡其忠信雖不若五有文明之徳上下之助亦處旅之善者也次舎旅所安也財貨旅所資也童僕旅所賴也得就次舍懐畜其資財又得童僕之貞良旅之善也柔弱在下者童也强壯處外者僕也二柔順中正故得内外之心在旅所親比者童僕也不云吉者旅寓之際得免於災厲則已善矣羈旅之人所賴者童僕也既得童僕之忠貞終无尤悔矣並易傳横渠先生曰居得位即次之義得三之助故曰懐其資下有一隂无所係累故曰得童僕貞易説藍田吕氏曰六二以柔居中承剛乗柔无所不順旅而即安者也即次以為居懐資以為用得童僕之貞以給使而不畔羈旅之安莫甚於此白雲郭氏曰伊川曰次舍旅所安也貨財旅所資也童僕旅所賴也雍曰旅幾於困者也不得其安則困不得其資則困不得其助則困今安即其次懐其資又得童僕之助則處旅之善者矣是所以不能困也童僕以助上為正得其貞則得其助矣終何尤哉六二柔順中正故其善處如此語之以大義則未也易説漢上朱氏曰艮止也二得位止而得位即次舍也離兊為蠃貨貝資財之象二巽為入懐其資也童僕一本作僮僕艮為少男初卑隂賤二在上畜之童僕也初與二得童僕貞也童僕貞則二親信之而不疑旅在下柔而中正即次所遇而安也懐其資得三四五之助也又得童僕貞而下承之旅如是多助矣故動而之外終无尤之者五兊為口尤之者也初六不正而曰貞者貞於二也貞於主人二巽東南主人位也歸妹九二利幽人之貞貞於五也童僕貞然後次舍可止資貨可有夫子曰審其所以従之之謂貞也易傳新安朱氏曰即次則安懐資則裕得其童僕之貞信則无欺而冇賴旅之最吉者也二有柔順中正之徳故其象占如此本義九三旅焚其次喪其童僕貞厲象曰旅焚其次亦以傷矣以旅與下其義喪也伊川先生曰處旅之道以柔順謙下為先三剛而不中又居下體之上與艮之上有自髙之象在旅而過剛自髙致困災之道也自髙則不順於上故上不與而焚其次失所安也上離為焚象過剛則暴下故下離而喪其童僕之貞信謂失其心也如此則危厲之道也旅焚失其次舍亦以困傷矣以旅之時而與下之道如此義當喪也在旅而以過剛自髙待下必喪其忠貞謂失其心也在旅而失其童僕之心為可危也並易傳横渠先生曰以陽居陽其志亢也旅而驕亢焚次宜也下比二隂喪其御下之正危厲之道易説藍田吕氏曰九三居旅之時以陽居陽下體之上初二二隂皆相與而已為之長物之所不與故焚次喪童僕皆危道也白雲郭氏曰旅以致明為大而柔順中正亦足小亨九三剛而不中俱失亨大之義故不能安旅失助而危也旅焚其次則失其所安斯亦可傷矣然二以旅自處故得童僕貞三以剛暴之才不以旅自居反欲自脱於旅而以旅道居童僕宜其失衆心而喪也童僕以助為貞既喪則失助是以貞為厲矣夫旅豈與人之道哉君子修已安人自卑自厚而已故終无以旅與下之事焚亦言其剛暴也旅有火之性也易説漢上朱氏曰艮止也三得位止而得位次舍也巽木離火焚其次也九三在旅而過剛四五之所不與則失其所止有焚其次之象兊為毁傷也旅失其所止亦可傷也初艮為童僕九三既失其所止以旅之故乃巽而與下失尊卑之宜初三易位初失其正喪其童僕貞也所以喪者為旅之義剛柔皆失中旅如是寡助危矣六居三不正危之道易傳新安朱氏曰過剛不中居下之上故其象占如此喪其僮僕則不止於失其心矣故貞字連下句為義義喪以旅之時而與下之道如此義當喪也本義九四旅于處得其資斧我心不快象曰旅于處未得位也得其資斧心未快也伊川先生曰四陽剛雖不居中而處柔在上體之下有用柔能下之象得旅之宜也以剛明之才為五所與為初所應在旅之善者也然四非正位故雖得其處止不若二之就次舍也有剛明之才為上下所與乃旅而得貨財之資器用之利也雖在旅為善然上无陽剛之與下唯隂柔之應故不能伸其才行其志其心不快也云我者據四而言四以近君為當位在旅五不取君義故四為未得位也曰然則以九居四不正為有咎矣曰以剛居柔旅之宜也九以剛明之才欲得時而行其志故雖得資斧於旅為善其心志未快也並易傳横渠先生曰以陽居隂旅于處也所應在初初為瑣瑣志窮卑下不能大助於已但得其資斧之用而已志未有得故其心不快易説藍田吕氏曰九四以陽居隂旅而自降然不當位姑可處而已故曰旅于處而自降物之所與雖得其資斧而不得其僮僕躬自樵蘇雖有資斧未得所安故心未快白雲郭氏曰九四居上體之下无髙亢不屈之義盖亦安於旅者方之即次亦庶幾焉雖得資用徒能自修異夫童僕之助者是以其心未快也君子之快何如使是君為堯舜之君是民為堯舜之民是也不然則雖得資斧適足以獨善其身而已何所快哉故九四之我心不快孟子所謂窮也所謂不得志者也且爻辭言于處而象言未得位亦以見六二即次為得位而于處未得位者窮處而未得志者也易説漢上朱氏曰二三止而得位為次舍四巽為入而未得位行者處而已入對出言之為處九四非安處也故曰旅于處兊為蠃貝資也離為兵巽木貫之斧也得其資以為利得其斧以為斷上得乎五下得乎三之助矣九剛明之才而處四履謙能下善處乎旅故得上下之利有資貨焉有器用焉雖不若六二亦曰得其所矣然未得位也上不足以𤼵五之志下不足以致九二之賢雖得資斧未免為旅人故我心不快兊為決中為心四進而上道行於五而二應則快矣孟子曰久於齊非我志也易傳新安朱氏曰以陽居隂處上之下用柔能下故其象占如此然非其正位又上无剛陽之與下唯隂柔之應故其心有所不快也本義六五射雉一矢亡終以譽命象曰終以譽命上逮也伊川先生曰六五有文明柔順之徳處得中道而上下與之處旅之至善者也人之處旅能合文明之道可謂善矣羈旅之人動而或失則困辱随之動而无失然後為善離為雉文明之物射雉謂取則於文明之道而必合如射雉一矢而亡之𤼵无不中則終能致譽命也譽令聞也命福禄也五居文明之位有文明之徳故動必中文明之道也五君位人君无旅旅則失位故不取君義有文明柔順之徳則上下與之逮與也能順承於上而上與之為上所逮也在上而得乎下為下所上一无上字逮也在旅而上下與之所以致譽命也旅者困而未得所安之時也終以譽命終當致譽命也已譽命則非旅也困而親寡則為旅不必在外也並易傳横渠先生曰四處隂應下堅介難致雉之象也以力致之徒喪其矢喪矢喪其直也文明居中必不失其直當終得譽美易説藍田吕氏曰六五旅之時以柔居尊當文明之中以旅而不能自有故思射而取之然柔而无應既莫之獲且亡其矢斯未得其所欲者也然不安於尊上承上九終得上之譽命雉有所亡而不恤也白雲郭氏曰六五君位又為成卦之主且自否三升而為文明之君豈非射雉一矢亡之象乎君子蔵器於身待時而後動故一矢而亡之𤼵无不中也終以譽命者終譽以致天命也譽在人者也命在天者也天聴自我民聴也上逮者其道登聞於天也盖言人君修徳於身終致文明之盛下得百姓之心而上受天命也猶文王受命作周之詩而言令聞不已盖未有不得於人而能受命者也六五射雉有由艱危以致治之象兹豈非人君在旅之義乎易説漢上朱氏曰五在旅卦不取君象君不可旅也離為雉雉文明之物文明人文也聖人止亂而不以威武者也離為兵伏坎為弓伏艮為手兵加之弓上矢也矢者射雉之器五動弓矢𤼵離坎毁而雉亡一矢亡之也一矢亡雉者五得中道動而必中乎理之象然六五未當位雖有文明之徳未可以動上九屈體逮之則令譽升聞而爵命之矣兊口在下與之譽也巽為命上卦之終由譽而後命之始也未當位終也譽命故曰終以譽命五進上其在賔師之位乾西北賔之位也易傳新安朱氏曰雉文明之物離之象也六五柔順文明又得中道為離之主故得此爻者為射雉之象雖不无亡矢之費然所喪不多終有譽命也上逮言其譽命聞於上也本義上九鳥焚其巢旅人先笑後號咷喪牛于易凶象曰以旅在上其義焚也喪牛于易終莫之聞也伊川先生曰鳥飛騰處髙者也上九剛不中而處最髙又離體其亢可知故取鳥象在旅之時謙降柔和乃可自保而過剛自髙失其所安宜矣巢鳥所安止一有上字焚其巢失其所安无所止也在離上為焚象陽剛自處於至髙始快其意故先笑既而失安莫與故號咷輕易以喪其順徳所以凶也牛順物喪牛于易謂忽易以失其順也離火性上為躁易之象上承鳥焚其巢故更加旅人字不云旅人則是鳥笑哭也以旅在上而以尊髙自處豈得保其居其義當有焚巢之事方以極剛自髙為得志而笑不知喪其順徳於躁易是終莫之聞謂終不自聞知也使自覺知則不至於極而號咷矣陽剛不中而處極固有髙亢躁動之象而火復炎上則又甚焉並易傳横渠先生曰以陽極上旅而驕肆者也失柔順之正故曰喪牛于易易肆也肆怒而忤物雖有凶危其誰告之故曰終莫之聞也易説藍田吕氏曰上九旅而用剛居物之上如鳥巢然將害之故焚其巢居物之上故先笑為物所害故後號咷服牛引重旅之所資物所不與喪牛于易而皆莫之告此其所以凶也白雲郭氏曰旅不可窮也而上九窮之是以失其所安之甚如鳥之焚巢將无依焉旅之道易入而難出未甞不先笑而後號咷也其於得失之際則得之甚艱失之甚易牛大而難失之物亦易喪之三者究其終皆无獲吉之理是以凶也象言其義焚者窮旅於上必焚之義也喪牛于易方自失不暇終无譽命之得故莫之有聞也易説漢上朱氏曰上九離為飛鳥九動變六成震巽巽為木震為竹葦鳥隠具中巢也上九極剛以髙亢居上非旅人之宜巽木離火鳥焚其巢失其所也離目動震有聲笑也樂其未焚之前柔順謙下時也兊澤流於目巽號出於口哀於既焚之後悔其先之時也上與三相應之地上六變而正成坤坤為牛九三應而上降三正成坎坎為耳上九髙亢不變坤象隐喪牛也易輕易也火性剽疾上九極剛輕易也故曰喪牛于易九喪柔順三不往應坎耳伏矣輕易者自塞其耳而聦不明也陸機羇旅處羣士之上而不聞牽秀孟玖之毁其以髙亢輕易而致禍乎易傳新安朱氏曰上九過剛處旅之上離之極驕而不順凶之道也故其象占如此木義合訂刪補大易集義粹言卷六十
