body:
  text: 合訂刪補大易集義粹言卷二十六頭等侍衛納喇性德編離下艮上伊川先生曰賁序卦嗑者合也物不可以苟合而已故受之以賁賁者飾也物之合則必有文文乃飾也如人之合聚則有威儀上下物之合聚則有次序行列合則必有文也賁所以次噬嗑也為卦山下有火山者草木百物之所聚也下有火則照見其上草木品彚皆被其光彩有賁飾之象故為賁也易傳賁亨小利有攸往伊川先生曰物有飾而後能亨故曰無本不立無文不行有實而加飾則可以亨矣文飾之道可增其光彩故能小利於進也易傳藍田吕氏曰賁致飾以文也白雲郭氏曰伊川曰賁飾之道非能增其實也能加之文而已又曰理必有對待生生之本也有上則有下有此則有彼有質則有文自然之理也一則不立二則為文非知道者孰能識之凡卦有以二體之義及二象成者如屯取動乎險中與雲雷訟取上剛下險與夫天與水違行是也有取一爻者柔得位而上下應之曰小畜柔得尊位大中而上下應之曰大有是也有取二體又取消長之義者雷在地中復山附於地剝是也有取二象兼取二爻變者風雷益又取損上益下山下有澤損又取損下益上是也有以二象成卦又取爻義者夬之剛決柔姤之柔遇剛是也有以用成卦者巽乎水而上水井木上有火鼎是也有以形為象者山下有雷頤頤中有物曰噬嗑是也此成卦之義也如剛上柔下損上益下據成卦而言非謂卦中升降也如訟無妄云剛來非謂自上體而來也凡柔居五者皆云柔進而上行柔居下者也居尊位是進而上行也非謂自下體而上也先儒謂賁本泰卦豈有乾坤重而為泰又由泰而變之理乎雍曰賁自泰來雖取六二上九之變其實主文明之道者六二而已故彖釋賁亨則曰柔來文剛其文有異於噬嗑所謂剛柔分也小利有攸往以上九雖變而非主卦之爻是以小利而已易説新安朱氏曰賁飾也卦自損來者柔自三來而文二剛自二上而文三自既濟而來者柔自上來而文五剛自五上而文上又內離而外艮有文明而各得其分之象故為賁占者以其柔來文剛陽得隂助而離明於內故為亨以其剛上文柔而艮止於外故小利有攸往本義東萊吕氏曰伊川曰合而後有文此説甚好小利有攸往當看小字雖如賁之文章亦止於小利有攸往而已易説彖曰賁亨柔來而文剛故亨分剛上而文柔故小利有攸往天文也文明以止人文也觀乎天文以察時變觀乎人文以化成天下伊川先生曰卦為賁飾之象以上下二體剛柔交相一作相交為文飾也下體本乾柔來文其中而為離上體本坤剛往文其上而為艮乃為山下有火止於文明而成賁也天下之事無飾不行故賁則能亨也柔來而文剛故亨柔來文於剛而成文明之象文明所以為賁也賁之道能致亨實由飾而能亨也分剛上而文柔故小利有攸往分乾之中爻往文於艮之上也事由飾而加盛由飾而能行故小利有攸往夫往而能利者以有本也賁飾之道非能增其實也但加之文彩耳事由文而顯盛故為小利有攸往亨者亨通也往者加進也二卦之變共成賁義而彖分言一無言字上下各主一事者蓋離明足以致亨文柔又能小進也天文也文明以止人文也此承上文言隂陽剛柔相文者天之文也止於文明者人之文也止謂處於文明也質必有文自然之理理必有對待生生之本也有上則有下有此則一作必有彼有質則有文一不獨立二則為文非知道者孰能識之天文天之理也人文人之道也天文謂日月星辰之錯列寒暑隂陽之代變觀其運行以察四時之遷改也人文人理之倫序觀人文以教化天下天下成其禮俗乃聖人用賁之道也賁之象取山下有火又取卦變又柔來文剛剛上文柔凡卦有以二體之義及二象而一無而字成者如屯取動乎險中與雲雷訟取上剛下險與天水違行是也有取一爻者成卦之由也柔得位而上下應之曰小畜柔得尊位大中而上下應之曰大有是也有取二體又取消長之義者雷在地中復山附于地剝是也有取二象兼取二爻交變為義者風雷益兼取損上益下山下有澤損兼取損下益上是也有既以二象成卦復取爻之義者夬之剛決柔姤之柔遇剛是也有以用成卦者巽乎水而上水井木上有火鼎是也鼎又以卦形為象有以形為象者山下有雷頤頤中有物曰噬嗑是也此成卦之義也如剛上柔下損上益下謂剛居上柔在下損於上益於下據成卦而言非謂就卦中升降也如訟無妄云剛來豈自上體而來也凡以柔居五者皆云柔進而上行柔居下者也乃居尊位是進而上也非謂自下體而上也卦之變皆自乾坤先儒不達故謂賁本是泰卦豈有乾坤重而為泰又由泰而變之理下離本乾中爻變而成離上艮本坤上爻變而成艮離在內故云柔來艮在上故云剛上非自下體而上也乾坤變而為六子八卦重而為六十四皆由乾坤之變也並易傳古者學為文否曰人見六經便以謂聖人亦作文不知聖人亦一作只攄發胸中所藴自成文耳所謂有德者必有言也曰遊夏稱文學何也曰遊夏亦何嘗秉筆學為辭章也且如觀乎天文以察時變觀乎人文以化成天下此豈辭章之文也劉元承手編藍田吕氏曰剛柔相錯自然之文文明以止人為之文文明不止則文必勝質名存實喪不可以化成天下龜山楊氏曰賁飾也文無所止則無所致飾焉文明而麗乎止卦之所以為賁也凡賁之道能為之文而已不能增其質也柔來文剛有其質矣故亨剛上而文柔天文也由是而變化生焉故觀此足以察時變傳曰器以藏禮禮以藏器則文明止矣此人文也故觀此足以化成天下易説兼山郭氏曰王輔嗣曰互體不足推及卦變變又不足推至五行一失其原巧愈彌甚甚哉斯言之過也互體卦變其來尚矣將一切而去之不可也且賁之成卦變自泰來上六之柔下文於九二之剛九二之剛上文於上六之柔故曰柔來而文剛故亨分剛上而文柔故小利有攸往是則剛柔上下相錯而相文天文人文備於此矣此言不可誣也而鄭康成之徒又謂離為日天文也艮為石地文也天地二文交相飾焉成賁蓋在天成象在地成形無一物不相文今才得之二象而已故經曰日月麗乎天百穀草木麗乎土率由是也惟人也內之於一身外之於庶物因其理而節文之所謂文明以止是也故君尊臣卑君南嚮臣北面父坐子立兄先弟後夫唱婦隨上行之以為教下化之以成俗豈出於或使之然哉蓋本於上下相文自然而止耳故觀乎天文則有日中星鳥宵中星虛而知東作西成之序薄蝕之異精祲之祥而知吉凶水旱之變則時變可知也觀乎人文則二南之道麟趾騶虞之應則化成可知矣故謂氷火土石風雨露雷不如剛柔相摩八卦相蕩之為博也斗振天而進日違天而退者不如日往則月來寒往則暑來之為約也故君子惟易可以盡心焉易説白雲郭氏曰先人曰鄭康成輩謂離為日天文也艮為石地文也天地二文交相飾焉成賁蓋在天成象在地成形無一物不相文今才得之二象而已故經曰日月麗乎天百穀草木麗乎土則凡麗乎天地者無非文也惟人則內之於一身外之於庶物因其理而節文之所謂文明以止是也故君尊臣卑君南面臣北面父坐子立兄先弟後夫唱婦隨上行之以為教下化之以成俗一本於上下相文自然而止耳故觀乎天文則日中星鳥宵中星虛而知東作西成之序時變可知也觀乎人文則二南之道麟趾騶虞之應化成可知矣故謂水火土石風雨露雷不如剛柔相摩八卦相蕩之為博也斗振天而進日違天而退不如日往則月來寒往則暑來之為約也故君子惟易可以盡心焉雍曰王氏有言互體不足遂及卦變變又不足推至五行一失其原巧愈彌甚此言卦變不可用也及觀輔嗣解賁之彖辭則曰坤之上六來居二位柔來文剛之義也乾之九二分居上位分剛上而文柔之義也如此則賁自泰來乃卦變也故正義曰今謂此卦本泰卦故也是以隨蠱噬嗑賁之彖皆以卦變為主臨川則云艮乾德之所成離坤道之所成如此則亦可為旅亦可為諸卦蓋諸卦皆自乾坤索而成今獨言於離下艮上之賁者以自乾下坤上之泰來不得與諸卦同也且賁飾也交相飾謂之賁柔來而文剛則剛為質而柔為文也以剛為質而柔文之得中得正此六二所以亨賁也分剛上而文柔則柔為質而剛為文也以柔為質而剛文之又非中正之位可小事而已此上九所以小利有攸往也然由二卦之變論之則以六二上九二爻為主是為乾坤之變文也地道無成而代有終則是地來文天天往文地皆以天為主地在其中耳故獨曰天文也由一卦之成論之則上體為艮下體為離是為艮離之成文也故曰文明以止人文也天文主二卦之變人文由一卦之成故觀乎天文者可察時變觀乎人文者能化成天下此聖人觀賁之卦以用賁之道也以是知乾坤相文而獨歸之天蓋包羲畫乾之道也艮離因變而得人文蓋文王重卦之道也天人之分見矣易説漢上朱氏曰賁本泰也坤之上六來居於二以一柔而文二剛則柔得中而亨文柔德也故曰賁亨九二分而往於上以一剛而文二柔剛不得中而柔得中小者之利也然剛不往則小者無以濟之不能文矣故曰小利有攸往柔來文剛而得中分剛上而文柔柔者亦得中上下相文而不失乎中則賁也非過飾也故曰賁賁者文飾之道曰往曰來者往來相錯因其質而文之易傳曰質必有文自然之理理必有對待生生之本也有上則有下有此則有彼有質則有文一不獨立二則為文以天文言之無非剛柔交錯隂陽之精在地象物成列光耀離合皆剛柔也日陽也而為離月隂也而為坎緯星動者陽也而太白辰星為隂經星不動者隂也而析木鶉首為陽北斗振天二極不動故曰天文也以人文言之坤來文乾而成離坤文而離明文明也艮止也父剛子柔君剛臣柔夫剛婦柔朋友者剛柔之合長幼者剛柔之序五者交錯粲然成文天理也非人為也上下內外尊卑貴賤其文明而不亂各當其分而止矣文明以止則禍亂不生災害不作故日月軌道五星順序萬物自遂天文人文其理一也故曰文明以止人文也此合乾坤剛柔艮離兩體而言賁也聖人觀乎天文則知剛柔有常矣故南面而立視昏旦之星日月之次以知四時寒暑之變春震秋兊泰之時也夏離冬坎賁之時也泰易為賁四時互變時變之象也觀乎人文知天下之情必麗乎中正中正者理之所當得者也故彰之車服明之藻色天下自化矣柔麗乎中正者化成天下之道也乾天也二變艮成也二柔麗乎中正也仰觀天文俯觀人文不順乎天則反求乎人文而已矣此推原卦變以盡賁之道也在卦氣為八月故太玄準之以飾易傳又曰賁自泰來坤上之乾二乾二之坤上剛柔相文故曰賁天玄地黃玄黃者天地之雜也夫子筮賁愀然其色不平曰以其雜乎所謂雜者即乾上坤下相文之爻也又曰星月之光皆離之陽也故坎離以中相易而賁分剛上而文柔又曰王弼注賁曰坤之上六來居二位柔來文剛之義也乾之九二分居上位分剛上而文柔之義也此即卦變也而弼力詆卦變是終日數十而不知二五也並叢説又曰徐氏云天文也上脫剛柔交錯四字故彖總而釋之剛柔交錯天文也文明以止人文也王昭素胡安定皆用此義石徂徠不然之曰彖解亨小利有攸往中間更無異文即言天文者言剛柔也者天之文也天之文即剛柔二氣也二氣交錯成天之文柔來文剛分剛上而文柔者天文也臣曰日為陽月為隂嵗熒惑鎮為陽太白辰為隂斗魁為陽尾為隂天南為陽北為隂東為陽西為隂日月東行天西轉日自牽牛至東井分剛上而文柔也月自角至璧柔來而文剛也五星東行有遲有速北斗西行昏明迭建二十八宿分配五行各有隂陽四時隱見至於中外之宫無名之星河漢之精皆發乎隂陽者也則二氣交錯成天之文信矣天文圖説新安朱氏曰賁亨亨字疑衍天文也以卦變釋卦辭剛柔之交自然之象故曰天文先儒説天文上當有剛柔交錯四字理或然也文明以止又以卦德言之止謂各得其分化成天下極言賁道之大也本義賁彖辭先儒云天文也上有剛柔相錯四字恐是有之方與下文相似且得分曉語録東萊吕氏曰彖天下之人先須看其基本如何剛本強也文之以柔故無不亨柔本弱也文之以剛則小利有攸往文者文飾之也因其質之厚薄而加飾耳文王聖人也得尚父佐輔之故為大聖人之事業伊尹周公聖人也所佐者太甲成王而已則亦止於太甲成王之事業日月星辰雲漢之章天之文也父子兄弟君臣朋友人之文也此理之在天人常昭然未嘗滅沒人惟不加考究則不見其為文耳此一段當看觀字唯能觀察此理則在天者可以知時變在人者可以化成天下也易説象曰山下有火賁君子以明庶政無敢折獄伊川先生曰山者草木百物之一無之字所聚生也火在其一無其字下而上照庶類皆被其光明為賁飾之象也君子觀山下有火明照之象以修明其庶政成文明之治而無果敢於折獄也折獄者人君之所致慎也豈可恃其一無其字明而輕自用乎乃聖人之用心也為戒深矣象之所取惟以山下有火明照庶物以用明為戒而賁亦自有無敢折獄之義折獄者専用情實有文飾則沒其情矣故無敢用文以折獄也易傳橫渠先生曰無敢折獄者明不兼於下民未孚也故止可明政以示民耳易説藍田吕氏曰山下有火可以燭乎細微而不可以及遠庶政之目細微不遺獄情逺而難知也龜山楊氏曰文明以止賁之象也觀文明之象則可以明庶政用文非折獄之義也易説白雲郭氏曰本乎天者親上火之性也本乎地者親下山之德也山在上而親下火在下而親上是又相飾成文之象也聖人之德無加於明文明如此故可以明庶政然無敢折獄者有其象而無其才故也噬嗑以離明而明罰豐以離明而折獄賁之文明是有其象也噬嗑動而明豐明以動而賁文明以止是無其才也且噬嗑與賁皆有頤中有物之象而賁無除間之義者蓋動則間當除而止則不能除間也洪範曰龜筮共違于人用靜吉用作凶亦猶為間雖一而有動止不同之義也易説漢上朱氏曰山下有火託物以明異乎晉之自昭明德也賁飾之象君子體之以明庶政者初二三四正坤為衆政者正也無敢折獄者折獄之道在於用常人吉士哀矜獄情不恃明察也不尚文飾也或曰噬嗑亦明也明罰何也曰噬嗑六三九四六五上九不正不正者罰之賁無敢折獄下四爻正也庶政明而後折獄乃無枉濫易傳新安朱氏曰山下有火明不及逺明庶政事之小者折獄事之大者內離明而外艮止故取象如此本義問山下有火賁君子以明庶政無敢折獄本義云明庶政是明之小者無折獄是明之大者此専是就象取義伊川説此則又就賁飾上説不知二説可相備否先王曰明庶政是就離上説無敢折獄是就艮上説離明在內艮止在外則是事之小者可以用明折獄是大事一折便了有止之義明在內不能及他故止而不敢折也大凡就象中説則意味長若懸空説道理雖説得去亦不甚親切也問賁君子以明庶政無敢折獄先生曰此與旅卦都説刑獄事但爭艮與離之在內外故其説相反止在外明在內故明政而不敢折獄止在內明在外故明慎用刑而不留獄又曰粗言之如今州縣治獄禁勘審覆自有許多節次過乎此而不決便是留獄不及乎此而決便是敢於折獄書云要囚至于旬時他自是有許多時日此一段與周禮秋官同意山下有火賁離下艮上內明外止雖然內明是個止殺底明所以不敢用其明以折獄此與山上有火旅君子以明慎用刑而不留獄正相反賁內明外止旅外明內止艮下離上故其象不同如此僴問苟明見其情罪之是非亦何難於折獄曰是他自有個象如此遇著此象底便用如此然獄亦自有十三八棒便了底亦有須待囚訊鞫勘録問結證而後了底書曰要囚服念五六日至于旬時丕蔽要囚周禮秋官亦有此數句便是有合如此者若獄未具而決之是所謂敢折獄也若獄已具而留之不決是所謂留獄也不留獄者謂囚訊結證已畢而即決之也並語録東萊吕氏曰山下有火賁火在山下山上草木皆被其光彩是以謂之賁賁文也山下有火山上方有光輝猶文章必從根極中來聰明不可恃人多恃其聰明以折獄故失之於過君子雖聰明而不敢自恃其明故於獄無敢折大抵無敢折獄者非謂延淹退縮也乃周詳審察常若不明者之所為故曰無敢折獄易説初九賁其趾舍車而徒象曰舍車而徒義弗乘也伊川先生曰初九以剛陽居明體而處下君子有剛明之德而在下者也君子在無位之地無所施於天下惟自賁飾其所行而已趾取在下而所以行也君子修飾之道正其所行守節處義其行不苟義或不當則舍車輿而寧徒行衆人之所羞而君子以為賁也舍車而徒之義兼於比應取之初比二而應四應四正也與二非正也九之剛明守義不近與於二而逺應於四舍易而從難如舍車而徒行也守節義君子之賁也是故君子所賁世俗所羞世俗所貴一作賁君子所賤以車徒為言者因趾與行為義也舍車而徒行者於義不可以乘也初應四正也從二非正也近舍二之易而從四之難舍車而徒行也君子之賁守其義而已並易傳橫渠先生曰文明之德以貴居賤修飾於下故曰賁其趾義非苟進故曰舍車而徒易説藍田吕氏曰居賁之時以剛居下其體文明致飾於其足者也致飾其足不可汚以不義不義之車不若行之潔也龜山楊氏曰居一卦之下趾之象也賁其趾徒行之象也不為臣不見諸侯故召之則不往往役義也故庶人召之亦往舍車而徒者也君子之自賁其行豈有待乎外哉守義不渝而已故軒車不容巷子貢以為愧仁義之慝輿馬之飾原憲不為也此舍車而徒之謂歟易説白雲郭氏曰趾在下者也徒行賤者之事也皆初之象也君子以義為榮而不以徒行為辱舍生取義尚有之況車徒之間乎是以古之人祿以天下弗顧繫馬千駟弗受一介不以與人一介不以取諸人惟義所在而已故初九以賤自居舍車而徒所謂窮不失義者矣雖徒行也乃以義飾其趾者乎二之虛中猶載我者也舍二應四義弗乘也若夫小人不義而乘盜之招也雖慶氏之車何有於我哉孔子曰不義而富且貴於我如浮雲孟子曰萬鍾不辨禮義而受之萬鍾於我何加焉充舍車而徒之義則義不可勝用然後孔孟之學可得而至也易説漢上朱氏曰艮為指初在下體之下動而應足趾也坤為輿二坎為輪車也四震為大塗為足足趾行乎大塗者徒行也初九於六二為近於六四為逺舍二車弗乘寧徒行而弗辭者六二非正應義弗乘也夫車所以賁其行義弗當乘而乘之辱也非賁也是以寧徒行雖跣足賁也古之人有弗肯乘人之車緩步以當車者守義故也易傳五峯胡氏曰季氏使閔子騫為費宰閔子騫曰善為我辭焉如有復我者則吾必在汶上矣王烈寓於遼東公孫度欲以為吏烈為商賈以自穢乃免易外傳新安朱氏曰剛德明體自賁於下為舍非道之車而安於徒步之象占者自處當如是也君子之取舍決於義而已本義東萊吕氏曰大抵人皆以外物為光華而君子必思所以久逺之道初九一爻本當從二之甚近不以二光華可慕而逺從四則知久逺之道在此矣夫舍車而徒非謂有車而不之乘以義之不當故也象又恐人以道義自負驕富貴羞王公故又曰義弗乘蓋曰吾非輕富貴車服為不足道但義不當乘之耳義當乘則乘之矣若義之所在而乘之則亦足以光華此足以見君子不有外物之意易説六二賁其須象曰賁其須與上興也伊川先生曰卦之為賁雖由兩爻之變而文明之義為重一實賁之主也故主言賁之道飾於物者不能大變其質也因其質而加飾耳故取須義須隨頤而動者也動止惟繫於一無於字所附猶善惡不由於賁也二之文明唯為賁飾善惡則繫其質也以須為象者謂其與上同興也隨上而動動止惟繫所附也猶加飾於物因其質而賁之善惡在其質也並易傳橫渠先生曰賁其須起意在上也易説藍田吕氏曰須以柔附其上為上之賁者也龜山楊氏曰離麗也隂麗乎陽也二雖為文明之主然以隂麗陽而已其為賁也不能為無有須之象焉須附頤而生與上俱興者也易説兼山郭氏曰安定先生謂須待也君子之道不可以躁進也蓋上下相文之時六二以文明而麗乎下柔順中正無私無應靜而有待物必有致飾者夫待而後應與上同興夫何咎焉不曰吉凶初無失得故也易説白雲郭氏曰先人曰安定先生謂須待也君子之道不可以躁進也蓋上下相文之時六二以文明而麗乎下柔順中正無私無應靜而有待物必有致飾者雍曰以王輔嗣之清談猶以須為上附之物獨安定以為須待然後賁之六二可得而言也六二文明之主也有待而興智之事也然其須也乃所以為賁歟與上興者柔而無應故須九三剛為之助則可興於君矣易説漢上朱氏曰二言賁飾之道毛在頤曰須在口曰髭在頰曰髯三有頤體二柔在頤下須之象二三剛柔相賁賁其須也夫文不虛生譬之須生於頤血盛則繁滋血衰則減耗非增益為之飾與上興也與相與也二三相賁而成震起也柔道上行有興之象是故冠辨衣裳黼黻文章雕琢刻鏤玄黃之飾因其有尊卑貴賤之實而明之實既不同其文亦異不豐不殺惟其稱也棘子成曰質而已矣何以文為不知文待質而後興也易傳五峯胡氏曰六二文明賁之主其質隂柔隨質之善惡而賁之耳故不能變其質也如叔孫通制禮儀因漢髙所能行者而已易外傳新安朱氏曰二以隂柔居中正三以陽剛而得正皆無應與故二附三而動有賁須之象占者宜從上之陽剛而動也本義東萊吕氏曰大凡有本則有文夫人之須不離於頤頷文生於本無本之文則不足貴易説九三賁如濡如永貞吉象曰永貞之吉終莫之陵也伊川先生曰三處文明之極與二四二隂間處相賁賁之盛者也故云賁如如辭助也賁飾之盛光彩潤澤故云濡如光彩之盛則有潤澤詩云麀鹿濯濯永貞吉三與二四非正應相比而成相賁故戒以常永貞正賁者飾也賁飾之事難乎常也故永貞則吉三與四相賁又下比於二二柔文一剛上下交賁為賁之盛也賁飾而不常且非正一有則字人所陵侮也故戒能永貞則吉也其賁既常而正誰能陵之乎並易傳橫渠先生曰上下皆柔無物陵犯然不可邪妄自肆故永貞然後終保無悔易説藍田吕氏曰賁如濡如賁之盛也居文明之極處二隂之間交錯成文至於潤澤可謂盛矣上陵下替文不明也知文明之盛别嫌明微等威以辨守是不變至於悠久物莫之陵也龜山楊氏曰九三剛得位有其質矣而間乎二隂之間上下交賁之故曰賁如濡如也居文明之極為二隂所濡非正固而移其質則凶之道也故惟永正乃吉永正則其守固矣非二隂所能移也其孰能陵之易説白雲郭氏曰三以剛德居文明之極其不待致飾而賁於自然者故曰賁如也濡如有相與之義二足以飾三而三亦所以飾二之須也賁之時上下相文二三既以剛柔盡須濡之義得賁之道矣能永保而固守何吉如之終孰得而陵之哉相與非其道多致陵此言致飾故終莫之陵也易説漢上朱氏曰六二以柔賁剛賁如也九三坎體以剛賁柔坎水濡之澤潤而有光耀濡如也剛柔相賁文飾之盛禮之致隆者也然二非正應以近相得故相賁相濡以成文九三守正不動二亦柔麗乎中正故吉三賁將變動而失正則上且自外而陵之禮者法之大分去爭奪之道也永正誰能陵之今夫富商之財足以金玉其車文錯其服而木楗葦藩過於朝而不歉者知禮法之不可以干也苟失其正乘其間者有競心焉安能自免於淩轢乎故終莫之陵者永貞之吉三下卦之終三不動永貞之象易傳五峯胡氏曰三處文明之極陽竒隂耦陽居其中隂陽交合情文恱澤賁之盛也如舜得十六相文王得四友漢髙得三傑光武得二十八將唐太宗得房杜王魏君臣相輔光被天下後世而膏澤下於斯民賁如濡如也方世之亂英雄角逐君擇其臣臣擇其君非素有定分也皆以情義意氣決相從耳苟不長守正固而繼之以疑阻猜嫌則君臣必不相保未有能終者也安得吉如陳靈之殺泄冶趙遷之殺李牧袁紹之殺田豐是也終為人所陵辱矣易外傳新安朱氏曰一陽居二隂之間得其賁而潤澤者也然不可溺於所安故有永貞之戒本義東萊吕氏曰九三居內卦之極又有離體故為文明之極故曰賁如濡如然又曰永貞吉何也蓋文之極須當守以正大凡有文之人自為人所重而此象乃曰終莫之陵者此蓋有説文士雖為人所愛而亦為人所薄若唐之王楊盧駱雖有文采終為人薄者以不正故耳若孔子孟子非不文也而後人仰之莫不肅然而敬者以其永正也六經之文亦然易説六四賁如皤如白馬翰如匪寇婚媾象曰六四當位疑也匪寇婚媾終無尤也伊川先生曰四與初為正應相賁者也本當賁如而為三所隔故不獲相賁而皤如皤白也未獲賁也馬在下而動者也未獲相賁故云白馬其從正應之志如飛故云翰如匪為九三之寇讎所隔則婚媾遂其相親矣己之所乘與動於下者馬之象也初四正應終必獲親第始為其間隔耳四與初相逺而三介於其間是所當之位為一無為字可疑也雖為三寇讎所隔未得親於婚媾然其正應理直義勝終必得合故云終無尤也尤怨也終得相賁故無怨尤也並易傳橫渠先生曰以隂居隂性為艮止故志堅行潔終無尤纍易説藍田吕氏曰六四以隂居隂當乎位質也以四應初剛柔相錯文也雖與初應而近比九三近而不相得以為已寇賁如者欲應初也皤如者安於當位以辟寇也有是疑也故或文或質然潔白其行以待之寇卒不可得而犯則婚媾諧矣龜山楊氏曰剛上文柔而為艮艮止也剛止乎上而四居其下未獲賁也故賁如皤如皤白也雖未獲賁而從上之志已行矣故曰白馬翰如言從之疾也然分剛文柔雖止乎上匪寇也是乃婚媾也終必獲賁矣故無尤也易説白雲郭氏曰賁雖剛柔相文然陽道常饒故足以兼人隂道常乏故有受飾之理四雖自飾矣亦有皤如之質將受物之飾猶六二之須丘園之賁皆虛已待物之象也初九以剛強之才飾其趾而來翰如之馬也馬之來所以飾四之皤四亦以飾馬之白皆有受飾之質而交相文也此其所以為賁也凡剛自內進柔必疑之蓋力不足而居上常懼人之寇已也初以剛下柔而來應匪寇也婚媾之道也六四雖多懼懷疑終何尤哉伊川云翰從之疾也易説漢上朱氏曰六四初九以正相賁也六四之柔下賁初九賁如也初九之剛上賁六四成巽六二為須巽為白皤如也言初之賁四純白相賁飾也六四當位伏巽為不果有疑志也四所以疑者初間於三坎為盜盜據內外之際四有乘剛之險初四未獲賁也雖未獲賁而應之志其疾如白馬翰如飛騰而赴之匪九三之寇則遂婚媾矣初離為雉之四巽為雞翰如也翰剛爻也震為作足之馬震變巽故曰白馬翰如震長男離中女男女合故曰婚媾純白無偽誰能間之始疑而終合故曰終無尤也四之所尤者三也三下卦之終易傳新安朱氏曰皤白也馬人所乘人白則馬亦白矣四與初相賁者乃為九三所隔而不得遂故皤如而其往求之心如飛翰之疾也然九三剛正非為寇者也乃求婚媾耳故其象如此當位疑謂所當之位可疑也終無尤謂若守正而不與亦無它患也本義言此爻無所賁飾其馬亦白也言無飾之象如此語録東萊吕氏曰六四白馬翰如此一句須當看且四與初為正應為九三之剛間隔故未婚媾初四雖為九三間隔然其從正應之志如馬之飛故後必合凡人之於事其所當合者終不為人所間然亦不可以為當合而不思慮也必如馬之飛翰而後可易説六五賁于丘園束帛戔戔吝終吉象曰六五之吉有喜也伊川先生曰六五以隂柔之質密比於上九剛陽之賢隂比於陽復無所係應從之者也受賁於上九也自古設險守國故城壘多依丘坂丘謂在外而近且髙者園圃之地最近城邑亦在外而近者丘園謂在外而近者指上九也六五雖居君位而隂柔之才不足自守與上之剛陽相比而志從焉獲賁於外比之賢賁于丘園也若能受賁於上九受一作隨其裁制如束帛而一無而字戔戔則雖其柔弱不能自為為可吝少然能從於人成賁之功終獲其吉也戔戔翦裁分裂之狀帛未用則束之故謂之束帛及其制為衣服必翦裁分裂戔戔然束帛喻六五本質戔戔謂受人翦製而成用也其資於人與蒙同而蒙不言吝者蓋童蒙而賴於人乃其宜也非童幼而資賁於人為可吝耳然享其功終為吉也能從人以成賁之功享其吉美是有喜也並易傳橫渠先生曰隂陽相因物所阜生柔中之德比於上九上九敦素因可恃而致富雖為悔一作隘吝然獲其吉也其道上行故曰丘園易説藍田吕氏曰六五賁飾之時以處尊位致乎文者也以柔居中其體則止文極知反能止乎中矣飾乎丘園樹藝而已家給人足束帛所以戔戔既知反本則不妄費能知吝而終吉者也文多滅質反飾其本以止乎中而保吉故可喜也龜山楊氏曰先王備禮廣樂藻飾治具所以賁天下也六五柔履尊位而賁于丘園則所賁小矣束帛戔戔用禮薄矣非人君所以賁天下之道也故吝夫丘園已所有也六二正應之象然二為文明之主而五賁之得所賁矣故終吉而有喜易説兼山郭氏曰丘園以地言之則生財之本也以人言之則尚德之人也夫得賢者則能立太平之基亦致治之本也故六五致飾於本其末有不盛者乎尚且束帛以卷之不嫌於損少亦儉而用禮之意也儉而用禮則生物不匱而賢者不以沒禮傷廉而違之故終有喜也彼致飾於物至於窮侈極美與夫得賢於畎畝之中幡然改曰使是君為堯舜之君者可同言之哉易説白雲郭氏曰六五為賁之主及于丘園所飾逺矣非若二三之須濡初四之私應也其道豈不廣且大哉聖人不遐遺之義也逺且不遺況邇者乎丘園尚及之況朝廷之上乎故商之賁也及於耕築周之賁也及於漁釣賁于丘園乃所以飾天下國家非特下飾窮士而已束帛戔戔幣聘之禮湯聘伊尹文王聘吕望實幣帛箱篚之意也子夏傳云三元二纁象隂陽為束帛或以戔戔為多何哉馬氏云戔戔委積貌許慎以戔從二戈蓋謂有相次不一之意四方聘賢前後相望於道如有次非一所也然以幣聘賢猶為吝道故孟子言仁人不可以貨取而在禮不廢故賢者至而終吉也人君與天下之喜莫喜於得賢故君子能長育人材則天下喜樂之而詩人於得賢與賢育材之際未嘗不以喜樂壽考終之蓋六五之吉有喜之義也先儒多以賁于丘園為聘士獨王氏孔氏以為國之道不尚華侈而貴儉約其説不同然書言野無遺賢詩有考槃在澗在阿之刺則丘園冝為賢者窮處之地必曰賁于丘園蓋示無遺賢之意為國之道孰大於此孰美於此天下之治孰不本於此故在賁之時為君道之至廣大也在易言于野于郊于陸于陵之類皆誠為郊野陵陸何獨假丘園以為質素也況質素為上九之事六五正當賁之盛大之時言賁之盛大無過於得賢及逺為國之休光若從王孔二家説云賁飾於束帛珍寶則質素之道乃隕落若設飾于丘園質素之所束帛乃戔戔衆多此務在積帛之多即管墨喜利之學貪鄙小道豈足以充賁之六五之義乎在節之彖曰節以制度不傷財不害民聖人之崇尚節儉恐傷財害民而已非有望於束帛珍寶之多也聖人所寶惟賢苟有意於束帛戔戔之多又安足以為聖人也哉故非聘賢之君不足以當六五之位王氏之言害義孔氏膠於爻象無待士之文丘園之義幾不復聞矣易説漢上朱氏曰艮為山為果蓏山半為丘而有果蓏丘園也五尊位柔中外資上九之賢故曰賁于丘園坤為帛艮手束之束帛五兩坤數也三玄二纁天地竒耦之文上五相賁之象戔戔委積貌坤為衆束帛其上多而委積用之以外聘故曰束帛戔戔夫五得尊位當賁天下六二不應近比上九吝道也然柔中厚禮上九自外賁之始吝而終吉正則吉也隂陽得位曰喜上來賁五陽得位而正喜豈偽為之哉好賢樂善有得於誠心故曰六五之吉有喜也易傳五峯胡氏曰德宗陸贄易外傳新安朱氏曰六五柔中為賁之主敦本尚實得賁之道故有丘園之象然隂性吝嗇故有束帛戔戔之象束帛薄物戔戔淺小之意人而如此雖可羞吝然禮奢寧儉故得終吉本義問賁于丘園束帛戔戔吝終吉曰當賁飾華盛之時而安于丘園朴陋之事其道雖可吝而終則有吉也問六五之吉何以有喜曰終吉所以有喜問賁于丘園束帛戔戔吝終吉曰上兩句只是當來卦辭非主事而言看如何用皆有這個道理或曰賁于丘園安定作敦本説答云某意正要如此或以戔戔為盛多之貌曰非也戔戔者淺小之義凡淺字箋字皆從戔問淺小是儉之義否曰然所以下文云吝終吉吝雖不好看然終却吉伊川此卦傳大有牽強處束帛解作翦裁恐無此理且如今將束帛之説示人教人解人決不思慮從翦裁上去賁于丘園是人務實底束帛戔戔是賁得不甚大所以説吝兩句是兩意問九五賁于丘園是柔中居尊敦本尚實故有賁于丘園之象然隂性吝嗇故有束帛戔戔之象戔戔淺小貌人而如此雖可羞吝然禮奢寧儉故得終吉此與程傳指丘園為上九者如何先生曰舊説多作以束帛聘在外之賢但若如此説則與吝終吉文義不協今程傳所指亦然蓋戔戔自是淺小之意如從水從戔則為淺從人從戔則為俴從貝從戔則為賤皆淺小意程傳作翦裁已是迀回又説丘園更覺牽強如本義所説却似與吝終吉文義稍協又問白賁無咎上得志也何謂得志先生曰居卦之上在事之外不假文飾而有自然之文便自優遊自得也黃銖曰如本義説六五上九兩爻却是賁極反本之意先生曰六五已有反本之漸故曰丘園又曰束帛戔戔至上九白賁則反本而復於無飾矣蓋皆賁飾之象也又曰賁于丘園是務農為本之義問伊川解賁于丘園指上九而言看來似好蓋賁三隂皆受賁於陽不應此爻獨異而作敦本務實説也先生曰如何丘園便能賁人束帛戔戔它解作翦裁之象尤艱曲説不去這八字只平白在這裏若似他説則曲折多意思逺舊説指上九作髙尚隱于丘園之賢而用束帛之禮聘召之若不用某説則此説似近它將丘園作上九之象束帛戔戔作翦裁分裂之象則與象意大相逺也問賁六五賁于丘園是在艮體故安止于丘園而不復有外賁之象先生曰雖是止體亦是上比於九漸漸到極處若一向賁飾去亦自不好須是收斂方得又問敦本務實莫是反朴還淳之義否先生曰賁取賁飾之義它今却來賁田園為農圃之事當賁之時似若鄙吝然儉約終得吉吉則有喜故象云有喜也並語録東萊吕氏曰大凡居君位者當使我裁制於人不可受人之裁制今六五雖居君位而隂柔之才不足自守故求上九之賢而資比之故云吝然自知其才柔弱不足有為而資求於人與不求者固異矣故曰終吉易説上九白賁無咎象曰白賁無咎上得志也伊川先生曰上九賁之極也賁飾之極則失於華偽唯能質白其賁則無過飾之咎白素也尚質素則不失其本真所謂尚質素者非無飾也不使華沒實耳白賁無咎以其在上而得志也上九為得志者在上而文柔成賁之功六五之君又受其賁故雖居無位之地而實尸賁之功為得志也與它卦居極者異矣既在上而得志處賁之極將有華偽失實之咎故戒以質素則無咎飾不可過也並易傳橫渠先生曰上一作止而居髙潔無所纍為物所貴故曰上得志也易説藍田吕氏曰上九以陽居上至白之象也畫繪之事後素功極乎藻絢必尚素功者衆色淆亂非白無以别之也畫繪至於素功飾之道盡矣上之志得矣龜山楊氏曰賁無色色色者也白賁受色者也惟無色為能賁有質為能受上九賁之極也剛止乎上有其質矣而文明麗之受賁者也故無咎而得志易説兼山郭氏曰上九見素抱朴成德之始也明白入素成德之終也雜卦曰賁無色也孔子曰先進於禮樂野人也後進於禮樂君子也如用之則吾從先進又曰文勝質則史質勝文則野文質彬彬然後君子聖人之於質文何如此之相戾也曰聖人之尚質自然之質也聖人之貴文當文之文也故曰忠信禮之質也義禮禮之文也苟無忠信不可以虛拘者此也如賁之文隂陽上下之相文自然之文也至於文明而不以止人為之偽也人為之偽殆不若白賁之為得也禮曰有以文為貴者有以素為貴者天子龍衮諸侯黼大夫黻士元衣纁裳天子之冕朱緑藻十有二旒諸侯九上大夫七下大夫五士三此以文為貴也有以素為貴者至恭無文父黨無容大圭不琢大羹不和大路素而越席犧尊疏布冪樿杓此以素為貴也然後知質者自然之質文者當文之文孔子曰惡衣服而致美乎黻冕卑宫室而盡力乎溝洫禹吾無間然矣此之謂也故三代之王忠質相先救時之弊也方賁之時上下相文則文既勝矣白賁無咎其救僿之道歟然則人之文也率歸之偽可乎曰文明以止人文也至於偽何可尚也詩云綿蠻黃鳥止于丘隅子曰於止知其所止可以人而不如鳥乎為人君止於仁為人臣止於敬為人子止於孝為人父止於慈與國人交止於信未有不知止者也故孔子之筮曰白冝止白黑宜止黑其有取而言之哉易説白雲郭氏曰先人曰賁之文隂陽上下之相文自然之文也至於文明而不以止人為之偽也人為之偽殆不若白賁之為得也禮有以文為貴者有以素為貴者孔子曰惡衣服而致美乎黻冕卑宫室而盡力乎溝洫禹吾無間然矣此之謂也故三代之王忠質相先救時之弊也方賁之時文既勝矣白賁無咎其救僿之道歟然則人之文也率歸之偽可乎詩云綿蠻黃鳥止于丘隅子曰於止知其所止可以人而不如鳥乎為人君止於仁為人臣止於敬為人子止於孝為人父止於慈與國人交止於信未有不知止者也知止則誠而無偽矣雍曰大哉白賁之義也立德之始也治天下之本也且以一性言之天命之謂性也聖人懼其質而近於禽獸故假賁飾以文之文之不已於是乎窮人欲而滅天理是豈人之性也哉知白賁之義則知天命之性知天命之性則知率性之道知率性之道則知修道之教此中庸之道所以立也以天下言之則忠之弊救以質質之弊救以文文之不已其弊僿矣大者驕奢淫泆於其上小者放辟邪侈於其下是豈聖人之教哉知白賁之道則救僿以忠於以繼周雖百世可知此三代之治可以復也不然則君臣上下沈湎淫泆卿士師師非度從流忘反尚何化成天下之有乎故彖言文明以止所以止其初上九言白賁無咎所以復其終其義一也方未賁之時則白賁為非既賁之後乃無咎矣此獨上九之事故象言上得志蓋得上九之志也易説漢上朱氏曰上九賁之極有不賁者焉聖人因天地自然之文立王制為天下之大隆是非之封界分職名象之所起也其志在於著誠去偽使人各由其情不失本真矣末流之弊尚文勝質而本真衰焉豈賁飾之初志哉志者動於中之謂也上九變動反三三有伏巽而離體離者乾再索而成巽之變也巽為白離為文有色生於無色故曰白賁白質也賁文也五色本於素五味本於淡五聲本於虛質者文之本上九變動而反本則文何由勝咎何由有我志得矣故曰大禮必簡至敬無文然貴本之謂文親用之謂理兩者合而成文以歸太一夫是之謂大隆故酒醴之美玄酒明水之尚黼黻文繡之美疏布之尚莞簟之安而蒲越稿鞂之尚丹漆雕幾之美而素車之尚荀子曰禮始於脫成於文終於稅夫終則有始質者文之始上九之白賁文在其中矣變而通三代損益之道是以無咎而得志不然事生送死而無敬文墨子之道烏得為無咎賁四至上其變皆以巽人文相賁以禮讓為本易傳新安朱氏曰賁極反本復於無色善補過矣故其象占如此本義白賁無咎據剛上文柔是不當説自然而卦之取象不恁地拘各自説一義問白賁無咎曰賁飾之事太盛則有咎所以處太盛之終則歸於白賁勢當然也語録東萊吕氏曰上九伊川曰惟能質白其賁則無過飾之咎此一過字須當看易説合訂刪補大易集義粹言卷二十六
