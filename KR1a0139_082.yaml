body:
  text: 合訂刪補大易集義粹言卷八十頭等侍衛納喇性德編序卦傳康節先生曰乾坤天地之本坎離天地之用是以易始於乾坤中於坎離終於既未濟而泰否為上經之中咸恆為下經之首皆言乎其用也乾坤坎離為上篇之用兊艮震巽為下篇之用也頤中孚大過小過為二篇之正也易之首於乾坤中於坎離終於水火之交不交皆至理也自乾坤至坎離以天道也自咸恆至既濟未濟以人事也並觀物外篇伊川先生曰韓康伯謂序卦非易之藴此不合道遊定夫所録或問劉牧言上經言形器以上事下經言形器以下事曰非也上經言雲雷屯雲雷豈無形邪曰牧又謂上經是天地生萬物下經是男女生萬物曰天地中只是一箇生人之生於男女即是天地之生安得為異曰牧又謂乾坤與坎離男女同生曰非也譬如父母生男女豈男女與父母同生既有乾坤方三索而得六子若曰乾坤生時六子生理自有則有此理謂乾坤坎離同生豈有此事既是同生則何言六子邪問劉牧以下經四卦相交如何曰怎生地交若論相交豈特四卦如屯蒙師比皆是相交卦之序皆有義理有相反者有相生者爻變則義變也劉牧言兩卦相比上經二隂二陽相交下經四陽四隂相交是否曰八卦已相交了及重卦只取二象相交為義豈又於卦畫相交也易須是默識心通只如此窮文義徒費力並劉元承手編橫渠先生曰序卦相受聖人作易須有次序序卦無足疑序卦不可謂非聖人之緼今欲安置一物猶求審處况聖人之於易其間雖無極至精義大槩皆有意思觀聖人之書須布遍細密如是大匠豈以一斧可知哉並易説白雲郭氏曰孔穎達曰六十四卦二二相耦非覆即變覆者表裏視之遂成兩卦屯蒙需訟之類皆是也變者反覆唯成一卦則變以對之乾坤坎離大過頥中孚小過八者是也此蓋卦變反對之象先天之學詳矣雖出於變象豈無其序哉故聖人所以序之也八卦之序有二帝出乎震一章八方之序也乾天也一章成卦先後之序也先序八卦於上故序六十四卦於此八卦序包犧之道六十四卦序文王之道也道至難明也聖人判之為三才離之為八卦使有目者可見有耳者可聞亦云至矣於是又為之説為之序三才八卦之道纎介不遺而言易者尚或滯於空言而乖亂正道或溺於術數之用不明三聖人之大方斯學者所宜深戒也易説漢上朱氏曰文王作易以乾坤坎離為上篇之用以艮兊震巽為下篇之用上篇終於坎離下篇終於既濟未濟頥大過小過中孚為二篇之正乾坤者易之本坎離者乾坤之用離肖乾坎肖坤中孚肖乾小過肖坤頤肖離大過肖坎既濟坎離之交未濟坎離之合坎離所以為乾坤用者得天地之中也斯聖人酬酢不倚千變萬化不離乎其中歟康節曰至哉文王之作易也其得天地之用乎至夫子序卦然後明生生不窮而天地之藴盡矣故太玄準之以玄圖易傳新安朱氏曰或問序卦非聖人之書信乎曰此沙隨程氏之説也先儒以為非聖人之藴某以為謂之非聖人之精則可謂非易之藴則不可周子分精與藴字甚分明序卦却正是易之藴事事夾雜都有在裏面問如何謂易之精曰如易有太極是生兩儀兩儀生四象四象生八卦這是易之精問如序卦中亦見消長進退之義喚作不是精不得曰此正是事事夾雜有在裏面正是藴須是自一箇生出以至於無窮便是精序卦首言天地萬物男女夫婦是因咸恆為夫婦之道説起非如舊人分天道人事之説大率上經用乾坤坎離為始終下經便當用艮兊巽震為始終問序卦中有一二不可曉處如六十四卦獨不言咸卦何也曰夫婦之道即咸也問恐亦如上經不言乾坤但言天地則乾坤可見否曰然問不養則不可以動故受之以大過何也曰動則過矣故小過亦曰有其信者必行之故受之以小過問物不可以終壯故受之以晉壯與晉何别曰不但如此壯而已又更須進一步也問易上經三十卦下經三十四卦多寡不均何也曰卦有正對有反對乾坤坎離頤大過中孚小過八卦正對也正對不變故反覆觀之止成八卦其餘五十六卦反對也反對者皆變故反覆觀之共二十八卦以正對卦合反對卦觀之總而為三十六卦其在上經不變卦凡六乾坤坎離頤大過是也自屯蒙而下二十四卦反之則為十二以十二而加六則十八也其在下經不變卦凡二中孚小過是也自咸恆而下三十二卦反之則為十六以十六而加二亦十八也其多寡之數則未嘗不均也並語録有天地然後萬物生焉盈天地之間者惟萬物故受之以屯屯者盈也屯者物之始生也伊川先生曰萬物始生鬱結未通故為盈塞於天地之問至通暢茂盛則塞意亡矣天地生萬物屯物之始生故繼乾坤之後易傳橫渠先生曰盈天地之間者唯萬物聚而不得出故盈雖雷亦然易説廣漢張氏曰天地者萬物父母故生萬物然天覆乎上地載乎下而萬物在天地間充滿宇宙此盈天地之間者唯萬物也夫天地之氣始交而隂陽之氣甄陶孕育勾而未萌甲而未拆此屯所以為物之始生也易説白雲郭氏曰三才之序先天地而後萬物萬物盈天地之間人居萬物之中聖人之道周萬物而濟天下則萬物復附於聖人故聖人與天地相似是以萬物盈天地聖人之道亦盈天地物盡則聖人之道盡孟子所謂塞乎天地之間者也易卦三才也乾坤為天地唯人事不齊故自屯以往皆為人道然後可配乾坤以見乾坤之大非諸卦比也屯為人事之始故次於坤物之始生屯之始也其究則盈也卦或有一義或二三義言於此者或取其一或二三取之不必皆同並易説漢上朱氏曰上篇以乾坤坎離為用天地之生萬物也而有艮兊震巽焉天地萬物具而人道備矣下篇以艮兊震巽為用有萬物而後男女夫婦也而有乾坤坎離焉人道備而天地萬物備矣故曰三才同科厚薄相劘韓康伯不領此旨謂豈有天道人事偏於上下哉讀序卦而不察者也雲行雷動動必滿盈故曰屯者盈也震者物之始生坎者難也故曰屯者物之始生也易傳物生必蒙故受之以蒙蒙者蒙也物之稚也伊川先生曰屯者物之始生物始生稚小蒙昧未發蒙所以次屯也易傳橫渠先生曰物生必蒙者蒙冒未肆一作蒙稚者蒙昧未肆易説廣漢張氏曰其始生也蒙雜而未著故受之以蒙也蒙者蒙也此始生之初自然而蒙也異乎物之蒙而蒙也易説白雲郭氏曰上蒙卦也下蒙物之蒙也物以稚而蒙也易説漢上朱氏曰蒙冥昧也物生者必始於冥昧勾萌胎卵是也故次之以蒙蒙童蒙也物如此稚也易傳物稚不可不養也故受之以需需者飲食之道也飲食必有訟故受之以訟伊川先生曰夫物之幼稚必待養而成養物之所需者飲食也故曰需者飲食之道也雲上於天有蒸潤之象飲食所以潤益於物故需為飲食之道所以次蒙也人之所需者飲食既有所需爭所由起也訟所以次需也並易傳橫渠先生曰需者飲食之道也雲上於天物皆有待之象易説廣漢張氏曰此物之幼稚不可不養者乎故受之以需需者乃養之以中正不失其隂陽之和為飲食之道也夫飲食人之大欲不得其欲則必致訟故受之以訟易説白雲郭氏曰物稚不可不養故天地待聖人以成能養人為事也飲食欲也欲為訟之始易説漢上朱氏曰物稚而無以養之則夭閼不遂蓄德養才者亦然故次之以需震坎為酒兊為口有飲食之道飲食所以養也飲食必有訟乾餱以愆豕酒生禍有血氣者必有爭心故次之以訟易傳訟必有衆起故受之以師師者衆也衆必有所比故受之以比比者比也比必有所畜故受之以小畜伊川先生曰師之興由有爭也所以次訟也比親輔也人之類必相親輔然後能安故既有衆則必有所比比所以次師也物相比附則為聚聚畜也又相親比則志相畜小畜所以次比也畜止也止則聚矣並易傳廣漢張氏曰烹黿弗與遂萌篡弒之心採桑侵疆乃起戰爭之患故始乎訟而衆起故受之以師也夫自五人為伍積而至萬二千五百人為師此師所以為衆然而無比安能統而歸於一乎故受之以比者言其相親比而有所畜止故受之以小畜易説白雲郭氏曰畜德畜賢畜君畜衆皆畜也是以比必有畜易説漢上朱氏曰訟者兩辭必以衆起故次之以師師衆也衆不能以治衆治衆者至寡也衆之所以比執一以御之則衆治矣故次之以比比相親比也彼來比我我必畜之故次之以小畜易傳物畜然後有禮故受之以履伊川先生曰夫物之聚則有大小之别髙下之等美惡之分是物畜然後有禮履所以繼畜也履禮也禮人之所履也易傳橫渠先生曰德積則行必有方物積則散必有道易説廣漢張氏曰以內言之嘉會足以合禮以外言之萬物盛多可以備禮故受之以履也易説白雲郭氏曰衆必有比比必有畜畜而有禮則安無禮則危易説漢上朱氏曰物畜聚然後有上下尊卑之等上下尊卑所謂禮也故次之以履禮者履而行之者也易傳履而泰然後安故受之以泰伊川先生曰履得其所則舒泰泰則安矣泰所以次履也易傳廣漢張氏曰履得其道則所履者泰無適而不安矣此履所以受之以泰易説白雲郭氏曰履之而通者安之道不通則不安非所宜履也易説漢上朱氏曰所履者君子大道則其心泰然而安故次之以泰易傳泰者通也物不可以終通故受之以否物不可以終否故受之以同人康節先生曰諸卦不交於乾坤者則生於否泰否泰乾坤之交也自泰至否其間則有蠱矣自否至泰其問則有隨矣並觀物外篇伊川先生曰夫物理往來通泰之極則必否否所以次泰也夫天地不交則為否上下相同則為同人與否義相反故相次又世之方否必與人同力一作欲乃能濟同人所以次否也並易傳廣漢張氏曰泰者隂陽交感而無所間故為通也治亂之相仍如環之無端故物安有久通者乎故受之以否夫泰而驕者所以致否否而畏者所以復泰此物不可終否故受之以同人也易説白雲郭氏曰泰否時也同有盈謙皆在人事自取之耳能盡同人之道則否傾矣舜文事也物不可者猶云物不能終通終否也易説漢上朱氏曰泰者萬物通也物終通則無節故次之以否否塞也物終否則乖異不相為用故次之以同人易傳與人同者物必歸焉故受之以大有有大者不可以盈故受之以謙伊川先生曰夫與人同者物之所歸也大有所以次同人也其有既大不可至於盈滿必在謙損故大有之後受之以謙也並易傳廣漢張氏曰人能樂以天下與天下同其樂憂以天下與天下同其憂此與人同也而物歸焉故受之以大有有天下之大者不可自任其聰明要在持之以謙易説白雲郭氏曰如器之容物盈則不能有故有大者同天無物可以盈不盈為謙易説易曰與人同者物必歸焉故受之以大有夫與人同者盡已盡人之性者也盡已盡人誠之至也誠至則可以有物是以物必歸焉茍或不然此亦不能大有之矣故曰不誠無物中庸解漢上朱氏曰同人者與人同也與人同者物必歸焉舜太王是已故次之以大有認物之歸為己有者必驕驕則亢滿大復為纍矣有大者不可盈也故次之以謙易傳有大而能謙必豫故受之以豫伊川先生曰有大而能謙必豫故受之以豫承二卦之義而為次也有既大而能謙則有豫樂也豫者安和恱樂之義易傳廣漢張氏曰惟能持之以謙則優遊而無事矣故謙而受之以豫易説白雲郭氏曰以謙有大則絶盈滿之纍故優遊不迫而暇豫也易説漢上朱氏曰物歸之矣又持之以謙猶富而守之以儉豈不有餘裕哉有大而能謙者必暇豫也故次之以豫易傳豫必有隨故受之以隨伊川先生曰夫説豫之道物所隨也隨所以次豫也易傳廣漢張氏曰惟能恱以動故天下之人如蟻之慕羶蛾之赴火矣此象所以必有所隨也易説白雲郭氏曰豫猶中庸所謂素也素有富貴之道則可行乎富貴素有貧賤之道則可行乎貧賤行則隨矣富貴貧賤其所隨者也統言隨義不必皆為隨人易説漢上朱氏曰事豫立則動而不跲衆必隨之故次之以隨易傳以喜隨人者必有事故受之以蠱蠱者事也有事而後可大故受之以臨臨者大也伊川先生曰以喜隨人者必有事故受之以蠱承二卦之義以為次也夫喜説以隨於人者必有事也無事則何喜何隨蠱所以次隨也蠱事也蠱非訓事蠱乃有事也臨大也蠱者事也有事則可大矣故受之以臨也並易傳廣漢張氏曰天下之人推之不去却之不得中心説而從之然後建立功業必有成績此以喜隨人者必有事故受之以蠱蠱者事也事之在天下未有驟而大者必積纍以成之然後至於大有事而後可大故受之以臨臨者二陽進而四隂退駸駸已向於大矣易説白雲郭氏曰隨喜道也喜隨人則失於無所擇故必有弊蠱者已弊之事弊而知改為則可大故有事復為大之幾易説漢上朱氏曰好上人者人之情也以喜隨人必有所事臣事君子事父婦事夫弟子事師非樂於所事者其肯隨乎故次之以蠱蠱者事壞而後有事者也韓康伯曰可大之業由事以生臨者以大臨小也故次之以臨易傳物大然後可觀故受之以觀廣漢張氏曰天下皆山也惟泰山可觀天下皆水也惟東海可觀况於人乎惟物大然後可觀易説白雲郭氏曰天地可觀者也聖人與國皆可觀也而聖人又觀乎道故可觀皆大物易説漢上朱氏曰觀者自下觀上物大然後可觀是以王尚大故次之以觀易傳可觀而後有所合故受之以噬嗑伊川先生曰嗑者合也既有可觀然後有來合之者也噬嗑所以次觀也易傳廣漢張氏曰惟其可觀然後有所合也太公居東海之濵伯夷居北海之濵所以盍於文王者以文王可觀然後有所合也故受之以噬嗑易説白雲郭氏曰凡合在觀之後未有無所見而合者不獨大觀而後有合也易説漢上朱氏曰在上而無可觀則在下引而去矣非可觀其能有合乎故次之以噬嗑易傳嗑者合也物不可以茍合而已故受之以賁賁者飾也伊川先生曰物之合則必有文文乃飾也如人之合聚則有威儀上下物之合聚則有次序行列合則必有文也賁所以次噬嗑也易傳廣漢張氏曰夫有物間之故欲合而不可得矣惟噬而後嗑此噬嗑所以為合去小人而君子合也然物不可以茍合無故而合必以無故而離聖人必綢繆委曲憂其合之易則散之亦易也故受之以賁賁者飾之以禮而為之文飾也易説白雲郭氏曰人之合則有上下長少非禮以飾之則無分無分則亂故不可茍合易説漢上朱氏曰噬嗑者噬而合者也物不可以茍合茍合者其終則離必致飾焉故次之以賁賁隂陽相飾也易傳致飾然後亨則盡矣故受之以剝剝者剝也伊川先生曰夫物至於文飾亨之極也極則必反故賁終則剝也易傳廣漢張氏曰夫賁者設飾則貴於文者夫文之太過則滅其質而有所不通故致飾則亨有所盡言其不通故受之以剝剝者五隂剝一陽此所以為剝也易説白雲郭氏曰自同人大有謙豫隨蠱臨觀噬嗑賁聖人所以履泰傾否之美道備盡於斯其道極盡則有剝矣易説漢上朱氏曰致飾然後物亨亨則盡矣無以復加故次之以剝剝者剝也此商周之末所以不勝其弊文之末流也易傳物不可以終盡剝窮上反下故受之以復復則不妄矣故受之以無妄伊川先生曰物無剝盡之理故剝極則復來隂極則陽生陽剝極於上而復生於下窮上而反下也復所以次剝也復者反於道也既復於道則合正理而無妄故復之後受之以無妄也並易傳廣漢張氏曰寒極則生暑隂極則生陽隂窮於上則陽復於下此窮上反下故受之以復凡天下之事皆妄也惟復而反本則無妄然後受之以無妄易説白雲郭氏曰剝窮則降而必復於道復於道則不妄以見小人之剝皆妄也是以小人無忌憚而君子唯誠之為貴易説漢上朱氏曰物窮則反不可終盡剝陽窮於上而終反於下故次之以復復天理則無妄無妄則其動也天故次之以無妄易傳有無妄然後可畜故受之以大畜伊川先生曰無妄則為有實故可畜聚大畜所以次無妄也易傳廣漢張氏曰天之生民有孚於中能有其無妄則所養大矣故受之以大畜易説兼山郭氏曰健為天德大畜止健畜天德也故彖曰剛健篤實輝光日新其德不能畜大德則見於有為者不能無妄故天德止於大畜而動於無妄也序卦曰有無妄而後可畜是為交相養之道則知無妄者動亦無妄靜亦無妄而大畜一於止矣浩然圖白雲郭氏曰大畜畜無妄之道而已無妄之道天道也有無妄之道則可畜猶有天命之性則可率而循之是以君子存其心養其性使不失赤子之心者以此易説漢上朱氏曰無妄然後物物循理乃可大畜故次之以大畜前曰比必有所畜者比而後畜其畜也小故次之以小畜易傳物畜然後可養故受之以頤頤者養也伊川先生曰夫物既蓄聚則必有以養之無養則不能存息頤所以次大畜也易傳廣漢張氏曰物畜然後可以推而養人故受之以頤頤者養也易説白雲郭氏曰有所畜則天道止於我矣不有以養之將復失其正孟子所謂以直養而無害則塞乎天地之間者也易説漢上朱氏曰物能畜止然後可養雖養虎不外是也故次之以頤頤者觀人之養也求口實以自養也易傳不養則不可動故受之以大過伊川先生曰凡物養而後能成成則能動動則有過大過所以次頤也易傳廣漢張氏曰不養安能出而應世動而有為乎不成則不達也故頤然後繼之以大過也易説白雲郭氏曰大過之動非常動也不能大養其德者不可動養大過之德如養枯楊使之生稊蓋亦難矣豈可失所養而妄動哉此孟子所以養浩然之氣也易説漢上朱氏曰聖人養賢賢人養德不養之則不能動大過者動而大過乎物也故次之以大過易傳物不可以終過故受之以坎坎者陷也陷必有所麗故受之以離離者麗也伊川先生曰理無過而不已過極則必陷坎所以次大過也陷於險難之中則必有所附麗理自然也離所以次坎也並易傳橫渠先生曰一陷溺而不得出為坎一附麗而不能去為離易説廣漢張氏曰大過者從權以濟其一時然大過有弊物不可以終過故受之以坎夫物過其中則陷而入於險矣陷而入於險必思有所附麗而出其險故受之以離離者麗也上經始於乾坤而終於坎離者此其序也易説白雲郭氏曰過越非常則蹈陷害所謂陷必有所麗也或麗於險或麗於阻皆為陷也易説漢上朱氏曰大過六爻皆以居安不動為忌君子之所以過者時也過而不已則失中失中則陷沒坎陷也陷必有所附麗乃能出險故次之以離離麗也一本云麗必有所感故次之以咸咸感也易傳有天地然後有萬物有萬物然後有男女有男女然後有夫婦有夫婦然後有父子有父子然後有君臣有君臣然後有上下有上下然後禮義有所錯伊川先生曰天地萬物之本夫婦人倫之始所以上經首乾坤下經首咸繼以恆也天地二物故二卦分為天地之道男女交合而成夫婦故咸與恆皆二體合為夫婦之義咸感也以説為主恆常也以正為本而説之道自有正也正之道固有説焉易傳橫渠先生曰性天經然後仁義行故曰有父子君臣上下然後禮義有所錯正蒙廣漢張氏曰序卦上經之首不言乾坤下經之首不言咸者蓋天地者形也乾坤者天地之道也於序卦言天地欲人即天地以求其乾坤者歟有心為感無心為咸於序卦言夫婦而不言咸者欲人即夫婦以求其無心之咸者歟蓋乾坤與咸初無所受故也未有天地而萬物安從生及夫天位乎上而施其氣地處乎下而生其形此有天地然後有萬物也夫乾天也故稱乎父所以成男坤地也故稱乎母所以成女此有萬物然後有男女也男女者言其自然之别也男正位乎外必有以代其終女正位乎內必有以造其始者此男女暌而其志通故有男女然後有夫婦者言其自然之配也夫婦之道納采問名親迎下嫁不敢茍合者以父子之道已肇於此也謂之父子言其有自然之繼也父子之間視安問寢合室異宮不敢褻瀆者以君臣之道已著於此也謂之君臣言其有自然之分也至於有君臣則上下之分不得不嚴所謂男女夫婦父子其尊卑髙下咸有自然之分也知自别於萬物之中者以其有上下而禮為之節文義為之設飾而禮義有所錯故也易説白雲郭氏曰有天地然後生物人出其中則有男女男女人道之大夫婦人道之始父子君臣相因以生至於上下分定而後禮義有所錯舉禮義而錯諸上下也人道以此為急無此則亂矣易説新安朱氏曰或問禮義有所錯錯字陸氏兩音如何曰只是作措字謂禮義有所施設耳語録夫婦之道不可以不久也故受之以恆恆者久也物不可以久居其所故受之以遁遁者退也明道先生曰咸恆體用也體用無先後劉絢師訓已上一條補伊川先生曰恆久也咸夫婦之道夫婦終身不變者也故咸之後受之以恆也易傳廣漢張氏曰君子以永終知敝使三十之男二十之女夫婦偕老而無華落色衰之棄此夫婦之道所以貴於恆而久也此咸而受之以恆為久也夫流水不濁戶樞不蠧物之久居其所則蠱而易壞故受之以遁遁者知退而有所遷者也易説白雲郭氏曰日月久照尚有􅉴食况萬物乎久居其所而退者宜也易説漢上朱氏曰君子之道造端乎夫婦久於其道而後化故次之以恆恆久也進退升降與時消息不可久居其所而不去故次之以遁易傳物不可以終遁故受之以大壯伊川先生曰遁為違去之義壯為進盛之義遁者隂長而陽遁也大壯陽之壯盛也衰則必盛消息相須故既遁則必壯大壯所以次遁也易傳廣漢張氏曰夫遁而退則弱然柔弱所以致強壯也故受之以大壯易説白雲郭氏曰遁以隂侵而遁大壯以剛長而壯消息往來之理易説漢上朱氏曰君子萬物之主終遁而不反天地閉塞故次之以大壯易傳物不可以終壯故受之以晉晉者進也進必有所傷故受之以明夷伊川先生曰物無壯而終止之理既盛壯則必進晉所以繼大壯也夫進之不已必有所傷理自然也明夷所以次晉也並易傳廣漢張氏曰物壯則老其可久乎故受之以晉晉者柔進而上行故日中則􅉴月滿則虧進而不已必有所傷故受之以明夷易説白雲郭氏曰剛過則柔至進極則必傷易説漢上朱氏曰大者壯則小者羸可進之時也故次之以晉晉日出地而進於晝也進而不已傷之者至故次之以明夷易傳新安朱氏曰或問晉序卦物不可以終壯故受之以晉傳曰物無壯而終止之理既壯盛則必進竊意物進而後至於壯盛既壯盛則衰退繼之矣今曰壯盛則必進此義如何答曰物固有壯而後進者亦有進而後壯者各隨其事而言難以一説拘也且以十二月卦論大壯之為夬之為乾豈非壯而後進乎至乾乃極而衰耳語録夷者傷也傷於外者必反其家故受之以家人伊川先生曰夫傷困於外則必反於內家人所以次明夷也易傳橫渠先生曰傷於外必反於家萬物之理自然易説廣漢張氏曰明夷者明入地中而有所傷也人困苦則呼父母林回棄千金之璧負赤子而趨故傷於外者必反其家易説兼山郭氏曰易曰傷於外者必反於家蓋行有不得於人則反求諸己中庸解白雲郭氏曰行有不得者皆反求諸己治國治天下而不治者必反於家治自近始實一道也易説漢上朱氏曰明夷日在地中明有所傷也物無不反其本者疾痛則呼其父母傷於外者未有不反乎內故次之以家人家人內也易傳家道窮必乖故受之以睽睽者乖也伊川先生曰家道窮則睽乖離散理必然也故家人之後受之以睽也易傳廣漢張氏曰夫家固有父子之親夫婦之愛然身不行道則父子夫婦無復親矣此家道窮則乖離而不和此家人所以繼之以睽而暌所以為乖也易説白雲郭氏曰治道不可窮極有家有國有天下皆一也易説漢上朱氏曰治家者剛柔有節過剛則厲過柔則瀆無節則道窮而親族乖離故次之以暌睽者水火乖也易傳乖必有難故受之以蹇蹇者難也伊川先生曰睽乖之時必有蹇難蹇所以次睽也易傳廣漢張氏曰三軍同心則胡越一家六親不和則舟中咸作敵睽乖而不和宜乎有難也故受之以蹇蹇見險而止所以為難易説白雲郭氏曰合則有飾乖則有難理之宜也易説漢上朱氏曰乖離則情不通而難生故次之以蹇蹇者行有難也易傳物不可以終難故受之以解解者緩也緩必有所失故受之以損損而不已必益故受之以益益而不已必決故受之以夬夬者決也伊川先生曰物無終難之理難極則必散解者散也所以次蹇也縱緩則必有失失則損也損所以繼解也盛衰損益如循環損極必益理之自然益所以繼損也益之極必決而止理無常益益而不已已乃決也夬所以次益也並易傳廣漢張氏曰皇天多難所以增益其所不能故勾踐之伯生於會稽而桓公之伯生於在莒此物不可以終難故受之以解解者脫於險而人情之所懈怠有攸往夙吉者世鮮其人故曰解者緩也夫在解而緩則所失多矣故受之以損凡物有損而致益如木落則糞本是也損而不已必益故受之以益也益而不已則失其常分如斷鶴續鳧揠苗助長反為害矣故益而不已有必決之理而夬者決也易説白雲郭氏曰難必思戒思戒故可緩緩則不知懼不知懼則必失損極則益益極則決皆理勢之常也易説漢上朱氏曰難極必解無終難之理故次之以解解蹇難解也難解則舒緩解者蹇之反五退而居二緩也緩則寬弛必有所失故次之以損損減也減下而益上有失之象消久則息損而不已者必益損益相反也故次之以益益久則盈盈則必決隄防是已故次之以夬夬者陽決隂也易傳新安朱氏曰或問緩字恐不是遲緩之緩乃是懈怠之意故曰解緩也曰緩是散漫意問如縱弛之類曰然語録決必有所遇故受之以姤姤者遇也伊川先生曰決判也物之決判則有遇合本合則何遇姤所以次夬也易傳廣漢張氏曰善惡不兩立邪正不並行有所間則君子無相遇之理故決去小人則君子交而遇也故受之以姤而姤者天地交也易説白雲郭氏曰人之於性決去其惡則德可遇其在國也決去小人則君子可遇易説漢上朱氏曰決則分分則相遇故次以姤姤者隂出而與陽相遇也易傳物相遇而後聚故受之以萃萃者聚也伊川先生曰物相會遇則成羣萃所以次姤也易傳廣漢張氏曰凡物相遇然後聚如羊狼不同囿鳯鷙不同林此不相遇故不聚也惟同聲相應同氣相求此遇也故為萃也言其合聚而不散也易説白雲郭氏曰相遇則道合而聚不合亦散矣故利見大人貞易説漢上朱氏曰物以類相從遇而後聚非其類雖同居不相遇故次之以萃萃二陽聚也易傳聚而上者謂之升故受之以升升而不已必困故受之以困困乎上者必反下故受之以井伊川先生曰物之積聚而益髙大聚而上也故為升所以次於萃也升者自下而上自下升上以力進也不已必困矣故升之後受之以困也承上升而不已必困為言謂上升不已而困則必反於下也物之在下者莫如井井所以次困也並易傳廣漢張氏曰天下之物散之則小合而聚之則積小以成其髙大故聚而上者謂升也升於德則聖敬日躋若夫冥升則有所蠱壞而困矣故受之以困凡人困於功名富貴然後可從於儉約故困於上者必反下故受之以井易説白雲郭氏曰聚而上進於道則日升升不知止則遇困遇困而後反下其常理如此易説漢上朱氏曰物相崇聚其勢必升積土是已故次之以升升者聚而上之謂也升而不知反則力窮而困故次之以困困乎上者必反乎下山剝是已故次之以井易傳井道不可不革故受之以革革物者莫若鼎故受之以鼎主器者莫若長子故受之以震伊川先生曰井之為物存之則穢敗易之則清潔不可不革者也故井之後受之以革也鼎之為用所以革物也變腥而為熟易堅而為柔水火不可同處也能使相合為用而不相害是能革物也鼎所以次革也鼎者器也震為長男故取主器之義而繼鼎之後長子傳國家繼位號者也故為主器之主序卦取其一義之大者為相繼之義並易傳廣漢張氏曰井居其所不可革其道則不可不革故受之以革革生為熟革剛為柔此革物者莫若鼎鼎者天下之重器主之者其惟長子乎故受之以震易説漢上朱氏曰井在下者也井久則穢濁不食治井之道革去其害井者而已三代之革其禮相因損益可知也故次之以革鼎之革物以水濟火而熟之革物者莫如鼎故次之以鼎鼎器也主宗廟之器者莫如長子震長子也故次之以震易傳震者動也物不可以終動止之故受之以艮艮者止也物不可以終止故受之以漸漸者進也進必有所歸故受之以歸妹得其所歸者必大故受之以豐豐者大也窮大者必失其居故受之以旅伊川先生曰動靜相因動則有靜靜則有動物無常動之理艮所以止震也止必有進屈伸消息之理也止之所生亦進也所反亦進也漸所以止艮也進則必有所至故漸有歸義歸妹所以繼漸也物所歸聚必成其大故歸妹之後受之以豐也豐盛至於窮極則必失其所安旅所以次豐也並易傳廣漢張氏曰震以一陽在下故動飄風不終朝驟雨不終日此物不可以終動止之故受之以艮而艮者一陽在上二隂在下故為止也夫藏舟於壑藏山於澤可謂固矣夜半有力者負之而走此物不可以終止故受之以漸漸者止於下而漸於上不終於止而有進也凡進者欲有歸也故受之以歸妹得其所歸者如文王得伯夷太公之歸此其所以大也故受之以豐豐者明之盛大之時然日中必􅉴月盈必食天地盈虛與時消息勿憂宜日中可也豐而太過則失其所居矣故受之以旅易説白雲郭氏曰動極而止止極復進進極必傷進以漸則有歸歸得其所則大窮其大則必失蓋非有大以謙故也易説漢上朱氏曰震者陽動於下也物不可以終動動極則止故止之艮者一陽止於上也故次之以艮物不可以終止止極則動故次之以漸漸者進有序也進必有所歸盈科之水是也故次之以歸妹歸妹者女之歸也得其所歸者必大海之善下是也故次之以豐豐大也前曰與人同者物必歸焉故受之以大有此曰得其歸者必大大有次同人者處大之道也豐次歸妹者致大之道也已大矣而又窮之必至於無所寄託而失其所居之常非特大名大位然也學亦如是故次之以旅易傳旅而無所容故受之以巽巽者入也入而後説之故受之以兊兊者説也伊川先生曰羈旅親寡非巽順何所取容茍能巽順雖旅困之中何往而不能入巽所以次旅也物相入則相説相説則相入兊所以次巽也並易傳廣漢張氏曰旅者親寡之時無所容也惟巽然後得所入故受之以巽而巽者入也入於道故有見而説故巽而受之以兊易説白雲郭氏曰窮無所容其入必決入然後感感則説不入則無感矣易説漢上朱氏曰旅者君子之窮也旅卦以柔順謙下為吉否則無所容矣故次之以巽巽者隂入於陽之下也天之澤萬物禮義之説人心不入則不説故次之以兊兊者説見於外也易傳東萊吕氏曰明於內而巽於外是非取舍不可不十分明決然行之則當巽麗澤論説説而後散之故受之以渙渙者離也物不可以終離故受之以節伊川先生曰説則舒散也人之氣憂則結聚説則舒散故説有散義渙所以繼兊也物既離散則當節止之節所以次渙也並易傳廣漢張氏曰惟説於道故推而及人説而後散故受之以渙渙者乃萬民離散不安其居故為離也凡物之離者必有時而合故受之以節而節者順其人心説以行險易説白雲郭氏曰説而後羣疑可散散而無節則乖離矣易説漢上朱氏曰説之而後散之則説道不勞無所不説矣故次之以渙渙者險難離散也離者必聚散者必合物無終離者也聚者離之節合者散之節節之則無離散故次之以節易傳節而信之故受之以中孚有其信者必行之故受之以小過有過物者必濟故受之以既濟物不可窮也故受之以未濟終焉伊川先生曰節者為之制節使不得過越也信而後能行上能信守之下則信從之節而信之也中孚所以次節也人之所信則必行行過也小過而以繼中孚也能過於物必可以濟故小過之後受之以既濟也既濟矣物之窮也物窮而不變則無不已之理易者變易而不窮也故既濟之後受之以未濟終焉未濟則未窮也未窮則有生生之義並易傳廣漢張氏曰節天下以其節之道而民信之此出於中心之誠信非勉強也故受之以中孚人能有其信雖蠻貊之邦可行矣此有其信者必行之故受之以小過能髙於人而過之然後可以濟天下此小過受之以既濟然事至於既濟則人情倦於有為事之隳廢而物之窮也故受之以未濟然後民勉於從事矣此易所以終之以未濟易説白雲郭氏曰有節故可信如人之言無節行無節者皆不可信也信故可行行則有濟濟之極則復於未濟然自屯至於未濟雖皆相受之道而君子居而安之者又必有其道焉是以履泰則不至於否居豐則不至於旅又非常道相受之所能拘也故繫辭言吉凶則曰貞勝稱君子則曰自天祐之吉無不利易説漢上朱氏曰天地之節不可以不信不信則無以成萬物而况於人乎飲食起居身之節也不信則致疾尊卑長幼家之節也不信則召亂故次之以中孚中孚信也行者足相過也小過以隂過陽有行之象有其信者必行中無所疑也故次之以小過物各有量不過則不能相濟所過大則其濟亦大是以智周萬物然後道濟天下故次之以既濟而止復入於未濟物之相生終不可窮故以未濟終篇焉易傳雜卦傳和靖尹氏壁帖讃易曰至序卦曰大哉時之相生也達者可與幾矣至雜卦曰旁行而不流守者可與存義矣子曰名實相生利用相成是非相明去就相安也文集廣漢張氏曰序卦所以言易道之常雜卦所以言易道之變此古有是言也殊不知易之雜卦乃言卦畫反對各以類而言非雜也於雜之中有不雜存焉易説白雲郭氏曰卦之性情與其為德之不同八卦則見於説卦六十四卦則見於雜卦孔子於庖犧之道詳盡於説卦皆文王所未嘗明之者故不得不詳也於文王之道則具於序卦雜卦之中其象則見於諸卦大小象而繫辭上下則兼統之易説新安朱氏曰雜卦中亦有説得極精處問雜卦反對之義只是反覆則其吉凶禍福動靜剛柔皆相反了曰是如此不知如何末稍數卦又不對了大畜時也也曉不得又與無妄不相反是如何臨觀更有與求之義臨以二陽言之則二陽可以臨上四隂以卦爻言之則六五上六又以上而臨下觀自下而觀上則為觀是平聲自上而為物之觀是去聲噬嗑食也賁無色也義可通但不相反謙輕是自謙抑不自尊重女待男而行所以為漸並語録乾剛坤柔比樂師憂橫渠先生曰不曰天地而乾坤云者言其用也乾坤亦何形猶言神也人解識夭天竟不可方體姑指日月星辰處視以為天隂陽言其實乾坤言其用如言剛柔也乾坤則所苞者廣易説廣漢張氏曰此二卦無反對之畫乾三畫竒剛也坤三畫耦柔也比師比一陽居五而民樂而從之師一陽居二而民憂而畏之易説白雲郭氏曰六子之剛柔索於乾坤六十四卦之剛柔重於八卦故卦中之剛柔皆乾之剛坤之柔也是以獨乾坤為剛柔比以比輔從順為樂師以相須行險致憂是天下可久比而不可久師也故比有永貞而師無之並易説漢上朱氏曰乾坤易之門凡剛皆乾也凡柔皆坤也剛柔相雜乃成諸卦故曰乾剛坤柔比得位而衆比之故樂師犯難而衆從之故憂憂樂以天下也易傳新安朱氏曰剛柔雖若各有所偏必相錯而後得中然在乾坤二卦之全體當剛而剛當柔而柔則不待相錯而不害其為全矣其爻位之無過不及者如乾坤之二五亦不待相錯而不害其為中矣隂陽變化而太極之妙無不在焉於此蓋可見也今謂乾剛坤柔便有所偏恐於二卦之彖及二五之爻辭有不通者答虞大中書臨觀之義或與或求廣漢張氏曰臨觀臨者上有與於下觀者下有求於上或與或求乃一時之義易説白雲郭氏曰臨與所臨觀與所觀二卦皆有與求之義或有與無求或有求無與皆非臨觀之道有舜在上必有戴舜者是為臨觀也易説漢上朱氏曰臨之九三在下四隂與之故能以大臨小觀之九五在上四隂求之故能以上觀下或與或求乃成臨觀之義易傳新安朱氏曰以我臨物曰與物來觀我曰求或曰二卦互有與求之義本義屯見而不失其居蒙雜而著橫渠先生曰險在外故不失其居與渙解義反故曰緩必有所失蒙雜而著著古著字雜著於物所以為蒙蒙昏蒙也不齋戒其心則雜而著也並易説廣漢張氏曰屯蒙物在屯難之中其居常蒙雜顓蒙而性當自著易説白雲郭氏曰屯旅皆近困旅困於已窮故失其居屯困於始生故不失其居而利於有為也蒙未有所知之時中無所執則雜而著見故發之屯之難見於象者也蒙之稚著於形者也易説漢上朱氏曰屯自震變四之五雖見於屯也而不失其所居所以大亨歟蒙自坎變五之上隂陽相雜雖雜也而九自著見隂豈能蒙之所以蒙亨歟易傳新安朱氏曰屯震遇坎震動故見坎險不行也蒙坎遇艮坎幽昧艮光明也或曰屯以初言蒙以二言本義震起也艮止也廣漢張氏曰震艮一陽在下故震為起一陽在上故艮為止易説白雲郭氏曰陽動起於震初止於艮終蓋震為一索之始艮為三索之終也易説漢上朱氏曰陽起於坤而出震則靜者動陽止於艮而入坤則動者靜故起莫如震止莫如艮也易傳損益盛衰之始也廣漢張氏曰損益損而不已必益為盛之始益而不已必決為衰之始易説白雲郭氏曰損己必盛故為盛之始益己必衰故為衰之始消長相循在道當如是也易説漢上朱氏曰損以九三為上由泰而損始衰者也益以九四益初由否而益始盛者也故損益盛衰之始也易傳大畜時也無妄災也廣漢張氏曰大畜妄無惟大畜之君子所以能安其時若無妄而有妄者乃為災也易説白雲郭氏曰君子藏器於身待時而動然則多識前言往行以畜其德亦以待時也無妄之謂災其餘自作孽而已故無妄匪正有眚易説漢上朱氏曰大畜以四五之柔而畜三陽時也無妄九五六二中正而三四上爻為無妄之疾災也關子明曰無妄而災者災也有妄而災者其所冝也非災之者也易傳新安朱氏曰止健者時有適然無妄而災自外至本義萃聚而升不來也廣漢張氏曰萃升天地之理有聚有散惟順以説故聚也有往有來惟聚而升故不來也易説白雲郭氏曰不來不知反也故至於困來則知止無困矣易説漢上朱氏曰萃二陽萃於上升二陽升於下升者升也升往則不來矣不來者必聚於上也氣之方升誰能遏之故曰萃聚而升不來也易傳謙輕而豫怠也廣漢張氏曰謙豫謙而不持重者失於輕豫而不警戒者失於怠也易説白雲郭氏曰謙輕已豫怠已也以樂豫故心怠是以君子貴知幾易説漢上朱氏曰謙自上降三豫自初升四謙故降而輕豫故怠而止故曰謙輕而豫怠也易傳新安朱氏曰謙輕而豫怠輕是卑小之義豫是恱之極便放倒了如上六冥豫是也語録噬嗑食也賁無色也廣漢張氏曰噬嗑賁噬嗑除其間所以養其生故曰食也賁者設飾然終於白賁故無色也易説白雲郭氏曰頤中有物則必斷故噬嗑利斷猶人之食也賁以白賁無咎故無色無色則質全有天下之至飾存焉易説漢上朱氏曰噬嗑除間者也四為頤中有物故曰噬嗑食也賁自泰來本無色也剛柔交錯然後有文故曰賁無色也易傳新安朱氏曰白受采本義兊見而巽伏也橫渠先生曰兊説在外巽入在隱易説廣漢張氏曰兊巽兊一隂在上故見巽一隂在下故伏易説白雲郭氏曰其道見則説其道伏故入易説漢上朱氏曰隂隨陽升説而見乎外故曰兊見也陽隨隂降巽而伏乎內故曰巽伏也施説之道小者亦伸處巽之時大者亦屈無非天也易傳新安朱氏曰兊隂外見巽隂內伏本義隨無故也蠱則飭也廣漢張氏曰隨蠱能隨者則窮而能變豈有故邪事之蠱壞要在致力以治之故蠱為飭而飭有徑急之義易説白雲郭氏曰隨之道在此事在彼所隨有道不為事變故言無故蠱弊事特加整治因飭之而己言非大有作也易説漢上朱氏曰隨隨時也以是為正故曰隨無故也蠱壞也二往之五飭蠱之道故曰蠱則飭也易傳新安朱氏曰隨前無故蠱後當飭本義剝爛也復反也廣漢張氏曰剝復剝者五隂剝一陽而勢之爛有不救之理復者一陽生於下而復反其所也易説白雲郭氏曰小人之道必害於物君子必反於道易説漢上朱氏曰剝爛也五隂潰於內也復反也剝反於下也易傳晉晝也明夷誅也廣漢張氏曰晉夷明晉為日中過則明有所傷故為誅也誅言其傷易説白雲郭氏曰晉與明夷朝暮之象也故言明出地上明入地中誅亦傷也易説漢上朱氏曰晉之明進而至於晝明夷之明降而至於誅夷誅也其明熄矣非誅之象乎易傳新安朱氏曰誅傷也本義井通而困相遇也橫渠先生曰澤無水理勢適然故曰相遇易説廣漢張氏曰井困井內不失己外不失人無所蔽也故為通至於困則蔽然邂逅有不可免者易説白雲郭氏曰往來井井則其道通困遇剛掩所以為困遇者柔遇剛之遇也遇其困我者也易説漢上朱氏曰泰初之五往來不窮故曰井通否上之二陽遇隂則見掩故曰困相遇也或往而通或來而困唯其時也易傳新安朱氏曰剛柔相遇而剛見掩也本義咸速也恆久也廣漢張氏曰咸恆咸之無心故應之也速恆者久於其道故恆者久不可欲速也易説白雲郭氏曰感為天下至速之道所謂不疾而速者也易説漢上朱氏曰以剛下柔其感必速故曰咸感也剛上柔下可以持久故曰恆久也易傳渙離也節止也廣漢張氏曰渙節渙者民情散而離也節者民情有所憚而止也易説白雲郭氏目散則離矣有節故可止易説漢上朱氏曰渙三陽渙離故曰渙離也節三陽止而不去故曰節止也陽離則三隂散陽止則三隂來陽者隂之表也易傳新安朱氏曰止謂不退本義解緩也蹇難也廣漢張氏曰解蹇天下之難既解故安於佚樂每失於緩蹇者見險而止故為難易説漢上朱氏曰蹇二往五涉難也故曰蹇難也解五來二復吉也故曰解緩也來者為緩則往者當夙故曰有攸往夙吉易傳睽外也家人內也廣漢張氏曰睽人家睽者言其在外之迹若不相通家人由內以及外也易説白雲郭氏曰睽本於外疑家人本於內治故治家者必先其身治天下者必先其家易説漢上朱氏曰關子明曰明乎外者物自睽故曰睽外也明乎內者家自齊故曰家人內也易傳否泰反其類也廣漢張氏曰否泰否君子退而小人之類進也泰君子進而小人之類退也此其類所以相反也易説白雲郭氏曰否泰反類而相馴致之道故休否之道復反其類類謂隂陽之類如君子小人是也否反其類得君子則傾也泰反其類得小人則亂也在人道言之則曰君子小人治亂而已合三才言之故云類也易説漢上朱氏曰君子泰則小人否小人泰則君子否故曰否泰反其類也易傳大壯則止遁則退也廣漢張氏曰大壯遁四陽長而不可過故大壯則止也二隂長而馴致有害君子之理故陽當退易説白雲郭氏曰壯不知止小人之壯也君子之壯則有止遁之退大壯之正皆克己之道易説漢上朱氏曰四陽並進六五以和易待之可以止而仕也故曰大壯則止四陽偕往二隂在內而執其柄可以退而去也故曰遁則退也易傳大有衆也同人親也廣漢張氏曰大有人同大有之時時和歲豐萬物盛多故為衆也惟與人同故人皆歸而親之易説白雲郭氏曰其有非一故衆衆則大能同乎人則天下親之易知則有親同人之親其得乾之易乎易説漢上朱氏曰大有六五柔得尊位而有其衆有其衆則衆亦歸之故曰大有衆也同人六二得中得位而同乎人同乎人則人亦親之故曰同人親也易傳革去故也鼎取新也廣漢張氏曰革鼎革弊所以去其故鼎亨所以取其新易説白雲郭氏曰革鼎之義相為終始是以去故取新共成一道易説漢上朱氏曰水火相革革已廢也故曰革去故也以木巽火火方興也故曰鼎取新也功成者退方來者進一去一取天之道也易傳小過過也中孚信也橫渠先生曰過而未顚也易説廣漢張氏曰小過此卦無反對之畫天下失其中者故小有所過以復其中是過也乃所以救其不中者乎又曰中孚與小過卦相對而變者也天之生民其中有信此信由中也故為中孚並易説漢上朱氏曰小過二陽在內動而止小者過也故曰小過過也中孚二隂在內伏而説小者信也故曰中孚信也易傳豐多故也親寡旅也廣漢張氏曰豐旅天下豐大之時其事故云多也在旅之時失上下之交故為親寡易説白雲郭氏曰因豐則多事無親而後為旅旅則我之親寡也非天下皆寡親也易説漢上朱氏曰豐泰二之四進退不得其所多故也多故則難處故曰豐多故也旅否三之五失位無應以其旅於外也旅外者不如在內之為安故曰親寡旅也豐多故也故四五相錯然後有慶親寡旅也故五動二應而後有譽易傳新安朱氏曰既明且動其故多矣本義離上而坎下也廣漢張氏曰離坎此二卦無反對之畫乃相對而變者也離火炎上坎水流下其自然之性不可易也易説白雲郭氏曰上下猶水火之性也易説漢上朱氏曰離火炎上也故陽爻多凶坎水趨下也故隂文多凶坎離相濟者也易傳新安朱氏曰火炎上水潤下本義小畜寡也履不處也橫渠先生曰危者安其位者也故履以不處為吉易説廣漢張氏曰小畜履密雲不雨所濟者寡履行而不失其中不處也易説白雲郭氏曰寡則不能大其施履以行為義非處之道易説漢上朱氏曰小畜五陽而畜一隂所畜者寡故曰小畜寡也履一柔而履五剛不處為善故曰履不處也易傳新安朱氏曰不處行進之義本義需不進也訟不親也廣漢張氏曰需訟需者有所待故不進訟者險而健人誰親也易説白雲郭氏曰需有待則不能自進訟違行相親之道絶矣易説漢上朱氏曰需險在前三陽需時而不進關子明曰履而不處者其周公乎需而不進者其仲尼乎險在下而陽上行相過者也故曰訟不親也易傳大過顚也橫渠先生曰過至於顚故曰大易説廣漢張氏曰大過此卦無反對之畫當本末弱之時當從權以濟其難蓋時之顚危故也易説白雲郭氏曰中之四剛大難之象也有大難而本末弱故顚易説漢上朱氏曰自大過顚也而下簡册錯亂當曰頤養正也大過顚也遘遇也遘當作姤柔遇剛也夬決也剛決柔也君子道長小人道憂也漸女歸待男行也歸妹女之終也既濟定也未濟男之窮也頤一陽在上而養四隂正也故其卦以下養上為顚大過一隂在上四陽無所託顚也故其卦初隂承陽無失位之凶隂宜在下也姤以一柔而遇五剛故曰姤遇也柔遇剛也夬以五剛而決一柔故曰夬決也剛決柔也姤小人道長君子道憂也故繫於金柅夬君子道長小人道憂也故無號之凶女以外為歸乾男下而迎三然後坤女行而歸故曰漸女歸待男行也歸妹以三易四男行而女從夫婦之正也上六無應守正而終不改之義也故曰歸妹女之終也既濟虞翻曰六爻得位定也故曰既濟定也未濟伊川曰三陽失位故曰未濟男之窮也易傳新安朱氏曰自大過以下卦不反對或疑其錯簡今以韻協之又似非誤未詳何義本義姤遇也柔遇剛也廣漢張氏曰姤夬一隂始生乃柔遇也作易者進陽而退隂以一隂之生為遇言出其不意也一陽之生為復言反其所也易説白雲郭氏曰柔之遇剛曰姤剛之來復不可謂之遇也易説漸女歸待男行也廣漢張氏曰漸妹歸漸有所待如女之待男然後行言其不躁進也易説白雲郭氏曰待男而行其行漸也是以吉易説頤養正也廣漢張氏曰頤此卦無反對所養不正則是養其小者以害其大者也易説白雲郭氏曰養其正所以去其非正謂之頤易説既濟定也廣漢張氏曰既濟濟未既濟天下之分皆得其所故定也易説白雲郭氏曰濟則難定易説歸妹女之終也橫渠先生曰妹歸一作歸妹而長女之終也易説廣漢張氏曰歸妹女子以嫁為歸此終身仰望所以為終也易説白雲郭氏曰女以歸為有終易説未濟男之窮也廣漢張氏曰未濟濟既男子有志於四方今也剛柔失位而不當故未濟其已矣夫易説白雲郭氏曰剛柔失位男道弱而窮矣柔失位則以賤居尊剛失位則以貴居賤是以窮也易説新安朱氏曰伊川説未濟男之窮為三陽失位以為斯義得之成都隱者見張欽夫説伊川之在涪也方讀易有篐桶人以此問伊川伊川不能答其人云三陽失位火珠林上已有伊川不曾看雜書所以被他説動了語録夬決也剛決柔也君子道長小人道憂也廣漢張氏曰何世無君子何世無小人欲有君子而無小人是欲有陽而無隂也使小人之道有所憂危而不安者亦為足矣雜卦乃以其類相生惟乾坤坎離小過大過中孚頤八卦無反對此聖人之深意惟穆伯長老蘇明之諸家並不逹此易説白雲郭氏曰姤遇夬決始終之道異也聖人貴於行道每致意於君子小人之際故以是終之雜卦前皆二二相耦至大過之後獨各言一卦觀歸妹未濟之辭又非簡錯聖人之旨莫可詳究豈雜卦從變而言其序有不同歟易説東萊吕氏曰義理與客氣常相勝只看消長分數多少為君子小人之别麗澤論説合訂刪補大易集義粹言卷八十
