body:
  text: 合訂刪補大易集義粹言卷五十五頭等侍衛納喇性徳編震下震上伊川先生曰震序卦主器者莫若長子故受之以震鼎者器也震為長男故取主器之義而繼鼎之後長子傳國家繼位號者也故為主器之主序卦取其一義之大者為相繼之義震之為卦一陽生於二隂之下動而上者也故為震震動也不曰動者震有動而奮𤼵震驚之義乾坤之交一索而成震生物之長也故為長男其象則為雷其義則為動雷有震奮之象動為驚懼之義易傳震亨震來􅊒􅊒笑言啞啞震驚百里不喪匕鬯伊川先生曰陽生於下而上進有亨之義又震為動為恐懼為有主震而奮𤼵動而進懼而脩有主而保大皆可以致亨故震則有亨當震動之來則恐懼不敢自寜旋顧周慮一作周旋顧慮􅊒􅊒然也􅊒􅊒顧慮不安之貌蠅虎謂之􅊒者以其周環顧慮不自寜也處震如是則能保其安裕故笑言啞啞啞啞言笑和適之貌言震動之大而處之之道動之大者莫若雷震為雷故以雷言雷之震動驚及百里之逺人无不懼而自失雷聲所及百里也唯宗廟祭祀執匕鬯者則不至於喪失人之致其誠敬莫如祭祀匕以載鼎實升之於爼鬯以灌地而一无而字降神方其酌裸以求神薦牲而祈饗盡其誠敬之心則雖雷震一作霆之威不能使之懼而失守故臨大震懼能安而不自失者唯誠敬而已此處震之道也卦才无取故但言處震之道並易傳白雲郭氏曰震一索而得男故謂之長男自乾坤而來變之始者莫先於震故為動之始然乾坤震動之始其來方興莫測是以有震動之象曰亨者天下之理不動則不亨故天地萬物待震而後亨也自震來􅊒􅊒皆主人事而言􅊒􅊒恐懼之貌啞啞和樂之意因震動而恐懼則長慮却顧終无危亡之失是以後獲笑言和樂之吉也震驚百里不喪匕鬯者雖有大震恐不失主祭之道葢知恐懼脩省而已主祭長子之事也然則文武始於憂勤終於逸樂其亦震來􅊒􅊒笑言啞啞之義乎易說新安朱氏曰震動也一陽始生於二隂之下震而動也其象為雷其屬為長子震有亨道震來當震之來時也􅊒􅊒恐懼驚顧之貌震驚百里以雷言匕所以舉鼎實鬯以秬黍酒和鬱金所以灌地降神者也不喪匕鬯以長子言也此卦之占為能恐懼則致福而不失其所主之重本義彖曰震亨震來􅊒􅊒恐致福也笑言啞啞後有則也震驚百里驚逺而懼邇也出可以守宗廟社稷以為祭主也伊川先生曰震自有亨一无之字義非由卦才震來而能恐懼自脩自慎則可反致福吉也笑言啞啞言自若也一作啞啞笑言自若也由能恐懼而後自處有法則也有法則則安而不懼矣處震之道也雷之震及於百里逺者驚邇者懼言其威逺大也彖文脫不喪匕鬯一句卦辭云不喪匕鬯本謂誠敬之至威懼不能使之自失彖以長子宜如是因一有以字承上文用長子之義通解之謂其誠敬能不喪匕鬯則君出而可以守宗廟社稷為祭主也長子如是而後可以守世祀承國家也並易傳横渠先生曰此卦純以君出子在而言則震之體全而用顯故曰出可以守宗廟社稷不雜言君父共國之時也易說藍田吕氏曰震恐懼有戒心也恐懼能戒則用无不通故亨肅敬之心不少懈則神物祐之此所以致福笑言啞啞雖笑不失則震而後能謹也震及逺則近者不待威也能知所懼乃可以保宗廟社稷而祭祀之也白雲郭氏曰震來􅊒􅊒因恐懼而致福笑言啞啞和樂而未嘗失則驚逺懼邇言震之大逺邇皆及之也震之為卦内外重震故有逺邇大震之象逺邇大震而能不喪匕鬯此其所以可守宗廟社稷為祭主也匕者撓鼎之器所以載鼎實而致之爼鬯香酒所以灌地降神皆主祭之事也易說漢上朱氏曰自臨來二之四也震動於積隂之下奮擊而出亨也天威震動畏而恐懼乃所以致亨故曰震亨此以重震言亨也震來者九四來也􅊒許慎曰蠅虎也易傳曰蠅虎謂之􅊒者周旋顧慮不自寜也四動於坎中動而止止而復動離目内顧未嘗寜息􅊒之象震動之來恐懼如此初九守正所以致福福者陽之類謂九四來也故曰震來􅊒􅊒恐致福也此以震四之初言震亨也四來之三成離離目動笑也之二成兊兊口動言也自二之三笑且言矣之四聲達於外啞啞也惟震動恐懼必有笑言啞啞理之所不能違也故曰笑言啞啞後有則也此再以九四往來言震亨也傳曰千里不同風百里不共雷雷震於百里之逺宜若不聞而猶恐懼於邇者驚於逺懼於邇所謂恐懼於其所不聞也自初之四乾坤之䇿百有二十百里舉大數也驚逺四也懼邇初也故曰震驚百里驚逺而懼邇也此以初二三四言震也坤為肉坎為棘艮為手以棘載肉而升之者匕也坎震為酒離為黄酒黄鬱鬯也驚逺懼邇乃能不喪匕鬯則出可以守宗廟社稷以為祭主故曰不喪匕鬯程子謂彖文脫不喪匕鬯一句是也六宗廟也艮為門闕坤土在上為社震為榖稷者百榖之長宗廟社稷之象古者諸侯出而朝覲㑹同世子監國以奉宗廟社稷之粢盛匕牲體酌鬱鬯二者皆親之長子主器也不喪匕鬯則不失職矣四者諸侯位長子居之監國之象艮為手不喪匕鬯也臨二之四出也横渠曰此卦純以君出子在為言則震之體全而用顯故曰出可以守宗廟社稷不雜君父共國時也在卦氣為春分故太𤣥準之以釋易傳又曰亨有就卦體言之不論應與者震亨兊亨是也叢說新安朱氏曰震有亨道不待言也恐致福恐懼以致福也則法也程子以為邇也下脫不喪匕鬯四字今從之出謂繼世而主祭也或云出即鬯字之誤本義震來􅊒􅊒是震之初震得來如此言人常似那震來時􅊒􅊒地便能笑言啞啞到得震驚百里時也不喪匕鬯這箇相連做一串說下來震未便說到誠敬處只是說臨大震懼而不失其常主器之事未必彖辭便有此意看來只是傳中方說震亨止不喪匕鬯作一項看後面出可以為宗廟社稷主又做一項看震便自是亨震來􅊒􅊒是恐懼顧慮而後便笑言啞啞震驚百里便不喪匕鬯文王語已是解震亨了孔子又自說長子事文王之語簡重精切孔子之言方始條暢須拆開看方得並語録象曰洊雷震君子以恐懼脩省伊川先生曰洊重襲也上下皆震故為洊雷雷重仍則威益盛君子觀洊雷威震之象以恐懼自脩飭循省也君子畏天之威則脩正其身思省其過咎而改之不唯雷震凡遇驚懼之事皆當如是易傳白雲郭氏曰洊重也上下皆震威益盛也當是時也知恐懼畏天脩徳省身故可以无過而不至於危亡茍不知恐懼修省之戒則危亡必矣易說漢上朱氏曰上下皆震洊雷也震動為恐懼坎為加憂亦恐懼也初九正震為行得一善而行之之象故曰脩九四不正有過而思改之象故曰省易傳初九震來􅊒􅊒後笑言啞啞吉象曰震來􅊒􅊒恐致福也笑言啞啞後有則也伊川先生曰初九成震之主致震者也在卦之下處震之初也知震之來當震之始若能以為恐懼而周旋顧慮􅊒􅊒然不敢寜止則終必保其安吉故一作然後笑言啞啞也震來而能恐懼周顧則无患矣是能因恐懼而反致福也因恐懼而自脩省不敢違於法度是由震而後有法則故能保其安吉而笑言啞啞也並易傳白雲郭氏曰恐懼脩省於前則必獲和樂笑言之吉於後理之必然也初九震動之初恐懼脩省不可緩也過此則危矣故於初言之易說漢上朱氏曰初九先畫之爻九四後也於爻言後笑言啞啞與卦辭互𤼵之易傳新安朱氏曰成震之主處震之初故其占如此本義六二震來厲億喪貝躋于九陵勿逐七日得象曰震來厲乘剛也伊川先生曰六二居中得正善處震者也而乘初九之剛九震之主震剛動而上奮孰能禦之厲猛也危也彼求既猛則已處危矣億度也貝所有之資也躋升也九陵陵之髙也逐往追也以震來之厲度不能當而必喪其所有則升至髙以避之也九言其重岡陵之重髙之至也九重之多也如九天九地也勿逐七日得二之所貴者中正也遇震懼之來雖量勢巽避當守其中正无自失也億之必喪也故逺避以自守過則復其常矣是勿逐而自得也逐即物也以已即物失其守矣故戒勿逐避逺自守處震之大方也如二者當危懼而善處者也卦位有六七乃更始事既終時既易也不失其守雖一時不能禦其來然時過事已則復其常故云七日得當震而乘剛是以彼厲而已危震剛之來其可禦乎並易傳横渠先生曰初動而之上故曰躋于九陵億必也易說藍田吕氏曰六二當震之時以柔乘剛震來必危而无應必大喪其所資億數之多多故大也應在六五所居髙險故曰躋于九陵若反而求之柔中自守則必得其所喪故曰勿逐七日得七日陽數之變陽數之變則剛者從柔危者獲安故曰七日白雲郭氏曰震之動自下而上在震之初猶欲恐懼脩省況二之乘剛乎故震來則危厲而喪失隨之也躋于九陵避其來也不知脩省而避非其道也故不待逐而七日可得言不可避也七日一卦之復復則自來矣易說漢上朱氏曰九四震自上來而下乘初九之剛此六二所以危厲不安二動成兊離兊為口億也億虞氏本作噫於其反虞翻曰惜也兊離為蠃蠃貝也貝貨貝也古者貨貝而寳龜貝者二之所利九四艮山在大塗之下陵也九陽之極數七之變太𤣥曰九也者禍之窮也二惜其所利避初之五震足升於四之上躋于九陵逐利而往然離毁貝喪復乘四剛其禍愈烈何所避哉震為作足之馬初之四四亦為馬逐之象也六二不逐所喪中正自守則所喪不逐而自得矣自二數至上又自初數至二其數七二復成兊離得貝之象離為日勿逐七日得也易傳曰守其中正而不自失過則復其常矣易傳新安朱氏曰六二乘初九之剛故當震之來而危厲也億字未詳又當喪其貨貝而升于九陵之上然柔順中正足以自守故不求而自獲也此爻占具象中但九陵七日之象則未詳耳本義億喪貝有以億作噫字解底震六二不甚可曉大概是喪了貨貝又被人趕上髙處去只當固守便好並語録六三震蘇蘇震行无眚象曰震蘇蘇位不當也伊川先生曰蘇蘇神氣緩散自失之狀三以隂居陽不正處不正於平時且不能安況處震乎故其震懼而蘇蘇然若因震懼而能行去不正而就正則可以无過眚過也三行則至四正也動以就正為善故二勿逐則自得三能行則无眚以不一有中字正而處震懼有眚可知其恐懼自失蘇蘇然由其所處不當故也不中不正其能安乎並易傳横渠先生曰蘇蘇亦索索之義處非其地故危困不一能懼而改行則无眚矣易說藍田吕氏曰六三不當其位處之不安若除草然不忘乎戒則雖震不行可以无眚矣蘇除草也除草者恐有百蟲之害故戒白雲郭氏曰震自初動六三逺於動者而能蘇蘇然畏懼不自安是以行而无過眚也不敢自安者知位之不當亦所謂知懼者也易說漢上朱氏曰六三在坎陷中處不當位震懼自失故震蘇蘇震為反生三震之極震極反生蘇也春秋外傳殺秦諜三日而蘇若太𤣥謂震於利顛仆死則不復蘇矣易傳曰蘇蘇神氣緩散自失之狀處不當位震懼自失而不知動其禍自取也故曰眚若因震懼而行出險就正何眚之有易傳曰三行至四正也易傳新安朱氏曰蘇蘇緩散自失之狀以隂居陽當震時而居不正是以如此占者若因懼而能行以去其不正則可以无眚矣本義九四震遂泥象曰震遂泥未光也伊川先生曰九四居震動之時不中不正處柔失剛健之道居四无中正之徳陷溺於重隂之閒不能自震奮者也故云遂泥泥滯溺也以不正之陽而上下重隂安能免於泥乎遂无反之意處震懼而莫能守也欲震動則莫能奮也震道亡矣豈復能光亨也陽者剛物震者動義以剛處動本有光亨之道乃失其剛正而陷於重隂以致遂泥豈能光也云未光見陽剛本能震也以失徳故泥耳並易傳横渠先生曰處衆隂之中為衆附比剛陽之徳而以位隂故泥而未光也易說藍田吕氏曰九四一陽居四隂之中為隂所宗乃以陽居隂震懼已甚泥而不通自保則可未足光也白雲郭氏曰九四處多懼之地陷於重隂之間无中正之徳以自將故不能有行而遂泥也滯溺不自振又安有光亨之道乎易說漢上朱氏曰坎水坤土泥也震足陷於泥中滯泥也陽有可震之剛動則有光而四自二進遂行而不反四失位陷於泥中處則莫能守動則莫能奮震道未光也知其不可遂反而處三震懼得正俟時而動則光矣坎離正光也二三兩爻相易取義夫初九九四均震也六二喪貝六五无喪當位不當位之異也荀本作隧或云遂隧古通用易傳新安朱氏曰以剛處柔不中不正陷於二隂之閒不能自震也遂者无反之意泥滯溺也本義六五震往來厲億无喪有事象曰震往來厲危行也其事在中大无喪也伊川先生曰六五雖以隂居陽不當位為不正然以柔居剛又得中乃有中徳者也不失中則不違於正矣所以中為貴也諸卦二五雖不當位多以中為美三四雖當位或以不中為過中常重於正也葢中則不違於正正不必中也天下之理莫善於中於六二六五可見五之動上往則柔不可居動之極下來則犯剛是往來皆危也當君位為動之主隨宜應變在中而已故當億度无喪失其所有之事而已所有之事謂中徳茍不失中雖有危一有終字不至於凶也億度謂圖慮求不失中也五所以危由非剛陽而无助若以剛陽有助為動之主則能亨矣往來皆危時則甚難一作艱但期於不失中則可自守以柔主動固不能致亨濟也往來皆厲行則有危也動皆有危唯在无喪其事而已其事謂中也能不失其中則可自守也大无喪以无喪為大也並易傳横渠先生曰懼往亦厲懼來亦厲能行已以危則富貴可保故曰无喪有事猶云不失其所有也以其乘剛故危以其在中故无喪禍至與不至皆懼則无喪有事一有云懼隂之中易說藍田吕氏曰六五與六二同為乘剛而无應然六二无應在下故往亦厲六五居中履尊故億无喪有事居尊履中雖以柔居亦可以有事於天下茍有事於天下則大无所喪矣白雲郭氏曰二以來厲而喪貝則五之往來皆厲宜其大有喪也得无喪有事亦幸矣有事者其事也謂六五之君事也象言危行者往來皆厲行則危也六五往而上則即柔來而下則乘剛皆䘮有事之道是以知其危也六五位雖不正而用中焉其事既不失中道雖涉危行可以大无喪矣以无喪為大則知喪之亦大也億者恐懼驚嘆之辭說者或為辭或為萬億或為億度其義頗不能通為辭近之易說漢上朱氏曰五往而上則柔不可居動之極來而下則乘剛往來皆危行也億虞氏作噫五動成兊巽兊口噫也惜之辭巽為事五之所有事在中而已五剛大乃能无喪有事柔則危剛大守中雖甚危之時可以致亨五无喪有事則二往助之矣易傳曰諸卦雖不當位多以中為美三四雖當位或以不中為過葢中則不違於正正不必中也天下之理莫善於中於二五見之矣易傳新安朱氏曰以六居五而處震時无時而不危也以其得中故无所喪而能有事也占者不失其中則雖危无喪矣本義六五是生於憂患死於安樂語録上六震索索視矍矍征凶震不于其躬于其鄰无咎婚媾有言象曰震索索中未得也雖凶无咎畏鄰戒也伊川先生曰索索消索不存之狀謂其志氣如是六以隂柔居震動之極其驚懼之甚志氣殫索也矍矍不安定貌志氣索索則視瞻徊徨以隂柔不中正之質而處震動之極故征則凶也震之及身乃于其躬也不于其躬謂未及身也鄰者近於身者也能震懼於未及身之前則不至於極矣故得无咎茍未至於極尚有可改之道震終當變柔不固守故有畏一作見鄰戒而能變之義聖人於震終示人知懼能改之義為勸深矣婚媾所親也謂同動者有言有怨咎之言也六居震之上始為衆一作震動之首今乃畏鄰戒而不敢進與諸處震者異矣故婚媾有言也所以恐懼自失如此以未得於中道也謂過中也使之得中則不至於索索矣極而復征則凶也若能見鄰戒而知懼變於未極之前則无咎也上六動之極震極則一作之終有變義也並易傳横渠先生曰危以動懼以語无交而求則民弗與也故以征則凶能以鄰為懼則可免咎鄰謂五也五既附四已或與焉則招悔而有言矣能以鄰為戒不待及身而戒則无咎易說白雲郭氏曰居震之極无中以自守内積驚懼失所處之道是以志氣索索然而其瞻視亦矍矍然不安也能止而守不過驚懼而已以征則凶也震驚之來未及其身方及其鄰能畏懼而戒之如此則无咎矣葢先時而懼未至於極故也婚媾所親也有言失之小也處震之極得无大咎足矣小有言葢不可得而免也象言中未得者以失中道故索索然也震卦言􅊒􅊒啞啞蘇蘇索索矍矍與二五之言億諸卦皆无其義雖多恐懼之貌亦於爻義各有辨也易說漢上朱氏曰上六過中處震之極窮而氣索將下交於三三亦過中而窮莫助之者是以恐懼失守窮之又窮故曰震索索中未得也使得中自持則不至於窮索矣懼而動成離離為目動而不正則否或動或否目不安定視矍矍也視矍矍者以震索索也恐懼如此當守其正征則凶征者以正行亦動也坤為身四折之為躬鄰謂五五有乘剛之危所以无喪者得中也上六未嘗乘剛而畏之茍知鄰之无喪者在於得中能自戒懼不動則雖處凶地而无咎矣无咎者得正也五震而動兊為口戒也上六六五隂也九四陽也六九相配有婚媾之義上六不得乎三或來交四則五必有言四五相比上安得而配之上既不可以交三又不可以交四以此見上六終不可動故曰征凶横渠曰五既附四已或與焉則招悔而有言矣能以鄰為戒則无咎易傳曰聖人於震終示人知懼能改之義為勸深矣易傳新安朱氏曰以隂柔處震極故為索索矍矍之象以是而行其凶必矣然能及其震未及其身之時恐懼脩省則可以无咎而亦不能免於婚媾之有言戒占者當如是也中謂中心本義上六不全好但能恐懼於未及身之時可得无咎然亦不免它人語言語録合訂刪補大易集義粹言卷五十五
