body:
  text: 合訂刪補大易集義粹言卷六十五頭等侍衛納喇性德編兊下巽上伊川先生曰中孚序卦節而信之故受之以中孚節者為之制節使不過越也信而後能行上能信守之下則信從之節而信之也中孚所以次節也為卦澤上有風風行澤上而感於水中為中孚之象感謂感而動也內外皆實而中虛為中孚之象又二五皆陽一有而字中實亦為孚義在二體則中實在全體則中虛中虛信之本中實信之質易傳中孚豚魚吉利涉大川利貞伊川先生曰豚躁魚冥物之難感者也孚信能感於豚魚則無不至矣所以吉也忠信可以蹈水火況涉川乎守信之道在乎堅正故利於貞也易傳白雲郭氏曰雜卦曰中孚信也夫信者孚之一也孚者其道之大全也以信不足以盡孚故必曰中孚然有信之而信者有作也有未嘗信之而信者無作也無作中孚是也故自人之為德論之則曰信又其小者則信於言而已自道論之則曰孚或未見於有為而其道可孚或無其人焉而是道為可孚皆曰有孚也故孚之道有無心於信天下而天下信之之意無不感也無不通也亦無不受而容之也無作也無止也亦無損益盛衰之理有孚於一身於一家於一國於天下逺近大小衆寡之不同其孚一也然易之卦皆道也而爻則人也在卦辭言之則主道也在爻辭言之則言乎其人也而中孚又以名卦者以信不足以名卦也且道有誠有孚有信人或未之别蓋信者孚之一也孚者誠之一也道之所至誠亦至焉故道大誠亦大而孚為道之信信為人之德是其别也自二帝以來言信者蓋寡至成湯而後言彰信兆民文王演易復稱孚詩人亦言上天之載無聲無臭儀刑文王萬邦作孚故道之盛者後世莫若文王也至武王而後復言惇信明義及乎世衰道微人不知孚之為道獨知信而已孔子作易所以曉天下萬世欲其明而無惑故為言曰中孚信也是使後世由信而可得中孚之道也學者於此即以信為孚以孚為信不知孚之有别斯失聖人釋經之旨矣夫中孚之象中虛也虛已而對物則無物在物先來則應之不來則無應此中孚之為信所以進乎誠也苟實其中則先物有物矣先物有物則不誠在物先安得謂之孚乎故子絶四曰毋我毋我則虛己矣是無先物之物也上天之載無聲無臭亦不過如是而已使有聲臭實其中非天道也有物以實其中非聖人之道也豚魚吉者信及豚魚也惟天地之道可信及豚魚蓋天地以生為德而無私於豚魚以生為德故豚魚以是道而生信及也使有心於豚魚則信及者微而其不及者大非天地也聖人法之亦如是而已信及豚魚則孚於天下可知也利涉大川中虛之有濟也利貞者中虛之德也中虛之德天德也易説新安朱氏曰孚信也為卦二隂在內四陽在外而二五之陽皆得其中以一卦言之為中虛以二體言之為中實皆孚信之象也又下説以應上上巽以順下亦為孚義豚魚無知之物又木在澤上外實內虛皆舟楫之象至信可感豚魚涉險難而不可以失其貞故占者能致豚魚之應則吉而利涉大川又必利於貞也本義彖曰中孚柔在內而剛得中説而巽孚乃化邦也豚魚吉信及豚魚也利涉大川乘木舟虛也中孚以利貞乃應乎天也伊川先生曰二柔在內中虛為誠之象二剛得上下體之中中實為孚之象卦所以為中孚也以二體言卦之用也上巽下説為上至誠以順巽於下下有孚以説從其上如是其孚乃能化於邦國也若人不説從或違拂事理豈能化天下乎信能及於豚魚信道至矣所以吉也以中孚一作虛涉險難其利如乘木濟川而以虛舟也舟虛一有中字則無沈覆之患一無之患二字卦虛中為虛舟之象中孚而貞則應乎天矣天之道孚貞而已並易傳橫渠先生曰中孚上巽施之下悅承之其中必有感化而出焉者蓋孚者覆乳之象有必生之理信且正天之道也易説藍田吕氏曰中孚信由中而達外也乘木舟虛者巽體而柔在內也白雲郭氏曰中孚之象二隂居內而二五剛中下説而上巽故孚聖人法此所以化邦也儀刑文王萬邦作孚豈非化邦之謂歟豚魚物之至微而無知者信之難及者也信及豚魚況於有知者乎又況於人乎觀此則化邦可知矣巽木也木而中虛所以難可濟也利貞乾德也虛中而利貞其孚所以應天而大也易説漢上朱氏曰中孚自遁來訟之變也二五不應六三孚於上六四孚於下二爻在中而孚中孚也易傳曰中虛者信之本中實者信之質夫信之未彰無形矣其中已有信也非中虛乎靜而正發而當反諸已而不怍斷然如金石之不可易非中實乎故曰柔在內而剛得中此以三四二五言中孚也上巽施之下説從之巽説相與不期於孚而孚焉猶鳥之孚卵也巽伏於上説從於下不動而柔者化剛者應拚然而飛矣化邦之道不幾於是乎坤在上為邦國外巽內説感之以誠信久而自化不為而成也其象巽離化坤巽離者萬物化成之時故曰説而巽孚乃化邦也此總六爻而言中孚也豚魚六四也中孚六四即訟坎之初坎為豕其初為豚三兊為澤四巽乎澤為魚六四一爻具豚魚之象而在中孚之中信及豚魚也先王之交萬物無非信也取之必有時用之必有節風有騶虞信及豚也頌有潛魚信及魚也動物之蕃息者莫如豚魚信及豚魚上下草木鳥獸無所不及而至誠之道可以贊天地之化育如是乃吉六四正也正則吉信至於賞罰而示之者未矣非心服也其終必凶故曰豚魚吉彖曰信及豚魚也此以四六言中孚也坎為險難初越二三涉坎成巽巽為股涉大川也兊澤而為大川決而成川也巽為木兊金刳其中舟虛也舟虛者中虛之象九五巽體其中虛不以好惡之私纍其心其下説而不違利以濟難也夫乘木之利乘桴不如乘舟重載而乘險者不如虛舟之為安仗誠信而蹈大難猶乘木而其中枵然豈復有風波之虞哉古之人虛己遊世五兵兕虎不能害用此道也故曰利涉大川乘木舟虛也此以四五言中孚之功也天之道不言而善信四時自成萬物自生正而已矣正誠也六四之正乃應乎天者以其心正其心正則其意誠乃應於天之道非人為也故曰中孚以利貞乃應乎天也此以六四初九相應言中孚也初九本九四乾在上為天之象在卦氣為冬至故太玄準之以中易傳又曰中孚王洙曰柔在內而巽説合和之性也剛得中而上下信化育之道也中孚天理之端叶於教化之義若鳥之孚卵柔渾於內而剛鷇於外嫗伏化羽不違其期自然之信也此與小過旁通自中孚而變故小過有飛鳥之象焉叢説廣漢張氏曰詹體仁闢齋於便坐屬豫名以其虛且長也則題之曰虛舟他日體仁謂豫曰漆園之説遁而離吾無取焉耳在易之中孚利涉大川乘木舟虛將於是焉體之豫嘆其善思也則又為之銘心本虛理則實應事物無轍迹來不迎去不留彼萬變我日休行斯通險可濟孚豚魚貫天地曷臻兹在克己去其窒斯虛矣南軒集新安朱氏曰説而巽孚乃化邦以卦體卦德釋卦名義利涉大川乘木舟虛以卦象言中孚以利貞乃應乎天信而正則應乎天矣並本義象曰澤上有風中孚君子以議獄緩死伊川先生曰澤上有風感於澤中水體虛故風能入之人心虛故動能感之風之動乎澤猶物之感於中故為中孚之象君子觀其象以議獄與緩死君子之於議獄盡其忠而已於決死極於惻而已故誠意常求於緩緩寬也於天下之事無所不盡其忠而議獄緩死最其大者也易傳藍田吕氏曰澤中氣散而為風澤上有風澤氣達其外者也中心􅉃怛則愛人之仁達之於外則聽訟而求生白雲郭氏曰治獄聽訟虛中為先實其中則有閡此中孚之卦君子所以議獄緩死也議獄亦舉一端言之也凡天下之務當虛中者皆如治獄用中孚之道也且聖人之為治也有道以為之本刑罰助治而已非聖人之所専任以治天下也知此則知虛中之道矣不知此則刑罰先實其中道無自而入焉是其為治無適而非刑也安得議獄緩死之事哉如書言宥過無大又言罪疑惟輕皆議獄之謂也觀舜與臯陶之言然後知聖人之刑舜之戒臯陶曰眀于五刑以弼五教則五刑者正所以弼五教故命臯陶於契之後非五刑可獨任以致治也曰刑期于無刑民協于中則聖人之心以無刑在刑之先此蓋虛中之道也其命臯陶則先曰蠻夷猾夏寇賊姦宄故知舜之刑由蠻夷猾夏寇賊姦宄而有之非此則無用於刑也臯陶稱帝之德曰宥過無大刑故無小罪疑惟輕功疑惟重與其殺不辜寧失不經則知聖人之刑皆不得已而用也不得已而用則由天下有罪而後有刑蓋聖人不先刑以制天下也故至於好生之德洽於民心則盡孚天下之道矣中孚之獄如是而已後世舍道德仁義獨任刑以為治者不患天下之不孚而患網之不密不患德之不洽而患文之不峻於是有刲屠夷族之禍而人之有生殆犬彘之不如矣又安足與語中孚之道哉秦漢是已易説漢上朱氏曰澤上有風澤中應之中孚也中孚信也中孚自訟變坎為獄九四之初坎成兊兊口為議獄也議獄者議其獄情之正否也艮六變成中孚艮體盡矣為遊魂遊魂死之象震為反生緩死也緩死者未必死也君子議獄緩死則好生之德孚於上下矣傳曰冬至四十五日條風至出輕刑解稽留法此象乎易傳新安朱氏曰風感水受中孚之象議獄緩死中孚之意本義議獄緩死只是以誠意求之澤上有風感得水動議獄緩死則能感人心語録初九虞吉有它不燕象曰初九虞吉志未變也伊川先生曰九當中孚之初故戒在審其所信虞度也度其可信而後從也雖有至信若不得其所則有悔吝故虞度而後信則吉也既得所信則當誠一若有他則不得其燕安矣燕安裕也有它志不定也人志不定則惑而不安初與四為正應四巽體而居正無不善也爻以謀始之義大故不取相應之義若用應則非虞也當信之始志一無志字未有所從而虞度所信則得其正是以吉也蓋其志未有變動志有所從則是變動虞之不得其正矣在初言求所信之道也並易傳橫渠先生曰為信之始其信未孚而志應在四進有二三剛柔之間非以禮自防使為衆所信取悔之道也故必防其萌使志不亂孚交如則威如乃吉易説藍田吕氏曰初九中孚之初剛而有應慮未孚於所應自防而不安於它志一不變者也故曰虞吉有它不燕虞如虞行防守也燕安也白雲郭氏曰中孚之虛無物閡其中故其孚最為近誠虞吉者審度吉道而有行也度吉而行固善道也然已為有物非中孚之虛矣故言有它有它則中實非安於中孚之道象言志未變者言虞吉有它之志未能忘也忘此則中孚矣初九中孚之始未能盡其道故尚有虞吉之志盡中孚之道者無適而非吉又何虞乎易説漢上朱氏曰中孚之初戒在審慎其所信初九六四正應也初宜信四而初四相易以失位為憂以其有憂也故虞度之虞乃不失其正應故吉虞度而得其所從宜誠一不二有它則擇利而動心無所主惑矣燕謂三也雷在澤中有燕息之象三非初之正應初與三同體説乎隂而往應之為有它初之三歸妹象毁而不燕以其二也初九所以虞吉者得其所從其志未變於三變於三矣何燕之有易傳新安朱氏曰當中孚之初上應六四能度其可信而信之則吉復有他焉則失其所以度之之正而不得其所安矣戒占者之辭也本義東萊吕氏曰或問上蔡語録云心之窮物有盡而天者無盡如之何包之竊意窮物蓋窮理也萬物各有其理將欲處之各盡其道非研窮工夫則無由得然人固自有天然之本體純粹清明不待思慮不勞計度遇事觸物而吾胸中一際接焉固有至當之理油然而生若夫心之容物固所以求其天奈何人之私意易萌思慮所不及計度所不逮則背理傷義未能保其不無也往時侍坐誨以易傳中孚之初九曰志有所從則是變動虞之不得其正矣夫既變則已違夫天矣虞之則涉於人固有正不正矣恐亦是此意乞賜詳誨答曰心之窮物有盡而天者無盡橫渠所謂有外之心不足以合天心也來説為近别集九二鶴鳴在隂其子和之我有好爵吾與爾靡之象曰其子和之中心願也伊川先生曰二剛實於中孚之至者也孚至則能感通鶴鳴於幽隱之處不聞也而其子相應和中心之願相通也好爵我有而彼亦係慕説好爵之意同也有孚於中物無不應誠同故也至誠無逺近幽深之間故繫辭云善則千里之外應之不善則千里之外違之言誠通也至誠感通之理知道者為能識之中心願謂誠意所願也故通而相應並易傳橫渠先生曰居中體巽無所私係德必有鄰物願所歸位以德致為五所任故曰與爾靡之靡偃也順從之也易説藍田吕氏曰九二中孚之時以剛居中而無私應至誠虛心樂善者也以陽居隂又處二隂之下慎獨為善不愧屋漏也至誠慎獨則凡同氣類者雖逺必應故鶴鳴在隂其子和之至誠好善則樂與賢者共之故我有好爵吾與爾靡之白雲郭氏曰中孚之道與物無閡況於交感之際為感通之易者乎是猶鶴鳴於幽隂之中而其子和之必至之理也有好爵以與爾靡之又其子之願也是其所以和也好爵猶美道也吾與爾靡其道虛己以容人也蓋言中孚之美道其能感人也虛己而已然中孚本應物之道二得之而三失之易説漢上朱氏曰訟離為飛鳥變震為鶴説卦震為鵠鵠古鶴字也穆天子傳列子皆以鵠為鶴鶴震聲感兊鳴於正秋九二之象也九二剛實而中中孚之至者九居二鳴鶴在隂也坤為母巽四為子四與二同震體而九二陽為大六四隂為小故四有子之象二四志同二鳴而四和二中也四亦中虛心之象其應豈強為哉出於中心願而已矣荀子所謂同焉者合類焉者應故曰其子和之中心願也巽為命五出命者也陽為美好好爵者爵命之美吾四自謂也我四謂五猶曰我君也爾親乎二也二誠於中四自和之若曰我君有好爵吾與汝共靡之非二有求於四也四於五其疏附之臣乎靡子夏傳陸績作縻巽為繩縻係之象當作縻孟子曰我善養吾浩然之氣莊子曰吾無食我無糧古人文章相錯而成此爻所謂我吾亦然易傳曰至誠無逺近幽深之間惟知道者識之易傳新安朱氏曰九二中孚之實而九五亦以中孚之實應之故有鶴鳴子和我爵爾靡之象鶴在隂謂九居二好爵謂得中靡與縻同言懿德人之所好故好爵雖我之所獨有而彼亦繫戀之也本義鶴鳴子和亦不可曉好爵爾靡亦不知是説甚底繫辭中又説從别處去中孚九二爻自不可曉看來我有好爵吾與爾靡之是兩箇都要這物事所以鶴鳴子和是兩箇中心都愛所以相應如此並語録六三得敵或鼓或罷或泣或歌象曰或鼓或罷位不當也伊川先生曰敵對敵也謂所交孚者正應上九是也三四皆以虛中為成孚之主然所處則異四得位居正故亡匹以從上三不中失正故得敵以纍志一作心以柔説之質既有所係惟所信是從或鼓張或罷廢或悲泣或歌樂動息憂樂皆從乎所信也惟係所信故未知吉凶然非眀達君子之所為也居不當位故無所主惟所信是從一本有是以二字所處得正則所信有方矣並易傳橫渠先生曰處非所安物之所惡剛而乘之柔不相比進退之際惟敵是求不恆其德莫非已致一作惟敵是得故求之云云易説藍田吕氏曰六三以隂居陽雖與上九應而比於六四近不相得所以得敵以柔處下既不能勝故或鼓或罷位既不當又不安常故或泣或歌白雲郭氏曰自一卦論之則三四為虛中自爻言之則六三之不當位又不若六四之能虛己也且中孚之道不立己何得敵之有得敵則有已甚於虞吉故物或怒之則鼓或困之則罷或悲之則泣或樂之則歌四者有感於外而動於中者也感於外而動於中不能忘敵也不能忘敵有我之過也惟中孚虛己無與為敵外物之來如投虛然或怒之則無鼓也或困之則無罷也或悲之則無泣也或樂之則無歌也舉無得敵之理則其道全矣易説漢上朱氏曰敵者勢均而不相下也艮之彖曰上下敵應不相與也言六爻勢均當應而否故子夏傳曰三與四為敵蓋三四同體而異意近而不相得六三不正小人也六四正君子也三小人不見信於君子而志在得四四終不可得震為鼓三動鼓而進將以張之也而四不應既罷而息將以誘之也而四不來三動離為目兊澤流目或泣以感之而四不憂巽為長震為聲兊口為言長聲以永其言或歌以樂之而四不恱或鼓或罷或泣或歌小人之情狀盡矣四守正終莫得之處位不當無以取信於君子也豈能強得之哉易傳新安朱氏曰敵謂上九信之窮者六三隂柔不中正以居説極而與之為應故不能自主而其象如此本義問中孚六三大義是如何曰某所以説中孚小過皆不可曉便是如此依文解字看來只是不中不正所以歌泣喜樂都無常也語録六四月幾望馬匹亡無咎象曰馬匹亡絶類上也伊川先生曰四為成孚之主居近君之位處得其正而上信之至一作位當孚之任者也如月之幾望盛之至也已望則敵矣臣而敵君禍敗必至故以幾望為至盛馬匹亡四與初為正應匹也古者駕車用四馬不能備純色則兩服兩驂各一色又小大必相稱故兩馬為匹謂對也馬者行物也初上應四而四亦進從五皆上行故以馬為象孚道在一四既從五若復下係于初則不一而害於孚為有咎矣故馬匹亡則無咎也上從五而不係於初是亡其匹也係初則不進不能成孚之功也絶其類而上從五也類謂一作相應也並易傳橫渠先生曰誠以接物體巽居柔隂德之盛美者也隂德盛美物所願交故必一其所應絶類於上使隂不疑陽如月近望而不過於盈可以無一作免咎易説藍田吕氏曰六四以隂居隂隂之盛者居巽之下不敢盈也故曰月幾望與三皆隂匹也棄其類匹上乘九五故曰馬匹亡能體柔巽舍不肖而尚賢故無咎白雲郭氏曰六四處得其正蓋有中孚之道者月幾望居盛位而不盈也馬匹亡舍衆志而獨上也六四近君有自盈之失今月幾望則虛已而不盈矣馬匹不亡則有鼓罷泣歌之纍今馬匹亡則安行上道終無得敵之理是以無咎也匹亦敵之類也得敵匹亡其道相反也彖言柔在內而爻則其道相反蓋卦爻取義有不得而同者也易説漢上朱氏曰四處當位近君其道上行成孚者也訟離為日坎為月坎變震月在東也離變兊日在西也月東日西望也五在中四為幾望隂道之盛盛則敵君禍敗必至不可不戒古者駕車四馬兩服為匹兩驂為匹不能四馬則駕兩馬曰駢駢亦匹也四震為作足馬四應初成坎坎為美脊之馬兩馬匹也震坎陽卦類也四之上絶其類而不應則馬匹亡矣孚道在一四上從五亡其匹則絶係應之私無敵君之禍易傳曰係初則不進其能成孚乎易傳新安朱氏曰六四居隂得正位近於君為月幾望之象馬匹謂初與己為匹四乃絶之而上以信於五故為馬匹亡之象占者如是則無咎也本義九五有孚攣如無咎象曰有孚攣如位正當也伊川先生曰五居君位人君之道當以至誠感通天下使天下之心信之固結如拘攣然則為無咎也人君之孚不能使天下固結如是則億兆之心安能保其不離乎五居君位之尊由中正之道能使天下信之如拘攣之固乃稱其位人君之道當如是也並易傳橫渠先生曰處乎盛位而信不交物未免於咎也易説藍田吕氏曰九五剛中居尊信結於下故曰有孚攣如無咎白雲郭氏曰孚之道無不通亦無不感可以通天下之志至於固結攣如是以無咎九五君位足以感通天下又無私應之纍故直曰有孚攣如位正當而已易説漢上朱氏曰九五在上六四在下君臣之位正也九五剛健中正六四柔巽正而順君臣之德當乎位也五四君臣相孚上下固結如攣然相易以致相孚故無咎攣拘攣也五四相易有巽服艮手離目相就拘攣之象大忠為令德茍非其人不可君臣之際非位正德當其孚如是豈能無咎乎易傳新安朱氏曰九五剛健中正中孚之實而居尊位為孚之主者也下應九二與之同德故其象占如此本義上九翰音登于天貞凶象曰翰音登于天何可長也伊川先生曰陽性上進風體飛揚九居中孚之時處於最上孚於上進而不知正者也其極至於羽翰之音登聞于天貞固於此而不知變凶可知矣夫子曰好信不好學其蔽也賊固守而不通之謂也守孚至於窮極而不知變豈可長久也固守而一無而字不通如是則凶也並易傳橫渠先生曰處信之極好居物上信而無實窮上必凶一云將變而為小過也易説藍田吕氏曰上九以陽居上其聲逺聞而實不稱以是為正勢不可長是以凶也翰者飛而鳴也飛而鳴者雖逺聞其聲虛也況登于天乎白雲郭氏曰中孚虛己也虛己者道之虛也道之虛故足以應天下之實而無不通焉是以聖人尚之也翰音登于天聲之虛也聲之虛不足以有為也以是為貞則凶矣虛聲無實非可久之道也九五知虛己而用道於中故足以通天下之志上九獨務虛聲而事於外不知其道已喪於中矣故凶而不可久也易説漢上朱氏曰巽為雞剛其翰也柔其毛也翰羽翮也震為聲上動反三成兊雞振其羽翮而後聲出於口翰音也乾五為天六三往上隂為虛翰音登于天也鳥之類聲聞于天者鶴也雞無是實虛聲聞于上雖登于天須臾則反其可長乎巽為長三之上巽毁何可長也不信之極正乎其凶故曰貞凶張載曰信而無實窮上必凶易傳新安朱氏曰居信之極而不知變雖得其貞亦凶道也故其象占如此雞曰翰音乃巽之象居巽之極為登于天雞非登天之物而欲登天信非所信而不知變亦猶是也本義鄭東卿説易象亦有好處如説中孚有卵之象小過有飛鳥之象孚字從爪從子如鳥以爪抱卵也蓋以卦言之四陽居外二隂居內外實中虛有卵之象又言鼎象鼎之形革象風爐這是他説得好處他却盡欲牽合附會少間便疏脫今人學問且欲於正段處理會却些小零碎底亦用得一向只是理會這箇便不是語録合訂刪補大易集義粹言卷六十五
