body:
  text: 合訂刪補大易集義粹言卷三十五頭等侍衛納喇性徳編艮下兊上伊川先生曰咸序卦有天地然後有萬物有萬物然後有男女有男女然後有夫婦有夫婦然後有父子有父子然後有君臣有君臣然後有上下有上下然後禮義有所錯天地萬物之本夫婦人倫之始所以上經首乾坤下經首咸繼以恒也天地二物故二卦分為天地之道男女交合而成夫婦故咸與恒皆二體合為夫婦之義咸感也以説為主恒常也以正為本而説之道自有正也正之道固有説焉巽而動剛柔皆應説也咸之為卦兊上艮下少女少男也男女相感之深莫如少者故二少為咸也艮體篤實止為誠慤之義男志篤實以下交女心説而上應男感之先也男先以誠感則女説而應也易傳咸恒體用也體用无先後劉絢師説横渠先生曰咸之為道以虚受為本有意於中則滯於方體而隘矣拇腓股脢輔以一卦通體高下為言易説新安朱氏曰否泰咸恒損益既濟未濟此八卦首尾皆是一義如咸皆是感動之義之類或問咸内卦艮艮止也何以皆説動曰艮雖是止然咸有交感之義都是要動所以都説動卦體雖是動妄動便不吉動之所以不吉者以其内卦屬艮也咸就人身取象看來便也是有些取象説咸上一畫如人口中三畫有腹背之象下有人脚之象艮就人身取象便也似如此上一陽畫有頭之象中二隂有口之象所以艮其輔於五爻言之内卦以下亦有足象並語録東萊吕氏曰咸恒二卦須合看咸卦説中有正恒卦正中有説何故咸兊上艮下兊説艮止故説中有正恒震上巽下震動巽順故正中有説咸卦少女少男故為説恒卦長女長男故為正易説咸亨利貞取女吉伊川先生曰咸感也不曰感者咸有皆義男女交相感也物之相感莫如男女而少復甚焉凡君臣上下以至萬物皆有相感之道物之相感則有亨通之理君臣能相感則君臣之道通上下能相感則上下之志通以至父子夫婦親戚朋友皆情意相感則和順而亨通事物皆然故咸有亨之理也利貞相感之道利在於正也不以正則入於惡矣如夫婦之以淫姣君臣之以媚説上下之以邪僻皆相感之不以正也取女吉以卦才言也卦有柔上剛下二氣感應相與止而説男下女之義以此義取女則得正而吉也易傳白雲郭氏曰易卦六爻皆相應者有泰否咸恒損益既濟未濟八卦雖名義各有所主而其為道皆大咸以感為義葢无所不感故謂之咸感而无不通是以言亨咸无不亨上也利貞以感次也夫婦之感人倫之始人道之大也是以以咸取女則无不吉然序卦言天地萬物男女夫婦父子君臣上下皆有咸之道者也聖人明人道故卦辭以男女為言而彖并天地萬物言之所以盡卦之象也易説新安朱氏曰咸交感也兊柔在上艮剛在下而交相感應又艮止則感之專兊説則應之至又艮以少男下於兊之少女男先於女得男女之正婚姻之時故其卦為咸其占亨而利貞取女則吉盖感有必通之理然不以貞則失其亨而所為皆凶矣本義東萊吕氏曰咸亨利貞取女吉天下之理有通有塞以誠相感無所不通一或不誠則雖近而一家亦閉塞而不通故交相感乃亨然交相感三字言之甚易曉其所以交相感之理則難知也若我至誠必待彼至誠然後謂之交相感則是有待於外彼或不誠則不能相感矣此説甚未安我苟至誠則天下自然相感初无待於外也然人之交相感易不得正故必利貞然後亨易説彖曰咸感也柔上而剛下二氣感應以相與止而説男下女是以亨利貞取女吉也天地感而萬物化生聖人感人心而天下和平觀其所感而天地萬物之情可見矣伊川先生曰咸之義感也在卦則柔爻上而剛爻下柔上變剛而成兊剛下變柔而成艮隂陽相交為男女交感之義又兊女在上艮男居下亦柔上剛下也隂陽二氣相感相應而和合是相與也止而説止於説為堅慤之意艮止於下篤誠相下也兊説於上和説相應也以男下女和之至也相感之道如此是以能亨通而得正取女如是則吉也卦才如此大率感道利於正也既言男女相感之義復推極感道以盡天地之理聖人之用天地二氣交感而化生萬物聖人至誠以感億兆之心而天下和平天下之心所以和平由聖人感之也觀天地交感化生萬物之理與聖人感人心致和平之道則天地萬物之情可見矣感通之理知道者黙而觀之可也並易傳横渠先生曰咸感也其爻雖相應而辭多不吉顧其時如何耳説者多以咸恒配天地殊不知咸自可配天地故於序卦獨不言咸咸既可以配天地則恒亦可以配天地皆夫婦之道也咸之為言皆也故語咸則非事咸感也不可止以夫婦之道謂之咸此一事耳男女相配故為咸也感之道不一或以同而感聖人感人心以道此是以同也或以異而應男女是也二女同居則无感也或以相説而感或以相畏而感如虎先見犬犬自不能去犬若見虎則能避之又如磁石引針相應而感也若以愛心而來者自相親以害心而來者相見容色自别聖人感人心而天下和平是風動之也聖人老吾老以及人之老而人欲老其老此是以事相感也感如影響无復先後有動必感咸感而應故曰咸速也易説能通天下之志者為能感人心聖人同乎人而无我故和平天下莫盛於感人心有无一内外合庸聖同此人心之所自來也若聖人則不專以聞見為心故能不專以聞見為用无所不感者虚也感即合也咸也以萬物本一故一能合異以其能合異故謂之感若非有異則无合天地乾坤隂陽也二端故有感本一故能合天地生萬物所受雖不同皆无須臾之不感所謂性即天道也感者性之神性者感之體在天在人其究一也惟屈信動静終始之能一也故所以妙萬物而謂之神通萬物而謂之道體萬物而謂之性並正蒙龜山楊氏曰有天地然後有萬物有萬物然後有男女有男女然後有夫婦有夫婦然後有父子君臣上下而禮義有所錯故上經始於乾坤乾坤萬物父母也下經始於咸恒咸恒夫婦之義也艮山也兊澤也山澤通氣而交感形焉卦之所以為咸也咸也者交相感之謂也與天地定位雷風相薄水火不相射異矣剛上而柔下剛柔之定位也柔上而剛下二氣感應以相與也止而説以卦之才言兊三索而得女艮三索而得男兊上艮下男下女也男正位乎外女正位乎内各止其所也夫婦之道止而不説則離説而不止則亂男不下女則剛不接非夫婦之正也故止而説男下女然後亨正取女吉也夫天地萬物一體也情也者感而動也觀其所感而天地萬物之情可見矣以其无二故也易説兼山郭氏曰蜀才曰此本否卦六升上上九降三是柔上剛下二氣交感相與也咸感也而謂之咸有以无心感者然後盡咸之義如天地之感也以氣聖人之感也以心由所感之不同故咸之所通亦異如柔上而剛下二氣感應以相與言天地之感也止而説男下女亨利貞娶女吉言人道之感也故天地感而萬物化生聖人感人心而天下和平其大小亦異也故曰觀其所感而天地萬物之情可見矣詩云鳶飛戾天魚躍于淵其或天欲雨而柱礎潤銅山傾而洪鐘鳴无足疑也然天人之感終有以異乎曰聖人賛天地之化育與天地參亦曰憲天之聰明而已並易説和靖尹氏曰咸感也不言感而言咸盖咸有皆感之義感只是感得同類也其感狹也若憧憧往來朋従爾思只是感得同類者故云未光大若二氣感應以相與是咸也語録白雲郭氏曰伊川曰柔上變剛而成兊剛下變柔而成艮故曰柔上而剛下雍曰咸自否來六三上而成兊是柔上也上九下而成艮是剛下也柔上而剛下謂二爻之變也變所以成艮兊二氣感應相與之道止而説咸感之情也男下女内外之象也自咸感至男下女同釋文王之辭自天地感而萬物化生所以盡明一卦之象夫天地非感不能生萬物聖人非感不能平天下則咸之為感雖天地不能外是又豈止男女夫婦而已哉故由所感以觀之大而天地細而萬物其情皆可得而見此咸所以通三才而无間不獨以感人心為道也然文王之辭舉其微而著者孔子極其大與幽逺言之然後咸之道備孔子曰文不在兹乎信不誣矣易說漢上朱氏曰咸感也不曰感者交相感也咸自否變乾天也坤地也六三之柔上上九之剛下天地之氣感應而上下相與則亨矣故辭曰咸亨彖曰咸感也柔上而剛下感應以相與此以三上交感六爻相應言咸所以亨也闗子明謂咸者天地之交是也剛下柔而為艮之九三正也柔上剛而為兊之上六亦正也艮止也兊説也上下相感以正則止而説矣相感之道利於正不正則淪胥以敗男女相説朋友非義君臣不以道合非止而説也故辭曰利正彖曰止而説此以上六九三合艮兊二體言感之道當以正也艮少男感而來兊少女應而往匪媒不得待禮而行其感以正止而説者也取女如是君子之道造端於夫婦矣吉孰大焉故辭曰取女吉彖曰男下女此以二體申言感之道也夫二氣相感人道相説不過於正而已故緫言曰是以亨利貞取女吉也男下女者相感之一也无所不感者其唯天地乎二氣交感雨澤時行動者植者自化自生兊為澤巽者萬物潔齊之時有化生之象聖人感人心而天下和平者无所不感亦若天地也否上九聖人也六三中位人心也上九之三聖人下感乎人心也三之上人心感乎聖人也乾變兊則剛者説天為澤則髙者平不曰以心感人者感人以无心也張載曰有意於中滯於方隅而隘其无心之謂乎且天地至大感則相與萬物至衆感則化生天地一氣萬物同體未有感而不動者也故曰觀其所感而天地萬物之情可見矣此以上三兩爻合互體推之以盡咸感之道也在卦氣四月故太𤣥準之以迎易傳新安朱氏曰咸感也釋卦名義以卦體卦徳卦象釋卦辭或以卦變言柔上剛下之義曰咸自旅來柔上居六剛下居五也亦通天地萬物之情可見是極言感通之理並本義或問近略考卦變以彖辭考之說卦變者凡十九卦盖言成卦之由凡彖辭不取成卦之由不言所變之爻程子專以乾坤言變卦然只是上下兩體皆變者可通若只一體變者則不通兩體變者凡七卦隨蠱賁咸恒漸渙是也一體變者兩卦訟无妄是也七卦中取剛來下柔剛上柔下之類者可通至一體變者則以來為自外來故説得有礙大凡卦變須觀兩體上下為變方知其所由以成之卦先生曰便是此處説得有礙且程傳賁卦所云豈有乾坤重而為泰又自泰而變為賁之理若其説果然則所謂乾坤變而為六子八卦重而為六十四皆由乾坤而變者其説不得而通矣盖有則俱有自一畫而二二而四四而八而八卦成八而十六十六而三十二三十二而六十四而重卦備故有八卦則有六十四矣此康節所謂先天者也若震一索而得男以下乃是己有此卦了就此卦生出此義皆所謂後天之學今所謂卦變者亦是有卦之後聖人見得有此象故發於彖辭安得謂之乾坤重而為是卦則更不可變而為他卦邪若論先天一卦亦无既畫之後乾一兊二離三震四至坤居末又安有乾坤變而為六子之理凡今易中所言皆是後天之易耳以此見得康節先天後天之説最為有功董銖問咸卦本義以為柔上剛下乃自旅來旅之六五上而為咸之上六旅之上九下而為咸之九五此謂柔上剛下與程傳不同先生問所以不同何也銖曰此易中自有卦變耳先生曰須知程子説有不通處必著如卦變説方見得下落此等處當録出看並語録東萊吕氏曰咸感也止取女吉也君尊而臣卑夫倡而婦和上天下地理之常也然下天而上地則為泰男下女則為咸盖以位言則上下之分一定而不可易以交感之道言則必在上者先感下則在下者斯應上如君必屈己以下臣男必屈己以下女是也天地感而萬物化生聖人感人心而天下和平各有所感而无不應如行不著習不察之人徒見人心感而天下和平而不知各有所感觀其所感一句最要看盖聖人巍然在上百姓林然在下須是看觀其所感一句易説象曰山上有澤咸君子以虚受人伊川先生曰澤性潤下土性受潤澤在山上而其潤漸通徹是二物之氣相感通也君子觀山澤通氣之象而虚其中以受於人夫人中虚則能受實則不能入矣虚中者无我也中无私主則无感不通以量而容之擇合一作交而受之非聖人有感必通之道也易傳横渠先生曰山上有澤非交感不能也感物之善莫若以虚受人有所繫慕皆非正吉故六爻皆以有應不盡卦義而有所譏也易説藍田吕氏曰咸以无心感也咸之所感不一故咸之義又為感天與地相感故萬物化生聖人與人心相感故天下和平理義者人心之所同然感无不應應无不同好色好貨親親長長以斯心加諸彼未有不和不平者也天地萬物形氣雖殊同生乎一理觀於所感則其情亦未嘗不一也澤居下而山居高然山能出雲而致雨者山内虚而澤氣通也土灰候氣可以知也故君子居物之上物情交感者亦以虚受也龜山楊氏曰山藏疾澤鍾水有虚受之象焉故君子體之以虚受人易説兼山郭氏曰山之性包以畜止萬物者也澤之性浸潤以説萬物者也二者皆以虚受而通氣者也傳曰山藪藏疾又曰虚穴來風有自然矣舜自耕稼陶漁以至為帝无非取諸人以為善及其終也納于大麓烈風雷雨弗迷盖其推而上之如此易説白雲郭氏曰山生物也澤利物也天地之大亦相感而後萬物化生況山澤乎是以交感而後生利萬物也君子法之以虚受人惟虚故受受故能感不能感者以不能受故也不能受者以不能虚中故也充虚中之道故至於无所不感无所不通然後盡咸之道矣聖人寂然不動感而遂通天下之故盖本諸此言虚者本山澤有容之義盖卦无虚之象而咸有虚之義也易説漢上朱氏曰澤在下而達之山上以興雲雨利萬物者山體内虚澤氣上通交感也君子以是屈己虚其中以受人之益故能受盡言能用大才能任大事易傳新安朱氏曰山上有澤以虚而通也本義或問君子以虚受人伊川注云以量而容之擇合而受之莫是要著意容之否曰非也以量者乃是隨我量之大小以容人便是不虚了山上有澤咸當如伊川説水潤土燥有受之義又曰土若不虚如何受得又曰上兊下艮兊上缺有澤口之象兊下二陽畫有澤底之象艮上一畫陽有土之象下二隂畫中虚便是滲水之象並語録東萊吕氏曰山上有澤咸山髙而上有澤焉是山澤通氣也君子觀象然後能以虚受人谷虚則有應伊川解虚以受人最當玩味若心不虚而中有私主所主者在官職則山林之言不受所主者在山林則應世之言不受惟无所主故泛然无不受且如一江之濶只受一江之水如受兩江之水則溢矣今之人只説與正人處至邪人已不能與處惟聖人无限量故不擇合无邪无正皆能受之所以然者以其中心虚而无不受也大凡天下之理虚則能受實則不能受伊川云虚中者无我也中无私主則无感不通以量而容之擇合而受之非聖人有感必通之道也此六句最當看易説初六咸其拇象曰咸其拇志在外也伊川先生曰初六在下卦之下與四相感以微處初其感未深豈能動於人故如人拇之動未足以進也拇足大指人之相感有深淺輕重之異識其時勢則所處不失其宜矣初志之動感於四也故曰在外志雖動而感未深如拇之動未足以進也並易傳藍田吕氏曰咸之六爻皆以身為之象下卦象下體上卦象上體初六最下而應九四四以心感而初以足行然後相應不曰足而曰拇者初以隂居下静而未行足雖不行不害拇之能動盖心與四應而迹未應也龜山楊氏曰咸感也感而動者物皆然而人為之主故咸六爻之象皆取諸身而已初在下咸其拇者也在下而居艮體雖有應乎上未能進也故在外而已易說兼山郭氏曰拇繫於足无繫於事功者也易說白雲郭氏曰咸之名卦盖取六爻无不相感故合一卦論之則足以見天地萬物之情自六爻觀之則所遇所感不同其咸分矣不足以見其大全猶耳目手足之用不同又安足以識人之大體哉各言其手足耳目之一用可也故咸之諸爻皆不能盡充咸之義各舉其一偏言之也初之感四其感未深有志於感而已故曰志在外也外四也易之六爻上為首而初為足故初言拇而上言輔頰舌也然天地男女皆以二氣相感而六爻言拇言腓雖一物亦有感而後用於此見萬物之情无所不感矣又非特天地男女二體而已易説漢上朱氏曰艮為指在下體之下而動為拇拇足大指也初感而動不能自止觀其拇之動則知志在外矣虞翻曰志在外謂四也咸之初所感未深而志已先動動則四不應易傳曰感有淺深輕重之異識其時勢則所處不失其宜矣易傳新安朱氏曰拇足大指也咸以人身取象感於最下咸拇之象也感之尚淺欲進未能故不言吉凶此卦雖主於感然六爻皆宜静而不宜動也本義東萊吕氏曰初六雖與四相感然感之初者也感之初信未孚志未交此一爻只如此看甚分明當玩味志在外也一句今人與朋友親戚交感但責人而不責己只説我誠意已孚而彼不應不知己之誠未孚如足指之方動安能感人此一爻不以誠已孚而責人不應但以志尚在外而不能自足又曰六處咸之下是感之淺者也故以拇言象曰志在外也者常人之感人感之不入即止初六則不然謂感其拇是在我微未足感人也故志在於外无自己之心求為感通而後已易説六二咸其腓凶居吉象曰雖凶居吉順不害也伊川先生曰二以隂在下與五為應故設咸腓之戒腓足肚行則先動足乃舉之非如腓之自動也二若不守道待上之求而如腓先動則躁妄自失所以凶也安其居而不動以待上之求則得進退之道而吉也二中正之人以其在咸而應五故為此戒復云居吉若安其分不自動則吉也二居中得正所應又中正其才本善以其在咸之時質柔而上應故戒以先動求君則凶居以自守則吉象復明之云非戒其不得相感惟順理則不害謂守道不先動也並易傳横渠先生曰居則吉趨則凶以男下女為正咸之道也易説藍田吕氏曰六二柔中雖居不往不失乎順一作雖柔而居中不失乎順龜山楊氏曰腓下體之中也二居下卦之中故有腓之象焉腓行則先動也艮以一陽止乎上而二以隂柔應於五説而不知止者也故凶然上承九三能順而止則不害矣故雖凶居吉也易説兼山郭氏曰腓腨腸也六二柔而中正何以有凶以其爻有艮巽是以居則得咸艮之義是以吉也伊川曰隂不可以先動腓應上而先動者也易説白雲郭氏曰咸之道至難言故文王明之以男女夫婦之道而六爻又以人之一身取義盖因其易明而可言者也然自拇而腓腓而股股而心心而脢脢而頰舌自下而上之象也腓腨腸也在足之上股之下腓動則足舉而後隨之足之力本諸此為下體之要下卦六二之象實似之二居止之中腓為動之主吉凶之責在此是以吉凶之義特在夫動止之間耳雖渉妄動之凶苟能居而止之亦不害順感之道咸之六爻雖其應皆順然妄動求感失居正虚受之義尤非艮止之宜聖人戒其違時是以不若居吉也易説漢上朱氏曰腓腨腸也巽為股二在下體之中腓也腓行則先動躁之象二感五不能守道自止動而遽趨之躁動凶之道也若居位不動順理以待上之求不害也二動失位為疾有害之意坤順也易傳曰質柔上應故戒以先動求君則凶居貞自守則吉易傳新安朱氏曰腓足肚也欲行則先自動躁妄而不能固守者也二當其處又以隂柔不能固守故取其象然有中正之徳能居其所故其占動凶而静吉也本義東萊吕氏曰大抵君臣上下貴賤之間君當求臣臣不可求君上當求下下不可先求於上貴賤之理亦如此焉二與五正應五在上二在下六二柔順説於上有如腓之好動動不知止凶之道也若不待五求而先自動則不能安分諂諛冒進惟能居守而不好動則可以吉象復明其順不害者言長沮桀溺之徒乃與君相忘但不可先動使君倡而臣和可也盖上下君臣之間又不可隔絶而不通要得其求則順而従之毫釐之間不可不察易説九三咸其股執其隨往吝象曰咸其股亦不處也志在隨人所執下也伊川先生曰九三以陽居剛有剛陽之才而為主於内居下之上是宜自得於正道以感於物而乃應於上六陽好上而説隂上居感説之極故三感而従之股者在身之下足之上不能自由隨身而動者也故以為象言九三不能自主隨物而動如股然其所執守者隨於物也剛陽之才感於所説而隨之如此而往可羞吝也云亦者盖象辭一作體本不與易相比自作一處故諸爻之象辭意有相續者此言亦者承上爻一有象字辭也上云咸其拇志在外也雖凶居吉順不害也咸其股亦不處也前一作下二隂爻皆有感而動三雖陽爻亦然故云亦不處也不處謂動也有剛陽之質而不能自主一作立一作處志反在於隨人是所操執者卑下之甚也並易傳横渠先生曰心寜静於此一向定疊前縦有何事亦不恤也休将閒細碎在思慮易曰何思何慮天下殊塗而同歸一致而百慮天地之道惟有日月寒暑之往來屈伸動静兩端而已在我精義入神以致用則細碎皆不能出其間在於術内已過未來者事著在心畢竟何益浮思游想盡去之惟圖向去日新可也孔子以富不可求則曰従吾所好以思无益則曰不如學也故於咸三以見此義易説藍田吕氏曰九三剛而不中居下體之上力雖不任而无所自執股之象也龜山楊氏曰股身之下腓之上也九三居下卦之上股之象也股不足以有行隨下而已故曰志在隨人所執下也易説兼山郭氏曰九三股繫於上下之體而非制動之主徒介於上下之間而中有巽義故曰志在隨人者也易説白雲郭氏曰足之力在腓而行之用在拇股无所事隨之而已所應在上所隨在下以是而往能无吝乎九三居止之極亦以隨人尚不能處是其所執愈下者也以其不能自動而隨人故特曰吝苟自動則凶矣君子於行止之間有道存焉孔子可以止則止至公山佛肸之召欲往而不往是以无九三執隨之吝有六二居中之吉也然則咸腓之動往吝之隨不得不深為之戒也易説漢上朱氏曰巽為股股䏶也感上而動三陽才剛為内卦之主當位宜處説於上六而動亦若二隂爻然故曰咸其股亦不處也下比於二二腓也股動則腓動三在上反隨二不能自止所執在下執其隨者也非為上之道艮為手有執意隨人謂二虞翻謂志在二是己故曰志在隨人所執下也隨二則感上而往亦吝雖不處也豈能往哉是以進退皆失其宜易説新安朱氏曰股隨足而動不能自專者也執者主當持守之意下二爻皆欲動者三亦不能自守而隨之往則吝矣故其象占如此言亦者因前二爻皆欲動而云也二爻隂躁其動也宜九三陽剛居止之極宜静而動可吝之甚也並本義東萊吕氏曰觀頤之初九可見九三之義頤之初九有剛陽之才不自知其剛陽之貴反與九四為應如人自有靈智之徳反舍之而觀其人之朶頤所以謂之觀我朶頤咸之九三亦如此以九居三不自知其剛陽之才可貴以自處反慕上六舍陽従隂舍上従下是不能自貴反有隨於人之動其吝可知故曰咸其股執其隨往吝象曰咸其股亦不處也謂不能以貴自處而感於卑下也又曰志在隨人所執下也謂九三以剛陽之才而不知自信不能使人従己而反従人也今之學者盖亦如此吾之性本與天地同其性吾之體本與天地同其體不知自貴乃慕爵禄不知一體之中自有廣大之道所謂舍爾靈龜觀我朶頤咸其股執其隨者也易説九四貞吉悔亡憧憧往來朋從爾思象曰貞吉悔亡未感害也憧憧往來未光大也伊川先生曰感者人之動也故皆就人身取象拇取在下而動之微腓取先動股取其隨九四无所取直言感之道不言咸其心感乃心也四在中而居上當心之位故為感之主而言感之道貞正則吉而悔亡感不以正則有悔也又四説體居隂而應初故戒於貞感之道无所不通有所私繫則害於感通乃有悔也聖人感天下之心如寒暑雨𤾉无不通无不應者亦貞而已矣貞者虚中无我之謂也憧憧往來朋從爾思夫貞一則所感无不通若往來憧憧然用其私心以感物則思之所及者有能感而動所不及者不能感也是其朋類則従其思也以有繫之私心既主於一隅一事豈能廓然无所不通乎繫辭曰天下何思何慮天下同歸而殊塗一致而百慮天下何思何慮夫子因咸極論感通之道夫以思慮之私心感物所感狹矣天下之理一也塗雖殊而其歸則同慮雖百而其致一有極字一作極致則一雖物有萬殊事有萬變統之以一則无能違也故貞其意則窮天下无不感通焉故曰天下何思何慮用其思慮之私心豈能无所不感也日往則月來月往則日來日月相推而明生焉寒往則暑來暑往則寒來寒暑相推而嵗成焉往者屈也來者信也屈信相感而利生焉此以往來屈信明感應之理屈則有信信則有屈所謂感應也故日月相推而明生寒暑相推而嵗成功用由是而成故曰屈信相感而利生焉感動也有感必有應凡有動皆為感感則必有應所應復為感一有所字感復有應所以不已也尺蠖之屈以求信也龍蛇之蟄以存身也精義入神以致用也利用安身以崇徳也過此以往未之或知也前云屈信之理矣復取物以明之尺蠖之行先屈而後信盖不屈則无信信而後有屈觀尺蠖則知感應之理也龍蛇蟄蔵所以存息其身而後能奮迅也不蟄則不能奮矣動息相感乃屈信也君子潛心精微之義入於神妙所以致其用也潛心精微積也致用施也積與施乃屈信也利用安身以崇徳也承上文致用而言利其施用安處其身所以崇大其徳業也所為合理則事正而身安聖人一作賢能事盡於此矣故云過此以往未之或知也窮神知化徳之盛也既云過此以往未之或知更以此語終之云窮極至神之妙知化育之道徳之至盛也无加於此矣貞則吉而悔亡未為私感所害也繫私應則害於感矣憧憧往來以私心相感感之道狹矣故云未光大也並易傳貞吉悔亡言感之不可以一心也不得只恁地看過更留心語録横渠先生曰釋氏以感為幻妄又有憧憧思以求朋者皆不足道也感非有意咸三思以求朋此則不足道聖人惟於屈伸有感能有屈伸所以得天下之物何用憧憧以思而求朋大抵咸卦六爻皆以有應不盡咸道故君子欲得虚受人能容以虚受人之道也苟曉屈伸心儘安泰寛裕盖為不與物校待彼伸則已屈然而屈時少伸時多假使亂亡横逆亦猶屈少伸多我尚何傷日月寒暑往來正以相屈故不相害尺蠖之屈以求伸龍蛇之蟄以存身人精義入神以致用利用安身以崇徳夫天地之常以其心普萬物而无心聖人之常以其情順萬事而无情故君子之學莫若廓然而大公物來則順應故曰貞吉悔亡憧憧往來朋従爾思苟規規於外誘之際将見感於東而生於西也非惟日之不足顧其端无窮不可得而降也以陽居隂非躁感於物者也然體兊性恱未免乎思以求朋之累也盖體恱之初應止之始己勞於上朋止於下故憧憧得朋未為光大不持以正則有諂凟之悔並易説藍田吕氏曰居上體之下當一身之中以心感者也雖獨與初應未能无心周物然以陽居隂制之以静所感於初者未深未渉於害故貞吉悔亡也憧憧往來朋従爾思者有心於周物而未能无心猶自思焉天下何思何慮将无所不感斯所以光大矣龜山楊氏曰九四脢之下股之上心之位也不言心心无不該不可以位言也夫吉凶悔吝生乎動者也寂然不動心之體也故貞吉悔亡傳曰心静天地之鑑也萬物之鏡也而物至則无潛形焉故能感而遂通天下之故憧憧往來則動而與物交構而従爾思者朋而已匪其朋則思之不能及也故曰未光大也易説易於咸卦初六言咸其拇六二言咸其腓九三言咸其股九五言咸其脢上六言咸其輔頰舌至於九四一爻由一身觀之則心是也獨不言心其説以謂有心以感物則其應必狹矣唯忘心而待物之感故能无所不應其繇辭曰貞吉悔亡憧憧往來朋従爾思夫思皆縁其類而已不能周也所謂朋従者以類而應故也故孔子繫辭曰天下何思何慮天下同歸而殊塗一致而百慮天下何思何慮夫心猶鏡也居其所而物自以形來則所鑒者廣矣若執鏡隨物以度其形其照幾何或曰思造形之上極過是非思之所能及故惟天下之至神則无思也无思所以體道有思所以應世此為不知易之義也易所謂无思者以謂无所事乎思云耳故其於天下之故感而通之而已今而曰不可以有思又曰不能无思此何理哉荆州語録兼山郭氏曰九四失位而不中故有悔貞吉悔亡初嫌於失正也介於三五之二剛皆非已應故上之而往下之而來故有憧憧之象非若无心感之為大也朋者已應也憧憧之感朋従而已以語何思何慮則未也易説白雲郭氏曰九四失位過中非吉之象而咸道利貞九四之感初出於貞又以説道感人人之所願従故吉也吉則悔亡矣許慎以憧憧為意不定此言憧憧則其感无定也朋従爾思言其類従而感也然思之所及者能感而従之思所不及者朋未従也且天地之間往來者非一豈志意之所能盡虚己聽之可也而欲皆以心思感之是以憧憧无定盖不知咸之大有在於何思何慮者也象言貞吉悔亡未感害者言九四本无貞吉悔亡之道而在咸則未為害者咸道利貞故也憧憧固不足以盡往來相感之道故未為光大往來之道繫辭言之詳矣易説漢上朱氏曰九四感不以正則不誠不誠則害於感有悔也動則貞而吉其悔亡雖勉而至未為感害也何以知勉動而貞也故曰貞吉悔亡未感害也四兊感於初方來而説初艮従於四欲往而止是以九四憧憧勞思慮於往來之際而不能定也四隂初六亦隂故曰朋四居中在三之上心思之所在夫思之所至則從思之所不至則不従朋従爾思所感亦狭矣能无悔乎四動而正初九不應去其偏繫之私心則誠誠則虚而无所不感動成坎離光大之象故曰憧憧往來未光大也易傳曰聖人感天下之心如寒暑雨𤾉然无不通无不應者亦貞而已貞者虚中无我之謂也易説新安朱氏曰九四居股之上脢之下又當三陽之中心之象咸之主也心之感物當正而固乃得其理今九四乃以陽居隂為失其正而不能固故因占設戒以為能正而固則吉而悔亡若憧憧往來不能正固而累於私感則但其朋類從之不復能及逺矣感害言不正而感則有害也本義往來是感應合當有底憧憧是私感應自是當有只是不當私感應耳問貞吉悔亡易傳云貞者虚中无我之謂本義云貞者正而固不同何也曰某尋常解經只要依訓詁説字如貞字作正而固仔細玩索自有滋味若曉得正而固則虚中无我亦在裏面又問憧憧往來朋従爾思莫是此感彼應憧憧是添一箇心否曰往來固是感應憧憧是一心方欲感他一心又欲他來應如正其義便欲謀其利明其道便欲計其功又知赤子入井之時此心方怵惕要去救他又欲他父母道我好這便是憧憧底病或説貞吉悔亡憧憧往來朋従爾思云一往一來皆感應之常理也加憧憧焉則私矣此以私感彼以私應所謂朋従爾思非有感必通之道矣先生然之又問往來是心中憧憧然往來猶言往來於懷否曰非也下文分明説日往則月來月往則日來寒往則暑來暑往則寒來安得為中心之之往來伊川説微倒了所以致人疑一往一來感應之常理也自然如此又問是憧憧於往來之間否曰亦非也這个只是對那日往則月来底説那个是自然之往來此憧憧者是加私意不好底往來憧憧只是加一个忙廹底心不能順自然之理猶言助長正心與計獲相似方往時又便要來方來時又便要往只是一个忙又曰方做去時是往後面來底是來如人耕種下種是往少間禾生是來問憧憧往來如霸者以私心感人便要人應自然往來如王者我感之也無心而感其應我也无心而應周徧公溥无所私繫是如此否曰也是如此又問此以私而感恐彼之應者非以私而應只是應之者有限量否曰也是以私而應如自家以私惠及人少間被我之惠者則以我為惠不被我之惠者則不以我為惠矣王者之感如王用三驅失前禽去者不以為恩獲者不以為怨如此方是公正无私心又問天下何思何慮人固不能不思慮只是不可加私心欲其如此否曰也不曾教人不得思慮只是道理自然如此感應之理本不消思慮空費思量空費計較空費安排都是枉了元无益於事只順其自然而已憧憧往來自不妨如暑往寒來日往月來皆是常理只著个憧憧字便閙了或問易傳説感應之理謂凡有動皆為感感則必有應所應復為感所感復有應如何曰如日往則感得那月來月往則感得那日來寒往則感得那暑來暑往則感得那寒來一感一應一往一來其理无窮感應之理是如此曰此以感應之理言之非有情者云有動皆為感似以有情者言曰父慈則感得那子愈孝子孝則感得那父愈慈其理亦只一般器之問程子説感通之理曰如晝而夜夜則復晝循環不窮所謂一動一静互為其根皆是感通之理木之問所謂天下之理无獨必有對便是這話否曰便是天下事那件无對來隂與陽對動與静對一物便與一理對君可謂尊矣却便與民對人説棊槃中間一路无對某説道便與許多路為對因舉寒往則暑來暑往則寒來與屈伸消長之説邵氏擊壤集云上下四方謂之宇古往今來謂之宙因説易咸感處伊川説得未備往來自還他有自然之理惟正静為主則吉而悔亡至於憧憧則私意為主而思慮之所及者朋従所不及者不朋従矣是以事未至則迎之事已過則将之全掉脱不下今人皆病於无公平之心所以事物之來少有私意雜焉則陷於所偏重矣並語録東萊吕氏曰九四居感之中正是心虚中虚感應之大者所以咸之一卦九四之爻最大貞之一字最好看伊川云貞者虚中无我之謂虚中无我四字固是貞只認此四字但識虚中无我又不識貞字貞之一字果到虚中无我地位方見在易謂之貞在大學謂之正心此心一正則其所感者无有壅遏之患自然无往不吉而悔自亡若夫憧憧往來之人心既不正則往來不息乍形乍滅乍起乍伏本心既失己是私心則是隨其朋類方始思得此思却有限量有思則有无思則无若到貞吉悔亡則窮天下之事无不感通繫辭於九四一爻推廣何思何慮一章指教學者何思何慮當如伊川説然前説皆是心之正體未曾説下手處至於屈伸相感止以崇徳也却是下手處象曰貞吉悔亡未感害也憧憧往來未光大也所以貞吉悔亡由其思不出位未為外物所誘故正正者其良心良知之所在固无交感之害也局於小智憧憧起伏所以未光大以其无所有之光大反逐於物而私應蔽之盖心本光大至此則光大皆不見易説九五咸其脢无悔象曰咸其脢志末也伊川先生曰九居尊位當以至誠感天下而應二比上若繫二而説上則偏私淺狹非人君之道豈能感天下乎脢背肉也與心相背而所不見也言能背其私心感非其所見而説者則得人君感天下之正而无悔也戒使背其心而咸脢者為其存心一作志淺未繫二而説上感於私欲也並易傳横渠先生曰九五處恱之中未免偏繫之弊故不能感人心而曰一无曰字咸其脢惟聖人然後能感人心也易説龜山楊氏曰脢背肉也无思无慮故无悔然而非不為也不能而已與所謂寂然不動者異矣居得尊位比上而不能通天下之故則其志末矣非為上之道也易説兼山郭氏曰輔嗣云脢者心之上口之下盖下之无憧憧之心上之无滕口之説可以无悔而已方其論天地之感萬物聖人之感人心於脢也何所取哉易説白雲郭氏曰子夏傳曰在脊曰脢盖感於不思不動之地其道優矣是以无悔然不能舍脢之感而志夫體之大全未足以盡君人之道故曰志末也君人之道如之何感人心而天下和平是也易説漢上朱氏曰九五有伏艮下感六二艮為背脢鄭康成曰背脊肉也虞翻陸震劉牧同易傳曰與心相背而不見者也故曰咸其脢九五得尊位背其私心以中正相感感非其所見而説者則得人君感天下之正而无悔故曰咸其脢无悔然於感之義猶有未盡者九五比於上六也卦以初為本上為末有所志則私矣雖志於末未為无所繫也盡感之義者其惟去其所志虚中无我萬物自歸乎故聖人立象盡意又繫之辭以明之也張載曰六爻皆以有應不盡卦義易傳又曰有因前爻之動以為象者如咸九五咸其脢明夷之二夷於左股叢説新安朱氏曰脢背肉在心上而相背不能感物而无私繫九五適當其處故取其象而戒占者以能如是則雖不能感物而亦可以无悔也志末謂不能感物本義東萊吕氏曰九五咸其脢大抵為學最要識向背若任私心而行私心所喜則感不喜則不感所見者感所不見者不感如此則所感淺狹六五雖咸其脢然所感不大止无悔而已曷足為咸感之人君哉故象言志末也易説上六咸其輔頰舌象曰咸其輔頰舌滕口説也伊川先生曰上隂柔而説體為説之主又居感之極是其欲感物之極也故不能以至誠感物而發見於口舌之間小人女子之常態也豈能動於人乎不直云口而云輔頰舌亦猶今人謂口過曰唇吻曰頰舌也輔頰舌皆所用以言也惟至誠為能感人乃以柔説騰揚於口舌言説豈能感於人乎並易傳藍田吕氏曰脢與輔頰舌居心之上皆末也脢无情以无悔輔頰舌感不以誠而以言者也龜山楊氏曰兊三索而得女則上六兊之主也兊為口舌故咸其輔頰舌居感之終兊之上説之至也以説感人是滕口説而已非感人之道也然不言凶咎者以説感人未至於凶咎故也易説兼山郭氏曰易稱近取諸身獨咸艮二卦言之為詳而其成終者特異豈非咸極於説而艮終於止而已邪觀艮其輔言有序為可知矣易説白雲郭氏曰先人曰易稱近取諸身獨咸艮二卦言之為詳而其成終者特異豈非咸極於説而艮終於止而已邪觀艮其輔言有序為可見矣雍曰咸之六爻莫善於脢莫不善於頰舌口舌感人小人之道也故中庸言聲色之化民末矣是以聖人不為也然咸之道以身觀之以男女觀之以聖人和平天下觀之以天地萬物觀之皆可得而見特舉其至近而易明者則莫若人之一身也故六爻取象如此易説漢上朱氏曰乾為首兊外為口内為舌艮止也兊説也上六兑感艮口動而上止者輔也輔上頷也九三乾艮感兑在首而説見於外面頰也兊口動而内見者舌也上三相感不離於輔頰舌三者而已不能以至誠感物徒發見於言語之間至於舌弊而不已者也滕王昭素作騰騰傳也上三相應騰口之象兊為説故曰騰口説也易傳新安朱氏曰輔頰舌皆所以言者而在身之上上六以隂居説之終處感之極感人以言而无其實又兊為口舌故其象如此凶咎可知本義東萊吕氏曰至誠方能感人上六以隂柔居卦之終專以口舌感人譬之巧言如簧其口雖不能辨其心終不感且如二帝未嘗无典謨其所以感人者乃在典謨之外三王未嘗无訓誥其所以感人者乃在訓誥之外孔子未嘗无答問其所以感人者乃在荅問之外若无誠意而徒有典謨訓誥荅問未免為滕口説也易説合訂刪補大易集義粹言卷三十五
