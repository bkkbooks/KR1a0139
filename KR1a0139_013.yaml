body:
  text: 合訂刪補大易集義粹言卷十一頭等侍衞納喇性徳編坎下坤上伊川先生曰師序卦訟必有衆起故受之以師師之興由有争也所以次訟也為卦坤上坎下以二體言之地中有水為衆聚之象以二卦之義言之内險外順險道而以順行師之義也以爻言之一陽而為衆隂之主統衆之象也比以一陽為衆隂之主而在上君之象也師以一陽為衆隂之主而在下將帥之象也易傳東萊吕氏曰比與師當作一體㸔且以大體㸔既有衆則必有比君道善羣苟无善羣之徳則強凌弱衆暴寡人將不能自安以小言之比卦當與師相表裏始見三代兵農井田之所起師除九二一陽而五隂即五人為伍之象也比除九五一陽而五隂即五家為鄰之象也此是兵農為一當天下有事出則權專在將更无牽制之患天下无事入則權便歸君更无尾大不掉之患易說師貞丈人吉无咎伊川先生曰師之道以正為本興師動衆以毒天下而不以正民弗從也強驅之耳故師以貞為主其動雖正也帥之者必丈人則吉而无咎也蓋有吉而有咎者有无咎而不吉者吉且无咎乃盡善也丈人者尊嚴之稱帥師總衆非衆所尊信畏服則安能得人心之從故司馬穰苴擢自微賤授之以衆乃以衆心未服請莊賈為將也所謂丈人不必素居崇貴但其才謀徳業衆所畏服一作嚴畏則是也如穰苴既誅莊賈則衆心畏服乃丈人矣又如淮隂侯起於微賤遂為大將蓋其謀為有以使人尊畏也易傳横渠先生曰丈人剛過太公近之剛正剛中則是大人聖人得中道也太公則必待誅紂時維鷹揚所以為剛過不得稱大人易說廣平游氏曰師貞丈人吉故時稱方叔元老克壯其猶也老者成徳之稱乞其言足以愈人之疾故曰艾憲其行足以助人之善故曰叟其更事多其作謀審其成徳也尊其致道也逺蓋朝廷典刑所賴而非特可以行師也丈人者老者之尊稱而法度所資也師之道以律為主故以丈人言之易說白雲郭氏曰師為衆九二之師之象也貞正也師之道正於一者也故師以貞為先丈人尊嚴老者之稱故能慮善以動无輕敵貪利危國喪師之患所以唯丈人為吉也與武王維師尚父宣王方叔元老同義兵凶器戰危事争逆徳无全吉也故以丈人无失律喪師為吉以善補過為无咎易說新安朱氏曰師兵衆也下坎上坤坎險坤順坎水坤地古者寓兵於農伏至險於大順藏不測於至静之中又卦惟九二一陽居下卦之中為將之象上下五隂順而從之為衆之象九二以剛居下而用事六五以柔居上而任之為人君命將出師之象故其卦之名曰師丈人長老之稱用師之道利於得正而任老成之人乃得吉而无咎戒占者亦必如是也本義東萊吕氏曰師貞丈人吉无咎丈人者老成持重諳練之人如趙充國之比是也紀聞彖曰師衆也貞正也能以衆正可以王矣剛中而應行險而順以此毒天下而民從之吉又何咎矣伊川先生曰能使衆人皆正可以王天下矣得衆心服從而歸正王道止於是也剛中而應行險而順言二也以剛處中剛而得中道也六五之君為正應信任之專也雖行險道而以順動所謂義兵王者之師也上順下險行險而順也師旅之興不无傷財害人毒害天下然而民心從之者以其義動也古者東征西怨民心從也如是故吉而无咎吉謂必克无咎謂合義又何咎矣其義故一作固无咎也並易傳藍田吕氏曰師帥衆有所治也丈人老成之稱也鄉人飲酒杖者出斯出矣丈杖同用杖者即丈人故古者皆以老者為丈人也更事老成乃可以帥衆治人而吉无咎矣必曰丈人者以剛中也用師者勞役其民而責之以死毒莫甚焉其勞乃所以求其佚其死乃所以保其生也故雖毒之而民從也廣平游氏曰用師之道將以正天下之不正也故師謂之征己不正其能正人乎此師之所以主乎貞也剛中而應任將之道也行險而順興師之義也仰順乎天无違天以干時俯順乎人无咈人以從欲興師之順如此則民之從之雖犯難而忘死矣故能以衆正以衆正之則人皆知其欲正己而已天下孰不趨於正哉其為王也孰禦故吉且无咎易說龜山楊氏曰先王之制民居則為比閭族黨州鄉故比則衆在内一陽在上為之主君象也伍兩卒旅軍師之制則衆在外一陽在下為之主將帥之象也說卦曰坤為衆故師比之象如此春秋傳曰師能左右之曰以能以衆正乃可以王矣若夫狙詐作使則詭道也雖足以取王者不為也夫剛中而應者以九二言也行險而順合二體而言也兵凶器戰危事用民於凶危可謂行險而毒天下矣然而為匹夫匹婦復讎則行險而順矣故東征西夷怨南征北狄怨雖毒天下而民從可知也又何凶咎之有易說白雲郭氏曰剛中而應九二也行險而順師之義也師道必正而後動衆正於九二也能用衆正之九二則可以王六五是也師者凶危行險之道故曰毒天下而必以順動者蓋有義存焉則民從之毒如藥石之攻疾毒之所以除害也所謂誅其君而弔其民東面而征西夷怨者也可謂善補興師動衆之過者矣易說漢上朱氏曰坤衆也五隂而一陽為之主利於用衆二有震體震動也聚衆而動之亦用衆也周官自五人為伍積之至於二千五百人為師亦衆也故曰師衆也用師之道以正為本九二動之五正也苟動不以正出於忿鷙驕矜雖迫之以威非得其心也惟一本於正使衆人皆得其正天下之民將歸往之王者之道也師自復來初之二者也一變師二變謙三變豫四變比至比而得尊位可以王矣要終而言也故曰貞正也能以衆正可以王矣丈人者尊嚴可信長者之稱身在險中服其勤勞則衆應之能以衆正者也震為長之象言九二也武王之於尚父宣王之於方叔是己子夏傳本作大人將帥之道不剛則慢而不肅剛而不中則暴而无親剛中矣而上无柔中之主以應之則暌孤内顧動輒見疑已且不暇恤其能成功乎古者人君之用將既得其人矣跪而推轂付之斧鉞進止賞罰皆決於外不從中制是以出則有功語天下之至險者无若師也師動以義而民從之雖至險而行之以順也坎自初之二進而上行行險而順也凡藥石攻疾謂之毒師之所興傷財害物施之天下至慘也聖人不得已而用之以去民之害猶用毒藥以攻疾雖曰毒之其實生之以此毒天下而民安有不從者哉兼是五者惟九二乎是以吉而无喪敗合於義而无咎也坎為險有為毒者險難之所伏也醫師聚毒藥以攻疾所以濟險難也故又為藥故曰剛中而應行險而順以此毒天下而民從之吉又何咎矣在卦氣為立夏四月故太𤣥凖之以衆易傳五峯胡氏曰武王戎車三百兩虎賁三千人紂率其衆七十萬戰于牧野武王鼓之維師尚父時維鷹揚前者倒戈後者北其故何也紂不能正心以正天下故衆莫為之用武王征之非富天下也正己而已矣易外傳新安朱氏曰師衆也至王矣此以卦體釋師貞之義以謂能左右之也一陽在下之中而五隂皆為所以也能以衆正則王者之師矣剛中而應又以卦體卦徳釋丈人吉无咎之義剛中謂九二應謂六五應之行險謂行危道順謂順人心此非有老成之徳者不能也毒害也師旅之興不无害於天下然以其有是才徳是以民悅而從之也本義吉无咎謂如一件事自家做出來好方得无罪咎若做得不好雖是好事也則有咎无咎吉謂如一件事元是合做底自家做出來又好如所謂戰則克祭則受福戰而臨事懼好謀成祭而恭敬齊肅便是无咎克與受福便是吉如行師之道既已正了又用丈人率之如此則是都做得是便是吉了還有甚咎師彖辭亦是說得齊整處並語録東萊吕氏曰師彖剛中而應剛中言二也二以一陽為卦之主猶將帥也二雖剛中必待五之應猶將帥雖賢必待君為之應然後能成功也苟五不應師變為坎矣將帥臨敵而上无君之應豈非天下至險乎紀聞象曰地中有水師君子以容民畜衆伊川先生曰地中有水水聚于地中為衆聚之象故為師也君子觀地中有水之象以容保其民蓄聚其衆也易傳龜山楊氏曰地中有水容而能蓄也故君子體師之象以容民蓄衆易說兼山郭氏曰坤為地為衆坎為險為法地所以容民法所以蓄衆也周官司空掌邦土居四民時地利非容民乎司馬掌邦政統六師平邦國非蓄衆乎故自比閭族黨州鄉容民之道也自伍兩卒旅師軍蓄衆之法也是以居則出入相友疾病相扶持容民之常也動則勝則相見敗則相救蓄衆之終也是以兵形象水水因地而制形兵因敵而制勝師其有焉若夫黄帝太公寓之於八卦管仲制之為三軍諸葛亮李靖因之為六出皆師之遺法也易說白雲郭氏曰先人言地所以容民水所以蓄衆大司徒有比閭族黨州鄉容民之道也小司徒有伍兩卒旅師軍蓄衆之法也易說漢上朱氏曰物之在天地閒至多者无若水也地中能有之師之象也故土雖緻密而含通流泉河海之大不能出其涯涘君子寛以容民又有度量上下維持以蓄衆繫辭曰陽一君而二民隂二君而一民民謂隂爻也有陽爻則隂爻為民所謂容民者言内卦也坤為衆所謂蓄衆者言外卦也或曰隠至險於大順伏師旅於民衆井田之法也易傳新安朱氏曰水不外於地兵不外於民故能養民則可以得衆矣本義川壅為澤坎為川兌為澤澤是水不流底坎下一畫閉合時便成兌卦便是川壅為澤之象問麻衣易是偽書其論師卦地中有水師容民蓄衆之象此一義也若水行地中隨勢曲折如師行而隨地之利亦一義也答曰易有精有藴如師貞丈人吉此聖人之精畫前之易不可易之妙理至於容民畜衆等處因卦以發皆其藴也既謂之藴則包含衆義有甚窮盡儘推去儘有也並語録東萊吕氏曰地中有水之象惟君子觀之則見地之容水體之以容民畜衆若小人觀此象但見地中有水謂不防之則横流不可制必酷為法制御軍苛刻而致亂矣象一耳而觀者二焉此所以當觀象紀聞初六師出以律否臧凶象曰師出以律失律凶也伊川先生曰初師之始也故言出師之義及行師之道在邦國興師一作動衆而言合義理則是以律法也謂以禁亂誅暴而動苟動不以義則雖善亦凶道也善謂克勝凶謂殃民害義也在行師而言律謂號令節制行師之道以號令節制為本所以統制於衆不以律則雖善亦凶雖使勝捷猶凶道也制師无法幸而不敗且勝者時有之矣聖人之所戒也師出當以律失律則凶矣雖幸而勝亦凶道也並易傳師出以律否臧凶律有二義有出師不以義者有行師而无號令節制者皆失律也師出當以律不然雖臧亦凶今人用師惟務勝而已楊遵道録横渠先生曰師出以律師之始也體柔居賤不善用律故凶易說藍田吕氏曰初六行師之始以隂柔居之失律也龜山楊氏曰師出无名行師无制皆不能以律也初六師之始也故言師出之義甘誓曰左不攻于左汝不恭命右不攻于右汝不恭命牧誓曰不愆于六歩七歩乃止齊焉不愆于四伐五伐乃止齊焉此師律也不如是皆失律也刑戮隨之矣雖足以幸勝猶凶道也故曰否臧凶言否則雖臧亦凶也易說兼山郭氏曰春秋傳晉荀首曰執事順成為臧逆為否衆散為弱川壅為澤有律以如己也故曰律否臧其律竭矣盈而以竭大且不整所以凶也且律者法也亦太師執同律以聴軍聲之律或謂古之出兵律與軍法並用必謂否臧皆凶則人謀鬼謀百姓與能何取於易也初六坎也坎為法兵法曰法者曲制官道主用也故有制之兵无能之將不可敗也易說白雲郭氏曰師之勝負上則繫國家安危下則繫億兆人之命利害之大者无踰於此故戎為國之大事而洪範八曰師聖人戒謹之意為至深矣可无律以妄動而蹈至險之機乎禁暴誅亂雖不得已而用之不可无律也故師之初六言師出以律以明用師莫先於律也猶卦辭首言師貞以明師之道莫先於貞也然失律否敗其凶固宜或幸而勝雖臧亦凶者蓋聖人明師之吉凶於有律失律之際不在於否臧幸不幸之閒也否臧幸不幸小人之事非丈人之道故聖人不取也漢武窮兵以討匈奴僅有獲焉而天下户口減半非臧凶歟計其所獲曽未補十萬分之一安知所謂中吉无咎之道哉易說漢上朱氏曰坎坤為律律謂之法者度量權衡之法起於黄鍾之九寸黄鍾坎位也爾雅曰坎律銓也兵法地生度度生量量生數數生稱稱生勝師出以律則教道素明兵卒有制勝敵之道也初六不正動則坤坎毁師失律之象也否臧失律也否讀為可否之否劉遵曰否字古之不字也失律者為不善否臧則不善杜預亦曰否不也故辭曰否臧象曰失律失律則凶矣或曰師出无名而以律可謂臧乎曰司馬掌九伐之法不正而動是亦失律安得不凶春秋傳晉荀首曰在師之臨曰師出以律否臧凶執事順成為臧逆為否衆散為弱川壅為澤有律以如己也故曰否臧其律竭也盈而以竭夭且不整所以凶也曰師之臨者初六動而成兌也坤為衆坎為律為川坤毁則衆散坎毁則川壅而律竭易傳五峯胡氏曰劉虞吉徳之主士民之所與也公孫瓉暴黠之將士民之所不與也然虞以十萬之衆聲罪討瓉而一敗不振者以无律故也不以律雖臧亦凶矣李廣易外傳新安朱氏曰律法也否臧謂不善也晁氏曰否字先儒多作不是也在卦之初為師之始出師之道當謹其始以律則吉不臧則凶戒占者當謹始而守法也本義東萊吕氏曰師不以律不直曰凶而曰臧凶弟子輿尸不直曰凶而曰貞凶彼其所以敢弃師律者恃其臧也彼其所以敢侵帥權者恃其貞也其意以謂吾謀苟善何律之拘吾心苟正何帥之稟此所以弛縱專輒而至於凶紀聞九二在師中吉无咎王三錫命象曰在師中吉承天寵也王三錫命懷萬邦也伊川先生曰師卦唯九二一陽為衆隂所歸五居君位是其正應二乃師之主專制其事者也居下而專制其事唯在師則可自古命將閫外之事得專制之在師專制而得中道故吉而无咎蓋恃專則失為下之道不專則无成功之理故得中為吉凡師之道威和並至則吉也既處之盡其善則能成功而安天下故王錫寵命至於三也凡事至於三者極也六五在上既專倚任復厚其寵數蓋禮不稱則威不重而下不信也他卦九二為六五所任者有矣惟師專主其事而為衆隂所歸故其義最大人臣之道於事无所敢專惟閫外之事則專制之雖制之在已然因師之力而能致者皆君所與而職當為也世儒有論魯祀周公以天子禮樂以為周公能為人臣不能為之功則可用人臣不得用之禮樂是不知人臣之道也夫居周公之位則一有能字為周公之事由其位而能為者皆所當為也周公乃盡其職耳子道亦然惟孟子為知此義故曰事親若曾子者可也未嘗以曾子之孝為有餘也蓋子之身所能為者皆所當為也在師中吉者以其承天之寵任也天謂王也人臣非君寵任之則安得專征伐之權而有成功之吉象以二專主其事故發此義與前所云世儒之見異矣王三錫以恩命襃其成功所以一有威字懷萬邦也横渠先生曰懷愛萬邦故所以重將帥易說龜山楊氏曰九二以剛中之才分閫外之寄為師之主天吏也在師中吉則无逸徳矣如是乃可以承天寵也武王克商釋箕子囚封比干墓式商容閭散鹿臺之財發鉅橋之粟大賚于四海而萬姓悅服所以錫命而懷萬邦也易說兼山郭氏曰威克厥愛允濟愛克厥威允罔功九二剛勝之將能用中焉是以有功而宜膺寵錫者也易說白雲郭氏曰九二以至剛之才為一卦之主其行師用兵之道宜一以剛濟矣而能用中焉此蓋丈人主師之道也用中則吉而无過何咎之有是以王三錫命以寵其无咎之吉非攻戰之功也昔禹之徂征也苗民逆命而班師振旅文王之命將也曰薄伐西戎宣王之北伐也曰薄伐玁狁此皆以用中為貴也用中故无過之可補又何必有戰勝之功而後為吉乎春秋无義戰聖人貶之久矣後世爭地以戰殺人盈野爭城以戰殺人盈城孟子辭而闢之其言有曰徒取諸彼以與此然且仁者不為而況殺人以求之乎又曰我能為君約與國戰必克今之所謂良臣古之所謂民賊也觀此則知殺獲之功固非聖賢所尚矣是知中吉之寵為懷萬邦之道不然以王命三錫民賊則天下被不仁之害適足以糜爛吾民尚何懷萬邦之有是以古之仁賢之將率以安民和衆為先恥為孫吳小人變詐之技視殺獲首虜初无意焉其安疆埸之功後世蒙其利而人无知者師卦所謂丈人之徒歟史氏既不能暴白於天下徒誇大匹夫悍卒與夫權謀狙詐之士以資委巷之談識者悲之安得師中之道發潜徳之光哉易說漢上朱氏曰卦五隂聴於一陽在下而專制其事者也人臣惟在師可以專制然專制疑於擅權不專制无成功之理得中道乃吉而於義无咎九二剛居柔威和並用得中者也故能承天寵天寵者龍光也乾在上為天五坎為光二震為龍二之專制以五寵之譬之地道含萬物而化光非天之施乎惟在師得中乃能承天寵不然怙寵而驕必有凶咎莫敖自用得臣剛而无禮安能承天寵哉坤在上為邦四諸侯三公五乾為王九自四歴三爻二有伏巽為命王三錫命懷萬邦也古者諸侯入為天子之卿天子之卿為六軍之將王錫命之至於三極數也然亦不過乎中萬邦所以懷歟過則濫賞有功者不悅非所以懷來之九自五之二懷來也易說五峯胡氏曰趙將李牧初守雁門之塞趙王聽讒而罷之既而邊境不安復命牧將牧請行其初志趙王聽之牧乃受命於是利鈍進退功罪賞罰牧皆專制趙王不得而與也故能一戰而破滅三國邊境清浄夫不用則聽命而退用之則專命而行得中道者也故吉而无咎其後牧禦秦師趙王罷之而不受命則恃專而失為臣之道矣見殺宜哉故象以承天寵為中吉也吳楚反景帝命周亞夫將三十六將軍討之亞夫言於帝曰楚人剽輕難與争鋒絶其食道乃可制也於是吳攻梁急梁求救於帝帝命亞夫救之亞夫守先謀不奉詔堅壁不出而遣輕兵絶吳楚糧道吳楚之兵卒困於梁飢死叛散遂以破滅惟其委之重而自任也專故能有成功吉无咎也雖然人臣有大功於天下奉身而退不為天下先可也亞夫絳侯之子復有大功又為輔相守正而行抗義不撓其居正也善矣然卒取死亡之禍者不知消息盈虚與時偕行之道也唐憲宗之討淮西也既命裴度長御史往視師矣又命以為相使賞罰用命不用命又命往釐以既厥事信之深任之確恩禮有加而无怠所以能平逋寇宿賊威震諸藩合乎王三錫命懷萬邦之義可以為天下後世法矣易外傳新安朱氏曰九二在下為衆隂所歸而有剛中之徳上應於五而為所寵任故其象占如此本義在師中吉言以剛中之徳在師中所以吉問或說師九二欲互說在師中吉懷萬邦也王三錫命承天寵也何如先生曰聖人作易象只是大槩恁地不是恁地子細解釋並語録六三師或輿尸凶象曰師或輿尸大无功也伊川先生曰三居下卦之上居位當任者也不惟其才隂柔不中正師旅之事任當專一二既以剛中之才為上信倚必專其事乃有成功若或更使衆人主之凶之道也輿尸衆主也蓋指三也以三居下之上故發此義軍旅之事任不專一覆敗必矣倚付二三安能成功豈惟无功所以致凶也並易傳横渠先生曰隂柔之質履不以正以此率衆固不能一師丈人吉非隂柔所禦易說龜山楊氏曰師之或以衆尸之也衆尸之稟命不一而无功矣凶之道也六三上承衆隂輿尸也故凶唐九節度使之師不立統帥雖李郭之善兵猶不免敗䘐則輿師之凶可知易說白雲郭氏曰師道尚專則正故五隂一陽成為師卦師臣道也故九五為比而九二為師觀師之成卦則師之義得矣六三以柔居上非其才也位不中正非其任也欲衆主師凶之道也師或有功而凶或无功而吉六三衆主无功之凶也師之不善无以加此春秋遷延之役邲戰之類是也易說漢上朱氏曰九二以剛中之才行師上下當順以聽坎耳坤順也六三在下卦之上又動而主之則尸其事者衆也故曰師或輿尸坤為輿輿又訓衆三動得位尸之也坎變兌毁其師也故大者无功而凶荀卿論兵曰權出一者彊權出二者弱易傳曰軍旅之任不專一覆敗必矣易傳五峰胡氏曰用師之道必以才徳謀慮足以服人心如丈人者主之故能有成功若燕樂毅丈人也而以騎刼代之若趙廉頗丈人也而以趙括代之李牧丈人也而以顔聚代之此以衆人而尸丈人之事者也不敗亡何待六之才徳衆人也而三之位則統帥也故聖人明輿尸无功之義易外傳新安朱氏曰輿尸謂師徒撓敗輿尸而歸也以隂居陽才弱志剛不中不正而犯非其分故其象占如此本義問師或輿尸伊川訓輿尸為衆主如何先生曰從來有輿尸血刃之說何必又牽引别說某自小時未曾識訓詁只讀白本時便疑如此說後來從鄉先生學皆作衆主說某甚不以為然今㸔來只是兵敗輿其尸以歸之義語録東萊吕氏曰六三師或輿尸凶二師之主將帥之象也三居二之上位髙者也軍政當出於一非可使衆主之也三苟自恃位髙不肯屈己從二之令侵撓軍政則令出於二其覆敗必矣所以軍中只論節制不論官爵紀聞六四師左次无咎象曰左次无咎未失常也伊川先生曰師之進以強勇也四以柔居隂非能進而克捷者也知不能進而退故左次左次退舍也量宜進退乃所當也故无咎見可而進知難而退師之常也唯取其退之得宜不論其才之能否也度不能勝而完師以退愈於覆敗逺矣可進而退乃為咎也易之發此義以示後世其仁深矣行師之道因時施宜乃其常也故左次未必一无必字為失也如四退次乃得其宜是以无咎並易傳横渠先生曰次之不戰之地則不失其常易說龜山楊氏曰兵凶器也先王以喪禮處之故上將軍居右則師以右為主師之常也退而左次則失常矣然四以柔順之資承乗皆隂不足為師之主也量敵而後進慮勝而後㑹知力不足退而左次未為失常也易說兼山郭氏曰六四將不知師之可進而謂之進不知師之可退而謂之退是謂縻軍固有畫地而守與大乖其所之者亦師之常也易說白雲郭氏曰賢哉六四之左次也師之進退理不可必可進而進可退而退則常道也六四以隂居柔力不能進而左次得其常也何咎之有故師之凶在内則傷財害民在外則覆軍亡將内外无是焉雖左次无功亦謂之无咎可也彼不度徳不量力而喪師者六四之罪人歟易說漢上朱氏曰六四之動震為左日在地下暮夜之時師宿為次坎阻水也險難在下救者當倍道赴之動而左次阻水以自固豈用師之常哉宜有咎然六四柔能自正而下无應知其不可行量敵慮勝臨事而懼未失坤之常也於義為无咎春秋書齊師宋師次于聶北救邢按兵待事卒能救邢何咎於次哉易傳曰度不能進而完師以退愈於覆敗逺矣可進而退乃為咎也易發此義以示後世其仁深矣易傳五峯胡氏曰齊威伐楚退師召陵趙充國討先零固守不戰漢髙祖伐項羽舍滎陽成皐而趨宛葉朱雋討韓忠解圍而後復戰皆左次也左次者不以氣也必有義也不以力也必有謀也夫聚衆而付以殺人之器豈得已哉能以謀義行之庶幾其可勝矣此兵家之常也故无咎易外傳新安朱氏曰左次謂退舍也隂柔不中而居隂得正故其象如此全師以退賢於六三逺矣故其占如此知難而退師之常也本義六五田有禽利執言无咎長子帥師弟子輿尸貞凶象曰長子帥師以中行也弟子輿尸使不當也伊川先生曰五君位興師之主也故言興師任將之道師之興必以蠻一作戎夷滑夏賊寇姦宄為生民之害不可懷來然後奉辭以誅之若禽獸入於田中侵害稼穡於義宜獵取則獵取之如此而動乃得无咎若輕動以毒天下其咎大矣執言奉辭也明其罪而討之也若秦皇漢武皆窮山林以索禽獸者也非田有禽也任將授師之道當以長子帥師二在下而為師之主長子也若以弟子衆主之則所為雖正亦凶也弟子凡非長一有子字者也自古任將不專而致覆敗者如晉荀林父邲之戰唐郭子儀相州之敗是也長子謂二以中正之徳合於上而受任以行若復使其餘者衆尸其事是任使之不當也其凶宜矣並易傳弟子輿尸貞凶帥師以長子今以弟子衆主之亦是失律故雖貞亦凶也楊遵道録横渠先生曰柔居盛位見犯乃較故无咎任寄非一行師之凶也易說藍田吕氏曰六五犯而後應可以奉辭伐罪體上居中雖長子之位然以柔御柔不足以令其屬弟子輿尸者也改之則可守是不變必凶故曰貞凶弟子謂六三六四也龜山楊氏曰田有禽害田也獮取之除害而已先王之用師猶是也故曰田有禽利執言无咎執言奉辭也奉辭則師出有名矣長子主器也一可以任重而帥師矣弟子凡非長子皆是也以是輿尸則稟命不一而无功雖正亦凶矣六五履尊位為興師之主故言用將出師之道以為後世法易說白雲郭氏曰自古帝王興兵動衆蓋未有无名之師也故六五言田有禽利執言田之有禽害稼也故獵取之蠻戎寇賊害民也故執言以伐之執言奉辭也以興師則无咎矣此論在師之君道非將帥之事也故雖鳴條之師牧野之戰湯武必執言誓師明告其罪而後舉也長子九二也以中行師得其道者也弟子六三也以輿尸而凶非獨六三之罪也君使之不當也貞凶蓋言輿尸之凶長子帥師无凶也然則師之君道无它焉執言專任而已師道貞則吉卦既言得丈人而後吉爻於此又明弟子雖貞亦凶聖人之意其慎如此易說漢上朱氏曰五應二二為田震為稼坎為豕田豕害稼四時之田皆為去害二往之五成艮手為執伏兌為言執言者奉辭伐罪也六五柔中以任將帥二執言而行去民之害不得已而用師譬如田獵田既有禽然後取之田有禽則非无名興師執言則我有辭於義无咎矣故曰田有禽利執言无咎然六五柔於用人不可不戒九二震為長子帥衆而衆從之者以剛居柔威克厥愛以中道行師也若五動成艮於震為弟於乾為子之三則坎毁既使二主師又使三主之輿尸也所任不一雖正亦凶九五正也艮手有上使之意上使不當也輿尸之凶聖人再言之者任將不可不重也易傳曰自古任將不專而致覆敗者如晉荀林父邲之戰唐郭子儀相州之敗是也易傳五峯胡氏曰鄰敵居邊塞不毛之地盜賊屏其邪心而從於教化不害良善其宜也鄰敵若有侵犯於中國盜賊若有干犯於天下則是禽獸在田而侵犯稼穡也當聲其罪而討之若大禹之征有苗湯武之征桀紂漢髙之伐項羽皆聲其罪而後討之故蠻夷率服天下響應為利大矣故无咎然任將之道必以名徳才行足以率衆者為之九二剛陽之才在下為師之主長子也若不任長子而以弟子衆人庸才閒之未有不敗者也以郭子儀李光弼尚有相州之敗況他人乎故吕蒙不肯與孫皎並為大督曰昔周瑜程普並將幾敗國事易外傳新安朱氏曰六五用師之主柔順而中不為兵端者也敵加於己不得已而應之故為田有禽之象而其占利以搏執而无咎也言語辭也長子九二也弟子三四也又戒占者專於委任若使君子任事而又使小人參之則是使之輿尸而歸故雖貞而亦不免於凶也本義前輩曾說易之取象似詩之比興如此却是虚說恐不然如田有禽須是此爻有此象但今不可考問師六五象曰長子帥師以中行也傳云長子謂九二以中正之徳合於上而受任以行夫以九之居二中則是矣豈得為正先生曰此只是錯了一字耳莫要泥他並語録東萊吕氏曰六五田有禽利執言无咎長子帥師弟子輿尸貞凶名正權專己丑課程上六大君有命開國承家小人勿用象曰大君有命以正功也小人勿用必亂邦也康節先生漁樵對問樵者問漁者曰人所謂才者有利焉有害焉者何也漁者曰才一也利害二也有才之正者有才之不正者才之正者利乎人而及乎身者也才之不正者利乎身而害乎人者也曰不正則安得謂之才曰人之所不能而能之安得不謂之才聖人所以惜乎才之難者謂其能成天下事而歸之正者寡也若不能歸之於正才則才矣難乎語其仁矣譬猶藥之療疾也毒藥亦有時而用也可一而不可再也疾愈則速已不已則害人矣平藥則常日而用之可也重疾非所以能治也能驅重疾而无害人之毒者古今人所謂良藥也易曰大君有命開國承家小人勿用如是則小人亦有時而用之時平治定用之則否詩云他山之石可以攻玊其小人之才乎邵子外傳伊川先生曰上師之終也功之成也大君以爵命賞有功也開國封之為諸侯也承家以為卿大夫也承受也小人者雖有功不可用也故戒使勿用師旅之興成功非一道不必皆君子也故戒以小人有功不可用也賞之以金帛禄位可也不可使有國家而為政也小人平時易致驕盈況挾其功乎漢之英彭所以亡也聖人之深慮逺戒也此專言師終之義不取爻義蓋以其大者若以爻言則六以柔居順之極師既終而在无位之地善處而无咎者也大君持恩賞之柄以正軍旅之功師之終也雖賞其功小人則不可以有功而任用之用之必亂邦小人恃功而亂邦者古有之矣並易傳横渠先生曰師終必推賞然小人雖有功不可胙之以土長亂也承猶繼世之承也易說藍田吕氏曰上六用師之終賞功之時也以隂居上小人有功而被賞者也小人有功多與之邑可矣開國承家不可用也龜山楊氏曰師之初用熊羆虎貔之士武王伐商雖微盧彭濮人有所不廢至其終則崇徳報功之時也故曰開國承家小人勿用小人則亂邦必矣此聖人之深戒也易說兼山郭氏曰甚哉師道之難成也昔之為上者患不得其臣為下者患不得其君是以上下之志不通軍國之情或異其所以為勝為負者何莫由斯道也是故有為節制之師任平土之政者有為烏合之衆驅白徒市人而戰者有在師中吉成功而錫命者有聽任之匪人輿尸而取敗者有虚已委能使奉辭而伐罪者有好大喜功師出而无名者有受命專征而進止得以便宜者有束於中御之嚴而覆軍棄師者自古以來攷是而察其成敗較然可見也故武成之終曰惇信明義崇徳報功垂拱而天下治與夫師之上六大君有命開國承家殆非一日也其所由來久矣樂記曰武始而北出再成而滅商三成而南四成而南國是疆五成而分周公左召公右六成復綴以崇天子夾振之而駟伐盛威於中國也盡師之道也嗚呼大哉易說白雲郭氏曰先人曰武成之終曰列爵惟五分土惟三又曰惇信明義崇徳報功則盡上六之義者其武王乎雍曰雖大君有命而小人不得開國承家者以小人无容衆居上之徳此武王所以必崇徳而報功也崇徳則小人勿用矣易說漢上朱氏曰上六動乾在五上五君位大君也大君者號令之所自出也故履之上九臨之六五皆曰大君上之三成巽巽為命大君有命也有命以正有功也有大功者開國使建國有小功者承家使受邑也四諸侯位震為長子主宗廟社稷開國者也二大夫為家初隂在下承之承家者也巽三在二四之中有開國承家之象上師之成宗廟之位古者賞人必于祖廟示不敢專故於上六併言之六三不正為小人三之上小人用於上成坤必亂邦也行師之時貪愚皆在所使未必皆君子及其成功而行賞則君子當使之開國承家小人厚之以金帛優之以祿位不害其為賞功也蓋胙之土萬世之利尊有徳所以示訓若小人无厭有民人社稷其禍必至於亂邦周頌賚大封於廟言錫予善人也光武中興臧宫馬武之徒奉朝請而已得此道也然寇鄧諸賢无尺寸之土亦過已易傳曰小人易致驕盈況挾功乎漢之英彭所以亡也或問坤為土為國邑古亦有言之者乎曰周太史為陳侯之子筮之遇觀之否觀六四諸侯之位也坤為土變而為乾乾父坤母繼父母之國者也故曰其代陳有國乎内卦坤為土風行地上不處者也故曰風行而著於土其在異國乎此皆以坤土為國也畢萬將仕于晉遇屯之比初九變也辛廖占之曰震為土車從馬公侯之卦又曰公侯之子孫必復其始二大夫位也言自大夫復為諸侯以坤土動於下也易傳新安朱氏曰師之終順之極論功行賞之時也坤為土故有開國承家之象然小人則雖有功亦不可使之得有爵土但優以金帛可也戒行賞之人於小人則不可用此占而小人遇之亦不得用此爻也聖人之戒深矣本義問開國承家為是坤有土之象然屯之利建侯却都无坤止有震此又不可曉開國承家小人勿用舊時說只作論功行賞之時不可及小人今思量他既一例有功如何不及他得㸔來開國承家一句是公共得底未分别君子小人在小人勿用則是勿便用他與之謀議經畫耳漢光武能用此義自定天下之後一例論功行封其所以用之在左右者則鄧禹耿弇賈復數人他不與焉問古人論功行封真箇是裂土地與之守非如後世虚帶爵邑也若使小人參其間則誠有弊病先生曰勢不容不封但聖人别有以處之未見得如何如舜封象則使吏治其國如此則若是小人亦自有以處之先生又云此義方思量得如此未曾改入本義且記取並語録廣漢張氏曰光武之不任功臣為三公蓋鑒髙帝之弊而欲保全之前史莫不以為美談以予觀之光武之保全功臣使皆得以福禄終身是箇美矣然於用人之道則有未盡也蓋用人之道先以一說横於胷中則為私意非立賢无方之義矣髙祖之待功臣誠非也如韓彭黥布之徒雖有大功要皆天資小人在易之師開國承家小人勿用蓋於用師既終成功之後但當寵之以富貴而不可使之有國家而為政也髙帝正犯此義是以不能保功臣之終為光武者要皆㸔吾大臣有如韓彭之徒者乎則當以是待之若光武之功臣則異於是南軒集史論東萊吕氏曰師上六大君有命開國承家小人勿用象曰大君有命以正功也小人勿用必亂邦也上六居師之終功成之時也人君當功成之時志驕意滿多用小人以適其欲如唐憲宗既平淮西之後用皇甫鎛程异之類是也故聖人嚴為之戒焉紀聞合訂刪補大易集義粹言卷十一
