body:
  text: 合訂刪補大易集義粹言卷十四頭等侍衛納喇性德編兊下乾上伊川先生曰履序卦物畜然後有禮故受之以履夫物之聚則有大小之别髙下之等美惡之分是物畜然後有禮履所以繼畜也履禮也禮人之所履也為卦天上澤下天而在上澤而處下上下之分尊卑之義理之當也禮之本也常履之道也故為履履踐也藉也履物為踐履於物為藉以柔藉剛故為履也不曰剛履柔而曰柔履剛者剛乘柔常理不足道故易中惟言柔乘剛不言剛乘柔也言履藉於剛乃見卑順説應之義易傳東萊吕氏曰物畜然後有禮言物惟畜之多故好譬如水積畜多故波瀾自然成文又如燈燭若一燈一燭固未見好惟多後彼此交光然後可觀易説履虎尾不嘻人亨伊川先生曰履人所履之道也天在上而澤處下以柔履藉於剛上下各得其義事之至順理之至當也人之履行如此雖履至危之地亦無所害故履虎尾而不見嘻囓所以能亨也易傳白雲郭氏曰履者行道之義乾在上天道也天道至大天下之所難履而行之也故有履虎尾之象履虎尾直取其難非取其為害也然履虎尾者有嘻人之患履乾之道者雖難而無嘻人之患惟有亨之理也孔子言博施濟衆則曰堯舜其猶病諸言修己以安百姓則曰堯舜其猶病諸信乎天道之難履如此易説新安朱氏曰兊亦三畫卦之名一隂見於二陽之上故其德為説其象為澤履有所躡而進之義也以兊遇乾和説以躡剛強之後有履虎尾而不見傷之象故其卦為履而占如是也人能如是則處危而不傷矣本義彖曰履柔履剛也説而應乎乾是以履虎尾不嘻人亨剛中正履帝位而不疚光明也伊川先生曰兊以陰柔履藉乾之陽剛柔履剛也兊以説順應乎乾剛而履藉之下順乎上陰承乎陽夫下之正一作至理也所履如此至順至當雖履虎尾亦不見傷害以此履行其亨可知九五以陽剛中正尊履帝位苟無疚病得履道之至善光明者也疚謂疵病夬履是也光明德盛而輝光也並易傳橫渠先生曰説雖應乾而二不纍五也無隂柔之纍故不疚此所以正一卦之德也並易説藍田吕氏曰履踐而行也兊有所進居乾之後六三以一隂進逼於乾柔履剛者也履道莫艱於此此履所以名也乾虎也六三進逼於乾履虎尾者也以説應者物莫之傷故不嘻人亨也廣平遊氏曰卦之才則以一柔進退履衆剛故有履虎尾之象然而不嘻人亨者説而應乎乾故也蓋説而已不應乎乾則不敬應乎乾而已非説則不和夫敬以和何事不行君子之所履苟在於是則雖暴人之前無虞矣雖蠻貊之邦行矣況於華夏乎故履虎尾不嘻人而又亨也君子之所履未嘗不在於禮而禮勝則離今至於履虎尾而亨則其它可知矣此履之善也此合一卦之才言之若就一爻之義則六三蹈虎尾而凶矣故爻彖異辭猶之彖言剛中正履帝位而不疚而九五言夬履貞厲也剛中正履帝位而不疚者兊澤下流故也膏澤下於民則貴為天子富有四海而內省不疚矣此天下所以心恱而誠服也天下心恱而誠服則親之若父母仰之若日月敬之如神明畏之如雷霆可不謂光明矣夫若其據利勢之重阻法度之威以臨蒞天下而澤不加於民則民胥咨怨疾首蹙頞而相告矣夫如是則從之者勢也而心背之事之者貌也而腹非之夫何光明之有並易傳龜山楊氏曰上天下澤尊卑之分定矣卦之所以為履也履禮也九三處兌而承乾説而應乎乾者也禮以用和為貴説而應和之至也用和以往雖履至危之地無所害矣故曰履虎尾不嘻人亨夫乾剛中正德威而光明矣故履帝位而不疚病也不疚言安於其位也然獨稱帝位者蓋禮者天地之别也以天地之别言之則上下之分勢相絶矣故稱帝焉以言其與天同體也易説兼山郭氏曰乾天道也天之道剛健中正唯中正可以應之中則不欺正則不邪持此以履虎尾可也故禮之質忠信而已矣易説白雲郭氏曰履之所以難者以六三之柔而履天之剛德是以難也説而應乎乾則與乾合德是以能履而有不嘻人亨之象剛中正九五也履帝位而不疚然後其道下濟而光明疚則不能光明也剛德常過過則疚剛而不過斯不疚矣故允恭克讓堯所以光被溫恭允塞舜所以文明皆剛而中正者也謂之不疚如此易説漢上朱氏曰履踐也言踐履之道一柔而履二剛上為乾剛所履不言剛履柔者三柔履之主也以柔履剛踐履之難處之得其道履之至善也故曰柔履剛此以六三一爻言履之義也卦後為尾兊為虎為口虎口嘻人者也乾健也上九極乾六三以柔履其後上九與三相易上復成兊是履猛虎之尾怒而見嘻者也三兊體下説乎人之情上應乎乾上極健而我應之以和雖剛而不忤和而不流柔而不犯推是道以行蹈吕梁之險可也故處乎五剛之間柔而能亨關子明曰履而不處其周公乎故曰説而應乎剛是以履虎尾不嘻人亨此合兩體言履至危而亨也九五以天德臨下剛不中正有所偏係則君子畏禍將去之小人以柔邪而進陽為隂所病矣九五中正踐帝位立乎萬物之上無所纍其心舜禹之有天下也履道至此光明格於上下矣離為明疚病也隂陽失位為病六三不正五不應之不疚也故夫子贊之曰剛中正履帝位而不疚光明也今之王古之帝也獨於履言帝位者易君德而當君位者五卦否無妄同人遁乾體也而無履之時有是德有是時而履是位者唯履而已上下履位物物循理之時也在卦氣為六月太玄凖之以禮易傳五峯胡氏曰袁渙之答吕布嚴顔之答張飛薛包之事父母謝安之待桓溫所處至順所言至當皆以柔履剛説而應之故雖履強猛暴戾之地終不見傷害也紂至強暴也而文王徽柔懿恭以事之故能免於羑里以西伯一怒而安天下之民剛得中正履帝位而不疚其德光大明於天下後世也其亨可知易外傳新安朱氏曰柔履剛以二體釋卦名義説而應以卦德釋彖辭剛中正又以卦體明之指九五也本義履虎尾言履危而不見傷之象便是後履前之意隨著它後去履卦上乾下兊以陰躡陽是隨後躡他如踏他腳迹相似所以云履虎尾是隨後去履他尾也故於卦之三四爻發履虎尾之義便是陰去躡他陽背脊後處伊川却説作履藉説得生受了並語録東萊吕氏曰履德之基也履之為卦上乾下兊所謂以柔履剛兊柔也乾剛也兊以柔見履於剛是卑順自處得其分所以履之為義學者踐履其用朂切孔子彖辭履虎尾不嘻人亨天下之至危者莫如履虎尾今則履虎尾而無吞噬之患自此以往何所不可所謂履者凡履踐之道皆在焉聖人繫之以辭獨舉最危者言之何也大抵學者踐履工夫須於至難至危之處自試驗過得此處方始無往不利若舍至難至危其它踐履不足道也先難之義也説而應乎乾惟易簡始知險阻若欲履虎尾之至危以剛很不可以機械亦不可惟以柔順和恱則雖處至危之地亦無所不安矣彖又推究其本意曰剛中正履帝位而不疚光明也孔子蓋以君位言之凡孔子之彖易多是發其大者以示人天下之至危無過於履虎尾天下之至尊者無過於履帝位舉二大端以示人凡履踐之事莫不在其中矣九五以剛而居中得正然而申之以不疚之辭何也蓋履天位至難雖以中正之德若非栗栗危懼用剛之過則夬履貞厲惟是履帝位而不疚然後光明學者當深玩夫子之彖辭自履帝位推之自尊及卑自履虎尾推之自危及安引而伸之觸類而長之天下之時位莫不皆在其中矣易説象曰上天下澤履君子以辨上下定民志伊川先生曰天在上澤居下上一作天下之正理也人之所履當如是故取其象而為履君子觀履之象以辨别上下之分以定其民志夫上下之分明而後民志有定民志定然後可以言治民志不定天下不可得而治也古之時公卿大夫而下位各稱其德終身居之得其分也位未稱德則君舉而進之士修其學學至而君求之皆非有預於己也農工商賈勤其事而所享有限故皆有定志而天下之心可一後世自庶士至於公卿日志於尊榮農工商賈日志於富侈億兆之心交騖於利天下紛然如之何其可一也欲其不亂難矣此由上下無定志也君子觀履之象而分辨上下使各當其分以定民之心志也易傳廣平遊氏曰天髙地下禮制行矣人之所履禮而已故上天下澤有履之象君子觀象於此則可以辨上下上下既辨則民分立而民志定矣此以成卦之體言之也禮者所以辨上下而定民志也蓋上下之分嚴則豐者不為有餘殺者不為不足而民志定此先王因人性以制之而理之不可易也其或強有力者竊其非分而有之欲自以為榮是播其惡適足以發笑而自黜爾所有者非其分既不足以為榮而身陷不義更足以為辱愚孰甚焉此藏文仲居蔡所以為不智也季氏以八佾舞三家以雍徹正類於此而臧文仲當時名大夫必嘗以智稱故仲尼以為何如其智以明其大者不知其它不足稱也如以為先王之為禮將以籠天下之愚而拘之則荀卿化性起偽之説行矣譬如今人未仕而服青紫人必以為病狂文仲之愚不幸類此並易説龜山楊氏曰禮莫大於明分分之不明則為下者不安於下而志不定志不定則覬覦之心生覬覦之心生則陵僭之禍起而亂之所由作也夫天澤定位上下之分明矣六三説而應乎乾則為下而安於下者也此履之所以成象也故君子觀履之象以辨上下定民志易説白雲郭氏曰伊川曰後世士夫公卿日志於尊榮農工商賈日志於侈富此蓋民志未定欲其不亂難矣雍曰上天下澤言天道居上則澤必下及也君子之澤無它焉使斯民各安其分無乖爭之變而已故曰辨上下定民志上下既辨則民服事其上而下無覬覦又安有不定之志哉易説漢上朱氏曰天澤相際目力之所極則視之一也而上下實異體不可不辨禮者人所履表微者也坤為民巽為不果疑也故君子以禮辨上下定民志古之治天下者思去民之疑志以定之爾易説東萊吕氏曰象曰上天下澤履君子以辨上下定民志天處上澤處下尊卑各得其分大抵尊卑貴賤本皆有定位為尊者處尊為卑者處卑雖萬鍾之祿不自以為多抱關擊柝不自以為寡若是上下無辨宜賤者處貴宜卑者處尊民志便不定何者才能相若德業相若而一貴一賤安得不生叛援之心乎君子之辨上下本非強以私意安排上天下澤物各付物各隨尊卑之分而已然而尊卑分明無如天地天尊地卑最是上下之辨之大者上天下地反為否何也取象之義又須識所謂上天下澤與上天下地不同上天下澤所謂山澤通氣氣升於天辨位之中自有融通之理此其所以為履若上天下地天氣不下降地氣不上騰則雖辨而無接此其所以為否也易説初九素履往無咎象曰素履之往獨行願也明道先生曰素履者雅素之履也初九剛陽素履已定但行其志爾故曰獨行願也劉絢師訓伊川先生曰履不處者行之義初處至下素在下者也而陽剛之才可以上進若安其卑下之素而往則無咎矣夫人不能自安於貧賤之素則其進也乃貪躁而動求去乎貧賤耳非欲有為也既得其進驕溢必矣故往則有咎賢者則安履其素其處也樂其進也將有為也故得其進則有為而無不善乃守其素履者也安履其素而往者非苟利也獨行其志願爾獨専也若欲貴之心與行道之心交戰於中豈能安履其素也並易傳橫渠先生曰隂纍不干無應於上故其履潔素易説又曰正已而不求於人不願乎其外之盛者正蒙廣平遊氏曰中庸言君子素其位而行不願乎其外蓋位有貴賤得喪而君子不因其位而改其素也履之初言素履亦猶是也素之為言無飾也大行不加窮居不損豈借美於外哉孟子所謂不願人之膏梁文繡者是也履此而往則志之所祈嚮者非有徇乎人也獨行其平昔之志而已故曰獨行願也在履之初未交於物故有素之象易説龜山楊氏曰君子素其位而行素履也不願乎其外則無入而不自得矣故往無咎初九在一卦之下君子敬修其可願在此時而已易説兼山郭氏曰初九素富貴行乎富貴素貧賤行乎貧賤素夷狄行乎夷狄素患難行乎患難初復之始也是以言素易説白雲郭氏曰素有先定於內之義素定於內則隨事之來履而往之又何咎矣素富貴則可以行富貴素貧賤則可以行貧賤故孔子曰不以其道得之不處也不以其道得之不去也此素富貴貧賤之道也可以仕則仕可以止則止可以久則久可以速則速此孔子之素履也素履行已之義非澤民之道故曰獨行願也伊川曰若欲貴之心與欲行道之心交戰於中豈能安履其素也易説漢上朱氏曰初在履之下而正安於下不援乎上者也四動而求之斯可往矣往以正不失其素履往成巽巽為白亦素也故往無咎履九五中正君位也四爻不正初九獨正往之四者將以正夫衆不正獨行願也非厭貧賤也非利富貴也是以往無咎易傳曰夫人不能自安於貧賤之素則其進也乃貪躁而動求去乎貧賤爾非欲有為也既得其進驕溢必矣故往則有咎易傳五峯胡氏曰張良以布衣起為帝者師及功成天下定則從赤松子遊楊秉以儒生起為三公嘗稱我有三不惑酒色財也此安其卑下之素往行其志願者也故貴勢不能動其心利祿不能亂其操以是而行豈有咎乎易外傳新安朱氏曰以陽在下居履之初未為物遷率其素履者也占者如是則往而無咎也本義東萊吕氏曰初九素履往無咎言人當件件守初心如自貧賤而之富貴不可以富貴移其所履惟素履故無咎蓋不為地位所移也此最是教人出門第一步易説九二履道坦坦幽人貞吉象曰幽人貞吉中不自亂也伊川先生曰九二居柔寬裕得中其所履坦坦然平易之道也雖所履得坦易之道亦必幽靜安恬之人處之則能貞固而吉也九二陽志上進故有幽人之戒履道在於安靜其中恬正則所履安裕中若躁動豈能安其所履故必幽人則能堅固而吉蓋其中心安靜不以利欲自亂也並易傳橫渠先生曰中正不纍無援於上故中不自亂得幽人之正易説藍田吕氏曰二體陽居隂以中自守履道之所尚也履斯以進坦然易行守斯以處保乎終吉隱顯同致無所不宜也龜山楊氏曰剛中而承柔異乎六三之履虎尾也故曰履道坦坦坦坦者言所履夷易而無難也居中處説而上無應故曰幽人顔淵在陋巷不改其樂是也非中不自亂何以與此苟有應乎上則為禹稷之事非幽人也古之聖人雖在側微若將終身焉中不自亂故也若夫外騖而以紆朱懷金為樂則利欲交戰於胸中而能不自亂者未之有也其能貞吉不亦逺乎易説白雲郭氏曰居君位而得中九五也居臣位而得中九二也剛中之道自非大人難於兩立此九二所以為幽人之象也履得其道而坦坦平且易也幽人之履如此何適而非貞吉乎孟子曰我無官守我無言責則吾進退豈不綽綽然有餘裕哉履道坦坦之謂也故惟孟子然後有餘裕不然雖周公大聖人亦有跋疐之患不得為坦坦也幽人剛中處道深逺非富貴貧賤所能移大丈夫也况志已素定豈有中亂之道哉易説五峯胡氏曰黃憲汪汪如萬頃波澄之不清撓之不濁非有驚衆險異之行也初舉孝亷又辟公府友人勸之仕憲亦不之拒也行至京師竟無所就若其中以利欲自亂豈能從容應之若是乎易外傳漢上朱氏曰二動成震震為大途坤為平衍履道坦坦也道中正也初動二成坎坎為隱伏初未往二伏於坎中幽人也幽人言靜而無求及初復位動而不失其正幽人之貞也正則吉初之應四動而往靜而來上下無常也而幽人守正所履坦坦者自若其中不自亂也坤為亂二正得中不自亂也久幽而不改其操者其唯九二乎易傳曰九二陽志上進故有幽人之戒易傳新安朱氏曰剛中在下無應於上故為履道平坦幽獨守貞之象幽人履道而遇其占則貞而吉矣本義履道道即路也伊川這一卦説那大象并素履履道坦坦處却説得好語録六三眇能視跛能履履虎尾嘻人凶武人為于大君象曰眇能視不足以有明也跛能履不足以與行也嘻人之凶位不當也武人為于大君志剛也康節先生曰三皇同聖而異化五帝同賢而異教三王同才而異勸五伯同術而異率同術而異率者必以力以力率民者民亦以力歸之故尚爭夫爭也者爭夫利者也取以利不以義然後謂之爭小爭交以言大爭交以兵爭夫強弱者也猶借夫名焉者謂之曲直名也者命物正事之稱也利也者養人成務之具也名不以仁無以守業利不以義無以居功利不以功居名不以業守則亂矣民所以必爭之也五伯者借虛名以爭實利者也帝不足則王王不足則伯伯又不足則夷狄矣若然則五伯不謂無功於中國語其王則未也過夷狄則逺矣周之東遷文武之功德於是乎盡矣猶能維持二十四君王室不絶如線夷狄不敢屠害中原者猶五伯借名之力也是故能以力率天下者天下亦以力歸焉所以聖人有言曰眇能視跛能履履虎尾嘻人凶武人為于大君其斯之謂歟觀物內篇伊川先生曰三以陰居陽志欲剛而體本陰柔安能堅其所履故如盲眇之視其見不明跛躄之履其行不逺才既不足而又處不得中履非其正以柔而務一作勝剛其履如此是履於危地故曰履虎尾以不善履履危地必及禍患故曰嘻人凶武人為于大君如武暴之人而居人上肆其躁率而已非能順履而逺到也不中正而志剛乃為羣陽所一有不字與是以剛躁蹈危而得凶也陰柔之人其才不足視不能明行不能逺而乃務剛所履如此其能免於害乎以柔居三履非其正所以致禍害被嘻而凶也以武人為喻者以其處陽才弱而志剛也志剛則妄動所履不由其道如武人而為大君也並易傳橫渠先生曰大君者為衆爻之主也武人者剛而不德也易説藍田吕氏曰眇跛廢者也爻皆陽而已獨陰位且不當則其用偏廢雖能視能履不足任也位既不當而以柔履剛必有嘻人之凶也體隂居陽不中不正柔邪而為暴亂者也質雖柔而志剛也廣平遊氏曰六三以一隂獨立於羣陽之中而又處非其位故有眇跛之象猶之隂而無匹也眇能視跛能履明不足而行不全也故有武人之象若用此以蹈危其能無傷乎惟武人用此以聽命於大君則處陽而志剛可以有為矣大君剛中正而履帝位者也明足以照理行足以率人故武人聽命而有為可以無虞而有功矣易説龜山楊氏曰六三居不當位體柔而志剛非履之正也禮者中而已矣不中不足以有明眇者之視也體柔則不足以與行跛者之履也其視不明其行不正雖居安且不可况履危陷難乎故履虎尾嘻人凶陽在前履虎尾也然以成卦之才言之則六三以柔順之質説而應乎乾雖履至危之地無害矣故履虎尾不嘻人亨以一爻言之柔失位不中而上承三陽近而不相得則履虎尾嘻人而凶者也易中隨時取義故不同也夫見善未必明而用心剛者武夫也以隂居陽故志剛也由是而進為於君克全者蓋寡矣故不言吉凶以其吉凶未定故也易説兼山郭氏曰離為目六三不正之離也巽為股六三毁折之股也以是為明以是為行不可也六三上下履剛而其體則柔志剛矣而中未能實也且震為龍則兌為虎兌三見口是以有嘻人之象所以見嘻無中正將之故也易説白雲郭氏曰六三以隂居陽無中正之道又以一柔介五剛之間勢無全人故有眇跛之義也以是而視以是而履所以遇嘻人之凶矣夫居五剛之中履於上則不能履於下視於前則不能視於後常有不足之道故眇也跛也遇嘻也皆以不足故也位不當者豈以非其所居歟武人三軍之勇者視不勝猶勝則其視一於進而已自反而縮雖千萬人吾往則其履亦一於進而已此所以惟武人可用是道以有為于大君也夫武人可用有為于大君者以其志剛也故爻辭於嘻人凶之後繼以武人為于大君而象言志剛不言其凶吉者明武人可用也履之爻六三九五皆有二義亦如否之小人吉大人否亨恆之婦人吉夫子凶皆難以一義明矣易説漢上朱氏曰六三離為目兊毁之眇也眇者不能視逺言其智不足以有明也巽為股兊折之跛也跛者不能行逺言其才雖有上九之應不足以相與而行也卦一隂介五陽剛健之中才智不足處非其位柔不勝剛必有凶禍故曰嘻人之凶位不當也卦後為尾兊為虎為口履乾之後三往乎上成兊虎口嚙之嘻人之象六三位不當一也在卦言不嘻人亨爻言嘻人凶者卦體説而應乎乾應則以柔應剛以説應健如列禦冦所謂達其怒心也爻則才知不足而有為于大君妄動也是不知宋王之猛者也乾五為君上九大君也兊西方肅殺之氣武也天右行故天事武三居中志也六柔居三志剛也六三往之上九武人有為于大君志剛則決不慮其才知不足而決於有為致嘻之道盆成括是已觀六三妄動而凶則知初九之往為吉矣易傳五峯胡氏曰吕布剛決不常智卑而才小雖統衆為將固不足以濟亂也然以董卓之悖逆而殺之以袁紹之背叛而絶之眇能視跛能履者也其見非能窮理其行非能盡義亦迫劫於形勢因以為功耳使布統御於人遵約束而行則未必不為名將如尉遲敬德之流保其天祿矣以其剛決武暴而居人上自主一方也故躁率妄行謀不中禮義動不中幾會履虎尾蹈危難終為曹操所禽而被嘻人之凶焉易外傳新安朱氏曰六三不中不正柔而志剛以此履乾必見傷害故其象如此而占者凶又為剛武之人得志而肆暴之象如秦政項籍豈能久也本義武人為于大君必有此象但六三隂柔不見得有武人之象語録九四履虎尾訴訴終吉象曰訴訴終吉志行也伊川先生曰九四陽剛而乾體雖居四剛勝者也在近君多懼之地無相得之義五復剛決之過故為履虎尾訴訴畏懼之貌若能畏懼則當終吉蓋九雖剛而志柔四雖近而不處故能兢慎畏懼則終免於危而獲吉也能訴訴畏懼則終得其吉者志在於行而不處也去危則獲吉矣陽剛能行者也居柔以順自處者也並易傳橫渠先生曰三五不纍於己處多懼之地近比於三能常自危則志願終吉陽居隂故不自肆常自危也易説藍田吕氏曰履道尚行則虎尾不可不履四以陽居隂質剛而志柔懼而獲吉志行也龜山楊氏曰以剛承陽處多懼之地履虎尾之象也然而體剛而志柔知訴訴戒懼順以從上故志行而終吉矣易説白雲郭氏曰九四近剛決之君處多懼之地而能訴訴恐懼所謂戰戰兢兢如臨淵履冰者也豈有不終吉者哉此聖人居危難之道也志行者不失其所志之謂也舜之志孝也文王之志仁也父頑母嚚而克諧以孝舜居難而志行也出羑里而請除炮烙之刑文王居難而志行也易説漢上朱氏曰九四履三陽之後下有兊虎履虎尾也五剛四近君多懼然以陽居隂謙而不處動成震震為恐懼訴訴也恐懼則敬慎敬慎則動無非正始也履虎尾終也恐懼不失其正而志上行于君終吉也中為志動則行易傳五峰胡氏曰東漢之初竇融保據河西専有方面厥後歸命光武以為大司空居近君之地光武剛強明決以法術制馭臣下之君也融嘗專制則光武心忌本處于外入居大官則舊功臣心不平履虎尾也然融謙恭小心有子欲其怐恂守道不願其才能其畏慎可知訴訴畏慎也融能如是不以寵利居成功其志行也故終吉易外傳新安朱氏曰九四亦以不中不正履九五之剛然以剛居柔故能戒懼而得終吉本義志行也只是説進將去語録九五夬履貞厲象曰夬履貞厲位正當也伊川先生曰夬剛決也五以陽剛乾體居至尊之位任其剛決而行者也如此則雖得正猶危厲也古之聖人居天下之尊明足以照剛足以決勢足以專然而未嘗不盡天下之議雖芻蕘之微必取此其所以為聖也履帝位而光明者也若自任剛明決行不顧雖使得正亦危道也可固守乎有剛明之才苟專自任猶為危道況剛明不足者乎易中云貞厲義各不同隨卦可見戒夬履者以其正當尊位也居至尊之位據能專之勢而自任剛決不復畏懼雖使得正亦危道也並易傳龜山楊氏曰履禮也禮以用和為貴故曰履和而至九二九四皆體剛而志柔履而和者也故吉六三體柔而志剛以和為體也而又失位不中和而不以禮節者也故亦不可行九五剛當位而履履而不用和者也故曰夬履貞厲夬謂以剛決而履也居履之時上下之位定九五以剛中正而履尊位其德可謂不疚矣以爻趨時而不以和則非履之善也故雖正亦厲矣易説白雲郭氏曰夬決也剛決不已之辭也以陽居陽剛之過也剛過而自任其剛宜為致凶之道然以居位正當故特貞厲而已非所謂履帝位而不疚者也彖論中正故發其光明之美爻言夬履故示以剛決之戒道之常變如此位正當者猶以用剛而厲則知位非正當者凶矣易説漢上朱氏曰六三履虎尾嘻人凶者位不當也九五其位正其德當而貞厲者剛天德不可為首也九五履乎正位當用六三之柔濟乎剛健而説決而和斯可以履天下之籍矣人君擅生殺之柄不患乎無威患乎剛過不能以柔濟則臣下恐懼而不進人君守此不變危厲之道兊為決三五相易成夬故曰夬履或曰六三不正何以用之義取柔濟剛也易傳曰古之聖人居天下之尊明足以照剛足以決勢足以専然未嘗不盡天下之議易傳五峰胡氏曰夬剛決也堯舜之聖猶曰欽明文思允恭克讓禹戒舜曰無若丹朱傲仲虺稱湯曰從諫弗咈先民時若詩稱文王曰小心翼翼蓋優遊從容寬大盡下者聖人之容止也能如是則履帝位而不疚矣若自以為居位正當任其剛決不復畏慎則德不能日新往往日退不如其初此危道也故曰貞厲易外傳新安朱氏曰九五以剛中正履帝位而下以兊説應之凡事必行無所疑礙故其象為夬決其履雖使得正亦危道也故其占為雖正而危為戒深矣傷於所恃也本義夬履貞厲如東坡所謂憂治世而危明主也夬履是做得忒快雖合履底也有危厲問履卦以兊遇乾和説以躡剛強之後所以有履虎尾而不傷之象但彖言剛中正履帝位而不疚正指九五而言而九五爻辭乃曰夬履貞厲有危象焉何也先生曰夬決也九五以剛中正履帝位而下又以和説應之故其所行果決自為無所疑礙所以雖正亦厲蓋曰雖使得正亦危道也為戒深矣問剛中正履帝位而不疚光明也此是指九五而言然九五爻辭則云夬履貞厲與彖似相反何邪先生曰九五以剛居上下臨柔説之人故決然自為而無所疑不自知其過於剛耳並語録上九視履考祥其旋元吉象曰元吉在上大有慶也明道先生曰視履考祥居履之終反觀吉凶之祥周至則善吉也故曰其旋元吉劉絢師訓伊川先生曰上處履之終於其終視其所履行以考其善惡禍福若其旋則善且吉也旋謂周旋完備無不至也人之所履考視其終若終始周完無疚善之至也是以元吉人之吉凶繫其所履善惡之多寡吉凶之小大也上履之終也人之所履善而吉至於終周旋無虧乃大有福慶之人也人之行貴乎有終並易説橫渠先生曰視所履以考求其吉莫如旋而反下則獲應而有喜也乘剛未安其進也寧旋並易説廣平遊氏曰視所履之善惡所以考失得之報蓋禍福之來必象其德而還之也在履之上為履道之成在我者無非禮矣故其旋元吉其旋者象其履以還之之謂也易説龜山楊氏曰履道之終視履考祥之時也禮雖以進為文進極而過中亦不可行矣故其終也旋乃元吉旋反也易説兼山郭氏曰視履者猶洪範之五事也考祥者猶念用庶徵也其旋元吉猶嚮用五福也禮自外作故上天下澤為履樂由中出故雷出地奮為豫禮主於敬故訴訴終吉用和為貴故夬履貞厲孔子曰履德之基所宜盡心焉易説白雲郭氏曰先人曰視履猶洪範之五事也考祥猶念用庶徵也其旋元吉猶嚮用五福也雍曰視履而考其祥則其動容周旋之間元吉著矣所以大有慶也大有慶者一人有慶兆民賴之也易説漢上朱氏曰祥者吉之先見生於所履者也視我之所履則吉之來可考而知之矣天下之理未有出而不反者也上九所履不邪其旋反者必元吉也陽為大為慶上動以正乃致大有吉慶之道故曰元吉在上三在內為離目視履也上動而三有慶其旋元吉也上履之終故其祥可考焉易傳五峯胡氏曰曾子寢疾病謂門人曰啓豫足啓豫手詩云戰戰兢兢如臨深淵如履薄冰而今而後吾知免夫小子夫人以一善一功一言一事欣然自喜自足而不能有終者多矣焉知君子以天下萬世為消息沒身而後已乎曾子啓手足可謂視履考祥矣必得正而斃可謂其旋元吉矣易外傳新安朱氏曰視履之終以考其祥周旋無虧則得元吉占者禍福視其所履而未定也若得元吉則大有福慶也本義視履考祥居履之終視其所履而考其祥做得周備底則大吉若只是半截時無由考得其祥後面半截却不好未可知旋是那團旋來却到那起頭處語録合訂刪補大易集義粹言卷十四
