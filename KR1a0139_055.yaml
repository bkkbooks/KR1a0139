body:
  text: 合訂刪補大易集義粹言卷五十三頭等侍衛納喇性德編離下兑上伊川失生曰革序卦井道不可不革故受之以革井之為物存之則穢敗易之則清潔不可不革者也故井之後受之以革也為卦兑上離下澤中有火也革變革也水火相息之物水滅火火涸水相變革者也火之性上水之性下若相違行則睽而已乃火在下水在上相就而相克相滅息者也所以為革也又二女同居而其歸各異其志不同為不相得也故為革也易傳革已日乃孚元亨利貞悔亡伊川先生曰革者變其故也變其故則人未能遽信故必已日然後人心信從元亨利貞悔亡弊壞而後革之革之所以致其通也故革之而可以大亨革之而利於正道則可久而得去故之義無變動之悔乃悔亡也革而無甚益猶一有有字可悔也况反害乎古人所以重改作也易傳白雲郭氏曰甚哉革道之難也天下之事不和則革和則無革是革之繫乎時者也聖人以道論之乖於道則革不乖於道則不革是革又繫乎聖人也然方革之初固不能使天下之盡信俟其盡信則失時矣故聖人觀當革之時盡其在我所以革之之道雖衆所未孚革巳則其孚必矣蓋得革之道故也故卦辭首言巳日乃孚以明革道之難也革道如之何元亨利貞是也元亨利貞天德也無欲也革之而不失天德是可革也故革之而當已日可孚其悔亦亡矣革之而失天德是不可革也不可革而革則革之不當巳日不孚必有大咎不止於其悔不亡而已悔亡者凡欲革者皆以有悔而革是以革之當則能亡其悔也易説新安朱氏曰革變革也兊澤在上離火在下火然則水乾水決則火滅中少二女合為一卦而少上中下志不相得故其卦為革也變革之初人未之信故必已日而後信又以其內有文明之德而外有和説之氣故其占為有所更革皆大亨而得其正所革皆當而所革之悔亡也一有不正則所革不信不通而反有悔矣本義鄭東卿少梅説易象亦有是者如鼎卦分明是鼎之象他説革是爐之象亦恐有此理澤中有火革上畫是爐之口五四三是爐之腹二是爐之下口初是爐之底然亦偶然此兩卦如此耳語録彖曰革水火相息二女同居其志不相得曰革已日乃孚革而信之文明以説大亨以正革而當其悔乃亡天地革而四時成湯武革命順乎天而應乎人革之時大矣哉康節先生曰樵者又問漁者曰魚可生食乎曰烹之可也曰必吾薪濟子之魚乎曰然曰吾知有用乎子矣曰然則子知子之薪能濟吾之魚不知子之薪所以能濟吾之魚也薪之能濟魚久矣不待子而後知苟世未知火之能用薪則子之薪雖積丘山獨且奈何哉樵者曰願聞其方曰火生於動水生於靜動靜之相生水火之相息水火用也草木體也用生於利體生於害利害見乎情體用隱乎性一性一情聖人成能子之薪猶吾之魚微火則皆為腐臭朽壞而無所用也又安能養人七尺之軀哉樵者曰火之功大於薪固已知之矣敢問善灼物何必待薪而後傳漁者曰薪火之體也火薪之用也火無體待薪然後為體薪無用待火然後為用是故凡有體之物皆可焚之矣曰水有體乎曰然曰能焚水乎曰火之性能迎而不能隨故滅水之體能隨而不能迎故熱是故有溫泉而無寒火相息之謂也曰火之道生於用亦有體乎曰火以用為本以體為末故動水以體為本以用為末故靜是火亦有體水亦有用也故能相濟又能相息非獨水火則然天下之事皆然在乎用之何如耳邵子外書又曰三皇同性而異化五帝同情而異教三王同形而異勸五伯同體而異率同形而異勸者必以功以功勸民者民亦以功歸之故尚政夫政也者正也以正正夫不正之謂也天下之正莫如利民焉天下之不正莫如害民焉能利民者正則謂之王矣能害民者不正則謂之賊矣以利除害安有去王邪以王去賊安有弒君邪是故知王者正也能以功正天下之不正者天下亦以功歸焉所以聖人有言曰天地革而四時成湯武革命順乎天而應乎人其斯之謂歟又曰昔者孔子語堯舜則曰垂衣裳而天下治語湯武則曰順乎天而應乎人斯言可以該古今帝王受命之理也堯禪舜以德舜禪禹以功以德帝也以功亦帝也然而德下一等則入於功矣湯伐桀以放武王伐紂以殺以放王也以殺亦王也然而放下一等則入於殺矣是知時有消長事有因革前聖後聖非出於一塗哉並觀物內篇明道先生曰息訓為生者蓋息則生矣一事息則一事生中無間斷劉絢師訓伊川先生曰澤火相滅息又二女志不相得故為革息為止息又為生息物止而後有生故為生義革之相息謂止息也事之變革人心豈能便信必終日而後孚在上者於改為之際當詳告申令至於已日使人信之人心不信雖強之行不能成也先王政令人心始以為疑者有矣然其久也必信終不孚而成善治者未之有也文明以説以卦才言革之道也離為文明兊為説文明則理無不盡事無不察説則人心和順革而能照察事理和順人心可致大亨而得貞正如是變革得其至當故悔亡也天下之事革之不得其道則反致弊害故革有悔之道唯革之至當則新舊之悔皆亡也推革之道極乎天地變易時運終始也天地隂陽推遷改易而成四時萬物於是生長成終各得其宜革而後四時成也時運既終必有革而新之者王者之興受命於天故易世謂之革命湯武之王上順天命下應人心順乎天而應乎人也天道變改世故一作事遷易革之至大也故贊之曰革之時大矣哉並易傳革言水火相息息止息也既有止息之理亦有生息之理周行已録藍田吕氏曰革變舊而新之也陽極生隂隂極生陽氣之所以革也息生也水火相即隂陽之義二女同居其志不同行則所之各異不可同其歸故曰睽二女同居其志不相得女子有行不可終於此故曰革文明則民喻而不疑説則民服而不違大亨以正則因時順理無所不宜革至於是然後當當然後悔亡龜山楊氏曰或問成湯放桀曰豫有慙德何也曰橫渠嘗言湯武之功聖人之不幸也若論君臣之義則為臣而事其君當使其君如堯舜乃是既不能使君如堯舜至其君得罪於天下而放之豈其所欲哉成湯之事以言順乎天而應乎人何慙之有然自人情觀之既以堯舜之禪為盡善則征誅而有天下安能無愧乎餘杭語録白雲郭氏曰息滅也非生息也水火之性以勝相滅然有相違者則不息也不幸如二女同居而不能相違其志復不相得則必革而息矣已日乃孚言革而後信之也文明以説大享以正然後革而當其悔乃亡非文明以説大亨以正則知其革必不當其悔不能亡矣文明故見於未革之先説故孚於已革之後大亨故能終革之道正故能明革之公以是為當而悔亡則革之道其難矣哉然天地尚有革而不能廢況人道乎此湯武革命所以不能自已也惟順天故元亨利貞惟應人故已日乃孚上乃順天下能應人故悔亡能此則為湯武不能此是篡也且桀紂之君上則得罪於天下則結怨於民湯武知當革之時盡所以革之之道以順天應人而已曽無私欲焉此革之道也是以革通天道非止人事改更而已故曰大矣哉易説漢上朱氏曰兊澤離火而彖曰水火何也曰坎兊一也澤者水所鍾無水則無澤矣坎上為雲下為雨上為雲者澤之氣也下為雨則澤萬物也故屯需之坎為雲小畜之兊亦為雲坎為川大畜之兊亦為川坎為水革兊亦為水又兊為金金者水之母此水所以周流而不窮乎坎陽兊隂隂陽二端其理則一知此始可言象矣故曰曲而中水得火而竭火得水而滅水火相止息則變少女志處乎內而在外中女志適乎外而在內二女同居其志不相得則變之所由生不可不革也故曰革水火相息二女同居其志不相得曰革此以兩體言革也革變也非常之事方革之初人豈能遽信哉傳曰非常之原黎民懼焉巳日先儒讀作巳事之已當讀作戊巳之巳十日至庚而更更革也自庚至巳十日浹矣巳日者浹日也革自遁來無妄變也二變家人三變離四變革無妄之震納庚革之離納已故有此象二應五三應上孚也湯之伐桀猶曰舍我穡事而割正夏故革即日不孚浹日乃孚乃難辭也故曰已日乃孚革而信之此以離兊二五三上言革之難也坤離為文明兊為説天下之事至於壞而不振者文亂而不理事暗而不察民怨而上不恤也故萬物否隔人道失正所以當革文明則事理説則民心和故曰文明以説此以兩體言革之道也五上相易各當其位相易亨也各當其位正也文明以説然後大亨而大亨之道利在於正正則不正者正矣故曰元亨利正彖曰大亨以正此復以五上言革之道也革而當者六五之上也上五革而各得其正者當也文明以説大亨以正革而當三者具其悔乃亡革之非其道或不當革而革或革之而無甚益其於新舊皆有悔是本欲去悔復入於悔矣秦革封建子弟無立錐之地漢革郡縣而七國叛唐革府兵而兵農分不當故耳故曰革而當其悔乃亡此再以上五言革之戒也乾始於坎而終於離坤始於離而終於坎乾終而坤革之地革天也陽極生隂乃為寒坤終而乾革之天革地也隂極生陽乃為暑天地相革寒暑相成是亦水火相息也坎冬離夏震春兊秋四時也故曰天地革而四時成兊革離而成乾巽乾為天坤為順巽為命六二順五順乎天也九五應二應乎人也湯武改物創制革天之命以順天應人而已猶寒暑之相代天道變於上民物改於下因其可革而革之故曰湯武革命順乎天而應乎人革之時大矣哉此復以五上升降推廣革之道也在卦氣為三月故太玄準之以更易傳又曰澤中有火非火居澤下也如以剛限之故火不見滅是水在鼎中火巽鼎下之象非革象也蓋水火之性寒熱燥濕皆有常然澤中有火則水火之性革其常矣息止也火炎上而水息之水潤下而火息之有二女同居其志不相得之象故曰水火相息若以剛限之則無同居之象郭璞言有溫泉而無寒焰璞其知革睽之象歟叢説新安朱氏曰水火相息以卦象釋卦名義大略與睽相似然以相違而為睽相息而為革也息滅息也又為生息之義滅息而後生息也文明以説大亨以正以卦德釋卦辭天地四時湯武順應極言而贊其大也並本義因説革卦曰革是更革之謂到這裏須盡翻轉更變一番所謂上下與天地同流豈曰小補之哉小補云者謂扶衰救弊逐些補緝如錮鏴家事相似若是更革則須徹底重新鑄造一番非止補苴罅漏而已湯武應天順人便是如此孟子所説王政其效之速如此想見做出來好看只是大粗些又少些如其禮樂以俟君子底意思或曰不知他如何做曰須是從五𤱔之宅百𤱔之田雞豚桑麻處做起他兩三番如此説想不過只是如此做易言順乎天而應乎人後來人盡言應天順人非也問革二女志不相得與睽不同行有異否先生曰意則一但變韻而叶之耳並語録象曰澤中有火革君子以治厯明時伊川先生曰水火相息為革革變也君子觀變革之象推日月星辰之遷易以治厯數明四時之序也夫變易之道事之至大理之至明迹之至著莫四時觀四時而順變革則與天地合其序矣易傳白雲郭氏曰革天道也非人力也天道謂之革人力為之則曰篡也惟革本天道故卦具四德而象言治厯明時聖人所以明天道而欽授之此革之所以為大也易説漢上朱氏曰水火相會其氣必革澤中有火革之時也其在地則溫泉是已君子觀澤中有火則知日月坎離有交會之道日火也月水也冬至日起牽牛一度右行而周十二次盡斗二十六度則復還牽牛之一度而厯更端矣牽牛者星紀也水之位也日月交會於此澤中有火之象也厯更端者革也昔者黃帝迎日推䇿始作調元厯閲世十一歷年五千而更七厯至漢造厯歲在甲子乃十一月冬至甲子朔為入厯之始是時日月合璧復會於牽牛距上元太初十四萬三千一百二十七歲蓋日月盈縮與天錯行積久閏差君子必修治其厯以明四時之正所謂四時之正者冬至日月必會於牽牛之一度而弦望晦朔分至啓閉皆得其正矣日月不會者司厯之過也震嘗問厯於郭忠孝曰古厯起於牽牛一度沈括謂今宿於斗六度謂之歲差何也曰久則必差差久必復於牽牛牽牛一度者乃上元太初起厯之元也易傳新安朱氏曰四時之變革之大者本義澤中有火水能滅火此只是説隂盛陽衰火盛則克水水盛則克火此是澤中有火之象便有那四時改革底意思君子觀這象便去治厯明時林艾軒説因革卦得厯法云厯須年年改革不改革便差了天度此説不然天度之差蓋緣不曾推得那厯元定却不因不改而然厯豈是那年年改革底物治厯明時非謂厯當改革蓋四時變革中便有箇治厯明時底道理澤中有火革蓋言隂陽相勝復故聖人治厯明時向林艾軒嘗言聖人於革著治厯者蓋厯必有差須時時改革方得此不然天度固必有差須在吾術中始得如度幾年當差一分便就此添一分去乃是又云厯數微眇如今下漏一般漏管稍澀則必後天稍濶則必先天未子而子未午而午問革之象不曰澤在火上而曰澤中有火蓋水在火上則水滅了火不見得水決則火滅火炎則水涸之義曰澤中有火則二物並在有相息之象否先生曰亦是恁地又曰澤中有火自與治厯明時不甚相干聖人取象處只是依稀地説不曽確定指殺只是見得這箇意便説並語録初九鞏用黃牛之革象曰鞏用黃牛不可以有為也伊川先生曰變革事之大也必有其時有其位有其才審慮而慎動而後可以無悔九以時則初也動於事初則無審慎之意而有躁易之象以位則下也無時無援而動於下則有僭妄之咎而無體勢之重以才則離體而陽也離性上而剛體健皆速於動也其才如此有為則凶咎至矣蓋剛不中而體躁所不足者中與順也當以中順自固而無妄動則可也鞏局束也革所以包束黃中色牛順物鞏用黃牛之革謂以中順之道自固不妄動也不云吉凶何也曰妄動則有凶咎以中順自固則不革而已安得便有吉凶乎以初九時位才皆不可以有為故當以中順自固也並易傳橫渠先生曰賤而無應非大享以正之德中堅自守不可有為易説藍田吕氏曰初九當革之初居下無位比於六二上無正應雖有剛德不敢自任惟固結六二以自固不可有為待時而後革也故鞏用黃牛之革六二居中柔順故曰黃牛以其堅固故曰鞏與遁六二同義白雲郭氏曰革有革者有革之者有從革者有輔君之革者諸爻之義不同初九在下非能革人亦非人所革者從革而已故固用黃牛之革黃中色也牛順物也戒其用中而順從是以不可有為也不可戒辭也初九雖非可為之爻聖人之辭又所以戒不知革道者也易説漢上朱氏曰初九革之始在下而九四不應離體務上速於革者也鞏固也坤離為黃牛初動艮為皮革日熯之不可動鞏固也黃牛者中順也鞏固用黃牛之革堅韌不動以中順守之可也初動艮又為手為指莊子曰指窮於為初不可動不可有為也易傳曰革事之大也必有其時有其位有其才審慮慎動而後可以無悔易傳新安朱氏曰雖當革時居初無應未可有為故為此象鞏固也黃中色牛順物革所以固物亦取卦名而義不同也其占為當堅確固守而不可以有為聖人之於變革其謹如此本義六二已日乃革之征吉無咎象曰已日革之行有嘉也伊川先生曰以六居二柔順而得中正又文明之主上有剛陽之君同德相應中正則無偏蔽文明則盡事理應上則得權勢體順則無違悖時可矣位得矣才足矣處革之至善者也然臣道不當為革之先又必待上下之信故已日乃革之也如二之才德所居之地所逢之時足以革天下之弊新天下之治當進而上輔於君以行其道則吉而無咎也不進則失可為之時為有咎也以二體柔而處當位體柔則其進緩當位則其處固變革者事之大故以此戒二得中而應剛未至失於柔也聖人因其有可戒之疑而明其義耳使賢才不失可為之時也已日而革之征則吉而無咎者行則有嘉慶也謂可以革天下之弊新天下之事處而不行是無救弊濟世之心失時而有咎也並易傳橫渠先生曰俟上之唱革而往應柔中之德所之乃吉易説藍田吕氏曰六二與九五為應以柔變剛以下變上用力也難久而後能革之然同處於中水火相濟行必有嘉故吉無咎白雲郭氏曰六二得君得位柔順中正可以革矣而臣道不當先君故君已革而後乃革之也已日乃革之非從君之革也謂終君之事而革天下也是以進則吉而無咎已日革之則盡臣道故其行有嘉君未革而革之則失君臣之道非嘉也易説漢上朱氏曰六二得位得時上應九五有可革之才然不可遽為必俟人情既浹上下既信之日乃可革之十日之次自庚至已浹焉離納已已日者浹日也故曰已日乃革之九五中正二應上行而又其難其慎如此革道之美無以復加乾為美六上行則二有嘉美故辭曰征吉無咎象曰行有嘉也夫變動貴乎適時趨舍存乎機會二當可革濡滯而不行於革道安得無咎征吉無咎者以行有嘉也二巽體不果故勉之易傳曰以六居二柔順得中正又文明之主上有剛陽之君同德相應中正則無偏蔽文明則盡事理應上則得權勢體順則無違悖時可矣位得矣才足矣處革之至善者也易傳新安朱氏曰六二柔順中正而為文明之主有應於上於是可以革矣然必已日然後革之征吉而無咎戒占者猶未可遽變也本義九三征凶貞厲革言三就有孚象曰革言三就又何之矣伊川先生曰九三以剛陽為下之上又居離之上而不得中躁動於革者也在下而躁於變革以是而行則有凶也然居下之上事茍當革豈可不為也在乎守貞正而懷危懼順從公論則可行之不疑革言謂當革之論就成也合也審察當革之言至於三而皆合則可信也言重慎之至能如是則必得至當乃有孚也已可信而衆所信也如此則可以革矣在革之時居下之上事之一作有當革若畏恐而不為則失時為害唯當慎重之至不自任其剛明審考公論至於三就一作復而後革之則無過矣稽之衆論至於三就事至當也又何之矣乃俗語更何往也如是而行乃順理時行非已之私意所欲為也必得其宜矣並易傳橫渠先生曰以文明炎上剛陽之德進而之兊兊內柔外剛勢窮必反故以征則凶能守正戒懼文命告之此三革言彼三從命必然可信之理也一云征則雖正而危易説藍田吕氏曰九三居下體之上自初至三遍行三爻革之有漸革道以成故曰革言三就言三就言至於三則民信之矣故有孚道成民信姑待其革不可以有行也然以剛居陽行猶不已迫之已甚民之不從取凶之道不知消息之理雖正危也白雲郭氏曰革之為卦上則九五下則六二為革之主三不中而用剛非革之主也故以革道進則凶以革道守則厲不知革不可妄為有天道存焉非九三用剛炎上之性可自任之時也首言征凶貞厲蓋九三之象如此下言革言三就有孚則明革之卦辭言三就之道也三就有孚者謂元亨利貞悔亡及已日乃孚也三者皆得之是為三就也故進則無凶貞則無厲九三既非其位又非其人而舍革言三就之道則又何之乎宜其征則凶貞則厲是誠不若初九鞏用黃牛之革矣易説漢上朱氏曰九三剛正而明處下之極革之而當不可復動往而不已有凶成則必虧以正守之猶厲故曰征凶貞厲然守之者其在懼乎初不可有為也二已日乃革之三革之而就稽之於衆其言亦曰三就故曰革言三就三極數也月之盈虧氣候之變皆以三五三則就矣往而不已人必有言兊為口革言也上六應九三孚也革於此信於彼有孚也民情既孚革道已就欲往何之違民妄作則有凶咎九三離體務上革而過中聖人戒之故辭曰革言三就有孚象曰又何之矣易傳新安朱氏曰過剛不中居離之極躁動於革者也故其占有征凶貞厲之戒然其時則當革故至於革言三就則亦有孚而可革也又何之矣言已審也本義革言三就言三番結裹成就如第一番商量這個是當革不當革説成一番又更如此商量一番至於三番然後説成了却不是三人來説語録九四悔亡有孚改命吉象曰改命之吉信志也伊川先生曰九四革之盛也陽剛革之才也離下體而進上體革之時也居水火之際革之勢也得近君之位革之任也下無係一有無字應革之志也以九居四剛柔相濟革之用也四既具此可謂當革之時也事之可悔而革之革之而當其悔乃亡也革之既當唯在處之以至誠故有孚則改命吉改命改為也謂革之也既事當而弊革行之以誠上信而下順其吉可知四非中正而至善何也曰唯其處柔也故剛而不過近而不逼順承中正之君乃中正之人也易之取義無常也隨時而已改命而吉以上下信其志也誠既至則上下信矣一作也革之道以上下之信為本不當不孚則不信當而不信猶不可行也況不當乎並易傳橫渠先生曰約已居隂心無私係革而必當見孚於衆改命倡始信已可行故吉易説藍田吕氏曰九四始入上體其命當改雖有無應之悔而革言三就之後物情已信不必私應故悔亡有孚悔亡有孚吾志可信改命無疑矣故改命吉白雲郭氏曰九四近君而用柔輔君之革者也輔君之革非自用也故其悔可亡而上下信之是以有孚改命吉也不曰革而曰改命者四不若二之中正不能行已日乃革之大特可奉行改命而已猶之出納之臣也書曰夙夜出納朕命惟允然則出納王命以信為主此九四所以有有孚信志之辭信志者志可信於人者也易説漢上朱氏曰九居四宜有悔然當水火相革之際有其時矣其才也以柔濟剛其動也革而當是以悔亡革五爻皆正四動初應則上下靡不信不動有悔故曰有孚動而正近與五相得逺與初相應故抗君之命反君之事解國之大難除國之大害無招權擅事之凶巽為命四動改命也故曰改命之吉信志也易傳曰四非中正而至善何也曰惟其處柔也故剛而不過近而不逼順承中正之君而上下信其志矣易傳新安朱氏曰以陽居隂故有悔然卦已過中水火之際乃革之時而剛柔不偏又革之用也是以悔亡然又必有孚然後革乃可獲吉明占者有其德而當其時又必有信乃悔亡而得吉也本義問革下三爻有謹重難改之意上三爻則革而善者蓋事有新故革者變故而為新故漸漸好先生曰然乾卦到九四爻謂乾道乃革也是到這處方變了語録九五大人虎變未占有孚象曰大人虎變其文炳也伊川先生曰九五以陽剛之才中正之德居尊位大人也以大人之道革天下之事無不當也無不時也所過變化事理炳著如虎之文采故云虎變龍虎大人之象也變者事物之變曰虎何也曰大人變之乃大人之變也以大人中正之道一作德變革之炳然昭著不待占決知其至當而天下必信也天下蒙大人之革不待占決知其至當而信之也事理明著若虎文之炳煥明盛也天下有不孚乎並易傳橫渠先生曰以剛居尊説而唱下為衆所覩其文炳然不卜而孚望而可信下觀而化革莫盛焉虎變文章大故炳豹變文章小故蔚並易傳行前定而不疚光明也大人虎變夫何疚之有正蒙白雲郭氏曰盛矣哉九五之革也大人之道也且虎之文炳然而易見大人之道文明而可覩使天下曉然知大公至正革命之當無隂謀可疑之事以順天應人則天下不必占決而信之也昔湯征自葛而天下信之其大人虎變未占有孚之道歟易説漢上朱氏曰乾為大人兊為虎虎生而具天地之文然未著也既變則其文炳然易見京房謂虎文疏而著是也六二離變兊為文明虎變也九五剛健中正而得尊位大人之革也其舉事無悔其應曲當文理彰著天下曉然知之猶虎變也豈俟於既革而後孚哉蓋未革之先在窔奧之間簟席之上其文章固已炳然而具矣不假占決質之鬼神其下既孚二五未易而應未占有孚也二離為龜兊乾為決兊乾變離決龜也決謂之占非天下之至誠不言而信能如是乎文王之不長夏以革而虞芮質厥成是已易傳新安朱氏曰虎大人之象變謂希革而毛毨也在大人則自新新民之極順天應人之時也九五以陽剛中正為革之主故有此象占而得此則有此應然亦必自其未占之時人已信其如此乃足以當之耳本義未占有孚伊川於爻中占字皆不把做卜筮尚其占説語録上六君子豹變小人革面征凶居貞吉象曰君子豹變其文蔚也小人革面順以從君也伊川先生曰革之終革道之成也君子謂善人良善則已從革而變其著見若豹之彬蔚也小人昏愚難遷者雖未能心化亦革其面以從上之教令也龍虎大人之象故大人云虎君子云豹也人性本善皆可以變化然有下愚雖聖人不能移者以堯舜為君以聖繼聖百有餘年天下被化可謂深且久矣而有苗有象其來格蒸又蓋亦革面而已小人既革其外革道可以為成也茍更從而深治之則為已甚已甚非道也故至革之終而又征則凶也當貞固以自守革至於極而不守以貞則所革隨復變矣天下之事始則患乎難革已革則患乎不能守也故革之終戒以居貞則吉也居貞非為六戒乎曰為革終言也莫不在其中矣人性本善有不可革者何也曰語其性則皆善也語其才則有下愚之不移所謂下愚有二焉自暴也一無也字自棄也人茍以善自治則無不可移者雖昏愚之至皆可漸磨而進也唯自暴者拒之以不信自棄者絶之以不為雖聖人與居不能化而入也仲尼之所謂下愚也然天下自暴自棄者非必皆昏愚也往往強戾而才力有過人者商幸是也聖人以其自絶於善謂之下愚然考其歸則誠愚也既曰下愚其能革面何也曰心雖絶於善道其畏威而寡罪則與人同也唯其有與人同所以知其非性之罪也君子從化遷善成文彬蔚章見於外也中人以上莫不變革雖一作唯不移之小人則亦不敢肆其惡革易其外以順從君上之教令是革面也至此革道成矣小人勉而假善君子所容也更往而治之則凶矣並易傳橫渠先生曰盛德之容顔孟以上始可以觀若顔子變則必大變即大人虎變虎變則其文至也如此則不待占而有信君子所至之分以致文則足以為班班之縟革面而聽命已不敢犯此所謂盡飾之道斯行者逺矣然猶是就小成上以致其文顔子地位於豹變已為屑就未必肯於此發見此所以如愚愚雖是於吾言無所不説然必夫子省其私始知不愚察其人焉惟是徇內尚質爾然發則不小發大抵止乃有光明艮曰時止則止時行則行其道光明形則著著則明必能止則有光明今作事特未決蓋非止也止乃決為然後就其上文章顔子見其進未見其止未止故未發見其所止又必欲如所期蓋未見夫子著心處故未肯止是之謂隱而未見行而未成是以勿用學者至此地位亦必如愚然顔子學舉指亦無不致文中節處自是謂博我以文則文豈不足但顔子不以為意所謂有若無實若虛也有顔子之心則不為顔子之文可也以柔為德不及九五剛中炳明故但文章蔚縟能使小人改觀而從也並易説藍田吕氏曰九五以剛居尊而履中正革道大成聖人作而萬物覩者也煥乎其有文章不待占而後信也上六與九五皆革道已成之時變而成文五以剛得位居中故為大人上以柔無位失中故為君子虎之文修大而有理豹之文密茂而成斑蓋大人與天地合其德其文炳然如火之照而易辨也君子學以聚之其文蔚然如草之暢茂而叢聚也當革之終小人猶知革面則革道亦可以已也革而不已變亂紛擾民無所措其手足矣正惟靜而不變則因革以時矣故曰貞吉無咎也白雲郭氏曰上六革道既成君子小人皆從九五大人而革者也君子弸中彪外至誠以從君故其文蔚然以成豹變炳者文之著明也蔚者文之茂密也豹與虎相類蓋言從君之德也詩所謂濟濟多士秉文之德羣黎百姓遍為爾德是也小人雖無德自將亦能革面從君不失順從之道此所以為革道之成也革道既成則無革矣猶欲以革進則凶惟能居守其貞是以吉也書曰夏迪簡在王庭豈豹變之君子乎易説漢上朱氏曰陸績曰兊之陽爻稱虎隂爻稱豹考之天文尾為虎火也箕為豹水也而同位於寅虎豹同象而異文也離二文之中也故二交五其文炳明離三文已過故三交上其文蔚茂繁縟蔚文之過也三交上成九君子豹變也乾為首兊為説乾首而説見於外面也上交三成六小人革面也何也君子韜光逺害小人自徇其面今也君子豹變其文蔚然小人革面內嚮順從其上革面非謂面從也旋其面目也如是則革道大成坤順也兊口順之從也成則不可復動故三征凶上居貞吉下三爻革弊弊去當守以懼上三爻革命命定當復其常故曰征凶上六革道大成柔戒於不守故曰居貞吉上有伏艮居之象也易傳新安朱氏曰革道已成君子如豹之變小人亦革面以聽從矣不可以往而居正則吉變革之事非得已者不可以過而上六之才亦不可以有行也故占者如之本義合訂刪補大易集義粹言卷五十三
