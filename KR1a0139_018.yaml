body:
  text: 合訂刪補大易集義粹言卷十六頭等侍衛納喇性德編坤下乾上伊川先生曰否序卦泰者通也物不可以終通故受之以否夫物理往來通泰之極則必否否所以次泰也為卦天上地下天地相交隂陽和暢則為泰天處上地處下是天地隔絶不相交通所以為否也易傳兼山郭氏曰大道之行也天下為公故君子得以為君子小人不肯為小人君子則事事詘身而行道者有之矣小人則事事至於詘道而信身亦敢為也况乎天地不交否非惟敢詘道而信身又將惡直醜正協比讒言以陷人者多矣詩云為鬼為蜮則不可得有靦面目視人罔極是也故孔子稱商有三仁焉微子去之箕子為之奴比干諫而死然有貴戚之卿異姓之卿方其自靖人自獻于先王固有不可去之者而儉德辟難發於早辨與踈且逺者言也孟子曰我無官守我無言責也則吾進退豈不綽綽然有餘裕哉故醴酒不設穆生去之曰國人將鉗我於都市若必見否之已然而後避之不亦晚乎易説否之匪人不利君子貞大往小來伊川先生曰天地交而萬物生於中然後三才備人為最靈故為萬物之首凡生天地之中者皆人道也天地不交則不生萬物是無人道故曰匪人謂非人道也消長闔闢相因而不息泰極則復否終則傾無常而不變之理人道豈能無也既否則泰矣夫上下交通剛柔和會君子之道也否則反是是故不利君子貞君子正道否塞不行也大往小來陽往而隂來也小人道長君子道消之象故為否也並易傳彖曰否之匪人不利君子貞大往小來則是天地不交而萬物不通也上下不交而天下無邦也內隂而外陽內柔而外剛內小人而外君子小人道長君子道消也伊川先生曰夫天地之氣不交則萬物無生成之理上下之義不交則天下無邦國之道建邦國所以為治也上施政以治民民戴君而從命上下相交所以治安也今上下不交是天下無邦國之道也隂柔在內陽剛在外君子往居于外小人來處于內小人道長君子道消之時也易傳嘉仲問否之匪人曰泰之時天地交泰而萬物生凡生于天地之間者皆人道也至否之時天地不交萬物不生無人道矣故曰否之匪人唐棣所編橫渠先生曰蓋言上下不交便天下無邦有邦而與無邦同以不成國體也在天下他國皆無道只一邦治亦不可言天下無道須是都不治然後是天下無道也於否之時則天下無邦也古之人一邦不治别之一邦直至天下皆無邦可之則止有隱耳無道而隱則惟是有朋友之樂而已子欲居九夷未敢必天下之無邦或夷狄有道於今海上之國儘有仁厚之治者易説藍田吕氏曰否閉塞而不交也否之匪人不利君子貞言否閉之世非其人者惡直醜正不利乎君子之守正上下不交則君臣異體不可以為國廣平遊氏曰比之匪人言所比非其人也否之匪人言致否之因也君臣上下在朝者非其人則將引天下之叨懫姦回萃於朝此所以致否也羣小在上而衆邪逞故不利君子貞當是時非有大人之質則處否而未必亨非有大人之才一有則字不足以休否伊尹五就桀而當時羣小不能害焉非體道忘我孰足以與此以顔子之賢遊于人間世仲尼猶以心齋告之則為君子類者處否之時正當全身逺害而已有國家一無家字之道君臣而已傳曰不有君子其能國乎蓋惟君子在朝然後君臣各得其道上下合志而天下之情通此國之所以立也如君不君臣不臣則天下無邦矣猶之父不父子不子則無家矣無邦者其道亡也並易説龜山楊氏曰文明以健中正而應君子貞也唯君子為能通天下之志豈小人之利乎易説兼山郭氏曰天不人不因人不天不成古語曰天人合發萬變定機乃知天人之道率與時會故曰否之匪人也堯之命舜曰天之厯數在爾躬舜亦以命禹二者天之革命也天地革而四時成湯武革命順乎天而應乎人亦天之革命也然則一則為揖遜一則為干戈是之謂天人之合也故否之匪人舉其大者言之耳是以天地不交在時則否塞而成冬在道則不通而成否生生之道絶凡泰之所宜舉與此相反矣易之辭舉天地為萬物言也舉上下為人道言也至於天下無邦人道絶矣易説白雲郭氏曰否閉也塞也天地閉塞而不通人道何從而立乎故否之時非人道也人道配天地而言聖人之道是也聖人之道絶故曰否是知城復于隍亦有未絶者存為否之始而未否也不利君子貞者非不利於固守己道蓋不利於固祿位也故象言不可榮以祿而初六言君子貞吉亨也大往小來皆反泰之道也天下所以為邦者以有君臣父子人倫之道上下不交則人倫之道絶謂之無邦可也此之謂匪人矣匪人猶曰無道也易説漢上朱氏曰天地相交是生萬物其卦為泰人於其中為天地萬物之主觀之人則天地相交萬物咸備故三偶在上三竒在下鼻口居天地之中交泰也天地當交而否之匪人道也聖人位乎兩間以立人道否之則人道絶矣故曰否之匪人泰初三四上得位二五以正相易正者衆君子多也否初三四上不正二五獨正正者少不正者衆小人多也泰多君子否多小人豈天降之才有殊哉否時君子消小人長自中人以下化之為不正雖有君子寡徒少偶難乎免於衰世於是有善人載尸哲人之愚括囊無咎無譽故曰不利君子貞大者自內而往小者自外而來乾坤不交震反成艮艮者萬物之終也故曰萬物不通也坤在上為邦在下為邑治天下之道自庶人逹于大夫大夫達於諸侯諸侯逹于天子上下不交坤反于下則民困而主不恤下怨而上不知俗已敗而政不修雖有邦國內外塞矣故曰天下無邦也以氣言之內隂而外陽乾闔而坤也以形言之內柔而外剛氣反而死也一隂自姤長而為遁為否小人之道日長君子之道日消其禍至於空國而無君子極坤疑乾君臣相傷故聖人於此終言之易傳象曰天地不交否君子以儉德辟難不可榮以祿伊川先生曰天地不相交通故為否否塞之時君子道消當觀否塞之象而以儉損之德避免禍難不可榮居祿位也否者小人得志之時君子居顯榮之地禍患必及其身故冝晦處窮約也易傳龜山楊氏曰方小人不利君子貞之時惟約己自晦乃可以避難也易説當儉德辟難之時而榮以祿非枉道從之其可得乎是足恥也語解兼山郭氏曰禮曰嵗凶年榖不登君膳不祭肺馬不食榖馳道不除祭事不縣大夫不食粱士飲酒不樂其殺禮也如此况儉德辟難之時乎孔子曰邦有道貧且賤焉恥也邦無道富且貴焉恥也况否之時榮以祿乎易説白雲郭氏曰先人曰大道之行也天下為公故君子得以為君子小人不肯為小人君子則事事屈身而行道者有之小人事事屈道而信身無不為也况否之時小人非惟屈道信身又將惡直醜正協比讒言以害君子者多矣詩云為鬼為蜮則不可得有靦面目視人罔極是也孔子稱商有三仁焉微子去之箕子為之奴比干諫而死方其自靖人自獻于先王固有不可去之者而儉德辟難發於早辨與踈且逺者言也孟子曰我無官守我無言責也則吾進退豈不綽綽然有餘裕哉故醴酒不設穆生去之曰國人將鉗我於都市若必見否之已然而後避之不亦晚乎雍曰禮言嵗凶年榖不登君膳不祭肺馬不食榖馳道不除祭事不縣凶年尚殺禮如此况否之時乎此君子所以儉德辟難不可榮以祿也以無難言之邦無道榖為恥况有難之時乎故直曰不可也太公伯夷之避紂是也夫君子小人之際患亦多乎君子雖未嘗有意於害小人而小人嘗忍於害君子何哉蓋方泰之時君子彚進以小人亂邦必不容於其間不過逺而勿用也小人得志則以君子為害己者必欲窮其陷害務快私忿誅絶之而後已為之君子者可不避哉漢之黨錮雖有以致之在黨人未為無罪然小人忍於誅戮一至是耶易説漢上朱氏曰天地不交上下否塞也泰坤吝嗇儉也兊澤險難也震蕃鮮榮也否反泰乃有君子當天地不交之時以儉德辟難不食而遁去雖有厚祿不可榮之之象易傳新安朱氏曰收斂其德不形於外以辟小人之難人不得以祿位榮之本義初六拔茅茹以其彚貞吉亨象曰拔茅貞吉志在君也伊川先生曰泰與否皆取茅為象者以羣陽羣隂同在下有牽連之象也泰之時則以同征為吉否之時則以同貞為亨始以內小人外君子為否之義復以初六否而在下為君子之道易隨時取義變動無常否之時在下者君子也否之三隂上皆有應在否隔之時隔絶不相通故無應義初六能與其類貞固其節則處否之吉而其道之亨也當否而能進者小人也君子則伸道免禍而已君子進退未嘗不與其類同也爻以六自守于下明君子處下一作否之道象復推明以盡君子之心君子固守其節以處下者非樂于不進獨善也以其道方否不可進故安之耳心固未嘗不在天下也其志常在得君而進以康濟天下故曰志在君也並易傳橫渠先生曰柔順處下居否以靜者也能以類正吉而必亨不事苟合志在得主者歟易説藍田吕氏曰否閉之世上雖不交乎下下不可以不係乎上以柔居下臣之分也上下不交共以聽命有死靡他臣之正也引類守正以保其身時雖不泰其道亨矣故天下有道以道徇身天下無道以身徇道困而不失其所亨其亨由是也龜山楊氏曰泰之三陽否之三隂皆有應於上故皆有拔茅連茹之象居否之初雖上下不交而否猶未極也世雖否矣君子蓋未嘗一日忘天下而志不在君也上有悔禍願治之誠心則亦如是茅連茹而出矣孔子當衰周之際佛肸以中牟叛召之猶欲往焉夫豈為利哉志在君故也然而卒不往者要之不失正而已孟子千里而見王是其欲也不遇故去豈其所欲哉然猶三宿而後出晝又曰豫豈舍王哉則其志可知矣此聖賢所以處否之道而吉亨也易説兼山郭氏曰初六先大夫有言居廟堂則憂其民處江湖則憂其君蓋泰言志在外否言志在君之意也或引考槃之詩誤矣易説白雲郭氏曰先人曰先大夫有言曰居廟堂之髙則憂其民處江湖之逺則憂其君蓋泰言志在外否言志在君之意也雍曰君子當否之時有止無進固守且吉而道不廢於自亨也亨如顔氏之樂是也卦象以內為小人而爻以初為君子伊川所謂隨時取義變動無常也志在君者君子儉德辟難豈忘君者哉如伊尹樂堯舜之道其愛君至矣君臣之義如之何其廢之故荷蓧之徒聖人無取焉易説漢上朱氏曰初六自下引九四以退有艮巽九四應初巽成震艮為手拔也巽為白震為蕃鮮上柔下剛而潔白者茅也茹九四之剛也三陽同類以其彚也四應初正也能與其類退而守正得處否之吉身雖退伏其道亨矣五為君四近君志中也屈伸進退相為用也君子之退以小人得志故安于下以俟其復未嘗一日忘君也君子所以屈而能伸退而能進此否所以為泰之本歟故曰拔茅貞吉志在君也易傳新安朱氏曰三隂在下當否之時小人連類而進之象而初之惡則未形也故戒其貞則吉而亨蓋能如是則變而為君子矣小人而變為君子則能以愛君為念而不計其私矣本義問初六拔茅茹以其彚貞吉亨蓋三隂在下各以類進然惡未形故戒其能正則吉而亨蓋能正則變為君子矣程易作君子在下説云當否之時君子在下以正自守如何先生曰程氏亦作君子之象説某覺得牽強不是此意語録六二包承小人吉大人否亨象曰大人否亨不亂羣也伊川先生曰六二其質則隂柔其居則中正以隂柔小人而言則方否於下志所包畜者在承順乎上以求濟其否為身之利小人之吉也大人當否則以道自處豈肯枉己屈道承順於上唯自守其否而已身之否乃其道之亨也或曰上下不交何所承乎曰正則否矣小人順上之心未嘗無也大人於否之時守其正節不雜亂於小人之羣類身雖否而道之亨也故曰否亨不以道而身亨乃道之否也不云君子而云大人能如是則一無則字其道大也並易傳橫渠先生曰處二隂之間上順下容衆不可異故其道否乃亨易説藍田吕氏曰六二上承下包柔順且中小人所以自容也大人居之迹同而志異故與小人羣而不亂然秉柔中之德以道自處雖否不失其所亨廣平遊氏曰否之六二下乘初六上承六三二隂皆小人之象二不包初則小人畜忿而陷我矣不承三則小人依勢而藉我矣故曰包承小人吉此言君子一作善士之居中守正者全身逺害當如是也若夫至中至正之大人則不然體道虛己以遊人間或不言而飲人以和與人一無人字並立而使人化蓋嘗入獸不亂羣矣况於人羣乎故能處否而亨也若伊尹五就桀而羣凶不能以害之是也楊子以不離其羣為聖人蓋知不亂羣之説也易説龜山楊氏曰上下不交而小人道長極矣故包承之吉若子見南子是也其為言曰豫所否者天厭之則其見南子也是豈得已哉此大人處否而亨之道也然非居中履正則堅白不足而磨涅之其磷緇必矣又何吉之有夫居否之時揚己矜衆以自暴白昭昭如揭日月而行則其能不亂羣矣乎夫如是鮮不及矣此東漢之君子所以俱陷於黨錮也惟陳實獨免其庶幾乎易説兼山郭氏曰六二柔順中正然以隂居下當否之時故有包有承有大人小人之象大人否亨非能亨否也處否而亨者也於此而不亂羣非大人孰能為之易説白雲郭氏曰大人與天地合德其於含容固有餘矣然六二之包承則異於是蓋枉己屈道以承媚於人小人固能之非大人之事也故大人否亨否者身之否而道則亨矣孔子曰獲罪於天無所禱也孟子曰臧氏之子焉能使豫不遇哉大人之不能包承也如此不亂羣者如鷹鸇鳥雀必不可同羣伯夷不立於惡人之朝不與惡人言是也易説漢上朱氏曰五包二二承之包承也順以承上小人之正也六二在否之時得位在內小人也故曰小人吉九五中正在外包小人而容之雖包小人而亦不亂于小人之羣坤為亂三隂小人羣也包則和不亂羣則不流此大人處否而亨歟不曰君子者處否而亨非大人不能若同流合汚則否而已焉得亨天地相函隂陽相包否六二六三姤九三皆以陽包隂大者冝包小也易傳新安朱氏曰隂柔而中正小人而能包容承順乎君子之象小人之吉道也故占者小人如是則吉大人則當安守其否而後道亨蓋不可以彼包承于我而自失其守也言不亂于小人之羣本義又曰包承也是包得許多承順砥意思問橫渠先生説易為君子謀不為小人謀蓋自大極一判而來便已如是了曰論其極是如此然小人亦具此理只是他自反悖了君子治之不過即其固有者以正之而已易中亦有時而為小人謀如包承小人吉大人否亨言小人當否之時能包承君子則吉但此雖為小人謀乃所以為君子謀也並語録六三包羞象曰包羞位不當也伊川先生曰三以隂柔不中不正而居否又切近于上非能守道安命窮斯濫矣極小人之情狀者也其所包畜謀慮邪濫無所不至可羞恥也隂柔居否而不中不正所為可羞者處不當故也處不當位所為不以道也並易傳橫渠先生曰處否而進履非其位非知恥者也易説廣平遊氏曰六三在下體之上位寖顯矣而當否之世不能去又以隂柔處之是可羞也世之寡廉鮮恥苟賤之士處顯位以播惡於衆而自不一作不自知其醜者多矣六三與中正剛明者為鄰則見聞所漸亦知其可羞矣惟以資質隂柔不能行其所知至於忍恥而冒處故謂之包羞易説龜山楊氏曰六三居非中正位不當也故包其羞若子路愠見是也易説白雲郭氏曰三居下體之上過中思變之時也泰之九三能艱貞以守之故無咎否之六三不能變以有為而輔休否之君尸祿素餐所謂包羞者也孔子曰邦無道榖恥也其六三之謂歟書言沈潛剛克六三包羞無剛也無剛而處三五同功之位故曰位不當也易説漢上朱氏曰六三得時進而處上九四辭尊退居於下見六三則包容之而六三始有處不當位之羞何以知其羞乎體巽而自動是以知其羞也管仲謂齊侯恭而氣下言則徐見臣有慙色是也六二六三小人之致否者也君子與之力爭則否結而不解矣自古君子不忍於小人以及禍害者常多故易為君子謀必包容之使下者知所承上者知所愧庶幾有泰之漸也三四相易巽成離離為目羞愧之象也與恆九五或承之羞同易傳新安朱氏曰以隂居陽而不中正小人志于傷善而未能也故為包羞之象然以其未發故無凶咎之戒本義東萊吕氏曰否六三曰包羞象曰包羞位不當也人無有不善所以包蓄邪濫至可羞恥者豈其本真也特所處之位不當而已位之一字當詳玩己丑課程九四有命無咎疇離祉象曰有命無咎志行也伊川先生曰四以陽剛健體居近君之位是有濟否之才而得髙位者也足以輔上濟否然當君道方否之時處逼近之地所惡在居功取忌而已若能使動必出于君命威柄一歸于上則無咎而其志行矣能使事皆出于君命則可以濟時之否其疇類皆附離其福祉離麗也君子道行則與其類同進以濟天下之否疇離祉也小人之進亦以其類同也有君命則得無咎乃可以濟否其志得行也並易傳橫渠先生曰居否之世以陽處隂有應于下故雖有所命無咎也易説藍田吕氏曰上下不交命不行矣九四以陽居隂雖否之時獨有下交之志可以有命于下下必從之志行而無咎也疇誰也當否之時上下既不交則四與初亦不相應四有下交之志于下三隂無所偏係孰為應者必受其福故曰疇離祉龜山楊氏曰九四以乾健之才上承九五剛健中正之君有可致之資居得致之位庶乎其可為也然否之為否以上下不交故也非上承下比一德以相與而能反否而有為無是道也四雖有可致之資而處上下不交之時未必相與也故曰有命無咎疇離祉命謂君命也有命而後可以濟時之否而疇類皆離祉也東漢之衰嬖幸持權內小人而外君子至是而否極矣竇武何進倚元舅之親招集天下名儒碩德共起而圖之冝若可為也然而命不出於其君而下不應故與其疇類俱至於陷禍職此之由也後之處否者可不監之哉易説白雲郭氏曰九四以剛健之才居近君之位可以輔其君以休否者也然臣道無成有終而已必君命之斯無過舉矣故有是臣有是命又非特無過而已其疇類亦將附麗而獲福也湯之命見於湯誓也又曰聿求元聖與之戮力則有命無咎之人伊尹是也武王之命見於泰誓也又曰豫小子既獲仁人以遏亂略則有命無咎之人太公之徒是也湯誓曰豫其大賚汝周書曰大賚于四海豈非疇離祉之謂歟嗚呼商周之民非伊吕則無休否之祉伊吕非湯武之命將老死於莘渭間尚何志行之有哉易説漢上朱氏曰九四否道已革故於此言濟否之道四為朝廷五為君巽為命疇類也祉福也九四剛而履位有濟否之才而近君能下君命於朝廷五錫以六二之祉福則陽德亨矣否可以濟矣人誰咎之哉四應初三應上君子之類附麗其祉以進九四之志行乎下矣五錫二成離離麗也志者中也荀諝謂志行乎羣隂也易傳曰君道方否據逼近之地所惡在居功取忌若動必出於君命威福一歸於上則無咎而其志行矣易傳新安朱氏曰否過中矣將濟之時也九四以陽居隂不極其剛故其占為有命無咎而疇類三陽皆獲其福也命謂天命本義否九四有命無咎疇離祉這裏是吉凶未判須是有命方得無咎故須得一箇幸會方能轉禍為福否本是隂長之卦九五休否上九傾否又自大故好蓋隂之與陽自是不可相無者今以四時寒暑而論若無隂陽亦做事不成但以善惡及君子小人而論聖人直是要去盡了惡去盡了小人蓋亦抑隂進陽之義某於坤卦曾略發此意今有一樣人議論君子小人相對小人不可大故去他若要盡去他則反激其禍且如舜湯舉臯陶伊尹不仁者逺所謂去小人非必盡滅其類只是君子道盛小人自化雖有些小無狀處亦不敢發出來豈必勦滅之乎問九四有命無咎疇離祉三隂已過而陽得亨則否過中而將濟之時與泰九三無平不陂無往不復相類先生曰泰九三時已有小人便是可畏如此故艱貞則無咎否下三爻君子尚畏它至九四即不畏之矣故有有命疇離祉之象占也否九四雖是陽爻猶未離乎否體只緣他是陽故可以有為然須有命方做得又曰有命是有箇機會方可以做占者便須是有箇築著磕著時節方做得事成方無咎拔茅茹貞吉亨這是吉凶未判時若能於此改變時小人便會做君子君子小人只是箇正不正初六是那小人欲為惡而未發露之時到六二包承則已是打破頭面了然尚自承順那君子未肯十分做小人在到六三便全做小人了所以包許多羞恥大凡小人做了罪惡心下也自不穩當此便是包羞之説又曰包羞是有意傷害而未能之意他六二尚自包承到六三已是要害君子然做事不得所以包許多羞恥又曰龜山以包承小人為一句言否之世當包承那小人如此却不成句龜山之意蓋欲解説他從蔡京父子之失並語録九五休否大人吉其亡其亡繫于苞桑象曰大人之吉位正當也伊川先生曰五以陽剛中正之德居尊一作君位故能休息天下之否大人之吉也大人當位能以其道休息天下之否以循致于泰猶未離于否也故有其亡之戒否既休息漸將反一作及泰不可便為安肆當深慮逺戒常虞否之復來曰其亡矣其亡矣其繫于苞桑謂為安固之道如維繫于苞桑也桑之為物其根深固苞謂叢生者其固尤甚聖人之戒深矣漢王允唐李德裕不知此戒所以致禍敗也繫辭曰危者安其位者也亡者保其存者也亂者有其治者也是故君子安而不忘危存而不忘亡治而不忘亂是以身安而國家可保也有大人之德而得至尊之正位故能休一有息字天下之否是以吉也無其位則雖有其道將何為乎故聖人之位謂之大寶並易傳橫渠先生曰以亡為懼故能休其否苞桑從下叢生之桑叢生則其根牢書云厥草惟包如竹叢蘆葦之類河朔之桑多從根斬條取葉其生叢然並易説藍田吕氏曰上下之志雖欲相交而上下之分不可亂也故君尊臣卑禮無與抗若否道然乃否之美者也天尊在上地卑處下九五居尊得位君臣之位正當在大人則吉非大人則驕亢者也君君臣臣尊卑明辨所以防微杜漸安固基本故曰其亡繫于苞桑也龜山楊氏曰九五剛健中正有休否之才而履尊位大人之吉也否方休矣而安其位而忘其危保其存而忘其亡有其治而忘其亂則三者隨至矣故曰其亡其亡繫于苞桑言不忘亡則存乃可保也苞桑叢生也繫于苞桑言存之固也唐之穆宗承章武恢復之餘而蕭侁遽獻太平銷兵之䇿而河朔亂失此之謂也易説兼山郭氏曰莊子曰休休焉則平易矣故休休有優遊平易之意方否之將窮大者既往而九五猶得尊位大中以臨其下可以休否者也然否猶未傾三隂彚進敢安而忘危治而忘亂雖優遊平易之意可存而恐懼怵惕之心未怠也夫然後知生於憂患死於安樂可也易説白雲郭氏曰九五以剛中之才而居尊位為休否之主湯武是也商書徯豫后后來其蘇此湯之休否也周書曰一戎衣天下大定此武王之休否也湯武休否大人吉也其亡其亡存不忘亡也繫于苞桑則為悠久無疆之道也聖人之意蓋亦深矣湯之書曰栗栗危懼若將隕於深淵仲虺又為之誥曰慎厥終惟其始此湯其亡苞桑之義也武王之書曰乃偃武修文歸馬于華山之陽放牛于桃林之野示天下弗服召公又訓于王曰為山九仭功虧一簣此武王其亡苞桑之義也位正當者有其德而有其位也易於否稱大人而泰不言者則知泰之九二否之九五皆得乾二五大人之道可互見也易説漢上朱氏曰休息也九四否道已革九五息否之時二五相易隂息乎五故曰休否言九五之動也大人居尊位正也中正而健德當乎位也位者聖人之大寶雖有其德無其位不可也有其位無其時不可也息天下之否者其唯有其位有其德又有其時乎故曰大人之吉位正當也言九五之不動也然未離乎否也故又戒之九五不動不能與二相易則安其位者也保其存者也有其治者也安其位者必危保其存者必亡有其治者必亂故曰其亡其亡此又因九五不動以明戒也苞桑其葉叢生者也巽為木上玄下黃三陽積美而根于坤土其坤深固苞桑也巽為繩繫也維也慮其危亡且亂當繫之維之使其根深固以防否之復故曰繫于苞桑如是則大人吉非位正德當能無凶乎易傳曰漢之王允唐之李德裕不知此所以致禍敗也易傳新安朱氏曰陽剛中正以居尊位能休時之否大人之事也故此爻之占大人遇之則吉然人當戒懼如繫辭傳所云也本義問九五其亡其亡繫于苞桑如何先生曰有戒懼危亡之心則便有苞桑繫固之象蓋能戒懼危亡則如繫于苞桑堅固不拔矣如此説則象占乃有收殺非是其亡其亡而又繫於苞桑也九五以陽剛得位可以休息天下之否然須常存得危亡之心方有苞桑之固不知聖人於否泰只管説包字是如何必是於象上如何取其義今曉他不得只得説箇堅固之義並語録上九傾否先否後喜象曰否終則傾何可長也伊川先生曰上九否之終也物理極而必反故泰極則否否極則泰上九否既極矣故否道傾覆而變也先極否也後傾喜也否傾則泰矣後喜也否終則必傾豈有長否之理極而必反理之常也然反危為安易亂為治必有剛陽之才而後能也故否之上九則能傾否屯之上六則不能變屯也並易傳藍田吕氏曰上九髙極必顛故曰傾否否極必通故先否後喜龜山楊氏曰上九處否之極先否也否終而傾後喜也否泰之往復理之必至又何可長也然居否之終苟無剛健之才則欲傾否亦難矣上九有剛健之才者也與屯之上六不能亨屯異矣易説白雲郭氏曰志行於四否休於五上九之傾宜矣滿而傾覆自然之理也且處泰而泰則終否處否而否則終泰先否者乃所以為後喜之道故曰何可長也易説漢上朱氏曰上九否之終天運極矣人情厭矣君子動于上六三應于下否毁兊成如決積水而傾之莫之能禦也始也否塞先否也終也傾否後喜也兊為説隂陽得位為喜巽為長理極必反否終則傾何可長也易傳曰反危為安易亂為治必有剛陽之才故否之上九則能傾否屯之上六不能變屯易傳五峯胡氏曰否終則傾言否之不可長久也新安朱氏曰以陽剛居否極能傾時之否者也其占為先否後喜本義九四則否已過中上三爻是説君子言君子有天命而無咎大抵易為君子謀且如否內三爻是小人得志時然不大會做得事初則如此二又如此三雖做得些箇也不濟事到四則聖人便説他那君子得時否漸次反泰底道理五之苞桑繫辭中説得條暢盡之矣上九之傾否到這裏便傾了否做泰語録合訂刪補大易集義粹言卷十六
