body:
  text: 合訂刪補大易集義粹言卷五十頭等侍衛納喇性德編巽下坤上伊川先生曰升序卦萃者聚也聚而上者謂之升故受之以升物之積聚而益高大聚而上也故為升所以次於萃也為卦坤上巽下木在地下為地中生木木生地中長而益髙為升之象也易傳升元亨用見大人勿恤南征吉伊川先生曰升者進而上也升進一作進升則有亨義而以卦才之善故元亨也用此道以見大人不假憂恤前進則吉也南征前進也易傳横渠先生曰乾之九二利見大人而以時之止升之九二有六五配合之慶故可見大人之德南征而勿恤也易說白雲郭氏曰天地萬物皆有升在人則位之升謂之升德之升亦升也升位則足以行道升德則足以進道是以元亨之理在焉升位而見大人故无附麗小人之失升德而見大人則日入於君子之塗故用見大人可以無憂而有慶也南為明方陽之位也君之所也君子之𩔖也故南征无不吉也唯見大人故可勿恤勿恤則害已者去而无憂矣故可至南征南征斯無不吉葢升之有序如此易說新安朱氏曰升進而上也卦自解來柔上居四内巽外順剛中而五應之是以其占如此南征前進也本義彖曰柔以時升巽而順剛中而應是以大亨用見大人勿恤有慶也南征吉志行也伊川先生曰以二體言柔升謂坤上行也巽既體卑而就下坤乃順時而上升以時也謂時當升也柔既上而成升則下巽而上順以巽順之道升可謂時矣二以剛中之道應於五五以中順之德應於二能巽而順其升以時是以元亨也彖文誤作大亨解在大有卦凡升之道必由大人升於位則由王公升於道則由聖賢用巽順剛中之道以見大人必遂其升勿恤不憂其不遂也遂其升則已之一作有福慶而福慶及物也南人之所向南征謂前進也前進則遂其升而得行其志是以吉也並易傳藍田吕氏曰升柔而上也以柔而升則升不逼上故用見大人勿恤柔之志不之於陽明之地則邪僻隂闇无所不至故南征吉白雲郭氏曰柔道不升則沈潛无以自逹其德與位日入於卑汙陷溺之域故書謂沈潛剛克者亦柔以時升之義也升以坤巽成卦二隂相附其體難升故必須時而後可升焉巽有入之道坤有順之義二五剛中而應故可升而大亨也用見大人勿恤者見大人則在己者无憂在己无憂則害己者去矣位日可進德日可成故為有慶之漸慶者澤加於民天下之慶也然則南征則志无不行明矣易說漢上朱氏曰升者萃之反柔在下者也以時而升乎上上巽乎下者坤可升之時也故曰柔以時升此以坤體在上言升之時也卑巽在下而順乎理剛中自守而應乎上其升以時不為富貴利逹動其心則得位而大亨矣故曰巽而順剛中而應是以大亨此合兩體以二五相易明升之才也大人者九二之五也二之五成離離目為見二升於五剛中正得位以此見大人其升必矣故曰用見大人恤憂也九二失位為憂之五得位雖有坎險勿恤也所謂恤者二陽欲升隂道凝盛未可遽進以人事言之小人猶在上也然九二六五應也巽下順上升之時也雖坤隂在上何憂乎不遂遂往而升有慶及物矣陽為慶也夫日之初升隂固未退及其清風戒旦則羣隂解駮盡矣夫何憂哉故曰勿恤有慶也大則虞舜升聞在上小則文子同升諸公與學以聚之自下而上逹而升之道皆趨乎明也離南方也征以正而行正則吉二之五之謂也二動於中以正而行以見大人往而有慶則其志上行故曰南征吉志行也此復以九二之五勉其升也在卦氣為小寒故太𤣥準之以上干易傳新安朱氏曰柔以時升以卦變釋卦名巽而順以卦德卦體釋卦辭本義象曰地中生木升君子以順德積小以高大伊川先生曰木生地中長而上升為升之象君子觀升之象以順脩其德積累微小以至高大也順則可進逆乃退也萬物之進皆以順道也善不積不足以成名學業之充實道德之崇高皆由積累而至積小所以成高大升之義也易傳白雲郭氏曰萬物之升其象則皆如地中生木也自毫末以至合抱人莫見其升之之迹者以順積而致之耳順則不逆於德積則為之有漸故能升而不已以極高大不然則逆德暴行未能升而困及之矣易說漢上朱氏曰木根於地中乃升而上者順也君子以順為德不棄小善積卑成高積小成大其德日躋亦以根於心者順也否則无本安能積之以成高大乎揚子雲所謂木漸是也易傳曰萬物之進皆以順道易傳新安朱氏曰王肅本順作愼今案他書引此多作愼意尤明白葢古字通用也說見䝉卦本義木之生也无日不長一日不長則木死矣人之學也一日不可已一日而己則心死矣語録東萊吕氏曰木自根本長至於杪德自小長至於大所謂順道也上逹謂之順下逹謂之逆易說初六允升大吉象曰允升大吉上合志也伊川先生曰初以柔居巽體之下又巽之主上承於九二之剛巽之至者也二以剛中之德上應於君當升之任者也允者信從也初之柔巽唯信從於二信二而從之同升乃大吉也二以德言則剛中以力言則當任初之隂柔又无應援不能自升從於剛中之賢以進是由剛中之道也吉孰大焉與在上者合志同升也上謂九二從二而升乃與二同志也能信從剛中之賢一作道所以大吉並易傳横渠先生曰允信也自信於己與上合志而升易說藍田吕氏曰初六以柔居下當升之時柔進而上雖處至下志與三隂同升衆之所允无所不利故曰允升大吉白雲郭氏曰初六居衆爻之下沈滯而難升者能自信之篤確然不移終自拔於沈滯之中故言允升而致大吉也上合志者二三之陽其升為易初六能上合九二九三之志與之同體而升所謂用見大人勿恤者也故无沈滯難升之害焉易說漢上朱氏曰允施氏易作􅣡進也四坤為衆為順二三四兌為口衆口順之允也初六巽之主以一柔承二剛能巽者也在升時九二九三俱升六四當位合衆之欲志在於初而初未應六四順而正初動則正從九三九三進而升於四與上合志允升也是以大吉荀爽曰一體相從允然俱升易傳新安朱氏曰初以柔順居下巽之主也當升之時巽於二陽占者如是則信能升而大吉矣本義九二孚乃利用禴无咎象曰九二之孚有喜也伊川先生曰二陽剛而在下五隂柔而居上夫以剛而事柔以陽而從隂雖有時而然非順道也以暗而臨明以剛而事弱若黽勉於事勢非誠服也上下之交不以誠其可以一无以字乆乎其可以有為乎五雖隂柔然居尊位二雖剛陽事上者也當内存至誠不假文飾於外誠積於中則自不事外飾故曰利用禴謂尚誠敬也自古剛強之臣事柔弱之君未有不為矯飾者也禴祭之簡質者也云孚乃謂既孚乃宜不用文飾專以其誠感通於上也如是則得无咎以剛強之臣而事柔弱之君又當升之時非誠意相交其能免於咎乎二能以孚誠事上則不惟為臣之道无咎而已可以行剛中之道澤及天下是有喜也凡象言有慶者如是則有福慶及於物也言有喜者事既善而又一无又字有可一无可字喜也如大畜童牛之牿元吉象云有喜葢牿於童則易又免強制之難是有可喜也並易傳横渠先生曰與萃六二同易說藍田吕氏曰九二柔升之時以剛居中若不相合然上應於五如見信於五雖納約薦誠无所不說故无咎所以信者剛中而應故也白雲郭氏曰書曰沈潛剛克故升之道亦以剛中而應而後大亨九二是也九二能以誠信之道孚於上下其進而有喜不亦宜乎必曰利用禴者事天地鬼神與事君一道也禴祭簡薄惟以誠為主茍有誠信雖天地鬼神无嫌於簡簿况人道乎是以无咎易説漢上朱氏曰升萃之反也升之九二即萃之九五故升萃二爻反復同象明二五之孚也凡人從上或出於𫝑位則雖恭巽未免有咎况望行道乎誠不足也二剛上應五柔納之剛柔相與而孚其為巽也盡誠敬而已非外飾也是以道行於上澤被於下此九二所以喜歟喜𤼵於中心形於面目者也陽得位為喜故曰九二之孚有喜也禴夏祭五納二成離離為夏震為聲為長子上為宗廟艮為門闕二升五有長子升自門闕奉祭之象禴薄祭以聲為主用誠敬也二五相孚乃利用誠敬无咎乃難辭易傳新安朱氏曰義見萃卦本義問升萃二卦多是言祭享萃固取聚義不知升何取義先生曰人積其誠意以事鬼神有升而上通之義語録九三升虛邑象曰升虛邑无所疑也伊川先生曰三以陽剛之才正而且巽上皆順之復有援應一作者以是而升如入無人之邑孰禦哉入无人之邑其進无疑阻也並易傳横渠先生曰上皆隂柔往无所疑易説藍田吕氏曰九三以陽居陽將升於上上體純隂莫之違拒如入无人之境其行无疑故曰升虛邑漢上朱氏曰九三升上六六坤之三坤在下為邑隂為虚升虛邑也九三上六相應以正下巽而上順如升无人之邑孰禦哉巽為不果三升上巽毁无所疑也易傳白雲郭氏曰自下而升至於三其來不可禦也况有剛陽之才足以自致乎是以如升无人之虛邑其行无所疑矣易說新安朱氏曰陽實隂虛而坤有國邑之象九三以陽剛當升時而進臨於坤故其象占如此本義東萊吕氏曰九三以陽剛之才而上升上三爻皆虛无所阻礙夫何所疑哉故曰升虛邑无所疑也易説六四王用亨于岐山吉无咎象曰王用亨于岐山順事也伊川先生曰四柔順之才上順君之升下順下之進已則止其所焉以隂居柔隂而在下止其所也昔者文王之居岐山之下上順天子而欲致之有道下順天下之賢而使之升進已則柔順謙恭不出其位至德如此周之王業用是而亨也四能如是則亨而吉且无咎矣四之才固自善矣復有无咎之辭何也曰四之才雖善而其位當戒也居近君之位在升之時不可復升升則凶咎可知故云如文王則吉而无咎也然處大臣之位不得无事於升當上升其君之道下升天下之賢已則止其分焉分雖當止而德則當升也道則當亨也盡斯道者其惟文王乎四居近君之位而當升時得吉而无咎者以其有順德也以柔居坤順之至也文王之亨於岐山亦以順時順事而已上順於上下順乎下已順處其義故云順事也並易傳藍田吕氏曰六四以太王之事明之六五以文王之事明之太王不忍戰其民遜以避狄䇿杖去豳之岐山之下居焉而從之者如歸市因以肇基王迹柔升之道莫盛於此葢六四以隂居隂其柔至矣而乃升於上體順而上進如太王之事也文王有君民之大德有事君之小心三分天下有其二以服事商葢大得天下之心猶執柔中以事上不失人臣之貞而履人君之𫝑故曰貞吉升階白雲郭氏曰孟子言太王邑於岐山之下居焉又曰昔者文王之治岐也則岐山為太王文王之所治也太王文王其道皆亨是以吉且无咎然所以亨者无他順事而已觀其狄人侵則事之欲土地則去之又曰不以其所以養人者害人此太王之順也故邠人從之如歸市而肇基王迹所謂亨吉而无咎矣文王三分天下有其二以服事殷文王之順也故二老來歸而天下歸之光于四方顯于西土所謂亨吉而无咎矣謂之順事不亦宜乎升之道以順積為主獨六四得之易說漢上朱氏曰六四柔順謙恭而正上順六五柔暗之君下順九三剛正之賢升之於五以事其君亦恭也已則不出乎諸侯之位者正也三者皆順事也文王可謂至德也已故能用此以亨于𡵨山三升五乾為王兌為西方艮為山四以諸侯居於西山之下岐山也正則吉且无咎坤為順巽為事三分天下有其二以服事商順事也毛公言文王率諸侯以朝聘於紂則升九三可知崔憬謂此太王避狄徙岐之爻誤矣易傳新安朱氏曰義見隨卦以順而升登祭于山之象本義問王用亨于岐山云只是享字古文无享字所謂亨享烹只是通用亨于岐山亨于西山只是説祭山川想不到得如伊川説語録六五貞吉升階象曰貞吉升階大得志也伊川先生曰五以下有剛中之應故能居尊位而吉然質本隂柔必守貞固乃得其吉也若不能貞固則信賢不篤任賢不終安能吉也階所由而升也任剛中之賢輔之而升猶登進自階言有由而易也指言九二正應然在下之賢皆用升之階也能用賢則彚升矣倚任賢才而能貞固如是而升可以致天下之大治其志可大得也君道之升一作興患无賢才之助爾有助則猶自階而升也並易傳横渠先生曰柔中極尊不拒來者使物皆階已而升正而且吉志宜大𫉬也易所謂得志者聖賢𫉬其願欲得臣无家堯之志也貞吉升階舜之志也易説白雲郭氏曰升之道在上為易在下為難在上以順而可升在下必有剛德而後可升焉故六五之升獨无所事以貞自守不失其吉如歷階而升有進无退况九二以剛中而應之其大得志宜矣易説漢上朱氏曰六五虛中降位而接九二九二階之以升則五正而吉不正則信賢不篤用賢不終其能吉乎五正而吉者以二升階也五正二升君臣道行由是而致治故五大得志也坤土自上際下巽為高升階之象易傳新安朱氏曰以隂居陽當升而居尊位必能正固則可以得吉而升階矣階升之易者本義六五貞吉升階與萃九五萃有位匪孚元永貞悔亡皆謂有其位必當有其德若无其德則萃雖有位而人不信雖有升階之象而不足以升矣語録上六冥升利于不息之貞象曰冥升在上消不富也伊川先生曰六以隂居升之極昏冥於升知進而不知止者也其為不明甚矣然求升不已之心有時而用於貞正而當不息之事則為宜矣君子於貞正之德終日乾乾自強不息如一作以上六不己之心用之於此則利也以小人貪求无己之心移於進德則何善如之昏冥於升極上而不知己唯有消亡豈復有加益也不富无復増益也升既極則有退而无進也並易傳藍田吕氏曰上六隂極必冥又窮於上升而不已者也至誠不息如是可也施之於是消息盈虚當與時行不息則消安得富乎白雲郭氏曰在下升之難故初六必合陽剛之志而後可升在上升之易故上六有冥升不知止之辭焉利于不息之貞者冥升於禄位則失知止之戒茍能自強不息以進於道其為利貞孰大於是消不富者冥升不已則極於升而困矣困則消至焉是以不富葢冥升不已為消之漸而在消息之理息則富而消則不富故也易於坤體多言不富者隂道常乏也泰之六四謙之六五皆是也易説漢上朱氏曰坤為冥晦隂虚為不富上六利己極矣猶升而不息不知升極當降長極當消消則不富矣豈復更有増益之理四時之進退萬物之盛衰皆然上六不知冥於升也不息之貞者仁義忠信樂善不倦是也惟施於此為利若施於公卿大夫可已而不已不利易傳曰以小人貪求无己之心移之於進德則何利如之易傳新安朱氏曰以隂居升極昏冥不已者也占者遇此无適而利但可反其不已於外之心施之於不息之正而已本義東萊吕氏曰上六以隂居升之極昏冥冒利進而不知止所謂冥升也若移此心用於正道進而不息所謂利於不息之貞也至於象亦有二義彼昏冥而嗜進者固曰有消而无富若用之於正道至誠无息則所過者化如物之在爐盡皆消釋无所係累此亦所謂消不富也易説又答周允升書曰胡文定有語云但持敬十年自别此言殊有味大抵目前學者用功甫及旬月未見涯涘則已逡巡退却不復自信久大德業何自而成經訓所載若曰念終始典於學厥德修罔覺若曰冥升利于不息之貞若曰仁者先難而後𫉬正謂學者多端顧慮者衆一意勇往者少故每惓惓於此也别集合訂刪補大易集義粹言卷五十
