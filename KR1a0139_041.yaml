body:
  text: 合訂刪補大易集義粹言卷三十九頭等侍衛納喇性德編坤下離上伊川先生曰晉序卦物不可以終壯故受之以晉晉者進也物無壯而終止之理既盛壯則必進晉所以繼大壯也為卦離在坤上明出地上也日出於地升而益明故為晉晉進而光明盛大之意一作義也几物漸盛為進故彖云晉進也卦有有德者有無德者隨其冝也乾坤之外云元亨者固有也云利貞者所不足而可以有功也有不同者革漸是也隨卦可見晉之盛而無德者無用有也晉之明盛故更不言亨順乎大明無用戒正也易傳新安朱氏曰或問晉序卦物不可以終壯故受之以晉程傳云物無壯而終止之理既壯盛則必進某竊謂物進而後至於壯盛既壯盛則衰退繼之矣今曰壯盛則必進此義未詳先生曰物固有壯而後進者亦有進而後壯者各隨其事而言難以一説拘也且以十二月卦論之大壯之為夬夬之為乾豈非壯而後進乎至乾乃極而衰也語録東萊吕氏曰晉者進也所以次於壯者蓋言進之道必先有其壯然後可進以卦體而言明出乎地光輝發越所以為進盛也然以爻義而言晉以柔順之臣附麗乎大明之君則道德之光被乎四表所以為盛也易説晉康侯用錫馬蕃庶晝日三接伊川先生曰晉為進盛之時大明在上而下體順附諸侯承王之象也故為康侯康侯者治安之侯也上之大明而能同德以順附治安之侯也故受其寵數錫之馬衆多也車馬重賜也蕃庶衆多也不唯錫與之厚又見親禮晝日之中至於三接言寵遇之至也晉進盛之時上明下順君臣相得在上而言則進於明盛在臣而言則進升髙顯受其光寵也易傳白雲郭氏曰伊川曰晉以其明盛故不言亨順乎大明故不戒以正不待言而其德可知雍曰彖言晉進也雜卦曰晉晝也則知晉之義不止於進蓋言明以進故曰晉漸以進不謂之晉也晉卦取名之義與大有略相類大有火在天上君道也故為大有晉明出地上臣道也故為晉君臣天地之象雖不同其欲以明德居上則一而已且以人臣之進獨備一卦之義則臣道之至大者非康侯安足以當之易之卦辭唯晉為異專以康侯為義是以不及其他也康侯如是其亨利貞可知易説新安朱氏曰晉進也康侯安國之侯也錫馬蕃庶晝日三接言多受大賜而顯被親禮也蓋其為卦上離下坤有日出地上之象順而麗乎大明之德又其變自觀而來為六四之柔進而上行以至於五占者有是三者則亦當有是寵也本義康侯似説寧侯相似用錫馬之用只是個虛字説他得這個物事晝日是那上卦離也書日為之是此意語録東萊吕氏曰夫以在下之諸侯受寵於君錫馬之蕃庶至於日三接是為晉之盛也然康侯二字最當玩味常人之情徒以進而受君之寵居君之位為甚殊不知惟康侯方足以為盛夫康侯者懷才抱藝足以安天下若非康侯而虛受其寵適以自愧何者康者盛之本而外此皆其末也今之學者誠能修康安之業先有以盛於己則雖不期於晉盛而錫馬之蕃庶自不能違雖然進而受寵此特臣之盛不言君者何哉蓋君以能用賢為盛能以蕃庶之馬而錫安康之諸侯則為盛矣田野闢人民治侯之康者也易説彖曰晉進也明出地上順而麗乎大明柔進而上行是以康侯用錫馬蕃庶晝日三接也伊川先生曰晉進也明進而盛也明出於地益進而盛故為晉所以不謂之進者進為前進不能包明盛之義明出地上離在坤上也坤麗於離以順麗於大明順德之臣上附於大明之君也柔進而上行凡卦離在上者柔居君位多云柔進而上行噬嗑睽鼎是也六五以柔居君位明而順麗為能待下寵遇親密之義是以為康侯用錫馬蕃庶晝日三接也大明之君安天下者也諸侯能順附天子之明德是康民安國之侯也故謂之康侯是以享寵錫而見親禮晝日之間三接見於天子也不曰公卿而曰侯天子治於上者也諸侯治於下者也在下而順附於大明之君諸侯之象也易傳藍田吕氏曰晉進而之於貴也明出地上順而麗乎大明柔進而上行皆進而之於貴人臣進受君寵之象也康美也安也如記所謂康周公以賜魯也錫馬蕃庶晝日三接君寵之多也明出地上晝也歷三隂而至離之明三接之象也龜山楊氏曰柔進而上行臣進之盛者故有康侯之象焉侯有君道者也順而麗乎大明故用錫馬蕃庶晝日三接也馬地類坤象也明出地上晝日之象也問國之富以馬錫馬蕃庶其厚之也晝日三接其親之也鄭武公父子並為周司徒其三接之謂與易説白雲郭氏曰明出地上二卦之象也順而麗乎大明晉之義也柔進而上行成卦之序康侯之德也其德柔順而明故下能康一國之民而為之主上能致王者之寵而錫馬蕃庶晝日三接也車馬重賜也三接數接乎上也在國能康一國之民則進而麗乎大明斯足以康天下矣古之人文王是也易説漢上朱氏曰明出地上進而不已至於盛明故曰晉進也明出地上此合離坤兩體言晉也晉自臨來蹇之變也離者坤易乾也離為明自六五言之為大明乾陽為大也人君有明德居尊位照天下之象坤順離麗也人臣之道主於順而不知其所麗則其道不能以上行順而麗乎大明然後蹇六四之柔進而與君同德故曰順而麗乎大明柔進而上行此以六五一爻言晉也五為天子四為諸侯康褒大之與禮記康周公之康同六四進而之五以諸侯近天子之光王明而受福九五用是降心以褒大之錫馬蕃庶也乾變坎為美脊之馬坤變乾為牝馬坤為衆蕃息庶多言不一種也周官校人天子十有二間馬六種邦國六間馬四種凡朝覲會同毛馬而頒之錫馬蕃庶亦進之意也日在中天為晝艮為手坤三爻三接三極數也不惟錫豫又親禮之大行人之職諸公三饗三問三勞晝日訪問之時三接極盛之禮所以康諸侯者至矣非順而麗乎大明柔進而上行何由至是哉故曰是以康侯用錫馬蕃庶晝日三接也此以六五兼兩體而言處晉之道或曰午為馬火畜也故古者差馬以午出入馬以日中而説卦以乾坎震為馬何也曰乾離同位日與天同體金與火相守則流以五行言之火為馬以八卦言之乾為馬觀諸天文七星為馬離也離者午之位漢中之四星曰天駟東璧之北四星曰天廏建星六星曰天馬乾坎也房為天駟東一星為天馬震也故馬以三卦言之昔者國有戎事各服其産而冀北之馬獨為良馬者乾也震為龍其究為健乾也辰為角亢與房及尾共為蒼龍之次故馬八尺以上曰龍世傳大宛余吾之馬出於龍種龍飛天者離也馬行地者乾也而馬政禁原蠶蠶以火出而浴龍星之精與馬同氣察乎此則知乾離同位矣在卦氣為二月故太玄準之以進易傳新安朱氏曰晉進也釋卦名義明出地上以卦象卦德卦變釋卦辭本義東萊吕氏曰晉之為義惟在下之賢以柔順麗乎大明之君而得以上行所以謂之晉盛大抵君臣之間惟降志以相接則治可日彰德可日明若在下者方命在上者驕亢則治與德俱退矣惟是上柔順以接下下柔順以輔上則為晉盛故柔順二字最當玩味非特君臣之間為然學者欲進德修業亦必於柔順上求若不柔順則矜已自大德日益晦矣故傅説戒高宗曰惟學遜志遜之一字其入道之門乎易説象曰明出地上晉君子以自昭明德伊川先生曰昭明之也傳曰昭德塞違昭其度也君子觀明出地上而益明盛之象而以自昭其明德去蔽致知昭明德於己也明明德於天下昭明德於外也明明德在已故云自昭易傳龜山楊氏曰自昭明德所謂明明德也易説白雲郭氏曰元首明哉股肱良哉自古以明為君德之大堯舜文王皆是也而晉為臣道自昭明德何哉蓋侯有君人之道有明德自昭而柔順上行然後備晉之義可以謂之康侯不如是雖使錫馬蕃庶晝日三接亦非晉進之道不得謂之康侯矣古之人莫不務明明德於天下為君為臣亦豈有二德哉是以伊尹言咸有一德武王言同心同德則晉之象言自昭明德不為過矣易説漢上朱氏曰乾曰自強晉曰自昭二者自已為之人力無所施天行日進誰使之哉明德者已之所自有也進而不已其德自昭如日有光出則被乎萬物非有心於昭昭也易傳曰去蔽致知昭明德於己也明明德於天下昭明德於外也易傳新安朱氏曰昭明之也本義東萊吕氏曰晉象之義學者最當體會且如日出於地烜赫光明凡舟車所至無不照臨人之一心其光明若是若能擴而充之則輝光燦爛亦日之明也然人有是明而不能昭著非人昏之是自昏之也故曰自昭明德蓋昭之於外亦是自昭非人昭之也大明出於地而照於四方容光必照萬物皆被於光輝在常人必眩耀而不敢正視反視其身若螢爝之光君子則知此明之不在外本自具足故自昭明德而已易説初六晉如摧如貞吉罔孚裕無咎象曰晉如摧如獨行正也裕無咎未受命也伊川先生曰初居晉之下進之始也晉如升進也摧如抑退也於始進而言遂其進不遂其進唯得正則吉也罔孚者在下而始進豈遽能深見信於上苟上未見信則當安中自守雍容寬裕無急於求上之信也苟欲信之心切非汲汲以失其守則悻悻以傷於義矣皆有咎也故裕則無咎居子處進退之道也獨行正者無進無抑唯獨行正道也寬裕則無咎者始欲進而未當位故也君子之於進退或遲或速唯義所當未嘗不裕也聖人恐後之人不達寬裕之義居位者廢職失守以為裕故特云初六裕則無咎者始進未受命當職任故也若有官守不信於上而失其職一日不可居也然事非一槩久速唯時亦容有為之兆者並易傳橫渠先生曰居晉之初正必見摧故摧如不害於貞吉也未孚於人或未見聽寬以居之乃無咎然初六有應在四居下援上未安其分故曰未受命也易説藍田吕氏曰初六明進之始故晉如以隂居乎至下未遂其進故摧如至柔居下或晉或摧宜無所立矣然順而麗明獨行乎正故貞吉居物之下當事之始物未信也故罔孚四離正應以順麗明不獨繫四裕而不狹乃無咎也未受命者所麗在離之全體未以四應而偏受命也龜山楊氏曰晉如其進也摧如其退也居晉之初量而後入無心於進退者也雖進退無常獨行正而已故正吉在下未受命者也故罔孚裕無咎孟子曰我無官守我無言責則吾進退豈不綽綽然有餘裕哉此之謂也易説白雲郭氏曰在卦之初為晉之始有可進可退之義能不以進退為慮唯固守明德柔順上行為臣若此能無吉乎罔孚者雖以明德自任而初之時名實未加於上下未足信於人當是時也進退之際既已處之裕然何咎之有若孔子可以仕則仕可以止則止是也獨行正者獨以明德上行而固守為正不以進退為慮也未受命者無官守言責之時孟子所謂吾進退豈不綽綽然有餘裕也易説漢上朱氏曰晉之始見有應則動而進故晉如動而九四不應知其不可進則自抑而退故摧如摧者抑其動也始進未孚戒在不正以求四之知唯獨行正道乃獲貞吉積誠不己未有不孚者故曰貞吉罔孚初坤體順其進也不汲汲以失守其退也不悻悻以傷義綽然有餘裕卒歸於無咎故曰裕無咎然裕無咎者以進之始未受命也若已仕而有官守上不見信不得其職致為臣而去可也裕安得無咎四艮為手受也巽為命初動震見巽伏未受命易傳曰若夫有官守而不孚於上廢職失守以為裕則一日不可居矣易傳新安朱氏曰以隂居下應不中正有欲進見摧之象占者如是而能守正則吉設不為人所信亦當處以寬裕則無咎也初居下位未有官守之命本義問初六晉如摧如象也貞吉占辭先生曰罔孚裕無咎又是解上兩句恐貞吉説不明故又曉之摧如愁如易中少有此字疑此爻必有此象但今不可曉耳並語録東萊吕氏曰初六居晉之始大抵天下之理有進必有退有榮必有辱不待進極而後有退當進之初已有退之理不待榮極而後有辱當榮之初已有辱之理故曰晉如摧如然常人之情進則牽制於富貴退則隕穫於貧賤於此之時多不能以正故處晉之初惟正然後吉罔孚裕無咎人之始進於其上誠未孚意未交惟是不急迫然後能免於咎象獨行正也獨字最有深意進亦守此正退亦守此正不為所牽裕無咎未受命也孟子言我無官守我無言責則吾進退豈不綽綽然有餘裕哉此之謂也時未可退安其位而不妄動亦裕也伊川曰事非一槩久速唯時亦容有為之兆者此最是伊川會看易處意在言外學者須識時字蓋不識時則未受命時優遊寬裕受命後便急迫蓋理會時字不得易説六二晉如愁如貞吉受茲介福于其王母象曰受茲介福以中正也伊川先生曰六二在下上無應援以中正柔和一作順之德非強於進者也故以進為可憂愁謂其進之難也然守其貞正則當得吉故云晉如愁如貞吉王母祖母也謂隂之至尊者指六五也二以中正之道自守雖上無應援不能自進然其中正之德久而必彰上之人自當求之蓋六五大明之君與之同德必當求之加之寵祿受介福于王母也介大也受茲介福以中正之道也人能守中正之道久而必亨况大明在上而同德必受大福也並易傳橫渠先生曰進而無撓多失於肆故愁如乃吉六五以隂居尊故稱王母俱以柔中故受福可必也易説藍田吕氏曰六二晉如進而之明也愁如上無應也六五以柔居尊王母之象也王母祖母之稱婦人之尊也二五俱無應而皆處中正以中正相感而不以他故受茲介福也龜山楊氏曰順而麗乎大明晉之時也明明在上而六二以柔順中正處乎衆隂之間而獨無應焉是明不見知也小人相與比周而君子不見察則亂將作矣能無憂乎哉故曰晉如愁如然居中履正素其位而行則明雖不見知鬼神之至幽者其福之矣故受茲介福於其王母詩曰靖共爾位好是正直神之聽之介以景福此之謂也易説白雲郭氏曰六二柔順中正為臣之道莫美於斯而曰晉如愁如者蓋小人以進為喜而君子以進為懼故召公為保則不悅正考父三命而傴俯茲其所以順而麗乎大明與是以既貞且吉受介福於其王也孔子言諸侯長守富貴之道則曰戰戰兢兢如臨深淵如履薄氷則晉如愁如而受茲介福也冝矣此爻之義與卦辭相類蓋言侯之受錫福于王者母字無别義亦衍字也易説漢上朱氏曰六二得位居晉之時而五不應故晉如愁如二至五有離目艮鼻坎加憂嚬蹙之象故愁如言進之難知道未行為天下憂之然守貞則吉王母六五動也柔得尊位五動成乾乾為王坤為母王母也數親自二而上二為己三為考四為祖五坤祖之配也故祖母謂之王母二雖難進無援於上然柔順中正履貞不回久而必孚況同德乎未有五不動而應之者故受茲介福於其王母五動陽為福為大介大也二中正五動亦中正是以二受五之福故曰以中正也易傳新安朱氏曰六二中正上無應援故欲進而愁占者如是而能守正則吉而受福于王母也王母指六五蓋享先妣之吉占而凡以隂居尊者皆其類也本義問受茲介福于其王母王母指六五以為享先妣之吉占何也先生曰恐是如此蓋周禮有享先妣之禮語録東萊吕氏曰六二以隂居隂而自進上無正應當此之時最難於進六二乃以柔和恬淡自安於位故人見其有進之才而居於下乃為之愁夫以柔而居中正本非所以有愁此愁乃人愁之非六二自愁晉如愁如為六二之爻位而發也然又謂之貞吉者蓋大凡人處憂愁怵迫之時未有不變其所守而失其節今六二知柔懦不能進故守正而不貪進所以吉然雖懦弱在下無所應惟自守於正不充詘於富貴不隕穫於貧賤而六五終亦自與六二為應而受福於六五矣王母乃六五也以隂居尊位乃王母之象象曰以中正者蓋言受其介福只緣能居中而守正蓋貞吉二字當困厄之時最切要當困厄而不貪進終有進之日何者正道無不通之理苟不安所守終不能得進之之道易説六三衆允悔亡象曰衆允之志上行也伊川先生曰以六居三不得中正冝有悔咎一作吝而三在順體之上順之極者也三隂皆順上者也是三之順上與衆同志衆所允從其悔所以亡也有順上向明之志而衆允從之何所不利或曰不由中正而與衆同得為善乎曰衆所允者必至當也況順上之大明豈有不善也是以悔亡蓋亡其不中正之失矣古人曰謀從衆則合天心上行上順麗於大明也上從大明之君衆志之所同也並易傳橫渠先生曰上歷九四不為衆信則取悔可必若志應在上晉為衆允則悔亡易説龜山楊氏曰六三在坤體之上以隂承陽順之至也順而麗乎大明雖不當位衆允之也故悔亡易説白雲郭氏曰在晉之初名實未加未孚於人至三則忠順不失以事其上也久矣於是乎衆允之也雖非中正疑於有悔及衆允之時則悔亡矣三之上行有嚮明之志所謂順而麗乎大明者是以衆不為疑而允之也故曰志上行也易説漢上朱氏曰坤為衆三不當位衆所未允冝有悔晉之時三隂在下同順乎上三順之極而有應三志上行則二隂因之得麗乎大明上九應之成兌兌為口三得正衆允之也衆允則悔亡此大臣因衆之願而效之上者也以此居位雖柔必強何憂乎不得其任哉易傳新安朱氏曰三不中正冝有悔者以其與下二隂皆欲上進是以為衆所信而悔亡也本義衆允象也悔亡占也語録東萊吕氏曰六三欲上進輔乎大明之君下二隂以類而順從之此衆允所以悔亡也爻驗之以衆象折之以理此一爻最難看以訓詁言不過曰當晉之時得衆之允者斯可亡悔殊不知所允者何人且如陳仲子亷衆皆與之鄉原之德一鄉與之又如王莽在漢闕下之人皆謂周公再出使從當時之人則安得無悔然不可如此看當於允字上看允者志之至當者也當則可以亡悔傳云衆所允者必至當也允之一字非是其確然自信乃人心所同然處若虛聲相鼓非所謂允易説九四晉如鼫鼠貞厲象曰鼫鼠貞厲位不當也伊川先生曰以九居四非其位也非其位而居之貪據其位者也貪處高位既非所安而又與上同德順麗於上三隂皆在己下勢必上進故其心畏忌之貪而畏人者鼫鼠也故云晉如鼫鼠貪於非據而存畏忌之心貞固守此其危可知言貞厲者開有改之道也賢者以正德冝在高位不正而處高位則為非據貪而懼失則畏人固處其地危可知也並易傳橫渠先生曰鼫鼠為物貪而畏人體陽在進反據隂位故動止皆失與六三之義為相反矣易説藍田吕氏曰九四當明進時以陽居隂又處四隂之中下應於初進退失守如鼫鼠然位不當者也守是不變取危之道龜山楊氏曰晉而麗乎險鼫鼠之象也易説白雲郭氏曰離以明為德而火以暴為失故離之九四有突如其來如焚如死如棄如之象晉之九四與離同位雖順德在下不至於焚如之暴然當晉之時不免有貪位慕祿之失也鼫鼠貪而畏人者也守此道以事上能無危乎位不當者既未進六五之明又過三隂之順以剛自進故不當也晉之六爻無凶獨四以貪而厲上以伐而吝蓋才有餘而德不足者豈若初二三五之昭明德也哉是以聖人德之為貴易説漢上朱氏曰鼫鼠子夏傳作碩鼠碩大也艮坎為鼠陽為大鼠晝伏夜動者也坎為加憂九四剛而不正處晉明之時竊據上位憂畏而不安碩鼠也大明在上三隂進而麗乎明四處位不當而不知退於正為厲知非而去未失為虞丘子也易傳新安朱氏曰不中不正以竊高位貪而畏人蓋危道也故為鼫鼠之象占者如是雖正亦危也本義東萊吕氏曰九四此一爻最見小人貪進患失之情狀蓋以九居四不當其位小人之象也然居近君之位是得寵之小人也夫以小人而見寵於君才不勝位下又為三隂所迫常懷憂懼惟恐其進蓋小人貪寵之心切故也然則處四之時當如何曰去一己貪進患失之私心擴推賢遜能之公道則可矣易説六五悔亡失得勿恤往吉無不利象曰失得勿恤往有慶也伊川先生曰六以柔居尊位本當有悔以大明而下皆順附故其悔得亡也下既同德順附當推誠委任盡衆人之才通天下之志勿復自任其明恤其失得如此而往則吉而無不利也六五大明之主不患其不能明照患其用明之過至於察察失委任之道故戒以失得勿恤也夫私意偏任不察則有蔽盡天下之公豈當一作得復用一有其字私察也以大明之德得下之附推誠委任則可以成天下之大功是往而有福慶也並易傳橫渠先生曰進而遇陽故失得不恤而吉也位不當必有悔獲吉則悔亡易説藍田吕氏曰六五居明之中二陽所麗體柔處尊物之所歸故往吉無不利也明進之時而體隂柔冝若有悔柔居二陽所麗之間而下無應冝若恤失得然二陽所麗物之所得故悔亡而失得可勿恤也龜山楊氏曰不當位悔也以柔居之能不有其位者也故悔亡悔亡則失得勿恤矣六五尊位也柔進而上行猶患失之之時也苟不以直道自居而務為持祿保位之謀其能失得勿恤乎術斯以往何不利之有易説白雲郭氏曰君道無他焉在中與明而已六五居中何悔不亡又惟自昭明德而一己之失得勿恤於外蓋居子失諸正鵠反諸其身之道也如是則何往不吉何行不利乎象言往有慶者人君勿恤一己之得失獨以離明自昭所謂一人有慶兆民賴之者矣孟子告滕文公曰君子創業垂統為可繼也若夫成功則天也君如彼何哉強為善而已矣失得勿恤之意強為善也謂之強為善亦自昭明德之義易説漢上朱氏曰六五柔不當位有悔者於進德為失不剛故也坎為加憂恤也五能舍己往而從上九上正其君於道柔者剛矣則悔亡失者得而坎毁故曰悔亡失得勿恤五明之主患在於矜智遂非以失為恥故戒以失得勿恤不憚從人不留情於既失則往正而吉無所不利邦國之慶也悔者亡失者得憂者喜慶之謂也陽為慶故辭曰往吉無不利象曰往有慶也易傳曰不患不能明患其用明之過故戒以失得勿恤易傳新安朱氏曰以隂居陽冝有悔矣以大明在上而下皆順從故占者得之則其悔亡又一切去其計功謀利之心則往吉而無不利也然亦必有其德乃應其占耳本義問六五悔亡失得勿恤往吉無不利伊川以為六以柔居尊位本當有悔以大明而下皆順附故其悔亡下既同德順附當推誠委任盡衆人之才通天下之志勿復自任其明恤其失得如此而往則吉而無不利此説是否曰便是伊川説得太深據此爻只是占者卜得此爻則不必恤其失得而自亦無所不利耳如何説道人君既得同德之人而委任之不復恤其失得如此則蕩然無復是非而天下之事亂矣假使其所任之人或有作亂者亦將不恤之乎雖以堯舜之聖臯夔益稷之賢猶云屢省乃成如何説既得同心同德之人而任之則在上者一切不管而任其所為豈有此理且彼所為既失矣為上者如何不恤得聖人無此等説話聖人所説卦爻只是略略説過以為人當著此爻則大勢已好雖有所失得亦不必慮而自無所不利也聖人説得甚淺伊川解得太深聖人所説短伊川解得長久之又云失得勿恤只是自家自作教是莫管他得失如士人發解做官這個却必不得只得盡其所當為者而已如仁人正其誼不謀其利明其道不計其功相似失得勿恤此説失也不須問他得也不須問他自是好猶言勝負兵家之常云爾此卦六爻無如此爻吉並語録東萊吕氏曰六五既得尊位又為離之主明之盛者也其明如此其處必無一毫之悔但恐用明太過慮事太詳恤其失得而凡事遲疑故聖人教之曰以爾所見一無可悔不須更顧慮得失但據所見而往則吉無不利也以柔在上能接在下之賢而在下之賢又能順輔所以能亡其悔大抵人君之體若屑屑親細務而恤其得失以此為明察安能無不利惟夫儼然在上總其大綱委任大臣而失得勿問使在下者得盡心力為之則無往而不利故書稱文王曰克知三有宅心灼見三有俊心以敬事上帝立民長伯皆是失得勿恤而委之賢能者也冝其當時無往而不利易説上九晉其角維用伐邑厲吉無咎貞吝象曰維用伐邑道未光也伊川先生曰角剛而居上之物上九以剛居卦之極故取角為象以陽居上剛之極也在晉之上進之極也剛極則有強猛之過進極則有躁急之失以剛而極於進失中之甚也無所用而可維獨用於伐邑則雖厲而吉且無咎也伐四方者治外也伐其居邑者治內也言伐邑謂內自治也人之自治剛極則守道愈固進極則遷善愈速如上九者以之自治則雖傷於厲而吉且無咎也嚴厲非安和之道而於自治則有功也復云貞吝以盡其義極於剛進雖自治有功然非中和之德故於貞正之道為可吝也不失中正為貞維用伐邑既得吉而無咎復云貞吝者其道未光大也以正理言之猶可吝也夫道既光大則無不中正安有過也今以過剛自治雖有功矣然其道未光大故亦可吝聖人言盡善之道並易傳橫渠先生曰窮無所往故曰角居明之極其施未光而應尚狹持此以進伐邑討叛而己危而幸吉以得無咎然終吝道也無可進而進不已惟伐邑於內而可矣如君子則知止也易説藍田吕氏曰上九居明之終明將窮矣故晉其角明不足以及逺可以治其邑而不能及其境內邑猶伐而後治則道未光可知矣明不足故厲伐而後可治故吉乃無咎然守是不變狹吝之道也龜山楊氏曰明出地上非日中之時也則剛上窮而不足以照天下道未光也故維用伐邑而已若夫道足以照天下則無思不服矣尚何伐邑之有易説白雲郭氏曰角上窮之物位進而上窮亦危矣然晉非止於進而已明順之義存焉是以用伐邑也然自危則終吉自危者如臨深淵如履薄氷之義不得已而用之非好攻戰而樂殺人也是以無咎不然則既伐邑而厲不亡幸矣何吉之有至於伐邑則明德之昭已或虧蔽故象言道未光也固以伐邑為貞不知明德之虧非吝而何是以春秋無義戰彼善於此聖人無取焉然則齊晉之霸方之康侯其未優乎易説漢上朱氏曰上九前剛角象也上晉之極至於角窮矣猶進而不止危厲之道維用於伐邑則可雖危厲而吉伐邑者自治也若施之征伐則凶有咎窮兵故也上窮反三入於坎險在內為邑邑己之自有故此伐邑有自治之意伐邑則九得正厲者吉吉則於自治為無咎亦猶冥升利於不息之貞所以自治者於進道有未光也上反三坎離毁未光之象易傳曰人之自治剛極則守道固進極則遷善速六三之行六五之往皆不曰晉者三行則上反三五往則上反五反非進也故二爻不言晉易傳新安朱氏曰角剛而居上上九剛進之極有其象矣占者得之而以伐其私邑則雖危而吉且無咎然以極剛治小邑雖得其正亦可吝矣本義問晉其角維用伐邑本義作伐其私邑程傳以為自治如何先生曰便是程傳多不肯説實事皆以為取喻伐邑如墮費墮郈之類是也大抵今人説易多是易中有此一語便以為通體事當如此不知當其時節地頭其人所占得者其象如何若果如今人所説則易之説有窮矣語録東萊吕氏曰上九以剛居剛處卦之極而用剛健之物剛之太甚者也故無施而可蓋太剛非道之中以之治人則失於酷以之事君則失於訐以之干祿則失於躁惟以之自治則可故伊川曰剛極則守道愈固進盛則遷善愈速此乃用剛自治之道也然猶曰貞吝者蓋進道之體本當寬裕優遊待其自進非剛強也若剛躁而速其進急其成則失貞正之道惟放乎四海盈科而後進方合道之體此失之剛所以言未光也易説合訂刪補大易集義粹言卷三十九
