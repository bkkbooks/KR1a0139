body:
  text: 合訂刪補大易集義粹言卷十八頭等侍衞納喇性徳編乾下離上伊川先生曰大有序卦與人同者物必歸焉故受之以大有夫與人同者物之所歸也大有所以次同人也為卦火在天上火之處髙其明及逺萬物之衆无不照見為大有之象又一柔居尊衆陽並應居尊執柔物之所歸也上下應之為大有之義大有盛大豐有也易傳大有元亨伊川先生曰卦之才可以元亨也凡卦徳有卦名自有其義者如比吉謙亨是也有因其卦義便為訓戒者如師貞丈人吉同人于野亨是也有以其卦才而言者大有元亨是也由剛健文明應天時行故能元亨也易傳白雲郭氏曰伊川曰凡卦徳有卦名自有其義者如比吉謙亨是也有因其卦義便為訓戒者如師貞丈人吉同人于野亨是也有以其卦才而言者大有元亨是也由剛健文明應天時行故能元亨也又曰諸卦具元亨利貞則彖皆釋為大亨恐疑與乾坤同也不兼利貞則釋為元亨盡元義也元有大與善二義故也又曰元之在乾為元始為首出庻物之義它卦則為善為大而已又曰元之為善何也曰元者物之先也物之先豈有不善乎事成而後有敗敗非先於成也興而後有衰衰固後於興也得而後有失非得則无失也至於善惡治亂是非天下之事莫不皆然必善為先也故文言曰元者善之長也雍曰乾坤四徳諸卦有具之者皆自乾坤中得其一時一事非全有之也雖使彖釋无異辭亦不得與乾坤同如屯為屯之時元亨利貞臨為臨之時元亨利貞屯之元亨利貞已不得施於臨臨之元亨利貞亦不得施於屯又安得如乾坤四徳天地長乆其用无窮哉故知四徳支分派别散為諸卦合之則為乾坤矣譬之水焉澗溪沼沚江淮河漢以至於海皆水也其功皆能潤其徳皆能生其力皆能載而大小相逺則有間矣乾卦言不言所利大矣哉者正所以别坤也諸卦不必辯也易説新安朱氏曰大有所有之大也離居乾上火在天上无所不照又六五一隂居尊得中而五陽應之故為大有乾健離明居尊應天有亨之道占者有其徳則大善而亨也本義彖曰大有柔得尊位大中而上下應之曰大有其徳剛健而文明應乎天而時行是以元亨伊川先生曰言卦之所以為大有也五以隂居君位柔得尊位也處中得大中之道也為諸陽所宗上下應之也夫居尊執柔固衆之所歸也而又有虚中文明大中一无大中字之徳故上下同志應之所以為大有也卦之徳内剛健而外文明六五之君應於乾之九二五之一有體字性柔順而明能順應乎二二乾之主也是應乎乾也順應乾行順乎天時也故曰應乎天而時行其徳如此是以元亨也王弼云不大通何由得大有乎大有則必元亨矣此不識卦義離乾成大有之義非大有之義便有元亨由其才故得元亨大有而不善者與不能亨者有矣諸卦具元亨利貞則彖皆釋為大亨恐疑與乾坤同也不兼利貞則釋為元亨盡元義也元有大善之義有元亨者四卦大有蠱升鼎也唯升之彖誤隨它卦作大亨曰諸卦之元與乾不同何也曰元之在乾為元始之義為首出庶物之義他卦則不能有此義為善為大而已曰元之為大可矣為善何也曰元者物之先也物之先豈有不善者乎事成而後有敗敗非先成者也興而後有衰衰固後於興也得而後有失非得則何以有一作為失也至於善惡治亂是非天下之事莫不皆然必善為先故文言曰元者善之長也並易傳横渠先生曰柔得盛位非所固有故曰大有剛健故應乎天文明故時行並易説藍田吕氏曰大有无所不容也龜山楊氏曰卦唯一隂衆陽宗之故上下應而為大有也大有者盛大之時也柔得尊位大中以虚受之能有其大也是以元亨此以六五一爻成卦之義言之也處大有之時而外有文明之徳以濟之内有剛健之徳以蓄之則物不能累矣剛健文明天徳也故能應乎天而時行時行言有大而各當其可也易説兼山郭氏曰大有柔得尊位大中謙以居之不自滿假者也以一柔而應五剛所謂不寳逺物所寳惟賢者也經曰富有之謂大業故尺地莫非其有一民莫非其臣不如是不足以為大業光天之下萬邦黎獻共惟帝臣惟帝時舉不如是不足以為尚賢也故六五之有不有其有者也六五之尚賢不簡於用賢者也太王居豳狄至則去之不有其有也舜明四目達四聦賔于四門四門穆穆不簡於用賢者也則大有之為大應天而時行盖可知矣是以秦非不強且大也卒於二世而滅鄒魯非无賢也而卒不能舉曷足以稱大有之元亨哉易説白雲郭氏曰同人之六二不能大同者也非其位也非其才也大有之六五能有大者也有大者包衆陽而有之其道孰大於此故大有者非獨有賢也无所不有也孔子曰履信思乎順又以尚賢也則履信思順而又尚賢不獨以尚賢為主也是以帝堯克明俊徳以親九族平章百姓協和萬邦皆堯之有也虞舜詢于四岳闢四門明四目達四聦皆舜之有也然惟天為大惟堯則之則堯之有以則天而為大也大舜有大焉善與人同則舜之有以人同天之大也故柔得尊位大中而上下應之者若舜之事是也其徳剛健而文明應乎天而時行者若堯之事是也其為元亨則一而已易説漢上朱氏曰小畜柔得位而上下應之六四也六四畜之以巽是以小畜大有柔得尊位則有利勢得大中之道則得人心而又執柔履謙有而不恃故上下五陽皆應能有其大六五而言大中五者大中之位柔得之也故曰大有不言有大者大不可有也此以六五一爻言有其大夫天下至大也有其大者未必能元亨致元亨者由乎其才内乾剛健也外離文明也剛健則不息文明則能順萬物之理而明有是徳矣推而行之不失其時者隨天而行也盖六五自同人之二固始以正矣以時而行是以元亨此合兩體推原六五言大有之才也才者能為是徳者也同人曰文明以健大有曰剛健而文明何也同人九五健矣不言剛者剛天徳不可為首不言剛抑之也大有六五柔得尊位嫌於剛不足故言剛健或曰大有師賔之道也曰大有尚賢自六五言上九乃有師賔之象彖言尚賢者唯大畜也易傳新安朱氏曰大有至曰大有以卦體釋卦名義柔謂六五上下謂五陽其徳剛健以下以卦徳卦體釋卦辭應天指六五也本義問大有卦應乎天而時行程説以為應天時而行如何先生曰是以時而行是有可行之時語録象曰火在天上大有君子以遏惡揚善順天休命伊川先生曰火髙在天上照見萬物之衆多故為大有大有繁庶之義君子觀大有之象以遏絶衆惡揚明善類以奉順天休美之命萬物衆多則有善惡之殊君子享大有之盛當代天工治養庶類治衆之道在遏惡揚善而已惡懲善勸所以順天命而安羣生也易傳横渠先生曰柔能大有非天道也乃天命也故曰順天休命遏惡揚善勉衆也易説龜山楊氏曰火在天上因天之明則物无遯形矣君子觀火天之象以遏惡揚善夫莫非命也順受其正所謂休命者正命也善惡不當其實則非順休命也易説兼山郭氏曰天之休命无時而或非所謂上不肖者時焉而已時者天之所不能違也遏惡云者尚賢之世不使小人得雜乎其間是以舜命九官十二牧亦曰遏絶苗民四罪而天下咸服斯大有之道與易説白雲郭氏曰明之為徳也大矣聖賢之所甚重而後世未之思也堯之巽位大事也曰明明揚側陋而已皐陶賡歌君徳曰元首明哉而已伊尹論終始愼厥與曰惟明明后而已商臣之諌髙宗曰明哲實作則而已秦誓言元后曰亶聰明而已是以古人稱君徳率曰明王明后則明為君徳之大也故堯典稱堯曰欽明舜典稱舜曰文明五子稱禹曰明明我祖仲虺言於成湯曰惟天生聰明時乂詩人以大明稱文王非獨知明為君之大徳亦以見不明為君之大惡也伊尹放太甲于桐非有桀紂之多罪也以不明而已由不明以充其惡是亦桀紂耳故伊尹懼而放之太甲亦曰予小子不明于徳是知君之大惡莫大於不明也大有之象以有大君之明徳故名其卦曰大有也且離之為象在天為日之明在地為火之明在人為徳之明今也火在天上又為人君明徳之象安得不大有於天下也故象言火在天上以見至明居至尊至髙之位而臨照四方雖衆陽之剛非資其明則㝠行而已故天下之動晝行夜伏者无他焉其動以明為主故爾是知大有之卦以五陽而歸於一隂者非歸其柔也歸其明也人主明徳天下歸之意也乃若同人之象火在天下雖火為至明潛而在下不復有君徳尊明之象是以同人則可語以大有則未也遏惡揚善明於人道也順天休命明於天道也堯授舜而舜受之明休命也舜舉十六相而去四凶明善惡也易説漢上朱氏曰大有自姤一隂四變皆有惡與善之象惡者不正也善者正也乾陽休善也巽命也至於五變成離離為火火在天上明盛大有之時惡者遏絶善者顯揚此豈人力之所能為哉順天休命而已故古者進賢退不肖之命謂之休命或謂之明命易傳新安朱氏曰火在天上所照者廣為大有之象所有既大无以治之則釁蘖萌於其間矣天命有善而无惡遏惡揚善所以順天反之於身亦若是而已矣本義火在天上大有凡有物須是自家照見得方見得有无若不照見則有无不可知何名為有問君子以遏惡揚善順天休命竊以為天之所以命我者此性之善也人惟蔽於非心邪念是以善端之在人心日以湮微君子倘能遏止非心邪念於未萌則善端始自發揚而天之所以命我者始无所不順如此而為順天休命若何先生曰天道喜善而惡惡遏惡而揚善非順休命而何吾友所説却似嫌他説得大要束小了説問遏惡揚善順天休命先生曰天命有善而无惡當大有時遏止其惡顯揚其善反之於身亦莫不然非止用人用人乃其一事耳語録東萊吕氏曰火在天上大有傳謂火髙在天上照見萬物之衆多而大有是有也昔未嘗无特不見而己己丑課程初九无交害匪咎艱則无咎象曰大有初九无交害也伊川先生曰九居大有之初未至於盛處卑无應與未有驕盈之失故无交害未涉於害也大凡富有鮮不以害以子貢之賢未能盡免況其下者乎匪咎艱則无咎言富有本匪有咎也人因富有自為咎耳若能享富有而知難處則自无咎也處富有而不能思艱兢畏則驕侈之心生矣所以有咎也在大有之初克念艱難則驕溢之心无由生矣所以不交涉於害也並易傳横渠先生曰二應於五三能自通四匪其旁唯初无交故有害然非其咎易説藍田吕氏曰大有之時以剛健居下物莫之與故无交害剛健美徳卒非其咎處之不易有所畏難泰而不驕可以免咎龜山楊氏曰以剛健之才而上无應困於一卦之下无交故也是以有害然匪其咎也以无交為害枉己以求之則有咎矣故艱則无咎夫君子厄於陳蔡之間无上下之交也其厄也非无害矣然道大不容何病則雖厄而聖人不以為害也當盛大之時貧且賤焉恥也則无交宜有害矣故曰大有初九无交害唯大有之初為然易説兼山郭氏曰經云拔茅茹君子小人未有不以其類出者也況大有羣賢彚升以最下而无交此所以為害也易説白雲郭氏曰賢者當彚進之時而已獨在下以无交為害疑於有咎矣疑於有咎而非咎者以无交之害非己自致故匪咎也大有尚賢之君將使野无遺賢何患於不進哉難進易退士之常也不失是道則无咎矣故曰艱則无咎叔孫之毁仲尼臧倉之沮孟子无交之害如此而孔孟未嘗枉道以干之所謂艱則无咎也大有之時不以无交為害而初九最為卑逺者故獨有无交之害也易説漢上朱氏曰初九守正无交在它卦未有害大有柔得尊位大中上下應之而初九无交則害也正匪可咎艱以守正擇可而後交則无咎交道難不可苟合也四來下初已乃可動此王丹自重之爻乎易傳新安朱氏曰雖當大有之時然以陽居下上无繫應而在事初未涉乎害者也何咎之有然亦必艱以處之則无咎戒占者宜如是也本義問初九无交害匪咎艱則无咎曰此爻本最吉不解有咎然須説艱則无咎盖易之書大抵敎人戒謹恐懼无有以為易而處之者雖至易之事亦必以艱難處之然後无咎也語録九二大車以載有攸往无咎象曰大車以載積中不敗也伊川先生曰九以陽剛居二為六五之君所倚任剛健則才勝居柔則謙順得中則无過其才如此所以能勝大有之任如大車之材強壯能勝載重物也可以任重行逺故有攸往而无咎也大有豐盛之時有而未極故以二之才可往而无咎至於盛極則不可以往矣壯大之車重積載於其中而不損敗猶九二材力之強能勝大有之任也並易傳藍田吕氏曰九二大有之時以陽居隂无所驕亢以剛居中無所偏邪可以任天下之重而行者也龜山楊氏曰六五柔得尊位大中以居其上九二以剛健之才應乎下上下相與大車以載之象也剛中而不過故積而不敗其才足以任重而致逺故有攸往无咎易説兼山郭氏曰九二天保之詩言君能下下以成其政臣能歸美以報其上則大有柔得位而上下應之九二其著也易説白雲郭氏曰自任以天下之重者伊尹也大車以載非伊尹不足以當之以此而往就湯可也就桀可也相湯伐桀可也放太甲于桐可也歸太甲于亳可也又何咎之有盖聖人道積於中无所往而不利故如大車之不可敗也九二有剛健之才柔謙之徳居中而无過其積於中者如此易説漢上朱氏曰六五不有其大屈體下交九二而倚任之猶大車也坤為輿乾變坤為大車九二剛中而居柔剛則才勝中則不過居柔則謙順具此三者往之五以任天下之重猶車載也大有物歸者衆富有之時六五中而未極故有攸往无咎往之得正也盛極則不可往矣陽為重五中也積重其中而剛不傾撓積中不敗也大車以載者貴夫積中不敗也大有六五而任小才不勝其任矣易傳新安朱氏曰剛中在下得應乎上大車以載之象有所往而如是可以无咎矣占者必有此徳乃應其占也本義九三公用亨于天子小人弗克象曰公用亨于天子小人害也伊川先生曰三居下體之上在下而居人上諸侯人君之象也公侯上承天子天子居天下之尊率土之濵莫非王臣在下者何敢專其有凡土地之富人民之衆皆王者之有也此理之正也故三當大有之時居諸侯之位有其富盛必用亨通乎天子謂以其有為天子之有也乃人臣之常義也若小人處之則專其富有以為私不知公以奉上之道故曰小人弗克也公當用一无用字亨于天子若小人處之則為害也自古諸侯能守臣節忠順奉上者則蕃養其衆以為王之屏翰豐殖其財以待上之徴賦若小人處之則不知為臣奉上之道以其為己之私民衆財豐則反擅其富強益為不順是小人大有則為害又大有為小人之害也並易傳横渠先生曰非柔中文明之主不能察非剛健不私之臣不能通故曰小人弗克易説藍田吕氏曰九三以剛居下卦之上猶公居卿大夫士之上也居羣臣之上而上迫於君如伊尹周公之心乃可以亨於天子小人居權勢之盛弗克負荷必害于其家凶于其國龜山楊氏曰九三居下卦之上人臣之尊位公侯之任也公者背私之名當盛大之時以其所有奉職貢而无私焉亨於天子之道也小人處之擅其有以為己私分朋陵僭之患生矣故小人害也易説白雲郭氏曰九三居下卦之上為臣之尊位方之九二之權或不足是為諸侯之尊大者矣先儒多以亨為享獨王輔嗣曰通也且天子饗諸侯皆於祖廟上公備九獻之禮其為禮也莫加焉小人安能勝此享哉小人享之則其榮也適所以為害與易説漢上朱氏曰三者公之位春秋傳晉文公將納王使卜偃筮之遇大有之睽曰吉遇公用享于天子之卦戰克而王享吉孰大焉杜預曰大有九三爻辭也則卜偃時讀易作公用享于天子杜預亦然京房曰享獻也干寶曰享燕也姚信作享祀義雖小異然讀為享則同今從舊讀三五相交乾變離兊乾為天離為日兊為澤卜偃謂天為澤以當日天子降心以逆公是也夫天子施澤於下降心而説有粲然之文者莫如公之享于天子也天子享諸侯之禮必于祖廟六五承上九宗廟享于祖廟之象也上公備九獻之禮乃以圭鬯祼賔客設太牢體薦之俎備金石之樂升歌下管於獻酬之時王以琥璜繡黼束帛送爵坤離為文明三五相際之象九三剛健而正與五同功故用此爻當天子之享則无驕亢矣若小人處之柔弗勝其任處之不當必有滿盈之害豈特害于而家哉三五既交易剛為柔聖人因柔以著戒焉易傳新安朱氏曰亨春秋傳作享謂朝獻也古者亨通之亨享獻之享烹飪之烹皆作亨字九三居下之上公侯之象剛而得正上有六五之君虚中下賢故為享于天子之象占者有其徳則其占如是小人无剛正之徳則雖得此爻不能當也本義問公用亨于天子亨只當作享字看與王用亨于西山同先生曰公用亨于天子已有左氏所引可證如隨之王用亨于西山亦必是祭享之享无疑語録九四匪其彭无咎象曰匪其彭无咎明辨晳也伊川先生曰九四居大有之時已過中矣是大有之盛者也過盛則凶咎所生也故處之之道匪其彭則得无咎謂能謙損不處其太盛則得无咎也四近君之髙位苟處太盛則致凶咎彭盛多之貌詩載驅云汶水湯湯行人彭彭行人盛多之狀雅大明云駟騵彭彭言武王戎馬之盛也能不處其盛而得无咎者盖有明辨之智也晳明智也賢智之人明辨物理當其方盛則知咎之將至故能損抑不敢至於滿極也並易傳藍田吕氏曰彭如四牡彭彭之彭彭盛大也九四當大有之世居近至尊其勢盛大然以陽居隂不以盛大自有明辨之知燭知事幾之必然故无咎也廣平游氏曰舒王以匪其彭為其旁不知所據何説且近君之位有下比之嫌恐非獨大有之時為然伊川以彭為衆多似於大有為親一説彭有張大之意當大有之勢居近君之位輒據而矜之志於張大則羣賢解體天地鬼神亦且弗祐矣此昧者所以敗也辨晳明之著也易説龜山楊氏曰九四剛過乎中居大有之盛能匪其彭則无咎矣彭盛多也處多懼之地而有其盛多則害矣與小人弗克无以異也非明辨之晳何以與此易説白雲郭氏曰賢者居近君之位特立獨行自進於君而无外交者九四是也故雖九三之剛徳亦不與之親附而進焉此所謂匪其彭也如是則其明足以辨晳何咎之有九四離之初故知其有明徳子夏傳彭作旁伊川云如詩行人彭彭駟騵彭彭皆盛多之貌易説漢上朱氏曰彭子夏傳讀作旁旁盛滿貌離大腹象也大有至四盛矣昧者處之盈滿而不知變安得无咎九四不安其位震見離毁懼而守正抑損不至於滿匪其彭故无咎所以然者以其明而辨於盈虚之理甚白也離為明兊口為辨晳荀氏作晰易傳新安朱氏曰彭字音義未詳程傳曰盛貌理或當然六五柔中之君九四以剛近之有僭逼之嫌然以其處柔也故有不極其盛之象而得无咎戒占者宜如是也晳明貌本義問匪其彭只當依程傳作盛貌先生曰程説為優王弼作下比九三分權之臣盖以彭為旁言專心承五常匪其旁因説王荆公上韓魏公啓云時當大有更懐下比之嫌用此事蓋譏魏公也語録六五厥孚交如威如吉象曰厥孚交如信以發志也威如之吉易而无備也伊川先生曰六五當大有之時居君位虚中為孚信之象人君執柔守中而以孚信接於下則下亦盡其信誠以事於上上下孚信相交也以柔居尊位當大有之時人心安易若專尚柔順則陵慢生矣故必威如則吉威如有威嚴之謂也既以柔和孚信接於下衆志説從又有威嚴使之有畏善處有者也吉可知矣下之志從乎上者也上以孚信接於下則下亦以誠信事其上故厥孚交如由上有孚信以發其下孚信之志下之從上猶響之應聲也一有威如之吉易而旡備也九字威如之所以吉者謂若无威嚴則下易慢而无戒備也謂无恭畏備上之道備謂備上之求責也並易傳横渠先生曰人威重有徳望則人自畏服易曰厥孚交如威如吉君子以至誠交人然後有威重威如之吉易而无備也君子至平易有何關防擬備惟以抑抑威儀為徳之隅儼然人望而畏之既易而无備則威如乃吉也易説廣平游氏曰大有之成體文明而剛健之主故能以至誠與下而下亦以至誠應之上下合徳而无間故曰厥孚交如為大有之主髙拱尊位其明不可欺其健不可陵則人之畏之將如神明矣故曰威如吉彼且推赤心置人腹中其胸中坦然无疑忌誰肯用數以御下哉此太平之君子所以易而无備也易説龜山楊氏曰柔得尊位大中有孚也一隂在上以虚受之為衆陽所宗故上下應而厥孚交如也柔順而處剛則柔亦不茹威如之吉以徳而不以力也所謂徳威惟畏也易而无備者以此易説兼山郭氏曰六五信者吾信之不信者吾亦信之徳信矣君子正其衣冠尊其瞻視儼然人望而畏之不亦威而不猛乎此衆人之所謂信衆人之所謂威況居大有之時履崇髙之勢位者乎故先王垂衣拱手不下衽席之上而莫不承徳以來王有道以先之也書曰徳威惟畏徳明惟明其是之謂乎易説白雲郭氏曰君能下下以成其政臣能歸美以報其上盡君臣相與之誠故曰厥孚交如也凡為臣者皆以誠交非一臣也書曰威克厥愛允濟大有之君以柔居尊而有衆賢雖盡相與之誠苟无克愛之威亦且未為吉也交如親之也通誠信之道也威如尊之也嚴君臣之分也誠信之道已通君臣之分已嚴故能銷患於无形矣非明君盡惟㡬惟康之道者不足以與此君臣上下信以發志孰為猜嫌之患是以易而无備也且初九之難進九二之積中九三之克亨九四之匪彭各以其道而來親而尊之可謂有賢之極矣舜闢四門明四目達四聦終至於无為而治君臣賡歌都俞而已其六五易而无備之吉乎易説漢上朱氏曰五執柔守中以誠信交於下而其孚在二孚信之應也二交於五體異志同厥孚交如也二以誠信交五發五之剛志謂之發者五本有剛因二而發之信以發志積誠不已至於不怒而威則吉威剛嚴也六柔變九而在上威之象也大有之時人心安易若專尚柔順則下無戒備凌慢生矣二乾為易交五離變乾二復成離離為兵戈下有戒備之象易傳曰夫以柔孚接下衆志悦從又有威嚴使之有畏善處大有者也易傳新安朱氏曰大有之世柔順而中以處尊位虚己以應九二之賢而上下歸之是其孚信之交也然君道貴剛太柔則廢當以威濟之則吉故其象占如此亦戒辭也一人之信足以發上下之志也太柔則人將易之而无畏備之心並本義上九自天祐之吉无不利象曰大有上吉自天祐也伊川先生曰上九在卦之終居无位之地是大有之極而不居其有者也處離之上明之極也唯至明所以不居其有不至於過極也有極而不處則无盈滿之災能順乎理者也五之孚信而履其上為蹈履誠信之義五有文明之徳上能降志以應之為尚賢崇善之義其處如此合道之至也自當享其福慶自天祐之行順乎天而獲天祐故所往皆吉无所不利也大有之上有極當變由其所為順天合道故天祐助之所以吉也君子滿而不溢乃天祐也繫辭復申之云天之所助者順也人之所助者信也履信思乎順又以尚賢也是以自天祐之吉无不利也履信謂履五五虚中信也思順謂謙退不居尚賢謂志從於五大有之世不可以盈豐而復處盈焉非所宜也六爻之中皆樂據權位唯初上不處其位故初九无咎上九无不利上九在上履信思順故在上而得吉盖自天祐也並易傳横渠先生曰以剛而下柔居上而志應于中故曰履信思順又以尚賢盖五陽一隂又无物以間焉耳剛柔相求情也信也易説廣平游氏曰六五有至信之徳而上履之故有履信之義五為大君而上九與衆陽同體而應之故有思乎順之義上九為明之極而自處无位之地推衆陽而進之故有尚賢之義能如是則无天災物累无人非鬼責天人交助之宜其吉无不利也自天云者理之必至非有求而得也伊尹將告歸旁求俊乂啓迪後人自不居其成功盖用此道也又以尚賢者體信順以處已而又以尚賢也易説龜山楊氏曰六五以柔順大中而履尊位有孚也上九居其上而應焉履信思乎順又以尚賢也信順天人所助也故自天祐之吉无不利易説兼山郭氏曰六五厥孚交如而上九履之履信者也不當有為之地而身退以安之思順者也賢人衆多不固位以妨之尚賢者也如是則不獨无人非自天且祐之矣使不居大有之世无崇髙之位一能擇信而履之擇時而順之見賢而尚之雖曰人不知而不愠天其厭之乎易説白雲郭氏曰繫辭曰祐者助也天之所助者順也人之所助者信也履信思乎順又以尚賢也六五之君實盡此而言於上九者非上九之才能得此也盖言大有之吉以此終也故象曰大有上吉則知此吉大有之吉也非止上九之吉也與小雅樂得賢之詩毎章必終以夀考同意然大有之時不以无交為害獨初九卑逺有是患焉故象曰大有初九言大有之初九獨有是患也上九之吉大有之吉也故象曰大有上吉如言大有之極則終有是吉也聖人變文立義如此易説漢上朱氏曰繫辭曰天之所助者順也人之所助者信也履信思乎順又以尚賢也是以自天祐之吉无不利此特曰大有上吉自天祐也上九大有之極盛極則衰凶將至矣而上吉者以自天祐也六五履信思順尚賢而人助之人助之則天助之吉无不利上五相易乾成兑兑為言而正信也坤順也乾為天兑為右右助之也上九動而正正則吉故曰大有上吉易傳新安朱氏曰大有之世以剛居上而能下從六五是能履信思順而尚賢也滿而不溢故其占如此本義問上九自天祐之吉无不利先生曰上九以陽剛居上而能下從六五者盖陽從隂也大有惟六五一隂而上下五陽應之上九能下從六五則為履信思順而尚賢盖五之交孚信也而上能履之謙退不居思順也志從於五尚賢也天之所助者順人之所助者信所以有自天祐之吉无不利之象若无繫辭此數句此爻遂无収殺以此見聖人讀易見爻辭有不分明處則於繫辭傳説破如此類是也語録合訂刪補大易集義粹言卷十八
