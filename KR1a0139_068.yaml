body:
  text: 合訂刪補大易集義粹言卷六十六頭等侍衛納喇性徳編艮下震上伊川先生曰小過序卦有其信者必行之故受之以小過人之所信則必行行則過也小過所以繼中孚也為卦山上有雷雷震於髙其聲過常故為小過又隂居尊位陽失位而不中小者過其常也葢為小者過又為小事過又為過之小易傳子曰先進於禮樂野人也言其質勝文也後進於禮樂君子也言其文質彬彬也如用之則吾從先進言若用於時救文之弊則吾從先進小過之義也少日所聞諸師友説小過亨利貞可小事不可大事飛鳥遺之音不宜上宜下大吉伊川先生曰過者過其常也若矯枉而過正過所以就正也事有時而當然有待過而後能亨者故小過自有亨義利貞者過之道利於貞也不失時宜之謂正過所以求就中也所過者小事也事之大者豈可過也於大過論之詳矣飛鳥遺之音謂過之不逺也不宜上宜下謂宜順也順則大吉過以就之葢順理也過而順理其吉必大並易傳白雲郭氏曰大過四剛二柔剛過之象小過二剛亦曰過者葢剛實其中則為過矣是以聖人貴夫居柔而用剛故中孚而後有小過頤而後有大過也易説新安朱氏曰小謂隂也為卦四隂在外二陽在内隂多於陽小者過也既過於陽可以亨矣然必利於守貞則又不可以不戒也卦之二五皆以柔而得中故可小事三四皆以剛失位而不中故不可大事卦體内實外虚如鳥之飛其聲下而不上故能致飛鳥遺音之應則宜下而大吉亦不可大事之類也本義彖曰小過小者過而亨也過以利貞與時行也柔得中是以小事吉也剛失位而不中是以不可大事也有飛鳥之象焉飛鳥遺之音不宜上宜下大吉上逆而下順也伊川先生曰陽大隂小隂得位剛失位而不中是小者過也故為小事過過之小小者與小事有時而當過過之亦小故為小過事固有待過而後能亨者過之所以能一作求享也過而利於貞謂與時行也時當過而過乃非過也時之宜也乃所謂正也小過之道於小事有過則吉者而彖以卦才言吉義柔得中二五居中也隂柔得位能致小事吉耳不能濟大事也剛失位而不中是以不可大事大事非剛陽之才不能濟三不中四失位是以不可大事小過之時自不可大事而卦才又不堪大事與時合也有飛鳥之象焉此一句不類彖體葢解者之辭誤入彖中中剛一作實外柔飛鳥之象卦有此象故就飛鳥為義事有時而當過所以從宜然豈可甚過也如過恭過哀過儉大過則不可所以在小過也所過當如飛鳥之遺音鳥飛迅疾聲出而身已過然豈能相逺也事之當過者亦如是身不能甚逺於聲事不可一作能逺過其常在得宜耳不宜上宜下更就鳥音取宜順之義過之道當如飛鳥之遺音夫聲逆而上則難順而下則易故在髙則大山上有雷所以為過也過之道順行則吉如飛鳥之遺音宜順也所以過者為順乎宜也能順乎宜所以大吉並易傳横渠先生曰時宜用過雖過正也失其所安者必矯其所為以求安過於自大其勢必危過於自損可以獲吉故曰上逆而下順飛鳥之象並易說藍田吕氏曰小過過於小事者也二柔居二體之中有二柔以輔之小者過也君子之過皆以濟其不及然後可以㑹於中大過以濟其大不及小過以濟其小不及者濟所以亨也時過則過以過為正故利貞飛鳥張翼於外以舉其身則外虚而内實矣小過二陽居中四隂在外以翼之陽實隂虚故有飛鳥之象焉凡事之過則聲逺聞而實不稱如飛鳥遺之音也飛鳥不宜上宜下上窮而下有止也過慢過奢則凶不宜上也過恭過儉則吉宜下也上偪下則可下僣上則不可也白雲郭氏曰小過之亨葢以小者過則亨是以可小事也過以利貞故能與時偕行而无違非利貞則雖小過亦不能有行矣此小過所以莫先於利貞也可大事者剛也柔可小事而已二五柔中故小事則吉三四剛而不中故不可大事凡剛非二五皆非得位故言剛失位而不中也中孚虚中而實外舟虚之象也小過中實而外柔飛鳥之象也飛鳥遺音能下不能上上則逆也下則順也逆則无適而非凶此順所以為大吉也由是言之則小過之義可過於下不可過於上可過於順不可過於逆可過於柔不可過於剛故不及其君遇其臣所以為小過之无咎歟易說漢上朱氏曰小過與中孚相易其卦四隂二陽陽為大隂為小小者過也六五過四而亨於外六二過三而亨於内葢事有失之於偏矯其失必待小有所過然後偏者反於中謂之過者比之常理則過也過反於中則其用不窮而亨矣故曰小過亨彖曰小者過而亨也此以四隂之中舉六二六五言小過也小過自臨來明夷變也臨九二之三六三之二成明夷二過乎三也明夷初九之四成小過五過乎四也二過乎三正也五過乎四不正也不正者矯其失而過正也正者時所當過過所以就正也所謂時者臨之兊秋也震春也明夷之離夏也坎冬也小過之艮終始也過與時行而六二之正不動惟六二不動乃能小過而亨利貞也君子制事以天下之正理所以小過者時而已譬之寒或過於隂暑或過於陽冬裘夏葛无非正也故曰過以利貞與時行也此以六二言小過也二五之柔皆得中也五得中得尊位過而在上者也二得中得正過而在下者也巽為事正則吉小過之道不以位之上下於小事有過而不失其正則吉柔得中也九四剛失位九三剛而不中震為作陽為大作大事非剛得位得中不能濟失位則无所用其剛不中則才過乎剛是以小過之時不可以作大事故曰小事吉不可作大事此以二三四五言小過也明夷離為鳥初徃之四自下而升有飛鳥之象四易坤成坤震震為聲聲徃於上而止於下飛鳥遺音之象巽為風飛鳥遺之音逆而上則難順而下則易上逆也故不宜上下順也故宜下小過之時事有時而當過所以從宜不可過越已甚然亦豈能過哉譬如飛鳥泝風決起而上騰其音安能逺過俄頃而止矣大者如是則吉不然必凶時不可犯也故曰有飛鳥之象焉飛鳥遺之音不宜上宜下大吉此復以初九之四言小過也中孚肖乾小過肖坤故二卦為下篇之正鄭康成曰中孚為陽貞於十一月子小過為隂貞於六月未法於乾坤以卦氣言之為立春故太𤣥準之以差易傳又曰明夷之離為小過之飛鳥又曰小過晉變離為飛鳥震為音艮為止晉上之三小過離去震在若飛鳴而音止故飛鳥遺之音上隂乘陽故不宜上下隂順陽故宜下大吉俗說或以卦象二陽在内四隂在外有似飛鳥舒翼之象妄矣並叢說新安朱氏曰小者過以卦體釋卦名義與其辭柔得中以二五言剛失位以三四言上逆下順以卦體言本義小過大率是過得不多如大過便說獨立不懼小過只說這行䘮用都只是這般小事伊川說那禪讓征伐也未説到這箇大槩都是那過低過小底飛鳥遺音雖不見得遺音是如何大槩且恁地説小過是過於慈恵之類大過則是剛嚴果毅底氣象問飛鳥遺之音本義謂致飛鳥遺音之應如何先生曰㸔這象似有羽蟲之孽之意如賈誼鵩鳥之類小過小者過而亨也不知小者指甚物事並語録象曰山上有雷小過君子以行過乎恭䘮過乎哀用過乎儉伊川先生曰雷震於山上其聲過常故為小過天下之事有時當過而不可過其故為小過君子觀小過之象事之宜過者則勉之行過乎恭䘮過乎哀用過乎儉是也當過而過乃其宜也不當過而過則過矣易傳横渠先生曰過恭哀儉皆宜下之義易說藍田吕氏曰山上有雷未升於天震動一山則有餘震動天下則不足此小者過也過猶不及君子不取於三者許其過者可過於厚不可過於薄白雲郭氏曰凡物之過者非其物也事之過者非其事也過則其象變矣如泰之過不為泰否之過不為否也惟行之過恭不失其為行䘮之過哀不失其為䘮用之過儉不失其為用是則為可過之道所謂宜下大吉也故凡可過者過之則不為失不可過而過之斯為過矣孔子曰禮與其奢也寧儉䘮與其易也寧戚此其所以為可過也歟自道論之三者猶為道之小者故稱小過易說漢上朱氏曰雷出地上其壮乘乾山上有雷小有所過也君子有時而小有所過者三巽乎上下而過行過乎恭也震巽為號咷而上六過之䘮過乎哀也巽為髙坤為吝嗇處髙而吝嗇逼下已甚矣初六過之用過乎儉也時當小過君子不得不小有所過以矯正一時之過考父之過恭髙柴之過哀晏平仲之過儉非過於理也小過乃所以為時中也易傳新安朱氏曰山上有雷其聲小過三者之過皆小者之過可過於小而不可過於大可以小過而不可甚過彖所謂可小事而宜下者也本義山上有雷小過是聲在髙處下來飛鳥遺之音也是自髙處放聲下來故為小過行過恭䘮過哀用過儉皆是宜下之意並語録初六飛鳥以凶象曰飛鳥以凶不可如何也伊川先生曰初六隂柔在下小人之象又上應於四四復動體小人躁易而上有應助於所當過必至過甚況不當過而過乎其過如飛鳥之迅疾所以凶也躁疾如是一有則字所以過之速且逺救止莫及也其過之疾如飛鳥之迅豈容救止也凶其宜矣不可如何无所用其力也並易傳白雲郭氏曰卦彖言飛鳥之象飛鳥之音而初上又明飛鳥之凶中實外柔飛鳥之象也上逆下順飛鳥之音也迅疾多過飛鳥之凶也别而言之固不同合而言之則飛鳥皆有是三者之義也初六以柔居下其道順也從剛而應四則舎順而從逆飛鳥上逆之過也是以有凶飛鳥之過一徃不及反雖欲救止之末如之何矣故曰不可如何也易說漢上朱氏曰明夷離為鳥初之四飛鳥也以如師能左右之曰以四動體而躁初艮體不正柔而止不當過也正應在四為四所以不當過而過其過至甚如飛鳥迅疾雖欲救止不可如何其凶必矣坎為可四以之坎毁不可也兊口如何也與鼎信如何也同象是為惡成而不及改者易傳曰小人躁易而上應助過速且逺不容救止也易傳新安朱氏曰初六隂柔上應九四又居過時上而不下者也飛鳥遺音不宜上宜下故其象占如此郭璞洞林占得此者或致羽蟲之孽本義初六飛鳥以凶只是取其飛過髙了不是取遺音之義中孚有卵之象小過中間二畫是鳥腹上下四隂為鳥翼之象鳥出乎卵此小過所以次中孚也並語録六二過其祖遇其妣不及其君遇其臣无咎象曰不及其君臣不可過也伊川先生曰陽之在上者父之象尊於父者祖之象四在三上故為祖二與五居相應之地同有柔中之徳志不從於三四故過四而遇五是過其祖也五隂而尊祖妣之象與二同徳相應在他卦則隂陽相求過之時必過其常故異也无所不過故二從五亦戒其過不及其君遇其臣謂上進而不陵及於君適當臣道則无咎也遇當也過臣之分則其咎可知過之時事无不過其常故於上進則戒及其一作其及君臣不可過臣之分也並易傳横渠先生曰與其上比於陽不若下遇於隂與其上合於五不若退附於初宜下之義也无應於上故能免咎臣居己下猶不可過況其他乎易說藍田吕氏曰六二過於初而處於内故曰過其祖遇其妣不進於上而安於下故曰不及其君遇其臣祖在初妣處内君居上臣居下也以隂居隂妣也臣也行有加於初而得之於内禮知有所尊而安於下所以无咎白雲郭氏曰伊川曰陽之在上者父之象尊於父者祖之象四在三上故為祖又曰五隂而尊祖妣之象也雍曰過其祖而遇其妣謂二之遇五也不及其君遇其臣謂五之遇二也過祖之妣尊妣也不及之臣自卑也尊妣而自卑則二五雖俱為隂柔而君臣之分不亂所謂行過乎恭也是以无咎二五非正應而相從故言遇遇則所謂小過非大得志也易說漢上朱氏曰三乾在上為父四為祖五坤隂居尊位配乎祖妣也曰祖曰妣既過之稱六二中正祖尊也妣亦尊也祖不中正於義當過妣中而過之義不可也過則失中矣故遇之遇不期而㑹五不應二以中相㑹故遇之言過而適與中相當也五君之位坤居之坤臣也過而適及於臣之分則可過而及於君過臣之分也於義為有咎故不可不戒易傳曰遇當也過臣之分其咎可知易傳新安朱氏曰六二柔順中正進則過三四而遇六五是過陽而反遇隂也如此則不及六五而自得其分是不及君而適遇其臣也皆過而不過守正得中之意无咎之道也故其象占如此所以不及君而還遇臣者以臣不可過故也本義九三弗過防之從或戕之凶象曰從或戕之凶如何也伊川先生曰小過隂過陽失位之時三獨居正然在下无所能為而為隂所忌惡故有一作所當過者在過防於小人若弗過防之則或從而戕害之矣如是則凶也三於隂過之時以陽居剛過於剛也既戒之過防則過剛亦在所戒矣防小人之道正已為先三不失正故无必凶之義能過防則免矣三居下之上居上為下皆如是也隂過之時必害於陽小人道盛必害君子當過為之防防之不至則為其所戕矣故曰凶如何也言其甚也並易傳横渠先生曰居陽以剛而應於上為衆所疾非過為防慎人或戕之凶之甚也易說白雲郭氏曰聖人之所以為防者禮而已惟禮足以防人亦足以防己遇人而不知防則從或戕於外守己而不知防則從或戕於内傷害既至其凶如何信不可逃也君子行過乎恭䘮過乎哀用過乎儉皆所以防之耳九三以陽居剛為道過矣過而不知防是以凶也易説漢上朱氏曰九三剛正而應上六應則過五五中也中不可過三戒在小不忍用剛以過中故弗過宜正己自守防小人則吉兊澤坤土止之防也三不防乃舎所守從之剛過乎中上或戕害之矣離為戈兵已動失正戕之也戕者外傷之如何兊口也與初六如何同象不能守正見戕於外其凶果如何也晋陽處父易狐射姑之班伯宗言於朝而諸大夫莫若皆過之而弗防故及於難易傳新安朱氏曰小過之時事每當過然後得中九三以剛居正衆隂欲害者也而自恃其剛不肯過為之備故其象占如此若占者能過防之則可以免矣本義中字小過兩卦鶻突不可曉小過尤甚如云弗過防之則是不能過防之也四字只是一句至弗過遇之與弗遇過之皆是兩字為絶句意義更不可曉語録九四无咎弗過遇之徃厲必戒勿用永貞象曰弗過遇之位不當也往厲必戒終不可長也伊川先生曰四當小過之時以剛處柔剛不過也是以无咎既弗過則合其宜矣故云遇之謂得其道也若徃則有危必當戒懼也徃去柔而以剛進也勿用永貞陽性堅剛故戒以隨宜不可固守也方隂過之時陽剛失位則君子當隨時順處不可固守其常也四居髙位而无上下之交雖比五應初方隂過之時彼豈肯從陽也故往則有厲位不當謂一作故處柔九四當過之時不過剛而反居柔乃得其宜故曰遇之遇其宜也以一无以字九居四位不當也居柔乃遇其宜也當隂過之時陽退縮自保足矣終豈能長而盛也故徃則有危必當戒也長上聲作平聲則大失易意以夬與剥觀之可見與夬之象文同而音異也並易傳横渠先生曰道非剛亢故无咎有應於下故曰弗過遇之過此以徃難无以除故危而必戒不可常然故勿用永貞一云九四以陽居隂而乘九三之剛非其過也乃適與之遇爾故无咎若率是而徃必危以為戒終不可久故勿用永正當思奮爾易說藍田吕氏曰小過之時柔過而剛不及九三九四所以皆弗過九三以陽當位隂之所疾陽徳不競不能勝隂雖防之至不免受戕之凶九四陽不當位不與隂爭故无咎弗過遇之陽不過隂勢不可長終必危矣故徃厲必戒始遇終危安可長守以為正故勿用永貞白雲郭氏曰九四以陽居柔无過也故无咎无咎无過遇之而已遇之者下順乎柔不以剛自居也若舎柔用剛以是而徃危之道也故必戒焉勿用永貞貴夫知時而已時不可過而過之故有往厲之戒時可小過焉又不可以斯道永貞也此過之與時偕行者也位不當者所謂剛失位而不中也剛失位而不中是以弗過而遇之也或得位而中斯為大有為之君尚何徃厲之戒乎故往厲之戒特處九四之道耳終非可久之貞也觀爻辭之義則遇為小事而過為大事故上六弗遇過之所以為亢也易說漢上朱氏曰四不當位以剛履柔為得宜矣故无咎四下應初則過二二中也弗可過也知二不可過乃與五遇五亦中也弗過二則與中適相當遇得其道矣若去柔用剛進而之五徃則危厲故必以用剛為戒徃之五成離戈兵之象不動兊為口戒也小人過君子之時不戒而用剛鮮不為禍故丁寧之既曰必戒又曰勿用永貞當隨時處順不可固守其正是以終无咎也然盛衰相循无小人常過君子之理巽為長陸震曰小者之過終不可長也戒而慎之以俟其復易傳新安朱氏曰當過之時以剛處柔過乎恭矣无咎之道也弗過遇之言弗過於剛而適合其宜也徃則過矣故有厲而當戒陽性堅剛故又戒以勿用永貞言當隨時之宜不可固守也或曰弗過遇之若以六二爻例則當如此說若依九三爻例則過遇當如過防之義未詳孰是當闕以俟知者終不可長爻義未明此亦當闕本義九四弗過遇之過遇猶言加意待之也上六弗遇過之疑亦當作弗過遇之與九三弗過防之文體正同語録六五密雲不雨自我西郊公弋取彼在穴象曰密雲不雨已上也伊川先生曰五以隂柔居尊位雖欲過為豈能成功如密雲而不能成雨所以不能成雨自西郊故也隂不能成雨小畜卦中已解公弋取彼在穴弋射取之也射止是射弋有取義穴山中之空中虚乃空也在穴指六二也五與二本非相應乃弋而取之五當位故云公謂公上也同類相取雖得之兩隂豈能濟大事乎猶密雲之不能成雨也陽降隂升合則和而成雨隂已在上雲雖密豈能成雨乎隂過不能成大之義也並易傳横渠先生曰不能畜剛止健凡言自我西郊進而不已也柔得中小事吉故曰公弋取彼在穴非及物之功且不能摧敵止暴也三止於下隱伏之象故曰在穴小過有飛鳥之象故因曰取彼在穴雨必蒸聚自下而上則其潤澤周普今自西而東趨其所應其施未光也已上亦尚徃之義易說藍田吕氏曰小畜一隂不足以固三陽陽尚往而莫之畜小過二陽在内四隂足以固之隂上於陽為已甚而陽不足故皆足以致密雲而不雨也六五得位隂之盛者且在二陽之上故應斯象自我西郊隂生於西隂盛陽弱而不交也四公位也九四比於六五不交於五而下應於初故曰公弋取彼在穴穴幽隂在下謂初也弋射飛鳥而反取在穴不交於五而應於二也白雲郭氏曰雨之潤澤萬物非小道也豈小過柔中之君能盡其道哉雖與二為遇亦可小事而已故言雨則密雲自我西郊方興而未有潤澤之功葢見其不可大事也公弋取彼在穴者弋取小事故能有在穴之獲在穴之獲謂二之遇也君臣之遇固非小事然未能大得君未足以澤及天下故為小也若乾之二五同聲相應同氣相求所謂大矣已上者言隂道已上行而未雨葢君臣俱柔之象也易說漢上朱氏曰兊澤之氣上而為雲兊盛隂也故為密雲澤降為雨小過自明夷變初九往四成兊澤氣已上而未降雲雖密而无雨故曰密雲不雨已上也言隂過陽君子之澤未能下也四在内外之交而見天際郊之象四兊西也五震東也巽風揚之雲自西往東由隂而升隂唱則陽不和不雨之象故曰自我西郊三公位明夷三坎為弓離為矢初之四成巽巽離為絲以絲係矢弋也弋取物之器也坎兊為穴坎幽隱也艮為手取也彼謂二六二在穴中有中正之徳處於幽隱九三君子俯而取之往助於五然六二六五同為隂類二雖取之豈能濟大事乎小過之時柔得尊位二陽在下為隂所過不能成功三下取二用力多矣亦豈能濟哉謂四陽為我二隂為彼以陽為主也若中孚陽謂陽則謂五曰我自謂曰吾謂二曰爾尊卑之義小畜彖曰密雲不雨尚徃也自我西郊施未行也其辭與小過六五同葢小畜所畜者小小過則所過者小皆不可以作大事過之則畜之矣二卦雖殊而大者為小者所畜而不得施則一也故關子明曰小畜一卦之體當小過一爻之義然則畜之一也小大之時異焉易傳新安朱氏曰以隂居尊又當隂過之時不能有為而弋取六二以為助故有此象在穴隂物也兩隂相得其不能濟大事可知已上太髙也本義三父四祖五便當妣過祖而遇妣是過陽而遇隂然而陽不可過則不能及六五却反回來六二上面密雲不雨大槩是做不得事底意思弋是俊壯底意却只弋得這般物事並語録上六弗遇過之飛鳥離之凶是謂災眚象曰弗遇過之已亢也伊川先生曰六隂而動體處過之極不與理遇動皆過之其違理過常如飛鳥之迅速所以凶也離過之逺也是謂災眚是當有災眚也災者天殃眚者人為既過之極豈惟人眚天災亦至其凶可知天理人事皆然也居過之終弗遇於理而過之過已亢極其凶宜矣並易傳横渠先生曰不宜上而上乃自取之災也易說藍田吕氏曰上六隂過而極至於已亢飛鳥不下離於網羅之象故曰弗遇過之飛鳥離之凶非獨天災亦有已過故曰有災眚白雲郭氏曰知不可大事而遇之者二四之无咎也知不可大事而過之者上六之災眚也鳥之飛也多失之過鳥飛之過則離凶焉非獨天災亦自取耳上六當過之時不知處過之道至於亢極其凶宜矣太甲曰天作孽猶可違自作孽不可逭其斯之謂與易說漢上朱氏曰上六不與五相當失中也又動而過之則甚矣而况處小過之極於時為已亢乎故曰弗遇過之上動成離離為飛鳥為目巽為繩以繩為目網罟之象其違理過常猶鳥飛過甚自離於網罟故曰飛鳥離之凶動則不正故凶離有伏坎災也弗遇過之災乃自取非天也人也而曰災眚者過之極窮之災也於時已亢也人事過越如此使知時而守正未必能免已亢故也易傳新安朱氏曰六以隂居動體之上處隂過之極過之已髙而甚逺者也故其象占如此或曰遇過恐亦只當作過遇義同九四未知是否本義合訂刪補大易集義粹言卷六十六
