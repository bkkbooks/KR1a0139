body:
  text: 合訂刪補大易集義粹言卷七十四頭等侍衛納喇性德編易有聖人之道四焉以言者尚其辭以動者尚其變以制器者尚其象以卜筮者尚其占伊川先生曰言所以述理以言者尚其辭謂於言求理者則存意於辭也以動者尚其變動則變也順變而動乃合道也制器作事當體乎象卜筮吉凶當考乎占經説吉凶消長之理進退存亡之道備於辭推辭考卦可以知變象與占在其中矣易傳序橫渠先生曰辭變象占皆聖人之所務也易道具焉一木無易道具焉四字有故曰神而明之存乎其人十字尚辭則言無所茍尚變則動必精義尚象則法必致用尚占則謀必知來四者非知神之所為孰能與於此知德之難言知之至也孟子謂我於辭命則不能又謂浩然之氣難言易謂不言而信存乎德行又以尚辭為聖人之道非知德達乎是哉學未至於知德語皆有病形而上者得辭斯得象矣故變化之理須存乎辭言所以顯變化也易有聖人之道而曰以言者尚其辭辭者聖人之所以聖人言命字極難辭之盡理而無害者須出於精義易有聖人之道四曰以言者尚其辭必至於聖人然後其言乃能無弊蓋由精義所自出也故辭不可以不修並易説廣漢張氏曰易者無形之聖人而聖人者有形之易故易乃聖人之道而聖人者乃盡易之道者也故指易以為聖人可也指聖人以論易亦可也故曰易有聖人之道四焉故指其所之者易之辭也以言者尚之則言無不當矣化而裁之者易之變也以動者尚之則動無不時矣象其物宜者易之象也制器者象之則可以盡制物之智極數知來者易之占也卜筮者尚之則可以窮先知之神人能言以尚其辭動以尚其變制器以尚其象卜筮以尚其占則人皆可以為舜塗人可以為禹此無他以其得聖人之道故也易説易有聖人之道四恐非為卜筮專為此書當此爻象如此處之則吉如此處之則凶聖人所以示後世若筮得之者固當如此處蓋其理不可違而卜筮固在其中矣答朱元晦書白雲郭氏曰言則用其辭動則用其變制器用其象卜筮用其占聖人用易之道又有是四焉者故言易有聖人之道四焉也易説漢上朱氏曰辭也變也象也占也四者易之變化本於參兩者也參天兩地也錯綜而生變化其妙至於不可知然亦不越乎四者故以言者尚其辭則言必不苟以動者尚其變則動必精義以制器者尚其象則器必致用以卜筮者尚其占則占必知來四者非神之所為乎易傳新安朱氏曰四者皆變化之道神之所為者也木義易有聖人之道四至精至變則合做兩箇是他裏面各有這箇問以言者尚其辭以言是取其言以明理斷事如論語上舉不恆其德或承之羞否曰是問以言以動以制器以卜筮這以字是指以易而言否曰然又問辭占是一類變象是一類所以下文至精合辭占説至變合變象説曰然占與辭是一類者曉得辭方能知得占若與人説話曉得他言語方見得他胸中底蘊變是事之始象是事之已形者故亦是一類也問以制器者尚其象曰這都難説蓋取諸離蓋字便是一箇半間半界底字如取諸離取諸益不是先有見乎離而後為網罟先有見乎益而後為耒耜聖人亦只是見魚鱉之屬欲有以取之遂做一箇物事去欄截他欲得耕種見地土硬遂做一箇物事去剔起他却合於離之象合於益之意又曰有取其象者有取其意者問以卜筮者尚其占卜用龜亦使易占否曰不用則是文勢如此並語録是以君子將有為也將有行也問焉而以言其受命也如嚮無有逺近幽深遂知來物非天下之至精其孰能與於此伊川先生曰受命如響遂知來物非神乎曰感而通求而得精之至也經説蓍龜雖無情然所以為卦而卦有吉凶莫非有此理以其有是理也故以是問焉其應也如響若以私心及錯卦象而問之便不應蓋沒此理今日之理與前日已定之理只是一箇理故應也附吕與叔束見録橫渠先生曰有不知則有知無不知則無知是以鄙夫有問仲尼叩兩端而空空易無思無為受命乃如響無有逺近幽深遂知來物非天下之至精孰能與於此言易之為書也至精者謂聖人窮理極盡精微處也易説廣漢張氏曰世之君子將欲有為而建功立業將欲有行而進用撫世詎可不問之以言播之天下傳之四方故民之從之速於置郵傳命不啻如響之應聲者以聖人之言不以逺邇而有間不以幽深而罔測凡物之來于我者近在眉睫之間逺在八荒之外莫不知之自非盡易之至精安能與於此易説白雲郭氏曰君子有為有行問言受命蓋言求其道於易中如問之以言求而得其道如響應以見易之無乎不備可與酬酢也無逺近幽深見幾知來非易為天下之至精孰能如此易説漢上朱氏曰有為造事也有行舉事也有問者焉而以易言之則其辭足以答天下之問有命者焉受而應之如響則其占足以決天下之疑問答占決皆辭也故通言之無有逺近以內外言也無有幽深以變動言也心者天地之鑑萬物之鏡顯於參伍之神則逺近幽深畢陳乎前遂知來物我與物一也精之又精謂之至精易傳新安朱氏曰此尚辭尚占之事言人以蓍問易求其卦爻之辭而以之發言處事則易受人之命而有以告之如響之應聲以決其未來之吉凶也以言與以言者尚其辭之以言義同命則將筮而告蓍之語冠禮筮日宰自右贊命是也本義問君子將有為也將有行也問焉而以言其受命也如響曰此是説君子作事問于蓍龜也問焉以言人以蓍問易求其卦爻之辭而以之發言處事受命如響則易受人之命如響之應聲以決未來吉凶也問問焉而以言曰若以上下文推之以言却是命筮之詞古人亦大段重這命筮之詞而以言三字義若拗若作以易言之如所謂不恆其德或承之羞則不占只是以其言之義又於上下文不順一云言是命龜受命龜受命也並語録參伍以變錯綜其數通其變遂成天地之文極其數遂定天下之象非天下之至變其孰能與於此康節先生曰天一地二天三地四天五地六天七地八天九地十參伍以變錯綜其數也如天地之相銜晝夜之相交也一者數之始而非數也故二二為四三三為九四四為十六五五為二十五六六為三十六七七為四十九八入為六十四九九為八十一而一不可變也百則十也十則一也亦不可變也是故數去其一而極於九皆用其變者也五五二十五天數也六六三十六乾之䇿數也七七四十九大衍之用數也八八六十四卦數也九九八十一元範之數也觀物外篇橫渠先生曰既言參伍矣參伍而上復如何分别易説氣之聚散於太虛猶冰凝釋於水知太虛即氣則無無故聖人語性與天道之極盡於參伍之神變易而已諸子淺妄有有無之分非窮理之學也正蒙廣漢張氏曰三五天地參而伍之義也一與六共宗二與七共朋三與八成友四與九同道五與十相守此參天地之數而成其行伍所以為變也以天之一而錯於地而生水以地之二而錯於天而生火以至天三錯地而生木地四錯天而生金凡此者謂之錯其數也老陽之數總於九老隂之數總於六以至少隂之數總於八少陽之數總於七凡此者謂之綜其數也人能參伍天地之數以通其變則水火金木經緯於天地之間以成天地之文者能成之而使之無虧矣人能錯綜天地之數以極其數則老陽老隂少陽少隂見天地之賾以定天下之象者能定之而無疑矣自非盡易之至變其孰能與於此易説白雲郭氏曰凡天下之變皆變也凡天下之數皆數也而易又參伍之錯綜之蓋變與數之所自出又制其變數不可窮盡者也雖天地之文必成於其變天下之象必定於其數則知易之變數不可窮盡如此故為天下之至變也凡天地之道顯而可見者皆曰文天下之物可見者皆曰象如日月星辰山川草木皆為天地之文或隂陽晝夜以變而運或生長融結以變而成皆是也或謂天地之文如青赤之文非也易説漢上朱氏曰參伍以變者縱橫十五天地五十有五之數也錯之為六七八九綜之為三百六十以天地觀之隂陽三五一五以變為候者七十二二五以變為旬者三十六三五以變為氣者二十四三百六十五日周而復始故乾之䇿三十有六者三六而又二也坤之䇿二十有四者二六而又二也三其二十四與二其三十六皆七十二三其七十二為二百一十六得乾之䇿二其七十二為百四十四得坤之䇿三畫之卦三變而反六畫之卦五變而復通六七八九之變則剛柔相易遂成天地之文極五十有五之數則剛柔有體遂定天下之象非成文不足以成物非定象不足以制器變之又變謂之至變易傳或曰參伍以變者乾一變姤二變遁三變否四變觀五變剝此五以變也五變極矣故四變晉下體復乾為大有又乾一變巽二變離三變震三變極矣故四變兊五變坤六變坎復三變又七變艮是乎曰非也三五不相離也五者三天兩地而倚數三極數也而具五行小衍也三在其中以重卦論之乾三變坤姤巽也遁艮也否坤也三以變也四變觀亦巽也五變剝亦艮也伍以變也伍以變則復以三變故艮變離下體坤復變為乾亦三變也以小成卦論之乾一變巽二變離三變震三以變也次自中二爻變而下故四變兊五變坤次自中爻變而上故六變坎七變艮二即五也初自下爻三變即前參以變也次自中爻下而二變次自中爻上而二變即前伍以變也參去伍伍去參皆不能變此三所以為極數五所以為小衍也天地之運也隂陽三五一五而變為七十二候二五而變為三十六旬三五而變為二十四氣凡三百六十五周而復始日月軌度積於餘分或以參綜伍或以伍綜參交錯而行者也叢説新安朱氏曰此尚象之事變則象之未定者也參者三數之也伍者五數之也既參以變又伍以變一先一後更相考核以審其多寡之實也錯者交而互之一左一右之謂也綜者總而挈之一低一昂之謂也此亦皆謂揲蓍求卦之事蓋通三揲兩手之䇿以成隂陽老少之畫究七八九六之數以定卦爻動靜之象也參伍錯綜皆古語而參伍尤難曉案荀子云窺敵制變欲伍以參韓非云省同異之言以知朋黨之分偶參伍之驗以責陳言之實又曰參之以比伍伍之以合參史記曰必參而伍之又曰參伍不失漢書曰參伍其賈以類相準此足以相發明矣本義參伍以變錯綜其數參謂三數之伍謂五數之揲蓍本無三數五數之法只言交互參考皆有自然之數如三三為九五六三十之類雖不用以揲蓍而推算變通未嘗不用錯者有迭相為用之意綜又有總而挈之之意如織者之綜絲也參伍是相牽連之意如三要做五須用添二五要做六須著添一做三須著減二錯綜是兩樣錯是往來交錯之義綜如織底綜一箇上去一箇下來陽上去做隂隂下來做陽如綜相似問參伍以變錯綜其數曰荀子説參伍處楊倞解之為詳漢書所謂欲問馬先問牛參伍之以得其實綜如織綜之綜大抵隂陽竒耦變化無窮天下之事不出諸此成天地之文者若卦爻之陳列變態者是也定天下之象者物象皆有定理足以經綸天下之事也又曰若是他數猶可湊參與五兩數自是參差不齊所以舉以為言兵家謂窺敵制變欲伍以參今欲窺敵人之事教一人探來恁地説又差一人探來若説得不同便將這兩説相參看如何以求其實所以謂之欲伍以參問錯綜其數本義云錯者交而互之一左一右之謂也莫是揲蓍以左揲右右揲左否曰不特如此乾對坤坎對離自是交錯又問綜者總而挈之莫是合挂扐之數否曰且以七八九六明之六七八九便是次序然而七是陽六壓他不得便當挨上七生八八生九九又須挨土便是一低一昂六五指七四指八三指九二指或問經緯錯綜之義曰錯是往來底綜是上下底綜便是織機上底古人下這字極子細但看他那單用處都有箇道理如經綸底綸字綸是兩條絲相合各有條理凡用綸處便是倫理底義統字是上面垂一箇物事下來下面有一箇人接著便謂之統但看垂字便可見又曰錯綜其數便只是七八九六六對九七對八便是東西相錯六上生七為陽九下生八為隂一本云七下生八為隂八上生九為陽便是上下為綜又曰古人作易其巧不可言太陽數九少隂數八少陽數七太隂數六初亦不知其數如何恁地元來只是十數太陽居一除了本身便是九箇少隂居二除了本身便是八箇少陽居三除了本身便是七箇太隂居四除了本身便是六箇這處古來都不曾有人見得參字音曹參之參猶參互之意又曰參以三數之也伍以五數之也如云什伍其民如云或相什伍非直為三與五而已也蓋紀數之法以三數之則遇五而齊以五數之則遇三而會故荀子曰窺敵制變欲伍以參注引韓子曰省同異之言以知朋黨之分偶參伍之驗以責陳言之實又曰參之以比物伍之以合參而漢書趙廣漢傳亦云參伍其賈以類相準皆其義也易所謂參伍以變者蓋言或以三數而變之或以伍數而變之前後多寡更相反覆以不齊而要其齊如河圖洛書大衍之數伏羲文王之卦厯家之日月五星章蔀紀元是皆各為一法不相依附而不害其相通者也綜字之義沙隨得之然錯綜自是兩事錯者雜而互之也綜者條而理之也參伍錯綜又各自是一事參伍所以通之其治之也簡而疏錯綜所以極之其治之也繁而密答王伯豐書易無思也無為也寂然不動感而遂通天下之故非天下之至神其孰能與於此康節先生曰寂然不動反本復靜坤之時也感而遂通天下之故陽動於中問不容髮復之義也夫易者聖人所以長君子消小人之具也及其長也闢之於未然及其消也闔之於未然一消一長一闔一闢渾渾然無迹非天下之至神其孰能與於此並觀物外篇濂溪先生曰寂然不動者誠也感而遂通者神也動而未形有無之間者幾也誠精故明神應故妙幾微故幽誠神幾曰聖人通書明道先生曰寂然不動感而遂通者天理具備元無少欠不為堯存不為桀亡父子君臣常理不易何曾動來因不動故言寂然雖不動感便通感非自外也吕與叔東見録伊川先生曰喜怒哀樂之未發謂之中中也者言寂然不動者也故曰天下之大本發而皆中節謂之和和也者言感而遂通者也故曰天下之達道暢潛道録老子曰無為又曰無為而無不為當有為而以無為為之是乃有為為也聖人作易未嘗言無為惟曰無思也無為也此戒夫作為也然下即曰寂然不動感而遂通天下之故是動靜之理未嘗為一偏之説矣遊定夫録寂然不動感而遂通此只言人分上事若論道則萬理皆具更不説感與未感寂然不動萬物森然已具在感而遂通感則只是自內感不是外面將一件物來感於此也並入關語録喜怒哀樂未發之際此心即赤子之心即天地之心即孔子之絶四即孟子所謂物皆然心為甚即易謂寂然不動感而遂通天下之故此心所發純是義理與天下之所同然安得不和心一也有指體而言者寂然不動是也有指用而言者感而遂通天下之故是也並答吕大臨論中書感而遂通天下之故以其寂然不動小則事物之至大則無時而不感謝顯道記憶平日語橫渠先生曰易言感而遂通者蓋語神也雖指暴者謂之神然暴亦固有漸是亦化也聖人通天下之志雖愚人與禽獸猶能識其意有所感則化感亦有難專以化言感而遂通者神又難專謂之化也並易説廣平遊氏曰不勉而中無為也不思而得無思也孟解三月不違仁者其心猶有所操也至於中心安仁則縱目之所視更無亂色縱耳之所聽更無姦聲無思也無為也寂然不動感而遂通天下之故則發育萬物彌綸天地而何克己復禮三月不違之足言哉語解龜山楊氏曰心正到寂然不動處方是極致以此感而遂通天下之故其於平天下也何有餘杭語録自至神而下蓋未能無思也惟無思無為足以感通天下之故而謂無思土木也可乎此非窮神知化未足與議也語解中也者寂然不動之時也無物不該焉故謂之大本和也者所以感通天下之故故謂之達道中庸解廣漢張氏曰夫至精猶有所思也惟易則本無所思至變猶有所為也惟易則本無所為無思無為如鑑也然形至則應如谷也然聲至則應無思無為寂然不動感而遂通天下之故所以極天下之至神也易説和靖尹氏曰橫渠云由知覺有心之名蓋由其知覺強名曰心寂然不動感而遂通天下之故若只寂然不動與木石等也只為感而遂通便是知覺知覺即心也至於搖扇得涼是知覺也譬如睡中人喚己名則矍然而起呼他人名則不應是知覺也師説五峰胡氏曰楊先生中庸解謂中也者寂然不動之時也案子思説喜怒哀樂未發謂之中則是楊先生指未發時為寂然不動也頃侍坐時嘗及此謂喜怒哀樂未發恐説寂然不動未得吾丈曰楊先生如此解某悚然愧懼竊謂於先覺所言但當信受奉行遂不復啓齒今來教舉尹先生之説亦如是某反復究觀茫然莫知所謂心性二字乃道義淵源當明辨不失毫釐然後有所持循矣竊謂未發只可言性已發乃可言心故伊川曰中者所以狀性之體段而不言狀心之體段也心之體段則聖人無思也無為也寂然不動感而遂通天下之故是也未發之時聖人與衆生同一性已發則無思無為寂然不動感而遂通天下之故聖人之所獨夫聖人盡性故感物而靜無有逺近幽深遂知來物衆生不能盡性感物而動然後朋從爾思而不得其正矣若二先生以未發為寂然不動是聖人感物亦動與衆人何異尹先生乃以未發為真心然則聖人立天下之大業成絶世之至行舉非真心邪二先生萬夫之望百世師表所言但當信從不可妄疑其失然審問明辨中庸之訓也有所未明不敢自己承舉先君子之言為誨愴然內傷如見顔色惟先君子所謂不起不滅者正以靜亦存動亦存而言也與易無思無為寂然不動感而遂通天下之故大意相符非若二先生指喜怒哀樂未發為寂然不動也某愚謂方喜怒哀樂未發沖漠無朕同此大本雖庸與聖無以異也而無思無為寂然不動乃是指易而言易則發矣故無思無為寂然不動聖人之所獨而非庸人所及也惟無思無為寂然不動故感而遂通天下之故更不用擬議也喜怒哀樂未發句下還下得感而遂通天下之故一句否若下不得即知其立意自不同不可合為一説矣恐伊川指性指心蓋有深意非茍然也心性固是名然名者實之表著也義各不同故名亦異難直混為一事也尹先生指喜怒哀樂未發為真心既曰未發恐難指為心又讀前教蓋尹先生所論已發未發却偏指未發為真心故某疑其不然今蒙垂誨若見真心則已發未發皆真自是釋然無疑矣並與曾吉甫書白雲郭氏曰易無思無為宜其不能與人事相感而反能通天下之故者是易為天下之至神他至於聖人用易以易簡之道得天下之理亦可謂通天下之故矣易説漢上朱氏曰夫有行始於有為有為始於有思有思有為者人也無思無為者天也誰能有思有為而無於人之纍乎其唯易而已易有思也本於無思有為也本於無為合五十有五之數歸於太極寂然無聲其一不動萬化冥會乎其中有物感之散為六七八九之變而天下之所以然者無乎不通所謂逺近幽深遂知來物乃其一也精者精此者也變者變此者也神之又神謂之至神易傳易無思也無為也寂然不動太極未分時也感而遂通天下之故兩儀四象八卦生吉凶也叢説新安朱氏曰此四者易之體所以立而用所以行者也易指蓍卦無思無為言其無心也寂然者感之體感通者寂之用人心之妙其動靜亦如此本義寂然不動感而遂通天下之故與窮理盡性以至於命本是説易不是説人諸家皆是借來就人上説亦通感而遂通者感著他卦卦便應他如人來問底善便與説善來問底惡便與説惡所以先儒説道潔淨精微這般句説得有意思陳厚之問寂然不動感而遂通曰寂然是體感是用當其寂然時理固在此必感而後發如仁感為惻隱未感時只是仁義感為羞惡未感時只是義問胡氏説此多指心作已發曰便是錯了縱使已發感之體固在所謂動中未嘗不靜如此則流行發見而常卓然不可移今只指作已發一齊無本了終日只得奔波急迫大錯了並語録易無思也無為也寂然不動忠也敬也立大本也感而遂通天下之故恕也義也行達道也文集夫易聖人之所以極深而研幾也唯深也故能通天下之志唯幾也故能成天下之務唯神也故不疾而速不行而至子曰易有聖人之道四焉者此之謂也明道先生曰唯神也故不疾而速不行而至神無速亦無至須如此言者不如是不足以形容故也劉絢師訓橫渠先生曰易非天下之至精則辭不足待天下之問非深不足通天下之志非通變極數則文不足以成物象不足以制器幾不足以成務非周知兼體則其神不能通天下之故故不疾而速不行而至也非至精至變至神不能與故曰神而明之存乎其人無知者以其無不知也若言有知則有所不知也惟其無知故能竭兩端易所謂寂然不動感而遂通也無知則神矣茍能知此則於神為近無知亦以其術素備也道前定則不窮故神譬之人身四體皆一物故觸之而無不覺不待心使至此而後覺也此所謂感而遂通不行而至不疾而速也物形乃有小大精粗神則無精粗神即神而已不必言作用譬之三十輻共一轂則為車若無轂與輻亦何以見車之用感皆出於性性之流也惟是君子上逹小人下達之為別並易説靜之動也無休息之期故地雷為卦言反又言復終則有始循環無窮聖人指其化而裁之耳深其反也幾其復也故曰反復其道又曰出入無疾正蒙義理之學亦須深沈方有造非淺易輕浮之可得也蓋唯深則能通天下之志只欲説得便似聖人若此則是釋氏之所謂祖師之類也經學理窟廣漢張氏曰深者理之奧能極深則天下之志果有不通者乎幾者事之微能研幾則天下之務果有不成者乎然深之所以通天下之志者以其窮理之奧而天下之好惡取舍從違去就揆之以理莫不一以貫之而無所遺也幾之所以成天下之務者以其察事之微而天下之得失利害成敗存亡圖之於微莫不預為之計而無所廢也然深也有待於極不極則不能造其至幾也有待於研不研則不能窮其精故通天下之志成天下之務可以指其方隅而言之也至於神則不疾而速初未嘗疾而速也感而遂通者乎不行而至初未嘗行而至也寂然不動者乎夫自至精至變而造於至神自唯深唯幾而造於唯神其原皆自於以言者尚其辭以動者尚其變以制器者尚其象以卜筮者尚其占以易有聖人之道四焉君子將有為也將有行也皆可以至於聖人之道故終之以此並易説白雲郭氏曰上言至精至變至神皆謂易之道也此言聖人用易之道以極深而研幾也天下之事至深難測也幾微難見也用易之道則能極其不測之深研其難見之幾矣然極易之深則天下之志無不通是能得其至精也研易之幾則天下之務無不成是能得其至變也又盡易之神故得不疾而速不行而至所謂感而遂通者也前言聖人之道四四者本於人事由人而言之也繼以至精至變至神三者易之道由易而言之也又繼以唯深唯幾唯神言雖聖人猶極深研幾如此也復以聖人之道四焉終之者蓋易之道其精變神如此聖人用易極深研幾又如此則天下役世於言動制器卜筮之間豈可任其私智以他求哉必當尚易之辭變象占也此衆人當尚之事而曰聖人之道者以言聖人猶尚此道也聖人尚此者以易為至精至變至神天下無以加焉故也此之謂者猶言謂是故也並易説漢上朱氏曰精故可以窮深變故可以與幾夫易聖人體之以極深研幾者也天下之志藏於無形非推見至隱者其能盡通乎易至精者也天下之務其來無窮非曲得所謂者其能成乎易至變者也疾而速行而至有思有為者皆然易至神也體易者至於不疾而速不行而至者極深研幾之效也莫知其然而然也故曰易有聖人之道四焉易傳新安朱氏曰研猶審也幾微也所以極深者至精也所以研幾者至變也所以通志而成務者神之所為也本義易便有那深有那幾聖人用這底來極出那深研出那幾研是研磨到底之意詩書禮樂皆是説那已有底事惟易是説那未有這事研幾不是待他顯著只在那茫昧時都處置了深是幽深通是開通所以閉塞只為他淺若是深後便能開通人志道理若淺如何開通得人所謂通天下之志亦只是説開物相似所以下一句也説箇成務易是説那未有底六十四卦皆是如此深就心上説幾就事上説幾便是有那事了雖是微畢竟有件事深在心甚玄奧幾在事半微半顯通天下之志猶言開物故其下對成務問唯深唯幾唯神此是説聖人如此否曰是説聖人亦是易如此若不深如何能通得天下之志又曰恁他黑窣窣地深疑若不可測然其中却事事都有箇端緒可尋有路脈線索在裏面所以曰唯幾也故能成天下之務研者便是研窮他幾便是周子所謂動而未形有無之間者也問深幾二字如何曰研幾是研磨出那幾微處且如一箇卦在這裏便有吉有凶有悔有吝幾微毫釐處都研磨出來問如何是極深曰要人都曉得至深難見底道理都就易中見得問如所謂幽明之故死生之説鬼神之情狀之類否曰然問如此説則正與本義所謂所以極深者至精也所以研幾者至變也正相發明曰然並語録變化之道莫非神之所為也故知變化之道則知神之所為矣易有聖人之道四焉所謂變化之道也觀變玩占可以見其精之至矣觀象玩辭可以見其變之至矣然非有寂然感通之神則亦何以為精為變而成變化之道哉此變化之道所以為神之所為也所以極深者以其幾也所以研幾者以其變也極深研幾所以不疾而速不行而至者以其神也此又發明上文之意復以易有聖人之道四焉者結之也或曰至精至變皆以書言之矣至神之妙亦以書言可乎曰至神之妙固無不在詳考之文意則實亦以書言之也所謂無思無為寂然不動云者言在册象在畫蓍在櫝而變未形也至於玩辭觀象而揲蓍以變則感而遂通天下之故矣推而極於天地之大反而驗諸心術之微其一動一靜循環始終之際至神之妙亦如此而已矣嗚呼此其所以不疾而速不行而至也歟易精變神説右第十章新安朱氏本義曰此章承上章之意言易之用有此四者合訂刪補大易集義粹言卷七十四
