body:
  text: 合訂刪補大易集義粹言卷六十九頭等侍衛納喇性德編繫辭易始有卦而已文王繫之以卦辭周公又繫之以爻辭故曰聖人設卦觀象繫辭焉而明吉凶此則孔子所作繫辭之傳也陸氏曰繫辭亦作嗣依字應作詞説也説文云詞者意內而言外也先儒分章不同今從朱子本義並載諸家之説云伊川先生曰聖人用意深處全在繫辭詩書乃格言觀易須看卦然後觀逐爻之才一爻之間常包涵數意聖人常取其重者為之辭亦有易中言之已多取其未嘗言者亦不必重事又有且言其時不及其爻之才皆臨時參考須先看卦乃看得繫辭並吕與叔束見録古之學者先由經以識義理蓋始學時盡是傳授後之學者却先須識義理方始看得經如易繫辭所以解易今人須看了易方始看得繫辭入關語録又曰如繫辭之文後人決學不得譬之化工生物且如生出一枝花或有翦裁為之者或有繪畫為之者看時雖自相類然終不若化工所生自有一般生意劉元承手編白雲郭氏曰包犧畫卦初無繫辭文王孔子之言皆繫辭也故孔子曰繫辭焉以斷其吉凶繫辭焉以盡其言則卦爻之辭皆是也今獨以此上下二篇稱繫辭者蓋卦辭爻辭文王周公之繫辭也此上下二篇孔子之繫辭也又於十翼之中獨此二篇泛論大道為諸卦之統要與彖象文言之辭異故獨曰繫辭所以尊崇孔子之辭與文王等也觀其言廣大而備變通而神無思而精皆彖象文言序卦説卦之所不能盡者非聖人孰能與此哉微此則易道絶矣何氏謂上篇明無下篇明幾或以上篇論易之大理下篇論易之小理孔頴達言上下無異義直以簡編重大是以分之今觀上篇自天尊地卑至存乎德行篇章相次事理大小皆有條理不可紊亂次章之言皆前章所未盡至存乎德行則易道備矣下篇復起其説前後相次復如上篇是則初為二篇非後人妄分也諸儒分章不一孔頴達定以上篇十二章下篇九章然章有甚大甚小有可分不可分者似不止此二十一章故有文意未斷而章分有才一二句而文意斷不相續者豈能拘以二十一章也説見於後並易説新安朱氏曰繫辭本謂文王周公所作之辭繫於卦爻之下者即今經文此篇乃孔子所述繫辭之傳也以其通論一經之大體凡例故無經可附而自分上下云本義繫辭或言造化以及易或言易以及造化不出此理上下繫辭説那許多爻直如此分明他人説得分明便淺近聖人説來却不淺近有含蓄所以分在上下繫也無甚意義聖人偶然去這處説又去那處説嘗説道看易底不去理會道理却只去理會這般底譬如讀詩者不去理會那四字句押韻底却去理會十五國風次序相似並語録繫辭上傳天尊地卑乾坤定矣卑髙以陳貴賤位矣動靜有常剛柔斷矣伊川先生曰天尊地卑尊卑之位定而乾坤之義明矣尊卑既判貴賤之位分矣陽動隂靜各有其常則剛柔判矣經説問明則有禮樂幽則有鬼神何也曰鬼神只是一箇造化天尊地卑乾坤定矣鼓之以雷霆潤之以風雨是也語録橫渠先生曰先分天地之位乾坤立則方見易故其事無非易也所以先言天地乾坤易之門户也不言髙卑而曰卑髙者亦有義髙以下為基亦是人先見卑處然後見髙也動靜隂陽性也剛柔其體未必形靜專動直不為物纍則其動靜有常不牽制於物也然則乾為剛果斷然不疑矣天地動靜之理天圓則須動地方則須安靜並易説龜山楊氏曰天尊地卑乾坤定矣乾坤本無體天地之位定則乾坤斯定不有天地乾坤何辨南都語録兼山郭氏曰孔子曰動靜有常剛柔斷矣方其動以動為常靜以靜為常則動靜之機或幾乎息也是故動存乎靜靜存乎動動靜不窮是其所謂常也中庸解白雲郭氏曰繫辭首一章之義當先辨天地非乾坤乾坤非天地及明道之乾坤易之乾坤三才之天地卦中之天地然後其義可明若直以天地尊卑便為乾坤孰不知天地尊卑之理如此則於道於易於卦皆無意義若非聖人之言也聖人之言豈茍然哉此章蓋明作易聖人首畫乾坤二卦之義此謂易之乾坤卦中天地之象也且無形者道有形者物乾坤道也天地物也故道有乾坤而無天地物有天地而無乾坤及乎觸類而長之然後乾為天坤為地非本無分也此乾坤天地之辨也無象則道也有象則卦也道之乾坤無象也有其道而未見於書也易之乾坤有象也畫而為卦見之於書者也三才之天地天地也卦中之天地上下二卦又三才之象也孔子繫辭繫周易也周易以乾坤六畫為首故首言天尊地卑乾坤定矣蓋言文王重卦得天尊地卑之象而後乾坤之卦定也若論乾坤之道則乾坤定而後天尊地卑其義不同故包犧之畫在上為天尊道也文王之重在下為地卑道也尊包犧而自卑之是為得天尊地卑之道矣天尊地卑然後卦象形六位著剛柔分其始則乾坤二卦先定故曰乾坤其易之門邪卑髙以陳卑地也髙天也天地髙卑以陳則人位乎兩間而人道著矣貴賤人道也天地純一故一髙一卑人道不齊則或賤或貴而位有分焉此六位之所由以立也有六位而後剛柔生焉故位為一定之體而剛柔則變矣陽動靜有常乾陽也為動坤隂也隂為靜爻之變本乎動靜觀動靜常理則六爻剛柔斷然可知動以變為常靜以不變為常易稱剛柔皆謂九六也上言乾坤定者由上下二卦也貴賤位者六位也此言剛柔斷者六爻也並易説漢上朱氏曰乾坤貴賤兩者聖人觀天地而畫卦剛柔吉凶變化三者聖人觀萬物而生爻變化者爻有變動也伏羲畫卦乾上坤下立天地之位歸藏先坤後乾首萬物之母連山乾始於子坤始於午至於周易尊乾卑坤其體乃定見於卦則上體乾也下體坤也道雖屢遷上下不易君尊臣卑父尊子卑夫尊婦卑謂之三綱三綱不正天地反覆髙者貴卑者賤則貴賤之位分矣陽為貴乾也隂為賤坤也髙者乾之位也卑者坤之位也上既曰尊矣尊無二上故易尊為髙又曰卑髙者貴以賤為本易自下升上元士大夫三公諸侯承之然後君位乎五也動而不屈者剛也靜而不變者柔也動靜有常則乾剛坤柔其德斷然無疑矣策數以七九為陽六八為隂陽剛也隂柔也爻位以一三五為剛二四六為柔陽先隂後故策七者二十八策九者三十六爻一陽二隂三陽四隂五陽六隂君不剛則臣強父不剛則子強夫不剛則為妻所畜尊卑之位貴賤之分也易傳新安朱氏曰天地者隂陽形氣之實體乾坤者易中純隂純陽之卦名也卑髙者天地萬物上下之位貴賤者易中卦爻上下之位也動者陽之常靜者隂之常剛柔者易中卦爻隂陽之稱也本義問第一章第一節蓋言聖人因造化之自然以作易曰論其初則聖人是因天理之自然而著之於書此是後來人説話又是見天地之實理而知易之書如此如見天之尊地之卑却知得易之所謂乾坤者如此如見天之髙地之下却知得易所分貴賤者如此又曰此是因至著之象以見至微之理天尊地卑至變化見矣是舉天地事理以明易自是故以下却舉易以明天地間事天尊地卑乾坤定矣觀天地則見易也天尊地卑上一截皆説面前道理下一截是説易書聖人做這箇易與天地準處如此如今看面前天地便是他那乾坤卑髙便是貴賤聖人只是見成説這箇見得易是準這箇若把下面一句説做未畫之易也不妨然聖人是從那有易後説來天尊地卑故易中之乾坤定矣楊氏説得深了易中固有屈伸往來之乾坤處然只是説乾坤之卦在易則有乾坤非是因有天地而始定乾坤天尊地卑章上一句皆説天地下一句皆説易如貴賤是易之位剛柔是易之變化類皆是易不必專主乾坤二卦而言卑髙以陳貴賤位矣此只是上句説天地間有卑有髙故易之六爻有貴賤之位也故曰列貴賤者存乎位並語録方以類聚物以羣分吉凶生矣在天成象在地成形變化見矣伊川先生曰事有理物有形也事則有類形則有羣善惡分而吉凶生矣象見於天形成於地變化之迹見矣經説橫渠先生曰隂之性常順然而地體重濁不能隨則不能順則有變矣有則有象如乾健坤順有此氣則有此象可得而言若無則直無而已謂之何而可是無可得名故形而上者得辭斯得象但於不形中得以措辭者已是得象可狀也今雷風有動之象須謂天為健雖未嘗見然而成象故以天道言及其發則是效也著則是成形成形則是道也若以耳目所及求理則安得盡如言寂然湛然亦須有此象有氣方有象雖未形不害象在其中有形有象然後知變化之驗並易説廣平遊氏曰在天成象則鳥與火虛與昴四時迭見者天道之變也在地成形則作而長斂而藏四時異形者地道之變也至於成象者莫測其進退之機成形者莫見其生成之迹則天地之化也體化而裁之則無駭於變矣此變化之辨也中庸解龜山楊氏曰或問天地即輕清重濁之氣升降否曰然天地乾坤亦是異名同體其本一物變生則名立在天成象在地成形亦此物也但因變化出來故千態萬變各自陳露故曰在天成象在地成形變化見矣變化神之所為也其所以變化孰從而見之因其成象於天成形於地然後變化可得而見焉因云舊常解此義云無象無形則神之所為隱矣有象有形變化於是乎著南都語録廣漢張氏曰如乾位西北坎艮震陽皆以類聚坤位西南巽離兊隂皆以類聚此方以類聚也乾為天而坎水艮山震雷皆羣分於此坤為地而離火兊澤巽木皆羣分於此此物以羣分也或聚或分而得者為吉失者為凶吉凶生矣易説白雲郭氏曰乾坤畫卦之始本無吉凶因人而生也方所也物以方而聚言其大致也復以羣而分言乎其微也類聚羣分皆在物也物動則有吉凶而其機則見於易故易之吉凶因物之類聚羣分而生初未之有也易之所有者卦與爻位而已前三者是也因三才而生見者吉凶變化也論乾坤卦位六爻吉凶變化如此則諸卦可知此章論乾坤先言卦位生爻以盡設卦之道繼言吉凶生變化見以見乾坤之致用變化之道至微難見因在天成象以見乾之變化在地成形以見坤之變化故曰變化見矣並易説漢上朱氏曰五方之物各以其類聚同氣也五物之類各以其羣分異情也氣同則合情異則離而吉凶生矣爻或得朋或失類或逺而相應或近而不相得或暌而通或異而同隂陽之情也在天成象者隂陽也在地成形者剛柔也天變則地化變者隂陽極而相變也隂陽之氣變於上剛柔之形化於下故策二十八者其數七策三十二者其數八策三十六者其數九策二十四者其數六隂陽交錯剛柔互分天地變化之道也易傳又曰貴賤剛柔吉凶變化四者皆天地之固有首言乾坤者六子皆本於乾坤也叢説新安朱氏曰方謂事情所向言事物善惡各以類分而吉凶者易中卦爻占決之辭也象者日月星辰之屬形者山川動植之屬變化者易中蓍策卦爻隂變為陽陽化為隂者也此言聖人作易因隂陽之實體為卦爻之法象莊周所謂易以道隂陽此之謂也本義問方以類聚物以羣分曰物各有類善有善類惡有惡類吉凶於是乎出又曰方以事言物以物言方猶事也又曰方向也所向善則善底人皆來聚所向惡則惡底人皆來聚又是通天下之物而言是箇好物事則所聚者皆好物事也若是箇不好底物事則所聚者皆不好底物事也在天成象在地成形變化見矣上是天地之變化下是易之變化蓋變化是易中隂陽三爻之變化故曰變化者進退之象也變化只進退便是如自坤而乾則為進自乾而坤則為退進退在己變未定之間若已定則便是剛柔也問不知是變以成象化以成形為將是變化二字同在象形之間曰不必如此分變化二字下章説得最分曉文蔚曰下章云變化者進退之象如此則變是自微而著化是自盛而衰曰固是變是自隂而陽化是自陽而隂易中説變化惟此處最親切如言剛柔者立本者也變通者趨時者也剛柔是體變通不過是二者盈虛消息而已此所謂變化故此章亦云剛柔者晝夜之象也變化者進退之象也剛柔者晝夜之象所謂立本變化者進退之象所謂趨時又如言吉凶者失得之象悔吝者憂虞之象悔吝便是吉凶底交互處悔是吉之漸吝是凶之端又曰橫渠云變是倐忽之變化是逐旋不覺化將去恐易之意不如此説易只是説一箇隂陽變化隂陽變化便自有吉凶下篇説得變化極分曉剛柔者晝夜之象剛柔便是箇骨子只管恁地變化並語録是故剛柔相摩八卦相蕩鼓之以雷霆潤之以風雨日月運行一寒一暑乾道成男坤道成女康節先生曰在人則乾道成男坤道成女在物則乾道成陽坤道成隂觀物外篇伊川先生曰隂陽之交相摩軋八方之氣相推蕩雷霆以動之風雨以潤之日月運行寒暑相推而成造化之功得乾者成男得坤者成女經説橫渠先生曰以人言之喘息是剛柔相摩氣一出一入上下相摩錯也於鼻息見之人自鼻息相摩以蕩於腹中物既消鑠氣復升騰易説龜山楊氏曰此一動一靜天地之間理之所不能已者其相摩相蕩非有機緘綱維而然也至於乾道成男坤道成女蓋變化之見而形象之著也會通一已上條補白雲郭氏曰變化之見在易則見於剛柔八卦在天地之間則見於雷霆風雨日月寒暑在人則見於男女皆乾坤變化之道也剛柔者六爻之九六也乾坤九六剛柔相摩而變故八卦因之相蕩而六十四卦生焉此見於易者也雷霆風雨之鼓潤日月寒暑之運行皆八卦變化之象見於天地之間者也雷霆風雨鼓潤萬物者也日月運行寒暑者也乾道成男在易則震坎艮是也在人則男也坤道成女在易則巽離兊是也在人則女也易説漢上朱氏曰乾坤之交也乾以剛摩柔坤以柔摩剛剛柔相摩八卦推蕩變化彰矣説卦謂之中爻先儒謂之互體鼓之以雷霆者震反艮也潤之以風雨者巽反兊也風而潤者以雨而風不以隂先陽也日月運行一寒一暑者坎離也六子致用萬物化生然不越乎乾坤也震坎艮之為三男得乾之道者也巽離兊之為三女得坤之道者也聖人之用天下合乾坤也父子君臣乾坤也夫婦震巽坎離艮兊也長幼其序也朋同類也友異體也五者乾坤而已矣易傳又曰剛柔相摩八卦相蕩先儒謂隂陽之氣旋轉摩薄乾以二五摩坤成震坎艮坤以二五摩乾成巽離兊故剛柔相摩則乾坤成坎離所謂卦變也八卦相蕩則坎離卦中互有震艮巽兊之象所謂互體也乾陽物也得於乾者皆陽物也乾道成男是也坤隂物也得於坤者皆隂物也坤道成女是也並叢説新安朱氏曰此言易卦之變化也六十四卦之初剛柔兩畫而已兩相摩而為四四相摩而為八八相蕩而為六十四雷霆風雨日月寒暑此變化之成象者成男成女此變化之成形者此兩節又明易之見於實體者與上文相發明也本義繫辭中説是故字都是喚那下文起也有相連處也有不相連處摩是那兩箇物事相摩戛蕩則是圜轉推蕩將出來摩是八卦以前事蕩是八卦以後為六十四卦底事蕩是有那八卦了團旋推蕩那六十四卦出來漢書所謂蕩軍是團轉去殺他磨他底意思問六十四卦之初剛柔兩畫而已兩而四四而八八而十六十六而三十二三十二而六十四皆是自然生生不已而謂之摩蕩何也曰摩如物在一物上面摩旋底意思亦是相交意思如今人磨子相似下面一片不動上面一片只管摩旋推蕩不曾住自兩儀生四象則老陽老隂不動而少隂少陽則交自四象生八卦則乾坤震巽不動而兊離坎艮則交自八卦而生六十四卦皆是從上加去下體不動每一卦生八卦故謂之摩蕩相摩相蕩方是説做這卦做這卦了那鼓之以雷霆與風雨日月寒暑之變化皆在這卦中那成男成女之變化也在這卦中見造化關捩子才動那許多物事都出來易只是模寫他這箇鼓之以雷霆潤之以風雨此已上是將造化之實體對易中之理此下便是説易中却有許多物事乾道成男坤道成女通人物言之如牝牡之類在植物亦有男女如有牡麻及竹有雌雄之類皆離隂陽剛柔不得並語録乾知大始坤作成物乾以易知坤以簡能易則易知簡則易從易知則有親易從則有功有親則可久有功則可大可久則賢人之德可大則賢人之業易簡而天下之理得矣天下之理得而成位乎其中矣明道先生曰坤作成物是積學處乾知大始是成德處李籲所録伊川先生曰乾當始物坤當成物乾坤之道易簡而已乾始物之道易坤成物之能簡平易故人易知簡直故人易從易知則可親就而奉順易從則可取法而成功親合則可以常久成事則可以廣大聖賢德業久大得易簡之道也天下之理易簡而已有理而後有象成位乎其中也經説橫渠先生曰天地雖一物理須從分别大始者語物之始乾全體之而不遺故無不知也知之先者蓋莫如乾成物者物既形矣故言作已入於形氣也初未嘗有地而乾漸形不謂知作謂之何哉然而乾以不求知而知故其知也速坤以不為而為故其成也廣易則易知簡則易從易知則有親易從則有功有親則可久有功則可大可久則賢人之德可大則賢人之業易簡而天下之理得矣天下之理得而成位乎其中矣此皆言人體天地之德然也可久者以久逺推行可大者其得體也大凡語道理之徒道達不已竟亦何所求推行及民故以賢人措諸事業而言易簡理得而成乎天地之中蓋盡人道並立乎天地以成三才則是與天地參矣但盡人道理自當爾不必受命仲尼之道豈不可以參天地坤至柔而動也剛積大勢成而然爾乾至健無體為感速故易知坤至順不煩其施普故簡能言知者知而已言能者涉於形氣能能成物也易則易知易知則有親今夫虎豹之為物豢之雖馴人亦不敢遂以親狎為其難測惟其平易則易知易信信則人任焉以其可信人斯委任故易以有功矣道體至廣所以有言易有言小有言大無乎不在志大則才大事業大故曰可大又曰富有志久則氣久德性久故曰可久又曰日新德業不可久不可大不足謂之賢况可謂之聖乎易簡理得則知幾知幾然後經可正天下達道五其生民之大經乎經正則道前定事豫立不疑其所行利用安身之要莫先焉成位乎其中與天地合其德並易説易簡然後能知險阻易簡理得然後一以貫天下之道正蒙天資美不足為功惟矯惡為善矯惰為勤方是為功人必不能便無是心須使思慮但使常遊心於義理之間立本處以易簡為是接物處以時中為是易簡而天下之理得時中則要博學素備語録廣漢張氏曰吳德夫問可久則賢人之德可大則賢人之業此一段論乾坤易簡至於可久可大可謂極矣何故止言賢人德業或謂非聖賢之賢乃賢於人之賢答曰可久可大賢人之德業也久大則聖人矣南軒集龜山楊氏曰解經大抵須得理會而語簡舊常解易簡而天下之理得云行其所無事不亦易乎一以貫之不亦簡乎如是則天下之理得矣又言行其所無事一以貫之只是一箇自然之理南都語録白雲郭氏曰自天尊地卑言乾坤之設卦卑髙以陳言乾坤之六位動靜有常言乾坤六位之剛柔繼言因方物而吉凶生因象形而變化見則乾坤之義略備矣繼又明變化之見有見於易者有見於天地之間及人道者雖各不同而其象一也自乾知大始坤作成物之下大明乾坤之德而終之以聖人法乾坤之道則乾坤之義畢矣繫易之義莫大於此莫先於此故以是首章也且自易言之則易始於乾坤而乾又為坤之始是為大始也自物言之則萬物始於坤坤始於乾是為大始也大始以氣言乾為天天知始物而已非生也坤為地地成形則生而作成之也此地道之代終也然乾之大始以易而知知始而已亦非生也坤之成形以簡而能能則作成之義也非易則不知非簡則不能乾坤之道不過於此况人乎是以聖人之道無它焉法乾坤易簡而已乾道易故人亦易知坤道簡故人亦易從人能法乾坤之易簡者以易知易從而已以易知之道接物故物輔而相親以易從之道有為故人歸而有功有親樂其易也易則可久之道也有功成於簡也簡則可大之道也且乾以無不覆為易坤以無不載為簡人思無不覆之道則天下萬物不能外其親此其所以可久也思無不載之道則天下萬物不能外其功此其所以可大也法乾坤之易簡至於可久可大則賢人之德業至矣原始要終雖天下之理不同皆以易簡而得之此所謂知其所本者也天下之理得則與天地合德是以成位乎其中而參天地且乾以易知天亦易也坤以簡能地亦簡也聖賢之德業以易簡而成天地之理以易簡而得天地與人其德一歸之易簡非合德參天地而何此章前言設卦之道而後言賢人可久可大之德業則知易不徒設也將以其道用於天下耳昧者未之知故務為艱險以去其易務為繁苛以去其簡茍目前之利而不顧方來之弊則德於是乎不可久作聰明窮奢欲矜權術滋法令則業於是乎不可大天下之理既不能得於是上下乖離而天下始亂矣漢唐之弊是也安能知成位乎其中本於至簡至易之道哉聖人憂患後世不知君人之有道此文王之易所以作而孔子復繫辭以明之之意也然乾坤易簡與人道易簡本非二道故孔子論易簡自乾坤終以人道相馴而致無少間也此章始自天尊地卑終於易簡乾坤之義畢矣並易説漢上朱氏曰始於乾終於坤以乾知大始坤作成物也物生始於子物成始於午乾西北方亥也陽藏於坤有一而未形知大始也坤西南方申也物成於正秋酉也坤終於十月亥也坤作於申成於酉終於戌亥作成萬物也乾知大始坤作成物尊卑貴賤之分也故父作子述君逸臣勞夫唱婦和夫乾確然不易無為而為萬物宗以易知也天動地隨坤順乎乾其作成萬物者以簡能也簡曰易從者歸之乾也與髙不言尊風雨言潤同義聖人之於尊卑之際君臣之大義嚴矣孟子所謂一本荀卿所謂一隆易則其心一故易知簡則其政不煩故易從易知則天下見其憂樂故有親易從則匹夫匹婦各獲自盡故有功有親則不厭故可久有功則不已故可大可久者日新之德可大者富有之業賢人者賢於人者也聖人賢人之極舜禹之聖亦曰選賢與賢也乾坤之理盡於易簡易簡而天下之理得天下之理得則上下與之同流德業既成乃位乎兩間與天地為一易傳又曰乾坤之道觀乎天地萬物之變化其道較然著見矣然反觀吾身乾坤安在哉蓋善端初起者乾也身行之而作成其事者坤也人皆有善端不亦易知乎行其所知不亦簡能乎飢而食渴而飲晝作而夜止豈不簡且易哉蓋以此推天下未有不知而不從者也我知之人亦知之故有親我行之人皆行之故有功有親則俟百世而不惑有功則放諸四海而準可久者謂之德可大者謂之業賢人之德業至於配天地成位乎兩間可謂久且大矣然不過健順而已而健順者在乎反求諸身而已豈不至易至簡哉知此則天尊地卑八卦相蕩在乎其中矣古之傳此者唯曾子子思孟子則然叢説新安朱氏曰知猶主也乾主始物而坤作成之承上文男女而言乾坤之理蓋凡物之屬乎隂陽者莫不如此大抵陽先隂後陽施隂受陽之輕清未形而隂之重濁有迹也乾健而動即其所知便能始物而無所難故為以易而知大始坤順而靜凡其所能皆從乎陽而不自作故為以簡而能成物人之所為如乾之易則其心明白而人易知如坤之簡則其事要約而人易從易知則與之同心者多故有親易從則與之協力者衆故有功有親則一於內故可久有功則兼於外故可大德謂得於己者業謂成於事者上言乾坤之德不同此言人法乾坤之道至此則可以為賢矣成位謂成人之位其中謂天地之中至此則體道之極功聖人之能事可以與天地參矣並本義或問乾知大始坤作成物乾以易知坤以簡能如何是知曰此知字訓管字不當解作知見之知大始是萬物資始乾以易故管之成物是萬物資生坤以簡故能之大抵談經只要自在不必泥於一字之間乾以易知坤以簡能他是從上面乾知大始坤作成物處説來文蔚曰伊川以知字作當字解其義如何曰此如説樂著大始大始就當體而言言乾當此大始然亦自有知覺之義文蔚曰此是那性分一邊事曰便是他屬陽坤作成物却是作那成物乃是順乾乾以易知坤以簡能易簡在乾坤易則易知簡則易從却是以人事言之兩箇易字又自不同一箇是簡易之易一箇是難易之易要之只是一箇字但微有毫釐之間因論天地間只有一箇感與應所謂隂與陽無處不是且如前後前便是陽後便是隂又如左右左便是陽右便是隂又如上下上面一截便是陽下面一截便是隂文蔚曰先生易説中謂伏羲作易驗隂陽消息兩端而已此語最盡曰隂陽雖是兩箇字然却只是一氣之消息一進一退一消一長進處便是陽退處便是隂長處便是陽消處便是隂只是這一氣之消長做出古今天地間無限事來所以隂陽做一箇説亦得做兩箇説亦得問乾知是知坤作是行否曰是又問通乾坤言之有此理否曰有如何是易簡曰他行健所以易易是知阻難之謂人有私意便難簡只是順從而已若外更生一分如何得簡今人多是私意所以不能簡易易故知之者易簡故從之者易有親者惟知之者易故人得而親之此一段通天人而言一畫是易兩畫是簡易簡只看健順可見且以人論之如健底人則遇事時便做得去自然覺易易只是不難又如人稟得性順底人及其作事便自省事自然是簡簡只是不繁然乾之易只管得上一截事到下一截却屬坤故易坤只是承乾故不著做上一截事只做下面一截故簡如乾以易知坤以簡能知便是做起頭能便是做了只觀隤然確然亦可見得易簡之理簡字易曉易字難曉他是健了自然恁地不勞氣力才從這裏過要生便生所謂因行不妨掉臂是這樣説話繫辭有數處説易簡皆是這意仔細看便見問健不是他要恁地是實理自然如此在人則順理而行便自容易不須安排曰順理自是簡底事所謂易便只是健健自是易乾以易知坤以簡能以上是言乾坤之德易則易知以下是就人而言言人兼體乾坤之德也有親可久則為賢人之德是就存主處言有功可大則為賢人之業是就做事處言蓋自乾以易知便是指存主處坤以簡能便是指做事處故易簡而天下之理得則與天地參矣問本義云乾健而動故以易而知大始坤順而靜故以簡而作成物若以學者分上言之則廓然大公者易也物來順應者乾也不知是否曰然乾之易致知之事也坤之簡力行之事也問恐是下文易則易知簡則易從故知其所分如此否曰他以是而能知故人亦以是而知之所以坤之六二便只言力行底事乾坤只是健順之理非可指乾坤為天地亦不可指乾坤為二卦在天地與卦中皆是此理易知易從不必皆指聖人但易時自然易知簡時自然易從問易則易知先作樂易看今又作容易如何曰未到樂易處礪曰容易如何便易知曰不須得理會易知且理會得易字了下面自然如破竹又曰這處便無言可解説只是易只怕不健若健則自易易則自易知這如龍興而雲從虎嘯而風生相似只為易知易從故可親可久如人不可測度者自是難親亦豈能久煩碎者自是難從何緣得有功也一於內者謂可久是賢人之德德則得於已者也兼於外者謂可大是賢人之業業則見於外者也德是得之於心業是事之有頭緒次第者問不言聖人是未及聖人事否曰成位乎其中便是説抵著聖人張子所謂盡人道並立乎天地以成三才則盡人道非聖人不能程子之説不可曉可久則賢人之德可大則賢人之業楊氏可而已之説亦善案楊氏曰可而已非其至也故為賢人之德業本義謂法乾坤之事賢於人之賢易簡理得只是淨淨潔潔無許多勞擾委曲並語録東萊吕氏曰靜多於動踐履多於發用涵養多於講説讀經多於讀史工夫如此然後能可久可大與葉正則書右第一章新安朱氏本義曰此章以造化之實明作經之理又言乾坤之理分見於天地而人兼體之也聖人設卦觀象繫辭焉而明吉凶剛柔相推而生變化是故吉凶者失得之象也悔吝者憂虞之象也變化者進退之象也剛柔者晝夜之象也六爻之動三極之道也康節先生曰陽爻晝數也隂爻夜數也天地相銜隂陽相交故晝夜相雜剛柔相錯春夏陽也故晝數多夜數少秋冬隂也故晝數少夜數多觀外物篇伊川先生曰聖人既設卦觀卦之象而繫之以辭明其吉凶之理以剛柔相推而知變化之道吉凶之生由失得也悔吝者可憂虞也進退消長所以成變化也剛柔相易而成晝夜觀晝夜則知剛柔之道矣三極上中卞也極中也皆其時中也三才以物言也三極以位言也經説橫渠先生曰吉凶者失得之著也變化者進退之著也設卦繫辭所以示其著也吉凶變化悔吝剛柔易之四象歟悔吝由贏不足而生亦兩而已變化進退之象云者進退之動也微必驗之於變化之著故察進退之理為難察變化之象為易六爻盡利而動所以順隂陽剛柔仁義性命之理也故曰六爻之動三極之道也並易説龜山楊氏曰擊辭焉而明吉凶總言易之為書也剛柔相推而生變化總言爻之變動也廣漢張氏曰爻辭雖吉凶得失之類而性命道德之奧寓焉白雲郭氏曰此章明聖人設卦之道卦所以觀天下之象象在彼者也聖人像之於卦故觀於此而可得也有畫而無辭則吉凶不可得而知擊之以辭所以明吉凶也剛柔不相推則止於乾坤而已變化無自而生變化不生則六十四卦不能成也然吉凶變化雖各有所主究其實亦皆象也易以象為主而象為難明故復詳言之彼有失得則卦以吉凶象之彼有憂虞則卦以悔吝象之彼有進退則卦以變化象之彼有晝夜則卦以剛柔象之彼所有之象聖人莫不觀而象之於此此作易之道也六爻之動動則變所以象三極變化之道也既象進退又象三極者進退特人事耳由卦全體而言天地人之道皆具豈特人事而已哉曰明吉凶則悔吝可知然剛柔變化自為易之二道相因而生故各有象獨辭無象故不言也剛之極則柔晝之極則夜所以剛柔象晝夜也易説漢上朱氏曰聖人設卦本以觀象不言而見吉凶自伏羲至於堯舜文王近者同時逺者萬有千嵗其道如出乎一人觀象而自得也聖人憂患後世懼觀之者其智有不足以知此於是擊之卦辭又擊之爻辭以明告之非得已也為觀象而未知者設也爻有剛柔剛柔相推而生變化變化微矣非辭何以明之象與辭反覆相發也是故辭之有吉凶者人有得失之象也辭之有悔吝者人有憂虞之象也失得者剛柔相文有當否也失者能憂虞之俄且得矣得者憂虞有不至焉俄且失矣悔其失者或致吉吝其失者或致凶變化也變化之於剛柔猶進退之於晝夜晝推而進則夜退柔者變而剛夜推而進則晝退剛者化而柔晝夜之進退無止剛柔之變化不窮憂虞異情得失殊致故曰吉凶悔吝生乎動變化者動爻也六爻之動三極之道也一生二二生三三極矣邵雍曰易有貞數三是也關子明曰天三數之極也極乎終則反乎始兼兩之義也故極而不變其道乃窮説卦震其究為健三變而乾也巽其究為躁三變而震也觀此可以例餘卦矣易傳易之為道天地之道邪人之道邪易兼明之矣擊辭焉而明吉凶明人道也剛柔相推而生變化明天地之道也象非見天下之賾者不足以明之故聖人設卦觀象所謂吉凶剛柔變化無非象也得失之初微於毫髮及其有吉有凶則得失之象見矣憂慮虞度躊躇而不決者得失未判之時也及其有悔有吝而憂虞之象見矣凡此者明乎人之道也隂陽進退於子午孰知其然哉萬物蕃鮮而搖落則進退之象見矣所謂變化者不盡於是也此特其凡耳糾錯相紛死生相纒無非其變化也故曰變化者進退之象也日之升降於太空之中本無晝夜由地上而觀之則出乎地為晝入乎地為夜然南極大暑北極大寒東西出入之際晝夜長短與中國自不同故剛柔之象亦然自六位觀之初為剛二為柔三為剛四為柔五為剛六為柔自隂陽之數觀之七九為剛六八為柔老陽之剛變為隂柔老隂之柔變為陽剛故曰剛柔者晝夜之象也凡此者明乎天地之道也吉凶也悔吝也變化也剛柔也四象之見動於六爻之中而六爻之動不過乎三三者極之道也蓋有天地斯有萬物是以卦之變不過乎三六位者重三也九數者三三也邵康節曰易有貞數三是也是故君子所居而安者易之序也其安於髙卑貴賤之位乎所樂而玩者爻之辭也其玩於吉凶悔吝之辭乎若夫有為有行動而之焉則觀乎剛柔變化而吉凶悔吝之來可以前知矣夫髙卑貴賤吉凶悔吝剛柔變化無非天地也吾之動靜不離乎此則福自己求命自我作天地其不祐乎叢説新安朱氏曰象者物之似也此言聖人作易觀卦爻之象而擊以辭也言卦爻隂陽迭相推蕩而隂或變陽陽或化隂聖人所以觀象而擊辭衆人所以因蓍而求卦者也吉凶悔吝者易之辭也得失憂虞者事之變也得則吉失則凶憂虞雖未至凶然已足以致悔而取羞矣蓋吉凶相對而悔吝居其中間悔自凶而趨吉吝自吉而向凶也故聖人觀卦爻之中或有此象則擊之以此辭也柔變而趨於剛者退極而進也剛化而趨於柔者進極而退也既變而剛則晝而陽矣既化而柔則夜而隂矣六爻初二為地三四為人五上為天動即變化也極至也三極天地人之至理三才各一太極也此明剛柔相推以生變化而變化之極復為剛柔流行於一卦六爻之間而占者得因所值以斷吉凶也並本義聖人設卦觀象至生變化三句是題目下面是解説這箇吉凶悔吝自大説去小處變化剛柔自小説去大處吉凶悔吝説人事變化剛柔説卦畫從剛柔而為變化又自變化而為剛柔所以下箇變化之極者未到極處時未成這箇物事變似那一物變時從萌芽變來成枝成葉化時是那消化了底意思剛柔相推是説隂陽二氣相推八卦相蕩是説竒耦雜而為八卦在天則剛柔相推在易則八卦相蕩然皆自易言吉凶悔吝四者正如剛柔變化相似四者循環周而復始悔了便吉吉了便吝吝了便凶凶了便悔正如生於憂患死於安樂相似蓋憂苦患難中必悔悔便是吉之漸及至吉了少間便安意肆志必至做出不好可羞吝底事出來吝便是凶之漸矣及至凶矣又却悔只管循環不已正如剛柔變化剛了化化了柔柔了變變便是剛亦循環不已吉似夏吝似秋凶似冬悔似春吉凶悔吝之象吉凶是兩頭悔吝在中間悔自凶而趨吉吝自吉而趨凶悔是做得過便有悔吝是做得這事軟了下稍無收殺不及故有吝剛過當為悔柔過當為吝過便悔不及便吝變化者進退之象是剛柔之未定者剛柔者晝夜之象是變化之已成者蓋柔變而趨於剛是退極而進剛化而趨於柔是進極而退既變而剛則晝而陽既化而柔則夜而隂猶言子午卯酉卯酉是隂陽之未定子午是隂陽之已定又如四象之有老少故此兩句惟以子午卯酉言之則明矣然陽化為柔只恁地消縮去無痕迹故曰化隂變為剛是其勢寖長有頭面故曰變此亦見隂半陽全陽先隂後陽之輕清無形而隂之重濁有迹也銖曰隂陽以氣言剛柔以質言既有卦爻可見則當以質言而不得以隂陽言矣故彖辭多言剛柔不言隂陽不知是否曰是問變化者進退之象與化而裁之存乎變曰這變化字又相對説那化而裁之存乎變底變字又説得來重如云幽則有鬼神鬼神本皆屬幽然以鬼神二字相對説則鬼又屬幽神又自屬明變化相對説則變是長化是消問消長皆是化否曰然也都是變更問此兩句疑以統體言則皆是化到換頭處便是變若相對言則變屬長化屬消化則漸漸化盡以至於無變則驟然而長變則自無而有化是自有而無問本義解吉凶者失得之象也一段下云剛柔相推而生變化變化之極復為剛柔流行乎一卦六爻之中而占者得因其所值以為吉凶之決竊意在天地之中隂陽變化無窮而萬物得因之以生生在卦爻之中九六變化無窮而人始得因其變以占吉凶曰易自是占其變若都變了只一爻不變則反以不變者為主或都全不變則不變者又反是變也並語録嘗謂五行成數去其地十之土而不用則七八九六而已陽竒隂偶故七九為陽六八為隂陽進隂退故九六為老七八為少然陽極於九則退八而為隂隂極於六則進七而為陽一進一退循環無端此揲蓍之法所以用九六而不用七八蓋取其變也只以此説推之似無窒礙文集是故君子所居而安者易之序也所樂而玩者爻之辭也是故君子居則觀其象而玩其辭動則觀其變而玩其占是以自天祐之吉無不利伊川先生曰六爻之動以位為義乃其序也得其序則安矣辭所以明義玩其辭義則知其可樂也觀象玩辭而能通其意觀變玩占而能順其時動不違於天矣經説得於辭不達其意者有矣未有不得於辭而能通其意者也易傳序橫渠先生曰序猶言分也易之中有貴有賤有吉有凶皆其自然之分也所居皆安之君子安分也所樂而玩者爻之辭言君子未嘗須臾學不在易玩玩習也每讀則每有益所以可樂占非卜筮之謂但事在外可以占驗也觀乎事變斯可以占矣蓋居則觀其象而玩其辭此所以動則觀其變而玩其占也並易説龜山楊氏曰觀象玩辭故能明吉凶之變觀變玩占故能識時措之宜所以盡三極之道也會通白雲郭氏曰上言聖人謂作易之聖人也此言君子謂玩易之君子也有聖人作易如彼故君子玩之如此非獨明作易之道亦所以垂玩易之法又以見非聖人不能作易而君子之成德玩易之所致也然玩易有二道一則所居而安者易之序所樂而玩者爻之辭是也一則居則觀其象而玩其辭動則觀其變而玩其占是也易之序者卦之序也序有時在其中故君子居其時而安之者得其序也如居否之時則儉德辟難居既濟之時則思患豫防之是以安也爻之辭所以明道也道非樂玩其辭則不可得而見故因介於石而有得於知幾之神因鳴鶴在隂而有得於樞機之慎舉爻辭尚樂而玩則卦辭為可知矣此其一也其二則聖人又明居處動作之有異不可以一塗盡其道方居之時無所營為故觀易之象以明時玩易之辭以探道及動之後悔吝攸生故觀其變以知善惡玩其占以明吉凶是以君子常吉而天祐之者蓋於所居所樂一動一靜之際莫非以易道自處非天私君子而祐之實自致也占不獨著龜也凡極數知來皆占也謂占於易之道也前章終於天下之理得而成位乎其中謂在上尊位之聖人也不曰聖人而曰賢人謂能法乾坤易簡非獨聖人可得天下之理賢者亦可修而得也此章終於君子玩易蓋兼上下窮通之君子其玩易皆一也稱君子兼聖賢言之易説漢上朱氏曰是故君子所居而安者易貴賤之序也所樂而玩者爻吉凶之辭也居則觀其卦之象而玩其辭動則觀其爻之變而玩其占易以變為占於占言變則居之所玩未變之辭也居處動作無非道也天人一理也是故自天祐之吉無不利易傳新安朱氏曰易之序謂卦爻所著事理當然之次第玩者觀之詳象辭變已見上凡單言變者化在其中占謂其所值吉凶之決也並本義問所居而安者易之序也與居則觀其象之居不同上居字是總就身之所處而言下居字是靜對動而言曰然問居則觀其象玩其辭動則觀其變玩其占如何曰若是理會不得却如何占得必是間常理會得此道理到用時便占老隂老陽交而生艮兑少隂少陽交而生震巽離坎不交各得本畫離坎之交是第二畫在生四象時交了老陽過去交隂老隂過來交陽便是兑艮第三畫少隂少陽交便生震巽上第三畫所以知其如此時他這位次相挨旁兼山謂聖人不分别隂陽老少卜史取動爻之後卦故分别老少若如此則卦遂無動占者何用觀變而玩占並語録右第二章新安朱氏本義曰此章言聖人作易君子學易之事合訂刪補大易集義粹言卷六十九
