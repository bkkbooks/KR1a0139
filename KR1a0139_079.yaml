body:
  text: 合訂刪補大易集義粹言卷七十七頭等侍衛納喇性德編是故易者象也象也者像也彖者材也爻也者效天下之動者也是故吉凶生而悔吝著也廣漢張氏曰易者道也夫道也者臣不能告之於君父不能告之於子以其不可告之於人故象以像之乃所以盡其意也是以易者象也言其無適而非象也謂之象者乃所以象此以告人者歟且以八卦論之近取諸身象乾以首象坤以腹而又逺取諸物象乾以馬象坤以牛引而伸之觸類而推之無適而非象也至於彖則統論卦義如木之有材或主一爻所在或言二體相與其終始本末兼該具備智者思過半矣至於爻則盡其趨時之變所以效天下之動或以陽居隂或以隂居陽或以貞吉而征凶或以征吉而貞凶其周流六虛不可為典要此君子動則觀其變者雖然易者象也象也者像此者也謂之彖則言其象之材而已謂之爻則言其象之變而已至於吉凶則悔吝著也故悔者有改過之意至於吉則悔之著也吝者有文過之意至於凶則吝之著也故悔吝者小疵而吉凶則言乎失得至於吉凶乃悔吝之昭著而不可掩者也易説白雲郭氏曰易之為書卦象莫知後先雖聖人觀象以設卦卦立而象復見於後故易之為書象而已象也者所以像天下之有象者也彖爻皆出於卦象已立之後彖所以內明一卦之材爻所以外效天下之動爻立然後吉凶生而悔吝著此成易之序也易説漢上朱氏曰動於人情見於風氣者有是時必有是象易者象也易之有象擬諸其形容而已猶繪畫之事雕刻之工一毫損益則不相似矣象之辭又謂之彖者言乎其材也卦有剛柔材也有是時有是象必有是材以濟之材與時會斯足以成務矣然天下之動其微難知有同是一時同處一事所當之位有不同焉則趨舍進退殊途矣故曰爻者效天下之動也是以卦同爻異趣時之變不得而同然所歸則若合符節故自伏羲神農黃帝堯舜凡六萬一千四百有餘嵗而行十三卦而已夫爻動則有吉凶悔吝吉凶者所以生大業也吉凶生而悔吝著其動可不慎乎易傳新安朱氏曰易卦之形理之似也彖言一卦之材效放也悔吝本微因此而著並本義問易者象也四句莫只是解箇象字否曰象是解易字像又是解象字材又是解彖字末句意亦然易者象也象也者像也只是髣佛説不可求得太深易者象也是總説起言易不過只是隂陽之象下云像也材也天下之動也則皆是説那上面象字問易之象似有三樣有本畫自有之象如竒畫象陽偶畫象隂是也六十四卦之爻一爻各是一象有實取諸物之象如乾坤六子以天地雷風之類象之是也有只是聖人以意自取那象來明是義者如白馬翰如載鬼一車之類是也實取諸物之象決不可易若聖人姑假是象以明義者當初若别命一象亦通得不知是如此否曰聖人自取之象也不見得如此而今且只得因象看義若恁地説則成穿鑿了他所以有象底意思不可見却只好就他那象上推求道理前輩也曾説易之取象如詩之比興如此却是虛説恐不然如田有禽須是此爻有此象今但不可考耳嘗得郭子和書云其先人説不獨是天地雷風水火山澤謂之象只是卦畫便是象也説得好川壅為澤兊為澤澤是水不流底坎下一畫閉合時便成兊卦便是川壅為澤之象卦中要看得親切須是兼象有但象不傳了鄭東卿易傳專取象如以鼎為鼎革為爐小過為飛鳥亦有義理問卦下之辭為彖辭左傳以為繇辭何也曰此只是彖辭故孔子曰智者觀其彖辭則思過半矣如元亨利貞乃文王所繫卦下之辭以斷一卦之吉凶此名彖辭彖斷也陸氏音中語所謂彖之經也大哉乾元以下孔子釋經之辭亦謂之彖所謂彖之傳也爻下之辭如潛龍勿用乃周公所繫之辭以斷一爻之吉凶也並語録又曰易之有象其取之有所從其推之有所用非茍為寓言也然兩漢諸儒必欲究其所從則既滯泥而不通王弼以來直欲推其所用則又疏略而無據二者皆失之一偏而不能闕其所疑之過也且以一端論之乾之為馬坤之為牛説卦有明文矣馬之為健牛之為順在物有常理矣至於案文責卦若屯之有馬而無乾離之有牛而無坤乾之六龍則或疑於震坤之牝馬則當反為乾是皆有不可曉者是以漢儒求之説卦而不得則遂相與創為互體變卦五行納甲飛伏之法參互以求而幸其偶合其説雖詳然其不可通者終不可通其可通者又皆傅會穿鑿而非有自然之勢惟其一二之適然而無待於巧説者為若可信然上無所關於義理之本原下無所資於人事之訓戒則又何必苦心極力以求於此而欲必得之哉故王弼曰義茍應健何必乾乃為馬爻茍合順何必坤乃為牛而程子亦曰理無形也故假象以顯義此其所以破先儒膠固支離之失而開後學玩詞玩占之方則至矣然觀其意又似直以易之取象無復有所自來但如詩之比興孟子之譬喻而已如此則是説卦之所作為無所與於易而近取諸身逺取諸物者亦剩語矣故疑其説亦若有未盡者因竊論之以為易之取象固必有所自來而其為説必已具於大卜之官顧今不可復考則姑闕之而直據辭中之象以求象中之意使足以為訓戒而決吉凶如王氏程子與吾本義之云者其亦可矣固不必深求其象之所自來然亦不可直謂假設而遽欲忘之也易象説右第三章陽卦多隂隂卦多陽其故何也陽卦竒隂卦耦其德行何也陽一君而二民君子之道也隂二君而一民小人之道也康節先生曰乾竒也陽也健也故天下之健莫如天坤耦也隂也順也故天下之順莫如地所以順天也震起也一陽起也起動也故天下之動莫如雷坎陷也一陽陷於二隂陷下也故天下之下莫如水艮止也一陽於是而止也故天下之止莫如山巽入也一隂入二陽之下故天下之入莫如風離麗也一隂離於二陽其卦錯然成文而華麗也天下之麗莫如火故又為附麗之麗兊説也一隂出於外而説於物故天下之説莫如澤觀物外篇橫渠先生曰一其歸者君子之道多以御一作禦者小人人之理陽遍體衆隂衆隂共事一陽理也是故二君共一民一民事二君上與下皆小人之道也一君而體二民二民而宗一君上與下皆君子之道也易説廣漢張氏曰震坎艮皆陽卦也然其畫皆一陽而二隂巽離兊皆隂卦也然其畫皆一隂而二陽此其所因者何也三陽之卦皆資乾之一體而成故其數竒以大而竒者為之主也三隂之卦皆資坤之一體而成故其數耦以小而耦者為之主也本其所得之德所行之行而言之則陽一君而二民以大者宜在上也隂二君而一民以小者宜在下也大者在上故能進陽而抑隂長君子而卑小人是以為君子之道也小者在下則隂進於陽而陽退聽焉小人乘時射利而君子伏焉是以為小人之道也易説白雲郭氏曰陽宜其多陽也隂宜其多隂也今則反是其故何也陽以竒為主隂以耦為主隂陽德行又何也此聖人設問之意也凡隂陽二卦皆以陽為君一君而二民者其道順也順故為君子二君而一民者其道逆也逆則為小人其故其德行以是而知也橫渠先生曰一其歸者君子之道多以御者小人之理易説漢上朱氏曰凡得乎乾者為陽卦震坎艮是也凡得乎坤者為隂卦巽離兊是也陽卦以竒為本故多隂隂卦以耦為本故多陽本不可二也隂陽二卦其德行不同何也陽一君而遍體二民二民共事一君一也故為君子之道隂卦一民共事二君二君共爭一民二也故為小人之道陽貴隂賤晝人多福夜人多禍故君子貴夫一也易傳新安朱氏曰震坎艮為陽卦皆一陽二隂巽離兊為隂卦皆一隂二陽凡陽卦皆五畫凡隂卦皆四畫君謂陽民謂隂本義二君一民試教一箇民而有兩箇君看是甚模樣語録右第四章易曰憧憧往來朋從爾思子曰天下何思何慮天下同歸而殊塗一致而百慮天下何思何慮日往則月來月往則日來日月相推而明生焉寒往則暑來暑往則寒來寒暑相推而嵗成焉往者屈也來者信也屈信相感而利生焉尺蠖之屈以求信也龍蛇之蟄以存身也精義入神以致用也利用安身以崇德也過此以往未之或知也窮神知化德之盛也康節先生曰精義入神以致用也不精義則不能入神不能入神則不能致用也觀物外篇明道先生曰息訓為生者蓋息則生矣一事息則一事生中無間斷碩果不食則便為復也寒往則暑來暑往則寒來寒暑相推而嵗成焉語録窮神知化化之妙者神也劉絢師訓伊川先生曰天下何思何慮天下同歸而殊塗一致而百慮天下何思何慮夫子因咸極論感通之道夫以思慮之私心感物所感狹矣天下之理一也塗雖殊而歸則同慮雖百而其致極則一雖物有萬殊事有萬變統之以一則無能違者故貞其意則窮天下無不感通焉故曰天下何思何慮用其思慮之私心豈能無所不感也日往則月來月往則日來日月相推而明生焉寒往則暑來暑往則寒來寒暑相推而嵗成焉往者屈也來者信也屈信相感而利生焉此以往來屈信明感應之理屈則有信信則有屈所謂感應也故日月相推而生明寒暑相推而成嵗功用由是而成故曰屈信相感而利生焉感動也有感必有應凡有動皆為感感則必有應所應復為感感復有應所以不已也尺蠖之屈以求信也龍蛇之蟄以存身也精義入神以致用也利用安身以崇德也過此以往未之或知也前云屈信之理矣復取物以明之尺蠖之行先屈而後信蓋不屈則無信信而後有屈觀尺蠖則知感應之理也龍蛇蟄藏所以存息其身而後能奮迅也不蟄則不能奮迅矣動息相感乃屈信也君子潛心精微之義入於神妙所以致其用也潛心精微積也致用施也積與施乃屈信也利用安身以崇德也承上文致用而言利其施用安處其身所以崇大其德業也所為合理則事正而身安聖人能事盡於此矣故云過此以往未之或知也窮神知化德之盛也既云過此以往未之或知更以此語結之云窮極至神之妙知化育之道德之至盛也無加於此矣易傳近取諸身其間闔闢往來見之鼻息然不必須假吸復入以為呼氣則自然生人氣之生生於真元天之氣亦自然生生不窮至如海水因陽盛而涸及隂盛而生亦不是將已涸之氣却生水自然能生往來屈伸者只是理也盛則便有衰晝則便有夜往則便有來天地中如洪爐何物不消鑠了聖人之道更無精粗從灑掃應對至精義入神通貫只一理雖灑掃應對只看所以然者如何並入關語録近取諸身百理皆具屈伸往來之義只於鼻息之間見之屈信往來只是理不必將既屈之氣復為方信之氣生生之理自然不息如復言七日來復其間元不斷續陽已復生物極必返其理須如此有生便有死有始便有終尹彥明編易聖人所以立道窮神則無易矣遊定夫録問窮神知化由通於禮樂何也曰此句須是自家體認一作玩索人往往見禮壞樂崩便謂禮樂亡然不知禮樂未嘗亡也如國家一日存時尚有一日之禮樂蓋由有上下尊卑之分也除是禮樂亡盡然後國家始亡雖盜賊至所謂不道者然亦有禮樂蓋必有總屬必相聽順乃能為盜不然必叛亂無統不能一日相聚而為盜也禮樂無處無之學者要須識得劉元承手編釋道所見偏非不窮深極微也至窮神知化則不得與矣鄒德久所録橫渠先生曰正惟存神爾不能利用使不思不勉執多以御故憧憧之心勞而德喪矣將陳恬智交飬故序日月寒暑屈信相感之義也君子行義以達其道精一於義使不思而得不勉而中如介于石故能見幾而作天下何思何慮明屈信之變斯盡之矣日月相推而明生焉寒暑相推而嵗成焉神易無方體一隂一陽不測皆所謂通乎晝夜之道也屈信相感而利生感以誠也情偽相感而利害生雜之偽也精義入神事豫吾內求利吾外也利用安身素利吾外致飬吾內也窮神知化乃飬成自然非思勉之能強故崇德而外君子未或致知也精義入神飬之至也義以經為本經正則精仁以敦化為深化行則顯義入神動一靜也仁敦化靜一動也仁敦化則無體義入神則無方何思何慮行其所無事而已下文皆是一意行其所無事惟務崇德但妄意有意則非行其所無事行其所無事則是意必固我已絶今天下無窮動靜情偽止一屈信而已在我先行其所無事則復何事之有日月寒暑之往來尺蠖之屈龍蛇之蟄莫非行其所無事是以惡其鑿也百慮而一致先得此一致之理則何用百慮慮雖百卒歸乎理而已此章憧憧往來要其有心至於德之盛也率本此意咸之九四有應在初思其朋是咸其心也不言心而言心之事不能虛以受人乃憧憧而致其思咸道失矣憧憧往來心之往來也不能虛以接物而有所系著非行其所無事也精義入神豫而已學者求聖人之學以備所行之事今日先撰次來日所行必要作事如此若事在一月前則自一月前栽培挨排則至是時有備言前定事前定皆在於此積纍乃能有功天下九經自是行之者也惟豫而已撰次豫備乃擇義之精若是則何患乎物至事來精義入神須從此去豫則事有備備則用利用利則身安凡人應物無節則往往自失故要在利用安身益以飬德也若夫窮神知化則是德之盛故云未之或知蓋大則猶可勉而至大而化則必熟化即達也精義入神以致用謂貫穿天下義理有以待之故可推用窮神是窮盡其神也入神是僅能入於神也言入如自外而入義固有淺深精義入神要得盡思慮臨時無疑精義入神固不待接物然君子何嘗不接物人則見君子間坐獨處不知君子接物在其中睡雖不與物接然睡猶是成熟者知幾其神精義入神皆豫之至也豫者見事於未萌豫即神也精義入神利用安身此大人之事大人之事則在思勉力行可以擴而至之未之或知以上事是聖人德盛自致非思勉可得猶大而化之大則人為可勉也化則待利用安身以崇德然後德盛仁熟自然而致也故曰窮神知化德之盛也自是别隔為一節義有精粗窮理則至於精義若精義盡性則是入神蓋為一故神通天下為一物在己惟是要精義入神所存能靜而不能動者此則存博學則利用用利則身安身安所以崇其德也所應皆善應過則所存者復神德盛者神化可以窮盡故君子崇之一作窮理盡性化事之變也大可為也大而化不可為也在熟而已易謂窮神知化乃德盛仁熟之致非智力能強也形而上者得辭幾得象矣夫神為不測故緩詞不足以盡神化為難知故急詞不足以體化易所以明道窮神則無易矣見幾則義明動而不括則用利屈信順理則身安而德滋窮神知化與天為一豈有我所能勉哉正蒙有乃德盛而自致爾一句能照物須放心寬快公平以求之乃可見道况德性自廣大易曰窮神知化德之盛也豈淺心可得並易説天之為德虛而善應其應非思慮聰明可求故謂之神老氏況諸谷以此大虛者氣之體氣有隂陽屈信相感之無窮故神之應無窮其散無數故神之應也無數雖無窮其實湛然雖無數其實一而已物無孤立之理非同異屈信終始以發明之則雖物非物也事有始卒乃成非同異有無相感則不見其成不見其成則雖物非物故一屈信相感而利生焉無不容然後盡屈信之道至虛則無所不信矣君子先所爭知幾於屈信之感而已精義入神交信於不爭之地順莫甚焉利莫大焉事豫則立必有教以先之盡教之善必精義以研之精義入神然後立斯立動斯和矣易簡理得則知幾知幾然後經可正天下達道五其生民之大經乎經正則道前定事豫立不疑其所行利用安身之要莫先焉天道不窮寒暑已衆動不窮屈信已鬼神之實不越二端而已矣氣有陽隂推行有漸為化合一不測為神其在人也知義用利則神化之事備矣德盛者窮神則知不足道知化則義不足大矣神化者天之良能非人能故大而位天德然後能窮神知化雷霆感動雖速然其所由來亦漸爾能窮神化所從來德之盛者歟至誠天性也不息天命也人能至誠則性盡而神可窮矣不息則命行而化可知矣學未至知化非真得也並正蒙求心之始如有所失久思則茫然復失何也夫求心不得其要鑽研太甚則惑心之要只是欲平曠熟後無心如天簡易不已今有心以求其虛則是已起一心無由得虛切不得令心煩求之太切則反昏惑有心所謂助長也孟子亦只言存飬而已此非可以聰明思慮力所能致也然而得博學於文以求義理則亦動其心乎夫思慮不違是心而已尺蠖之屈以求信也龍蛇之蟄以存身也精義入神以致用也利用安身以崇德也此交相飬之道夫屈者所以求信也勤學所以修身也博文所以崇德也惟博文則可以力致人平居又不可以全無思慮須是考前言往行觀昔人制節如此以行其是而已故動焉而無不中理大中謂之皇極蓋過則便非善不及亦非善此極善是顔子所求也所以瞻之在前忽焉在後夫子髙逺處又要求精約處又要至顔子之分必是入神處又未能精義處又未至然顔子雅意則直要做聖人學者須是學顔子義集須是博文博文則用利用利即身安到身安處却要資飬此得精義者脫然在物我之外並經學理窟龜山楊氏曰易於咸卦初六言咸其拇六二言咸其腓九三言咸其股九五言咸其脢上六言咸其輔頰舌至於九四一爻由一身觀之則心是也獨不言心其説以謂有心以感物則其應必狹矣惟無心而待物之感故能無所不應其繇辭曰貞吉悔亡憧憧往來朋從爾思夫思皆緣其類而已不能周也所謂朋從者以類而應故也故孔子繫辭曰天下何思何慮天下同歸而殊塗一致而百慮天下何思何慮夫心猶鏡也居其所而物自以形來則所鑒者廣矣若執鏡隨物以度其形其照幾何或曰思造形之上極過是非思之所能及故唯天下之至神則無思也無思所以體道有思所以應世此為不知易之義也易所謂無思者以謂無所事乎思云耳故其於天下之故感而通之而已今而曰不可以有思又曰不能無思此何理哉荆州語録繫辭曰易無思也無為也寂然不動感而遂通天下之故非天下之至神其孰能與於此夫自至神而下蓋未能無思也惟無思為足以感通天下之故而謂無思土木也可乎此非窮神知化未足與議也或問道不同不相為謀道一而已不同者何説答曰天下殊塗而同歸故道有不同者塗雖殊其歸則同道不同其趨則一也若伯夷伊尹之去就則難相為謀矣並答胡德輝問夫精義入神乃所以致用利用安身乃所以崇德此合內外之道也天下之物理一而分殊知其理一所以為仁知其分殊所以為義權其分之輕重無銖分之差則精矣答胡康侯書已上三條增廣漢張氏曰思者索其所欲慮者防其所惡思而有所欲慮而有所惡皆生於心之有妄也此咸九四所以憧憧於兩剛之間有求而往有求而來朋從爾思有所繫慮不能無心而待物又安知天下本同歸也而人自殊塗本一致也而人自百慮故日月以往來而明生寒暑以往來而嵗成尺蠖以屈而致信龍蛇以蟄而存身故天地之道日月寒暑任氣之自運初無思慮也萬物之理尺蠖龍蛇委形之自然初無思慮也是以達乎此理故精義入神以致用此能為可用也利用安身以崇德此不求其必用也始焉精義入神以致吾身之用及夫利用宜乎為用所惑亟於求用矣乃安身以崇德此得乎同歸一致之理而明乎何思何慮者也雖然此特有用之可名也故日月寒暑則運此者也尺蠖龍蛇則由此者也精義入神以致用則造此而極其自得者也利用安身以崇德則覺此而極其髙明者也故過此以往則雖聖人自為不敢知焉未之或知者猶書所謂我不敢知是也所以窮神知化而造於德之盛焉易説上蔡謝氏曰或問太虛無盡心有止安得合一曰心有止只為用他若不用則何止吾丈莫己不用否曰未到此地除是聖人便不用當初曽發此口被伊川一句壞了二十年前曾往見伊川伊川曰近日事如何某對曰天下何思何慮伊川曰是則是有此理賢却發得太早在問當初發此語時如何曰見得這箇事經時無他念接物亦應副得去問如此却如何被一句轉却曰當初終須有不透處當初若不得他一句救拔便入禪家去矣伊川直是會煅煉得人説了又却道恰好著工夫也語録白雲郭氏曰自憧憧往來至莫益之十一義皆明聖人所以玩易之辭蓋將致用於天下以終上篇擬議之道也道以用為大故聖人以中庸為至者道之用也自一心之正推而及乎天下自一性之盡推而至於盡物皆用也所謂精義入神以致用者此也且以咸卦論之則憧憧往來朋從爾思言其志意未定也孔子於此雖論何思何慮而極天下往來之理而論之則知爻辭往來二字非徒然也是所謂玩辭也且往來理之常也有往必有來有來必有往理勢之相感然也往而不來來而不往理無是也知往來之説則凡憧憧往來相感無定固有理存不必皆從爾思也惟知同歸殊塗一致百慮則天下何思何慮矣蓋朋從爾思者爾所感也不從爾思者非爾所感其往來自相感也日月寒暑是也有以屈信相感者尺蠖龍蛇是也有以精義相感而致用者聖人是也此雖殊塗而同歸於感也又何必朋從爾思乎故日月往來則明生寒暑往來則嵗成尺蠖之屈知其必信龍蛇之蟄知其必神然則聖人精義入神豈用以寂然而已哉必將致用於天下利用安身豈用以私一己而已哉必將崇德而廣業是皆往來屈信相感而利生出於自然者也夫惟有往來之感故天下之有成者在是焉有屈信之感故天下之致利者在是焉聖人內明屈信以成已故足以利用安身外窮往來以成物故足以窮神知化所以兼日月寒暑之成與夫尺蠖龍蛇之利也然非往則不來非屈則不信非精義入神則不能致用過此以往皆非聖人致用之道是以聖人未之或知也蓋謂繁而見於事物者也若是則窮神之妙知化之極非聖人盛德孰能與此觀乾之初九潛龍勿用至九五而後飛龍在天此所謂屈信相感精義入神以致用者也易説五峰胡氏曰夫理不窮則物情不盡物情不盡則擇義不精義不精則用不妙用不妙則不能所居而安居不安則不能樂天不能成其身矣故學必以窮極物理為先也與張欽夫書漢上朱氏曰咸九四曰憧憧往來朋從爾思者勞神明以為一也夫思之所及朋則從之思之所不及其誰從乎雖憧憧於往來之間其從亦狹矣不知天下何思何慮萬物即一一即萬物同歸而有殊塗一致而具百慮其一既通萬物自應豈思慮營營之所至哉且日月寒暑一往一來自異者觀之兩也相推而生明相推而成嵗自同者觀之一也自往自來其誰使之往者屈也來者信也一屈一信默然相感而利生焉尺蠖不屈則不能信龍蛇不蟄則不能存消息循環相待而為用夫致用在於精義義則無決擇無取舍惟其宜而已精一於義則進而入於不可知之神故感而後動其動也天其用利矣逰乎人間物莫之傷其身安矣利用安身日進無疆德不期於崇而自崇矣此吾之所知也過此以往則化矣如日月有明容光必照寒暑相代萬物自生日月寒暑所不能知也故曰聖人有所不知焉聖人有所不能焉然則所謂化者終不可知歟曰窮神之所為則知化矣德盛者自至焉道至於此萬物與我一也故曰一則神兩則化窮神則知變化之道易傳新安朱氏曰此引咸九四爻辭而釋之言理本無二而殊塗百慮莫非自然何以思慮為哉必思而從則所從者亦狹矣言往來屈信皆感應自然之常理加憧憧焉則入於私矣所以必思而後有從也因言屈信往來之理而又推以言學亦有自然之機也精研其義至於入神屈之至也然乃所以為出而致用之本利其施用無適不安信之極也然乃所以為入而崇德之資內外交相飬互相發也下學之事盡力於精義利用而交飬互發之機自不能已自是以上則亦無所用其力矣至於窮神知化乃德盛仁熟而自致耳然不知者往而屈也自致者來而信也是亦感應自然之理而已張子曰氣有隂陽推行有漸為化合一不測為神此上四節皆以釋咸九四爻義並本義天下何思何慮謂雖萬變之紛紜而所以應之各有定理不假思慮而知也天下何思何慮一句便是先打破那箇思字却説同歸殊塗一致百慮又再説天下何思何慮謂何用如此憧憧往來而為此朋從之思也日月寒暑之往來尺蠖龍蛇之屈信皆是自然底道理不往則不來不屈則亦不能信也今之為學亦只是如此精義入神用力於內乃所以致用乎外利用安身求利於外乃所以崇德乎內只是如此做將去雖至於窮神知化地位亦只是德盛仁熟之所致何思何慮之有問天下同歸殊塗一致百慮何不云殊塗而同歸百慮而一致曰也只一般但他是從上説下自合如此乾乾不息者體日往月來寒來暑往者用有體則有用有用則有體不可分先後説天下何思何慮一假此是言自然而然如精義入神自然致用利用安身自然崇德問天下同歸而殊塗一章言萬變雖不同然皆是一理之中所自有底不用安排曰此只説得一頭尺蠖若不屈則不信得身龍蛇若不蟄則不伏得氣如何存得身精義入神疑與行處不相關然而見得道理通徹乃所以致用利用安身亦疑與崇德不相關然而動作得其理則德自崇天下萬事萬變無不有感通往來之理又曰日往則月來一假乃承上文憧憧往來而言往來皆人所不能無者但憧憧則不可或問尺蠖之屈以求信也伊川説是感應如何曰屈一屈便感得那信底信又感得那屈底如呼吸出入往來尺蠖屈便要求信龍蛇蟄便要存身精研義理無毫釐絲忽之差入那神妙處這便是要出來致用外面用得利而身安乃所以入來自崇已德致用之用即是利用之用所以橫渠云精義入神事豫吾內求利吾外利用安身素利吾外致飬吾內事豫吾內言曾到這裏來且如精義入神如何不思那致用底却不必思致用底是事功是效驗義至於精則應事接物之間無一非義不問小事大事千變萬化改頭換面出來自家應副他如利刃快劍相似迎刃而解件件判作兩邉去精義入神以致用也蓋惟如此然後可以應務未至於此則凡所作為皆出於私意之鑿冥行而已雖使或中君子不貴也精義入神正與利用安身為對其曰精此義而入於神猶曰利其用以安身耳義者宜而已矣物之有宜有不宜事之有可有不可吾心處之知其各有定分而不可易所謂義也精義者精諸此而已所謂精云者猶曰察之云爾精之之至而入於神則於事物所宜毫釐委曲之間無所不悉有不可容言之妙矣此所以致用而用無不利也利用安身今人循理則自然安利不循理則自然不安利未之或知是到這裏不可奈何窮神知化雖不從這裏面出來然也有這箇意思窮神知化德之盛也這德字只是上面崇德之德德盛後便能窮神知化便能聰明睿知皆由此出自誠而明相似窮神知化化是逐些子挨將去底一日復一日一月復一月節節挨將去便成一年這是化神是一箇物事或在彼或在此當在隂時全體在隂在陽時全體在陽都只是這一物兩處都在不可測故謂之神神化二字程子説得亦不甚明惟是橫渠推出來推行有漸為化合一不測為神又曰一故神兩故化注云兩在故不測這説得甚分曉並語録易曰困于石據于蒺藜入于其宫不見其妻凶子曰非所困而困焉名必辱非所據而據焉身必危既辱且危死期將至妻其可得見邪伊川先生曰二陽不可犯也而犯之以取困是非所困而困也名辱其事惡也三在二上固為據之然茍謙柔以下之則無害矣乃用剛險以乘之則不安而取困如據蒺藜也如是死期將至所安之主可得見乎易傳橫渠先生曰此明不能利其用者寡助之至親戚畔之易説廣漢張氏曰困人所不免也要在處之有道困而不失其所亨者乃為君子困之六三應於上六而上六無情屹然不動有類於石者也下乘於九二然九傷已有類於蒺藜者也有應於上將以求名今困于石此非所困而困焉名必辱也有依於下將以安身今據于蒺藜此非所據而據焉身必危也夫在困之時名辱身危有死之理此身不行道雖主饋之妻且不可見宜乎凶也易説白雲郭氏曰當困而困當據而據道之正也非所困非所據失道之正是以名辱身危也太甲所謂自作孽不可逭者也妻者至近而易保入宫必可見者也非所宜為而為之者終至於不能保其妻子尚安能保四海乎此所謂失道者寡助也易説漢上朱氏曰人孰不欲安其身或困于石而不知休據于蒺藜而不知避名既汙辱身既危殆日近于死亡雖欲安得乎哉妻且不得見也况朋從乎易傳新安朱氏曰釋困六三爻義本義問非所困而困焉名必辱大意謂石不能動底物自是不須去動他若只管去用力徒自困耳且以事言有著力不得處若只管著力去做少間做不成他人却道自家無能便是辱了名或曰若在其位則只得做曰自是如此爻意謂不可做底便不可入頭去做語録易曰公用射隼于髙墉之上獲之無不利子曰隼者禽也弓矢者器也射之者人也君子藏器於身待時而動何不利之有動而不括是以出而有獲語成器而動者也伊川先生曰鷙害之物在墉上茍無其器與不待時而發則安得獲之所以解之之道器也事之當解與已解之之道至者時也如是而動故無括結發而無不利矣括結謂阻礙聖人於此發明藏器待時之義也夫行一身至於天下之事茍無其器與不以時而動小則括塞大則喪敗自古喜有為而無成功或顛覆者皆由是也易傳橫渠先生曰此明能精義以致用者易説龜山楊氏曰君子藏器於身待時而動猶之有美玉於斯非韞櫝而不沽也待賈而已矣若夫求善賈而沽則取賤之道聖人不為也語解廣漢張氏曰解之六三以貪殘小人輒居髙位有隼居髙墉之象而上六韜已成之器乘可為之時故發強剛毅誅鋤強梗如摧枯拉朽動而不括出而有獲以解其悖戾之心者亦以成器而動故也易説白雲郭氏曰君子以道存諸已而困於外者在時是以藏器於身猶有待也括結也結則有閡凡無其道則括非其時則括動而不括然後出而有獲此章蓋語成器而後動動亦必有時焉故也藏器於身有其道也髙墉之上斯其時也易説漢上朱氏曰藏可用之器待可為之時動無結礙出則有獲惟乘屈信之理而其用利者能之易傳新安朱氏曰括結礙也此釋解上六爻義本義公用射隼孔子是發出言外意張欽夫説易謂只依孔子繫辭説便了如説公用射隼至成器而動者也只如此説便了固是如此聖人之意只恁地説不得緣在當時只理會得象數故聖人明之以理並語録子曰小人不恥不仁不畏不義不見利不動不威不懲小懲而大誡此小人之福也易曰屨校滅趾無咎此之謂也伊川先生曰人有小過校而滅其趾則當懲懼不敢進於惡矣故得無咎也繫辭云小懲而大誡此小人之福也言懲之於小與初故得無咎也易傳橫渠先生曰暗於事變者易説廣漢張氏曰仁義所以責於君子小人不以不仁為恥不以不義為畏夫仁義不足責故非利則不勸非威則不懲也人不知義而所見者利茍不早有以懲之則將至於無父無君其禍有不可勝言者此噬嗑之初九所以制之於其小屨校滅趾而使之不行乃小懲而大誡也使小人知所忌憚不敢肆其暴戾是乃小人之福也易説白雲郭氏曰小人非不知天下之所謂善惡亦非不知天下之禍福也蓋昧於善惡幾微之際故積而至於大惡以受天下之大禍者多矣聖人憫其愚而受禍也於是制刑以小懲之懲其小而誡於大則終無大惡大禍之虞是豈非小人之福哉此所以屨校滅趾於初然後終無咎也易説漢上朱氏曰小人不恥不仁故不畏不義陷於死亡辱及其先恥孰大焉雖愚也而就利避害與人同故見利而後勸威之而後懲小懲大誡猶為小人之福况真知義乎易傳新安朱氏曰此釋噬嗑初九爻義本義善不積不足以成名惡不積不足以滅身小人以小善為無益而弗為也以小惡為無傷而弗去也故惡積而不可掩罪大而不可解易曰何校滅耳凶伊川先生曰人之聾暗不悟積其罪惡以至於極古人制法罪之大者何以校為其無所聞知積成其惡故以校而滅其耳誡聰之不明也易傳廣漢張氏曰善之於惡皆曰積善固可欲也然不積亦未至於成名惡固可惡也然不積亦未至於滅身奈何小人以小善未足以成名而不為以小惡未足以滅身而不去終至惡積而不可掩罪大而不可解至於噬嗑上九何校滅耳凶由此觀之初之屨校滅趾使之不行者豈非小人之福乎易説白雲郭氏曰善惡之道皆積而至非一朝一夕之故積惡不已能無終凶乎明善惡之積知所當為知所當去斯謂之君子已夫易説漢上朱氏曰精於義者豈一日積哉彼積不善以滅其身者不知小善者大善之積也易傳新安朱氏曰此釋噬嗑上九爻義本義子曰危者安其位者也亡者保其存者也亂者有其治者也是故君子安而不忘危存而不忘亡治而不忘亂是以身安而國家可保也易曰其亡其亡繫于苞桑伊川先生曰漢王允唐李德裕不知此戒所以致禍敗也易傳橫渠先生曰明君子之見幾易説廣漢張氏曰否之九五休天下之否而天下已向於泰通之時也然古之人君在解則必思夙吉在既濟則必思豫防故人皆樂於安也乃安而不忘危人皆知其存也乃存而不忘亡人皆習於治也乃治而不忘亂如此則身安而國家可保故曰其亡其亡繫于苞桑夫審其亡之戒而繫之苞桑則根本固而不可動搖矣易説白雲郭氏曰安危存亡治亂蓋相代相生之道是以聖人居安慮危故終無危亡之患易説漢上朱氏曰夫身者國家之本存亡治亂之所繫身雖安矣猶不可恃也故安其位者危保其存者亡有其治者亂君子兢兢業業不恃其有故身安而國家可保國家保而德崇矣易傳新安朱氏曰此釋否九五爻義本義問危者以其位為可安而不知戒懼故危亡者以其存為可常保是以亡亂者是自有其治如有其善之有是以亂曰某舊也如此説看來保字説得較牽強只是常有危亡與亂之慮則可以安其位保其存有其治語録子曰德薄而位尊知小而謀大力小而任重鮮不及矣易曰鼎折足覆公餗其形渥凶言不勝其任也伊川先生曰居大臣之位當天下之任而所用非人至於覆敗乃不勝其任可羞愧之甚也其形渥謂赧汗也其凶可知繫辭曰德薄而位尊知小而謀力小小而任重鮮不及矣言不勝其任也蔽於所私德薄知小也易傳橫渠先生曰不知利用以安身者易説廣漢張氏曰古之人方其人君任用之際必自揣其才力可以勝其任乎然後膺人君顧託庶幾上不負其社稷下不負其生靈鼎之九四德薄而位尊知小而謀大力小而任重如鼎之折足其形流汗而凶也蓋不能自揣以勝其所任乎易説白雲郭氏曰道之用無施不可自一身至天下其用皆一安有不勝之患哉此論不勝其任者蓋因鼎而言也鼎器也於人才器之象也才器限量不同猶若鼎然故有不勝其任之凶君子不器則無限量矣故形而上者為道形而下者為器易説漢上朱氏曰位欲當德謀欲量知任欲稱力三者各當其實則用利而身安小人志在於得而已以人之國僥幸萬一鮮不及禍自古一敗塗地殺身不足以塞其責者本於不知義而已易傳新安朱氏曰此釋鼎九四爻義本義子曰知幾其神乎君子上交不諂下交不瀆其知幾乎幾者動之微吉之先見者也君子見幾而作不俟終日易曰介于石不終日貞吉介如石焉寧用終日斷可識矣君子知微知彰知柔知剛萬夫之望明道先生曰先見則吉可知不見故致凶朱公掞問學拾遺介于石理素定也理素定故見幾而作何俟終日哉李籲所録伊川先生曰夫見事之幾微者其神妙矣乎君子上交不至於諂下交不至於瀆者蓋知幾也不知幾則至於過而不已交於上以恭巽故過則為諂交於下以和易故過則為瀆君子見於幾微故不至於過也所謂幾者始動之微也吉凶之端可先見而未著者也獨言吉者見之於先豈復至有凶也君子明哲見事之幾微故能其介如石其守既堅則不惑而明見幾而動豈俟終日也斷别也其判别可見矣微與彰柔與剛相對者也君子見微則知彰矣見柔則知剛矣知幾如是衆所仰也故贊之曰萬夫之望易傳見幾而作不俟終日智之圓也李籲師説橫渠先生曰人道之用盡於接人而已諂瀆召禍理勢必然故君子俯仰之際直而好義知幾莫大焉知幾者為能以屈為信幾象見而未形也形則涉乎明不待神而後知也吉之先見云者順性命則所先皆吉也知幾其神由經正以貫之則寧用終日斷可識矣君子見其幾則隨有所處不可過也豈俟終日幾者動之微吉之先見者也夫幾則吉凶皆見特言吉者不作則已作則所求乎向吉豫之六二常不動故能得動之微不終日貞吉言速正則吉也六二以隂居隂獨無纍於四故其介如石雖體柔順以其在中而靜何俟終日必知幾而正矣常易故知險常簡故知阻君子見常不動故能得動之微君子見幾而作不俟終日茍見其幾則時處置不欲過何俟終日幾者動之微吉之先見特言吉者事則直求須向吉也觀其幾者善之幾也惡不可謂之幾如曰幾者動之微吉之先見亦止言吉耳上交不諂下交不瀆人事不過於上下之交此可盡人道也且如孝弟人之本亦可以言幾造端乎夫婦亦可以言幾親親而尊賢亦可以為幾就親親尊賢而求之又有幾焉又如言不誠其身不悅於親亦是幾處茍要入德必始於知幾未嘗不得其中故動止為衆人之表一無止字易曰原始要終故知死生之説死生止是人之終始也學必知幾造微知微之顯知風之自知逺之近可以入德由微則遂能知其顯由末即至於本皆知微知彰知柔知剛之道也並易説廣漢張氏曰豫之六二當天下悅豫之時人皆樂通於物而為悅也六二乃介然如石當是時也上交於五不為諂諛也下交於初不為褻瀆也乃介如石焉其方寸之地淵靜而物來能名事至能斷寧用終日斷可識矣故在微而能知彰在柔而能知剛宜乎天下萬民望之而為標準也易説白雲郭氏曰人有君子小人之辨者以君子知道知道則知幾矣小人不知道不知道則不知幾矣是以小人不恥不仁不畏不義惡積而不可掩罪大而不可解皆以其不知幾故也且幾者動之微吉之先見言吉則凶可知君子由幾而趣者吉也故此獨言吉方豫之時其介如石有無逸之戒居上居下無與為豫者是以上交不諂下交不瀆而為知幾之君子也且諂瀆至微也而鳴豫之凶有由諂瀆而生者是其所以為幾也君子極深研幾則能盡神故曰知幾其神乎知微知彰自微而知著也知柔知剛由一而知二也是皆知幾之道也知幾則能成天下之務是有長人之道故為萬夫之望橫渠先生曰常易故知險常簡故知阻豫之六二常不動故能得動之微易説至誠者大則通於道小則窮於理天下事物未有能逃於此者是以禍福善不善必先知之自君子觀之謂之知幾自衆人言之謂之前知易曰知幾其神矣乎故此論前知則曰至誠如神中庸解漢上朱氏曰神難言也精義入神以致用其惟知幾乎知幾其神矣幾者動之微吉之先見譬如陽生而井溫雨降而雲出衆人不識而君子見之其於行義也不亦有餘裕乎夫安危存亡之幾在於始交之際君子上交不諂下交不瀆義之與比無悔吝藏於其中知幾故也是以君子見微已去小人遇禍不知見與不見相去逺矣進此道者存乎介而已確然守正不轉如石者乃能見之其心定其智明默識而善斷故不俟終日也守身如此無一朝之患矣知彰易知微難知剛易知柔而剛難君子見幾故知微知彰知柔知剛一龍一蛇或弛或張唯義是適則萬夫望之而取法焉所從者豈特其朋從之彼勞思慮者亦末矣易傳新安朱氏曰此釋豫六二爻義漢書吉之之間有凶字本義易曰知幾其神乎便是這事難如邦有道危言危行邦無道危行言孫今有一樣人其不畏者又言過於直其畏謹者又更不敢説一句話此便是不曉得那幾若知幾則自中節無此病矣君子上交不諂下交不瀆蓋上交貴於恭恭則便近於諂下交貴和和則便近於瀆蓋恭與諂相近和與瀆相近只爭些子便至於流也君子上交不諂下交不瀆下面説幾最要看箇幾字只爭些子凡事未至而空説道理易見事已至而顯然道理也易見惟事之方萌而動之微處此最難見或問幾者動之微何以獨於上交下交言之曰上交要恭遜才恭遜便不知不覺有箇諂底意思在裏下交不瀆亦是如此所謂幾者只才覺得近諂近瀆便勿令如此此便是知幾幾者動之微吉之先見者也幾者動之微是欲動未動之間便有善惡便須就這處理會若到發出處更怎生奈何得所以聖賢説謹獨便是要就幾微處理會漢書説幾者動之微吉凶之先見者也似説得是幾自是有善有惡君子見幾亦是見得方舍惡從善問伊川説見微則知彰矣見柔則知剛矣其説如何曰也好看來只作四件事亦自好既知微又知彰既知柔又知剛言其無所不知所以為萬民之望也並語録子曰顔氏之子其殆庶幾乎有不善未嘗不知知之未嘗復行也易曰不逺復無祗悔元吉伊川先生曰顔子無形顯之過夫子謂其庶幾乃無祗悔也過既未形而改何悔之有既未能不勉而中所欲不踰矩是有過也然其明而剛故一有不善未嘗不知既知未嘗不遽改故不至於悔乃不逺復也易傳祗與底同使底至也無至於悔也大學之道在明其明德明德乃止於至善也知既至自然意誠顔子有不善未嘗不知知之至也知至故未嘗復行他人復行知之不至也並朱公掞問學拾遺如顔子地位豈有不善所謂不善者只是微有差失才差失便能知之知之便更不萌作顔子大率與聖人皆同只這便有分别若無則便是聖人曾子三省只是緊約束顔子便能三月之久到這些地位工夫尤難直是峻絶又大假著力不得馮氏拾遺已上三條增橫渠先生曰盛德之士然後知化如顔子庶乎知化也有不善未嘗不知已得善者辨善與不善也易有不善未嘗不知顔子所謂有不善者必只是以常意有迹處便為不善而知之此知幾也於聖人則無之矣知德為至當而不忘至之可見吉於微也蓋欲善不舍則善雖微必知之不誠於善者惡能為有為無雖終身由之不知其道烏足與幾乎顔子心不違仁故不善未嘗不知其致一也知不善未嘗復行不二過也孔子稱顔子不善未嘗不知知之未嘗復行其知不善非獨知己凡天下不善皆知之不善則固未嘗復行也又曰吾未見能見其過而內自訟亦是非獨自見其過乃見人之過而自訟其殆庶幾乎言深於知幾並易説龜山楊氏曰性不可離可離非率性也道無隱微之間於獨而不愼是可須臾離也故立則見其參於前在輿則見其倚於衡見此則知所以戒愼恐懼矣顔子不逺復其進於此乎中庸解廣漢張氏曰復貴於早顔氏之子有不善未嘗不知知之未嘗復行方其萌於心謀於慮乃改其過而不行此近於復之初九所以無祗悔也易説五峰胡氏曰儒者之道率性保命與天同功是以節事取物不厭不棄必身親格之以精其知焉夫事變萬端而物之感人無窮格之之道必立志以定其本而居敬以持其志志立於事物之表敬行乎事物之內而知乃可精目流於形色則知自反而以理視耳流於音聲則知自反而以理聽口流於唱和則知自反而以理言身流於行止則知自反而以理動有不中理未嘗不知知之未嘗復行此顔子所以克己復禮不逺復而庶幾聖人者也及其久也德盛而萬物一體仁熟而變通不窮豈特不為事物所迷亂而已哉視聽言動皆由至理形色音聲唱和行止無非妙用事各付事物各付物人我內外貫而為一應物者化在躬者神至此則天命在我無事於復而天地之心可一言而盡矣復齋記屏山劉氏曰學易者必有門户復卦易之門戶也入室者必自戶始學易者必自復始得是者其惟顔子乎不逺而復稱為庶幾蓋本夫子嘗以復禮為仁之説告之矣顔子躬行允蹈遂臻其極一己既克天下歸仁復之之功至矣顔子終日如愚論語所載惟發二問一為仁一為邦夫子答之皆極天理人事之大者原易之用內焉惟窮理盡性外焉惟開物成務顔子盡之雖無諸子之著撰謂之通易可也屏山集白雲郭氏曰顔子亞聖之道未能無過故語稱不二過未能無得失故中庸言得一善則拳拳服膺而弗失之由此則知庶幾於聖人矣故此言其殆庶幾乎易説漢上朱氏曰夫智周萬物者或暗於自知雄入九軍者或憚於改過克己為難也顔子有不善未嘗不知知之未嘗復行故曰顔氏之子其殆庶幾乎孰謂小善為無益而可以弗為小惡為無傷而可以弗去乎復者剛反動之卦也善者天地之性而人得之性之本也不善非性也習也不逺而復者修為之功也故曰不善未嘗弗知知之未嘗復行知之者覺也自性也或曰鮒椒之惡豈習乎曰知修為之功則復其本矣由其習之不已迷而不復矣人之生有氣之質有性之本剛柔不齊者氣也性之本則一而已矣故曰天地貞觀也日月貞明也氣豈能變哉易傳新安朱氏曰殆危也庶幾近意言近道也此釋復初九爻義本義殆是幾乎之意又曰是近又曰是危殆者是爭些子底意思又曰或以幾字為因上文幾字而言但左傳與孟子庶幾兩字都只做近字説顔子有不善未嘗不知知之未嘗復行今人只知知之未嘗復行為難殊不知有不善未嘗不知是難處今人亦有説道知得這箇道理及事到面前又却只隨私欲做將去前所知者都是忘了只為是不曾知顔子天資好如至清之水纎芥必見並語録天地絪緼萬物化醇男女構精萬物化生易曰三人行則損一人一人行則得其友言致一也伊川先生曰絪緼交密之狀天地之氣相交而密則生萬物之化醇醇謂醲厚厚猶精一也男女精氣交構則化生萬物惟精醇專一所以能生也一隂一陽豈可二也故三則當損言專致乎一也天地之間當損益之明且大者莫過此也易傳道無無對有隂必有陽有善必有惡有是必有非無一亦無三故易曰三人行則損一人一人行則得其友只是二也絪緼隂陽之感並入關語録橫渠先生曰始陳上下交以盡接人之道卒具男女致一之戒而人道畢矣氣坱然太虛升降飛揚未嘗止息易所謂絪緼莊生所謂生物以息相吹野馬者歟此虛實動靜之機隂陽剛柔之始浮而上者陽之清降而下者隂之濁其感遇聚結為風雨為霜雪萬品之流形山川之融結糟粕煨燼無非教也心所以萬殊者感外物而不一也天大無外其為感者絪緼二端而已焉物之所以相感者利用出入莫知其鄉一萬物之妙者歟並易説太和所謂道中涵浮沈升降動靜相感之性是生絪緼相蕩勝負屈伸之始其來也幾微易簡其究也廣大堅固起知於易者乾乎效法於簡者坤乎散殊而可象為氣清通而不可象為神不如野馬絪緼不足謂之太和語道者知此謂之知道學易者見此謂之見易不如是雖周公才美其智不足稱也已正蒙廣漢張氏曰天下之理惟致一者能得其要用志不分乃凝於神苟挾二三之心狐疑之志則安能盡誠而進於德乎損之六三所謂三人行則損一人一人行則得其友能致一者也益之上九莫益之或擊之立心勿恆凶不能致一者也竊觀天地絪緼萬物化醇此二氣所以致一也男女構精萬物化生此六子所以致一也又曰邵子云絪氣之相因緼氣之相溫相因以為合相溫以為和此萬物之化也醇而已醇者其氣也所謂精神生於道者也男女構精萬物化生則生者精也道散而有一以至萬則萬物皆出於一人之所以致一者順性命之理而不以妄易真以復其本而已此損之六三言致一也並易説兼山郭氏曰天地絪緼萬物化醇男女構精萬物化生易曰三人行則損一人一人行則得其友言致一也夫然後知天地之所以位萬物之所以育凡以此也中庸解白雲郭氏曰天地男女之化生皆由致一以交感三人行則損一人一人行則得其友言致一以交感也損自泰來由乾坤而為艮兊故有天地男女之象易説漢上朱氏曰天地萬物其本一也天地升降其氣絪緼萬物化矣醇而未雜序卦曰有天地然後有萬物劉牧曰乾道自然而成男坤道自然而成女序卦言萬物則男女在其中矣曰萬物化醇者言其一未始離也天地既生萬物萬物各有隂陽精氣相交化生無窮序卦曰有萬物然後有男女劉牧曰咸卦不繫之於離坎以離坎而上男女自然而生咸卦而下男女偶合而生曰男女曰化生者有兩則有一也損之六三曰三人行則損一人一人行則得其友言致一也致一則殊塗而同歸一致而百慮矣老氏論天地王侯得一又曰天地相合而降甘露老氏之所謂得一相合即夫子所謂致一也其在卦則六爻相應合而致用是也易傳新安朱氏曰絪緼交密之狀醇謂厚而凝也言氣化者也化生形化者也此釋損六三爻義本義天地氤氲言氣化也男女構精言形化也致一專一也惟專一所以能絪緼若不專一則各自相離矣化醇是已化後化生指氣化而言草木是也致一是專一之義程先生言之詳矣天地男女都是兩箇方得專一若三箇便亂了三人行減了一箇則是兩箇便專一一人行得其友成兩箇便專一程先生説初與二三與上四與五皆兩相與自説得好初二二陽四五二隂同德相比三與上應皆兩相與橫渠云艮三索而得男乾道之所成兊三索而得女坤道之所成所以損有男女構精之義亦有此理並語録子曰君子安其身而後動易其心而後語定其交而後求君子修此三者故全也危以動則民不與也懼以語則民不應也無交而求則民不與也莫之與則傷之者至矣易曰莫益之或擊之立心勿恆凶伊川先生曰君子言動與求皆以其道乃完善也不然則取傷而凶矣易傳橫渠先生曰此又終以昧於致用之戒易説廣漢張氏曰身不安則存諸己未定孰能為人乎故安其身而後動可也心不易則是非毁譽懷於胸中而與之交戰能無懼乎故易其心而後語可也交不定則好惡異尚而情不通孰肯應乎故定其交而後求可也益之上九立心勿恆不能盡此所以致凶易説白雲郭氏曰君子慎於持滿之戒修此三者以保其常全蓋懼益之極也益道未極則人必與之人與之則益日至益道既極則人必莫之與莫之與則莫之益也故傷之者必至此固損益常理况立心勿恆之人寧無凶乎易説漢上朱氏曰所謂全者合我與人而為一也動而與之者安其身而後動也語之而應者平其心而後慮也求而與之者定其交而後求也三者得故能以天下為一家中國為一人故曰君子修此三者故全也離而為二物物成敵莫或與之擊之者至矣故曰立心勿恆凶勿恆者不一之謂也張載曰下文當云易曰自天祐之吉無不利子曰天之所助者順也人之所助者信也履信思乎順又以尚賢也是以自天祐之吉無不利也考之義或然也順乎天者天助之應乎人者人助之其致一之效乎此章以咸因解噬嗑否鼎豫復損益十卦十一爻盡其義蓋書之於言有不能盡也易傳新安朱氏曰此釋益上九爻義本義夫子云不學詩無以言先儒以為心平氣和則能言易繫辭曰易其心而後語也答劉玶右第五章合訂刪補大易集義粹言卷七十七
