body:
  text: 合訂刪補大易集義粹言卷四十二頭等侍衛納喇性德編兌下離上伊川先生曰睽序卦家道窮必乖故受之以睽睽者乖也家道窮則睽乖離散理必然也故家人之後受之以睽也為卦上離下兌離火炎上兌澤潤下二體相違睽之義也又中少二女雖同居而所歸各異是其志不同行也亦為睽義易傳睽小事吉伊川先生曰暌者睽乖離散之時非吉道也以卦才之善雖處睽時而小事吉也易傳睽卦不見四德蓋不容著四德繇言小事吉者止是方暌之時猶足以致小事之吉不成終睽而已須有濟睽之道周行已録白雲郭氏曰有睽之事有睽之時睽本小人事而大人有睽者遇睽之時也遇睽之時大有為亦難矣是以小事吉蓋睽之常也易説新安朱氏曰睽乖異也為卦上火下澤性相違異中女少女志不同歸故為睽然以卦德言之內説而外明以卦變言之則自離來者柔進居三自中孚來者柔進居五自家人來者兼之以卦體言之則六五得中而下應九二之剛是以其占不可大事而小事尚有吉之道也本義彖曰睽火動而上澤動而下二女同居其志不同行説而麗乎明柔進而上行得中而應乎剛是以小事吉天地睽而其事同也男女睽而其志通也萬物睽而其事類也睽之時用大矣哉濂溪先生曰家人離必起於婦人故睽次家人以二女同居而志不同行也堯所以釐降二女于媯汭舜可禪乎吾兹試矣是治天下觀於家治家觀身而已矣通書伊川先生曰彖先釋睽一無睽字義一作意次言卦才終言合暌之道而贊其時用之大火之性動而上澤之性動而下二物之性違異故為暌義中少二女雖同居其志不同行亦為睽義女之少也同處長則各適其歸其志異也言睽者本同也本不同則非暌也説而麗乎明柔進而上行得中而應乎剛者卦才如此所以小事吉也兌説也離麗也又為明故為説順而附麗於明凡離在上而彖欲見柔居尊者則曰柔進而上行晉鼎是也方睽乖之時六五以柔居尊位有説順麗明之善又得中道而應剛雖不能合天下之暌成天下之大事亦可以小濟是於小事吉也五以明而應剛不能致大吉何也曰五隂柔雖應二而睽之時相與之道未能深固故二必遇主於巷五噬膚則無咎也天下睽散之時必君臣剛陽中正至誠協力而後能合也天地睽而其事同推物理之同以眀睽之時用乃聖人合睽之道也見同之為同者世俗之知也聖人則明物理之本同所以能同天下而和合萬類也以天地男女萬物明之天髙地下其體睽也然陽降隂升相合而成化育之事則同也男女異質暌也而相求之志則通也生物萬殊睽也然而得天地之和稟隂陽之氣則相類也物雖異而理本同故天下之大羣生之衆睽散萬殊而聖人為能同之處睽之時合睽之用其事至大故云大矣哉並易傳藍田吕氏曰睽趨異而不相合也物有異而同者天地男女是也有同而異者二女同居其志不同行是也異而同者迹異而心同孟子曰或逺或近或去或不去君子亦仁而已矣何必同又曰禹稷顔回同道曽子子思易地則皆然是也同而異者迹同而心異孟子曰有伊尹之志則可茍無伊尹之志則篡也魯人曰栁下惠固可吾固不可是也龜山楊氏曰天運乎上地止乎下天地固睽矣然一動一靜而變化成焉其事則同也男正位乎外女正位乎內男女固睽矣然夫夫婦婦而家道成焉其志則通也飛潛動植之異宜剛柔遲速之異齊萬物固睽矣然方以其類聚物以其羣分不相悖焉其事則類也聖人深足以通天下之志幾足以成天下之務則可以合天下之睽而用之矣睽之時用豈不大矣哉易説睽乖也又言天地睽而萬物通男女睽而其志同則乖為善蓋一字兩用南都語録白雲郭氏曰火澤無相得之性二隂有難和之情所以為睽火性上今動而上澤性下今動而下方之天水違行蓋其小者雖不成訟亦為暌也然澤中有火謂之革上火下澤謂之睽革以不相得之性兩不相交火自下而上澤自上而下其勢必遇而相息又不若睽之相違而不遇也小事吉者自卦論之初説而終明其道非睽也自爻論之六五上行得中而下應九二之剛其事非睽也其為吉宜矣凡卦皆二義睽之彖先言睽之所以為睽睽之道也後言睽之時用則聖人用睽之時也睽非大人事故上言小事吉而聖人有用睽之道故下言大矣哉蓋文王言其常而孔子極其用也非孔子不知其大也天髙地下睽也男尊女卑睽也萬物散殊亦睽也天地雖睽不害於同事男女雖暌不害於通志萬物雖睽不害於事類蓋睽之道必體睽而用合然後有濟孔子懼人不明其大故特曰時用大矣哉易説漢上朱氏曰離火動而上兌澤動而下火澤之睽也中少二女同居於家而所歸之志各異二女之睽也故曰睽此以兩體言睽也睽本同也離兌同為女而至於睽者時也故睽自家人反明本同也本不同則無睽惟本同故有合睽之道自離兌言之説而麗乎明自家人六二之五言之柔進而上行得中而應乎剛説則順民麗乎明則擇善柔得中則柔而不過應乎剛則取剛以濟柔是以小事吉夫説而麗明柔得中而應剛不可以作大事何也以柔進上行而得尊位也睽之時人情乖隔相與者未固非剛健中正不能合天下之睽如睽之柔其才才足以小事吉也故曰説而麗乎明柔進而上行得中而應乎剛是以小事吉此合兩體卦變而言處睽之道也天地男女萬物一氣也得其所同則睽者合矣剛上柔下天地睽也天降地升生育萬物其事同也坎外離內男女睽也男上女下乃有室家其志通也坎見震毁萬物睽也陽生隂成物無二理其事類也非本同也其能合乎大人以是能用天地能用男女能用萬物乖者復合混而為一以至天下為一家中國為一人故曰天地睽而其事同也男女睽而其志通也萬物睽而其事類也睽之時用大矣哉此惟原一卦以論合睽之道也在卦氣為十一月故大玄準之以戾易傳新安朱氏曰睽火動而上至其志不同行以卦象釋卦名義説而麗乎明至小事吉以卦德卦變卦體釋卦辭天地睽而其事同至大矣哉極言其理而贊之本義睽皆言始異而終同之理兌少女離中女以隂柔之性外和悅而內猜嫌故同居而異志並語録東萊吕氏曰易之序最當看家道一失節不正必至於睽乖故家人之後次以睽為卦離上兌下火之性炎上則愈動而愈上也澤之性潤下則愈動而愈下也一上一下初不相親所以為暌睽既孤離猶有吉者有二五也夫當睽之時本不能吉惟其卦才有吉之道雖不能大有所為亦可彌縫而致小吉也二女同居而志不同譬如君子與小人同室而處本未嘗睽而其志已相去不啻千里之逺此居雖同而志則不同也所以為睽之義説而麗乎明柔進而上行得中而應乎剛僅能小事吉處睽者其可易邪九二居下體之中是説而麗乎明也六五居上體之中下應於二是柔進而上行又得中而應乎剛君降志以應乎剛明之臣臣盡道以輔乎柔順之君君臣之間盡道相與於睽乖之時雖不能大有所為亦可以小吉大抵天下之治患君臣之不相與今也君臣上下相與如此乃止於小吉何哉蓋天下之治主乎君睽之時六五為君其質本弱雖欲強之一歸於治有所不能亦如伊尹一人耳在成湯時則格于皇天在太甲時則格于上帝蓋太甲資質本弱不及於湯故也天下事有萬不同然以理觀之則未嘗異君子須當於異中而求同則見天下之事本未嘗異睽之時用大矣哉時用二字最當看伊川云處睽之時合睽之用合之一字尤當看夫萬物之異如此而欲合之將如之何曰豫一以貫之正合睽之道也易説象曰上火下澤睽君子以同而異伊川先生曰上火下澤二物之性違異所以為睽離之象君子觀睽異之象於大同之中而知所當異也夫聖賢之處世在人理之常莫不大同於世俗所同者則有時而獨異蓋於秉彝則同矣於世俗之失則異也不能大同者亂常拂理之人也不能獨異者隨俗習非之人也要在同而能異耳中庸曰和而不流是也易傳橫渠先生曰一於異則乖而不合故和而不同易説龜山楊氏曰天下之物理一而分殊故君子以同而異易説白雲郭氏曰上火下澤異之象也聖人用睽有道存焉然用同者用睽之道也故大舜善與人同同也有天下而不與焉異也栁下惠不羞汙君不辭小官同也而曰爾為爾我為我異也故君子以同而異為用睽之道也孔子曰君子和而不同蓋言不同於小人之事也此言君子以同而異蓋言同於道也故言同雖一而為事道則異矣易説漢上朱氏曰離兌同為隂卦而未始不異君子之所同者人之大倫也然各盡其道亦不茍同以徇衆人見其為異矣不知異所以為同中庸曰和而不流晏平仲曰同之不可也如是彖言異而同大象言同而異易傳新安朱氏曰二卦合體而性不同本義或問睽卦大象君子以同而異先生曰此是取兩象合體為同而其性各異在人則是和而不同之意蓋其趨則同而所以為同則異如伯夷栁下惠伊尹三子所趨不同而其歸則一彖辭言睽而同大象言同而異在人則出處語默雖不同而同歸於理講論文字為説不同而同於求合義理立朝論事所見不同而同於忠君本義所謂二卦合體者言同也而性不同者言異也以同而異語意與用晦而明相似大凡讀易到精熟後顛倒説來皆合不然則是死説耳又問睽卦無正應而同德相應者何先生曰無正應所以為睽當睽之時當合者既離其離者却合也問君子以同而異作理一分殊看如何先生曰理一分殊是理之自然如此這處又就人事之異上説蓋君子有同處有異處如所謂周而不比羣而不黨是也大抵易中六十四象下句皆是就人事之近處説不必深去求它此處伊川説得甚好並語録東萊吕氏曰世之所謂相反者無如水火而其理初未嘗有異故一動一靜互為其根一隂一陽互為其用君子須是得同而異之理方可以盡睽之義然彖言天地睽而其事同男女睽而其志通萬物睽而其事類三句則自異而同此則言同而異蓋聖人使人於同之中觀其異異之中觀其同非知道者不足識此易説初九悔亡喪馬勿逐自復見惡人無咎象曰見惡人以辟咎也伊川先生曰九居卦初睽之始也在睽乖之時以剛動於下有悔可知所以得亡者九四在上亦以剛陽睽離無與自然同類相合同是陽爻同居下又當相應之位二陽本非相應者以在睽故合也上下相與故能亡其悔也在睽諸爻皆有應夫合則有睽本異則何睽唯初與四雖非應而同德相與故相遇馬者所以行也陽上行者也睽獨無與則不能行是喪其馬也四既與之合則能行矣是勿逐而馬復得也惡人與已乖異者也見者與相通也當睽之時雖同德者相與然小人乖異者至衆若棄絶之不幾盡天下以仇君子乎如此則失含𢎞之義致凶咎之道也又安能化不善而使之合乎故必見惡人則無咎也古之聖王所以能化姦凶為善良革讎敵為臣民者由弗絶也睽離之時人情乖違求和合之且病其不一作未能得也若以惡人而拒絶之則將衆仇於君子而禍咎至矣故必見之所以免避怨咎也無怨咎則有可合之道並易傳橫渠先生曰履睽之始悔也能以貴下賤故悔亡馬復屈下惡人能免於咎易説龜山楊氏曰睽之初不可以有行也故喪馬天地萬物皆睽而復同則睽極必反天下之常理也故勿逐自復夫時行則行時止則止喪而逐之其失愈逺然天下方睽以剛在下而無可行之資直道而往則害者至故見惡人無咎子見南子是也易説白雲郭氏曰初九無應有悔之象居睽而説道存焉故悔亡也喪馬初睽也逐之則成其為睽不可合矣勿逐自復用同而復也惡人與已異者也見之所以同而異也能同而異何咎之有栁下惠曰爾為爾我為我雖袒裼祼裎於我側爾焉能凂我哉故由由然與之偕而不自失焉象所謂同而異而初九見惡人其義一也見者遇之而勿絶之辭非必欲見之也子見南子之見是也孔子初不見陽貨蓋以從大夫之後不敢先也在魯衛之禮不同非不見惡人者也易説漢上朱氏曰睽之始剛而無應動則不正故有悔四坎馬也四不與初以剛自守喪馬不逐也睽諸爻皆有應四獨無與安得不動而求初乎四動之初初往復成坎馬勿逐自復也故悔亡四不正而險惡人也離目為見初往之四有離見惡人也之四雖不正以辟咎故無咎天下惡人衆多疾之己甚人人與君子為敵是睽者既合而復睽斯亦君子之咎也然初守正四動而後初見之夫子見陽貨陽貨先也故不得不見若屈已而先見之睽非不合矣見之可也從之不可也易傳曰古之聖人所以能化姦凶為善良綏讎敵為臣民由弗絶也易傳新安朱氏曰上無正應有悔也而居睽之時同德相應其悔亡矣故有喪馬勿逐而自復之象然亦必見惡人然後可以辟咎如孔子之於陽貨也本義九二遇主于巷無咎象曰遇主于巷未失道也伊川先生曰二與五正應為相與者也然在睽乖之時隂陽相應之道衰而剛柔相戾之意勝學易者識此則知變通矣故二五雖正應當委曲以相求也二以剛中之德居下上應六五之君道合則志行成濟睽之功矣而居睽離之時其交非固二當委曲求與相遇覬其得合也故曰遇主于巷必能合而後無咎君臣睽離其咎大矣巷者委曲之塗也遇者會逢之謂也當委曲相求期於會遇與之合也所謂委曲者以善道宛轉將就使合而已非枉已屈道也當睽之時君心未合賢臣在下竭力盡誠期使之信合而已至誠以感動之盡力以扶持之明義理以致其知杜蔽惑以誠其意如是宛轉以求其合也遇非枉道迎逢也巷非邪僻由徑也故夫子特云遇主于巷未失道也未非必也非必謂失道也並易傳橫渠先生曰守正居中故能求主于乖喪之際不失其道乖睽主有不可顯遇之時易説龜山楊氏曰九二剛中而應而當天下方睽之時非期於有應也故有遇主之辭焉然遇之外常道也故于巷若子房引四皓輔太子之類是已雖然遇主于巷惟睽之時可也易説智仁勇天下之達德也智知之仁守之勇行之三者闕一焉非達德也則人君固不可無勇矣而齊王以是為有疾故孟子告以文武之事使廓而大之則安天下無足為者矣若夫好貨好色則生於人君之邪心不可為也然而孟子不以為不可者蓋譬之水逆行中流而遏之其患必至於決溢因其勢而利道之則庶乎其通諸海也故以公劉太王之事告之陳古之善而閉其邪心引之當道也其自謂齊人莫如我敬王者以此易之睽曰遇主于巷亦斯之謂也孟子解白雲郭氏曰在睽諸爻皆以見遇為言是以君子貴夫同而異也二五正應雖睽易合蓋男女通志之義故遇主于巷也説文言巷里中道也里中之道出門則遇之言遇主之易也方睽之時遇主之易而無咎者不失正應之道故也古之君子難進易退況睽之世乎孟子曰君子未嘗不欲仕也又惡不由其道茍不由其道則其進易矣九二遇主于巷若甚易然疑其類於不由其道者故象特言其未失道也初九之無咎異於時九二之無咎同於道故不待喪馬勿逐而後自復亦不待見惡人而後可辟咎也同人曰出門同人又誰咎也睽之九二實似之易説漢上朱氏曰九二以剛中之德遇六五濟睽之主人情睽離之時二五皆非正應五來求二兌變震艮睽者家人之反艮為門為徑家門之有徑者巷也二往應之離變巽巽東南主人位也五來求二二適往應是以相遇故曰遇主于巷遇者不期而會巷委蛇曲折而後達睽而欲合故如是之難然二五得中震為大塗合睽者如是乃為得中未失道也易傳曰巷者委曲之塗也非邪僻由徑也遇者逢會之謂非枉道詭遇也至誠以感動之盡力以扶持之明義理以致其知杜蔽惑以誠其意如是而已故云未失道也易傳新安朱氏曰二五隂陽正應居睽之時乖戾不合必委曲相求而得會遇乃為無咎故其象占如此本義六三見輿曳其牛掣其人天且劓無初有終象曰見輿曳位不當也無初有終遇剛也伊川先生曰隂柔於平時且不足以自立況當睽離之際乎三居二剛之間處不得其所安其見侵陵可知矣三以正應在上欲進與上合志而四阻於前二牽於後車牛所以行之具也輿曳牽於後也牛掣阻於前也在後者牽曳之而已當前者進者之所力犯也故重傷於上為四所傷也其人天且劓天髠首也劓截鼻也三從正應而四隔止之三雖隂柔處剛而志行故力進以犯之是以傷也天而又劓言重傷也三不合於二與四睽之時自無合義適合居剛守正之道也其於正應則睽極有終合之理始為二陽所厄是無初也後必得合是有終也掣從制從手執止之義也以六居三非正也非正則不安又在二陽之間所以有如是艱厄由位不當也無初一有而字有終者終必與上九相遇而合乃遇剛也不正而合未有久而不離者也合以正道自無終睽之理故賢者順理而安行智者知幾而固守並易傳橫渠先生曰乘剛遇敵輿衛皆困易説龜山楊氏曰澤動而下故輿曳火動而上故其牛掣輿曳而掣則其事睽而不同矣尚能有行乎其人天且劓劓者絶其通絶其通則其睽極矣睽極而反故無初有終蓋天地萬物則睽而後其事同男女則睽而後其志通睽而至於其極者皆天也豈人為哉故曰夭且劓易説白雲郭氏曰六三隂柔居二剛之間當睽之世欲求速合蓋亦難矣故有見輿曳其牛掣之象見輿曳欲從而求合也其牛掣則違而致睽也時之方睽動輒乖異豈人力也哉天道然也然六三致牛掣之睽豈六三之罪邪時使之然故曰其人天且劓譬猶無妄之災非人所致孟子亦曰行止非人所能也無初者遇二剛而不得進也有終者睽道終極則反而從應也象言位不當者以隂位柔急於求濟故見輿曳而欲從焉易説漢上朱氏曰六三於睽時處不當位介於二剛之間其柔不能自進上九之剛雖非正應欲往而遇焉二剛侵凌莫之與也三坤為輿為牛離目為見四前剛為角離火欲上坎水欲下見輿曳也離上角仰也坎下角俯也一仰一俯牛頓掣也鄭康成作觢觢牛角踴也踴起而復下亦頓掣也見輿曳而不行其牛俯仰而頓掣言四扼於前者如此也二乾為天三坎之柔為髮而兌毁之髠其首也馬融曰刻鑿其額曰天易傳曰髠其首為天以象考之易傳為是伏艮為鼻兌金制之刑其鼻也其人天且劓者言其人既為四扼於前猶力進而犯之又為二制於後出處不當位故人情上下惡之然動得其正睽極則通初雖艱厄終必遇之三遇上剛二四象毁坤輿進而上行矣故曰無初有終遇剛也曰遇者不期而會謂其非正應也君子於此不尤乎見惡者反身以正而已正則應應則惡我者説睽我者合易傳曰不正而合未有久而不離者也合以正道則無終睽之理故賢者順理而安行知者知幾而固守易傳新安朱氏曰六三上九正應而三居二陽之間後為二所曳前為四所掣而當睽之時上九猜狠方深故又有髠劓之傷然邪不勝正終必得合故其象占如此本義九四睽孤遇元夫交孚厲無咎象曰交孚無咎志行也伊川先生曰九四當睽時居非所安無應而在二隂之間是睽離孤處者也以剛陽之德當睽離之時孤立無與必以氣類相求而合是以遇元夫也夫陽稱元善也初九當睽之初遂能與同德而亡睽之悔處睽之至善者也故目之為元夫猶云善士也四則過中為睽已甚不若初之善也四與初皆以陽處一卦之下居相應之位當睽乖之時各無應援自然同德相親故會遇也同德相遇必須至誠相與交孚各有孚誠也上下二陽以至誠相合則何時之不能行何危之不能濟故雖處一無處字危厲而無咎也當睽離之時孤居於二隂之間處不當位危且有咎也以遇元夫而交孚故得無咎也初四皆陽剛君子當睽乖之時上下以至誠相交協志同力則其志可以行不止無咎而已卦辭但言無咎夫子又從而明之云可以行其志故時之睽也蓋以君子陽剛之才而至誠相輔何所不能濟也唯有君子則能行其志矣並易傳龜山楊氏曰承乘皆隂而無與睽孤也六五柔得尊位而在上元夫也當上下睽離之時而已獨遇之故交孚厲無咎蓋同舟而濟雖胡越無異心天下方睽則遇而交孚其宜矣然孤而無與故厲交孚故雖厲無咎易説白雲郭氏曰天下之𫝑合則衆睽則孤凡睽皆然而獨於九四上九稱睽孤何哉蓋上居睽極四近君而不得非若初之自復二之遇主三之有終也故稱睽孤焉處孤之道不過於求人以自助而已故求善士而相與以誠則雖危無咎矣所謂德不孤也王輔嗣以初亦無應獨立同在體下同志者也故交孚無咎其志得行伊川曰元夫猶云善士也初九悔亡則處之至善者矣易説漢上朱氏曰九四睽時處不當位介二隂之間五應二三應上四獨無應在睽而又孤故曰睽孤孤則危厲有乖離之咎初守正不援乎上處睽之善者也四變交初兌變坎四離為婦初坎為夫元始也善之長也故曰遇元夫四動正正則誠矣彼我皆誠有不約而自信者故曰交孚交孚則雖厲而無咎交則初四未正曰無咎者初志上行睽者通也易傳曰卦辭言無咎夫子又從而明之云志行也蓋君子以剛陽之才至誠相輔何所不濟也唯有君子則能行其志爾易傳新安朱氏曰睽孤謂無應遇元夫謂得初九交孚謂同德相信然當睽時故必危厲乃得無咎占者亦如是也本義六五悔亡厥宗噬膚往何咎象曰厥宗噬膚往有慶也伊川先生曰六以隂柔當睽離之時而居尊位有悔可知然而下有九二剛陽之賢與之為應以輔翼之故得悔亡厥宗其黨也謂九二正應也噬膚噬囓其肌膚而深入之也當睽之時非入之者深豈能合也五雖隂柔之才二輔以陽剛之道而深入之則可往而有慶一有也字復何過咎之有以周成之幼稚而興盛王之治以劉禪之昏弱而有中興之𫝑蓋由任聖賢之輔而姬公孔明所以入之者深也爻辭但言厥宗噬膚則可以往而無咎象復推明其義言人君雖己才不足若能信任賢輔使以其道深入於己則可以有為是往而有福慶也並易傳橫渠先生曰二能勝三如噬膚耳何間已往易説龜山楊氏曰火動而上而以柔乘剛故厥宗噬膚九四同體之象也蓋睽離之極雖宗噬膚矣詩曰亦有兄弟不可以據此之謂也據而親之能無咎乎故往何咎夫睽終必同天地之道也故孔子曰往有慶也易説白雲郭氏曰處睽之世已為悔矣六五以柔自將又悔之道也得其正應能下賢焉故悔可亡厥宗二也二之應五若噬膚然言其易也故二稱于巷五稱噬膚其義一也君臣道合合則非睽以是而往將有大慶又何咎之有睽之道用合而體睽二五盡之故彖言天地睽男女睽象言同而異皆一也易説漢上朱氏曰六五柔得尊位宜有悔也能致九二在下之賢以剛輔柔故悔亡五離也二兌有離體同宗而為六五所宗噬膚者囓柔也五來下二兌變成艮艮為膚兌口囓柔噬膚也自二至上體噬嗑故曰厥宗噬膚二噬五柔而深之剛柔相入之意睽離之時非五下二二不可往非深入之則其久必離九二剛中不茍往者也五既下之往亦何咎往則有濟睽之功成邦家之慶陽為慶謂五柔成剛也易傳曰爻辭但言厥宗噬膚則可往而無咎象推明其義言人君雖己才不足若能任賢輔使以其道深入於己則可以有為往而有福慶也易傳新安朱氏曰以隂居陽悔也居中得應故能亡之厥宗指九二噬膚言易合六五有柔中之德故其象占如是本義上九睽孤見豕負塗載鬼一車先張之弧後説之弧匪寇婚媾往遇雨則吉象曰遇雨之吉羣疑亡也伊川先生曰上居卦之終睽之極也陽剛居上剛之極也在離之上用明之極也睽極則拂戾而難合剛極則躁暴而不詳明極則過察而多疑上九有六三之正應實不孤而其才性如此自睽孤也如人雖有親黨而多自疑猜妄生乖離雖處骨肉親黨之間而常孤獨也上之與三雖為正應然居睽極無所不疑其見三如豕之汚穢而又背負泥塗見其可惡之甚也既惡之甚則猜成其罪惡如見載鬼滿一車也鬼本無形而見載之一車言其以無為有妄之極也物理極而必反以近明之如人適東東極矣動則西也如升髙髙極矣動則下也既極則動而必反也上之睽乖既極三之所處者正理大凡失道既極則必反正理故上於三始疑而終必合也先張之弧始疑惡而欲射之也疑之者妄也妄安能常故終必復於正三實無惡故後説弧而弗射睽極而反故與三非復是寇讎乃婚媾也此匪寇婚媾之語與屯卦同而義則殊也隂陽交而和暢則為雨上於三始疑而睽睽極則不疑而合隂陽合而益和則為雨故云往遇雨則吉往者自此以往也謂既合而益和則吉也雨者隂陽和也始睽而能終和故吉也所以能和者以羣疑盡亡也其始睽也無所不疑故云羣疑睽極而合則一有疑字皆亡矣並易傳睽之上九離也離之為德在諸卦莫不以為明獨於睽便變為惡以陽在上則為亢以剛在上則為狠以明在上變而為察以狠以察所以為睽之極也故曰見豕負塗載鬼一車皆自任己察之所致然往而遇雨則吉遇雨者睽解也睽解有二義一是物極則必反故睽極則必通若睽極不通却終於睽而已二是所以能解睽者却是用明之功也周行已録白雲郭氏曰處睽之極故曰睽孤然天下之睽始於疑疑故睽不疑則交孚而無睽矣疑者小人之道也聖人無疑也睽之成卦本自二女則小人之象明矣故上九極言其疑也見豕負塗有之疑也載鬼一車無之疑也有之疑疑之始也無之疑其疑甚矣有無無所不疑是以張弧以禦之其道乖矣三之應上何寇之有其應甚正昏姻之道也故後有説弧之象焉往遇雨則吉者隂陽和則雨往而和則有無之際羣疑自釋睽道革矣是以吉也六三隂也上九陽也陽氣下降隂道上行故言遇雨見豕負塗猶詩言誰謂鼠無牙有之疑也載鬼一車猶詩言誰謂雀無角無之疑也易説漢上朱氏曰上與三應亦曰睽孤者睽離之時三未從上有四間焉而上疑之則人情不合而孤獨之人也儔類異處適有人參處乎兩者之間則疑矣上九處極睽難合之地過剛而暴極明而察故疑於四者無所不至離目為見坎為豕兌為澤坤土坎水陷于兌澤豕在澤中汨之以泥塗見豕負塗也言惡其穢之甚也坤為鬼坎為輪坤在坎中載鬼一車也言以無為有妄之極也離矢坎弓先張之弧疑四為寇而見攻也三所以未應豈四之罪哉人情有未通爾睽極則通異極則同隂陽剛柔無獨立之理六隂柔也九陽剛也剛來柔往則疑情渙然釋矣故後説之弧知四匪寇也九剛六柔自婚媾也故曰匪寇婚媾此匪寇婚媾與他卦言同而象異坎在下為雨上來之三三往遇之上三正則吉吉則向來羣疑亡本無是也故曰遇雨則吉羣疑亡也辭枝如此者疑辭也易傳新安朱氏曰睽孤謂六三為二陽所制而已以剛處明極睽極之地又自猜狠而乖離也見豕負塗見其汚也載鬼一車以無為有也張弧欲射之也説弧疑稍釋也匪寇婚媾知其匪寇而實親也往遇雨則吉疑盡釋而睽合也上九之與六三先睽後合故其象占如此本義合訂刪補大易集義粹言卷四十二
