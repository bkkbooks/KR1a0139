body:
  text: 合訂刪補大易集義粹言卷四十八頭等侍衛納喇性徳編巽下乾上康節先生曰復次剥明治生於亂姤次夬明亂生於治乎時哉時哉未有剥而不復未有夬而不姤者觀物外篇伊川先生曰姤序卦夬者決也決必有所遇故受之以姤姤遇也決判也物之決判則有遇合本合則何遇姤所以次夬也為卦乾上巽下以二體言之風行天下天之下者萬物也風之行无不經觸乃遇之象又一隂始生於下隂與陽遇也故為姤易傳姤女壯勿用取女伊川先生曰一隂始生自是而長漸以盛矣是女之將長壯也隂長則陽消女壯則男弱故戒勿用取如是之女取女者欲其柔和順從以成家道姤乃方進之隂漸壯而敵陽者是以不可取也女漸壯則失男女之正家道敗矣姤雖一隂甚微然有漸壯之道所以戒也易傳廣平游氏曰姤女壯巽一无巽字為長女也女壯則乗陽其極將至於為剥故勿用取女而初六有蹢躅之戒也以其為巽體也故為女壯以其隂之初生一作出也故為羸豕易說白雲郭氏曰夬之一隂將消之隂也姤之一隂方長之隂也其隂雖同所以為隂則異故夬姤卦象反對其義正相反夬以五剛為義姤以一柔為義也隂之方長女壯之象也自以一隂方長而陽道向消无畏五剛之志欲獨以一柔遇之用壯之甚也是以不可取也觀一陽之復猶曰朋來无咎而姤以一隂之遇不待得朋是以知其壯也陽至四五而後言壯姤一隂方長即為壯者亦見君子小人之情不同也是以陽為君子而隂為小人易說新安朱氏曰姤遇也決盡則為純乾四月之卦至姤然後一隂可見而為五月之卦以其本非所望而卒然值之如不期而遇者故為遇遇已非正又一隂而遇五陽則女徳不貞而壯之甚也取以自配必害乎陽故其象占如此本義東萊吕氏曰女壯勿用取女一隂何以謂之壯一念初發善善惡惡莫不皆甚壯也易說彖曰姤遇也柔遇剛也勿用取女不可與長也天地相遇品物咸章也剛遇中正天下大行也姤之時義大矣哉康節先生漁樵對問樵者問曰姤何也曰姤遇也柔遇剛也與夬正反夬始逼壯姤始遇壯陰始遇陽故稱姤焉觀其姤天地之心亦可見矣聖人以徳化及此罔有不昌故象言施命誥四方履霜之謹其在此乎邵子外書伊川先生曰姤之義遇也卦之為姤以柔遇剛也一隂方生始與陽相遇也一隂既生漸長而盛隂盛則陽衰矣取女者欲長久而成家也此漸盛之隂將消勝於陽不可與之長久也凡女子小人夷狄勢茍漸盛何可與久也故戒勿用取如是之女隂始生於下與陽相遇天地相遇也隂陽不相交遇則萬物不生天地相遇則化育庶𩔖品物成章萬物章明也剛遇中正以卦才言也五與二皆以陽剛居中與正以中正相遇也君得剛中之臣臣遇中正之君君臣以剛陽遇中正其道可以大行於天下矣贊姤之時與姤之義至大也天地不相遇則萬物不生君臣不相遇則政治不興聖賢不相遇則道徳不亨事物不相遇則功用不成姤之時與義皆甚大也並易傳横渠先生曰非中爻不能備卦徳故曰剛遇中正易說藍田吕氏曰姤寡遇衆弱遇强也姤一柔而遇五剛乃一女子而遇五男一臣而遇五君壯而不可貞不可取也白雲郭氏曰以柔遇剛謂之姤遇之為事天地萬物不能无也无則萬物不生教化不成故地之遇天臣之遇君主於一則可而以一遇五則不可也遇不主於一豈長久之道哉故貞女不從二夫忠臣不事二君是以姤之女壯勿用取也卦辭止於女壯勿用取女而已聖人懼學者止以女子之道而言姤故極天地明教化而言其義之大也天地不相遇則萬物不章剛為天柔為地也剛中之臣非得中正之君則教化不能盛行姤之時義其大如此易說漢上朱氏曰姤遇也柔出而遇剛若邂逅然故曰姤遇也柔遇剛也此以一柔遇五剛言姤之義也女徳柔順而剛健女壯也故曰女壯隂息剥陽以柔變剛女壯男弱不可以久處故曰勿用取女不可與長也詩以蛇虺為女子之祥熊羆為男子之祥剛柔反易必有女禍此以初六言姤之戒也陽生於子至已成乾已者巽也轉而至午陽極隂生午者離也荀爽曰坤出於離與乾相遇故萬物相見相見也咸章也皆謂出於離也萬物别而言之曰品物品物咸章則相見者著矣故曰天地相遇品物咸章此再以初六言姤之時也姤五月卦也太𤣥準之以遇易於復言七日來復冬至也於姤言品物咸章夏至也舉二至則律厯見矣九二剛中臣也九五剛中而正君也姤比遯為有臣比剥為有君以剛中之臣遇中正之君有其位有其時君臣相遇亦猶天地之相遇故曰剛遇中正姤者夬之反夬一隂自上而下五變成姤乾為天天下行也君臣相遇道行乎天下故曰剛遇中正天下大行也此以二五兩爻卦之反復言姤之用也天地也君臣也非其時也亦莫之遇莫之遇則天地閉賢人隠萬物㡬乎息矣故曰姤之時義大矣哉易傳新安朱氏曰柔遇剛也釋卦名不可與長也釋卦辭品物咸章以卦體言剛遇中正指九五姤之時義大矣哉㡬微之際聖人所謹本義不是說隂漸長為女壯乃是一隂遇五陽大率姤是一箇女遇五陽是箇不正當底如人盡夫也之事聖人去這裏又看見得那天地相遇底道理出來問姤卦先生曰姤是不好底卦然天地相遇品物咸章剛遇中正天下大行却又甚好葢天地相遇又是别取一義剛遇中正只取九五或謂亦以九二言非也問姤之時義大矣哉本義云㡬微之際聖人所謹與伊川說不同何也先生曰上面說天地相遇至天下大行也正是好時節而不好之漸已生於微矣故當謹於此並語録東萊吕氏曰夬利有攸往剛長乃終也姤勿用取女不可與長也陽雖多猶恐其少隂雖少猶懼其多易說象曰天下有風姤后以施命誥四方伊川先生曰風行天下无所不周為君后者觀其周徧之象以施其命令周誥四方也風行地上與天下有風皆為周徧庶物之象而行於地上徧觸萬物則為觀經歴觀省之象也行於天下周徧四方則為姤施發命令之象也諸象或稱先王或稱后或稱君子大人稱先王者先王所以立法制建國作樂省方勑法閉闗育物享帝皆是也稱后者后王之所為也財成天地之道施命誥四方是也君子則上下之通稱大人者王公之通稱易傳横渠先生曰上所以用柔於下者誥令莫大焉易說藍田吕氏曰天下有風則无不鼓動施行命誥四方之義一后之命告四方亦寡遇衆也白雲郭氏曰天下風行無物不遇后王法之可以施命誥四方夫姤之道最為難用聖人用於施命誥四方之際所謂善用易之道者矣非聖人明之則姤道廢矣伊川曰象稱先王者先王所以立法制若建國作樂省方勑法閉闗育物享帝皆是也稱后者后王所為也財成天地之道施命誥四方是也君子則上下之通稱大人則王公之通稱雍竊謂先王王者之事后則凡有君道者皆同之君子大人通上下有徳之稱大人則又徳之大者耳故雖匹夫亦可為君子大人顔淵栁下恵是也易說漢上朱氏曰天下有風乃萬物相遇后以施命誥詔四方君與萬民相遇之道也風者天之號令以時而動明庶東也景風南也閶闔西也廣莫北也周流天下无所不徧故后體之隂陽家有風律之占源於此姤自夬變離離有伏坎變兌有伏震四方也巽為命自上而下兌為口施命誥四方之象易傳曰諸象或稱先王或稱后或稱君子大人先王者先王立法制建國作樂省方勑法閉闗育物享帝是也后者后王之所為財成天地之道施命誥四方是也君子則上下之通稱大人者王公之通稱易傳初六繫于金柅貞吉有攸往見凶羸豕孚蹢躅象曰繫于金柅柔道牽也伊川先生曰姤隂始生而將長之卦一隂生則長而漸盛隂長則陽消小人道長也制之當於其微而未盛之時柅止車之物金為之堅强之至也止之以金柅而又繫之止之固也固止使不得進則陽剛貞正之道吉也使之進往則漸盛而害於陽是見凶也羸豕孚蹢躅聖人重為之戒言隂雖甚微不可忽也豕隂躁之物故以為況羸弱之豕雖未能强猛然其中心在乎蹢躅蹢躅跳躑也隂微而在下可謂羸矣然其中心常在乎一无乎字消陽也君子小人異道小人雖微弱之時未常无害君子之心防於微則无能為矣牽者引而進也隂始生而漸進柔道方牽也繫之于金柅所以止其進也不使進則不能消正道乃貞吉也並易傳横渠先生曰金柅二物也處姤之時不牽於近則所往皆凶孚信也豕方羸時力未能動然至誠在於蹢躅得申則申矣如李徳裕處置閹宦徒知其帖息威伏而忽於志不忘逞照察少不至則失其㡬也易說藍田吕氏曰初六以一柔而遇五剛近者欲比逺者欲應能不徇於近比而逺率於正應繫之於剛而能止者則正吉矣有攸往見凶舎正之它則凶矣舎正之它乃羸豕之孚也羸豕孚以淫行信於衆者也蹢躅淫躁之狀也龜山楊氏曰偶及陽城事謂永叔不取純夫取之其言曰陽城葢有待而為者也後世猶責之无已其不成人之美亦甚哉此論似近厚曰陽城固可取然以為法則不可裴延齡之欲相其來非一朝一夕何不救之於漸乎至於陸贄之貶然後論延齡之姦佞无益矣觀古人退小人之道不然易之姤卦曰女壯勿用取女夫姤一隂生未壯也而曰壯者生而不已固有壯之理也取女則引而與之齊也引而與之齊則難制矣隂者小人之象也小人固當制之於漸也故當隂之生則知其有壯之理其有壯之理則勿用取女可也是以姤之初爻曰繫于金柅貞吉有攸往見凶金柅止車之行也行之初動必有以柅之其制之於漸乎葢小人之惡制之於未成則易制之於已成則難延齡之用事權傾宰相雖不正名其為相其惡自若也何更云待其為相然後取白麻壞之邪然城之所為當時所難能也取之亦是但不可以為法耳餘杭語録白雲郭氏曰隂之始生雖有方長之漸而柔弱未可有行故利在堅固自制繫而不動以待其時斯可矣柅止車之物也能以固止為貞則吉有攸往則見凶也茍不能堅固自制以待時譬如羸豕躁動信能蹢躅而己安能有為有行哉動而不能有為有行徒有見凶之患所謂非徒无益而又害之者是以必繫于金柅不動可也柔道不能獨立初六之繫葢為柔道所牽耳夫遇有必動之理而初居不可動之勢以見遇之初猶將有待也易説漢上朱氏曰姤初六五月離卦之一隂也離巽之柔為絲乾變為金堅重也柅絡絲柎也許慎作檷謂九二也初六隂柔不正與九二相遇如絲紛然繫之以堅重之器乃可經理故曰繫于金柅初六變而正則吉人亦何常君子小人在正不正之間耳故初六繫于金柅貞則吉勉初六也初二相易成離目見也隂有攸往九二降初剥剛而進凶也凶戒九二也言初隂辨之不早必見凶害乾初爻甲子子坎位為豕初九變六陽變隂羸豕也羸豕牝豕也伏震為躁巽為股為進退初隂應四孚也牝豕感陽志欲往前為二所制進退蹢躅而躁動不安其意未始不在於陽九二可不繫于金柅乎繫于金柅則柔道有所牽矣易言牽者皆艮巽之動艮手也巽股也手挽之而股動夫君子小人相為消長雖初隂其心未嘗一曰不欲害君子一隂雖弱方來也五陽雖强既往也其可忽諸自古禍亂或始於牀笫之近給使之賤夷裔荒服之逺易而忽之馴致大亂反求其故必本於剛正不足若柔道有牽君子小人各當其分禍亂何由而作或曰巽離為絲何也曰巽為木為風巽變離木中含火火生風風化蠱蠶為龍馬之精龍大火馬火畜蠶以火出而浴畜馬者禁原蠶故太𤣥以火為絲賈逵以離為絲郭璞曰巽為風蠱屬龍馬絲出中易傳新安朱氏曰柅所以止車以金為之其剛可知一隂始生靜正則吉往進則凶故以二義戒小人使不害於君子則有吉而无凶然其勢不可止也故以羸豕蹢躅曉君子使深為之備云牽進也以其進故止之本義又曰金柅或以為止車物或以為絲衮不可曉語録九二包有魚无咎不利賔象曰包有魚義不及賔也伊川先生曰姤遇也二與初密比相遇者也在它卦則初正應於四在一无在字姤則以遇為重相遇之道主於專一二之剛中遇固以誠然初之隂柔羣陽在上而又有所應者其志所求也隂柔之質鮮克貞固二之於初難得其誠心矣所遇不得其誠心遇道之乖也包者苴裹也魚隂物之美者陽之於隂其所說美故取魚象二於初若能固畜之如包苴之有魚則於遇為无咎矣賔外來者也不利賔包苴之魚豈能及賔謂不可更及外人也遇道當専一二則雜矣二之遇初不可使有二於外當如包苴之有魚包苴之魚義不及於賔客也並易傳藍田吕氏曰九二與初相比柔始為剛而為二所得包有魚也初非正應苟可以自利而已不可以及賔葢近而相比近於義非正也古者遺魚肉皆包苴包喻二魚喻初也魚隂𩔖也白雲郭氏曰初六以隂居下魚之象也九二包而有之得相遇之道故无咎初當應四疑九二之包有魚為非葢姤遇之時遇為先也是以言包有魚无咎也賔者外來之隂也初六之隂二能包之二隂之來不能包也故九二不利賔之來也不利其來者以義不能包及二隂故也且初六柔道方長必有繼來之隂三四尚逺二當先遇故言不利賔也惟其不能包有二隂故賔之繼來則九二退而成遯時運已化姤遇之道息矣易說漢上朱氏曰魚謂初也初六易四成兌為澤巽於澤下者魚也民之象初者二四之所欲初本應四九二據之宜有咎然隂出遇陽二近而包有之於遇道為得故无咎若二不能包四又逺民初將散亂而不可制矣賔謂四也四在外動而易初初成乾西北方賔之位二體巽東南方主人位初六之民為二所有非九四之利而九四所不能包者逺於民也一民不可有二君亦義之所不及也古者有分土無分民得道則歸往失道則攜持而去无逺近内外之間顧遇民之道如何耳此二所以无咎易傳曰遇道當専一二則雜矣故義不可及賔也易傳新安朱氏曰魚隂物二與初遇為包有魚之象然制之在已故猶可以无咎若不制而使遇於衆則其為害廣矣故其象占如此本義又不知此卦如何有魚象或説離為鼈為蟹為蠃為蚌為龜魚便在裏面了不知是不是此條未詳語録九三臀无膚其行次且厲无大咎象曰其行次且行未牽也伊川先生曰二與初既相遇三説初而密比於二非所安也又為二所忌惡其居不安若臀之无膚也處既不安則當去之而居姤之時志求乎遇一隂在下是所欲也故處雖不安而其行則又次且也次且進難之狀謂不能遽舎也然三剛正而處巽有不終迷之義若知其不正而懷危懼不敢妄動則可以无大咎也非義求遇固已有咎矣知危而止則不至於大一有咎字也其始志在求遇於初故其行遲遲未牽不促其行也既知危而改之故未至於大咎也並易傳横渠先生曰行而无所與遇故曰行未牽也進退无所係也易說藍田吕氏曰九三之於初六後不如二之能比故臀无膚前不如四之能應故其行次且雖未牽初以自助若孤危然剛而當位卒无大咎白雲郭氏曰九三不能安其位者也當遇之時无遇之位可以止矣當止不止是以至於臀无膚其行次且也至是則危矣且初六得遇之位以柔道不能獨立苟不能自制以有待亦有羸豕蹢躅之患況九三非遇之位其危宜矣二之遇四之應為有其事也无事而行九三也无膚次且之厲本非九三所有葢未嘗牽勉而妄行焉是以至此然无大咎者三居二四之間雖行不能越二剛終无妄遇之事故亦无大咎夬之九四辭相𩔖者夬姤三四反對之爻也與損益二五同易說漢上朱氏曰姤者夬之反姤之九三即夬之九四故二爻同象艮在下體之上為臀其柔膚也二不動而侵三艮成巽柔不足也故臀无膚臀无膚則不能處矣隂陽之情必求相遇初隂在下亦三心之所欲遇者也二比於初已包有之三非義求遇亦何所得哉亦必有咎而遇情未忘故其行次且次且者且進且退不能遽行巽究為躁為進退故也處則為二所侵行則有求而不去可謂危厲然九三剛正處巽知義不可而舎之初隂不能牽其後故无大咎牽者手挽股動初為二所制艮𨼆巽見故曰柔未牽也不曰凶者初非三之所宜有四失初則凶矣易傳新安朱氏曰九三過剛不中下不遇於初上无應於上居則不安行則不進故其象占如此然既无所遇則无隂邪之傷故雖危厲而无大咎也本義這㡬卦多說那臀不可曉語録九四包无魚起凶象曰无魚之凶逺民也伊川先生曰包者所裹畜也魚所美也四與初為正應當相遇者也而初已遇於二矣失其所遇猶包之无魚亡其所有也四當姤遇之時居上位而失其下下之離由己之失徳也四之失者不中正也以不中正而失其民所以凶也曰初之從二以比近也豈四之罪乎曰在四而言義當有咎不能保其下由失道也豈有上一无上字不失道而下離者乎遇之道君臣民主夫婦朋友皆在焉四以下睽故主民而言為上而下離必有凶變起者將生之謂民心既離難將作矣下之離由已致之逺民者已逺之也為上者有以使之離也並易傳藍田吕氏曰九四以初為應初為已民二陽間之逺而不可得有民而不得其民如有包无實以靜猶可作而起之是以凶也白雲郭氏曰四與初應為有魚也當姤遇之時初六見九二而先遇焉是九四失其正應故言无魚也夫得道者多助失道者寡助寡助之至親戚畔之此无魚所以起凶葢言凶之起自无魚始矣魚民象也為君而不得其民能无凶乎四之與初非逺也而曰逺民者視二為逺耳它卦正應有間多為終吉獨姤之時以遇為急故也易說漢上朱氏曰二有其魚四失所遇失其民也起動也動成離戈兵之象三動初愈不應故起凶无魚之凶以九四不中正自逺其民故九二得以中近之民无常心撫我則后此九四所以凶歟易傳曰遇之道君臣民主夫婦朋友皆在焉四以下睽故主民而言也易傳新安朱氏曰初六正應己遇於二而不及於己故其象占如此逺民也民之去己猶已逺之並本義包无魚又去這裏見得箇君民底道理陽在上為君隂在下為民語録九五以把包瓜含章有隕自天象曰九五含章中正也有隕自天志不舎命也伊川先生曰九五下亦无應非有遇也然得遇之一有之字道故終必有遇夫上下之遇由相求也把高木而葉大處高體大而可以包物者把也美實之在下者瓜也美而居下者側微之賢之象也九五尊居君位而下求賢才以至高而求至下猶以把葉而包瓜能自降屈如此又其内藴中正之徳充實章美人君如是則无有不遇所求者也雖屈已求賢若其徳不正賢者不屑也故必含畜章美内積至誠則有隕自天矣猶云自天而降言必得之也自古人君至誠降屈以中正之道求天下之賢未有不遇者也髙宗感於夢寐文王遇於漁釣皆由是道也所謂含章謂其含藴一无藴字中正之徳也徳充實則成章而有一无有字輝光命天理也舎違也至誠中正屈己求賢存志合於天理所以有隕自天必得之矣並易傳髙宗好賢之意與易姤卦同九五以把包瓜含章有隕自天把生於最髙處瓜美物生低處以把包瓜則至尊逮下之意也既能如此自然有賢者出故有隕自天也後人遂有天祐生賢佐之説唐棣所録横渠先生曰把之為物根固於下瓜之為實潰必自内九五以中正剛健含章宅尊而遇隂柔浸長之時厚下安宅潰亂是防盡其人謀而聴天命者也以把包瓜文王事紂之道厚下以防中潰盡人謀而聴天命者歟易說藍田吕氏曰九五内守中正以待天命者也姤之時柔長而剛將消矣九五以剛陽之質居尊履中徳之美也不以剛將消而自失全其美質如以把包瓜然方其未壞知愛之全之而已含章之道也有隕自天非吾力之所能為斯可以俟命而无憾也廣平游氏曰以把包瓜者以九五之剛中包初六之柔脆用賢得民之象也用賢得民則我无為也中心守至正而已故曰含章若是者天實臨之降之百祥將不旋踵矣故曰有隕自天葢明君之於天下安危利害不惑一作二其心居中守正强為善以俟之所以作元命也故曰志不舎命易說白雲郭氏曰九五尊位中正為道甚大其為遇也宜異夫在下包茅之微故言以杞包瓜也杞大木也人君之象也瓜緜緜相繼之實也民象也髙其木大其䕃緜緜之屬託其本而有生焉是其為包也大矣含章九五之徳也有隕自天志惟天命之遇也志不舎命循天之理也以把包瓜則盡養民之道有隕自天則无妄遇之災是其所以為含章之美也含章非含而不發也内有含章之美故見於外者如此易說漢上朱氏曰二巽木也變乾為大木此爻自兑變巽兌為澤澤木而大把也把似樗葉大而䕃張載曰杞周於下者也艮在草為蓏蓏瓜屬艮為巽包瓜也瓜譬則民瓜雖可欲而潰必自内始九五當隂長之時含章不耀中正在上遇九二之賢而用之以剛守中道防民之潰故曰以把包瓜九五動則成離離為文章不動含章而中正唯含章不耀中正自處是以能用九二以盡其才故辭曰含章象曰九五含章中正也一隂浸長陽爻消剥者天也九五含章用九二以防民之潰者人也盡人謀則有時而勝天然或不勝至隕越者亦天也九五之志知盡人謀而已以謂天之所命以祐下民在我有隕越者自天隕之吾終不舍天之命也故曰有隕自天象曰志不舍命也二陽為隂剥五自乾而隕有隕自天也五隕於二復成巽巽為命志不舍命也張載曰以把包瓜文王事紂之道也厚下以防中潰盡人謀而聴天命者歟易傳又曰天命聖人以祐下民微隂浸長民將内潰聖人含章不耀中正自處委任賢佐厚下安宅盡人謀以聴天命雖有隕越自天隕之吾志不動也不舍天之所命也周公曰我弗敢知孔子曰天生徳於予桓魋其如予何叢說新安朱氏曰瓜隂物之在下者甘美而善潰杞髙大堅實之木也五以剛陽中正主卦於上而下防始生必潰之隂其象如此然隂陽迭勝時運之常若能含晦章美靜以制之則可以回造化矣有隕自天本无而倐有之象也本義有隕自天言能回造化則陽氣復自天而隕復生上來都換了這時節語録上九姤其角吝无咎象曰姤其角上窮吝也伊川先生曰至剛而在最上者角也九以剛居上故以角為象人之相遇由降屈以相從和順以相接故能合也上九髙亢而剛極人誰與之以此求遇固可吝也已則如是人之逺之非它人之罪也由己致之故无所歸咎既處窮上剛亦極矣是上窮而致吝也以剛極居髙而求遇不亦難乎並易傳横渠先生曰窮不知變吝之道也易說藍田吕氏曰上九角居首上遇道至於角窮矣窮雖吝狹不可以及衆亦庶乎不自失故无咎白雲郭氏曰居姤之終不知道之變道既上窮猶欲遇焉是其所以吝也无咎者姤以妄遇則有凶上九既不遇於君又進則无所遇非能得无咎之道幸而居无咎之位耳與九三无大咎同義易說漢上朱氏曰上九姤之極有弗遇焉前剛角也姤道上窮不動則不和不和則无所遇動則吝是以窮也易傳曰上九髙亢而剛極人誰與之以此求遇將安歸咎乎易傳新安朱氏曰角剛乎上者也上九以剛居上而无位不得其遇故其象占與九三𩔖本義合訂刪補大易集義粹言卷四十八
