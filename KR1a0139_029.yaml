body:
  text: 合訂刪補大易集義粹言卷二十七頭等侍衛納喇性德編坤下艮上伊川先生曰剝序卦賁者飾也致飾然後亨則盡矣故受之以剝夫物至于文飾亨之極也極則必反故賁終則剝也卦五隂而一陽隂始自下生漸長至于盛極羣隂消剝于陽故為剝也以二體言之山附于地山髙起地上而反附著于地頽剝之象也易傳東萊吕氏曰賁者飾也致飾然後亨則盡矣以致飾為亨則其亨盡矣譬如花開方其未開之時固有無窮之意及其一開之後則殘謝而已豈復有餘藴哉易説剝不利有攸往伊川先生曰剝者羣隂長盛消剝于一作一陽之時衆小人剝喪於一無於字君子故君子不利有所往唯當巽言晦迹隨時消息以免小人之害也易傳白雲郭氏曰剝有二道有民剝君小人剝君子民之剝君不過厚百姓以自薄為安宅順止之道小人剝君子則毋與爭利藏器待時而已潛龍勿用內文明而外柔順艱正晦其明儉德辟難遁之時義皆君子遇剝之義也剝之卦辭獨言不利有攸往者遇剝無它説焉懼君子以道自任與小人校也易説新安朱氏曰剝落也五隂在下而方生一陽在上而將盡隂盛而陽消落九月之卦也隂盛陽衰小人壯而君子病又內坤而外艮有順時而止之象故占得之者不可以有所往也本義彖曰剝剝也柔變剛也不利有攸往小人長也順而止之觀象也君子尚消息盈虛天行也伊川先生曰剝剝也謂剝落也柔變剛也柔長而剛剝也夏至一隂生而漸長一隂長則一陽消至于一無于字建戍則極而成剝是隂柔變剛陽也隂小人之道方長盛而剝消于一作剛陽故君子不利有所往也君子當剝之時知不可有所往順時而止乃能觀剝之象也卦有順止之象乃處剝之道君子當觀而體之君子尚消息盈虛天行也君子存心消息盈虛之理而能順之乃合乎天行也理有消衰有息長有盈滿有虛損順之則吉逆之則凶君子隨時敦尚所以事天也並易傳橫渠先生曰處剝之時順止以觀天理之消息盈虛易説龜山楊氏曰剝剝也隂剝陽也五隂上行小人之長極矣有爵賞以導其前刑威以驅其後中才而下孰不變而從之乎雖有剛明之資蓋將遜言屈身以避害亦理勢然也夫剛柔之往來相為屈伸天行也柔能變剛惟剝之時為然非特相為屈伸而已君子於是時順而止之可也往斯害矣夫坤順而艮止剝之成象也觀剝之象則知所以治剝矣東漢之君子不知出此引姦凶而授之柄卒至俱傷兩敗而國隨以亡蓋有以取之也夫寒暑之變天且不能暴為之況於人乎然君子之尚消息盈虛無時而不然獨於剝言者蓋當是時存亡之機間不容息與它卦異故也易説或問臺諫官如何作曰剝之彖曰不利有攸往小人長也順而止之觀象也君子尚消息盈虛天行也夫君子之於小人方其進也不可以驟去觀剝之象斯可見矣剝坤下而艮上坤順也艮止也此天理之不可易者也順而止之其漸而非暴之謂乎隂陽之氣消息盈虛必以其漸君子所尚蓋在於此荆州語録白雲郭氏曰伊川曰山附于地圯剝之象雍曰剝落也剛過久而柔落之卦之所以為剝也自初至五剝五剛而為柔剝之極也一陽順于下而止于上僅足以避害而已故不利有攸往然衆柔剝剛其害為難避君子觀順止之象而行順止之道故能處剝之時也消息盈虛天道之運君子所尚之道也當陽消隂息進盛而剝是為天道自然之運君子何尤焉不過於觀象順止俟時而已易説漢上朱氏曰剝本乾隂侵陽進而剝之柔剝乎剛下剝其上回邪剝正道小人剝君子剛為柔變故曰剝剝也柔變剛也此以五隂剝陽言剝也剝而不已一陽僅存小人既長君子道消往亦無與何所之哉當巽言屈身避害而已故曰不利有攸往小人長也此以上九言剝也聖人患君子不往人道將絶故又發其義曰順而止之坤順艮止也止小人之道當順其理而止之乃可以止蓋以象觀之剝極當止之時五變隂陽有可反之理剝反晉晉反大有而乾體復矣天道之行消於巽息於兊盈於乾虛於坤消極則息盈久則虛君子尚之與時偕行能柔能剛任理而已矣漢唐之季小人道長諸賢不能順而止之悉力以抗小人是以無成功王弼謂強亢激拂觸忤以隕身身既傾焉功又不就非君子之所尚也故曰順而止之觀象也君子尚消息盈虛天行也此以艮坤二體剝復升降明處剝之道也在卦氣為九月故太玄準之以割鄭康成以萬物零落謂之剝者論卦氣也彖言象者三剝也鼎也小過也剝小過卦變之象也卦變自辟卦言之坤變復六變而成乾乾變姤六變而成坤自反對言之復姤變十二卦遁否臨泰變四十八卦自下而變也觀剝之象則知之矣自相生言之復姤五變成十卦臨遁五復五變成二十四卦泰否三復三變成十八卦上下相變也觀小過之象則知之矣鼎互體之象也卦以隂陽虛實剛柔竒耦交錯互變於六爻之中而象其物宜觀鼎之象則知之矣觀是三者易之象舉積此矣易傳又剝之彖曰柔變剛也純乾之卦而柔變之一變為姤二變為遁三變為否四變為觀五變為剝此變卦見于易者也隂陽升降變而為六十四叢説新安朱氏曰剝剝也以卦體釋卦名義言柔進于陽變剛為柔也不利有攸往以卦體卦德釋卦辭本義問龜山云消息盈虛天且不能暴為之去小人亦不可驟如何曰只看時如何不可執天亦有迅雷風烈之時語録象曰山附於地剝上以厚下安宅伊川先生曰艮重於坤山附於地也山髙起於地而反附著於地圯剝之象也上謂人君與居人上者觀剝之象而厚固其下以安其居也下者上之本未有基本固而能剝者也故上一作山之剝必自下下剝則上危矣為人上者知理之如是則安養人民以厚其本乃所以安其居也書曰民惟邦本本固邦寧易傳藍田吕氏曰剝浸以衰而將落也山崩則附于地髙者雖下而其基固矣君子有取焉厚下安宅皆所以固基也廣平遊氏曰山附於地則山頽之象山至於頽則以下不厚而上危故也易説龜山楊氏曰小人之剝必自下始浸而至乎上君子知所以厚下則無所措其剝矣乃可以安宅也易説白雲郭氏曰以剛柔言之則天道盈虛消息所以有剝自卦才言之則順而止之為處剝之道由象言之則山附於地者剝也厚下安宅者處剝之道也彖象之義不一而足象言上者非獨君后也凡居上者皆當然也語曰百姓足君孰與不足是亦厚下之道厚下所以安宅也夫知幾君子未必至於剝之時也不幸而至是不過厚下俟時而已易説漢上朱氏曰山剝而附於地則其下厚矣為人上者觀此故裕民崇本務厚其下是乃安宅不傾之道書曰民惟邦本本固邦寧易傳新安朱氏曰僴問上以厚下安宅者安於禮義而不遷否曰非也厚下者乃所以安宅如山附於地地厚所以山安其居而不搖人君厚下以得民則其位亦安而不搖猶所謂本固邦寧也語録初六剝牀以足蔑貞凶象曰剝牀以足以滅下也伊川先生曰隂之剝陽自下而上以牀為象者取身之所處也自下而剝漸至于身也剝牀以足剝牀之足也剝始自下故為剝足隂自下進漸消蔑於一無於字貞正凶之道也蔑無也謂消亡於正道也一作消亡正道也一作消亡於正也隂剝陽柔變剛是邪侵正小人消君子其凶可知取牀足為象者以隂侵沒陽於下也滅沒也侵滅正道自下而上也並易傳龜山楊氏曰剝自下而上惟厚下為可以安宅安民所以厚下也牀人所安也足牀所恃以為安者也剝牀以足則蔑厚下之道也故凶小人剝民以自厚得志則害加乎人天下之凶也及夫進而位乎上則下已不厚矣亦非所以自安也故其卒至於剝廬而無所容其凶豈不已甚乎小人如此亦足以戒矣易説白雲郭氏曰剝自下興也故初言剝牀以足剝以厚下而安牀雖僅可安身亦非厚下之道況剝其足者乎既失厚下之道則下已滅矣然剝之初而未甚也所以蔑貞則凶言貞固不滅則無凶矣詩曰載寢之牀故處牀為求安之道剝言牀亦見道之無乎不在也易説漢上朱氏曰劉牧讀剝牀以足蔑案六四曰剝牀以膚則剝牀以足當為句絶坤變乾也坤西南方也初動成巽巽為木設木于西南之奧乾人藉之牀之象也剝以其足寢其上者危矣初有伏震震為足隂之剝陽必自下始蔑無之也無君子之正則凶矣象曰滅者滅盡也無君子之正者以滅盡之也小人之害正如此易傳新安朱氏曰剝自下起滅正則凶故其占如此蔑滅也本義六二剝牀以辨蔑貞凶象曰剝牀以辨未有與也伊川先生曰辨分隔上下者牀之幹也隂漸進而上剝至於辨愈蔑於正也凶益甚矣隂之侵剝於一作剛陽得以益盛至於剝辨者以陽未有應與故也小人侵剝君子若君子有與則可以勝小人不能為害矣惟其無與所以被蔑而凶當消剝之時而無徒與豈能自存也言未有與剝之未盛有與猶可勝也示人之意深矣並易傳橫渠先生曰三雖隂類然志應在上二不能進剝陽爻徒用口舌間説力未能勝故象曰未有與也然志在滅陽故亦云蔑貞凶易説龜山楊氏曰辨牀之幹蓋上下之辨也剝止乎辨則剝未及上矣以其無應而未有與也然處羣隂之中其能終無與乎故曰未而已則蔑正之凶理必至也易説白雲郭氏曰伊川曰辨牀之幹所以分上下也輔嗣謂足之上孔氏謂牀身之下足之上分辨之處義皆一也剝牀以辨則其剝進矣未有與者逺陽而無應無以止之也或近陽而有應有以止之安有蔑貞之凶哉天下之患未有不自小至大自微至著苟不能辨之于早未有不至于凶者剝之初二有凶之漸而非凶也三以應而無咎四則凶矣易説漢上朱氏曰鄭康成曰足上稱辨近膝之下屈則相近伸則相逺故謂之辨辨分也崔璟曰辨當在笫足之間牀䏶也巽為木為股艮為指在初為趾二在股趾之間近膝之下股之象䏶即股也隂浸長次及於二猶剝牀至於股也九二無應未有與之者是以小人無所忌憚二當內不失正以自守斯可矣若迫窮禍患蔑所守之正則凶蔑無之也曰蔑貞凶戒六二也剝之方長君子而有與猶可勝也剝而自守其正小人雖勝猶未凶也易傳新安朱氏曰辨牀幹也進而上矣未有與言未大盛本義問剝之初與二蔑貞凶是以隂滅陽以小人滅君子之正道凶之象也不知只是陽與君子當之則凶為復隂與小人亦自有凶先生曰自古小人滅害君子終必自凶但此爻象只是説陽與君子之凶也語録六三剝之無咎象曰剝之無咎失上下也伊川先生曰衆隂剝陽之時而三獨居剛應剛與上下之隂異矣志從於正在剝之時為無咎者也三之為可謂善矣不言吉何也曰方羣隂剝陽衆小人害君子三雖從正其勢孤弱所應在無位之地於斯時也難乎免矣安得吉也其義為無咎耳言其無咎所以勸也三居剝而無咎者其所處與上下諸隂不同是與其同類相失於處剝之道為無咎如東漢之吕強是也並易傳橫渠先生曰獨應於陽故反為衆隂所剝然無所咎易説龜山楊氏曰以隂居陽不當位也而其志剛矣居不當位而間乎衆隂之中勢不足以有為也隂方剝陽而已獨應之失上下矣於義無咎則吉凶不足言也易説白雲郭氏曰剝之時小人道長之極羣衆剝君子獨六三捨其羣類於上下而應乎陽是捨小人而從君子也所以在道為無咎然則六三之失其類乃所以為有得歟易説漢上朱氏曰上九以剛居一卦之外六三在小人中以柔應剛獨有輔上救亂之志易傳謂漢之吕強是也然上九不當位其勢微弱不能相應而有為失上也衆隂並進三獨為君子初二既剝安能免於衆隂之所剝乎失下也上下皆失三雖不免於剝而義則無咎非特立不懼者能如是乎易傳五峯胡氏曰剝者隂剝陽也三居剛應剛以隂從陽者也昔東漢吕強處閹官之中獨有愛君子憂宗社之心雖身被殺猶有令名故無咎也易外傳新安朱氏曰衆隂方剝陽而已獨應之去其黨而從正無咎之道也占者如是則得無咎上下謂四隂本義東萊吕氏曰六三居羣隂剝陽之時乃獨與上相應則必與上下之羣隂相失也然謂之無咎者處小人之羣必與小人相失然後於君子之道無咎得小人之心必失君子之心得君子之心必失小人之心無兩立之理易説六四剝牀以膚凶象曰剝牀以膚切近災也伊川先生曰始剝于牀足漸至于膚膚身之外也將滅其身矣其凶可知隂長已盛陽剝已甚貞道已消故更不言蔑貞直言凶也五為君位剝已及四在人則剝其膚矣剝及其膚身垂於亡矣切近於災禍也並易傳橫渠先生曰迫近君位猶自下剝牀至牀之膚將及於人也不言蔑正剝道成矣一云五於隂陽之際義必上比故以喻膚易説龜山楊氏曰剝牀以足以辨則剝其所安而已未及膚也六四履近尊位則剝及膚矣其災也豈不切近乎易説白雲郭氏曰牀剝而後及其身及其身自膚始六四上體居牀之上則膚矣初二先剝其所安而後有及身之漸不能止之則災及其身矣故直云凶也繫辭言剝窮上反下於此可見易説漢上朱氏曰艮為膚柔而近革六四之象巽為牀剝牀及膚切近災也五君位剝陽至四而乾毁其凶可知象言災者隂長剝陽天也剝道至此三不能止君子其如天何易傳新安朱氏曰隂禍切身故不復言蔑貞而直言凶也本義六五貫魚以宫人寵無不利象曰以宫人寵終無尤也伊川先生曰剝及君位剝之極也其凶可知故更不言剝而别設義以開小人遷善之門五羣隂之主也魚隂物故以為象五能使羣隂順序如貫魚然反獲寵愛於在上之陽如宫人則無所不利也宫人宫中之人妻妾侍使也以隂言且取獲寵一作親愛之義以一陽在上衆隂有順從之道故發此義羣隂消一無消字剝於一無於字陽以至於極六五若能長率羣隂駢首順序反獲寵愛於陽則終無過尤也於剝之將終復發此義聖人勸遷善之意深切之至也並易傳橫渠先生曰六五為上九之膚能下寵衆隂則陽獲安而無不利矣異於六三者以其居尊制裁為卦之主故不云剝之也終無尤怨者以小人之心不過圖寵利而已不以宫人見蓄為恥也隂陽之際近必相比六五能上附於陽反制羣隂不使進逼方得處剝之善下無剝之之憂上得陽功之庇故曰無不利易説藍田吕氏曰剝之時小人長而君子消六五以柔中居尊位其御小人以柔而不以威者也道以御之小人不失其寵雖曰道長亦莫能害君子者御得其道也龜山楊氏曰五君位也剝至於切近災則極矣不可以有加矣故言人君處剝之道夫魚隂物也貫之則其敘不可亂羣隂順承之象也先王之時六宫各帥其屬以時御敘于王所九嬪掌之御敘于王之燕寢女御掌之而嬪御之職皆列于天官太宰蒞之則燕好嬖昵之私不得干其上矣貫魚之象也以是寵之何尤之有夫女子與小人之難養一也先王所以處之無二道焉使羣隂順承如魚然以宫人寵之則無不利矣是亦順而止之之道也若夫付之以心膂之寄借之以威福之重而遽絶之則肘腋之變不可測可不戒之哉易説白雲郭氏曰六五柔得尊位大中為剝之主能御衆隂以承陽者也魚隂類也六五未見其類是以能聫而貫之制於我也雖制於我而在剝無剛決之義故以宫人寵之孔子曰惟女子與小人為難養也然則女子小人為同類御小人以宫人之道斯其宜矣方剝之時小人進長六五知不可決而寵之所謂順剝之時而為止剝之道者也雖然貫衆隂而寵之疑非聖人之道而曰無不利終無尤者蓋消息盈虛天之所行君子之所尚雖聖人不能違時特於其間既順以從時而又有止之道以救時耳非若一於順而寵之不知濟時者也安定先生曰以宫人寵但厚之田宅不使竊天下之權則無不利然此謂根蒂之難去者易説漢上朱氏曰巽為魚為繩艮為手持繩下連衆隂貫魚也艮坤為宫止于中也乾為人巽為進退以宫人寵也宫人嬪婦女御之屬古之進御於君者望前先卑望後先尊尊卑迭為進退五得尊位其動也正與上同德下制衆隂若貫魚然咸順于上以宫人寵之使尊卑有序厚恩錫豫不及以政寵均則勢分不及以政則無權小大相持乃可為也故無不利六居五宜有尤而以正制小人者盡道終無尤也五有伏兊為口尤之也不然魚脫于淵其能制乎或曰先儒以巽為魚何也曰以重卦離知之包犧氏結繩而為罔罟以佃以漁蓋取諸離離中冇巽巽復有離巽為魚以漁也離為雉以佃也魚龍同氣東方鱗蟲龍為之長震為龍木之王氣巽為魚木之廢氣故太玄以三八為木為鱗兼震巽言之易傳新安朱氏曰魚隂物宫人隂之美而受制於陽者也五為衆隂之長當率其類受制於陽故有此象而占者如是則無不利也本義東萊吕氏曰六五居羣隂剝陽之首義本當凶然為有一陽在上隂必從陽故五率羣隂順序從陽如貫魚獲寵愛於陽如宫人蓋五隂雖小人上御得其道則天下狙詐咸作使易説上九碩果不食君子得輿小人剝廬象曰君子得輿民所載也小人剝廬終不可用也明道先生曰息訓為生者蓋息則生矣一事息則一事生中無間斷碩果不食則便為復也寒往則暑來暑往則寒來寒暑相推而嵗成焉劉絢師訓伊川先生曰諸陽消剝已盡獨有上九一爻尚存如碩大之果不見食將見復生之理上九亦一作一一作已變則純隂矣然陽無可盡之理變於上則生於下無間可容息也聖人發明此理以見陽與君子之道不可亡也或曰剝盡則為純坤豈復有陽乎曰以卦配月則坤當十月以氣消息言則陽剝一有盡字為坤陽一有復字來為復一有然字陽未嘗盡也剝盡於上則復生於下矣故十月謂之陽月恐疑其無陽也隂亦然聖人不言耳隂道盛極之時其亂可知亂極則自當思治故衆心願載於君子君子得輿也詩匪風下泉所以居變風之終也理既如是在卦亦衆隂宗陽為共載之象小人剝廬若小人則當剝之極剝其廬矣無所容其身也更不論爻之隂陽但言小人處剝極則及其廬矣廬取在上之象或曰隂陽之消一作交必待盡而後復生於下此在上便有復生之義何也夬之上六何以言終有凶曰上九居剝之極止有一陽陽無可盡之理故明其有復生之義見君子之道不可亡也夬者陽消隂隂小人之道也故但言其消亡耳何用更言却有復生之理乎正道消剝既極則人復思治故陽剛君子為民所承載也若小人處剝之極則小人之窮耳終不可用也非謂九為小人但言剝極之時小人如是也並易傳橫渠先生曰處剝之世有美實而不見採然其德備猶為民所載小人處下則剝牀處上則反傷于下是終不可用之也易説龜山楊氏曰羣隂剝陽而一剛止乎上碩果不食也剝乾五變也故有碩果之象焉乾為木果然君道也父道也天下不可一日而無也故隂雖上行剛則不食與夬之上六不可長異矣夫坤順而艮止剝之成象也碩果不食者順而有以止之故也坤則順而已矣故履霜堅冰至而卒有疑陽之戰順而無以止之故也故坤之文言曰履霜堅冰至蓋言順也然剝終則復亂極則思治當是時君子者民所載也故得輿坤下承之得輿之象也坤為大輿君子而得輿道盛行也小人無所庇其身則剝廬矣夫隂陽之往來屈伸理之必至也小人之為亂至於剝廬而後已蓋亦不思而已矣易説白雲郭氏曰果者易食之物也在剝之時君子易傷之象也果之碩大易食而不食君子居剝易傷而不傷者以君子觀剝之象中有順而止之之道足以厚下故終不食也且無君子莫治野人無野人莫養君子君子小人蓋相須也輿所以載君子小人之象廬所以庇小人君子之象君子得輿為民所載則有厚下之道故也小人之性自下窮上必剝其廬而後已剝其廬則無以自庇終失所安之象以見小人不可用於天下國家也唯其終不可用而遭時未復故以宫人寵之宜矣能貫之則可窮而寵之亦可貫所以柔服其心毋使為患而已此孔子所以嘆其難養也然君子之剝非自取也小人剝之也故其剝也有漸小人之性不能有物處剝之極必自剝矣是以其亡也忽焉蓋自取之速也易於小人女子有順止貫寵之道非達時變者不足以知此易説漢上朱氏曰坤隂剝乾四成巽為木至五成艮為果陽為大衆隂不能剝之碩果也兊為口艮見兊伏不食也君子在外不為小人剝喪之象碩果不食下而復生剝反為復必然之理天地間未嘗一日無陽亦未嘗一日無君子剝終復始間不容髮坤為輿為衆極亂之後五隂奉一陽君子於是得衆而民載之故曰君子得輿民所載也易傳曰詩匪風下泉所以居變風之終也艮為舍乾為天天際在外野也舍在野廬之象陽為君子小人託庇於君子上九剝而為六小人用事自徹其庇至於無所容其軀而在外之君子亦失其所故曰小人剝廬終不可用也易傳新安朱氏曰一陽在上剝未盡而能復生君子在上則為衆隂所載小人居之則剝極於上自失所覆而無復碩果得輿之象矣取象既明而君子小人其占不同聖人之情益可見矣本義小人剝廬是説隂到這裏時把它這些陽都剝了此是自剝其廬舍無安身已處小人托君子為庇覆若更剝了是自剝其廬舍便不成剝了先生論易謂聖人作易本為欲定天下之志斷天下之疑而已不是要因此説道理也如人占得這爻便要人知得這爻之象是吉是凶吉便為之凶便不為然如此理却自在其中矣如剝之上九碩果不食君子得輿小人剝廬其象如此謂一陽在上如碩大之果人不及食而獨留於其上如君子在上而小人皆載於下則是君子之得輿也然小人雖載君子而乃欲自下而剝之則是自剝其廬耳蓋惟君子乃能覆蓋小人必賴君子以保其身今小人欲剝君子則君子亡而小人亦無所容其身如自剝其廬也且看自古小人欲害君子到害得盡後國破家亡其小人曽有存活得者否故聖人象曰君子得輿民所載也小人剝廬終不可用也若人占得此爻則為君子之所為者必吉而為小人之所為者必凶矣其象如此而理在其中却不是因欲説道理而後説象也問伊川所説剝卦曰公説關要處未甚分明上才消下便生且如復卦是一陽有三十分他便從三十日頭逐分纍起到得交十一月冬至他一爻已成消時也如此只伊川説欠得幾句説漸消漸長之意問冬至子之半如何是一陽方生或云冬至子之半是已生成一陽不是一陽方生先生曰冬至方是結算那一陽冬至以後又漸生成二陽過一月却成臨卦坤卦之下初陽已生矣或問碩果不食伊川謂陽無可盡之理剝於上則生於下無間可容息也變於上則生於下乃剝復相因之理畢竟須經由坤坤卦純隂無陽如此陽有斷滅也何以能生於復曰凡隂陽之生一爻當一月須是滿三十日方滿得那腔子做得一畫成今坤卦非是無陽陽始生甚微未滿那腔子做一畫未成非是坤卦純隂便無陽也然此亦不是甚深奧事但伊川當時解不曽分明道與人故令人做一件大事看陽無驟生之理如冬至前十月中氣是小雪陽已生三十分之一分到得冬至前幾日須已生到二十七八分到至日方始成一畫不是昨日全無今日一旦便都復了大抵剝盡處便生莊子云造化密移疇克然哉這語自説得好又如列子亦謂運轉亡已天地密移疇覺之哉凡一氣不頓進一形不頓虧亦不覺其成不覺其虧蓋隂陽寖消寖盛人之一身自少至老亦莫不然為其嫌於無陽也自觀至剝三十日剝方盡自剝至坤三十日方成坤三十日陽漸長至冬至方是一陽第二陽方從此生去隂剝每日剝三十分之一一月方剝得盡陽長每日長三十分之一一月方長成一陽隂剝時一日十二刻亦每刻中漸漸剝全一日方剝得三十分之一陽長之漸亦如此長直卿舉冬至子之半先生曰正是子之半方成一陽子之半後第二陽方生陽無可盡之理這箇才剝盡陽當下便生不曽斷續伊川説這處未分曉似欠兩句在中間方説得隂剝陽生不相離處虞復之云恰似月弦望便見得隂剝陽生逐旋如此隂不會一上剝陽不會一上長也問十月何以為陽月先生因反詰諸生令思之云程先生於易傳中雖發其端然終説得不透徹諸生以所見答皆不合復請問其旨先生云剝盡為坤復則一陽生也復之一陽不是頓然便生乃是自坤中積來且一月三十日以復之一陽分作三十分從小雪後便一日生一分到十一月半一陽始成也以此便見得天地無休息處義剛問十月為陽不應一月無陽恐陽是生於此月但未成體耳先生曰九月隂極則下已陽下生謂如六陽成六段而一段又分作三十小段從十月積起至冬至積成一爻矣不成一陽是陡頓生亦須從分毫積起且如天運流行本無一息間斷豈解一月無陽且如木之黃落時萌芽已生了不特如此木之冬青者必先生萌芽而後舊葉方落若論變時天地無時不變如楞嚴經第二卷首段所載非惟一嵗有變月亦有之非惟月有變日亦有之非惟日有變時亦有之但人不知耳此説亦是剝上九一畫分為三十分一日剝一分至九月畫方盡然剝於上則生於下無間可息至十月初一日便生一分積三十分成一畫但其始未著耳至十一月則此畫已成此所謂陽未嘗盡也道夫問隂亦然今以夬乾姤推之亦可見矣但所謂聖人不言者何如曰前日劉履之説蔡季通以為不然某以為分明是如此但聖人所以不言者這便是一箇參贊裁成之道蓋抑隂而進陽長善而消惡用君子而退小人這便可見此理自是恁地雖堯舜之世豈無小人但有聖人壓在上面不容他出而有為耳豈能使之無耶劉履之曰蔡季通嘗言隂不可以抗陽猶地之不足以配天此固然之理也而伊川乃謂隂亦然聖人不言耳元定不敢以為然也問上九碩果不食先生因曰小人剝廬一句舊見二十家叔説懷字公立廬如周禮秦無廬之廬音盧蓋戟柄也謂小人自剝消其戟柄僅留其鐵而已果何所用如此説方見得小象小人剝廬終不可用一句意亦自好並語録合訂刪補大易集義粹言卷二十七
