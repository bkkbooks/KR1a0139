body:
  text: 合訂刪補大易集義粹言卷三十八頭等侍衛納喇性德編乾下震上伊川先生曰大壯序卦遁者退也物不可以終遁故受之以大壯遁為違去之義壯為進盛之義遁者隂長而陽遁也大壯陽之壯盛也衰則必盛消息一作長相須故既遁則必壯大壯所以次遁也為卦震上乾下乾剛而震動以剛而動大壯之義也剛陽大也陽長已過中矣大者壯盛也又雷之威震而在天上亦大壯之義也易傳東萊呂氏曰天下事必有對盛者衰之對強者弱之對遁既極矣不可以不壯故以大壯繼遁乾極乎髙而雷動乎上其為壯也可知易説大壯利貞伊川先生曰大壯之道利於貞正也大壯而不得其正強猛之為耳非君子之道壯盛也易傳白雲郭氏曰泰之辭言小往大來而彖則言天地上下隂陽健順君子小人以及大小之類大壯之象四陽過中名卦之義實取於大也雖天地亦大者之壯非獨人事而已與泰言大來無以異也故彖曰正大而天地之情可見矣易説新安朱氏曰大謂陽也四陽盛長故為大壯二月之卦也陽壯則占者吉亨不假言但利在正固而已本義彖曰大壯大者壯也剛以動故壯大壯利貞大者正也正大而天地之情可見矣伊川先生曰所以名大壯者謂大者壯也隂為小陽為大陽長已盛是大者壯也下剛而上動以乾之至剛而動故為大壯為大者壯與壯之大也大者既壯則利於貞正正而大者道也極正大之理則天地之情可見矣天地之道常久而不已者至大至正也正大之理學者默識心通可也不云大正而云正大恐疑為一事也並易傳藍田呂氏曰大壯居強盛之勢也大者壯體大而勢盛也大者正體大勢盛而無邪僻也天地之體大矣勢盛矣情正矣龜山楊氏曰剛以動大者之壯也壯而弗正則為暴而已故利貞易説白雲郭氏曰凡天地萬物大者之壯俱為大壯徒用壯而已非大壯也德之大者無踰於天自人道言之人得天德而動壯之所以大也且強梁以動者雖無不壯其或窮人欲而滅天理則性善梏亡天德於是失之矣雖壯而非大也故必得天之剛德而動而後謂之大壯大壯利貞者大者之正也大者天也正則天之德也天地之情於斯可見況人道乎孟子謂齊宣王曰王請無好小勇夫撫劒疾視曰彼惡敢當我哉此匹夫之勇敵一人者也王請大之惟孟氏深明大小之義諸子未之或知也故言文武一怒而安天下之民豈所謂大者之壯歟若匹夫匹婦自經於溝瀆何其小哉聖人以羊譬壯深見小人之情矣易説漢上朱氏曰隂陽迭壯者也以三畫卦言之初為少二為壯三為究以重卦言之初二為少三四為壯陽動於復長於臨交於泰至四爻而後壯泰不曰壯者隂陽敵也過於隂則陽壯矣猶人血氣方剛故曰大壯大者壯也陽之初其動甚微動而不已物莫能禦君子之道義其大至於塞乎天地之間者以剛動也故曰剛以動故壯此合震乾二體而言壯之時也初九大者正也大者正乃能動而不屈壯而不以正則失之暴不能久也飄風暴雨江河之大皆不能久故曰利貞大者正也此以初九言壯之道也曾子曰自反而縮雖千萬人吾往矣正故也正故能大天地之動也乾始於子坤始於午震卯而兊酉正也故四時行百物生其大無外以正而大也易傳曰天地之道常久而不已者亦至大至正而已故正大而天地之情可見矣以卦氣言之二月也故太玄準之以格夷易傳新安朱氏曰剛以動釋卦名義以卦體言則陽長過中大者壯也以卦德言則乾剛震動所以壯也天地之情可見釋利貞之義而極言之本義此卦多説羊羊是兊之屬季通説這箇是夾住底兊卦兩畫當一畫問大壯大者正與正大不同上大字是指陽下正大字是説理先生曰然亦緣上面有大者正一句方説此問如何見得天地之情正大曰天地只是正大未嘗有些子邪處未嘗有些子小處又曰且如今言藥性熟藥何嘗有性只是他所主恁地並語録東萊呂氏曰壯利於正不正而壯者乃血氣之壯耳剛以動由天德而動至誠不息故謂之大壯天剛也陽也用壯於血氣者是蔽於私欲小智反所以自狹自弱也人情每恃其能而欲大其已然卒不能成其大者蓋不明致壯之道欲己之壯乃狹己之為烏能致於壯哉惟夫擴吾一己之大則自然而壯矣故曰大者壯也剛者天之道以天之道而動則無一不合於天理此所以為壯故曰剛以動故壯常人每恃己之強以為壯大抵皆失正理故大壯必利於正惟知以正道為壯便與天地同其大蓋褊狹者不足以見天地才去私意小智則便見天地正大之情矣天地之情不外乎正吾能盡去一己之私以正而大則天地正大之情亦不能外也正大而天地之情可見矣此一句全要看正大兩字人與天地三者初無輕重緣卑汙蹇淺所以自小之耳今世學者病不在弱只是小易説象曰雷在天上大壯君子以非禮弗履伊川先生曰雷震於天上大而壯也君子觀大壯之象以行其壯君子之大壯者莫若克己復禮古人云自勝之謂強中庸於和而不流中立而不倚皆曰強哉矯赴湯火蹈白刃武夫之勇可能也至於克己復禮則非君子之大壯不可能也故云君子以非禮弗履易傳橫渠先生曰克己反禮壯莫甚焉故易於大壯之用見之克己下學上達交相養也下學則必達達則必上蓋不行則終何以成德明則誠矣誠則明矣克己要當以理義戰退私己蓋理乃天德克己者必有剛強壯健之德乃勝已雷在天上大壯君子以非禮弗履夫酒清人渴而不敢飲肉乾人飢而不敢食非強有力者不能人所不能人所以不能行已者於其所難者則惰其異俗者雖易而羞縮惟心𢎞則不顧人之非笑所趨義理耳視天下莫能移其道然為之人亦未必怪正以在己者義理不勝惰與羞縮之病消則有長不消則病常在消盡則是大而化之之謂聖意思齷齪無由作事在古氣節之士冒死以有為於義未必中然非有志槩者莫能況吾於義理己明何為不為正以不剛惟大壯乃能克己蓋君子欲身行之為事業以教天下今夫為長者折枝非不能也但恥以為屈而不為耳不顧義理之若何並易説藍田呂氏曰雷在天上則天下震驚體大而勢盛也禮所以正心修身非禮弗履則威嚴行而天下服龜山楊氏曰君子之壯壯於禮而已行有不慊於心則餒矣尚能壯乎哉易説白雲郭氏曰天下雷行為無妄雷在天上為大壯無妄之動以天則天德及物之時故象言茂對時育萬物大壯先天而後動在人則盡心知性則知天之時期不失中庸所謂天命之性者故象以非禮弗履為言也且壯者君子所以勝已而小人所以勝人孔子告顔淵以克己復禮勝己之道也既勝己之私則無適而非天矣是為壯之大者也小人不知勝己至於窮人欲而滅天理何大之有是以九三秖以用壯言之然有大壯之弗履以成已然後有無妄之育物以成物二者之道相為終始亦猶中庸言天命之謂性率性之謂道而後曰修道之謂教蓋性與道成己也而教所以成物也易説漢上朱氏曰雷在地者也而在天上大壯也雷在天上非所履而履故史墨謂雷乘乾為臣強之象然俄且降矣君子以是動必以正非禮弗履非禮弗履所以全其壯也易傳新安朱氏曰自勝者強本義問雷在天上大壯君子以非禮弗履伊川以自勝者為強克己復禮非君子之大壯不可能也又引中庸和而不流中立而不倚皆曰強哉矯為證其義是如此否先生曰固是君子之自治須是如雷在天上恁地威嚴猛烈方得若半上落下不如此猛烈果決濟得甚事又云公則正私則邪勝私復禮之機即體公行正之端也語録東萊呂氏曰天下至難克者莫如己大抵外物雖至堅然有力者能克之惟己之私欲雖賁育之勇克之猶難雷在天上大壯聲既髙且大自常人處之必以此壯平四夷伐鬼方惟君子於此則用以克己故非禮勿履乃為直壯蓋務自勝者乃壯之大也務勝人者非聖人之所謂壯也能於一身上下工夫最為壯也易説初九壯于趾征凶有孚象曰壯于趾其孚窮也伊川先生曰初陽剛乾體而處下壯于進者也在下而用壯壯于趾也趾在下而進動之物九在下用壯而不得其中夫以剛處壯雖居上猶不可行況在下乎故征則其凶有孚孚信也謂以壯往則得凶可必也壯于趾在最下而用壯以行可必信其窮困而凶也並易傳藍田呂氏曰初九居下而壯勢必犯上繇是而往其究必凶龜山楊氏曰剛健而在下壯于趾者也在下未足以有行故征凶上無應焉雖剛實而有孚其孚不遠矣故曰其孚窮也易説白雲郭氏曰壯于趾者用壯之始也始而用壯必終於凶矣有孚者信其必以凶窮也凡爻辭獨言壯者謂小人之壯皆非大者壯也易説漢上朱氏曰初在下體之下應震足而動趾也孚四也初九剛在下用壯不中當守正不動以全其壯可也征凶者以正行亦凶言不可行行則兩剛相敵而四不應壯豈得用哉故壯于趾者以其孚窮也易傳曰用壯而不得中雖以剛居上猶不可行況在下乎易傳新安朱氏曰趾在下而進動之物也剛陽處下而當壯時壯于進者也故有此象居下而壯于進其凶必矣故其占又如此本義東萊呂氏曰以九居初二者皆是陽又居乾體三陽同居若以其壯勇敢躁進則必致乎凶此有孚與他卦有孚不同征凶有孚謂其凶無疑也然既以壯名卦則三陽正合卦體何故凶蓋體既壯能用以自治克己復禮則吉若用此勇鋭躁進安能不凶趾者如足趾之在下而好動大抵在上之人有勢有位猶可以有為既處卑下居貧賤而恃其強壯躁於求進信乎其凶也猶人始學之初稍有剛強制遏不定便欲奮然作為見於行事其行而得凶蓋理之必信而無疑者也故謂之有孚蓋不能自制其壯遽欲作為是反為壯之所使矣此弱也非壯也易説九二貞吉象曰九二貞吉以中也伊川先生曰二雖以陽剛當大壯之時然居柔而處中是剛柔得中不過於壯得貞正而吉也或曰貞非以九居二為戒乎曰易取所勝為義以陽剛健體當大壯之時處得中道無不正也在四則有不正之戒人能識時義之輕重則可以學易矣九二所以貞正而吉者以其得中道也中則不失正況陽剛一有壯字而乾體乎並易傳藍田呂氏曰九二以陽居隂以謙居壯者也又不失其中居之安矣龜山楊氏曰居大壯之時而剛得中故為吉蓋大者之正惟有九二盡之故曰貞吉而已易説白雲郭氏曰卦辭言利貞然得其貞者九二也九二之貞謂固守大壯之道也天之德以剛中為正九二以剛居中是以能固守而貞吉也居卦之下位為不足未能究天德之用故特曰貞吉而已蓋非禮弗履之士也易説漢上朱氏曰九二剛中壯而處中其動也正正則吉正吉者以中也蓋剛正而不中者有矣中庸曰中立而不倚強哉矯其九二乎易傳曰居柔處中不過乎壯者也易傳新安朱氏曰以陽居隂已不得其正矣然所處得中則猶可因以不失其正故戒占者使因中以求正然後可以得吉也本義東萊呂氏曰九二之爻聖人不加一辭而直謂之貞吉者蓋直指大壯之體以示人也人見説大壯將謂直是猛厲却不知只在柔中處二柔也九剛也以九居二是君子所謂剛者只在柔中處二與初皆九資質略同何在初則凶而二則吉蓋二雖是以剛居乾體其所以異於初九者二用壯以中居中而正是學而有成者也學者當以初九九二二爻參看譬如兩人其剛決氣質雖同一人剛而不知處中一人雖剛而能處中則吉凶分矣九既居二之中能明理以自裁其過所以正吉觀此二爻則知人之氣質雖同要當明理方可易説九三小人用壯君子用罔貞厲羝羊觸藩羸其角象曰小人用壯君子罔也伊川先生曰九三以剛居陽而處壯又當乾體之終壯之極者也極壯如此在小人則為用壯在君子則為用罔小人尚力故用其壯勇君子志剛故用罔罔無也猶云蔑也以其志剛蔑視於事而無所忌憚也君子小人以地言如君子有勇而無義為亂剛柔得中則不折不屈施於天下而無不宜苟剛之太過則無和順之德多傷莫與貞固守此則危道也凡物莫不用其壯齒者齧角者觸蹄者踶羊壯於首羝為喜觸故取為象羊喜觸藩籬以藩籬當其前也蓋所當必觸喜用壯如此必羸困其角也猶人尚剛壯所當必用必至摧困也三壯甚如此而不至凶何也曰如三之為其往足以致凶而方言其危故未及於凶也凡可以致凶而未至者則曰厲也在小人則為用其強壯之力在君子則為用罔志氣剛強蔑視於事靡所顧憚也並易傳橫渠先生曰以陽居陽正也然乘下之剛故危小人用此而進如羝羊觸藩以為壯故多見困君子知幾則否藩以喻四三有應所志在進而位正理直小人處之必以剛動易説藍田呂氏曰九三居健之極以陽居陽小人恃勢以陵物故曰用壯君子居勢以自檢故曰用罔罔謂羅制其奔軼也君子居安而畏危故曰貞厲小人恃勢狠以陵物物莫之與則反為所困故曰羝羊觸藩羸其角藩謂四也龜山楊氏曰至剛而不中非大者正也小人則用壯而已在君子則罔也焉有仁人在位罔人而可為乎故雖正亦厲剛雖不中未足以極其壯故羝羊觸藩羸其角易説白雲郭氏曰剛至三而壯矣小人務勝人故喜壯而用之君子務在勝己之私不失天命之性是以勿用壯於外也以用壯為正則危矣羊狠而喜觸用壯之象也觸藩羸其角用壯而厲也其厲如此凡以小人不知壯有天道之大故也君子用罔者君子罔以壯為用也先儒或為羅罔之罔失之矣易説漢上朱氏曰九三不動陽為君子九動變六隂為小人小人處極剛而有應必用其壯故曰小人用壯君子處此自守其正有剛而不用太玄曰罔者有之舍罔非無也有在其中矣故曰君子用罔然剛極矣處兩剛之間雖正亦厲正而濟之以和説可也故曰貞厲此君子所以用罔歟震為萑葦為竹木在外為藩兊為羊前剛為角震為反生羊角反生為羝羊羝羊􅗑也三往觸上剛絓於藩六來乘之兊毁羊喪其狠此小人用極之禍可不戒哉京房曰壯不可極極則敗物不可極極則反故曰羝羊觸藩羸其角壯一也小人用之君子有而不用故曰小人用壯君子罔也易傳新安朱氏曰過剛不中當壯之時是小人用壯而君子則用罔也罔無也視有如無君子之過於勇者也如此則雖正亦危矣羝羊剛壯喜觸之物藩籬也羸困也貞厲之占其象如此小人以壯敗君子以罔困並本義東萊呂氏曰九三以陽居陽又處於乾體之極是極於壯者也然所謂壯則一所以用壯則二小人居三則惟恃力向前君子則髙視一世無所顧忌小人則恃其強暴以犯上而躁於有為固不可也君子亦恃其強壯蔑視天下之事尤不可也以此為固守之正厲也大抵經傳稱君子有二以賢愚言則君子喻於義小人喻於利之類以貴賤言則君子勞心小人勞力之類此爻之君子小人是以貴賤論雖貴賤不同其剛陽太過則一大凡用剛太過則必折三以剛遇四是以剛遇剛譬如羊之狠恃其角以觸藩籬未有不羸者也三之觸四二者皆剛三暴進而四設籬以禦之二者鬭而三獨傷者以其有以創之也天下之理始之者鮮不受害亦如用兵爭訟先犯者必凶易説九四貞吉悔亡藩決不羸壯于大輿之輹象曰藩決不羸尚往也伊川先生曰四陽剛長盛壯已過中壯之甚也然居四為不正方君子道長之時豈可有不正也故戒以貞則吉為悔亡蓋方道長之時小失則害亨進之勢是有悔也若在他卦重剛而居柔未必不為善也大過是也藩所以限隔也藩籬決開不復羸困其壯也髙大之車輪輹強壯其行之利可知故云壯于大輿之輹輹輪之要處也車之敗常在折輹輹壯則車強矣云壯于輹謂壯於進也輹與輻同剛陽之長必至於極四雖己盛然其往未正也以至盛之陽用壯而進故莫有當之藩決開而不羸困其力也尚往其進不己也並易傳橫渠先生曰乘剛本有悔不用其壯故貞吉三以四為藩九四上無陽爻故曰藩決壯輿之輹往無咎也四能不為隂纍守己以正則吉而無乘剛之悔且得衆陽之助以銷隂慝易説龜山楊氏曰剛以動吉凶悔吝之所生也惟貞吉乃悔亡隂在前不足以禦其壯也故藩決不羸有剛動之才故壯于大輿之輹輹車之軸轉也易説藍田呂氏曰九四處三陽之上居動之始壯之甚者而以陽居隂亦以謙居壯者也壯宜有悔由謙故貞吉貞吉悔乃亡也上有二隂不為藩以阻已也以剛居動之始壯輿之輹也故藩決不羸進無阻也壯于大輿之輹行無病也尚往無疑矣白雲郭氏曰剛至四而愈壯而曰貞吉悔亡何哉蓋四居上體之下能舍衆剛而與上有承柔載上之志是以貞吉悔亡藩決不羸壯于大輿之輹也然九四之壯雖非大壯特用得其宜耳輿輹當用壯之物也又況大輿之輹乎壯于大輿之輹是為得其冝也得其冝故貞吉悔亡藩決不羸君子之所以能任重者以此伊川曰輹與輻同虞翻為腹非也易説漢上朱氏曰四陽長過中壯之甚也而不正君子道長之時四以不正在上冝有悔故戒以貞貞則類進之吉無用壯之悔故貞吉悔亡震在內外之際為藩四動往之五藩決剛得中羣陽自下進而不括故曰藩決不羸尚往也曰不羸者因九三為象也坤為輿震木在輿下為輹車之毁折常在於輹九四陽壯壯于大輿之輹則何惡於壯乎大輿而輹壯其往利矣壯以任重道行於上之象也貞吉悔亡故藩決不羸往而之五藩決不羸以壯于大輿之輹利往也故象辭如此易傳新安朱氏曰貞吉悔亡與咸九四同占藩決不羸承上文而言也決開也三前有四猶有藩焉四前二隂則藩決矣壯于大輿之輹亦可進之象也以陽居隂不極其剛故其象如此本義問大壯卦先生曰此卦如九二貞吉只是自守而不進九四藩決不羸壯于大輿之輹却是有可進之象此卦爻之好者蓋以陽居陰不極其剛而前遇二隂有藩決之象所以為進非如九二前有三四二陽隔之不得進也語録東萊呂氏曰九四在三陽之上處陽之極壯道之盛者也大抵天下之事惟壯然後有所濟四居壯之盛所以貞吉而無悔然亦當與九三參看三亦陽也而羸其角此則不羸何也蓋三雖以陽上進遇四陽之剛所以羸其角九四四陽並進上二爻以隂柔之質焉能禦剛強之陽哉故藩決不羸壯于大輿之輹此君子道盛之時蓋在下之三陽皆不言往此獨言尚往非取其道之盛而可往乎易説六五喪羊于易無悔象曰喪羊于易位不當也伊川先生曰羊羣行而喜觸以象諸陽並進四陽方長而並進五以柔居上若以力制則難勝而有悔惟和易以待之則羣陽無所用其剛是喪其壯於和易也如此則可以無悔五以位言則正以德言則中故能用和易之道使羣陽雖壯無所用也所以必用柔和者以隂柔居尊位故也若以陽剛中正得一作居尊位則下無壯矣以六五位不當也故設喪羊于易之義然大率治壯不可用剛夫君臣上下之勢不相侔也苟君之權足以制乎下則雖有強壯跋扈之人不足謂之壯也必人君之勢有所不足然後謂之治壯故治壯之道不可以剛也並易傳喪羊于易羊羣行而觸物大壯衆陽並進六五以隂居位惟和易然後可以喪羊易非難易之易乃和易樂易之易楊遵道録橫渠先生曰羊外柔而內狠六五以隂處陽羊喪之象也能去其內剛不拒來者則無悔故曰喪羊于易無悔履柔危之地乘壯動之剛固之必悔者位非其所堪也易説藍田呂氏曰六五羊性壯狠壯陽之象四陽至壯而上進六五之柔不足以制之雖不當位而居乎中能度可否者也知不可制而不制藩決不羸陽得進往故曰喪羊于易能知可否不與物競故無悔也龜山楊氏曰居得尊位而下乘四剛其用壯也物孰禦之可謂無難矣而不用所謂喪羊于易也莊子曰於羊棄意喪羊之謂也易説白雲郭氏曰羊之用壯無異於小人不務勝已於內而欲觸物於外一往若此其害深矣是以非禮弗履之人務在克己而喪其羊也克己喪羊亦人之難能而六五初無甚難則其無悔冝矣位不當者德不足而位有餘不能究天德之大以成堯舜三王之治徒喪羊無悔僅能成已而已易説漢上朱氏曰兊為羊羊羣行善觸諸陽並進之象六五柔不當位陽剛方長冝有悔然持以和易則諸陽無所用其壯而剛強暴戾之氣屈矣此所以無悔歟四五相易兊毁喪羊于易和易亦兊也蓋位尊則能制下德中則和而不流以此用和其誰不服光武曰吾治天下亦柔道六五之謂乎易傳曰治壯不可以剛人君之勢不足而後有治壯之道易傳新安朱氏曰卦體似兊有羊象焉外柔而內剛者也獨六五以柔居中不能抵觸雖失其壯然亦無所悔矣其象如此而占亦與咸九五同易容易之意言忽然不覺其亡也或作疆埸之埸亦通漢食貨志埸作易本義喪羊于易不若作疆埸之易漢食貨志疆埸之埸正作易蓋後面有喪牛于易亦同此義今本義所注只是從前所説如此只且仍舊耳語録上六羝羊觸藩不能退不能遂無攸利艱則吉象曰不能退不能遂不詳也艱則吉咎不長也伊川先生曰羝羊但取其用一無用字壯故隂爻亦稱之六以隂處震終而當壯極其過可知如羝羊之觸藩籬進則礙身退則防角進退皆不可也才本隂柔故不能勝已以就義是不能退也隂柔之人雖極用壯之心然必不能終其壯有摧必縮是不能遂也其所為如此無所往而利也隂柔處壯不能固其守若遇艱困必失其壯失其壯則反得一有其字柔弱之分矣是艱則得吉也用壯則不利知艱而處柔則吉也居壯之終有變之義也非其處而處故進退不能是其自處之不詳慎也艱則吉柔遇艱難又居壯終自當變矣變則得其分過咎不長乃吉也並易傳橫渠先生曰剛競用觸則進退皆凶危懼求全則咎有時而息也然上六以隂居上不詳事宜用壯而觸故進退不能易説藍田呂氏曰壯窮必衰不可長也四陽上進羝羊也上六居外藩也不能退剛長不已也不能遂上窮也窮極其壯不衰不已故無攸利也六五上六皆柔不足以制剛五以易而喪羊上以難而獲吉上處窮極不敢以柔而自易抑其壯而不使遂也白雲郭氏曰居動之極以柔用壯雖無羸角之厲而進退不能何所利哉不能遂者進不足以勝人也不能退者退不足以自勝也此豈不能審於度德量力之事者歟故曰不詳也聖人兢兢業業其難其慎以不矜不伐為己任又安有用壯之厲乎是以艱則吉也易説漢上朱氏曰上六動成九前剛也前剛角之象兊為羊震為反生羊角反生羝羊也震為萑葦竹木在外為藩上動觸藩羸絓其角不能遂也退則三不應不能退也決事者當於其始詳慮之可則進否則退上六妄動不能退不能遂自處之不詳審也何往而利哉然壯終則變能艱難守正自處以柔則吉妄動之咎不長也在我而已巽為長震者巽之反故曰不長易傳新安朱氏曰壯終動極故觸藩而不能退然其質本柔故又不能遂其進也其象如此其占可知然猶幸其不剛故能艱以處則尚可以得吉也本義上六取喻甚巧蓋壯終動極無可去處如羝羊之角絓於藩上不能退遂然艱則吉者畢竟有可進之理但必艱始吉耳語録東萊呂氏曰上六以六居上是以柔而居壯之極大凡居壯貴乎陽剛則能有濟進亦有所成今上六以隂柔居壯之極如羝羊之觸藩進則傷其身退則羸其角進退不能無往而利然天下未嘗有不可必之事若看上六一爻進退不利是聖人於此有不可用力處然聖人於不能退不能遂之時又自有以處之惟艱難自處不為玩易則復可獲其吉故象曰艱則吉咎不長也言能艱難處之而不敢玩易則前日無攸利之咎必不長也易説合訂刪補大易集義粹言卷三十八
