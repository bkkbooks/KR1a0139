body:
  text: 合訂刪補大易集義粹言卷七十九頭等侍衛納喇性德編説卦傳白雲郭氏曰説卦論八卦之道德與其象義情性也然則六十四卦亦有是乎蓋六十四卦各具於文言彖象雜卦之中矣至萬物象類如履之為虎漸之為鴻中孚之鳴鶴小過之飛鳥井之為井鼎之為鼎皆是也其象不可盡言故於是數卦略明之繫辭曰以言乎天地之間則備矣斯其所以難言也故曰書不盡言易説漢上朱氏曰易之有説卦猶詩之有詁訓也説卦脫誤比前諸篇特多荀氏易本乾後有四象坤後有八震後有三巽後有二坎後有八而又以揉為橈離後有一艮後有三兊後有二虞氏易本以龍為駹及為陂敷為專寡為宣科為折羊為羔鄭本以廣為黃乾為幹黔為黚京房王廙偏傍之末螺為螺果蓏為果墮其餘王弼王肅姚信之説卦其字畫亦或不同蓋焚書之後周易雖存而傳已失説卦三篇後河內女子得而上之故三篇之文容有差誤今隨文辨正歸於至當疑則闕之並叢説新安朱氏曰彖傳釋彖辭象傳釋爻辭繫辭傳則通釋卦爻之辭故統名之曰繫辭傳恐不可改繫辭傳為説卦蓋説卦之體乃分别八卦方位與其象類故得以説卦名之繫辭傳兩篇釋卦爻之義例辭意為多不得謂之説卦也答吳斗南書昔者聖人之作易也幽贊于神明而生蓍參天兩地而倚數觀變於隂陽而立卦發揮於剛柔而生爻和順於道德而理於義窮理盡性以至於命濂溪先生曰聖人之精畫卦以示聖人之藴因卦以發卦不畫聖人之精不可得而見微卦聖人之藴殆不可悉得而聞易何止五經之源其天地鬼神之奧乎通書康節先生曰參天兩地而倚數非天地之正數也倚者擬也擬天地正數而生也四九三十六也六六三十六也陽六而又兼隂六之半是以九也故以二卦言之隂陽各三也以六爻言之天地人各二也隂陽之中各有天地人天地人之中各有隂陽故參天兩地而倚數也並觀物外篇易曰窮理盡性以至於命所以謂之理者物之理也所以謂之性者天之性也所以謂之命者處理性者也所以能處理性者非道而何又曰天下之物莫不有理焉莫不有性焉莫不有命焉所以謂之理者窮之而後可知也所以謂之性者盡之而後可知也所以謂之命者至之而後可知也此三者天下之真知也雖聖人無以過之也而過之者非所以謂之聖人也並觀物內篇明道先生曰幽贊於神明而生蓍用蓍以求卦非謂有蓍而後畫卦朱公掞問學拾遺和順於道德而理於義者體用也劉絢師訓窮理盡性以至於命三事一時並了元無次序不可將窮理作知之事若實窮得理即性命亦可了吕與叔東見録伊川先生曰理也性也命也三者未嘗有異窮理則盡性盡性則知天命矣天命猶天道也以其用而言之則謂之命命者造化之謂也附張繹師説問行狀云盡性至命必本於孝弟不識孝弟何以能盡性至命也曰後人便將性命别作一般事説了性命孝弟只是一統底事就孝弟中便可盡性至命至如灑掃應對與盡性至命亦是一統底事無有本末無有精粗却被後來人言性命者别作一般髙逺説故舉孝弟是於人切近者言之然今時非無孝弟之人而不能盡性至命者由之而不知也凡一物上有一理須是窮致其理窮理亦多端或讀書講明義理或論古今人物别其是非或應接事物而處其當皆窮理也並劉元承手編窮理盡性矣曰以至於命則全無著力處如成於樂樂則生矣之意劉絢所録窮理盡性以至於命以序言之不得不然其實只能窮理便盡性至命也附唐棣雜録所務於窮理者非道須盡窮了天下萬物之理又不道是窮得一理便到只是要積纍多後自然見去理則須窮性則須盡命則不可言窮與盡只是至於命也橫渠昔常譬命是源窮理與盡性如穿渠尋源然則渠與源是兩物後來此議必改並吕與叔東見録窮理盡性至命一事也才窮理便盡性盡性便至命因指柱曰此木可以為柱理也其曲直者性也其所以曲直者命也理性命一而已時氏拾遺或問格物是外物是性分內物先生曰不拘凡眼前無非是物物物皆有理如火之所以然水之所以寒至於君臣父子間皆是理又問人窮一物還便見得諸理否曰須是遍求雖顔子亦只能聞一知十若到後來逹理了雖億萬亦可通格物窮理非是要盡窮天下之物但於一事上窮盡其他可以類推至如言孝其所以為孝者如何窮理如一事上窮不得且别窮一事或先其易者或先其難者各隨人深淺如千蹊萬徑皆可適國但得一道入得便可所以能窮者只為萬物皆是一理至如一物一事雖小皆有是理物理須是要窮若言天地之所以髙深鬼神之所以幽顯若只言天只是髙地只是深只是已辭更有甚並入關語録致知在格物格至也窮理而至於物則物理盡大全集拾遺橫渠先生曰方其將有謀也將有問也命於蓍此所謂生蓍非謂在野而生蓍也事在未來之前吉凶在書策上蓍在手中卒歸三處一時合豈非幽贊於神明而得爾也起其用也地所以兩分剛柔男女而效之法也天所以參一太極兩儀而象之性也一物兩體氣也一故神兩在故不測兩故化推行於一此天之所以參也兩不立則一不可見一不可見則兩之用息兩體者虛實也動靜也聚散也清濁也其究一而已有兩則有一是太極也若一則有兩亦在無兩亦一在然無兩則安用一不以太極空虛而已非天參也理義即是天道也易言理於義一也求是即為理義言理義不如且言求是易曉求是之心俄頃不可忘理於義此理云者猶人言語之間常所謂理者非同窮理之理凡觀書不可以相類而泥其義不爾則字字相梗觀其文勢上下如充實之美與詩之言美輕重不同性盡其道則命至其源一作於原也致與至為道殊逺盡性然後至於命不可謂一不窮理盡性即是戕賊不可至於命者止能保全天所稟賦本分者且不可以有加也既言窮理盡性則不容有不知天道即性也故思知人不可不知天能知天斯知人矣知人與窮理盡性以至於命同意釋氏無天用故不取理彼以性為無吾儒以參為性故先窮理而後盡性凡人剛柔緩急趨識無有同者此乾道變化各正性命也及盡性則皆忘之窮理亦當有漸見物多窮理多從此就約盡人之性盡物之性天下之理無窮立天理乃各有區處窮盡性言性已是近人言也既窮理又盡性然後能至於命命則又就己而言之也並易説二程解窮理盡性以至於命只窮理便是至於命余謂亦是失于太快此義儘有次序須是窮理便能盡得已之性則推類又盡人之性既盡得人之性須并萬物之性一齊盡得如此然後至於天道也其間煞有事豈有當下理會了學者須是窮理為先如此則方有學今言知命與至於命儘有近逺豈可以知便謂之至也蘇昞所録盡其性能盡人物之性至於命者亦能至人物之命莫不性諸道命諸天我體物未嘗遺物體我知其不遺也至於命然後能成已成物不失其道德不勝氣性命於氣德勝其氣性命於德窮理盡性則性天德命天理氣之不可變者獨死生修天而已故論死生則曰有命以言其氣也語富貴則曰在天以言其理也此大德所以必受命易簡理得而成位乎天地之中也所謂天理也者能悅諸心能通天下之志之理也能使天下恱且通則天下必歸焉不歸焉者所乘所遇之不同如仲尼與繼世之君也舜禹有天下而不與焉者正謂天理馴致非氣稟當然非志意所與也必曰舜禹云者餘非乘勢則求焉者也利者為神滯者為物是故風雷有象不速於心心禦見聞不𢎞於性不誠不莊可謂之盡性窮理乎性之德也未嘗偽且慢故知不免乎偽慢者未嘗知其性也性其總合兩也命其受有則也不極總之要則不至受之分盡性窮理而不可變乃吾則也天所自不能己者謂命不能無感者謂性雖然聖人猶不以所可憂而同其無憂者有相之道存乎我也性通乎氣之外命行乎氣之內氣無內外假有形而言爾故思知人不可不知天盡其性然後能至於命盡性然後知生無所得則死無所喪太虛無形氣之本體其聚其散變化之客形爾至靜無感性之淵源有識有知物交之客感爾客感客形與無感無形惟盡性者一之自明誠由窮理而盡性也自誠明由盡性而窮理也釋氏妄意天性而不知範圍天用反以六根之微因緣夫地明不能盡則誣天地日月為幻妄蔽其用於一身之小溺其志於虛空之大此所以語大語小流遁失中其過於大也塵芥六合其蔽于小也夢幻人世謂之窮理可乎不知窮理而謂之盡性可乎謂之無不知可乎塵芥六合謂天地為有窮也夢幻人世明不能究所從也並正蒙須知自誠而明者先盡性以至于窮理也謂先自其性理會來以至行理自明誠者先窮理以至於盡性也謂先從學問理以推逹於天性也語録龜山楊氏曰問乾坤用九六荆公曰進君子退小人固非自然之理而正叔云觀河圖數可見何也曰此多有議論少有分明繫辭分明説云參天兩地而倚數九參天六兩地也南都語録六經不言無心惟佛氏言之亦不言修性惟揚雄言之心不可無性不假修故易止言洗心盡性記言正心尊德性孟子言存心養性佛氏和順於道德之意蓋有之理於義則未也荆州語録廣漢張氏曰義在我也命在天也天下之人皆知義命則聖人之易不作矣惟夫不知義者甘心於自暴自棄不知命者奔競而患得患失此聖人不得已而生蓍倚數立卦生爻以為天下不知義命者設也是以天地能生蓍之形而不能生蓍之用惟聖人之德贊於神明故分之挂之揲之以四歸竒於扐生其用而至於圎而神也一三五七九皆陽數也獨以一三五參之而用九此倚其陽數也二四六八十皆隂數也獨以二四兩之而用六者此倚其隂數也特取九六而不用夫七八者乃參天兩地而倚其數也純陽為乾純隂為坤及夫隂陽之變則陽卦多隂隂卦多陽此卦所以立也剛柔者所以立本變通者所以趨時必待發其所藴揮其所聚此爻所以生也道者出於天德者得於己能和順道德自然于義無所亂也故曰理于義如此則人盡矣萬物有自然之理一身有自然之性能窮理盡性自然於命無所負矣故曰至於命如此則天道盡矣易説白雲郭氏曰説卦論説八卦之道而此極重卦而言者明八卦六十四終始一道耳或者言聖人謂包犧也然以八卦六十四卦言之則非獨包犧矣聖人以道幽贊神明故生用蓍求卦之法猶繫辭言是興神物以前民用蓋是道本於神明聖人能生之是為幽贊之道矣故有神明之道有幽贊之道有生蓍之道以道合道故能生是道也此言變化之始也自蓍道生而後數可倚數可倚而後卦可立卦可立而後爻可生作易之道終矣易成而後道德理義有所寓聖人窮易之理盡萬物之性復於天道故曰以至於命此章自幽贊之始至以至於命蓋明以此道始復以此道終有無循環實由一道非聖人有私意以作也微顯闡幽而已天地者數所由生隂陽者變所由生剛柔者萬類所從生故參兩觀變發揮之也易於道德無違也和順之而已於義無作也明辨之而已蓋言象辭之間其道德與義本諸自然聖人因之而作易特載以明之而已故聖人於玩易之際復用此道以窮理盡性至於命也窮理者窮天之理也盡性者盡天之性也然後不失其所謂天之命矣是知聖人由道以生易由易以復於道非聖人則無生無復謂之聖人作易可也然異乎衆人之所謂作者矣易説大衍之數聖人幽贊神明之道也參天之一三五而為九兩地之二四而為六聖人倚數之道也盡三十六二十四二十八三十二之變以分隂陽老少聖人觀變立卦之道也自九六而發揮為剛為柔聖人發揮生爻之道也繫辭焉而命之所以和順於道德而理於義也極深研幾以崇德廣業所以窮理盡性至於命也聖人作易之道如是而已觀九六之數蓋聖人參天兩地而得之至於七八則有名而無象如是則隂陽老少之辨夫何疑焉或者謂陽數極於九而其次極於七又疑老隂當十少隂當八老隂當八少隂當六者亦未之思也並蓍卦辨疑漢上朱氏曰昔者聖人之作易也幽贊於神明而生蓍參天兩地而倚數説䇿數也觀變於隂陽而立卦説揲蓍分卦也發揮於剛柔而生爻説爻有變動也和順道德而理於義窮理盡性以至於命説所繫爻彖之辭也神明天地也聖人贊天地以立人道於是生蓍之法以起數其用起於一及其究也上下與天地同流而無迹故曰幽贊太玄曰昆侖天地而産蓍一者何氣之始也參天者一太極兩儀也兩地者分隂陽剛柔也參天兩地五也五小衍也天地五十有五之數具而河圖洛書大衍之數實倚其中一與五為六二與五為七三與五為八四與五為九九與一為十五十者河圖數也五十有五者洛書數也五十有五即五十數五十即大衍四十有九數倚言數立其中而未動也馬融曰倚立也蓍四十有九總而為一參天也分而為二兩地也挂一者參天也揲之四者兩地也歸竒於扐者兩地而又參天也四者六七八九七者少陽九者老陽八者少隂六者老隂三變成爻十有八變而卦立三變者參天也五變者參天而又兩地也變而上者三變而兩變而下者兩變而三凡八卦之位六十四卦之名皆以隂陽之變定之而不離乎參伍之神王洙曰發越揮散也隂陽有變故九六七八以立卦剛柔有體故發越揮散以生爻變剛生柔變柔生剛四象迭相為用生生而不窮故曰生隂陽氣也剛柔者氣聚而有體也由推行言之謂之道由得於道言之謂之德性者萬物之一源命者剛柔不齊稟於有氣之初者也理者通乎道德性命而一之者也義者道德所施之宜也生蓍起數立卦生爻凡以為道德而已聖人繫之以辭和之使不乖順之使不違通天地人而貫之以一理施之各得其宜焉窮易之理則知萬物一源兼體而不偏滯及其至也通極乎一氣之外所不可變者惟生死壽夭爾故順受吉凶之正不回以求福不幸以免禍此作易之本旨也易傳蓍四十九總而為一參天也分而為二兩地也挂一者參天也揲之四者兩地也歸竒於扐者兩地而又參天也四者七九六八也七者少陽九者老陽八者少隂六者老隂三變而成爻十有八變而成卦三變者參天也十有八變者兩地也故曰觀變於隂陽而立卦三變者參天也五變者參天而又兩地也變而上三變而兩變而下兩變而三上下無常變動不居故曰發揮於剛柔而生爻曰發揮曰生者言變動也隂陽天剛地柔也立卦之前象未著故曰隂陽以立天道也立卦之後象乃見故曰剛柔以立地道也隂陽用也剛柔體也用之謂道體之謂德體用無間和會為一順而行之則動靜語默皆得其宜故曰和順於道德而理於義天地萬物共由一理其理順而不妄深明其源乃能一天人合內外體用無間矣此之謂盡性盡性則通晝夜之道而知其於窮逹夀夭以正受之不二其心矣此之謂立人道道德有義性命有理義也理也同出於一叢説新安朱氏曰幽贊神明猶言贊化育龜策傳曰天下和平王道得而蓍莖長丈其叢生滿百莖天圓地方圓者一而圍三三各一竒故參天而為三方者一而圍四四合二偶故兩地而為二數皆倚此而起故揲蓍三變之末其餘三竒則三三而九三偶則三二而六兩二一三則為七兩三一二則為八和順從容無所乖逆統言之也理謂隨事得其條理析言之也窮天下之理盡人物之性而合於天道此聖人作易之極功也並本義贊於神明猶言治於人相似謂為人所治也贊於神明神明所贊也聖人用於字恁地用不然只當説幽贊神明此却是説見助於神明贊只是贊化育之贊不解便説那贊命於神明這只説道他為神明所贊所以生出這般物事來與人做卦生蓍便是大衍之數五十如何恰限生出百莖物事教人做筮用到那參天兩地方是取數處看得來隂陽剛柔四字隂陽指二老剛柔指二少問參天兩地舊説以為五生數中天參地兩不知其説如何曰如此只是三天兩地不見參兩之意參天者參而三之兩地者兩之以二也以方員而言則七八九六之數都自此而起問以方圎而言參兩如天之貟徑一則以圍三而參之地之方徑一則以圍四而兩之否曰然問參天兩地而倚數曰天圎得數之三地方得數之四一畫中有三畫三畫中參之則為九此天之數也陽道常饒隂道常乏地之數不能為三止於兩而已三而兩之為六故六為坤一箇天參之為三一箇地兩之為二三三為九三二為六兩其三一其二為八兩其二一其三為七二老為隂陽二少為柔剛參不是三之數是往參焉之參兼三才而兩之初剛而二柔案下二爻于三極為地三仁而四義案中二爻于三極為人五陽而上隂案上二爻于三極為天陽化為隂只恁地消縮去無痕迹故謂之化隂變為陽其勢寖長便較突兀有頭靣故謂之變隂少於陽氣理數皆如此用全用半所以不同參天兩地而倚數此在揲蓍上説參者元是箇三數底物事自家從而參之兩者元是箇兩數底物事自家從而兩之雖然却只是説得箇三在未見得成何數倚數云者似把幾件物事投放這裏如已有三數更把箇三數倚在這裏成六又把箇三數物事倚在此成九兩亦如之天下之數都只始於三二謂如陽數九只是三三而九之隂數六只是三二而六之故孔子云參天兩地而倚數此數之本也康節却云非天地之正數是他見得不盡康節恰以四為數倚數倚是靠在那裏且如先得箇三又得箇三只成六更得箇三方成九若得箇二却成八恁地倚得數出來有人説參作三謂一三五兩謂二四一三五固是天數二四固是地數然而却是積數不是倚數問觀變是就蓍數上觀否曰恐只是就隂陽上觀未用説到蓍數處觀變於隂陽且統説道有幾畫隂幾畫陽成箇甚卦發揮剛柔却是就七八九六上説初間做這卦時未曉得是變與不變及至發揮出剛柔了方知這是老隂少隂那是老陽少陽問既有卦則有爻矣先言卦而後言爻何也曰自作易言之則有爻而後有卦此却似自後人觀聖人作易而言方其立卦時只見是卦及細别之則有六爻問隂陽剛柔一也而别言之何也曰觀變於隂陽近於造化而言發揮剛柔近於人事而言且如泰卦以卦言之只見得小往大來隂陽消長之意爻裏面便有包荒之類易中緊要底只是四爻問近見先生易詩云立卦生爻自有因兩儀四象已前陳因字之義如何曰卦爻因儀象而生立即兩儀生四象四象生八卦之意又問生爻指言重卦否曰然問和順道德而理於義是就聖人上説是就易上説曰是説易又問和順是聖人和順否曰是易云和順道德而理於義如吉凶消長之道順而無逆是和順道德也理於義則又極其細而言隨事各得其宜之謂也和順道德如極髙明理於義如道中庸和順道德而理於義是統説底窮理盡性至命是分説底上一句是離合言之下一句以淺深言之凡卦中所説莫非和順那道德不悖了他理於義是細分他逐字上各有箇義理和順字理字最好看聖人這般字改移不得聖人作易時其中固是具得許多道理人能體之而盡則便似那易他説那吉凶悔吝處莫非和順道德理於義窮理盡性之事這一句本是説易之書如此後人説去學問上却是借他底然這上也有意思皆是自淺至深道理須是與自家心相契方是得他所以要窮理忠信進德之類皆窮理之事易中自具得許多道理便是教人窮理循理窮理是窮得物盡得人性到得那天命所以説道性命之源窮理是知字上説盡性是仁字上説言能造其極也至於範圍天地是至命言與造化一般窮理盡性以至於命這物事齊整不亂其所從來一也窮理盡性至於命本是就易上説易上皆説物理便是窮理盡性即此便是至命諸先生把來就人上説能窮理盡性了方至於命問窮理盡性以至於命曰此言作易者如此後來不合將做學者事看如孟子盡心知性知天之説豈與此是一那却是學者事只於窮理上著工夫窮得理時性與命在其中矣橫渠之説未當或問程子之説如何曰理性命只是一物故知則皆知盡則皆盡不可以次序言但知與盡却有次第耳伯豐問窮理盡性以至於命張程之説孰是曰各是一説程子皆以見言不如張子有作用窮理是見盡性是行覺得程子是説得快了如為子知所以孝為臣知所以忠此窮理也為子能孝為臣能忠此盡性也能窮此理充其性之所有方謂之盡以至於命是拖腳却説得於天者盡性是我之所至也至命是説天之所以豫我者耳昔嘗與人論舜事舜盡事親之道而瞽瞍底豫瞽瞍底豫而天下化瞽瞍底豫而天下之為父子者定知此者是窮理者也能此者盡性者也並語録又曰和順於道德是默契本原處理於義是應變合宜處物物皆有理須一一推窮性則是理之極處故云盡命則性之所自來處以此推之自不重復答許順之書右第一章昔者聖人之作易也將以順性命之理是以立天之道曰隂與陽立地之道曰柔與剛立人之道曰仁與義兼三才而兩之故易六畫而成卦分隂分陽迭用柔剛故易六位而成章康節先生曰太極既分兩儀立矣陽下交於隂隂上交於陽四象生矣陽交於隂隂交於陽而生天之四象剛交於柔柔交於剛而生地之四象於是八卦成矣八卦相錯然後萬物生焉是故一分為二二分為四四分為八八分為十六十六分為三十二三十二分為六十四故曰分隂分陽迭用柔剛易六位而成章也十分為百百分為千千分為萬猶根之有幹幹之有枝枝之有葉愈大則愈小愈細則愈繁合之斯為一衍之斯為萬是故乾以分之坤以翕之震以長之巽以消之長則分分則消消則翕也觀物外篇明道先生曰立天之道曰隂與陽立地之道曰柔與剛立人之道曰仁與義兼三才一之也而兩之不兩則無用劉絢師訓孟子言堯舜性之舜由仁義行豈不是尋常説話至於易只道箇立人之道曰仁與義則和性字由字也不消道自己分明隂陽剛柔仁義只是此一箇道理李籲師訓伊川先生曰昔者聖人立人之道曰仁曰義孟子曰仁者人也親親為大義者宜也尊賢為大唯能親親故老吾老以及人之老幼吾幼以及人之幼唯能尊賢故賢者在位能者在職唯仁與義盡人之道盡人之道則謂之聖人暢潛道録仲尼言仁未嘗兼義獨於易曰立人之道曰仁與義而孟子言仁必以義配蓋仁者體也義者用也知義之為用而不外焉者可與語道矣世之所論於義者多外之不然則混而無别非知仁義之説者也遊定夫所録立人之道曰仁與義據今日合人道廢則是今尚不廢者猶只是有那些秉彝卒殄滅不得以此思之天壤間可謂孤立其將誰告邪吕與叔東見録橫渠先生曰隂陽柔剛仁義所謂性命之理易一物而三才備隂陽氣也而謂之天剛柔質也而謂之地仁義德也而謂之人一物而兩體其太極之謂歟隂陽天道象之成也剛柔地道法之效也仁義人道性之立也三才兩之莫不有乾坤之道也易一物而合三才天人一隂陽其氣剛柔其形仁義其性並易説隂陽之精互藏其宅則各得其所安故日月之形萬古不變若隂陽之氣則循環迭至聚散相蕩升降相求絪緼相揉蓋相兼相制欲一之而不能此其所以屈伸無方運行不息莫或使之不曰性命之理謂之何哉屈伸相感而利生感以誠也情偽相感而利害生雜之偽也至誠則順理而利偽則不循理而害順性命之理則所謂吉凶莫非正也逆理則凶為自取吉其險幸也隂陽剛柔仁義之本立而後知趨時應變故乾坤毁則無以見易六爻各盡利而動所以順隂陽剛柔仁義性命之理也並正蒙廣平遊氏曰立天之道曰隂與陽立地之道曰柔與剛立人之道曰仁與義夫道一而已其立於天下則有兩端故君子有剛克焉執其義之端也有柔克焉執其仁之端也執其兩端而用之以時中此九德所以有常而三德所以用義也中庸解龜山楊氏曰荆公云天使我有是之謂命命之在我之謂性是未知性命之理其曰使我正所謂使然也使然者可以為命乎以命在我為性則命自一物若中庸言天命之謂性性即天命也又豈二物哉如云在天為命在人為性此語似無病然亦不須如此説性命初無二理第所由之者異耳率性之謂道如所謂聖人之作易將以順性命之理是也餘杭語録廣漢張氏曰君子不謂性有命存焉故凡耳之於聲目之於色鼻之於臭口之於味四支之於安佚雖曰性也詎可以性而害其命乎君子不謂命有性存焉凡仁之於父子義之於君臣禮之於賔主智之於賢者聖人之於天道雖曰命也詎可以命而害其性乎奈何中古以降人偽日滋天機日澆以性滅命者必以人而勝天以命廢性者必以天而勝人天人之理顚倒錯亂聖人作易方其未作之前其意已在焉故曰將以順性命之理者也是以二與四同功而初亦如之三與五同功而上亦如之此分隂分陽也居剛者不必皆剛而或以柔居柔者不必皆柔而或以剛此迭用柔剛也分之以示其理之之經也迭用以示其理之之緯也此六位而成章者經緯交錯而成也易道至此成矣易説白雲郭氏曰前章自作易生蓍終於性命而止此章復因性命之説而詳言之以見易之為書所以能至於命者以本乎性命之理故也性命之理即天地人之道也性命本一故中庸言天命之謂性孟子言君子不謂性命因天地人而言之則天道之謂命人道之謂性於是乎有别矣是以隂陽柔剛仁義各異其名也隂陽者天之二道也柔剛者地之二道也仁義者人之二道也天地人之道各二所謂三才兩之也易能兼三才則皆兼其兩之之道此易之畫所以六而後成卦也然則文王之重不得不作矣蓋出於三才自然非文王之私意也自六畫成卦而後三才隂陽之位具於是乎迭用柔剛之爻以居之則變化見矣故曰六位而成章也章者變化之道明見之謂也分隂分陽非謂立天之道隂陽也言三才二道皆一為隂一為陽見於六位也迭用柔剛非謂立地之道柔剛也言三才隂陽分為六畫迭以九六柔剛居之也故三才二道不兼九六言之則曰六畫兼明九六柔剛而後謂之六位是以六畫成卦但有其象而已至六位成章而後道大明也方包犧未分三才隂陽故卦止三畫文王重之以備三才隂陽故六畫具由此言之則三畫之道不為不足六畫之道不為有餘孔子言立天立地立人言包犧之道也言隂陽柔剛仁義言文王之道也包犧立其始文王成其終孔子明其終始三聖人實出於一心是為同道道同故其書同一聖人不作則斯道不明後世不復有聞矣易説漢上朱氏曰説位畫有六而後有變動也易有太極太虛也隂陽者太虛聚而有氣也柔剛者氣聚而有體也仁義根於太虛見於氣體而動於知覺者也自萬物一源觀之謂之性自稟賦觀之謂之命自通天地人觀之謂之理三者一也聖人將以順性命之理故分一而為三曰隂陽曰剛柔曰仁義以立天地人之道蓋互見也易兼三才而兩之六畫而成卦成卦則三才合而為一知隂陽剛柔仁義同源於太虛則知性知天道曰隂陽地道曰剛柔人道曰仁義則知命知仁義即天之隂陽地之柔剛則知性命之理不順乎性命之理而行之將何所逃於天地之間乎然道有變動故分隂分陽迭用柔剛以位分之一三五陽也二四六隂也以卦分之乾震坎艮陽也坤巽離兊隂也以十日分之甲丙戊庚壬陽也乙丁己辛癸隂也所謂分隂分陽也八卦相蕩五行更王上下無常周流六虛所謂迭用柔剛也分隂陽用柔剛者仁義也以人而用天地也誠知乎此則德勝於氣性命於德氣之昏明不足以蔽之至於盡性而配天地矣太玄曰立天之經曰隂與陽形地之緯曰縱與橫表人之行曰晦與明凖卦之三才六畫也易傳新安朱氏曰兼三才而兩之總言六畫又細分之則隂陽之位間雜而成文章也本義聖人作易只是要發揮性命之理模寫那箇物事下文所説隂陽剛柔仁義便是性中有這箇物事順性命之理只是要發揮性命之理問兼三才如何分曰以一卦言之上兩畫是天中兩畫是人下兩畫是地兩卦各自看則上與三是天五與二為人四與初為地問以八卦言之則九三者天之陽六三者天之隂九二者人之仁六二者人之義初九者地之剛初六者地之柔不知是否曰恁地看也得如上便是天之陽五便是人之仁二便是人之義四便是地之柔初便是地之剛問立天之道曰隂陽道理也隂陽氣也何故以隂陽為道曰形而上者謂之道形而下者謂之器明道以為須著如此説然器亦道道亦器也道未嘗離乎器道亦只是器之理如這交椅是器可坐便是交椅之理人身是器語言動作便是人之理理只在器上理與器未嘗相離所以一隂一陽之謂道曰何謂一曰一如一闔一闢謂之變只是一隂了又一陽此便是道寒了又暑暑了又寒這道理只循環不已維天之命於穆不已萬古只如此立天之道曰隂與陽是以氣言立地之道曰柔與剛是以質言立人之道曰仁與義是以理言隂陽是陽中之隂陽剛柔是隂中之隂陽問仁是柔如何却屬乎剛義是剛如何却屬乎柔曰蓋仁本是柔底物事發出來却剛但看萬物發生便自恁地奮迅出來有剛底意思義本是剛底物事發出來却柔但看萬物肅殺時便恁地收斂憔悴有柔底意思如人春夏間陽勝却有懈怠處秋冬間隂勝却有健實處又問揚子雲君子於仁也柔於義也剛如何曰仁體柔而用剛義體剛而用柔兼貫通也通貫是理本如此兩之者隂陽剛柔仁義也兼三才而兩之初剛而二柔三仁而四義五陽而六隂兩之如言加一倍本是一箇又各加一箇為兩隂陽剛柔仁義看來當曰義與仁當以仁對陽仁若不是陽剛如何做得許多造化義雖剛却主於收斂仁却主發舒這也是陽中之隂隂中之陽互藏其根之意且如今人用賞罰到賜與人自是無疑便做將去若是刑殺時便遲疑不肯果決這見得陽舒隂斂仁屬陽義屬隂處問分隂分陽迭用柔剛隂陽柔剛只是一理兼而舉之否曰然並語録蓋嘗論之陽主進而隂主退陽主息而隂主消進而息者其氣強退而消者其氣弱此隂陽之所以為柔剛也陽剛溫厚居東南主春夏而以作長為事隂柔嚴凝居西北主秋冬而以斂藏為事作長為生斂藏為殺此剛柔之所以為仁義也以此觀之則隂陽剛柔仁義之位豈不曉然而彼揚子雲之所謂於仁也柔於義也剛者乃自其用處之末流言之蓋亦所謂陽中之隂隂中之陽固不妨自為一義但不可以雜乎此而論之耳向日妙湛蓋嘗靣稟易中卦位義理層數甚多自有次第逐層各是一箇體面不可牽強合為一説學者須是旋次理會理會上層之時未要攪動下層直待理會得上層都透徹了又却輕輕揭起下層理會將去當時雖似遲鈍不快大意然積纍之久層層都了却自見得許多條理千差萬别各有歸著豈不快哉若不問淺深不分前後混成一塊合成一説則彼此相妨令人分疏不下徒自紛紛成鹵莽矣此是平生讀書已試之效不但讀易為然也前書所論仁義禮智分屬五行四時此是先儒舊説未可輕詆今者來書雖不及之然此大義也或恐前書有所未盡不可不究其説蓋天地之間一氣而已分隂分陽便是兩物故陽為仁而隂為義然隂陽又各分而為二故陽之初為木為春為仁陽之盛為火為夏為禮隂之初為金為秋為義隂之極為水為冬為智蓋仁之惻隱方自中出而禮之恭敬則已盡發於外義之羞惡方自外入而智之是非則已全伏於中故其象類如此非是假合附會若能默會於心便自可見元亨利貞其理亦然文言取類尤為明白非區區今日之臆説也五行之中四者既各有所屬而土居中宫為四行之地四時之主在人則為信為真實之義而為四德之地衆善之主也蓋天人一物內外一理流通徹貫初無間隔若不見得則雖生於天地間而不知所以為天地之理雖有人之形貌而不知所以為人之理也故此一義切於吾身比前數段尤為要緊非但小小節目而已也並答袁機仲書右第二章天地定位山澤通氣雷風相薄水火不相射八卦相錯數往者順知來者逆是故易逆數也康節先生曰數往者順若順天而行是左旋也皆已生之卦也故曰數往也知來者逆若逆天而行是右行也皆未生之卦也故云知來也夫易之數由逆而成矣此一節直解圖意若逆知四時之謂也觀物外篇伊川先生曰易八卦之位元不曾有説先儒以謂乾位西北坤位西南言乾坤任六子而自處於無為之地此説故無義理風雷山澤之類便是天地之用豈天地外别有六子如人生六子則有各任以事而父母自間風雷之類於天地間如人身之有耳目手足便是人之用也豈可謂手足耳目皆用而身無為乎附劉元承手編橫渠先生曰數往者順知來者逆是故易逆數者如孟子曰茍求其故則千歲之日至可坐而致也易説龜山楊氏曰揚子雲作太元只據他立名便不是既定却三方九州二十七部八十一家不知如何相錯得八卦所以可變而為六十四者只為可相錯故可變耳惟相錯則其變出於自然也餘杭語録廣漢張氏曰自太極生兩儀兩儀生四象四象生八卦故八卦者乃聖人闡其神明之德以示人者也是以天運乎上地處乎下此天地定其位也山之殺瘦澤之增肥此山澤通氣也雷之震驚至於拔山風之鼓舞至於振海各恃其功故曰相薄火之炎上其性燥水之流下其性濕不可相近故曰相射此麗於有形涉於有數其勢若不相悖者也及夫聖人作易乾坤交通而天地之位或上或下艮兊相與而山澤之氣或止或恱以至震巽合而雷風迭用坎離濟而水火成功此八卦相錯而六十四卦三百八十四爻可以窮造化之大測鬼神之幽逆而推之則四象兩儀與夫太極之逺可坐而致也大抵天下之事數往者順知來者逆故善作樂者必求之於無聲欲制禮者必求之於太始易之於天下皆逆數以察其來故易逆數也逆如逆暑逆寒之謂豫為之主者也易説白雲郭氏曰天地之位定然後山澤雷風水火相與為用或異體而交通或同氣而相薄或不相入而為用此八卦所以必相錯之道也八卦不相錯則道雖立而不及於用是以聖人重之重而後可以數往知來人之道數往者順而易知來者逆而難易之逆數未見其難者非止卜筮之用蓋由其道之始必知其道之終也是亦原始可以要終知微知彰之義故孔子以知幾為神衆人獨知卜筮而已易説漢上朱氏曰天地定位乾上坤下也山澤通氣艮兊以三相易也雷風相薄震巽以初相易也日月不相射坎離以中相易也虞翻曰射厭也坎離水火不相厭坎戊離己月三十日一會於壬故不相厭也伏羲氏之畫卦也乾坤定上下之位坎離列左右之門震與巽為偶艮與兊相配震離兊乾天之四象也巽坎艮坤地之四象也八卦相錯乾坤相易生六十四卦乾自震而左行坤自巽而右行數往者以順而數知來者以逆而知邵雍曰數往者順順天而行左旋也皆已生之卦也知來者逆逆天而行右行也皆未生之卦也夫易之數由逆而成矣逆者猶逆四時之比蓋聖人將言易故先説易之本易逆數也故六爻自下而起太玄曰南北定位東西通氣萬物錯乎其中凖八卦也易傳水雷山乾也火風澤坤也雷風相薄山澤通氣水火不相射乾坤不相離也天地之撰物者如此而萬物皆有乾坤六子之象觀乎物則神明之德見矣故易之六爻變化必隂陽合德而剛柔有體其立法制器亦然叢説新安朱氏曰邵子曰此伏羲八卦之位乾南坤北離東坎西兊居東南震居東北巽居西南艮居西北於是八卦相交而成六十四卦所謂先天之學也起震而歷離兊以至於乾數已生之卦也自巽而歷坎艮以至於坤推未生之卦也易之生卦則以乾兊離震巽坎艮坤為次故皆逆數也並本義問山澤通氣只為兩卦相對所以氣通曰澤氣升於山為雲為雨是山通澤之氣山之泉脈流於澤為泉為水是澤通山之氣是兩箇之氣相通山澤通氣水火不相射山澤一髙一下而水脈相為灌輸也水火下然上沸而不相滅息也或曰射音亦與斁同言相為用而不相厭也射猶犯也射一音亦是不相厭之義一音石是不相害水火本相殺滅用一物隔著却相為用此二義皆通問射或音石或音亦孰是曰音石水火與風雷山澤不相類本是相尅底物事今却相應而不相害問若以不相厭射而言則與上文通氣相薄之文相類不知如何曰不相射乃下文不相悖之意不相悖乃不相害也水火本相害之物便如未濟之水火亦是中間有物隔之若無物隔之則相害矣此乃以其不害而明其相應也看數往者順這一段是從卦氣上看來也是從卦畫生處看來恁地方交錯成六十四易逆數也似康節説方可通但方圖則一向皆逆若以圓圖看又只一半逆不知如何安卿問先天圖説曰陽在隂中陽逆行隂在陽中隂逆行陽在陽中隂在隂中皆順行何謂也曰圖左一邊屬陽右一邊屬隂左自震一陽離兊二陽乾三陽為陽在陽中順行右自巽一隂坎艮二隂坤三隂為隂在隂中順行坤無陽艮坎一陽巽二陽為陽在隂中逆行乾無隂兊離一隂震二隂為隂在陽中逆行先天圖曲折細詳圖意若自乾一橫排至坤八此則全是自然故説卦云易逆數也皆自己生以得未生之卦若如圎圖則須如此方見隂陽消長次第震一陽離兊二陽乾三陽巽一隂坎艮二隂坤三隂雖似稍涉安排然亦莫非自然之理自冬至至夏至為順蓋與前逆數若相反皆自未生而反得已生之卦自夏至至冬至為逆蓋與前逆數者同其左右與今天文家説左右不同蓋從中而分其初若有左右之勢爾自北而東為左自南而西為右並語録右第三章雷以動之風以散之雨以潤之日以烜之艮以止之兊以説之乾以君之坤以藏之伊川先生曰古言乾坤退處不用之地而用六子若人則便分君道無為臣道有為若天則誰與他安排他如是須有道理故如八卦之義須要玩索吕與叔東見録廣漢張氏曰陽氣升而阻於隂此雷所以動而震發其萬物也隂氣逹而礙於陽此風所以散而吹噓其萬物也隂之不固而成和於陽者此雨所以潤萬物異乎灌溉之勞也陽之所宗而不爍於隂者此日所以烜萬物異乎爝火之微也此四者皆其生物也故主象以言之物之小大長短之不同剛柔緩急之不等椿菌各安其壽夭鵬鷃各得其巨細物物有正性物物有正命者有艮以止之者歟太和所稟而無所乖戾大順所鍾而無所偏陂勞者自此而少息華者自此而向成者有兊以説之者歟夫有風雷以作其氣有雨日以成其形而又有艮以止其分兊以説其情豈無司其造化之權者乎此乾所以君之也豈無冥其出入之機者乎此坤所以藏之也此四者取其成物也故主卦以言之易説白雲郭氏曰天地雷風功用與八卦同故或言象或言卦其實一也動止説又其性也散潤烜又其功也君其道也藏其德也互言之知其互備也易説漢上朱氏曰陽聚而動動極則散之散則復聚隂積而潤潤極則烜之烜則復潤此雷霆風雨日月寒暑所以屈信相感而成萬物也艮則動者靜而止入於坤也兊則止者恱而行出乎乾也乾以君之則萬物覩坤以藏之則天地閉前説乾坤而至六子無形者聚而有形也此説六子而歸乾坤有形者散而入於無形也終始循環不見首尾易之道也易傳新安朱氏曰此卦位相對與上章同本義雷以動之以下四句取象義多故以象言艮以止之以下四句取卦義多故以卦言後四卦不言象也只是偶然到後兩句説乾以君之坤以藏之却恁地説得好並語録右第四章帝出乎震齊乎巽相見乎離致役乎坤説言乎兊戰乎乾勞乎坎成言乎艮萬物出乎震震東方也齊乎巽巽東南也齊也者言萬物之潔齊也離也者明也萬物皆相見南方之卦也聖人南靣而聽天下嚮明而治蓋取諸此也坤也者地也萬物皆致養焉故曰致役乎坤兊正秋也萬物之所説也故曰説言乎兊戰乎乾乾西北之卦也言隂陽相薄也坎者水也正北方之卦也勞卦也萬物之所歸也故曰勞乎坎艮東北之卦也萬物之所成終而所成始也故曰成言乎艮康節先生曰起震終艮一節明文王八卦也天地定位一節明伏羲八卦也八卦相錯者明交錯而成六十四也觀物外篇伊川先生曰天者理也神者妙萬物而為言者也帝者以主宰事而名劉絢師訓問劉牧以坎離得正性艮巽得偏性如何曰非也他據方位如此説如居中位便言得中氣其餘豈不得中氣也附劉元承手編南北之位豈可不定下所以定南北者在坎離也坎離又不是人安排得來莫非自然也李師籲説橫渠先生曰造化之功發乎動畢達於順形諸明養諸容載遂乎恱潤勝乎健不匱乎勞始終乎止乾不居正位是乾理自然惟人推之使然邪並易説中央在季夏之末者且以易言之八卦之作坤在西南西南致養之地在離兊之間離兊即金火也是以在季夏之末語録龜山楊氏曰艮止也止其所也故繫辭曰止萬物者莫善乎艮又曰成言乎艮艮者萬物之所成終而成始也止於此矣復出乎震不終止也故艮卦曰時止則止時行則行餘杭語録廣漢張氏曰帝者神之應而生物之所宗也帝出乎震於方為東於時為春萬物從之而出方其出也草昧而不齊汙穢而不潔惟至於東南然後齊而潔潔齊然後可以相見故離也者於方為南於時為夏萬物亨嘉而相見聖人出人天之本宗應帝王之興起南面而聽天下嚮明而治亦體天道以臨其人者也故曰蓋取諸此言其不恃其明以聽天下者乎又曰坤西南也乃夏秋之交也然萬物皆致養於坤如萬物資生者是也至於出機入機出冥入冥生於此而反於此未始暫停而坤乃隤然在下此致役乎坤也萬物自出乎震相見乎離而又致役乎坤至兊之西方於時為秋所以小息此萬物所以説也至於西北則陽自外來而為主於內隂恃已盛之勢而未肯聽命此戰乎乾所以隂陽相薄也坎也者萬物交精乎天一今也復歸於此故曰勞乎坎勞者如勞師之勞勞其還也惟艮介乎東北之地乃春冬之交萬物所從出入之方所以成其終而成其始故曰成言乎艮並易説白雲郭氏曰天道始於震萬物從之皆出而有生生而齊齊畢出也至離而明明則可見至坤而養養而後物成物成則説乾以純陽居隂地故隂陽相薄而戰自出至戰久勞於外必歸而有以休息之故勞乎坎息之而後終終則有始此雖萬物之情實天之道也故言帝以先之自天地定位之後皆論八卦此章獨異復有重釋之辭蓋上論八卦之位未明言其所故下復明言之曰震東方也巽東南也如是則無嫌於重釋之也唯潔齊之義難通求其意則齊一而已易説漢上朱氏曰此以下言文王之八卦連山首艮歸藏首坤艮震離坤兊乾坎巽連山之序也而易兼用之此太玄所以作歟玄謂神戰於玄龍出於中雷風炫煥與物時行天根還向成氣收精皆凖乾坤震巽也鄭康成曰萬物出乎震雷發聲以生之也齊於巽相見於離風搖長以齊之潔猶新萬物皆相見日照之使光大萬物皆致養焉地氣含養使有秀實萬物之所説草木皆老猶以澤氣説成之戰言隂陽相薄西北隂也而乾以純陽臨之猶君臣對合也坎勞卦也水性勞而不倦萬物之所歸也萬物自春出生於地冬氣閉藏還皆入地萬物之所成終而所成始言萬物隂氣終陽氣始皆艮之用事坤不言方坤之養物不專此時也兊不言方而言正秋者臣曰兊言正秋秋分也於兊言秋分則震為春分坎為冬至離為夏至乾為立冬艮為立春巽為立夏坤為立秋可知言正秋者正時也離言聖人南靣而聽天下嚮明而治則餘卦亦可以類推矣戰乎乾言隂陽相薄而乾勝也易傳新安朱氏曰帝者天之主宰邵子曰此卦位乃文王所定所謂後天之學也上言帝此言萬物之隨帝以出入也並本義帝出乎震萬物發生便是他主宰從這裏出齊乎巽曉不得離中虛明可以為南方之卦坤安在西南不成西北方無地西方肅殺之地如何云萬物之所説乾西北也不可曉如何隂陽只來這裏相薄勞乎坎勞字去聲似乎慰勞之意言萬物皆歸藏於此去安存慰勞他問戰乎乾何也曰此處大抵難曉恐是箇肅殺收成底時節故曰戰乎乾問何以謂之隂陽相薄曰乾陽也乃居西北故曰隂陽相薄恐是如此也見端的未得勞乎坎是説萬物休息底意成言乎艮艮在東北是説萬物終始處艮也者萬物之所以成終而成始也猶春冬之交故其位在東北帝出乎震與萬物出乎震只這兩段説文王卦文王八卦坎艮震在東北離坤兊在西南所以分隂方陽方但不可曉處多如離南坎北離坎却不應在南北且做水火居南北兊也不屬金如今只是見他底慣了一似合當恁地相似文王八卦有些似京房卦氣不取卦畫只取卦名京房卦氣以復中孚屯為次復陽氣之始也中孚陽實在內而未發也屯始發而艱難也只取名義文王八卦配四方四時離南坎北震東兊西若卦畫則不可移換並語録太極兩儀四象八卦者伏羲畫卦之法也説卦天地定位至坤以藏之以前伏羲所畫八卦之位也帝出乎震以下文王即伏羲已成之卦而推其義類之辭也如卦變圗剛來柔進之類亦是就卦已成後用意推説以此為自彼卦而來耳非真先有彼卦而後方有此卦也古注説賁卦自泰卦而來先儒非之以為乾坤合而為泰卦豈有泰復變為賁之理殊不知若論伏羲畫卦則六十四卦一時俱了雖乾坤亦無能生諸卦之理若如文王孔子之説則縱橫曲直反覆相生無所不可要在看得活絡無所拘泥則無不通耳答王伯豐書來諭又謂冬春為陽夏秋為隂以文王八卦論之則自西北之乾以至東方之震皆父與三男之位也自東南之巽以至西方之兊皆母與三女之位也故坤蹇解卦之彖辭皆以東北為陽方西南為隂方然則謂冬春為陽夏秋為隂亦是一説但説卦又以乾為西北則隂有不盡乎西以巽為東南則陽有不盡乎東又與三卦彖辭小不同但此自是一説與他説如十二卦之類各不相通耳答袁機仲書右第五章新安朱氏本義曰此章所推卦位之説多未詳者神也者妙萬物而為言者也明道先生曰神也者妙萬物而為言若上竿弄瓶至於斫輪誠至則不可得而知上竿初習數尺而後至於百尺習化其髙矧聖人誠至之事豈可得而知朱公掞録拾遺伊川先生曰神是極妙之語謝顯道記平日語橫渠先生曰全備天理則其體孰大於此是謂大人以其道變通無窮故謂之聖聖人心術之運固有不疾而速不行而至默而識之處故謂之神易説廣漢張氏曰夫八卦各有所在也而神則無在而無不在八卦各有所為也而神則無為而無不為強名之曰神者即其妙萬物而強名之也易説白雲郭氏曰道則道也易則書也聖人則人也獨神為無方而三者皆有之故道亦有神易亦有神聖人亦有神神非别一物唯以其道之見於用而妙萬物者名為神也易與聖人之神皆一也因妙萬物而言之為神故曰妙萬物而為言也觀易則知神之為貴究神之為言則知道以用為大此孔子所以言中庸其至矣乎易説漢上朱氏曰帝乘萬物出入終始所可見者萬物之迹而其用蓋妙乎萬物不可得而見焉故曰神也者妙萬物而為言易之乾坤分隂分陽迭用柔剛上下不居周流六虛蓋象乎帝也故曰隂陽不測之謂神聖人用易立法制器變通不倦故曰利用出入民咸用之謂之神叢説新安朱氏曰或問以功用謂之鬼神以妙用謂之神二神字不同否曰鬼神之神此神字説得粗如言神也者妙萬物而為言此所謂妙用謂之神也言知鬼神之情狀此所謂功用謂之鬼神也問帝出乎震以下何以知其為文王之卦位曰康節之説如此問細看此數段前兩段説伏羲卦位後兩段自帝出乎震以下説文王卦位自神也者妙萬物而為言下有兩段前一段乃文王卦位後一段乃伏羲底恐夫子之意以為伏羲文王所定方位不同如此然生育萬物既如文王所次則其方位非如伏羲所定亦不能變化既成萬物無伏羲底則做文王底不出竊恐文義如此説較分明曰如是則其歸却主在伏羲上恁地説也好但後兩段却除了乾坤何也曰竊恐著一句神也者妙萬物而為言引起則乾坤在其中矣曰恐是如此問且如雷風水火山澤自不可喚做神曰神者乃其所以動所以撓者是也並語録又曰神是理之發用而乘氣以出入者故易曰神也者妙萬物而為言者也來諭大槩得之但却將神字全作氣字看則又誤耳文集動萬物者莫疾乎雷撓萬物者莫疾乎風燥萬物者莫熯乎火説萬物者莫説乎澤潤萬物者莫潤乎水終萬物始萬物者莫盛乎艮故水火相逮雷風不相悖山澤通氣然後能變化既成萬物也康節先生曰火生濕水生燥水遇寒則結遇火則竭從其所勝也金火相守則流火木相得則然從其類也觀物外篇明道先生曰冬至一陽生而每遇至後則倍寒何也隂陽消長之際無截然斷絶之理故相攙掩過如天將曉復至隂黑亦是理也大抵終始萬物莫盛乎艮此儘神妙須儘研窮此理吕與叔東見録息止也生也止則便生不止則不生艮終始萬物遊定夫所録廣漢張氏曰此論六子萬物不能以自生有雷以動之有風以散之萬物不能以自成有火以燥之有澤以説之有水以潤之然終之而萬物有所歸始之而萬物有所出者此莫盛乎艮也前言天地定位山澤通氣終於水火不相射蓋言八卦各立以為體也此言水火相逮終於山澤通氣者蓋言六子交通為用也水之飲酌有待於火火之烹飪有須於水此水火相逮也雷之震驚有風以散之風之鼓舞有雷以先之此雷風不相悖也山之氣下下通乎澤澤之氣上上通乎山此山澤通氣也惟六爻交相為用故變者自無而有化者自有而無此既成萬物者乎易説白雲郭氏曰此章論象其序與前八方之卦同獨不言乾坤者乾坤妙萬物之神在六子而已莫疾乎雷莫疾乎風其神也萬物無以加之也故易皆取神物以為八卦之象至乾坤之神又不得而見之矣撓散也澤上為天澤下為藪澤故莫説乎澤也天地之間山之養物為多故能終始萬物上言雷風則艮與山同功矣下言艮則雷風震巽同功矣其義互見非艮獨異也六子之象雖有動橈燥潤之功而或各專其用獨動獨撓不能變化亦不能成物必水火相須雷風相從山澤相通於是乎變化而畢成萬物况易之於卦坎離震巽豈能獨用也哉此聖人所以重卦之義也重之故變變則通通則久是以自天祐之吉無不利易説漢上朱氏曰上説天地定位六子致用此説六子合而為乾坤乾坤合而生神妙萬物而為言者物物自妙也鄭康成曰共成萬物物不可得而分故合謂之神張載曰一則神兩則化妙萬物者一則神也且動撓燥説潤終始萬物者孰若六子然不能以獨化故必相逮也不相悖也通氣也然後能變化既成萬物合則化化則神康成之學進於是矣易傳説卦帝出乎震齊乎巽相見乎離致役乎坤説言乎兊戰乎乾勞乎坎成言乎艮又曰震東方也巽東南也離也者明也萬物皆相見南方之卦也坤也者地也兊正秋也乾西北之卦也坎者水也正北方之卦也艮東北之卦也又曰動萬物者莫疾乎雷撓萬物者莫疾乎風燥萬物者莫熯乎火説萬物者莫説乎澤潤萬物者莫潤乎水終萬物始萬物者莫盛乎艮此説周易也故管輅曰聖人何以處乾位於西北坤位於西南邵康節曰置乾於西北退坤於西南乾統三男而長子用事坤統三女而長女代母坎離得位而兊震為耦以應地之方也王者之法盡於是矣文王八卦圖説新安朱氏曰此去乾坤而專言六子以見神之所為然其位序亦用上章之説未詳其義本義水火相逮一段又似與上面水火不相射同又似是伏羲卦語録問本義云云某竊謂上言六子用文王八卦之位者以六子之主時成用而言故以四時為序而用文王後天之序下言六子用伏羲八卦之位者推六子之所以主時成用而言故以隂陽交合為義而用伏羲八卦之序蓋隂陽各以其偶合而六子之用行所以能變化盡成萬物也文王八卦則兊震以長男而合少女艮巽以長女而合少男皆非其偶故自動萬物者莫疾乎雷至終萬物始萬物者莫盛乎艮皆别言六子之用故以四時之次言之而用文王八卦之序下則推其所以成用於隂陽各得其偶故用伏羲八卦若上用伏羲卦次則四時失其序下用文王八卦則兊震艮巽皆非其偶矣伏羲卦序與今卦序不同不知是孔子創為之而作序卦邪抑自文王周公繫辭之後已更伏羲之序如此而孔子特以序卦明其義邪先生曰伏羲自是伏羲卦序文王周公自是文王周公卦序答周純仁右第六章乾健也坤順也震動也巽入也坎陷也離麗也艮止也兊説也康節先生曰乾竒陽也健也故天下之健莫如天坤耦隂也順也故天下之順莫如地所以順天也震起也一陽起也起動也故天下之動莫如雷坎陷也一陽陷於二隂陷下也故天下之下莫如水艮止也一陽於是而止也故天下之止莫如山巽入也一隂入二陽之下故天下之入莫如風離麗也一隂離於二陽其卦錯然成文而華麗也天下之麗莫如火故又為附麗之麗兊説也一隂出於外而説於物故天下之説莫如澤觀物外篇伊川先生曰乾健坤順人亦不曾果然體認得乾坤毁則無以見易易須是以意明之河南語録橫渠先生曰健動陷止剛之象順麗入説柔之體易説一陷溺而不得出為坎一附麗而不能去為離艮一陽為主於兩隂之上各得其位而其勢止也易言光明者多艮之象著則明之義也正蒙廣漢張氏曰乾之純陽故其性健震得其陽而在下故動也坎得其陽而在中故陷也艮得其陽而在上故止也凡此者皆得其陽而未全者也坤之純隂故其性順巽得其隂而在下故入也離得其隂而在中故麗也兊得其隂而在上故説也凡此者皆得其隂而未全者乎易説兼山郭氏曰坎陷也離麗也剛則有體陷乎隂中所以為坎柔則無質麗於陽中所以為離易説白雲郭氏曰此章言乾坤之德與六子之性情所以釋八卦之名也八卦之名出於包犧氏上古之言止此八者而已文王能明之而不訓其義孔子訓之故後世可以學易非健順八字則易不復能讀矣故乾坤八字盡三才之道健順八字盡八卦六十四之道然則文王不載之簡編孔子何由而得之夫是之謂聖人易説漢上朱氏曰上説坎兊合以致用今復以八卦别而言之動陷止皆健之屬也入麗説皆順之屬也不離乎乾坤也易傳天地能變化成萬物者必水火雷風山澤合一焉所謂隂陽合德剛柔有體也隂陽者在天成象也剛柔者在地成形也萬物既成各得其一故健順動入陷麗止説其性各不同能備萬物而兼有之者人也故下舉八畜八體而終之以男女叢説新安朱氏曰此言八卦之性情本義八卦之性情謂之性者言其性如此又謂之情者言其發用處亦如此如乾之健本性如此用時亦如此卦體如內健外順內隂外陽之類卦德如乾健坤順之類並語録右第七章乾為馬坤為牛震為龍巽為雞坎為豕離為雉艮為狗兊為羊康節先生曰馬牛皆隂類細分之則馬為陽而牛為隂一陽動於二隂之下震也重淵之下有動物者豈非龍乎並觀物外篇橫渠先生曰飛遷躁動不能致逺雞之象易説廣漢張氏曰乾得陽而健為馬者以其致逺也坤得隂而順為牛者以其任重也震為龍者龍善動而升降自如而東方之七宿其象蒼龍也巽為雞者雞知時善變而工商執雞者亦如其知時坎為豕者豕主汙濕其性趨下也離為雉雉性耿介而外文明也艮為狗言其能止人而又止於人也兊為羊言其外柔而內狠也凡此者皆逺取諸物也易説白雲郭氏曰逺取諸物皆此類也説者或以巽主號令雞能知時義猶近之其言豕處汙濕狗善禁止鄙矣易説漢上朱氏曰説八卦本象也乾為馬健也乾變震為龍純乾為馬故馬或龍種而馬八尺以上為龍九則變也房為天駟為蒼龍之次七星為馬於辰為牛故馬又為火畜乾為金火馬無角金勝也故於五行為丘蠶馬首龍星之精故馬蠶同氣屯大畜中孚之震屯賁晉明夷暌之坎皆乾也或曰鳥飛龍行不健於馬乎曰鳥飛極而息龍升降有時健者惟馬而已坤順也牡者坤之陽牝者坤之隂老其究也故離為牝牛而既濟初九變艮京房以為博牛坤極生乾故角剛而善觸牽牛在丑丑土也土亦坤也離六二己丑土也牛有黃者離之六二也離為飛鳥為蟹為鱉為龜卵皆有黃震動於重隂之下而善變化者龍也震東方卦直春分以後辰亦為龍蒼龍之次也動極必反故龍以春分升以秋分降升者豫也降者歸妹也盛夏疾雷木枝而龍起震為木也王充曰龍雷同類其知震之為乎震位在卯其日甲乙其數三八故玄之中以次三為龍占家以甲乙寅卯為龍或曰龍之類多矣皆震乎曰氣之散也天文角為蛟亢為龍翼為蚓軫為蛇角亢辰也翼軫已也東方朔占蜥蜴以龍蛇推之金匱書以飴治蛟龍病出蜥蜴而愈皆龍類也自春分至芒種震治也而辰巳為巽故曰氣散也巽入也為風風主號令故雞號知時先儒以雞為火之精者巽木含火火生風火炎上故雄有冠乃鳴南越志曰雞冠如華其聲清徹巽位在已金所生也主於酉上直於昴故雞又為金畜洞林曰巽為大雞酉為小雞素問以雞為木畜者巽也離者巽之再變兊者離之變故雞雉皆耿介而雞將號動股擊羽翰而後有聲又曰玉衡星散為雞者坎至四月成乾其方為巽玉衡斗也坎為豕坎陷也水畜也美脊剛鬛坎中陽也垂耳俯首而尾不足本末隂也卑而處穢隂也突蕩難制陽也豚者豕之初也故訟初之四為中孚之豚豶者劇豬也故大畜之三兊金制之為豶坎再變成艮故豕用鼻壯豕有牙者乾之剛也象亦豕類故運斗樞曰瑶光散而為象坎離相納故象齒有文又為羸豕者隂也豕豭強而牝弱亥為豕者直室也坎之所自生也傳言斗星散精為彘斗星坎也又曰瑶光不明彘生鹿張宿為鹿坎離反也離附麗也鶉雉之屬飛必附草附麗也五色成章離目也雉方伏時東西風則復南北風則去而不復坎勝離也坤方之雉嘔文如繡離變而兊乎小寒雉始雊臨之六三離變兊也兊交震故雉不雊則雷不發聲陳倉之聲隱然如雷野雉皆雊星有墜而雉雊者震兊相感也蛇化雉者巽成離也竹化蛇者震巽易也雉入大水為蜃而老鶩為蝙蝠雀類為蛤離成坎也八卦獨巽離為飛鳥者何也曰南方七宿朱鳥也午為鶉火之次未為鶉首已為鶉尾其咮在柳其翼在翼柳午也離也翼已也巽也卜楚丘論明夷之謙曰當鳥所謂鳥者朱鳥也故曰明夷于飛歸藏初巽曰有鳥將來而垂其翼薛貞曰巽值鶉尾故稱飛鳥離火日巽木風也木中有火風者火氣之動也得乎風者為飛之類得乎火者得乎風離為目動巽為多白眼觀眼目之變可以知風火矣故驚飇奮發火勢熾然雷行電照草木怒張火木同類乎或曰騰蛇無翼而飛何也曰亦已巽也八荒之外有以首飛者背飛者尾飛者觸象成形豈特騰地乎或曰海水羣飛無情而飛何也曰坎極成離也火光起於洲灘烈焰生於積油坎極故也或曰飛類決起朝發而暮棲何也曰離在天為日在地為火日為晝火生風故飛者屬乎晝化乎風晝翔而暝息風騫而木飛艮止也搏噬者前剛也戌為狗者直婁也火墓於戌生於寅寅為虎而其子亦曰狗考異郵曰斗運生狗者星艮離也斗止而動亦狗也兊説也羊內狠者二陽伏於一隂之下也羝者交乎震震為反生也兊極成艮故羚羊以角息艮反成兊故墳羊為土怪夫子曰地反物為妖或曰史言開皇大厯羝或鬭於雲中羖或墜於雷震何也曰乾變坤則陽附隂而為走坤變乾則隂附陽而為飛其震兊之交乎或曰號物者有萬八物能盡之乎曰其變不可勝言也張載有言曰遊氣紛擾合而成質者生人物之萬殊其隂陽兩端循環不已者立天地之大義易傳新安朱氏曰逺取諸物如此本義右第八章乾為首坤為腹震為足巽為股坎為耳離為目艮為手兊為口廣漢張氏曰其形上圎而五官寓而衆陽之所會者首也五臟六腑之所存而隂虛有所受者腹也足在下而善動震一陽而在乎二隂之下善動者也故震為足股輔上而善隨一隂伏乎二陽之下善隨者也故巽為股坎為耳耳者內陽也而又為水故耳必下而能聽離為目目者內隂也而又為火故目必仰而能視艮為手執之而有釋之而無而四支之所止也兊為口出言以説人飲食以説體此兊所以為口也凡此者皆近取諸身也易説白雲郭氏曰乾元首之象也坤之含𢎞腹也陽動於下足也順於下而動於上股也坎幽利聽離明利視艮具動靜而下垂兊為口舌而上向也易説漢上朱氏曰説八卦合而成體也鄭本此章在乾為馬之前乾為天尊而在上為首在下亦為首如木根草荄之類乾無往而不為萬物先也乾首出庶物者震交乾也觀有孚顒若者乾首肅也明夷九三得其大首乾三之上也三本臨乾故曰大首既濟上六之濡首者上六反三乾也未濟上九之濡首者上九反三乾也乾又為頂者首之上也大過上六過涉滅頂是也又為輔者在首而止於上也咸之上六艮之六五是也輔上頷也與頤卦上體同象又為靣者在首而説見於外也革上六是也又為頰者止於上而有面之象也咸上六是也又為頄者面之上益之以剛也夬九三大壯上六是也頄靣顴也骨剛而肉柔太玄九體八為面九為顙八九上體也京房以上爻為頭目亦上體也腹虛而有容也又為釜者腹器也有水火爻則為釜故郭璞筮豫之解曰有釜之象瓶甕缶皆腹器也太玄土為腹器又為尊壺者交乎震坎也坎震為酒震為足艮為鼻腹器有足有鼻有酒尊壺也禮少儀曰尊壺者面其鼻又為簋者交震艮也有尊壺象而無酒焉者也禮少牢敦皆南首首者敦器之蓋飾首有面面有鼻坤又為身身亦謂之中又為躬折其身也震動也一陽動於二隂之下也艮為止者動極而止也一陽止於二隂之上也人之經脈十有二其六動於足其六動於手動於足者震之陽故自下而生動於上者艮之陽故自上而止震艮相反故行者必止止者必行疾走者掉臂束手者緩行震又為趾者通乎物言之也足趾下體之下也手上體之下也故太玄九體一為手足言其位也甲剛乾陽也在足者艮交震在手者震交艮震交艮則動者止艮交震則止者動震艮又為􅡑者足之指也拇手大指也手足所以能動也故動乎下體之下而應乎足者􅡑也指在下而動者亦􅡑也艮又為肱者自手觀之拇陽也餘指隂也指節三隂中之陽拇節二陽中之隂指動而掌止止者在上動者在下止者運動者止艮也自臂觀之手也臂也肱也三也肱屬乎上而止臂指用乎下而動止者役動動者從之艮也肱臂竒而指數偶亦艮也手之有肱亦猶股之有腓故股在上則二為腓巽為股隨足巽也雷風相與也坎為耳陽陷乎隂也輪偶者隂也竅竒者坎中之陽也精脫者聵水竭則稿耳目通竅者水火相逮也離隂麗乎陽也實者陽也陽中有隂故肉白虛者隂也隂中有陽故睛黑目白其坎離之交乎精竭者目盲離火無所麗也離為日寐者神棲於心其日昃乎寤者神見于目其日出乎故寐者形閉坤之闔也寤者形開乾之闢也一闔一闢目瞑耳聼坎離相代晝夜之道唯善用者能逹耳目於外惟善養者能反耳目於內太玄以一六為耳二七為目一六水也二七火也兊為口説也鄭康成曰上間似口艮為鼻口鼻通氣山澤通也易傳新安朱氏曰近取諸身如此木義至之問艮何以為手曰手却捉定那物便是艮又問捉物乃手之用不見取象正意曰也只是大槩略恁地安卿説麻衣以艮為鼻曰鼻者面之山晉管輅已如此説亦各有取象又問麻衣以巽為手取義於風之舞非是為股先生曰亂道如此之甚語録右第九章乾天也故稱乎父坤地也故稱乎母震一索而得男故謂之長男巽一索而得女故謂之長女坎再索而得男故謂之中男離再索而得女故謂之中女艮三索而得男故謂之少男兊三索而得女故謂之少女伊川先生曰或謂劉牧謂上經是天地生萬物下經是男女生萬物曰天地中只是一箇生人之生於男女即是天地之生安得為異曰牧又謂乾坤與坎離男女同生曰非也譬如父母生男女豈男女與父母同生既有乾坤方三索而得六子若曰乾坤生時六子生理同有則有此理乾坤坎離同生豈有此事既是同生則何言六子邪劉元承手編廣漢張氏曰老陽為父老隂為母陽能變故自下而索震為長男自中而索坎為中男自上而索艮為少男老隂能變故自下而索巽為長女自中而索離為中女自上而索兊為少女易説白雲郭氏曰乾坤天地父母皆一道也此綸父母男女之象故乾坤主父母而言六子之變自下為先震自坤變而得陽畫於初巽自乾變而得隂畫於初故皆曰一索而為長男長女也坎自坤變而得陽畫於中離自乾變而得隂畫於中故皆曰再索而為中男中女也艮自坤變而得陽畫於上兊自乾變而得隂畫於上故皆曰三索而為少男少女也一二三之義取於三畫之初中上也王氏云素求也自坤而求陽皆男也自乾而求隂皆女也卦變之義蓋始於此文王之重亦無以異也故説卦首章曰觀變於隂陽而立卦易説漢上朱氏曰將説天地生萬物而言人者天地之性人為貴萬物皆備於人也乾天也為隂之父坤地也為陽之母揲蓍者一爻三揲三爻而八卦具故搜於坤策一索而得陽者謂之長男再索而得陽者謂之中男三索而得陽者謂之少男搜於乾策一索而得隂者謂之長女再索而得隂者謂之中女三索而得隂者謂之少女萬物分天地也男女分萬物也察乎此則天地與我並生萬物與我同體是故聖人親其親長其長而天下平伐一草木殺一禽獸非其時謂之不孝納甲之説乾納甲壬始於子坤納乙癸始於未震納庚子子代父也坎納戊寅艮納丙辰左行以順父循父道也巽納辛丑離納己卯兊納丁巳右行以向母從母教也三女配男夫婦之義天地之性人之大倫實告之矣太玄準之以一摹二摹三摹摹亦搜也易傳新安朱氏曰索求也謂揲蓍以求爻也男女指卦中一隂一陽之爻而言木義震一索而得男一段看來不當專作揲蓍看揲蓍有不依這序時便説不通大槩只是乾求於坤而得震坎艮坤求於乾而得巽離兊一二三者以其畫之次序言也又曰非震一索而得男乃是一索得陽爻而後成震又曰一説是就變體上説謂就坤上求得一陽爻而成震卦一説乃是揲蓍求卦求得一陽後靣二隂便是震求得一隂後面二陽便是巽乾坤三索則七八固有六子之象然不可謂之六子之策若謂少隂陽為六子之策則乾坤為無少隂陽乎並語録右第十章乾為天為圜為君為父為玉為金為寒為氷為大赤為良馬為老馬為瘠馬為駁馬為木果伊川先生曰説卦於乾雖言為天又言為金為玉以至為駁馬良馬為木果之類豈盡言天若此者所謂類萬物之情也故孔子推明之曰此卦於天文地理則為某物於鳥獸草木則為某物於身於物則為某物各以例舉不盡言也學者觸類而求之則思過半矣不然説卦所敘何所用之龜山語録橫渠先生曰乾為大赤其正色也為氷健極而寒甚也自此而下皆所以明一作類萬物之情並易説廣漢張氏曰乾為天者運而不息得會諸陽而在上者也圜者運而無窮而考工記謂衣裳畫火為圜亦以象乾也為君為父道之尊也為玉為金德之貴也乾位在亥其陽氣自下而升故隂氣凛冽而為寒凝結而為氷其畫皆一故為大赤異乎坎之為赤也為良馬者言其性為老馬者言其數為瘠馬者言其剛為駁馬者言其變為木果者言其陽氣能生者乎易説白雲郭氏曰繫辭言包犧氏始作八卦以通神明之德以類萬物之情此皆所謂類萬物之情也乾之於八卦天之於三才君之於臣父之於子金玉之於土石皆一道也是之謂類也乾之道天之形人之首皆圜也寒氷西北之位也大赤乾剛之色也馬行健也良則善於其道也老則久於其道也瘠馬駁馬未詳其旨先儒或以瘠為柴益非也孔氏又謂駁馬有牙如鋸能食虎豹誤矣未有蹄物能搏虎豹者也或言有獸名駁食虎豹事非經見亦非馬類疑無其字借用駁耳非駁馬也又言果實著木如星之著天如是則果為星象非天象也乾元為萬物之始居羣物之上萬物之所資焉而果者木之始也木以果為始亦猶物以乾為始也然聖人言此使學者知其道無乎不在也此亦舉其大槩耳安能盡言天下萬物之象哉觸類而長之斯可矣自人言之則千夫長百夫長夫之於妻長之於幼亦皆乾也自物言之宫室之覆車蓋之象亦皆乾也麒麟之於走獸鳳凰之於飛鳥泰山之於丘垤河海之於行潦亦皆乾也山河雖坎艮之象方其於丘垤於行潦則乾也至於虎狼有父子之仁螻蟻有君臣之義孰謂乾之道又有在於虎狼螻蟻之間者乎故知其道無乎不在特知而用之者鮮矣八卦之象皆然易説漢上朱氏曰説重卦别象也六爻變化其象豈能盡摹哉此凡例也智者觸類而長矣易言天者皆乾也天位者中正也又曰帝位天德者剛也天道者其行以正也天之神者隂陽合一也天則者不可過也天行者終則有始也反復其道也消息盈虛也三者一也天文者艮離也天命者乾巽也天衢者艮反震也天寵者君澤加也天險者坎在上也天祐者天助也天下者乾下也或乾爻降於下也曰在曰統曰御曰先後曰奉曰承曰順曰應曰麗各以其卦爻變化言之天或謂之帝言主宰也推而上謂之上帝乾又為大人聖人賢人君子大人者盡天之體也為圜者渾淪無端周而復始也五者君之位乾為六子父乾居九五之位則為君而父也乾剛之不變者為玉變者為金益之三以上九為圭鼎之上以九三為玉言其不變也蒙之金夫臨初之上也亦屯之初也訟之鞶帶上九之二也噬嗑金矢四之五也六五黃金五之上也姤之金柅二之初也鼎之金鉉五之二也言其變也乾艮同類故石攻玉則解乾離同體故金火守則流京房以乾兊配金兊正秋亦九五爻也太玄以二八為金為環珮為重寶為扣器以一六為水為玉者六即乾也玉有水玉水得乾氣乎為寒者坤交乾也隂至亥成坤戌亥乾位九月寒露十月立冬小寒十一月大寒露坤氣也雲徂雨流而露無所不至坤也黃帝書曰陽不足隂氣上入陽中則灑淅惡寒此寒之驗也邵雍曰月為寒二隂一陽陽不足也坎為水為月故水寒或曰井五月卦九五寒泉冽何也曰井之九五即泰乾初九甲子爻也子坎位也坎交泰坤也陽溫隂寒乾陽而寒者隂陽相薄十一月陽氣生於下以其隂不足也故井泉溫五月隂氣生於下以其陽不足也故井泉寒又為氷者坎交乾也乾西北方之卦十月水始氷地始凍水不氷則為隂負陽勝十月乾陽宜不足也乾剛金也故水凝而堅則隂勝坤初六一隂生至上六十月亥位坎交乾邵雍曰水遇寒則結遇火則竭從所勝也赤陽色也陽始於子坎中之陽故坎為赤極於已純乾也故乾為大赤乾者日在嵎中月在望歲在四月時也困九二坎為赤二交巽五為赤紱又為朱者朱赤黃色詩云朱芾斯皇毛公曰黃朱染絳者一入謂之縓再入謂之赬三入謂之纁四入謂之朱纁黃赤也小爾雅曰彤赬韞赤也然則縓纁朱皆赤而朱比赤為黃比縓纁為異耳故困九五下交二坎離易巽為朱紱離坤黃也乾陽得位為良馬隂消陽為老馬為瘠馬鄭康成曰凡骨為陽肉為隂孔穎逹曰骨多也駁馬玄黃也乾變離也駁食虎者兊變乾也郭璞筮遇乾之離曰驊騮緑耳遂玄黃於坎離艮曰其於木者交巽木也於乾曰為木果者巽艮之陽皆乾也艮為果者木之陽止於果果成則降降而反生震者艮之反震陽亦乾也秦漢之際易亡説卦孝宣帝時河內女子發老屋得説卦古文老子至後漢荀爽集解又得八卦逸象三十有一案集解坎為狐子夏傳曰坎稱小狐孟喜曰坎穴也狐穴居王肅曰坎為險為隱伏物之在險穴居隱伏往來水間者狐也子夏時坎為狐孟喜王肅止隨傳解釋不見全書蓋秦漢之際亡之矣今考之六十四卦其説若印圈鑰合非後儒所能增也故校證其誤而并釋之以俟後之知者為龍乾體坤自震息之成乾故乾為龍坤體乾剝乾成坤隂極生陽為復震也故坤上六龍戰于野其血玄黃坎為血震為玄黃為直乾其動也直巽為繩直者亦乾之直也為衣乾在上為衣坤在下為裳太玄曰垂綃為衣襞幅為裳垂綃竒也襞幅偶也訟之帶歸妹之袂既濟之衣袽皆乾也困之紱既濟之襦皆坤也古者衣裳相連乾坤相依君臣上下同體也至秦始取女之衣裳離之為言者震聲兊口聲出於口也所以能言者出於乾陽也並易傳新安朱氏曰荀九家此下有為龍為直為衣為言本義卦象指文王卦言所以乾言為寒為氷語録坤為地為母為布為釡為吝嗇為均為子母牛為大輿為文為衆為柄其於地也為黑橫渠先生曰坤為文衆色也為衆容載廣也易説廣漢張氏曰坤為地者言其隤然下載上承於天也為母者親而不尊不産而萬物育也為布者言其無逺無近行地無疆德合無疆者也為釡者化物而不化於物者也為吝嗇者其靜也翕而斂藏為事也為均者其勢均平而無偏陂者也為子母牛善載而生生也為大輿方而下載者也文事武備宜乎坤為文也其畫皆耦故為衆也用處物之後而持其權者柄也其於地也為黑者隂之色也異乎乾之為大赤易説白雲郭氏曰布均皆猶地之德釡猶地之化吝嗇隂性也子母牛蕃生也大輿厚載也物雜則生文數偶則衆柄為化權純隂之色黑大赤之反也八卦之義最難通故聖人詳其所象亦立象盡意之謂也詳其一卦所為之象然後可通一卦之義不然則乾坤八卦非親質之三聖人終莫知其為義矣唯八卦有象如此其詳故雖百世之下亦可聞而知之也聖人反覆言八卦於前又列其卦言之於後得無深旨邪易説漢上朱氏曰易凡言地者皆坤也乾坤皆言天地者隂陽相根動靜相資形氣相應有一則有二有乾則有坤邵雍曰天依形地附氣其形有涯其氣無涯張載曰地在氣中黃帝書曰地在太虛之中大氣舉之天地未始相離也又曰天在地外水在天外表裏皆水兩儀運轉乘氣而浮載水而行考之天西河中九星曰鉤星鉤星伸則地動者以水動也辰星色黃而小則地大動土勝水也鉤鈐者天之管籥鉤鈐坼則地動者天之管籥動也以此三者觀之水動則地動地動則天動地非乘氣載水乎氣無涯水亦無涯水亦氣也乾為父則坤為母乾為祖則坤為妣坤得尊位母也五動成乾為王母王母尊祖王妣也五尊位在家人乾父居五則坤母居四尊無二上也麻紵葛曰布巽為草以隂不變者為布巽離為絲以坤隂變陽者為帛賁六五束帛戔戔上九變五巽離也坤隂變陽也坤為帛束帛五兩天九地十之數布帛兩兩相偶五尺謂之量倍量謂之丈倍丈謂之端倍端謂之匹釡有範金者有合土者其象有腹有耳無足皆自坤變坤為土為腹家人者遁四之初變艮坤六二有坤腹坎耳坎水離火巽木以釡亨飪之象離為中女故曰在中饋郭璞筮豫之解六二變坤有坎離曰釡之象遇大有之旅初九九二變乾成艮坤兊為金為澤有離火而無耳曰金之祥非釡也或曰鼎何以取於坤曰鼎自遁五之二巽變艮坤器之有腹者也而又有足耳鉉以木巽火坎水亨之故曰鼎象也易言吝者十二卦十三爻陽爻居三咸之九三從上六故往吝恆之九三趨上六故可貞而吝姤之上九居隂故吝其餘可往而不往可動而不動可變而不變坤隂也亦有知其不可以往為吝者屯六三是也然則坤之吝嗇顧用之如何耳故曰憂悔吝者存乎介乾獨陽也坤隂均之寒均暑夜均晝適得其平故小者亨則曰既濟而小大相過皆謂之過為子母牛者坤交離也坤為牛為腹離為大腹京房既濟之初九變曰博牛言以牸牛博犢也洞林明夷之既濟曰當有牛生一子蓋坤變坎坎為子三至五互有離四者坤之丑爻丑亦牛也離畜牝牛者母也大畜艮坤之初為童牛者子也太玄以土為犢地方而載輿也坎止曰輿坤爻變乾陽為大則曰大輿也一剛一柔相錯成文有天而後有地一不獨立二則為文天一地二也季春之月夬九三爻也陽氣充塞氣成虹霓有剛然後文柔之也仲冬之月坤六四爻也雖霽而日虹霓伏藏陽不足也以此見無一則無二矣衆者對寡之名師以一陽主五隂故曰用衆曰蓄衆明夷以二陽臨四隂故曰蒞衆解以初九之坤四故曰得衆民者有君之名也師曰衆又曰民何也曰復初九之二坤隂自下從之故曰民坤之隂即坎之二隂也坎之二與上坤之三隂合故又為衆為柄者巽之坤順其鑿而入焉者也斧柯劒夾殳戈矛之柲耜之耒柄也旅九四得斧巽上九喪斧或得其柄或失其柄黑者坤之極也坤為地又曰其於地也者坤為黑其於地乃其一也坤變乾為牝馬離變坤為牝牛隂陽之中復有隂陽此萬物所以無窮也姤初六坤變乾初九甲子坎豕不曰牝豕者初隂未壯也為迷者坤冥晦待陽而後明先陽而動與逺於陽而不復皆迷之道為方者坤靜而德方方不可易也為囊者坤虛有容與腹同而囊手可括也為裳為黃者黃地之中色得乎陽之美不偏於隂者也為帛為漿者帛當在為布之下坎震為酒故作酒以麴蘖麥東方穀也而東風至則酒湧漿者酒之初故坤為漿不足於陽也並易傳新安朱氏曰荀九家有為牝為迷為方為囊為裳為黃為帛為漿本義震為雷為龍為玄黃為敷為大塗為長子為決躁為蒼筤竹為萑葦其於馬也為善鳴為馵足為作足為的顙其於稼也為反生其究為健為蕃鮮橫渠先生曰震為萑葦為蒼筤竹為敷皆蕃鮮也易説廣漢張氏曰陽氣自下而上者故為雷也潛升在已而動之以時者故為龍也震為四時之首天地始交二氣未分故為玄黃方春而發生萌芽條達故為敷萬物由之而出異乎艮之徑路故為大塗對女而言故為長男為長子者亦以其一索而得之陽動於下物莫能遏故其性以燥根之盤結而下其剛者為竹其柔者為蘆葉皆一陽在下故也凡物不得其平則鳴在下而不得其平故為馬之善鳴也後足白謂之馵見爾雅左為陽而右為隂後足左白則隂不先動從陽而作故也為作足者一陽性動而作於下也二隂在外而著見故為的顙凡五榖草木之實必倒生焉言其陽隂自下而生在人亦然凡陽有自然之性震之究必終於為乾故其究為健於春而蕃鮮震其時乎易説白雲郭氏曰乾為純陽坤為純隂自乾坤相索一索而得震故震為隂陽交變之始其去乾坤未逺也是以震備乾坤之象為具體而微者錯而言之則其色玄黃玄黃天地之色也别而言之則龍乾畜也決躁乾剛也敷與大塗坤之道也其於馬者因乾而言也其於稼者因坤而言也其究為健乾也為蕃鮮坤也蒼筤雈葦反生皆盛生之物雖為陽卦隂道盛也善鳴動而有聲也馵足作足陽動於下也卦以白為隂的顙隂在上也此亞乾之四馬也易説漢上朱氏曰張載云隂氣凝聚陽在內者不得出則奮擊而為雷霆陽在外者不得入則周旋不舍而為風其聚有逺近虛實故風雷有小大暴緩鄭康成讀龍為尤取曰出時色雜也虞翻曰駹蒼色震東方故為駹舊作龍上已為龍非也臣曰讀當作鬬字龍當作􅔀蒼尨尾也國語日月會於龍􅔀孟春日月會於娵訾斗建寅旦見尾中播種之時無妄益乾變震之象乎若蒼色則上巳曰蒼筤竹矣坤於地為黑又曰天玄而地黃者坤之中爻為黃黃者地之中色得陽之美者也中為坤宫太玄以五五為土其色黃五五中也中首曰陽氣潛萌於黃宫坤上六十月也言龍戰于野坤黑也乾赤也謂之其血玄可也而曰其血玄黃又曰震為玄黃者何也曰此天地鬼神之奧聖人之微意也坤之上六閉塞成冬隂極疑陽而戰陽於此不爭而自勝於是冬至而坎之初六受之故曰天玄而太玄亦曰夜半近玄極坤生震陽自外來而為主於內卦為復以坎言之則玄也以復震言之則玄黃也然十月未可以言黃故古人謂冬為玄冬震所以為玄黃者初九春分六二清明六三榖雨九四立夏六五小滿上六芒種初九乾坤之初交以赤交黑所謂玄也六二六五坤之中爻所謂黃也十月又謂之陽月言未嘗一日無陽而陽亦未嘗一日不勝也故曰神戰于玄邪正兩行尨出于中法度文明尨出於中則震也又曰天炫炫出於無畛熿熿出於無垠出者亦震也隂極陽生亂極德形君子於是修德以俟時也為敷者隂體凝滯震陽敷之鄭康成曰國中三道曰塗震上值房心塗而大者取房有三塗焉王洙曰卯為日門險極成易大川之上必有大路故大塗之象必出於坎兊之外或曰道或曰衢履九二動或震動而正故曰道大畜自大壯來上九畜極艮反成震大塗而在天上無所不達天衢也故曰衢賁又為徒行者初九之四艮應足動足指履乎大塗徒行也泰九三為陂者大塗變而為山澤易極成險故曰無平不陂為長子師六五動成艮艮少男視二震為長震視艮為弟坤母視之為子故曰長子震變兊為決變巽為躁竹中虛節實重震之象蒼筤青也震之色孔穎達曰春生之美也竹草類而有木氣草於五行為木故蒼筤竹乃盡震象雈葦震之廢氣也故竹堅而雈葦脆竹久而雈葦易枯為馬善鳴者震也易凡有震聲曰鳴謙六二上六是也兊口震聲在人曰言需九二以四為言訟初六往四為言明夷初九往四為言夬九四不動為聞言不信革九三往上為言震臨二之四為言上六交四則五為言艮五動易二為言漸初六動而之二為言皆震兊也在飛鳥曰音中孚上動反三小過初九之四是也或曰音有五善鳴者何獨震乎曰震動也凡聲激而後有雷以陽激隂風以隂激陽水火之聲無非激也不動何由有聲為馵足者伏爻也震為足於左在下卦為後震下有伏巽巽為白此震爻發於下之象乾為首上發震爻則為的顙的顙詩所謂白顚傳所謂的顱也為作足者乾馬變也震下爻動屯初九是也大畜九三乾變震三陽並進故曰良馬逐中孚六四震作足馬四易初成坎坎為美脊震坎類也四絶類上行坎亡震存故曰馬匹亡其於稼也為反生宋衷曰隂在上陽在下故為反生虞翻曰震相薄變而至三則下象究與四成乾故其究為健巽究為躁卦雷風無形故卦特變耳為蕃鮮者泰頥恆萃歸妹言萬物解言百果草木甲拆者震也咸四月卦言萬物化生姤五月卦言品物咸章者震變巽也震為蕃變巽為鮮故又曰潔齊太玄曰物咸重光保厥昭陽言離明也或曰離言百榖草木者何曰離有震巽也解言百果草木者何曰有震巽而又自艮變也為王當在乾為天之下錯文也五為王之位乾為君君宜正位宅中故九五為王先儒以震為諸侯是乎曰非也長子主器謂長子為諸侯也四諸侯位豫九四天子建諸侯也晉九四天子接諸侯也四近君位古者諸侯入為三公三公出為諸侯故其位四與三通曰公侯之位鵠古鶴字震離為鶴中孚九二是也訟初之四坎變巽離變震兊震為善鳴為足巽為白兊為澤繁露曰鶴水鳥也夜半水感其生氣益喜而鳴京房論中孚曰九二處和體震則震為鶴房本有之房在孝宣後故也鼓象雷中孚九三或鼓或歌震交巽為木艮為手手執桴擊之鼓也又為鼓缶之鼓離九三變坤震坤為器震為鼓巽木艮手鼓缶也並易傳新安朱氏曰荀九家有為王為鵠為鼓本義巽為木為風為長女為繩直為工為白為長為髙為進退為不果為臭其於人也為寡髮為廣顙為多白眼為近利市三倍其究為躁卦橫渠先生曰巽為木萌於下滋於上也為繩直順以達也為工巧且順也為白因所遇而從也為長為髙木之性也為臭風也入也於人為寡髮廣顙躁人之象也易説廣漢張氏曰曲直不一即從權也故為木善入而無形故為風一索於坤故為長女能屈能伸故為繩直制器不於一方而用其隱故為工白受采而無不入也故為白不自矜故為長自下而人髙之故為髙巽則進退不果故為進退又為不果也臭達乎逺而無不通故為臭髮者血之餘也一隂在內其氣耗故為寡髮二陽在上昭然顯白故為廣顙木開竅為目金為色為白巽為木而在已金生於己而尅木焉故為多白眼離為南方日中市而巽不逺故為近利市三倍凡物極則反故巽順之至究則為躁卦以隂本自性者乎易説白雲郭氏曰木為曲直曲直為工白隂也長髙木象也進退風性也臭以風而傳物以進退而不果隂卦多陽是以其究為躁寡髮剛上也廣顙重剛也為多白眼近利市三倍未詳其象易説漢上朱氏曰震巽皆木也説卦巽為木言蕃鮮之時震之九四爻也乾艮坎離皆有木象何也曰水火土石地兼體之金生於石木備此四者而後有故木果乾也堅多節艮也堅多心坎也科上稿離也其實乾坤而已風者火氣之動隂麗於陽則為火隂入於陽之下則為風巽之所入即所麗之隂也火非動不見而動則屬乎風黃帝書曰在天為風在地為木舉一隅也為繩直者巽一柔為二剛所糾有股而合繩也其剛爻為直繩所以直者以剛糾柔也為白者坎變巽也坤至北為黑坎中之畫乾赤也赤黑為玄坎水一也或為白露或為霜雪為氷者皆寒氣巽入之也白虎通曰露者霜之始也坎為月遡日而白離之光巽入也白者隂也陽之基也隂陽相賁而後有文陽盡則隂質見矣巽又為墨者巽變坎也白復成黑墨者黑與水合太玄飾曰隂白陽黑分行其職天地變化萬物者以巽而莫見其變化之迹故巽為工訟之鞶帶比坎之缶泰之城隍解之墉同人隨之門節之門戶豫之門柝小畜大畜之輿輹大有賁困之車既濟之輸井之收噬嗑旅解之矢睽之弧矢旅巽之斧賁之帛困之紱既濟之衣襦剝巽之牀渙之機大過之棟宇漸之桷困之宫小畜之室大壯之宫室豐之屋旅之次剝之廬坎之樽簋井之瓶甕鼎之耳鉉中孚之舟楫益之圭歸妹之筐既濟之茀離之罔罟益之耒耜小過之杵臼大過之棺椁夬之書契恆之浚井之泄甃皆巽工為之也巽為風草木風之類皆長巽離為絲亦長姤初變兊為履之虎尾亦長施之於事久長是也易言不長不可長何可長皆巽變也為髙者風髙至者也飛鳥之類有背負蒼天皆風所為也為進退者坤生震之一陽則退者進乾生巽之一隂則進者退易稱進退者巽也觀九三是已屯初九曰盤桓者進而之四成巽四不能安故盤桓萃初六退而亂進而與四相萃故曰乃亂乃萃皆進退也或曰大壯上六何也曰上六震震者巽之反不能退不能遂則進退不可矣巽兊之覆也兊為決覆之為不果稱疑者皆不果也為臭者張載曰聚而有間則風行風行而聲聞臭達坎為髮髮者血之華坎血耗滅頂露於上寡髮也乾為首析而言之初畫為頤中畫為面上畫為顙震得初畫為頤者動於下也兊得中畫為面者恱見於外也巽得上畫為廣顙者上大下小也為多白眼者離為目虛者隂也實者陽也虛者其體陽實者其體隂故虛者為眸子實者為白肉離變巽則白肉在上眸子在下故為多白眼見於易者為惕為反目為近利市三倍者噬嗑六三變也日中為市巽變兊離為螺為貨市利也巽變離兊三倍也舉此一爻以例諸卦其究為躁卦者巽三變成震舉震巽二卦以例餘卦為楊者巽為風風輕揚中孚九二鳴鶴在隂其子和之上九翰音登于天用此象為鸛者別於鶴也震為鶴陽鳥也巽為鸛隂鳥也鶴感於陽故知夜半鸛感於隂故知風雨世傳鸛或生鶴巽極成震乎並易傳新安朱氏曰荀九家有為楊為鸛本義為乾卦其究為躁卦此卦是巽下一爻變則為乾便是純陽而躁動此蓋言巽反為震震為決躁故為躁卦語録坎為水為溝瀆為隱伏為矯輮為弓輸其於人也為加憂為心病為耳痛為血卦為赤其於馬也為美脊為亟心為下首為薄蹄為曵其於輿也為多眚為通為月為盜其於木也為堅多心橫渠先生曰坎為血卦周流而勞血之象也為赤其色也易説廣漢張氏曰一陽在內二隂在外內明外晦故為水也為溝瀆者水之流行者也為隱伏者水之淵深者也為矯者以曲而直為輮者以直而曲有矯輮而外之勢不泛濫而潰亂古人之行水者如此弓蓋二十有八所以蔽其車之上輸輻三十所以載其下為弓輪所以行坎之險也水之為物生北而北方之志為恐恐則加於憂也五行之氣在藏於心為水坎為水則勝於火故於心為病水在藏為腎開竅於耳而坎一在中故為耳痛氣為陽而血為隂周流於四支亦猶水之在天地間故為血其一在中異乎乾之純陽為大赤也故為赤陽在其中其於馬為矣脊其性善動故為亟心其性趨下故為下首險而多陷故為薄蹄而不利於行馬援傳注云蹄欲厚故也盈科而後進故為曵平原易野故輿行而無阻也在坎故多眚萬折而歸於東故為通外晦內明故為月行於隂而善陷故為盜水生木而一生其中故為堅多心易説白雲郭氏曰江河溪澗皆水也溝瀆人所為者也隱伏水性也矯輮弓輪方圎曲直之易也加憂心病耳痛血卦陽陷於中也坎再索以中為主中得乾之剛故為赤震坎皆有馬象者得乾德之餘也美脊亟心陽在中也下首隂居上也薄蹄下亦隂也流物故為通流不能止故多眚離日而坎月也盜小人之隱伏也木堅多心剛中也於輿之義疑當作其於輿也為曳易曰見輿曵又曰曵其輪故輿有曵而馬無曵也乾震之馬四而坎之言馬五亦知曵為輿矣屯以坎為雲解以坎為雨而於此不言者於以見八卦之象不能盡言者多矣易説漢上朱氏曰坎陷也盈天地之間皆水曰水者舉其凡也坎之隂為陽所得上而為雲故屯曰雲雷需曰雲上于天坎之陽為隂所得下而為雨故屯解曰雷雨坎水之通流為川訟之坎由遁乾三之二漸之坎由否乾四之三渙之坎由否乾四之二益之坎由渙二之初故曰大川或曰小過彖夬九三中孚下體兊也或為雲為雨為大川何也曰坎兊一也革兊上離下彖曰水火相息兊亦水也自陽為隂所陷言之謂之坎自澤物言之謂之兊澤無水則亦無以澤物矣故澤無水謂之困上浮而為雲下墜而為雨非澤氣之升降乎川澤者坎兊之相變也需之川自大壯之兊變而為坎澤決而為川也中孚之川自訟之坎變而為兊川壅而為澤也澤或決而通川或壅而塞豈有常哉曰涉大川何也曰需之利涉震足蹈川也益之利涉巽股蹈川也訟之涉坎變兊巽股入於下而澤滅其頂不利涉而入于淵也坎或為淵何也曰乾九四或躍在淵者坎之下復有澤也訟曰入于淵者訟變巽睽大過三坎成兊川壅成澤澤蓄成淵與乾九四一也坎又為泉何也艮兊變坎山澤通氣山下之澤出而流動則為泉泉有源之水澤其源也蒙自臨來兊變坎艮與井自泰初之五乾變兊坤變坎初自兊下往而成坎則初為泉源同象坎又為膏者亦坎兊也澤之肥者陽之美也為隱伏者坎為水水善隱伏沇濟沱潛之水潛行千有餘里五緯唯辰星難見而血之流行於肌肉之際者至幽也乾之初九甲子坎之位也九變而六則為潛為隱坤之六四言賢人隱以乾之初九為賢也在履九二歸妹九二因初九之動皆謂之幽隱伏也而謂之幽坎離相形也輮宋衷王廙作揉今從二家矯者矯曲為直揉者揉直為曲噬嗑九四之五解九二之五旅六五逮四皆巽為木艮手矯之正曲為直加以鋭金故曰矢曰金矢者乾也曰黃矢者離也否四之初三變成益一變漸巽變乾直者曲也二變渙而曲其柄耒也渙巽變乾曲而有足肱據其上機也皆有坎揉之象古矢幹用蒲柳故曰剡木為矢小過為弋者四本明夷之初離巽為絲以絲繫矢射之弋也為弓輪者揉直為曲坎木為之坎兩端柔其中剛剛柔往來施張也輪一虛一實內實外虛乾為圜矢取巽離弓取巽坎又有工矯揉之豈人為哉其於人也為心病者虞翻以坤為心坎二折坤為心病以類言之心火也坎水也坎心病也以位言之坤土中也中者心之位明夷六四應初比三四入而初出坎變兊心病去而説獲心意也井九三未用上六其心病故惻然傷之艮六三靜與動爭夤裂而心病故厲薰心艮六二隨三不能動而應五旅九四不能進而上道行於五故其心病皆不快為加憂者卦以隂陽失位失應為憂憂之之中又見險加憂也在屯上六為泣血漣如在離六五為出涕沱若在晉六二為愁如在震九四為虩虩人所以知疾痛搔癢者由血流行也坎為血卦為耳血流行而物傷之為耳痛舉此則百體之痛一也為赤者乾為大赤坎中之陽乾中畫也其於馬也為美脊者乾為馬上畫為顙故震交之為美脊下畫為足故震得之為作足良馬者純乾也屯上六以五為馬賁六四以三為馬晉以四為馬中孚以訟二為馬皆美脊之馬也為下首為亟心為薄蹄者屯上六之班如賁六四之翰如睽初九之所喪馬皆以亟心坎在中也乾為首坎隂在上交之為下首震為足坎隂在下交之為薄蹄中之位為心坎陽交之偏於陽矣為亟心乾為馬三男皆乾索也言震坎而不言艮者顙在上即艮之乾也猶乾為木果而艮又為果是已為曵者坎離交也坎水欲下離火欲上曵也坎為豕坎極成離故豕亦俯首薄蹄亟心卑而率有曵之象其於輿也為多眚者坤為大輿為衆多坎陷者輿之病行則必敗唯無眚者乃可行災以坎言者險也為通者坎水決為江河升為雨露血之在人者周流無窮也乾曰六爻發揮旁通情者坎離升降遍被諸爻乾之情也坤六五曰黃中通理者五動成坎也節九二知通者動而應五坎也知塞者坤土塞其行也需自大壯四之五成坎乾九四變漸渙之坎而成益通也故曰大川中孚之川由訟坎而訟自遁三變之坎亦通也豫九四曰朋盍簪者上下通也或曰泰言天地交而萬物通否言天地不交而萬物不通何取於坎乎曰坎初六冬至九二小寒六四立春九五雨水上六驚蟄而泰當坎之九五水氣上行自坎為泰萬物通矣否者泰之反也坎降離升震伏兊見自離成兊而否當離之六五萬物不通矣為月當在坎為水之下錯文也坎坤體也坎中之乾二五也乾陽流於坤隂故月以速為退月體不明待日而明明者乾也橫渠曰日月之精互藏其宅是也乾言日月合其明者坎離互用也豫言日月不過者坎為月伏離為日日月會於北方也恆言日月得天者乾九四之五變離坎也小畜上九中孚六四歸妹六五月幾望者小畜四有伏坎巽有伏震月在東日在西望也中孚訟坎變震月在東亦望也歸妹六五月在東日在西亦望也然曰幾望者小畜中孚坎在四也歸妹六五爻在五坎在四若五則中矣是故日望月則月食月掩日則日食坎離之交勝也或曰坎水也離火也火麗乎水何也曰離非水則明無自而託坎非離則明無自而生故水聚則精聚精聚則神生今焚薪為炭枯枿成灰朽木夜明濕盡光暗血為走磷見於暮夜隂雨之時故曰離者麗也坎水盡則離亦無所麗矣水潛行伺隙而動故為盜太玄以水為盜隂陽家以玄武為盜玄武水也屯六五以五為冦盜用衆也蒙上九以二為冦盜用師也需九三以五為冦賁六四以三為冦解六三睽上九以四為冦冦用兵也兵戎也故需曰冦象曰戎夬九二動離有伏坎亦曰戎以有戎兵其實盜也坤衆為多坎陽卦其剛在中堅心也重坎者堅多心也曰其於木也者與木爻交也震巽為木堅多心松柏之類也為宫者復初九即乾初九甲子爻子者坎之位於律為黃鍾太蔟曰陽氣漸萌於黃宫為律者法度之始太蔟以水為法為凖水可動而動可止而止故為可為棟者水就濕避燥去髙取卑有棟之象為叢棘者其於木也為堅多心交離為棘離火鋭上而不可觸刺也堅多心之木而有刺棘屬也未濟坎自否巽變為狐坎隱伏巽不果虞翻以艮為狐干寶以坎為狐互發也天文以心為狐説卦以艮為黔喙猶天文以辰為尨説卦以震為龍聖人觀鳥獸之文又觀地之宜參考之也巽交坎離為蒺藜象與棘同巽為草木剛爻木也柔爻草也為桎梏者艮手震足交於坎木桎梏也桎足械也梏手械也坎有獄象故以桎梏言蒙坎自升巽以木爻變也並易傳新安朱氏曰荀九家有為宫為律為可為棟為叢棘為狐為蒺藜為桎梏本義離為火為日為電為中女為甲胄為戈兵其於人也為大腹為乾卦為鱉為蟹為螺為蚌為龜其於木也為科上稿庫節先生曰火內暗而外明故離陽在外火之用用外也水外暗而內明故坎陽在內水之用用內也火以性為主體次之水以體為主性次之並觀物外篇橫渠先生曰離為乾卦於木為科上稿附其燥一作躁也易説廣漢張氏曰離為南方故為火外明內晦故為日此明於陽者也在幽而明故為電此明於隂者也再索於坤而得之故為中女甲胄外堅所以象離之畫戈兵上鋭所以象火之性腹隂而有容坤為腹而離得坤在中故為大腹暵其萬物故為乾卦鱉無耳而併精於目如離之明蟹用心之躁如離之性也螺上鋭而有所麗其象離之形乎蚌內隂而産珠其象離之中虛乎至於龜則於人為靈於己則昧此外明內晦也火剋木而稿故為科上稿易説白雲郭氏曰離麗也火日電皆麗物而明者也坎陽為水而離隂為火者陽卦多隂隂卦多陽故也坎艮不言中男少男離兊言中女少女者互見也甲胄戈兵剛在外也甲胄自衛戈兵以外向也於人為大腹虛中之隂也乾卦燥也鱉蟹螺蚌龜介物也介物甲胄類也孔氏云科空也科木上稿隂中而無實也易説漢上朱氏曰一隂麗乎二陽也乾離同體離巽為風故天與火同風自火出乾位六爻坎離互用故以水火言之若大有賁革鼎既濟未濟舉大凡也故皆曰火離九四旅九三離火巽木故曰焚或曰何以隂麗陽乎曰束藴而吹煙氣鬱然及其外明煙即是火火動而薪止火滅而燼留非隂麗陽乎然坎離不相離也坎中有離故有溫泉有火井離中有坎故有火鼠有火龜離在地為火在天為日乾體也其中畫乃坤之二五橫渠所謂隂陽之精互藏其宅歟行遲者隂麗乎陽也晉曰晝者日出地上進而中也豐曰宜日中者九四之五也離九三豐彖曰日昊者日中而又西也乾九三既濟曰終日者日在下也豫六二曰不終日者二動之五成離日在上也夬九二曰暮夜者動成離日在西方之下日薄于虞淵之時也或曰夕日入為夕大畜曰日新者大壯一變需坎月離日合照也再變大畜艮終復始日新也益曰日進者初九又為大明者懸象著明莫大於日月受明於日陽為大隂為小故曰大明又為明者日月相推而生明也孟子曰日月有明容光必照管輅曰日中為光易凡言光者皆明之所及也坤之化光者含坎離也觀之觀光者四五交也頤之光者四施初也夬之光者離自下升也未濟之光者二五易也需光亨者大壯四之五日西月東四五得位也凡言未光者皆未能行也屯九五未之二也噬嗑九四之六五而後光也晉上九反三自治而後光也夬九五中行上決而後光也萃九五之二而後光也凡言光明者兼體用也老子曰用其光復歸於明體用合一光明無盡也凡言光大者其象與光明同曰大者指陽爻也言光輝者日月之光揮散也言暉者主離日也電陽光雷陽聲陽自子息而至春分四陽成大壯雷乃發聲後五日始電隂自午消而至秋分四隂成觀雷乃收聲電亦不作震動也不動則聲光何由而發子雲曰觀雷觀火為盈為實天收其聲地藏其熱盈實者陽息也震與兊交離與坎交故雷電而降雨為中女為甲胄者離外實中虛有甲之象在上為胄在下為甲先儒謂巽為繩繕甲也為戈兵者乾為金離火煆之火鋭二戈兵也兵有五言兵則五兵具矣同人解夬萃曰戎者戎兵戎器也噬嗑旅言矢乾金火煆鋭上為鏃巽木為幹加於坎弓之上矢也旅巽言斧者兊為決斷也歸妹言刲者交兊金為刀兵也小過言戕者外殺也謙既濟未濟言伐者自上伐下入其險阻也謙又言侵伐者侵削其地而後伐也為大腹者坤為腹有容也坤二五易乾成離陽為大故為大腹內虛外堅實大腹之象離燥故為乾卦於日為烜於木為稿漸初六艮動成離之二坎水之傍乾而可止崖也崖謂之干震其究為乾故曰其究為健巽其究為震故曰其究為躁卦卦變也觀此二卦則知乾坤坎離艮兊其究皆變乾健獨不言卦者無非乾也為鱉為蟹為螺為蚌為龜五者皆大腹離也為鱉者離交巽也巽位已已為地故蛇或化鱉蛇鳴而鱉應為蟹者巽交離也蟹連兩目重離也託於蛇鱓之穴亦巽也鱉蟹其中皆黃坤之二五乎為螺者兑交離也鮒螺生於池澤蝸生於暑雨螺生於月旋震六二旅六二九四巽上九兊九四噬嗑六二變皆兊交離也為蚌者離交坎也千嵗之燕為蛤雀為蛤伏翼為蛤雉為蜃雕為蠣方諸泣月蚌胎含珠離坎也為龜者坎交離也北方玄枵之次為龜蛇故龜遊山澤出入水火含神負智得坎離之正乎頤損益三卦皆然其於木也為科上稿康節論木曰枝幹土石也故歲不易葉花水火也故嵗易橫渠曰離為乾卦其於木也為科上稿附而燥也然則橫渠所謂附而燥即康節所謂葉花也鄭康成曰科上者隂在內為疾虞翻曰巽蟲食心故上稿宋衷孔穎達以科為空中然則諸儒又以科上蟲病為稿矣為牧牛者坤為牛艮為小子艮坤變離牧牛也謙初六變九是已坤變離柔麗中正畜之以剛二畜牛也離六二六五是已牧者以柔養剛畜者以剛制柔王洙本作牝牛並易傳新安朱氏曰荀九家有為牝牛本義艮為山為徑路為小石為門闕為果蓏為閽寺為指為狗為鼠為黔喙之屬其於木也為堅多節橫渠先生曰艮為小石堅難入也為徑路通或一作且寡也易説廣漢張氏曰艮之一陽上而止其所故為山也徑小也路大也萬物自此而入故小自此而出故大故為徑路而又為小石也蓋石之小者有可轉之理乃能動能靜者乎一陽在上而往來出入莫不由於斯者此門闕也果者一陽在上之象也蓏者一陽在下之象也閽人譏其出入而為之啓閽寺人相道出入之事而糾之閽人掌其竒服怪民不入此司外者也寺人掌內宫之戒令此司內者也為指乃四支之止亦指其出入者也為狗止而能止人者也為鼠隂而止其所者也狗陽而能止其所者乎黔黑色之潛者而艮為東北喙吐納出入其又止於上者也堅則在內則此為堅多節者歟易説白雲郭氏曰震自坤變故為大塗艮其小者則為徑路艮大為山其小亦為石山與小石如坎水溝瀆之義門闕閽寺性之止也果蓏亦乾之餘陽也指亦手也陽過而在上無中下之剛是以陽卦之中獨艮不言馬其剛在上所用益小故於獸畜之類無行健之功徒有噬囓之象狗鼠黔喙之屬皆是也震之剛動於下故言足坎之剛動於中故言心艮之剛動於上故言喙皆因所索而言也且坎之為隱伏也在賢者為隱在小人為盜艮之為利則為狗為害斯為鼠皆一義而二象也堅多節者剛不中也中則為心不中則為節心則利用節不利於用二卦之辨也易説漢上朱氏曰艮積於下止於上二隂含陽土石聚焉蒙賁剝大畜咸遁蹇漸旅皆曰山以三畫卦言也為丘為陵為陸者以重卦言也髙平曰陸大陸曰阜大阜曰陵而丘有一成再成三成如昆侖亦曰丘故重艮以三為陸四為陵五為丘上為山太玄九地七為下山八為中山九為上山準易也五行以艮為土太玄以山為金者山土石也石者土之實故為土石金類也故又為金震為大塗動而行莫之止也交艮為徑路止而行行而止也艮者震之反山徑之蹊則行者改步矣又為巷者通乎家以逹內外二為家山土石也水流山則土去而石見故艮坎為石為小石豫六二以四為石是也困六二否艮交坎故困于石漸六二曰磐者二五相易坎變巽艮艮為石也闢乾為門闔坤為户艮土東北當啓閉之際門闕也艮為宗廟者六也一六坎也坎者鬼之所歸大玄以一六為廟故艮為門闕在宗廟之位為廟萃震渙損是也為宫者止於中也太一出陽入隂息於中宫坎艮坤為宫在旅為次在野為廬又為牖者宫之户坎其傍以通明也故艮坤坎離為牖巽為草木艮陽止也止於上為果止於下為蓏蓏瓜瓠之屬乾為圜為閽寺者閽守門者也寺守巷者也郭璞筮遇豫之小過曰當有羣魚入州城寺舍言小過艮也艮為手又為指者在上體為手指止者動也在下體為足指動者止也震動艮止相反也為狗上言艮為狗者狗馬之狗也此言為狗者熊虎子字當作豿爾雅曰熊虎醜其子狗蓋虎子未有文猶狗也虞翻馬融郭璞以兊艮為虎艮者寅位也艮究成兊故艮為虎子又為黔喙之屬成兊則坤交乾而有文矣為鼠者艮交坎也天文虛為鼠玉衡之星為鼠其艮之九三爻乎晉九四是也郭璞筮遇咸之井曰東方當有蟹鼠為災亦艮坎也坎虛在子故子為鼠晝止者艮也夜動者坎也穴土者艮也隱伏而竊者坎也為黔喙之屬者坎為玄坎變艮則玄在前故鄭康成曰取其為山獸寅為虎貍亦是也寅即艮也屯六三艮震為鹿角者艮之陽蹄者震之陽躁者震也止而伏者艮也隂生而鹿角解震反巽也陽生而塵角解巽反震也塵鹿類也故塵與鹿遊龍震也故鹿與龍遊劉牧曰鹿性決躁其角反生震象也頤九四革九五兊艮為虎上六為豹解九二未濟艮坎為狐或曰艮兊一也革上六何以為豹曰上六隂爻離九三文之過也天文箕為豹尾為虎同在艮履何取於艮乎曰伏艮也其於木也為堅多節者坤為衆多堅節乾剛也三索故多節否九五堅多節之木在田上上玄下黃桑也郭璞筮遇家人之蒙巽變艮為髙松松堅多節也為鼻者傳曰鼻者面之山兊為口山澤通氣故鼻口相為用通鳥獸言之艮之陽也故為虎為狐並易傳新安朱氏曰荀九家有為鼻為虎為狐本義兊為澤為少女為巫為口舌為毁折為附決其於地也為剛鹵為妾為羊橫渠先生曰兊為附決內實則外附必決也為毁折物成則止柔者必決也易説廣漢張氏曰澤能畜水而説物於枯悴之時故兊為澤三索於坤而得之故為少女為巫以言語而説神而又以説人者也為口舌以言而説人以食而説已兊正秋故毁折異乎震之蕃鮮也震為決躁以其剛陽至於兊則不能決物附於人而決之耳剛鹵者色白外柔而內剛者也為妾隂之不正而説於人者乎羊者外説而狠者乎易説白雲郭氏曰兊藪澤之象亦為天澤雨有潤澤之功故雨亦名澤别而言之雨其物也澤其功也故坎與兊義不同也唯言其功故凡可以澤物者皆為兊又不止雨之為澤而已八卦之中三索而成者皆動於上也以陽動者艮也以隂動者兊也陽動則有口之義而未見其象隂動則卦具口象於上故直言其為口舌也巫之通神以口舌而致精誠也古之巫與今之巫異古之巫誠人也今之巫妄人也誠故可用以通神妄非聖人之所用也口舌之用非辨論是非毁譽而已或附或決或用以毁折也附猶誓命使天下之比附決猶號令之決小人毁折猶噬嗑之用獄除間以去天下之害則口舌之用大矣非小人之所謂口古頰舌之間而已是以天下説之也陽在下為剛隂在上為鹵蓋亦藪澤之象妾為女道之下者也兊雖二剛在下而卦以上之一隂為主故無良馬行健之功而有羝羊羸角之患也附決之意與詩之疏附同易説漢上朱氏曰澤者水之聚二陽沈於下一隂見於上乾陽為美陽沈於下鍾美矣太玄之沈曰隂懷於陽陽懷於隂志在玄宫然坎兊一也故坎壅成澤澤決成川為少女為巫者兊變巽兊為口尚口而巽進且退者巫也巽九二是也或為史升或為史降而為巫尚口則一也為口者説見於外也為舌者動於內也口為言太玄四八為金於五事為言為辭者言成文也乾三動成兊離是也為毁折者隂見則陽毁隂升則陽折物極而窮噬嗑六二上九為滅離九四為棄毁也豐大象九三離上九之五鼎四之初為折為附者兊反艮也為決者兊也隂盛陽微則陽附隂陽盛隂微則陽決隂剝一陽五隂故曰山附於地夬一隂五陽故曰剛決柔也或附或決時也其於地也為剛鹵者水動而性剛留於澤為鹵剛而柔為沙需之九二是也水畜於澤下為鹹鹹無水亦為鹵困之大象是也為妾者遁九三兊女伏於下與艮同位艮小子坤為臣臣僕也故以伏兊為妾六四兊來奔初為妾自初言之得妾也傳曰聘則為妻奔則為妾巽離女也兊獨為妾者娶論年德而得妾者以其子故常少為羊鄭康成本作陽虞翻本作羔今從鄭鄭曰此陽謂為養無家女行賃炊爨今時有之賤於妾也案爾雅陽子也郭璞引魯詩曰陽如之何又曰今巴濮之人自呼阿陽璞筮過咸之漸曰兊為賤女戲倒隂陽蓋咸兊變巽隂陽顚倒遁九三鼎初六之四爻位皆正咸漸之變爻位不正故為賤妾陽妾之賤者也歸妹六三兊女不正為須須賤女陽之象乎為常先儒謂西方之神誤也當在坤後簡編錯亂耳且坤為常以隂從陽常也故坤順得常又曰後得主而有常屯六三二五相易十年乃字為反常需初九需于郊不犯難行須六四下交而後行師六四隂從陽當順九二知其不可變而反次皆曰未失常為輔頰乾艮為輔乾為首艮止於上輔也又為輔頰者連兊也而恱於首頰靣頰也並易傳新安朱氏曰荀九家有為常為輔頰本義右第十一章新安朱氏本義曰此章廣八卦之象其間多不可曉者求之於經亦不盡合也合訂刪補大易集義粹言卷七十九
