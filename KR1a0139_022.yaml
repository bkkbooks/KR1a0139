body:
  text: 合訂刪補大易集義粹言卷二十頭等侍衞納喇性德編坤下震上明道先生曰豫者備豫也逸豫也事豫故逸樂其義一也劉絢師訓伊川先生曰豫序卦有大而能謙必豫故受之以豫承二卦之義而為次也有既大而能謙則有豫樂也豫者安和恱樂之義為卦震上坤下順動之象動而和順是以豫也九四為動之主上下羣隂所共應也坤又承之以順是以動而上下順應故為和豫之義以二象言之雷出於地上陽始潛閉一作閉潛於地中及其動而出地奮發其聲通暢和豫故為豫也易傳豫利建侯行師伊川先生曰豫順而動也豫之義所利在於建侯行師夫建侯樹屏所以共安天下諸侯和順則萬一作兆民恱服兵師之興衆心和恱則順從而有功故恱豫之道利於建侯行師也又上動而下順諸侯從王師衆順令之象君萬邦聚大衆非和恱不能使之服從也易傳白雲郭氏曰馬氏王氏以豫為樂從釋詁也闗氏曰豫備也備豫則安逸也孔氏為逸豫或亦為說豫亦釋詁之義程氏言動而上下順應為和豫盖取彖義諸儒之說不同如此大率易之名卦兼備衆義固非一字可訓故豫得兼和說逸樂備豫為名而和說逸樂不可以一字盡豫之道也故伊川既曰和豫又曰逸豫為得之矣考之於卦獨无備豫之義而闗子明言之者盖因繫辭言重門擊柝以待暴客之意也且豫之為卦上動而下順惟動丕應徯志者也以此建侯則内无不服之人以此行師則外无逆命之敵周封同姓五十而不以為私順故也所謂利建侯也湯東西南北之征而天下不以為怨順故也所謂利行師也易說新安朱氏曰豫和樂也人心和樂以應其上也九四一陽上下應之其志得行又以坤遇震為順以動故其卦為豫而其占利以立君用師也本義東萊吕氏曰豫利建侯行師序卦曰有大而能謙必豫謂人處富貴榮顯之地須是得謙然後和豫夫當天下无事時則建侯有事之時則行師事之最大者若非和豫何以舉此易說又曰豫利建侯行師怠之病何自生己丑課程彖曰豫剛應而志行順以動豫豫順以動故天地如之而況建侯行師乎天地以順動故日月不過而四時不忒聖人以順動則刑罰清而民服豫之時義大矣哉伊川先生曰剛應謂四為羣隂所應剛得衆應也志行謂陽志上行動而上下順從其志得行也順以動豫震動而坤順為動而順理順理而動又為動而衆順所以豫也以豫順而動則天地如之而弗違況建侯行師豈有不順乎天地之道萬物之理唯至順而已大人所以先天後天而不違者亦順乎理而已天地以順動復詳言順動之道天地之運以其順動所以日月之度不過差四時之行不愆忒聖人以順動故經正而民興於善刑罰清簡而萬民服也既言豫順之道矣然其㫖味淵深言盡而意有餘也故復贊之云豫之時義大矣哉欲人研味其理優柔涵泳而識之也時義謂豫之時義諸卦之時與義用大者皆賛其大矣哉豫以下十一卦是也豫遯姤旅言時義坎睽蹇言時用頤大過解革言時各以其大者也並易傳横渠先生曰上動而下不順非建侯行師之利也易說藍田吕氏曰豫安逸无所事豫前定也事前定則安逸无所事其所以動必有所不得已不得已則莫非順也龜山楊氏曰屯者建侯之時豫者建侯行師之道一陽為順動之主而上下應之故其志行順以動合二體言之也此卦之所以為豫也動而不以順則上下不應而能志行致天下之豫未之有也既豫矣則順以動乃處豫之道也夫聖人應天下之用非外襲而取之也即諸體而已矣易說白雲郭氏曰三才一理也順之則易逆之則難行於一身尚不能違況有天下國家如建侯行師者乎故得其理而順動則豫雖天地於日月四時尚不能外此則人道固不能違也是以聖人刑罰清而民服所以為順也歟夫順坤道也貫通三才非止人事故論其時則建侯行師論其義則天地如之不亦大乎卦以九四為主言剛應而志行者羣隂應剛得行其志順動而已易說漢上朱氏曰豫謙之反謙九三反而之四四動羣隂應之其志上行以順理而動也我動彼應豈不豫乎豫和豫也休逸閒暇之謂也故曰豫剛應而志行順以動豫此以九四合坤震二體而言豫也謙九三在三公之位自二以上有師體反之則三升四四為諸侯三公出封之象故利建侯師動而往行師之象故利行師二者皆順以動周之大封湯武之征伐无非順民欲也順民欲則民說之說豫也豫順以動雖天地之大猶不能違故天地如其理而動而況建侯行師乎乾坤天地也坎有伏離日月也二至也天之動始於坎歴艮與震而左行地之動始於離歴坤與兊而右行是日月㑹於牽牛萬物成于艮故曰天地以順動故日月不過而四時不忒此以九四互體論坤震之義也坎為律刑罰也坤為衆民也艮止也聖人之動必順乎萬物之理法之所取必民之所欲也法之所去必民之所惡也故法律正於上刑罰清簡也衆止於下民服從也故曰聖人以順動則刑罰清而民服此以互體之坎變艮推廣坤震以盡豫之義也然意味淵長言之有不能盡故夫子贊之曰豫之時義大矣哉易傳曰豫遯垢言時義坎睽蹇言時用頤大過解革言時各以其大者也以卦氣言之春分也太𤣥凖之以樂或問互體之變有㡬曰體有六變春秋傳畢萬筮仕于晉遇屯之比辛廖占之曰震為土車從馬足居之兄長之母覆之衆歸之六體不易廖以震坤合而言六體也且以豫卦九四論之自四以上震也四以下艮也合上下視之坎也震有伏巽艮有伏兊坎有伏離六體也變而化之則无窮矣故曰雜物撰德其微顯闡幽之道乎易傳新安朱氏曰剛應而志行以卦體卦德釋卦名義豫順以動以卦德釋卦辭天地極言之而贊其大也本義建侯行師順動之大者立个國君非順動而何刑罰不清民不服只為舉動不順了致得民不服便是徒配了他亦不服豫之時義言豫之時底道理並語録東萊吕氏曰剛應而志行順以動豫此一卦五位是隂獨九四位是陽剛陽也今以一位之陽應五位之隂則志遂行非和易何以得此又天下之事須順理而動則豫如君子坦蕩蕩作德心逸日休此順動之謂也小人長戚戚作偽心勞日拙此不順動之謂也天地以順動則日月躔次四時代謝自然不過不忒況聖人乎天地以動順故日月不過天下雷行物與无妄則為无妄雷在地上則為豫天地之間只有一順字順即行其所无事豫之時義大矣哉此是大矣哉之最先者象曰雷出地奮豫先王以作樂崇德殷薦之上帝以配祖考濓溪先生曰古者聖王制禮法修教化三綱正九疇叙百姓大和萬物咸若乃作樂以宣八風之氣以平天下之情故樂聲澹而不傷和而不淫入其耳感其心莫不澹且和焉澹則欲心平和則躁心釋優柔平中德之盛也天下化中治之至也是謂道配天地古之極也後世禮法不修政刑苛紊縱欲敗度下民困苦謂古樂不足聽也代變新聲妖淫愁怨導欲増悲不能自止故有賊君棄父輕生敗倫不可禁者矣鳴呼樂者古以平心今以助欲古以宣化今以長怨不復古禮不變今樂而欲至治者逺矣通書伊川先生曰雷者陽氣奮發隂陽相薄而成聲也陽始潛閉地中及其動則出地奮震也始閉鬱及奮發則通暢和豫故為豫也坤順震發和順積中而發於聲樂之象也先王觀雷出地而奮和暢發於聲之象作聲樂以襃崇功德其殷盛至於薦之上帝推配之以祖考殷盛也禮有殷奠謂盛也薦上帝配祖考盛之至也易傳横渠先生曰王者之樂莫大於是易說龜山楊氏曰雷在地中則復而已雷出地故氣達而奮豫此聲樂之象也樂記曰鼓之以雷霆奮之以風雨而樂者天地之和也然先王之作樂非徒自豫而已所以崇德也如咸池大章之類皆是也得四海之歡心然後可以事上帝配祖考惟豫之時為然易説兼山郭氏曰雷出地盖帝出乎震之時於夏則仲春之二月於周則孟夏之四月也故先儒咸謂天子三年一郊盖言夏祠上帝於郊詩云昊天冇成命是也周官大司樂以圜鍾為宫靁鼓靁鼗孤竹之管雲和之琴瑟雲門之舞於地上之圜丘奏之圜鍾夾鍾也於夏時二月律也則雷出地奮豫而作樂崇德其在於斯時乎帝者生物之宗祖考者人之始也故推以配焉易說白雲郭氏曰先人曰雷出地盖帝出乎震之時於夏則仲春之二月於周則孟夏之四月也又曰大司樂以圜鍾為宫靁鼓靁鼗孤竹之管雲和之琴瑟雲門之舞於地上之圜丘奏之圜鍾夾鍾也夏時二月律也則雷出地奮豫而作樂崇德其在於斯時乎帝者生物之宗祖考者人之始也故推以配焉雍曰雷出地奮夏之二月天地萬物説豫之時也作樂崇德治定功成君臣萬民說豫之時也樂之出虚盖本隂陽之氣自无而生有故因器而成聲器可見者也聲可聞者也氣不作焉聲不聞矣雷之收發何以異此故隂陽者雷之氣也而雷者隂陽之聲也春秋者又雷之器也非鐘鼓則樂无作止非春秋則雷无收發以是知雷之與樂非特取象而成其實一氣同類特大而作於天地者曰雷小而作於人者曰樂此見先王法象乎天地之道也故祭義曰君子合諸天道春禘秋嘗此言夏商之時也又曰禘有樂而嘗无樂以見先王作樂之道因雷之收發其微如此盖春秋者天地之闔闢也一闢而雷奮於是乎作樂故能通隂陽之氣一闔而雷收於是乎不作樂以順隂陽之理此所以禘有樂而嘗无樂合於豫之作樂崇德也易説漢上朱氏曰雷之出地奮然而作萬物豫之時也九四具天地日月雷霆風雨萬物化生作樂起於冬至黄鍾之象郊也者天祭也在内外之際為郊坤為牛坎為血陽為德豫自復三變初九升四作樂崇德也殺牛於郊薦上帝也上帝乾在上之象殷盛也自四至上震變坤坤為衆故曰殷禮有殷奠殷祭言盛也五變比乾為考六變剥乾為祖以配祖考者報本反始也易傳新安朱氏曰雷出地奮和之至也先王作樂既象其聲又取其義殷盛也本義先王作樂如燕饗飲食之類無處不用然用樂之大者尤在於薦上帝配祖考也雷出地奮止是象其聲而已薦上帝配祖考大槩言之問作樂崇其德如大韶大武之類否先生曰然象其聲者謂雷取其義者謂和崇德謂著其德作樂所以發揚其德也問作樂崇德曰先王作樂其功德便自不可掩也並語録東萊吕氏曰地中先有雷然後能出而發聲胷中元无樂如何作樂夫雷本發於地則奮然而震驚此亦順動之象也故先王體此作樂夫樂者亦本諸人心發而寓諸金石鐘鼓之間今人須看雷之所自發處及樂之所自起處則豫之義可知不然則徒見震驚之聲則謂之雷論其清濁調其宫角則謂之樂此不足與語雷樂之義也上天下澤履此易之言禮雷出地奮豫此易之言樂大凡天下事不知其理不可便言其无有如柳子厚言樂不能殖財只為自不見此道理易說初六鳴豫凶象曰初六鳴豫志窮凶也伊川先生曰初六以隂柔居下四豫之主也而應之是不中正之小人處豫而為上所寵其志意滿極不勝其豫至發於聲音輕淺如是必至於凶也鳴發於聲也象云初六謂以其隂柔一无柔字處下而志意窮極不勝其豫至於鳴也必驕肆而致一作至凶矣並易傳横渠先生曰知㡬者上交不諂今得應於上豫獨著聞終凶之道也故凡豫之理莫若安其分動以義也易說藍田吕氏曰初六處豫之初不知所戒恃四志有所矜其聲宜逺聞者也恃交於外有矜大之志志窮必乖取凶之道龜山楊氏曰和順積中而形於外所樂者仁義之實而已夫豫豈可以聲音笑貌為哉四以一陽為豫之主而初以隂柔不中正應之則其鳴也是乃脅肩諂笑而已其凶不亦宜乎易說白雲郭氏曰初六之鳴如謙上六之鳴感其應而有求也上六之鳴盖鳴而求謙初六之鳴盖鳴而求豫豫而知戒尚或有失況知其説逸而鳴以求之乎且鳴而求謙者志猶未可得況鳴豫乎其志窮凶也宜矣夫履霜之始未堅冰也馴致其道則堅冰也鳴而求豫未至於凶馴致其道則凶矣聖人知㡬故欲早辯也志窮者窮其求豫之志則凶也易說漢上朱氏曰四者豫之主初六不中正而順從逸豫者也初四相易成震震為聲有相應而鳴之象從逸豫而發于聲音者也故鳴初六豫之始於其始也鳴豫至於末流則志窮而凶中為志謂四也初復動而之四則止而不行其志窮矣太康后羿之事乎易傳新安朱氏曰隂柔小人上有强援得時主事故不勝其豫而以自鳴凶之道也故其占如此卦之得名本為和樂然卦辭為衆樂之義爻辭除九四與卦同外皆為自樂所以有吉凶之異窮謂滿極本義東萊吕氏曰初六鳴豫凶一爻備極小人之情状小人一得意於上便志得意滿易傳言輕淺兩字最好易說六二介于石不終日貞吉象曰不終日貞吉以中正也明道先生曰介于石理素定也理素定故見㡬而作何俟終日哉劉絢師訓伊川先生曰逸豫之道放則失正故豫之諸爻多不得正才與時合也唯六二一爻處中正又无應為自守之象當豫之時獨能以中正自守可謂特立之操是以節介如石之堅也介于石其介如石也人之於豫樂心説之故遲遲遂至於躭戀不能已也二以中正自守其介如石其去之速不俟終日故貞正而吉也處豫不可安且久也久則溺矣如二可謂見㡬而作者也夫子因二之見㡬而極言知㡬之道曰知㡬其神乎君子上交不諂下交不瀆其知㡬乎㡬者動之微吉之先見者也君子見㡬而作不俟終日易曰介于石不終日貞吉介如石焉寧用終日斷可識矣君子知微知彰知柔知剛萬夫之望夫見事之㡬微者其神妙矣乎君子上交不至於諂下交不至於瀆者盖知㡬也不知㡬則至於過而不已交於上以恭巽故過則為諂交於下以和易故過則為瀆君子見於㡬微故不至於過也所謂㡬者始動之微也吉凶之端可先見而未著者也獨言吉者見之於先豈復至有凶也君子明哲見事之㡬微故能其介如石其守既堅則不惑而明見㡬而動豈俟終日也斷别也其判别可見矣微與彰柔與剛相對者也君子見微則知彰矣見柔則知剛矣知㡬如是衆所仰也故賛之曰萬夫之望能不終日而貞且吉者以有中正之德也中正故其守堅而能辯之蚤去之速爻言六二處豫之道為教之意深矣並易傳横渠先生曰不終日貞吉言疾正則吉也六二以隂居隂獨無累於四故其介如石雖體柔順以其在中而靜何俟終日必知㡬而正矣體順用中以隂居隂堅介如石故在理則悟為豫之吉莫甚焉不以說豫而流也易說藍田吕氏曰人道主交上交下交盡矣交不以中正者必流於諂瀆其取凶悔必矣何可以保其安佚而終吉乎六二以柔順而守中正知交際之道易此則不可先見之㡬不待久而後喻者也龜山楊氏曰六二柔順中正无應於上下故介于石言靜而正也夫一物不該非中也有所倚非正也豫者順動之時也極天下之大順其惟六二乎以中正故也唯中正為能㑹物於一己雖動之微其知之矣斯所以為知㡬其神乎易說兼山郭氏曰凡事豫則立不豫則廢言前定則不跲事前定則不困行前定則不疚道前定則不窮此言豫之有素也況六二柔順中正无上下之交介于石焉其為豫也至矣中正介于石可也若夫上交不諂下交不瀆非知㡬詎能之乎易說白雲郭氏曰繫辭曰㡬者動之微吉之先見者也又曰唯㡬也故能成天下之務是以聖人貴夫知㡬者以此豫之六二知㡬之君子也知逸豫之道必凶而後已故不為逸豫中正自居介如石焉守以貞固是以吉也觀其上交不諂是不與上為豫也下交不瀆是不與下為豫也上下无與應不得變其志故中正之道常存而貞固之守益堅非介如石之象乎終日則失於不能早辯不終日所以為知㡬也古之人行此道者其惟文王乎始於憂勤終於逸樂文王之治也至於不敢盤于遊田以庶邦惟正之供故能享國久長而得介于石之吉也明此道者其惟周公乎觀其作无逸以戒成王曰无淫于觀于逸于遊于田以萬民惟正之供故成王能持盈守成為太平之君子亦得介于石之吉也不然則盤遊无度太康尸位之逸豫也酗于酒德商王受之迷亂也故孔子曰知㡬其神矣乎惟文王周公其盡之易說漢上朱氏曰四艮為石初三不正二介于不正之間上交于三而不諂下交于初而不瀆確然如石不可轉也夫始交者安危之㡬不諂不瀆則不過乎中故曰介于石三為内卦之終二動離為日不終日也所謂㡬者始動之微吉之端可見而未著者也離日為見見之是以不俟終日而作作則動也豫之時上下逸豫失正諸爻之才多與時合二以中正自守不溺於豫可謂見㡬矣備豫之道也不俟終日而作以貞故吉貞者守正之謂也心不動則中正中也故見不中正也故見不正中正故知微知柔不罹於咎故曰介于石焉用終日易傳新安朱氏曰豫雖主樂然易以溺人溺則反而憂矣卦獨此爻中而得正是上下皆溺於豫而獨能以中正自守其介如石也其德安靜而堅確故其思慮明審不俟終日而見凡事之㡬微也大學曰安而后能慮慮而后能得意正如此占者如是則正而吉矣本義介于石言兩石相摩擊而出火之意言介然之頃不待終日而便見得此道理語録廣漢張氏曰或問君子上交不諂下交不瀆何以謂之知㡬其神乎荅曰交際易於因循上交主於恭過其則斯為諂下交主於和過其則斯為瀆能持而不失非知㡬其能之乎聖人論介于石之義而獨以上下交之事為言惟篤實為己者知其為甚切要也南軒集荅口子約東萊吕氏曰六二介于石處豫樂之中不有其豫樂故能見㡬而作人多在順中壊了惟六二便能覺象言以中正也盖豫得中正則不為豫樂所移易説六三盱豫悔遲有悔象曰盱豫有悔位不當也伊川先生曰六三隂而居陽不中不正之人也以不中正而處豫動皆有悔盱上視也上瞻望於四則以不中正不為四所取故有悔也四豫之主與之切近苟遲遲而不前則見棄絶亦有悔也盖處身不正進退皆有悔吝當如之何在正身而已君子處己有道以禮制心雖處豫時不失中正故无悔也自處不當失中正也是以進退有悔並易傳藍田呂氏曰六三以隂居陽迫近九四位既不當德亦无常進退久速皆未得其所安以斯求豫宜有悔也龜山楊氏曰盱上視也盱豫求豫於上也處非中正故盱則失義遲則失時皆不免於悔也與六二介于石不終日異矣易說白雲郭氏曰處豫之道戒在於不能自立而優柔无斷是以馴致必至於凶故六二以介如石為得而六三以盱遲有失也夫睢盱視上而說之非介如石者也遲遲疑而有待非不終日者也視而恱之者失於不立遲疑有待者失於無斷與夫鳴而求之者過猶不及耳宜其皆為有悔之道欲无悔者无它道焉介然不動以守之斷然不疑以行之惟此見六二之貞可謂能知能行者也孔子之不惑顔子之弗失孟子之不動心亦皆六二介于石之道歟易說漢上朱氏曰三四處位不當同而不和者也睢盱上視而不正也向秀曰小人喜恱佞媚之貌四豫之主三以柔順承之動成巽巽為多白眼睢盱上視佞媚以求豫而四不動則悔其動故盱豫悔三不能去且靜而待之四又不動故遲有悔悔其不動四艮體止於上三動巽為進退故動靜皆有悔三猶豫如是无他位不當也小人恱於豫寧悔而終不以所處為不當而去之柔不正故也易傳新安朱氏曰盱上視也隂不中正而近於四四為卦主故六三上視於四而下溺於豫宜有悔者也故其象如此而其占為事當速悔若悔之遲則必有悔也本義盱豫悔言覻著九四之豫便當速悔遲時便有悔盱豫是句語録九四由豫大有得勿疑朋盍簪象曰由豫大有得志大行也伊川先生曰豫之所以為豫者由一无由字九四也為動之主動而衆隂說順為豫之義四大臣之位六五之君順從之以陽剛而任上之事豫之所由也故云由豫大有得言得大行其志以致天下之豫也勿疑朋盍簪四居大臣之位承柔弱之君而當天下之任危疑之地也獨當上之倚任而下无同德之助所以疑也惟當盡其至誠勿有疑慮則一有其字朋類自當合聚夫欲上下之信惟至誠而已苟盡其至誠則何患乎其一无乎字一旡其字无助也簪聚也簪之名簪取聚髪也或曰卦惟一陽安得同德之助曰居上位而至誠求助理必得之姤之九五曰有隕自天是也四以陽剛迫一作逼近君位而專主乎豫聖人宜為之戒而不然者豫和順之道也由和順之道不失為臣之正也如此而專主於豫乃是任天下之事而致時於豫者也故惟戒以至誠勿疑由己而致天下於樂豫故為大有得謂其志得大行也並易傳龜山楊氏曰四以一陽為順動之主剛應而志行天下由之而豫也故大有得也處多懼之地承柔弱之君而任天下之責危疑之時也惟至誠為能通天下之志至誠而不動者未之有也故曰勿疑朋盍簪言誠而不疑則其類自合矣簪髪之簪則其合也固矣方成王幼沖周公為冡宰百官總己而聽焉上則成王未悟下則羣叔流言危疑之甚也惟周公以身任之而不疑故民獻有十夫予翼此朋盍簪之謂也使周公懐自疑之心畏艱大之言以考翼不可征則亂无日矣其能成寕考之圖功哉易說兼山郭氏曰九四順以動豫而一陽以總之上无剛健之君下无分民之臣是以為由豫也然而功震主者身必危能无疑乎惟在豫之時有陽勝之德故可以總衆志以安上也盖道足乎己時有所當然則其志得行不然桓文之舉未免為三王之罪人也易說白雲郭氏曰九四以一陽而總衆隂為豫之主以順動自任者方是時上无剛健之君則衆隂不得不由之以豫也由之以豫則天下少安所以大有得也然處由豫之道在於信立而勿疑勿疑故朋盍明盍則總衆智力以安上其序如此也昔齊晉之霸也歸魯三敗之地示原三日之圍可謂信立矣㑹于葵丘㑹于踐土可謂朋盍矣總諸侯以尊王室非安上乎此雖霸者之事然孔子嘗曰微管仲吾其被髪左衽矣盖孔子之意以為雖非三王之舉豈不愈於委而棄之夷狄也哉是所以由豫之為大有得也伊川曰簪聚也簪之名取聚髪也易說漢上朱氏曰四為豫之主五隂順從由己以致豫故曰大有得然不免於疑者在近君危疑之地无同徳之助衆隂不從五而從己也疑謂伏巽巽為不果坎見巽伏故勿疑盍合也五交四也言積誠不已下情通於上也坎為髪為通四剛在上下衆柔之際交而通之猶簪也髪非簪則散亂不理安有髪之柔順而不從簪乎夫朋歸己而致疑於五者有二招權也專功也下情通於上上下既交以誠何疑於招權不有其功歸美于上其中洞然何疑於專功四五相易伏巽象毁則四剛中之志上行率天下而從五何疑於朋之衆乎五不疑四四不疑五君臣上下各守其正為由豫也大矣先儒以坎為髪何也曰以巽為寡髪而知也乾為首柔其毛也故須象亦然易傳新安朱氏曰九四卦之所由以為豫者也故其象如此而其占為大有得然又當至誠不疑則朋類合而從之矣故又因而戒之簪聚也又速也本義問豫卦初六與九四為應九四由豫大有得本亦自好但初六恃有强援不勝其豫至於自鳴所以凶否先生曰九四自好自是初六自不好怎奈他何由豫猶言由頤並語録東萊吕氏曰四是大臣之位又多懼之地也今人處多懼之地一向就危疑上猜防自為疑阻惟由豫之道但推誠於上下不復自為疑阻所以大有得而志大行周公當攝政之際外則四國流言内則王不知周公只是推誠而已不惟大臣如此而朋友之道亦只是推誠相與自然勿疑而朋盍簪易說六五貞疾恒不死象曰六五貞疾乘剛也恒不死中未亡也伊川先生曰六五以隂一无隂字柔居君位當豫之時沈溺於豫不能自立者也權之所主衆之所歸皆在於四四之陽剛得衆非耽惑柔弱之君所能制也乃柔弱不能自立之君受制於專權之臣也居得君位貞也受制於下有疾苦也五居尊位權雖失而位未亡故云貞疾恒不死言貞而有疾常疾而不死如漢魏末世之君也人君致危亡之道非一而以豫為多在四不言失正而於五乃見其強逼者四本无失故於四言大臣任天下之事之義於五則言柔弱居尊不能自立威權去己之義各據爻以取義故不同也若五不失君道而四主於豫乃是任得其人安享其功如太甲成王也蒙亦以一无以字隂居尊位二以陽為蒙之主然彼吉而此疾者時不同也童蒙而資之於人宜也耽豫而失之於人危亡之道也故蒙相應則倚任者豫相逼則失權者也又上下之心專歸於四也貞而疾由乘剛為剛所逼也恒不死中之尊位未亡也並易傳藍田吕氏曰九四以一陽為五隂之主六五柔居其上處至尊以臨之有位號而无勢者也居安豫之時有位號而无勢不可以令天下矣如人之有疾常久而不死者猶有中氣存焉然不足頼也龜山楊氏曰居豫之時无剛健之才逸於豫者也孟子曰入則无法家拂士出則无敵國外患者國恒亡六五之乘剛有法家拂士敵國外患之謂也左右正救之故以正為疾雖未能執其中而中未亡也則不死於安樂矣故常不死易說兼山郭氏曰六五謙輕而豫怠也怠則失其柄也久矣然而入則无法家拂士出則无敵國外患者國恒亡六五非能固存其不亡也僅矣乘剛疾也九四亦震體順動之臣也易説白雲郭氏曰伊川曰居得君位貞也受制於四有疾也五居尊位權雖失而位未亡故云貞疾恒不死雍曰九四以一剛為豫之主六五不能正為君之道求其所以然盖失於好逸不知文王周公之戒馴致於君弱臣强而不能振也其猶平王東遷下堂而見諸侯之時乎君德微矣雖僅能守其位譬夫人之老也血氣既衰疾亦甚矣僅得常不死而已中未亡者終亡之象已見特其中未盡亡而已易說漢上朱氏曰四以剛動為豫之主衆之所歸權之所主也五以柔弱沈㝠於逸豫而乘其上豈能制四哉六五受制於四而不可動亦不復安豫矣故此爻獨不言豫不可動則於正為有害故曰貞疾恒震巽也天地可久之道也六五動則有震巽恒久之象人君中正然後六二為之用九四同德也何乘剛之有五不可動以失正也故九四為腹心之疾然主祭祀守位號而猶存者正雖亡而中未亡也中者人心也中盡亡則滅矣故曰貞疾恒不死言貞雖有疾其中固在能動以正則可久矣恒未嘗死也坤為死震為反生未亡之象周室東遷齊晉二伯托公義以令諸侯中未亡也失天下者多矣必曰豫者威權之失必自逸豫也諛臣進女謁行大臣專主威則社稷移矣易傳曰若五不失君道而四主於豫乃任得其人安享其功如太甲成王也易傳新安朱氏曰當豫之時以柔居尊沈溺於豫又乘九四之剛衆不附而處勢危故為貞疾之象然以其得中故又為恒不死之象即象而觀占在其中矣本義東萊吕氏曰六五貞疾恒不死傳曰人君致危亡之道非一而以豫為多若以豫自處則權必移於下既逸豫雖云久不死亦終於亡而已如人氣血耗散而膚革僅存亦終於死而已九四一爻在九四觀之則為大臣在六五觀之則為權臣故逐爻取義不同易說又曰觀豫六五之象然後知上无耽樂之君則下无擅權之臣己丑課程上六㝠豫成有渝无咎象曰㝠豫在上何可長也伊川先生曰上六隂柔非有中正之德以隂居上不正也而當豫極之時以君子居斯時亦當戒懼況隂柔乎乃耽肆於豫昏迷不知反者也在豫之終故為昬冥已成也若能有渝變則可以无咎矣在豫之終有變之義人之失苟能自變皆可以无咎故冥雖己成能變則善也聖人發此義所以勸遷善也故更不言㝠之凶專言渝之无咎昬冥於豫至於終極災咎行及矣其可長然乎當速渝也並易傳龜山楊氏曰豫之終沈冥於豫者也故冥豫成然居動之極有變之象焉故曰有渝无咎然君子與為善故不言㝠豫之凶而專言有渝之无咎也易說兼山郭氏曰上六豫之極也然豫有二義猶所謂一極備凶一極无凶者也如利建侯行師順以動豫豫順以動重門擊柝以待暴客无凶者也若㝠豫在上而不知變惟康好逸豫乃盤遊无度備凶者也是以五子咸怨述大禹之戒以作歌則有窮后羿因民弗忍距於河者有以致之焉爾而孔子之辭戒之在逸而不及其備者豈聖人之情見於辭者乎易說白雲郭氏曰上六豫極之時冥昧耽樂迷不知反豫之凶將成矣或有變焉亦且无咎盖豫雖必至於凶而上六知變之位聖人貴其能變故不言冥之凶而言渝之无咎也且於初六之鳴未凶而言凶上六之㝠當凶而曰无咎何哉盖鳴於終者則未必凶鳴於初者馴至於終則其凶必矣㝠於終者變則无咎㝠於初者雖變亦有咎其凶又有甚於鳴矣故上六之㝠始勤而終怠者也非若鳴之怠於初也是以其為凶咎係乎初終而不與於鳴㝠之輕重也易說漢上朱氏曰上六豫之終沈㝠於豫成而不變者也坤為冥昧古之逸豫之人固有不恤名聲之醜性命之危而樂之者不知因佚樂之過變前之為乃善補過也何咎之有故曰成有渝无咎聖人發此義以勉夫困而學者焉上六動之三成巽巽為長四坎為可㝠豫在上而不變未有不反何可長也易傳新安朱氏曰以隂柔居豫極為昬𠖇於豫之象以其動體故又為其事雖成而能有渝之象戒占者如是則能補過而无咎所以廣遷善之門也本義東萊吕氏曰上六㝠豫今人當㝠豫之極便謂不可救藥不知一念才正即是好人易傳曰不言㝠成之凶而言有渝无咎聖人勸人遷善之意深矣易說合訂刪補大易集義粹言卷二十
