body:
  text: 乾隆五十年二月二十九日奉上諭四庫全書館進呈補刋通志堂經解一書朕閲成徳所作序文係康熈十二年計其時成徳年方幼穉何以即能淹通經術向即聞徐乾學有代成徳刋刻通志堂經解之事兹令軍機大臣詳查成徳出身本末乃知成徳於康熈十一年壬子科中式舉人十二年癸丑科中式進士年甫十六嵗徐乾學係壬子科順天鄉試副考官成徳由其取中夫明珠在康熈年間柄用有年勢燄熏灼招致一時名流如徐乾學等互相交結植黨營私是以伊子成徳年未弱冠夤縁得取科名自由闗節乃刋刻通志堂經解以見其學問淵博古稱皓首窮經雖在通儒非義理精熟畢生講貫者尚不能覃心闡揚發明先儒之精藴而成徳以幼年薄植即能廣搜博採集經學之大成有是理乎更可證為徐乾學所裒輯令成徳出名刋刻俾藉此市名邀譽為逢迎權要之具耳夫徐乾學成徳二人品行本無足取而是書薈萃諸家典贍賅博實足以表章六經朕不以人廢言故命館臣將版片之漫漶斷闕者補刋齊全訂正譌謬以臻完善嘉惠儒林但徐乾學之阿附權門成徳之濫竊文譽則不可不抉其隠微剖悉原委俾定論昭然以示天下後世著將此㫖録載書首欽此臣等謹案通志堂經解計一百三十八種今分載于四庫全書各類中兹蒙我皇上燭照其隠察其為徐乾學逢迎權要所為不出于成徳之手覈名實而祛詐偽實足以示萬古之大防業經遵㫖刋板冠于書首四庫全書繕本内自應一例恭録但各種既經分載無從弁首惟易類内合訂刪補大易集義粹言及禮類陳氏禮記集説補正二書原標成徳所編謹以欽奉諭㫖録冠于合訂刪補大易集義粹言之前俾作偽者不能遁隠無從售其植黨營私之術焉又原刋本標名作納蘭成徳而四庫全書據八旗通志作納喇性徳並謹附識於此
