body:
  text: 乾隆五十年二月二十九日奉上諭四庫全書館進呈補刋通志堂經解一書朕閲成德所作序文係康熙十二年計其時成德年方幼稚何以即能淹通經術向即聞徐乾學有代成德刋刻通志堂經解之事兹令軍機大臣詳查成德出身本末乃知成德於康熙十一年壬子科中式舉人十二年癸丑科中式進士年甫十六嵗徐乾學係壬子科順天鄉試副考官成德由其取中夫明珠在康熙年間柄用有年勢焰熏灼招致一時名流如徐乾學等互相交結植黨營私是以伊子成德年未弱冠夤緣得取科名自由關節乃刋刻通志堂經解以見其學問淵博古稱皓首窮經雖在通儒非義理精熟畢生講貫者尚不能覃心闡揚發明先儒之精藴而成德以幼年薄植即能廣搜博採集經學之大成有是理乎更可證為徐乾學所裒輯令成德出名刋刻俾藉此市名邀譽為逢迎權要之具耳夫徐乾學成德二人品行本無足取而是書薈萃諸家典贍賅博實足以表章六經朕不以人廢言故命館臣將版片之漫漶斷闕者補刋齊全訂正訛謬以臻完善嘉惠儒林但徐乾學之阿附權門成德之濫竊文譽則不可不抉其隱微剖悉原委俾定論昭然以示天下後世著將此旨録載書首欽此臣等謹案通志堂經解計一百三十八種今分載于四庫全書各類中兹蒙我皇上燭照其隱察其為徐乾學逢迎權要所為不出于成德之手核名實而祛詐偽實足以示萬古之大防業經遵旨刋板冠于書首四庫全書繕本內自應一例恭録但各種既經分載無從辨首惟易類內合訂刪補大易集義粹言及禮類陳氏禮記集説補正二書原標成德所編謹以欽奉諭旨録冠于合訂刪補大易集義粹言之前俾作偽者不能遁隱無從售其植黨營私之術焉又原刋本標名作納蘭成德而四庫全書據八旗通志作納喇性德並謹附識於此
