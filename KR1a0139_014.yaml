body:
  text: 合訂刪補大易集義粹言卷十二頭等侍衛納喇性德編坤下坎上伊川先生曰比序卦衆必有所比故受之以比比親輔也一作比輔比也一作比輔也人之類必相親輔然後能安故既有衆則必有所比比所以次師也為卦上坎下坤以二體言之水在地上物之相切比無間莫如水之在地上故為比也又衆爻皆隂獨五以陽剛居君位衆所親附而上亦親下故為比也易傳東萊吕氏曰師以二為主二將帥也以一陽而為衆隂之所聽命者也比以五為主以一陽而為衆隂之所親者也比所以次師者言衆雖聽命於將帥而心當親於君也紀聞比吉原筮元永貞無咎不寧方來後夫凶伊川先生曰比吉道也人相親比自為吉道故雜卦云比樂師憂人相親比必有其道苟非其道則有悔咎故必推原占決其可比者而比之筮為占決卜度非謂以蓍龜也所比得元永貞則無咎元謂有君長之道永謂可以常久貞謂得正道上之比下必有此三者下之從上必求此三者則無咎也人之不能自保其安寧方且來求親比得所比則能保其安當其不寧之時固宜汲汲以求比若獨立自恃求比之志不速而後則雖夫亦凶矣夫猶凶況柔弱者乎夫剛立之稱傳曰子南夫也又曰是謂我非夫凡生天地之間者未有不相親比而能自存者也雖剛強之至未有能獨立者也比之道由兩志相求兩志不相求則睽矣君懷撫其下下親輔一作附於上親戚朋友鄉黨皆然故當上下合意以相從苟無相求之意則離而凶矣大抵人情相求則合相持則睽相持相待莫先也人之相親固有道然而欲比之志不可緩也並易傳橫渠先生曰必原筮者慎所與也易説白雲郭氏曰伊川曰原筮者推原占決相比之道也非以蓍龜也上之比下必有元永貞之三者下之比上必求此三者則無咎矣又曰夫剛立之稱也傳曰子南夫也又曰我非夫剛立者猶凶況柔弱乎雍曰一陽之卦得位者師比而已得天位則為比得臣位則為師天下之吉莫吉於比故比直言吉治天下之衆莫急於貞故師先言貞帥師有君道而不得如是之大如是之久也故無元永之貞昔成湯之初征也東征西夷怨曰奚獨後豫所謂不寧方來而無後凶者矣易説五峰胡氏曰張良以兵法説它人皆不省及以説漢髙則常用其䇿良曰沛公殆天授故遂從不去原筮也其從沛公以復讎滅秦而濟世安民非以為亂也此仁人之心可久之道天下之正理得元永貞之義也故無咎若沛公之約法三章以收秦民馬援之擇君竇融之歸光武郭嘉之去袁紹皆原筮者也其相比莫非有善謀行常道守正理者故邴原告曹操曰原之所以自容於明公明公之所以待原者以能守訓典而不易也非剛中者不能如是不然以利相比如趙髙二世之君臣耳餘竇灌之朋友未有得無咎者也夫天下未定國家未立而身未安固宜汲汲求比若楚漢分爭之時君臣未定百姓未知所歸賢能未盡見用韓信彭越英布之徒不能乘此時舉賢恤民求上下之助以宰制山河保其大功及楚已滅天下歸漢乃舉兵叛逆自取滅亡後夫凶也況隗囂之徒才不逮數子方紛亂之際則坐談西伯及中原略定乃始舉兵圖大事者乎易外傳新安朱氏曰比親輔也九五以陽剛居上之中而得其正上下五隂比而從之以一人而撫萬邦以四海而仰一人之象故筮者得之則當為人所親輔然必再筮以自審有元善長永正固之德然後可以當衆之歸而無咎其未比而有所不安者亦將皆來歸之若又遲而後至則此交已固彼來已晚而得凶矣若欲比人則亦以是而反觀之耳本義東萊吕氏曰比吉相親比即是吉道歡欣交通安得不吉比吉大槩言比也原筮元永貞無咎此言獨立孤陋固是凶道然比而不推原卜度是有此三德之人苟始相親比不得其人則終不能免咎必有此三德然後與之比古人所以不肯輕以身比人蓋為此當看伊川説又曰不寧方來古人灼見天地之間無獨立之理故必皇皇汲汲往來親比如堯舜孜孜稽于衆舍己從人之類蓋謂天下非一人所為故必以天下之耳為耳以天下之目為目如學者亦當親師取友然後可後夫凶易之義大抵舉輕明重非不往親比特後往爾凶猶及之況孑然自足傲然獨立者乎易説原筮元永貞無咎原筮者察之之詳也元永貞者求之之備也將親比依附是人夫豈細事哉故必察之詳求之備然後無咎紀聞又曰比之原筮元永貞也同人之利君子貞也隨之元亨利貞也一也己丑課程彖曰比吉也比輔也下順從也原筮元永貞無咎以則中也不寧方來上下應也後夫凶其道窮也伊川先生曰比吉也比者吉之道也物相親比乃吉道也比輔也釋比之義比者相親輔也下順從也解卦所以為比也五以陽居尊位羣下順從以親輔之所以為比也推原筮一作占決相比之道得元永貞而後可以無咎所謂元永貞如五是也以陽剛居中正盡比道之善者也以陽剛當尊位為君德元也居中得正能永而貞也卦辭本泛言比道彖言元永貞者九五以剛處中正是也人之生不能保其安寧方且來求附比民不能自保故戴君以求寧君不能獨立故保民以為安不寧而來比者上下相應也以聖人之公言之固至誠求天下之比以安民也以後王之私言之不求下民之附則危亡至矣故上下之志必相應也在卦言之上下羣隂比於五五比其衆乃上下應也衆必相比而後能遂其生天地之間未有不相親比而能遂者也若相從之志不疾而後則不能成比雖夫亦凶矣無所親比困屈以致凶窮之道也並易傳藍田吕氏曰比有所附合也君子周而不比比者二人同附周則與衆合也比以一陽居中在上而五隂比之顯比者也顯比則周矣人道主交故比則吉原有所究筮有所占信不信之情必不可廋又有元永貞之德則不入於邪然後可與人比而無咎也龜山楊氏曰五以剛中得尊位居中履正衆隂在下而順承之有親輔之象卦之所以為比也故曰比吉也比輔也下順從也先王什伍其民鄉田同井使之出入相友守望相助疾病相扶持比之所以吉也政散民流用蕩析離居則凶可知矣此自然之理也原筮者占所比也元永貞者可比之道也原筮謂占決可否非龜筮之筮也與初筮之筮同蓋無長人之仁則雖比而不親無可久之德則雖比而必離無正固之守則雖比而不周上之比乎下與下之比乎上無是三者則小人之比耳能無咎乎故唯元永貞而後無咎盡此道者唯九五乎故曰以剛中也居比之時隂無正應不寧之象也而衆隂順承不寧方來之象也不寧方來以上下應而已蓋后非民罔使民非后罔事上下相求古今之同道也上不比乎下下不比乎上而能獨安者未之有也夫一陽在上衆隂在下而順從比之吉也而上六獨居其上而乘之無順從之義後夫者也婦以順從夫者也夫先而婦從父先而子從君先而臣從其義一也獨曰後夫者蓋有夫婦而後有父子有父子而後有君臣曰後夫者推本言之也夫且不可後況君親乎後君親則大亂之道凶不足言矣易説白雲郭氏曰伊川曰卦之辭泛言比道而彖言盡比道之善唯五而已民不能自保故戴君以求寧君不能獨立故保民以為安凡生於天地之間者未有不相親比而能自存者也又曰以聖人之公言之固至誠求天下之比以安民也以後王之私言之不求下民之附則危亡矣雍曰天下之吉生於順而凶生於逆下之順從天下無異意不寧方且來非吉乎後之凶無順意故也不寧方如初六六四是也後夫上六之不我比也上下應者上而六四下而初六非正應而來比也然易之道窮則變不知變則失易之道故乾有窮之災坤則其道窮況後夫乎聖人於道窮之際每致意焉者明易之道初無窮人自失之也易説漢上朱氏曰比吉者比而吉也凡物孤則危羣則強父子夫婦朋友未有孤危而不凶者人君為甚故比而吉謂九五也比輔也一陽在上四隂在下順從之比所以吉也故曰比吉也比輔也此合兩體言比也然比當慎不可以不與善不可以不長久不可以不正有是三者乃可以無咎以其當慎也故原筮以決其所從原再也如原蠶原廟之原比自復來一變師二變謙三變豫自謙至豫有艮手持震草占筮之象故曰原筮原筮則其慎至矣復初九始於震四變成比不離於貞元永貞也元君德也善之長也乾剛之始也蓋比道之難既原筮以審之其始也相比以善其終也永貞則無咎矣不然慮之不審其始比之不善或貞而不永豈能無咎原筮元永貞者九五也九五之剛乾元也故曰元位乎中正故永貞故曰以剛中也坎往則坤來坎勞卦不寧也坤為方不寧方來也比之時下雖比輔不敢自寧則上下相應多方來矣故曰不寧方來上下應也謙坤三四五爻先來比之上六獨安其位而不來欲來則已後不來則履險而逼道窮而不知變故凶上六之所以凶者後夫三爻也故曰後夫凶比道貴先故也易傳新安朱氏曰比吉也此三字疑衍文比輔也此以卦體釋卦名義原筮元永貞亦以卦體釋卦辭剛中謂五上下為五隂本義筮字説做占決亦不妨然亦不必説定不是龜筮之筮後夫只是説後來者古人亦曾説先夫當之也有喚作夫婦之夫砥後夫凶言九五既為衆隂所歸若後面更添一箇陽來則必凶古人如袁紹劉馥劉繇劉備之事可見兩雄不並棲之義問比卦後夫凶先生曰後夫不必如伊川説左傳齊崔卜娶妻卦云入于其宫不見其妻凶人以為凶他云前夫已當之矣彼云前夫則此云後夫正是一樣語陽便是夫隂便是婦比吉也也字羡當云比吉比輔也下順從也比輔也解比字下順從也解吉字並語録東萊吕氏曰下順從也九五以一陽在上羣隂順從以剛中也此指言相親比之狀剛而不中則失之暴便是偏既剛且中所以能具此三德上下應也君能親比上下皆相應初無彼此其道窮也人之一身能幾不能親比其道之窮也宜易説象曰地上有水比先王以建萬國親諸侯伊川先生曰夫物相親比而無間者莫如水在地上所以為比也先王觀比之象以建萬國親諸侯建立萬國所以比民也親撫諸侯所以比天下也易傳藍田吕氏曰地中有水則容畜而不散可以聨什伍而成軍地上有水則浸灌旁及可以交四鄰而修好龜山楊氏曰水在地上相比而不離先王觀比之象建國畫地而封之為之屬連使相親比則諸侯知尊君親上而天下從之矣易説兼山郭氏曰民之有君諸侯之有王非先王創治而有之皆出於自然之勢也蓋上下之分未立強弱之勢不齊於是大得以陵小衆得以暴寡日趣於亂亡而生生之理息矣必有強有德者出焉則大小之勢分衆寡之情一於是有小事大有大比小小大之情親率歸於大定者是先王封建之本也梁襄王問孟子曰天下惡乎定孟子對曰定于一一者王也方地上有水非澤之所鍾散而相親則各有所比先王以是建萬國而親諸侯王道之本也方比之五隂而一陽上有大中至正之道下無僣亂分民之臣蓋足以王矣自河圖洛書之相為經緯八卦九章之相為表裏文王得之以演周易孔子得之以述春秋故春秋二百四十二年之間有春有王正月蓋同出於此矣觀禹會諸侯於塗山執玉帛者萬國周成王時諸侯來朝助祭者千八百國春秋之時見於經者止百二十有四國其後離為十二合為六七卒并於秦方是時征伐四出轉以相滅原野厭人之肉川谷流人之血凡以天下無王故也故易之有比春秋之書王豈易言哉易説漢上朱氏曰地上有水相比而無間乾五王也四諸侯位坤土在上國也坤為衆萬國諸侯衆多也比師之反九二為五有先王建萬國親諸侯之象建萬國者衆建也建萬國則民比其國君親諸侯則國君比於天子封建自上古聖人至於三代不廢享國久長秦罷侯置守二世而亡此封建不可廢之驗也患封建不得其道耳得其道者建萬國是已夏承唐虞執玉帛者萬國成湯之時七千七百七十三國成周千八百國而夫子必曰建萬國者衆建諸侯而少其力也衆建則多助少其力則易制觀此則周官諸侯之制疑若非周公之意也易傳新安朱氏曰地上有水水比於地不容有間建國親諸侯亦先王所以比於天下而無間者也彖意人來比我此取我往比人本義伊川説建萬國以比民言民不可盡得而比故建諸侯使比民而天子所親者諸侯而已這便是它比天下之道語録東萊吕氏曰地上有水比見得比親切處浸潤滋灌流行未嘗相離先王建萬國親諸侯是人君比天下之綱目建萬國所以比民親撫諸侯所以比天下蓋君之於民豈能家至户到而比之惟撫諸侯使孚我德意於天下即是比天下也若只是以一人比天下則天下不可得而比矣易説初六有孚比之無咎有孚盈缶終來有它吉象曰比之初六有它吉也伊川先生曰初六比之始也相比之道以誠信為本中心不信而親人人誰與之故比之始必有孚誠乃無咎也孚信之在中也誠信充實於內若物之盈滿於缶中也缶質素之器言若缶之盈實其中外不加文飾則終能來有它吉也它非此也外也若誠實充於內物無不信豈用飾外以求比乎誠信中實雖它外皆當感而來從孚信比之本也言比之初六者比之道在乎始也始能有孚則終致有它之吉其始不誠終焉得吉上六之凶由無首也並易傳橫渠先生曰柔而無應能擇有信者親之已之誠素著顯終有它吉比好先也易説藍田吕氏曰初六前遇三隂莫適比也莫適比則無所私無所私則有信而已以信比之何往不可故以有孚比之無咎矣初位在下其為器也小苟充其所受而不餒亦足以感物而助之者自能至矣況充其大者乎龜山楊氏曰比之初原筮之時也故有孚比之乃無咎孚信之在中也孔子曰君子周而不比小人比而不周故比以忠信為主比而無孚小人之比也能無咎乎有孚比之比乎人者也有孚盈缶孚之在已也缶器之質者也盈缶則充實在其中不資外飾也故來有它吉夫居比之初人相求比之時也孚誠充實於中而後為人所比盈缶是也故能有它吉有孚而未至於盈缶則比乎人者也故無咎而已非比之初則不必有它而後吉故曰比之初六有它吉易説白雲郭氏曰廣大乎比天下之道見賢則比之不必有應而比也然有應而比者比之易二四是也逺而非應者比之難初六是也然逺而非應柔弱不能自達有待於人者也缶之為器有物盈之則有用也無以盈之虛器也是缶之有待於物猶初六之不能自用也初六以誠信之道自充於中所謂有孚盈缶矣何患其無用乎中孚曰鳴鶴在隂其子和之蓋誠信感人有必應之道故終使六二自內與之同比於五也雖非其應而比其道蓋益賢於求應者矣何咎之有它吉本非我有之吉因人而得之者也初六才位不足直以誠信得它吉也故比之道雖吉而比之始又以孚為先古之人因人得用者多矣惟誠信充於中者能終它吉不然吉未終而凶矣易説漢上朱氏曰初六不正未能信者也比道以信為本中心不信人誰親之以是比人宜有咎四與初本相應初動而正往比之則有孚信矣孚者信之應也春秋傳曰小信未孚故有孚比之無咎初六坤土坤為腹動之四成兌兌為口巽為繩土器有腹有口而繩引之坎水盈其中盈缶也缶所以汲質素之器誠之象水盈其中亦誠信充實而無間之象有孚之謂也比之有孚何咎之有故曰有孚盈缶初始也四終也初自四復位終來也四非正應謂之它子夏曰非應稱它初比之以誠信其終也來有它之吉矣若始比不以誠其能終有它乎故曰比之初六有它吉也陸績曰變而得正故吉是也易傳新安朱氏曰比之初貴乎有信則可以無咎矣若其充實則又有它吉也本義終來字似將來相似語録東萊吕氏曰初六以柔處初有順之理比之始以誠信為本至於盈缶無一毫虧損自然終來它吉象比之初六排一比字在初六上此見聖人筆法與作春秋解詩一同斡旋一字便見意全且如孟子舉孔子説詩天生蒸民只就中添一故字與一必字其理粲然甚明後世雖千百言而不足易説有孚盈缶滿腹皆誠己丑課程六二比之自內貞吉象曰比之自內不自失也伊川先生曰二與五為正應皆得中正以中正之道相比者也二處於內自內謂由已也擇才而用雖在乎上而以身許國必由於己已以得君道合而進乃得正而吉也以中正之道應上之求乃自內也不自失也汲汲以求比者非君子自重之道乃自失也守已中正之道以待上之求乃不自失也易之為戒嚴密二雖中正質柔體順故有貞吉自失之戒戒之自守以待上之求無乃涉後凶乎曰士之修已乃求上之道降志辱身非自重之道也故伊尹武侯救天下之心非不切必待禮至然後出也並易傳橫渠先生曰愛自親始人道之正故曰貞吉易説藍田吕氏曰比之時主比而不主應諸爻皆比二獨應五守貞性於內而不失者也廣平遊氏曰比之自內者非枉己以外求也上之人訪逮幽側至誠以相與然後出而應之故爻稱自內而象以為不自失也六二居中得正與九五為正應迹逺而志同位殊而德合故以自內言之若伊尹之在莘而湯聘加焉非自內以比邪尹負鼎干湯孰謂聖人乃不知比之自失乎易説龜山楊氏曰九五以中正在上而二以中正自內比之故正吉蓋居比之時上下相求而不以正則內不失己外必失人矣皆自失也故唯正吉而後無失易説白雲郭氏曰比以九五為主而六二正應為主於內蓋率天下而比五者故自內之外率天下以歸王也二之比初非欲親初也欲與之比五也終能同比於五是不失己道之貞吉也觀初六它吉六二自內之辭可明其義蒙之六三亦舍應親二矣而有不有躬之象蓋蒙與此異道而三與二異位義不同也故象言不自失以見非如蒙之不有躬也夏商之季天下諸侯相率以歸湯武或三千或八百國所謂六二貞吉初六它吉者衆矣易説漢上朱氏曰六二九五中正相比剛柔正而位當聖人猶曰比之自內者六二柔也恐其自失也二處乎內待上之求然後應之比之自內者也故貞吉正則吉也不能自重汲汲以求比動而自失其正道亦不可以行矣枉尺直尋未有能直人者也故曰比之自內不自失也易傳曰士之修已乃求上之道降志辱身非自重之道也故伊尹武侯救天下之心非不切必待禮至而後出也易傳五峰胡氏曰伊尹耕於有莘之野成湯三聘之然後起諸葛孔明躬耕南陽劉備三顧之然後見聘之在彼而起在我顧之在彼而見在我其尊德樂義之心著於禮貌之間然後就之故足與有為也不然則失身於人雖有規矩凖繩焉得而用之反為有勢者之所賤矣安得吉易外傳新安朱氏曰柔順中正上應九五自內比外而得其貞吉之道也占者如是則正而吉矣得正則不自失矣本義東萊吕氏曰六二比之自內伊川曰士之修已乃求上之道求非干祿之求也緣其質柔體順故有貞吉自失之戒易説六二比之自內貞吉或慕其利而比之或慕其名而比之或慕其勢而比之皆自外也紀聞六三比之匪人象曰比之匪人不亦傷乎伊川先生曰三不中正而所比皆不中正四隂柔而不中二存應而比初皆不中正匪人也比於匪人其失可知悔吝不假言也故可傷二之中正而謂之匪人隨時取義各不同也人之相比求安吉也乃比於匪人必將反得悔吝其亦可傷矣深戒失所比也並易傳橫渠先生曰履非其正比之必匪其人故可傷易説藍田吕氏曰六三居二隂之間所比皆不善也故曰匪人龜山楊氏曰承乘皆隂比之匪人也能無傷乎言傷則悔吝不足道也易説白雲郭氏曰六三不知比賢而比於上上非正應而有凶比非其人則自失其身矣是其所以可傷也易説漢上朱氏曰比之匪人與否之匪人同義子夏曰處非其位非人道也三四處中人位也人道相比以正六三柔而不正處非其位逺比於上六以非道而不應近比乎六四六二以不正而不受天地之間未有不相親比而有能自存者也比之而人莫與不亦可傷乎虞翻曰體剝傷象彌子瑕曰孔子主我衛卿可得也孔子曰有命魯桓公求會於衛至桃丘衛侯弗與之見求比而不得不亦可傷乎可傷則悔咎不必言也易傳五峰胡氏曰如齊王建所比之羣臣賔客反為秦用卒誤王建死於松柏之間不亦傷乎易外傳新安朱氏曰隂柔不中正承乘應皆隂所比皆非其人之象其占大凶不言可知本義問比之匪人一爻曰初應四四是外比於賢為比得其人二應五五為顯比之君亦為比得其人惟三乃應上上為比之元首者故為比之匪人也語録東萊吕氏曰六三比之匪人易傳曰三不中正而所比者皆不中正四應柔而不中二存應而比初皆不中正匪人也二之中正而謂之匪人隨時取義各不同也隨時取義之説最當詳考蓋二之中正本未嘗存應而比初但三以私心觀之故見其存應而比初矣君子所為本公苟以私心觀之則見其件件是私故雖與君子相處亦與小人相處無異矣二本君子以三之心觀之則小人也三既看得二為小人故與二相比未嘗得近君子之益反得近小人之損也此三之罪非二之咎也紀聞六四外比之貞吉象曰外比於賢以從上也伊川先生曰四與初不相應而五比之外比於五乃得貞正而吉也君臣相比正也相比相與宜也五剛陽中正賢也居尊位在上也親賢從上比之正也故為貞吉以六居四亦為得正之義又隂柔不中之人能比於剛明中正之賢乃得正而吉也又比賢從上必以正道則吉也數説相須其義始備外比謂從五也五剛明中正之賢又居君位四比之是比賢且從上所以吉也並易傳藍田吕氏曰六四獨比於五所比陽也雖獨有所附所附者賢守是不變亦可以獲吉龜山楊氏曰六四無應於內而外比九五比賢從上也九五剛中正賢也比賢從上而不以正人誰與之故正乃吉六四以隂居隂正也易説白雲郭氏曰四與初非正應故舍逺比近外比九五之賢亦自知才位非可兼人從上保身而已故得貞而吉比或自內或外比以明比道之大不可拘於常也易説漢上朱氏曰四以五為外內外相形而後有也六四當位不內比於初絶其係應外比於五守正不動則相比以誠矣故貞吉五以德言之剛健中正賢也以位言之君上也以正比賢以臣比君外比之所以吉歟易曰東北喪朋安貞吉六四之謂也易傳新安朱氏曰以柔居柔外比九五為得其正吉之道也占者如是則正而吉矣本義東萊吕氏曰六四外比之正吉四最近君遂比於君五剛明賢君故聖人以從上言之然當看伊川三段之説相須不可偏易説九五顯比王用三驅失前禽邑人不誡吉象曰顯比之吉位正中也舍逆取順失前禽也邑人不誡上使中也伊川先生曰五居君位處中得正盡比道之善者也人君比天下之道當顯明其比道而已如誠意以待物恕己以及人發政施仁使天下蒙其惠澤是人君親比天下之道也如是天下孰不親比於上若乃暴其小仁違道干譽欲以求下之比其道亦狹矣其能得天下之比乎故聖人以九五盡比道之正取三驅為喻曰王用三驅失前禽邑人不誡吉先王以四時之畋不可廢也故推其仁心為三驅之禮乃禮所謂天子不合圍也成湯祝網是其義也天子之畋圍合其三面前開一路使之可去不忍盡物好生之仁也止取其不用命者不出而反入者也禽獸前去者皆危矣故曰失前禽也王者顯明其比道天下自然來比來者撫之固不煦煦然求比於物若田之三驅禽之去者從而不追來者則取之也此王道之大所以其民皡皡而莫知為之者也邑人不誡吉言其至公不私無逺邇親疏之别也邑者居邑易中所言邑皆同王者所都諸侯國中也誡期約也待物之一不期誡於居邑如是則吉也聖人以大公無私治天下於顯比見之矣非唯人君比天下之道如此大率人之相比莫不然以臣於君言之竭其忠誠致其才力乃顯其比君之道也用之與否在君而已不可阿諛逢迎求其比已也在朋友亦然修身誠意以待之親已與否在人而已不可巧言令色曲從苟合以求人之比己也於鄉黨親戚於衆人莫不皆然三驅失前禽之義也顯比所以吉者以其所居之位得中正也處正中之地乃由正中之道也比以不偏為善故云正中凡言正中者其處正得中也比與隨是也言中正者得中與正也訟與需是也禮取不用命者乃是舍順取逆也順命而去者皆免矣比以向背而言謂去者為逆來者為順也故所失者前去之禽也言來者撫之去者不追也不期誡於親近上之使下中平不偏逺近如一也並易傳橫渠先生曰失前禽謂三面而驅意在緩逸之不務殺也順奔然後取之故被傷者少也以剛居中而顯明比道伐止有罪不為濫刑故邑人不誡為上用中此之謂也不比者不懲非用中也故比必顯之然殺不可務也一云上使中者付得其人也並易説藍田吕氏曰九五以一陽為衆隂之主從之者吉背之者凶顯比者也如三驅之法明示以舍逆取順之道也邑國中也天子之有天下諸侯之有四境其國中之民近我者也顯比之道不間於幽逺則近者必不誡也使用也上之所用以中無逺近之情不合也龜山楊氏曰居得尊位其比宜顯矣故制畿封國以為屬連建牧立監以相糾因時問以通好賀慶以展親所以比諸侯也域民之制其詳至於屬婦同井而居同巷相從任之以九職繫之以九兩所以比其民也凡此皆顯比之道也盡斯道者其唯九五乎居中履正而上下應之比之正也故曰顯比王用三驅失前禽邑人不誡吉夫獸窮則搏常物之大情也故王田不合圍三面而驅不窮物以盡取也先王比天下而安之非以求吾所大欲也故順則取之逆而去則舍之所失者前禽而已盡吾比道任彼而不致力焉用三驅之義也若湯之祝網是也窮民而盡取之乃召敵之道非所以比天下也孟子曰善戰者服上刑連諸侯者次之辟草萊任土地者次之為此而已夫如是故仕者願立於其朝耕者願耕於其野商賈願藏於其市行旅願出於其塗則邑人不誡而自至矣此比道之光也故曰邑所居之邑謂國中也易説兼山郭氏曰比坤下坎上坎水也坤土也土以水柔水以土流親比之故也洪範之敘曰五皇極皇建其有極其事則無偏無陂遵王之義無有作好遵王之道無有作惡遵王之路無偏無黨王道蕩蕩無黨無偏王道平平無反無側王道正直凡上之所以示下者如是也凡厥庶民無有淫朋人無有比德惟皇作極凡下之所以從上者如此也方顯比建大中之道明法度之尊逆者不追順者不拒無恤於去來無間於小大邑人之不誡特為其微者言之至於自西自東自南自北蓋有無思而不中者矣可勝言哉易説白雲郭氏曰先人曰洪範五皇極曰無偏無陂遵王之義無有作好遵王之道無有作惡遵王之路無偏無黨王道蕩蕩無黨無偏王道平平無反無側王道正直凡上之所以示下者如此也凡厥庶民無有淫朋人無有比德惟皇作極凡下之所以從上者如此也方顯比建大中之道逆者不追順者不拒無恤於去來無間於小大邑人之不誡特為其微者言之至於自西自東自南自北蓋有無思而不中者矣可勝言哉雍曰九五之君非以力假仁者也蓋有大中至正之道以昭示天下天下自從而比之故曰顯比王田不合圍三面而驅故所失者前禽而已是猶上六之不我比也夫以大中至正之道昭示天下無容私焉是以逆則舍之順則取之故上言不寧方來後夫凶皆自來自後之辭非聖人有以強之也聖人以大中至正舍逆取順必無侵伐之虞邑人又何誡焉是則顯比之吉為天下之至公也求其所以然實建大中以致之耳故曰上使中也書曰民心罔中惟爾之中其使中之謂乎由是知商之三千周之八百亦舍逆取順而已或謂顯比之道狹不亦異乎易説漢上朱氏曰九五比之主坎為明顯明比道者也故曰顯比五位乎正中比者因以比之不規規以求比於物比之以中正之道所以吉也故曰顯比之吉位正中也乾五為王自四至二歷三爻坤為輿為衆坎為輪田獵之象王用三驅也艮為黔喙坎為豕震為決躁內卦為後外卦為前嚮上為逆順下為順故曰失前禽也顯比之道譬之從禽王者之於田也三面驅之闕其一面逆而嚮我則舍之背而順我之射則取之舍之者明比也取之者明不比也所謂正中也施於征伐叛者伐之服者舍之故曰舍逆取順失前禽也坤在下為邑謂二也邑人者二乾也二之五艮見兌伏兌為口邑人不誡也王者之比天下無逺邇無內外無親疏不以邑人近則告誡而親之不以僻陋之國逺則不誡而疏之使人人以中道相比無適無莫則吉若顯比矣其道猶狹未吉也故曰邑人不誡上使中也或曰安知舍逆之為嚮我取順之為射取之曰觀其所殺而知也射者從禽左而射之由左達右詩曰公曰左之舍拔則獲故田有三殺自左膘達于右腢為上殺射右耳本為中殺射左髀達于右䯚為下殺面傷不獻翦毛不獻鄭康成曰禽在前來不逆而射之也去又不射也唯其走者順而射之王弼亦曰趣已則舍之背已而走則射之易傳王弼謂比九五為比之主而有應任二顯比者也比而顯之則所親者狹矣則以不變論易於初六言處比之首應不在一心無私吝則莫不比之故於九五應二則言其狹也天地之間隂必比陽未有無應而相比者初六不變則缶虛而不汲失有孚盈缶之象矣三驅之禮禽逆來趣已則舍之背已則射之顯比也雖有愛惡而愛惡出於彼之來去吾豈容心哉三苗逆命禹乃徂征不比也七旬來格舜則舍之顯其比也比之與否舜禹非私也用中之道也若曰顯比非大人之吉此可以為言所使使之者誰歟舜命禹征亦使之也叢説新安朱氏曰一陽居尊剛健中正卦之羣隂皆來比已顯其比而無私如天子不合圍開一面之網來者不拒去者不追故為用三驅失前禽而邑人不誡之象蓋雖私屬亦喻上意不相警備以求必得也凡此皆吉之道占者如是則吉也上使中由上之德使不偏也本義顯比便有那周遍底意思邑人不誡如有聞無聲言其自不消相告誡又如歸市者不止耕者不變相似比九五邑人不誡蓋上之人顯明其比道而不必人之從已而其私屬亦化之不相戒約而自然從已也田獵之禮置旃以為門刈草以為長圍田獵者自門驅而入禽獸向我而出者皆舍被驅而入者皆獲故以前禽比去者不追獲者譬來則取之大意如此並語録東萊吕氏曰九五伊川説最要熟看邑人不誡雖切近者亦不丁寧之象曰顯比之吉位正中也緣自處得正中所以能盡顯比之道若使自立身偏處不可謂正中易説上六比之無首凶象曰比之無首無所終也明道先生曰比之無首凶比之始不善則凶劉絢師訓伊川先生曰六居上比之終也首謂始也凡比之道其始善則其終善矣有其始而無其終者或有矣未有無其始而有終者也故比之無首至終則凶也此據比中而言然上六隂柔不中處險之極固非克終者也始比不以道隙於終者天下多矣比既無首何所終乎相比有首猶或終違始不以道終復何保故曰無所終也並易傳敬是持己恭是接人與人恭而有禮言接人當如此也近世淺薄以相歡狎為相與以無圭角為相親愛如此者安能久若要久須是恭敬君臣朋友皆當以禮為主也比之上六曰比之無首凶象曰比之無首無所終也既無首安得有終故曰無所終比之道須當有首也劉元承手編龜山楊氏曰比之時隂宜從陽也而上六居一卦之上比之無首者也無首則無所從其凶不亦宜乎易説白雲郭氏曰上六非天下之所比又不能比人為臣而無君與無元首何異哉是以凶而無所終也三有匪人之傷上有無首之凶皆逆比之道聖人舍之者也四也初也其知幾乎故能非其應而獲吉以是知比者必求大中至正而比之斯無不吉易説漢上朱氏曰六三動而比上上比乎三成乾乾為首三者比上之始上者比三之終三不知比上則比之無首上不知比三則比之無終比之無首無所終矣正者宜吉然上六不免於凶者正而不知用也道與人同者也不相親比與比之無首雖正亦凶易傳新安朱氏曰隂柔居上無以比下凶之道也故為無首之象而其占則凶也比無所終以上下之象言之則為無首以始終之象言之則為無終無首則無終矣本義東萊吕氏曰上六比之無首凶聖人因上六之無終故推原其所以無終之由所謂無首却不是指初六説大凡無終者皆緣無始今人言無終者以為初間本好只後來有少不好殊不知終之所以不善者只緣初不善使初間有一分未是處在當時却未見到後來不善時皆自此一分發出又曰此卦大抵以五為主二與五正應切近故正無疑四外比亦吉三惟不比故可傷若初只説比之始又況以六居初其體本順故亦吉也並易説又曰上六比之無首凶上居卦之終不曰無終凶而曰無首凶何也見其無終則知其必無首矣治疾者必推其致疾之由也紀聞合訂刪補大易集義粹言卷十二
