body:
  text: 合訂刪補大易集義粹言卷三十四頭等侍衛納喇性德編離上離下伊川先生曰離序卦坎者陷也陷必有所麗故受之以離離者麗也陷於險難之中則必有所附麗理自然也離所以次坎也離麗也明也取其隂麗於上下之陽則為附麗之義取其中虛則為明義離為火火體虛麗於物而明者也又為日亦以虛明之象易傳東萊吕氏曰序卦陷必有所麗故受之以離蓋言人居坎陷之地欲出其險必有所附麗乃可易説離利貞亨畜牝牛吉伊川先生曰離麗也萬物莫不皆有所麗有形則有麗矣在人則為一無為字所親附之人所由之道所主之事皆其所麗也人之所麗利於貞正得其正則可以亨通故曰離利貞亨畜牝牛吉牛之性順而又牝焉順之至也既附麗於正必能順於正道如牝牛則吉也畜牝牛謂養其順德一無德字人之順德由養以成既麗於正當養習以成其順德也易傳橫渠先生曰以柔麗乎中正故利貞易説白雲郭氏曰坎為險為水離為明為火險與明足以見坎離之情水與火不足以盡坎離之象而論坎者必先水言離者復先明何哉蓋坎險難明而水易見由水以知險由險以知坎斯得坎之義矣離明易見不必因火而後知故直言其明也離之道柔中柔中失之無守故必利貞而後亨牝牛性順而從人柔中之道也然其強力足與有守復有貞固之象是以吉也離之與坤道雖不同而性略相類故坤之牝馬自順而健離之牝牛自柔而強馬乾象也故坤之黃裳元吉見於六五牛坤象也故離之黃離元吉見於六二君臣之辨觀二五之象斯得之矣易説漢上朱氏曰離畜牝牛離中之隂即坤之隂也坎為馬脊坎中之陽即乾之陽也叢説新安朱氏曰離麗也隂麗於陽其象為火體隂而用陽也物之所麗貴乎得正牝牛柔順之物也故占者能正則亨而畜牝牛則吉也本義離便是麗附著之意易中多説做麗也有兼説明處也有單説明處明是離之體麗是麗著底意思離字古人多用做離著説然而物相離去也只是這字富貴不離其身東坡説道剩箇不字便是這意古來自有這般兩用底字如亂又喚作治離字不合單用並語録東萊吕氏曰利貞亨言人有所附麗不可不附於正人如孔子微服過宋乃主司城貞子為陳侯周臣則所附得其正可知故必貞乃亨畜牝牛吉畜字最要看大抵人欲附麗人必恭順和柔乃可故曰禮恭然後可以言道之方然人之恭順豈一朝一夕所可致必畜養有素乃可易説彖曰離麗也日月麗乎天百穀草木麗乎土重明以麗乎正乃化成天下柔麗乎中正故亨是以畜牝牛吉也伊川先生曰離麗也謂附麗也如日月則麗於天百穀草木則麗於土萬物莫不各有所麗天地之中無無麗之物在人當審其所麗麗得其正則能亨也重明以麗乎正以卦才言也上下皆離重明也五二皆處中正麗乎正也君臣上下皆有明德而處中正可以化天下成文明之俗也二五以柔順麗於中正所以能亨人能養其至順以麗中正則吉故曰畜牝牛吉也或曰二則中正矣五以隂居陽得為正乎曰離主於所麗五中正之位六麗於正位乃為正也學者知時義而不失輕重則可以言易矣並易傳橫渠先生曰日月草木麗天地麗附著也易説藍田吕氏曰離明而有所麗也火之為物麗於物而後見故離為明為麗離之二陽麗於一隂以為明陽麗於隂正也重離之明皆麗乎正其文明其義正此所以化成天下也二柔皆中故利貞利貞故亨柔體故也牛順而畜於人牝又其柔者柔而麗於物故畜之吉龜山楊氏曰離為火火無常形麗物而有形故離麗也夫盈天地之間皆物也未有無所麗而能有成者故曰日月麗乎天而明生焉百穀草木麗乎土而利成焉皆麗得其正而亨者也重明合二體言也上下一德麗乎正也明則誠矣故能化成天下惟天下至誠為能化也柔麗乎中正以六二言也柔不中則茹不正則邪不足以有行矣故麗乎中正乃亨夫隂以順成為德柔麗中正順之至也故畜牝牛吉牛順物也牝牛順之至也易説兼山郭氏曰坎陷也離麗也剛則有體陷乎隂中所以為坎柔則無質麗乎陽中所以為麗重卦也故日月麗乎天在上者也言日月則星辰從可知也百穀草木麗乎土在下者也言百穀草木則山林川澤從可知也重明以麗乎正人道之離也人者天地之合也天一生水於北方水為精地二生火於南方火為神其精神者天之分骨骸者地之分各有所麗焉故合則渾離則散方其合也氣聚而成形於有方其離也氣散而神合於無是以離附物則生去物則滅聖人以是而知鬼神之情狀原始反終知死生之説是故或以言文明或以言物化皆其象也至於言化成天下者又推其人道之相資而成功於久也畜牝牛吉何也曰乾為馬坤為牝馬坤為牛離為牝牛亦事象之宜也柔之麗乎中者六五也柔之麗乎正者六二也兼乎中正之道惟六二則然故利貞亨成卦之本在二也二有牛之象而爻之辭曰黃離元吉又從可知也牛者強力而順象六二之方故也易説白雲郭氏曰離附麗也萬物莫不有所麗在天之日月在地之百穀草木皆是也舉日月百穀則萬物在天地之中有形有象者其麗皆一也推而上之雖天地聖人不能不麗乎道而道亦不能不麗乎天地聖人矣離之為義亦大矣而彖不言者蓋坎險難明而離明易見不待言而知也是以坎以險而陷離以麗而明重明麗乎正者在卦為二五在人為君臣以明相繼是以化成天下也書曰元首明哉股肱良哉庶事康哉康哉則化成天下矣柔謂二五也麗乎中正者貞也貞故亨此畜牝牛吉之義也易説漢上朱氏曰離自遁初六三變而成二五皆一隂而麗二陽物之情未有不相附麗者也柔必麗乎剛弱必麗乎強小必麗乎大晦必麗乎明故曰離麗遁一變六之三成無妄再變六之四成家人三變六之五成離自六之四言之離有坎日降而月升也自六之五言之坎復成離月降而日升也乾為天故曰日月麗乎天自六之三言之有震巽震為百穀巽為草木乾策三十六坤策二十四震三爻凡八十有四百穀舉成數也坤為土故曰百穀草木麗乎土觀天地日月百穀草木附麗如此則萬物之情有不相附麗者乎此推原卦變以明離為麗之義也兩離重明也君臣上下皆有明德之象重明而不麗乎正則以察為明重明而麗乎正以之化天下成文明之俗矣初二三正麗乎正也三爻在乾天之下有巽順服從之象化成也故辭曰利貞彖曰重明以麗乎正乃化成天下此舉成卦言離明之所麗也柔之為道不利逺者不麗乎中正則邪佞之道其能亨乎六居五柔麗乎中而亨也六居二柔麗乎中正而亨也言柔麗乎中正則二五舉矣中正者人之本心也天下之心必麗乎中正則重明而麗乎正化成天下也必矣故辭曰亨彖曰柔麗乎中正故亨此以二五言離柔之所麗也兩者離之才也坤為牛順也六二以隂居隂為牝牛至順也畜養也以剛正畜養之成其至順而麗於中正則吉是亦柔之利也故辭曰畜牝牛吉彖曰柔麗乎中正故亨是以畜牝牛吉也此以內卦終言柔之所麗也在卦氣為四月故太玄準之以應易傳新安朱氏曰離麗也釋卦名義柔麗乎中正以卦體釋卦辭本義問離卦是陽包隂占利畜牝牛便也是宜畜柔順之物否先生曰然彖辭重明自是五二兩爻為君臣重明之義大象又自説繼世重明之義不同問火體隂而用陽是如何先生云此言三畫卦中隂而外陽者也故象為隂水體陽而用隂蓋三畫卦中陽而外隂者也惟六二一爻柔麗乎中而得其正故元吉至六五雖是柔麗乎中而不得其正特借中字而包正字耳並語録東萊吕氏曰大抵人不可須臾離於正如日月之不麗天則失其所以明百穀草木之不麗乎土則失其所以生然則麗乎正者非明者莫能也欲附麗人必先知其正乃能附麗不知其為人安能附麗乎柔麗乎中正故亨是以畜牝牛吉也離卦蓋言人欲出險雖不可獨立然必求附麗於正以一卦觀之一隂居二陽之中故上下相輔所以為麗然五君位而以六居之似乎非正殊不知六雖柔弱得五則為剛以六居五正所謂柔麗乎中正易説象曰明兩作離大人以繼明照于四方伊川先生曰若云兩明則是二明不見繼明之義故云明兩明而重兩謂相繼也作離明兩而為離繼明之義也震巽之類亦取洊隨之義然離之義尤重也大人以德言則聖人以位言則王者大人觀離明相繼之象以世繼其明德照臨于四方大凡以明相繼皆繼明也舉其大者故以世襲繼照言之易傳橫渠先生曰明目逹聰繼明之道也人患墮於博覽惟大人能勉而繼之易説龜山楊氏曰一則無所麗兩而後有麗焉故曰明兩作離離麗也大人以繼明照于四方如大明文王有聲之詩是也易説兼山郭氏曰説者謂上下為重明則五君也二臣也不得言重明麗乎正也謂先後為重明則前明已熄後明方來不得言繼明照四方也在書有之堯曰放勛舜曰重華不害其為重明也惟文王武王宣重光奠麗不害其為繼明也是以天下明德皆自虞帝始陳教則肄周之所以化成天下也堯舜君臣也而並文武父子也而繼所遇之時異也易説白雲郭氏曰先人曰堯曰放勛舜曰重華君臣也而並文王武王宣重光奠麗父子也而繼此所謂繼明雍曰聖人立象以盡意意盡而止耳不必同也坎之險難明故象言水洊至因水而知險也離之明易見故直言明兩作離蓋不必因火而後知其明也大人者與日月合其明故論繼明必以大人為言大人非必君父也總君臣父子有是明者皆兼言之如乾之二五皆為大人是也易説漢上朱氏曰明兩作者麗乎明也鄭康成曰作起也明明相繼而起大人重光之象堯舜禹文武之盛也兊有伏震離有伏坎震東兊西坎離南北照四方也易傳新安朱氏曰作起也本義如日然今日出了明日又出是以謂之兩作蓋只是這一箇明兩番作非明兩乃兩作也猶云水洊至習坎明兩作猶言水洊至今日明來日又明若説兩明却是兩箇日頭並語録東萊吕氏曰象不曰二明乃曰明兩此以明繼明之義大人以繼明照于四方正如堯舜之相授受文武之相繼如曰重華協于帝此是以明繼明如曰明明在上赫赫在下此亦以明繼明大抵天下道理本自相續以明繼明自是常事後世徒見堯舜禹湯之後有太康文武成康之後有穆王遂以堯舜禹湯文武成康以明相繼為異殊不知以明繼明却是常事至於太康穆王昏亂乃是異常事雖不見而理常在易説初九履錯然敬之無咎象曰履錯之敬以辟咎也伊川先生曰陽固好動又居下而離體陽居下則欲進離性炎上志在上麗幾於躁動其履錯然謂交錯也雖未進而迹已動矣動則一無則字失居下之分而有咎也然其剛明之才若知其義而敬慎之則不至於咎矣初在下無位者也明其身之進退乃所麗之道也其志既動不能敬慎則妄動是不明所麗乃有咎也履錯然欲動而知敬慎不敢進所以求辟免過咎也居明而剛故知而能辟不剛明則妄動矣並易傳橫渠先生曰履錯然與之者多也無應於上無所朋附以剛處下物所願交非敬慎之甚何以免咎易説藍田吕氏曰初九始與二比剛麗乎柔其履交錯然剛柔之際瀆亂生焉欲辟乎咎非敬不可能敬之道非剛而何龜山楊氏曰履踐也藉也履物為踐履於物為藉初在下以陽藉隂也二以隂麗陽故履錯然也錯然謂交錯也二以柔麗剛為文明之主錯然而不敬則上下紊矣能無咎乎故敬之然後無咎易説兼山郭氏曰初九文明之初錯然者也不敬何以行之子入太廟每事問亦其意也易説白雲郭氏曰先人曰文明之初錯然者也不敬何以行之子入太廟每事問亦履錯之敬與雍曰履下道也故為離之初錯然之文過則有弊敬所以救其弊也使文之弊無自而生焉非辟咎之道與易説漢上朱氏曰遁艮為指指在下體之下為趾五來踐初履也初欲麗四交巽巽為進退故其履錯然進退動則失正失正則有咎故敬之不敢動以辟有咎榮辱安危繫於所麗君子處離之始安其分義守正而已故無所麗是以無咎管寧逡巡於萬乘之招王丹偃蹇於三公之貴以辟咎乎易傳新安朱氏曰以剛居下而處明體志欲上進故有履錯然之象敬之則無咎矣戒占者宜如是也本義東萊吕氏曰大抵人之念慮雖未發於外要當制之於未動之先蓋離是火九是剛火則炎上剛則欲進火與剛在乎用之如何耳善用之則火為明不善用之則為炎上剛善用之則為正不善用之則為躁進故必敬於先然後能無咎易説六二黃離元吉象曰黃離元吉得中道也伊川先生曰二居中得正麗於中正也黃中之色文之美也文明中正美之盛也故云黃離以文明中正之德上同於文明中順之君其明如是所麗如是大善之吉也所以元吉者以其得中道也不云正者離以中為重所以成文明由中也正在其中矣並易傳藍田吕氏曰六二二陽來麗不失乎中中即本也故曰黃離元吉龜山楊氏曰黃中色也美在其中而暢於外者也二以柔順中正麗乎陽而為文明之主故曰黃離元吉黃與黃中通理義同易説兼山郭氏曰六二離之所以亨柔麗乎中正故亨也黃離之所以元吉文明而用中故元吉也故盡一卦之美其惟六二乎易説白雲郭氏曰離之六爻二五為美五得中而非正柔麗乎中正者惟六二盡之經曰君子黃中通理正位居體美在其中則黃為中之色而德之至美者也美德在中故能暢於四支發於事業極美之至是以元吉也六二之美雖未及乎天下而黃中之理有必至焉故言元吉其義之美與坤六五相類而其道則中庸之教也易説漢上朱氏曰黃者地之中萬物必有所麗六二坤柔在下麗乎中而與五合一得中道也夫中者天地萬物之所共由天地之長久日月維斗之不息聖人之道亘古今而無弊者也六二得之故能守正而不遷乘剛而不懼抱明德而獨照是以元吉易傳新安朱氏曰黃中色柔麗乎中而得其正故其象占如此本義六二中正六五中而不正今言麗乎正麗乎中正次第説六二分數多此卦惟這爻較好然亦未敢便恁地説語録東萊吕氏曰六二以文明柔中之才居下體之中故曰黃離元者善之長元吉蓋無以復加之吉然六二之所以吉者正以得中道大抵才過乎中則是智者過之極髙明而不能道中庸致廣大而不能盡精微者也易説九三日􅉴之離不鼓缶而歌則大耋之嗟凶象曰日􅉴之離何可久也伊川先生曰八純卦皆有二體之義乾內外皆健坤上下皆順震威震相繼巽上下順隨坎重險相習離二明繼照艮內外皆止兊彼已相説而離之義在人事最大九三居下體之終是前明將盡後明當繼之時人之始終時之革易也故為日􅉴之離日下􅉴之明也􅉴則將沒矣以理言之盛必有衰始必有終常道也達者順理為樂缶常用之器也鼓缶而歌樂其常也不能如是則以大耊為嗟憂乃為凶也大耊傾沒也人之終盡達者則知其常理樂天而已遇常皆樂如鼓缶而歌不達者則恐怛有將盡之悲乃大耊之嗟為其凶也此處死生之道也耊與昳同日既傾􅉴明能久乎明者知其然也故求人以繼其事退處以休其身安常處順何足以為凶也並易傳橫渠先生曰人向衰暮則尤樂聼聲音蓋留連光景視桑榆之暮景不足則貪於為樂惟鄭衛之音能令人生此意易謂不鼓缶而歌則大耊之嗟凶悲衰暮故為樂不為則復嗟年景之不足也明正將老離過於中故哀樂之不常其德凡人不能久也故君子為德夭夀不二並易説藍田吕氏曰九三陽過乎中日􅉴之象日􅉴之時明始退矣必至於沒而後已處斯時也亦姑謀樂以待其終可矣不及時以自娛至於耊老則無及矣與詩云今我不樂逝者其耊同義龜山楊氏曰居下體之終前明將盡矣離為日故有日􅉴之象焉在人則死生終始之變也故不鼓缶而歌則大耊之嗟凶夫缶常用之器也明者安常而處順故無常變昧此則大耊之嗟凶矣易説兼山郭氏曰九三位已過中故云日􅉴若不能與時進退不憂而樂其能忘大耊之嗟乎故葉公問孔子於子路子路不對子曰女奚不曰其為人也發憤忘食樂以忘憂不知老之將至云爾若孔子者又安有大耊之嗟乎易説白雲郭氏曰先人曰葉公問孔子於子路子路不對子曰女奚不曰其為人也發憤忘食樂以忘憂不知老之將至云爾若孔子者又安有大耊之嗟乎雍曰離日也三已過中是為日􅉴之時以人言之則衰矣於斯時也不能忘憂而從樂則大耊之嗟至而凶矣衆人以歌為樂故此爻從衆言之血氣既衰之時使絶滅衆念惟鼓缶而歌以待終焉則良心可復誠日著而偽日去矣是所以逸其老也聖人感人之意深矣然聖賢之樂亦豈鼓缶而歌哉孔子不復夢見周公而述作六經是聖人之樂也顔子不以簞瓢陋巷為憂而不改其樂是賢人之樂也聖賢之樂其心與衆人同其所以為樂則異故接輿歌而過門林類歌而拾穗莊周之鼓盆二子之臨尸雖狂蕩不法以極其矯枉之心終不異於衆人日􅉴之歌矣蓋未能安之者也是以孔氏之門皆無有焉易説漢上朱氏曰離為日在下􅉴也九三明盡當繼之際故曰日􅉴之離盛必有衰始必有終生必有死晝夜寒暑之變達人觀此知窮必有變乃理之常孰知生之可羡死之可惡吉凶泯矣故鼓缶而歌缶者常用之器歌之者樂其得常也九三離腹變坤為缶艮手擊之鼓缶也兊變震而體離口舌動有聲成文歌也昧者不知變不鼓缶而歌則大耊近死戚嗟之憂不安於死則凶矣九三不變乾首巽白處明盡當繼之際大耊也八十曰耄九十曰耊離三爻乾坤之䇿九十有六故曰耊陽為大耊也大耊猶言大老三失應而憂嗟也夫日􅉴之光斯須入於地雖欲附麗何可久也是故君子頺然委順不以死生纍其心巽為長巽變何可久也易傳新安朱氏曰重離之間前明將盡故有日􅉴之象不安常以自樂則不能自處而凶矣戒占者宜如是也本義或問日􅉴之離先生曰死生常理也若不能安常以自樂則不免有嗟戚曰生之有死猶晝之必夜故君子當觀日􅉴之象以自處先生曰人固知常理如此只是臨時自不能安耳語録東萊吕氏曰九三居下體之上前明將盡後明將繼之時是猶死生之際也不鼓缶而歌則大耊之嗟者彼畏懼者其凶固明至於鼓缶而歌者雖自謂達死生之際殊不知死生乃常事耳初無可樂才鼓缶而歌則亦為死生所動矣故皆凶也象曰何可久也此一句最要看日之既􅉴自然傾沒雖千數萬計亦不能留此何可久也之義易説九四突如其來如焚如死如棄如象曰突如其來如無所容也伊川先生曰九四離下體而升上體繼明之初故言繼承之義在上而近君繼承之地也以陽居離體而處四剛躁而不中正且重剛以不正而剛盛之勢突如而來非善繼者也夫善繼者必有巽讓之誠順承之道若舜啓然今四突如其來失善繼之道也又承六五隂柔之君其剛盛陵爍之勢氣焰如焚然故云焚如四之所行不善如此必被禍害故曰死如失繼紹之義承上之道皆逆德也衆所棄絶故云棄如至於死棄禍之極矣故不假言凶也上陵其君不順所承人惡衆棄天下所不容也並易傳橫渠先生曰處多懼之地而以乘剛故其來也遽其處也危無所容安如見棄逐皆所麗之失中也三剛而不可乘五正而不見容易説藍田吕氏曰離之四五與坎相反坎之四五皆當位離之四五皆不當位剛柔不當位則剛必陵柔下必陵上不順之勢物所不容也離於下體其明再生故突如其來如物所不容不戢自焚故焚如死如棄如六五為四所陵不堪其逼然處尊居中不失王公之義物必助之故吉龜山楊氏曰九四以炎上之性當繼明之時而麗非其正則循沿不休流金焦山勢之必至也故突如其來如焚如無善繼之道也古人善繼者如舜避堯之子禹避舜之子是也無善繼之道則天下所同疾宜無所容矣故死如棄如然不言凶者凶不足道也易説兼山郭氏曰九四離互體之大過之象易説白雲郭氏曰火性炎上而九四近君當栗栗危懼如臨深淵可也反肆其剛暴突如其來若火之焚不能自制速死之道無踰於斯矣自蹈禍機雖三尺之童亦知其非而棄之矣故雖至於死地而人無傷怛之心焉方其突然而來烈如猛火人人將望而畏之其有見容者乎故象曰無所容也古之君子於進也必有漸是以有三揖而進一辭而退之義況居近君多懼之地者乎易説漢上朱氏曰九四重剛而不中正又處不當位不善乎繼而求繼者也四之五成乾巽乾為父巽為子子凌父突也突字古文作倒字不順之子也凌突而往其能來乎言逆德也巽木為火焚如也火王木死死如也退復三兊毁之其下反目而視棄如也言不容於內外者如此故曰突如其來如無所容也先儒謂古有焚刑刑人之喪不居兆域不序昭穆焚而棄之易傳曰禍極矣凶不足言也易傳新安朱氏曰後明將繼之時而九四以剛迫之故其象如此無所容言焚死棄也本義焚死棄只是説九四陽爻突出來逼桚上爻焚如是不戢自焚之意棄是死而棄之之意問九四突如其來如先生曰九四以剛迫柔故有突來之象或曰突如其來如與焚如自當屬上句死如棄如自當做一句先生曰説時亦少通但文勢恐不如此九四突如其來如自是一句焚如死如棄如自成一句恐不得如伊川之説並語録東萊吕氏曰九四處近君之位聖人於此一爻嚴其義峻其辭正天下之大分明君臣之大間謂九四大臣苟侵君位突然而來則受莫大之罪焚者古之極刑然六十四卦近君之位皆不明此意獨於離一卦言之何哉蓋離有相繼之義九四以剛強之才上逼君下繼下體之上大抵人臣之繼君必如舜繼堯禹繼舜乃可無舜禹之心即是莽卓易説六五出涕沱若戚嗟若吉象曰六五之吉離王公也伊川先生曰六五居尊位而守中有文明之德可謂善矣然以柔居上在下無助獨附麗於剛強之間危懼之勢也唯其明也故能畏懼之深至於出涕憂慮一作虞之深至於戚嗟所以能保其吉也出涕戚嗟極言其憂懼之深耳時當然也居尊位而文明知憂畏如此故得吉若自恃其文明之德與所麗中正泰然不懼一作慮則安能保其吉也六五之吉者所麗得王公之正位也據在上之勢而明察事理畏懼憂虞以持之所以能吉也不然豈能安乎並易傳橫渠先生曰言王公之貴人之所附下以剛進已雖憂危終以得衆而吉者柔履中正也易説龜山楊氏曰四近君王公之位也位逼炎上而五乘之危難之勢也故出涕沱若戚嗟若憂懼之至也然以柔順之資離之弗違故吉唐之太宗殺建成元吉而以尉遲敬德持兵入侍可謂突如其來如也髙祖咈而拒之則禍不可測矣能無憂懼乎惟順而不違故卒成授受之美焉然太宗無死如棄如之禍者以其退就臣子之位而不遽進故不及也易説白雲郭氏曰五雖得中而非正焉又麗乎二剛之間未足以致六二之臣以大明德於天下故自傷而出涕以至憂戚嗟若也夫堯以不得舜為己憂舜以不得禹臯陶為己憂方其不得而為己憂也豈六五出涕戚嗟之時歟天下之急務莫急於斯也人君之明德莫明於斯也其為吉也亦孰大於是焉是惟離明之君乃有戚嗟之吉庸君暗主何足以知之聖人慮學者不知戚嗟之明故又曰離王公也言六五之戚嗟蓋王公思欲相麗之意也孟子又言堯舜急親賢所謂親賢其離王公之義與易説漢上朱氏曰離目兊澤出涕也鄭康成曰自目出曰涕巽為長沱若也五失位為憂戚也兊口嗟若也六五柔居尊位九四凌突故出涕戚嗟然有吉之道九四突五離王公則吉四五相易上離王位正也下麗三公用利也據正而用利以順討逆何憂乎九四哉易傳新安朱氏曰以隂居尊柔麗乎中然不得其正而迫於上下之陽故憂懼如此然後得吉戒占者宜如是也本義問郭沖晦以為離六五乃文明盛德之君知天下之治莫大於得賢故憂之如此如堯以不得舜為己憂舜以不得禹臯陶為己憂是否先生曰離六五陷於二剛之中故其憂如此只為孟子説得這兩句故人便取以為説恐不是如此於上下爻不相通六五介於兩陽之間憂懼如此然處得其中故不失其吉並語録東萊吕氏曰以柔順文明之才居君之位自可怡然燕處然位雖髙而理實危水能載舟亦能覆舟苟恃其尊則必底於敗故曰撫我則后虐我則讎惟離之六五能泣涕戚嗟而不敢安若書謂豫臨兆民凛乎若朽索之馭六馬所以致吉易説上九王用出征有嘉折首獲匪其醜無咎象曰王用出征以正邦也伊川先生曰九以陽居上在離之終剛明之極者也明則能照剛則能斷能照足以察邪惡能斷足以行威刑故王者宜用如是剛明以辨天下之邪惡而行其征伐則有嘉美之功也征伐用刑之大者夫明極則無微不照斷極則無所寬宥不約之以中則傷於嚴察矣去天下之惡若盡究其漸染詿誤則何可勝誅所傷殘亦甚矣故但當折取其魁首所執獲者非其醜類則無殘暴之咎也書曰殱厥渠魁脅從罔治王者用此上九之德明照而剛斷以察除天下之惡所以正治其邦國剛明居上之道也並易傳橫渠先生曰有嘉折首服而舍之也獲匪其醜執訊弗賔示威以正邦而已離道已成然後不附可征易説龜山楊氏曰上九處離之終剛明之極也然以剛居柔無逸德矣王于出征用此道也故有嘉折首獲匪其醜脅從罔治也易説兼山郭氏曰上九文明之極乃可有征若舜征有苗是也又曰離為甲胄為戈兵互體有兊兊為毁折王者之師有征無戰故有嘉折首獲匪其醜猶殱厥渠魁脅從罔治如胤征羲和是也夫當嘉會之時而下有不麗於正者是宜有征尚且折首獲匪其醜者明黷武之戒也若是則何必用師乎蓋不得已而用之正邦故也故左氏曰兵猶火也弗戢將自焚也於離明用師之時是宜發也洪範八政終之以師亦聖人之深意易説白雲郭氏曰聖人以離明之德繼照四方天下無不仰其化成又豈爭地爭城而欲威強天下也哉蓋有不得已之師出焉且征者正也各欲正己也謂之出征正己而己必不得已而至於戰不過折獲非其善類者耳如殱厥渠魁脅從罔治蓋非玉石俱焚之師也謂之有嘉在此而已非嘉其勝敵之功也故知舜征有苗啓攻有扈成王伐淮夷皆非得已之師用以正邦而已惟出於不得已故無咎若得已而不已則過矣正邦者非利人民土地之師也易説漢上朱氏曰上九麗極有不麗者焉上五相易六以正行王用之以出征也上有剛德而明故王用之兊毁折乾為首陽為美九五美之至嘉也言用之有功王嘉其折首書曰殱厥渠魁脅從罔治折首者殱渠魁也醜類也隂又為醜上六下應九三陽也陽非隂之類獲匪其醜也醜脅從者乎王用出征非樂殺人也正其不附者所以正邦也離上三爻不正上五相易而正獨九四不正四諸侯位四正成坤土則邦正矣王肅易本曰獲匪其醜大有功也疑今本脫之易傳新安朱氏曰剛明及逺威振而刑不濫無咎之道也故其象占如此本義有嘉折首是句語録東萊吕氏曰上九一爻正如成湯天乃錫王勇智表正萬邦然上九以剛毅奮發之才是天錫之勇也以離而居上是聰明睿智出於天錫以之出征則東征西怨南征北怨是有嘉折首獲匪其醜無咎亦如成湯伐桀簡賢附勢實繁有徒其時罪惡非不衆湯但放桀而已書曰迪簡在王庭有服在大僚則其餘皆無罪象曰以正邦也此亦表正萬邦之義易説合訂刪補大易集義粹言卷三十四
