body:
  text: 合訂剛補大易集義粹言卷七十頭等侍衛納喇性徳編彖者言乎象者也爻者言乎變者也吉凶者言乎其失得也悔吝者言乎其小疵也无咎者善補過也伊川先生曰彖言卦之象爻随時之變因失得而有吉凶能如是則得无咎謂補過也經説横渠先生曰象謂十卦之質易説龜山楊氏曰彖總言一卦之象若坤言牝馬之類是也六爻變動不可為典要故曰言乎變會通一已上條補廣漢張氏曰悔吝雖未為大過然悔未純吉吝未純凶如物有瑕疵也无咎本有咎能以善補其過惡故无咎也㑹通白雲郭氏曰前章言卦之象備矣此章又明玩辭之法也彖之辭所以言一卦之象也象非為天為地而已八卦之義變動不居皆其象也爻之辭所以言一卦之變也卦由爻以變爻之辭又明其變之所以也吉凶言其失得之大悔吝言其所失之小无咎稱其善補過此五者皆易辭之道也君子樂玩在此而已易説漢上朱氏曰設卦觀象黙而識之不得已而有彖者所以言乎一卦之象也玩其彖辭而不得觀其象可也剛柔相推而生變化吉凶有難知者故有爻辭所以言乎一卦之變也玩其爻辭而不得觀其變可也吉凶者言如是而得則吉如是而失則凶悔吝者言乎小疵也惡積罪大則悔无及已吝者言當悔而止䕶小疵致大害者也无咎者本實有咎善補過而至於无咎易有言又誰咎者言咎實自取自咎可也有言不可咎者義所當為才不足也君子度徳量力折之以中道則无咎矣吉凶悔吝无咎一也其實悔吝无咎所以明吉凶也彖不言悔而言无咎无咎則悔可知矣言凶而不言吝吝不足言也易傳又曰漢書藝文志易經十二篇論彖大象小象文言班固以文王作上下篇孔氏為之彖象繫辭文言序卦之屬十篇先儒自鄭康成王弼孔穎逹尊是説其後諸儒疑之正義補闕曰夫子因文王彖而有彖王昭素胡旦亦云范諤昌著易證墜簡曰諸卦彖象爻辭小象乾坤文言並周公作自文言以下孔述也今以經傳考之明夷之彖曰内文明而外柔順以蒙大難文王以之利艱貞晦其明也内難而能正其志箕子以之則彖非文王作斷可知矣案司馬遷曰孔子晚喜易序彖繫象説卦文言信斯言也則彖象説卦文言古有之矣孔子序之繫之説之文之而已所謂述而不作也孔子曰聖則吾不能夫聖孔子不居而繫辭之言及於卦象彖爻必抑揚其辭以聖人稱之曰聖人設卦觀象繫辭焉而明吉凶此所謂繫辭者指卦下之辭而言之也又曰彖也者言乎其象也爻也者言乎其變也夫爻辭言一爻之變彖辭言一卦之象則文王卦下之辭又謂之彖矣孔子序述其彖之意而已故名其篇曰彖使文王卦下之辭不謂之彖孔子何謂言知者觀其彖辭則思過半矣夫子自謂如此非遜以出之之義也葢彖者孔子賛易十篇之一先儒附其辭於卦辭之下故加彖以明之崔景陸震謂文王作爻辭馬融陸績謂周公所作考之爻辭馬融陸績為是明夷九三明夷于南狩得其大首六五箕子之明夷随上六王用亨于西山升六四王用亨于岐山葢南狩伐商之事西岐王業所興武王數紂曰囚奴正士而追王西伯在翦商之後則爻辭為周公作審矣文王作卦辭周公作爻辭通謂之繫辭仲尼賛二聖人繫辭之意成上下篇名曰繫辭猶序文王之彖而明其篇曰彖也凡繫辭所稱繫辭焉者或指卦辭或指爻辭而言如聖人設卦觀象繫辭焉而明吉凶指卦辭為繫辭也如聖人有以見天下之動而觀其㑹通以行其典禮繫辭焉以斷其吉凶是故謂之爻指爻辭為繫辭也並叢説新安朱氏曰彖謂卦辭文王所作者爻謂爻辭周公所作者象指全體而言變指一節而言吉凶悔吝无咎此卦爻辭之通例本義問所謂小疵者只是以其未便至於吉凶否曰悔是漸好知道是錯了便有進善之理悔便到无咎吝者喑鳴説不出心下不是沒分曉然未至大過故曰小疵然小疵畢竟是小過語録是故列貴賤者存乎位齊小大者存乎卦辨吉凶者存乎辭憂悔吝者存乎介震无咎者存乎悔伊川先生曰位有貴賤之分卦兼小大之義吝凶之道於辭可見以悔吝為防則存意於㣲小震懼而得无咎者以能悔也經説横渠先生曰齊小大者存乎卦卦有稱名至小而與諸卦均齊者各著其義也葢稱名小而取類大也辯吉凶者存乎辭欲見小疵者必存乎辭憂悔吝者存乎介欲觀易象之小疵宜乎志靜知一作志所動之㡬㣲也悔吝吉凶之萌惟介于石者能見㡬而作震无咎者存乎悔凡言无咎者必求其始皆有悔今能改之也有咎而免者善震而補也並易説龜山楊氏曰介者始萬物之時震者動之將形憂悔吝者當在交物之初而善補過者當悔於將動之際過此則无及矣㑹通白雲郭氏曰上而貴下而賤繫乎六爻故曰存乎位乾坤之大井鼎之小皆卦也故言齊小大繫辭焉而明吉凶是存乎辭也憂悔吝者方悔吝未至之時先明於㡬㣲則無疵故存乎介亦由思患而豫防之也知畏過咎常自震悔則可補過故存乎悔亦由恐懼修省者也人有貴賤而位列之人有小大不齊而卦齊之介雖所以憂悔吝而悔又以震无咎也能知辭之所言如彼又知理之所存如此樂而玩之是其所以為君子也易説漢上朱氏曰卦自下而上列貴賤之位存乎位則剛柔往来上下内外得位失位或應或否見矣易於小事不忽於大事不懼視履尊位與居家同視征伐天下與折獄同視享上帝養聖賢養萬物與飲食同知此則知顔子與禹稷同曽子與子思同故存乎卦之小大則見事之小大齊矣憂悔吝之將至者當存乎介介者確然自守不與物交震懼而无咎者當存乎悔悔者追悔前失而不憚改也故悔則无咎介則无悔不近於知㡬乎㡬者動之㣲吉之先見也易曰介于石不終日貞吉確然自守者守正也易傳新安朱氏曰位謂六爻之位齊猶定也小謂隂大謂陽介謂辨别之端葢善惡已動而未形之時也於此憂之則不至於悔吝矣震動也知悔則有以動其補過之心而可以无咎矣本義齊小大者存乎卦齊猶分辨之意一云猶斷也小謂否睽之類大謂泰謙之類如泰謙之辭便平易睽困之辭便艱險故曰卦有小大辭有險易問憂悔吝者存乎介悔吝未至於吉凶是那初萌動可以向吉凶之㣲處介又是悔吝之㣲處介字如界至界限之界是善惡初分界處於此憂之則不至悔吝矣曰然悔吝固是吉凶之小者介又是㡬㣲之間慮悔吝之来當察於㡬㣲之際无咎者本是有咎善補過則為无咎震動也欲動而无咎當存乎悔爾悔吝在吉凶之間小於吉凶而將至於吉凶者也並語録是故卦有小大辭有險易辭也者各指其所之伊川先生曰卦有小大於時之中有小大也有小大則辭之險易殊矣辭各随其事也經説横渠先生曰辭各指其所之聖人之情也指之以趨時盡利順性命之理臻三極之道也能從之則不陷於凶悔矣正蒙白雲郭氏曰觀卦之象而卦有小大之異君子所居不可同玩卦之辭而辭有險易之辨君子所樂不能一各指其所之者之於常則其辭易之於變則其辭險是非辭无以示其所之也易説漢上朱氏曰辭有易者之於吉也所謂能説諸心辭有險者之於凶也所謂能研諸慮有憂慮悔吝非險辭不足以盡之爻辭也各指其所之之險易也所之者動爻也言乎其變也春秋傳觀其動曰之某卦是也從其所之乃能趨時盡利順性命之理則繫辭焉以命之不可已也易傳新安朱氏曰小險大易各随所向本義問卦有小大舊説謂大畜小畜大過小過如此則只説得四卦曰看来只是好底卦便是大不好底卦便是小如復如泰如大有如夬之類是好底卦如睽如困如小過盡不好底譬如人光明磊落底便是好人昏昧迷暗底便是不好人所以謂卦有小大辭有險易大卦辭易小卦辭險即此可見問卦有小大辭有險易陽卦為大隂卦為小觀其爻之所向而為之辭如休復吉底辭自是平易如困于葛藟底辭自是險曰這般處依約看也是恁地自是不曽見得它底透只得随衆説如所謂吉凶者失得之象一叚却是徹底見得聖人當初作易時意似這處更移易一字不得其它處不能盡見得如此所以不能盡見得聖人之心並語録右第三章新安朱氏本義曰此章釋卦爻辭之通例易與天地準故能彌綸天地之道伊川先生曰聖人作易以準則天地之道易之義天地之道也故能彌綸天地之道彌徧也綸理也在事為倫治絲為綸彌綸徧理也經説横渠先生曰易與天地準此言易之書也易行乎其中造化之謂也言彌綸範圍此語必夫子所造彌者彌縫補綴之義綸者往来經營之義易之為書與天地準易即天道獨入於爻位繫之以辭者此則歸於人事葢卦本於天道三隂三陽一升一降而變成八卦錯綜為六十四分而有三百八十四爻也因爻有吉凶動静故繫之以辭存乎教誡使人動則觀其變而玩其占其出入以度内外使知懼又明於憂患與故无有師保如臨父母聖人與人撰出一法律之書使人知所向避易之義也易説廣平游氏曰彌之使不虧其體則覆燾者統元氣持載者統元形陽敷而能生隂肅而能成夫是之謂彌綸之使无失其叙則日月代明寒暑迭運將来者進成功者退夫是之謂綸易説白雲郭氏曰自此别為一章至鬼神之情狀且天地至大也人居其中則備三才易之為書三才之道也是以一卦之中皆備三才之象故與天地準準則其道彌綸周滿天地而无有餘不足之差故天地人鬼无或不知者以不能外乎此故也言天地則人在其中矣易説漢上朱氏曰聖人觀天地以作易其道甚大與天地均故能用天地之道彌滿无間經綸而不絶易傳新安朱氏曰易書卦爻具有天地之道與之齊準彌如彌縫之彌有終竟聨合之意綸有選擇條理之意木義易道本與天地齊準所以能彌綸之凡天地間之物无非易之道故易能彌綸天地之道而聖人用之也彌如封彌之彌糊合便无縫罅綸如綸絲之綸自有條理言雖是彌得外面无縫罅而中則事事物物各有條理彌如大徳敦化綸如小徳川流彌而非綸則空踈无物綸而非彌則判然不相干此二字見得聖人下字甚密也凡天地有許多道理易上都有所以與天地齊準而能彌綸天地之道並語録仰以觀於天文俯以察於地理是故知幽明之故伊川先生曰徧理天地之道而復仰觀天文俯察地理驗之著見之跡故能知幽明之故在理為幽成象為明知幽明之故知理與物之所以然也經説横渠先生曰天文地理皆因明而知之非明則皆幽也此所以知幽明之故萬物相見乎離非離不相見也見者由明而不見非无物也乃是天之至處彼異學則皆歸之空虚葢徒知乎明而已不察夫幽所見一邊耳氣聚則離明得施而有形氣不聚則離明不得施而无形方其聚也安得不謂之有方其散也安得遽謂之无故聖人仰觀俯察但云知幽明之故不云知有无之故盈天地之間者法象而已文理之察非離不相覩也方其形也有以知幽之故方其不形也有以知明之故並易説白雲郭氏曰由易之道仰觀俯察則天地幽明之故无不知幽則天地之道其隠者也明則天地之道其顯者也易説漢上朱氏曰天氣也而成文地形也而有理形散為氣明而幽也氣聚成形幽而明也仰觀乎天凡地之成形者莫不有是文俯察乎地凡天之成象者莫不具是理故分而為二揲之以四生二儀四象八卦成三百八十四爻萬有一千五百二十䇿皆源於天極知此則知幽明之故也易傳新安朱氏曰此窮理之事以者聖人以易之書也易者隂陽而已幽明死生鬼神皆隂陽之變天地之道也天文則有晝夜上下地理則有南北髙深本義問本義云天文則有晝夜上下地理則有南北髙深不知如何曰晝明夜幽上明下幽觀晝夜之運日月星辰之上下可見此天文幽明之所以然南明北幽髙明深幽觀之南北髙深可見此地理幽明之所以然天文是陽地理是隂然各有隂陽天之晝是陽夜是隂日是陽月是隂地如髙屬陽下屬隂平坦屬陽險阻屬隂東南屬陽西北屬隂幽明便是隂陽觀文察理以至知鬼神之情狀皆是言窮理之事直是要知得許多然後謂之窮理並語録原始反終故知死生之説伊川先生曰原究其始要考其終則可以見死生之理經説原始則足以知其終反終則足以知其始死生之説如是而已矣故以春為始而原之其必有冬以冬為終而反之其必有春死生者其與是類也暢潜道録原始要終故知死生之説人能原始知得生理便能要終知得死理若不明得便雖千萬般安排著亦不濟事劉元承手編原始反終故知死生之説但窮得則自知死生之説不湏將死生便做一箇道理求入關語録夫子曰未知生焉知死知生則知死矣能原始則能要終矣荅謝岩兩疑難横渠先生曰海水凝則冰浮則漚然冰之才漚之性其存其亡海不得而與焉推是足以究死生之説易謂原始要終故知死生之説者謂原始而知生則求其終而知死必矣此夫子所以直季路之問而不隠也並正䝉龜山楊氏曰天地之間一氣而萬形一息而成古今達觀之士㑹物於一已通晝夜而知則雖死生之變恒矣又曰古之大學之道必先明天徳知天徳則死生之説鬼神之情狀當自見矣是道也聖人詳言於易不必徇邪説而外求也與陸思仲書屏山劉氏曰望室而知四隅者必超室表舉輿而知輕重者必在輿外游生死而知其終始者必踐形理也魂魄之變茫昧莫測豈可情識猜揣哉知之必有道也畏生死者未逹也逹者不畏焉不畏者猶未能踐形也常流乎四勝之間何謂四勝或曰存亦樂亡亦樂是齊生死也或曰聚則有散則无是泯生死也或曰名立不朽没而愈光是輕生死也或曰安時俟命力不可為是任生死也齊泯輕任是四勝也簾窺壁聽髣髴未真姑立言廣意以勝之終為生死所囿昔夫子讀易三絶韋編於是原始要終知死生之説其於乾坤之藴幽明之故鬼神之情狀如目辨蒼素手數竒耦也然當時弟子㣲言奥義問荅多矣季路一發問夫子拒之學者遂謂吾儒所急修已治人而已三綱五常而已身外之事何足預窮哉是知聽夫子之言而不知求夫子之心也死生亦大矣聖人豈忽之哉負手曳杖逍遥而歌往来之際湛然如此非平日有見焉不能也所以不切切言之者懼學者守易曉之空言而不聞至精至賾之道也故曰朝聞道夕死可矣是夫子雖不切切言之而常誨人以生死之大方也屏山集白雲郭氏曰在人則原形氣之始反形氣之終其死生之説尢為易知故謂幽明之故者以事理言死生則可説者也易説漢上朱氏曰聚而為有生之始也散而入无生之終也始終循環死生相續聚散之理也以八卦觀之一變者卦之始也謂之一世六變者卦之終也謂之游魂七變而反者卦體復也謂之歸魂始者生也終者死也反則死而復生故知此則知死生之説也易傳新安朱氏曰原者推之於前反者要之於後本義人未死如何知得死之説只是原其始之理將後面摺轉来看便見得以此之有知彼之无問反字如何曰推原其始而反其終謂如方推原其始初却摺轉一摺来如回頭之義是反回来觀其終也並語録精氣為物遊魂為變是故知鬼神之情狀康節先生曰精氣為物形也遊魂為變神也又曰精氣為物體也遊魂為變用也鬼神者无形而有用其情狀可得而知也於用則可見之矣若人之耳目鼻口手足草木之枝葉華實顔色皆鬼神之所為也福善禍淫主之者誰邪聰明正直有之者誰邪不疾而速不行而至任之者誰邪皆鬼神之情狀也並觀物外篇伊川先生曰聚為精氣散為遊魂聚則為物散則為變觀聚散則見鬼神之情狀萬物始終聚散而已鬼神造化之功也經説問世言鬼神之事雖知其无然不能无疑懼何也曰此只是自疑爾曰如何可以曉悟其理曰理㑹得精氣為物遊魂為變與原始要終之説便能知也湏是於原字上用工夫或曰遊魂為變是變化之變否曰既是變則存者亡堅者腐更无物也鬼神之道只恁説與賢雖㑹得亦信不過湏是自得也劉元承手編問易言知鬼神情狀果有情狀否曰有之又問既有情狀必有鬼神矣曰易説鬼神便是造化也唐棣雜録横渠先生曰動物本諸天以呼吸為聚散之漸植物本諸地以隂陽升降為聚散之漸物之初生氣日至而滋息物生既盈氣日反而遊散至之謂神以其申也反之為鬼以其歸也易説又曰隂陽之氣散則萬殊人莫知其一也合則混然人不見其殊也形聚為物形潰反原反原者其遊魂為變與所為變者對聚散存亡為文非如螢雀之化指前後身而為説也正䝉龜山楊氏曰先王報本反始之義與夫觀而不薦渙萃假有廟之象則聖人所以自盡其心者於是為至非深知鬼神之情狀其孰能知之中庸解上蔡謝氏曰動而不已其神乎滯而有迹其鬼乎往来不息神也摧仆歸根鬼也致生之故其鬼神致死之故其鬼不神何也人以為神則神以為不神則不神矣知死而致生之不智知死而致死之不仁聖人所以神而明之也語録廣漢張氏曰鬼神之説合而言之来而不測謂之神往而不返謂之鬼分而言之天地山川風雷之屬凡氣之可接者皆曰神祖考祀饗于廟曰鬼就人物而言聚而生為神散而死為鬼又就一身而言魂氣為神體魄為鬼凡六經所稱葢不越是數端然一言以蔽之莫非造化之迹而語其徳則誠而已南軒集白雲郭氏曰萬物出於天地者也人與萬物皆一也由天地至精之氣鍾而為物物散而變則復於天地是鬼神之情狀雖極幽隠不過於人物聚散而已葢可得而知也故文王之於易卦具天地而爻具人位是人由天地精氣而生雖有參天地之道而无同天地之體也卦以用事而終窮而變亦猶鬼神也故人鬼之象與卦一也上言幽明之故天地也死生之説人也精氣遊魂鬼神也辨天地人鬼之理宜其同章先儒别鬼神於下章未詳其㫖易説易稱精氣為物遊魂為變是故知鬼神之情狀夫鬼神之情狀不可得而知也聖人自无入有以觀之則所以為物者如此所以為變者亦如此也是鬼神之情狀可得而知也中庸解漢上朱氏曰乾兊金也震巽木也坎水離火也坤艮土也乾震坎艮陽也坤巽離兊隂也隂陽之精五行之氣氣聚為精精聚為物得乾為首得坤為腹得震為足得巽為股得坎為耳得離為目得艮為鼻得兊為口及其散也五行隂陽各還其本故魂陽反於天魄隂歸於地其生也氣日至而滋息物生既盈氣日反而游散至之謂神以其伸也反之謂鬼以其歸也隂陽轉續觸類成形其游魂為變乎物其狀也聚散其情也故曰乾陽物也坤隂物也知此則知鬼神之情狀矣或曰太史公言儒者不言鬼神而言有物物與鬼神異乎曰人生始化曰魄既生陽曰魂至於死也體魄降而魂氣升升則无不之也魄降而氣不化者物也今人行氣中或聞鬼哭或聞鬼呼其人逢之愕然忤視俄且化矣謂誠有是而不知氣之不化者也謂鬼為物察之有不至也韓愈謂鬼無聲形是也易傳氣聚為精精聚為物形始化曰魄氣能動曰魂傳曰心之精爽是為魂魄子産曰人生始化曰魄既生陽曰魂及其散也形散而魄散氣散而魂散故季札曰魂氣則无不之也魄隂也魂陽也隂陽轉續觸類成形聚者不能無散散者不能無聚屈伸相感隂陽之變也神申也其氣聚而日息鬼歸也其氣散而日消物其形也散其情也然則氣何從生乎曰太虚者氣之本體人客形也動則聚而為氣靜則散為太虚動靜聚散有形無形其鬼神之情狀乎太史公曰儒者不言鬼神而言有物何也曰人之死也各反其根體魄隂也故降而在下魂氣陽也故升而在上升則无不之矣今也魄降而氣不化非物而何所以不化者物欲蔽之也子産曰其用物也𢎞矣其取精也多矣故聖人死曰神賢人死曰鬼衆人死曰物聖人清明在躬志氣如神故五帝配上帝傳説上比列星賢人得其所歸衆人則知富貴生而已其思慮不出於口腹之間祍席之上夸張於世以自利焉物欲蔽之不能自反其初故謂之物然物之乗間而出豈離乎五行哉五行即隂陽二端也故管輅論杜伯如意宋無忌皆以五行推之叢説新安朱氏曰隂精陽氣聚而成物神之伸也魂遊魄降散而為變鬼之歸也本義精氣為物是合精與氣而成物精魂而氣魄也變則是魂魄相離雖獨説遊魂而不言魄而離魄之意自可見矣林安卿問精氣為物遊魂為變曰此是兩箇合一箇離精氣合則魂魄凝結而為物離則陽已散而隂無所歸故為變精氣為物精隂也氣陽也仁者見之謂之仁智者見之謂之智仁陽也智隂也問尹子解遊魂一句為鬼神如何曰此只是聚散聚而為物者神也散而為變者鬼也鬼神便有隂陽之分只於屈伸往来觀之横渠説精氣自无而有遊魂自有而无其説亦分曉然精屬隂氣屬陽又自有錯綜底道理就一人之身將来横看生便帶著箇死底道理人身雖是屬陽而體魄便屬隂及其死而屬隂又却是此氣便亦屬陽葢死則魂氣上升而魄形下降古人説徂落二字極有義理便是謂魂魄徂者魂升於天落者魄降於地只就人身便亦是鬼神如祭祀求諸陽便是求其魂求諸隂便是求其魄祭義中宰我問鬼神一叚説得好注解得亦好問尹子鬼神情狀只是解遊魂為變一句即是將神字亦作鬼字看了程張説得甚明白尹子親見伊川何以不知此義曰尹子見伊川晚又性質朴鈍想伊川亦不曽與它説並語録又曰精魄也耳目之精明為魄氣魂也口鼻之嘘吸為魂二者合而成物精虚魄降則氣散魂遊而无不之矣魄為鬼魂為神禮記有孔子荅宰我之問正説此理甚詳雜書云魂人陽神也魄人隂神也亦可取横渠上蔡論此亦詳魂陽而魄隂故魂之盡曰散散而上也魄之盡曰降降而下也古人謂之徂落亦是此義今以聚而不散者為魄恐未然體魄是二物精氣為物猶言魂魂為體耳並荅呂子約書與天地相似故不違伊川先生曰以幽明之故死生之理鬼神之情狀觀之則可以見天地之道易之義與天地之道相似故无差違相似謂同也經説横渠先生曰如天地无私則於道不離然遺物而獨化又過乎大中之表也故下文曰範圍天地之化而不過曲成萬物而不遺通乎晝夜之道而知易説上蔡謝氏曰或曰意必固我有一焉則與天地不相似矣荅曰然理上怎安得箇字易曰與天地相似故不違相似猶自是語語録白雲郭氏曰自此别為一章論聖人之道至无方无體而終且聖人與天地合其徳故與天地相似天且弗違而況於人乎是以天地无違於聖人聖人亦无違於天地也或謂易與天地相似易非特相似而已相似者謂人道也易説漢上朱氏曰生蓍立卦生爻三者準天地也自此以下言彌綸天地之道易與天地準天地无一物不體有違於物則與天地不相似與天地相似故不違此言易之時也易傳新安朱氏曰與天地相似故不違上文言易之道與天地相似此言聖人之道與天地準也惟其人不違所以與天地相似若此心有外則與天地不相似矣此下數句皆是與天地相似之事也上文易與天地準下數句皆易與天地準之事也此一句汎説下面知周乎萬物至道濟天下是細宻底工夫知便直要周乎萬物无一物之遺道直要濟天下並語録知周乎萬物而道濟天下故不過伊川先生曰義之所包知也其義周盡萬物之理其道足以濟天下故无過差經説今語道則須待要寂滅湛靜形便如槁木心便如死灰豈有直做牆壁木石而謂之道所貴乎智周天地萬物而不遺又㡬時要如死灰所貴乎動容周旋中禮又㡬時要如槁木論心術無如孟子也只謂必有事焉今既如槁木死灰則却於何處有事呂與叔東見録横渠先生曰未能周萬物則必有過過失也君子立法必其智周天下之利害而其道又足以濟天下然後不過過失也智周萬物道濟天下然後不錯若不如此或得於彼則或失於此也天惟運動一氣鼓萬物而生无心以恤物聖人則有憂患不得似天天地設位聖人成能聖人主天地之物又智周乎萬物而道濟天下必也為之經營不可以有愛付之无憂易説儒者則因明致誠因誠致明故天人合一致學而可以成聖得天而未始遺人易所謂不遺不流不過者也正蒙以有限之心止可求有限之事欲以致博大之事則當以博大求之知周乎萬物而道濟天下也經學理窟白雲郭氏曰聖人以周物為知以濟天下為道未嘗私一身而周濟之也故能與天地相似其道雖大而不為過者以此上言與天地相似猶中庸所謂參天地也此言智周乎萬物而道濟天下猶中庸所謂非自成已而已也所以成物也易説漢上朱氏曰性者萬物之一源知性則知天知天則知物无非我者故智周乎萬物智周乎萬物而不知以道濟天下則過矣惟智周萬物而道濟乎天下故不過此言易之體也易傳新安朱氏曰此聖人盡性之事也天地之道知仁而已知周萬物者天也道濟天下者地也知且仁則知而不過矣本義知周乎萬物便是知幽明生死鬼神之理問本義云知周萬物者天也道濟天下者地也是如何曰此與後叚仁者見之謂之仁知者見之謂之知又自不同此以清濁言彼以動靜言智是先知得較虚故屬之天道濟天下則普濟萬物實惠及民故屬之地並語録旁行而不流伊川先生曰旁通逺及而不流失正理經説横渠先生曰旁行不流圓神不倚也易説白雲郭氏曰聖人應天下之變一以易道而已故雖委曲旁通而未嘗逐物流移適則用之過則棄之而已所以和而不流也葢亦曲能有誠之義易説漢上朱氏曰道濟天下酬酢萬變其道旁行散徙流而不反徇物而喪已亦過矣故道濟天下旁行而不流此言易之用也易傳新安朱氏曰旁行者行權之知也不流者守正之仁也本義問旁行而不流曰此小變而不失其大常然前後却有故字又相對此一句突然易中自時有恁地處頗難曉知周萬物是體旁行是可與權乃推行處下面樂天知命是自得處三節各説一理旁行不流言其道旁行而不流於偏也並語録樂天知命故不憂明道先生曰樂天知命通上下而言之也聖人樂天則不湏言知命知命者知有命而信之者爾不知命无以為君子是矣命者所以輔義一循於義則何庸斷之以命哉若夫聖人之知天命則異於此仁者不憂樂天者也並劉絢師訓仁者在已何憂之有凡不在已逐物在外皆憂也樂天知命故不憂此之謂也若顔子簞瓢在他人則憂而顔子獨樂者仁而已朱公掞問學拾遺伊川先生曰順乎理樂天也安其分知命也順理安分故无所憂經説横渠先生曰聖人樂天故合内外而誠其仁正蒙白雲郭氏曰聖人不能无憂而此言不憂者葢聖人之憂在道而其所不憂者在身樂天則无偽知命則无欲憂者偽欲之所生无偽无欲无適而非天則憂无自而至也此言天者孟子所謂知性則知天之天也此言命者孟子所謂有命焉之命也中庸言天命之謂性亦是道也故此言樂天知命説卦言窮理盡性至於命及中庸孟子之言其道皆一致中説竊聖人之言曰樂天知命吾何憂窮理盡性吾何疑其言似也其道非也且言樂天知命吾何憂雖未大失然其意以窮通為命矣至言窮理盡性其失逺矣夫窮理盡性聖人之事非特去疑而已其與樂天知命相為終始未易以憂疑為辨也語曰知者不惑不惑則无疑矣況窮理盡性聖人之事乎聖人之无疑久矣至於盡已之性盡人之性盡物之性又豈无疑而已哉文中子不明此務為心迹之説反覆其言不過於一身憂疑而止耳蓋不知知周乎萬物而道濟天下以窮理盡性之説者也故區區於心迹之間終不能遺一身而觀之是之謂不知道易説漢上朱氏曰道之行否有命窮亦樂通亦樂不以天下累其心故不憂此言易之貞也易傳新安朱氏曰既樂天理而又知天命故能无憂而其知益深本義問樂天知命云通上下言之又曰聖人之知天命則異於此某竊謂樂天知命便是説聖人曰此一段亦未安樂天知命便是聖人異者謂與不知命無以為君子自别旁行不流樂天知命故不憂此兩句本皆是知之事蓋不流便是貞也不流是本旁行是應變處无本則不能應變能應變而无其本則流而入變詐矣細分之則旁行是知不流屬仁其實皆是知之事對下文安土敦乎仁故能愛一句專説仁也並語録安土敦乎仁故能愛伊川先生曰安土安所止也敦乎仁存乎同也是以能愛經説横渠先生曰安土樂其所自生忠厚之道也易説安所遇而敦仁故其愛有常心有常心則物被常愛也樂天安土所居而安不累於物也並正蒙白雲郭氏曰安土常人之情聖人之治因之而已固不能從已之欲也能因其所安而安之而後可以敦乎仁敦乎仁則愛道廣矣所謂仁者愛人也愛者好生之徳也易説漢上朱氏曰安土者所遇而安也雖所遇而安亦未嘗一日忘天下篤於仁者也故能愛此言易正而亨也易傳新安朱氏曰随處皆安而无一息之不仁故能不忘其濟物之心而仁益篤葢仁者愛之理愛者仁之用故其相為表裏如此本義問安土敦乎仁故能愛曰此是與上文樂天知命對説樂天知命是知崇安土敦仁是禮卑安是随所居而安在在處處皆安若自家不安何以能愛敦只是篤厚去盡己私全是天理更无夾雜充足盈滿方有箇敦厚之意只是仁而又仁敦厚於仁故能愛惟安土敦仁則其愛自廣安土者随所寓而安若自擇安處便只知有已不知有物也此厚於仁者之事故能愛也安土敦乎仁故能愛聖人説仁是恁地説不似江西人説知覺相似此句説仁最宻並語録又曰安土者随所遇而安也敦乎仁者不失其天地生物之心也安土而敦乎仁則無適而非仁矣所以能愛也仁者樂山之意於此可見荅何鎬範圍天地之化而不過曲成萬物而不遺通乎晝夜之道而知故神无方而易无體康節先生曰神者易之主也所以无方易者神之用也所以无體又曰神无方而性有質並觀物外篇明道先生曰範圍天地之化而不過者模範出一天地爾非在外也如此曲成萬物豈有遺哉冬寒夏暑隂陽也所以運動變化者神也神无方故易无體若如或者别立一天謂人不可以包天則有方矣是二本也並劉絢師訓伊川先生曰範圍俗語謂之模量模量天地之運化而不過差委曲成就萬物之理而无遺失通晝夜闔闢屈伸之道而知其所以然如此則得天地之妙用知道徳之本源所以見至神之妙无有方所而易之準道无有形體經説範圍天地之化天本廓然无窮但人以目力所及見其寒暑之序日月之行立此規模以窺測它天地之化不是天地之化其體有如城郭之類都盛其氣假使言日升降於三萬里不可道三萬里外更无物又如言天地升降於八萬里中不可道八萬里外天地盡學者要黙體天地之化如此言之甚與天地不相似其卒必有窒礙入關語録通乎晝夜之道而知晝夜死生之道也暢潛道録横渠先生曰過則溺於空淪於靜既不能存其神又不能知夫化矣大抵過則不是著有則是著无聖人自不言有无諸子乃以有无為説説有无斯言之陋也在易則惟曰神神則可以兼統通乎晝夜之道而知不偏滯於晝夜之道故曰通知神无方而易无體繫辭言易大概是語易書制作之意其言易无體之類則是天易也神易雖是一事方與體雖是一義以其不測故言无方以其生生故言无體然則易近於化並易説母意必固我然後範圍天地之化大人者有容物无去物有愛物无徇物天之道然天以直養萬物代天而理物者曲成而不害其直斯盡道矣義以反經為本經正則精仁以敦化為深化行則顯義入神動一靜也仁敦化靜一動也仁敦化則无體義入神則无方日月相推而明生寒暑相推而嵗成神易无方體一隂一陽隂陽不測皆所謂通乎晝夜之道也不知来物不足以利用不通晝夜未足以樂天體不偏滯乃可謂无方无體偏滯於晝夜隂陽者物也若道則兼體而无累也以其兼體故曰一隂一陽又曰隂陽不測又曰一闔一闢又曰通乎晝夜語其推行故曰道語其不測故曰神語其生生故曰易其實一物指事異名爾大率知晝夜隂陽則能一性命能知性命則能知聖人知鬼神彼欲直語太虚不以晝夜隂陽累其心則是未始見易未始見易則雖欲免隂陽晝夜之累末由也已易且不見又烏能更語真際舎真際而談鬼神妄也晝夜者天之一息乎寒暑者天之晝夜乎天道春秋分而氣易猶人一寤寐而魂交魂交成夢百感紛紜對寤而言一身之晝夜也氣交為春萬物糅錯對秋而言天之晝夜也神无方易无體大且一而已爾並正蒙廣平游氏曰範之使有常則日月无薄食陵谷无遷易四時常若風雨常均若此者範之者也圍之使无踰則春无淒風秋无苦雨冬无愆陽夏无伏隂若此者圍之者也或曰伊川序易曰随時變易以從道然則易與道為二乎曰神无方而易无體易者道之用也既已渉於用矣且得无從乎惟其變易而不離於道斯可名於无體矣若春作夏長秋歛冬藏皆神之所為也神之所為異於人為者以其從道而已此四時之所以不忒也老子曰道法自然亦即人所見以明道也先生之意正欲使學易者知變易之必從道則用不詭於易矣並易説廣漢張氏曰範圍天地之化而不過曲成萬物而不遺通乎晝夜之道而知故神无方而易无體此言聖人事而結之以神无方而易无體亦猶中庸述仲尼之徳而結之以此天地之所以為大也神无方言其妙萬物而无不在也易无體言其變易而不窮也聖人之功用是乃神之无方易之无體者也葢與之无間矣南軒集又曰天地之化隂陽之氣也萬物隂陽之形也晝夜隂陽之理也此三者不外乎隂陽惟易則能隂能陽故无體神則隂陽不測故无方聖人盡神易之道故於天地之化能範圍之萬物能曲成之晝夜之道能通之會通龜山楊氏曰通乎晝夜之道而知則人鬼死生當源源自見初无二致也故問事鬼神告以事人問死告以知生所以發乎子路之問而不隠也葢聖人之言常近矣探索之則賾隠存焉語解中以形道之體和以顯道之用致中則範圍而不過致和則曲成而不遺中庸解白雲郭氏曰聖人以一人之身固不能範圍天地之化然所謂範圍者為之有制而已天地之化有時而過者在彼聖人範圍之制无傷財害民之失則所過在彼而制其過者在聖人是猶泰所謂財成天地之道也曲成萬物而不遺者盡人之性盡物之性生成而无夭傷无所遺焉所謂輔相天地之冝也易言晝夜之道最為難明夫幽明隠顯也晝夜之道非幽明之故也昏極則生晝明極則生夜猶隂之生陽柔之變剛動極而靜皆有道以運之而變於是乎生變者有象運者无形由有象則可以知无形由晝夜隂陽剛柔動靜則可以知道故曰通乎晝夜之道而知通乎晝夜則隂陽剛柔其類舉可知也以人事言之則盛衰治亂進退存亡得喪孰非晝夜之道乎故有範圍之道以參天地有曲成之道以育萬物通乎晝夜之道則寂然不動感而遂通天下之故矣非聖人極天下之至神其孰能與於此先儒或以範圍為犯違誤矣經言神易道聖人凡有四者之異且神无自神其在道則道之神也在易則易之神也在聖人則聖人之神也神寓於道易聖人而道易聖人各有其名不謂之神此神所以无方也易有體者書也書之為體者卦象也書以卦象為體卦象未立而是道具有及其既立則曰卦也曰象也不得復謂之易如此則易為无體矣然聖人範圍曲成通乎晝夜豈无自而能然哉葢用易无體之道以盡无方之神而後能之也如是則神也易也託聖人以為方體耳故以是終之並易説漢上朱氏曰範圍者防範之所圍夫子所謂矩莊周所謂大方天地之化者氣也氣之推移一息不留故謂之化善養其氣者大配天地不違也不過也不流也雖憂樂以天下而適乎大中至正之矩故不過不過者不過乎中也横渠謂非也絶物而獨化是也此言易之中正也不過故能盡已之性能盡已之性則能盡物之性曲成者順萬物之理成之者非一方也天之生物也直聖人相天而曲成之不害其為直此言中正之成物也曲成萬物而不遺乃能无一物不體與天地相似與時偕行矣晝夜者隂陽也推乎晝夜隂陽之道而通之則知幽明知死生知鬼神非盡已之性盡物之性者不能也故通乎晝夜之道而知隂陽兩也兩者合一而不測者神也不測則无方剛柔雜居而相易者用也相易則无體易傳新安朱氏曰此聖人至命之事也範如鑄金之有模範圍匡廓也天地之化无窮而聖人為之範圍不使過於中道所謂裁成者也通猶兼也晝夜即幽明生死鬼神之謂如此然後可見至神之妙无有方所易之變化无有形體也本義問範圍天地之化而不過曰天地之化滔滔無窮如一爐金汁鎔化不息聖人則為之鑄寫成器使入模範匡廓不使過於中道也曲成萬物而不遺此又是就事物之分量形質随其大小闊狹長短方圓无不各成就此物之理无有遺闕範圍天地是極其大而言曲成萬物是極其小而言範圍如大徳敦化曲成如小徳川流問範圍天地之化而不過如天之生物至秋而成聖人則為之斂藏人之生也欲動情勝聖人則為之教化防範此皆是範圍而使之不過之事否曰範圍之事闊大此亦其一事也今且就身上看如何或曰如視聴言動皆當存養使不過差此便是否曰事事物物無非天地之化皆當有以範圍之就喜怒哀樂而言喜所當喜怒所當怒之類皆範圍也能範圍之不過曲成之不遺方始見得這神无方易无體若範圍有不盡曲成有所遺神便有方易便有體矣通乎晝夜之道而知既曰通又曰知似不可曉然通是兼通若通晝不通夜通生不通死便是不知便是神有方易有體了通字只是兼乎晝夜之道而知其所以然大抵此一章自易與天地準以下只是言箇隂陽仁者見之謂之仁仁亦屬陽知者見之謂之知知亦屬隂此就人氣質有偏處分隂陽如繼之者善成之者性便於造化流行處分隂陽神无方而易无體神便是忽然在隂又忽然在陽底易便是或為隂或為陽如為春又為夏為秋又為冬交錯代換而不可以形體拘也神自是无方易自是无體方是四方上下神却或在此或在彼故云无方易无體者或自隂而陽或自陽而隂无確定底故云无體自與那其體則謂之易不同各自見説一箇道理若恁地滚將来説少間都説不去它那箇是説上天之載無聲無臭其體則謂之易這只是説箇隂陽動靜闢闔剛柔消長不著這七八箇字説不了若喚做易只一字便了易是變易隂陽无一日不變无一時不變莊子分明説易以道隂陽要看易湏當恁地看事物都是那隂陽做出来並語錄東萊呂氏曰或問範圍天地伊川訓為模量何也荅曰只縁天地无外易説右第四章新安朱氏本義曰此章言易道之大聖人用之如此合訂刪補大易集義粹言卷七十
