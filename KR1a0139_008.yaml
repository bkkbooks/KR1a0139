body:
  text: 合訂刪補大易集義粹言卷六頭等侍衛納喇性徳編文言曰坤至柔而動也剛至静而徳方後得主而有常含萬物而化光坤道其順乎承天而時行伊川先生曰坤道至柔而其動則剛坤體至靜而其徳則方動剛故應乾不違徳方故生物有常隂之道不唱而和故居後為得而主利成萬物坤之常也含容萬類其功化光大也主字下脱利字坤道其順乎承天而時行承天之施行不違時賛坤道之順也易傳禹不矜不伐至柔也然乃見剛徳至大至剛以直此三者不可闕一闕一便不是浩然之氣如坤所謂直方大是也但坤卦不可言剛言剛則害坤體然孔子於文言又曰坤至柔而動也剛方即剛也門人因問見李籲録明道語中却與先生説别解至剛處云剛則不屈則是至剛已帶却直意又曰以直道順理而養之則是以直字連下句在學者著工夫處説却先生曰先兄無此言便不講論到此舊嘗令學者不要如此編録纔聽得轉動便别舊曽看只有李籲一本无錯編者它人多只依説時不敢改動或脱忘一兩字便大别李籲却得其意不拘言語往往録得却是不知尚有此語只剛則不屈亦未穩當楊遵道録横渠先生曰屈信動靜終始各自别今以剛柔言之剛何當无靜柔何嘗无動坤至柔而動也剛則柔亦有剛靜亦有動但舉一體則有屈信動靜終始乾行不妄則坤順必時也效法故光並易傳白雲郭氏曰坤雖以柔靜為主苟无方剛之徳不足以含𢎞光大後得主而有常矣含萬物含𢎞也化光光大也所謂其靜也翕其動也闢也然而要坤之至以順承天而行以時而已此重明卦彖之意易説漢上朱氏曰至柔至靜者坤之體也動而剛方者坤之用也方亦剛也以其不可易言之謂之方其體則坤用則随乾觀其所動而坤之順徳見矣含萬物而生之者隂含陽也𤣥曰天鬱化精地隠魄榮隠所謂含萬物也及其化生品物咸章保厥昭陽坤道乃光坤之光即乾之光大也𤣥曰天炫炫出于无畛熿熿出于无垠炫炫熿熿所謂化光也坤道至矣一言可盡其順矣乎天動地随其行有時故承天而時行易傳新安朱氏曰坤至柔剛方釋牝馬之貞也方謂生物有常後得主而有常程傳曰主下當有利字含萬物而化光復明亨義坤道其順乎復明順承天之義此以上申彖傳之意本義問坤至柔而動也剛至靜而徳方程傳云坤道至柔而動則剛坤體至靜而徳則方柔與剛相反靜與方疑相似何也先生曰靜无形方有體方謂生物有常言其徳方正一定確然不易而生物有常也靜言其體則不可得見方言其徳則是其著也坤至柔而動也剛坤只是承天如一氣之施坤則盡能發生承載非剛安能如此未有乾行而坤止此説是且如乾施而坤不應則不能生物既㑹生物便是動若不是它健後如何配乾只是健得來順坤以簡能坤最省事更无勞攘也即承受那乾底生將出來它生將物出來便見得是動隂若只是一箇順如何配陽而生物並語録積善之家必有餘慶積不善之家必有餘殃臣弑其君子弑其父非一朝一夕之故其所由來者漸矣由辯之不蚤辯也易曰履霜堅冰至蓋言順也伊川先生曰天下之事未有不由積而成家之所積者善則福慶及於子孫所積不善則災殃流於後世其大至於弑逆之禍皆因積累而至非朝夕所能成也明者則知漸不可長小積成大辯之於蚤不使順長故天下之惡无由而成乃知霜冰之戒也霜而至于一无于字冰小惡而至于一无于字大皆事勢之順長也易傳康節先生曰漁夫謂樵夫曰人之所謂親莫如父子也人之所謂疏莫如路人也利害在心則父子過路人逺甚父子之道天性也利害或奪之已非天性者矣夫利害之移人如是之深也可不慎乎路人之相逢則過之固无相害之心焉无利害在前故也有利害在前則路人與父子又奚擇焉路人之能相交以義又何况父子之親乎夫義者讓之本也利者爭之端也讓則有仁爭則有害何相去之逺也堯舜亦人也桀紂亦人也人與人同而仁與害異爾仁因義而起害由利而生利不以義則臣弑其君者有焉子弑其父者有焉豈若路人之相逢一日而交袂於中逵者哉邵子外書横渠先生曰餘慶餘殃百祥百殃與中庸必得之義同善者有後不善者无後理當然其不然者亦恐遲晚中閒譬之瘠之或秀腴之或不秀然而不直之生也幸而免遇外物大抵適然耳君子則不恤惟知有義理易説白雲郭氏曰坤之初六非積善之象而文言先及積善者因明善不善皆在所積知不善之不可積則善為可積矣聖人貴夫蚤辯者慮馴致之易長耳所以坤之徳以柔而剛靜而方為至蓋非剛非方則一於順皆馴致之道必不能蚤辯故也易説漢上朱氏曰善不善之報必有餘者馴而不已積之既乆則末流必多乾坤是也家言臣子也坤積至五子弑父臣弒君離日坎月自下而進非一朝一夕之故其所由來者漸矣辯之不蚤其禍至此矧不辯乎先儒嘗以乾坤論之謂君子之道有時而消於是有隂化陽滅者矣然而復出為震者餘慶之不亡也小人之道有時而消於是有陽息隂盡者矣然而極姤生巽者餘殃猶在也觀諸天道月之生死晦盡而生明既滿而或虧先儒餘慶餘殃之論為不誣矣是故有虞之子不肖而陳齊永祚商辛之後有國而禄父再亡易傳新安朱氏曰古字順慎通用案此當作慎言當辯之於微也本義隂陽皆自微至著不是隂便積著陽便合下具足此處亦不説這箇意履霜堅冰只是説那微時便須着慎來所以説蓋言慎也由辯之不蚤辯李光祖云不蚤辯它直到得郎當了却方辯剗地激成事來此説最好語録東萊吕氏曰坤之初六一隂始生之時聖人所以發明見微知著之理大抵善者陽之類惡者隂之類也凡小人女子皆是隂之類初六一隂初生初長之時在人一身論之則邪志初萌之時在天下時勢論之則小人女子初生初長之時當其初生初長正如九月肅霜去堅冰之時甚逺然而履霜須便知堅冰之必至須是蚤為之戒象曰履霜堅冰隂始凝也馴致其道至堅冰也履霜時隂始凝聚大抵邪心惡念與小人女子之類不可使凝聚將萌將長時便斬絶消蕩才凝聚便漸漸馴致直至堅冰地位欲觀此爻須看履字蓋纔踏便覺也看得履字則非心邪念發時便覺看得凝字則非心邪念便須消散看得馴字則知履霜堅冰勢所必至臣之於君子之於父本是至親至義至於弑君弑父時雖甚惡人安能一日做成皆由漸漸養成積乆貫熟然後有弑君弒父之事使辯之蚤何由至此所以幾微之間十分當辯辯之不蚤便是弑君弑父之漸易曰履霜堅冰至蓋言順也此一句尤可警非心邪念不可順養將去順養去時直至弑父與君如飲酒初時一兩盃順而不止必至沈湎殺身如鬭毆初時只是忿疾若順忿疾將去必至操刀殺人今世俗所謂縱性者即順之謂也在大有所謂遏惡揚善在損所謂君子以懲忿窒慾不順之之謂也大抵非心邪念若順將去何所不至懲治遏絶正要人著力易説積善之家必有餘慶積不善之家必有餘殃善如何得積惡如何得不積肉羶則蟻集醯酸則蚋聚若胸中有容著善處善自然積胸中无容著惡處惡自然不積履霜堅冰至蓋言順也大抵惡念惡事最不可順它譬如忿怒若順將去必至於殺人飲酒若順將去必至於沈湎紀聞直其正也方其義也君子敬以直内義以方外敬義立而徳不孤直方大不習无不利則不疑其所行也明道先生曰學者不必逺求近取諸身只明人理敬而已矣便是約處易之乾卦言聖人之學坤卦言賢人之學惟言敬以直内義以方外敬義立而徳不孤至於聖人亦止如是更无别途吕與叔束見録孟子曰仁也者人也合而言之道也中庸所謂率性之謂道是也仁者人此者也敬以直内義以方外仁也若以敬直内則便不直矣行仁義豈有直乎必有事焉而勿正則直也夫能敬以直内義以方外則與物同矣故曰敬義立而徳不孤敬以直内義以方外合内外之道也釋氏内外之道不備者也並劉絢師訓敬義夾持直上達天徳自此古之人耳之於樂目之於禮左右起居盤盂凡杖有銘有戒動息皆有所養今皆廢此獨有理義之養心耳但存此涵養意乆則自熟矣敬以直内是涵養意言不莊不敬則鄙詐之心生矣並李籲師説伊川先生曰直言其正也方言其義也君子主敬以直其内守義以方其外敬立而一作則内直義形而一作則外方義形於外非在外也敬義既立其徳盛矣不期大而大矣徳不孤也无所用而不周无所施而不利孰為疑乎易傳敬以直内有主於内則虚自然无非僻之心如是則安得不虚必有事焉須把敬來做件事著此道最是簡最是易又省工夫為此語雖近似常人所論然持之一本有乆字必别有言未感時知如何所寓曰操則存舍則亡出入无時莫知其鄉更怎生尋所寓只是有操而已操之之道敬以直内也帥氣者在志養志者在直内切要之道无如敬以直内人心不能不交感萬物亦難為使之不思慮若欲免此一本无此四字唯是心一作在人有主如何為主敬而已矣有主則虚虚謂邪不能入无主則實實謂物來奪之今夫瓶甖有水實内則雖江海之浸无所能入安得不虚无水於内則停注之水不可勝注安得不實大凡人心不可二用用於一事則它事更不能入者事為之主也事為之主尚无思慮紛擾之患若主於敬又焉有此患乎所謂敬者主一之謂敬所謂一者无適之謂一且欲涵泳主一之義一則无二三矣一作不一則二三矣言敬无如聖人之言一无聖人之言四字易所謂敬以直内義以方外須是直内乃是主一之義至於不敢欺不敢慢尚不愧于屋漏皆是敬之事也但存此涵養乆之自然天理明敬只是主一也主一則既不之東又不之西如是則只是中既不之此又不之彼如是則只是内存此則自然天理明學者須是將一本无此字敬以直内涵養此意直内是本主一无適敬以直内便有浩然之氣浩然須要實識得它剛大直不習无不利並入闗語録問人有專務敬以直内不務方外何如曰有諸中者必形諸外唯恐不直内内直則外必方周行已録問敬義何别曰敬只是持己之道義便知有是有非順理而行是為義也若只守一箇敬不知集義却是都无事也且如欲為孝不成只守着一箇孝字須是知所以為孝之道所以侍奉當如何温清當如何然後能盡孝道也又問義只在事上如何曰内外一理豈特事上求合義也問人敬以直内氣便能充塞天地否曰氣須是養集義所生積集既乆方能生浩然氣象人但看所養如何並劉元承手編中心斯須不和不樂則鄙詐之心入之矣此與敬以直内同理謂敬為和樂則不可然敬須和樂只是中心沒事也敬以直内則須君則是君臣則是臣凡事如此犬小大直截也並吕與叔東見録君子慎獨敬以直内義以方外所以為克己復禮也克己復禮則事事皆仁故曰天下歸仁焉李籲師説坤六二文言云云坤道也誠為統體敬為用敬則内自直誠合内外之道則萬物流形故義以方外朱公掞問學拾遺敬以直内義以方外與徳下孤一也為善者以類應有朋自逺方來充之至於塞乎天地皆不孤也㳺氏拾遺心敬則内自直胡氏拾遺敬立則无妄无妄則禮也語解横渠先生曰敬以直内則不失於物義以方外則得已敬義一道也敬所以成仁也蓋敬則實為之實為之故成其仁易説上蔡謝氏曰釋氏所以不如吾儒无義以方外一節義以方外便是窮理釋氏却以理為障礙然不可謂釋氏无見處但見了不肯就理諸公不須尋見處但且敬與窮理敬以直内義以方外然後成徳故曰不孤語録廣平㳺氏曰多識前言往行而考古以驗今者學也耳目不交於物而悉心以自求者思也思則知敬以直内而中有主學則知義以方外而外有主語解龜山楊氏曰易曰君子敬以直内義以方外夫盡其誠心而无偽焉所謂直也若施之於事則厚薄隆殺一定而不可易為有方矣敬與義本无二所主者敬而義則自此出焉故有内外之辨其實義亦敬也故孟子之言義曰行吾敬而已京師語録兼山郭氏曰慎獨之道何為哉君子敬以直内義以方外其如斯而已矣何謂敬主一之謂敬何謂主一孟子曰必有事焉之謂也必有事焉則上天之載可以馴致之也中庸解和靖尹氏曰黄纓問庸言之信庸行之謹與直方大為輕重相反荅云造次顛沛必於是非聖人孰能知此又寛問易稱義以方外先生曰此須以體用言之便分明敬義本體也直其内也方其外也方只是用又謂是直方大足以盡地道後數日寛再問寛近日思此意恐不得分作三字説義理如何先生請設喻寛曰至如火才見火明照熱皆具矣何必分先生曰是也寛一日又問寛以謂順理為直不易為方先生首肯先生令再喻曰如見水便清潤流並語録白雲郭氏曰直以言六二之正也方以言六二之義也以敬為正而直内盡處中之道矣又以義而方外是以能居興事造業之任也直内則中立不倚君子所以正其心方外則和而不流君子所以措諸事業内外並立則大徳不孤矣虞舜夔夔齋慄直内之敬也温恭允塞方外之義也五典克從百揆時叙无所往而不利故不疑其所行也易説漢上朱氏曰敬者操持其誠心而弗敢失也二動以直敬以直内也直内言内省不疚其理直也方者義之不可易也有所不為有所不行也二往之五義以方外也誠者合内外之道内直外方敬義立矣敬義立則相應相與其徳不孤放諸四海而準以直方大也爻動為行巽為不果二動震見巽伏不習无不利則不疑其所行也上曰中則直此言直其正何也曰正而不中者有矣中則正矣易傳新安朱氏曰直其正此以學言之也正謂本體義謂裁制敬則本體之守也直内方外程傳備矣不孤言大也疑故習而後利不疑則何假於習本義敬以直内義以方外直是直上直下胸中无纎毫委曲方是割截方整之意問敬以直内義以方外曰説只恁地説須自去下工夫方見得是如此敬以直内是无纎毫私意胸中洞然徹上徹下表裏如一義以方外是見得是處決定是恁地不是處決定不恁地截然方方正正須是自將去做工夫若實是把做工夫只是敬以直内義以方外八箇字一生受用不窮景紹問敬義之説荅曰敬是立己之本義是處事截然方正各得其宜道夫曰敬以直内義以方外莫是合内外之道否曰乆之則内外自然合又問敬以直内後便能義以方外還是更用就上做工夫曰雖是如此也須是先去敬以直内然後能義以方外忠信所以進徳是乾健工夫蓋是剛健粹精兢兢業業日進而不自已如活龍然精彩氣燄自有不可及者直内方外是坤順工夫蓋是固執持守依文案本底做將去所以為學者事也又云説易只是隂陽説乾坤只是健順如此議論更无差錯問忠信所以進徳修辭立誠所以居業這是知得此理後全无走作了故直㧞恁地勇猛剛健做將去便是乾道資敬義夾持之功不敢有少放慢這便是坤道曰意思也是恁地但乾便帶了箇知底意思帶了箇健底意思所謂進徳又是他心中已得這箇道理了到坤便有箇順底意思便只蒙乾之知更不説箇知字只説敬義夾持做去底已後事問敬以直内若无義以方外也不得然所謂義以方外者只是見得這箇道理合當恁地便只斬截恁地做將去否曰見不分曉則圎後糊塗便不方了義以方外只那界限使分明四面皆恁平正敬義只是一事如兩脚立定是敬才行是義合目是敬開眼見物便是義敬義夾持直上逹天徳自此表裏夾持更无東西走作去處上面只有箇天徳忠信所以進徳修辭立其誠所以居業者乾道也敬以直内義以方外坤道也只是健順又曰非禮勿視聽言動者乾道出門如見大賔使民如承大祭者坤道又曰但看進徳立誠是甚麽様强健因説敬恕先生舉明道語云敬義夾持直上達天徳自此今有一様人裏面謹嚴外面却麤直有人外面恁地寛恕裏面却都是私意了内外夾持如有一人在裏面把住一人在門外把住不由它不上去問君子敬以直内義以方外伊川謂主一之謂敬无適之謂一而不涵義之意則須于應事接物問无往而不主一則義亦在其中矣如此則當明敬中有義義自敬中出之意方好荅曰亦不如此説主一之謂敬只是心専一不以它念亂之每遇事只與至誠專一做去即是主一之義但既有敬之名則須是還它敬字既有義之名則須是還它義字二者相濟則无失此乃理也若必欲并合謂義自敬中出則聖人何不只言敬字便了既又言義字則須與尋義字意始得問坤六二直方大先生云伊川只管説聖人發明坤爻之義這箇不是恁地聖人作易只是説這箇道理合恁地人依得這箇時便不習无不利這箇便是就來占底人身上説問至大至剛以直何以不言至直吕與叔云剛大二字意恐已足不須直字如合有直須略明三者之别則乃見不可闕之實不知此意何如竊謂以坤六二言之則敬以直内故行无不慊于心義以方外則无適而不宜敬義立而徳不孤則充塞乎天地之間所以為大也大也者道之體也三者闕一則不足為浩然之氣矣先生曰直方大是坤六二之三徳敬以直内義以方外敬義立而徳不孤是以人體之之事猶元亨利貞乾之四徳而文言又以君子體仁以下之事明之也浩然之氣乃天地之正氣至大至剛以直是其本然之體段養而无害則塞乎天地敬義立而徳不孤也然所謂塞乎天地亦全其本然之大而已蓋氣是有形體之物志至而氣次焉猶乾健而坤順也志乾氣坤蓋其徳與坤六二同其序不同者自觀者而言則先見其大觸之而後知其剛循之而後知其直自有者而言則直而方方而大坤爻本體有之者也孟子指以語人觀之者也道夫問前所説敬義誠者三今思之敬以直内義以方外是箇交相養之理至于誠則合一矣先生曰誠則是實有此理如實于為敬實于為義皆是誠不誠則是无此所以中庸謂不誠无物因問舊嘗聞有人問不誠无物先生荅曰秉彛不存謂之无人可也中和不存謂之无禮樂可也還是先生所言否曰不記有无此語只如此説也却无病劉問敬以直内義以方外仁也如何這處便謂之仁曰㑹到私欲淨盡天理流行處皆可謂之仁如博學篤志切問近思能如是則便可為仁如克己復禮亦是仁出門如見大賔使民如承大祭亦是仁居處恭執事敬與人忠亦是仁看從那路入做到極處皆是仁方未有事時只得説敬以直内若事物之來當辨别一箇是非不成只管敬去敬義不是兩事敬者守於此而不易之謂義者施於彼而合宜之謂並語録隂雖有美含之以從王事弗敢成也地道也妻道也臣道也地道无成而代有終也明道先生曰天地日月一般月受日光而不為之虧然月之光乃日之光也地氣不上騰則天氣不下降天氣降而至於地地中生物者皆天氣也唯无成而代有終者地之道也劉絇師訓伊川先生曰為下之道不居其功含晦其章美以從王事代上以終其事而不敢有其成功也猶地道代天終物而成功則主於天也妻道亦然易傳白雲郭氏曰隂能含美則能從事蓋坤之徳含𢎞為先也地道妻道臣道皆坤之道也无成代終含美俟用而已易傳漢上朱氏曰天地之間萬物粲然而陳者皆陽麗于隂託之以為美者也陽盡則隂之惡畢見不能自美矣然隂雖有陽之美當含蓄之以從王事待時而發不有已也豈敢當其成功哉乾巽從王事也地道无成順天而行乾知大始坤代有終自然之道也故臣終君之事妻終夫之事不言子者臣子一也易傳天地變化草木蕃天地閉賢人隠易曰括囊无咎无譽蓋言謹也明道先生曰或問如何斯可謂之恕心答曰充擴得去則為恕心如何是充擴得去底氣象曰天地變化草木蕃充擴不去時如何曰天地閉賢人隠上蔡語録伊川先生曰四居上近君而无相得之義故為隔絶之象天地交感則變化萬物草木蕃盛君臣相際而道亨天地閉隔則萬物不遂君臣道絶賢者隠遯四於閉隔之時括囊晦藏則雖无令譽可得无咎言當謹自守也易傳横渠先生曰造化所成无一物相肖者以自知萬物衆多其實无一物无隂陽者以是知天地變化二端而已正蒙上蔡謝氏曰或問忠恕答曰猶形影也无忠做恕不出來己所不欲勿施於人施諸己而不願亦勿施諸人説得自分明恕如心而已恕天道也伯淳曰天地變化草木蕃是天地之恕天地閉賢人隠是天地之不恕朱問天地何故亦有不恕曰天無意天因人者也若不因人何故人能與天為一故有意必固我則與天地不相似語録廣平㳺氏曰蓋言順也言順於勢也葢言謹也言順於命也坤至柔而動也剛至靜而徳方則用順亦必有所處如齊之田氏魯之三桓晉之六卿其勢之馴致必至於不可解夫胡可以用順邪此初六之堅冰所以明用順之弊也天地閉賢人隠則伏其身而弗見閉其言而不出藏其智而不發唯恐其不謹如鄉鄰有鬭者被髪纓冠而往救之則非所以為謹矣此六四之括囊所以明用順之善也夫順何尤哉順性命之理而已苟順性命之理安徃而不善易説白雲郭氏曰天地交感則賢人出而萬物亨天地閉隔則賢人隠而萬物不遂此自然之理非必天地不交否之時為然也君臣之道不合則為閉矣賢人之徳不彰則為隠矣括囊葢欲其自謹之耳易説漢上朱氏曰泰之時天地變化草木亦蕃而况人乎否之時天地閉塞賢人亦隠而况草木乎三才一理也是故併言之括囊无咎非閉其言而不出葢言謹也謹者莊子所謂慎為善也隂進至三成否否泰反其類故其言如此易傳新安朱氏曰或問如乾初九潛龍是象勿用是占辭坤六五黄裳是象元吉是占辭甚分明至若坤初六履霜堅冰至六二直方大不習无不利六三含章可貞或從王事无成有終上六龍戰于野其血𤣥黄皆是舉象而占意已見於象中此又别是一例如何先生曰象占例不一有占意只見于象中者亦自可見如乾初九坤六五此至分明易見者如直方大惟直方故能大所謂敬義立而徳不孤六二有直方大之象占者有此徳而得此爻則不習而无不利矣言不待學習而无不利也故謂直方大為象不習无不利為占辭亦可然直方故能大故不習无不利象既如此占者亦不離此意矣六三隂居陽位為是隂帶些陽故為含章之象又貞以守則為隂象矣或從王事者以居下卦之上不終含藏故有或時出從王事之象无成有終者不居其成而能有終也在人臣用之則為不居其成而能有終之象在占者用之則為始進无成而能有終也此亦占意已見於象中者六四重隂不中故有括囊之象无咎无譽亦是象中已見占意因問程易云六四近君而不得於君為上下間隔之時與重隂不中二説如何先生曰只是重隂不中故當謹宻如此語録東萊吕氏曰天地變化草木蕃天地閉賢人隠人與天地萬物同是一氣泰則見否則隠猶春生秋落氣至即應間不容髪初不待思慮計較也若謂相時而動則已作兩事看所以獨稱賢人隠者蓋衆人强自隔絶故與天地之氣不相通氣至而覺者獨賢人而已紀聞君子黄中通理正位居體美在其中而暢於四支發於事業美之至也伊川先生曰黄中文居中也君子文中而達於理居正位而不失為下之體五尊位在坤則唯一作故唯取中正之義美積於中而通暢於四體發見於事業徳美之至盛也易傳君子不成章不達易曰美在其中暢於四支成章之謂也劉元承手編横渠先生曰正位居體所以應黄裳之美易説廣平㳺氏曰美在其中而暢於四支發於事業則周公其人也故曰公孫碩膚赤舄几几公之大美發於事業者既孫而不處其暢於四支者睟然見於動容周旋皆盛徳神明之容不可得而形容也徒見其赤舄几几而已赤舄几几四體不言而喻也黄中通理者養徳性之源而通至理也正位居體者正為臣之位而居坤體也通理云者非謂其見彼也自見而已非謂其聞彼也自聞而已故宅於心者至虚而明居體云者處靜而无倡也禀其令而已處順而无作也續其終而已故守其身者至柔而恭内外交相養則美在其中粹然无疵矣故見於面盎於背施於四體四體不言而喻此暢於四支所以為美之至也致天下之大利成天下之大順功髙而朝不忌任重而上不疑此發於事業所以為美之至也古之人有體是道者吾於周公見之矣周公既有大美而不居則所可得而形容者道徳之氣神明之容而已故曰赤舄几几蓋暢於四支者然也東人欲其留西人欲其歸而名實孚於上下不可掩也故曰徳音不瑕蓋發於事業者然也公之碩膚若是而不與有焉則其為美之至可知也坤之六二地逺於君諸侯之位也故言敬以直内義以方外而以其動者言之所以為大也六五地近於君公卿之位也故言黄中通理正位居體而以其靜者言之所以為美也為臣之義於是兩盡並易説白雲郭氏曰君子有至美之徳能通天下之理故可以正君之位居君之體而徳與位稱也是以近而暢於四支大而發於事業見於四方萬里之逺者无非在中之美徳也充之足以保四海是為美徳之至夫聖人治天下國家之道必本於正心修身之微是以六五君子之發於事業者蓋由在中之美能通天下之理而已易説漢上朱氏曰坤五黄中動而成坎傳所謂坤之比也坎為通有美在中而通於理理者中正也天地萬物之所共由者也通於理則大美具矣美在其中矣五君位六變九正位也正位而居坤體不失為臣之道黄裳也九五艮艮為手二五相易成震震為足暢於四支也巽為事業者事之成發於事業也誠則形形則不可掩故美在其中暢於四支發於事業通於理者无徃而不通其伊尹周公共伯和之事乎易傳新安朱氏曰黄中言中徳在内釋黄字之義也正位言雖在尊位而居下體釋裳字之義也美在其中復釋黄中暢於四支復釋居體本義問黄裳元吉伊川解作聖人示戒並舉女媧武后之事今考本爻无此象這又是象外立教之意否先生曰不曉這意若伊川要立議論教人則可去别處説不可硬配在易上説此爻何曽有這義都是硬入這意來説所以説得絮了因舉邵溥堯夫之孫謂伊川因宣仁垂簾事有怨母后之意故此爻義特為它發固是它後生妄測度前輩然亦因此説而發也問坤二五皆中爻二是就盡得地道上説五是就著見於文章事業上説否先生曰不可説盡得地道它便是坤道也二在下方是就工夫上説如不疑其所行是也五得尊位則是就它成就處説所以云美在其中而暢於四支發於事業美之至也並語録隂疑於陽必戰為其嫌於无陽也故稱龍焉猶未離其類也故稱血焉夫𤣥黄者天地之雜也天𤣥而地黄伊川先生曰陽大隂小隂必從陽隂既盛極與陽偕矣是疑於陽也不相從則必戰卦雖純隂恐疑无陽故稱龍見其與陽戰也于野進不已而至於外也盛極而進不已則戰矣雖盛極不離隂類也而與陽爭其傷可知故稱血隂既盛極至與陽爭雖陽不能无傷故其血𤣥黄𤣥黄天地之色謂皆傷也易傳康節先生曰坤无一故无首乾无十故无後所以坤當是得一半又曰東北非隂之位隂柔到此既䘮其朋自立脚不得必須歸本位故終有慶又曰坤是柔順故先迷而䘮朋然行故却得而有慶焉不可分為二今姑分以見其義白雲郭氏曰上六之戰无龍以明之則不知其與陽戰也為其嫌於无陽而言戰也故稱龍焉蓋俱隂无戰故也因其稱龍故稱血因其稱血故稱𤣥黄從其類而言此周公爻辭之大法也天𤣥而地黄蓋天地隂陽兩傷之意也易説漢上朱氏曰月盛則掩日臣彊則疑君隂疑于陽必戰十月純坤用事而稱龍者天地未嘗一日而无陽亦未嘗一日而无君子為其純隂嫌于无陽也故稱龍焉乾在故也上六之動坤成乾其體剥剥者復之反震變也十一月復復初九庚子子坎之位坎為血震為𤣥黄血幽隂也上六疑陽未離隂類故稱血焉震者天地之一交天𤣥而地黄𤣥者坎中之陽黄者離中之隂天地之雜也其血𤣥黄者君臣相傷也雖欲力勝莫之助也故聖人於初六戒之上六則无及已鄭本作為其兼于陽也故稱龍焉或問初之四二之五三之上六爻反復相應何也曰京房所傳世應也三畫之卦一二三重為六爻四即初五即二上即三各以其類相應邵雍曰有變必有應也變乎内者應乎外變乎外者應乎内變乎下者應乎上變乎上者應乎下本乎天者親上本乎地者親下變之與應常反對也故卦一世者四應二世者五應三世者上應四世者初應五世者二應六世者三應在易言應者一十有九卦昔之言應如子太叔論迷復凶是也至虞翻始傳其秘然未盡善繫辭曰變動不居周流六虚上下无常則柔相易世應者相易之一也故曰兩則化一則神易傳新安朱氏曰疑謂鈞敵而无小大之差也坤雖无陽然陽未嘗无也血隂屬蓋氣陽而血隂也𤣥黄天地之正色言隂陽皆傷也此以上申象傳之意本義或問坤卦純隂不為无陽之説如何曰雖是十月為坤十一月為復然自小雪後其下面一畫便有三十分之一分陽生至冬至方足得一爻成耳故十月謂之陽月葢嫌於无陽也自姤至坤亦然曰然則陽畢竟有盡時曰剥盡於上則復生於下其間不容息語録合訂刪補大易集義粹言卷六
