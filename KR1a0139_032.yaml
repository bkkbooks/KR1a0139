body:
  text: 合訂刪補大易集義粹言卷三十頭等侍衛納喇性徳編乾下艮上伊川先生曰大畜序卦有无妄然後可畜故受之以大畜无妄則為有實故可畜聚大畜所以次无妄也為卦艮上乾下天而在於山中所畜至大之象畜為畜止又為畜聚止則聚矣一有又字取天在山中之象則為藴畜取艮之止乾則為畜止止而後有積故止為畜義易傳東萊吕氏曰序卦有无妄然後可畜故受之以大畜畜養也若无此理又何所養有无妄然後可畜此最為學之要无妄則有誠誠立方可涵養畜聚也使誠不立則涵養者何物將何以為畜也伊川曰止則聚矣纔止則自然有聚書曰允懐于兹道積于厥躬允誠也懐于兹者已止於此矣然後道始能積又中庸曰不誠无物惟誠然後有物惟无妄然後内充實而有主故可以畜於内若有妄安能畜哉惟无妄然後中有主自是畜之至於篤實輝光可也並易説又曰有无妄然後可畜荀子養心莫善於誠之語未瑩己丑課程大畜利貞不家食吉利涉大川伊川先生曰莫大於天而在山中艮在上而止乾於下皆藴畜至大之象也在人為學術道徳充積於内乃所畜之大也凡所畜聚皆是專言其大者人之藴畜宜得正道故云利貞若夫異端偏學所畜至多而不正者固有矣既道徳充積於内宜在上位以享天禄施為於天下則不獨於一无於字一身之吉天下之吉也若窮處而自食於家道之否也故不家食則吉所畜既大宜施之於時濟天下之艱險乃大畜之用也故利涉大川此只據大畜之義而言彖更以卦之才徳而言諸爻則惟有止畜之義盖易體道隨宜取明且近者易傳藍田吕氏曰大畜據其所自得也雖以隂畜陽而一陽在上尚賢之義也大有所畜止乎剛健惟大正然後利小有不正莫能正也大畜天禄也當與賢者共之不家食不敢私也廣平游氏曰説者以大畜為君畜臣夫賢者易禄而難畜而盛徳之士盖有君不得而臣者恐無畜大賢之理如以為所畜者非成徳之彦則不足以當所尚之賢而非所謂止健也且攬羣材而並用之故重道輕禄者不足以自髙宜莫如堯舜而童牛之牿豶豕之牙徒取於私欲不行豈聖君之盛徳曾何健之止乎又以不家食為聖人能養賢以及萬民不待家食而民被其養矣然自古養萬民者藉令不知為政亦无家食之理況大畜尚賢之卦也其畜道之成亦曰何天之衢亨未及言養民也恐不須生此義易説白雲郭氏曰健天徳也能止天徳其畜大矣惟天為大惟堯則之堯之止健也不識不知順帝之則文王之止健也天何言哉四時行焉百物生焉孔子之止健也能止之則畜而有之矣為大利為大貞上合天徳内之所畜也不家食以養賢外之所畜也外内止健而畜之其於濟難也何有无妄動以天大畜止天徳畜之所以能動也而序卦言有无妄而後可畜者是亦无妄言不利有攸往之義也然則畜之而後能動者又大畜言利涉大川之義也二卦相終始而後其道大備易説新安朱氏曰大陽也以艮畜乾又畜之大者也又以内乾剛健外艮篤實輝光是以能日新其徳而為畜之大也以卦變言此卦自需而來九自五而上以卦體言六五尊而尚之以卦徳言又能止健皆非大正不能故其占為利貞而不家食吉也又六五下應於乾為應乎天故其占又為利涉大川也不家食謂食禄於朝不食於家也本義東萊吕氏曰大畜利貞不家食吉利涉大川我所養既大然後可以受爵禄當患難若未有所養而欲出為世用亦危矣所畜者既大而不正則反為學者之害所謂學非而博者也言語足以動人文章足以聳衆不正則反為害不如空无所有之人雖欲害物亦不能為大害故利於正有如是之人所畜者大而又正則是道全徳備充足飽滿可以有為於世而亦天下之仰望者也故不家食則吉而利涉大川以濟險也是聖人敎人斟酌量力然後進而有為畜既正而家食則凶畜不正而不家食亦凶惟畜正故不家食則得其位行其道致君澤民而天下被其利故吉涉大川則其才能可以濟危難而天下安故利易説彖曰大畜剛健篤實輝光日新其徳剛上而尚賢能止健大正也不家食吉養賢也利涉大川應乎天也伊川先生曰剛健篤實輝光以卦之才徳而言也乾體剛健艮體篤實人之才剛健篤實則所畜能大充實而有輝光畜之不已則其徳日新也剛上陽居上也陽剛居尊位之上為尚賢之義止居健上為能止健之義止乎健者非大正則安能以剛陽在上與尊尚賢徳能止至健皆大正之道也大畜之人所宜施其所畜以濟天下故不食於家則吉謂居天位享天禄也國家養賢賢者得行其道也利渉大川謂大有藴畜之人宜濟天下之艱險也彖更發明卦才云所以能涉大川者以應乎天也六五君也下應乾之中爻乃大畜之君應乾而行也所行能應乎天无艱險之不可濟況其它乎並易傳横渠先生曰剛健篤實日新其徳乃天徳也強學者往往心多好勝必无心處一乃善也定然後始有光明唯能定已是光明矣若常移易不定何求光明易大抵以艮為止止乃光眀時止時行動静不失其時其道光明謙天道下濟而光眀天在山中大畜君子以剛健篤實輝光日新其徳定則自光明故大學定而至於能慮人心多則无由光明陽卦在上而上九又在其上故曰剛上而尚賢並易説廣平游氏曰柔得位而上下應之小者之畜也古之人有行之者若仲山甫之於宣王是也故詩人稱之曰柔嘉維則又曰衮職有闕惟仲山甫補之剛上而五承之能止健大者之畜也古之人有行之者若伊尹之於太甲是也故髙宗稱之曰先正保衡作我先王則補衮之闕不足道也夫人主之利勢固能利害而擅生殺矣可不謂健已乎非有大人之正徳終始惟一者孰能止之昔之辨士盖有能變亂名實而使其君虚己以聽之至於疏間親新間舊言聽計從无不遂其意者其術智亦足以畜其君矣而君子惡之為其不正耳此大畜所以言其利貞也大人在上則天下利見而野无遺賢矣羣賢畢進則涖天職而食於朝此所謂不家食也羣賢不家食則禮義立而政事修財用足而百志成萬邦咸寧吉孰大焉亦何難之不濟乎故曰利涉大川當是時命有徳討有罪无容心焉天理而已矣故曰應乎天也易説兼山郭氏曰易之稱大者凡四卦皆以賢為主大有有賢之卦也大畜畜賢之卦也大壯大者之壯大過大者之過老子曰域中有四大而王居一焉則王之為大者以賢為大也故其辭曰剛上而尚賢能止健大正也利涉大川應乎天者謂二五也六五才不足而位有餘疑不可以濟難唯能應乎天无行險以徼幸之心是以必濟也而説者謂挾衆為助其未優乎易説健為天徳大畜止健畜天徳也故彖曰剛健篤實輝光日新其徳不能畜天徳則見於有為者不能无妄故天徳止於大畜而動於无妄也序卦曰有无妄而後可畜是為交相養之道則知无妄者動亦无妄静亦无妄而大畜一於止矣大畜圖白雲郭氏曰卦之才能止健故内能成剛健篤實之徳發於事業者又輝光而日新也剛健篤實猶中庸所謂至誠輝光所謂誠則形形則著著則明也日新所謂悠乆无疆也好剛者常不能下人蓋有剛強不撓之才非有徳故也大舜樂取於人以為善所謂有徳者也書以𤣥徳稱之𤣥徳天徳也故剛上而尚賢者必止健得天徳之大正者能之非有天徳之大者不能也賢不家食禄之也書曰惟賢非后不食盖古之人不仕无禄則耕耕而食之家食也仕而得禄以代耕則不耕不耕則非家食也至於孟子所謂廪人繼粟庖人繼肉皆養賢大烹之道不必人君蚤暮哺啜之也二五之應以艮應乾止乾之健而畜之其於涉大川為餘事盖有剛徳可以涉難尚賢可以涉難大畜兼之故涉大川優為之矣易説漢上朱氏曰剛健乾也篤實艮也大畜者大壯九四變也一變為需再變為大畜需有坎離相合發為輝光進而上行成艮互有兊震兊西震東日所出入日新其徳也剛健則不息篤實則悠乆兩者合一畜而為徳動而有光其光輝散又日新无窮進而不已自畜其徳者也故曰剛健篤實輝光日新其徳此合乾艮兩體而又推大壯之變以言大畜也剛賢者也大壯再變九四之剛進居君位之上賢者置之上位六五以柔下之尚賢也三陽自内而往難畜者也剛健篤實輝光日新其徳自畜其徳矣又尊賢忘勢剛上而尚賢具此五者然後能止畜其健大正也大正乃天下國家之利君子當在上小人當在下正也初九九三當位二五相易而正大者正也所以大畜者以其利於大者正故曰剛上而尚賢能止健大正也此以上九在上六五九二相易以言大畜之利正也剛上而尚賢尊之也尊之而不與之共天位治天職食天禄賢者不可得而畜也三在上體順養賢也二在内為家兊為口食六五尊徳樂道下交九二九二受畜而往應之不家食也王公之尊賢而又養之賢者如是而食則吉正也非獨一身之吉天下之吉不然分國與之視猶錙銖也故曰不家食吉養賢也此以二三四五言大畜賢者止而受養也上能止健賢者止而食乃能得盡其心與之犯難而不辭兊為澤決之為大川震變兊成坎艮震足艮指而越坎涉大川也乾為天五天位巽為命天命有徳者為萬民也六五下應乾九二之五大畜止健賢者不家食應乎天而行何險難之不濟哉故曰利涉大川應乎天也此再以二五言大畜養賢之功在卦氣為白露故太𤣥準之以積易傳龜山楊氏曰艮止也乾健也一陽在上能止健大者畜也與小畜異矣剛健篤實乾徳也畜之於内則輝光日新所畜亦大矣此天在山中之象也剛上而尚賢能止健言上九也剛居一卦之上與三合志則乾道上行矣尚賢也尚賢止健非大者正其孰能之所以利正也然尚賢而不與之共天位食天禄非尚賢之義也故不家食乃吉五居尊位而應乎乾應乎天也應天而時行則无往不濟矣故利涉大川易説新安朱氏曰剛健篤實輝光以卦徳釋卦名義大正也以卦變卦體卦徳釋卦辭養賢也亦取尚賢之象應乎天也亦以卦體而言本義能止健却不説健而止見得是艮來止這乾篤實便有輝光艮止便能篤實某作本義欲將文王卦辭只大綱依文王本義略說至其所以然之故却於孔子彖辭中發之且如大畜利貞不家食吉利涉大川只是占得大畜者為利正不家食而吉利於涉大川至於剛上尚賢等處乃孔子發明各有所主爻象亦然如此則不失文王本意又可見孔子之意但今未暇整頓耳語録東萊吕氏曰彖剛健篤實此四字最為根本惟剛健篤實故能輝光日新其徳自有光輝之理剛上而尚賢能止健大正也夫難畜者莫難於至健之物若柔弱之人則易為畜矣是以止健必先有剛健篤實及尚賢之徳然後可也惟其止得住是大正也乾之健天下之至健也无一物能加之今也為上九所止者以其所尚者賢而大正也大正者理也天下之健物莫能止惟理可以止之不家食吉養賢也此與卦之繇辭不同卦言有如是之人不家食而出而有為則吉盖以其人所畜者大則可以施為也凡人有餘於己則可以施於世矣故乾之初九則勿用聖人於彖恐人以不家食為賢者之吉則必求所以不家食者故又從而發明其義夫賢者之進退去就自有時命本无可喜可憂者若以不家食便為吉則非賢者之所養矣故繼之曰養賢也言此者係國家之吉也非賢者之吉也以為如是之人能使之不家食舉而在位此人君所以養賢而吉也利涉大川應乎天也常人之濟危難必用私意小智以求濟也聖人則不然順天理之自然而已湯武是也若涉難而不順天意是取敗之道也易説象曰天在山中大畜君子以多識前言往行以畜其徳伊川先生曰天為至大而在山之中所畜至大之象君子觀象以大其藴畜人之藴畜由學而大在多聞前古聖賢之言與行考跡以觀其用察言以求其心識而得之以畜成其徳乃大畜之義也易傳陳瑩中答呉國華書天在山中便是芥子納須彌之義先生謂正南北説却須彌无體芥子无量楊遵道録横渠先生曰博文約禮猶至著入至簡故可使不得叛而去温故知新多識前言往行以畜徳繹舊業而知新盖思昔未至而今至縁舊所見聞而察來皆其義也正蒙且滋養其明明則求經義將自見矣又不可徒養須觀他前言往行便畜得已徳若要成徳須是速行之學不長者无它術唯是與朋友講治多識前言往行以畜其徳非禮勿言非禮勿動即是養心之術也苟以前言往行為无益自謂不能明辨是非則是不能居仁由義自棄也決矣學者既知此心且擇所安而行之已不愧疑則闕之更多識前言往行以養其徳多聞闕疑多見闕殆而今方要從頭整理將前言往行常合為一有不合自是非也人能不疑便是徳進盖己於大本處不惑雖未加工思慮必常在此積乆自覺漸變學者惡其自足足則不復進並經學理窟藍田吕氏曰莫大於天而在山中所畜至大者也君子修身以畜徳之要好古敏以求之見賢而思齊者也龜山楊氏曰君子多識前言往行非徒資見聞而已所以畜徳也畜徳則所畜大矣易説易曰君子多識前言往行以畜其徳孟子曰博學而詳説之將以反説約也世之學者欲以雕繪組織為工誇多鬬靡以資見聞而已故摭其華不茹其實未嘗畜徳而反約也彼亦烏用學為哉孟子解和靖尹氏曰伊川易傳大畜所謂考跡以觀其用察言以求其心孟子曰博學而詳說之將以反說約也大凡學問須要約之於己方有用處如前言往行若只是多識不能畜以成己之徳何畜者又嘗讀易至无妄大畜有自得處舉伊川曰觀言所以識其心觀行所以識其用不識後如何畜得並語録白雲郭氏曰髙髙在上者天之體也而天道无乎不在其在人亦莫不有之皆自失之耳且以山言之一山必不畜天之大也而畜天之道則為有餘在人亦然故君子欲多識前聖之言以知天之徳何如而可畜也欲多識往聖之行以見天之徳何如而可畜也是以稽其言考其行如是而畜之則天徳盡在是矣故能畜其徳也其徳者謂剛健篤實輝光日新之天徳也此所以為大畜也與且識孔子之言曰天何言哉四時行焉百物生焉則知天之徳以是而畜之也識惟天為大惟堯則之則見天之徳以是而可畜也故知帝堯孔子之言行如此是為多識前言往行矣所以能畜其徳也然自其不可名而言之則曰天道自其可名而言之則曰天徳其實一也畜以徳為本故大畜言畜其徳小畜言懿文徳能畜天徳斯能行天道矣易説漢上朱氏曰天在山中以人所見為象猶言水中觀天也聖人論天地日月皆以人所見言之天大无外而在山中其所畜大矣内卦兑口前言也外卦震為行往行也二隂四陽陽為多大畜自大壯來一變需離為目識前言也再變大畜識往行也徳者剛健多識前言往行故能考跡以觀其用察言以求其心而畜其徳矣夫以方寸之地觀萬世之變塗之人而上配堯禹非多識之其能畜乎易傳新安朱氏曰天在山中不必實有是事但以其象言本義又先生謂鄭光弼曰書雖是古人書今日讀之所以畜自家之徳却不是欲這邊讀得些便要般去做那邊用易曰君子以多識前言往行以畜其徳公今却是讀得一書便做得許多文字馳騁跳躑心都不在裏面如此讀書終不干自家事語録東萊吕氏曰天在山中大畜天至大也而在山中此大畜也以形迹論之山安能畜天今且以近者論之則知有此理且人之心一方寸間其編簡所存千古之上八荒之間皆能留藏則知天在山中為大畜有此理也君子觀此則多識前言往行以畜其徳於古聖賢之言行考跡以觀其用察言以求其心如是而後徳可畜也不善畜者盖有玩物喪志者矣易説初九有厲利己象曰有厲利己不犯災也伊川先生曰大畜能一作艮止畜乾也故乾三爻皆取被止一作止之為義艮三爻皆取止之為義初以陽剛又健體而居下必上進者也六四在上畜止於己安能敵在上得位之勢若犯之而進則有危厲故利在己而不進也在它卦則四與初為正應相援者也在大畜則相應乃為相止畜上與三皆陽則為合志盖陽皆上進之物故有同志之象而无相止之義有危則宜已不可犯災危而行也不度其勢而進有災必矣並易傳横渠先生曰趨其應則有二三之阻故不若己也易説廣平游氏曰且賢者之畜君亦必有道焉量而後入信而後諫不量而入則將至於失身未信而諫則君必以為謗已故初則有厲而利己易説龜山楊氏曰剛健而上行乾徳也然陽微而居一卦之下為上所畜有厲也進則犯災矣故利己易説漢上朱氏曰己先儒讀作已矣之己王弼作己今從先讀三陽務進初九剛健之始六四柔得位當止畜之地不度而進處位不當危厲之道也不如己而受畜則利夫不受畜而往危實自取不曰眚而曰災者初九正也大畜之時宜止而往雖正亦厲故曰災子夏傳曰居而待命則利往而違上則厲初往四成離離有伏坎故曰犯災不直曰災也易傳白雲郭氏曰天道上行今居下焉有難畜之象惟聖人則安而畜之賢人則利而畜之中人之才則勉強而畜之必不使有失於天徳也失天徳則納諸陷阱其危可立而待然人雖知危之可畏而不知危之為利知危之可畏者不知反身修徳之道也知危之為利者盖以危而修徳則无犯災之理反所以為己之利也故古人之以宴安為酖毒如此則有厲為利己明矣畜徳之初盖有出於勉強知之而未必好之者故因有厲而畜其徳也如艮之九三為力止之道則曰厲薰心同意若夫聖人則安不忘危存不忘亡治不忘亂盖其修徳不繫乎有厲无厲是以其身常安而國家可保故曰有始有卒者其惟聖人乎初九不足以與此利己者非若利吾身之利盖誠利於治己也易説新安朱氏曰乾之三陽為艮所止故内外之卦各取其義初九為六四所止故其占往則有危而利於止也本義東萊吕氏曰初九陽欲上進為上六四所止是知有厲則利在己而己己則不犯患難也以剛健之才而處於初又乾健在下其欲向前而上進者何如哉然當大畜之時為艮四所止則是屈抑而不能伸也故有厲凡人之有剛健之才則其向進之心毅然有不可犯者今為艮四所止則其心愈躁而不能堪且將決裂四出而後已故聖人戒之以利己凡人在我雖剛而時之所不可苟不顧而強求之則其犯災也必矣易説九二輿說輹象曰輿說輹中无尤也伊川先生曰二為六五所畜止勢不可進也五據在上之勢豈可犯也二雖剛健之體然其處得中道故進止无失雖志於進度其勢之不可則止而不行如車輿脫去一有其字輪輻謂不行也輿説輹而不行者盖其處得中道動不失宜故无過尤也善莫善於剛中柔中者不至於過柔耳剛中中而才也初九處不得中故戒以有危宜已二得中進止自无過差故但言輿說輹謂其能不行也不行則无尤矣初與二乾體剛健而不足以進四與五隂柔而能止時之盛衰勢之強弱學易者所宜深識也並易傳横渠先生曰不阻於三則見童於四不躁進者位中也易説藍田吕氏曰輿說輻則車敗不可行也輿說輹輹車軸缚也則不駕而已車體猶完九二以剛居中自全不進非若小畜九三與四力競至於敗也廣平游氏曰二則輿說輹二得中矣有剛中之徳有載上之才猶有待而後行非不欲行也道合則從不可則去此中无尤之道也易説龜山楊氏曰五居尊位與二為應能止健者也二以剛中為上所畜雖欲上行不可得也故曰輿說輹言不行也以其得中故无尤易説白雲郭氏曰人心操則存捨則亡古人之必求其放心而後謂之學者以不能操其心而止之則不能畜徳故也畜之初未能力也畜之中則不得不力止之矣故九二有輿說輹中无尤之辭焉輿說輹盖必止不行之象止而說之則不失其中故无尤不能説而止雖中亦尤也孔子絶四曰毋意毋必毋固毋我雖孔子之聖亦必絶而毋之然後天徳可存而孔子乃能配天況衆人乎故貳過遷怒皆放心之小者顔子未嘗有焉亦可謂庶㡬畜天徳者矣此中庸所以言愼獨君子戒慎乎其所不睹恐懼乎其所不聞然後天命之性可使不失不然則物交物而引之驅而納諸罟擭陷阱之中矣至孟子則曰我四十不動心盖亦說輹之道也易説漢上朱氏曰輻當作輹王弼注作輹坤為輿自三以上為震震為木輿下横木輹也二不動兊毁折之輿說輹也不動未正宜有尤兊為口尤之者也然遇畜而止說輹不進知以不動為中是以无尤故曰中无尤也初剛正也二剛中也四五柔也柔能畜剛剛知其不可犯而安之時也夫氣䧺九軍者或屈於賔贊之儀才盖一世者或聽於委裘之命故曰大畜時也易傳新安朱氏曰九二亦為六五所畜以其處中故能自止而不進有輿說輹之象也本義東萊吕氏曰九二與六五為正應然九二恃剛陽之才必於上進是剛健之人正欲放縱有為之時也然上為六五制之而不得去是輿說輹之義也有所畏而止之以免災者初九是也无所畏知其不可過剛而止者二也二以剛而居乎中見其時之不可而自止焉以居乎中故曰輿說輹言能度其宜見其不可自說其輿輹而不行也故象曰中无尤易説九三良馬逐利艱貞曰閑輿衛利有攸往象曰利有攸往上合志也伊川先生曰三剛健之極而上九之陽亦上進之物又處畜之極而思變也與三乃不相畜而志同相應以進者也三以剛健之才而在上者與合志而進其進如良馬之馳逐言其速也雖其進之勢一作志速不可恃其才之健與上之應而忘備與慎也故宜艱難其事而由貞正之道輿者用行之物衛者所以自防當自一无自字日常閑習其車輿與其防衛則利有攸往矣三乾體而居正能貞者也當其鋭進故戒以知難與不失其貞一作正也志既鋭於進雖剛明有時而失不得不誡也九三所以利有攸往者以與在上者合志也上九陽性上進且畜已極故不下畜三而與一有三字合志上進也並易傳横渠先生曰不防輿衛而進歴二隂則或有童牿說輹之害不利其往也本乎天者親上故上合志也易説藍田吕氏曰九三為上九所畜畜極而通天衢已亨可以馳逐而无阻故曰良馬逐然不可以不戒故利艱貞戒之之道不可以不豫習故曰閑輿衛曰命之也閑習也輿衛習則馬不駭以是馳逐宜无不利而又上志獲通則无往不合廣平游氏曰九二輿說輹至於三位髙而近君矣故良馬逐然世治不輕進國有道不變塞焉故利艱貞猶且自戒曰閑吾衛以防其逸力厚而義不行才全而用有序上非我應也而其徳同己非上比也而其志合内之畜於己者如此其周外之畜於君者如此其審則安往而不利哉易説龜山楊氏曰九三居乾體之極能健行者也故曰良馬逐恃才而往易而不知戒則行或躓矣故利艱貞曰閑輿衛輿以行逺閑之則无覆轍之虞衛以自防閑之則无失守之患此戒慎之至也然畜極而反理之常然上九雖有止健之才當畜道之窮變而通之之時也三為正應則與之合志矣故利有攸往易説兼山郭氏曰九三乾為馬三陽至此而並進良馬角逐之象也三陽之進有正有不正者焉則其從之難是以利艱正也經曰君子安其身而後動故曰閑輿衛然後利有攸往方上九何天之衢往則合志也必也擇利於其身擇利於其君是則二三其徳者也何畜賢之有哉易説白雲郭氏曰能止健而畜徳无若九二說輹之道也說輹止健而有之夫欲何為哉盖欲施之天下國家非獨善其身而已此中庸之道也大畜之健中庸天命之性也止健率性之道也九三良馬逐修道之教也故中庸言能盡其性則盡說輹之義矣盡其性而盡人物之性此良馬逐利有攸往之義也良馬逐利有攸往盖言用道也聖人之畜徳確乎不可拔及其用也推而放諸四海而準雖有良馬逐之象亦未喻其至也至於何天之衢則放乎四海與天同道矣故良馬之逐所以上合天衢之志也良馬正為乾象言良馬則知九三畜乾之徳至於用九矣然自輿説輹之止至於良馬逐之用中庸之道已偹矣盖參天地贊化育之時上合天地之志猶曰利艱貞閑輿衛盖懼有失焉此中庸始言戒慎恐懼慎獨終言不愧於屋漏之義不然則湯之慄慄危懼文王小心翼翼詩書何取焉易説漢上朱氏曰乾為馬九三得位為良馬震為作足三陽並進良馬逐也九三剛健當位得時上九畜極變而應之利以馳逐然馳逐不已必有奔蹶之患不可恃應而不備故戒之以利艱貞九三正也動則失正艱難守正則利曰閑輿衛可也古文作粤粤于也發語之辭兊口象艮止也坤為輿四止閑輿也三乾為人震為足為大塗人傍輿而行閑輿而衛之象閑輿衛以其利艱貞也九三如此猶謹銜䇿清道路節良馬之步而徐驅焉其進利矣故利有攸往上九陽也變而應三三以剛往與上合志志動於中者也茂陵中書武功爵十三級曰閑輿衛有取於此乎夫恃應而不知備銳進而不知戒鮮不及矣易傳新安朱氏曰三以陽居健極上以陽居畜極極而通之時也又皆陽爻故不相畜而俱進有良馬逐之象焉然過剛鋭進故其占必戒以艱貞閑習乃利有攸往也曰當為日月之日本義九三一爻不為所畜而欲進與上九合志同進俱為畜極而通之時故有良馬逐何天之衢亨之象但上九已通達无礙只是滔滔去九三過剛銳進故戒以艱貞閑習蓋初二兩爻皆為所畜獨九三一爻自進耳問九六為正應皆隂皆陽則為无應獨畜卦不爾何也先生曰陽遇隂則為隂所畜九三與上九皆陽皆欲上進故但以同類相求也小畜亦然並語録東萊吕氏曰夫初九與九二欲上進有為為上所制畜然後知止固自為易九三與上九為應正是二陽相得有為之時如良馬馳逐於道路之間也當正得意之時上又无人止制而知艱貞用守不敢放肆防閑輿衛使无傾覆之患最九三之難者也惟其知艱貞而閑輿衛故利有攸往易説六四童牛之牿元吉象曰六四元吉有喜也伊川先生曰以位而言則四下應於初畜初者也初居最下陽之微者微而畜之則易制猶童牛而加牿大善而吉也概論畜道則四艮體居上位而得正是以正徳居大臣之位當畜之任者也大臣之任上畜止人君之邪心下畜止天下之惡人一无人字人之惡止於初則易既盛而後禁則扞格而難勝故上之惡既甚則雖聖人救之不能免違拂下之惡既甚則雖聖人治之不能免刑戮莫若止之於初如童牛而加牿則元吉也牛之性觝觸以角故牿以制之若童犢始角而加之以牿使觝觸之性不發則易而无傷以況六四能畜止上下之惡於未發之前則大善之吉也天下之惡已盛而止之則上勞於禁制而下傷於刑誅故畜止於微小之前則大善而吉不勞而无傷故可喜也四之畜初是也上畜亦然並易傳敎人之術若童牛之牿當其未能觸時已先制之善之大者其次則豶豕之牙豕之有牙既已難制以百方制之終不能使之改唯豶其勢則性自調伏雖有牙亦不能為害如有不率敎之人却須置其夏楚别以道格其心則不須夏楚將自化矣吕與叔東見録廣平游氏曰九三良馬逐利艱貞夫然後禁於未發如六四故為童牛而加牿焉格其非心如六五故為豶豕之牙盖六四純隂而勢順賢者以剛克止之則牿牛之象也易説龜山楊氏曰六四居艮體之下與初為應畜初者也初雖乾體有行健之才陽微而未壯也故有童牛之象焉夫牛善觸者也童牛角始生未能觸者也牿之則易制矣四履近尊之位大臣任畜之責也上以格君心之非下以畜民之惡如童牛而牿之則元吉而有喜矣至其過惡已成而畜之雖有比干之忠臯陶之刑不能勝也易説兼山郭氏曰大畜之六四臣位也臣有止君之象六五君位也君有畜天下之象何以言之經曰剛上而尚賢能止健大正也大正者主乎艮也艮之能止者主乎四五之二爻六四以至柔而接乎下初九以剛健而應乎上上下之情通而能行止之時也方初九私欲之未行而能畜之將順於其早正救於其小也古之人君垂衣拱手不下衽席之上冕而前旒以蔽明黈纊充耳以塞聰前疑後丞左輔右弼王居中无為以守至正其止之有素也必也好惡之已形嗜欲之已著而欲面折廷爭攖龍鱗犯嚴顔自謂曰我能事君我能事君何知之晚也故成王翦桐之戯而唐叔以封非周公孰為之盖將順之於其早正救之於其小故也然則六五畜天下者如之何書曰无若火始燄燄厥攸灼叙是以貴除其本也民惟邦本本固邦寧是則有固本之道也上古結繩以治後世聖人易之以書契為之書契除民訟之本也周人羣飲汝勿佚盡執拘以歸於周予其殺絶酒禍之本也詩首關睢之義明夫婦之道成父子之親也春秋書王正月公即位立君臣之正也父子親君臣正使父父子子夫夫婦婦而各止其分義豈一朝一夕之能哉盖申其義去其害之有素是豶豕之牙之義也夫然後仁者不遺其親義者不後其君日月所照霜露所墜尺地莫非其有一民莫非其臣夫是之謂大畜也然六四者能盡事君之一心故能有喜六五賴及於天下故言有慶亦小大之異也易説白雲郭氏曰四在上卦之初盖知早辨而止之於初者止於初則天理不失而人偽不萌故能全其天童牛全其天者也亦猶人之赤子也自童牛而後角角而充之其狠戾鬬爭之性斯无不至自赤子而充之放其良心亦无不至牛豈无童牛之善人豈无赤子之心哉皆以其放不知止故人欲日窮而天理日滅也孟子言大人不失赤子之心此童牛之牿之象也吉孰大於是哉牿牢之也童牛不必牿而牿之君子戒慎乎其所不睹也赤子之心良心也中庸天命之性也誠是已易説漢上朱氏曰坤為牛坤初為童牛童牛始角時也六四坤體四之初為童牛初剛往四角觸之象四不來初屈而不動童牛牿之也牿横角之木周官謂之楅初之四則二成巽木初復位則剛伏於木下牿牛之象六四當位止剛不以威武為之以漸優而柔之使无犯上之心剛柔各得其正故元吉元吉者自其始吉吉之至善也喜者陽得位初九不動而應己剛者反為柔用六四所以有喜也易傳新安朱氏曰童者未角之稱牿施横木於牛角以防其觸詩所謂楅衡者也止之於未角之時為力則易大善之吉也故其象占如此學記曰禁於未發之謂豫正此意也本義又曰大畜下三爻取其能自畜而不進上三爻取其能畜彼而不使進然四能止之於初故為力易六五則陽已進而止之則難但以柔居尊得其機㑹可制故亦吉但不能如四之元吉耳語録東萊吕氏曰六四制惡於未萌之時也六五制惡於己形之後者也夫於惡之未萌而制之不使有是牿童小之牛角則其角終无見矣何必於角盖角者牛以之觸物如人之惡念也及六五惡已形之後吾則於其惡之起處從而制之可也夫制已形之惡不於惡之關要處去之非得制惡之道夫豕之能噬囓者以有牙也今豶其牙是制其要會處也易説六五豶豕之牙吉象曰六五之吉有慶也明道先生曰豶豕之牙吉不去其牙而豶其勢則自善矣治民者不止其爭而敎之讓之類是也劉絢師訓伊川先生曰六居君位止畜天下之邪惡夫以億兆之衆發其邪欲之心人君欲力以制之雖宻法嚴刑不能勝也夫物有緫攝事有機㑹聖人操得其要則視一无視字億兆之心猶一心道之斯行止之則戢故不勞而治其用若豶豕之牙也豕剛躁之物而牙為猛利若強制其牙則用力勞而不能止其躁猛雖縶之維之不能使之變也若豶去其勢則牙雖存而剛躁自止其用如此所以吉也君子法豶豕之義知天下之惡不可以力制也則察其機持其要塞絶其本原故不假刑法嚴峻而惡自止也且如止盗民有欲心見利則動苟不知敎而迫於饑寒雖刑殺日施其能勝億兆利欲之心乎聖人則知所以止之之道不尚威刑而修政敎使之有農一作耕桑之業知廉恥之道雖賞之不竊矣故止惡之道在知其本得其要而已不嚴刑於彼而修政於此是猶患豕牙之利不制其牙而豶其勢也在上者不知止惡之方嚴刑以敵民欲則其傷甚而无功若知其本制之有道則不勞无傷而俗革天下之福慶也並易傳豶豕之牙豕牙最能嚙害人只制其牙如何制得今人為惡却只就它惡禁之便无由禁止此見聖人機㑹處楊遵道録藍田吕氏曰六四六五皆以柔畜剛止健者也牛之剛健在角豕之剛健在牙初九居健之始其健未若童牛然禁於未發以牿閑之及其長也无所用其健豈特不暴而已安於馴柔可駕而服故可喜也九二居健之中其健已具若豕之牙漸不可制六五居尊守中能以柔道殺其剛暴之氣若豶豕然其牙雖剛莫之能暴可以養畜而无虞故有慶也廣平游氏曰六五柔質而處剛又當尊位質柔則嗜欲易以深處剛則躁競易以逞當大畜之時賢者以大中之道正其大本則豶豕之象也禁於未發故能使之棄所習捐所能而人斯與之矣故有善格其非心則窒其原矣非特禁未發而已也且幽王之惡大矣而當時大夫欲化其心以畜萬邦則畜君之要正在於格其非心而已故取象於豶豕而无嫌於六五也盖豕之為象其躁忿足以傷物而賊仁其嗜欲足以伐性而滅義今而窒其原則貪欲之情可化為不求而義不可勝用矣躁忿之質可化為不忮而仁不可勝用矣君仁莫不仁君義莫不義則非特人與之而已天斯祐之矣故有慶易説龜山楊氏曰六五君位也為大畜之主任天下之畜者也惟天生民有欲无主乃亂則民之亂以有欲也故先王畜天下之惡静亂而息民在窒其欲而已孔子曰苟子之不欲雖賞之不竊欲民之不竊在上之不欲耳非刑威所能禁也五以柔順大中而履尊位其畜天下能不以威刑者也故曰豶豕之牙吉豕牙躁動而難制非力之所能勝也豶之以窒其欲則躁動自息矣此先王畜天下之道也易說兼山郭氏曰書之費誓曰今惟淫舎牿牛馬先儒以牿為牢閑疑其非横木也豶豕者去其勢也去其勢安在有牙而不可犯也童牛之牿殆謂馴之於初豶豕之牙殆謂絶其勢而制之止也不然則繫於金柅且不能制其蹢躅也乆矣易説白雲郭氏曰不能止之於初如童牛之牿如大人不失赤子之心或至於有害當如九二說輹之道故言豶豕之牙也牛之所以為害者角也豕之所以為害者牙也童牛則止於角未生之初故其止也易豕既有牙斯不可止必除其牙則不為害矣是猶君子必盡去人欲然後天性良心可得而復也童牛未嘗失天性无欲可去故大人不失赤子之心似之豕牙已有失矣蓋已陷於人欲者故求其放心之論似之能求其放心是以吉而有慶也復之不逺復顔子之克己復禮其義皆相近有喜者自得於一心而已有慶者喜之廣大及物之意盖五為君道與四不同能盡已之性以盡人物之性贊天地之化育其慶豈不大哉易説漢上朱氏曰九二犯五則三成坎坎為豕五成巽巽為白自三至上體頤豕頤中有剛且白者豕之牙也六五得尊位柔中二退而受畜三坎毁兊金刻制其下而剛伏豶豕之牙也牡豕曰豭攻其特而去之曰豶豶豕則馴擾剛躁自止牙不能害物矣慶者三陽受畜而為用隂以陽為慶六五之吉有慶也二應五得正故吉古之善畜天下者知有血氣皆有爭心難以力制務絶其不善之本而已猶去豕牙之害而豶之也順民之欲因民之利成民之才率之以柔中其效至於垂衣拱手而天下服易傳曰民有欲心見利則動苟不知教雖刑殺日施其能勝億兆利欲之心乎易傳新安朱氏曰陽已進而止之不若初之易矣然以柔居中而當尊位是以得其機㑹而可制故其象如此占雖吉而不言元也本義上九何天之衢亨象曰何天之衢道大行也伊川先生曰予聞之胡先生曰天之衢亨誤加何字事極而反理之常也故畜極而亨小畜畜之小故極而成大畜畜之大故極而散極既當變又陽性上行故遂散也天衢天路也謂虚空之中雲氣飛鳥往來故謂之天衢天衢之亨謂其亨通曠濶无有蔽阻也在畜道則變矣變而亨非畜道之亨也何以謂之天衢以其无止礙道路大通行也以天衢非常語故象特設問曰何謂天之衢以道路大通行取空豁之狀也以象有何字故爻下亦誤加之並易傳横渠先生曰其道大行也升於天何待衢路而進言無所不通也衢字當為絶句艮為止止二隂也不以止其類也故亨易説藍田吕氏曰上九畜極而通其道大行无往不亨言何天之衢亨者猶言何所為天道乎所之皆亨也廣平游氏曰畜道之成至於天人交助則賢路自我而四達矣故上九曰何天之衢亨賢路而謂之天衢言陟降之當於天心也彖曰剛上而尚賢則大畜之義主於上九也然崇俊良以列庶位而推轂賢路使天下無家食之賢者上九之任也故其爻以何天之衢為言天下至於无家食之賢則道之大行孰盛於此此大畜所以為先王之盛時也易説龜山楊氏曰居大畜之終畜極而反則乾道上行矣故衢亨也易説白雲郭氏曰孟子曰聖人之於天道命也有性焉君子不謂命也如童牛之牿豶豕之牙如不失赤子之心求其放心豈非其性哉能盡是性是以至於天之衢也何天之衢聖人止於天道矣止於天道然後萬物各正性命保合大和是以道大行而亨也以在上言之則蕩蕩乎民无能名之時也以在下言之則仰之彌髙鑚之彌堅瞻之在前忽焉在後之時也方是時博厚配地髙明配天悠乆无疆雖日月所照霜露所墜凡有血氣者莫不尊親故曰配天其上九之謂與究觀大畜上下卦三爻各相類童牛之牿則知利己之厲矣豶豕之牙則說輹矣良馬逐則何天之衢矣盖艮之所止者乾之健也乾之健為艮之所止也是以三爻各相類特君臣之道不同耳然尚賢之義六爻有之乎曰止健與止賢畜徳與畜賢其義皆一反求尚賢之義於六爻之中亦猶止健畜徳之道也特尚賢為大畜之一耳止健畜徳足以兼之易説漢上朱氏曰畜極則通止極則動震為大塗兊為口上乾為天天衢也何大其聲也上動亨也言何其天衢之亨如是乎正者道也大塗亦道也三陽上進道大行也易傳新安朱氏曰何天之衢亨言何其通達之甚也畜極而通豁達无礙故其象如此本義或如伊川説衍一何字亦不可知讀書須是先看一件了然後再看一件若是畜積處多忽然爆開來時自然所得者大易所謂何天之衢亨是也語録東萊吕氏曰上九大抵畜極則散如伊尹樂堯舜之道居畎畝之中其畜可謂大矣必佐湯以發其所藴是得時如天之衢也故象曰道行得時行道之謂也易説合訂刪補大易集義粹言卷三十
