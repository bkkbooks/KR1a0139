body:
  text: 合訂删補大易集義粹言卷四十一頭等侍衞納喇性德編離下巽上伊川先生曰家人序卦夷者傷也傷於外者必反其家故受之以家人夫傷困於外則必反於内家人所以次明夷也家人者家内之道父子之親夫婦之義尊卑長㓜之序正倫理篤恩義家人之道也卦外巽内離為風自火出火熾則風生風生自火自内而出也自内而出由家而一无而字及於外之象二與五正男女之位於内外為家人之道明於内而巽於外處家之道也夫人有諸身者則能施於家行於家者則能施於國至於天下治治天下之道蓋治家之道也推而行之於外耳故取自内而出之象為家人之義也文中子書以明内齊外為義古今善之非取象之意也所謂齊乎巽言萬物潔齊於巽方非巽有齊義也如戰乎乾乾非有戰義也易傳東萊吕氏曰大抵人之困窮當反於内故明夷之後次以家人蓋傷於外者必反於家自昔聖賢所以成就如孟子所稱傅說膠鬲之流皆自憂患中來後世人處憂患所以不能成就者只以其但知憂愁蹙迫而不能反於内所謂困而不學民斯為下者也伊川云正倫理篤恩義此兩句最當看常人多以倫理為兩事殊不知父子有親夫婦有别所謂倫也能正其倫則道之表裏已在矣常人多以用私為恩施公為義殊不知能恩其所恩即是義也若正篤二字尤當玩味蓋倫理在彼正之在我恩義在彼篤之在我倫理初未嘗亂人自不正耳恩義本未嘗虧人自不篤耳若看得正篤兩字可與論學矣易說家人利女貞伊川先生曰家人之道利在女貞女貞則家道正矣夫夫婦婦而家道正獨云利女貞者夫正者身正也女正者家正也女正則男正可知矣易傳白雲郭氏曰大學言古之欲明明德於天下者先治其國欲治其國者先齊其家故家齊而後國治國治而後天下平則一家之治所以為治國治天下之本也而家人之道亦與治國治天下之道皆一也齊家自夫婦始故舜觀厥刑于二女文王刑于寡妻至于兄弟然則利女貞者又家道之本也此與詩首關雎言后妃之德同意易說新安朱氏曰家人者一家之人卦之九五六二外内各得其正故為家人利女貞者欲先正乎内也内正則外无不正矣本義東萊吕氏曰大抵正於己其正尚未至惟及於人方謂之正故曰利女貞伊川曰正者身正也女正者家正也正不獨身而能及人則家道成矣易說彖曰家人女正位乎内男正位乎外男女正天地之大義也家人有嚴君焉父母之謂也父父子子兄兄弟弟夫夫婦婦而家道正正家而天下定矣伊川先生曰彖以卦才而言陽居五在外也隂居二處内也男女各得其正位也尊卑内外之道正合天地隂陽之大義也家人一无人字之道必有所尊嚴而君長者謂父母也雖一家之小无尊嚴則孝敬衰无君長則法度廢有嚴君而後家道正家者國之則也父子兄弟夫婦各得其道則家道正矣推一家之道可以及天下故家正則天下定矣並易傳藍田吕氏曰家人治内之道也風能入火風自火出則火𫝑熾矣言行之化可以正家化自家出則家道盛矣龜山楊氏曰家人之義以順為正故利女貞至於婦子嘻嘻則失家節矣易說白雲郭氏曰家人之名卦以二五也二五正男女之位而曰天地之大義者由人事言之則男女所以為家人自道言之則天地男女一也故男女正有天地之大義存焉然聖人畫是卦而名以家人者豈真一家之事而已哉内之脩身外之治國治天下大而至於天地之義舉家人皆足以明之道之要者无以易此此聖人名卦之義也且家人之義以正家為主正家之主尊而嚴者父母也父母盡尊嚴之道以正一家則父父子子兄兄弟弟夫夫婦婦而家道正矣家正則國治國治而天下定其道一也故孟子曰推恩足以保四海不推恩不足以保妻子古之人所以大過人者无它焉善推其所為而己善推其所為斯足以究正家而天下定之義易說漢上朱氏曰外巽内離離明也易傳曰外巽内明處家之道然卦以長女中女為象者女以男為家家人以女為奥主故曰家人此合兩體言家人也家人自遯來无妄變也互巽變離六二正離為女女正位乎内也震變互坎六四正坎為男男正位乎外也女正位乎内然後男正位乎外女不正而能正其外者无有也天地坎正位乎北離正位乎南南北定位東西通氣而天地化生萬物故曰女正位乎内男正位乎外男女正天地之大義也此以六四而下言家人利女貞也五君之位也乾九五者父也乾為剛嚴无妄坤居四上配乾五為母以坤變乾為離歸尊於父父母之於家人其嚴有君道家人猶臣妾也子之事父母婦之事舅姑雞鳴而朝非君道乎易傳曰无尊嚴則孝敬衰无君長則法度廢故曰家人有嚴君焉父母之謂也此以九五而下言家人正家之道也乾為父坎為子父上子下父子正也巽為長女離為中女孟上仲下兄弟正也坎為夫離為婦夫上婦下夫婦正也乾為天五爻各得其位天下定也故曰父父子子兄兄弟弟夫夫婦婦而家道正正家而天下定矣此以上九而下推廣正家之道也夫正家之道始於女正女正而後男正男女正而後父母嚴父母嚴而後家道正家正而後天下定家者天下之則也孟子曰天下之本在國國之本在家家之本在身故彖辭如此在卦氣為五月故太𤣥準之以居易傳新安朱氏曰以卦體九五六二釋利女貞之義嚴君亦謂二五天下定上父初子五三夫四二婦五兄三弟以卦畫推之又有此象本義問家人有嚴君焉程傳云家人之道必有尊嚴而君長者謂父母也如此則嚴君作兩字說舊來諸家只作一字說如何先生曰所尊嚴之君長也語録東萊吕氏曰彖以卦才言二居内卦之中女之正也九五居外卦之中男之正也然正位二字最當看天下事如器用若去合頓處頓便无一事所以乖爭陵犯縁於不合頓處頓了故男本當在外女本當在内知其在内而位之於内知其在外而位之於外則一家自然无事矣天之所以上地之所以下其義亦不外此也推而言之為君者止於仁為臣者止於忠各止其所當止則天下无餘事矣易說象曰風自火出家人君子以言有物而行有恒伊川先生曰正家之本在正其身正身之道一言一動不可易也君子觀風自火出之象知事之由内而出故所言必有物所行必有恒也物謂事實恒謂常度法則也德業之著於外由言行之謹於内也言慎行脩則身正而家治矣易傳横渠先生曰家道之始始諸飲食烹飪故曰風自火出家人之道在於烹爨一家之政樂不樂平不平皆係乎此並易說上蔡謝氏曰或問言有物而行有常如何是有物曰妄則无物是不誠也不誠无物誠者物之終始終始者有常之謂也物則是箇實存誠則有物問敬是存誠之道否曰須是體便見得語錄廣平游氏曰欲齊其家先脩其身知風之自也易於家人曰風自火出而君子以言有物行有常可不謂所自乎易說龜山楊氏曰風自火出由内及外以風天下之象也言忠信則有物行篤恭則有常无稽之言是无物也暴慢邪僻是无常也易說白雲郭氏曰風外也火内也風自火出由内而之外也脩身内也欲齊其家者先脩其身是猶風自火出之道也言有物而行有常君子之脩身也非禮勿言則言有物矣非禮勿動則行有常矣是以乾之九二自庸言之信庸行之謹終至於盡君德家人自言有物行有常終至於正家而天下定其義一也故孟子言國之本在家家之本在身又曰大人者正己而物正也其是之謂乎易說漢上朱氏曰巽風離火風自火出也說卦巽為木為風黄帝書曰東方生風風生木又曰火疾生風蓋風火同生於木風自火出由内及外家人之象夫風縁火火縁木未始相離君子體之故言有事實行有常度自初至五體噬嗑頤中有物言有物也无妄震為行六四行不失正行有常也言行有法則家人化之易傳新安朱氏曰身脩則家治矣本義風自火出家人是火中有風如一堆火在此氣自薫蒸上出是也或問風自火出如燈燄上氣出如何荅曰固是此卦之大象指爐中火曰亦如此火氣上薫炙也語錄東萊吕氏曰火熾則風生火既熾則不患風不猛德既盛則不患家不化故君子觀象治家惟善於言行而已知風化之行在己不在外故自反之於身夫身之所出者不過於言行故言有物而行有常物者有事之謂常人信口而發及究其實更无一事故君子有事而後有言故曰有物常人之行行之於始而不能行之於終惟君子終始如一故有常夫言之无物猶可以欺外至於在家之人則必究其實故在家之言尤不可以无物行之无常猶可以飾一時至於在家之乆則必暴露故在家之行尤不可以无常伊川云一言一動不可易也不可易三字最當看人才懷不可易之心則言自然有物行自然有常凡看易傳須當細看且如看家人傳正家之本在正其身須是體我正身如何正身之道一言一動不可易也須是體我不可易者如何如巽順於事而由正道常人讀此等處只平讀過若要實看須是深體易説初九閑有家悔亡象曰閑有家志未變也伊川先生曰初家道之始也閑謂防閑法度也治其有家之始能以法度為之防閑則不至於悔矣治家者治乎衆人也茍不閑之以法度則人情流放必至於有悔失長㓜之序亂男女之别傷恩義害倫理无所不至能以法度閑之於始則无是矣故悔亡也九剛明之才能閑其家者也不云无悔者羣居必有悔以能閑故亡耳閑之於始家人志意未變動之前也正志未流散變動而閑之則不傷恩不失義處家之善也是以悔亡志變而後治則所傷多矣乃有悔也並易傳横渠先生曰男處女下悔也易說藍田吕氏曰初九以剛居始閑有家者也禁之於未然不傷乎恩故悔亡龜山楊氏曰禮始於謹夫婦為宫室辯内外男位乎外女位乎内男不入女不出所以閑有家也家人之初閑而有之所以謹始也始之弗閑則終必亂矣易說白雲郭氏曰制治於未亂保邦於未危此聖人防微杜漸蚤辨之道也茍亂而後治之危而後保之不亦晚乎家人之道能閑於初故能有家而悔亡象言志未變者治家之道志於家道未變之初所謂制治於未亂故能終无變也有家如此有國者亦无以異矣易説新安朱氏曰初九以剛陽處有家之始能防閑之其悔亡矣戒占者當如是也本義東萊吕氏曰司馬温公家訓曰教婦初來教子嬰孩正家須正之於始乃易為力故王弼言當治之於始也伊川言羣居必有悔夫羣居相聚則忌刻疾害无所不有故於羣居之時最見悔處若不常自檢㸃則乖爭陵犯无所不有須防之於始而後可亡其悔象曰志未變也伊川云於正志未流散之前而閑之正之一字最要看夫人之心本正迨夫流散然後失正於其正未變之前而閑之何徃而不正哉易說六二无攸遂在中饋貞吉象曰六二之吉順以巽也伊川先生曰人之處家在骨肉父子之間大率以情勝禮以恩奪義唯剛立之人則能不以私愛失其正禮故家人卦大要以剛為善初三上是也六二以隂柔之才而居柔不能治於家者也故无攸遂无所為而可也夫以英雄之才尚有溺情愛而不能自守者况柔弱之人其能勝妻子之情乎如二之才若為婦人之道則其正也以柔順處中正婦人之道也一本也字上有則其正三字以柔順處中一本无此五字故在中饋則得其正而吉也婦人居中而主饋者也故云中饋二以隂柔居中正能順從而卑巽者也故為婦人之貞吉也並易傳龜山楊氏曰柔順中正得女之正也婦人无遂事從人而已故无非无儀唯酒食是議易說白雲郭氏曰彖言夫夫婦婦六二所謂婦婦者也婦人從夫无遂事婦之道也居中主饋婦之職也詩所謂无非无儀唯酒食是議是也二者六二之所以貞吉也然正家者夫也從夫者婦也故以順巽為吉易說漢上朱氏曰二主婦之位坤得位上從乾五乾夫道也地道无成婦人從夫无所遂事者順也故曰无攸遂坎水離火而應巽木女在中當位烹飪而主饋事順也故曰在中饋順以巽者婦人之正也正則吉故曰貞吉六二不動而吉者以此故曰六二之吉順以巽也詩曰无非无儀唯酒食是議孟子之母曰婦人之禮精五飯羃酒漿養舅姑縫衣裳而已矣故有閨門之脩而无境外之志易傳新安朱氏曰六二柔順中正女之正位乎内者也故其象占如此本義東萊吕氏曰六二女正位乎内者也女之處乎内必有所聽命而不敢專故无得自遂然此一爻伊川則以為二以隂柔之才而居隂无所為而可朱子發之説則以為女在内无所遂如大夫无遂事之𩔖若以彖辭看當從朱子發説蓋九五一爻在外專說男子則此爻專為女子說易說九三家人嗃嗃悔厲吉婦子嘻嘻終吝象曰家人嗃嗃未失也婦子嘻嘻失家節也伊川先生曰嗃嗃未詳字義然以文義及音意觀之與嗷嗷相𩔖又若急束一作速之意九三在内卦之上主治乎内者也以陽居剛而不中雖得正而過乎剛者也治内過乎剛則傷於嚴急故家人嗃嗃然治家過嚴不能无傷故必悔於嚴厲骨肉恩勝嚴過故悔也雖悔於嚴厲未得寛猛之中然而家道齊肅人心祗畏猶為家之吉也若婦子嘻嘻則終至羞吝矣在卦非有嘻嘻之象蓋對嗃嗃而言謂與其失於放肆寧過於嚴也嘻嘻􅀏樂无節也自恣无節則終至敗家可羞吝也蓋嚴謹之過雖於人情不能无傷然茍法度立倫理正乃恩義之所存也若嘻嘻无度乃法度之所由廢倫理之所由亂安能保其家乎嘻嘻之甚則致敗家之凶但云吝者可吝之甚則至於凶故未遽言凶也未失也者雖嗃嗃於治家之道未為甚失若婦子嘻嘻是无禮法失家之節家必亂矣並易傳横渠先生曰位為過中則履非得宜與其慢也寧嚴易說藍田吕氏曰九三以陽居陽尚剛嚴以治家者也法不閑於始恩不得於衆純以嚴治家人所以嗃嗃也嗃嗃者讙言以聚議也治家而不免家人議之悔且厲也彼雖議我我未失道悔厲猶吉也若過於剛嚴責善已甚賊恩之至皆有離心婦子嘻嘻失治家之節終吝道也嘻嘻嗟怨之聲也龜山楊氏曰家人有嚴君焉而九三所以限制内外未失也婦子以順說為事而至於嘻嘻則失節矣蓋剛過非婦子之道也易說白雲郭氏曰嗃嗃剛嚴之意也嘻嘻歡悅之情也剛嚴之道悔厲由生雖非中道而終吉无凶歡悅之情固人所喜而以恩掩義分日以亂情愛雖隆終吝之道也九三過中故或悔厲然聖人之道貴有終與其失家節而終吝固不若終吉而悔厲未為失也由是而言則閑家之道當以嚴分為先此家人所以稱嚴君歟然有嗃嗃之嚴使无悔厲雖王假有家之道不過於此是雖非九三所能盡實自嗃嗃積而致之耳易說漢上朱氏曰三内之主也嗃嗃陸法言曰嚴厲貎易傳曰有急速之意陽居三剛正過中巽為風為號離火炎上聲大且急嚴厲之象骨肉之情望我以恩而治家太嚴傷恩矣能无悔乎拂其情矣能无厲乎然法度立倫理正小大祗畏以正得吉未為大失也故辭曰家人嗃嗃悔厲吉象曰未失也坎子離婦三動不正與二相易離成震兌離目也震動也兌說也坎兌為節坎動兌見失節也目動聲出而說嘻嘻也喜樂无節其終必至於亂倫瀆理蕩而不反雖欲節之有不得而節者吝也故辭曰婦子嘻嘻終吝象曰失家節也二者治亂之别京房曰治家之道於此分矣易傳新安朱氏曰以剛居剛而不中過乎剛者也故有嗃嗃嚴厲之象如是則雖有悔厲而吉也嘻嘻者嗃嗃之反吝之道也占者各以其徳為應故兩言之本義先生因喫茶罷曰物之甘者喫過必酸苦者喫過却甘茶本苦物喫過却甘問此理如何曰也是一箇道理如始於憂勤終於逸樂禮而後和蓋禮本天下之至嚴行之各得其分則至和又如家人嗃嗃悔厲吉婦子嘻嘻終吝都是此理語録東萊吕氏曰九三以陽處陽是以嚴治家者也夫治家之道與其失於寛寧失於嚴嚴則无寛裕雍和之道而有悔厲然未至於有失故終則吉寛則失治家之節大節既失縱溢放肆何所不至故雖見其寛裕終必吝矣大抵禮與其奢也寧儉喪與其易也寧戚治家之道主乎嚴故與其嘻嘻寧若嗃嗃此爻如對兩家而言且如入一家見其父子夫婦濟濟有禮則可以知其必興見其嘻嘻然以歌舞為樂則可以知其必敗易說六四富家大吉象曰富家大吉順在位也伊川先生曰六以巽順之體而居四得其正位居得其正為安處之義巽順於事而由正道能保有一无有字其富者也居家之道能保有一无有字其富則為大吉也四髙位而獨云富者於家而言髙位家之尊也能有其富是能保其家也吉孰大焉以巽順而居正位正而巽順能保有一无有字其富者也富家之大吉也並易傳横渠先生曰柔順在位故能長保其富易說藍田吕氏曰六四以隂居於巽下承乎九五以順為正无非无儀者也家人之順皆若是則家道富盛无所不足故大吉龜山楊氏曰柔而巽順婦德也故内和理而家可長久矣故富家大吉猶詩所謂宜其家人也易說白雲郭氏曰君子脩身齊家由内出外至於巽體家道成矣故六四富家大吉九五王假有家上九威如終吉也六四之富豈金玉布帛而已哉蓋必有其道矣其道何如父父子子兄兄弟弟夫夫婦婦是也家道之富无以加於此故其為吉莫大焉然得其道謂之順失其道謂之逆父父子子順也父不父子不子逆也彖言家人家道正則父子兄弟夫婦各安其分而无逆焉故曰順在位也在禮亦曰父子篤兄弟睦夫婦和家之肥也易之所謂富猶禮之所謂肥也禮以人之肥家之肥國之肥天下之肥是謂大順象言順在位則禮之大順是也齊景公曰信如君不君臣不臣父不父子不子雖有粟吾得而食諸夫有國有家者以有粟為國矣而有不得而食者其富有甚於粟也孔子於家人之彖言父父子子兄兄弟弟夫夫婦婦及對景公則曰君君臣臣父父子子則知家人之道推之國則國治道一而已易說漢上朱氏曰六四本无妄之三進而在位巽體而順三陽為實積其上富家也上有承下有應巽以事上則親順以接下則從夫奢則不遜而富者怨之府六四如此故能安處其位有家之實陽為大正則吉富家大吉也治家之道以剛正威嚴為善戒在於柔順故家人初三五皆吉上九威如終吉二與四柔也於治家无取故二以柔順卑巽者婦人之正也非男子所宜也四巽體而順在位者滿而不盈保其家者也非治家也易傳新安朱氏曰陽主義隂主利以隂居隂而在上位能富其家者也本義東萊吕氏曰六四以六居四是以隂居隂順也又是巽體亦順也富者人之所忌當家道富盛之時最是難處既為富家又廹近九五剛暴之君正在多難之地惟六四則可免蓋无好勝之心而以和易處富自然得吉何者人道惡盈而好謙六四乃處富之道以其巽順而已衞公叔文子朝而請享靈公退見史鰌而告之史鰌曰子必禍矣子富而君貪罪其及子乎文子曰然吾不先告子是吾罪也君既許我矣其若之何史鰌曰然子臣可以免富而能臣必免於難上下同之此六四之謂也易說九五王假有家勿恤吉象曰王假有家交相愛也伊川先生曰九五男而在外剛而處陽居尊而中正又其應順正於内治家之至正至善者也王假有家五君位故以王言假至也極乎有家之道也夫王者之道脩身以齊家家正則天下治矣自古聖王未有不以恭已正家為本故有家之道既至則不憂勞而天下治矣勿恤而吉也五恭已於外二正家於内内外同德可謂至矣王假有家之道者非止能使之順從而已必致其心化誠合夫愛其内助婦愛其刑家交相愛也能如是者文王之妃乎若身脩法立而家未化未得為假有家之道也並易傳横渠先生曰有應在二得男女内外家道大正足以化成天下故王假之易說藍田吕氏曰九五以剛處尊居中體巽以道治其家上下相親法行而恩浹有嚴君之治焉故曰王假有家得治家之本矣末不足憂故曰勿恤吉龜山楊氏曰剛中而巽極有家之道也天子理陽道后治隂德天下之内治后聽之也故夫夫婦婦而家道正家正而天下定矣此非閑有家者所及也故勿恤吉易說白雲郭氏曰九五父道也父母為嚴君故父與王其道一也況家國之治寧有二乎是以非王道之至不足以有家非有家未見其能正天下也此家人之道所以正家而天下定矣勿恤吉者王假有家毋憂天下之不定也天下定則吉孰大焉然父父子子兄兄弟弟夫夫婦婦同大順而无逆焉者交相愛之義也易說漢上朱氏曰五乾為王假至也王極乎有家之道正家以定天下則至矣故曰王假有家五剛而巽乎外二柔而順乎内中正相應心化誠合則上下内外互相親睦故曰交相愛也交相愛者相與於中之象也王假有家達之天下至於交相愛則天下不勞而治矣勿恤乎吉可也五動成離有伏坎坎為憂恤不動坎伏正則吉三代之王正心誠意脩乎閨門之内不下席而天下治何所憂哉故辭曰勿恤吉象曰交相愛也易傳新安朱氏曰假至也如假于太廟之假有家猶言有國也九五剛健中正下應六二之柔順中正王者以是至於其家則勿用憂恤而吉可必矣蓋聘納后妃之吉占而凡有是德者遇之皆吉也本義問家人卦王假有家先生曰有家之有只是如夙夜浚明有家亮采有邦之有謂有三德者則夙夜浚明於其家有六德者則亮采於其邦有是虛字非如奄有四方之有也語録菄萊吕氏曰九五以陽居上體之中男正位乎外者也夫男正者必居天下之廣居立天下之正位治家之道无一不至然後為至如堯舜文王是也故曰王假有家夫王者之治天下必先正其家故大學曰古之欲明明德於天下者必先齊其家文王刑于寡妻其於治家之道无纎毫不至家道既至則天下不勞而自治矣故曰勿恤吉若家道未至則安得而不憂乎伊川云有家之道既至則勿恤而吉既之一字寓意深矣象曰交相愛也言有家之道至則内外相愛而无一毫之不善矣夫所謂勿恤吉者非謂懈怠而不理也蓋家道未成則朝夕之間警恐畏懼未嘗少寧家道既成則勿恤可知矣易說上九有孚威如終吉象曰威如之吉反身之謂也伊川先生曰上卦之終家道之成也故極言治家之本治家之道非至誠不能也故必中有孚信則能常久而衆人自化為善不由至誠已且不能常守也況欲使一作使衆人乎故治家以有孚為本治家者在妻孥情愛之間慈過則无嚴恩勝則掩義故家之患常在禮法不足而瀆慢生也長失尊嚴少忘恭順而家不亂者未之有也故必有威嚴則能終吉保家之終在有孚威如二者而已故於卦終言之治家之道以正身為本故云反身之謂爻辭謂治家當有威嚴而夫子又復戒云當先嚴其身也威嚴不先行於已則人怨而不服故云威如而吉者能自反於身也孟子所謂身不行道不行於妻子也並易傳横渠先生曰以陽居尊故威如身脩而家齊故終吉易說藍田吕氏曰上九以剛居終有始有卒道可繼也身不行道不行於妻子反身不嚴人將安信故有孚威如終乃吉也龜山楊氏曰家之本在身故威如之吉反身之謂也上九家道之成也巽而以順終反身而誠者也故其教不肅而成其政不嚴而治所謂有孚威如終吉也易說白雲郭氏曰家人之始在於閑及其能成在於信究終始不可變者威如之吉而已威自我出也孟子曰家之本在身故威如之吉克保其終者非反諸其身蓋不能也象既明言有物而行有常而此又言反身之謂者家人之道所以成始成終者脩身而已且恩愛人之常情父子兄弟夫婦之間所不能无而過之者多矣至於明信嚴分或為情愛所奪則家人嚴君之義未盡其道故上九以有孚威如終之威如之吉未備君子必自反也然是道也内之則可以正心脩身外之則可以治國治天下惟明家人終始之義允執其中而内外之道至矣是以詩首關雎則見文王化天下之道所謂王假有家者也聖人序詩之意蓋亦深矣易說漢上朱氏曰上三有孚之道以下未孚也故威如威如者九在上剛嚴之象上九動而正家人見信九三孚之始也威如終則正而見信威如終吉也上九卦之終坤為身九動反正反身之謂也威非外求反求諸身而已反身則正正則誠誠則不怒而威夫誠所以動天地者也況家人乎聖人以治家之道莫尚於威嚴慮後世不知所謂威嚴者正其身也或不正而尚威怒則父子相夷愈不服矣安得吉故於上九發之孟子曰身不行道不行於妻子石慶家人有過輒不食家人謝過而後復是亦反身也易傳曰慈過則失嚴恩勝則掩義長失尊嚴少忘恭順而家不亂者未之有也易傳新安朱氏曰上九以剛居上在卦之終故言正家久逺之道占者必有誠信嚴威則終吉也威如之吉謂非作威也反身自治則人畏服之矣本義東萊吕氏曰上九專於恩則失之偏故濟之以威則得其中然吾之威嚴不出於孚誠則亦剛暴之威而已故必出於至誠則其威乃威也故得其家道之終吉治家而无威嚴則不能常久威嚴而不孚信則人不服故有孚威如則吉也在我者不先有孚信而以威嚴率人則人將曰夫子教我以正夫子未出於正也何以致家之齊乎象曰反身之謂天下之事无過反身必曰反身者謂孚自我出不當任威當反觀吾之誠否可也因是而推之則凡蒞政治民千條萬緒无過自反而已易說合訂删補大易集義粹言卷四十一
