body:
  text: 合訂刪補大易集義粹言卷二十九頭等侍衛納喇性徳編震下乾上明道先生曰无妄震下乾上聖人之動以天賢人之動以人若顔子之有不善豈如衆人哉惟只在於此間爾盖猶有已焉至於无我則聖人也顔子切於聖人未逹一息爾不遷怒不貳過无伐善无施勞三月不違仁者此意也劉絢師訓伊川先生曰无妄序卦復則不妄矣故受之以无妄復者反於道也既復於道則合一无合字正理而无妄故復之後受之以无妄也為卦乾上震下震動也動以天為无妄動以人欲則妄矣无妄之義大矣哉易傳又曰觀言所以識其心觀行所以識其用不識後如何畜得乾上震下无妄謂動以天則无妄大畜所以繼无妄者妄如何畜雜卦非聖人作後人類記之言又曰叔孫武叔之毁乃无妄之疾也兼山郭氏曰无妄即誠也在易曰无妄至孔子文言及中庸而後言誠又至孟子則曰性善皆一也然无妄有動象故又為誠之見於有為者如是則誠然後无妄矣以其本善故誠以其誠故无妄又為三者之序不誠則妄矣天人之分其間不能以寸伊川曰動以天故无妄動以人欲則妄矣无妄圖新安朱氏曰真以理言无妄之謂也太極圖義道夫問无妄誠之道不欺則所以求誠否曰无妄者聖人也謂聖人為无妄則可謂聖人為不欺則不可又問此正所謂誠者天之道思誠者人之道否曰然无妄是自然之誠不欺是著力去做底无妄自是我无妄故誠不欺者對物而言故次之語録无妄元亨利貞其匪正有眚不利有攸往伊川先生曰无妄者至誠也至誠者一无者字天之道也天之化育萬物生生不窮各正其性命乃无妄也人能合无妄之道則所謂與天地合其徳也无妄有大亨之理君子行无妄之道則可以致大亨矣无妄天之道也卦言人由无妄之道也一无也字利貞法无妄之道利在貞正失貞正則妄也雖无邪心苟不合正理則妄也乃邪心也故有一作其匪正則為過眚既已无妄不宜有往往則妄也易傳横渠先生曰无妄四徳无妄而後具四徳也其曰匪正有眚對无妄雷行天動也天動不妄故曰无妄天動不妄則物亦无妄易説又曰天地之氣雖聚散攻取百塗然其為理也順而不妄正䝉白雲郭氏曰自太極函三論之則无有妄无妄之别自三才之别論之然後有妄无妄分焉天之於覆地之於載皆无妄也聖人所以成天地之能者亦无妄也无妄天道也盡天道故具元亨利貞也諸卦具四徳者各見其義无妄則以天道得之也匪正則妄矣妄故招眚匪正而有眚非无妄之災也災眚之義其説不一以无妄觀之則自天至者為災由人自致者為眚无妄之動貴其止於天道不知所止而往是以窮人欲而滅天理也故不利有攸往易説新安朱氏曰无妄實理自然之謂史記作无望謂无所期望而有得焉者其義亦通為卦自訟而變九自二來而居於初又為震主動而不妄者也故為无妄又二體震動而乾健九五剛中而應六二故其占大亨而利於正若其不正則有眚而不利有所往也本義問雖无邪心苟不合正理則妄也既无邪何以不合正曰有人自是其心全无邪而却不合於正理如賢智者過之他其心豈曾有邪却不合正理佛氏亦豈有邪心者因論易傳无妄雖无邪心苟不合正理則妄也乃邪心也時或以子路使門人為臣事為證先生曰如鬻拳兵諫之類是也或云王荆公亦然曰温公忠厚故稱荆公無姦邪只不曉事看來荆公亦有邪心夾雜他却將周禮來賣弄有利底事便行之意欲富國強兵然後行禮義不知未至富強人才風俗已先壊了問无妄之謂誠不欺其次也曰非无妄故能誠无妄便是誠无妄是四方八而都去得不欺猶是兩个物事相對並語録東萊吕氏曰比看易无妄傳云雖无邪心苟不合正理則妄也乃邪心也益悚然自失因思去歲給札當時本意欲俟數月間得對展盡底藴故事事未欲説破縁此四互却多暗昧處此正易傳之所謂邪心也荅䀲菴書彖曰无妄剛自外來而為主於内動而健剛中而應大亨以正天之命也其匪正有眚不利有攸往无妄之往何之矣天命不祐行矣哉康節先生曰不見動而動妄也動於否之時是也見動而動則為无妄然所以有眚者陽微而无應也有應而動則為益矣觀物外篇伊川先生曰謂初九也坤初爻變而為震剛自外而來也震以初爻為主成卦由之故初為无妄之主動以天為无妄動而以天動為主也以剛變柔為以正去妄之象又剛正為主於内无妄之義也九居初正也下動而上健是其動剛健也剛健无妄之體也剛中而應五以剛居中正二復以中正相應是順理而不妄也故其道大亨通而貞正乃天之命也天命謂天道也所謂无妄也所謂无妄正而已小失於正則為有過乃妄也所謂匪正盖由有往若无妄而不往何由有匪正乎无妄者理之正也更有往將何之矣乃入於妄也往則悖於天理天道所不祐可行乎哉並易傳横渠先生曰天動不妄則物亦无妄乾道變化各正性命也易説藍田吕氏曰无妄所遇以正命也剛自外來而為主於内動而健剛中而應是三者无自而為邪矣是所謂无妄有无妄之徳必有无妄之福此大亨以正所以為天之命也若匪正有眚則􅄭矣匪正邪也有眚過也天作孽為災自作孽為眚其過由己致也有妄欲往於无妄將何之乎天命不祐亦已致之非正命也龜山楊氏曰震一索而得男剛自外來也震下而乾上動而健也動而健則動而為主矣故曰剛自外來而為主於内也雷動而天行則其誠无息卦之所以為无妄也動而以人為則妄矣剛中而應謂二五也五以剛健中正而位乎上二以柔順中正而應於下上下相與以正故其大亨也以正而已大亨以正非人之私智所能為也循天理而已故曰天之命也詩曰維天之命於穆不已所謂命者亦誠而已矣大亨以正則亨以正為體匪正則有眚非順理也故天命不祐欲往安之乎故不利有攸往易説兼山郭氏曰老子曰人法地地法天天法道道法自然故天无私覆地无私載日月无私照率歸之自然而已聖人之與天合徳觀天之道執天之行不先時而起不後時而縮因循故常依於天理无思无為亦歸之自然而已此无妄之本也以其卦言之震剛自外來而為主於内以才言之動而健以其位言之二五得位剛中而應所以為元亨利貞也乾者大也大亨以正其天之命乎且天下雷行其動以時故自春分而出萬物從之而出秋分而入萬物從之而入莫之令而常自然豈物物而賦之此以亨正而出彼以亨正而受此以无妄而感彼以无妄而應故能自智自力自形自色者也故曰乾道變化各正性命於此可見矣其或感之有正有不正養之或得或失所以為夭為壽為災為眚是謂匪正有眚之理也然則匪正有眚又何之矣故知有妄之行天之所不祐也易説白雲郭氏曰剛自外來而為主於内論卦之所以成无妄者主於震也動而健者動以天不以人也剛中而應九五也大亨以正无妄之道也无妄之道天也非人也故言天之命與中庸言天命之謂性孟子言有命焉君子不謂性之義皆同然止於无妄而不往則天道常存不止於无妄而有攸往者是以人而㓕天者也故彖之意以謂捨无妄而往又將何之焉一捨无妄而往則為匪正矣是以人㓕天以偽喪誠乖於天道此天命所以不祐也天非有心於祐不祐之間盖其道不與天合天何由而助之故孟子言盡心知性則知天存心養性所以事天盖知天事天為天所祐皆必與天合徳也曰動而健則動而與天合徳矣不與天合徳則與天非其類故非天之所助如是行而有往又何之乎盖聖人欲人之著誠去偽而明其天也伊川曰動以天故无妄動以人欲則妄矣此之謂也輔嗣於此卦尤不曉聖人之旨易説漢上朱氏曰无妄天理也有妄人欲也人本无妄因欲有妄去其人欲動静語黙无非天理動匪我也其動也天故曰无妄此合乾震言无妄也无妄大畜之反大畜上九之剛自外來為主於内主言震也自外來為主於内如舜禹之有天下天下大物也可妄而有乎无非天也故曰剛自外來而為主於内此以初九言无妄之主也震動也乾健也動而健无妄之時其健不息不有其己體天而已故曰動而健此再以乾震言无妄也九五剛中在上六二以柔中應之剛柔相與上下不過乎中申則无妄上下循天之理故曰剛中而應此以二五言无妄也五九之尊位大者得尊位大亨也其端始於初九剛自外來為主於内而正是以大亨剛中而應動不以正亦何由健何由應乎故曰大亨以正此以初九九五言无妄也動而健剛中而應大亨以正者无妄之才也有是才乃可當无妄之時致天下於无妄易言剛中而應者五卦師也臨也萃也升也无妄也大亨以正者三卦萃也臨也无妄也獨於无妄言天之命者剛自外來而為主於内也剛自外來可也安能必其為主於内動而健可也安能使剛中而必應以正而必至於大亨乎非天命不能也天命即天理也非人為也乾為天巽為命故曰天之命也此以乾巽言无妄也三四上三爻匪正有眚匪正妄行而干天命其眚自取者也无妄之世九五在上受天所命六二應之三四上匪正而无應欲往何之三四以五在上不可行上九已窮三上相易成坎險何所往哉兑為右大畜六五尚賢上九易五成兑故曰自天祐之无妄大畜三四正位兊體有祐之象大畜反兊為巽不正之爻不利有攸往故曰天命不祐行矣哉在卦氣為寒露故太𤣥凖之以去易傳新安朱氏曰剛自外來而為主於内以卦變卦徳卦體言卦之善如此故其占當獲大亨而利於正乃天命之當然也其有不正則不利有所往欲何往哉盖其逆天之命而天不祐之故不可以有行也本義无妄本是无望這是沒理㑹時節忽然如此得來面前朱英所謂无望之福是也桑樹中箭栁樹出汁往字説得不同剛自外來説卦變動而健説卦徳剛中而應説卦體大亨以正説元亨利貞自文王以來説做希望之望這事只得倚閣在這裏難為斷殺他伊川易傳似不是本意剛自外來是所以做造无妄動而健是有卦後説底或説无妄卦曰卦中未便有許多道理聖人只是説有許多爻象如此占著此爻則有此象无妄是箇不指望偶然底卦忽然而有福忽然而有禍如人方病忽然勿藥而愈是所謂无妄也據諸爻名義合作无望不知孔子何故説歸无妄人之卜筮如決柸珓如此則吉如此則凶柸珓又何嘗有許多道理如程子之説説得道理儘好儘開濶只是不如此未有許多道理在又曰无妄一卦雖云禍福之來也无常然自家所守者不可不利於正不可以彼之无常而吾之所守亦為之无常也故曰无妄元亨利貞其匪正有眚若所守匪正則有眚矣眚即災也問伊川言災自外來眚自内作是否曰看來只一般微有不同耳災是偶然生於彼者眚是過誤致然書曰眚災肆赦春秋曰肆大眚皆以其過誤而赦之也又曰看來无妄合是无望之義不知孔子何故使此妄字如无妄之災无妄之疾都是沒巴鼻恁地又曰无妄自是大亨了又却須是貞正始得若些子不正則行有眚眚字便即與災字同不是自家做得只有些子不是他那裏便有災來問眚與災如何分曰也只一般書云眚災肆赦春秋傳肆大眚眚似是過誤災便直自外來又曰此不可大叚做道理看只就逐象上説見有此象便有此義少閒自有壹時築著磕著並語録東萊吕氏曰剛自外來而為主於内所謂復則不妄矣聖人終日乾乾純剛不息何自外來之有易所以告學者也苟不知復則流於妄而不自知矣又曰卦辭言不利有攸往而初九則曰往吉六二則曰利有攸往盖既曰无妄則已上别无去處動著便錯才添纎毫則妄矣此卦辭所謂不利有攸往也雖動著便錯然又非塊然不行也此理元自流行而不息故兩爻皆以往為吉並易説象曰天下雷行物與无妄先王以茂對時育萬物濂溪先生曰身端心誠之謂也誠心復其不善之動而已矣不善之動妄也妄復則无妄矣无妄則誠矣故无妄次復而曰先王以茂對時育萬物深哉通書明道先生曰天下雷行物與无妄天下雷行付與无妄天性豈有妄耶聖人以茂對時育萬物各使得其性也无妄則一毫不可加安可往也往則妄矣无妄震下乾上動以天安有妄乎動以人則有妄矣劉絢師訓聖人之於天下事自不合與只順他天理茂對時育萬物而已无妄災也敢問其故曰妄則欺也得之必有禍斯有妄也順天而動有禍及者非禍也猶農之有田而不勤稼穯者荒也不亦禍乎農有勤於稼穯而復敗諸水旱其荒不亦災乎故象言先王以茂對時育萬物貴不妄也並語録伊川先生曰雷行於天下隂陽交和相薄而成聲於是驚蟄藏振萌芽發生一作育萬物其所賦與洪纎髙下各正其性命无有差妄一作忒物與无妄也先王觀天下雷行發生賦與之象而以茂對天時養育萬物使各得其宜如天與之无妄也茂盛也盛對之為言猶盛行永言之比對時謂順合天時天道生萬物各正其性命而不妄王者體天之道養育人民以至昆蟲草木使各得其宜乃對時育物之道也易傳天下雷行物與无妄先天後天皆合於天理者也人欲則偽矣鄒徳久本无妄之謂誠不偏之謂中又曰誠然後敬未及誠時却須敬而後誠无妄之謂誠不欺其次矣語録盡己為忠盡物為信極言之則盡己者盡己之性也盡物者盡物之性也信者无偽而已於天性有所損益則為偽矣易无妄曰天下雷行物與无妄動以天理故也其大略如此更須研究之自有得處時氏拾遺横渠先生曰物因雷動雷動不妄則物亦不妄故曰物與无妄育不以時害莫甚焉易説藍田吕氏曰天下雷行萬物發生皆以誠感何可妄也先王對時育物用此道也龜山楊氏曰天下雷行天之所以鼓萬物也物斯應之故曰物與无妄先王所以對時育萬物亦因天而已矣所以无妄也易説兼山郭氏曰物之生也本乎一氣氣之運也本乎隂陽天地者氤氲以感之爾何與於人乎曰天非人不因人非天不成先王之仁得被萬物者在對時而已且日中星鳥以正仲春於是乎平秩東作宵中星虚以正仲秋於是乎平秩西成東作西成烝民乃粒萬邦作乂先王之政也國君春田不圍澤大夫不掩羣士不取麛卵則仁及於禽獸草木黄落然後斧斤入山林則仁及於草木獺祭魚然後漁人入澤梁則仁及於魚鼈先王之仁有及於烝民有及於禽獸有及於草木魚鼈故能如魚麗之盛多凡以對時育物而已詩云麀鹿濯濯白鳥翯翯王在靈沼於牣魚躍故古之興王莫不皆然亦曰則天之明因地之利率之无妄而已易説白雲郭氏曰天運乎上雷行於下无適而非天故為无妄然雷之収發有時疑其有妄也蓋収發非雷也天之所運是雷為无妄也物之生死又應乎雷以從天之所運則物亦无妄矣故曰天下雷行物與无妄茂對時育萬物者聖人以至誠任天道而贊天地之化育與天地參於无妄者也其茂對也育物也自然馴致之耳聖人初无容心焉易説漢上朱氏曰天下雷行而物與之者无妄也雷行非時而物不與者妄也虞翻曰震以動之萬物出乎震故震為萬物始始震終艮時也伏兊為澤育也二應五三應上對也先王以是茂對時而育萬物茂盛也萬物繁興不茂不足以育物不對則妄矣如春毋麛毋卵夏毋伐大木之類易傳新安朱氏曰天下雷行震動發生萬物各正其性命是物物而與之以无妄也先王法此以對時育物因其所性而不為私焉本義又曰天之生物也一物與他一无妄語録東萊吕氏曰物與无妄所謂各正性命也告子生之之謂性之説恐只說得氣禀使果識所謂各正者則人物之分必不至混然无别矣下文所云則其所謂生之謂性者語雖似而意亦差此則立義甚精與張南軒問孟子説所疑初九无妄往吉象曰无妄之往得志也伊川先生曰九以剛陽為主於内无妄之象以剛實一无實字變柔而居内中誠不妄者也以无妄而往何所不吉卦辭言不利有攸往謂既无妄不可復有往也過則妄矣爻言往吉謂以无妄之道而行則吉也以无妄而往无不得其志也盖誠之於物无不能動以之修身則身正以之治事則事得其理以之臨人則人感而化无所往而不得其志也並易傳横渠先生曰易所謂得志者聖賢獲其願欲者也得臣无家堯之志也貞吉升階舜之志也易説藍田吕氏曰初九以剛為主於内方動之始不流於邪理義者人心之所同然由是而往无不得志龜山楊氏曰陽自外來而為主於内其動以天則无往而不得志矣故吉居无妄之時利在正而已往則匪正故曰不利有攸往各有所當也易説白雲郭氏曰伊川先生曰卦辭言不利有攸往者謂既无妄則不可復往過則妄矣爻言往吉謂以无妄之道而行則吉也以是知伊川之得於无妄也深矣盖卦之辭以天下之誠未有不以偽喪者故欲守正而不往顔子拳拳服膺弗失之義也爻之辭欲以无妄之道見於有行既盡己之性又盡人之性盡物之性如是而往其為得志大矣是以吉也言於初者初震也震之動以天故也卦爻之言相為終始與中庸天命之性率性之道修道之敎及成已成物之義皆同易説漢上朱氏曰初九正无妄也九四不正妄也初九以正動上往九四應之往而正正則吉其正行乎上志者動於中也易傳曰誠至於物无不動者以之修身則身正以之治事則事得其理以之臨人則人感而化无所往而不得志也故吉易傳新安朱氏曰以剛在内誠之主也如是而往其吉可知故其象占如此本義六二不耕穫不菑畬則利有攸往象曰不耕穫未富也伊川先生曰凡理之所然者非妄也人所欲一作欲所為者乃妄也故以耕穫菑畬譬之六二居中得正又應五之中正居動體而柔順為動能順乎中正乃无妄者也故極言无妄之義耕農之始穫其成終也田一歲曰菑三歲曰畬不耕而穫不菑而畬謂不首造其事因其事理所當然也首造其事則是人心所作為乃妄也因事之當然則是順理應物非妄也穫與畬是也盖耕則必有穫菑則必有一作為畬是事理之固然非心意之所造作也如是則為无妄不妄則所往利而无害也或曰聖人制作以利天下者皆造端也豈非妄乎曰聖人隨時制作合一作因乎風氣之宜未嘗先時而開之也若不待時則一聖人足以盡為矣豈待累聖繼作也時乃事之端聖人隨時而為也未者非必之辭臨卦曰未順命是也不耕而穫不菑而畬因其事之當然既耕則必有穫既菑則必成畬非必以一无以字一无必字穫畬之富而為者也其始耕菑乃設心在於求一无求字穫畬是以其富也心有欲而為者則妄也並易傳横渠先生曰柔之為道不利逺者能逺利不為物首則可乘剛處實則凶易説藍田吕氏曰无妄之徳剛者得之六二體柔下比於初未能无妄殆未可以有行也然動不失中尚知循理舎下比未為私富之計上應於五不失中正之求亦可以有行矣廣平游氏曰无妄之六二不耕而穫不菑而畬以明君子之於物也應而不倡其於事也述而不作非樂通物也樂循理而已矣循理而已則有行有為皆天命也何妄之有焉雖然六二得位矣而非尊位故其勢不得以始事得中矣而非大中故其才不足以創物是故象以為未富若夫通其變使民不倦神而化之使民宜之應時而造以敏成功其為无妄孰大於此易説龜山楊氏曰不耕而穫不菑而畬皆行其所無事也行其所無事則无妄矣若禹之行水是也雖排淮決泗濬川刋木无往不濟矣故利有攸往易説和靖尹氏曰學問所患有心便非天理動以天其无妄乎動以人欲則妄矣不耕穫不菑畬此學問也易説白雲郭氏曰无妄之卦不利有攸往而六二利有攸往何哉蓋盡天理而動則利有攸往與无妄往吉之義同其匪正則不利有攸往也且耕而穫菑而畬天之理也苟不耕可穫乎不菑可畬乎以是為思而後動則利有攸往矣未富者未能足乎己也誠欲不耕而穫不菑而畬是未能成己之事而遂欲及物非无妄之道也无妄與中庸同必先成己而後成物爻象之辭互為發明盖非一意禮於坊記稱易曰不耕穫不菑畬凶其辭義皆異盖果欲不耕而穫不菑而畬皆妄也故凶既云凶矣何利有攸往之有而象亦不當言未富也盖不耕穫不菑畬之義自昔難通故當時傳授有如是之異者然爻辭言利有攸往必曰則利有攸往象不曰不富而曰未富觀此二者然後得聖人之旨乃知不當有凶字也易説漢上朱氏曰二動體而順乎中正无妄者也故極言无妄可往之理初至五有益體耕也二震為稼艮為手二往之五五來應二兊見震毁艮手兊金銍刈之象穫也二為田田一歲曰菑三歲曰畬初九震足動田之始菑象也五來之二歴三爻而有穫象畬也乾為歲故也夫耕者穫之始畬者菑之成耕必有穫菑必有畬事理之固然非私意所造君子隨時而已无妄也譬如農夫有當首事而耕者有當終事而穫者其於田亦然有當首事而菑者有當終事而畬者當其時之可耕可菑則􅘥荼蓼闢荒穢不為不足當其時之可穫可畬則有倉廩多田稼不為有餘初耕者也二當不耕而穫耕則妄矣初菑者也二當不菑而畬菑則妄矣吾无決擇順乎中正可動而動无所容心也如是則利有攸往有攸往者二往五則穫畬有成矣昔伏羲創法以利天下神農氏黄帝氏相繼而出至堯舜氏而法成若夏商周之損益皆因其禮无妄作也其視前人創法猶已為之是故前聖後聖若出一人彼時此時同為一事不然不待時而為則雖攬天下之美猶為妄也曰未富者盈虚之理盈則虧之虚則實之二隂虚而未盈故不耕而穫若已盈則亦不穫矣莊子所謂天下既已治矣是也易傳新安朱氏曰柔順中正因時順理而无私意期望之心故有不耕穫不菑畬之象言其无所為於前无所冀於後也占者如是則利有攸往矣富如非富天下之富言非計其利而為之也本義又曰不耕穫一句伊川作三意説不耕而穫耕而不穫耕而必穫看來只是也不耕也不穫只見成領㑹他物事問六二不耕穫不菑畬先生曰言不耕不穫不菑不畬无所為於前无所冀於後未嘗略起私意以作為唯因時順理而已程傳作不耕而穫不菑而畬不唯添了而字又文勢牽強恐不如此不耕穫不菑畬易傳但取其不首造竊謂耕菑必因時而作然對穫畬而言則為首造矣易中取象亦不可以文害辭辭害意若必字字拘泥則不耕而望穫不菑而望畬亦豈有此理耶易傳言理甚備象數却欠在又云易傳亦有未安處如无妄六二不耕穫不菑畬只是説一个无所作為之意易傳却言不耕而穫不菑而畬謂不首造其事殊非正意並語録東萊吕氏曰六二不耕穫不菑畬只是无所作為不必説不耕而穫不菑而畬盖无妄天理也才耕穫菑畬則是有意作為非天理也象曰未富也盖天然五榖我強以人力耕穫之是認以為己有而私其富也不耕穫前輩言述之者天也作之者人也正此爻之謂盖述是循其天理自然无妄也作是人為人為則妄矣易傳言心有欲而為者則妄也最好玩味易説六三无妄之災或繫之牛行人之得邑人之災象曰行人得牛邑人災也伊川先生曰三以隂柔而不中正是為妄者也又志應於上欲也亦妄也在无妄之道為災害也人之妄動由有欲也妄動而得亦必有失雖使得其所利其動而妄失己大矣況復凶悔隨之乎知者見妄之得則知其失必與稱也故聖人因六三有妄之象而發明其理云无妄之災或繫之牛行人之得邑人之災言如三之為妄乃无妄之災害也設如有得其失隨至如或繫之牛或謂設或也或繫得牛行人得之以為有得邑人失牛乃是災也借使邑人繫得馬則行人失馬乃是災也言有得則有失不足以為得也行人邑人但言有得則有失非以為彼己也妄得之福災亦隨之妄得之得失亦稱之固不足以為得也人能和此則不為妄動矣行人得牛乃邑人之災也有得則有失何足以為得乎並易傳横渠先生曰妄災之大莫大於妄誅於人以隂居陽體躁而動遷怒肆暴災之甚者繫牛為説縁耕穫生詞易説藍田吕氏曰六三體柔疑於有妄然當无妄之世以隂居陽而上應於陽非純柔者也不可以致无妄之福足以致无妄之災而已六三上應上九上九所以寄託於我不幸為九四所侵失上九之寄託此六三所以獲无妄之災也如有繫牛以寄託於邑人之家者不幸為行人竊取而得則邑人不得不任其失牛之責盖无妄之災出於非意其狀如此龜山楊氏曰牛順物也耕穫所資以為用也六二以中順應乎上行人之象也而三據其前而不得進故曰或繫之牛順而見繫无妄之災也然五以中正在上而二以中正應之非三之所能間乃三自為災耳故曰行人之得邑人之災邑所居之邑三之謂也易説白雲郭氏曰關子明曰无妄而災者災也有妄而災則其所宜也非災之也運數適然非己妄致乃无妄之災自妄召災所宜也災亦不能妄近人也子明之言无妄之災最近之然曰運數適然又非也无妄无運且无數也輔嗣以六三行違謙順為无妄之災失之矣行既違則非无妄況六三有妄乎何則六三非中正之位居震動之極不知遏於動而求止反欲應於上九妄行窮災之爻是亦妄行之人也匪正有眚之道也然亦有行之而无災者孔子所謂㒺之生也幸而免者也爻辭因六三有眚之道而无眚因以明无妄无致災之道而有災也故於无妄之災之後以繫牛行人邑人重明之行人六三也妄行之人也邑人止其所者也止其所者知不利有攸往故也孟子所謂不失赤子之心者也六三知初之往吉二之利有攸往而以動為利不知初往之吉二往之利盖有无妄之道存諸已而六三獨欲以妄得之是窮人欲而滅天理小人徼倖之道也雖得之君子不貴盖其所得不過於物之利而已於道无有焉殆不若邑人寧災而其得多矣故有或繫之牛者為行人之得而邑人受其災夫行人得牛則所得者牛而所失者无妄是得於人而失於天也邑人之災則所受者災而所守者无妄則得失一於天矣中庸曰君子居易以俟命邑人也小人行險以徼倖行人也行人雖得牛驅而納諸罟擭陷阱之中矣可不愼哉六爻无邑人之象能與行人之道相反者皆邑人也故因行人而邑人可明焉然由其小者言之則得失一牛耳由其大者言之則堯湯水旱皆无妄之災也於道何損焉易説漢上朱氏曰六二中正无妄也三四不正有妄也故以兩爻明六二无妄之災坤為牛四巽繩艮手或繫之牛或疑辭四見疑以不正故疑之三震為大塗為足行人也四不繫之牛人以其不正或疑之妄也三不正而躁亦妄也往乘四妄而又妄不得位行人得牛牛非行人之所當得妄動而干之非順乎理者也四來乘三三在險中三自取之有妄而災則其宜也非災之者也坤土在下為邑邑人謂六二六二中正順理静而不往无妄何災矣然三動則二亦近於險非自取也莊周謂魯酒薄而邯鄲圍者乎關子明曰无妄而災者災也君子於无妄之災如之何夭壽不貳修身以俟之所以立命也故三四復位六二卒與五應易傳新安朱氏曰卦之六爻皆无妄者也六三處不得正故遇其占者无故而有災如行人牽牛以去而居者反遭詰捕之擾也本義問无妄之災先生曰此卦六爻皆是无妄但六三地頭不正故有无妄之災言无故而有災也如行人牽牛以去而居人反遭詰捕之擾此正无妄之災之象大抵无妄一卦固是无妄但亦有无故非意之事故聖人因象示戒又問史記作无望謂无所期望而有得疑有六二不耕穫不菑畬之意先生曰此出史記春申君傳正説李園事正是説無巴鼻而有一事正合无妄之災无妄之疾亦見得古人相傳尚識得當時此意也語録東萊吕氏曰六三或繫之牛觀此爻人之徼求幸得之心皆可息也象辭曰行人得牛邑人災也其指示人尤為簡切盖无妄之得失必隨之初不曽得也易説九四可貞无咎象曰可貞无咎固有之也伊川先生曰四剛陽而居乾體復无應與无妄者也剛而无私豈有妄乎可貞固守此自无咎也九居隂得為正一作貞乎曰以陽居乾體若復處剛則為一无為字過矣過則妄也居四無尚剛之志也可貞與利貞不同可貞謂其所處可貞固守之利貞謂利於貞也貞固守之則无咎也並易傳藍田吕氏曰九四无應下比六三三應於上比之非正當固有所守不妄求比乃可无咎龜山楊氏曰九四以剛居隂能固有之也无應於上下无妄者也故可貞无咎易説白雲郭氏曰九四為乾體之下震動之象革矣動革則止止則能固守天道而不失是可固有无妄者也於道何咎之有孔子曰以約失之者鮮矣顔子拳拳服膺而弗失皆九四之謂也易説漢上朱氏曰明人情終不妄也九四剛而不正剛則私慾不行私慾不行則至於无妄无妄則无咎然且有咎者不正也正者四之所固有也操存舎亡非外鑠也九既剛矣動則正正則无妄故曰可貞无咎固有之也致无妄者必自剛大妄始於慾慾之為害自一介取諸人充之至於為盗舜與跖之分其初甚微也剛者能絶之不以小害為无傷而不去故此爻在妄為剛者聖人與之可正也正則剛在其中上九亦剛不曰可貞者妄之極也易傳新安朱氏曰陽剛乾體下无應與可固守而无咎不可以有為之占也有猶守也本義東萊吕氏曰五以剛居中正之位二復以中正相應是順理而為无妄此猶可識也四以剛陽而居乾體復无應與亦謂之无妄此最難識譬如為屋長短之中則易見輕重之中則難識盖四地位既偏聖人所以戒人可以正固守之也此有二義以九居四剛柔相濟為中中則无妄易説九五无妄之疾勿藥有喜象曰无妄之藥不可試也伊川先生曰九以中正當尊位下復以中正順應之可謂无妄之至者也其道无以加矣疾為之病者也以九五之无妄如其有疾勿以藥治則有喜也人之有疾則以藥石攻去其邪以養其正若氣體平和本无疾病而攻治之則反害其正矣故勿藥則有喜也有喜謂疾自亡也无妄之所謂疾者謂若治之而不治率之而不從化之而不革以妄而為无妄之疾舜之有苖周公之管蔡孔子之叔孫武叔是也既已无妄而有疾之者則當自如无妄之疾不足患也若遂自攻治乃是渝其无妄而遷於妄也五既處无妄之極故惟戒在動動則妄矣人之有妄理必修改既无妄矣復藥以治之是反為妄也其可用乎故云不可試也試暫用也猶曰少嘗之也並易傳横渠先生曰體健居尊得行其志故以无妄為疾无妄之疾疾无妄之謂也欲妄動而不敢妄是則以无妄為疾者也如孟子言有法家拂士是疾无妄者也以无妄為病而醫之則妄之意遂矣故曰勿藥有喜又曰不可試也言不可用藥治之並易説藍田吕氏曰九五下有六二之應以正合者也初九雖欲比二非意見侵乃无妄之疾非己致也二自守中初莫能犯卒獲正應如疾非己致治之愈亂不治而自愈矣雖有治疾之具不可用也龜山楊氏曰五以剛健中正而履尊位二以中順應之无妄之至不可有加矣而下猶有弗率者盖无妄之疾也以藥治之則反傷其平矣此无妄之藥所以不可試也舜之時苖民逆命所謂无妄之疾也禹之徂征用益贊之言而班師知藥之不可試也禹不班師則順命之民必有被其毒者其可乎故舞干羽而有苗格勿藥之喜也然周公東征邦君越庶士御事㒺不反曰艱大以為考翼不可征非一人而已而周公必征之何也盖當是時外則淮夷叛内則羣叔流言乃欲反鄙我周邦非无妄之時也與益贊之言異矣此周公所以必征也易説白雲郭氏曰易以乘剛為疾豫之六五是也乘剛之疾自取之也非无妄也九五以剛乘剛居中得正无自取之道故為无妄之疾也人之有疾也或以藥石攻去其邪而復其正或損益有餘不足以適其平然此治豫之貞疾則可治无妄之疾則不可盖疾以无妄而攻我我以有妄治之則天理滅矣是所以勿藥有喜藥者有妄之物也而孔子又言不可試者盖深絶之盖其必不可用有妄之藥也災與疾其理相類无妄雖有災而有有妄无災者幸也无妄雖勿藥而有有妄勿藥者亦幸也皆小人之道也凡足以害无妄者皆謂之疾易説漢上朱氏曰九五六二无妄相與而九四以妄間之九五之疾也疾者隂陽失位之象五動四成坎坎為毒藥之象醫師聚毒攻邪濟人於險者也易傳曰治之而不治率之而不從化之而不革若舜之有苗周公之管蔡孔子之叔孫武叔然而无妄之疾非妄所致勿藥可也蓋九五至正戒之在動動而求所以攻之則不正復入於妄以妄治妄其疾愈深待之以正則邪妄自復故曰不可試也試猶嘗試言不可妄動少有所試二不能往五得位而二應勿藥有喜也不正則二不應其能喜乎喜陽得位之象易傳新安朱氏曰乾剛中正以居尊位而下應亦中正无妄之至也如是而有疾勿藥而自愈矣故其象占如此既已无妄而復藥之則反為妄而生疾矣試謂少嘗之也本義問九五陽剛中正以居尊位无妄之至何為而有疾先生曰此是不期而有此但聽其自然乆則自定所以勿藥有喜而无疾也語録東萊吕氏曰九五居无妄之至惟能自信則勿藥而有喜易傳言惟戒在動動則妄矣盖是極正之理增分毫則為贅過分毫則為過既已无妄而復動是亦以妄為无妄之疾也象言不可試也試字最要看蓋疾則无妄而猶欲嘗試其藥則已不自信矣即妄也如目疾者以青為紅以白為黒色初未曾變也今惟當自治其目而色自定却无改色以從目之理易説上九无妄行有眚无攸利象曰无妄之行窮之災也伊川先生曰上九居卦之終无妄之極者也極而復行過於理也過於理則妄也一作矣故上九而行則有過眚而无所利矣无妄既極而復加進乃為妄矣是窮極而為災害也並易傳横渠先生曰進而過中是无妄而行也易説藍田吕氏曰上九雖以剛健居无妄之時然過亢失中知剛而不知柔者也行不可過過則窮窮則災物之理也龜山楊氏曰无妄之終居乾道上行之極不可往往斯過矣故戒之以行有眚无攸利易説白雲郭氏曰上九居卦之極而不知止於是猶欲行焉行則失无妄之道所謂无妄之往者也是為有眚之道也何利之有初之往吉未過也二之攸利得中也三之行人之得幸免也上九行有眚窮之災也窮之災自取也非无妄也易説漢上朱氏曰无妄之時妄者三爻六三九四上九是也九四可貞六三下體之極上九上體之極上九妄之尤極者也上行之三成離離有伏坎坎為眚三行之上成兊兊為毁折行有眚也上九六三之妄行即得正然且有眚者妄極而窮窮之災雖行其能免乎爻言眚象言災處妄之極不有人禍必有天殃故夫子極天人以告之易傳新安朱氏曰上九非有妄也但以窮極不可行耳故其象占如此本義東萊吕氏曰上九无妄至理也而上九則至理之極也至理之極不可加一毫人偽於此而猶有行焉則乃妄而有眚矣天理所在損一毫則虧增一毫則贅无妄之極天理純全雖加一毫不可矣孔子稱顔子吾見其進未見其止也未止則有所進既止矣雖少進亦不可故象曰无妄之行窮之災也盖窮極則過過則反為无妄之害言无妄之窮而又行所以災也易説合訂刪補大易集義粹言卷二十九
