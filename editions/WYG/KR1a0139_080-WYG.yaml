body:
  text: 合訂刪補大易集義粹言卷七十八頭等侍衛納喇性德編子曰乾坤其易之門邪乾陽物也坤隂物也隂陽合德而剛柔有體以體天地之撰以通神明之徳其稱名也雜而不越於稽其類其衰世之意邪伊川先生曰或曰乾坤易之門其義難知餘卦則易知也曰乾坤天地也萬物烏有出天地之外者乎知道者統之有宗則然也而在卦觀之乾坤之道簡易故其辭平直餘卦隨時應變取舍无常尤為難知也知乾坤之道者以為易則可也經説横渠先生曰推而行之存乎通所謂合徳隤然確然所謂有體乾於天為陽於地為剛於人為仁坤於天則隂於地則柔於人則義先立乾坤以為易之門户既定剛柔之體極其變動以盡其時至於六十四此易之所以教人也其文辭錯綜而條理不雜世衰則天人交勝其道不一易之情也並易説龜山楊氏曰或問易曰乾坤其易之門所謂門莫是學易自此入否曰不然今人多如此説故有喻易為屋室謂其入必有其門則乾坤是也為此言者只為元不曉易夫易與乾坤豈有二物孰為内外謂之乾坤者因其健順而命之名耳乾坤即易易即乾坤故孔子曰乾坤毁則无以見易蓋无乾坤則不見易非易則无乾坤謂乾坤為易之門者隂陽之氣有動静屈伸爾一動一静或屈或伸闔闢之象也故孔子又曰闔户謂之坤闢户謂之乾所謂門者如此老子曰天地之間其猶槖籥乎夫氣之闔闢徃來豈有窮哉有闔有闢變由是生其變无常非易而何大抵看易須先識他根本然後有得夫易求之吾身斯可見矣豈應外求横渠於正䝉中曽略説破云乾坤之闔闢出作入息之象也非見得徹言不能及此某舊曾作明道哀詞云通闔闢于一息兮尸者其誰蓋言易之在我也人人有易不知自求只於文字上用功要作何用問乾坤即隂陽之氣否曰分明説乾陽物坤隂物既是隂陽又曰乾坤何也曰乾坤止言其健順爾欲識本根須是知體同名異自然意義曉然並南都語録廣漢張氏曰易寓於乾坤乾坤可以見易故乾坤乃易之門言易之道出入於乾坤之兩間者乎以卦言之乾之三竒乃陽物也坤之三耦乃隂物也三竒三耦索而為六子互體卦變積而為六十四此隂陽合徳而剛柔有體也夫四時之迭運五行之攸序皆天地之撰也聖人作易所以體天地之撰者如損益之盈虚剥復之進退乃體天地之撰者乎隂陽之造化剛柔之消長皆神明之徳也聖人作易所以通神明之徳者如知死生之説知幽明之故乃通神明之徳者乎是以三易之稱或曰歸蔵而始於坤或曰連山而始於艮或曰周易而始於乾坤此三者之名雖曰雜也然其畫皆六其卦皆八初未嘗越於道也然考其類之所在則夏曰連山商曰歸蔵周曰周易皆世衰道微者乎易説屏山劉氏曰學易者必有門户復卦易之門户也入室者當自户始學易者當自復始屏山集白雲郭氏曰此章論易之為書也乾坤二卦在易之書猶易之門學者首當明乾坤之義也自道言之三才之内无非物乾坤雖非天地萬物以類言之亦陽物隂物也況在易之乾坤見於卦象者乎乾坤合隂陽之徳而後有剛柔之體蓋言先得乾坤隂陽之道而後見於象者剛柔之體具焉剛柔之體具則六十四卦由之而生故觀其象則可以體天地之撰明其義則可以通神明之徳矣六十四卦稱名雖雜而不越乎乾坤剛柔之一道也稽其言之類不過於幾微禍福吉凶悔吝豈皆衰世之意邪是亦聖人之情見乎辭也易説漢上朱氏曰乾坤其易之門邪乾坤毁則易无自而入矣乾剛者陽之物老陽之䇿也其徳則健坤柔者隂之物老隂之策也其徳則順隂陽氣也剛柔形也氣變而有形形具而有體是故揔策成爻健順合徳而剛柔之體見矣聖人以此體天地之撰體形容之也撰定也形容天地之所定者體造物也即剛柔有體是已天神也地明也通神明之徳者示幽顯一源也即隂陽合徳是已隂陽相盪剛柔相推自乾坤而變八卦自八卦而變六十四卦三百八十四爻其稱名也雜然不齊枝葉至扶踈矣而亦不越乎隂陽二端而已乾坤其易之門邪伏羲始畫八卦文王監於二代而作周易周公因於文王而作爻辭卦有象爻有變動繫辭焉而命之日益詳矣蓋時有汙隆道有升降世既下衰不如是不足以盡天下之情偽何以知其然哉於此稽考其類則知之矣易傳新安朱氏曰諸卦剛柔之體皆以乾坤合徳而成故曰乾坤易之門撰猶事也萬物雖多无不出於隂陽之變故卦爻之義雖雜出而不差繆然非上古淳質之時思慮所及也故以為衰世之意蓋指文王與紂之時也並本義乾坤易之門不是乾坤外别有易只易便是乾坤乾坤便是易似那兩扇門相似一扇開便一扇閉只是一箇隂陽做底如闔户謂之坤闢户謂之乾問門者是六十四卦皆由是出如兩儀生四象只管生出邪為是取闔闢之義邪曰只是取闔闢之義六十四卦只是這一箇隂陽闔闢而成但看他下文云乾陽物也坤隂物也隂陽合徳而剛柔有體便見得只是這兩箇乾陽物坤隂物隂陽形而下者乾坤形而上者天地之撰撰即是説他做處問其稱名也雜而不越是指繫辭而言是指卦名而言曰他後面兩三畨説名後又舉九卦説看來只是謂卦名又曰繫辭自此以後皆難曉於稽其類一本作於稽音啓其顙又一本於作烏不知如何曰但不過是説稽考其事類其衰世之意邪伏羲畫卦時這般事都已有了只是未曾經歴到文王時世變不好古來未曾有底事都有了他一一經歴這崎嶇萬變過來所以説出那卦辭如箕子之明夷如入于左腹獲明夷之心于出門庭此若不是經歴如何説得並語録夫易彰徃而察來而微顯闡幽開而當名辨物正言斷辭則備矣其稱名也小其取類也大其㫖逺其辭文其言曲而中其事肆而隠因貳以濟民行以明失得之報横渠先生曰夫易彰徃察來而微顯闡幽如坤初六驗履霜於己然察堅冰於將至之類數徃知來其義一也顯者則微之使求其原幽者則闡之使見其用故曰其事肆而隠天下之理既己思盡思易之三百八十四爻變動以寓之人事告人以當如何時如何事若其應也如何則吉如何則凶宜動宜静丁寧以為告戒此因貳以濟民行也並易説廣漢張氏曰論易之神彰徃察來論易之道微顯闡幽徃來以時言或徃或來以其无常人不能知也惟易之神徃者彰之來者察之微幽以理言或微或幽人不能察也惟易之道微者顯之幽者闡之易之神易之道儻非乾坤開而當名辨物正言斷辭則易之道安能備而無窮乎是以乾陽物其數為竒坤隂物其數為耦陽竒隂耦以示之然後即其健而名之以乾即其順而名之以坤以至六子六十四卦當其名也夫名既當則剛柔之物雖曰相雜蓋有自然而辨者矣言天下之至賾而為象言天下之至動而為爻以至吉凶者言乎其失得悔吝者言乎其小疵皆正其言也夫言既正則辭之指其所者蓋有自然而斷者矣夫名卦曰暌而已而天下之事同男女之事類在焉名卦以恒而已而日月之久照四時之久成在焉此稱名小而取類大也利用安身窮神知化咸九四之意深矣其辭乃曰憧憧徃來朋從爾思而已氤氲化醇男女構精損六三之意逺矣其辭乃曰三人行則損一人一人行則得其友而已此其㫖逺其辭文也在同人未嘗言同所言者類族辨物之事其言雖曲也乃中其尚同大過之弊也在鼎所載者以木巽火烹飪之事其事甚肆而易見也然所寓者皆飬賢享帝與夫取新之道隠於其間也是以民之雖安其危而利其菑樂其所以亡甚者有知者疑而不能肆其謀有力者疑而不能肆其勇此聖人之作易所以因民之疑以濟其民行所以明其失得之報並易説白雲郭氏曰易之為書也所以彰徃聖之道察方來之變而垂教於无窮其微顯闡幽所謂顯道神徳行也開明大道至於六十四其當名辨物正言斷辭无或不備雖其稱名小者其取類大也㫖逺者道具於㫖也辭文者道顯於辭也其言屈曲而發无不中其事肆直而理无不精開明失得之報以濟民之所行故曰因貳貳者失得也斯道得則吉報之斯道失則凶報之故吉凶所以為失得之報也前言當名謂卦也辨物謂象也正言爻彖之辭也斷辭繫之以吉凶者也易説漢上朱氏曰夫易之為書以八卦言之自震至乾彰徃也自巽至坤察來也一徃一來周旋无窮是謂環中以重卦言之前卦為徃後卦為來自内之外為徃自外之内為來彰徃故微顯察來故闡幽顯莫如既徃而有微而難知之理幽莫如方來而有顯而易見之象開釋爻卦各當其名无隱也辨隂陽之物正吉凶之辭无遺也斷之以卦辭爻辭則備矣觀乎此宜若坦然明白使人易曉矣然而其稱名也小則百物不廢其取類也大則達之於天下意有餘故其㫖逺物相雜故其辭文其言致曲而復中於道其事閎肆而實本於隱非天下至神至精至變有不能與也而又因其疑貳不決恐懼易入之時以濟民行告之以吉凶悔吝之辭以明失得之必報蓋有逺害防患之心非衰世之意乎易傳新安朱氏曰而微顯恐當作微顯而開而之而亦疑有誤肆陳也貳疑也本義彰徃察來徃者如隂陽消長來者事之未來吉凶問彰徃察來如神以知來知以蔵徃相似徃是已定底如天地隂陽之變皆已見在這卦上了來謂方來之變亦皆在這上曰是幽者不可見便就這顯處説出來顯者便就上面尋其不可見底教人知得微顯闡幽便是顯道神徳行徳行顯然可見者道不可見者微顯闡幽是將道來事上看言那箇雖是麤底然皆出於道義之藴微顯所以闡幽闡幽所以微顯只是一箇物事將那道理來事物上與人看就那事物上推出那裏面有這道理並語録右第六章新安朱氏本義曰此章多闕文疑字不可盡通後皆放此易之興也其於中古乎作易者其有憂患乎伊川先生曰如言仁者不憂又却言作易者其有憂患須要知用處各别也天下只有一箇憂字一箇怨字既有此二字聖人安得无之劉元承手編横渠先生曰諳識情偽吉凶之變故能體盡性命易説廣漢張氏曰伏羲神農黄帝堯舜之時上下數千百年民淳事簡三畫足以周天地之情八卦足以盡事物之變當是時也易不以不興而亡也及夫周之文王在商受之時有君人之大徳内文明而外柔順望道而未見於是重伏羲之一卦而八八卦而六十四一爻而六六爻而三百八十四此易所以興於中古也然六十四卦皆濟民行而出民於憂患也而特取九卦以言之者蓋渉世路始於履終於巽則庻幾免人道之患也下文所以三言之易説白雲郭氏曰易始於包犧而興於文王故曰中古作易者其有憂患乎盖謂文王也説者謂既有憂患則須脩徳以避患故明九卦為徳之所用誤矣夫聖人脩徳又豈係於憂患乎而孔子言此者蓋以聖人居崇髙之位道行於天下為帝為王參天地賛化育則易行乎其中矣固不必有作也及其道不行於天下而憂患天下後世之深欲力以斯文昭示來世則不得不作矣此文王所以䝉大難而作易也然則孔子道不行而繫易其亦所謂憂患者乎故憂患者蓋憂患後世之不復與聞斯道也易説漢上朱氏曰作易者上古也興易者中古也何以知易興於中古邪觀九卦之象聖人有憂患後世之心得失滋彰矣然則上古作易何以知有憂患乎曰聖人隨時者也佃漁不厭則耒耜之利不興結繩未弊則書契之文不作而所以憂患後世者固已具於八卦之中至於文王而易道興矣易傳新安朱氏曰夏商之末易道中微文王拘於羑里而繫彖辭易道復興本義是故履徳之基也謙徳之柄也復徳之本也恒徳之固也損徳之脩也益徳之裕也困徳之辨也井徳之地也巽徳之制也横渠先生曰巽徳之制者量宜接物故曰制也易説廣漢張氏曰是以君子非禮勿履欲崇其徳必始於禮履為徳之基謙者處後而人先之君子有終不可須㬰去也故曰謙徳之柄人復而反本則不逐於末故曰復徳之本人而無恒不可以作巫醫故恒則徳之固而不可動搖乎損去其害徳者徳自此而脩矣益者日益以增而進故綽然有餘也在困窮之時不待言而徳自辨矣風雨然後知雞鳴不已嵗寒然後知松柏之後彫也積徳如井内不失己外不失人而又不改焉所以為徳之地巽以行權巽為木言其曲直不執一節巽為風言其去來不知所自徳至於巽則達權通變制於事而不執於一方如工之制器者乎易説俞秀才問九卦乃學者用工之實歟先生曰九卦有次序履徳之基為先歩歩􅂿實地也南軒集白雲郭氏曰聖人用易上篇言之詳矣而脩徳之事或未盡也故舉九卦以明之夫擇可履而履之故為徳之基謙以持之為徳之柄復以反之為徳之本恒以可久為徳之固損其害己之欲故為徳之脩遷其益己之善故為徳之裕困而不失其所亨故為徳之辨改邑不改井井猶性也故為徳之地巽以申命行事故為徳之制此聖人以九卦成徳於内也易説漢上朱氏曰履説而應乎乾履乎和者也故為徳之基謙執之而有終者也故為徳之柄復剛反動而復其初徳自此始者也故為徳之本恒乆而不已終則有始者也故為徳之固損損其可損而致一者也故為徳之脩益益其可益而日進者也故為徳之裕困剛見揜而不失其所亨者也故為徳之辨井剛中而不變者也故為徳之地巽以剛下柔不失乎中者也故為徳之制易傳新安朱氏曰履禮也上天下澤定分不易必謹乎此然後其徳有以為基而立也謙者自卑而尊人又為禮者之所當執持而不可失者也九卦皆反身脩徳以處憂患之事也而有序焉基所以立柄所以持復者心不外而善端存恒者守不變而常且久懲忿窒慾以脩身遷善改過以長善困以自驗其力井以不變其所然後能巽順於理以制事變也本義鄭仲履問易繫云作易者其有憂患乎如何止取九卦曰聖人論處憂患偶然説此九卦爾天下道理只在聖人口頭開口便是道理偶説此九卦意思自足若更添一卦也不妨更不説一卦也不妨只就此九卦中亦自儘有道理且易中儘有處憂患底卦非謂九卦之外皆非所以處憂患也若以困為處憂患底卦則屯蹇非處憂患而何觀聖人之經正不當如此後世拘於象數之學者乃以為九陽數聖人之舉九卦合此數也尤泥而不通矣今之談經者徃徃有四者之病本卑也而抗之使髙本淺也而鑿之使深本近也而推之使逺本明也而必使至於晦此今日談經之大患也三説九卦是聖人因上面説憂患發明此一項道理不必深泥如困徳之辯若説蹇屯亦可蓋偶然如此説大抵易之書如雲行水流本無定相確定説不得揚子雲太𤣥一爻吉一爻凶相間排將去七百三十賛乃三百六十五日之晝夜晝爻吉夜爻凶又以五行參之故吉凶有深淺毫髪不可移此可為典要之書也聖人之易則有變通如此卦以陽居陽則吉他卦以陽居陽或不為吉此卦以隂居隂則凶他卦以隂居隂或不為凶此不可為典要之書也履徳之基只是要以踐履為本謙徳之柄只是要謙退若處患難而矯亢自髙取禍必矣復徳之本如孟子所謂自反困徳之辨困而通則可辨其是困而不通則可辨其非損是懲忿窒慾益是脩徳益令廣大巽徳之制巽以行權巽只是低心下意要制事須是將心入那事裏面去順他道理方能制事方能行權若心麤只從事皮膚上綽過如此行權便就錯了巽伏也入也問井徳之地曰井有本故澤及於物而井未嘗動故曰居其所而遷如人有徳而後能施以及人然其徳性未嘗動也井以辯義如人有徳而其施見於物自有斟酌裁度問巽徳之制曰巽為資斧巽多作斷制之象蓋巽字之義非順所能盡乃順而能入之義謂巽一隂入在二陽之下是入細直徹到底不只是到皮子上如此方能斷得殺若不見得盡如何可以行權並語録履和而至謙尊而光復小而辯於物恒雜而不厭損先難而後易益長裕而不設因窮而通井居其所而遷巽稱而隱伊川先生曰益長裕而不設謂固有此理而就上充長之設是撰造也撰造則為偽也周行已録横渠先生曰履和而至和必以禮節之注意極佳益必實為有益如天之生物長必裕之非虚設也益長裕而不設益以實也妄加以不誠之益非益也巽稱而隱順以達志故事舉而意隱並易説益物必誠如天之生物日進日息自益必誠如川之方至日增日得施之妄學之不勤欲自益且益人難矣哉易曰益長裕而不設信夫正蒙廣漢張氏曰孔子論乾之九三曰知至至之可與幾也蓋言九三不中能知中之可至此知幾也故中者可至之地不及於中非至也過於中非至也禮而行其大同於人而又得不失於中也故曰履和而至謙之彖曰謙尊而光此又復云者言尊者知謙則合并天下衆善善為君子之光者矣人之復貴乎早方其發於心萌於慮如顔子之不逺復此小而辨於物也若夫物交物則引之而已白而易汙者不若湼而不緇剛而易折者不若磨而不磷故有恒徳者雜之而不厭然後見其道之久也去其害己懲忿窒慾所以為難也及夫毁已逺害則復易焉天下之益有心為之此出於作為所以為設也人君之益天下天地之益萬物長之裕之皆貴於不設因其自然可也在困而能通者所以為君子也是以經曰困而不失其所亨者其唯君子乎故阨窮禍患人不我知君不我用此困宜乎窮也然君子致命遂志而其道常通者乃困而不失其所亨也能諸已然後可以推而及人井居其所乃存諸已徃來井井遷而及人者也凡為人者必失己為己者必失人惟井居其所而遷此物我兩存也有智名者智有時而窮有勇名者勇有時而竭曽不知巽之為道時之或文或質事之或寛或猛皆稱其宜殆求其迹而不可見者此巽稱而隱者乎易説白雲郭氏曰説而應乎乾和也辯上下定民志至也尊而謙益光之道也復之早辨不逺復也剛柔皆應恒是以雜而不厭也懲忿窒慾先難後易也天施地生其益无方長裕不設也不設者不居於一方也困窮而通人窮而道亨也井居其所而能遷其不窮之飬也巽之申命其稱也順而入之其隱也此九卦之性情也易説漢上朱氏曰履和而至於禮不至則流而徇於物矣謙卑而人尊之其道光也復小而辨於物者以初九也人之所以異於萬物者以其存心也復之剛陽反動於初則善心生於冥昧難知之時不俟乎大而後與物辨也斯非徳之本歟恒泰之變也初九正也動而之三雷風並作萬物繁興之時三守正不動酬酢而不厭天地所不能旋日月所不能眩可以言徳之固矣損先難而後易何也情慾者强陽之氣也初損之必有吝心剛健決斷乃能行之故先難也及其既損考諸理而順反諸心而悦其孰禦我哉故後易也夫一介不以取諸人然後繫千駟之馬而弗視禄之以天下而弗顧故曰仁亦在熟之而已益長裕而不設何也益否之變也九四下益於初初九正也益物以誠也益物以誠即是自益以誠故四與初以益而正誠自成也受益者不贅益之者不虧與時偕行如天地之裕萬物非張設之也困窮而通何也否之上九陷而之二上下柔揜之窮也處險而説在窮而心亨通也通者不窮之謂豈必富貴利達而後為通哉故曰學不能行謂之病病則窮矣井居其所而遷何也泰初之五為井初九正也九五亦正也初遷之五徃者正也五遷之初來者正也五居其所而徃來皆正能遷也巽稱而隱何也遯二之四為巽稱者輕重均之謂也二隂方進六二從四九四君子屈己以下之則君子小人勢均矣人見其屈己以為巽而不知六二亦巽乎剛故曰稱而隱易傳新安朱氏曰此如書之九徳禮非强世然事皆至極謙以自卑而尊且光復陽微而不亂於羣隂恒處雜而常徳不厭損欲先難習熟則易益但充長而不造作困身困而道亨井不動而及物巽稱物之宜而潛隱不露本義損先難而後易如子産為政鄭人歌之曰孰殺子産吾其與之及三年人復歌而誦之蓋事之初在我亦有所勉强在人亦有所難堪久之當事理順人心這裏方易便如利者義之和一般義是一箇斷制物事恰似不和久之事得其宜乃所以為和如萬物到秋許多嚴凝肅殺之氣似可畏然萬物到這裏若不得此氣收歛凝結許多生意又無所成就其難者乃所以為易也益長裕而不設長裕只是一事但充長自家物教寛裕而已困窮而通此因困卦説澤无水困君子以致命遂志蓋此是致命遂志之時所以困彖曰險以説困而不失其所亨其惟君子乎蓋處困而能説也困而寡怨是得其處困之道故无所怨於天无所尤於人若不得其道則有所怨尤矣井居其所而遷井是不動之物然其水却流行出去利物井以辯義辯義謂安而能慮蓋守得自家先定方能辨事之是非若自家心不定事到面前安能辯其義也巽稱而隱巽是箇卑巽底物事如兊見而巽伏也自是箇隱伏底物事蓋巽一隂在下二陽在上隂初生時已自稱量得箇道理了不待顯而後見如事到面前自家便有一箇道理處置他不待發露出來如云尊者於己踰等不敢問其年蓋才見箇尊長底人便自不用問其年不待更計其年然後方稱量合問與不合問也稱而隱是巽順恰好底道理有隱而不能稱量者有能稱量而不能隱伏不露形迹者皆非巽之道也巽徳之制也巽以行權都是此意問巽稱而隱曰以巽以行權觀之則稱字宜音去聲為稱物之義又問巽有優游巽入之義權是義精仁熟於事能優游以入之意曰是又曰巽是入細底意説在九卦之後是八卦事了方可以行權某前時以稱揚為説錯了並語録履以和行謙以制禮復以自知恒以一徳損以逺害益以興利困以寡怨井以辯義巽以行權明道先生曰巽以行權義理所順處所以行權朱公掞問學拾遺横渠先生曰稱物平施隨所求小大與之此辯義也巽以行權者不巽則失其宜也並易説廣漢張氏曰人之行或太過或不及或為人或為己不得其節者多矣惟履有以和其行則仁不失於姑息義不失於刻剥信不至於失己智不至於穿鑿此履所以和行也謙之象曰稱物平施而傳謙以輕為戒故君子之謙非樂於下人者也徳言盛禮言恭謙以制禮而未嘗過也有不善未嘗不知知之未嘗復行此豈非自知乎此非因人而知乃悟之於心覺之於性也故曰復以自知徳惟一動罔不吉徳二三動罔不凶恒之君子素富貴行乎富貴素貧賤行乎貧賤其徳如天地之貞觀日月之貞明終始如一故曰恒以一徳九卦所論皆脩身行己之事損以逺害益以興利非謂去天下之害興天下之利也害於己者逺之如懲忿窒慾是也利於己者興之如遷善改過是也逺害之逺如逺佞人之逺興利之興如興於詩之興在困而怨者不能樂天者也然人皆有情能寡其怨者亦可貴也欲知義觀諸井則義明矣此井所以辯義九卦惟井為象之顯然者所以明其義人之出處進退取舍辭受即井以明之故内能存己外不絶物乃為義也孔子謂可與共學未可與適道可與適道未可與立可與立未可與權此權不易至也至於巽以行權則人道之患莫能及矣所以終之以此易説白雲郭氏曰聖人因履之和以和行因謙之遜以制禮因復以自反於道因恒以不變其徳因損以去其害己者因益以遷善因困而亨道則无怨尤於天人因井以辯勞民徃來之有義因巽以行申命之權是皆聖人用九卦以見於有行也權者反於古而宜於今道之權也非小人之狙詐也堯舜傳賢而禹傳子權也夏尚忠商尚質周尚文亦權也易説漢上朱氏曰履以和行何也和者禮之用節者禮之體節而不和禮不行矣謙以制禮何也禮自卑而尊人自後而先人不能乎謙安能行禮復以自知何也有善必自知之不善必自知之脩其善則復矣恒以一徳何也雜而不厭非徇物也乆而不變也乆則其徳无二三矣損以逺害何也自損以脩徳則物无害之者故曰恭寡過情可信儉易容也以此失之者鮮矣益以興利何也因其所利而利之也困以寡怨何也雖困而通在窮而恱樂天者也我不尤人人復何怨井以辯義何也井自守以正與人必以正處己處人各得其宜者也巽以行權何也權者稱之所以輕重也與時推移冺然无際如行權稱物人見其適平而已其序則履和執謙復本恒久損己益人然後可以處困不窮能遷然後可以行權九卦履出於乾謙復出於坤恒出於震損出於艮益出於巽困井出於坎獨不取離何也離萬物皆相見之卦包犧氏取之文王内文明外柔順以蒙大難明在地中時也易傳新安朱氏曰寡怨謂少所怨尤辨義謂安而能慮本義問井以辨義之義曰井居其所而遷又云井徳之地也蓋井有定體不動然水却流行出去不窮猶人心有持守不動而應變則不窮也徳之地也地是那不動底地頭一本云是指那不動之處又曰佛家有函蓋乾坤句有隨波逐流句有截斷衆流句聖人言語亦然如以言其逺則不禦以言其邇則静而正此函蓋乾坤句也如井以辯義等句只是隨道理説將去此隨波逐流句也如復其見天地之心神者妙萬物而為言此截斷衆流句也問巽以行權曰權之用便是如此見得道理精熟後於物之精微委曲處無處不入所以説巽以行權問權是逶迤曲折以順理否曰然巽有入之義巽為風如風之入物只為巽便能入義理之中無細不入又問巽稱而隠隠亦是入物否曰隠便是不見處隱不見也如風之動物无物不入但見其動而不見其形權之用亦猶是也問巽以行權恐是神道曰不須如此説巽只是巽順低心下意底氣象人至行權處不少巽順如何行得此外八卦各有所主皆是處憂患之道巽以行權兊見而巽伏權是隱然做底物事若顯然底做却不成行權並語録右第七章新安朱氏本義曰此章三陳九卦以明處憂患之道易之為書也不可逺為道也屢遷變動不居周流六虚上下无常剛柔相易不可為典要唯變所適康節先生曰易无體也曰既有典常則是有體也恐遂以為有體故曰不可為典要既有典常常也不可為典要變也觀物外篇横渠先生曰心不存之是逺也不觀其書亦是逺也蓋其為道屢遷易説廣漢張氏曰易之書所以載道以其載道故不可逺如居則觀其象而玩其辭動則觀其變而玩其占譬之日月之於人水火之飬生人雖欲逺之有不可得者故曰不可逺故其為道也屢遷觀其變動不居周流六虛此言六爻无定位也上下无常剛柔相易此言六爻无定體也惟變動不居周流於六位之間故六位為虚器惟上下无常而莫適乎剛柔之用故剛柔无定體非若冊之有典而太常可考也非若體之有要而衆形可㑹也唯變所適而已凡此者皆言其為道也屢遷者歟易説白雲郭氏曰人之於道不可須㬰離也故於易不可逺可離者非道可逺者亦非易也易之為道數遷而變動未嘗止周流六爻或以下而升上或由上而降下以剛易柔以柔易剛不可以常道拘也唯變所適而已此之謂易之道也易説漢上朱氏曰龔原曰易之為書也三章當為一此章言易有變動出入易之為書明天地之用其用不過乎六爻不可逺也逺此而求之則違道逺矣其道也屢遷有變有動不居其所升降徃來循環流轉於六位之中位謂之虚者虚其位以待變動也故太𤣥九位亦曰九虚或自上而降或自下而升上下无常也剛來則柔徃柔來則剛徃剛柔相易也无常則不可為典相易則不可為要流行散徙唯變所適然亦不過乎六爻不過者以不可逺也易傳周易論變故古人言易雖不筮必以變言其義史墨論乾之初九曰在乾之姤九二曰其同人九五曰其大有上九曰其夬用九曰其坤坤之上六曰其剥以史墨之言推之則乾九三當曰其履九四曰其小畜伯廖舉豐上六曰其在周易豐之離知莊子舉師初六曰在師之臨至今占亦然崔武子遇困之大過六三變也莊叔遇明夷之謙初九變也孔成子遇屯之比初九變也南蒯遇坤之比六五變也陽虎遇泰之需六五變也敬仲得觀之否賈逵曰觀爻在六四變而之否三國時闗侯敗孫權使虞翻筮之得兊下坎上節五爻變之臨凡所謂之某卦者皆變而之他卦也繫辭曰變動不居周流六虚上下无常剛柔相易不可為典要唯變所適信斯言也則易之為書无非變也商瞿而下傳易者多矣而論卦變者可指數也考之於經其説皆有所合説卦震曰其究為健案消息卦坤一變震二變兊三變乾乾健也乾一變巽二變艮三變坤剥易曰柔變剛也序卦曰物不可以終盡剥窮上反下故受之以復剥之上九窮而反初乃成復卦此京房入卦相生變而成六十四卦之説也巽曰其究為躁卦乾鑿度曰物有始有壯有究故三畫而成乾究言巽之九三上九也虞翻曰動上成震巽三變成震三變成巽舉巽一卦則知乾三變成坤坤三變成乾離三變成坎艮三變成兊説卦曰天地定位山澤通氣雷風相薄水火不相射六子皆以乾坤相易而成艮兊以終相易坎離以中相易震巽以初相易終則有始徃來不窮不窮所謂通也此虞翻蔡景君伏曼容旁通之説也説卦曰乾天也故稱乎父坤地也故稱乎母震一索而得男故謂之長男巽一索而得女故謂之長女坎再索而得男故謂之中男離再索而得女故謂之中女艮三索而得男故謂之少男兊三索而得女故謂之少女此陸績所謂陽在初稱初九去初之二稱九二則初復七隂在初稱初六去初之二稱六二則初復八矣卦畫七八經書九六七八為象九六為爻四者互明此左氏所記卜筮之言曰之某卦之説也雜卦曰既濟定也既濟六爻隂陽得位是以定也乾文言曰雲行雨施又曰大明終始雲雨坎也大明離也乾卦而舉坎離者言其變也隂陽失位則變得位則否九二九四上九陽居隂位故動而有坎離之象此虞氏所論動爻之説也訟彖曰剛來而得中隨彖曰剛來而下柔蠱彖曰剛上而柔下噬嗑彖曰剛柔分動而明賁彖曰柔來而文剛分剛上而文柔无妄彖曰剛自外來而為主於内大畜彖曰剛上而尚賢咸彖曰柔上而剛下損彖曰損下益上又曰損剛益柔益彖曰損上益下又曰自上下下渙彖曰剛來而不窮柔得位乎外而上同節彖曰剛柔分而剛得中剛者陽爻也柔者隂爻也剛柔之爻或謂之來或謂之分或謂之上下所謂惟變所適也此虞氏蔡景君伏曼容蜀才李之才所謂自某卦來之説也夫質之於經而合考之於義而通則王弼折之亦可謂誤矣叢説新安朱氏曰逺猶忘也周流六虚謂隂陽流行於卦之六位本義問易之所言无非天地自然之理人生日用之所不能須㬰離者故曰不可逺曰是易不可為典要易不是確定硬本子揚雄太𤣥却是可為典要他排定三百五十四賛當晝三百五十四賛當夜晝底吉夜底凶吉之中又自分輕重凶之中又自分輕重易却不然有陽居陽爻而吉底又有凶底有隂居隂爻而吉底又有凶底有有應而吉底有有應而凶底是不可為典要之書也是有那許多變所以如此並語録其出入以度外内使知懼又明於憂患與故无有師保如臨父母初率其辭而揆其方既有典常茍非其人道不虚行廣漢張氏曰其出以度外則无外患也其入以度内則无内患也易之辭各指其所之此其所以内外使知懼也出門者固有功矣逖出者固无咎矣然不出户者在節乃為知時入于林中者固吝矣入于坎窞者固勿用矣然視履而旋者在履乃為有慶是其可懼也如此辭之所告非特使之知懼又明憂患與夫憂患之所因此書之不可逺也无有師保如臨父母焉夫師者教之道而有所欽也保者輔其功而有所愛也夫有師保而後欽愛者此學而後知教而後能非天性之自然也人之於易不待師保而欽愛之心如臨父母此附麗不以膠漆約束不以纒索不可逺之道出於天性之自然者乎大抵易之辭其告人也各指其所之有上有下有内有外循其辭而揆其所指之方則不迷其所向其道雖不可為典要歟其書則有典可循有常可道也凡此者皆以其書之不可逺者歟嗚呼人能𢎞道非道𢎞人雖載道而不可逺道雖屢遷而未始有常神而明之存乎其人者也茍非其人則道安能虚行乎易説白雲郭氏曰人之學道能不逺易則出入行蔵必謹其度外焉知懼則懼其失於有行内焉知懼則懼其失於脩身憂患者一己之憂患也故者天下之務也明於憂患與故則自一身以及天下无或不明也人能明此以不逺易故也雖无師保教訓常如父母之臨豈无因而然哉知易之道須㬰不可逺離而己如臨父母則敬易之心存焉易之言敬有二道有接物之敬需所謂敬之終吉是也有先物之敬坤所謂敬以直内是也接物之敬有作有輟直内之敬雖造次顛沛无時而非敬故常如父母之臨之也初率其辭而揆其方既有典常者聖人言學易之道也學者初循其辭以探其道而後可以得其典常典常大要也茍非其人能盡學易用易之道則易道安能有行於世哉然君子之於學也有二道有率其辭者自外入也故易之為書不可逺有率其性者由中出也故中庸之道不可須㬰離書不可逺則道不可逺矣道不可離則書不可離矣明乎此然後善學易説漢上朱氏曰其出入云者以一卦内外言之兩體也出者自内之外徃也入者自外之内來也以是度内外之際而觀消息盈虚之變出處進退之理使知戒懼當出而入與當入而出其患一也故大觀在上窺觀者醜三陽方壯牽羊悔亡出入内外本於相形此四從二亦曰外離五用九亦曰出唯精於義者能知之知義則知懼矣又此書明於己之所當憂患與所以致憂患之故安不忘危存不忘亡治不忘亂无有師保教訓而嚴憚之明失得之報也如有父母親臨而愛敬之見聖人之情也初率其吉凶之辭揆其八卦之方則既有典常可守矣蓋不可逺者易之體也而有用焉為道也屢遷者易之用也而有體焉能知卦象合一體用同源者乎斯可以言易之書矣書載道者也待人而後行茍非其人道不徒行易傳新安朱氏曰其出入以度外内使知懼此句未詳疑有脫誤雖无師保而常若父母臨之戒懼之至方道也始由辭以度其理則見其有典常矣然神而明之則存乎其人也並本義問據文勢則外内使知懼合作使内外知懼始得曰是如此不知這兩句是如何硬解時也解得去但不曉其意是説甚底上下文意都不相屬又曰上文説不可為典要下文又説既有典常這都不可曉常猶言常理使知懼便是使人有戒懼之意易中説如此則吉如此則凶是也既知懼則雖無師保一似臨父母相似常恁地戒懼既有典常是一定了占得這爻了吉凶自定便是有典常並語録右第八章易之為書也原始要終以為質也六爻相雜唯其時物也其初難知其上易知本末也初辭擬之卒成之終若夫雜物撰德辨是與非則非其中爻不備噫亦要存亡吉凶則居可知矣知者觀其彖辭則思過半矣横渠先生曰於一卦之義原始要終究兩端以求其中六爻則各指所之非卦之質也故吉凶各類其情指其所之初上終始三四非貴要之用非内外之主中爻以要存亡吉凶如困卦正大人吉无咎蓋以剛中也小過小事吉大事凶以柔得中之類並易説易為君子謀不為小人謀故撰德於卦雖爻有小大及繫辭其爻必諭之以君子之義正䝉廣漢張氏曰如乾之卦所以原陽之始要陽之終如坤之卦所以原隂之始要隂之終此為質也此卦之徳方以知也至於觀其㑹通以行其典禮者時也分隂分陽迭用柔剛者物也六爻相雜唯其時物此六爻之義所以易以貢也其初難知謂凡爻之初辭隱而難知者謂初辭擬之故也凡爻之上辭顯而易知者謂卒成之終故也此本末所以不同者如此若夫或以陽居隂或以隂居陽其物之交錯者此雜物也或中或不中或正或不正其徳之迭作者此撰徳也辯其當於理者為是辯其悖於理者為非其唯中爻乎二三四五是也易之中爻其辯是與非者可謂備矣茍明乎此而求其要則存亡吉凶可坐而知矣彖者言乎象者也蓋言卦之不言之意具於彖者乎彖者材也蓋言卦之兼該之體備於此者乎故智者觀其彖辭則所得者已七八矣又何必中爻雜物撰徳而辯其是非乎並易説白雲郭氏曰前曰易之為書蓋明易之道此言易之為書蓋論卦爻之要皆終以學者之事且自一卦論之原始要終上下不遺為一卦之質也卦名之義名其質而已如乾之為乾也原始要終知乾之質為健故名其卦曰乾至於潛見飛躍則非質也六爻之義剛柔動静吉凶悔吝之不同各從其時與物之異而已是則潛見飛躍之謂也此卦爻之義不能一也爻之初為難知及其上則易知者本末之不同也初者事之始事之微其辭則擬之而已故為難知上者事之終事之成其辭無隱故易知也若夫雜辯天下之物論撰衆人之徳明二者之是非則非其中爻不能備矣蓋言初上本末不能具也説者以二五為中爻此章論六爻相雜之道既言初上本末於其上則下言中爻言二五三四皆是也蓋二五三四皆為人道雜物撰徳辯是非人事也故中孚以三四為中而王輔嗣亦疑初上之无位此言雜物撰徳則兼天下之物與徳為言非止二五君臣而已故知舍初上之餘皆中爻也而其辭言不備者謂非此四者不能備天下之象也學者要中爻之存亡吉凶以考其所居得失皆可以自知此所以不可逺也彖辭明一卦之義物徳是非存亡吉凶未能論辯者觀乎彖辭則思已過半矣此又言學易之要在夫彖也先儒或謂彖辭為文王卦下之辭非也直今之彖耳易説漢上朱氏曰此章言重卦六爻之義易之為書也原始於初爻要終於上爻成六位以為體質者也八卦八物也六爻六時也六爻相雜時異而物異八卦本象也時物别象也其本甚微故難知其末已著故易知初辭擬而後言不亦難知乎卒成之其事終矣不亦易知乎上下之位以時言之初終也以道言之本末也以事言之始卒也其實一也時變則事變事變則道與之俱未有違時造事而能成者三畫非无本末也聖人何為重卦曰理具乎中其事則未也若夫糅雜八卦之物撰定六爻之徳辯得失是非則非中爻不備中爻崔憬所謂二三四五京房所謂互體是也蓋物无常是亦无常非施於彼者或不可施於此用於古者或不可行於今蒙以九二納婦而六三取女則不利節以初九不出而无咎九二不出則失時得失是非不可不辯也噫重卦六爻之意亦要諸吉凶存亡之辭而已有同位而異物同物而異象同象而異辭要諸辭則四者不同居然易見可指掌而知矣六爻者變動相錯而有吉凶存亡者也彖辭者合内外二體以一爻相變而有者也知者明於理則觀諸彖辭而爻義已知其過半矣易傳新安朱氏曰質謂卦體卦必舉其始終而後成體爻則唯其時物而已其初難知其上易知此言初上二爻非其中爻不備此謂卦中四爻彖統論一卦六爻之體並本義其初難知至非其中爻不備若解也硬解了但都曉他意不得這下面却説一箇噫字都不成文章不知是如何後面説二與四同功三與五同功却説得好但不利逺者也曉不得問雜物撰徳辯是與非則非其中爻不備曰這様處曉不得某常疑有闕文先儒解此多以為互體如屯卦震下坎上就中閒四爻觀之自二至四則為坤自三至五則為艮故曰非其中爻不備互體説漢儒多用之左傳中一處説占得觀卦處亦舉得分明看來此説亦不可廢並語録二與四同功而異位其善不同二多譽四多懼近也柔之為道不利逺者其要无咎其用柔中也三與五同功而異位三多凶五多功貴賤之等也其柔危其剛勝邪横渠先生曰柔之為道不利逺者柔之用近也易説廣漢張氏曰二與四皆隂而二居内四居外三與五皆陽而三為臣五為君是謂同功而異位也二與四雖俱隂也然二多譽者以逺於君而令聞令譽歸之也四多懼者以其近於君而抑權損勢也然柔之為道固當有所麗而不利於逺若夫其要无咎則所貴者在其中爾此二所以逺而多譽以其得於柔中故其要无咎也三與五雖俱陽也然三多凶者以其居下卦之上而近於賤五多功者以其居上卦之中而處其貴故也然三也以柔處之則危而不安以剛處之則重剛而勝也論二與四詳於二而略於四論三與五詳於三而略於五此互相備即此以見彼也易説白雲郭氏曰二四隂也三五陽也隂陽之功同而位則異也二之多譽中也四之多懼近君也此其善之不同也二四宜以柔居之而柔之用近不利逺者則六二何其多譽乎然要其終所以无咎者六四不若六二之用柔中故也三之多凶五之多功其貴賤不同位有當不當也三五皆宜以剛居之而九三多凶者賤而失中也五柔則危而剛則勝者貴而得中也上言中爻而此論二四三五蓋其同功而異位者皆中爻也王輔嗣不辯四者為中爻而反以初上為无位不知以六位言之則初上不得為无位以中爻言之自无初上也易説漢上朱氏曰龔氏合易之為書也為一章誤矣今從古本此章再明中爻之義二四耦也同為隂之功内外異位有不同焉二多譽四多懼何也四近五五尊位近尊位則多懼月望日則食禮近君則屈然柔之為道不利逺者坤從乾也二逺於五所以多譽者其要在於得中雖柔而无咎以其用柔中也用柔而失中其能无咎乎三五竒也同為陽之功内外異位有不同焉三多凶五多功何也五貴三賤其等不同也三處下位之極其柔居之則危不勝任矣其剛居之將以為勝邪以剛居剛有時乎過剛矣危則疾顚過則易敗此三所以多凶也若五不然以剛居之得尊位大中宜處貴者也以柔居之有處謙執柔以貴下賤之美二為五用矣此五所以多功也夫二五中也二三四五皆曰中爻何也曰以三數之自一至三以二為中自四至上以五為中以五數之自二至上以四為中以四數之自二至五以三四為中復之九四曰中行獨復中孚以二柔在内名卦卦言徳爻言善者積善成徳也易傳新安朱氏曰此以下論中爻同功謂皆隂位異位謂逺近不同四近君故多懼柔不利逺而二多譽者以其柔中也三五同陽位而貴賤不同然以柔居之則危唯剛則能勝之並本義問其要无咎其用柔中也近君則當柔和逺去則當有强毅剛果之象始得此二之所以不利然而居中所以无咎曰是恁地説問上下貴賤之位何也曰四二則四貴而二賤五三則五貴而三賤上初則上貴而初賤上雖无位然本是貴重所謂貴而无位髙而无民在人君則為天子父天子師在他人則清髙而在物外不與事者此所以為貴也並語録右第九章易之為書也廣大悉備有天道焉有人道焉有地道焉兼三才而兩之故六六者非他也三才之道也道有變動故曰爻爻有等故曰物物相雜故曰文文不當故吉凶生焉伊川先生曰惟人氣最清可以輔相裁成天地設位聖人成能直行乎天地之中所以為三才天地本一物地亦天也只是人為天地心是心之動則分了天為上地為下兼三才而兩之故六也附呂與叔東見録横渠先生曰故曰爻爻者交雜之義易説廣漢張氏曰易之為書所以載三才之道此其所以為廣大悉備也立天之道曰隂與陽立地之道曰柔與剛立人之道曰仁與義此易所以六畫而成卦六位而成章六者非他乃三才之道也三才之道其所變動如天之隂陽地之柔剛人之仁義有所變動也如陽氣下降隂氣上升柔來而文剛剛上而文柔仁濟之以義義濟之以仁此天地之道有所變動以趨其時者乃所以為爻也觀爻之二四有逺邇之殊三五有貴賤之異或多譽而多懼或多凶而多功其等之不可移者所以為物也至於三五之陽而以柔居之縱横錯綜經緯无常此物之相雜故曰文也文之不當則宜凶也而併與吉言者蓋不當而凶乃知其當而吉故也易説白雲郭氏曰易之為書廣大无不備者蓋有三才之道焉故六畫非他也兼三才而兩之之道也一卦之道各有變動因其變動而别言之故為爻此言六位之辯也爻有貴賤上下之等故曰物物謂二四三五之類是也物雜九六則以剛柔相文故曰文文之當其位則吉九之於五六之於二是也文之不當其位則凶六之於三九之於四是也大致如此故曰吉凶生焉易説漢上朱氏曰此章再明六爻雜物之義易之為書廣大而无外語天地之間則无乎不備矣有天道焉隂與陽也有人道焉仁與義也有地道焉柔與剛也此三者一物而兩體隂陽也而謂之天仁義也而謂之人剛柔也而謂之地故曰三才兼三才而兩之故六兼之者天之道兼隂與陽也人之道兼仁與義也地之道兼柔與剛也六者非他即三才之道也是故三畫而有重卦六即三也三即一也道有變易有流動爻則傚之故曰爻天地相函精氣所聚其等有六故曰物物相錯而成文故曰文文當其位則吉文不當其位則凶故吉凶生焉易傳新安朱氏曰三畫已具三才重之故六而以上二爻為天中二爻為人下二爻為地道有變動謂卦之一體等謂逺近貴賤之差相雜謂剛柔之位相間不當謂爻不當位並本義道有變動不是指那隂陽老少之變是説卦中變動如乾卦六畫初潛二見三惕四躍這箇便是有變動所以謂之爻爻中自有等差或髙或低或逺或近或貴或賤皆謂之等易中便可見如説逺近相取而悔吝生近而不相得則凶二與四同功而異位二多譽四多懼近也三與五同功而異位三多凶五多功貴賤之等也又曰列貴賤者存乎位皆是等也物者想見古人占卦必有箇物事名為物而今亡矣這箇物是那列貴賤辯尊卑底物相雜故曰文如有君又有臣便為君臣之文是兩物相對待在這裏故有文若相離去不相干便不成文矣卦中有隂爻又有陽爻相間錯則為文若有隂无陽有陽无隂如何得有文語録右第十章易之興也其當殷之末世周之盛德邪當文王與紂之事邪是故其辭危危者使平易者使傾其道甚大百物不廢懼以終始其要无咎此之謂易之道也横渠先生曰剛柔錯雜美惡混淆文王與紂當之矣百物不廢巨細无不察也並易説顯道者危使平易使傾懼以終始其要无咎之道也正䝉廣漢張氏曰道汙則從而汙此商之末世也道隆則從而隆此周之盛徳也觀諸文王與紂則危者使平易者使傾蓋可知矣文王囚于羑里望道未見以其小心翼翼而尊其易故危者使平也紂貴為天子以其殺戮无辜而悖於易故易者使傾也其道甚大世之百物所以不廢者易所以行乎天地之中故无廢墜也既懼其始使人防微杜漸又懼其終使人持盈守成其要之以无咎而補過乃易之道也易説白雲郭氏曰文王遭紂之世蒙大難而演易是故其辭危危懼也懼斯道之不聞於天下後世也後世得其言則危者可平失其言則易者可傾其道甚大天地之間无不備是以天下无廢物懼人以終始則使人慎終如始安不忘危存不忘亡要其歸終使无咎而已此所謂易之道也説者或以危為述憂危之事使後世危懼避患或以危為微不正之辭二者皆非聖人之道也易説漢上朱氏曰易之興也當殷之末世周之盛徳邪何繫之辭而告其吉凶者如是乎又紂與文王之事邪何君子處小人之間而其辭危乎是故危懼者使知可平慢易者使知必傾所以長君子消小人也其道甚大君子小人无所不容不容則不足以準天地百物不廢者所以形容其道所謂悉備也初辭擬之卒成之終使知善不善之積成名滅身非一朝夕之漸故原始要終而懼焉其大要歸之无咎而已此之謂易之道易之道立人道以貫天地而為一者也易傳崔景陸震謂文王作爻辭馬融陸績謂周公所作考之爻辭馬融陸績為是韓宣子適魯見易象春秋曰周禮盡在魯矣吾今乃知周公之徳也孔穎達嘗正此義今申其説以證崔陸之誤然琴書有言曰文王在羑里演易作鬱厄之辭困于石據于蒺藜蓋爻辭亦有文王之辭豈周公述而成之歟叢説新安朱氏曰危懼故得平安慢易則必傾覆易之道也本義其辭危是有危懼之意故危懼者能使之安平慢易者能使之傾覆易之書於萬物之理无所不具故曰百物不廢其要是約要之義若作平聲則是要其歸之意又曰要去聲是要恁地要平聲是這裏取那裏意思又曰其要只欲无咎語録右第十一章夫乾天下之至健也徳行恒易以知險夫坤天下之至順也徳行恒簡以知阻能説諸心能研諸侯之慮定天下之吉凶成天下之亹亹者横渠先生曰擬議云為非乾坤簡易以立本則易不可得而見也簡易故能悦諸心知險阻故能研諸慮簡易然後知險阻簡易理得然後一以貫天下之道繫辭言能研諸慮止是剰侯之二字説者就而解諸侯有為之主若是者即是隨文耳太虚之氣隂陽一物也然而有兩健順而已又不可謂天无意陽之健不爾何以發散並易説至健而易至順而簡故其險其阻不可階而升不可勉而至仲尼猶天九五飛龍在天其致一也正蒙廣漢張氏曰健者疑若不知險也今乾為天下之至健其徳行常易故知險而不為隂所䧟豈非至健乎順者疑若不知阻也今坤為天下之至順其徳行常簡故知阻而不為陽所拒豈非至順乎大抵易則易知簡則易從故能説諸心知險知阻故能研諸慮心之説也不忤於理慮之研也不昧於事則得者為吉失者為凶吉凶既定則凡勉於事功者莫不𢎞之不息以成其功矣易説白雲郭氏曰横渠曰恒易故知險恒簡故知阻又曰易簡故能説諸心險阻故能研諸慮或者言亹亹勉也以意逆之則謂天下之事功也定吉凶成亹亹皆由乾坤之易簡故也諸侯之慮侯之為衍字故王輔嗣曰能説諸心能研諸慮易説漢上朱氏曰此章論六爻而歸之於簡易乾健而為萬物先莫或禦之故其徳行恒易坤順以從乾无二適也故其徳行恒簡以易也故知險之為難以簡也故知阻之可疑簡生於易阻生於險簡易也故能説諸心知險阻也故能研諸慮簡易者我心之所固有反而得之能无説乎以我所有慮其不然反復不捨能无研乎曰研諸侯之慮者衍侯之二字王弼略例曰能研諸慮則衍文可知天下之吉凶蔵於无形至難定也天下之亹亹來而不已至難成也定之成之者簡易而已易傳新安朱氏曰至健則所行无難故易至順則所行不煩故簡然其於事皆有以知其難而不敢易以處之也是以其有憂患則健者如自髙臨下而知其險順者如自下趨上而知其阻蓋雖易而能知險則不陷於險矣既簡而又知阻則不困於阻矣所以能危能懼而无易者之傾也侯之二字衍説諸心者心與理㑹乾之事也研諸慮者理因慮審坤之事也説諸心故有以定吉凶研諸慮故有以成亹亹並本義或問乾是至健不息之物經歴艱險處多雖有險處皆不足為其病自然足以進之而无難否曰不然舊亦嘗如此説覺得終是硬説易之書本意不如此正要人知險而不進不説是我至健順了凡有險阻只恁冒進而无難如此大非聖人作易之意觀上文云易之興也其當殷之末世周之盛徳邪至此之謂易之道也看他此語但是恐懼危險不敢輕進之意乾之道便是如此卦中皆然所以多説見險而能止如需卦之類可見易之道正是要人知進退存亡之道若是冒險前進必陷於險是知進而不知退知存而不知亡豈乾之道邪惟其至健而知險故止於險而不陷於險也又曰此叚專是以憂患之際而言且如健當憂患之際則知險之不可乗順當憂患之際便知阻之不可越這都是處憂患之道當如此因憂患方生那知險知阻若只就健順上看便不相似如云危者使平易者使傾能説諸心能研諸慮皆因憂患説至順自是畏謹宜其不越夫阻如至健却宜其不畏險然却知險而不去蓋他當憂患之際故也問簡易曰若長是易時更有甚麽險他便不知險矣若長是簡時更有甚麽阻他便不知阻矣只是當憂患之際方見得乾天下之至健更著思量看來聖人无冒險之事須是知險便不進向前去又曰他只是不直撞向前自别有一箇路去如舜之知子不肖則以天下授禹相似又曰這只是説剛健之理如此莫硬去天地上説問在人固是如此以天地言之則如何曰在天地自是无險阻這只是大綱説箇乾坤底意思如此乾坤知險阻非是説那定位底險阻乾是至健底物自是見那物事皆低坤是至順底物自是見那物事皆大敬子云如云能勝物之謂剛故常信於萬物之上相似曰然如云膽欲大而心欲小至健恒易以知險如膽欲大至順恒簡以知阻如心欲小乾健而以易臨下故知下之險險底意思在下坤順而以簡承上故知上之阻阻是自家低他却髙底意思自上面下來到那去不得處便是險自下而上上到那去不得處便是阻易只是這兩箇物事自東而西也是這箇自西而東也是這箇左而右右而左皆然知險阻便不去了惟其簡易所以知險阻而不去敬子云今行險徼倖之人雖知險阻而猶冒昧以進惟乾坤徳行本自簡易所以知險阻夫乾夫坤一段也似上面知大始作成物意思説諸心只是見過了便説這箇屬陽研諸慮是研窮到底似那安而能慮直是子細這箇屬隂定吉凶是陽成亹亹是隂便是上面作成物能説諸心乾也能研諸慮坤也説諸心有自然底意思故屬陽研諸慮有作為底意思故屬隂定吉凶乾也成亹亹坤也事之未定者屬乎陽定吉凶所以為乾事之已為者屬乎隂成亹亹所以為坤大抵言語兩端處皆有隂陽如開物成務開物是陽成務是隂如致知力行致知是陽力行是隂周子之書屢發此意推之可見能説諸心能研諸慮方始能定天下之吉凶成天下之亹亹凡事見得通透了自然歡説既説諸心是理㑹得了於事上便審一審便是研諸慮研是更去研磨定天下之吉凶是剖判得這事成天下之亹亹是做得這事業並語録是故變化云為吉事有祥象事知器占事知來天地設位聖人成能人謀鬼謀百姓與能横渠先生曰言易於人事終始悉備行善事者易有祥應之理萌兆之事而易具著見之器疑慮而占則易示將來之騐有以見天地之間成能者聖人而已能畏信於易者雖百姓之愚能盡人鬼幽明之助天能為性人謀為能大人盡性不以天能為能而以人謀為能故曰天地設位聖人成能天人不須强分易言天道則與人事一滚論之若分别則是薄乎云爾自然人謀合蓋一體也人謀之所經畫亦莫非天理耳並易説廣漢張氏曰聖人悟易於心而天道之變化人事之云為得之於心者如此則知幾之神吉事有祥也推此以利飬生民故象事知器推此以吉凶與民同患故占事知來變者陽也化者隂也謂之變化此隂陽未辯者乎云者言也為者行也謂之云為此言行未著者乎聖人之心術雖融貫天人之道於方寸之間其見微知著觀徃知來無非吉事有祥也故推之以制器則利養天下之民推之以為占則吉凶與民同患天能天而不能地地能地而不能天所賴聖人成其能夫聖人之能成天地其能可謂大矣然又且明謀之人如詢於芻蕘是也幽謀之鬼神如質諸卜筮是也如是則不自以為能故百姓莫不歸美以與其能矣並易説兼山郭氏曰易曰天地設位聖人成能與天地參之謂也中庸解白雲郭氏曰凡人道變化云為之間吉事則先見其祥象事則先知其器占事則知方來皆言人事不能先見是以定天下之吉凶成天下之亹亹也天地設位於上下而已不能自成其能也唯聖人成其能以備三才之道此所以參天地而賛化育也聖人亦豈自謂其能哉人謀鬼謀百姓與其能而已所以致是者有道存焉道者易也既曰人謀又言百姓者猶洪範之言卿士庶民也並易説漢上朱氏曰乾坤變化有云有為云者言也為者動也吉事有祥祥者吉之先見有祥必先知之兼言動也制器者尚象知器則知成器之為天下利而可動也卜筮者尚占知來則知來物而言動審矣是以能定天下之吉凶成天下之亹亹非知險知阻者能之乎天尊地卑乾坤設位聖人配天地而立合乾坤之徳以成能事能説諸心能研諸慮者明以盡人謀也定天下之吉凶成天下之亹亹者幽以盡鬼謀也人謀鬼謀幽顯合一天下樂推而不厭百姓之愚與之以能矣成能故也易傳新安朱氏曰變化云為故象事可以知器吉事有祥故占事可以知來天地設位而聖人作易以成其功於是人謀鬼謀雖百姓之愚皆得以與其能並本義問變化云為吉事有祥象事知器占事知來曰上兩句只説理如此下兩句是人就理上知得在隂陽則為變化在人事則為云為吉事自有祥兆惟其理如此故於變化云為則象之而知已有之器於吉事有祥則占之而知未然之事也又問器字是凡見於有形之實事者皆為器否曰易中器字是恁地説變化云為是明吉事有祥是幽象事知器是人事占事知來是筮象事知器是人做這事去占事知來是他方有箇禎祥這便占得他如中庸言必有禎祥見乎筮龜之類吉事有祥凶事亦有天地設位四句説天人合處天地設位便聖人成其功能人謀鬼謀則雖百姓亦可以與其能成能與與能雖大小不同亦是小小底造化之功用百姓與能與字去聲他無知因卜筮方㑹做得事便是與能人謀鬼謀猶洪範之謀及卜筮卿士庶人相似並語録八卦以象告爻彖以情言剛柔雜居而吉凶可見矣變動以利言吉凶以情遷横渠先生曰八卦有體故象在其中錯綜為六十四爻彖所趨各異故曰情言能通變則盡利累於其情則陷於吉凶矣並易説辭各指其所之聖人之情也指之以趨時盡利順性命之理臻三極之道也能從之則不陷於凶悔矣所謂變動以利言者也然爻有攻取愛惡本情素動因生吉凶悔吝而不可變者乃所謂吉凶以情遷者也能深存繫辭所命則二者之動見矣正䝉廣漢張氏曰八卦成列象在其中矣此八卦所以告人以象至於爻者變也彖者材也皆有辭者此聖人以情而言於人也剛柔雜居則交通以趨時而或失或得故吉凶見焉乾之徳有利有正變動以利言非正也人之生有性有情吉凶以情遷非性也正則无變動矣性則无吉凶矣六爻之變動將以圗利而免害也六爻之吉凶无非以情而感物也並易説白雲郭氏曰八卦有象而未有言故以象告六十四卦之後有爻彖之辭故曰以情言剛柔相雜而後有得失故吉凶可見是三者皆卦所具之情也變動以利言者聖人變而通之以盡利故變動主於利也吉凶以情遷者卦之吉凶因人善惡而遷也易説漢上朱氏曰伏羲氏始畫八卦不言而告之以象者至簡易也後世聖人演之為六十四卦有爻有彖以人情變動言之於辭知險阻也且八卦成列剛柔雜居吉凶已可見矣然道有變動變則通通則其用不窮所以盡利者不可不言也故變動以利言吉凶以情而遷巧厯之所不能計也聖人唯恐遷之而失其正矣故爻彖以情言易傳新安朱氏曰象謂卦畫爻彖謂卦爻辭本義八卦以象告以後説得叢雜不知如何語録是故愛惡相攻而吉凶生逺近相取而悔吝生情偽相感而利害生伊川先生曰易爻應則有時而應又逺近相取而悔吝生㳺定夫録横渠先生曰凡卦之所利與爻之所利皆變通之宜也如利建侯利艱貞誠則順理而利偽則不循理而害易言情偽相感而利害生則是專以人事言故有情偽利害也屈信相感而利生此則是理也惟以利言易説廣漢張氏曰彼之所愛此或惡之此之所惡彼或愛之此愛惡出於情之不同而吉凶所以生也逺者或有求於近近者或有求於逺此逺近出於分之不等而悔吝所以生也以情感者或應之以偽以偽感者或應之以情此情偽出於心之不一而利害所以生也此聖人作易畢羅天下之事者乎易説白雲郭氏曰六爻剛柔各因其愛惡相攻而後有吉凶逺或相應近或不相得則有悔吝此皆言爻之情也亦猶在人情偽相感而生利害與爻一也易説漢上朱氏曰變動者何情偽之所為也人之情偽難知矣以情相感則利生以偽相感則害生近不必取逺不必舍則悔吝生愛惡不一起而相攻則吉凶生吉凶生而悔吝著情偽其能掩乎是則情偽相感也逺近相取也愛惡相攻也爻有變動也有利害斯有悔吝有悔吝斯有吉凶吉凶以情遷也易傳凡易之情近而不相得則凶或害之悔且吝廣漢張氏曰天下之物同聲相應同氣相求所以相近而相得也廟堂之上閨門之中郷黨之間學校之内皆貴乎近而相得也今也近而不相得其為患也異乎行道之人故大則凶小則害其微則為悔吝矣考諸易爻莫不皆然故云凡易之情易説白雲郭氏曰凡易之情與人之情何以異哉自六爻觀之相近而不相得則凶矣雖无不相得或少害之亦悔且吝也人之情蓋亦猶是此章蓋重釋上言吉凶悔吝利害之説以先言人之情偽相感故此復言凡易之情易説漢上朱氏曰悔吝者何凡易之情隂陽相求内外相應近而不相得則偽不可乆物或害之害之則凶將至矣悔吝者利害吉凶之界乎害之而悔則吉且利矣吝而不悔則凶聖人不得不以利言之而使之逺害也故曰聖人之情見乎辭易傳新安朱氏曰不相得謂相惡也凶害悔吝皆由此生本義問易之情近而不相得則凶或害之悔且吝是如何曰此疑是指占法而言想古人占法更多今不見得蓋逺而不相得則安能為害惟切近不相得則凶害便能相及如一箇凶人在五湖四海之外安能害自家若與之為鄰近則受害矣又問此如今人占火珠林課底若是凶神動與世不相干則不能為害惟是克世應世則能為害否曰恐是這様意思語録將叛者其辭慙中心疑者其辭枝吉人之辭寡躁人之辭多誣善之人其辭游失其守者其辭屈廣漢張氏曰叛而親離者内負所愧故其辭慙疑而猶豫者蔓衍不根故其辭必枝吉人為善不足故言出於不得已故其辭寡躁人之急於自售故言必期於見信故其辭多人有善也誣而謗之則其辭不敢正言人之非故曰其辭游失其守則不能直己以見道故曰其辭屈聖人既有以知人之情又有以察人之辭何異踈而不漏者乎易説白雲郭氏曰六者之辭宜无與易焉然由六者觀之則易之辭蓋无是也然聖人作易所以无是六者之辭者以聖人之辭出於道未嘗出於胷中之私也六者之人所以有六者之辭者各因其心之私而不自知其為是言也以是知衆人之所任者心而聖人之所任者道也凡心善惡皆私也惟道為天下之大公故足以洗心易説漢上朱氏曰何以知情偽邪考其辭可矣將叛者其心慙負故其辭愧中心疑者其心惑亂故其辭枝吉人守約故其辭寡躁人欲速故其辭多誣善之人妄故其辭游失其守者窮故其辭屈吉人辭寡以簡易知也五者反是以知險知阻而知也簡易則吉險阻則凶其辭雖六其别則一險易而已矣上繫言易簡而天下之理得下繫終之以易簡而知險阻故殊塗而同歸一致而百慮易傳新安朱氏曰卦爻之辭亦猶是也本義中心疑者其辭枝中心疑故辭繁不殺其辭枝者如木之有枝開兩岐去問八卦以象告至失其守者其辭屈一段竊疑自吉凶可見矣而上只是揔説易書所載如此自變動以利言而下則專就人占時上説曰然並語録右第十二章合訂刪補大易集義粹言卷七十八
