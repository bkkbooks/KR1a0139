body:
  text: 合訂刪補大易集義粹言卷二頭等侍衛納喇性德編彖曰大哉乾元萬物資始乃統天雲行雨施品物流形大明終始六位時成時乘六龍以御天乾道變化各正性命保合大和乃利貞首出庶物萬國咸寧濓溪先生曰誠者聖人之本大哉乾元萬物資始誠之源也乾道變化各正性命誠斯立焉純粹至善者也通書伊川先生曰大哉乾元贊乾元始萬物之道大也四德之元猶五常之仁偏言則一事專言則包四者萬物資始乃統天言元也乾元統言天之道也天道始萬物一更有萬字物資始於天也雲行雨施品物流形言亨也天道運行生育萬物也大明天道之終始則見卦之六位各以時成卦之初終乃天道終始乘此六爻之時乃天運也以御天謂以當天運乾道變化生育萬物洪纎高下各以其類各正性命也天所賦為命物所受為性保合太和乃利貞保謂常存合謂常和保合太和是以利且貞也天地之道常乆而不已者保合太和也天為萬物之祖王為萬邦之宗乾道首出庶物而萬彚亨君道尊臨天位而四海從王者體天道則萬國咸寧也易傳雲行雨施是乾道之亨處大明終始人能大明乾之終始便知六位時成却時乘六龍以當大事並楊遵道録維天之命於穆不已忠也乾道變化各正性命恕也胡氏拾遺横渠先生曰雲行雨施散而无不之也言乾發揮徧被於六十四卦各使成象變言其著化言其漸萬物皆始故性命之各正唯君子為能與時消息順性命躬天德而誠行之也精義時措故能保合太和健利且貞孟子所謂終始條理集大成於聖智者歟易曰大明終始六位時成時乘六龍以御天乾道變化各正性命保合太和乃利貞其此之謂乎乾道變化各正性命此謂六爻言天道變化趨時者六爻各隨時自正其性命謂六位隨時正性命各有一道理葢為時各不同首出庶物萬國咸寧謂不一則乖競並易説彖明萬物資始故不得不以元配乾坤其偶也故不得不以元配坤六爻擬議各正性命故乾德旁通不失太和而利且貞也並正蒙廣平游氏曰乾曰大哉坤曰至哉大則无所不包至則无所不盡乾之大无方而坤則未離乎方也易説兼山郭氏曰乾健也健而不息之謂乾葢天體於上而日月星辰繫焉自古自今一息之不畱常行而不改周旋而不殆此萬化之所從出也猶人之精神之運照知事物之不窮體夫天道之不息者也是故昔之言易者必三復其道而備言之元亨利貞者何謂也大无不包細无不舉是以謂之元也及其用也如天地之絪緼男女之構精故有所謂雲行雨施者矣彼在天者成象在地者成形是所謂品物流形者也既有元有亨斯有體有用則不能无推移有推移不能无終始而此實大明之所以成六位也乾於斯也乘六氣以御之所以成變化正性命保合太和攝利貞而復於元亨故四德混而為一乃所以用其光而復歸其明者也首出庶物萬國咸寧又以言人之有君道也易説白雲郭氏曰乾之四德元為大元為始彖論一卦之才故首言乾元元之在乾猶人之有首也萬物之所以資始者在此且雲行雨施品物流形天之長育萬物健而亨之道也而乾元則統之聖人知此故大明乾元終始一卦之道得所謂潛見飛躍各以其時而成六位矣此周公繫爻之義也六位既以時成則聖人可以乘此而用天道或潛或見或惕或躍或飛或亢亦各因其時而乘焉此聖人法乾用九之道也故孔子曰乾元用九乃見天則且乾道之變化也葢非物物而生之大闢資始之户使萬物各得其性命之正而已各得其性命之正則萬物无一物之不和是之謂保合太和乾始能以美利利天下不言所利者以此是乃乾之所謂利貞也聖人知乾之利貞在此而不在彼故法各正性命之道以出庶物法保合太和之道以寧萬國則首出庶物而萬國咸寧矣此又聖人法乾用九之道也故孔子曰乾元用九天下治也易之彖非獨統論一卦之體葢以人事兼明之易説漢上朱氏曰夫子作上彖下彖上象下象文言上繫下繫説卦序卦雜卦十篇以贊易道其篇不相附近不居聖也至陳元鄭衆傳費氏易馬融作傳鄭康成傳之康成之後注連經文王輔嗣始分象辭附於爻下乾存古文也一者數之始乾之元也陽生於子萬物資之而有氣一變而七七變而九四之為三十六六之為二百一十有六而乾之䇿備矣乾天也萬物資始於天天之道始於一故曰乃統天此贊元也六爻天地相函坎離錯居坎離者天地之用也雲行雨施坎之升降也大明終始離之往來也所謂亨也萬物殊品流動分形隂陽異位以時而成乾自子至戌坤自未至酉男卦從乾而順女卦從坤而逆所謂時也六位循環萬物生生而不窮者乎此贊亨也聖人時乘六龍潛見躍飛御天而行體元亨也乾坤相交是生變化萬物散殊各正性命性源同而分異命稟異而歸同太和者相感絪緼之氣天地之所以亨也各正性命保之而存合之而聚不貞則不利故曰乃利貞不曰乾坤而曰乾道者乾行坤從天之道也此贊利貞也乾為首震生萬物坤為衆變震為蕃庶積震成乾首出乎庶物之上五辟四諸侯三公二大夫初元士各正其位萬國咸寧體利貞也乾君道體元亨利貞而後盡大君之道易傳五峰胡氏曰此彖文孔子之所作也孔子推言天地之道謂乾道變化則萬物各正性命坤順承天而萬物生焉是故雖一物之微無非天地合而後成其施者天也産者地也文集新安朱氏曰彖即文王所繫之辭傳者孔子所以釋經之辭也此專以天道明乾義又析元亨利貞為四德以發明之而此一節首釋元義也大哉歎辭元大也始也乾元天德之大始故萬物之生皆資之以為始也又為四德之首而貫乎天德之始終故曰統天雲行雨施品物流形釋乾之亨也大明終始六位時成始即元也終謂貞也不終則无始不貞則无以為元也此言聖人大明乾道之終始則見卦之六位各以時成而乘此六陽以行天道是乃聖人之元亨也乾道變化至乃利貞變者化之漸化者變之成物所受為性天所賦為命太和隂陽㑹合沖和之氣也各正者得於有生之初保合者全於己生之後此言乾道變化无所不利而萬物各得其性命以自全以釋利貞之義也首出庶物萬國咸寧聖人在上高出於物猶乾道之變化也萬國各得其所而咸寧猶萬物之各正性命而保合大和也此言聖人之利貞也葢嘗統而論之元者物之始生亨者物之暢茂利則向於實也貞則實之成也實之既成則其根蔕脱落可復種而生矣此四德之所以循環而无端也然而四者之間生氣流行初无間斷此元之所以包四德而統天也其以聖人而言則孔子之意葢以此卦為聖人得天位行天道而致太平之占也雖其文義有非文王之舊者然讀者各以其意求之則並行而不悖也本義彖辭極精分明是聖人所作魯可幾曰彖是總一卦之義曰也有别説底如乾彖却是專説天凡彖辭象辭皆押韻問卦下之辭為彖辭左傳以為繇辭何也先生曰此只是彖辭故孔子曰智者觀其彖辭則思過半矣如元亨利貞乃文王所繫卦下之辭以斷一卦之吉凶此名彖辭彖斷也陸氏音中語所謂彖之經也大哉乾元以下孔子釋經之辭亦謂之彖所謂彖之傳也爻下之辭如潛龍勿用乃周公所繫之辭以斷一爻之吉凶也天行健君子以自強不息所謂大象之傳皆孔子所作也天尊地卑以下孔子所述繫辭通論一經之大體凡例无經可附而自分上繫下繫也左氏所謂繇辭繇字從系疑亦是言繫辭繫辭者於卦下繫之以辭也問大哉乾元萬物資始乃統天是説乾之元雲行雨施品物流形是説乾之亨大明終始六位時成時乘六龍以御天是説聖人之元亨乾道變化各正性命保合大和乃利貞是説乾之利貞首出庶物萬國咸寧是説聖人之利貞此本義之言但程易云首出庶物是乾道首出庶物而萬彚亨萬國咸寧是君道尊臨天位而四海從言王者體天之道則萬國咸寧如何先生曰恁地説也得只恐牽強自大哉乾元至品物流形是言元亨之義大明終始至以御天是説聖人體元亨之用耳問何謂各正性命曰各得其性命之正前輩解經有只明大義務欲大指明而有不貼文義強説者如程易發明道理大義極精只於易文義多有強説不通處問程易説大明天道之終始則見卦之六位各以時成不知是説聖人明之邪抑説乾道明之邪先生曰此處説得果是鶻突但遺書中有一段明説云人能明天道之終始則見卦爻六位皆以時成此語證之可見大明者指人能明之也因問乾道終始如何先生曰乾道終始即四德也始則元終則貞葢不終則无以為始不貞則无以為元六爻之立由此而立耳以時成者言各以其時而成如潛見飛躍皆以時耳然皆四德之流行也初九九二之半即所謂元九二之半與九三即所謂亨九四與九五之半即所謂利九五之半與上九即所謂貞葢聖人大明乾道之終始故見六位各以時成乘此六爻之時以當天運而四德之所以終而復始應變而不窮也大明終始這一段説聖人之元亨六位六龍只與譬喻相似聖人之六位如隱顯進退行藏潛龍時便當隱去見龍時便是他出來如孔子為魯司冦時便是他大故顯了到那獲麟絶筆便是他亢龍時這是在下之聖人然這卦大槩是説那聖人得位底若使聖人在下亦自有箇元亨利貞如首出庶物不必在上方如此如孔子出類拔萃便是首出庶物著書立言澤及後世便是萬國咸寧乘字大槩只是譬喻御字龜山説做御車之御却恐傷於太巧這段是古人長連地説下去却不分曉伊川傳説得也不分曉語録中有一段却分曉乃是楊遵道所録云人能大明天道之終始這處下箇人字是𦂳切底字讀書須是看這般處大明終始傳意自明其曰明曰見曰當非人而何更看楊遵道録中一段則尤分明矣天人一理人之動乃天之運也然以私意而動則人而不天矣惟其潛見飛躍各得其時則是以人當天也然不言當天而曰御天以見進退遲速之在我矣問時乘六龍以御天先生曰六龍只是六爻龍只是譬喻明此六爻之義潛見飛躍以時而動則便是乘六龍便是御天又曰聖人便是天天便是聖人大哉乾元是説天道流行各正性命是説人得這道理做那性命處却不是正説性命如天命之謂性孟子道性善便是就人身上説性易之所言却是説天人相接處循環不已者乾道變化也合而成質者各正性命也譬之樹木其根本猶大義散而生花結實一向發生去是人物之萬殊乾道變化似是再説元亨變化字且只大槩恁地説不比繫辭所説底子細各正性命它那元亨時雖正了然未成形質到這裏方成如那百穀堅實了方喚做正性命乾道是統説底四德是説他做出來底大率天地是那有形了重濁底乾坤是他性情其實乾道天德互換一般乾道又言得深些子天地是形而下者只是這箇道理天地是箇皮殻問利貞誠之復如先生注下言復如伏藏先生曰復只是囘來這箇是周先生添這一句孔子只説乾道變化各正性命又曰這箇物事又記物事二字是氣字流行到這裏來這裏住著却又復從這裏做起又曰如母子相似未生之時母无氣不能成其子既生之後子自是子母自是母又曰如樹上開一花結一子未到利貞處尚是運下面氣去䕃又記是養字他及他到利貞處自不用養又記養字是恁地字又問自一念之萌以至於事之得其所是一事之元亨利貞先生應曰他自這裏做起所謂生生之謂易也是恁地又記曰氣行到這裏住著便立在這裏既立在這裏則又從這裏做起道便只是天德不消分别乾道變化是就乾道上説天德是就他四德上説各正性命言其稟賦之初保合大和言其既得之後保合大和天地萬物皆然天地是大底萬物萬物是小底天地問首出庶物萬國咸寧恐盡是聖人事伊川分作乾道君道如何先生曰乾道變化至乃利貞是乾首出庶物萬國咸寧是聖人又曰首出庶物便是聰明睿知高出庶物之上以君天下方得萬國咸寧禮記云聰明睿知足以有臨也須是聰明睿知皆過於天下之人方可臨得它各正性命保合大和聖人於乾卦發此兩句最好人之所以為人物之所以為物都是正箇性命保合得箇和氣性命便是當初合下分付底保合便是有箇皮殻包裹如人以刀破其腹此箇物事便散却便死並語録又通書義大哉乾元萬物資始誠之源也此上二句引易以明之乾者純陽之卦其義為健乃天德之别名也元始也資取也言乾道之元萬物所取以為始者乃實理流出以賦於人之本如水之有源即圖之陽動也乾道變化各正性命誠斯立焉此上二句亦易文天所賦為命物所受為性言乾道變化而萬物各得受其所賦之正則實理於是而各為一物之主矣即圖之隂靜也又太極圖義成之者性萬物各正其性命也並周子全書又西銘解義天氣也以至健而位乎上父道也地形也以至順而位乎下母道也人稟氣於天受形於地以藐然之身混合无間而位乎中子道也然不曰天地而曰乾坤者天地其形體也乾坤其性情也乾者健而无息之謂萬物之所資以始者也坤者順而有常之謂萬物之所資以生者也是乃天地之所以為天地而父母乎萬物者故指而言之張子全書廣漢張氏曰或問明道先生曰維天之命於穆不已不其忠乎天地變化草木蕃不其恕乎伊川先生曰乾道變化各正性命恕也侯子曰伊川説得尤有功天授萬物之謂命春生之冬藏之歲歲如是天未嘗一歲誤萬物也可謂忠矣萬物洪纎高下短長各得其欲可謂恕矣九思謂維天之命於穆不已葢一元之氣運行无息所謂天行健者也以其行健无息故能生生萬物而各稟此善意故曰恕其在人體之則曰乾乾誠意无毫髪間斷則發見於外斯能以已推之以心之所本既善則應人接物皆如其心可謂恕矣觀明道謂草木蕃與伊川言各正性命不見有差殊其在萬物得其所以蕃生便是正性命不知侯子何以分輕重兼謂維天之命為天授萬物者恐此天命只是天理伊川所謂在天為命不必須是授之萬物始謂之命故又謂春生冬藏歲歲如是未嘗誤萬物為忠恐此亦只是恕葢已發者也九思所言忠恕與天命大意是否及所疑侯先生之言併乞詳教答曰明道之言意固完具但伊川所舉各正性命之語為更有功忠體也恕用也體立而用未嘗不存乎其中用之所形體亦无乎不具也以此意玩味則見伊川之言尤有功處侯師聖所説忠字恐未為得二先生之意天命且於理上推原未可只去一元之氣上看南軒集答游誠之東萊吕氏曰易有太極是生兩儀非謂既生之後无太極也卦卦皆有太極非特卦卦事事物物皆有太極乾元者乾之太極也坤元者坤之太極也一言一動莫不有之學者須玩乾元二字方見得雲行雨施品物流形氣象大哉乾元萬物資始乃統天此彖元之義也雲行雨施品物流形此彖亨之義也西銘亦有此句氣象大明終始者非謂止言一卦終始如初九上九之終始當大明乾道之終始既知乾道則六位已成於吾胷中矣故曰六位時成六位非特卦中六位凡事中皆有六位時乘六龍以御天者言體乾道以作用也各正性命保合大和葢保合天地之大和易説大明終始六位時成乾之六位自古自今隨在隨足何嘗不成但人不能明乾之終始故自見其不成其實六位元不曾損壞也苟大明乾之終始則事事物物中六位歷然森列應時俱成更无漸次紀聞象曰天行健君子以自彊不息濓溪先生曰君子乾乾不息於誠然必懲忿窒欲遷善改過而後至乾之用其善是損益之大莫是過聖人之㫖深哉通書伊川先生曰乾道覆育之象至大非聖人莫能體欲人皆可取法也故取其行健而已至健固足以見天道也君子以自彊不息法天行之健也易傳乾體便是健及分在諸處不可皆名健然在其中矣周行已録横渠先生曰道行也所行即是道易言天行健天道也易説廣平游氏曰至誠无息天行健也若文王之德之純是也未能无息而不息者君子之自彊也若顔子三月不違仁是也中庸解白雲郭氏曰天有乾之象也君子象天與乾者也天有乾之象者以乾健而天行亦健故也君子能象天與乾者以天行健而君子自彊不息可象之也易説天地之功山川積而得之天之所以為天文王積而得之天不已文王亦不已豈非天行健君子自彊不息之謂乎中庸解漢上朱氏曰易者象也有卦象有爻象彖也者言乎象者也言卦象也爻象動乎内言爻象也夫子之大象别以八卦取義錯綜而成之有取兩體者有取互體者有取卦變者大槩彖有未盡者於大象申之天所以為天者健也萬里一息其行不已君子以是自彊不息不敢横私其身也夫不息則久久則徴徴則悠逺悠逺則博厚博厚則高明博厚配地高明配天乾言不息配天也坤言厚德配地也兩者誠而已矣獨於乾言誠者誠天之道也易傳新安朱氏曰象者卦之上下兩象及兩象之六爻周公所繫之辭也天乾卦之象也凡重卦皆取重義此獨不然者天一而已但言天行則見其一日一周而明日又一周若重復之象非至健不能也君子法之不以人欲害其天德之剛則自彊而不息矣本義天行以下先儒謂之大象潛龍以下先儒謂之小象後放此問天行健如何先生曰惟胡安定説得好因舉其説曰天者乾之形乾者天之用天形蒼然南樞入地下三十六度北樞出地上三十六度狀如倚杵其用則一晝一夜行九十餘萬里人一呼一吸為一息一息之間天行已八十餘里人一晝一夜有萬三千六百餘息故天行九十餘萬里天之行健可知故君子法之以自彊不息云因為董銖言天之氣運轉不息故閣得地在中間銖未達先生曰如弄椀珠底只恁運轉不住故在空中不墜少有息則墜矣乾卦有兩乾是兩天也昨日行一天今日又行其實是一天而行健不已此所以為天行健衛德明問天以氣言之則一晝一夜周行乎三百六十度以理言之則於穆不已无間容息豈不是至健先生云他却不如此説只管去自彊不息上討問以性情言之謂之乾先生云是天一箇性情如此火之性情則是箇熱水之性情則是箇寒天之性情則是一箇健健故不息惟健乃能不息其理是自然如此使天有一時息則地須落下去人都墜死緣他轉運周流无一時息故局得這地在中間今只於地信得他是斷然不息問天者天之形體乾者天之性情健而无息之謂乾乾何以合性情言之曰性情二者常相參在此情便是性之發非性何以有情健而无息非性何以能如此並語録通書乾損益動釋義曰此以乾卦爻詞損益大象發明思誠之方葢乾乾不息者體也去惡進善者用也無體則用無以行無用則體無以措故以三卦合而言之周子全書又晦庵感興詩曰吾聞包犧氏爰初闢乾坤乾行配天德坤布協地文仰觀𤣥渾周一息萬里犇俯察方儀靜隤然千古存悟彼立象意契此入德門勤行當不息敬守思彌敦文集東萊吕氏曰象曰天行健君子以自強不息他卦象中皆言卦名如地勢坤雲雷屯之類獨此卦不言乾而言健葢非健不足以盡乾道之大君子體乾正在自彊不息當看自之一字易説又至誠无息解曰誠自成也非有假於物也而其動以天故无息前此葢疑而其動以天一句下文云无息者誠之體也不息所以體誠也既曰无息者誠之體則其動即天也若下以字則已是不息所以體誠矣中庸質疑潛龍勿用陽在下也伊川先生曰陽氣在下君子處微未可用也易傳白雲郭氏曰在下非獨處微亦陽未動而時未至故也易説見龍在田德施普也伊川先生曰見於地上德化及物其施已普也易傳白雲郭氏曰時至而出兼善天下膏澤下於民之時也易説終日乾乾反復道也伊川先生曰進退動息必以道也易傳反復道也言終日乾乾往來皆由於道也三位在二體之中可進而上可退而下故言反復張繹所録廣平游氏曰終日乾乾反復於道也反復宜與復卦之反復同釋終日乾乾行事之時而曰反復道何也葢君子之行事雖汲汲皇皇而易簡之理未嘗離也亦行其所无事而已九三在下體之上將離人而天矣故有反復道之象若夫聖人作而萬物覩則天德之所為確乎能其事而已矣雖有為而未嘗為反復不容言矣易説白雲郭氏曰乾乾自彊不息也自彊不息則反復皆天道造次顚沛必於是也易説或躍在淵進无咎也伊川先生曰量可而進適其時則无咎易傳横渠先生曰或躍進退皆可在淵者性退也故指其時而言也易説白雲郭氏曰四為有位之臣與五同功雖有進退之義而義在有為故進亦无咎聖人懼其近而必進故或之亦慮其退而失時故曰進无咎也易説飛龍在天大人造也伊川先生曰大人之為聖人一无人字之事也易傳横渠先生曰乾之九五曰飛龍在天利見大人乃大人造位天德成性躋聖者耳若夫受命首出則所性不存焉故不曰位乎君位而曰位乎天德不曰大人君矣而曰大人造也九五大人造也造成就也或謂造為至義亦可大人成性則聖也化化則純是天德也聖猶天也故不可階而升聖人之教未嘗以性化責人若大人則學可至也位天德則神神則天也故不可以神屬人而言莊子言神人不識義理也又謂至人眞人其辭險窄皆无可取孟子六等至於神則不可言人也並易説白雲郭氏曰大人體乾行健不為小道也故飛龍見大人之為易説亢龍有悔盈不可久也伊川先生曰盈則變有悔也易傳白雲郭氏曰易窮則變變則通通則久亢不知變其能久乎易説用九天德不可為首也明道先生曰文王之所以為文也純亦不已此乃天德也有天德便可語王道劉絢所録伊川先生曰用九天德也天德陽剛復用剛而好先則過矣易傳白雲郭氏曰善用天德者用其大不善用天德者用其強強无不及也處衆則欲長有功則欲伐故聖人於是戒之益贊于禹曰滿招損謙受益時乃天道其知用天德者歟易説漢上朱氏曰夫子小象辭也晉太史蔡墨曰在乾之姤曰潛龍勿用在乾之同人曰見龍在田此繫辭所謂乾一索再索三索陸績所謂初九九二也初九變坤下有伏震潛龍也陽氣潛藏在下之時𤣥曰昆侖旁薄幽也二居地表田也坤變為離離為文文章炳明見龍也龍德而見如日下照施及於物者普矣𤣥曰龍出乎中龍德始著也三變離兊日在下終日也初九九二乾乾也初九始正也九三終正也終則有始反復乾乾動息不離於道者也三則極極則反反則復非終日乾乾能之乎𤣥曰首尾可以為庸程顥曰終日乾乾對越在天葢上天之載無聲臭也初二三有伏震震為龍為足五為坎九四變離兊兊為澤澤淵也足進乎五或躍也伏震為龍退而在淵也九居四履非其位宜有咎進則无咎堯老而舜攝舜老而禹徂征之時乎𤣥曰東動青龍光離于淵程頤易傳曰量可而進適其時則无咎九五坎變離離為飛乾為天離淵而飛飛龍在天也離為目見也九五動九二大人應而往造之利見大人也𤣥曰龍幹于天長類无彊上九變兊兊為毁折亢滿之累也盈極則虚不可乆也𤣥曰南征不利九陽剛之極乾天德在萬物之先復用陽剛之極則剛過矣人所不能堪也九六隂陽之變也九變則六六變則九九六相用剛柔相濟然後適乎中闗子明曰以六用九易傳曰以剛為天下先凶之道也伏爻何也曰京房所傳飛伏也乾坤坎離震巽艮兊相伏者也見者為飛不見者為伏飛方來也伏既往也説卦巽其究為躁卦例飛伏也太史公律書曰冬至一隂下藏一陽上舒此論復卦初爻之伏巽也易傳新安朱氏曰陽謂九下謂潛反復重複踐行之意進无咎可以進而不必進也造猶作也不可為首言陽剛不可為物先故六陽皆變而吉本義東萊吕氏曰終日乾乾反復道也乾乾不息也乾道反復如環之无端故无息也葢謂進退皆在道也易説文言曰元者善之長也亨者嘉之㑹也利者義之和也貞者事之幹也明道先生曰天地之大德曰生天地絪縕萬物化醇生之謂性告子此言是而謂犬之性猶牛之性牛之性猶人之性則非也萬物之生意最可觀此元者善之長也斯所謂仁也人與天地一物也而人特自小之何邪劉質夫録伊川先生曰元亨利貞乾之四德在人則元者衆善之首也亨者嘉美之㑹也利者和合於義也貞者幹事之用也易傳易雖言元者善之長然亦須通四德以言之至如八卦易之大義在乎此亦无人曾解來乾健坤順之類亦不曾果然體認得入闗語録隂為小人利為不善不可一槩論夫隂助陽以成物者君子也其害陽者小人也夫利和義者善也其害義者不善也張繹所録子罕言利非使人去利而就害也葢人不當以利為心易曰利者義之和以義而致利斯可矣可欲之謂善便與元者善之長同理吕與叔東見録兼山郭氏曰彖既釋此四德矣而文言又三復之何也曰乾有天道有人道析而言之則明乎天人合而言之是或一道也今夫受命賦形於天地之中亦各從其類也本乎天者全乎天本乎地者全乎地是以謂之人也且人之有德慧術知得之於天進退用舍受之於命然則所謂天爵者吾所固有也得元者謂之仁善之長是也得亨者謂之禮嘉之㑹是也得利者謂之義義之和是也得貞者為正為信事之幹是也君子行此四德故曰乾元亨利貞凡言人道也易説白雲郭氏曰元亨利貞固不止於在人者則善之長嘉之㑹義之和事之幹非獨人事而已易説君子體仁足以長人嘉㑹足以合禮利物足以和義貞固足以幹事君子行此四德者故曰乾元亨利貞伊川先生曰君子體仁足以長人體法於乾之仁乃為君長之道足以長人也體仁體元也比而效之謂之體嘉㑹足以合禮得㑹通之嘉乃合於禮也不合禮則非理豈得為嘉非理安有亨乎利物足以和義和於義乃能利物豈有不得其宜而能利物者乎貞固足以幹事貞固所以能幹事也君子行此四德乃合於乾也易傳横渠先生曰仁統天下之善禮嘉天下之㑹義公天下之利信一天下之動易説廣平游氏曰道者天也道為萬物之奥故足以統天仁者人也仁為衆善之首故足以長人猶之萬物發育乎春而震為長子也大為之制經為三百曲為之防詳為三千要皆歸於大中而已故曰嘉㑹足以合禮猶之萬物相見於夏而離為文明也義主於刻制而利不生於其間則不和先王之義勞之乃所以逸之故民至於忘其勞殺之乃所以生之故民至於忘其死葢利之實行乎其中矣故曰利物足以和義猶之萬物彫悴於秋而説言乎兊也事以智謀物以智創智而不貞則事不立貞者正而固也謀之不正則異議得以屈之守之不固則衆力得以傾之豈事之幹邪故曰貞固足以幹事猶之萬物終藏於冬而成言乎艮也君子行此四德則乾道在我矣故曰乾元亨利貞易説白雲郭氏曰君子體乾之仁故足以長人體乾之嘉㑹故足以合禮體乾之利物故足以和義體乾之貞固故足以幹事此君子行此四德之道也君子行此四德亦同乾之元亨利貞易説漢上朱氏曰文言者錯雜四德六爻反復成文設為問答往來相錯亦文也故太𤣥凖之以𤣥文天地之大德曰生元者生物之始善之長也其在人則仁也亨者天地之極通衆美之期㑹也利由屈信相感而生或屈或信各得其宜義者宜也語義則利在其中矣貞正也在物則成也𤣥所謂水包貞也有德乃有事德不正則事不立立事之謂幹唯仁者宜在高位故君子體仁足以長人凡長於人皆長也物不可以苟合必致飾焉故嘉㑹足以合禮嘉㑹如嘉魂魄是也利順物理而行之各得其所欲者也故利物足以和義守正堅固不為萬物之所撓奪乃能建立庶事故貞固足以幹事君子剛健不息行此四德故曰乾元亨利貞張載曰天下之理得元也亨㑹而通也説諸心利也一天下之動貞也易傳新安朱氏曰此篇申彖傳象傳之意以盡乾坤二卦之蘊而餘卦之説因可以例推云元者善之長也元者生物之始天地之德莫先於此故於時為春於人則為仁而衆善之長也亨者生物之通物至於此莫不嘉美故於時為夏於人則為禮而衆美之㑹也利者生物之遂物各得宜不相妨害故於時為秋於人則為義而得其分之和貞者生物之成實理具備隨在各足故於時為冬於人則為智而為衆事之幹幹木之身枝葉所依以立者也君子體仁以仁為體則無一物不在所愛之中故足以長人嘉其所㑹則無不合禮使物各得其所利則義无不和貞固者知正之所在而固守之所謂知而勿去者也故足以為事之幹君子行此四德者非君子之至健无以行此故曰乾元亨利貞此第一節申彖傳之意與春秋傳所載穆姜之言不異疑古者已有此語穆姜稱之而夫子亦有取焉故下文别以子曰表孔子之辭葢傳者欲以明此章之為古語也本義問文言四德一段先生曰元者善之長以下四句説天德之自然君子體仁足以長人以下四句説人事之當然元只是善之長萬物生理皆始於此衆善百行皆統於此故於時為春於人為仁亨是嘉之㑹此句自來説者多不明嘉美也㑹猶齊也嘉㑹衆美之㑹猶言齊好也春天發生萬物未大故齊到夏時洪纎高下各各暢茂葢春方生育至此乃无一物不暢茂其在人則禮儀三百威儀三千事事物物大大小小一齊到恰好處所謂動容周旋皆中禮故於時為夏於人為禮周子遂喚作中利者為義之和萬物至此各遂其性事理至此无不得宜故於時為秋於人為義貞者乃事之幹萬物至此收斂成實事理至此无不的正故於時為冬於人為智此天德之自然其在君子所當從事於此者則必體仁乃足以長人嘉㑹足以合禮利物足以和義貞固足以幹事此四句倒用上面四箇字極有力體者以仁為我之骨我以之為體仁皆從我發出故无物不在所愛所以能長人嘉㑹足以合禮者言須是美其所㑹也欲其所㑹之美當美其所㑹葢其厚薄親疎尊卑小大相接之體各有節文无不中節即所㑹皆美所以能合於禮也利物足以和義使物物各得其利則義无不和葢義是斷制裁割底物若似不和然惟義能使事物各得其宜不相妨害自无乖戾而各得其和所以為義之和也蘇氏説利者義之和却説義慘刻而不和不可徒義須著些利則和如此則義是一物利又是一物義是苦物恐人嫌須著些利令甜此不知利之言也義中自有利使人而皆義則不遺其親不後其君自无不利非和而何貞固足以幹事貞正也知其正之所在固守而不去故足以為事之幹幹事言事之所依以立葢正而能固萬事依此而立在人則是智至靈至明是是非非確然不可移易不可欺瞞所以能立事也幹如板築之有楨幹今人築牆必立一木於土中為骨俗謂之夜义木无此則不可築横曰楨直曰幹無是非之心非知也知得是是非非之正堅固確守不可移易故曰知周子則謂之正也故曰乾元亨利貞他把乾字當君子元者善之長也亦仁而已體仁則痒痾疾痛舉切吾身故足以長人亨者嘉之㑹㑹通也㑹而通也通有交之意嘉㑹猶言慶㑹㑹通而不嘉者有矣如小人同謀其情非不通也然非嘉美之㑹又安有亨乎利者義之和和合於義即利也利物足以和義葢義者得宜之謂也處得其宜不逆於物即所謂利則利之行豈不足以和義乎貞者事之幹徹頭徹尾不可欠缺人之遇事所以穨惰不立而失其素志者不貞故也此所謂貞固足以幹事四德大槩就人事言之自君子體乾之德見諸行事者也是以繫之曰君子行此四德者故曰乾元亨利貞問元亨利貞乾之四德仁義禮智人之四德然亨却是禮次序却不同何也先生曰仁義禮智猶言春夏秋冬元亨利貞其發見有次序仁義禮智在裏面自有次序到發見時隨感而動却无次序生底意思是仁殺底意思是義發見嘉㑹是禮收又記是深字藏不測是智乾之元亨利貞本是謂筮得此卦則大亨而利於守正而彖辭文言皆以為四德某常疑如此等類皆是别立説以發明一意至如坤之利牝馬之貞則發得不甚相似易中言元者善之長説得最親切無滲漏仁義禮智莫非善這箇却是善之長仁是有滋味底物事説做知覺却是無滋味底物事仁則有所屬如孝弟慈和柔愛皆屬仁伊川語録中説仁者以天地萬物為一體説得太深無捉摸處易傳其手筆只云四德之元猶五常之仁偏言則一事專言則包四者又曰仁者天下之公善之本也易傳只此兩處説仁説得極平實學者當精看此等處亞夫問萬物之生意最可觀此元者善之長也斯所謂仁也此只是先生所謂初之意否曰萬物之生天命流行自始至終無非此理但初生之際精淳未散尤易見耳只如元亨利貞皆是善而元則為善之長亨利貞皆自那裏來仁義禮智亦皆善也而仁則為萬善之首義禮智皆從這裏出耳問伊川云四德之元猶五常之仁偏言則一事專言則包四者曰須先識得元與仁是箇甚物事更就自家身上看甚麽是仁甚麽是義禮智既識得這一箇便見得這一箇能包得那數箇若有人問自家如何一箇便包得數箇只答云只為是一箇問黄直卿曰公於此處見得分明否曰向來看康節詩見得這意思如謂天根月窟間來往三十六宫都是春正與程子所謂靜後見萬物皆有春意同且如這箇棹子安頓得恰好時便是仁葢无乖戾便是生意窮天地亘古今只是一箇生意故曰仁者與物无對以其无往非仁此所以仁包四德也曰如此體仁便不是生底意思棹子安頓得恰好只可言中不可謂之仁元只是初底意便是如木之萌如草之芽其在人如惻然有隱初來底意思便是所以程子謂看雞雛可以觀仁為是那嫩小底便有仁底意思在以一身觀之元如頭亨便是手足利便是胷腹貞便是那元氣所歸宿處所以人頭亦謂之元首穆姜亦曰元體之長也今若能知得所謂元之元元之亨元之利元之貞上面一箇元字便是包那四箇下面元字則是偏言則一事者恁地説則大煞分明了又須要知得所謂元之元亨之元利之元貞之元者葢見得此則知得所謂只是一箇也若以一歲之體言之則春便是元之元然所謂首夏清和者便是亨之元孟秋之月便是利之元到那初冬十月便是貞之元也只是初底意思便是問曰如先生之言正是程子説復其見天地之心復之初爻便是天地生物之心也曰今只將公所見看所謂心譬如穀種生之性便是仁陽氣發處乃情也觀之便見久之復曰正如天官冢宰以分職言之特六卿之一耳而曰建邦之六典則又統六卿也問元者用之端而亨利貞之理具焉至於為亨為利為貞則亦元之為耳此元之所以包四德也若分而言之則元亨誠之通利貞誠之復其體用固有在矣恐亦不得如龜山之説也以用言之則元為主以體言之則貞為主問仁包四德如元者善之長從四時生物意思觀之則隂陽都偏了曰如此則秋冬都无生物氣象但生生之意至此退了到得退未盡處則陽氣依舊在且如隂陽其初亦只是一箇進便喚做陽退便喚做隂又曰仁字須兼義禮智看方看得仁字出仁者仁之本體禮者仁之節文義者仁之斷制智者仁之分别猶春夏秋冬雖不同而同出於春春則生意之生也夏則生意之長也秋則生意之成也冬則生意之藏也自四而兩自兩而一則統之有宗㑹之有元故曰五行一隂陽隂陽一太極又曰仁為四德之首而智則能成始而成終猶元為四德之長然元不生於元而生於貞葢天地之化不翕聚則不發散也仁智交際之間乃萬化之機軸此理循環不窮脗合无間故不貞則无以為元也問亨者嘉之㑹先生曰此處難下語且以草木言之發生到夏時好處都來湊㑹嘉只是好處㑹是期㑹也又曰貞固是固得恰好如尾生之信是不貞之固須固得好方是貞嘉㑹雖是有禮後底事然這意思却在禮之先嘉其所㑹時未説到那禮在然能如此則便能合禮利物時未説到和義在然能使物各得其利則便能和義㑹字説道是那萬物一齊發見處得他盡嘉㑹便是如只一事兩事嘉美時未為嘉㑹㑹字張葆光用齊字説説得幾句也好使物各得其宜何利如之如此便足以和義這利字是好底如孟子所説戰國時利是不好底這箇利如那未有仁而遺其親未有義而後其君之利和字也有那老蘇所謂无利則義有慘殺而不和之意葢於物不利則義未和伊川説利物足以和義覺他説得糊塗如何喚做和合於義四句都説不力問利物足以和義曰義斷是非别曲直近於不和然是非曲直辨便是利乃是和處也或問利者義之和也曰義之和處便是利如君臣父子各得其宜此便是義之和處安得不云利如君不君臣不臣父不父子不子此便是不和也安得云利孔子所以罕言利者葢不欲專以利為言恐人只管去利上求也貞者事之幹伊川説貞字只以為正恐未足以盡貞之義須是説正而固然亦未推得到知上看得來合是如此知是那黙運事變底一件物事所以為事之幹體仁如體物相似人在那仁裏做骨子故謂之體仁仁只是箇道理須著這人方體得他做得他骨子比而效之之説却覺得不是文言上不必大故求道理看來只是協韻説將去繼之者善也元亨是氣之方行而未著於物也是上一截事成之者性也利貞是氣之結成一物也是下一截事四德之元猶五常之仁偏言則一事專言則包四者此段只於易元者善之長與論語言仁處看若天下之動貞夫一者也則貞又包四者周易一書只説一箇利則利又大也元者善之長也善之首也亨者嘉之㑹也好底㑹聚也義者宜也利即義也萬物各得其所義之合也幹事事之骨也猶言體物也看此一段須與太極圖通看四德之元安在甚處剥之為卦在甚處乾天也一段在甚處方能通成一片不然則不貫通少間看得如此了猶未是受用處在趙致道問元者善之長也先生曰元亨利貞皆善也而元乃為四者之長是善端初發見處也甘吉甫問性與天道先生云譬如一條長連底物事其流行者是天道人得之者為性乾之元亨利貞天道也人得之則為仁義禮智之性問孟子言仁義禮智義在第二太極圖以義為利却成在第三曰禮是陽故云亨謂之仁義禮智猶東西南北所謂元亨利貞猶東南西北一箇是對説一箇是從一邊説並語録東萊吕氏曰利者義之和也老蘇之説不合分利義為兩塗葢義之和處即是利也苟有徒義徒利之辨則非矣君子體仁足以長人仁者人也合而言之道也世人分為二故君子體而為一君子行此四德者故曰乾元亨利貞既行此四德即是乾也非止體乾也易説又曰君子體仁足以長人易傳曰比而效之謂之體仁者人也合而言之道也只為人不能合故必比而效之執柯伐柯其則不逺比而效之之謂也紀聞體仁不是將仁來為我之體我之體便都是仁也此朱子語又曰貞固足以幹事世人多謂疏通者能幹事貞固者不能幹事此葢錯認朴拙為貞固耳殊不知世所謂疏通者雖能趣辦目前然不貞不固終必敗事故惟貞固為能幹事也紀聞元者善之長春秋傳記穆姜所誦之語謂元者體之長覺得體字較好是一體之長也此朱子語合訂刪補大易集義粹言卷二
