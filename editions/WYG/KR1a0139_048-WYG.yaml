body:
  text: 合訂刪補大易集義粹言卷四十六頭等侍衛納喇性徳編震下巽上康節先生曰經有因革損益盡之矣詳見泰卦伊川先生曰益序卦損而不己必益故受之以益盛衰損益如循環損極必益理之自然益所以繼損也為卦巽上震下雷風二物相益者也風烈則雷迅雷激則風怒兩相助益所以為益此以象言也巽震二卦皆由下變而成陽變而為隂者損也隂變而為陽者益也上卦損而下卦益損上益下所以為益此以義言也下厚則上安故益下為益易傳益利有攸往利涉大川伊川先生曰益者益於天下之道也故利有攸往益之道可以濟險難利涉大川也易傳白雲郭氏曰損益實一道相須以成徳有損而後有益故聖人先求損修徳之序也損而致益損之得也損而无益損之失也得則為善為君子失則為惡為小人此損之道有二也益一而已然損主止益主動止故有孚元吉无咎而後利有攸往益繼止以動故利有攸往而利涉大川也益象虚中而上下二卦皆木所以利涉大川損益之道相為終始故二卦之辭其義相繼易説新安朱氏曰益増益也為卦損上卦初畫之陽益下卦初畫之隂自上卦而下於下卦之下故為益卦之九五六二皆得中正下震上巽皆木之象故其占利有攸往而利涉大川也本義彖曰益損上益下民説无疆自上下下其道大光利有攸往中正有慶利涉大川木道乃行益動而巽日進无疆天施地生其益无方凡益之道與時偕行伊川先生曰以卦義與卦才言也卦之為益以其損上益下也損於上而益下則民説之无疆謂无窮極也自上而降已以下下其道之大光顯也陽下居初隂上居四為自上下下之義五以剛陽中正居尊位二復以中正應之是以中正之道益天下天下受其福慶也益之為一无為字一作於道於平常无事之際其益猶小當艱危險難則所益至大故利涉大川也於濟艱險乃益道大行之時也益誤作木或以為上巽下震故云木道非也又以二體言卦才下動而上巽動而巽也為益之道其動巽順於理則其益日進一本益字在日進下廣大无有疆限也動而不順於理豈能成大益也以天地之功言益道之大聖人體之以益天下也天道資始地道生物天施地生化育萬物各正性命其益可謂无方矣方所也有方所一无所字則有限量无方謂廣大无窮極也天地之益萬物豈有窮際乎天地之益无窮者理而已矣聖人利益天下之道應時順理與天地合與時偕行也並易傳横渠先生曰上巽下動者損上益下之道木以動而巽故利涉大川否卦九四下而為初九故曰天施地生又曰損上益下又曰自上下下易説白雲郭氏曰益自否來乾之九四損而成巽坤之初六益而為震是損上之四益下之初也民説无疆者言其為君而厚下也損不以君民為言者蓋其所損或善或惡其道皆上行耳損惡而上行則徳日進矣損善而上行是以自厚私己之道故與益為異也然自修徳言之則先損以逺害後益以興利是以其道大光也利有攸往言往而興利是以中正之道益天下斯天下有慶矣木道乃行者益之卦象與中孚相𩔖中孚之利涉大川以乗木舟虚也益之震巽皆為木道雖未若中孚之舟虚亦木道行而利涉大川也神農氏斲木為耜揉木為耒耒耨之利以教天下取諸益者亦木道之行也益動而巽則无盈滿之累故日進无疆顔淵有若无實若虚終日不違如愚所以見其進未見其止也孔子曰益長裕而不設故益裕道也雖天施地生其益无方亦長裕不設之大者耳聖人法天地是以中正有慶也損言損益盈虚與時偕行則并損益言之益言凡益之道至是損為己事則无損矣惟有益而已與時偕行以言其日進而不已也易説漢上朱氏曰益否之變損之反也損上之九四益下之初六損上益下也益之巽乃損之兊坤為衆民也損上益下得民之心是以民説无疆者乾上九益坤初也天无疆地與天合徳乃无疆无疆則民説无彼此之限故曰損上益下民説无疆此以初九言益之道也否自上而下一變漸二變渙三變益漸渙皆有坎離日月象以上之貴能下其下則益道光明文武之下下是也夫損者將以為益也損下益上其道上行至於自上下下其道乃大光明矣故曰自上下下其道大光此再以初九推原其變而言益也九五本損之九二反而上往得尊位以中正觀天下六二復以中正應之君臣上下以中正益天下天下受其益是為九五一人有慶則益之道何往而不利哉故曰利有攸往中正有慶此以損之九二往五而言益也益道之行自上下下為漸為渙皆有涉坎之象巽為木坎為大川木在坎上乗舟之象上益其下百姓親附樂為之用入可以守出可以戰如子弟之衛父兄孰不致其死力以犯大難哉故曰利涉大川木道乃行此復以初九之變兼上五二爻言益也凡利涉大川言木者三益也渙也中孚也皆巽坎也渙曰乗木有功中孚曰乗木舟虚動者震也巽者巽也无疆者乾合坤也否變漸有離日變渙變益日進而上行益動而巽於理則日進而无疆如寒暑之不停晝夜之有經日益一日莫之能禦以動而巽也故曰益動而巽其益无疆此合震巽二體兼初九之變而言益也天地之益物者以動而巽也天施一陽於地地得之以生萬物自坎至艮自艮至震其益乃盈乎天地之間豈有方所分量哉益人者動而巽於理亦然輔其自然各足其分无方也坤為方乾變之為无方繫辭曰益長裕而不設是也故曰天施地生其益无方因乾降坤升以言益也天地之大損益有時益極則損損極則益其道與天地並是以能无疆故曰凡益之道與時偕行此再以損益二卦終言乎益之時也在卦氣為立春故太𤣥準之以増易傳又曰横渠易解損六三上九曰六三本為上六上九本為九三解益曰否卦九四下而為初九故曰天施地生又曰損上益下又曰自上下下則横渠言卦變矣叢説新安朱氏曰益損上益下以卦體釋卦名義利有攸往以卦體卦象釋卦辭益動而異者動巽二卦之徳乾下施坤上生亦上文卦體之義又以此極言賛益之大本義大抵損益二卦諸爻皆互換損好益却不好如損六五却成益六二損上九好益上九却不好或説損益先生曰𫝑自是如此有人主出來也只因這箇𫝑自住不得到這裏方看做是如何惟是聖人能順得這𫝑盡得這道理以下人不能識得損益之宜便錯了壊了也自是立不得因只是因這箇損益也是損益這箇問益卦木道乃行曰不須改木字為益字只木字亦得某見一朋友有説八卦之金木水火土有五行之金木水火土如乾為金易卦之金也兊之金五行之金也巽為木是卦中取象震為木乃東方屬木五行之木也五行取四維故也問木道乃行程傳以為木字本益字之誤如何先生曰看來只是木字渙卦説乗木有功中孚説乗木舟虚以此見得只是木字並語録象曰風雷益君子以見善則遷有過則改濓溪先生曰有善不及曰不及則學焉問曰有不善曰不善則告之不善且勸曰庶幾有改乎斯為君子有善一不善二則學其一而勸其二有語曰斯人有是之不善非大惡也則曰孰无過焉知其不能改改則為君子矣不改為惡惡者天惡之彼豈无畏邪烏知其不能改故君子悉有衆善无弗愛且敬焉又曰仲由喜聞過令名无窮焉今人有過不喜人規如䕶疾而忌醫寧滅其身而无忌也噫並通書又曰君子乾乾不息於誠詳見乾大象伊川先生曰風烈則雷迅雷激則風怒二物相益者也君子觀風雷相益之象而求益於己為益之道无若見善則遷有過則改也見善能遷則可以盡天下之善有過能改則无過矣益於人者无大於是易傳藍田吕氏曰益増長以為利也風雷振動萬物變而新之有遷善改過之義白雲郭氏曰子夏傳曰雷以動之風以散之萬物皆益也天施地生所以益萬物者莫盛於雷風也損之象言懲忿窒慾蓋言修徳之始務損去其惡也其惡既損則見善自遷矣然猶曰有過則改者非謂懲窒忿慾之未盡也蓋遷善之際猶或有失焉有之又當不憚改也過謂過失耳非若忿慾之為惡也顔子三月不違仁則亦有違矣不逺復則亦有未復之時矣所謂過也是以顔子克己之始於視聽言動之非禮者皆勿而絶之所謂懲忿窒慾也及其得一善則拳拳服膺而又弗失所謂見善則遷也有不善未嘗不知知之未嘗復行孔子以謂殆庶幾所謂有過則改也論語亦以不遷怒不貳過言之不遷怒則所遷者善矣故懲忿窒慾始也見善則遷中也有過則改終也知此則損益之道盡矣易説漢上朱氏曰風行雷動相薄有聲不知風之為雷歟雷之為風歟風雷相益也君子見人之善則遷之已有過則改之忘乎己與人也相益而己益自否來九四不正之初而正一變成離離為目見善則遷也初六不正過也初往之四得正有過則改也不遷善則无改過遷善者以改過為益易傳新安朱氏曰風雷之𫝑交相助益遷善改過益之大者而其相益亦猶是也本義先生言某昨日思風雷益君子以遷善改過遷善如風之速改過如雷之猛祖道曰莫是才遷善便是改過否曰不然遷善字輕改過字重遷善如慘澹之物要使之白改過如黒之物要使之白用力自是不同遷善者但是見人做得一事强似我心有所未安即便遷之若改過須是大叚勇猛始得又曰公所説蒙與蠱二象却有意思如山下有澤損君子以懲忿窒慾必是降下山以塞其澤便是此象六十四卦象皆如此問益卦遷善改過先生曰風是一箇急底物見人之善己所不及則遷之如風之急雷是一箇勇決底物見己有過便斷然改之如雷之勇決不容有些小遲緩並語録又曰有心悖理謂之惡无心失理謂之過通書釋義初九利用為大作元吉无咎象曰元吉无咎下不厚事也伊川先生曰初九震動之主剛陽之盛也居益之時其才足以益物雖居至一无至字下而上有六四之大臣應於己四巽順之主上能巽於君下能順一作巽於賢才也在下者不能有為也得在上者應從之則宜以其道輔於上作大益天下之事利用為大作也居下而得上之用以行其志必須所為大喜而吉則无過咎不能元吉則不惟在己有咎乃累乎上為上之咎也在至下而當大任小善不足以稱也故必元吉然後得无咎在下者本不當處厚事厚事重大之事也以為在上所任所以當大事必能濟大事而致元吉乃為无咎能致元吉則在上者任之為知人己當之為勝任不然則上下皆有咎也並易傳横渠先生曰以剛陽之徳施益於下故利用大作然必元吉乃无咎也易説藍田吕氏曰初九當益之時損上益下初九以剛處益之下居動之始受上之益利於大有為者也然位卑而任重不循其本以獲元吉則未能免咎者也白雲郭氏曰損為益之始益為損之終損益者始終之道也在損之初言當己事至益之初則遄往之時矣故言利用為大作而繫辭言益以興利其義一也自益之一卦言之則初九為益之始自損而至於益言之則初九道已成矣先難之事已矣言乎得失則元吉論其脩徳則无咎當興利之初故利為大作也損益二卦終始相通故其辭意相接損之上九曰勿損益之无咎貞吉利有攸往得臣无家而象言大得志益之初九言利用為大作元吉无咎蓋所以終利有攸往之辭亦知其大得志也猶之卦辭損自有孚終於利有攸往而益之卦辭以利有攸往為始也下不厚事者益之初九非先難之時故雖在下而不必厚於事是以直以長裕之道大有為以益天下自然元吉无咎也事如懲忿窒慾損惡之事固當厚而不敢忽然徳既有成當利澤天下非厚事之時也何以知其徳之成蓋方忿未懲慾未窒之時非獨无以致元吉亦且未能補過而无咎矣易説漢上朱氏曰陽為大震為作益之初利用有為而大作大作者作大事以益天下也事大且善獲元吉則動而无咎初九正得乾之始元吉也坤厚也巽為事震有伏巽動則坤見震巽毁下不可厚事也先王用民之力嵗不過三日唯田與追胥竭作其不可厚事如此為大作也非元吉則安得无咎易傳新安朱氏曰初雖居下然當益下之時受上之益者也不可徒然无所報効故利用為大作必元吉然後得无咎下本不當任厚事故不如是不足以塞咎也本義元吉无咎吉凶是事咎是道理蓋有事則吉而理却過差者是之謂吉而有咎語録六二或益之十朋之龜弗克違永貞吉王用享于帝吉象曰或益之自外來也伊川先生曰六二處中正而體柔順有虚中之象人處中正之道虚其中以求益而能順從天下孰不願告而益之孟子曰夫茍好善則四海之内皆將輕千里而來告之以善夫滿則不受虚則來物理自然也故或有可益之事則衆朋助而益之十者衆辭衆人所是理之至當也龜者占吉凶辨是非之物言其至是龜不能違也永貞吉就六二之才而言二中正虚中能得衆人之益者也然而質本隂柔故戒在常永貞固則吉也求益之道非永貞則安能守也一作之損六五十朋之則元吉者蓋居尊自損應下之剛以柔而居剛柔為虚受剛為固守求益之至善故元吉也六二虚中求益亦有剛陽之應而以柔居柔疑從益之未固也故戒能常永貞固則吉也王用享于帝吉如二之虚中而能永貞用以享上帝猶當𫉬吉况與人接物其意有不通乎求益於人有不應乎祭天天子之事故云王用也既中正虚中能受天下之善而固守則有有益之事衆人自外來益之矣或曰自外來豈非謂五乎曰如二之中正虚中天下孰不願益之五為正應固在其中矣並易傳横渠先生曰或益之十朋之龜弗克違言損上益下之道理不可易人皆信之雖十朋之龜亦不能違此道也往見損九五居中體柔蒙上之益修報於下享帝之美莫盛於此焉或益之必有自外來而益之者也易説藍田吕氏曰六二義見損之六五然益之六二雖居下卦之中天下之益歸之有王者之象焉莫尊於王而受上之益則所謂上者帝而已矣享于帝吉受天之益也白雲郭氏曰損益本一道相須以相成以二卦反對言之則損之上益之初損之五益之二也故損上益初其辭相屬而損五益二又大同矣自損五之下去益既逺於益為不及自益二之上去損復逺其辭為己過矣六二柔順中正人之所與故或益之十朋之龜弗克違也或者來益而不一之辭損之六五曰元吉自然之吉也此曰永貞吉久而有守斯為吉也君臣之道不同故其為吉亦異或益之人益之也十朋之龜弗克違鬼神益之也王用享于帝吉天益之也益象虚中而六二謙以居之是以致益之多天且弗違况於人與鬼神乎在謙之彖言天道益謙鬼神福謙人道好謙益之六二皆得之伊川曰人之為善則千里之外應之六二中正虚已而益之者自外來是也苟為不善則千里之外違之上九求益之極擊之者自外來是也易説漢上朱氏曰益損之反益之六二即損之六五故其象同夫子曰辭也者各指其所之然異於損者六二受益者也虚中退託又順從之九五自外來而益之或益之者益之者不一天下之善皆歸之也天地鬼神人道貴謙得人如此故十朋之龜弗克違受益者當守而不變愈久而不厭則來益者无窮矣故永貞吉言六二之虚中不可動也乾五為王乾五兼上九為巽巽為工帝者天之工宰故又為上帝象五自外來益二成兊有殺牛于宫象及復於五有升自門闕享于帝之象六二受益不已獲天人之助王者用此爻以享于上帝吉也況六二乎易傳和靖尹氏曰損益卦中十朋之是斷句龜弗克違語録新安朱氏曰六二當益下之時虚中處下故其象占與損六五同然爻位皆隂故以永貞為戒以其居下而受上之益故又為卜郊之吉占或者衆无定主之辭本義王用享于帝吉是祭則受福底道理語録六三益之用凶事无咎有孚中行告公用圭象曰益用凶事固有之也伊川先生曰三居下體之上在民上者也乃守令也居陽應剛處動之極居民上而剛决果於為益者一无者字也果於為益用之於凶事則无咎凶事謂患難非常之事三居下之上在下當承禀於上安得自任擅為益乎惟於患難非常之事則可量宜應卒奮不顧身力庇其民故无咎也下専自任上必忌疾雖當凶難以一无以字義在可為然必有其孚誠而所為合於中道則誠意通於上而上信與之矣専為而无為上愛民之至誠固不可也雖有誠意而所為不合中行亦不可也圭者通信之物禮云大夫執圭而使所以申信也凡祭祀朝聘用圭玉所以通達誠信也有誠孚而得中道則能使上信之是猶告公上用圭玉也其孚能通達于上矣在下而有為之道固當有孚中行又三隂爻而不中故𤼵此義或曰三乃隂柔何得反以剛果任事為義曰三質雖本隂然其居陽乃自處以剛也應剛乃志在乎剛也居動之極剛果於行也以此行益非剛果而何易以所勝為義故不論其本質也六三益之獨可用於凶事者以其固有之也謂専固自任其事也居下當禀承於上乃専任其事惟救民之凶災拯時之艱急則可也乃處急難變故之權宜故得无咎若平時則不可也並易傳横渠先生曰中行者不私於應无所偏係也用心不私以拯凶難雖非王者之佐可以用之牧伯以為藩屏之臣矣體躁居陽上有剛應持此施益用拯凶難乃其固能也故无咎可必然亦須執禮告上公而行方合中道其曰告公者未足専進為王者之佐也易説廣平㳺氏曰益則吉矣而用凶事者所謂吉人凶其吉也三居下體之上當震動之極不用凶事則髙而危滿而溢矣非固有之道也所謂凶事者必非衣帛冠布挹而損之行恭而用儉所以固有之也三本剛體而以柔居之故有用凶事之象易説白雲郭氏曰六三居動之極為益之過者過於益下雖不為凶而用於患難之際則得其宜而无咎也有孚中行告公用圭者信以行之貴於得中而後可以告公用圭也告公用圭治世之禮也益之過厚用於患難則可固有之茍欲用之平世非有孚以中道行則不能固有矣此明時有不同其用亦異也伊川曰凶事謂患難非常之事然則孟子謂拯民水火之時也易説漢上朱氏曰易以正為吉不正為凶六居三不正上巽來益三巽為事益之用凶事也三震動之極為決躁巽其究為躁果於益民者也用之於凶事乃无咎以位不當故也凶事者患難囏阨非常之事唯此乃當奮身不顧如救焚拯溺果於益可也然非有誠心愛民見信於上中道而行亦不可三公位上乾不變為玉震東方之卦交乾為圭圭象春生者也三公以中道上行見孚於上故聘之用圭以達其誠及其既孚上九反三復以誠信與之用圭之禮卒事則反之告者上告下也伏兊為口告公用圭也夫益用凶事唯有孚中行上三交孚至於告公用圭乃能固有其孚不然公雖人臣之尊位也為善専輒有拊傴其民之嫌雖益猶者咎季路為蒲宰修溝洫不白於君以簞食壺漿與民而夫子止之者亦此𩔖也易傳曰禮大夫執圭而使所以申信也凡祭祀朝聘皆以達誠而已易傳新安朱氏曰六三隂柔不中不正不當得益者也然當益下之時居下之上故有益之以凶事者蓋警戒震動乃所以益之也占者如此然後可以无咎又戒以有孚中行而告公用圭也用圭所以通信益用凶事欲其困心衡慮而固有之也並本義益之用凶事猶言用降我凶徳嘉績于朕邦語録六四中行告公從利用為依遷國象曰告公從以益志也伊川先生曰四當益時處近君之位居得其正以柔巽輔上而下順應於初之剛陽如是可以益於上也惟處不得其中而所應又不中是不足於中也故云若行得中道則可以益於君上告於上而獲信從矣以柔巽之體非有剛特之操故利用為依遷國為依依附於上也遷國順下而動也上依剛中之君而致其益下順剛陽之才以行其事利用如是也自古國邑民不安其居則遷遷國者順下而動也爻辭但云得中行則告公而獲從象復明之曰告公而獲從者告之以益天下之志也志茍在於益天下上必信而從之事君者不患上之不從患其志之不誠也並易傳横渠先生曰以隂居隂體巽應卑持此施益可以為依遷之國純用卑柔仍告上公見從方可用事无剛故也不足告王故曰告公本為初六寄位於四居隂體巽所趨在下以為依遷之國人所容信然必中行不私然後可告必見從蓋上以益下為心也並易説藍田吕氏曰六三居下體之上不純乎下六四居上體之下不純乎上當益之時損上益下三四既不純乎上下則損益皆不過乎中故二爻位雖不中皆曰中行又皆隂柔之質不能有所大益不足於王者之事故皆曰告公所可用利益者一事而已故六三益之用凶事无咎六四利用為依遷國靖難求安而已非過益也三以隂居陽可以有為故曰益之用凶事无咎以其所益固有以自任也能固有以自任少有為而不過中行足以信于上而鎮撫其國也故曰有孚中行告公用圭寳玉國之重噐所以鎮撫之也四以隂居隂不及三之有為无可益者求安而已告公而從其志得矣非有為也傳曰我周之東遷晉鄭焉依凡遷國者必有依於人而後濟四不能有為可為遷國之依而已白雲郭氏曰三四失中故皆以中行戒之四非有為之地居巽之下不能自動以益人故欲有行也告公而已欲遷國也依人而己不能自用也告公者以益天下之志告之也易説漢上朱氏曰三四中位六四當位以益下四之初其中下行故曰中行益人者以中道行也三公位初九應四有伏兊兊口告公也兊口坤順允從之象故曰告公雖益人以中道告公而不從亦不可行四諸侯位坤為國四之初遷國也依六三公位而後遷故曰依遷國茍利於吾力不足則依之以遷國可也衛文公依齊桓公而遷楚丘是也六四告公而從能遷其國者以益民為志公信之也志動於中者也遷大事也傳曰吾不能定遷事有當遷而益者以遷為中不可憚也然非以益民為志雖有强國亦不可依之以遷遷則不利許子是也易傳曰自古國邑民不安其居則遷遷國者順下而動也易傳新安朱氏曰三四皆不得中故皆以中行為戒此言以益下為心而合於中行則告公而見從矣傳曰周之東遷晉鄭焉依蓋古者遷國以益下必有所依然後能立此爻又為遷國之吉占也本義中行與依見不得是指誰利用遷國程昌禹守夀春虜人來占得此爻遷來鼎州後平楊么有功並語録九五有孚恵心勿問元吉有孚恵我徳象曰有孚恵心勿問之矣恵我徳大得志也伊川先生曰五剛陽中正居尊位又得六二之一无之字中正相應以行其益何所不利以陽實在中有孚之象也以九五之徳之才之位而中心至誠在恵益於物其至善大吉不問可知故云勿問元吉人君居得致之位操可致之權苟至誠益於一作於益天下天下受其大福其元吉不假言也有孚恵我徳人君至誠益於一作於益天下天下之人无不至誠愛戴以君之徳澤為恩恵也人君有至誠恵益天下之心其元吉不假言也故云勿問之矣天下至誠懐吾徳以為恵是其道大行人君之志得矣並易傳白雲郭氏曰天下之能致益者君也而求其益者天下之民也有孚恵心則所以致益者有至誠之道焉此其所以元吉也有孚恵我徳則天下之民求益而得益至誠懐我之徳矣此其所以大得志也益之道於是為至損之上九言大得志蓋自損得益而為得志也此言大得志蓋君子有恵天下之志至於天下信而懐其徳是為大得志之時也孔子曰老者安之朋友信之少者懐之九五之謂也勿問者有孚恵心无所擇也猶彖言天施地生而曰无方繫辭言益之長裕而曰不設皆无限極之意易説漢上朱氏曰六二應九五有孚也中者心之象恵者順人心而益之五有恵心二信之益人以誠也五之二成兊兊口問也問而後恵恵亦狹矣勿問則吉之至善故勿問元吉不失其始之吉也五不之二而守中正兊象𨼆勿問之吉也故曰有孚恵心勿問之矣六二中正孚於五者恵我中正之徳也九五勿問六二自順我徳而中正之徳貞益以誠不費之恵也是以九五不動而大得志易傳曰人君至誠於益天下則天下孰不以誠懐吾徳而為恵哉易傳新安朱氏曰上有信以恵於下則下亦有信以恵於上矣不問而元吉可和本義東萊吕氏曰益九五有孚人君但誠心恵民不須問民之感如此然後元吉民皆交孚而恵君之徳也茍恵民而先問民之感與不感是計功利非誠心恵民者也安能使民之樂應乎梁恵王徒有移民之小恵已遽問孟子以鄰國之民不加少寡人之民不加多此不知勿問之理也易説上九莫益之或擊之立心勿恒凶象曰莫益之偏辭也或擊之自外來也伊川先生曰上居无位之地非行益於人者也以剛處益之極求益之甚者也所應者隂非取善自益者也利者衆人所同欲也専欲益己其害大矣欲之甚則昏蔽而忘義理求之極則侵奪而致讐怨故夫子曰放於利而行多怨孟子謂先利則不奪不饜聖賢之深戒也九以剛而求益之極衆人所共惡故无益之者而或攻擊之矣立心勿恒凶聖人戒人存心不可専利云勿恒如是凶之道也所一作謂當速改也理者天下之至公利者衆人所同欲苟公其心不失其正理則與衆同利无侵於人人亦欲與之若切於好利蔽於自私求自益以損於人則人亦與之力爭故莫肯益之而有擊奪之者矣云莫益之者非其偏己之辭也苟不偏己合於公道則人亦益之何為擊之乎既求益於人至於甚極則人皆惡而欲攻之故擊之者自外來也人為善則千里之外應之六二中正虚已益之者自外而至是也茍為不善則千里之外違之上九求益之極擊之者自外而至是也繫辭曰君子安其身而後動易其心而後語定其交而後求君子修此三者故全也危以動則民不與也懼以語則民不應也无交而求則民不與也莫之與則傷之者至矣易曰莫益之或擊之立心勿恒凶君子言動與求皆以其道乃完善也不然則取傷而凶矣並易傳横渠先生曰未嘗損己而云莫益之作易者因益卦而言爾體剛質巽志應在下位亢於上故立心勿恒或擊之反或益之之義為文故又云自外來也並易説白雲郭氏曰天下之理髙極者必危滿極者必溢是以益賛于禹曰滿招損謙受益詩人美成王言能持盈守成則知盈滿之戒古人深慎之也益之上九益道既極其損將至故莫益之莫益之者莫之與益也莫之與益則惟傷之者至是以至於或擊也夫以乾之健猶有姤以坤之順猶有復物之所不能免者當是時也戰戰兢兢如臨深淵如履薄冰尚懼不免於擊況立心勿恒之人乎其凶宜矣偏辭者言莫益之之辭謂一偏於求益不已不知持滿之戒故至於極而莫之與是所以謂之偏也持滿之道何如孔子所謂安其身易其心定其交是也且方益之時天地人鬼无或不致益焉及其極也外來之擊斯亦衆矣謙言天道虧盈鬼神害盈人道惡盈益而至於盈其害必至與豐之上六闚其户閴其无人三嵗不覿凶其義皆同易説漢上朱氏曰上九益之極有不益者矣上當益三而莫益之上三相益有雷風相與之象恒也巽股立也三中為心上九莫益之持其心不以相益為恒如是則凶矣人道彼我相益而後安莫益之有我而已偏之辭不知道之大全也三徃乗之艮手上擊九損於下雖欲益之晚矣何以知或擊之九自外來也傷於外者必反於内人之情也上九安能有我而忘彼哉易傳新安朱氏曰以陽居益之極求益不已故莫益而或擊之立心勿恒戒之也莫益之者猶從其求益之偏辭而言也若究而言之則又有擊之者矣並本義問或擊之先生曰或字衆无定主之辭言非但一人擊之也立心勿恒勿字只是不字非禁止之辭此處亦可疑且闕之語録合訂刪補大易集義粹言卷四十六
