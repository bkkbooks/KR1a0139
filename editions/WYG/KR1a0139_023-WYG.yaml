body:
  text: 合訂删補大易集義粹言卷二十一頭等侍衞納喇性德編震下兊上伊川先生曰隨序卦豫必有隨故受之以隨夫説豫之道物所隨也隨所以次豫也為卦兊上震下兊為説震為動說而動動而説皆隨之義女隨人者也以少女從長男隨之義也又震為雷兊為澤雷震於澤中澤隨而動隨之象也又以卦變言之乾之上來居坤之下坤之初徃居乾之上陽來下於隂也以陽下隂隂必説隨為隨之義凡成卦既取二體之義又有取爻義者復有更取卦變之義者如隨之取義尤為詳備易傳隨元亨利貞无咎伊川先生曰隨之道可以致大亨也君子之道為衆所隨與己隨於人及臨事擇所隨皆隨也隨得其道則可以致大亨也凡人君之從善臣下之奉命學者之徙義臨事而從長皆隨也隨之道利在於貞正隨得其正然後能大亨而无咎失其正則有咎矣豈能亨乎易傳龜山楊氏曰隨无故也有亨之道焉然隨非其正雖道通而志行君子不與也故利貞乃无咎易説白雲郭氏曰隨有隨之王有隨之者有隨於内有隨於外者隨之主大矣而隨之則小也隨於内小矣而隨於外則大也以隨之成卦言之剛來隨於内而柔上隨於外二三得剛而隨以動四五得柔而隨以説此隨之義也六爻无不隨者矣然謙卦一謙而得四益為吉隨卦一隨具四德而无咎非无咎不足於吉也葢謙之得失在人事人事以吉為善隨之得失在道道以无咎則不失不可一槩論也易説新安朱氏曰隨從也以卦變言之本自困卦九來居初又自噬嗑九來居五而自未濟來者兼此二變皆剛來隨柔之義以二體言之為此動而彼説亦隨之義故為隨己能隨物物來隨己彼此相從其通易矣故其占為元亨然必利於正乃得无咎若所隨不正則雖大亨而不免於有咎矣春秋傳穆姜曰有是四德隨而元咎我皆无之豈隨也哉今案四德雖非本義然其下云云深得占法之意本義彖曰隨剛來而下柔動而説隨大亨貞无咎而天下隨時隨時之義大矣哉伊川先生曰卦所以為隨以剛來而下柔動而説也謂乾之上九來居坤之下坤之初六徃居乾之上以陽剛來下於隂柔是以上下下以貴下賤能如是物之所説隨也又下動而上説動而可説也所以隨也如是則可一有以字大亨而得正能大亨而得正則為无咎不能亨不得正則非可隨之道豈能使天下隨之乎天下所隨者時也故云天下隨時君子之道隨時而動從宜適變不可為典要非造道之深知幾能權者不能與於此也故賛之曰隨時之義大矣哉凡賛之者欲人知其義之大玩而識之也此賛隨時之義大與豫等諸卦不同諸卦時與義是兩事一作與豫卦以下諸卦不同時義是兩事事一作與豫等諸卦不同時與義是兩並易傳禮孰為大時為大亦須隨時當隨則隨當治則治當其時作其事便是能隨時隨時之義大矣哉尋常人言隨時為且和同只是流徇耳不可謂和和則已是和於義故學者患在不能識時時出之亦須有溥博淵泉方能出之自畫卦垂衣裳至周文方備只為時也若不是隨時即一聖人出百事皆做了後來者沒事又非聖人智慮所不及只是時不可也只歸之自然則无可觀更无可玩頤並入闗語録藍田吕氏曰隨有從而无違也剛來下柔者隨自否來乾之上九下居坤之初六也以剛下柔物所以隨我也物不説則我不動我所以隨物也君子不過時而已矣以道徇身隨時也以身徇道亦隨時也惟變所適无徃而非義故曰隨時之義如不合於義天下靡然成風亦往隨之以取凶咎非所謂隨時之義也故必大亨无咎然後可隨龜山楊氏曰一陽在下剛來而下柔也動而説合二體言之也剛不下柔則亢動而不説則括夫如是人孰隨之故剛來而下柔動而説所以為隨也隨而大亨貞則為隨之主而天下隨之以為時矣若泰之時君子以其彚征是也夫趨變无常而各當其可非夫可與權者其孰能之其義豈不大矣哉易説兼山郭氏曰剛自上來而成震柔自下往而成兊故震動而兊説不止於人道而言凡受命賦形於天地之間者无不為隨也盖震東方之卦也萬物隨之以生兊西方之卦也萬物隨之以成其出也其入也孰不隨之故春生之夏長之秋成之冬藏之隨也聖人東作西成亦隨也五載一廵守亦隨也隨之大豈一端而已耶易説白雲郭氏曰先人曰隨不止於人道而言震東方之卦也萬物隨之以生兊西方之卦也萬物隨之以成其出入也孰不隨之故春生之夏長之秋成之冬蔵之隨也聖人東作西成亦隨也五載一廵守亦隨也隨之大豈一端而已耶伊川曰凡人君之從善臣下之奉命學者之徙義衆人之隨己巳之隨人與臨事而擇所隨皆隨也雍曰隨之成卦以初九上六來往成震兊動説而有隨王輔嗣以震為剛而兑為柔是剛下柔如咸卦男下女之説不言初九上六之義若如王氏言則剛來下柔之卦居易之半矣何獨於隨言之也且天下之理不動則無所隨不説則不能隨所以致動而説者初九上六之力也聖人論上下卦則言男女隂陽及論爻則言剛柔隨蠱二卦不以初上之變論之則剛來下柔與剛上柔下之義終不可眀也然隨之道大而天地小而人民細而蟲魚草木无不有隨不能以言盡要其歸則隨時而已至如堯舜隨於揖讓湯武隨於征伐伊周隨於致君孔孟隨於設教以聖人之隨其不同已如此況天地萬物之隨乎盖道與時㑹則聖人隨之易地皆然也是以聖人所任者道而不能違者時故曰隨時之義大矣哉易説漢上朱氏曰隨自否來上九之初剛人之所隨柔隨人者也上九過剛而不反君子小人相絶非道也剛來下於柔柔往而隨之下動而上説所以隨也自初九言之君子之道為衆所隨人君屈己以隨善者也自上六言之臣下之奉命學者之徙義臨事之從長无非隨也故曰隨此以剛柔相易合兩體而言隨也上九之初大者亨也其亨以貞也上九過剛嘗有咎矣无咎者善補過也大者亨以貞利於正也又善補過至於无咎天下豈不動而説以隨之乎故曰元亨利貞无咎此以初九一爻言隨之道也易傳曰隨之道利在於正隨得其正然後能大亨而无咎失其正則有咎矣豈能亨乎春秋傳穆姜往東宫筮之遇艮之八史曰是謂艮之隨姜曰是於周易曰隨元亨利貞无咎有四徳者隨而无咎盖穆姜時以元亨利貞為隨之四徳夫子作彖辭然後明元亨利貞者大亨正非若乾之四徳也夫天下之隨君子者隨其正也君子之動者隨其時也時无常是以正為是君子得其正天下是之是之斯隨之矣天下之物靜而在下莫如澤也驚蟄既至雷動於澤中澤氣隨之下者上靜者動誰為之哉時也故曰大亨貞无咎而天下隨時然隨時之義非達權知變者不能盡或因或革或損或益人之所説不以强去人所不説不以强留如天地之隨時乃无咎矣故曰隨時之義大矣哉天下隨時王昭素曰舊本多不連時字王弼亦曰得時則天下隨之矣隨之所施唯在於時也胡旦曰王肅本作隨之篆字之為時為轉隷者増日為時胡説為長在卦氣為驚蟄二月中故太𤣥準之以從易傳新安朱氏曰隨剛來而下柔以卦變卦德釋卦名義大亨貞无咎而天下隨時王肅本時作之今當從之釋卦辭言能如是則天下之所從也隨時之義大矣哉王肅本時字在之字下今當從之本義伊川先生説説而動動而説不是不當説説而動凡卦皆從内説出去盖卦自内生動而説却是若説説而動却是自家說他後他動不成隨了我動彼説此之謂隨又曰動而説成隨巽而止成蠱語録東萊吕氏曰乾之上來居坤之下坤之初往居乾之上又曰人之性本同一有所隨便分善惡如堯之朝舜禹為善人之宗共鯀為惡人之主方未有所隨則同此人也一歩隨舜禹則為善人之歸一歩隨共鯀則為惡人之黨是為善為惡為正為邪皆在舉歩間不可汎有所隨盖隨人不是小事須元亨利貞乃无咎如比之親輔人必須原筮元永貞乃无咎大凡隨雖小隨大柔隨剛隂隨陽下隨上必是上有以先之天下之理未有无感而應故剛來而下柔然後柔動而説如堯舜之聖只是舍己從人必須我有可隨之道然後能使人隨我至於變時雍則人來隨我矣隨時之義大矣哉不曰隨君子而曰隨時者盖君子與造化為一隨時所以隨君子也又曰隨時之義大矣哉先輩謂易三百八十四爻一言以蔽之只是一時字如孔子大不可名孟子只以聖之時盡之如中庸只説一時中易傳曰凡賛之者欲人知其義之大玩而識之也只教人玩識時字並易説象曰澤中有雷隨君子以嚮晦入宴息伊川先生曰雷震於澤中澤隨震而動為隨之象君子觀象以隨時而動隨時之宜萬事皆然取其最明且近者言之君子以嚮晦入宴息君子晝則自强不息及嚮昬晦則入居於内宴息以安其身起居隨時適其宜也禮君子晝不居内夜不居外隨時之道也易傳凡易卦有就卦才而得其義者亦有舉兩體便得其義者隨剛來而下柔動而説隨此是就卦才而得隨之義澤中有雷隨此是就象上得隨之義也周行已編隨卦言君子嚮晦入宴息解者多作遵養時晦之晦或問作甚晦字曰此只是隨時之大者嚮晦則宴息也更别有甚義劉元承手編横渠先生曰人到向道後俄頃不舎豈暇安寢然君子嚮晦入燕處君子隨物而止故入燕處然其仁義功業之心未嘗忘但以其物之皆息吾兀然而坐无以為接无以為功業須亦入息經學理窟藍田吕氏曰雷入于澤退藏不用如日之嚮晦羣動皆息君子不得不隨龜山楊氏曰雷在澤中其動息矣故君子以是嚮晦入宴息夫日出而作晦而息人之所同然者君子則知隨時之義者也衆人則由之而不知耳處隨之義至於晦明動息而不違況出處之大致乎易説白雲郭氏曰伊川曰禮晝不居内夜不居外亦隨時也雍曰夫君子一動一静至於宴息猶有隨焉大者可知也此盖因其小者足以見隨之大不然君子之道宴息而已乎易説漢上朱氏曰雷降於兑息於坤坤晦也澤中有雷嚮晦也天地之動静隂陽之明晦自大觀言之晝夜之道也君子隨時之道著而易見者莫若隨晝夜也晝則嚮明而動作夜則嚮晦而宴息自有天地以來未有能違之者知此則知用天地隂陽矣君子日用而知小人日用而不知易傳新安朱氏曰雷藏澤中隨時休息本義東萊吕氏曰雷震於澤中澤隨震而動隨之至也震者時也澤隨震而動猶人之隨時然澤中有雷則時本自有初非外物也凡隨者必與之為一始為隨之至孔門弟子善隨夫子莫如顔子至奔逸絶塵瞠若乎後猶未能一夫子歩亦歩趨亦趨畢竟有顔子之歩又有夫子之歩有顔子之趨又有夫子之趨亦未為隨之至嚮晦入宴息曉便起晦便息飢便食渇便飲堯舜便禪讓湯武便征誅八元便舉四㓙便逐姑舉一事以明之則知事事皆如飢食渇飲晝作夜息不費思量本无一事祇為見得理明時到自應天下之理既如渇飲飢食晝作夜息理甚明白初无難知惟人自見不明往往求之至難不可卒曉之處故多辛苦憔悴而无成殊不知天下本无事所以然者以其不善推之故也此之謂不受命易説初九官有渝貞吉出門交有功象曰官有渝從正吉也出門交有功不失也伊川先生曰九居隨時而震體且動之主有所隨者也官主守也既有所隨是其所主守有變易也故曰官有渝貞吉所隨得正則吉也有渝而不得正乃過動也出門交有功人心所從多所親愛者也常人之情愛之則見其是惡之則見其非故妻孥之言雖失而多從所憎之言雖善為惡也苟以親愛而隨之則是私情所與豈合正理故出門而交則有功也出門謂非私暱交不以私故其隨當而有功既有隨而變必所從得正則吉也所從不正則有悔吝出門而交非牽於私其交必正矣正則无失而有功並易傳横渠先生曰言凡所治務能變而任正不膠柱也處隨之初為動之主心无私係故能動必擇義善與人同者也易説藍田吕氏曰初九凡有所隨皆以柔順剛也居隨之始獨以剛下柔官有渝也官守也所守不流於邪變而從正故吉也上无偏應又守之以正无所交而不可故出門交有功也龜山楊氏曰居隨之初以時為大宜有渝者也知守而不知變則失時矣初九陽剛而震體能有渝者也然而渝不以正咎孰大焉故正乃吉也夫體隨時之義而蔽於暱己之私則所失多矣故出門交而後有功不失也易説白雲郭氏曰剛來隨於内者也在内之隨主於初九夫以乾剛之性豈能變其所守哉能變而從動雖未至隨之大已為動之主矣易曰變則通此隨之成卦所以有取於初之變也能變其所守是以得貞而吉二三得剛而後動剛亦得二三而後動剛柔相須以動故出門交而有功也出門交兊然後隨道成而不失隨之大也盖初雖為主於内特動之主未為隨耳伊尹幡然而改是為出門交有功也易説漢上朱氏曰五乾為君巽為命四受命於君以帥其屬官之象也初應四動其屬也初隨四四隨事事有變動剛而不知變不足以隨事渝變也故曰官有渝變有正否變而不正惟官是隨非交修不逮也不知大亨正无咎也九四變而正以剛下柔其道足以使人隨之初九隨之者隨其正也不隨其不正也正則吉故曰從正吉也人之情隨同而背異隨親昵而背踈逺故朋友責善或牽於妾婦附耳之語溺於私也初在内安之又比於二二初相易皆失正私暱之為害也故戒之以出門交有功四艮為門初舍二出交於四出門也出門交之不失其正何往而无功故曰不失其正也易傳曰隨當而有功易傳新安朱氏曰卦以物隨為義爻以隨物為義初九以陽居下為震之主卦之所以為隨者也既有所隨則有所偏主而變其常矣惟得其正則吉又當出門以交不私其隨則有功也故其象占如此亦因以戒之本義官有渝隨之初主有變動然尚未深問初九官有渝貞吉出門交有功官是主字之義是一卦之主首變得正便吉不正便凶先生曰是如此又曰這必是變了只是要出門交有功却是變語録東萊吕氏曰初九官有渝貞吉出門交有功官主守也大率隨人必胷中先有所主宰若无主宰一向隨人必入於邪至於變所守以隨人尤非小事若所隨不得其正則悔吝而不得其吉矣此隨人之初尤不可忽故聖人教人以隨之本言人先内有所主然後可以隨人或變而隨人惟正而後吉也出門交有功非特處事如此學者為學亦如此今之為學自幼至長多隨所習熟者為之皆不出窠臼外惟出窠臼外然後有功象又賛以不失也者常人多謂親䁥之言必不誤我隨之必可无失殊不知親暱蔽於愛其為我謀也必不盡公且如與親暱論官職則必多勸我進少勸我退從之豈不失乎如與親暱論財利則必多勸我受少勸我辭從之豈不失乎惟利害不相及之人往往説得依公合理吾能隨之所以多有功而不失也易説六二係小子失丈夫象曰係小子弗兼與也伊川先生曰二應五而比初隨先於近柔不能固守故為之戒云若係小子則失丈夫也初陽在下小子也五正應在一作居上丈夫也二若志係於初則失九五之正應是失丈夫也一无也字係小子而失丈夫舍正應而從不正其咎大矣二有中正之徳非必至如是也在隨之時當為之戒也人之所隨得正則逺邪從非則失是无兩從之理二苟係初則失五矣弗能兼與也所以戒人從正當專一也並易傳龜山楊氏曰徇暱己之私忘天下之公故偏係而不能兼與也六三隂柔小子也易説白雲郭氏曰六二初不能動今居動之中者得初九而後動也故舍應從初非得已也亦隨之小者耳是以有係小子失丈夫之象方其未動之時雖欲應五豈可得哉然終无絶五之志以急於託初之動未能兼與故也與夫愚而好自用賤而好自專者異矣是以所係雖小而无凶咎也易説漢上朱氏曰四艮為少男有乾父坤母小子也初震為長男有巽婦夫也隨利於正初九正也九四不正也二與四同功以情言之柔必隨剛隂必隨陽初九九四皆陽剛也其能兼與之乎四雖在上不正也初雖在己之下正也六二係情於四比初不專雖與之相比而情不親雖有中正之德而所隨非其人其失在於不能權輕重也故曰係小子失丈夫弗兼與也臨事擇義於六二六三見之易傳新安朱氏曰初陽在下而近五陽正應而逺二隂柔不能自守以須正應故其象如此凶吝可知不假言矣本義小子丈夫程説是語録東萊吕氏曰凡人既要隨君子又要隨小人終必為小人之歸故象曰弗兼與也伊川云人之所隨得正則遠邪從非則失是无兩從之理二苟係初則失五矣弗能兼與也此數句最當朝夕看且如宣政間蔡京為相有一給事中封駁稍多以是罷黜所親或問蔡曰是亦相門出也何故罷之蔡曰彼既欲為好官又欲為好人此雖姦人之言然正合弗兼與也之意可以為世戒也易説六三係丈夫失小子隨有求得利居貞象曰係丈夫志舎下也伊川先生曰丈夫九四也小子初也陽之在上者丈夫也居下者小子也三雖與初同體而切近於四故係於四也大抵隂柔不能自立常親係於所近者上係於四故下失於初舎初從上得隨之宜也上隨則善也如昬之隨明事之從善上隨也背是從非舎明逐暗下隨也四亦无應无隨之者也近得三之隨必與之親善故三之隨四有求必得也人之隨於上而上與之是得所求也又凡所求者可得也雖然固不可非理枉道以隨於上苟取愛説以遂所求如此乃小人邪諂趨利之為也故云利居貞自處於正則所謂有求而必一无必字得者乃正事君子之隨也既隨於上則是其志舎下而不從也舎下從上舎卑而從髙也於隨為善矣並易傳横渠先生曰舎小隨大所求可得必守正不邪乃吉易説龜山楊氏曰陽剛丈夫隂柔小子也不係二而係四係丈夫也雖有所係而所隨者上與夫失丈夫者異矣盖親仁尚賢隨之上也合汙世同流俗隨之下也三雖未足以與權而志舎矣亦君子所與也故有求斯得然隨而有求求在外者也君子之求求在我而已故雖有得不若居正之為利易説白雲郭氏曰六二隨於内者也六三隨於外者也隨之道貴知變知變故能隨時非六三之智優於六二也時之不同耳方其不能動之時則不得不隨於初及其居動之極則不得不隨於説此六三係丈夫失小子之義盖盡初九出門交有功之説也雖小有失於内而其於隨之大者盖有得也故曰隨有求得有得則利居正以守之故利居貞然初自守而變而三自變而守易地觀之皆一道也志舎下者六三於斯時志在於隨而不在於動故也易説漢上朱氏曰先儒舊讀舎音捨張弼讀舎與乾九二時舎也之舎同辭曰利居貞象曰志舎下也以舎訓居弼讀為長三四相比近也四三无應宜相親也以隂承陽以下隨上順也三寧失其親比而順者而係情於初以初正四不正也故曰係丈夫失小子三柔不能自立而隨初是去昏而隨明背非而隨是違不善而從善得隨之宜也初亦以三同體而又下之故三之隨初有求而得艮為手求也初三相易得正也三苟知隨而已不知自處以正人將拒我其能久乎盖隨人宜以柔處已當以正三六之隨利居貞也此三所以係初歟巽為繩係也易傳新安朱氏曰丈夫謂九四小子亦謂初也三近係四而失於初其象與六二正相反四陽當任而已隨之有求必得然非正應故有不正而為邪媚之嫌故其占如此而又戒以居貞也本義東萊吕氏曰此爻却與六二政相反六二隨小人失君子六三却是隨君子失小人盖六三之失小人乃是得處所以言隨有求得如病以去為得瘡以潰為平利居貞者今人多言諂媚君子无害不知諂君子與諂小人无異古之人親附君子之心雖切而守道之心甚堅使其一向直前則君子亦未必與我盖君子易事而難説玩味利居貞之義則知君子不可苟隨也六二既失君子隨小人固不足論至六三既能隨君子而聖人又教之以利居貞盖隨君子而不能利居貞則君子所見於我无預以是知隨人者不可无所主也邵堯夫所謂君子不可以强合此正得利居貞之意孔門弟子最得此三字如孔子欲正名子路曰子之迂也奚其正子路所見雖未至然亦不肯遽舍所疑而從聖人大抵孔門問答多爾易傳上隨下隨之義最好令人能上隨則一歩髙一歩下隨則一歩下一歩如修身如為學一向隨上則髙明如飲酒如佚樂一向隨下則卑陋矣爻言利居正象言志舍下也能決志舎下則能上隨矣易説又曰係丈夫失小子隨有求得失即得也己丑課程九四隨有獲貞凶有孚在道以明何咎象曰隨有獲其義凶也有孚在道明功也伊川先生曰九四以陽剛之才處臣位之極若於隨有獲則雖正亦凶有獲謂得天下之心隨於已為臣之道當使恩威一出於上衆心皆隨於君若人心從已危疑之道也故凶居此地者奈何唯孚誠積於中動為合於道以明哲處之則又何咎古之人有行之者伊尹周公孔明是也皆徳及於一无於字民而民隨之其得民之隨所以成其君之功致其國之安其至誠存乎中是有孚也其所施為无不中道在道也惟其明哲故能如是以明也復何過咎之有是以下信而上不疑位極而無逼上之嫌勢重而无專强一作權之過非聖人大賢則不能也其次如唐之郭子儀威震主而主不疑亦由中有誠孚而處无甚失也非明哲能如是乎居近君之位而有獲其義固凶能有孚而在道則无咎葢明哲之功也並易傳横渠先生曰以陽居隂利於比三則凶也處隨之世為衆所附苟利其獲凶之道也能以信存道則功業可明无所咎矣易説藍田吕氏曰六二六三隨彼則失此能知所擇則无不得也六三以柔隨剛得其所求故曰隨有求得九四以剛帥柔而從己以力驅三而使隨如禽之獲故曰隨有獲隨隂求於陽恐入於不正故利居貞陽帥於隂以力制物終必畔之守此不變取凶之道貞者守而不變之義也然三亦无應我以正帥雖若力制久則信之故曰有孚在道以明何咎龜山楊氏曰九四震兊之交動而説也動而説而天下隨之隨有獲也履近君之位任大臣之責危疑所集也雖有獲其義凶矣非有孚在道而明足以與權其能无咎乎故孔子曰明功也昔周公東征而罪人斯得以至東人欲其留西人欲其歸可謂隨有獲而天下隨之矣然公孫碩膚赤舄几几夫何咎之有非有孚在道以明寧有是夫易説白雲郭氏曰九四居尊近之位有剛健之才天下之所説隨亦足以致人之隨者也故為隨之有獲者六三隨有求得盖隨人而有得者九四隨有獲盖以得人之隨為獲也夫尊近之臣勢疑於君又獲天下之隨守此為貞則凶矣是必有至誠之道大明於天下足以使天地人鬼萬世无疑焉斯无咎矣文王之時三分天下有其二可謂有獲矣方且以服事殷不識不知順帝之則而已是以萬邦作孚而天下萬世稱其德焉非有孚在道者乎其義凶者非九四誠有是凶也若貞固守之其義有得凶之理也明功者有孚在道明隨之功也易説漢上朱氏曰三不隨四四據而有之獲也獲難辭也二與三當隨五為四所隔下而從初四在大臣之位處可懼之地與五爭三能无凶乎三四易位正也雖正亦凶義不可有三故曰貞凶象曰其義凶也然四終不可以有三乎曰非不可有也動而有孚於道无意於有三而三自隨之可也初九其行以正所謂道也道之所在故初九為隨之主四動正與初相應有孚在道也四正而誠孚於道則三亦唯正之隨豈唯有三而二亦隨初是率天下以隨五而成隨之功也三四易位成離離為明以明則无獲三之咎无咎則无凶可知故有孚在道者明之功也易傳曰孚誠積中動必合道故下信而上不疑古人有行之者伊尹周公孔明是也易傳新安朱氏曰九四以剛居上之下與五同德故其占隨而有獲然勢陵於五故雖正而凶惟有孚在道而明則上安而下從之可以无咎也占者當時之任宜審此戒本義東萊吕氏曰天下皆隨於己當危疑之地雖正亦凶惟至誠於道自然无咎所以至誠无咎者為其自誠而明故也伊川所以引伊尹周公孔明皆以其明哲而誠故可處危疑之地然又如燕之慕容恪亦當主少國危之時内有强臣外有强宗惟慕容恪能以至誠自守故能全燕之社稷而无纎毫之咎正得有孚在道一爻之象象曰隨時之義大矣哉此危疑之地本自當凶然君子處此自有轉移换易之理此所謂吉人吉其凶凶人凶其吉又曰居大臣之位處多懼之地若有心於得民之説此固姦臣所為不可論至如中正之大臣為民心所隨雖貞猶凶要必有䖏之之道有孚在道以明何咎是也有孚在道此一句最好看盖有孚誠於中即所為合道見善又明何咎之有何咎與无咎不同乃伊尹周公孔明事也有孚在道以明董仲舒曰為人臣而不知春秋必䧟簒弑之禍為人君而不知春秋必被首惡之名其始莫不自以為善而不知其非自以為善則似有孚不知其非則不能在道以明又如釋氏之湛然不動道家之精神專一亦近於有孚只為无在道以明易説九五孚于嘉吉象曰孚于嘉吉位正中也伊川先生曰九五居尊得正而中實是其中誠在於隨善其吉可知嘉善也自人君至於庶人隨道之吉惟在隨善而已下應二之正中為隨善之義處正中之位由正中之道孚誠所隨者正中也所謂嘉也其吉可知所孚之嘉謂六二也隨以得中為善隨之所防者過也盖心所説隨則不知其過矣並易傳横渠先生曰處隨之世而剛正宅尊善為衆信故吉或曰孚于二則吉易説藍田吕氏曰隨之為義惟恐不中不正九五處尊而位正中至美之徳信於物者也龜山楊氏曰二五皆正中也孚于正中善之至也吉孰加焉故曰孚于嘉吉易説白雲郭氏曰九五之於隨所謂信以成之者也亦所謂安而行之者也故能无事於隨不優不廹居中履正孚于嘉而已嘉美徳也美徳孚於天下无外内之限豈堯所謂欽明文思允恭克讓光被四表之徳哉豈舜所謂濬哲文明温恭允塞之徳哉位正中者天下之人莫知其有為之迹所可見者位正中而已孔子言堯无能名舜恭己南面之意也或謂孚于六二則與屯其膏同人號咷无以異安足以見隨時之大哉易説漢上朱氏曰陽為美九五位正中美无以加於是矣故曰孚于嘉吉者誠信孚於二也二正中也五不有其美隨六二之中道則得物之誠二樂告以善故能不過而止於至善觀乎位正中則知孚於二而吉矣道之中天地萬物所不能違有之則生無之則死故謂之至善謂之至美雖子路之勇禹之大智舜之明徳不能加毫毛矣易傳曰自人君至於庶人隨道之吉惟在隨善而已下應六二之正中隨善之義也或問隂亦有美矣何謂陽為美曰隂含陽以為美者也至兊而隂見陽伏至坤而萬物虚陽美盡則隂之美亦盡故嘉之㑹者謂乾亨也坤品物咸亨者含𢎞光大也坤豈能專之是以坤三含美以從王天保歸美以報上易傳新安朱氏曰陽剛中正下應中正是信於善也占者如是其吉宜矣本義東萊吕氏曰九五孚于嘉吉此正當以六二六三參看大凡病有粗有細六二一爻隨小人固不足道六三既知隨君子又不可以非道隨之必居正然後可然六三一爻病麤者易見九五居正中之位則隨用皆嘉善又恐隨之太過伊川云隨以得中為善隨之所防者過也盖心所恱隨則不知其過矣此正病之細者最難看此數句學者當玩味置之座右盖人只言能從君子便是趨向已是此外无事殊不知雖所從得君子猶自大有事在六三之隨四九五之隨二所隨者皆得君子也然三所戒者以謂不能自守其正而欲苟恱君子則便與諂媚無異此其失猶易見至於九五所戒則謂雖无諂媚之心而慕用君子之心太過見得君子无事不善件件隨之則亦非得中矣此其失則難知也傳所謂中實者九居五之中則為中實盖隨善而不中實則名為隨善何益於己如人為學見前輩若不中實則見如不見中實乃為學之根本易説又曰隨九五傳居尊得正而中實是其中誠在於隨善中不實豈能隨善己丑課程又荅張敬夫書云易傳隨孚于嘉義最宜精玩葢多為其樂善羙意所移易得侵過爾又賔主資稟皆明快則欠相濟之義尤易得侵過也見别集上六拘係之乃從維之王用亨于西山象曰拘係之上窮也明道先生曰隨之上六才與位皆隂柔隨之極也故曰拘係之乃從維之又從而維之王用亨于西山唯太王之事民心固結而不可解者其他皆不可如是之固也劉絢師訓伊川先生曰上六以柔順而居隨之極極乎隨者也拘係之謂隨之極如拘持縻係之乃從維之又從而維係之也謂隨之固結如此王用亨于西山隨之極如是昔者太王用此大亨王業于西山太王避狄之難去豳來岐豳人老稚扶􅂝以隨之如歸市盖其人心之隨固結如此用此故能亨盛其王業于西山西山岐山也周之王業盖興於此上居隨極固為太過然在得民一有心字之隨與隨善之固如此乃為善也施於他則過矣隨之固如拘係一无係字維持一无持字隨道之窮極也並易傳龜山楊氏曰居隨之極在一卦之外而不應於内非知隨者也故拘係之乃從文王三分天下有其二宜无不從者其伐崇也至於執訊連連所謂拘係之乃從也其卒也是致是附四方以无侮所謂維之也此文王所以亨于西山也易說兼山郭氏曰舎己從人不咈人以從己之欲隨民之道也隨民之極則民之隨也亦如是而已方文王之三分天下有其二固有不隨者也至於其化自北而南皆有徳以維其心中心恱而誠服者此亨于西山之道也故詩曰自西自東自南自北無思不服方是時民歸之若自拘係之又從而維之見其歸之固如是也必也有以拘係有以維縶豈文王之道哉而上六所言乃上窮之民將從文王之維无孑遺者也大哉隨乎舎己從人隨也達則兼善天下亦隨也不當時命而獨善其身亦隨也故始之言父子夫婦朋友之隨而終之以文王之成王道皆隨時之義也易説白雲郭氏曰先人曰舎己從人不咈人以從己之欲隨民之道也隨民之極則民之隨也亦如是而已方文王之三分天下有其二固有不隨者也至於其化自北而南皆有徳以維其心此亨于西山之道也故詩曰自西自東自南自北無思不服方是時民歸之若自拘係之又從而維之也必也有以拘係有以維縶豈文王之道哉而上六所言乃上窮之民將從文王之維无孑遺者也大哉隨乎舎己從人隨也達則兼善天下亦隨也不當時命而獨善其身亦隨也故始之言父子夫婦朋友之隨而終之以文王之成王道皆隨時之義也雍曰上六隨道之成盡動而説隨之義故如水之就下獸之走壙各從其類拘係而來莫之能禦也為之主者乃從而以道維之而已觀二老之歸文王孟子曰天下之父歸之其子焉往夫其歸也如父子相拘而來豈非拘係之謂乎至於虞芮之訟亦非文王有以係之也然文王發政施仁必先於鰥寡孤獨視之如傷使无凍餒是為維之之道盖非文王有心於其間隨時之義當然耳孟子言朝覲獄訟謳歌之歸舜禹亦由是也說者謂有不從者必拘係之乃從此宜齊桓晉文之所不為而謂文王為之乎易説漢上朱氏曰上六隨之窮也窮則變變則不隨然而隨者非禮義拘係之又從而維持之不能也三上相應三有艮巽艮手拘之也巽繩係之也上窮反三復成巽乃從而係維之也拘之使不動係之使相屬係維之使不得去三坤也坤為衆衆之恱隨上六固結有如此者昔周之太王用此爻以亨于西山杖䇿而去隨之者如歸市非得民之隨豈能使已窮而更隨至於不可解乎兊西也艮為山乾五為王三上往來不窮亨也先儒以此為文王之爻誤矣故易傳正之曰周之王業葢興於此易傳新安朱氏曰居隨之極隨之固結而不可解者也誠意之極可通神明故其占為王用亨于西山亨亦當作祭享之享自周而言岐山在西凡筮祭山川者得之其誠意如是則吉也窮極也本義王用亨于西山言誠意通神明神亦隨之如況於鬼神乎之意又曰易難看不比他書易說一箇物非真是一箇物如說龍非真龍若他書則真是事實孝弟便是孝弟仁便是仁易中多有不可曉處如王用亨于西山此却是享字只看王用亨于帝吉則知此是祭祀山川底意思如公用亨于天子亦是享字盖朝覲燕饗之意易中如此類甚多後來諸公解只是以己意牽强附合終不是聖人本意易難看盖緣如此並語録東萊吕氏曰上六拘係之此正民隨君學者隨賢拘係而不可解隨之極者也太王邠民隨之者如歸市正合此爻所以亨于西山也非特太王如有客詩言有客宿宿有客信信言授之縶以縶其馬白駒詩言皎皎白駒食我塲苖縶之維之以永今朝亦合此爻易説合訂刪補大易集義粹言卷二十一
