body:
  text: 合訂刪補大易集義粹言卷四十四頭等侍衛納喇性徳編坎下震上伊川先生曰解序卦蹇者難也物不可以終難故受之以解物无終難之理難極則必散解者散也所以次蹇也為卦震上坎下震動也坎險也動於險外出乎險也故為患難解散之象又震為雷坎為雨雷雨之作蓋隂陽交感和暢而緩散故為解解者天下患難解散之時也易傳解利西南无所往其來復吉有攸往夙吉伊川先生曰西南坤方坤之體廣大平易當天下之難方解人始離艱苦不可復以煩苛嚴急治之當濟以寛大簡易乃其宜也如是則人心懐而安之故利如西南也湯除桀之虐而以寛治武王誅紂之暴而反商政皆從寛易也无所往其來復吉有攸往夙吉无所往謂天下之難已解散无所為也有攸徃謂尚有所當解之事也夫天下國家必紀綱法度廢亂而後禍患生聖人既解其難而安平无事矣是无所往也則當修復治道正紀綱明法度進復先代明王之治是來復也謂反正理也天下之吉也其𤼵語辭自古聖王救難定亂其始未暇遽為也既安定則為可久可繼之治自漢以下亂既除則不復有為姑随時維持而已故不能成善治蓋不知來復之義也有攸往夙吉謂尚有當解之事則蚤為之乃吉也當解而未盡者不蚤去則將復盛事之復生者不蚤為則將漸大故夙則吉也易傳横渠先生曰難免人患散則得衆者吉往而不返則生它變有所往而不速將後於時也故无所往則靜吉有所往則速吉易説白雲郭氏曰解者難之解也故動乎險中為屯動乎險外為解解與屯為内外亦與蹇為反復故蹇利西南而解亦利西南雖止與動不同其險難則相接跡矣復者來之漸也難解之時无所往而復於道難作之際速於往而緩難各盡其宜是以皆吉也先言无所徃而後言有攸往者安不忘危之義也亦猶先泰後否先既濟後未濟也易説五峯胡氏曰始皇百不資於先代而无故求周鼎於泗水則其欲詭惑天下之意可知矣漢興去古未逺髙祖父子兄弟知无所往之利而不知來復往夙之吉侵尋至今茫茫禹迹法度盡廢上不仁其身民各私其有不均不平不正不定暴虐无告寃陷困窮爭鬭滋起獄訟繁多皆此之由也皇王大紀論新安朱氏曰解難之散也居險能動則出於險之外矣解之象也難之既解利於平易安靜不欲乆為煩擾且其卦自升來三往居四入於坤體二居其所而又得中故利於西南平易之地若无所往則宜來復其所而安靜若尚有所往則宜蚤往蚤復不可乆煩擾也本義東萊吕氏曰大凡患難之極必須解散解者患難已散天下已平天下初定之規模也以卦體言之坎為水震為雷雷之震驚雨之灑潤則无有不解散者利西南西南坤位柔順平易也如武王之勝紂則必垂拱而天下治髙祖之滅秦必用蕭曹之清淨光武之誅莽必閉闗不用兵是皆以平易處之也雖然必如湯武之伐罪救民以致太平則其用大而可以盡坤道之順若兩漢之君以智力持之又不可以當此也无所往者當天下之初定患難之方解又不可復有所往也如秦之并天下而欲有所往故築長城平百粤而終不免於難隋之兼南北而欲者所往再伐髙麗而亦不免於難故解貴乎无所往然豈皆无所作為邪故又欲知來復之象有攸往夙吉者當解之時不可有所往然必有所往者又當不終朝而為之夙夜以進則吉如晉武帝平吴之後固未當興兵生事然而君臣之間因循茍簡清談廢務坐視而至於弊故二者不可一偏一於有所往則不知利西南无所往之象一於无所往則又不知其來復吉有攸往夙吉之象往與不往之間其間不能以寸故不可執一偏也此象又有一説西南坤方也坤柔也天下之難初解當治天下以和緩安靖不須躁急促廹欲民服我民心不歸於彼必歸於此彼既无所他往自然歸我矣其者指人之辭大為規摹寛以待之天下既在我規摹之内已无所往舍我將安之乎吾之所謂柔道者又非緩弱之謂其所當往者赴之不俟終日此所謂有攸往夙吉也豈特解國家之難為然哉治心者亦然心之惑初解不必汲汲驅廹此心使歸於道但順而治之此心都无所之則自然來復矣雖順而治之亦非任之如枯木死􅁅其不息之誠元未嘗頃刻停滯也易説彖曰解險以動動而免乎險解解利西南往得衆也其來復吉乃得中也有攸往夙吉往有功也天地解而雷雨作雷雨作而百果草木皆甲拆解之時大矣哉伊川先生曰坎險震動險以動也不險則非難不動則不能出難動而出於險外是免乎險難也故為解解難之道利在廣大平易以寛易而往濟解則得衆心之歸也不云无所往省文爾救亂除難一時之事未能成治道也必待難解无所往然後來復先王之治乃得中道謂合宜也有所為則夙吉也蚤則往而有功緩則惡滋而害深矣既明處解之道復言天地之解以見解時之大天地之氣開散交感而和暢則成雷雨雷雨作則萬物皆生𤼵甲拆天地之功由解而成故賛解之時大矣哉王者法天道行寛宥施恩恵養育兆民至于昆蟲草木乃順解之時與天地合徳也並易傳藍田吕氏曰解出乎險難也當解之時无濟難之志守中自居來復可也有濟難之志不夙則失時險而止蒙其險在内心有窒礙失之止而不知學也蹇見險而能止其險在外知不可進而自止也屯動乎險中險亦在外動乎險中求出而未得也解險以動動而免乎險已出險外動而逺之以免斯難也龜山楊氏曰動而免乎險卦之所以為解也免乎險而以順動則衆斯得矣此解之所以利西南也居解之時難方解矣故无所往則宜復有攸往則宜夙所謂宜復何也蓋天下方出於屯難則還定安集之時也作之則人弗堪矣故來復吉漢為畫一之法而天下歌之來復之謂也所謂宜夙者何也蓋解之初與民維新之時也人方厭亂而餘風遺俗亂政弊法有不可因者則革之宜夙也天下已定而人安於故常方且圖之則擾矣尚能有功哉武王克商反商政有未及下車而行者夙之謂也觀天地解而雷雨作則解之不可不夙亦天地之理也易説白雲郭氏曰遇險而止者才之不足也遇險而動者才之有餘也以有餘之才故能動而免乎險所以為解也解利西南往得衆者西南得朋之地也得朋而動乃能濟險故蹇之大蹇朋來與解之朋至斯孚皆一道也其來復吉乃得中者險難既解而來復不為太過乃得中道所謂獲三狐而得黄矢者也有攸往夙吉往有功者以有餘之才故往則有功如射隼于髙墉之上者也夫有難則有解解終復於難故解緩之時復存夙吉之義亦休否其亡苞桑之道也解之道雖天地亦如之天地之解以雷雨故百果草木皆甲拆然則豈止人難解散而已乎故曰解之時大矣哉王輔嗣曰難解之時非治難時故不言用體盡於解之名无有幽𨼆故不曰義易説漢上朱氏曰坎險也震動也他卦名不再釋解言解乎險難以是動動而出乎險之外則險難解矣故曰解險以動動而免乎險解此合二體言解也解者蹇之反解之九二乃蹇之九五也九四乃蹇之九三也坤為西南其體順自艮反有平易之意坤又為衆當蹇難之後人皆厭亂四以平易之道往順乎衆而衆與之是以得衆湯代虐以寛武王乃反商政是也故曰解利西南往得衆也此以九三言處解之道也其者指二也難方在外二往濟難則處乎險中以身任之而不辭當是時以往為中大難既解无所事於往也五來復二乃為得中得中者合宜之謂也得中則吉易傳曰天下國家必綱紀法度廢亂而後禍亂生聖人解其難而安平无事矣則无所往也當正紀綱明法度反正理追復先王之治所謂來復也此天下之吉也自漢而下亂既除則不為可久可繼之治不復有為姑随時維持而已故不能成善治蓋不知來復之義也故曰无所往復吉彖曰其來復吉乃得中也此以九二言處解之道也大難雖解其間有未盡而當有為者不可不往有所往不可不蚤圖之緩則難深而不可解荀爽曰據五解難是也解反為蹇則二先往夙也離為日震東方日出乎東夙之象也二之五正而吉解緩也宜以夙為戒故曰有所往夙吉此復以九二言終則有始之道也不有蹇則无解故反復爻義以明之震者天地之始交也天地始交物生之難雷動雨流天地難解則百果草木一瞬息間其甲皆拆无不解者所以如此其速者不失時也艮在木為果在草為蓏陽止也艮反為震陽動於草荄木根之時離為甲解者拆也故有百果草木甲拆之象以卦氣言之解為春分雷始𤼵聲故太𤣥準之以釋蓋聖人因論天地始解之義而卦氣在其中矣解之時大矣哉不言義者无所疑也不言用者其用見於蹇之時也易傳新安朱氏曰解險以卦徳釋卦名義解利以卦變釋卦辭坤為衆得衆謂九四入坤體得中有功皆指九二天地極言而賛其大也本義天地解而雷雨作隂陽之氣閉結之極忽然迸散出做這雷雨只管閉結了若不解散如何會有雷雨作小畜所以不能成雷雨者畜不極也雷便只是如今一箇爆杖先生舉解卦云无所往其來復吉程傳以為天下之難已解而安平无事則當修復治道正紀綱明法度復先代明王之治夫禍亂既平正合修明治道求復三代之規模却只便休了兩漢以來人主還有理㑹正心誠意否須得人主如窮閻陋巷之士治心修身講明義理以此應天下之務用天下之才方見次第因言神廟大有為之主勵精治道事事要理㑹過是時却有許多人才若専用明道為大臣當大叚有可觀明道天資髙又加以學誠意感格聲色不動而事至立斷當時用人參差如此者亦是氣數舛逆並語録東萊吕氏曰當險難之時必有動作施設然後可以出於險苟无所為而坐視其弊則終於險而已尚能免於險乎凡當解散之際天下初平必須用廣大平易之道與民安息如是則可以得民之心而民歸附矣雖用廣大平易之道而不生事然必須克復先王之政教法度則來而得中如周禮所謂刑新國用輕典是利西南之象至刑平國用中典則所謂其來復吉乃得中也凡天下機㑹不可失茍處解之時有所當為者必夙為之然後可以有功茍一於无所往則安能建大事立大業成大功哉天地解而雷雨作雷雨作而百果草木皆甲拆解之時大矣哉此數語當以意㑹无可解説但㑹得解之氣象如此則知大矣哉之義易説象曰雷雨作解君子以赦過宥罪伊川先生曰天地解散而成雷雨故雷雨作而為解也與明兩而作離語不同赦釋之宥寛之過失則赦之可也罪惡而赦之則非義也故寛之而已君子觀雷雨作解之象體其𤼵育則施恩仁體其解散則行寛釋也易傳龜山楊氏曰屯難方解民未知教不赦過不宥罪則民將无所措手足矣非新民之道也易説白雲郭氏曰雷雨之作无間於大小美惡皆解其難此天地之所以為大也聖人法天以解大難亦无所不及雖過失罪戾之人亦有赦宥以緩之是所以能盡解時之大非私己自謀而已也古者罪有寛宥而无赦赦而釋之者惟過失耳此過罪之不同也故康誥言人有小罪非𤯝而曰乃不可不殺謂罪也乃有大罪非終而曰時乃不可殺謂過也觀解之象與康誥之言可見先王用刑之意赦過宥罪亦解之一耳語盡解之大則未也易説漢上朱氏曰雷雨作天地之難解萬物維新之時也内外有坎坎為獄九二九四皆不正九二未失中而陷之過也九四不中正罪也君子於是時過誤者赦而不問有罪者宥而從輕與民更始則難解矣後世多赦輕重悉原刑罰不得其平失是義也易傳東萊吕氏曰當解之時天下初定正當與民休息還定安集施恩布恵以及其民故君子觀解之象赦過宥罪自漢以來至于今日皆如此過有過誤而犯也故君子赦之罪者其出於本心的然有罪故君子雖寛宥之亦不赦其罪大凡仁與義本是一事而今人作兩事看殊不知仁而无義乃婦人之仁爾故先王有不忍人之心行不忍人之政所赦者止於過若有罪則義當刑自漢以來皆不知此惟知赦過為仁而不知有義至於元惡大憝得肆其志而善良之民或被其害以是知仁義之道本非兩事易説初六无咎象曰剛柔之際義无咎也伊川先生曰六居解初患難既解之時以柔居剛以隂應陽柔而能剛之義既无患難而自處得剛柔之宜一有也字患難既解安寧无事惟自處得宜則為无咎矣方解之初宜安靜以休息之爻之辭寡所以示意初四相應是剛柔相際接也剛柔相際為得其宜難既解而處之剛柔得宜其義无咎也並易傳横渠先生曰險難方解未𫉬所安近比於二非其咎也易説藍田吕氏曰初六居解之始以柔在險下宜有咎也然應於九四比於九二剛柔相濟足以解難義无咎也龜山楊氏曰動而免乎險則居險而不為難難生經綸之時也難解則无事矣而有應乎上其義无咎而已易説白雲郭氏曰處解之初以柔居剛以隂應陽得无所往其來復吉之義故无咎也其為无咎蓋於剛柔之交際盡其所處之道理必无過矣易説漢上朱氏曰屯剛柔始交而難生故六二乗剛雖正而難解蹇難既解剛柔分矣初六在剛柔之際以柔自處而下剛剛而能柔者也雖未正而无咎得其宜也得宜之謂義辭寡如此者吉辭也易傳新安朱氏曰難既解矣以柔在下上有正應何咎之有故其占如此本義東萊吕氏曰初六无咎易之爻最簡者惟此一爻蓋解之初始出患難當用簡易之道不可復擾六以隂柔處解之初上與九四為應隂陽相濟俱務安靜故无事則自然无咎象云剛柔之際又𤼵无咎之義蓋當解之際君臣俱以簡易之道相接方无咎如漢之初使髙祖欲休息天下若蕭曹以剛勇生事安得无咎使蕭曹欲清淨而帝好大喜功亦安得无咎故曰剛柔之際義无咎也易説九二田獲三狐得黄矢貞吉象曰九二貞吉得中道也伊川先生曰九二以陽剛得中之才上應六五之君用於時者也天下小人常衆則明之君在上則明足以照之威足以懼之剛足以斷之故小人不敢用其情然猶常存警戒慮其有間而害正一作政也六五以隂柔居尊位其明易蔽其威易犯其斷不果而易惑小人一近之則移其心矣況難方解而治之初其變尚易二既當用必須能去小人則可以正君心而行其剛中之道田者去害之事狐者邪媚之獸三狐指卦之三隂時之小人也獲謂能變化除去之如田之獲狐也獲之則得中直之道乃貞正而吉也黄中色矣直物黄矢謂中直也羣邪不去君心一入則中直之道无由行矣桓敬之不去武三思是也所謂貞吉者得其中道也除去邪惡使其一无其字中直之道得行乃正而吉也並易傳横渠先生曰險亂方解不正自疑之隂皆自歸附而順聽也故曰田獲三狐不以三狐自累上合於五則得黄矢之象也易説藍田吕氏田九二居解之時處乎險中剛中而應可以大獲隠伏故曰田獲三狐雖大有獲道不失中義不失直守是不變可以獲吉故曰得黄矢貞吉龜山楊氏曰田者動而以時也往斯得衆矣故獲三狐古者燕居服狐裘狐疑而止解緩之象也得黄矢正者有攸往而夙也時惟剛中為足以與此易説白雲郭氏曰狐疑之害不足與有成況觧難之時乎九二以剛陽之才田而獲之以去其害然後中直之道可得而守貞吉矣狐隂𩔖也解有三隂故云三狐易説漢上朱氏曰二為田自三至上有師象四艮坎為狐狐善疑惑春秋傳卜徒父謂狐為蠱蠱亦惑也自二至四三爻不正皆具坎艮而近五小人惑其上者也二坎為弓三離為矢三動以正弓動矢𤼵二剛上行厯三爻而坎毁田獲三狐也二動離為坤黄地道之美坤之中色得黄矢也正則吉故曰九二貞吉九二剛中為五所任六五柔得尊位於剛斷及明有不足難解之時小人乗之而惑其君則難復結矣小人不可不去也小人去則直道行而得中矣易傳曰邪不去君心一入則中直之道无由行矣桓敬之不去武三思是也易傳新安朱氏曰此爻取象之意未詳或曰卦凡四隂除六五君位餘三隂即三狐之象也大抵此爻為卜田之吉占亦為去邪媚而得中直之象能守其正則无不吉矣本義東萊吕氏曰九二在解之時與六五之君相應是君子處賢君之右君子輔人君之道去小人最當先大抵去小人須當盡除其根本如去之不盡則必流衍復盛以害正道故曰田獲三狐大抵陽為君子隂為小人解之為卦有四隂六五一爻是君位其餘三爻皆是小人今田獲三狐是盡去其三小人小人盡去則中直之道得既得中直之道則正而吉矣凡人之情皆以盡去小人為失之過殊不知盡去小人乃中道也昔元祐君子在朝至元祐末小人之大者如章子厚吕惠卿之徒固已逺竄不在朝廷然尚有未盡去者至紹聖之後君子之道不明黄矢之道不行蓋縁去小人不盡至建中靖國初欲用正人當時朝廷之論以為元祐時人亦當用紹聖時人亦當用殊不知君子小人參用乃非中道是以其後蔡京之徒復用中道復不行蓋不知此爻之義也易説六三負且乗致寇至貞吝象曰負且乗亦可醜也自我致戎又誰咎也伊川先生曰六三隂柔居下之上處非其位猶小人宜在下以負荷而且乗車非其據也必致寇奪之至雖使所為得正亦可鄙吝也小人而竊盛位雖勉為正事而氣質卑下本非在上之物終可咎也若能大正則如何曰大正非隂柔所能也若能之則是化為君子矣三隂柔小人宜在下而反處下之上猶小人宜負而反乗當致寇奪也難解之時而小人竊但復致寇矣負荷之人而且乗載為可醜惡也處非其據徳不稱一作勝其噐則寇戎之致乃已招取將誰咎乎聖人又於繫辭明其致寇之道謂作易者其知盜乎盜者乗釁而至茍无釁隙則盜安能犯負者小人之事乗者君子之噐以小人而乗君子之噐非其所能安也故盜乗釁而奪之小人而居君子之位非其所能堪也故滿假而陵慢其上侵暴其下盜則乗其過惡而伐之矣伐者聲其罪也盜横暴而至者也貨財而輕慢其藏是教語乎盜使取之也女子而夭冶其容是教語淫者使暴之也小人而乗君子之噐是招盜使奪之也皆自取之之謂也並易傳横渠先生曰不正而近比二剛不能致一故有小人負乗之象貪以致寇也易説藍田吕氏曰六三以隂居陽柔邪之質乃在下卦之上小人居君子之位者也不安於上求媚於四而負之不安於下陵侮於二而乗之其行可醜自取於難矣故曰負且乗致寇至守是不變卒歸鄙狹故曰貞吝龜山楊氏曰方解之時徳不足以有其位慢藏之象曰其致寇自我又誰咎乎易説白雲郭氏曰陽為君子隂為小人小人六也負之事也君子三也乗之噐也居非其位以負而乗致寇之至不亦宜乎吝而固守益可鄙也凡來寇已者皆曰寇不必盜也易説漢上朱氏曰六三上負四下乗二坎為輪六為小人故曰負也者小人之事九為君子故曰乗也者君子之噐四坎為盜故曰小人而乗君子之噐盜斯奪之矣三正則乗象毁不正則盜斯奪之故貞吝車服所以昭庸宜負而反乗亦可醜也隂為醜辭曰盜象曰戎盜用衆戎也致戎者以不正自我致戎又誰咎哉難解之時小人竊位則寇至矣六三一爻當内卦之上三公之位小人而在髙位自二言之與四五為狐自三言之為負乗自上言之為隼易傳新安朱氏曰繫辭備矣貞吝言雖以正得之亦可羞也惟避而去之為可免耳本義六居三大率少有好底負且乗聖人到這裏又見得有這箇小人乗君子之噐底象故又於此𤼵出這箇道理來語録九四解而拇朋至斯孚象曰解而拇未當位也伊川先生曰九四以陽剛之才居上位承六五之君大臣也而下與初六之隂為應拇在下而微者謂初也居上位而親小人則賢人正士逺退矣斥去小人則君子之黨進而誠相得也四能解去初六之隂柔則陽剛君子之朋來至而誠合矣不解去小人則已之誠未至安能得人之孚也初六其應故謂逺之為解四雖陽剛然居隂於正疑不足若復親比小人則其失正必矣故戒必解其拇然後能來君子以其處未當位也解者本合而離之也必解拇而後朋孚蓋君子之交而小人容於其間是與君子之誠未至也並易傳横渠先生曰位不當一作正則所履者邪故失位之隂因得駢附險亂即解解之則朋信易説藍田吕氏曰九四者解之時有應在初初在險下拇之象四雖剛陽而不當位未足解難然在動始求免於剛不専應初故曰解而拇繫應不私朋信之矣故曰朋至斯孚龜山楊氏曰剛不當位未能无不孚也故解而拇拇以執取為事然不執非其有也故朋至斯孚易説白雲郭氏曰輔嗣以三為拇伊川以初為拇九四拘於應初不知朋至斯孚之大故必解而拇而後朋可至此難之所以解也易説漢上朱氏曰四震為足初在下體之下動而應足拇之象九四陽也陽與陽為朋劉牧曰朋謂二四當大臣之位下與初六小人相應則九二君子與我朋𩔖者不信而去蓋觀近臣以其所主也故解其拇則九二自至為孚於五矣四陽處隂於正疑不足復比小人則與君子之誠有不至也其能為五得君子乎故拇不解則小人進小人進則君子去而難作易傳新安朱氏曰拇指初初與四皆不得其位而相應應之不以正者也然四陽初隂其𩔖不同若能解而去之則君子之朋至而相信也本義問九四解而拇朋至斯孚先生曰四與初皆不得正四能解而拇者以四雖隂位而才則陽與初六隂柔則為有間所以能解去其拇故得陽剛之朋𩔖至而相信矣語録六五君子維有解吉有孚于小人象曰君子有解小人退也伊川先生曰六五居尊位為解之主人君之解也以君子通言之君子所親比者必君子也所解去者必小人也故君子維有解則吉也小人去則君子進矣吉孰大焉有孚者世云見驗也可驗之於小人小人之黨去則是君子能有解也小人去則君子自進正道自行天下不足治也君子之所解者謂退去小人也小人去則君子之道行是以吉也並易傳横渠先生曰君子道亨則邪𩔖之退必矣易説龜山楊氏曰柔順得中而履尊位能維有解者也故能有孚于小人若董卓之誅卒至於京城流血蕭俛議銷兵而朱克融等客長安餓且死不得一官皆不知維有解之道也易説白雲郭氏曰六五之君以柔居中下應忠直之臣无所不緩故曰維有解吉不言所事解之大者也其解之至有孚于小人者不私己以解難如天地雷雨无閒於草木之微是以小人亦信之而退安其分也易説漢上朱氏曰難生之初剛柔交錯小人道勝君子合内外之力以濟其難非以勝小人也如理亂繩維有解其結而已九自二之五成巽巽為繩故曰君子維有解吉正故吉也解之者使剛者在上柔者在下不唯君子安之以信于小人小人退而不疑是以險去難解物莫之傷六五之吉孰大於是六下之二與九相應者孚也二之下小人退也故辭曰有孚于小人象曰小人退也譬之有疾本於隂陽揉錯善醫者導之各復其所釋然解矣不善治者又從而紛亂之解天下之大難者亦然陽為君子隂為小人故二以物言之為狐以陽言之為君子五君位也以隂言之又為小人之在上者唯其時物也易傳新安朱氏曰卦凡四隂而六五當君位與三隂同𩔖者必解而去之則吉也孚驗也君子有解以小人之退為驗也本義上六公用射隼于髙墉之上獲之无不利象曰公用射隼以解悖也伊川先生曰上六尊髙之地而非君位故曰公但據解終而言也隼鷙害之物象為害之小人墉牆内外之限也害若在内則是未解之時也若出墉外則是无害矣復何所解故在墉上離乎内而未去也云髙見防限之嚴而未去者上解之極也解極之時而獨有未解者乃害之堅强者也上居解極解道已至噐已成也故能射而獲之既獲之則天下之患解已盡矣何所不利夫子於繫辭復伸其義曰隼者禽也弓矢者噐也射之者人也君子藏噐於身待時而動何不利之有動而不括是以出而有獲語成噐而動者也鷙害之物在墉上苟无其噐與不待時而𤼵則安能獲之所以解之之道噐也事之當解與已解之之道至者時也如是而動故无括結𤼵而无不利矣括結謂阻礙聖人於此𤼵明藏噐待時之義夫行一身至於天下之事茍无其噐與不以時而動小則括塞大則䘮敗自古喜有為而无成功或顛覆者皆由是也至解終而未解者悖亂之大者也射之所以解之也解則天下平矣並易傳横渠先生曰忘義而貪故以喻隼易説龜山楊氏曰隼鷙害之物小人為害之象負且乗者也非上六其孰能去之上六居解之極有其位而又有其時以是解悖何不利之有蓋大臣之任也易説白雲郭氏曰六三負且乗悖亂之道隼之象也髙墉三之位也乗非負之所當乗墉非隼之所當處在三致戎猶負乗在上能獲猶射隼也夫以上六解悖之道以獲六三負乗之醜是以无不利也孔子曰君子藏噐於身待時而動解悖有道所謂噐也髙墉之上則其時也易説漢上朱氏曰三公位坤土坎險積土當内外之際墉也坎為弓離為矢上動之三弓動矢𤼵巽為髙離兊為隼六三之上公用射隼于髙墉之上𫉬之也六三小人之鷙害者當解之終離乎内而未去解道已成悖而未去其害堅强矣上六在上動不失時以解悖亂六三變則悖解悖解則天下之難解无不利者動而不括也易傳新安朱氏曰繫辭備矣本義射隼于髙墉聖人説易大槩是如此不似今人説底向來欽夫書與林艾軒云聖人治易却則恁地此却似説得易了語録合訂刪補大易集義粹言卷四十四
