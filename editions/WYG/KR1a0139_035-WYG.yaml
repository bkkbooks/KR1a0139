body:
  text: 合訂刪補大易集義粹言卷三十三頭等侍衛納喇性徳編坎上坎下伊川先生曰習坎序卦物不可以終過故受之以坎坎者陷也理无過而不己過極則必陷坎所以次大過也習謂重習他卦雖重不加其名獨坎加習者見其重險險中復有險其義大也卦中一陽上下二隂陽實隂虛上下无據一陽陷於二隂之中故為坎陷之義陽居隂中則為陷隂居陽中則為麗凡陽在上者止之象在中陷之象在下動之象隂在上説之象在中麗之象在下巽之象陷則為險習重也如學習温習皆重複之義也坎陷一作險也卦之所言處險難之道坎水也一始於中有生之最先者也故為水陷水之體也易傳問張子曰隂陽之精互藏其宅然乎曰此言甚有味由人如何看水離物不得故水有離之象火能入物故火有坎之象胡氏拾遺横渠先生曰習坎重襲之義八純卦惟此加習者餘皆一字可盡其義坎取其險故重之而其險乃著也色以離見聲以震聞臭以巽知味以坎達坎離者天地之中二氣之正交然離本隂卦坎本陽卦以此見二氣其本如此而交性也非此二物則无易並易説一陷溺而不得出為坎一附麗而不能去為離正蒙漢上朱氏曰坎生於坤本乎地也故潤下離生於乾本乎天也故炎上叢説新安朱氏曰朱氏問習坎程傳云一始於中有生之最先者故為水夫陽氣之生必始於下復卦之象是也今曰始於中其義未詳先生曰氣自下而上為是程説别是一義各有所主不相妨然亦不可相雜語録東萊吕氏曰坎陷也陽居隂中則為陷離麗也隂居陽中則為麗是知小人猶可以依附君子君子於小人羣衆中決无容身之地易説習坎有孚維心亨行有尚伊川先生曰陽實在中為中有孚信維心亨維其心誠一故能亨通至誠可以通金石蹈水火何險難之不可亨也行有尚謂以誠一而行則能出險有可嘉尚謂有功也不行則常在險中矣易傳横渠先生曰人欲得正己而物正大抵道義雖不可緩又不欲急廹在人固須求之有漸於己亦然盖精思潔慮以求大功則其心隘惟是得心洪放得如天地易簡易簡然後能應物皆平正博學於文者只要得習坎心亨盖人經歴險阻艱難然後其心亨通博學者皆是小徳應物不學則無由知之故中庸之欲前定將以應物也經學理窟白雲郭氏曰易中諸卦於卦上無加字者獨此稱習坎孔氏正義云以坎為險難故特加習名王原叔先生引徐氏新義謂習坎字上脱卦名一坎字而易中卦名之下亦无重言卦者故離卦不曰離重離巽卦不曰巽重巽其重言卦名者皆孔子彖辭也孔氏既未明徐氏尤失之或者云本無習字縁坎卦六畫漫滅正如習字故傳冩者誤以漫滅之卦畫為習字又於其上添畫一卦是坎字之上十二畫矣然雖以習字漫滅觀之僅有六畫之象如此則其誤在𨽻古既出之後而彖象皆已先言習坎則此説又非矣大抵坎加習字學者思慮終不能得不可更附㑹穿鑿也坎離等六卦卦辭并彖皆只以三畫取義坎以剛中而實故稱有孚心亨有剛中之徳者未有不能濟難也故行有尚如頤大過噬嗑中孚之類皆六畫取象者也坎以三畫取義是一卦之中其象再見故云習坎豈乾坤不可稱習而六子之序始於坎故坎獨稱歟其義則六卦俱有之矣疑當闕之未可深辯也易説新安朱氏曰習重習也坎險陷也其象為水陽陷隂中外虚而中實也此卦上下皆坎是為重險中實為有孚心亨之象以是而行必有功矣故其占如此本義東萊吕氏曰或問易傳曰習坎有孚維心亨行有尚惟其心誠一故能亨通至誠可以通金石蹈水火何險難之不可亨也竊謂易傳句句字字當作實事看此心苟誠則赴湯蹈火无有齟齬一不誠焉則出言吐氣亦不成倫理如李廣之射入石唐之番人能水行三十里不噎又如心風人力倍常時與被火之人竄身於煙火之中而能保全者是其誠一之所致也未知是否乞賜詳誨荅曰是其誠一之所致也此語有病别集彖曰習坎重險也水流而不盈行險而不失其信維心亨乃以剛中也行有尚往有功也天險不可升也地險山川丘陵也王公設險以守其國險之時用大矣哉康節先生曰易曰坎有孚維心亨行有尚中正行險往且有功雖危無咎能自信故也伊尹以之是知古之人患名過實者有之矣其間有幸與不幸者雖聖人人力有不及者矣伊尹行冢宰居責成之地借使避放君之名豈曰不忠乎則天下之事去矣又安能正嗣君成終始之大忠者乎吁若委寄於匪人三年之間其如嗣君何則天下之事亦去矣又安有伊尹也坎有孚維心亨不亦近之乎觀物内篇伊川先生曰習坎者謂重險也上下皆坎兩險相重也初六云坎窞是坎中之坎重險也水流而不盈陽動於險中而未出於險乃水性之流行而未盈於坎既盈則出乎坎矣行險而不失其信陽剛中實居險之中行險而不失其信者也坎中實水就下皆為信義有孚也維其心可以亨通者乃以其剛中也中實為有孚之象至誠之道何所不通一作亨以剛中之道而行則可以濟險難而亨通也以其剛中之才而往則有功故可嘉尚若止而不行則常在險中矣一作也坎以能行為功高不可外者天之險也山川邱陵地之險也王公君人者觀坎之象知險之不可陵也故設為城郭溝池之險以守其國保其民人是有用險之時其用甚大故賛其大矣哉山河城池設險之大端也若夫尊卑之辨貴賤之分明等威異物采凡所以杜絶陵僭限隔上下者皆體險之用也並易傳横渠先生曰可盈則非謂重險也中柔則心無常何能亨也内外皆險義不可止故行有尚也坎維心亨故行有尚外雖積險苟處之心亨不疑則雖難必濟而往有功也今水臨萬仞之山要下即下无復疑滯人在前惟知有義理而已則復何囘避所以心通並易説藍田吕氏曰習坎更試乎至難也八卦乾健坤順震動艮止離明坎險巽入兑説惟險非吉徳君子所不取故於坎也獨以習坎為名更試重險乃君子所有事也流水之為物雖行險不礙其必下也君子之為徳雖行險不失其必信也剛陷二隂之間而皆得中心亨者也剛中而習險往必有功也險非吉徳而王公法天地以設險其取於險也大矣龜山楊氏曰北方寒極而隂凝一陽動乎中故凝釋而為水水者一之所生也一之所起有一而未形其為物不貳矣故有孚心亨陽在内也誠孚於中險不能陷故亨天險非可止之地止於險則終於陷而已故行有尚往乃有功也水流而不盈陽微未出中也萬折必東行險而不失其信險之陷陽小人害君子之象也宜无施而可然易變易也隨時變易以從道則險亦有時而平矣王公設險以守其國是也險之時用豈不大矣哉繫辭曰變動不居周流六虛其斯之謂歟設險之義伊川論之詳矣易説兼山郭氏曰二五剛中故為有孚維心亨有過物者必濟故行有尚天險不止於法度之威地險不止於高城深池在夫王公所設之如何爾易説白雲郭氏曰彖言重險正釋習坎二字則習之為重明矣先儒謂便習非也水流而不盈者坎之險无窮已也行險而不失其信者坎之徳有孚也夫以一陽而揜於二隂非亨也然終不能陷者剛中也剛中則所守至固雖非亨而心亨矣孟子所謂富貴不能淫貧賤不能移威武不能屈者也故孔子亦謂棖也欲焉得剛剛中之徳用以有行何往而非功其本則自於有孚心亨之微推而及之天下也君子正心誠意而能治天下國家者以此故中庸之學不離乎一性之内其失則為罟擭陷阱而君子每慎其獨者所以守剛中之徳為心亨之道也天非險也而人不可升者豈天之大險歟地非險也而山川邱陵豈地之大險歟天地之大尚未離乎坎險之道是以王公内則治教政刑外則城郭溝池皆所以象天地之險以守其國也故彖又曰險之時用大矣哉盖人知用險於小而不知險有大人之事孟子所謂王請大之者是亦孔子大矣哉之意也坎无時險有時故曰險之時用易説漢上朱氏曰坎一陽二隂在地為水水之流動陽也其靜隂也流動乎隂中者陽陷乎隂也陷為險難八卦皆一字重坎加習然後盡險之象故曰習坎此以兩坎言坎也坎自臨變初九之五坎為水九二兊澤決而流流而不出乎中不盈也凡水之流有物阻之然後盈流而就下則不盈不盈者中也初之五復為坎行險也行險而不出乎中五必應二不失其信也水必就下流濕萬折而必東有諸己之謂乎必曰習坎者惟習坎乃見其然君子動而不過臨難而不苟似之故辭曰有孚彖曰水流而不盈行險而不失其信此以卦變言坎之徳也心者中也二五也亨者自初之五陽得位而亨水之流行雖處至險无所不通者亨也乃以剛中而不變也君子之在險亦然身雖蹈難其心則亨亦以剛中也初之五者往也剛得中而亨者往有功也坎之道有尚乎此君子濟難出險亦豈離乎剛中哉剛中者誠實也誠實則金石可貫水火可蹈天地可動故曰維心亨乃以剛中也行有尚往有功也此以卦變明處險之道也險者坎之用也能用乎險則无惡乎險矣天地之大不可以去險況王公乎坎在上天險也天之所以險者震足止於下不可升也坎在下地險也地之所以險者艮為山坎為川半山為邱陵也坤在上國也五乾為王三為三公四為諸侯坤國而坎據之王公設險以守其國也設險不唯城郭溝池兵甲之利綱紀法度人所不能踰者皆是所以法天地也故曰天險不可升也地險山川邱陵也王公設險以守其國此推明二五反覆以盡習坎之義也難生者險之時也用之以道濟天下之難者險之用也不知其時不得其用行之不以中反陷乎險中小則亡身大則亡國故夫子歎曰險之時用大矣哉在卦氣為大雪故太𤣥凖之以勤易傳新安朱氏曰重險釋卦名義不失其信以卦象釋有孚之義言内實而行有常也往有功者以剛在中心亨之象如是而往必有功也時用大矣哉極言之而贊其大也本義水流而不盈纔是説一坎滿便流出去一坎又滿又流出去行險而不失其信則是説決定如此語録東萊吕氏曰常人言險必以為凶徳坎所謂天險不可升也地險山川邱陵也王公設險以守其國險之用乃如此盖易之道甚大百物不廢若惡險而棄之是廢一物廢一物不足為易易説象曰水洊至習坎君子以常徳行習教事伊川先生曰坎為水水流仍洊而至兩坎相習水流仍洊之象也水自涓滴至於㝷丈至於江海洊習而不驟一作讓者也其因勢就下信而有常故君子觀坎水之象取其有常則常久其徳行人之徳行不常則偽也故當如水之有常取其洊習相受則以習熟其教令之事夫發政行教必使民熟於聞聽然後能従故三令五申之若驟告未喻遽責其従雖嚴刑以驅之一无之字不能也故當如水之洊習易傳藍田吕氏曰水之走下繼至而不絶有習險之義焉徳行教事非習不成也龜山楊氏曰習坎重險也水洊至相仍而不絶故積習而為重險行險而不失其信有常徳行之象焉盈科而進不舍晝夜有習教事之象焉故君子以之易説兼山郭氏曰習坎重險也水流而不盈行險而不失其信言坎之常也行有尚往有功言坎之用也故象曰水洊至習坎君子以常徳行習教事易以坎為水水靜則明燭鬚眉平中凖而大匠可以取法及其過也懷山襄陵浩浩滔天非方舟順風不能以濟也是以聖人制為刑法以治其小陳其甲兵以防其大有亷陛之峻以象天有封疆之固以象地每嵗孟春遒人以木鐸徇于路又曰三時務農一時教戰无非教也故常徳行以立事也習教事以制變也黄帝垂衣裳而天下治七十二戰而禽滅蚩尤用此道也經曰地中有水師成諸坎也易説白雲郭氏曰坎者水也原泉混混不舍晝夜放乎四海故言洊至洊至則其來不已險陷亦不已是為習坎之義也君子法之以常徳行習教事曰常曰習皆不已之義也常徳行所以行險而不失其信習教事所以設險而固其國造次顛沛必於是斯為常矣國家閒暇及是時明其政刑斯為習矣常徳行故能有孚維心亨習教事故能行有尚而往有功二者豈可一日廢乎亦猶君子自强不息以法乾之健者也易説漢上朱氏曰卦言坎者水也大象言坎者水流之坎窞也水流行不止至於坎矣復至於坎其行洊至有常習之象常徳行習教事非一日之積如水洊至也二五正中徳也震為行坤順也為民教順民者也常徳行可以渉險習教事可以夷險易傳新安朱氏曰治己治人皆必重習然後熟而安之本義初六習坎入于坎窞凶象曰習坎入坎失道凶也伊川先生曰初以隂柔一无柔字居坎險之下柔弱无援而處不得當非能出乎險也惟益陷於深險耳窞坎中之陷處己在習坎中更入坎窞其凶可知由習坎而更入坎窞失道也是以凶能出於險乃不失道也並易傳横渠先生曰比於二无出險之志故云入于坎窞也易説龜山楊氏曰柔不當位失道也居重險之時承剛而在下失道而不足以出險則益陷於險矣故入於坎窞凶窞坎中之陷處也易説白雲郭氏曰習坎重險也初六以隂柔之才居重險之下陷於坎險而不能出者也不能出者无剛中之徳而失處險之道是以凶也若従便習之義則初六不為坎窞之凶矣易説漢上朱氏曰初六本臨之六五自外入於初歴兩坎習重也故曰習坎窞坎底也道由正而行也君子處險當以正道乃可出險初六不正不能出險反入于重坎之底失道而凶也此何異學泅者不知與没俱出而溺死者乎易傳新安朱氏曰初本以隂柔居重險之下其陷益深故其象占如此本義九二坎有險求小得象曰求小得未出中也伊川先生曰二當坎險之時陷上下二隂之中乃至險之地是有險也然其剛中之才雖未能出乎險中亦可小自濟不至如初益陷入於深險是所求小得也君子處險艱而能自保者剛中而已剛則才足自衞中則動不失宜未出中者方為二隂所陷在至險之地以剛中之才不至陷於深險是所求小得然未能出坎中之險也並易傳横渠先生曰險難之際弱必附强上下俱隂求必見従故求則必小得然二居險中而未出也易説龜山楊氏曰二隂在外有險也一陽閒乎二隂之間未能出中也雖有剛明之才未出中則不足以夷天下之險故求小得而已夫求者自求也外雖有險而心常亨故曰求小得易説白雲郭氏曰以一陽揜於二隂之中不能无難也故曰坎有險然剛而得中有心亨之道故可以求小得而不至於喪其良心也一離乎中則失之矣故象言求小得以其未出中也求得之際道之所以失也以九二剛中尚且小得而已况无剛中之徳者乎是以君子戒慎恐懼乎不睹不聞之際誠非用心之過也聖人所謂求小得不過如明哲保身而已異乎小人之求之也易説漢上朱氏曰二剛中而陷於二隂上有坎險居坎而又有險者也動而有求五必應之五艮為手求之象隂為小故小有得然未出乎險中其剛纔足以自濟易傳曰君子處艱難而能自保者惟剛中而已易傳新安朱氏曰處重險之中未能自出故為有險之象然剛而得中故其占可以求小得也本義六三來之坎坎險且枕入于坎窞勿用象曰來之坎坎終无功也伊川先生曰六三在坎陷一作險之時以隂柔而居不中正其處不善進退與居皆不可者也來下則入於險之中之上則重險也退來與進之皆險故云來之坎坎既進退皆險而居亦險枕謂支倚居險而支倚以處不安之甚也所處如此惟益入於深險耳故云入于坎窞如三所處之道一无之道字不可用也故戒勿用進退皆險處又不安若用此道當益入於險終豈能有功乎以隂柔處不中正雖平易之地尚致悔咎況處險乎險者人之所欲出也必得其道乃能去之求去而失其道益困窮耳故聖人戒如三所處不可用也並易傳横渠先生曰前之入險退來枕險入窞與初六同易説藍田吕氏曰六三險且枕安於所未安也龜山楊氏曰來則乘剛之則渉險故來之俱坎也險且枕居險而止故入于坎窞入于坎窞則終於陷而已矣故不可用易説白雲郭氏曰三居重險之中當上下之際進則遇險退亦險也又履非其位所處亦險矣既无濟險之道終陷于坎窞而已宜其勿用也又安有行有尚往有功之義哉是知其終无功也來之猶來往也進退之象坎之下卦言處險之道上卦言用險之道枕言處險之上也易説漢上朱氏曰六三柔而不中履非其位不善處險者也往之於上則坎險之極五有艮木支倚而礙之險且枕也陸希聲曰枕閡礙險害之貌來而處三在上坎之底入于坎窞也來坎也往亦坎也終无濟險之功故終勿用三下之終也易傳新安朱氏曰以隂柔不中正而履重險之間來往皆險前險而後枕其陷益深不可用也故其象占如此枕倚著未安之意本義問六三來之坎坎先生曰經文中疊字如兢兢業業之類是重字來之自是兩字各有所指謂下來亦坎上往亦坎之往也進退皆險也六三險且枕只是前後皆是險枕便如枕頭之枕並語録六四樽酒簋貳用缶納約自牖終无咎象曰樽酒簋貳剛柔際也伊川先生曰六四隂柔而下无助非能濟天下之險者以其在高位故言為臣處險之道大臣當險難之時唯至誠見信於君其交固而不可間又能開明君心則可保无咎矣一作也夫欲上之篤信唯當盡其質實而已多儀而尚飾莫如燕享之禮故以燕享喻之言當不尚浮飾唯以質實所用一樽之酒二簋之實復以瓦缶為器質之至也其質實如此又須納約自牖納約謂進結於君之道牖一有有字開通之義室之暗也故設牖所以通明自牖言自通明之處以況君心所明處詩云天之牖民如壎如箎毛公訓牖為道亦開通之謂一作義人臣以忠信善道結於君心必自其所明處乃能入也人心有所蔽有所通所蔽者暗處也所通者明處也當就其明處而告之求信則易也故云納約自牖能如是則雖艱險之時終得无咎也且如君心蔽於荒樂唯其蔽也故爾雖力詆其荒樂之非如其不省何必於所不蔽之事推而及之則能悟其心矣自古能諫其君者未有不因其所明者也故訐直强勁者率多取忤而温厚明辯者其説多行且如漢祖愛戚姬将易太子是其所蔽也羣臣爭之者衆矣嫡庶之義長幼一作少長之序非不明也如其蔽而不察何四老者高祖素知其賢而重之此其不蔽之明心也故因其所明而及其事則悟之如反手且四老人之力孰與張良羣公卿及天下之心其言之切孰與周昌叔孫通然而不従彼而従此者由攻其蔽與就其明之異耳又如趙王太后愛其少子長安君不肯使質於齊此其蔽於私愛也大臣諫之雖强既曰蔽矣其能聽乎愛其子而欲使之長久富貴者其心之所明也故左師觸龍因其一有所字明而導之以長久之計故其聽也如響非惟告於君者如此為教者亦然夫教必就人之所長所長者心之所明也従其心之所明而入然後推及其餘孟子所謂成徳達才是也象只舉首句此比多矣樽酒簋貳質實之至剛柔相際接之道能如此則可終保无咎君臣之交能固而常者在誠實而已剛柔指四與五謂君臣之交際也並易傳或問坎之六四樽酒簋貳用缶納約自牖何義也曰坎險之時也此是聖人論大臣處險難之法樽酒簋貳用缶謂當險難之時更用甚得无非是用至誠也納約自牖言欲納約於君當自明處牖者開明之處也欲開悟於君若於君所蔽處何由入得如漢高帝欲易太子它人皆爭以嫡庶之分夫嫡庶之分高祖豈不知得分明直知不是了犯之此正是高祖所蔽處更豈能曉之獨留侯招致四皓此正高祖所明處盖高祖自匹夫有天下皆豪傑之力故憚之留侯以四皓輔太子高祖知天下豪傑歸心於惠帝故更不易也昔秦伐趙欲以長安君為質太后不可左師觸龍請見云云遂以長安君為質焉夫太后只知愛子更不察利害故左師以愛子之利害開悟之也劉元承手編横渠先生曰四五俱得隂陽之正險阻之際近而相得誠素既接雖簡略於禮无咎也上比於五有進出之漸故无凶易説龜山楊氏曰四居大臣之位无剛健之才不足以夷天下之險故以人臣處險之道言之傳曰為臣必臣敬恪恭儉臣也則為臣之義以敬恪恭儉為主樽酒簋貳以儉為禮也缶器之質者也至欽无文不致飾也務盡敬恪而已夫處重險之中非多儀尚文之時故用缶納約自牖所以進結其君以是而已牖所以通内外開其明也齊宣王曰寡人有疾寡人好勇孟子則以文武之事告之好貨色則以公劉太王之事告之好勇猶云可也好貨好色人君之邪心不可為也而孟子皆曰惟恐王之不好也盖逆閉其塗而拒絶之則齊王進善之心熄矣故孟子啓其閉開其明使通内外庶乎其有見矣此自牖之義歟知此則知所以事君矣易説兼山郭氏曰醴酒之設𤣥酒之尚貴其誠之著也國有凶荒則殺禮而多昬時有險易也是以至薄之禮虚中之器可以自幽以達明坎之時為然四五近比而相親非正也自牖之象也説者謂觸龍善因闇以發其明然卦无是象也易説白雲郭氏曰有孚者坎之徳君子行險而不失其信所以法其徳也觀乎六四盖可見矣且一樽之酒貳簋之食瓦缶之器至微物也苟能虚中盡誠以通交際之道君子不以微薄為失禮亦由自牖納約其情已至不必階序行禮之地是以終无咎也坎之六四在上體之下與五為比當剛柔交際之地所謂能用有孚之道者也傳曰苟有明信澗谿沼沚之毛蘋蘩蕰藻之菜筐筥錡釜之器潢汙行潦之水可薦於鬼神可羞於王公者无他焉交際之道以誠為主故也春秋之時齊侯衛侯胥命于蒲葢申約言而退終二公之世未嘗以征伐相加雖二君未賢於當時之君胥命未為得禮亦猶自牖納約之事而聖人有取焉傳亦言其近古近正者盖其信為有餘也孔子不以人廢言况屢盟長亂之世有約言近古之事乎是亦不得中行而與狂狷之義也由是觀之則樽酒簋貳足以盡交際之道者主於習坎有孚而已易説漢上朱氏曰四自初至五有震坎艮坤坎震酒也艮鼻震足坤腹樽簋之形皆有首鼻腹足而樽異者有酒也有樽酒象而簋象亦具焉簋貳也貳副之也樽酒而簋副之燕饗之禮君臣上下剛柔相濟之時也三四坤為土為腹土器有腹缶也缶樸素之物質之象坤為闔戸坎艮為穴穴其戸傍通日月之光牖也明之象約者交相信四五相易而後四應初五應二納約也約誠信固結之象六四柔而正九五剛中而正四五无應四非五莫之比五非四亦莫之承上下協力可以濟險故四當剛柔相濟也用質以交於上因五之所明以納其誠信則言辭易入險難易濟終无咎也四五相易宜有咎而易則五出險矣故終无咎終謂上六不動也易傳曰自古能諫其君者未有不因其所明者也故訐直强勁者率多取忤而温厚明辯者其説易行古人有行之者左師觸龍之於趙張子房之於漢是也非惟告其君如此教人亦然孟子所謂成徳達才是也易傳新安朱氏曰晁氏云先儒讀樽酒簋為一句貳用缶為一句今従之貳益之也周禮大祭三貳弟子職左執虚豆右執挾七周旋而貳是也九五尊位六四近之在險之時剛柔相際故有但用薄禮益以誠心進結自牖之象牖非所由之正而室之所以受明也始雖艱阻終得无咎故其占如此晁氏曰一本无貳字今􅀙之本義易難看不惟道理難尋其中或有用當時俗語亦有他事後人不知者且如樽酒簋貳今人硬説作貳簋其實无二簋之實陸徳明自注斷人自不曾去看如所謂貳乃是周禮大祭三貳之貳是副貳之貳此不是某穿鑿郤有古本若是强為一説无來歴全不是聖賢言語陸氏釋文本象无貳字今従之納約自牖雖有向明之意然非路之正問六四舊讀樽酒簋貳為句用缶為句乃古注及程氏説晁以道本樽酒簋句貳用缶句本義従之其説如何先生曰既曰樽酒簋貳又曰用缶亦不成文理貳益之也六四近尊位而在險之時剛柔相際故有但用薄禮益以誠心進納自牖之象又問牖非所由之正乃室中受明之處豈險難之時不容由正以進邪先生曰非是不可由正盖事變不一勢有不容不自牖者終无咎者始雖不甚好然於義理无害故終亦无咎无咎者善補過之謂也樽酒簋做一句自是釋文如此不由戸而自牖以見艱難之時不可直致也並語録九五坎不盈祗既平无咎象曰坎不盈中未大也伊川先生曰九五在坎之中是不盈也盈則平而出矣祗宜音柢抵也復卦云无祗悔必抵於已平則无咎既曰不盈則是未平而一无而字尚在險中未得无咎也以九五剛中之才居尊位宜可以濟於險然下无助也二陷於險中未能出餘皆隂柔无一作非濟險之才人君雖才安能獨濟天下之險居君位而不能致天下出於險則為有咎必祗既平乃得无咎九五剛中之才而得尊位當濟天下之險難而坎尚不盈乃未能平乎險難是其剛中之道未光大也險難之時非君臣協力其能濟乎五之道未大以无臣也人君之道不能濟天下之險難則為未大不稱其位也並易傳横渠先生曰險難垂出而下比於四不能勉成其功光大其志故聖人惜之曰祗既平无咎而已矣不能往有功也一本云坎盈則進而往有尚矣易説龜山楊氏曰剛得中而履尊位宜可以濟天下之險矣然以一陽在重險之中則剛雖中而未大也故坎不盈祗既平而已盈則出險矣然既平則有出險之漸故无咎易説白雲郭氏曰水之來終不可盈而不失其平者水之常也守其常而不變固可以无咎矣然九五以剛中之才而居君位當法天地設險以守其國盖思有濟險之道以二隂見揜无應以助之僅能守常而已非大人之事也故象曰中未大也與屯膏小貞之義相類易説漢上朱氏曰九五本臨初九往之五坎中而不盈雖不盈也有出險之理然九五下比六四所係者狹四五相易中存而大毁是水不盈坎適至於平而止也出險之道在剛中正剛正則大中而未大幾可以出險故聖人惜之曰祗既平无咎而已祗適足之辭横渠曰不能勉成其功光大其志此所以為可惜歟易傳新安朱氏曰九五雖在坎中然以陽剛中正居尊位而時亦将出矣故其象占如此中未大者有中徳而未大本義坎水只是平不解滿盈是滿出來問坎不盈中未大也曰水之為物其在坎祗能平自不能盈故曰不盈盈高之義中未大者平則是得中不盈是未大也九五坎不盈祗既平祗字他无説處看來只得作抵字解復卦亦然不盈則未是平但将來必㑹平二與五雖是陷於隂中畢竟是陽㑹動陷他不得如有孚如維心亨如行有尚皆是也並語録東萊吕氏曰凡水火以常論之水屬隂火屬陽至以爻論之天一生水水中有陽故坎卦上下二隂中央一陽故水屬陽也夫水之流行必先盈滿而後流出若澗而盈則能出澗之類是也坎之未至於盈非坎深之故但水未能盈滿耳九五君位也如徳未至於堯舜必求至於堯舜是坎而止於盈也若五一爻特患未至於盈耳此君子所以釋之曰中未大也易説上六係用徽纆寘于叢棘三嵗不得凶象曰上六失道凶三嵗也伊川先生曰上六以隂柔而居險之極其陷之深者也以其陷之深取牢獄為喻如係縛之以徽纆囚寘于叢棘之中隂柔而陷之深其不能出矣故云至於三嵗之久不得免也其凶可知以隂柔而自處極險之地是其失道也故其凶至於三嵗也三嵗之久而不得免焉終凶之辭也言久有曰十有曰三隨其事也陷於獄至於三嵗久之極也它卦以年數言者亦各以其事也如三嵗不興十年乃字是也並易傳横渠先生曰上六過中逃險而失道者也不附比陽中幾於迷復之凶故為所係累也隂柔不能附比於隂處險之極乗剛宜其為所拘戮也易説龜山楊氏曰居重險之極无剛健之才終於陷而已矣猶之係徽纆而寘叢棘也无出險之才而寘叢棘可謂失道矣其凶三嵗不亦宜乎三嵗者終凶之辭也易説兼山郭氏曰坎者水也源泉混混不舍晝夜決之東方則東流決之西方則西流水无分於東西然而萬折必東者以其信也水由地中放乎四海注焉不滿泄之不竭大通不加窮居不損猶之人也遺佚而不怨阨窮而不憫者由心亨也經曰巽乎水而上水羸其瓶凶以動出為功也故曰有孚維心亨行有尚九二求小得未出中也九五祗既平中未大也皆未能終坎之功至於上六專取用險之極非聖人之所尚三嵗不得免而無恥由上失其道也易説白雲郭氏曰坎之爻以近中為得初與四是也初居重險之下失道而凶獨四能行其志是以得納約自牖之道其過中而失之者三與上也三處險而不能有功上用險之過亦已失矣盖刑法坎險之象而非用坎之道故用徽纆叢棘為坎之道者上六之過也雖使三嵗之久亦将不得其情能无凶乎是上失其道而終凶也其道如何有孚維心亨是也以是行之斯有功矣古之聖人任徳不任刑故孔子曰上好信則民莫敢不用情上六之失其在兹乎易説漢上朱氏曰上動成巽巽為繩坤坎為黑變巽徽纆也巽木交坎為叢棘上六柔无出險之才處險極之時守正可也不當動而動則愈陷矣譬如有人陷於狴犴之中坐而省過雖上罪也不過三嵗得出矣妄動求出則舉手掛徽纆投足蹈叢棘陷之愈深雖三嵗豈得出哉係之寘之不得出也然險極必平巽木數三乾為嵗凶三嵗也初六可動而不能上六不可動而妄動皆失道也易傳又曰易傳謂十為數極又十年不克征為終不可行而坎之上六三嵗為終不得出若以始終言之上六終也若以三嵗言之三非極數叢説新安朱氏曰以隂柔居險極故其象占如此本義問上六徽纆二字文云三股曰徽兩股曰纆皆索名是否曰據釋文如此語録東萊吕氏曰上六此一爻否極必泰屯極必通坎極必出險理之自然也然而若知否極而泰不知致泰之道則不能去否屯極則通不能為致通之理則不能去屯上居坎之極必能出險然以隂柔之質居之則不知所以出險故三嵗之久至於凶也易説合訂刪補大易集義粹言卷三十三
