body:
  text: 合訂刪補大易集義粹言卷二十八頭等侍衛納喇性德編震下坤上康節先生曰无極之前隂含陽也有象之後陽分隂也隂為陽之母陽為隂之父故母孕長男而為復父生長女而為姤是以陽起於復而隂起於姤也夫易根於乾坤而生於姤復葢剛交柔而為復柔交剛而為姤自兹而无窮矣復次剥明治生於亂乎姤次夬明亂生於治乎時哉時哉未有剥而不復未有夬而不姤者防乎其防邦家其長子孫其昌是以聖人貴未然之防是謂易之大剛並觀物外篇伊川先生曰復序卦物不可以終盡剥窮上反下故受之以復物无剥盡之理故剥極則復來一无來字隂極則陽生陽剥極於上而復生於下窮上而反下也復所以次剥也為卦一陽生於五隂之下隂極而陽復也嵗十月隂盛既極冬至則一陽復生於地中故為復也陽君子之道陽消極而復反君子之道消極而復長也故為反善之義易傳和靖尹氏曰康節説易起於中孚非特中孚也卦卦皆可起康節謂中孚以其信也康節對富韓公以易數起於復此語甚當康節詩有无妄對中孚一聫語録漢上朱氏曰周以子為正而孔子彖象皆用建寅故以復為十一月姤為五月故曰行夏之時虞氏已有此論叢説東萊吕氏曰復小而辨於物當初一下豈曽不完具只是上面大有階級易説復亨出入无疾朋來无咎反復其道七日來復利有攸往伊川先生曰復亨既復則亨也陽氣復生於下漸亨盛而生育萬物君子之道既復則漸以亨通澤於天下故復則有亨盛之理也出入无疾出入謂生長復生於内入也長進於外出也先云出語順耳陽生非自外也來於内故謂之入物之始生其氣至微故多屯難陽之始生其氣至微故多摧折春陽之發為隂寒所折觀草木於朝暮則可見矣出入无疾謂微陽生長无害之者也既无害之而其類漸進而來則將亨盛故无咎也所謂咎在氣則為差忒在君子一有之道字則為抑塞不得盡其理陽之當復雖使有疾之固不能止其復也但為阻礙耳而卦之才有无疾之義乃復道之善也一陽始生至微固未能勝羣隂而發生萬物必待諸陽之來然後能成生物之功而無差忒以朋來而无咎也三陽子丑寅之氣生成萬物衆陽之功也若君子之道既消而復豈能便勝於小人必待其朋類漸盛則能協力以勝之也謂消長之道反復迭至陽之消至七日而來復姤陽之始消也七變而成復故云七日謂七更也臨云八月有凶謂陽長至於隂長厯八月也陽進則隂退君子道長則小人之道消故利有攸往也並易傳横渠先生曰言反又言復終則有始循環无窮人指其化而裁之耳深其反也幾其復也故曰反復其道又曰出入无疾易説白雲郭氏曰乾剛坤柔相為消長隂剥陽盡至復而剛反在卦之中其義為大幽微難言故因七日以言之則復之義易明非復之義盡於七日而止也陽道方復為泰之始故亨疾猶不疾而速之疾隂陽消長有漸其出其入任道自運无遲速於其間與天之行健无以異也方剛長之初獨陽未能用必得其類斯无咎矣是以朋來則有臨有泰而後為復之无咎也此皆隂陽剛柔大義微而難言者欲觀復道反復无若嵗功之易明故繼以反復其道七日來復也自夏至陽始剥而於卦為姤建亥剥盡建子而一陽來復在天之日葢自鶉首以及星紀凡更七舎在人之月亦七易矣人之月即月之周天也從天道與日而言故云七日猶堯典言日永星火日短星昴詩言一之日二之日皆是也剛長之初利動而往之時葢自易言之不動而往无以致臨泰自天地言之不動而往无以生萬物自聖人言之不動而往无以治天下其利有攸往皆一也然隂陽剛柔皆一道自天與氣言之則曰隂陽自地與形言之則曰剛柔在易之卦麗於形矣故六爻以剛柔言而復謂之剛反也易説漢上朱氏圖説曰子夏曰極六位而反於坤之復其數七日其物陽也京房曰六爻反復之稱陸績曰六陽涉六隂反下七爻在初故稱七日日亦陽也虞翻曰消乾六爻為六日剛來反初葢先儒舊傳自子夏京房陸績虞翻皆以陽涉六隂極而反初為七日至王昭素乃暢其説曰乾有六陽坤有六隂一隂自五月而生屬坤隂道始進陽道漸消九月一陽在上衆隂剥物至十月則六隂數極十一月一陽復生自剥至十一月隔坤之六隂隂數既六過六而七則位屬陽以此知過坤六位即六日之象至於復為七日之象矣是以安定曰凡厯七爻以一爻為一日故謂之七日伊川曰七變而為復故云七日蘇子曰坤與初九為七其實皆源於子夏夫陽生於子隂生於午自午至子七而必復乾坤消息之理也故以一日言之自午時至夜半復得子時以一年言之自五月至十一月復得子月以一月言之自午日凡七日復得子日以一紀言之自午嵗凡七嵗復得子嵗天道運行其數自爾合之為一紀分之為一嵗一月一日莫不皆然故六十卦當三百六十日而兩卦相去皆以七日且卦有以爻為嵗者有以爻為月者有以爻為日者於復言七日來復者明卦氣也陸希聲謂聖人言七日來復為厯數之微明是也以消息言之自立冬十月節至大雪十一月節坤至復卦凡歴七爻以卦氣言之自冬至十一月中氣卦起中孚至復卦凡歴七日聖人觀天道之行反復不過七日故曰七日來復彖曰七日來復天行也王輔嗣曰復不可逺也夫天道如是復道豈可逺乎豈唯不可逺亦不能逺矣七日來復彖曰七日來復天行也王輔嗣云陽氣剥盡至來復時凡七日以天之行反復不過七日復之不可逺也孔穎達曰陽氣始剥盡謂陽氣始於剥盡之後至於反復凡經七日案易稽覽圖云卦氣起中孚故坎離震兊各主一方其餘六十卦卦有六爻别主一日凡主三百六十日餘有五日四分日之一者毎日分為八十分五日分為四百分日之一又分為二十分是四百二十分六十卦分之六七四十二卦别各得七分每卦得六日七分也剥卦陽氣之盡在於九月之末十月當純坤用事坤卦有六日七分坤卦之盡則復卦陽來是從剥盡至陽氣來復隔坤之一卦六日七分舉成數言之故輔嗣言凡七日也兩漢諸儒傳經皆用六日七分之説故孔穎達述而明之輔嗣論其大意而已至國朝王昭素王㳂宋咸始著論駮之胡旦明其不然今録其語而彌縫其闕云王昭素曰注疏並違夫子之義序卦云物不可以終盡剥窮上反下故受之以復以此知不剥盡也況剥上九有一陽取碩果之象碩果則不剥盡矣坤為十月卦十月純隂用事猶有陽氣在内故薺麥先生直至坤卦之末尚有龍戰之象龍亦陽也假使運有剥喪之時則商王受剥喪元良賊虐諫輔乃至億兆夷人離心離德當此之時豈无西伯之聖德箕子之賢良乎則知陽氣固无剥盡之理況隂陽者剛柔迭用變化日新生生所資永无盡矣胡旦難昭素曰夫積陽則萎凝水則載男老則弱女壯則雄故靡草死於始夏薺麥生於孟冬數已盡而氣存時已極而物反天地之常理隂陽之本性隂之極有龍戰之災故剥盡則窮上反下皆正理也言窮者剥之盡也言反者復之初也何知西伯箕子非剥喪之人哉昭素未之辯也臣曰隂剥陽盡而成坤隂極陽反而成復天之行也以時言之九月剥十月坤十一月復以理言之陽无剥盡之理故坤之上六龍戰于野為其嫌於无陽也上六則十月也説卦曰乾西北方之卦也西北方亦十月也序卦曰物不可以終盡剥窮上反下故受之以復非特此也五月一隂生其卦為姤積而成坤故坤下有伏乾十一月一陽生其卦為復積而成乾故乾下有伏坤反復相明以見生生無窮之意葢書不盡言言不盡意天地隂陽不可以一言盡故也王胡達序卦之義而未盡夫説卦變卦之妙是以其論如此然各有所長不可掩也王昭素曰注云至來復時凡七日注用凡字取七日之義即約酌而已然未見指歸矣疏引易緯六日七分以十月純隂用事有六日七分坤卦之盡則復卦陽來疏文此説未甚確當其六日七分是六十四卦分配一嵗之中時日之數今復卦是乾坤二卦隂陽反復之義疏若實用六日七分以為坤卦之盡復卦陽來則十月之節終則一陽便來也不得到冬至之日矣據其節終尚去冬至十五日則知七日之義難用易緯之數矣今論七日者不離乾坤二卦天地隂陽之理乾坤者造化之本乾有六陽坤有六隂自建子而一陽生至已統屬於乾自建午而一隂生至亥統屬於坤胡旦難昭素曰西漢京房以卦氣言事皆有效驗東漢郎顗明六日七分之學最為精妙夫卦之爻則實數也嵗之日則虛數也嵗月不盡之數積而為閏則加算焉六日七分實數也三百六十五日有餘焉故算而為閏昭素言從十月終至冬至尚有十五日未明嵗月之積閏術數之精妙也惜乎緯文喪失京郎已亡學者難知但憑臆説後生穿鑿罕得師資是以紛然而致論也臣曰昭素知九月剥十月坤十一月復而不知此言其大綱耳坎離震兊各主一方六十卦分主一嵗卦有六爻爻主一日凡三百六十日餘五日四分日之一又分於六十卦每卦六日七分氣之進退推盪而成如九月剥也有艮有既濟有噬嗑有大過凡五卦而後成坤十月坤也有未濟有蹇有頥有中孚凡五卦而後成復説卦言坎北方之卦也震東方之卦也離南方之卦也兊正秋也於三卦言方則知坎離震兊各主一方矣於兊言正秋者秋分也兊言秋分則震春分坎冬至離夏至為四正矣復大象曰先王以至日閉闗所謂至日者冬至也於復言冬至日則姤為夏至而十二月消息之卦可知矣復彖曰七日來復則六十卦分主一嵗卦有六爻爻主一日可知矣繫辭曰三百八十四爻當期之日葢六十卦當三百六十日四卦主十二節十二中氣所餘五日則積分成閏也大綱而言則剥九月坤十月復十一月故京房曰剥復相去三十日别而言之復主冬至冬至中氣起於中孚自中孚之後七日而復故曰七日來復譬如辰為天樞而不動之處猶在極星之下聖人之言居其所者曰北辰而占天者必曰極星之下詳略異也厯代先儒唯𤣥得其㫖故𤣥一中二羨三從四更五晬六廓七減八沈九成中者象中孚之卦冬至之節日起牛宿一度斗建子律中黄鍾夏后氏之十一月也其入牛宿之五度為周周者象復卦冬至之後周復也宋衷陸績曰易七日來復是也夫京房學於焦贛其説則源於易矣自楊子雲馬融鄭康成宋衷虞翻陸績范望並傳此學而昭素非之奈何王洙曰孔穎達雖據稽覽圖以釋王傳而易緯消息之術月有五卦卦有大小有諸侯有大夫有卿有公有辟五卦分爻迭主一日周而復始終月而既不連主七日則是剥盡至復全隔一月恐王傳之㫖不在此義也當以七為陽數隂陽消復不過七日天道之常也凡消息據陽而言之陽尊隂卑也臣難王洙曰輔嗣之意謂陽為隂剥其氣始盡至於陽氣來復之時凡七日而已何故如是以天道之行反復不過七日復之不可逺也葢本於天矣穎達以易緯消息之術考之月有五卦五卦分爻迭主一日周而復始終月而既以成一嵗其六十卦之相去不過七日隂陽消復天道之常則輔嗣所謂復之不可逺也其言驗矣孰謂王傳之㫖不在此哉宋咸曰卦氣起中孚如何曰京房郎顗闗子明輩假易之名以行其壬遁卜祝隂陽術數之學聖人之㫖則无有焉鳴呼好怪之甚也文王周公仲尼悉以隂陽剛柔進退消長得失存亡之象為之教云爾又何以是卦直是月是爻直是日云云之為乎夫卦氣何不起於他卦而獨起於中孚乎臣難咸曰六壬推日月行度叅以時日得易之坎離者也遁甲九宫八門得易之河圖者也壬遁得易之一端而不盡易之道散而為隂陽術數之學易亦何往而非隂陽哉故曰易以道隂陽又曰立天之道隂與陽立地之道柔與剛聖人推隂陽剛柔進退消長之理為得失存亡之象其道一歸於仁義而未始不原於天地咸信進退消長而不信消息之卦是終日數十而不知二五也又謂諸儒假壬遁言易學以籠天下不知壬遁實出於易言易者亦何假壬遁哉咸謂易書所不及者為聖人之㫖无有焉且如河圖洛書見於繫辭而河圖四十五洛書五十之數傳於異人安得以為聖人之㫖无有哉中孚十一月之卦也以嵗言之陽始於冬至以厯言之日始於牽牛以日言之晝始於夜半以人言之慮始於心思咸謂何不起於他卦真不知者也且不信直卦則陽生為復隂生為姤臨至于八月有凶八月不知果何月也夫善味者别淄澠之水善聽者知要妙之音善視者察秋毫之末咸讀易疏惡易緯之學而并廢消息之卦豈得為知哉劉遵曰天行􅅶次有十二隂行其六陽行其六當於隂六陽失位至於七則陽復本位此周天十二次環轉反覆其數如此施之於年月日時並同故一日之中七時而復一月之中七日而復一年之中七月而復一紀之中七嵗而復今云七日者取其中而言則時月年從可知也胡旦難劉遵曰一日之中從夜半至日中一年之中從建子至建午言其復也亦以隂陽之數也若一月之中七日一紀之中七年則未知隂陽之復如何也若天之十二次環轉反復周而无窮則未聞從𤣥枵至星紀何者為隂何者為陽以寅卯子丑言之則天之十二辰也其以子為陽丑為隂邪左轉之也與天戾矣劉遵之論妄也臣曰遵論隂陽運行之數得天道之行七日必復之理但不本於乾坤二卦消息之象以論之是以其言近乎漫漶要之亦有所長未可斥之以為妄也夫陽生於子隂生於午自午至子七而必復以一日言之自午時至夜半而復得子時自一年言之自五月至十一月而復得子月以一月言之自午日凡七日而復得子日以一紀言之自午嵗凡七嵗而復得子嵗天道運行其數如此合之為一紀分之為一嵗一月一日莫不皆然故六十卦當三百六十日而兩卦相去皆以七日聖人所以存其七日來復於復卦者明卦氣也陸希聲謂聖人言七日來復為厯數之微明是也王洙曰凡隂息則陽消自五月至十一月其日之厯行天七舎而陽氣乃復故云七日來復復初體震震居少陽其數七復則君子道長因慶之也慶在乎始其言速故稱日取乎日行一舎也臣難王洙曰周天三百六十五度二十八舎日行一度為一日行一舎與月合朔為一月洙取日行一舎故稱日葢用禇氏莊氏變月言日者欲見陽長欲速大同而小異要之日行七舎自是七月安有變月言日之理且如詩言一之日二之日止是省文葢言十一月之日十二月之日也王昭素曰乾有六陽坤有六隂一隂自五月而生屬坤隂道始進陽道漸消九月雖有一陽在上无奈衆隂之剥物也至十月則六隂數極十一月一陽復生自剥至十一月隔坤之六隂六隂盛時一陽自然息迹隂數既六過六而七則位屬陽以此知過坤六位即六日之象至於復為七日之象矣胡旦難昭素曰易緯以剥卦陽氣之盡在九月之末十月純坤用事隔坤一卦六日七分陽氣來復昭素以五月一隂生至九月雖有一陽无奈衆隂之剥物至十月六隂數極十一月一陽復生此則謂昆為兄竊禇莊之美為己力者也臣曰昭素雖掠禇莊之美其論乾坤消息隂陽六位周而復始得易之象虞翻陸績推六十卦以解太元八十一首於中言象中孚於周言象復是於六日七分卦氣之學既篤信之矣而翻注七日來復曰消乾六爻為六日剛來反初七日來復天行也績注京房易傳曰六陽涉六隂反下七爻在初故稱七日日亦陽也豈惟虞陸之學如此論六十卦者京房也而房作復傳曰七日來復六爻反復之稱葢天地之間有是理則有是象有是象則有是術其致一也故子夏曰極六位而反於坤之復其數七日其物陽也安定曰凡厯七爻以一爻為一日故謂之七日伊川曰七變而為復故云七日蘇氏曰坤與初九為七皆言七日之象也易之為術深逺矣故鼎祚於此請俟來哲若陸希聲劉牧王洙龍昌期以七為少陽之數則无取焉並七日來復圖説五峯胡氏曰易卦有復孔子曰復反也所以反本復始求其全所由生也文集新安朱氏曰復陽復生於下也剥盡則為純坤十月之卦而陽氣已生於下矣積之踰月然後一陽之體始成而來復故十有一月其卦為復以其陽既往而復反故有亨道又内震外坤有陽動於下而以順上行之象故其占又為己之出入既得无疾朋類之來亦得无咎又自五月姤卦一隂始生至此七爻而一陽來復乃天運之自然故其占又為反復其道至於七日當得來復又以剛德方長故其占又為利有攸往也反復其道往而復來來而復往之意七日者所占來復之期也本義廣漢張氏曰天地之心其體則微於動之端斯以見之其端伊何維以生生羣物是資而以日亨其在於人純是惻隠動匪以斯則非天命曰義禮知位雖不同揆厥所基脈絡該通曷其保之日乾夕惕斯須不存生道或息養而无害敬立義集是為復亨出入无疾伊傳復卦義贊東萊吕氏曰復卦一陽生雖五隂之盛不能抑遏猶人善端之生雖習氣豈能昬之猶笋迸於石自然發生豈有障礙故曰復亨然善端初生全在愛惜保䕶不可戕損方能德聚而不孤所以繼之以出入无疾朋來无咎易説又荅朱元晦書近事頗似有陽復之漸但出入无疾朋來无咎兩句大索致意耳或問利有攸往向説當作純亦不已看恐亦有時乗有為之意荅曰隨卦義看難立定説也又易臨傳曰至于八月有凶八月謂陽生之八月陽始生於復自復至遯凡八月自建子至建未也二隂長而陽消矣又剥傳曰一隂長則一陽消至建戌則極而成剥又復傳曰姤陽之始消也七變而成復故曰七日猶七更也今總以圖明之文集彖曰復亨剛反動而以順行是以出入无疾朋來无咎反復其道七日來復天行也利有攸往剛長也復其見天地之心乎康節先生漁樵對問樵者問漁者曰復何以見天地之心乎曰先陽已盡後陽始生大則當天地始生之際中則當日月始周之際末則當星辰始終之際萬物死生寒暑代謝晝夜變遷非此无以見之當天地窮極之所必變變則通通則久故象言先王以至日閉闗商旅不行后不省方順天故也邵子外書又曰天地之心者生萬物之本也觀物外篇又觀物吟耳目聰明男子身洪鈞賦與不為貧因探月窟方知物未躡天根豈識人乾遇巽時觀月窟地逢雷處看天根天根月窟間來往三十六宫都是春擊壤集伊川先生曰復亨謂剛反而亨也陽剛消極而來反既來反則漸長盛而亨通矣動而以順行是以出入无疾朋來无咎以卦才言其所以然也下動而上順是動而以順行也陽剛反而順動是以得出入无疾朋來而无咎也朋之來亦順動也其道反復往來迭消迭息一有也字七日來復者天之運行如是也消長相因天之理也陽剛君子之道長故利有攸往一陽復於下乃天地生物之心也先儒皆以靜為見天地之心葢不知動之端乃天地之心也非知道者孰能識之並易傳人説復其見天地之心皆以謂至靜能見天地之心非也復之卦下面一畫便是動也安得謂之靜自古儒者皆言靜見天地之心惟某言動而見天地之心或曰莫是於動上求靜否曰固是然最難劉元承手編近取諸身百理皆具屈伸往來之義只於鼻息之間見之屈伸往來只是理不必將既屈之氣復為方伸之氣生生之理自然不息如復言七日來復其間元不斷續陽已復生物極必返其理須如此有生便有死有始便有終入闗語録復其見天地之心一言以蔽之天地以生物為心陳氏拾遺復者反本也本有而去之今來復乃見天地之心也乃天理也此賢人之事也大全集拾遺復卦非天地之心復則見天地之心聖人无一作未嘗復故未嘗見其心語録横渠先生曰復言天地之心咸恒大壯言天地之情心内也其原在内時則有形見情則見於事也故可得而名状自姤而剥至於上九其數六也剥之與復不可容線須臾不復則乾坤之道息也故適盡即生更无先後之次也此義最大臨卦至于八月有凶此言七日來復何也剛長之時豫戒以隂長之事故言至于八月有凶若復則不可須臾斷故言七日七日者晝夜相繼元元斷續之時也大抵言天地之心者天地之大徳曰生則以生物為本者乃天地之心也地雷見天地之心者天地之心惟是生物天地之大徳曰生也雷復於地中却是生物彖曰終則有始天行也天行何嘗有息正以靜有何期程此動是靜中之動靜中之動動而不窮又有甚首尾起滅自有天地以來以迄於今蓋為靜而動天則无心无為无所主宰常然如此有何休歇人之徳性亦與此合乃是已有苟心中造作安排而靜則安能久然必從此去蓋靜者進徳之基也易說藍田吕氏曰復極而反其本也自姤至剥隂日長而陽日消至於坤則无陽而隂極矣隂極則陽反故彼長則此消此盈則彼虛消長盈虛終則有始循環無窮理之必然者也復陽始生之卦也天地之大徳曰生方陽之消雖理之必然然非天地之本心故至陽始生則反行天地之本心故謂之復復亨陽進必亨也陽消為入長為出出入皆理之所必然非所病也方其未長羣隂朋來不足咎也所以无疾无咎者以反復其道七日來復故也陽自姤而始消剥盡六陽以為坤然後復故七日也陽之未長止可以无疾无咎至於來復然後利有攸徃以剛長也方陽之長生生无窮此天地之心也廣平游氏曰復其見天地之心乎天地之心主於生物復之時未有物也而物以陽復而生博愛者聖人之心也復禮未有愛也而博愛之實由復禮而出故序卦曰復則不妄无妄者天命也先王以此茂對時育萬物則於博施濟衆也何有易說龜山楊氏曰隂極而陽復復斯亨矣復剛反也震動而坤順動而以順行也一陽復於下而五隂在上則陽微而隂猶盛矣小人衆而君子獨非一人一日之力所能勝也動而不以順行則疾之者至則身之不能保尚何朋來之有故動而以順行而後出入无疾出入无疾而後朋來无咎夫隂陽一氣之往來也反復其道終則有始天行也七日謂自姤至復也姤隂始生也隂生則陽消矣故七日而後復夫四時之變浸而為寒暑固非一日之積也天且不能暴為之而況於人乎故剥以順止之復以順而行其道一也當是時陽微矣止而不行則剛終不可長也故利有攸徃夫復也者陽始生動之端也知復之道則天地之心可以黙識矣非盡心知性其孰能見之易說兼山郭氏曰復者去此而反其本之謂也凡易之道坤息消乾乾息消坤二氣徃來是以反其本者復也易以乾坤言形以天地言氣以隂陽言故乾坤之理天地之運隂陽之㑹无不反其始而後行故乾之初九復於甲子嵗功之出起於冬至之夜半七政之行復於牽牛之初以至律厯之紀四時之序无不反於此者所以黄鍾為萬事本此之謂也復者陽生之初動之始也故曰亨震者動也坤者順也剛反動而以順行是以出入无疾也朋者類也一陽生為復二陽生為臨方其未復也隂上而消陽柔下而阻剛方是時也朋來可乎是以待其陽復則朋來无咎也謂隂降而為朋則小人徃來蓋不得為明矣然獨陽不生獨隂不成二者相為消息亦无時而已也故陽一升而萬物生隂一升而萬物死其反也其復也各終於六位而時成是以知七日來復也然則四時之運行日月之代明豈物或使之然哉此天行之自然者也故孔子謂復其見天地之心乎夫然後知大徳之生生剛反動而以順行而已而說者謂易以靜為復天地以无心為心觀其自古以固存未有不由乎順行周旋之必信者也且卦之二體靜以法坤動以象震震已復於下雷已復於地中惡在其靜而已也然謂靜之終動之始斯可矣且復言七日臨言八月者隂陽之辭也故言陽以尚消息盈虛之自然言隂亦内外使之知懼也易說和靖尹氏對楊子安問復其見天地之心曰或謂靜為天地之心非也一作天地以生物為心非為靜也天地以生物為心終而復始之義剥卦若終剥則成坤以一陽處五隂之上故剥極則復復則一陽居初也伊川曰此如詩之下泉匪風之作故次以豳又次之鹿鳴也否卦上九陽剛或能傾否屯卦上六隂柔故不能濟屯也語録白雲郭氏曰先人曰先儒謂易以靜為復天地以无心為心觀其自古以固存未有不由乎順行周旋之必信者也且卦之二體靜以法坤動以象震震已復於下雷已復於地中惡在其靜而已也然謂靜之終動之始斯可矣雍曰復以剛反而亨則天地萬物皆有待於剛者也剛故動柔故靜物久於靜不能自動是所以有待於剛然後動而亨也如此則復主動而非靜姤主靜而非動動靜之義係乎剛柔之反也有震之動有坤之順以是行焉則上順天地之道下順萬物之理是以出入行於自然无遲速之異也且剛柔反復其運不停自其小者視之四時日月可見也故在易之中一陽為復進而為臨為泰為大壯為夬為乾一隂為姤進而為遯為否為觀為剥為坤皆其出也陽出則隂入隂出則陽入隂陽出入反復如此孰為遲速故无疾而有常也朋來之後然後道大亨而功成故言无咎天行者自天道以言之七日之復是也由七日之復以觀則三才萬物之復莫不皆然復其見天地之心者天地固无心於萬物也而萬物有心於天地因其有心於天地言之故曰天地之心然萬物資天地以有生故天地於是乎生萬物則天地之心无它焉生物而已是以繫辭言天地之大徳曰生以有生故有徳有徳則有心矣復為生物之始是所以見天地之心也然復之時義大矣而彖不言大矣哉者蓋復非小道不待言而可知也姤遇之事有至小者存焉聖人欲人遺其小而玩其大者故姤言大矣哉也天地无心於隂陽剛柔也窮極而變者天地之心也自生萬物觀之則七日來復以生為天地之心矣自它道觀之皆然故出入无疾反復其道可觀天地之心如此況人乎並易說漢上朱氏曰復本坤而乾交之隂陽之反皆自内出非由外來而出入云者以剥復明消息之理也剥極成坤陽降而入坤極而動陽升而出入其反也出其動也其出其入羣隂莫能害之害之之謂疾言剛反動而得位也坤為順剛反動而得位以順道而上行斯復所以亨歟朋陽之類也一陽來復而得位无咎者以正也剛動則不累於物以順行則不違其時正則和而不同斯朋來所以无咎也夫復所以亨者豈一君子之力哉譬如舟車必相濟達已先則挽之彼先則推之然後并心協力其道大行故曰復亨剛反動而以順行是以出入无疾朋來无咎此合坤震兩體初九之動以言復亨也天道之行極則來反徃則必復其復之數自午至子不過於七陽生於子隂生於午剥復七變陽渉六隂極而反初日也月也嵗也天地五行之數所不可違而必曰七日者明律厯之元也故日月五星始於牽牛氣始於夜半厯始於冬至律始於黄鐘子雲得之為八十一首以盡一元六甲三統九㑹二百四十二章之數邵雍得之明日月星辰元㑹運世以窮天地消長无極之數而雍嘗謂子雲作太𤣥其得天地之心乎故曰反復其道七日來復天行也此推剥復之變言復之數也陽自復而往為臨為泰為大壯為夬為乾孰禦之哉君子之道剛進而長莫或禦之必至於盛夫子曰如有用我者期月而已三年有成孟子曰以齊王猶反手也荀卿曰三年天下如一諸侯為臣非虚語也故曰利有攸往剛長也此自復推之至乾以言復之成也易以天地明聖人之心以為无乎不可也以為有乎不可也觀諸天地則見其心矣天地以萬物為心其消也乃所以為息其往也乃所以為來往極而來復復則萬物生生者天地之大徳也以其所見論其所不見天地之心其可知矣故曰復其見天地之心乎此以初九剛動言復之始也始而亨亨則有成矣王弼謂天地以本為心寂然至无是其本矣此雷在地中之象也彖之取象在於陽剛反動而已易无非象也彖也大象也小象也其象各有所冝不可以一槩論在卦氣為冬至故太𤣥準之以周易傳新安朱氏曰剛反則亨動而以順以卦徳而言隂陽消息天運然也剛長也以卦體而言既生則漸長矣復其見天地之心乎積隂之下一陽復生天地生物之心幾於滅息而至此乃復可見在人則為靜極而動惡極而善本心幾息而復見之端也程子論之詳矣而邵子之詩亦曰冬至子之半天心无改移一陽初動處萬物未生時𤣥酒味方澹大音聲正希此言如不信更請問包犧至哉言也學者冝盡心焉本義天地之心動後方見聖人之心應事接物方見出入朋來只做人說覺不勞攘七日只取七義猶八月有凶只取八義問復卦剛反當作一句否曰然此二字是解復亨下云動而以順行是解出入无疾以下大抵彖辭解得易極分明子細尋索儘有條理問復見天地之心先生云天地所以運行不息者做箇甚事只是生物而已生於春長於夏至秋萬物咸遂如收斂結實是漸欲離其本之時也及其成則物之成實者各具生理所謂碩果不食是己夫具生理者固各繼其生而物之歸根復命猶自若也如說天地以生物為心斯可見矣又問既言心性則天命之謂性命字有心底意思否曰然流行運用是心問程子言先儒皆以靜為見天地之心不知動之端乃天地之心動處如何見得曰這處便見得陽氣發生其端已兆於此春了又冬冬了又春都從這裏發去事物間亦可見只是這裏見得較親切問王輔嗣說寂然至无乃見天地心如何曰他說无是胡說若靜處說无不知下面一畫作甚麽問動見天地之心固是不知在人可以主靜言之否曰不必如此看這處在天地則為隂陽在人則為善惡有不善未嘗不知知之未嘗復行不善處便是隂知處便屬陽上五隂下一陽是當沈迷蔽錮之時忽然一夕省覺便是陽動處齊宣王興甲兵危士臣構怨於諸侯可謂極矣及其不忍觳觫即是善端之萌肯從這裏做去三王事業何患不到問一陽復於下乃天地生萬物之心也先儒皆以靜為天地之心惟程先生言動之端乃天地之心竊謂十月純坤不為无陽天地生萬物之心未嘗間息但未動耳因動而生物之心始可見曰十月陽氣收斂一時闗閉得盡天地生物之心固未嘗息但无端倪可見惟一陽動則生意始發露出乃始可見端緒也言動之頭緒於此處起起處方見得天地之心也因問在人則喜怒哀樂未發時而所謂中節之體已各完具但未發則寂然而已不可見也特因事感念動而惻隱羞惡之端始覺因事發露出來非因動而漸有此也曰是楊道夫以疑目質之先生其别有九其六曰南軒先生荅吳晦叔書云反復其道正言消長徃來乃是道也程子所謂聖人未嘗復故未嘗見其心蓋有徃則有復以天地言之陽氣之生所謂復也固不可指此為天地心然於其復也可見天地心焉蓋所以復者是也在人有失則有復復賢者之事也於其復也亦可見其心焉道夫竊謂聖人之心天地之心也聖人雖无復然是心之用因時而彰故堯之不虐舜之好生禹之拯溺湯之救民於水火文王之視民如傷是皆以天地之心為心者也故聖賢之所推尊學者之所師慕亦以其心顯白而无暗曖之患耳而謂不可見何哉先生曰不知程子當時說如何欽夫却恁說大抵易之言隂陽有指君子小人而言有指天理人欲而言有指動靜之機而言初不可以一偏而論如天下皆君子而无小人皆天理而无人欲其善无以加有若動不可以无靜靜不可以无動蓋造化不能以獨成而或者見其相資而不可相无也遂以為天下不可皆君子而无小人不能皆天理而无人欲此得其一偏之論只如有不善未嘗不知知之未嘗復行此賢者之心因復而見者至若聖人則无此故其心不可見然亦有因其動而見其心者正如公所謂堯之不虐舜之好生皆是因其動而見其心者只當時欽夫之語亦未分明問朋來无咎曰復卦一陽方生疑若未有朋也然陽有剛長之道自一陽始生而漸長以至於極則有朋來之道而无咎也反復其道七日來復天行也消長之道自然如此故曰天行處隂之極亂者復治徃者復還凶者復吉危者復安天地自然之運也問天地生物之心未嘗須臾停然當氣候肅殺草木摇落之時此心何以見曰天地此心常在只是人看不見故必到復而後始可見問復其見天地之心天地之心雖靜未嘗不流行何為必於復乃見天地之心先生曰三陽之時萬物蕃新只見物之盛大天地之心却不可見惟是一陽初復萬物未生冷冷靜靜而一陽既動生物之心闖然而見雖在積隂之中自藏掩不得此所以必於復見天地之心也銖曰邵子所謂元酒味方澹大音聲正希正謂此否先生曰正是此意不容别下注脚矣又問天心无改移謂何先生曰年年嵗嵗是如此月月日日是如此又問純坤之月可謂至靜然昨日之靜所以養成今日之動故一陽之復乃是純隂養得出來在人則主靜而後善端始復在天地之化則是終則有始貞則有元也先生曰固有此意但不是此卦大義大象所謂至日閉闗者正是於已動之後要以安靜養之蓋一陽初復陽氣甚微勞動它不得故當安靜以養微陽如人善端初萌正欲靜以養之方能盛大若如公說却是倒了問復非天地心復則見天地心先生曰此語與所以隂陽者道之意不同但以易傳觀之則可見矣蓋天地以生物為心而此卦之下一陽爻即天地所以生物之心也至於復之得名則以此陽之復生而已猶言臨泰大壯夬也豈得遂指此以名為天地之心乎但於其復而見此一陽之萌於下則是因其復而見天地之心耳天地以生物為心此句自无病昨與南軒論之近得報云亦已无疑矣大抵近世學者不肯以愛言仁故見先生君子以一陽生物論天地之心欿然不滿於其意復於言外生說推之使高而不知天地之所以為心者實不外此外此為言則必溺於虛淪於靜而體用本末不相管矣聖人无復故未嘗見其心者蓋天地之氣所以有陽之復者以其有隂故也衆人之心所以有善之復者以其有惡故也若聖人之心則天理渾然初无間斷人孰得以窺其心之起滅邪若靜而復動則亦有之但不可以善惡而為言耳天地之心動方見聖人之心應事接物方見問程子以動之端為天地之心動乃心之發處何故云天地之心先生曰此須就卦上看上坤下震坤靜震動十月純坤當貞之時萬物收斂寂无蹤跡到此一陽復生便是動然不直下動字却云動之端端是從此起雖動而物未生未到大動處凡發生萬物都是從這裏起豈不是天地之心或問天地之心不可測識惟於一陽來復乃見其生生不窮之意所以為仁也某謂若果如此說則是一陽來復以前别有一截天地之心漠然无生之意直到一陽之復見其生生不窮然後謂之仁也如此則體用乖離首尾衡決成何道理王弼之說便是如此所以見闢於程子也須知元亨利貞便是天地心而元為之長故曰大哉乾元萬物資始便是有此乾元然後萬物資之以始非因萬物資始然後得元之名也問向來觀復其見天地之心乎易傳云動之端乃天地之心也未覩其㫖近思得之敢質於先生愚謂天地之心生生不已太極一動二氣運行互為其根蓋未嘗或息非可以動靜言也其曰動之端云者指流行之體示人即生物之原者也遺書云天只是以生為道天地之心固在於生物然於生處觀之則偏於動而不知動之所以然非指其端无以見生生之理在人則惻隱之心是也乍見孺子將入井必有􅇶惕惻隱此心不逺於此察之庶可見矣此心雖非心之本體然始發見在是故推此心則廓乎天地之間无所不愛人惟汨於欲而不知復則是心泯然不見猶窮隂沍塞萬物歸根生生之理雖未嘗或息何自見之一陽微動生意油然此復所以見天地之心也在學者工夫則平日涵養語黙作止須要識得端倪則心體昭然可黙識矣故伊川云善學者不若於己發之際觀之觀於已發識其未發克己不己一旦復之則造次顛沛皆見此心之妙始可以言仁矣先生曰此須通動靜隂陽善惡論之見得各是一理而此意无所不通始盡其曲折耳學者工夫則只如易傳所說知其不善則速改以從善此是要約處若說須要識得端倪而心體可識却是添却一事又云昨承問及復卦之說如所喻固善然隂陽生殺固有間斷而亦不容並行且如人方窮物欲豈可便謂其間天理无有間斷而肆其欲哉須要窮欲之心滅息然後天理乃得萌耳程夫子所謂天地間雖无截然為隂為陽之理然其升降生殺之大分不可无也此語最為完備然隂陽動靜是造化之機不能相无者若善惡則有真妄之分人當克彼以復此然後可耳但所謂可識心體者終覺有病蓋窮理之學只是要識如何為是如何為非事物之來无所疑惑耳非以此心又識一心然後得為窮理也問復見天地之心先生曰要認得見字親切蓋此時天地之間无物可見天地之心只有一陽初生淨淨潔潔見得天地之心在此若是三陽發生萬物之後則天地之心散在萬物則不能見得如此端的問天地之心天地之理理是道理心是主宰底意思否先生曰心固主宰底意然所謂主宰者即是理也不是心外别有箇理理外别有箇心又問此心字與帝字相似否先生曰人字似天字心字似帝字也問復其見天地之心蓋生理初未嘗息但到坤時藏伏在此至復乃見其動之端否曰不是如此這箇只是就隂陽動靜闔闢消長處而言如一堆火自其初發以至漸漸發過消盡為灰其消之未盡處固天地之心也然那消盡底亦天地之心也但那箇不如那新生底鮮好故指那接頭再生者言之則可以見天地之心親切如云利貞者性情也一元之氣亨通發散品物流形天地之心盡發見在品物上但叢雜難看及到利貞時則萬物悉已收斂那時只有箇天地之心單單著見故云利貞者性情也正與復其見天地之心相似康節云一陽初動處萬物未生時蓋萬物生時此心非不見也但天地之心悉已布散叢雜无非此理呈露到多了難見若㑹看者能於此觀之則所見无非天地之心矣惟是復時萬物皆未生只有一箇天地之心昭然著見在這裏所以易看也問今寂然至靜在此若一念之動此便是復否曰恁地說不盡復有兩様有善惡之復有動靜之復兩様復自不相須須各看得分曉終日營營與萬物並馳忽然有惻隱是非羞惡之心發見此善惡為隂陽也若寂然至靜之中有一念之動此動靜為隂陽也二者各自不同須推敎子細伊川與濓溪說這復字亦差不同濓溪說復字就歸處說伊川就動處說所以不同然濓溪就坤上說就回來處說如云利貞者誠之復誠心復其不善之動而已矣皆是就歸來處說伊川却正就動處如元亨利貞濓溪就利貞上說復字伊川就元字頭說復字以周易卦爻之義推之則伊川之說為正然濓溪伊川之說道理只一般非有所異只是所指地頭不同以復卦言之下面一畫便是動處伊川云下面一爻正是動如何說靜雷在地中復云云看來伊川說得較好王弼之說與濓溪同問一陽初動處萬物未生時以人心觀之便是善惡之端感物而動處曰此是欲動未動之間如􅇶惕惻隱於赤子入井之初方􅇶惕惻隱而未成􅇶惕惻隱之時故止云冬至子之半是康節常要就中間說子之半則是未成子方離於亥而為子方四五分是他常要如此說隂陽之間動靜之間便與周濓溪程先生不同周程只是五行一隂陽也隂陽一太極也太極本无極也只是體用動靜互换无極康節便只要說循環便須指消息動靜之間便有方了不似二先生問或問中坤卦純隂不為无陽之說如何曰雖是十月為坤十一月為復然自小雪後其下面一畫便有三十分之一分陽生至冬至方足得一爻成耳故十月謂之陽月蓋嫌於无陽也自姤至坤亦然曰然則陽畢竟有盡時矣曰剥盡於上則復生於下其間不容息也問十月是坤卦陽已盡乎荅曰隂陽皆不盡至此則微微一線路過因而復發耳用之問蘇季明問伊川喜怒哀樂未發之前求中一段云云下面說復卦便是說靜中有動靜不是如瞌睡底靜中間常自有箇主宰執持後又說艮卦又是說動中要靜復卦便是一箇大飜轉底艮卦艮卦便是兩箇飜轉底復卦復是五隂下一陽艮是二隂上一陽陽是動底物事隂是靜底物事道夫言向者先生敎思量天地有心无心近思之竊謂天地无心仁便是天地之心若使其有心必有思慮有營為天地曷嘗有思慮來然其所以四時行百物生者蓋以其合當如此便如此不待思維此所以為天之道曰如此則易所謂復其見天地之心正大而天地之情可見又如何如公所說祇說得他无心處耳若果無心則須牛生出馬桃樹上發李花又却自定程子曰以主宰謂之帝以性情謂之乾他這名義自定心便是他箇主宰處所以謂天地以生物為心中間欽夫以為某不合如此說某謂天地别无勾當只是以生物為心一元之氣運轉流通略無停閒只是生出許多萬物而已問程子謂天地无心而成化聖人有心而无為曰這是說天地无心處且如四時行百物生天地何所容心至於聖人則順理而已復何為哉所以明道云天地之常以其心普萬物而无心聖人之常以其情順萬事而无情說得最好問普萬物莫是以此心周徧而无私否曰天地以此心普及於物人得之遂為人之心物得之遂為物之心草木禽獸接著遂為禽獸草木之心只是一箇天地之心耳今須要知得他有心處又要見得他无心處只恁定說不得天下之物至微至細者亦皆有心只是有无知覺處耳且如一草一木向陽處便生向隂處便憔悴他有箇好惡在裏至大而天地生出許多萬物運轉流通不停一息四時晝夜恰是有箇物事􅂿恁地去天地自有箇无心之心復卦一陽生於下這便是生物之心又如所謂惟皇上帝降衷于下民天道福善禍滛這便是分明有箇人在這裏主宰相似心是他本領情是他箇意思道夫問冬至子之半天心无改移一陽初動處萬物未生時元酒味方澹大音聲正希此言如不信更請問包犧先生曰康節此詩最好某於復卦本義亦載此詩蓋立冬是十月初小雪是十月中大雪十一月初冬至十一月中小寒十二月初大寒十二月中冬至子之半即十一月之半也人言夜半子時冬至蓋夜半以前一半已屬子時今推五行者多不知之然數每從這處起略不差移此所以為天心然當是時一陽初動萬物未生未有聲臭氣味之可見所謂元酒味方澹大音聲正希也並語録又復齋記昔者聖人作易以擬隂陽之變於陽之消於上而息於下也為卦曰復復者反也既徃而來反夫大徳敦化而川流不窮豈假夫既消之氣以為方息之資也哉亦見其絶於彼而生於此而因著其徃來之象爾唯人亦然大和保合善端無窮所謂復者非曰追夫已放之心而還之録夫已棄之善而屬之也亦曰不肆焉以騁於外則本心全體即此而存固然之善自有所不能已耳嗚呼聖人於復之卦所以賛其可見天地之心而又以為徳之本者其不以此歟文集廣漢張氏題李直卿復齋詩曰李候索我復齋詩此理難明信者稀要識聖人端的意須於動處見天機又萬化根原天地心幾人於此費追尋端倪不逺君看取妙用何曽間古今復卦下面一畫乃是乾體其動以天且動乎至靜之中為動而能靜之所以為天地心乎南軒集東萊吕氏曰剥之後繼之以復蓋陽无剥盡之理剥窮上反下纔到窮則必復此自然之理積惡之極則必思復善積邪之極則必思復正積隂之極則必思復陽且以剥之上九一爻觀之曰碩果不食譬之植果實既蕃必須採而食之餘果雖皆剥落其中須遺一兩顆不能盡食便自有發生意天地生生之理元不曾消滅得盡此剥之後所以必有復也夫復自大言之則天道隂陽消長有必復之理自小言之則人之一心善端發見雖窮凶極惡之人此善端亦未嘗不復纔復便有亨通之理且以卦體之爻觀之初九一陽潛伏於五隂之下雖五隂積累在上而一陽既動便覺五隂己自有消散披靡氣象人有千過萬惡叢萃一身人之善心一復則雖有千過萬惡亦便覺有消散披靡氣象是纔復便有亨通之理天地發生之物最是於萌蘖始生之時要人營䕶保養且如草木萌動根芽初露易被推殘惟能於將生之際遮覆蓋䕶則枝枝葉葉漸漸條達人之善端初發亦多為衆惡陵鑠惟是於出入將發之時養而无害然後自然朋來朋謂助也如所謂徳不孤必有鄰凡善類皆朋也凡日用間遇事有互相發明吾之善者皆朋也萬善㑹聚於吾身自然无咎自復亨下數句次序節目整然不亂反復其道七日來復此是天道消息盈虛自然之理如自一陽之復積而至於二陽之臨三陽之泰四陽之大壯五陽之夬六陽之乾皆反復自然之天道人於善心發處便充長之自可欲之善積而至於聖而不可知之之神亦是性中所固有故出入无疾入者謂剥之上九一爻來入於復之初九故謂之入出者謂初九一爻漸出而為九二九三九四九五上九故謂之出利有攸往此一句最是做工夫處天道到一陽始復時便自此浸浸而徃人於善心發處便自此迤邐充長去亦何所不到只為人纔到善心發處又為人欲障蔽不能利有攸往人善心悔處日用間甚多或聴言而於心有悔或因觀書而於心有動或於應接事物而有警悟於心日用間復處甚多雖大姦大惡之人亦然惟其不能利有攸徃故至於頻復耳彖者聖人言一卦大體之意也剛反二字最要看天道至於復時何故都无障蔽為天能剛反剛反二字見得天道復處人惟其不能剛反雖動而又以逆行故不能利有攸徃惟天道能剛反動而以順行是以出入无疾朋來无咎反復其道七日來復天行也天行是解上兩句所以如此者是天道自然之運用也學者最要就天行上看天道之有復乃天行自然之道理人之善心發處亦人心固有之理天道到復時便運行无間人何故於善心發處乃不似天之順動而善心又多泯没蓋為天以无心運用人以私意障蔽人雖以私意障蔽然秉彛終不可泯没便是天行无間之理利有攸往剛長也惟剛長便能利有攸往又曰復其見天地之心乎此一句最不可以言語解而可以身反觀天地以生物為心人能於善心發處以身反觀之便見得天地之心並易說象曰雷在地中復先王以至日閉闗商旅不行后不省方伊川先生曰雷者隂陽相薄而成聲當陽之微未能發也雷在地中陽始復之時也陽始生於下而甚微安靜一作順而後能長先生順天道當至日陽之始生安靜以養之故閉闗使商旅不得行人君不省視四方觀復之象而順天道也在一人之身亦然當安靜以養其陽也易傳聖人無一事不順天時故至日閉闗陳氏拾遺横渠先生曰物因雷動雷動不妄則物亦不妄故曰物與无妄靜之動也无休息之期故地雷為卦正䝉凡言后者大率謂繼體守成之主也復言先王以至日閉闗商旅不行后不省方以此校之則后為繼承之主明矣先王以至日閉闗者先王所重於至日以其順隂陽徃來閉闗者取其靜也閉闗則商旅不行先王无放過事順時以示法亦以示民后不省方如言富庶優暇不甚省事又明是繼承之主易說藍田吕氏曰雷在地中微陽始生靜以養之待盈而發也閉闗涂止行者皆以養微陽也龜山楊氏曰雷在地中閉而未發先王不先時而動所以事天也易說白雲郭氏曰坤為靜之終復為動之始雷在地中則動已萌矣而未奮也然天地萬物之理得陽則舒得隂則慘故人喜陽之復而畏剛之剥也先王至日閉闗助陽道也喜陽之復懼其微弱而人泄之以先奪陽氣則陽愈微而不進是以閉闗而固其氣以助之蓋三才一氣耳方天地欲動而人爭先之是爭天地之動以損天地之氣也聖人欲奉天時莫不先天地而後人從之是所以閉塞人事以助天地之發也後世為月令者於仲冬之月塗闕廷門閭築囹圄以助天地之閉藏蓋假此以為義誤以至日閉闗為天地閉藏之時也夫至日日至也天地至復則動而將發生先王至日閉闗正謂陽氣方動而微懼人道分奪其氣先動以泄之故至日閉闗以奪人動發之氣是所以助天地生生之義也何閉藏之有哉易說漢上朱氏曰天下之至動莫如雷雷在地中動復於靜復本之時也復冬至之卦剥艮為門闕反則閉闗閉闗以止動者也巽為近利市三倍風行地上為觀民設敎復震見巽伏故商旅不行后不省方不行不省方則動者靜夏小正十一月萬物不通夫子賛易兼用夏小正易傳新安朱氏曰安靜以養微陽也月令是月齋戒揜身以待隂陽之所定本義問陽始生甚微安靜而後能長故復之象曰先王以至日閉闗人於迷途之復其善端之萌亦甚微故須莊敬持養然後能大不然復亡之矣曰然又曰古人所以四十強而仕者前面許多年亦且養其善端若一下便出來與事物滚了豈不壊事問復卦先王以至日閉闗程傳謂陽之始生至微當安靜以養之恐是十月純坤之卦陽已養於至靜之中至是方成體耳先生曰非也養於既復之後時舉因論學云雷在在地中復先王以至日閉闗商旅不行后不省方在學者分上便是要安靜涵養這些子善端耳先生曰若著實做工夫要知這說話也不用說若㑹做工夫便一字也來這裏使不著此說其不欲說與人却恐學者聴去便做空虛認了並語録又詩曰朱光徧炎宇微陽眇重淵寒威閉九野陽徳昭窮泉文明昧謹獨昬迷有開先幾微諒難忽善端本緜緜掩身事齋戒月令夏至冬至君子皆齋處必掩身及此防未然此二句兼冬至夏至說閉闗息商旅所以養陽氣也絶彼柔道牽題劉屏山琴曰匪金匪石含至貞兮雷蟄于腹閟其神兮鏗然一作萬物皆春兮我覿器寶懷若人兮主靜觀復修厥身兮與時偕極而不及其申兮文集東萊吕氏曰復自十一月觀之嚴霜暴雪正萬物摧挫時无有生意安得有雷不知雷聲已自潛於黄鍾之宫但雷伏在地下雖无朕兆之可見无聲音之可聞人自不知其所謂復蓋積隂沍寒之後而陽氣發生之理具在地中不輕發用者甚有力如人雖為窮凶極惡之事積於一身自外觀之若終无悔過之心然固有之良心亦自具在或有動於中誰得知之先王以至日閉闗前人之說多以為保養此善端先王知天地之心如此故以體法此說固不碍理究竟未是此皆聖人實事聖人以天地為本隂陽為端隨天時之動靜而應之當復之時靜以處之則盡裁成輔相之道苟不靜以處之則擾亂天地之性術數家以為厭禳之法固為鄙陋若只作故事看亦非須知先王以天人為一體人有善心不能充長蓋人以天人為兩體故也易說初九不逺復无祗悔元吉象曰不逺之復以脩身也伊川先生曰復者陽反來復也陽君子之道故復為反善之義初剛陽來復處卦之初復之最先者也是不逺而復也失而後有復不失則何復之有唯失之不逺而復則不至於悔大善而吉也祇宜音柢抵也玉篇云適也義亦同无祇悔不至於悔也坎卦曰祇既平无咎謂至既平也顔子无形顯之過夫子謂其庶幾乃无祗悔也過既未形而改何悔之有既未能不勉而中所欲不踰矩是有過也然其明而剛故一有不善未嘗不知既知未嘗不遽改故不至於悔乃不逺復也不逺而復者君子所以脩其身之道也學一有問字之道无他也唯其知不善則速改以從善而已並易傳抵與底通使底至也无至於悔朱公掞拾遺横渠先生曰祇猶承也受也一云祇悔作神祇之祇祇之為義示也効也見也言悔可使亡不可使成而形也易說藍田吕氏曰初九處復之初而以一陽居衆陽之始自坤而來陽消未逺故曰不逺復龜山楊氏曰初九陽始生而未形動之微也吉凶悔吝生乎動者也未形而復其復不逺矣故不至於悔而元吉顔淵之殆庶幾其以是歟易說白雲郭氏曰卦辭言出入无疾朋來无咎統復道而言之也至于七日來復則指天行而言是復道之一也爻象言君子脩身蓋亦復也凡易之一卦其義象皆不可窮盡聖人卦爻彖象之外不能悉言者多矣就其所言之中已具數義學者當觸類通之以極廣大而已如乾象為天為馬豈能拘於大小之間哉昭昭之多與天同一撮土之多與地同一卷之石與山嶽同一勺之水與河海同道无間於小大故也復之初九顔子盡之能不貳過故不逺而復於道苟貳過則逺矣雖然有不善未嘗不知則蓋嘗有過也有過則有悔唯不貳過故其悔小而无大悔也凡充有悔之極則有大凶充无悔之極則有大吉以其不逺復故知无祇悔以其无祇悔故終知其元吉也此顔子克己復禮之道故象言脩身也易說漢上朱氏曰外為逺内為近剥初嘗失矣變復九自外來内不逺也反動而剛復也失而後有復不失則無復矣初者九之位正其固有也初正者善之端脩身之始未有不正其心而能修身者以天地言之始於剛反動而正乃能遂萬物而成其德故曰不逺復以脩身也坤為身易傳曰祇抵也馬融音之是反初動不正不正則抵乎悔知不正為不善之端而復於正則无祇悔俟其悔之而後復之復亦逺矣无祇悔則元吉元吉者吉之至善故曰无祇悔元吉夫幾者動之微吉之先見也顔子不善未嘗不知知之未嘗復行无祇悔也故夫子賛之曰顔氏之子其殆庶幾乎易傳屏山劉氏曰易故多術或尚其辭或尚其變或尚其象或尚其占皆用也盡其本則用自應何謂本復是已嘗竊為之說曰學易者必有門户復卦易之門户也入室必自户始學易者必自復始得是者其惟顔子乎不逺而復稱為庶幾易繫辭曰顔氏之子其殆庶幾乎有不善未嘗不知知之未嘗復行庶幾近也謂近於易不逺復之義蓋本夫子嘗以復禮為仁之說告之矣顔子躬行允蹈遂臻其極一己既克天下歸仁復之功至矣固有之仁本無彼此迷而不復妄自分隔且吾身在天地中一物耳天地在吾仁中亦一物耳學者曉此方得想像說得仁體意隔情礙如何天下歸仁惟踐履實地自然洞徹為一顔子終日如愚論語所載惟發二問一為仁一為邦夫子答之皆極天理人事之大者天理謂克己復禮全一性之天也人事謂行夏時乘商輅服周冕樂韶舞四事也原易之用内焉惟窮理盡性外焉惟開物成務顔子盡之雖無諸子之著譔謂之通易可也又曰復之一義為平白坦易之塗聖人善誘之上機學者用心之急務也雖然學易當自復始而復非易也愚夫昧易才士口易賢人玩易聖人忘易昧不通也口能言不能行也玩依倣也忘無心與之俱化也玩而不忘易之病也忘似昧聖似愚通易者知之矣余嘗作復齋銘曰大易之㫖微妙難詮且縁切謂審釋考究也善學易者以復為先惟人之生咸有是性喜怒哀樂或失其正視而知復不蝕其明蝕食音日月薄蝕初雖晦未幾又明人能知復則其明不損聴而知復不流於聲言而知復匪易匪輕動而知復悔吝不生惟是四知本焉則一孰覺而存孰迷而失勿謂有本勞思内馳亦勿謂无悠悠弗思廓爾貫通心冥取舍既復其初无復之者蕩蕩坦坦周流六虛昔非不足今非有餘伊顔氏子口不言易庶幾之功黙臻其極今我仰止以名斯齋念兹在兹其敢怠哉屏山文集新安朱氏曰一陽復生於下復之主也祇抵也又居事初失之未逺能復於善不抵於悔大善而吉之道也故其象占如此本義問不逺復无祇悔祗字何訓曰書中祇字只有這祇字使得來别看來只得解做至字又有訓多為祇者如多見其不量也多祇也祇與只同廣漢張氏曰子曰顔氏之子其殆庶幾乎有不善未嘗不知知之未嘗復行易曰不逺復无祇悔元吉甲申孟秋朔先公次餘千暑甚憇趙氏養正堂每閒暇親翰墨多寫經書要言置縑囊中累十百紙先公易簀於仲秋不肖孤哀苦謹藏遺澤不忍發讀越二年前進士太原陳伯雄來相弔於湘水之上自以嘗在江淮辱先公誨言欲求字畫而歸為子孫藏予慟開篋取此紙授之鳴呼學聖人必其極今我仰止以名斯齋念兹在兹其敢怠哉屏山文集新安朱氏曰一陽復生於下復之主也祇抵也又居事初失之未逺能復於善不抵於悔大善而吉之道也故其象占如此本義問不逺復无祇悔祗字何訓曰書中祇字只有這祇字使得來别看來只得解做至字又有訓多為祇者如多見其不量也多祇也祇與只同廣漢張氏曰子曰顔氏之子其殆庶幾乎有不善未嘗不知知之未嘗復行易曰不逺復无祇悔元吉甲申孟秋朔先公次餘千暑甚憇趙氏養正堂每閒暇親翰墨多寫經書要言置縑囊中累十百紙先公易簀於仲秋不肖孤哀苦謹藏遺澤不忍發讀越二年前進士太原陳伯雄來相弔於湘水之上自以嘗在江淮辱先公誨言欲求字畫而歸為子孫藏予慟開篋取此紙授之鳴呼學聖人必學顔子則有準的顔氏之所以為有準的何也以其復也復則見天地之心成位乎中而人道立矣然而欲進於此奈何其惟格物以至之而克己以終之乎嗚呼此先公之所以敎某者今併以告陳子南軒集六二休復吉象曰休復之吉以下仁也伊川先生曰二雖隂爻處中正而切比於初志從於陽能下仁也復之休美者也復者復於禮也復禮則為仁初陽復復於仁也二比而下之所以美而吉也為復之休美而吉者以其能下仁也仁者天下之公善之本也初復於仁二能親而下之是以吉也並易傳横渠先生曰下比於陽故樂行其善易說藍田吕氏曰六二居中而下比於陽所以為休龜山楊氏曰過而後有復顔淵不貳過猶有過也而未形焉其復不逺矣非克己者其孰能之茲其所以為仁歟盡斯道者惟初乎六二柔順中正无過而復休而復者也其復也從初而已故曰以下仁也中正而親仁吉孰加焉易說白雲郭氏曰孟子稱樂正子好善優於天下又曰可欲之謂善有諸己之謂信充實之謂美休美也充好善之實孟子之所以為美盡下仁之道復之所以為休其義一也不逺之復克己者也克己復禮仁也故六二之下初九所以為下仁也然古之人修身者豈徒然哉所以為齊家治國平天下之始也聖人之治天下仁之而已孟子所謂推恩保四海是也夫欲仁天下者必先仁其身是以中庸言修身以道修道以仁而復以初九修身六二為下仁不亦宜乎易說漢上朱氏曰休息也初九剛復克己復禮為仁者也六二正中在上无應以分其親仁之意近而相得乃下之見初九不逺復其心休焉中者天下之大本人受天地之中以生中則正正則大大者仁之體仁豈外求哉在我而已矣初九知幾知至至之者也六二不動即至於正中動則失正因是休矣休則吉所謂吉祥止止也故曰休復之吉以下仁也荀卿曰學莫便於近其人六二之謂乎易傳新安朱氏曰柔順中正近於初九而能下之復之休美吉之道也本義問六二休復之吉以下仁也曰初爻為仁人之體六二爻能下之謂附下於仁者學莫便於近其人既得仁者而親之資其善以自益則力不勞而學美矣故曰休復吉語録東萊吕氏曰六二下謂初也聖人指復處為仁此正語荅顔子之問克己復禮為仁相似蓋聖人之語只是一理易說六三頻復厲无咎象曰頻復之厲義无咎也伊川先生曰三以隂躁處動之極復之頻數而不能固者也復貴安固頻復頻失不安於復也復善而屢失危之道也聖人開遷善之道與其復而危其屢失故云厲无咎不可以頻失而戒其復也頻失則為危屢復何咎過在失而不在復也頻復頻失雖為危厲然復善之義則无咎也並易傳横渠先生曰所處非位非頻蹙自危不能无咎一作吝易說藍田吕氏曰六三雖陷於衆隂之中幾不能以自出然去陽未逺猶不得已而求復不得已故頻陷於衆隂故厲有志於復必與衆隂異趣然不失吾義故雖危无咎龜山楊氏曰柔不當位而居動之極其守不固矣雖不善未嘗不知知之未能不復行者也故頻復厲夫操存舍亡蓋俛仰之間耳其危豈不甚乎然而頻是亦善補過者也故雖厲而无咎易說兼山郭氏曰六三說者皆以頻為頻蹙之頻失位過中不得已而復也獨王昭素先生以為頻數之頻嘗試考之禮曰或安而行之或利而行之或勉强而行之及其成功一也然不得已而復與勉强而行之无以異也不得已而復尚且知復焉何厲之有與孔子所謂義无咎者為不侔矣由是而知頻非不得已之類亦明矣孔子曰中庸其至矣乎民鮮能久矣人皆曰予知擇乎中庸而不能期月守也故唯君子能久於其道其餘則日月至焉而已況一出焉一入焉塗巷之人也故道有至於數失亦有知其數復得失之間不能以寸是以危也然而義无咎者知復故也是以子夏之徒出見紛華盛麗而說入聞夫子之道而樂與夫回之為人擇乎中庸得一善則拳拳服膺而弗失之者固有間矣易說漢上朱氏曰頻水厓也說文曰人所賔附頻蹙不前而止先儒作嚬蹙訓之其義亦通三者震動之極極則反之正成坎坎在坤際水厓也水厓謂之頻六三厥初妄動自厓而反則頻復也頻者危道故曰頻復厲頻而復雖晚矣不猶愈於迷而不復者乎於義為得故曰義无咎也六三困而學之者也叔孫病不能相禮退而學禮之爻乎易傳新安朱氏曰以隂居陽不中不正又處動極復而不固屢失屢復之象屢失故危復則无咎故其占又如此本義六四中行獨復象曰中行獨復以從道也伊川先生曰此爻之義最冝詳玩四行羣隂之中而獨能復自處於正下應於陽剛其志可謂善矣不言吉凶者蓋四以柔居羣隂之閒初方甚微不足以相援无可濟之理故聖人但稱其能獨復而不欲言其獨從道而必凶也曰然則不云无咎何也曰以隂居隂柔弱之甚雖有從陽之志終不克濟非无咎也稱其獨復者以其從陽剛君子之善道也並易傳横渠先生曰柔危之世以中道合正應故不與羣爻同易說龜山楊氏曰居上下四隂之中而獨從陽中行獨復者也隂之從陽性也故謂之從道然柔不中行无剛明之才雖欲從道而无受道之質故不言吉與休復之下仁異矣易說白雲郭氏曰位不得中而居四隂之中獨從初九之道而應焉是亦舍其類而獨行其志者也故曰中行獨復七十子於衰周之際從夫子於洙泗之閒豈是道歟剥之六三與復之六四反對其義相類故在剥則取其失上下以應乎陽在復則取其獨復以從道也易說漢上朱氏曰五隂冥行去道日逺適越而北首者也六四行於五隂之中獨反而復下從於初道言初九也震為大塗亦道也鄭康成曰度中而行四獨應初是也不言吉无咎者正則吉可知獨復則无咎頻復之厲猶无咎也四獨復五敦復不言吉者不以利害言也虞翻曰四在於外體不在二五何得稱中夫中无一定之中自初至三以二為中自四至上以五為中復卦五隂自二至上則四為中康成謂爻處五隂之中易傳新安朱氏曰四處羣隂之中而獨與初應為與衆俱行而獨能從善之象當此之時陽氣甚微未足以有為故不言吉然理所當然吉凶非所論也董子曰仁人者正其義不謀其利明其道不計其功於剥之六三及此爻見之本義六五敦復无悔象曰敦復无悔中以自考也伊川先生曰六五以中順之徳處君位能敦篤於復善者也故无悔雖本善戒亦在其中矣陽復方微之時以柔居尊下復无助未能致亨吉也能无悔而已以中道自成也五以隂居尊處中而體順能敦篤其志以中道自成則可以无悔也自成謂成其中順之徳並易傳横渠先生曰性順位中无他應援以敦實自求而已剛長柔危之世能以中道自考故可无悔不然取悔必矣易說藍田吕氏曰六五雖逺於陽而不失乎中雖未盡美而敦厚自守可以无悔龜山楊氏曰柔得尊位大中而无應於上下无所待而復者也其復也誠於善而已故謂之敦復夫誠自成也故夫子曰中以自考也初九陽始生動之微者也其違未逺故其復也不至於悔而已六五无所待而復安於復者也故直曰无悔不言吉吉不足以言之也易說白雲郭氏曰五以隂居尊位在坤之中有厚徳之象故言敦復中以自考者能以中道自厚而已自厚則所以成己者至矣雖未足以盡為君之道亦可以无悔矣中庸曰誠者非自成己而已也所以成物也盡成己成物之道則君道盡二帝三王是也六五為一卦之主其才有所不足故僅能自成與在下君子修身无以異然初九既无大悔於其初馴致其道則知其終為元吉矣六五居尊極之位方同在下之道雖敦復優於不逺之復而以時位初終論之是未足以致人君之元吉也故特中以自成而已易說漢上朱氏曰六五逺於初九中而未正非敦復則有咎五坤體厚也五動而正成艮艮為篤實厚而篤實敦也成言乎艮故艮又有成之意考成也誠者自成也以體言之謂之中以天道言之謂之誠以受之於天言之謂之性有是性則有是體有是體則具是道萬物皆備於我反身而誠則自成矣其於復也何逺之有厚而篤實用力於仁者也荀卿曰以中自成易傳曰以中道自成易傳新安朱氏曰以中順居尊而當復之時敦復之象无悔之道也考成也本義廣漢張氏曰復卦之義以初爻為重於畫為陽於義為善於人蓋君子之道也二比於初故為休復四應於初故為獨復而三之頻復而厲則以其非比非應開其遷善而危其屢失也上之迷復而凶則以其處極其最逺往而不返也觀諸此則可見以初爻為重矣然則五之敦復奈何體順而居中以中自考者也故為敦篤於復夫能敦篤於復冝曰吉曰亨矣而獨曰无悔奈何无悔者戒辭也以其柔而逺於陽故為之戒辭謂如是乃无悔也南徐陳希顔舊名其齋曰敦復嵗壬辰與予相遇于長沙屬予銘予知希顔有取於儆戒之意也為之銘曰惟聖作易研幾極深惟卦有復於昭天心六爻之義各隨所乘其在於五敦復是明其敦如何篤志允蹈順保其中而以自考我觀爻義厥有戒辭君子體之敬戒是資人欲易萌天理難存毫釐之間消長所分凡百君子奈何不敬祗於夙宵以若天命惟積惟久匪俟乎外敢曰有則庶幾寡悔南軒集上六迷復凶有災𤯝用行師終有大敗以其國君凶至于十年不克征象曰迷復之凶反君道也伊川先生曰以隂柔居復之終終迷不復者也迷而不復其凶可知有災𤯝災天災自外來𤯝已過由自作既迷不復善在己則動皆過失災禍亦自外而至蓋所招也迷道不復无施而可用以行師則終有大敗以之為國則君之凶也十年者數之終至于十年不克征謂終不能行既迷於道何時而可行也復則合道既迷於復與道相反也其凶可知以其國君凶謂其反君道也人君居上而治衆當從天下之善乃迷於復反君之道也非止人君凡人迷於復者皆反道而凶也並易傳横渠先生曰君道過亢反常无施而可故天災人害師敗君凶久衰而不可振也易說藍田吕氏曰上六居衆隂之上處復之後最逺於陽迷而不反者也以治身則凶趣時則有災𤯝若用衆君國其害滋大其勢難復非十年之久不能為也龜山楊氏曰居卦之外與初異其違道逺矣迷而後復者也故凶苖民逆命七旬乃格是也迷則妄行故有災眚書曰𤯝災肆赦眚目病也其為災眚不明而已有可復之道焉故在所肆禹之班師是也豫之時雷出地而奮威行於上矣又順以動故利行師君道也復之與豫以二體言之順動一也而迷復之凶其事則異矣故用行師終有大敗以其國君凶至于十年不克征反君道故也十年數之終十年不克征則終不可用矣禹稱有苖曰昬迷不㳟反道敗徳此之謂也易說兼山郭氏曰君道知柔知剛上六迷而不知復反君道也易說白雲郭氏曰處復之終迷不知反孔子所謂下愚不移者與夫天道人事皆貴復焉迷不知復則上逆天道下乖人事其凶宜矣言有災眚則得之天得之人者其凶非一也迷復无所不失故其凶至亦无不有之況行師用兵之道尤為危事是以自用之則大敗佐其君以用之則有十年不克之凶十年極矣十年不克則自敗可知是其國君凶也且復有自復者有不能自復而從人者有失而頻復者皆復也上六居一卦之上有君之道君道以能從人為善坤之六五黄裳元吉是也上六自不能復又不能從人之復可謂反君道矣或謂迷而後復非也苟能復矣雖迷何凶太甲是也冥豫成有渝是也易說漢上朱氏曰復之終以一卦言之剥之上九反而為初初九已復上六迷道而不復故曰迷復凶上窮矣不可動動則降三成坎坎災眚也災自外至眚已招也有災眚則天禍人患无所不有故曰凶又曰有災眚三動六上行有師體用師也行師之義以正去不正已迷不復而行師人誰服之終有大敗師六三師或輿尸凶坎為血大无功也三下之終故曰終有大敗坤四諸侯位國也五君位上反三成震坎以其國君也震動以也坎陷也用此行師終有大敗妄動之禍至於以其國君陷之於凶故曰以其國君凶言迷復動則凶矣自古迷復妄動不勝其欲而用兵雖驟勝終有大敗驟勝者厚其毒而降之罰是以禍至於亡身十者坤之極數不可動則无師象不克征也十年不克征者災也上窮也用行師終有大敗以其國君凶者眚也二者反君道故也上六反初九初九道也易傳曰居上治衆當從天下之善夫從天下之善則改過不吝舉錯當於人心以此用衆則師克以此用國則民聴天祐人助何凶之有易傳新安朱氏曰以隂柔居復終終迷不復之象凶之道也故其占如此以猶及也本義上六迷復凶有災眚用行師終有大敗以其國君凶至于十年不克征這是箇極不好底爻故其終如此凡言十年三年五年七月八月三月者想是象數中自有箇數如此故聖人取而言之至于十年不克征與十年勿用則其凶甚矣語録東萊吕氏曰上六君道莫大於改過復善一不改過則非君道矣易說合訂刪補大易集義粹言卷二十八
