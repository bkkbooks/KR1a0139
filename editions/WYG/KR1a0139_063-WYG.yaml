body:
  text: 合訂刪補大易集義粹言卷六十一頭等侍衛納喇性徳編巽下巽上伊川先生曰巽序卦旅而无所取容故受之以巽巽者入也羈旅親寡非巽順何所取容茍能巽順雖旅困之中何往而不能入巽所以次旅也為卦一隂在二陽之下巽順於陽所以為巽也易傳巽小亨利有攸往利見大人伊川先生曰卦之才可以小亨利有攸往利見大人也巽與兊皆剛中正巽説一作兊義亦相類而兊則亨巽乃小亨者兊陽之為也巽隂之為也兊柔在外用柔也巽柔在内性柔也巽之亨所以小也易傳白雲郭氏曰伊川曰巽與兊皆剛中正巽兊義亦相類而兊則亨巽乃小亨者兊陽之為也巽隂之為也兊柔在外用柔也巽柔在内性柔也巽之亨所以小也雍曰巽入也故能亨然柔弱自居其小宜矣能入故利有攸往居柔小亨故利見大人聖人懼小其志而欲養其大體也是亦沈潛剛克之意與易説新安朱氏曰巽入也一隂伏於二陽之下其性能巽以入也其象為風亦取入義隂為主故其占為小亨以隂従陽故又利有所往然必知所従乃得其正故又曰利見大人也本義彖曰重巽以申命剛巽乎中正而志行柔皆順乎剛是以小亨利有攸往利見大人伊川先生曰重巽者上下皆巽也上順道以出令下奉命而順従上下皆順重巽之象也又重為重複之義君子體重巽之義以申復其命令申重復也丁寜之謂也剛巽乎中正以卦才言也陽剛居巽而得中正巽順於中正之道也陽性上其志在以中正之道上行也又上下之柔皆巽順於剛其才如是雖内柔可以小亨也巽順之道无往不能入故利有攸往巽順雖善道必知所従能巽順於陽剛中正之大人則為利故利見大人也如五二之陽剛中正大人也巽順不於大人未必不為過也並易傳藍田吕氏曰巽有所下而不亢也柔皆下乎剛巽也出命而至申命物无違者非上下皆巽不足以能之故重巽以申命剛巽乎中正而志行柔皆順乎剛小亨而不可以大亨者柔道終不可以大也執巽而行无往不利巽乎中正而志行故利見大人白雲郭氏曰上下皆巽是為重巽上以巽入而化下下以巽順而従上是以命行无違也剛巽乎中正而志行者上以巽入而化下是剛以巽而无太過也柔皆順乎剛者下以巽順而従上是柔以巽而无不及也上下之巽如此故亨而利也易説漢上朱氏曰柔在下而承二剛巽也巽為風風者天之號令命者天之令也故巽為命内巽者命之始外巽者巽而達乎外申前之命也重巽之象惟可施之於申命先儒謂上下皆巽不違其令命乃行也若施之於它則巽己甚矣故曰重巽以申命此以兩體而言巽也巽自遯來訟之變六三之四上下皆巽九二之剛巽乎中也九五之剛巽乎中正也巽乎中正則其剛不過而所施當乎人心是以志行乎上下故曰剛中正而志行此以三四相易而言九二九五之巽也九二之剛巽乎正則初六之柔順之九五之剛巽乎中正則六四之柔順之上下之柔皆順乎剛則物无違者而九二九五之志行故曰柔皆順乎剛此以初六六四言大者巽則小者无不順也柔皆順乎剛雖无違者然順乎中正乃善不然失所従矣六四離目為見大人者九五剛而巽乎中正者也剛巽乎中正而柔順之則柔者亦得其正而小者亨矣豈非小者之利乎故曰利見大人此以九五言巽之利也小者亨矣故六四利有攸往利見大人而其道上行故曰是以小亨利有攸往利見大人徐氏王昭素考王弼注有命乃行也四字當在重巽以申命之下疑彖或脱文理若有之在卦氣為七月故太𤣥準之以翕易傅新安朱氏曰重巽申命釋卦義也巽順而入必究乎下命令之象重巽故為申命也剛巽乎中正而志行柔皆順乎剛以卦體釋卦辭剛巽乎中正而志行指九五柔謂初四本義巽卦是於重巽上取義重巽所以為申命巽以行權兊見而巽伏權是隐然做底物事若顯然地做却不成行權問重巽以申命重字之義如何曰只是重卦巽是重卦故曰重巽八卦之象皆是如此問申字是兩番降命令否曰非也只是丁寧反復説便是申命巽風之吹物无處不入无物不鼓動詔令之入人淪肌浹髓亦如風之動物也隂陽各有清濁偏正並語録象曰隨風巽君子以申命行事伊川先生曰兩風相重一作従隨風也隨相繼之義君子觀重巽相繼之象而以申命令行政事隨與重上下皆順也上順下而出之下順上而従之上下皆順重巽之義也命令政事順理則合民心而民順従矣易傳藍田吕氏曰風行相隨所向皆靡故可以申命行事白雲郭氏曰君子之徳風也有風之徳而下无不従然後具重巽之義故象言隨風巽則知重巽隨風之義皆繫乎上下而言也君子有是徳下民如是而従其於申命行事也何有易於巽主教命猶詩之言風也故觀則省方觀民設教姤則施命誥四方蠱則振民育徳皆主巽而言也由是觀之則巽之命可順之命也命或不可順而欲以剛强之亦難矣哉易説漢上朱氏曰巽為風風巽而入者也前後相隨而至則嵗事行矣故巽又有事之象傳言八風之至各以四十五日而成一嵗是也君子申命諄諄者行事也行事莫如巽巽則易入易傳新安朱氏曰隨相繼之義本義巽象申命是丁寧反復之意風无所不入如命令之丁寧告戒无所不至也故象以之語録初六進退利武人之貞象曰進退志疑也利武人之貞志治也伊川先生曰六以隂柔居卑巽而不中處最下而承剛過於卑巽者也隂柔之人卑巽太過則志意恐畏而不安或進或退不知所従其所利在武人之貞若能用武人剛貞之志則為宜也勉為剛貞則无過卑恐畏之失矣進退不知所安者其志疑懼也利用武人之剛貞以立其志則其志治也治謂修立也並易傳横渠先生曰體柔居下在巽之始謙抑過中故施於武人之貞則適得其宜進退者柔不自決之象也易説藍田吕氏曰初六居巽之時以柔居下為剛所乘進則必巽退則過巽疑而未決失其所守如有志於治莫若執巽順之志果敢以任事故利武人之貞利於武人之貞所謂果敢以任事也白雲郭氏曰卦以居柔而不能大初六又以柔而不能決是以有進退之象武人三軍之勇者不膚撓不目逃其志決於進者也初六疑於申命行事之際則敗且至矣宜以武人之貞自治其志可也治己以武人之貞斯无進退之疑矣孔子語冉求以聞斯行諸是也然道雖不一於進而此利在行事是亦行權之義易説漢上朱氏曰巽初行事之始也居卑體柔不能自立過於巽者也退則不安進則无應又二剛據之莫知所従巽為不果故曰進退志疑也六變九巽成乾應兊乾為健兊為決疑志去矣健決者武人之貞天道尚右故兊為武人志疑者不先治其志也君子自治其動以正行之以健決確乎不可移雖千萬人必往孰能奪其志哉故曰利武人之貞志治也巽為工有治之意易傳曰治謂修立也易傳新安朱氏曰初以隂居下為巽之主卑巽之過故為進退不果之象若以武人之貞處之則有以濟其所不及而得所宜矣本義九二巽在牀下用史巫紛若吉无咎象曰紛若之吉得中也伊川先生曰二居巽時以陽處隂而在下過於巽者也牀人之所安巽在牀下是過於巽過所安矣人之過於卑巽非恐怯則諂説皆非正也二實剛中雖巽體而居柔為過於巽非有邪心也恭巽之過雖非正禮可以逺恥辱絶怨咎亦吉道也史巫者通誠意於神明者也紛若多也苟至誠安於謙巽能使通其誠意者多則吉而无咎謂其誠足以動人也人不察其誠意則以過巽為諂矣二以居柔在下為過巽之象而能使通其誠意者衆多紛然由得中也陽居中為中實之象中既誠實則一元則字人自當信之以誠意則非諂畏也所以吉而无咎並易傳横渠先生曰以陽居隂其志下比无應於上故曰巽在牀下然不失中道下為之用故史巫紛若樂為之使吉而无咎非如上九喪其資斧史巫諭虚華過實者言不失中道則樂盡其誠者衆矣易説藍田吕氏曰九二下體之中以陽居隂其巽已甚故曰巽在牀下以此事人失之太卑不能以自立以此事神雖史巫紛若敬不過中神亨之矣故用史巫紛若吉无咎白雲郭氏曰二有剛中之徳巽无不行矣而猶過於恭巽有牀下不安之象者此其所以謂之巽也是道也雖神明可交而受福況人乎然過於巽在聖人之道疑若有咎矣而當巽之時九二以剛徳能行巽之道是其所以无咎也故象言紛若之吉得中也然惟九二剛中故有巽在牀下之美不然殆且過矣易説漢上朱氏曰巽初坤變乾也巽為木坤西南方乾為人設木於西南之奥而人即安焉者牀也巽股變艮股見手伏蒲伏於牀下之象九二不正卑巽如此宜有咎然九二剛中其動也正卑巽者非為利也將以誠意感動九五而已故用史巫紛若吉吉者正也九二之動上之五成震震為聲五之二成兊兊為言上九宗廟兊口出聲祝史道人之意以達於鬼神之象六降於二巫以鬼神之意告於人之象史巫皆尚口而巽故也四巽離為絲二五升降史巫紛若則卑巽之意達於上下巽在牀下何咎之有此子游重服立諸臣之位以感悟文子之道也二五中也九五未應則巽在牀下用史巫紛若乃為得中易傳新安朱氏曰二以陽處隂而居下有不安之意然當巽之時不厭其卑而二又居中不至已甚故其占為能過於巽而丁寧煩悉其辭以自道達則可以吉而无咎亦竭誠意以祭祀之吉占也本義九三頻巽吝象曰頻巽之吝志窮也伊川先生曰三以陽處剛不得其中又在下體之上以剛亢之質而居巽順之時非能巽者勉而為之故屢失也居巽之時處下而上臨之以巽又四以柔順相親所乗者剛而上復有重剛雖欲不巽得乎故頻失而頻巽是可吝也三之才質本非能巽而上臨之以巽承重剛而履剛勢不得行其志故頻失而頻巽是其志窮困可吝之甚也並易傳横渠先生曰三處陽剛失巽之道乘剛而動頻吝所宜志在比物故吝如復之六三志窮也易説藍田吕氏曰復之六三陷衆隂之中而未逺於陽不得已而求復故致於頻復巽之九三以陽居陽主於髙亢而為六四隂柔之所乗不得已而卑巽故至於頻巽志窮而巽勢不得已吝道也白雲郭氏曰過於剛而不中是以或巽或失所謂既不能令又不受命者也非吝而何其志終不能以有行是以窮也易説漢上朱氏曰頻水厓與復六三頻復之頻同兊水澤三水澤之際九三重剛不中在下體之上巽極而決躁不能巽者也將遂其剛亢歟則上臨之以巽四以柔相親九二之剛近而不相得將變而為柔歟則安其所處憚於改過有吝之意然志已窮不得已而巽猶人行至於水之厓欲前得乎故曰頻巽之吝志窮也易傳曰雖欲不巽得乎哉易傳新安朱氏曰過剛不中居下之上非能巽者勉為屢失吝之道也故其象占如此本義六四悔亡田獲三品象曰田獲三品有功也伊川先生曰隂柔无援而承乗皆剛宜有悔也而四以隂居隂得巽之正在上體之下居上而能下也居上之下巽於上也以巽臨下巽於下也善處如此故得悔亡所以得悔亡以如田之獲三品也田獲三品及於上下也田獵之獲分三品一為乾豆一供賔客與充庖一頒徒御四能巽於上下之陽如田之獲三品謂遍及上下也四之地本有悔以處之至善故悔一无悔字亡而復有功天下之事茍善處則悔或可以為功也巽於上下如田之獲三品而遍及上下成巽之功也並易傳横渠先生曰柔順之徳以居隂位雖或乗剛悔終可亡近比於五不為諂妄而又二三并為所獲不私其累而樂為己用田獲之類也使三陽見獲四之功也易説藍田吕氏曰六四乗剛宜悔而以隂居隂上承九五能全巽道非特悔亡所獲亦多白雲郭氏曰六四近君志決於進无初六之疑既无羣疑則悔亡矣是以有田獲三品之功也六四至柔不當有田獲之功而此以順乎剛故得之由是觀之則剛以巽而无太過柔以巽而无不及則巽之為道豈柔弱畏懦之義哉是其可與有行也易説漢上朱氏曰四无應乗承皆剛宜有悔四本遯之六二自二之四一變訟二變巽二田也艮為手柔道上行之四得位處二陽之際上巽於五下巽於三三爻皆正而相得故田獲三品古之田者上殺中殺下殺為三品三品則徧及於上下兊有刑殺之意而又伏艮為黔喙之屬巽為雞離為雉為三品以巽事上臨下上下與之巽而有功雖无應也乘承皆剛也其悔亡矣故曰有功也易傳曰天下之事茍善處則悔可以有功矣易傳新安朱氏曰隂柔无應乘承皆剛宜有悔也而以隂居隂處上之下故得悔亡而又為卜田之吉占也三品者一為乾豆一為賔客一以充庖本義九五貞吉悔亡无不利无初有終先庚三日後庚三曰吉象曰九五之吉位正中也明道先生曰先甲三日以窮其所以然而處其事後甲三日以究其將然而為之防甲者事之始也庚者有所革也自甲至於戊巳春夏生物之氣已備庚者秋冬成物之氣也故有所革别一般氣劉絢師訓伊川先生曰五居尊位為巽之主命令之所出也處得中正盡巽之善然巽者柔順之道所利在貞非五之不足在巽當戒也既貞則吉而悔亡无所不利貞正中也處巽出令皆以中正為吉柔巽而不貞則有悔安能无所不利也命令之出有所變更也无初始未善也有終更之使善也若已善則何用命也何用更也先庚三日後庚三日吉出命更改一作故之道當如是也甲者事之端也庚者變更之始也十干戊巳為中過中則變故謂之庚事之改更當原始要終如先甲後甲之義如是則吉也解在蠱卦九五之吉以處正中也得正中之道則吉而其悔亡也正中謂不過无不及一作无過不及正得其中也處柔巽與出命令惟得中為善失中則悔也並易傳横渠先生曰解見蠱卦志不以正則將有悔先庚三日讓始也後庚三日存終也雖體陽居尊无應於下故不可為事之唱乃吉不著於繇辭者巽非憂患之時故也易説白雲郭氏曰剛以巽而後貞吉柔以巽而後有功貞吉則无太過有功則无不及是以四五皆得巽道而悔亡也九五居尊中正為巽之主固守是道吉无不利猶曰无初有終者巽之為象以柔而用剛也惟以柔故有初六進退之疑惟用剛故有九五正中之吉是為无初有終也先庚三日後庚三日吉者九五人君之位也出命人君之所先也慎乃出令君人之道也故必先後三日而申命之夫上有巽入之道下有巽順之義風行草偃莫易於斯時猶且先後三日而申命之者慎之至也慎之至者令出惟行弗惟反故也命令之出有必可行之善而无不可行復反之失是以吉也上曰貞吉九五之吉也下曰吉盖命令以是為吉也庚即命令也先庚謂未出令之前己申命後庚謂出令之後三日而後行事也伊川曰甲者事之始也庚者變更之始也易説漢上朱氏曰九五君位而正中巽為號令有申命之象故舉全卦以盡一爻之義五无應宜有悔正故悔亡動則二應之二五皆正故无不利初二不正始未善也五正善而有終也无初故申命申命則有終初未善也故巽以命之先庚三日變家人變益之時也下三爻震震納庚離為日先於此庚之使善也後庚三日變噬嗑變震之時也震納庚離為日後於此庚之慮其未盡善也先庚後庚主於中正也十日之次以戊巳為中過中則變故庚謂之更更而正中正則吉此九五之所以吉歟蠱卦六五柔故為蠱巽九五剛乃有更變之善更天下之弊其惟剛中乎易傳又曰巽九五貞吉悔亡无不利无初有終先庚三日吉虞曰震庚也謂變初至二成離至三成震震主庚離為日震三爻在前故先庚三日謂益時也動四至五成離終上成震震三爻在後故後庚三日也巽初失正終變成震得位故无初有終吉震兊為蕃鮮白為巽也巽究為躁卦謂震也又曰乾成於甲坤成於庚隂陽天地之終始故經舉甲庚於蠱彖巽五也震庚固説新安朱氏曰九五剛健中正而居巽體故有悔以有貞而吉也故得亡其悔而无不利有悔是无初也亡之是有終也庚更也事之變也先庚三日丁也後庚三日癸也丁所以丁寧於其變之前癸所以揆度於其變之後有所變更而得此占者如是則吉也本義无初有終也彷彿是伊川説始未善是无初更之而善是有終自貞吉悔亡以下都是這一箇意思一如坤卦先迷後得以下都只是一箇意先庚後庚是説那後面變了底一截並語録上九巽在牀下喪其資斧貞凶象曰巽在牀下上窮也喪其資斧正乎凶也伊川先生曰牀人所安也在牀下過所安之義也九居巽之極過於巽者一无者字也資所有也斧以斷也陽剛本有斷以過巽而失其剛斷失其所有喪資斧也居上而過巽至於自失在正道為凶也巽在牀下過於巽也處卦之上巽至於窮極也居上而過極於巽至於自失得為正乎乃凶道也巽本善行故疑之曰得為正乎復斷之曰乃凶也並易傳横渠先生曰柔巽過極難為之下物不為用故曰喪其資斧凶資斧尚喪餘用殫矣易説藍田吕氏曰上九處巽之窮以陽居亢位之地其巽己甚與九二同故巽在牀下窮矣其所養失其備用失其利守是不變正入於凶故曰喪其資斧正凶白雲郭氏曰九二有為之臣也以巽用剛者也上九巽之極者也巽極不知變而欲同九二之道則其過也甚矣過則失故喪其資斧貞凶也巽之道剛柔用之皆獲其利今喪其所資之利能无凶乎故巽在牀下无用於上窮之時喪其資斧殊乖悔亡之利彼以悔亡而吉則此以喪失正乎凶矣觀此則知謂之資斧者其行權之義乎是不可失者也易説漢上朱氏曰上九以巽而居髙位處之不當窮則變而反下三以重剛乘之巽股變艮手有恐懼自失而蒲伏於牀下之象故曰巽在牀下離兊為蠃貝為資所以利也離為兵巽為木貫之為斧所以斷也上窮反三離見巽毁故曰喪其資斧喪其所以利則莫或愛之喪其所以斷則莫或畏之正乎凶矣上復位遇坎險正凶也魯自襄公三家分其民其君四世従之至昭公失國无所竄伏盖處上極巽盡亡其資斧乃正凶也方自失之初告之以凶詎肯信乎易傳新安朱氏曰巽在牀下過於巽者也喪其資斧失所以斷也如是則雖貞亦凶矣居巽之極失其剛陽之徳故其象占如此正乎凶言必凶本義資斧有做齎斧説底這資斧在巽上説也自分曉然而旅中亦豈可无備禦底物事次第這便是語録合訂刪補大易集義粹言卷六十一
