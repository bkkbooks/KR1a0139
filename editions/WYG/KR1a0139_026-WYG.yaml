body:
  text: 合訂刪補大易集義粹言卷二十四頭等侍衞納喇性德編坤下巽上伊川先生曰觀序卦臨者大也物大然後可觀故受之以觀觀所以次臨也凡觀視於物則為觀平聲為觀於下則為觀去聲如樓觀謂之觀者為觀於下也人君上觀天道下觀民俗則為觀脩徳行政為民瞻仰則為觀風行地上徧觸萬類周觀之象也二陽在上四隂在下陽剛居尊為羣下所觀仰觀之義也在諸爻則唯取觀見隨時為義也易傳觀盥而不薦有孚顒若伊川先生曰予聞之胡翼之先生曰君子居上為天下之一无之字表儀必極其莊敬則下觀仰而化也故為天下之觀當如宗廟之祭始盥之時不可如既薦之後則下民盡其至誠顒然瞻仰之矣盥謂祭祀之始盥手酌鬱鬯於地求神之時也薦謂獻腥獻熟之時也盥者事之始人心方盡其精誠嚴肅之至也至既薦之後禮數繁縟則人心散而精一不若始盥之時矣居上者正其表儀以為下民之觀當一作常莊嚴一作敬如始盥之初勿使誠意少散如既薦之後則天下之人莫不盡其孚誠顒然瞻仰之矣顒仰望也易傳横渠先生曰盥求神而薦䙝也易説藍田呂氏曰觀以下觀上也惟至誠可以交神明然後動而為天下信信心服也聖人設教於上天下不心服而化者未之有也祭祀之實以誠敬交乎神明誠敬之至莫先乎盥當是時也恍惚以與神明交使人觀之斯心可以化天下矣及乎饋薦之入則其事也其誠不若盥之始也有孚顒若不言而信也荀卿云祭祀之未入尸也大昏之未發齊也䘮之未小斂也一也斯得之矣天何言哉四時行焉百物生焉天之神道也惟聖人至誠然後可與天通此所以設教而天下服也龜山楊氏曰觀盥而不薦有孚顒若誠意所寓故也古人脩身齊家治國平天下本於誠吾意而已詩書所言莫非明此者但人自信不及故无其效聖人知其效必本於此是以必由也語録白雲郭氏曰鬼神至幽也人至明也聲臭之所不能交也聖人設為祭祀寓之誠心洋洋乎如在其上如在其左右是道也天地鬼神尚且弗違况人乎故盥而不薦一示於上則有孚顒若必見於下觀而化也馬氏曰盥者進爵灌地以降神也郊特牲言周人既灌然後迎牲祭統曰祭有三重焉獻之屬莫重於祼祭必先灌而後薦腥薦熟方灌之時其道一於誠而已非若薦之託物也灌者祭之本也薦者祭之末也籩豆之事則有司存是為有司可備之禮也故自灌而往孔子不觀葢君子惟誠之為貴之義也夫誠之感人不行而至故方盥之時欲誠於求神初非有意於化天下而天下觀之者感其誠而顒肅之心自生焉惟其不期化而自化此所謂大觀之道使聖人有意於化民是教以化之非大觀之意也記曰明乎郊社之禮禘嘗之義治國其如示諸掌乎豈非誠之所感天地鬼神不能違況人也哉易説新安朱氏曰觀者有以示人而為人所仰也九五居上四隂仰之又内巽外順而九五以中正示天下所以為觀盥將祭而潔手也薦奉酒食以祭也顒然尊敬之貌言致其潔清而不輕自用則其孚信在中而顒然可仰戒占者宜如是也或曰有孚顒若謂在下之人信而仰之也此卦四隂長而二陽消正為八月之卦而名卦繫辭更取他義亦扶陽抑隂之意本義東萊吕氏曰一隂生于姤二隂遯三隂否四隂觀五隂剥姤勿用娶女剥不利有攸往否之匪人皆是不好惟觀四隂在下二陽為觀於上却與諸卦不同盖治中有亂亂中有治觀卦體可見盥而不薦有孚顒若上下交孚氣象易説彖曰大觀在上順而巽中正以觀天下觀盥而不薦有孚顒若下觀而化也觀天之神道而四時不忒聖人以神道設教而天下服矣伊川先生曰五居尊位以陽剛中正之德為下所觀其徳甚大故曰大觀在上下坤而上巽是能順而巽也五居中正以巽順中正之徳為觀於天下也為觀之道嚴敬如始盥之時則下民至誠瞻仰一作仰觀而從化也不薦謂不使誠意少散也天道至神故曰神道觀天之運行四時无有差忒則見其神妙聖人見天道之神體神道以設教故天下莫不服也夫天道至神故運行四時化育萬物无有差忒至神之道莫可名言惟聖人黙契體其妙用設為政教故天下之人涵泳其徳而不知其功鼓舞其化而莫測其用自然仰觀而戴服故曰以神道設教而天下服矣並易傳横渠先生曰内順外巽示民以順而外從巽此祭所以為教之本故盥而不薦中正以觀天下又曰大觀在上皆謂五也凡言觀我生亦皆謂五也天不言藏其用而四時行神道如盥而不薦之類盥簡潔而神薦䙝近而煩也有兩則須有感然天之感有何思慮莫非自然聖人則能用感何謂用感凡教化設施皆是用感也作於此化於彼者皆感之道聖人以神道設教是也並易説上天之載有感必通聖人之為得為而為之也天不言而四時行聖人神道設教而天下服誠於此動於彼神之道歟成變化行鬼神成行隂陽之氣而已矣又云天不言而信神不怒而威誠故信无私故威天之不測謂神神而有常謂天並正䝉廣平游氏曰聖人久於其道而天下化成葢天下之化非有資於號令之鼓舞也刑賞之懲勸也一於誠而已誠至則天下徯其志而從之如恐不及矣故曰盥而不薦有孚顒若先王之化民豈能拂其所有而與之以所无哉亦曰順以巽而已中正民之性也順其性而入之則將淪肌膚而浹骨髓矣下觀而化自然之理也易説龜山楊氏曰二陽在上居中履正而得尊位下之所觀也故曰大觀在上盥者酌鬯求神之時也祭莫重焉貴氣臭而不以物誠一而已惟天下至誠為能化故有孚顒若下觀而化也夫其為物不貳其生物不測天之神道也而四時不忒以其誠无息而已聖人觀天之神道而設教亦惟誠而已故天下服君子篤恭而天下平意誠心正而天下治率此道也易説盥而不薦初未嘗致物也威儀度數亦皆未舉而已有孚顒若其所以交於神明者葢有在矣又曰古人所以交神而接人其道一主於誠初无二也故曰明則有禮樂幽則有鬼神幽明本无二理故所以感之者亦以一理聖人以神道設教而天下服所謂神道誠意而已誠意天徳也餘杭語録兼山郭氏曰在下而觀上謂之觀童觀闚觀觀國之光是也在上而眂下謂之觀大觀在上觀我生觀民是也故在下者觀上之好惡而風知所移在上者不求於下至誠以示之而已故曰大觀在上順而巽中正以觀天下盥而不薦有孚顒若下觀而化也觀之成卦二陽在上四隂在下所謂大觀也坤下而巽上所謂巽而順也九五得位而應焉所謂中正以觀天下也聖人在上无思无為以治天下何事於精神心思之所及哉至誠以示之而已故曰可以贊天地之化育與天地參況萬民乎故垂衣拱手不下袵席之上而天下化者誠以先之也故曰誠則形形則著著則明明則動動則變變則化惟天下至誠為能化經曰觀盥而不薦有孚顒若誠之本也至於薦也備物而將之末也且天之神道四時見之矣其升降之運本之一氣一氣之運夲之於一誠故八卦之變起於中孚非誠則不能也聖人之神道見於教化教化之成敗見於風俗風俗之所自出於上之誠信故知逺之近知風之自則有至於无聲无臭者矣彼刑名度數曷足以明之故聖人以神道設教而天下服者予知其聲色之於化民末也夫乾確然示人易矣夫坤隤然示人簡矣又曰天地之道貞觀者也其所以為貞觀者何乎易簡而已矣天之生物也不期於生而萬物以之生地之成物也不期於成而萬物以之成孰為之主張孰為之或使莫之令而常自然葢天得一以清地得一以寧一者誠而已故聖人之治順而巽中正以觀天下中正以應之而已故曰侯王得一以為天下貞貞則亦誠而已故誠者天之道也聖人不勉而中不思而得從容中道者也夫誠之為道也至矣則何施何為而可以臻於此乎葢君子内省不疚无惡於志其所不可及者唯人之不見乎詩云相在爾室尚不愧于屋漏不動而敬不言而信篤恭而天下平也三代之盛時正月之吉布治於邦國乃縣治象之法使萬民觀治象浹日而斂之及其衰也治象之法未廢也而治亂之迹如是之不同何也誠與不誠之效也故曰至誠如神鬼神之為徳也視之而不見聽之而不聞使天下齊明盛服以承其祭祀洋洋乎如在其上如在其左右故曰神之格思不可度思故天之神道聖人之神道推此可得而知之也嗚乎二帝三王逺矣吾於此猶可觀焉並易説白雲郭氏曰大觀在上以巽順之徳居中正之位初未嘗有心於示人也其誠明之著晬然見於面盎於背施於四體有不可揜者焉亦猶聖人有以示之也觀之者至於不期化而自化是之謂神道神道之謂大觀且觀之天則天亦无所示也特四時不忒而已因四時不忒而萬物自生自化故知四時不忒是為天之神道由人言之亦曰天之大觀也聖人大觀其道同天則下觀而化也宜矣曰設教者天无教聖人主教雖以不教教之亦曰設教可也帝堯之則天孔子欲无言皆是道也乾卦言各正性命保合太和天之神道其及物如此而已然彖因卦辭盥而不薦明一卦之全體盡巽順之道以居中正故曰大觀九五言一爻之義能巽而已故反諸其身為觀民之道也卦辭彖辭明其大者象與爻抑又次焉是亦取義不同也卦之名不曰大觀者以上下大小之觀无不兼統而言故獨曰觀而彖則首明大觀之義也易説漢上朱氏曰觀成卦之義在於九五九五剛大履至尊之位四隂觀之大者在上而下為小者之所觀坤為衆巽為多白眼衆觀上之象故曰大觀在上此以九五釋觀也下順上巽順物之理巽而施之也九五无偏黨反側建極立表天下注目故曰順而巽中正以觀天下此合坤巽言九五大觀在上之道也觀臨之覆臨兊為澤艮為手上為宗廟巽入也入宗廟而澤手盥也與内則沃盥之盥同坤為牛兊為刑殺殺於下手薦之於上薦也孚者九五之誠信孚於下也乾為首兊變之肅然在上莊而不惰有敬順之貌顒若也觀之道至簡而不煩其要在誠而已无待於物也故明之以宗廟之禮焉宗廟之禮所以致誠敬也散齋七日致齋三日祭之初迎尸入廟天子涗手而後酌酒涗謂之盥酌酒獻尸尸得之灌地而祭謂之祼祼之後三獻而薦腥五獻而薦熟謂之薦故獻之属莫重於祼而盥者未祼之時精神專一誠意未散不言之信發而為敬順之貌者顒顒如也故下觀而化金聲而玉色莫不有敬順之心及其薦獻禮文繁縟人之精一不若始盥之時雖强有力者猶有時而倦惰矣以此見下之觀上在誠而不在物其道豈不至簡而不煩乎是以觀盥而不觀薦也巽眼視艮而兊伏觀盥而不觀薦之象也巽巽也坤順也二應於五化為巽順故曰觀盥而不薦有孚顒若下觀而化也聖人常觀諸天也四時本於隂陽隂陽合而為一一則神神者天之道也故隂陽自行四時自運人見其始於艮終於艮无有差忒而已孰為此者一也聖人觀天設教亦一而已矣一則誠誠則明明則變變則化不假强聒人自服從亦豈知所謂一哉惟天下至誠為能化故曰觀天之神道而四時不忒聖人以神道設教而天下服此推原觀卦之始要其終而言之以明大觀在上其道止於誠誠則順而巽中正以觀天下矣以卦氣言之八月節也故太𤣥凖之以視易傳五峯胡氏曰三綱人之本性神化天之良能堯舜禹湯文武恭已盡性徳合於天一言一行當物情之精中民心之㑹利用出入民所共由故精神感通折衝萬里天下心服莫測其用易曰聖人以神道設教而天下服此之謂也上髙宗書新安朱氏曰大觀以卦體卦徳釋卦名義觀盥釋卦辭觀天極言觀之道也四時不忒天之所以為觀神道設教聖人之所以為觀也本義盥非灌之義盥本謂薦而不薦是欲蓄其誠意以觀示民使民觀感而化之義有孚顒若便是那下觀而化却不是説人君身上事聖人以神道設教是聖人不犯手做底即是盥而不薦之義順而巽中正以觀天下謂以此觀示之也觀我是自觀如視履考祥語勢觀其亦是自觀却從别人説易中其字不説别人只是自家如乗其墉之類觀天之神道只是自然運行的道理四時自然不忒聖人神道亦是説他有教人自然觀感處問觀盥而不薦伊川以為灌鬯之初誠敬猶存至薦羞之後精意􅈈怠本義以為致其潔清而不輕自用義不同曰盥只是浣手不是灌鬯伊川承先儒之誤若云薦羞之後誠意􅈈怠則先王祭祀只是灌鬯之初猶有誠意及薦羞之後皆不成禮矣問若爾則是聖人在上視聽言動皆當為天下法而不敢輕亦猶祭祀之時致其潔清而不敢輕用否曰然問有孚顒若先生以為孚信在中而尊嚴故下觀而化之伊川以為天下之人孚信顒然而仰之恐須是孚信尊嚴方得下觀而化曰然又問觀觀之義曰自上示下曰觀去聲自下觀上曰觀平聲故卦名之觀去聲而六爻之觀皆平聲問有孚顒若承上文盥而不薦葢致其潔清而不輕自用則孚信在中而顒然可仰一説下之人信而仰之二説孰長先生曰從後説則合得彖辭下觀而化之義或曰前説似好先生曰當以彖為定問觀盥而不薦是取未薦之時誠意渾全而未散否先生曰祭祀无不薦者此是假設來説薦是用事了盥是未用事之初云不薦者謂常持得這誠敬如盥之意常在若薦則是用出用出則才畢便過了无復有初意矣詩云心乎愛矣遐不謂矣中心藏之何日忘之楚辭云思公子兮未敢言正是此意説出這愛了則都无事可記持矣惟其不説但蔵在中心所以常見其不忘也觀盥而不薦有孚顒若下觀而化也這盥自與灌不同灌自是以秬鬯之酒灌地以降神這盥只是洗手凡祭祀數數盥手一拜則掌拊地便又著洗伊川云人君正其表儀以為下民之觀當莊嚴如始盥之初勿使誠意稍散如既薦之後某看觀卦意思不是如此觀義自説聖人至徳出治天下自然而化更不待用力而下莫不觀感而化故取義於觀盥意謂積誠信之至但是盥滌而不待乎薦亨有孚已自顒若故曰下觀而化也蔡季通因云盥而不薦有孚顒若言其理也下觀而化述其徳也問觀卦隂盛而不言凶咎曰此卦取義不同葢隂雖盛於下而九五之君乃當正位故只取為觀於下之義而不取隂盛之象也並語録東萊吕氏曰順而巽中正以觀天下五居尊位以中正為天下所觀須看順而巽一句葢專中正而不巽順則亦非為上之道易説又曰易傳見天道之神體神道以設教非見則莫能體己丑課程象曰風行地上觀先生以省方觀民設教伊川先生曰風行地上周及庶物為由歴周覽之象故先王體之為省方之禮以觀民俗而設政教也天子巡省四方觀視民俗設為政教如奢則約之以儉儉則示之以禮是也省方觀民也設教為民觀也易傳藍田吕氏曰風行地上萬物皆得其所以化物性不一其化一也先王省方觀民設教其道如此龜山楊氏曰風行地上省方之象也先生之省方无非事者所以觀民設教也易説白雲郭氏曰風之為物初不知其生化萬物也而風行地上萬物自生自化猶大觀在上下觀而化故為觀之象也省方觀民設教伊川謂如奢則示之以儉儉則示之以禮是也禮王制言廵守之禮命太史陳詩以觀民風命市納賈以觀民之所好惡命典禮考時月定日同律禮樂制度衣服正之此省方觀民設教也彖言神道設教天下不知所以然而然觀民設教則其迹可見矣所以為王者之事非盡彖之義者也易説漢上朱氏曰風行地上无所不周觀也先生以巡省四方象風之行觀民設教象風行於地上巽而順萬物也巽為多白眼觀也坤為民易傳曰觀民設教如奢者示之以儉儉者示之以禮省方觀民也設教為民觀也易傳新安朱氏曰省方以觀民設教以為觀本義東萊吕氏曰象風行地上觀風行地上无所不徧先王體之為省方之制如虞之巡四岳周之巡守此却是據象取義聖人深居法宫之中精神所運无不到豈待省方而後觀民設教盖精神无所不到而省方之禮自不可廢老氏言聖人无為只見一邉事易説初六童觀小人无咎君子吝象曰初六童觀小人道也伊川先生曰六以隂柔之質居逺於陽是以一作其觀見者淺近如童稚然故曰童觀陽剛中正在上聖賢之君也近之則見其道徳之盛所觀深逺初乃逺之所見不明如童䝉之觀也小人下民也所見昏淺不能識君子之道乃常分也不足謂之過咎若君子而如是則可鄙吝也所觀不明如童稚乃小人之分故曰小人道也並易傳横渠先生曰所觀者末小人之道施於君子則吝易説廣平游氏曰夫先王豈以其術智籠天下之民而愚之哉盖道无方也反而觀之則无己泛而觀之則无物虎豹得之而猛噬蛇虺得之而毒螫厚者見之而為仁薄者見之而為惡觀老子之學變而為申韓則民不可使知之理可見矣盖其氣質或不良而竊窺其端倪則適足以逞其不肖之心而已此小人之童觀所以无咎也語解龜山楊氏曰初以隂柔在下而逺於陽明不足以視逺童觀也童䝉未有知者也君子之所為衆人固不識乃其常分耳大觀在上而小人以童觀未有咎也君子宜知之者也而以童觀則可吝矣易説白雲郭氏曰在觀之初以柔自處未見其有立童觀是也童則蒙而无知小人道也小人能用童觀則内无剛戾之性外无强暴之行惟知觀人而效之者也何咎之有君子以設教立道為事反同小人之觀不亦鄙乎故曰君子吝初六小人之觀也六二女子之觀也三四君子之觀也易説漢上朱氏曰初六坤㝠不正而往觀五小人之觀君子也烏覩所謂正哉不足咎小人不足以知君子猶童稚之觀成人也艮為少男故曰童觀初九動則正以正而往觀者君子之觀君子也然不動焉吝也故曰小人无咎君子吝易傳新安朱氏曰卦以觀示為義據九五為主也爻以觀瞻為義皆觀乎九五也初六隂柔在下不能遠見童觀之象小人之道君子之羞也故其占在小人則无咎君子得之則可羞矣本義東萊呂氏曰初六童觀小人道也辭雖指小人意却屬君子小人則可君子則不可易説六二闚觀利女貞象曰闚觀女貞亦可醜也伊川先生曰二應於五觀於五也五剛陽中正之道非二隂暗柔弱所能觀見也故但如闚覘之觀耳闚覘之觀雖少見而不能甚一作盡明也二既不能明見剛陽中正之道則利如女子之貞雖見之不能甚明而能順從者女子之道也在女子為貞也二既不能明見九五之道能如女子之順則不失中正乃為利也君子不能觀見剛陽中正之大道而僅一有能字闚覘其彷彿雖能順從乃同女子之貞亦可羞醜也易傳横渠先生曰得婦人之道雖正可羞易説龜山楊氏曰大觀在上而二以隂柔之質在下卦之内五之宗廟之羙室家之好非二所能見也闚觀而已夫視不出乎閨門之内為女子之正則利矣居大觀之時而為女子之正是亦醜也易説白雲郭氏曰闚者觀之小道也六二柔順居中女子之象也而見應焉故利女貞所謂可醜者非女子之醜也君子為闚觀則醜也男女吉凶不同故恒卦曰婦人貞吉夫子凶則此利女貞者固知為男子之醜也故初之象言小人道則知君子必吝二之爻言利女貞則知男子可醜不然柔順居中得其正應何醜之有易説漢上朱氏曰大觀在上六二不往闔户而觀之所見狹矣故曰闚觀禮女不踰閾守正不動女之貞也故曰利女貞二離為女為目坤為闔户女處乎内而闚外之象九五以中正觀天下六二守闚觀而為女貞亦可醜也隂為醜此爻女子居之則利君子為之則醜易傳新安朱氏曰隂柔居内而觀乎外闚觀之象女子之正也故其占如此丈夫得之則非所利矣在丈夫則為醜也本義六三觀我生進退象曰觀我生進退未失道也伊川先生曰三居非其位處順之極能順時以進退者也若居當其位則无進退之義也觀我生我之所生謂動作施為出於己者觀其所生而隨宜進退所以處雖非正而未至失道也隨時進退求不失道故无悔咎一作吝以能順也能觀己之生而進退以順乎宜故未至於失道也並易傳横渠先生曰觀上所施而進退雖以隂居陽於道未失以其在下卦之體而應於上故曰進退易説廣平游氏曰六三觀我生進退者省諸已也度徳以就位量能以任官也九五觀我生者驗諸民也所以審好惡而察治忽也夫如是則興事造業无過舉矣故无咎此在上位者與徳稱而志在民者之所為也故特稱君子以别六三也若夫上九之觀其生則觀其時之施設也此有君子之才而无其位身在畎畝而志常在君者之所為故亦稱君子而象因其有觀以知其志未平也易説藍田吕氏曰觀我生自觀也觀其生觀彼也六三柔順居二卦之際不苟進以比尊不苟退以逺陽知反己以自觀不失進退之道也龜山楊氏曰九五以中正之徳觀天下之所宜觀也六三上應於九而居非其位能量己以進退雖未得正未失道也易説白雲郭氏曰六三順而應上可以進也柔不當位可以退也觀我道之可進而進可退而退則為不失進退之道矣雖孔子用舎行藏孟子得志不得志之説不過如是而已易説漢上朱氏曰卦以九五為主我謂九五也生動也五之三震為動動謂之生者陽剛反動天地之生五之三三則進而上五不動三則退而止進退動止觀九五而已巽為進退三不當位在上下之際故其象如此六三不能自必其進退者在九五不在六三也九五中正其動必正故六三雖不當位未為失觀之道易傳新安朱氏曰我生我之所行也六三居下之上可進可退故不觀九五而獨觀己所行之通塞以為進退占者宜自審也本義問六三觀我生進退是不觀九五而觀己所行通塞以為進退否先生曰看來合是觀九五大率觀卦二陽在上四隂仰之九五為主六三觀我生進退者觀九五如何而為進退也初六六二以去五之遠觀貴于近所觀不明不大六四却見得親切故有觀光利用之象六三處二四之間固當觀九五以為進退也子善遂問如此則我字乃是指九五而言易中亦有此例如頤之初九曰舎爾靈龜觀我朶頤是也先生曰此我乃是假外而言耳語録東萊吕氏曰六三居下之上又接上體觀是則向是不是則退而􅁱正易説又曰三居上下之交政是用力斟量處己丑課程六四觀國之光利用賔于王象曰觀國之光尚賔也伊川先生曰觀莫明於近五以剛陽中正居尊位聖賢之君也四切近之觀見其道故云觀國之光觀見國之盛德光輝也不指君之身而云國者在人君而言豈止觀其行一身乎當觀天下之政化則人君之道徳可見矣四雖隂柔而巽體居正切近於五觀見而能順從者也利用賔于王夫聖明在上則懷抱才徳之人皆願進於朝廷輔戴之以康濟天下四既觀見人君之徳國家之治光華盛美所宜賔于王朝效其智力上輔於君以施澤天下故云利用賔于王也古者有賢徳之人則人君賔禮之故士之仕進于王朝則謂之賔君子懷負才業志在乎兼善天下然有卷懷自守者盖時无明君莫能用其道不得已也豈君子之志哉故孟子曰中天下而立定四海之民君子樂之既觀見國之盛徳光華古人所謂非常之遇也一无也字所以志願登進王朝以行其道故云觀國之光尚賔也尚謂志尚其志意願慕賔于王朝也並易傳横渠先生曰體柔巽而以隂居下一作隂賔之必无過也故利易説藍田吕氏曰六四以柔居隂處上體之下比於貴而非王也故利用賔于王龜山楊氏曰大觀在上國之光也而四近之則觀國之光宜賔于王矣盖四大臣之位人主之所尊禮也故謂之賔易説兼山郭氏曰六四詩云樂只君子邦家之光六三觀我生進退量力度徳而後進也六四以量力度徳為未盡則又觀國之光見其有禮也見其多賢也然後利賔于王盖君子難進而易退也如是而説者乃謂賔有不純臣之義舜賔于四門豈皆禮其不純臣者邪盖道合則從不合則去則孰无賔之義乎易説白雲郭氏曰先人曰古之人道合則從不合則去孰无賔之義乎雍曰君之光莫光於有徳國之光莫光於用賢六三逺君方且自觀其身而圖進退四則處近君之地已進而觀國者也國有光焉非利用賔于王之時乎盖无進退之疑也或謂賔有不純臣之義夫忠臣嘉賔賢有徳之稱也易説漢上朱氏曰四觀五也四侯位坤為國五王位六四上賔於五五降而接之成坎離光也故曰觀國之光四為朝廷艮為門闕乾五為王動之四為金坤為布帛乾坤𤣥黄幣帛之文升自門闕陳於庭王降而接賔賔下升於西北賔于王也尚者主人以賔為上尚之也古者諸侯入見於王王以賔禮之士而未受禄亦賔之九五中正在上六四體巽而正觀國之光知尚賔忘勢矣尚賔者國之光也禮主人尊賔故坐賔於西北主人接人以仁厚之氣故坐於東南易言賔位者乾也西北方也主人位者巽也東南也易傳新安朱氏曰六四最近於五故有此象其占為利於朝覲進仕也本義東萊吕氏曰六四須看觀莫明於近盖觀近則見得親切洪範曰以近天子之光盖惟近乃見其光華此却不論地之逺近乃心之逺近志異道殊雖近而逺尚友千載雖逺而近孔子之與陽貨堯舜之與驩兠近而逺者也孟子之於孔子文王之於舜逺而近者也易説九五觀我生君子无咎象曰觀我生觀民也伊川先生曰九五居人君之位時之治亂俗之美惡繫乎已而己觀己之生若天下之俗皆君子矣則是己之所為政化善也乃无咎矣若天下之俗未合君子之道則是己之所為政治未善不一作未能免於咎也我生出於己者人君欲觀己之施為善否當觀於民民俗善則政化善也王弼云觀民以察己之道是也並易傳横渠先生曰觀我所自出者易説藍田吕氏解見上九爻龜山楊氏曰九五以中正觀天下而天下之所觀也故得失驗之民而後見欲觀我生觀諸民而已矣苟有失焉其過可補也故君子无咎易説道雖夲諸身得失則驗之民而後見故易曰觀我生觀民也語録白雲郭氏曰九五尊位大中居大觀之位未嘗責天下以必化惟觀我道之何如耳天下入於君子之塗我之道得也故无咎是觀民所以為觀我生也中庸曰取人以身修身以道又曰失諸正鵠則反諸其身皆九五觀民之道也羣黎百姓徧為爾徳人有士君子之行皆天下為君子之時也易説漢上朱氏曰五自觀也五君也坤為民五動之二坤變震為動動謂之生天動則地應觀天道之得失觀諸地可也天為君地為民君者民之所觀而時之治亂風俗之羙惡繫之觀其民則知君君之自觀其得失者亦觀諸民而已中庸曰君子之道本諸身徴諸庶民故君道得其民君子也於己為无咎君道失其民小人也必有失道之咎有堯舜之君則必有堯舜之民矣五之二陽為君子故曰君子无咎成湯曰萬方有罪在予一人先王省方命太師陳詩觀民風乃所以自觀也易傳新安朱氏曰九五陽剛中正以居尊位其下四隂仰而觀之君子之象也故戒居此位得此占者當觀己所行必其陽剛中正亦如是焉則得无咎也此夫子以義言之明人君觀己所行不但一身之得失又當觀民徳之善否以自省察也本義觀我生如月受日光觀其生只是日光語録東萊吕氏曰九五居人君之位故須觀我之所生徳教刑政之類事事合於君子之道人人歸於君子之域方始无咎且九五剛陽中正之徳處於尊位觀之極盛者也不謂之元吉无不利只謂之无咎者葢使天下皆為君子是人君本分職事才得恰好故只謂之无咎人君居尊位最難自觀盖左右前後阿諛迎合然却自有驗得處俗之羙惡時之治亂此其不可掩而最可觀者也易説上九觀其生君子无咎象曰觀其生志未平也伊川先生曰上九以剛陽之徳處於上為下之所觀而不當位是賢人君子不在於位而道徳為天下所觀仰者也觀其生觀其所生也謂出於己者徳業行義也既為天下所觀仰故自觀其所生若皆君子矣則无過咎也苟未君子則何以使人觀仰矜式是其咎也雖不在位然以人觀其徳用為儀法故當自慎省觀其所生常不失於君子則人不失所望而化之矣不可以不在於位故安然放意无所事也是其志意未得安也故云志未平也平謂安寧也並易傳上九以剛陽之徳居无位之地是賢人君子抱道徳不居位為衆人觀仰法式者也雖不當位然為衆人所觀固不得安然放意謂已無與於天下也必觀其所生君子矣乃得无咎聖人又從而賛之謂志當在此固未得安然平定无所慮也觀聖人教示後賢如是之深賢者存心如是之仁與夫素隐獨善者異矣語録横渠先生曰以剛陽極上之徳居不臣不任之位以觀國家之政志有所未平也有君子徇理之心則可免咎俯視九五之為故曰觀其生易説藍田吕氏曰九五以陽居尊中正之位為下所觀觀之盛者也當觀之盛我道己行民之淑慝莫非我也由是觀之斯見我矣書云人无於水監當於民監上九陽居尊處卦之末有徳而无位者也髙而過中與物少可下觀九五未合己故未平也觀民察已得乎自觀以免於咎惟君子能之以我觀彼反求己志極髙明而道中庸以免於咎惟君子能之龜山楊氏曰居一卦之外賢人无位而為天下之所觀也能觀己之動出而補其過則无咎矣曽子之三省是也易説白雲郭氏曰上九道之已成處觀之極不當其任者非若小人女子之童闚又无進退之疑无賔王之利者也故觀其生九五之君六三之臣皆在所觀也志未平者上不能忘君下不能忘民猶有心於觀焉故君子居之則无咎是以聖人慎於在上之觀必觀天而設教者以此易説漢上朱氏曰上觀五也上來之三仰觀九五觀其動之所自出故曰觀其生三動於中志也坎險不平也三觀於五有難焉其志不能平乃往於外三動正也君子也正則无咎上九過剛也過則有咎自古觀其君而去者以未平之志為忿世疾邪之事多失之於矯激太過豈能无咎夫聰明深察而近於死者好譏議人也辯博閎逺而危其身者好發人之過者也梁鴻作五噫以顯宗之賢猶不能堪之非失之過乎夫子不合者多矣進退无咎者君子之道也巽究為躁故以君子戒之易解曰知微知彰知柔知剛然後能觀其生而不失進退之幾焉易傳新安朱氏曰上九陽剛居尊位之上雖不當事任而亦為下所觀故其戒辭略與五同但以我為其小有主賔之異耳志未平言雖不得位未可忘戒懼也本義所生謂言行事為見之於外者既有所省便是未能安然无事東萊呂氏答張敬夫曰吾丈世道所繫居之實難謂宜深體志未平之戒朝夕省察所存者果常不違乎所感者果皆正乎日用飲食之間果皆不踰節乎踈密生熟歴歴可見於此實用力焉工夫自无不進之理别集合訂刪補大易集義粹言卷二十四
