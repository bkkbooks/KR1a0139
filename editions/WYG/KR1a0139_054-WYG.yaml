body:
  text: 合訂刪補大易集義粹言卷五十二頭等侍衛納喇性德編巽下坎上伊川先生曰井序卦困乎上者必反下故受之以井承上升而不已必困為言謂上升不已而困則必反於下也物之在下者莫如井井所以次困也為卦坎上巽下坎水也巽之象則木也巽之義則入也木器之象木入於水下而上乎水汲井之象也易傳井改邑不改井无喪无得往來井井汔至亦未繘井羸其瓶凶伊川先生曰井之為物常而不可改也邑可改而之它井不可遷也故曰改邑不改井汲之而不竭存之而不盈无喪无得也至者皆得其用往來井井也无喪无得其德也常往來井井其用也周常也周也井之道也汔幾也繘綆也井以濟用為功幾至而未及用亦與未下繘於井同也君子之道貴乎有成所以五穀不熟不如荑稗掘井九軔而不及泉猶為棄井有濟物之用而未及物猶无有也羸敗其瓶而失之其用喪矣是以凶也羸毁敗也並易傳白雲郭氏曰井之為物水在下也今坎水居上而為井者水在下則未用在上則出而有功乃能盡井之義故卦辭合德與用言之改邑不改井无喪无得往來井井皆井之德也汔至亦未繘井羸其瓶凶言井之用也井言其凶者以見雖有德而不及用非井也中庸曰天命之謂性率性之謂道脩道之謂教又曰能盡其性則能盡人之性又曰誠者非自成已而已也所以成物也故中庸之言皆終於用盡井之義則中庸之道得矣然卦辭不言其功獨言其凶者葢深以不克終其功為戒也能終其功則吉可知亦猶中庸之言人皆曰予知擇乎中庸而不能期月守之謂也井字本取井􅆬之象而井田又取井字之象故卦名非井田之義改邑不改井者邑有變而井无變故也取之不能竭勿取不能盈故无喪无得往者謂已應而往者也來者謂方來而應之者也往者以此來者以此雖應物无窮而其德未嘗改也幾至未盡綆而羸其瓶與无井德者何以異是以凶也能克終其用則无凶矣孟子曰掘井九軔而不及泉猶為棄井也此論適與井之義同是以聖人貴夫有用而中庸之德為至焉易説新安朱氏曰井者穴地出水之處以巽木入乎坎水之下而上出其水故為井改邑不改井故无喪无得而往者來者皆井其井也汔幾也繘綆也羸敗也汲井幾至未盡綆而敗其瓶則凶也其占為事仍舊无得喪而又當敬勉不可幾成而敗也木義􅂏曰巽乎水而上水井井養而不窮也改邑不改井乃以剛中也汔至亦未繘井未有功也羸其瓶是以凶也伊川先生曰巽入於水下而上其水者井也井之養於物不有窮已一作无有窮也取之而不竭德有常也邑可改井不可遷亦其德之常也二五之爻剛中之德其常乃如是卦之才與義合也雖使幾至既未為用亦與未繘井同井以濟用為功水出乃為用未出則何功也瓶所以上水而致用也羸敗其瓶則不為用矣是以凶也並易傳藍田吕氏曰井出之以濟物也无喪无得汲之无喪不汲无得也往來井井邑有遷改人有往來而井不易也未繘井未説繘也羸其瓶覆而空也巽乎水而上水巽入也凡汲者入器於水中引水而上也白雲郭氏曰順入水性而能上水是之謂井葢井以靜為德以動為功動而出故能致養於无窮不能動出特止水而已非井之義也由是言之則井之道其猶人之性乎人性本靜及其盡之也又足以盡人盡物而至於參天地贊化育井之德亦本靜及其出而應物則致養而不窮故中庸自天命之性至修道之教而後其道終井自其德以及於有用而其道亦終焉改邑不改井剛中之德也汔至亦未繘井未有致養之功功用未成而羸其瓶非凶而何不言无喪无得往來井井者何葢皆係乎剛中之德聖人舉一以明之耳易説漢上朱氏曰此卦􅂏文脱錯當曰巽乎水而上水井改邑不改井乃以剛中也无喪无得往來井井井養而不窮也汔至亦未繘井未有功也羸其瓶是以凶也巽木也入也木入於水舉水而上之井也故曰巽乎水而上水曰井此合二卦言井也泰初之五成井古者八家為井四井為邑邑改而井不改井德之不遷也坤在内為邑坎為水水者所以為井也易其中畫非坎也而坤則可易矣坎之中畫其剛中乎乃難辭也君子窮居不損大行不加窮亦樂通亦樂非剛中不變能之乎故曰改邑不改井乃以剛中也初往之五汲之象若有喪而實无所喪以其不失位不曰取之而不竭乎五來之初不汲之象若有得而實无所得以其失位不曰存之而不盈乎言井之體一也往者上也來者下也往亦井來亦井上下无常其用通矣所以為井者一也體用一也定而應應而常井之養物所以无窮歟故曰无喪无得往來井井井養而不窮也此以九五升降言井之德也汔幾也自二至四體兌兌為澤初本泰震震動也來動於澤之下泉之象荀爽曰隂來在下亦為井是也巽為繩在井中繘也繘汲繩也二幾及初反巽而上有垂繘而汲幾及井泉之象焉亦有既汲而反未能引繘以出乎井之象兩者雖有濟物之用皆未及乎物也何由有功故曰汔至亦未繘井未有功也坤為腹兌為口井中之器有腹有口瓶也在井之内水實其中汲水而上之象也自四至初成反兌兌為口為毁折巽繩反上而毁折之汲水至於井口羸掛其瓶瓶口在下覆其瓶也井之用喪矣凶言初二不正不正則凶故曰羸其瓶是以凶也汔至亦未繘井者半途而廢也羸其瓶凶不善其終也君子免是二者其唯剛中乎此以互體言井之戒也在卦為芒種故太𤣥準之以法范諤昌曰巽乎水當云巽乎木一本曰井羸其瓶凶或曰反巽兌也何以猶有繩之象曰象有相因而成者震陽動於下為大途艮陽止於上為徑路離外實内虚為目巽實者反在上為多白眼相因也故臨之兌為觀之盥損之兌為益之説大過巽與兌同為棟橈巽為繩反復成巽者或為維繫糾固之象其在井為反繘而上之象象之相因其生无窮也易傳又曰巽為繩汲水為繘九二汔至此未及泉也自二至四有反巽之象故又為亦未繘井言未收繘而至井也荀爽解中孚曰兩巽對合外實中虚則古人取象有用反卦為象者於此可見叢説新安朱氏曰巽乎水以卦象釋卦名義乃以剛中以卦體釋卦辭无喪无得往來井井兩句意與不改井同故不復出剛中以二五而言未有功而敗其瓶所以凶也本義井是那掇不動底物事所以改邑不改井井象只取巽入之義不取木義汔至亦未繘井羸其瓶凶汔至作一句亦未繘井羸其瓶是一句意謂幾至而止如綆未及井而瓶敗言功不成也語録象曰木上有水井君子以勞民勸相伊川先生曰木承水而上之一作來乃器汲水而出井之象君子觀井之象法井之德以勞徠其民而勸勉以相助之道也勞徠其民法井之用也勸民使相助法井之施也易傳横渠先生曰養而不窮莫若勞民而勸相也易説藍田吕氏曰木上有水井井以木為幹出水於木上也汲井者共力引之以利物故有勞民勸相之象也白雲郭氏曰飢渴之害甚矣人能无飢渴之害者井養之功也民之勞苦亦甚矣使民忘其勞而服田力穡者君子勞民勸相之道也勞民勸相之道无它焉盡其性以安之而已因其性以利導之而已皆所以致養也故勞民勸相可以配井之功用則井之功用博矣易説漢上朱氏曰坎為水勞卦也水在地中自下而升達於木上可謂勞矣其於水也有出之道故曰井坤為民泰震為左兌為右相之兌為口勸之也君子施澤於民既以言勸其不能又以道相其不足雖勞而不憚不如是井道不足以及民矣雅鴻鴈勞來還定安集之詩其辭曰知我者謂我劬勞又曰雖則劬勞其究安宅勞民勸相者固自勞也易傳新安朱氏曰木上有水津潤上行井之象也勞民者以君養民勸相者使民相養皆取井養之義本義木上有水井説者以為木是汲器則後面却有瓶瓶自是瓦器此不可曉怕只是説水之津潤上行至那木之杪這便是井水上行之象問恐是桔橰之𩔖答曰亦恐是如此又云禾上露珠便是下面水上去大率裏面水氣上則外面底也上問木上有水井之義曰如草木之生津潤皆上行直至樹末此即木上有水之義雖至小之物亦然如石菖蒲每晨葉尾皆有水如珠非露水也曰如此則井字之義與木上有水何預曰木上有水便如井中之水水本在井底却能汲上來供人食用故取象如此又問程子井桶之説是否曰不然木上有水井是木穿水中漲上那水若作汲桶則解不通矣且與後面羸其瓶凶之説不相合也並語録初六井泥不食舊井无禽象曰井泥不食下也舊井无禽時舍也伊川先生曰井與鼎皆物也就物以為義六以隂柔居下上无應援无上水之象不能濟物乃井之不可食也井之不可一无可字食以泥汚也在井之下有泥之象井之用以其水之養人也无水則舍置不用矣井水之上人𫉬其用禽鳥亦就而求焉舊廢之井人既不食水不復上則禽鳥亦不復往矣葢无以濟物也井本濟人之物六以隂居下无上水之象故為不食井之不食以泥也猶人當濟物之時而才弱无援不能及物為時所舍也以隂而居井之下泥之象也无水而泥人所不食也人不食則水不上无以及禽鳥禽鳥亦不至矣見其不能濟物為時所舍置不用也若能及禽鳥是亦有所濟也舍上聲與乾之時舍音不同並易傳藍田吕氏曰初六以柔居下而无應於上下无渫治上无汲引故曰井泥不食即舊井也无禽則人可知也白雲郭氏曰井泥在下之物也井以潔而食泥則汚穢不食矣舊井无禽汚穢也禽尚不至況人乎初六知守下而不知動出之功故為時舍也亦猶人之一性不能自脩偽惡日生則性失矣安能有及物之功乎易説漢上朱氏曰井泰初之五初在井下坤土汨之泥也兌口在上不食也言初六之柔自處卑穢无高人之行故曰井泥不食下也乾之初九往而為坎水去泥存舊井也離為飛鳥四不應初无禽也猶舊井之澤已盡禽亦无也无禽則人不食可知行為人惡四往而不顧時舍之也易傳新安朱氏曰井以陽剛為泉上出為功初六以隂居下故為此象葢井不泉而泥則人所不食而禽鳥亦莫之顧矣時舍言為時所棄並本義九二井谷射鮒甕敝漏象曰井谷射鮒无與也伊川先生曰二雖剛陽之才而居下上无應而比於初不上而下之象也井之道上行者也澗谷之水則旁出而就下二居井而就下失井之道乃井而如谷也井上出則養人而濟物一作上出而養人濟物今乃下就汚泥注於鮒而已鮒或以為蝦或以為蟆井泥中微物耳射注也如谷之下流注於鮒也甕敝漏如甕之破漏也陽剛之才本可以養人濟物而上无應援故不能上而就下是以无濟用之功如水之在甕本可為用乃破敝而漏之不為用也井之初二无功而不言悔咎何也曰失則有悔過則為咎无應援而不能成用非悔咎也居二比初豈非過乎曰處中非過也不能上由无援非以比初也井以上出為功二陽剛之才本可濟用以在下而上无應援是以下比而射鮒若上有與之者則當汲引而上成井之功矣並易傳廣平游氏曰井道以高潔為體以上出為功故初為井泥二為井谷射鮒葢其自處汙下而功用熄矣然九二既得中而有趨下之汙何也葢所居不正則用心不剛又巽體也而上无應故甘心於趨下而不自振其德之地不足稱也易説白雲郭氏曰巽之性順而入不能自舉以趨有用之地故九二亦失井之道而莫見其功也井以上出為功不能動而上反如谷水旁流足以射鮒不足以養人其德既非美矣語其用則甕且敝漏雖有動出之名而无上水之實是以為衆所不與也故漏近於羸瓶无與近於時舍若是者安知有用之大乎許愼云罋汲瓶也易説漢上朱氏曰井以不遷為德非有求於人九五不應无與之者二宜剛中自守養德俟時動而求五失所以為井矣谷注谿者也二動坎水注於艮山之間谷也鮒蛙也兌巽為魚初井泥又伏震為足在下魚𩔖生於井泥而滅跗者鮒也坎􅃓離矢射也動則谷水注下而射鮒言動則其道愈下入於汙濁矣甕汲瓶也説文作罋兌為口離為大腹器在井中有口有腹且大者甕也二動兌毁口壞見腹坎水下流甕敝漏也言動則不能上行以濟物矣嗚呼无與而動動則終莫之與曷若自守哉易傳新安朱氏曰九二剛中有泉之象然上无正應下比初六功不上行故其象如此本義鮒程明道以為便是蝸牛如今廢井中多有之程沙隨以井卦有井谷射鮒一句鮒鰕􆅬也遂説井有蝦蟆之象木上有水井云上前兩足也五頭也四眼也三與二身也初後兩足也其穿鑿一至於此某謂之曰審如此則此卦當為蝦蟆卦方可如何却謂之井卦並語録九三井渫不食為我心惻可用汲王明並受其福象曰井渫不食行惻也求王明受福也伊川先生曰三以陽剛居得其正是有濟用之才者也在井下之上水之清潔可食者也井以上為用居下未得其用也陽之性上又志應上六處剛而過中汲汲於上進乃有才用而切於施為未得其用則如井之渫治清潔而不見食為其心之惻怛也三居井之時剛而不中故切於施為異乎用之則行舍之則藏者也然明王用人豈求備也故王明則受福矣三之才足以濟用如井之清潔可用汲而食也若上有明王則當用之而得其効賢才見用則已得行其道君得享其功下得被其澤上下並受其福也井渫治而不見食乃人有才知而不見用以不得行為憂惻也既以不得行為惻則豈免有求也故求王明而受福志切於行也並易傳横渠先生曰井以既出為功井道之成在於上六三其正應而又以陽居陽充滿可汲為五所間功不上施故為我心惻然若上六明於照物則上下逺邇皆𫉬其利井渫不食強施行惻然且不售作易者之歎歟易説白雲郭氏曰知井以上出為用而能自治以待用者九三是也渫治之而不食則不見知者衆也不見知者衆故有知之者為我心惻也心惻傷之也傷其可用汲而不食也猶之脩德之士不見用者王不知之也王不知之王之不明也王明則達而兼善天下而天下受其福矣象言井渫不食行惻也者葢言渫治而不見用其行可傷惻也爻言王明而象言求王明者君子難進易退葢求明王而事之也故古之人有非其君不事者所以求王明也欲見爻言王明為九三之未遇故曰求王明也易説漢上朱氏曰陽為清潔九三以陽居陽清潔也巽為股為入股入坎水而水清潔治井之象渫也兌口在上不食也九三君子修德潔巳可用而未用猶井渫不食也我者九三自謂上六正應在高位為我道不行憂之其心惻然坎為加憂為心病故為我心惻上六有是心矣可用是心以汲引之坎在井上坎為輪井車汲引之象上汲引之則三往上來其惻然之心見矣失位為憂故也往來行也故曰井渫不食行惻也乾五為王離為明三往應上九五成艮手王受福也三上同象亦受福故並受其福王明五也求王明者三也故求王明受福也司馬遷曰王之不明豈足福哉陽為福求亦艮也上六有憂惻之心不用之以汲引乃士之尊賢也上六就三三往求五乃能盡上下相與之情故夫子増一求字以𤼵其義易傳新安朱氏曰渫不停汚也井渫不食而使人心惻可用汲矣王明則汲井以及物而施者受者並受其福也九三以陽居陽在下之上而未為時用故其象占如此行惻者行道之人皆以為惻並本義上三句是象下兩句是占大抵是説理決不是説汲井若非王明則无以收拾人才並語録東萊吕氏曰所謂井渫葢正指汲汲於濟世者玩味爻象自可見其曰為我心惻憂思葢深長矣又曰王明並受其福葢言王者能識拔而用之則臣主俱泰此豈小知小力之謂哉所以未為井之盛者葢汲汲亟欲施之與知命者殊科耳答陳同甫書六四井甃无咎象曰井甃无咎脩井也伊川先生曰四雖隂柔而處正上承九五之君才不足以廣施利物亦可自守者也故能脩治則得无咎甃砌累也謂脩治也四雖才弱不能廣濟物之功脩治其事不至於廢可也若不能脩治廢其養人之功則失井之道其咎大矣居高位而得剛陽中正之君但能處正承上不廢其事亦可以免咎也甃者脩治於井也雖不能大其濟物之功亦一作若能脩治一有亦字不廢也故无咎僅能免咎而已若在剛陽自不至如是如是則可咎矣並易傳横渠先生曰无應於上无敝漏於下故但免咎而已易説白雲郭氏曰九三有其才而未得其時故有求王明之辭六四近中正之君非无其時矣而其才不能濟物足以自脩而已故有井甃之象焉雖不能濟物茍能自脩則无咎矣未為失也易之言无咎於有疑之爻多言之其不言者或明見其无咎或明知其有咎如井之初六九二雖未至凶皆有咎之爻也九三雖未吉知其无咎矣六四之才疑於有咎故明言无咎以别之聖人之功或見於有言或見於无言是以人難得之也易說漢上朱氏曰坎水坤土合而火之甄也有巽工焉自下壘而上至於井口甃也古者甃井為瓦裏自下達上六四正位近五下无應近泉而无汲引之用守正自脩无咎而已故曰井甃无咎脩井也易傳曰无咎者僅能免咎而已若陽剛自不如是如是則可咎矣易傳新安朱氏曰以六居四雖得其正然隂柔不泉則但能脩治而無及物之功故其象為井甃而占則无咎占者能自脩治則雖无及物之功而亦可以无咎矣本義九五井洌寒泉食象曰寒泉之食中正也伊川先生曰五以陽剛中正居尊位其才其德盡善盡美井洌寒泉食也洌謂甘潔也井泉以寒為美甘潔之寒泉可為人食也於井道為至善也然而不言吉者井以上出為成功未至於上未及用也故至上而後言元吉泉寒而可食井道之至善者也九五中正之德為至善之義並易傳横渠先生曰井冽寒泉美而可汲者也剛中之德為衆所利易説藍田吕氏曰九五剛中居上井德之盛井之所貴潔而寒也所以食者水出於上也中正則无物可汚故全其寒潔以得食也白雲郭氏曰九五剛德中正才德與位兼得之井道莫善於斯故言井洌寒泉食也洌潔也寒者水之性也寒泉既不失其性又脩潔之食之美者莫善於斯猶人能自脩不失其性則德全矣天下之性初未失也皆以不中不正則失之其能自脩使不失其性者无它焉中正而已寒泉之食亦猶是也然言洌又言寒者洌言井之脩潔主人事而言也寒言泉有自然之性主天理而言也人事學也天理命也兩得之斯為至矣繫辭論九卦皆言德德未有不能脩性而得者此井之道所以與性通也易説漢上朱氏曰九五以陽居陽坎又為陽清潔之至故為洌説文云清洌也乾在坎為寒九五即泰初九甲子爻子坎位井五月卦隂氣自下而上井寒矣故五坎有寒泉之象兌口承之食也九五中正贍給萬物而不費往者食之无偏係也故曰寒泉之食以中正也易傳曰不言吉者井以上出為成功未至於上未及用也故至上而後元吉易傳新安朱氏曰洌潔也陽剛中正功及於物故為此象占者有其德則契其象也本義上六井收勿幕有孚元吉象曰元吉在上大成也伊川先生曰井以上出為用居井之上井道之大成也收汲取也幕蔽覆也取而不蔽其利无窮井之施廣矣大矣有孚有常而不變也博施而有常大善之吉也夫一作人體井之用博施而有常非大人孰能它卦之終為極為變唯井與鼎終乃為成功是以吉也以大善之吉在卦之上井道之大成也井以上為成功並易傳廣平游氏曰井之上六則井既清矣无渫也既完矣无甃也既食矣无求也井道之成无所事矣故曰井收收者集其成功之謂也成則如之何亦博施濟衆而已故曰勿幕易説白雲郭氏曰井无他道特以上出為功用耳故至上六為功用大成而元吉也收者功之成也勿以功成而遂吝其博施濟衆之德故云勿幕戒其勿幕所以終井道也其功既成其施愈博天下信之是以元吉象言元吉在上者非上六之元吉也井道至上而大成盡元吉之道也易説漢上朱氏曰幕於字本作勿門亡狄切覆也玉篇曰以巾覆物令為則今易作幕音莫者傳寫誤也當作在古文當作門坎為輪在井之上下應巽繩收也虞翻曰收謂以鹿盧收繘也勿者上六又當守正之象上汲三往艮坎成䝉䝉有覆之意井道大成若專於應三則不正所養狹矣猶井有收而之有𤼵其而得汲者有欲汲之而不得𤼵其者三𤼵其汲之而又者也故於此戒之勿則上下有孚而得元吉在上以井道大成故元吉歸於上也易傳又曰井初六井泥不食舊井无禽者乾之初九去而坤之六五來也九二井谷射鮒甕敝漏者動而求則乖也九三井渫不食者正可任也為我心惻可用汲者上六病也王明並受其福者九三進也六四井甃无咎者隂守正也九五井洌寒泉食者乾之初九位中正也上六井收勿幕者上六安位可成也有孚元吉者上六下而汲九三引而上則功乃大也叢説新安朱氏曰收汲取也晁氏云收鹿盧收繘者也亦通幕蔽覆也有孚謂其出有原而不窮也井以上出為功而兌口不揜故上六雖非陽剛而其象如此然占者應之必有孚乃元吉也本義收雖作去聲讀義只是收也語録合訂刪補大易集義粹言卷五十二
