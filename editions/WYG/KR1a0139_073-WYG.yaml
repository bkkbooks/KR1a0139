body:
  text: 合訂刪補大易集義粹言卷七十一頭等侍衞納喇性徳編一隂一陽之謂道繼之者善也成之者性也仁者見之謂之仁知者見之謂之知百姓日用而不知故君子之道鮮矣濂溪先生曰誠者聖人之本大哉乾元萬物資始誠之源也乾道變化各正性命誠斯立焉純粹至善者也故曰一隂一陽之謂道繼之者善也成之者性也通書康節先生曰一隂一陽之謂道道无聲无形不可得而見者也故假道路之道而為名人之有行必由乎道一隂一陽天地之道也物由是而生由是而成者也觀物外篇明道先生曰一隂一陽之謂道道非隂陽也所以一隂一陽道也如一闔一闢之謂變謝顯道錄天只是以生為道繼此生理者即是善也善便有一箇元底意思元者善之長萬物皆有春意便是繼之者善也成之者性也成却待他萬物自成其一作甚性須得這箇義理仁者又看做仁了也知者又看做知了也百姓又日用而不知此所以君子之道鮮矣此箇亦不少亦不剩只是人看他不見並吕與叔東見錄一隂一陽之謂道自然之道也繼之者善也出道則有用元者善之長也成之者却只是性各正性命者也故曰仁者見之謂之仁知者見之謂之知百姓日用而不知故君子之道鮮矣如此則亦无始亦无終亦无因甚有亦无因甚无亦无有處有亦无无處无劉絢所錄凡人說性只是說繼之者善也孟子言人性善是也夫所謂繼之者善也者猶水流而就下也皆水也有流而至海終无所汚此何煩人力之為也有流而未逺固已漸濁有出而甚逺方有所濁有濁之多者有濁之少者清濁雖不同然不可以濁者不為水也如此則人不可以不加澄治之功故用力敏勇則疾清用力緩怠則遲清及其清也則却只是元初水也亦不是將清來換却濁亦不是取出濁來置在一隅也水之清則性善之謂也故不是善與惡在性中為兩物相對各自出來此理天命也順而循之則道也循此而修之各得其分則教也自天命以至於教我无加損焉李籲所錄伊川先生曰道者一隂一陽也動靜无端隂陽无始非知道者孰能識之動靜相因而成變化順繼此道則為善也成之在人則謂之性也在衆人則不能識隨其所知故仁者謂之仁知者謂之知百姓則由之而不知故君子之道人鮮克知也經說一隂一陽之謂道此理固深說則无可說所以隂陽者道既曰氣則便是一作有二言開闔便是感既二則便有感所以開闔者道開闔便是隂陽老氏言虚而生氣非也隂陽開闔本无先後不可道今日有隂明日有陽如人言形影蓋形影一時不可言今日有形明日有影有便齊有離了隂陽更无道所以隂陽者是道也隂陽氣也氣是形而下者道是形而上者形而上者則是密也止於至善不明乎善此言善者義理之精微无可得名且以至善目之繼之者善此言善却言得輕但謂繼斯道者莫非善也不可謂之惡並入關語錄横渠先生曰一隂一陽是道也能繼繼體此而不已者善也善之猶言能繼此者也其成就之者則必俟見性是之謂聖仁者不已其仁始謂之仁知者不已其知方謂之知此是致曲曲能有誠也誠則有變化必仁智會合乃為聖人也前謂聖人者於一節上成性也夷惠所以亦得稱聖人然行在一節而已百姓日用而不知蓋所用莫非在道飲食男女皆性也但已不自察由旦至暮凡百舉動莫非感而不之知今失心又不求感又不求所以醉而生夢而死者衆也言繼繼不已者善也其成就者性也仁智各以成性猶仁禮以成性勉勉而不息可謂善成而存存在乎性仁知見之所謂曲能有誠者也不能見道其仁知終非性之有也性未成則善惡混故亹亹而繼善者斯為善矣惡盡去則善因以亡故舍曰善而曰成之者性神不可致思存焉可也化不可助長順焉可也存虚名乆至徳順變化達時中仁之至義之盡也知微知彰不舍繼其善然後可以成之性矣聞見不足以為已有仁者見之謂之仁知者見之謂之知心各有本性始為已有茍未見性須當勉勉今學者既知趨向殊不費力何為不勉勉百姓日用而不知溺於流也並易說所謂勉勉者謂繼之者善也成之者性也繼繼不已乃善而能至於成性也經學理窟廣平游氏曰孔子之言性有以其本言之者若繼之者善成之者性是也有以人所見言之者若性相近習相逺是也孟子亦然其道性善深探其本也其曰孺子將入井皆有怵惕惻隠之心乃若其情則可以為善矣始據人所言而語之也是以當時學者不能无疑夫道未始有名感於物而出則善之名立矣託於物而生則性之名立矣善者性之徳故莊子曰物得以生謂之徳性者善之資也故莊子曰形體保神謂之性蓋道之在天地則播五行於四時百物生焉无非善者也无惡也故曰繼之者善也道之在人則出作而入息渴飲而飢食性者无妄也茍得其性之本然反身而誠則天地萬物之理得而道自我成矣故曰成之者性也惟其同出於一氣而氣之所值有全有偏有邪有正有碎有駁有厚有薄然後有上知下愚中人之不同也語解龜山楊氏曰仲素問横渠曰氣質之性如何曰人所資稟固有不同者若論其本則无不善蓋一隂一陽之謂道隂陽无不善而人則受之以生故也然而善者其常也亦有時而惡矣猶人之生也氣得其和則為安樂人及其有疾也以氣不和而然也然氣不和非其常治之而使其和則反常矣其常者性也此孟子所以言性善也横渠說氣質之性亦云人之性有剛柔緩急强弱昏明而已非謂天地之性然也今夫水清者其常然也至於汨濁則泥沙混之矣泥沙既去其清者自若也是故君子於氣質之性必有以變之其澄濁而水清之義歟餘杭語錄横渠言性未成則善惡混亹亹而繼善者斯為善矣惡盡去則善因以亡故舎曰善而曰成之者性伯思疑此以問公曰不知横渠因何如此說據此說於易之文亦自不通却令伯思說伯思言善與性皆當就人言繼之為說如子繼父成乃无所虧之名矣若非人即不能繼而成之曰不獨指人言萬物得隂陽而生皆可言繼之者善亦有多般如乾之四徳有仁義禮智之不同後人以配四時若如四時則春固不可為秋冬固不可為夏其實皆善也元者特善之長也固出於道故曰繼之者善性則具足圓成本无虧欠要成此道除是性也今或以萬物之性為不足以成之蓋不知萬物所以賦得偏者自其氣稟之異非性之偏也孔子曰天地之性人為貴人之性特貴於萬物耳何嘗與物是兩般性萧山語錄又曰繼之者善无間也成之者性无虧也道者民所日用故可使由之以其日用而不知故不可使知之世儒以謂民可使由之而已不可使知之務為智術籠天下之愚而役之失其㫖矣語解廣漢張氏曰近玩味已𤼵未𤼵於日用間甚覺顯煥周子誠通誠復之說極有理也伯逢書來亦說及善不足以明之之說某所荅曾見否大抵當時知言中如此說要形容人生而靜以上事却似有病故程子云天命之謂性人生而靜以上更不容說才說性時便已不是性凡人說性只是說得繼之者善也斯言最為盡之蓋性之淵源惟善可得而名之耳晦叔意如何數日來看龜山集乃知前輩所造如龜山輩未易輕議也答吳晦叔書白雲郭氏曰繫辭言道此章為甚著蓋惟道兼統三才三才不過二象隂陽是也天地人皆具隂陽故六是之謂一隂一陽之道也繼之者有自然之善成之者有在人之性大其性者於此成其大小其性者於此成其小仁者見其仁而得之謂道為仁知者見其知而得之謂道為知故自古聖賢雖各有得而未嘗同者其性之所成異故也然謂仁知非道則不可也特非道之大全耳仁者知者猶有見而得之斯民之愚又日用而不知矣凡日用而順成者皆道也百姓不知有道故性之所成者鮮此聖人所以明之也明之則天下後世皆知其一隂一陽為具三才之道繼之者有善而成之在人使仁知不為獨見之異百姓用而知之此聖人明道之意也然則聖人何如其明也包犧以八卦文王以六十四孔子以彖象繫辭是已故易之為書所以明易之道也易之道三才之道也三才之道一隂一陽之道也一隂一陽之道道之大全也道之大全天得之而天地得之而地人得之而人又成於性者有仁知聖賢之異道盡於斯矣然經自成之者性之後主人事而言其言繼之者善則與道同體不獨在人之善矣經所謂易簡之善配至徳之善也能充孟子性善之說則可以明此為善惡論者不知有此也此善天道也天道无不誠故至善存焉中庸論誠首言天命之謂性孟子良心赤子之心與性善之說雖本諸此又加詳焉易說漢上朱氏曰知易无方則知易无體知易无體則知一隂一陽之謂道一隂一陽在天日月之行也晝夜之經也寒暑之運也在人屈伸也動靜也語黙也推而行之故以是名之為道知一隂一陽之道則繼之而不已者善也君子晝有為宵有得息有養瞬有存亹亹焉孜孜焉不敢須臾舎也夫性无有不善不善非天地之性剛柔之氣或得之偏乃有不善有不善然後善之名立善不善相形而後命之也善反其初者不善盡去則善名亦亡故舍曰善而成之者性也性自成也豈人為哉性即天地也所謂誠也仁者見其道濟天下得易之體也故謂之仁智者見其旁行而不流得易之用也故謂之智百姓習焉而不察行之而不著故日用而不知君子之道仁智合體用一兼體隂陽而无累通乎晝夜之道而知故君子之道鮮矣君子者具仁智之成名得道之大全者也易傳仁者見其靜則謂之仁智者見其動則謂之智君子之道則合仁與智叢說新安朱氏曰隂陽迭運者氣也其理則所謂道道具於隂而行乎陽繼言其𤼵也善謂化育之功陽之事也成言其具也性謂物之所受言物生則有性而各具是道也隂之事也周子程子之書言之備矣仁陽知隂各得是道之一隅故隨其所見而目為全體也日用不知則莫不飲食鮮能知味者又其每下者也然亦莫不有是道焉或曰上章以知屬乎天仁屬乎地與此不同何也曰彼以清濁言此以動靜言並本義問隂陽何以謂之道曰當離合看道須是合理與氣看理是虛底物事无那氣質則此理无安頓處易說一隂一陽之謂道這便兼理與氣而言隂陽氣也一隂一陽則是理矣猶言一闔一闢謂之變闔闢非變也一闔一闢則是變也蓋隂陽非道所以隂陽者道也横渠言由氣化有道之名合虛與氣有性之名意亦以虛為理然虚却不可謂之理理則虚爾亦猶敬則虚靜不可把虚靜喚做敬問本義云道具於隂而行乎陽竊意道之大體云云是則動靜无端隂陽无始要之造化之初必始於靜曰既曰无端无始如何又始於靜看來只是一箇實理動則為陽靜則為隂今之所謂動者便是前面靜底末梢其實靜前又動動前又靜只管推上去更无了期所以只得從這處說起問一隂一陽之謂道曰以一日言之則晝陽而夜隂以一月言之則望前為陽望後為隂以一歲言之則春夏為陽秋冬為隂從古至今恁地滚將去只是箇隂陽是孰使之然哉乃道也從此句下又分兩脚此氣之動為人物渾是一箇道理故人未生以前此理本善所以謂繼之者善此則屬陽氣質既定為人為物所以謂成之者性此則屬隂一隂一陽此是天地之理如大哉乾元萬物資始乃繼之者善也乾道變化各正性命此成之者性也這一叚是說天地生成萬物之意不是說人性上事就人身言之道是吾心繼之者善是吾心發見惻隠羞惡之類成之者性是吾心之理所以為仁義禮智是也天地之間无往而非隂陽一動一靜一語一黙皆是隂陽之理至如揮扇便屬陽住扇便屬隂莫不有隂陽之理繼之者善是陽成之者性是隂隂陽只是此隂陽但言之不同如二氣迭運此兩相為用不能相無者也至以陽為君子隂為小人則又自夫剛柔善惡而推之以言其徳之異耳繼之者善是已𤼵之理成之者性是未𤼵之理自其接續流行而言故謂之已𤼵以賦受成性而言則謂之未𤼵及其在人則未𤼵者固是性而其所𤼵亦只是善凡此等處皆須各隨文義所在變通而觀之才拘泥便相梗說不行譬如觀山所謂横看成嶺側成峯也問孟子只言性善繫辭却云一隂一陽之謂道繼之者善也成之者性也如此則性與善却是二事曰一隂一陽是總名繼之者善是二氣五行事成之者性是氣化已後事流行造化處是善凝成於我者即是性繼是接續緜緜不息之意成是凝成有主之意繼之者善也元亨是氣之方行而未著於物也是上一截事成之者性也利貞是氣之結成一物也是下一截事繼之者善方是天理流行之初人物所資以始成之者性則此理各自有箇安頓處故為人為物或昏或明方是定若是未有形質則此性是天地之理如何把做人物之性得問繼善成性是道是器曰繼之成之是器善與性是道易大傳言繼善是指未生之前孟子言性善是指已生之後雖曰已生然其本體初不相離也或問成之者性曰性如寶珠氣質如水水有清有汙故珠或全見或半見或不見又問先生嘗說性是理本无是物若譬之寶珠則却有是物曰譬喻无十分親切底問仁者見之至鮮矣曰此言萬物各具是性但氣稟不同各以其性之所近者窺之故仁者只見得他𤼵生流動處便以為仁智者只見得他貞靜處便以為智下此一等百姓日用之間習矣而不察所以君子之道鮮矣並語録又曰繼之者善云者造化流行萬物方資以始而未實也成之者性云者物生已實造化與物各藏其用而无所為也答張洽書東萊吕氏曰太極圖義曰所謂一隂一陽之謂道誠者聖人之本物之終始而命之道也動而生陽誠之通也繼之者善萬物之所資以始也靜而生隂誠之復也成之者性萬物各正其性命也圖義以動而生陽為繼之者善靜而生隂為成之者性恐有分截之病通書止云一隂一陽之謂道繼之者善也成之者性也元亨誠之通利貞誠之復却自渾全答朱侍講質疑顯諸仁藏諸用鼓萬物而不與聖人同憂康節先生曰若日月之照臨四時之成歲是顯諸仁也不知其所以然是藏諸用也顯諸仁藏諸用孟子善藏其用者乎並觀物外篇明道先生曰鼓萬物而不與聖人同憂聖人人也故不得无憂天則不為堯存不為桀亡者也劉絢師訓伊川先生曰運行之跡生育之功顯諸仁也神妙无方變化无跡藏諸用也天地不與聖人同憂天地不宰聖人有心也天地无心而成化聖人有心而无為經說和靖云見王信伯云昔時問鼓萬物而不與聖人同憂之意於張思叔思叔對曰堯舜其猶病諸後因侍伊川伊川問鼓萬物而不與聖人同憂如何說則對以思叔之語伊川曰不然天地以无心故不憂聖人致有為之事故憂吕堅中記尹和靖語鼓萬物而不與聖人同憂聖人有為之功天地不宰之功游氏拾遺鼓舞萬物而不與聖人同憂此天與人異處聖人有不能為天之所為處吕與叔東見錄天理鼓動萬物如此聖人循天理而欲萬物同之所以有憂患游定夫所錄横渠先生曰非神不能顯諸仁非知不能藏諸用老子言天地不仁以萬物為芻狗此是也聖人不仁以百姓為芻狗此則異矣聖人豈有不仁所患者不仁也天地則何意於仁鼓萬物而已聖人則仁耳此其為能𢎞道也天不能皆生善人政以天无意也鼓萬物而不與聖人同憂聖人之於天下法則无不善也然古者治世多而後世不治何也人徒見文字所記自唐虞以上幾治幾亂須歸之運數有大運有小運故孟子曰天之生民乆矣一治一亂繫之為言或說天或說人卒歸一道蓋不異術故其參錯而理則同也鼓萬物而不與聖人同憂則於是分出人之道不可混天鼓萬物而與聖人同憂此言天徳之至也與天同憂樂垂法於後世雖是聖人之事亦猶聖人之末流耳神則不屈无復回易鼓萬物而不與聖人同憂者此直謂天也天則无心神故可以不詘聖人則豈忘思慮憂患雖聖亦人耳焉得遂欲如天之神庸不害於其事聖人茍不用思慮憂患以經世則何用聖人天治自足矣聖人所以有憂者聖人之仁也不可以憂言者天也蓋聖人成能所以異於天地並易說鼓萬物而不與聖人同憂天道也聖不可知也无心之妙非有心所及也正蒙聖人无隠者也聖人天也天隠乎及有得處便若日月有明容光必照焉但通得處則到只恐深厚人有所不能見處以顔子觀孔子猶有看不盡處所謂顯諸仁藏諸用者不謂以用藏之但人不能見也經學理窟已上一條補白雲郭氏曰此章明易與聖人之同用且易之道无體故隠顯无常當用則顯諸仁已用則藏諸用顯也藏也皆有所託故知易之无體也方其用也雖鼓動萬物使之化育而无道不行之憂是不與聖人同憂矣易說漢上朱氏曰天道之行雷霆風雨日月寒暑剛柔相摩萬物變化顯諸仁也雷霆之所以鼓風雨之所以潤日月寒暑之所以運行莫知其然而然藏諸用也天理自動萬物聴之鼓萬物也此天道无心之妙猶不與聖人同憂者蓋聖人有相之之道不以其所可憂者而同乎无憂謂以配天地立人道者存乎已易之道是已易傳新安朱氏曰顯自内而外也仁謂造化之功徳之𤼵也藏自外而内也用謂機緘之妙業之本也程子曰天地无心而成化聖人有心而无為本義顯諸仁藏諸用二句只是一事顯諸仁是可見底便是繼之者善也藏諸用是不可見底便是成之者性也藏諸用是顯諸仁底骨子正如說一而二二而一者也張忠定公說事未判屬陽已判屬隂亦是此意顯諸仁藏諸用亦如元亨利貞元亨是𤼵用流行處利貞便是流行底骨子顯諸仁徳之所以盛藏諸用業之所以成譬如一樹一根生許多枝葉花實此是顯諸仁處及至結實一核成一箇種子此是藏諸用處道家脩養有納甲之法皆只用乾坤艮巽震兊六卦流行運用而不用坎離坎離便是那六卦流行底骨子所以流行運用者只流行此坎離而已便是顯諸仁藏諸用之說顯諸仁是流行𤼵見處藏諸用是流行𤼵見底物正如以穀喻仁是藏諸用也及𤼵為親親仁民愛物一事又各自成一仁顯諸仁是用底迹藏諸用是仁底心問本義云顯者陽之仁也徳之𤼵也藏者隂之知也業之成也案此問是據未定本竊意以為天地之理動而陽則萬物之𤼵生者皆其仁之顯著靜而隂則其用藏而不可見其顯諸仁則是徳之𤼵見其藏諸用則萬物各得以為性是業之成也曰不如此這處極微難說又曰顯諸仁易說藏諸用極難說這用字如横渠說一故神神字用字一様顯諸仁如春生夏長𤼵生彰著可見者藏諸用是所以生長者藏在裏面而不可見又這箇有作先後說處如元亨利貞之類有作表裏說處便是這裏又曰元亨利貞也可作表裏說所謂流行者别无物事只是流行這箇又曰譬之仁𤼵出來便是惻隠之心便是顯諸仁仁便是藏諸用惻隠之心方是流行處到得親親仁民愛物方是成就處但盛徳便屬之顯諸仁大業便屬之藏諸用鼓萬物而不與聖人同憂此言造化之理如聖人則只是人安得而无憂天地造化是自然聖人雖生知安行然畢竟是有心去做所以說不與聖人同憂明道兩句最好天地无心而成化聖人有心而无為无心便是不憂成化便是鼓萬物天地鼓萬物亦何嘗有心來並語錄東萊吕氏曰顯諸仁者此理无所不在視聽言動之間以至於風雨霜露庶物露生風霆流形无非教者是之謂顯是无非仁即此便是奥義故曰藏諸用麗澤論說盛徳大業至矣哉富有之謂大業日新之謂盛徳伊川先生曰天地聖人之盛徳大業可謂至矣富有溥博也日新无窮也經說君子之學必日新日新者日進也不日新者必日退未有不進而不退者唯聖人之道无所進退以其所造者極也暢潛道錄問日新有進意抑只是无弊意曰有進意學者求有益須是日新楊遵道錄日新之謂盛徳生生之謂易隂陽不測之謂神要思而得之劉絢師訓横渠先生曰富有廣大不禦之盛歟日新悠乆无疆之道歟富有者大无外也日新者乆无窮也顯其聚也隠其散也顯且隠幽明所以存乎象聚且散推盪所以妙乎神日新之謂盛徳過而不有不凝滯於心知之細也非盛徳日新惟日新是謂盛徳義理一貫然後日新易說白雲郭氏曰易有盛徳大業聖人用易之道亦見於徳業故盛徳大業不獨主聖人言之易窮則變變則通通則乆此易之盛徳也以言乎天地之間則備矣此易之大業也然富有則无外无外大之至也聖人用此故有可大之業日新則无窮无窮則乆聖人用此故有可乆之徳也前言易道之不與聖人同憂者此言其所同者徳業也易說漢上朱氏曰聖人盛徳大業豈不至矣哉横渠曰富有者大而无外也日新者乆而无窮也易傳新安朱氏曰盛徳大業至矣哉是賛歎上面顯諸仁藏諸用盛徳大業以下都是說易之理非指聖人而言先說箇富有方始說日新此與說宇宙相似先是有這物事了方始相連相續去自富有至效法是說其理如此用處却在那極數知來與通變上面蓋說上面許多道理要做這用生生不已所謂日新也萬物无不具此理所謂富有也並語錄生生之謂易成象之謂乾效法之謂坤極數知來之謂占通變之謂事隂陽不測之謂神康節先生曰任我則情情則蔽蔽則昏矣因物則性性則神神則明矣潛天潛地不行而至不為隂陽所攝者神也觀物外篇明道先生曰生生之謂易生生之用則神也劉絢師訓生生之謂易天地設位而易行乎其中豈可只以今之易書為易乎生生之謂易天地設位而易行乎其中乾坤毁則无以見易易不可見乾坤或幾乎息矣易畢竟是甚又指而言曰聖人以此洗心退藏於密聖人示人之意至此深且明矣終无人理會易也此也密也是甚物人能至此深思當自得之並劉絢所錄伊川先生曰生生相續變易而不窮也乾始物而有象坤成物而體備法象著矣推數可以知來通變不窮事之理也天下之有不離乎隂陽惟神也莫知其鄉不測其為剛柔動靜也經說天地隂陽其勢髙下甚相背然必相須而為用也有隂便有陽有陽便有隂有一便有二纔有一二便有一二之問便是三已往便无窮老子亦言三生萬物此是生生之謂易理自然如此附劉元承手編生生之謂易是天之所以為道吕與叔東見錄游定夫問伊川隂陽不測之謂神伊川曰賢是疑了問是揀難底問晁氏客語仲尼於論語中未嘗說神字只於易中不得已言數處而已入關語錄横渠先生曰生生猶言進進也極數知來前知也前知其變有道術以通之君子所以措於民者逺矣能通其變而措於民聖人之事業也並易說白雲郭氏曰此章先明易與乾坤體用後言聖人之效法且自易而生乾坤自乾坤生八卦八卦生六十四而後二篇之䇿當萬物之數所謂生生之謂易也自易之生乾為成象之始坤則效法於乾此乾坤之義也能盡天下之數以前知者易之占也通其變而周流无窮者易之事也惟神无方无乎不在故以隂陽不測言之此論易與乾坤之體以及於不可知之神皆體也自此而下易與乾坤之用也易說漢上朱氏曰陽生隂隂生陽陽復生隂隂復生陽生生不窮如環无端此之謂易太極不動則含兩儀動而生陽一太極兩儀而成象此天所以三也靜而生隂隂配於陽猶形之有影故兩剛柔男女而效之法此地所以兩也成象者健也此之謂乾效法者順也此之謂坤天數二十有五地數三十極天地之數而吉凶之變可以前知此之謂占窮則變變則有術以通之此之謂事隂陽變化不可測度此之謂神是道也在聖人為徳業在天地之用為易簡在易為乾坤為占為神以兩言該之曰仁智以一言該之曰道其實一也易傳易之乾坤分隂分陽迭用柔剛上下不居周流六虚蓋象乎帝也故曰隂陽不測之謂神叢說新安朱氏曰隂生陽陽生隂其變无窮理與書皆然也效呈也法謂造化之詳密而可見者占筮也事之未定者屬乎陽也事行事也占之已決者屬乎隂也極數知來所以通事之變張忠定公言公事有隂陽意蓋如此張子曰兩在故不測並本義既說盛徳大業又說他只管恁地生去所以接之以生生之謂易是漸漸說入易上去乾只略成一箇形象坤便都呈見出許多法來到坤處都細了萬法一齊出見效字如效順效忠效力之效極數知來之謂占占出這事人便依他這箇做便是通變之謂事看來聖人到這處便說在占上去則此書分明是要占矣隂陽不測之謂神是總結這一叚不測者是在這裏又在那裏便是這一箇物事走來走去无處不在六十四卦都說了這又說三百八十四爻許多變化只是這一箇物事周流其間至之曰正義謂易者變化之總號代換之殊稱乃隂陽二氣生生不息之理竊見此數語亦說得好曰某以為易字有二義有交易有變易先天圖一邊本都是陽一邊本都是隂陽中有隂隂中有陽便是陽往交易隂隂來交易陽兩邊各各相對其實非此往彼來只是其象如此然聖人當初亦不恁地思量只是畫一箇陽一箇隂每箇便生兩箇就一箇陽上又生一箇陽一箇隂就一箇隂上又生一箇隂一箇陽只管恁地去自一為二二為四四為八八為十六十六為三十二三十二為六十四既成箇物事便自然如此齊整皆是天地本然之妙元如此但略假聖人手畫出來問易有交易變易之義如何曰交易是陽交於隂隂交於陽是卦圖上底如天地定位山澤通氣云云是也變易是陽變隂隂變陽老陽變為少隂老隂變為少陽此是占筮之法如晝夜寒暑屈伸往來者是也問日新之謂盛徳生生之謂易隂陽不測之謂神要思而得之明道提此三句說意是如何曰此三句也是𦂳要須是看得本分方得問徳是得於已底業是𤼵出來底徳便是本生生之謂易便是體成象之謂乾效法之謂坤便只是裏面交藉底曰乾坤其易之緼易是一塊乾坤是在裏面往來底聖人作易便是如此又問隂陽不測之謂神便是妙用處曰便是包括許多道理成象之謂乾此造化方有些顯露處效法之謂坤以法言之則大段詳密矣效字難看如效力效誠之效有陳獻底意思乾坤只是理理本无心自人而觀猶必待乾之成象而後坤能效法然理自如此本无相待且如四時亦只是自然迭運春夏生物初不道要秋冬成之秋冬成物又不道成就春夏之所生皆是理之所必然者爾成象效法依舊只是隂陽凡屬陽底便是只有箇象而已象是方做未成形之意已成便屬隂成象謂如日月星辰在天亦无箇實形只是箇懸象如此乾便略坤便詳效如陳效之效法是有一成已定之物可以形狀見者如條法亦是實有已成之法效呈也如曲禮效犬者左牽之之效蓋乾只是成得大象坤便呈出那法來效法則效其形法而可見者也並語錄東萊吕氏曰理會得生生之謂易便理會得樂則生矣生則惡可已也蓋生是新鮮變動之意易說又曰生生不窮者則未嘗亡也散則氣耳麗澤論說右第五章新安朱氏本義曰此章言道之體用不外乎隂陽而其所以然者則未嘗倚於隂陽也夫易廣矣大矣以言乎逺則不禦以言乎邇則靜而正以言乎天地之間則備矣伊川先生曰易道廣大推逺則无窮近言則安靜而正天地之間萬物之理无有不同經說白雲郭氏曰易道廣大彌綸天地故逺不可禦而无不及近无所遺皆靜而正天地之間或道或事在人在物无不備於斯此易道之用也易說漢上朱氏曰廣者坤也大者乾也以言乎逺者變動也入於无形莫之能禦也以言乎邇者不變者也靜而守正一天下之動者也以言乎天地之間則乾坤合徳剛柔有體變與不變互相推盪而萬物備矣廣矣大矣備矣所謂富有也易傳新安朱氏曰不禦言无盡靜而正言即物而理存備言无所不有本義夫易廣矣大矣至靜而正是无大无小无物不包然當體便各具此道理靜而正須著工夫看又曰未動時便都有此道理都是眞實所以下箇正字以言乎邇則靜而正以言乎天地之間則備矣靜而正謂觸處皆見有此道不待安排不待措置雖至小至近至鄙至陋之事无不見有隨處皆見足无所欠闕只觀之人身便見並語錄夫乾其靜也專其動也直是以大生焉夫坤其靜也翕其動也闢是以廣生焉康節先生曰夫一動一靜者天地之至妙者歟一動一靜之間者天地人之至妙至妙者歟是故知仲尼之所以能盡三才之道者謂其行无轍迹也觀物内篇明道先生曰乾陽也不動則不剛其靜也専専一其動也直直遂不専一則不能直遂坤隂也不靜則不柔其靜也翕翕聚其動也闢𤼵散不翕聚則不能𤼵散劉絢師訓伊川先生曰乾靜也専動也直専専一也直直易也惟其專直故其生物之功大坤靜翕動闢坤體動則開應乾開闔而廣生萬物經說白雲郭氏曰乾為陽主動坤為隂主靜一於動則不能生大无其體也一於靜則不能生廣无其用也大哉乾元萬物資始靜専也雲行雨施品物流形動直也坤之含𢎞靜翕也光大動闢也故又曰坤至柔而動也剛至靜而徳方此廣大所由以生也易說漢上朱氏曰夫乾之靜以一陽藏於二隂之中隂不能撓故専及其動也九變為六依坤而行故直坤之靜也以一隂藏於二陽之中隨陽而入故翕及其動也六變而九從乾而出故闢直則自遂闢則寖昌大生者通乎形外廣生者用止乎形此廣大之辨也易傳新安朱氏曰乾坤各有動靜於其四徳見之靜體而動用靜别而動交也乾一而實故以質言而曰大坤二而虛故以量言而曰廣蓋天之形雖包於地之外而其氣常行乎地之中也易之所以廣大者以此本義乾靜専動直而大生坤靜翕動闢而廣生這說隂陽體性如此卦畫也髣髴似恁地乾坤二卦觀之亦可見乾畫竒便見得其靜也専其動也直坤畫耦便見得其靜也翕其動也闢天體大是以大生焉地體虚是以廣生焉廣有虚之義如河廣漢廣之廣問本義云乾一而實故以質言而曰大坤二而虚故以量言而曰廣曰此兩句解得極分曉蓋曰以形言之則天包地外地在天中所以說天之質大以理與氣言之則地却包著天天之氣却盡在地之中地盡承受得那天之氣所以說地之量廣天只是一箇物事一故實從裏面便實出來流行𤼵生只是一箇物事所以說乾一而實地雖是堅實然却虚所以天之氣流行乎地之中皆從地裏𤼵出來所以說坤二而虚問隂耦陽竒就天地之實形上看如何見得曰天是一箇渾淪底物雖包乎地之外而氣則迸出乎地之中地雖一塊物在天之中其中實虛容得天之氣迸上來繫辭云乾靜也専動也直是以大生焉坤靜也翕動也闢是以廣生焉大生是渾淪无所不包廣生是廣濶能容受得那天之氣専直則只是一物直去翕闢則是兩箇翕則闔闢則開此竒耦之形也又曰隂偏只是一半兩箇方做得一箇其靜也翕其動也闢地到冬間氣都翕聚不開至春則天氣下入地地氣開以迎之並語錄廣大配天地變通配四時隂陽之義配日月易簡之善配至徳伊川先生曰廣大天地之功也變通四時之運也一隂一陽日月之行也乾坤易簡之功乃至善之徳也經說横渠先生曰循天下之理之謂道得天下之理之謂徳故曰易簡之善配至徳易說白雲郭氏曰乾坤之廣大足以配天地其變通足以配四時其為隂陽之義足以配日月其易簡之善足以配至徳至徳主聖人中庸之徳而言盡中庸人道之至徳則可乆之徳可大之業皆至徳也配者非乾坤不足於是四者而曰配也以言乾坤之一足以配其全徳則天地四時日月至徳皆為乾坤之一象耳是以乾坤以廣大之一道足以盡天地而天地不足以盡乾坤者此也易說新安朱氏曰易之廣大變通與其所言隂陽之説易簡之徳配之天道人事則如此本義右第六章合訂刪補大易集義粹言卷七十一
