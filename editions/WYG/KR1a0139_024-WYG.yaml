body:
  text: 合訂删補大易集義粹言卷二十二頭等侍衞納喇性德編巽下艮上伊川先生曰蠱序卦以喜隨人者必有事故受之以蠱承二卦之義以為次也夫喜說以隨於人者必有事也无事則何喜何隨蠱所以次隨也蠱事也蠱非訓事蠱乃有事也為卦山下有風風在山下遇山而回則物亂是為蠱象蠱之義壊亂也在文為蟲皿皿之有蟲蠱壞之義左氏傳云風落山女惑男以長女下於少男亂其情也風遇山而回物皆撓亂是為有事之象故云蠱者事也既蠱而治之亦事也以卦之象言之所以成蠱也以卦之才言之所以治蠱也易傳東萊吕氏曰易傳云乃有事也天下本无事己丑課程蠱元亨利渉大川先甲三日後甲三日伊川先生曰既蠱則有復治之理自古治必因亂亂則開治理自然也如卦之才以治蠱則能致元亨也蠱之大者濟時之艱難險阻也故利渉大川先甲後甲者甲數之首事之始也如辰之甲乙甲第甲令皆謂首也事之端也治蠱之道當思慮其先後三日葢推原先後為救弊可久之道先甲謂先於此究其所以然也後甲謂後於此慮其將然也一日二日至於三日言慮之深推之逺也究其所以然則知救之之道慮其將然則知備之之方善救則前弊可革善備則後利可久此古之聖王所以新天下而垂後世也後之治蠱者不明聖人先甲後甲之誡慮淺而事近故勞於救亂而亂不革功未及成而弊已生矣甲者事之首庚者變更之首制作政教之類則云甲舉其首也發號施令之事則云庚庚猶更也有所變更也並易傳先甲三日以窮其所以然而處其事後甲三日以究其將然而為之防甲者事之始也庚者有所革也自甲乙至於戊己春夏生物之氣已備庚者秋冬成物之氣也故有所革劉絢師訓横渠先生曰元亨然後利渉大川易説白雲郭氏曰伊川曰自古治必因亂亂則開治理自然也又曰甲數之首事之始也如辰之甲乙是也有始必有終有終必有始天之道也聖人知始終之道故能原始而究其所以然要終而備其將然先甲謂先於此究其所以然也後甲謂後於此慮其將然也一日二日至於三日言慮之深推之逺也究其所以然則知救之之道慮其將然則知備之之方善救則前弊可革善備則後利可久此古之聖王所以新天下而垂後世也又曰甲者事之首庚者變之首制作政教之類則云甲舉其首也發號施令之事則稱庚庚猶更也雍曰甲庚之說自古失之甚至於論及辛丁為巫史之言獨伊川先生最為得也且蠱者事也事之蠧弊者也故傳曰皿蟲為蠱天下之事如循環新故治亂相因而不留也故亂則將治弊則將新理之必然者也是以蠱為己弊而大亨居前勢甚易為也利渉大川言其有為之易也易言利渉大川非剛健之才則虚中有濟之象而蠱特言其易於有為也觀易之爻兼三才而兩之故六是以陽不過六隂不過六而盡矣復稱七日自姤經六爻至復初九而七也臨稱八月自復經六爻至遯六二而八也蠱之先甲後甲亦六日之義先甲三日者蠱之先也新之終而弊之始也至中而大弊矣是為蠱也以言乎治則不治之時也後甲三日者蠱之後也弊之終而新之始也至中而大新矣是為蠱之反也以言乎治則治之時也故治為蠱之反而蠱為治之反二者之象兼於先甲後甲之中相與循環而已甲即蠱也易說新安朱氏曰蠱壞極而有事也其卦艮剛居上巽柔居下上下不交下卑巽而上苟止故其卦為蠱或曰剛上柔下謂卦變自賁來者初上二下自井來者五上上下自既濟來者兼之亦剛上而柔下皆所以為蠱也蠱壞之極亂當復治故其占為元亨而利渉大川甲日之始事之端也先甲三日辛也後甲三日丁也前事過中而將壞則可自新以為後事之端而不使至於大壞後事方始而尚新然便當致其丁寧之意以監其前事之失而不使至於速壞聖人之深戒也本義東萊吕氏曰蠱之為卦取事為諭乃取蠱壞之義何也天下本无事惟其蠱壞修治整頓方是有事至人所以以蠱而繼之以有事示天下本无事之義蠱事也蠱非訓事蠱乃有事也在文為皿蟲使天下之器服不為蠱所壞則必不修整以此看惟壞亂然後有事元亨者天下之事常相對有一病則有一治法當蠱壞之時元亨乃治蠱之法為卦艮上巽下剛柔既不偏有所止而巽順行之不失其當如此治天下自然大亨雖險難无不濟是以利渉大川帷其蠱壞所以却有亨渉大川之理盖易盈虚消息成敗常相倚伏正如路温舒所謂禍亂之作天所以開聖人也盖當壞亂之極自然必有開通之理上如湯武下如髙光皆因蠱壞之後然後大業以濟先甲三日後甲三日推原事之終始聖人舉事不獨去一事上看事之前後即事之終始也甲者事之始每有事先三日而慮其所以蠱之根本然後為之既為之又後三日而慮其將然然後其利可久聖人為事詳審如此此二句皆事未出之前而非事見之後也以喜隨人者必有事傳最好看以君子小人言之小人以喜隨人者必利達之事君子以喜隨人者必脩已之事易説彖曰蠱剛上而柔下巽而止蠱蠱元亨而天下治也利渉大川往有事也先甲三日後甲三日終則有始天行也伊川先生曰以卦變及二體之義而言剛上而柔下謂乾之初九上而為上九坤之上六下而為初六也陽剛尊而在上者也今往居於上隂柔卑而在下者也今來居於下男雖少而居上女雖長而在下尊卑得正上下順理治蠱之道也由剛之上柔之下變而為艮巽艮止也巽順也下巽而上止止於巽順也以巽順之道治蠱是以元亨也元亨而天下治者治蠱之道如卦之才則元亨而天下治矣夫治亂者苟能使尊卑上下之義正在下者巽順在上者能止齊安定之事皆止於順則何蠱之不治也其道大善而亨也如此則天下治矣往有事也者方天下壞亂之際宜渉艱險以往而濟之是往有所事也終則有始者夫有始則必有終既終則必有始天之道也聖人知終始之道故能原始而究其所以然要終而備其將然先甲後甲而為之慮所以能治蠱而致元亨也並易傳横渠先生曰憂患内萌蠱之謂也泰終反否蠱之體也巽而止待能之時也後甲三日成前事之終先甲三日善後事之始也剛上柔下故可為之倡是故先甲三日以蠲其法後甲三日以重其初明終而復始通變不窮也至於巽之九五以其上下皆柔故必无初有終是故先庚後庚不為物首也於甲取應物而動順乎民心也一本為事之倡法一作治並易説藍田吕氏曰蠱治壞者也蠱之所治可治而不可革之事也故爻辭皆以父母為言成卦之義取巽而止巽則因故而脩之止則幹蠱而使不壞治壞者不䘮其本而能通於天下乃可治也故蠱元亨甲者令行之始先甲三日議是令也後甲三日申是令也蠱壞之世一有所治先之後之如是之慎所以俾勿壞也廣平游氏曰飭蠱以有事者不可以有擾故於蠱以先甲後甲言之甲者仁柔也發號施令者不可以狥人故於巽以先庚後庚言之庚者義剛也傳曰通變之謂事事往來終始如循環必至之理也故曰天行君子察於此故先事而豫以弭於未然故能致治於未亂非知幾不足以與此後事而圖以防其將然故能轉凶而為吉非知化不足以與此三日者成數也原始要終亦推其數而已先後至於成數則无虞矣巽而止者飭天下之蠱義主於巽而道貴於止也巽而止則元亨而天下治矣故諸爻皆以家道言之盖當是時治大宜如小治衆宜如寡治煩宜如簡一切以柔巽自處而无意於動衆順其序而弗擾因其情而无咈如子之任父事則觀聽不駭而害己消矣且有而為之其易邪如欲以發强剛毅勇於作為多所紛更者任是猶治絲而棼之益以壞亂而已非治蠱之道也並易説龜山楊氏曰剛上而柔下剛柔不交上下不相與不足與有為巽而止无健行之才不能以有為此事之所以蠱也春秋傳曰皿蟲為蠱蠱者弊壞之時也先王之治蠱也如治陋室然欂櫨扂楔各安所施而不易其處則庶乎其苟完矣動而紛更之則腐者敗傾者覆不可復支矣非治蠱之道也夫剛上而柔下巽而止合二體而為蠱也即其體因其才而用之以通其變則蠱元亨而天下治矣治然後可以往有事也周之宣王承厲王之後天下蕩蕩无綱紀文章蠱已甚矣宣王勞來還定安集之而已初非有為也其卒也内修政事外攘夷狄修車馬備器械復㑹諸侯於東都因田獵而選車徒焉此既治而往有事之謂也既治矣終於无所事而欲復文武之境土成中興之功不可得也易説白雲郭氏曰否泰反其類者也而蠱之於泰亦有相循之義焉然泰之道大蠱之事小雖不能如否之反而泰之後先蠱而後否聖人圖難於其易為大於其細是以有治蠱之道使不至於否此商宗周宣之所以興也先儒謂蠱自泰來剛上而柔下是也知蠱之極而治之則有治无亂故後甲三日之後元亨而天下治也蠱之時事為易圖宜往有事故利渉大川先甲後甲則天行終始之道循環然耳易於泰言其命亂於蠱言天下治皆先甲後甲之常也故聖人於蠱弊之時未嘗憂其不治特患幹之无其人耳知其道得其人治天下可運諸掌也觀傅說之戒髙宗曰事不師古以克永世匪說攸聞又曰監于先王成憲其永無愆詩人之美宣王曰復古也天下喜於王化復行也復文武之境土復㑹諸侯於東都也觀是二者則知蠱之道特在於除前人之弊復先王之法而已盖无創業垂統之多難也易説漢上朱氏曰乾甲圖蠱彖曰先甲三日後甲三日終則有始天行也虞曰謂初變成乾乾為甲至二成離離為日乾三爻在前故先甲三日賁時也變三至四體離至五成乾乾三爻在後故後甲三日无妄時也易出震消息歴乾坤象乾為始坤為終故終則有始乾為天震為行故天行也圖說又曰春秋傳秦醫曰於文皿蟲為蠱穀之飛亦為蠱在周易女惑男風落山謂之蠱尚書大傳曰乃命五史以書五帝之蠱事雜卦曰蠱則飭也則蠱非訓事事至蠱壞乃有事也泰初九之剛上而為艮上六之柔下而為巽剛上柔下各得其所事已治矣下巽而已莫予違也上亦因是止而不復有為則禍亂之萌乃伏於己治之中遂頽靡而不振亦何異於皿蟲穀飛男惑山落之類哉故曰剛上柔下巽而止蠱此以泰變合二體而言蠱也然治蠱之道不逺在乎上下之志交而元亨則天下復治矣泰初九始也始而動剛柔相易而亨无亨也元亨而天下治始而亨者也兊為澤決之為川初九越兊成艮艮為指利渉大川也初九犯難顧望而不為蠱不可得而治矣上下志交動以濟大難往事乎蠱也巽為事故曰元亨利渉大川往有事也此因初上之交言治蠱之道也天道之行終則有始无非事者聖人於蠱巽二卦明之蠱東方卦也巽西方卦也甲者事之始庚者事之終始則有終終則更始往來不窮以日言之春分旦出於甲秋分暮入於庚以月言之三日成震震納庚十五成乾乾納甲三十日成坤滅藏於癸復為震甲庚者天地之終始也蠱事之壞也巽行事也變更之始當慮其終事久而蠱當圖其始先甲三日圖其始也蠱一變大畜乾納甲再變賁離為日乾三爻在先先甲三日也三變頤四變噬嗑離為日五變无妄乾納甲乾三爻在後後甲三日也先甲者先其事而究其所以然後甲者後其事而慮其將然究其所以然則知救之之道慮其將然則知備之之方一日二日至於三日慮之深推之逺故能革前弊弭後患久而可行圖始者至矣漢嘗削諸侯之地矣唐嘗討弑君之賊矣令下而兵起言出而禍隨昧治蠱之道也不曰乾行者周而復始也納甲之説乾納甲子甲寅甲辰而壬在其中納壬午壬申壬戌而甲在其中矣坤納乙癸亦然易傳曰後之治蠱者不明乎聖人先甲後甲之戒慮淺而事近故勞於救亂而亂不革功未及成而弊已生矣夫蠱言先甲後甲於彖巽言先庚後庚於九五一爻何也曰蠱者巽九五之變也上剛下柔巽而止所以為蠱也巽則九五位乎中正事有過中而當變更則更之而適於中蠱何由生乎明此九五之功也以卦氣言之三月卦故太𤣥準以務事易傳新安朱氏曰蠱剛上而柔下以卦體卦變卦徳釋卦名義盖如此則積弊而至於蠱矣元亨釋卦辭治蠱至於元亨則亂而復治之象也亂之終治之始天運然也本義動而説成隨巽而止成蠱問巽而止蠱莫是遇事巽順以求其理之所止而後為治蠱之道曰非也大抵資質柔巽之人遇事便不能做得无奮迅之意所以事遂至於蠱壞了蠱只是事之壞了者先甲後甲言先甲之前三日乃辛也是時前段事已過中了是那欲壞之時便當圖後事之端略略撐柱則箇雖終歸於弊且得支吾幾時文皿蟲為蠱言器中盛那蟲教他自相併便是積蓄到那壞爛的意思一似漢唐之衰㺯得來到極弊大壞時所以言元亨盖極弊則將復興故言元亨巽而止蠱却不是巽而止能治蠱巽而止所以為蠱趙徳莊說下面人只務巽上面人又懶惰不肯向前上面一向剛下靣一向柔倒塌了這便是蠱底道理蠱元亨而天下治言蠱之時如此必須是大善享通而後天下治問蠱卦剛上柔下有數義剛在上而柔在下為卦體下卑巽而上苟止所以為蠱此卦義又自卦變言之自賁井既濟來皆剛上而柔下此卦變先生曰是龜山説巽而止乃治蠱之道言當柔順而止不可堅正必為此説非惟不成道理且非易彖文義彖曰巽而止蠱猶順以動豫動而説隨皆言卦義某本義之説盖是趙徳莊説趙云剛在上柔在下下卑巽而上苟止所以蠱壞此則文義甚協又問先甲辛也後甲丁也辛有新意丁有丁寧意意其説似出月令注先生曰然但古人祭祀亦多用先庚先甲先庚丁也後庚癸也如用丁亥辛􅕀之類先生説汪聖錫曽言某人别龜山往赴召龜山送之云且緩下手莫出去拆倒人屋子因龜山解蠱以巽而止為治蠱之道所以有此説大凡看易須先看成卦之義險而健則成訟巽而止則成蠱蠱艮上而巽下艮剛居上巽柔居下上髙亢而不下交下卑巽而不能救此所以蠱壞也巽而止則是巽順便止了更无所施為如何治蠱蠱元亨而天下治須是大善以亨方能治蠱也並語録東萊吕氏曰剛上而柔下當萬事蠱壞之時下巽順而從上上之意惟欲止亂下既順而上即止不復過當窮治此所以能治蠱也又有一義此卦上止下巽天下之事所以不治者在上常患主宰不定在下常患人各有心若上之止如山岳之定下之順如水之從何蠱之不可治又其卦上剛而下柔上剛則果决而有行下柔則易使如此而治蠱則元善大亨而天下治矣若是上柔下剛君弱臣强安能治天下之事巽而止舉事皆然既巽順曲折不逆人心又須中有所主確然不可變若是中无所主但只止而不巽无巽以出之之道亦是拂人心處既胷中有所定而柔順以行之始是大亨以此處天下之事必其勢順其才全剛上而柔下其勢順矣巽而止其才全矣利渉大川往有事也往則有事天下之事向前則有功不向前百年亦只如此葢往則有功也天下之事方其蠱也皆有可畏之勢如大川之滔滔然於此而往焉則有事而可治矣如憲宗武宗平淮蔡澤潞當時雖羣臣沮者甚多以謂根深蒂固牢不可破二君惟斷然而往故克濟然天下之事无窮必須量度其才可以渉大川當風濤洶湧若能操舟楫便自有无窮事當春秋時惟夫子盡此若季路之於季氏冉有之於衛皆是未到濟大川䖏須是知才出去了事漸漸多終則有始天行也先甲後甲若只以人求之自不知其所以然之故須明天行終始之理言天下之事有終則有始乃天道如此君子知之故每事先甲三日而慮之常人不知臨事只於一事而思不知終始之道乃天行也孔子釋彖推原先後之意事之終始不是人安排殷因於夏禮所損益可知也周因於殷禮所損益可知也天下之消長盈虚文質剛柔如環之无端乃是天行若是要得自窮智慮探事先料事後不知消息盈虚只是臆度易說象曰山下有風蠱君子以振民育徳明道先生曰有人治園圃役知力甚勞先生曰蠱之象君子以振民育徳君子之事惟有此二者餘无它為二者為己為人之道也為己為人吳本作治己治人劉絢所録須是就事上學蠱振民育徳然有所知後方能如此何必讀書然後為學顯道所録伊川先生曰山下有風風遇山而回則物皆散亂故為有事之象君子觀有事之象以振濟於民養育其徳也在已則養徳於天下則濟民君子之所事无大於此二者易傳藍田吕氏曰山下有風振動草木使之有成者也龜山楊氏曰山下有風振物之象也蠱之時以振民為先振民以育徳為本衛文公之營楚丘至於騋牝三千乃在乎秉心塞淵此之謂也易説兼山郭氏曰窪則盈弊則新者事也弊不新成則无弊无新不成不敗也以此御彼則君子之所患聖人有不患也春秋傳曰於文皿蟲為蠱在周易女惑男風落山為蠱巽為長女艮為少男長女從少男惑也風在山下落也以人言之亦風俗之大壞也放勲曰匡之直之輔之翼之又從而振徳之則當斯時也其振徳之者固必有術也易說白雲郭氏曰先人曰女惑男風落山為蠱女從男惑也風在山下落也以人言之亦風俗之大壞也故必有振德之之術焉雍曰蠱自泰來是泰之道弊而為蠱也夫泰之所謂地今弊而為山矣所謂天今弊而為風矣天地之道弊而為山風之事矣道弊於事大弊於小君子弊於小人安得不振而起之也哉此君子所以振民育徳也能振而起之以復於泰是以元亨而天下治也不能振之日入於頽弊之域此所以否而不反矣振民風象育徳山象也易説漢上朱氏曰風木之氣山百物之所阜生木氣動摇於土石之下陽升風鼓草木敷榮飭蠱之象黄帝書曰東方生風風生木傳言景霽山昏蒼埃際合崖谷若一岩岫之風也君子體之於民也振作之使不倦將振作之則自育其徳徳日進則民徳生矣震動在外振民也兊澤在内育徳也育徳者振民之本史言風落山取女説男蠱之象此言飭蠱之象故取象異易傳新安朱氏曰山下有風物壞而有事矣而事莫大於二者乃治己治人之道也本義問蠱之象君子以振民育徳如何先生曰當蠱之時必有以振起聳動民之觀聽而在已進德不已必須有此二者則可以治蠱矣語録東萊吕氏曰山下有風之時震摇播蕩萬物皆錯亂若无震蕩動摇萬物如何會錯亂大凡天下自有定分不必用人安置緣其擾亂以至蠱壞如山下之草木自生自死何必整理一為風所鼓以至蠱壞方用整治天清日明則无所事矣天下本无事惟蠱壞之世如風遇山而回物皆撓亂而事乃出如卦之象則為蠱如卦之才則治蠱之法已隨之矣君子振民育徳蠱事也天下事只有治己治人更无它事然振民便是育徳治人便是治己雖名兩事元非兩事无事則内自育其徳臨民振之而已中庸曰成己仁也成物知也性之徳也合外内之道也故時措之宜也葢終日所行若不入此兩事則皆非吾所當事矣今人所作不是无益於己无益於人即有害於己有害於人易説初六幹父之蠱有子考无咎厲終吉象曰幹父之蠱意承考也伊川先生曰初六雖居最下成卦由之有主之義居内在下而為主子幹父蠱也子幹父蠱之道能堪其事則為有子而其考得无咎不然則為父之累故必􅅥厲則得終吉也處卑而尸尊事自當兢畏以六之才雖能巽順體乃隂柔在下无應而主幹非有能濟之義若以不克幹一有而字言則其義甚小故專言為子幹蠱之道必克濟則不累其父能厲則可以終吉乃備見為子幹蠱之大法也意承考也者子幹父蠱之道意在承當於父之事也故祗敬其事以置父於无咎之地常懷􅅥厲則終得其吉也盡誠於父事吉之道也並易傳横渠先生曰處下不係應於上如子之專制雖意在承考然亦危厲以其柔巽故終吉易說藍田吕氏曰父母之蠱人子所難治也幹者以身任其事不敢避也過則殘忍不及則不勝其任以人子之所難故初則厲二則不可貞三則小有悔然卒以任事為功故初終吉三无咎五用譽也初六處蠱之初始往治之勝子之任卒乎有成乃可无咎然子治父事已為之首厲也以柔巽成之終吉也廣平游氏曰初六才不足以應宜不足以幹蠱而能考无咎者以柔巽為體而意專於承考也意承考者子道之正也故爻稱為有子况夫一家之事固不煩而初亦未廣也持吾承考之意以從事則何事而不濟邪書曰罔曰弗克惟既厥心意在於承考斯能盡其心矣人心其神矣乎能盡其心則雖愚必明雖柔必强才之不足非所患也易説龜山楊氏曰以柔在下无克濟之才而居幹蠱之任意在承考而已非父子之懿也而惟父之從必有䧟於不義者能无咎乎故有子之考然後无咎夫先意承志諭父母於道唯賢者能之見志不從又敬不違然後為孝故厲乃終吉易説白雲郭氏曰蠱非創始之事葢嘗作之而弊者弊而改為則治矣非若屯難之難濟否塞之難傾也故雖初六柔弱之才亦能幹焉蠱實家道葢承父已基之事又非去故而鼎新也能幹父之蠱則有子矣有子則考乃无過雖有渉川之危亦終吉也況非危事者乎考无咎若武王言惟朕文考无罪同意而初六非武王之才徳耳意承考者善繼父之志也易説漢上朱氏曰乾為父泰初九之上父往矣考也坤子來居父之位父往而其事不正咎也有子幹之考可以无咎矣厲危也子居父之位以事之不正為危厲之道則變而之正於考為无咎於己為終吉堪任其事者也故曰有子然變其事而之正无乃改父之道乎曰柔巽者子承考之意也變其事而之正致其考於无咎者子幹父之蠱也巽柔而已䧟父於有咎而不恤焉豈考之意哉故以我之意逆父之意而承之則變其事可也變其事者時有損益不可盡承所以從道也孝子生也諭父母於道及其沒也以意承考事死如事生之道也貞事之幹也幹父之蠱則初六變而正矣意者中心之所欲也坤為中巽柔坤也故曰意易傳新安朱氏曰幹如木之幹枝葉之所附而立者也蠱者前人已壞之緒故諸爻皆有父母之象子能幹之則飭治而振起矣初六蠱未深而事易濟故其占為有子則能治蠱而考得无咎然亦危矣戒占者宜如是又知危而能戒則終吉也本義問有子考无咎與意承考之考皆是指父在父在而得云考何也曰古人多通言如康誥大傷厥考心可見語録東萊吕氏曰初六幹父之蠱置父於无過之地人稱之為有子亦可以无憾矣然必厲終吉此三字須仔細看葢不知戒懼則自以為事父之道足矣所謂意承考者從父之意而已譬如人君之繼志是也祖宗之意只欲天下安我措置得天下安便是承祖宗之意不必事事要學也易説又曰幹父之蠱有子考无咎猶繼以厲終吉己丑課程九二幹母之蠱不可貞象曰幹母之蠱得中道也伊川先生曰九二陽剛為六五所應是以陽剛之才在下而幹夫在上隂柔之事也故取子幹母蠱為義以剛陽之臣輔柔弱之君義亦相近二巽體而處柔順義為多幹母之蠱之道也夫子之於母當以柔巽輔𨗳之使得於義一有母字不順而致敗蠱則子之罪也從容將順豈無道乎以婦人言之則隂柔可知若伸已剛陽之道遽然矯拂則傷恩所害大矣亦安能入乎在乎屈己下意巽順將承使之身正事治而已故曰不可貞謂不可貞固盡其剛直之道如是乃中道也又安能使之為甚髙之事乎若於柔弱之君盡誠竭忠致之於中道則可矣又安能使之大有為乎且以周公之聖輔成王成王非甚柔弱也然能成之為成王而已守成不失道則可矣固不能使之為羲黄堯舜之事也二巽體而得中是能巽順而得中道合不可貞之義得幹母蠱之道也得中道也者二得中道而不過剛幹母蠱之善者也並易傳横渠先生曰處中用巽以剛繫柔幹母之蠱得剛柔之中也易説藍田吕氏曰九二以剛居中子幹母事者也執不知變賊恩之大委而不幹不孝也幹而賊恩亦不孝也有中道存焉惟君子能之廣平游氏曰九二處多譽之地才有餘而道不失中固衆譽之所歸六五因衆譽而用之則人情莫不恱服彼其才足以任劇而以中道承柔中之君則其君且仰成而繼志述事有餘地矣然譽在下而上不忌者得中道而承以徳也易説龜山楊氏曰五以隂柔之質止乎上二以剛明之才應乎内幹母之蠱也幹母之蠱門内之治恩掩義故不可正正之則有不勝其責者故子之克家包蒙納婦而後吉臣之事君亦如是而已苟人君无剛健之才輔之以大有為之事鮮克濟矣齊王問好貨好色孟子務引之當道而已不逆其欲也貨色非人君所宜好也一以義正之則齊王不勝其責矣故孟子之言如此夫謂吾君不能是不敬其君也故以幹母之蠱明之知此其知所以事君也易説兼山郭氏曰九二蠱之柔在内事之所以起剛在上蠱之所以飭也不任其剛而柔以濟之不狥其内而剛以制之此有其事而有其治所以終至於无事也以斯道處斯時所謂元亨者也況九二幹母之蠱者乎易説白雲郭氏曰初六以隂承陽故言幹父九二以陽應隂故言幹母然九二以剛强之才而幹隂柔之事方之初六有餘力矣不可固守剛强以盡用其才也惟九二能得中道故克幹焉貞本幹事之徳而九二不用者蠱之時易為力適中足矣不可過也易説漢上朱氏曰坤居尊位母也以隂居陽處之不當事之蠱也九二巽為子應五而處内幹母之蠱者也坤隂柔為難輔處之不當則當正然正之則剛或至於傷恩不正之則致母於有咎故不可貞言巽而動優柔不廹得中道則善矣事柔弱之君亦然易傳曰以周公之聖輔成王成王非甚柔弱也然能使之為成王而已不失其道則可矣固不能使之為羲黄堯舜之事也易傳新安朱氏曰九二剛中上應六五子幹母蠱而得中之象以剛承柔而治其壞故又戒以不可堅貞言當巽以入之也本義幹母之蠱伊川説得是語録東萊吕氏曰九二人只知幹母之蠱須是婉順不可太剛便道此是不得已為母故少屈其道殊不知只此便是中道貞之一字如天之不階而升尋常用工夫五六十年未必到得惟於六二却不可貞葢須識用處若用貞以幹母之事則證父攘羊之直也傳曰若於柔弱之君盡謀竭忠致之於中道則可矣又何能使之大有為乎夫責難於君謂之恭陳善閉邪謂之敬於九二却如此説此須要看此是伊川晚年更練世變故見得到此易説九三幹父之蠱小有悔无大咎象曰幹父之蠱終无咎也伊川先生曰三以剛陽之才居下之上主幹者也子幹父之蠱也以陽處剛而不中剛之過也然而在巽體雖剛過而不為无順順事親之夲也又居得正故无大過以剛陽之才克幹其事雖以剛過而有小小之悔終无大過咎也然有小悔己非善事親也以三之才幹父之蠱雖小有悔終无大咎也葢剛斷能幹不失正而有順所以終无咎也並易傳横渠先生曰義如初六小有悔者以其剛也易説藍田吕氏曰九三剛而不中居下體之上治事過中者也故小有悔然體夲於巽卒於能任故无大咎龜山楊氏曰子職以順父之為正九三剛過中於子職不能无小悔然其才足以幹蠱雖有悔无大咎也易説白雲郭氏曰幹蠱之道欲知其弊而順治之耳固不必經綸之大才也不順其弊而治反更張作新未嘗不至於變亂也詩曰不愆不忘率由舊章遵先王之法而過者未之有也九三之才已過矣然不至於大悔終无咎者盖所幹之蠱遵前人之法而已宣王之詩有箴規是為小有悔也易説漢上朱氏曰上九處位不當父之蠱也九三重剛幹父之蠱而剛過中者也剛過動則小有悔然无大咎者雖過而正也三下卦之終故又曰終无咎夫无大咎未免小有咎聖人以謂終无咎以其體巽也易解曰不應上子之能爭而不能從其父令者也易傳新安朱氏曰過剛不中故小有悔巽體得正故无大咎本義東萊吕氏曰九三以剛居剛而承父之事必至矯厲過當然却有小悔无大咎葢下卦全體是巽於巽體而用剛所以小有悔无大咎須看巽體乃可傳曰小有悔己非善事親也此極好看譬如一正人其間雖有小過亦不害其為正但要事上放教紆囘曲折使无大過聖人教人與已到者為地又與未到者為地若只與已到者為地則是未到者无一入得道理易説六四裕父之蠱往見吝象曰裕父之蠱往未得也伊川先生曰四以隂居隂柔順之才也所處得正故為寛裕以處其父事者也夫柔順之才而處正僅能尋常自守而已若往幹過常之事則不勝而見吝也以隂柔而无應助往安能濟以四之才守常居寛裕之時則可矣欲有所往則未得也加其所任則不勝矣並易傳横渠先生曰裕父之蠱不能為父除患能寛裕和緩之而已以柔居隂失之太柔故吝貞固乃可幹事以柔致逺往未得也易説藍田吕氏曰六四以隂居隂純柔為用其才不足以治蠱壞姑能寛裕之而已苟於順從不勝子職妾婦之道无往而得葢吝道也龜山楊氏曰六四柔順而不中无幹蠱之才裕父母之蠱者也天地萬物父母萬物裕於天地人子之於父母則異乎此矣父裕於子可也子不可裕於父裕父之蠱則往宜見吝矣易説白雲郭氏曰幹蠱之爻多无大才以弊事順治不用過也過則有害非幹蠱也然才之過者九三而止耳亦无太過也其不及者六四是己以六四隂柔不及之才猶能裕父之蠱則知治蠱不為難也裕父非幹也能因其基而増益之耳或往幹之則見吝矣葢才力太柔未可往故也繼體守文之治似之易説漢上朱氏曰六四柔而止不能去上九之蠱寛裕自守而已裕父之蠱者諸爻以剛為幹蠱之道九二九三初六六五之動曰幹六四曰裕者不剛也不能動也吝者安其位而不能往動成離離目為見故往見吝初六應之牽於下亦不得往矣故曰往未得也漢之元帝是已易傳新安朱氏曰以隂居隂不能有為寛裕以治蠱之象也如是則蠱將日深故往則見吝戒占者不可如是也本義問九三幹父之蠱小有悔无大咎言小有悔則无大悔矣言无大咎則不免有小咎矣但象曰終无咎則以九三雖過剛不中然在巽體不為无順而得正故雖悔而无咎至六四則不然以隂居柔不能有為寛裕以治蠱則蠱將日深而不可治故往則見吝言自此以往則有吝也先生曰此兩爻説得悔吝二字最分明九三有悔而无咎由凶而趨吉也六四雖目下无事然却終吝由吉而趨凶也元祐間劉莘老劉器之之徒必欲盡去小人却是未免有悔至其它諸公欲且寛裕无事莫大段整頓不知目前雖遮掩拖延得過後面憂吝却多可見聖人之深戒語録東萊吕氏曰六四逼近於五正如子逼近於父只是就父之事調停教從容寛裕始得若欲專輒徑往自任必見吝也又以隂居隂柔弱之才无應則至誠不能感通所處之地如此若往幹父之事必有悔吝惟優游寛裕以處其父之事乃可易説六五幹父之蠱用譽象曰幹父用譽承以徳也伊川先生曰五居尊位以隂柔之質當人君之幹而下應於九二是能任剛陽之臣也雖能下應剛陽之賢而倚任之然已實隂柔故一作固不能為創始開基之事承其舊業則可矣故為幹父之蠱夫創業垂統之事非剛明之才則不能繼世之君雖柔弱之資苟能一有信字任剛賢則可以為善繼而成令譽也太甲成王皆以臣而用譽者也承以徳也者幹父之蠱而用有令譽者以其在下之賢承輔之以剛中之徳也並易傳横渠先生曰雖天子必有繼也故亦云幹父之蠱易説藍田吕氏曰六四以姑息事其親六五以徳事其親以姑息事者苟安於一時而親卒受其弊用毁者也以徳事者柔不失中全其良貴起敬起孝使親不離於令名用譽者也龜山楊氏曰六五履尊位而无剛健有為之才酌先祖之道而行之可也故以幹父之蠱言之用譽非過矯以近名也承以徳而已易説白雲郭氏曰六五以柔順中正居尊位盛徳之君也幹蠱有餘裕矣是以聲名洋溢乎中國而蚤有譽於天下者以徳不以力故也觀成王之時作詩者嘉羙之喜樂之安樂之其詩有曰顒顒卭卭如圭如璋令問令望豈弟君子四方為綱所謂用譽承以徳者也幹蠱之羙不可以有加矣易説漢上朱氏曰六居尊位尚柔下應九二二與之體兊兊為口譽之象也二易五柔成剛其徳中正上承上九幹父之蠱用譽也以徳承父下之服從者衆以是去蠱用力不勞則幹父之蠱莫善於用譽矣蠱之患非一世譬如人嗜酒色餌金石傳氣於子孫者潰為癰疽死與不死在治之如何耳秦皇漢武窮兵黷武一也秦亡而漢存者始皇无子而武帝有子以幹之也必曰承以徳者譽謂徳譽非虚譽也隋煬以儉聞以奢敗虚譽也易傳新安朱氏曰柔中居尊而九二承之以徳以此幹蠱可致聞譽故其象占如此本義東萊吕氏曰六五幹父之蠱傳云有就爻求意者有求意於爻之外者六五當幹蠱之任自能用譽亦何不可須求意於九二者葢度六五才質隂柔必不能獨辦此也象曰幹父用譽承以徳也九二雖有陽剛之才若非六五之君巽順以求之安能委曲承之而用譽也須看此一句說命曰后從諫則聖后克聖臣不命其承疇敢不祗若王之休命易説上九不事王侯髙尚其事象曰不事王侯志可則也伊川先生曰上九居蠱之終无繫應一无應字於下處事之外无所事之地也以剛明之才无應援而處无事之地是賢人君子不偶於時而髙潔自守不累於世務者也故云不事王侯髙尚其事古之人有行之者伊尹太公望之事曽子子思之徒是也不屈道以徇時既不得施設於天下則自善其身尊髙敦尚其事守其志節而已士之自髙尚亦一无亦字非一道有懷抱道徳不偶於時而髙潔自守者有知止足之道退而自保者有量力度分安於不求知一无知字者有清介自守不屑天下之事獨潔其身者所處雖有得失小大之殊皆自髙尚其事者也象所謂志可則者進退合道者也志可則也者如上九之處事外不累於世務不臣事於王侯葢進退以道用舍隨時非賢者能之乎其所存之志可為法則也並易傳横渠先生曰隠居以求其志故可則也易説藍田吕氏曰上九髙而无位以剛居之遠於事而不屈者也事君人者事是君以為容悅者也不事王侯則非事君人者雖非事人然尊敬其事不敢慢也斯人也其事道者與龜山楊氏曰居一卦之外而无應於内非幹蠱之任也不事王侯髙尚其事者也易説兼山郭氏曰上九君子之徳風小人之徳草草上之風必偃方女之惑男風之落山風俗之弊日入於大壞而不能振也故於斯時豈無道以興起之哉孟子曰聖人百世之師也伯夷柳下惠是也伯夷目不視惡色耳不聽惡聲非其君不事非其民不使治則進亂則退横政之所出横民之所止不忍居也思與鄉人處如以朝衣朝冠坐於塗炭當紂之時居北海之濵以待天下之清也故聞伯夷之風者頑夫亷懦夫有立志故曰伯夷聖之清者也故於蠱也始以柔巽而將之又以剛中而制之終至於教不足以率之刑不足以禁之非其徳可以忘世其道可以髙人不為事窮不以物累不如是曷足以振之哉故我心匪石不可轉也我心匪席不可卷也非獨於斯時也可以窮天地亘萬世而不顧聞之者又豈止頑夫亷懦夫有立志而已邪此許由務光見取於唐虞蓋有時而尚之也易説白雲郭氏曰先人曰伯夷目不視惡色耳不聽惡聲非其君不事非其民不使治則進亂則退横政之所出横民之所止不忍居也思與鄉人處如以朝衣朝冠坐於塗炭當紂之時居北海之濵以待天下之清也故聞伯夷之風者頑夫亷懦夫有立志故曰伯夷聖之清者也當蠱之時非其徳可以忘世其道可以髙人不為事窮不以物累不如是曷足以振之哉雍曰夏尚忠商尚質周尚文三王非故為異也救一時之弊耳知此故足以興道不知此雖歴舉三代之政其治道愈逺矣孟子言伯夷之清伊尹之任柳下惠之和為行不同而同歸於聖者所以救弊之方在時有不同故也蠱之時天下事弊人知幹治為急而不知幹治之弊又有甚焉是以舎夲源循末流風俗鄙陋委靡而不振去道日已逺矣此不事王侯髙尚之士所為作也髙尚之士豈直以不事王侯為髙哉葢必有其道焉非舎簞食豆羮之義也方蠱之時大道不明王侯之賢者知趨事赴功而已非獨不知道之大全而用之也亦有以道為不切時務而不用者多矣如是則髙尚之所守乃當世之不用而王侯之所務或髙尚未嘗容心焉故髙尚之士既不欲屈道伸身則王侯不可得而事也王侯不可得而事而人謂之髙尚其事亦宜矣在君子則盡用舎行藏之道夫何容心於髙尚哉是以天下既又弊於幹蠱非夫人孰能振之蠱之上九既无絶物之過又无屈道之累其用舎行藏之志是可為法於天下後世矣此孟子所以稱伯夷為百世之師也不然雖不仕如荷蓧狂歌如接輿放蕩不法如莊周為我无君如楊氏皆流浪不反其自為髙尚以欺世俗耳目則有之君子未嘗有取焉故孔子不能為素隱行怪而孟子深鄙陳仲子之為亷也非夫伯夷之聖使聞其風者頑夫亷懦夫有立志又安能振蠱之風也歟易於否有彚貞之君子在蠱有不事王侯之士其道不同不可同論也易説漢上朱氏曰蠱之終有不事者上九自巽往於外處蠱之上而不當位巽為事為髙尚上也五王四侯三公位上執剛不屈不事王侯髙尚其事夫自臺輿至王公无非事者不事王侯何以貴之謂其志於三三无應則去之不累於物其志為可則也易傳曰伊尹太公望之事曾子子思之徒是也所謂志可則者進退合道也易傳新安朱氏曰剛陽居上在事之外故為此象而占與戒皆在其中矣本義不事王侯无位之地如何出得來更幹个甚麽問上九不事王侯髙尚其事占與戒皆在其中如何先生曰有此象則其占當如此又戒其必如此乃可也若得此象而不能從則有凶矣當此時節若能斷然不事王侯髙尚其事不半上落下或出或入則其志真可法則矣只為人不能如此也並語録東萊吕氏曰上九不事王侯髙尚其事人須是辦得此一著方做得事蠱卦專為治事故以此爻終之諸爻皆以當天下之事為己任至於上九却取意於事外易説又曰不事王侯志可則也沮溺之志不可則己丑課程合訂刪補大易集義粹言卷二十二
