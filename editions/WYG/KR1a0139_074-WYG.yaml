body:
  text: 合訂刪補大易集義粹言卷七十二頭等侍衞納喇性徳編子曰易其至矣乎夫易聖人所以崇徳而廣業也知崇禮卑崇效天卑法地天地設位而易行乎其中矣成性存存道義之門明道先生曰易不只是這一部書是易之道也不要將易又是一箇事即事盡天理便是易也成性存存道義之門亦是萬物各有成性存存亦是生生不已之意天只是以生為道並吕與叔東見錄且喚做中若以四方之中為中則四邊无中乎若以中外之中為中則外面无中乎如生生之謂易天地設位而易行乎其中豈可只以今之易書為易乎中者且謂之中不可捉一箇中來為中成性存存便是道義之門並劉絢錄天位乎上地位乎下中无人則无以見天地書曰惟天地萬物父母惟人萬物之靈易曰天地設位而易行乎其中天地設位而易行其中何不言人行其中蓋人亦物也若言神行乎其中則人只於鬼神上求矣若言理言誠亦可也而特言易者欲使人黙識而自得之也並劉絢師訓伊川先生曰易之道其至矣乎聖人以易之道崇大其徳業也知則崇髙禮則卑下髙卑順理合天地之道也髙卑之位設則易在其中矣斯理也成之在人則為性成之者性也人心存乎此理之所存乃道義之門也經說崇底便是知卑底便是禮游氏拾遺天地設位而易行乎其中只是敬也敬則无間斷體物而不可遺者誠敬而已矣不誠則无物也詩曰維天之命於穆不已於乎不顯文王之徳之純純則不已純則无間斷矣天地只是設位易行乎其中者神也成性存存道義之門道无體義有方也並劉絢師訓横渠先生曰崇天也形而上也通晝夜之道而知其知崇矣知及之而不以禮性之非已有也故知禮成性而道出如天地位而易行天地位定而易行其中知禮成而道義出夫易聖人所以崇徳廣業以知為徳以禮為業也蓋知崇則徳業崇矣此論易書之道而聖人亦以教人天地設位而易行乎其中比下文成性存存道義之門而言也天地設位故易行乎其中知禮成性則道義自此而出也道義之門者由仁義行也聖人亦必知禮成性然後道義從此出譬之天地設位則造化行乎其中知則務崇禮則惟欲乎卑成性須是知禮存存則是長存知禮亦如天地設位非知徳不崇非禮業不廣知崇禮卑叩其兩端而竭也崇既效天卑必法地何以致不息成性則不息誠成也誠為能成性也仁人孝子所以成身栁下惠不息其和也伯夷不息其清也於清和以成其性故亦得為聖人也然清和猶是一端不得完正不若知禮以成性即道義從此出智極其髙故效天禮著實處故法地人必禮以立失禮則孰為道天地設位而易行乎其中成性存存道義之門得知禮以成性性乃存然後道義從此出學不能自信而明者患在不勉耳當守道不回如川之流源泉混混不舍晝夜无復回却則自明自得之也易曰繼之者善也惟能相繼而不已者道之善也至於成性則不勉而中不思而得從容中道矣易曰成性存存道義之門並易說龜山楊氏曰道之峻極於天道之至也无體以範圍之則蕩而无止而天地之化或過矣禮儀三百威儀三千所以體道而範圍之也故曰茍不至徳至道不凝焉所謂至徳者禮其是乎夫禮天所秩也先王之禮述天理而已後世或以為忠信之薄或以為偽或以為戲事皆不知天者也故曰待其人而後行蓋道非禮不止禮非道不行二者常相資也茍非其人而梏於儀章器數之末則愚不肖者之不及也尚何至道之凝哉易曰知崇禮卑崇效天卑法地天地設位而易行乎其中矣此之謂也中庸解和靖尹氏曰薛收問聖人與天地如何子曰天生之地長之聖人成之故天地立而易行乎其中矣文集白雲郭氏曰前言易與乾坤之義故此復嘆美易之至而言聖人用其道以崇徳廣業也崇徳故徳盛廣業故業大盛徳大業非用易之道則不能至故聖人先嘆美易之至而後言法效也至謂前所言易與乾坤之事也易之廣大備於天地之間故舉天下之事莫不皆有易之道凡具天地之象者易已在其中矣故聖人无適而不用易非獨崇徳廣業而已也且知以崇髙而後明禮以卑遜而後恭知崇禮卑宜无與於易矣然崇者天之道卑者地之徳知崇效天禮卑法地則天地之位已設矣天地之位已設則易已行乎知禮之中此聖人所以大而徳業小而言行至於天地人鬼之變化无適而不用易者此也惟成之以性存存不忘則脩身齊家治國平天下其道義之要皆由此塗出故易為道義之門也法乾坤簡易以崇徳廣業特其大者耳故此又言知崇禮卑以見其小者也並易說漢上朱氏曰將以崇徳故知崇將以廣業故禮卑崇上達易自下升也卑无不至易徧體也通乎晝夜之道而知可謂知崇矣知崇則徳崇曲成萬物而不遺可謂禮卑矣禮卑則業廣知崇效天禮卑法地徳崇業廣則上下與天地同流易者天地之用也尊卑有定天地設位六爻上下升降而易行乎其中矣成性者存其所存則天地位天地位則道義出道義者用也故曰一隂一陽之謂道又曰道有變動又曰精義入神以致用夫萬物皆備於我而存其所存者何也去人欲而天理存也易傳新安朱氏曰十翼皆夫子所作不應自著子曰字疑皆後人所加也窮理則知崇如天而徳崇循理則禮卑如地而業廣此其取類又以清濁言也天地設位而變化行猶知禮存性而道義出也成性本成之性也存存謂存而又存不已之意也並本義知崇禮卑知是知處禮是行處知儘要髙行却自近起知識貴乎髙明踐履貴乎著實知既髙明須放低著實做去學只是知與禮他這意思却好禮便細密中庸致廣大盡精微等語皆只是說知禮禮極是卑底物事如地相似无有出其下者看甚麽物事他盡載了縱穿地數十丈深亦只在地之上无緣更有卑於地者也知却要極其髙明而禮則要極於卑順如禮儀三百威儀三千纎悉委曲无非至卑之事又曰知崇者徳之所以崇禮卑者業之所以廣蓋禮纔有些不到處這便有所欠闕業便不廣矣惟極卑无所欠闕所以廣知崇禮卑這是兩截知崇是智識超邁禮卑是須就切實處行若知不髙則識見淺陋若履不切則所行不實知識髙便是象天所行實便是法地識見髙於上所行實於下中間便生生而不窮故說易行乎其中成性存存道義之門大學所說格物致知是知崇之事所說誠意正心修身齊家治國平天下是禮卑之事上文言知崇禮卑崇效天卑法地人崇其知須是如天之髙卑其禮須如地之廣天地設位一句只是引起要說知崇禮卑人之知禮能如天地便能成其性存其存道義便自此出所謂道義便是易也成性存存不必専主聖人言成性如名明徳如表徳相似天命都一般或問成性存存是不忘其所存曰衆人多是說到聖人處方是性之成看來不如此成性只是一箇渾淪之性存而不失便是道義之門便是生生不已處成性與成之者性也止爭些子不同成之者性便從上說來言成這一箇物成性是說已成底性如成徳成說之成然亦只爭些子也如正心心正誠意意誠相似成性存存道義之門只是此性萬善完具无有欠闕故曰成性成對虧而言成之者性則是成就處无非性猶曰誠斯立焉横渠伊川說成性似都就人為處說恐不如此横渠有習以成性底意思伊川則言成其性存其所存知禮成性而道義出程子說成性謂是萬物自有成性存存便是生生不已這是語錄中說此意却好及他解易却說成其性存其存又似不恁地前面說成性謂如成事成法之類是見成底性横渠說成性别且如堯舜性之是其性本渾成學者學之須是以知禮做也到得他成性處道義出謂這裏流行道體也義用也又曰性是自家所以得於天底道義是衆人公共底知崇禮卑則性自存横渠之說非是如云性未成則善惡混當亹亹而繼之以善云云又云纎惡必除善斯成性矣皆是此病知禮成性則道義出先生本義中引此而改成為存又曰横渠言成性猶孟子云踐形此說不是夫性是本然已成之性豈待習而後成邪他從上文繼之者善也成之者性也便是如此說來與孔子之意不相似横渠知崇天也一段言知識髙明如天形而上指此理通乎晝夜而知通猶兼也兼隂陽晝夜之道而知知晝而不知夜知夜而不知晝則知皆未盡也合知禮而成性則道義出矣知禮行處也問横渠知禮成性之說曰横渠說成性謂是渾成底性知禮成性如習與性成之意同又問不以禮性之曰如堯舜性之相似但他言語艱意是如此並語錄東萊吕氏曰只是一箇敬字隨大小都用得正容色整衣冠就此推而上之即易行乎其中矣麗澤論說右第七章聖人有以見天下之賾而擬諸其形容象其物宜是故謂之象聖人有以見天下之動而觀其會通以行其典禮繫辭焉以斷其吉凶是故謂之爻言天下之至賾而不可惡也言天下之至動而不可亂也擬之而後言議之而後動擬議以成其變化濂溪先生曰至誠則動動則變變則化故曰擬之而後言議之而後動擬議以成其變化通書伊川先生曰賾深逺也聖人見天下深逺之事而比擬其形容體象其事類故謂之象天下之動无窮也故觀其會通會通綱要也乃以行其典禮典禮法度也物之則也繫之辭以斷其吉凶者爻也言天下之深逺難知也而理之所有不可厭也言天下之動无窮也而物有其方不可紊也擬度而設其辭商議以察其動擬議以成其變化也變化爻之時義擬議議而言之也舉鳴鶴在隂以下七爻擬議而言者也餘爻皆然也經說横渠先生曰易語天地隂陽情偽至隠賾而不可惡也諸子馳騁說辭窮髙極幽而知徳者厭其言故言為非艱使君子樂取之為貴易之為書有君子小人之雜道有隂陽爻有吉凶之戒使人先事決疑避凶就吉凡一言動是非可不可隨之而生所以要愼言動擬之而後言議之而後動不越求是而已自此以下皆著爻象之辭所以成變化之道擬議以教人也凡有一迹出則便有无限人議論處至如天之生物亦甚有不齊處然天則无心不恤此所以要慎易曰擬之而後言議之而後動只是要求是也並易說龜山楊氏曰或問邵堯夫云誰信畫前元有易自從刪後更无詩畫前有易何以見荅曰畫前有易其理甚㣲然即用孔子之已𤼵明者言之未有畫前蓋可見也如云神農氏之耒耜蓋取諸益日中為市蓋取諸噬嗑黄帝堯舜之舟楫蓋取諸渙服牛乘馬蓋取諸隨益噬嗑渙隨重卦也當神農黄帝堯舜之時重卦未畫此理已具聖人有以見天下之賾故通變以宜民而易之道得矣然則非畫前元有易乎京師語錄又曰形容者乾為圜坤為大輿之類是也物宜者若乾稱龍坤稱牝馬之類是也會通已上二條補白雲郭氏曰此章明擬議爻象之道至盜之招也而終且賾者天下之至隠不可得而見也聖人或擬其形容或象其物宜易於是乎有象矣天下之動變所由生觀時會通以行典禮則爻之動為觀時之要也繫之以辭斷其吉凶則爻之辭吉凶之證也謂之爻者如此二者蓋作易聖人立爻象之初意也象為天下之至賾勿遂惡其賾而忽之也爻為天下之至動蓋因時有宜而不可亂也所以然者君子於一言一動必以爻象擬議之而後能成變化之道則所樂而玩者極其至矣上言聖人立爻象之本意下言君子擬議爻象而後言動亦猶前言聖人設卦觀象終之以君子觀象玩辭之說也能明此故知爻象之用是以君子玩易必擬其象而議其辭可也易說漢上朱氏曰王昭素合初六藉用白茅通為一章今從昭素天下之至賾者理也天下之至動者時也畫卦以明理而卦有變生爻以明時而爻有動擬諸其形容者剛柔有體象其物宜者百物不廢是故謂之象會通者亨也典禮者大猷也觀時之會否者既通則斟酌大猷損益而行之所以嘉其亨之會也又繫辭以斷其吉凶知用各有時時不可失是故謂之爻如顛趾出否豕塗鬼車言天下之至賾也然象其物之所宜雖至賾而不可惡也如升降上下反復相變言天下之至動也然斷之以吉凶雖至動而不可亂也言者尚其辭故擬之而後言則无妄言動者尚其變故議之而後動則无妄動擬議以成其變化則語黙動靜皆中於道易言變化者四曰天地變化者乾坤變化也曰乾道變化者乾之變化也曰剛柔相推而生變化者爻象之變化也曰擬議以成其變化者言行之變化也或語或黙或出或處變化也爻象之變化象天地故曰天地變化聖人效之言行之變化體易也自此以下舉諸爻以明擬議以成其變化者如是易傳又曰聖人有以見天下之賾而擬諸其形容象其物宜是故謂之象有卦之象焉有爻之象焉彖也者言乎其象者也言卦之象也爻象動乎内言爻之象也方設卦變爻之時其象已具乎卦爻之中叢說新安朱氏曰賾雜亂也象卦之象如說卦所列者會謂理之所聚而不可遺處通謂理之可行而无所礙處如庖丁解牛會則其族而通則其虚也惡猶厭也觀象玩辭觀變玩占而法行之此下七爻則其例也並本義賾字在說文曰雜亂也古无此字只是嘖字今從賾賾與左傳嘖有煩言之嘖同那箇從口這箇從􅒳是箇口裏說話多雜亂底意思所以下面說不可惡若喚做好字不應說箇可惡字也探賾索隠若與人說話時也須聴他雜亂說將出來底方可索他那隠底見天下之賾正是說畫卦之初聖人見隂陽變化便畫出一畫有一箇象只管生去自不同六十四卦各是一様更生到千以上卦亦自各一様擬諸其形容未便是說那水火風雷之形容方擬這卦看是甚形容始去象那物之宜而名之一陽在二隂之下則象以雷一隂在二陽之下則象以風擬是比度之意問擬諸其形容者比度隂陽之形容蓋聖人見隂陽變化雜亂於是比度其形容而象其物宜是故謂之象曰也是如此嘗得郭子和書云其先人云不獨是天地風雷水火山澤謂之象只是畫卦便是象也說得好問聖人有以見天下之賾而擬諸其形容象其物宜是故謂之象聖人有以見天下之動而觀其會通以行其典禮繫辭焉以斷其吉凶是故謂之爻曰象言卦也下截言爻也會通者觀衆理之會而擇其通者而行且如有一事關著許多道理也有父子之倫也有君臣之倫也有夫婦之倫若是父子重則就父子行將去而他有不暇計若君臣重則行君臣之義而他不暇計若父子之恩重則便得身體髮膚受之父母不敢毁傷之義而委致其身之說不可行若君臣之義重則當委致其身而不敢毁傷之說不暇顧此之謂觀會通問觀會通行其典禮是就會聚處尋一箇通路行將去否曰此是兩件會是觀衆理之會聚處如這一項君臣之道也有父子兄弟之道也有須是看得周徧始得通便是一箇通行底路都无窒礙典禮猶言常禮常法又曰禮便節文升降揖遜是也但這箇禮字又說得闊凡事物之常理皆是一卦之中自有會通六爻又自各有會通且如屯卦初九在卦之下未可以進為屯之義乾坤始交而遇險陷亦屯之義似草穿地而未申亦屯之義凡此數義皆是屯之會聚處若盤桓利居貞便是一箇合行底便是他通處也事理間若不於會處理會却只見得一偏便如何行得通須是於會處都理會其間却自有箇通處便是脉理相似到得多處自然通貫得所以可行其典禮蓋會而不通便窒塞而不可行通而不會便不知許多曲直錯雜處言天下之至賾而不可惡雖是雜亂聖人却於雜亂中見其不雜亂之理便與下句天下之至動而不可亂相對雜亂處人易得厭惡然而這都是道理中合有底事自合理會故不可惡動亦是合有底然上面各自有道理故不可亂天下之至動事若未動時不見得道理是如何人平不語水平不流須是動方見得會通是會聚處典禮是借這般字來說觀他會通處却求箇道理來區處他所謂卦爻之動便是法象這箇故曰爻也者效天下之動者也動亦未說事之動只是事到面前自家一念之動要求處置他便是動問擬之而後言議之而後動凡一言一動皆於易而擬議之否曰然變化只就人事說擬議只是裁度自家言動使合此理變易以從道之意如擬議得是便吉擬議未善則為凶矣這變化就人動作處說如下所舉七爻皆變化也並語錄會以理之所聚而言通以事之所宜而言其實一也荅方士録書東萊吕氏曰爻象皆卦畫之義疏也伏羲文王既是始作无所祖述不得不簡夫子後始有解經夫子象辭多是拈掇出來恐學者看偏了如含章可貞以時𤼵也拔茅貞吉志在君也之類易說鳴鶴在隂其子和之我有好爵吾與爾靡之子曰君子居其室出其言善則千里之外應之况其邇者乎居其室出其言不善則千里之外違之况其邇者乎言出乎身加乎民行𤼵乎邇見乎逺言行君子之樞機樞機之𤼵榮辱之主也言行君子之所以動天地也可不慎乎同人先號咷而後笑子曰君子之道或出或處或黙或語二人同心其利斷金同心之言其臭如蘭伊川先生曰有孚於中物无不應誠同故也至誠无逺近幽深之間故繫辭云善則千里之外應之不善則千里之外違之誠通也至誠感通之理知道者為能識之中誠所通出處語黙无不同天下莫能間也同者一也一不可分分乃二也一可以通金石冒水火无所不能入故云其利斷金其理至微故聖人贊之曰同心之言其臭如蘭謂其言意味深長也並易傳横渠先生曰君子自知自信了然不惑又於出處語黙之際獲與人同則其志決然利可斷金惟仁者能聽盡言己不欲為善則己茍欲為善惟恐人之不言二人同心其利斷金夫一人固自明矣又有一人言而同心其為利也知金鐵之可斷義理必至於出處語黙之不可易如此其同也已固自信又得一人與之同故利可斷金並易說龜山楊氏曰明則誠矣未有誠而不動動而不變也鳴鶴在隂其子和之非動乎曲能有誠誠在一曲也明則誠矣无物不誠也中庸解褚遂良修起居注唐太宗曰朕有不善亦當記之乎或為之言曰借使遂良不記天下亦當記之曰此語亦善但人主好名則可以此動之耳未盡也夫君子居其室出其言善則千里之外應之出其言不善則千里之外違之故言行君子之樞機不可不慎縱使史官不記而民之應違如此雖欲自掩其不善其可得乎荆州語錄白雲郭氏曰自此以下皆言擬議爻象之道也且鳴鶴在隂其子和之我有好爵吾與爾靡之初非有及於言行也聖人擬議之則見言行之不可不慎既得其道則言行之間所以成其變化也同人先號咷而後笑初非有及於出處語黙也聖人擬議之則見其同心之利同言之臭既得其道則出處語黙之際所以成其變化也聖人憂患後世不知爻象之用故明擬議之道如此而已易說漢上朱氏曰靡當作縻中孚九二辭也二在内居室也二動五應出其言善千里之外應之也兊口不動則不正巽五不應出其言不善千里之外違之也坤為衆行出乎身加乎民也内近外逺言𤼵乎邇見乎逺也艮門震動樞機也或應或否榮辱之主也乾坤天地震巽相應動天地也明擬之而後言議之而後動者當如是此動彼應非變化乎同人先號咷而後笑同人九五辭也五應二也乾變為金兊金斷之故曰其利斷金言同心之利動而不括者然也巽為草為臭陽為芬芳二五相易芬芳上達兊為口故曰同心之言其臭如蘭言可服也震動或語或出也艮止或處或黙也出處語黙不必同所同者心則其利可斷其言可服變化不同其歸同也明言行不必同也中孚同人二五相易乃成變化故曰一則神兩則化一者合兩而為一也爻辭曰用大師克相遇五四動而克三乃與二遇繫辭所陳止以二五相易盡同心之義是謂玩辭觀變之道舉上二爻以例爻之變者也易傳新安朱氏曰君子居其室以下釋中孚九二爻義君子之道以下釋同人九五爻義言君子之道初若不同而後實无間斷金如蘭言物莫能間而其言有味也本義鳴鶴在隂其子和之我有好爵吾與爾縻之此本是說誠信感通之理夫子却専以言行論之蓋誠信感通莫大於言行問言行君子之樞機是言所𤼵者至近而所應者甚逺否曰樞機便是鳴鶴在隂下面大槩只說這意都不解著我有好爵二句其利斷金斷是斷做兩段並語錄初六藉用白茅无咎子曰茍錯諸地而可矣藉之用茅何咎之有慎之至也夫茅之為物薄而用可重也慎斯術也以往其无所失矣勞謙君子有終吉子曰勞而不伐有功而不徳厚之至也語以其功下人者也徳言盛禮言恭謙也者致恭以存其位者也亢龍有悔子曰貴而无位髙而无民賢人在下位而无輔是以動而有悔也不出户庭无咎子曰亂之所生也則言語以為階君不密則失臣臣不密則失身幾事不密則害成是以君子慎密而不出也子曰作易者其知盜乎易曰負且乘致寇至負也者小人之事也乘也者君子之器也小人而乘君子之器盜思奪之矣上慢下暴盜思伐之矣慢藏誨盜冶容誨淫易曰負且乘致寇至盜之招也伊川先生曰茅之為物雖薄而用可重者以用之能成敬慎之道也慎守斯術而行豈有失乎大過之用也繫辭云茍錯諸地而可矣藉之用茅何咎之有慎之至也夫茅之為物薄而用可重也慎斯術也以往其无所失矣言敬慎之至也茅雖至薄之物然用之可甚重以之藉薦則為重慎之道是用之重也人之過於敬慎為之非難而可以保其安而无過茍能慎斯道推而行之於事其无所失矣有勞而不自矜伐有功而不自以為徳是其徳𢎞厚之至也言以其功勞而自謙以下於人也徳言盛禮言恭以其徳言之則至盛以其自處之禮言之則至恭此所謂謙也夫謙也者謂致恭以存其位者也存守也致其恭巽以守其位故髙而不危滿而不溢是以能終吉也夫君子履謙乃其常行非為保其位而為之也而言存其位者蓋能致恭所以能存其位言謙之道如此如言為善有令名君子豈為令名而為善哉亦言有令名者為善之故也亢龍有悔九居上而不當尊位是以无民无輔動則有悔也不出户庭无咎繫辭所解獨以言者在人所節惟言與行節於言則行可知言當在先也聖人於繫辭明其致寇之道曰作易者其知盜乎盜者乘釁而至茍无釁隙則盜安能犯負者小人之事乘者君子之器以小人而乘君子之器非其所能安也故盜乘釁而奪之小人而居君子之位非其所能堪也故滿假而陵慢其上侵暴其下盜則乘其過惡而伐之矣伐者聲其罪也盜横暴而至者也貨財而輕慢其藏是教語乎盜使取之也女子而夭冶其容是教語淫者使暴之也小人而乘君子之器是招盜使奪之也皆自取之之謂也並易傳廣漢張氏曰風不厚不能負大翼水不厚不能負大舟君子處心不厚則恃勞而傲物耀功而忽人安能以其功而下人乎竊觀地中有山之象夫徳之盛而充實如山焉禮之恭而接下如地焉夫内之徳盛而外之禮恭所以處上而人不忌處前而人不怒此謙所以長保其位也會通已上一條補白雲郭氏曰此五者當與鳴鶴在隂同居爻象擬議之終蓋皆擬議之道也或别為一章非也擬議者聖人用易之道蓋觀象玩辭所以反諸其身也然不曰用而曰擬議者爻象必先擬議而後可用方擬諸形容象其物宜必從其事物象類以探作易聖人之意是以必至於擬議而後可也古之君子以擬議為學易之要務而世多略而不言或言之復失擬議之道是以易終不用於世也且玩易之辭有曰藉用白茅无咎則知无所失之慎有曰勞謙君子有終吉則知以功下人之恭有曰亢龍有悔則知貴髙不可以无輔有曰不出户庭无咎則知言語不可以不密有曰負且乘致寇至則知非所乘而招盜是皆擬議而知其變化也五者之下各繫以孔子之言蓋孔子擬議之辭所謂擬之而後言者也能觸類而長之則三百八十四爻能事畢矣天地之間備矣聖人存其大法得此七者已足用蓋難盡為之言也聖人初已盡言於彖象文言以謂擬議之學未明故復繫於此其憂後世所以垂教至矣盡矣後世欲務空言誇世則不必深明其說茍欲為力行之學歸於君子之儒則擬議之道宜先盡心焉其言作易者其知盜乎者蓋聖人嘆易之道无不備也盜之情不必知也宜其无所見於易也尚且深明於此則天地之間舉无遺矣擬議之道其可忽乎故驚而嘆之有是言也觀此則知崇禮卑又无足疑者繫辭自天尊地卑之後至此章終凡言重卦設卦易道易辭爻位彖象乾坤神聖及聖賢之所法則君子之所觀玩與夫學者擬議之道略盡於斯其所未言者數所未詳者變化之道故繼之於後也易說漢上朱氏曰藉用白茅无咎大過初六爻辭也初六一柔承四剛執柔處下而不犯雖柔无咎譬之置器茍錯之於平安之地斯可矣又藉之以潔白之茅慎之至也茅之為物雖薄而祭祀用之可謂重矣持是以往何以尚之明言行之當慎也勞謙君子有終吉者謙九三爻辭也坎為勞九三體謙以陽下隂勞而不自伐有功而不自徳厚之至也語以其功下人者也艮成始成終成功之象明言行之當謙也徳者言盛者也厚之至是也禮者言恭者也禮自卑而尊人自後而先人故以恭言之君子之於謙也豈唯下人亦所以存其位存其位非固位有終吉也謙恭則其徳厚矣亢龍有悔乾上九爻辭也不當尊位无位也乾見坤隠坤為衆无民也九三不應无輔也上九剛過亢滿不知謙降之道是以動而有悔違謙故也不出户庭无咎節初九爻辭也兊為口動於内為舌初應四出户庭也是為否亂之階初四易則乾君受言坤臣納言離為明坎為難明言而有難不密之害也初四失位君臣失也初乾為君四坤為臣初為事幾成於四四失而難作害成也不出户庭坎離象隠是以君子慎密而不出言此以明不慎不密之戒易曰負且乘致寇至解九三爻辭也以小人而乘君子之器則為盜者不奪不饜故思奪之四坎為盜三四同象六三據非其位上慢也以柔乘剛下暴也上下惡之盜將聲其罪故思伐之離為戈兵三四易位自上伐下也慢藏者誨人使盜冶容者誨人使淫无不自己求之負且乘致寇至盜之招也故子曰作易者其知盜乎言此以明致恭可以存位慢則盜奪之伐之為不恭之戒舉上五爻以例爻之不變者也夫謙恭慎密又知夫不密不恭之戒則於言行也何有善易者也易豈止於文字而已哉易傳新安朱氏曰慎之至釋大過初六爻義勞而不伐有功而不徳釋謙九三爻義徳言盛禮言恭言徳欲其盛禮欲其恭也貴而无位髙而无民釋乾上九爻義當屬文言此蓋重出君子慎密而不岀釋節初九爻義作易者其知盜乎釋解六三爻義並本義右第八章新安朱氏本義曰此章言卦爻之用合訂刪補大易集義粹言卷七十二
