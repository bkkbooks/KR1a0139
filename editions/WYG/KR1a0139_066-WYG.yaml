body:
  text: 合訂刪補大易集義粹言卷六十四頭等侍衞納喇性徳編兊下坎上伊川先生曰節序卦渙者離也物不可以終離故受之以節物既離散則當節止之節所以次渙也為卦澤上有水澤之容有限澤上置水滿則不容為有節之象故為節易傳節亨苦節不可貞伊川先生曰事既有節則能致亨通故節有亨義節貴適中過則苦矣節至於苦豈能常也不可固守以為常不可貞也易傳白雲郭氏曰天下之理有過則有節不及无節也過而不知節則傷害隨之節無傷害是以亨也節之過與无節同非亨之道故苦節不可貞如是則節无它道焉中而已然節獨以過為主中由過與不及言也此其所以異者易說新安朱氏曰節有限而止也為卦下兊上坎澤上有水其容有限故為節節固自有亨道矣又其體隂陽各半而二五皆陽故其占得亨然至於太甚則苦矣故又戒以不可守以為貞也本義彖曰節亨剛柔分而剛得中苦節不可貞其道窮也説以行險當位以節中正以通天地節而四時成節以制度不傷財不害民伊川先生曰節之道自有亨義事有節則能亨也又卦之才剛柔分處剛得中而不過亦所以為節所以能亨也節至於極而苦則不可堅固常守其道已窮極也説以行險以卦才言也内兊外坎説以行險也人於一作之所説則不知己遇艱險則思止方説而止為節之義當位以節五居尊當位也在澤上有節也當位而以節主節者也處得中正節而能通也中正則通過則苦矣推言節之道天地有節故能成四時无節則失序也聖人立制度以為節故能不傷財害民人欲之无窮也苟非節以制度則侈肆至於傷財害民矣並易傳横渠先生曰以苦節為貞其道之窮必矣易説藍田吕氏曰節有所制而不過也節有制度節其已甚則亨其道大觳不可以繼所謂苦節不可貞言不可守之以為正也龜山楊氏曰易曰節以制度不傷財不害民葢侈用則傷財傷財必至於害民故愛人必先於節用論語解白雲郭氏曰節之成卦自泰三五而来剛柔分而上下剛上而得中故為節且賁之與節皆自泰來其義相類賁則柔来而文剛剛上而文柔節則柔来而節剛剛上而節柔夫泰為天地純剛柔之卦賁以剛柔純質而无文故文之節以剛柔過盛而无節故節之彖言剛柔分而剛得中則知節之名卦以剛柔皆過盛為義也是以泰之象曰后以財成天地之道而節則終其義者也然天下之理中則可久不及與過皆非可久之道若節過中是以其道易窮而不能久也説以行險非苦節也中道也九五居尊位有能節之勢而行甘節之道道與位當故言當位以節居中得正其道乃通此節亨之義也人知過盛之可節而不知天地非節亦不能有成是非獨人事而已故聖人因明天地節而四時成為君者必法之以制度故不傷財不害民也天地節者剛之節柔柔之節剛也剛節柔猶冬之有春柔節剛猶夏之有秋不然則大冬大夏而已安能成四時乎泰之六五以剛節之而成坎少陽也春之象也泰之九三以柔節之而成兊少隂也秋之象也天地之節於此可見故易之卦變於節為尤詳然易卦雖以人事為主亦未有不本於天地而來者葢上下二體三才亦皆具天地之象聖人明人道本於天地故彖之所言或取變或取二體三才其稱天地亦非一道也革節是已易說漢上朱氏曰節渙之反泰之變也泰分九三之五以節其上之柔分六五之三以節其下之剛剛柔分而有節二五之剛得中上下節之而不過所謂節者剛柔有節而不過乎中不過則亨故曰節亨剛柔分而剛得中不曰柔得中者剛得中則柔不過矣此以卦變二三五爻言節之所以亨也上六乘剛處險守而不變所以不可貞者節之道窮也易窮則變變則通通則久守而不變苦節也凡物過則苦味之過正形之過勞心之過思皆曰苦苦節則違情性之正物不能堪豈道也哉申屠狄之潔陳仲子之亷非不正也立節太苦不可貞也夫節者為其過於中也故節之使不失其中上六正而過矣安能節乎故曰道之不行也我知之矣賢者過之不肖者不及也自不肖觀之過者為賢自中言之過不及一也謂之正者貴乎中正也正而失中不可正也故曰苦節不可貞其道窮也此以上六无應戒苦節也兊說也坎險也人情易則行險則止凡止而行皆有節險之道節止而不行者也泰之九三上行自兊成坎以説行險也以説行險雖止不失其和矣和而不流中立而不倚故曰說以行險此以九五言節之亨也九五節之位也中正節之道也當位以中正為上下之節各適其宜无所不行故曰當位以節中正以通此以九五言節亨者當有位也九三一變歸妹震為春離為夏節之以春夏也再變節兊為秋坎為冬節之以秋冬也天地有節則隂陽寒暑不過而萬物成於艮故曰天地節而四時成離兊為貝貝為財乾為金玉坤為民泰甚則人欲縱人欲縱則財用匱乏百姓困窮故量財之所入計民之所用節以制度自下等級而上其費有經其斂有法財既不傷民亦不害是以天地不節則四時不成王者不節則民財不生无非節亨也故曰節以制度不傷財不害民此又推原卦變互體以盡節之義也在卦氣為七月故太𤣥準之以度易傳新安朱氏曰剛柔分而剛得中以卦體釋卦辭苦節又以理言説以行險又以卦徳卦體言之當位中正指五又坎為通天地節節以制度極言節道本義天地節而四時成天地轉來到這裏相節了更没去處今年冬盡了明年又是春夏秋冬到這裏厮匝了更去不得這裏折做兩截兩截又折做四截便是春夏秋冬它是自然之節初无人使它聖人則因其自然之節而節之如脩道之謂教天秩有禮之類皆是天地則和這箇都无只是自然如此聖人法天做這許多節措出來語録象曰澤上有水節君子以制數度議徳行伊川先生曰澤之容水有限過則盈溢是有節故為節也君子觀節之象以制立數度凡物之大小輕重髙下文質皆有數度所以為節也數多寡度法制議徳行者存諸中為徳發於外為行人之徳行當義則中節議謂商度求中節也易傳藍田吕氏曰澤上有水水過必溢節之不可過也以節議制度則名分不可亂以節議徳行則賢能大小稱其任白雲郭氏曰澤无水困則為不足澤上有水則為有餘不足則為困有餘則當節理之常也在人之節則制數度所以節於外議徳行所以節於内也為國為家至於一身其内外制節皆一也易說漢上朱氏曰澤之容水固有限量虚則納之滿則泄之水以澤為節也君子於民亦然制其多寡制其隆殺制數度也制數度者坎之象也律度量衡皆始於黄鍾冬至之律於辰為子於卦為坎九五以中正為節也乾為徳震為行兊口為議議徳行者恐其中而未正也易傳曰議謂商度求中節也易傳初九不出户庭无咎象曰不出户庭知通塞也伊川先生曰户庭戶外之庭門庭門外一作内之庭初以陽在下上復有應非能節者也又當節之初故一无故字戒之謹守至於不出户庭則无咎也初能固守終或渝之不謹於初安能有卒故於節之初為戒甚嚴也爻辭於節之初戒之謹守故云不出户庭則无咎也象恐人之泥於言也故復明之云雖當謹守不出户庭又必知時之通塞也通則行塞則止義當出則出矣尾生之信一无信字水至不去不知通塞也故君子貞而不諒繫辭所解獨以言者在人所節惟言與行節於言則行可知言當在先也並易傳横渠先生曰見塞於九二故不出易說藍田吕氏曰九以剛居節之初宜立法以制節人之有欲為上之所制節其始多不説君子知通塞之有時與夫人情難與慮始故立法之初慎密不出則不為異論之所近矣故曰不出户庭无咎白雲郭氏曰六爻惟初為有應而曰不出户庭无咎者所以節之也不知有節則出入无時而失慎密之道且通則行塞則止當出則出初不係於有應无應也應者助其外而已而在我之節其可廢乎故象以不出户庭為知通塞而繫辭又明慎密不出之義聖人之旨深矣節之議徳行於此可見伊川曰户庭户外之庭也門庭門内之庭也易説漢上朱氏曰初九六四正應也徃來相易不窮故曰通九二近而不相得窒其所行故曰塞初九兊體剛決動成坎坎水為知故知通塞五艮為門闕交兊為户四在門闕之中為庭不出者自守以正而已動有險故不出户庭乃无咎不出則處也在言語則黙亦是也不出而處不語而黙雖有正應不說也是之謂節兊為口舌故繫辭専以慎密不出言之易傳曰通則行塞則止義當出則出矣君子貞而不諒或曰艮為門闕又曰交兊為户何也曰兊為户震為門艮土在啓閉之際故為門闕乾始於子至丑直艮至寅成泰泰者天地交通至夘直震故震交艮為門震即乾之闢户也是以雷發聲蟄蟲開户坤始於午至未直坤至申成否否者天地閉塞至酉直兊故兊交艮為户兊即坤之闔户也是以雷收聲蟄蟲坏户易傳新安朱氏曰户庭户外之庭也陽剛得正居節之初未可以行能節而止者也故其象占如此本義九二不出門庭凶象曰不出門庭失時極也伊川先生曰二雖剛中之質然處隂居說而承柔處隂不正也居說失剛也承柔近邪也節之道當以剛中正二失其剛中之徳與九五剛中正異矣不出門庭不之於外也謂不從於五也二五非隂陽正應故不相從若以剛中之道相合則可以成節之功惟其失徳失時是以凶也不合於五乃不正之節也以剛中正為節如懲忿窒慾損過抑有餘一作益不及是也不正之節如嗇節於用懦節於行是也不能上從九五剛中正之道成節之功乃係於私暱之隂柔是失時之至極所以凶也失時失其所宜也並易傳横渠先生曰體柔位隂故不出門庭凶易説藍田吕氏曰九二以剛居中法成中節可以出矣而以陽居隂持慎密之意失時不行治道将廢故曰不出門庭凶户謂房室之户户庭内寢之庭庭之不出乎内也門大門也門庭外寢之庭自外寢達於大門之外及諸人也白雲郭氏曰初為不當有事之地而二以剛中居有為之位其道不可同也故初以不出户庭為知塞而二以不出門庭為不知通知塞故无咎不知通則有失時之凶矣極至也有初故可以節二有二則可以節初二者亦相濟之道歟易說漢上朱氏曰極至中也二動歴四應五成震震為門四在門闕之中為庭二以中應五之中極也當其可之謂時故曰時極時極者時中也九五剛中當位酌民情以為節九二有剛中之徳動而應以趨節之時則中正之節達於下矣得時極也若說於三隂與五異趨固而不知變門庭可出而不出是得時極而自失之也所以凶者其節不正也故聖人戒之易傳新安朱氏曰門庭門内之庭也九二當可行之時而失剛不正上无應與知節而不知通故其象占如此本義户庭是初爻之象門庭是第二爻之象户庭未出去在門庭則已稍出矣就爻位上推户庭主心門庭主事語録六三不節若則嗟若无咎象曰不節之嗟又誰咎也伊川先生曰六三不中正乘剛而臨險固宜有咎然柔順而和説若能自節而順於義則可以无過不然則凶咎必至可傷嗟也故不節若則嗟若己所自致无所歸咎也節則可以免一作无過而不能自節以致可嗟将誰咎乎並易傳横渠先生曰處非其位失節也然能居不自安則人将容之故无咎兊說也故能嗟咨取容王弼於此无咎又别立一例只舊例亦可推行但能嗟其不節有過之心則亦无咎也若武帝下罪已之詔而天下悦夫人過既改則復何咎之有並易説白雲郭氏曰自成卦之初論之則六三所以節剛也自生爻之後論之則六三居不中正乘剛履險不知節者也不知節則傷嗟且至咸其自取又誰咎乎易說漢上朱氏曰六三柔不當位說而失中不能節之以剛者也有子曰知和而和不以禮節之亦不可行也三不能節則乘剛失位以說從人而已不能堪焉故憂發於口咨嗟而已三變而剛剛不失節而上自應夫何憂哉易傳曰節可以免過而不能自節以致可嗟将誰咎乎此爻與離之九三不鼓缶而歌則大耋之嗟凶象異而意同易傳新安朱氏曰隂柔而不中正以當節時非能節者故其象占如此此无咎與諸爻異言无所歸咎也本義六四安節亨象曰安節之亨承上道也伊川先生曰四順承九五剛中正之道是以中正為節也以隂居隂安於正也當位為有節之象下應於初四坎體水也水上溢為无節就下有節也如四之義非強節之安於節者也故能致亨節以安為善強守而不安則不能常豈能亨也四能安節之義非一象獨舉其重者上承九五剛中正之道以為節足以亨矣一作是以亨也餘善亦不出於中正也並易傳白雲郭氏曰以隂比陽以柔從剛安行承上之節而无勉強矯為之意此六四之所以亨也亨自亨也未足以及人古之所謂守節之士也易說漢上朱氏曰節止也凡止物有險之道險非人情之所安上三爻皆處險六四當位履正安於處險以順承上而止物焉安於節也六四能安於節者以承上中正之道以此節下下必應之節道行乎上下而亨亨則通矣非中正豈能安其節哉易傳曰節以安為善強守而不安則不能常豈能亨也易傳新安朱氏曰柔順得正上承九五自然有節者也故其象占如此本義安節是安穩自在甘節是不辛苦喫力底意思甘便對那苦甘節與禮之用和為貴相似不成人臣得甘節吉時也要節天下大率人一身上各自有箇當節底語録九五甘節吉徃有尚象曰甘節之吉居位中也伊川先生曰九五剛中正居尊位為節之主所謂當位以節中正以通者也在己則安行天下則說從節之甘美者也其吉可知以此而行其功大矣故徃則有可嘉尚也既居尊位又得中道所以吉而有功節以中為貴得中則正矣正不能盡中也並易傳横渠先生曰以剛居中得中盛位優為其節者也守之不懈富貴常保故曰徃有尚易說白雲郭氏曰安節自安而已而人未必安甘節則施之於己施之於人皆不以為苦故无徃不可所以為人君之道九五居中履正以甘節節天下上下同之其吉宜矣盡節之大者是以徃有尚也詩所謂如月之恒如日之升者其徃有尚之意與葢言日進而无已也易說漢上朱氏曰節者理之不可得而過者也九五居位以中為制節之主安行於上而不動甘節也五自泰九三變以說行險有甘之意先王建國宅中均道里制邦域之時乎正則吉二説從之徃有尚也尚配也徃有配乎中也詩曰商邑翼翼四方之極徃有尚也故九二不出門庭凶彖言當位以節中正以通爻止言居位中何也彖言九五一爻此言九五九二相易也易傳曰己則安行天下則說從節之至善者也易傳新安朱氏曰所謂當位以節中正以通者也故其象占如此本義上六苦節貞凶悔亡象曰苦節貞凶其道窮也伊川先生曰上六居節之極節之苦者也居險之極亦為苦義固守則凶悔則凶亡悔損過從中之謂也節之悔亡與他卦之悔亡辭同而義異也節既苦而貞固守之則凶葢節之道至於窮極矣並易傳横渠先生曰處險之極故曰苦節苦節而不貞悔也必貞而凶則道雖窮而悔亡苦節反若獲吉取悔必多易說藍田吕氏曰上六隂過乎中居節之極陽盈隂虚其節已甚苦節者也用過乎節物所不堪守是不變物窮必乖故曰貞凶禮奢寧儉未害乎義故可以悔亡白雲郭氏曰上六居節之極葢節之過者以苦節人固不能於以自節亦非可久之道如是為貞則凶矣夫苦節不可貞而上六固守之故凶而道窮也伊川曰上六之悔亡與它卦異葢言悔則凶亡矣易說漢上朱氏曰節過乎中居險之極人所不堪下无說而應之者苦節也不可貞貞則凶其道窮也上六固守乎正不知俯而就中則悔亡五中也悔則窮能悔則凶亡矣易傳曰悔亡損過從中之謂也節之悔亡與他卦之悔亡辭同而意異易傳新安朱氏曰居節之極故為苦節既處過極故雖得正而不免於凶然禮奢寜儉故雖有悔而終得亡之也本義問節卦大抵以當而通為善觀九五中正而通本義云坎為通豈水在中間必流而不止耶先生曰然又問觀節六爻上三爻在險中是處節者也故四在險初而節則亨五在險中而節則甘上在險終雖苦而无悔葢節之時當然也下三爻在險外是未至於節而預知所節之義初知通塞故无咎二可行而反節三見險在前當節而又以險居剛不中正而不能節所以二爻凶而有咎不知是如此否先生曰恁地說也說得然九二一爻看來甚好而反凶終是解不穩語録合訂刪補大易集義粹言卷六十四
