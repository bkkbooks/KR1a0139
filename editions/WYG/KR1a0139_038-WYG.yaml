body:
  text: 合訂刪補大易集義粹言卷三十六頭等侍衛納喇性徳編巽下震上伊川先生曰恒序卦夫婦之道不可以不久也故受之以恒恒久也咸夫婦之道夫婦一有之道字終身不一有可字變者也故咸之後受之以恒也咸少男在少女之下以男下女是男女交感之義恒長男在長女之上男尊女卑夫婦居室之常道也論交感之情則少為深切論尊卑之叙則長當謹正故兌艮為咸而震巽為恒也男在女上男動於外女順於内人理之常故為恒也又剛上柔下雷風相與巽而動剛柔相應皆恒之義也易傳東萊吕氏曰震以長男在上巽以長女在下故夫先婦後男上女下理之常也大抵易合者必易離君子之交淡若水小人之交甘若醴君子淡以成小人甘以壞且如閭巷之交其初非不欲常其終必變者何哉以其不知久敬之道也凡人之交際皆然易説恒亨无咎利貞利有攸往伊川先生曰恒者常久也恒之道可以亨通恒而能亨乃无咎也恒而不可以亨非可恒之道也為有咎矣如君子之恒於善可恒之道也小人恒於惡失可恒之道也恒所以能亨由貞正也故云利貞夫所謂恒謂可恒久之道非守一隅而不知變也故利於攸往惟其有往故能恒也一定則不能恒矣又常久之道何往不利易傳白雲郭氏曰咸恒二卦六爻剛柔皆應而名義不同者咸以男下女交感之義也恒男上女下夫夫婦婦之常道也交感時焉而已故曰取女吉夫夫婦婦可久之道也故曰恒久也其道可久斯无不通无不通則无過舉内利以固外利以行此其所以為恒也王輔嗣曰恒而亨以濟三事也後之諸儒竟分三事其説不一然恒之卦辭止有二義輔嗣誤以為三以彖觀之恒亨无咎利貞一也久於其道之謂也利有攸往一也終則有始之義也久於其道天地同也終則有始日月四時同也是孔子以為二義也易説新安朱氏曰恒常久也為卦震剛在上巽柔在下震雷巽風二物相與巽順震動為巽而動二體六爻隂陽相應四者皆理之常故為恒其占為能久於其道則亨而无咎然又必利於守貞則乃為得所常久之道而利有所往也本義東萊吕氏曰无咎利貞利有攸往通乎古今行乎天下而後謂之常行於今不可行於古行於家不可行於國則不可謂之常通乎古今則不可改矣行乎天下則不可違矣父慈子孝兄友弟恭此閨門之常也夏葛冬裘渴飲飢食此一身之常也其曰恒亨无咎利貞者常行之道利在於正使其不正雖一朝行之亦不可也為學亦然門戸已是議論已正常而行之雖終身不可改也所學所行未得其正則安可一朝居哉恒而曰利有攸往者如書之終始惟一時乃日新一之内自有新新之内自有一有終有始本不可謂之一今也以為一者是不常中自有常也不善學者以為一定不易而已由是至於執而不通利有攸往者乃變通不息之理也如天地之道寒往暑來不已不息所以為天地之常易説彖曰恒久也剛上而柔下雷風相與巽而動剛柔皆應恒恒亨无咎利貞久於其道也天地之道恒久而不已也利有攸往終則有始也日月得天而能久照四時變化而能久成聖人久於其道而天下化成觀其所恒而天地萬物之情可見矣伊川先生曰恒者常久之義也剛上而柔下雷風相與巽而動剛柔皆應卦才有此四者成恒之義也剛上而柔下謂乾之初上居於四坤之四下居於初剛爻上而柔爻下也二爻易處則成震巽震上巽下亦剛上而柔下也剛處上而柔居下乃恒道也雷風相與雷震則風發二者相須交助其勢故云相與乃其常也巽而動下巽順上震動為以巽而動天地造化恒久不已者順動而已巽而動常久之道也動而不順豈能常也剛柔皆應一有恒字一卦剛柔之爻皆相應剛柔相應理之常也此四者恒之道也卦所以為恒也恒之道可致亨而无過咎但所恒宜得其正失正則非可恒之道也故曰久於其道其道可恒之正道也不恒其徳與恒於不正皆不能亨而有咎也天地之所以不已盖有恒久之道人能恒於可恒之道則合天地之理也天下一作地之理未有不動而能恒者也動則終而復始所以恒而不窮凡天地所生之物雖山嶽之堅厚未有能不變者也故恒非一定之謂也一定則不能恒矣惟隨時變易乃常道也故云利有攸往明理之如是懼人之泥於常也日月得天以下此極言常理日月隂陽之精一有二字氣耳惟其順天之道往來盈縮故能久照而不已得天順天理也四時隂陽之氣耳往來變化生成萬物亦以得天故恒久而不已聖人以恒久之道行之有常而天下化之以成美俗也觀其所恒謂觀日月之久照四時之久成聖人之道所以能常久之理觀此則天地萬物之情理可見矣天地常久之道天下常乆之理非知道者孰能識之並易傳横渠先生曰觀書當不以文害辭如云義者出於思慮忖度易言天地之大義則天地固无思慮天地之情天地之心皆放此易説日月得天得自然之理也非蒼蒼之形也正蒙龜山楊氏曰男下女㛰姻之始也男上而女下居室之常分也盡其常分而後有可久之道焉卦之所以為恒也中庸曰至誠无息不息則久故惟天下之至誠為能久恒久也夫婦之道不可以不久也又曰維天之命於穆不已盖曰天之所以為天也於乎不顯文王之徳之純盖曰文王之所以為文也純亦不已天之為天文之為文皆原於不已故曰天地之道恒久而不已也日月得天得其所以為天故代明不息而能久照四時變化終則有始故能有成聖人乆於其道而天下化成如文王所以為文是也天人之道一於誠而已矣易説天地之道恒乆而不已者也惟不已故能乆聖人乆於其道亦為不已也故能天下化成中庸解有恒心然後可與為善苟无恒心放僻邪侈无不為己故善人不可得而見思見有恒者易曰恒乆也以亡為有終亦必亡而已矣何可乆也虚也約也亦然故曰難乎有恒矣語解兼山郭氏曰剛上而柔下剛柔之常也雷風相與二氣之常也剛柔皆應交感之常也恒亨无咎利正可乆之常也天地之道恒乆而不已盖言天之髙明地之博厚悠也乆也故能常也日月得天故能生明四時變化故能成嵗聖人乆於其道故為忠為文相救而成道也故曰中者天下之大本和者天下之達道如是也然作易者專取配於夫婦何也言君子之道造端乎夫婦及其至也察乎天地者此也彼一以動一以静或作之或止之謂曰我能常何足以語此易説白雲郭氏曰恒自泰來故伊川以乾之初上居於四坤之四下居於初二爻剛上柔下成為震巽盖非謂震為剛而巽為柔也若以上下二卦為剛柔則易之柔上剛下剛上柔下之卦多矣不當獨於咸恒言之也是故剛上柔下言初四二爻成震巽之始也雷風相與言震巽可久之象也巽而動言震巽可久之才也剛柔皆應言六爻可久之道也有是四者是之謂恒恒亨无咎利貞此乆於其道之所致也雖天地之大不能外此故必恒乆不已然後為天地利有攸往者恒道无終窮无終窮則往无不利猶日月乆照四時乆成皆終則有始之道聖人之道天地恒乆不已之道也其所以化成天下亦如日月四時是已使有終无始則日月亦不能乆照變化亦不能乆成聖人亦不能化成天下矣故彖言所以為恒者四剛上而柔下雷風相與巽而動剛柔皆應是也又言恒之所以為道者二乆於其道也終則有始也乆於其道雖天地亦如之終則有始雖日月四時亦如之此可以見天地萬物之情矣咸恒六爻之才皆不及疑二卦之義非大故孔子於彖皆以天地萬物之情終之使後世學者不以小道觀之也易説漢上朱氏曰咸以男下女男女交感之情也恒男上女下夫婦居室之道也交感之情少則情深居室之道長則分嚴故取象如此恒常乆也卦自泰變初九之剛上居四六四之柔下居初剛上而柔下上下尊卑各得其序常乆之道也故曰剛上而柔下此以初六九四言恒也震為雷巽為風雷動風行兩者相薄相與於无形而交相益者也常乆之道闕一則息矣故曰雷風相與此以震巽兩體相應而言恒也巽巽也震動也飄風驟雨天地為之不能以長乆而况於人乎長乆之道非巽而動不可也故曰巽而動此再以震巽言恒也夫剛上柔下而不能相與不可也相與矣不能巽而動不可也三者之才具則上下皆應斯足以盡恒之道故又曰剛柔皆應此再以六爻相應言恒也且以夫婦之道觀之尊者上卑者下分嚴矣不能相與則情何由能通相與矣剛或犯義柔不得禮亦豈能乆巽而動上下内外應而家道成推之以治國治天下一道也故曰恒初九之四六四之初宜有咎亨則无咎亨者剛柔相與巽而動其動不窮也貞者泰初九也初九以震巽而動是以亨乾天坤地天地之道常乆而不已者正而已矣故曰恒亨利貞乆於其道也天地之道常乆而不已也此再以初變四言恒之才也易窮則變變則通通則乆恒非一定而不變也隨時變易其恒不動故曰利有攸往恒一變井再變蠱復歸於恒三卦有震兊巽坎離艮之象天地之道始於震終於艮既終則復始於震而恒體不變所以能循環不息終始不窮亘古今而常乆也故曰利有攸往終則有始也何以知天地之道能乆哉觀諸日月之行四時之運則知之離為日坎為月坎離相易互藏其宅剛柔相與不失其正冬行北夏行南朝出於震夕入於兊得天之道終則有始也故能乆照春震秋兊夏離冬坎隂生於姤陽生於復剛柔正也始於立春終於大寒終則有始也故變化而能乆成聖人以恒致亨始之以貞如日月之明四時之有經故天下相説而巽其化乃成天地非恒不成觀諸天地則萬物之情可見矣此以九四一爻極其卦之變以推廣常乆之道也在卦氣為七月故太𤣥凖之以常永易傳新安朱氏曰剛柔相應以卦體卦象卦徳釋卦名義或以卦變言剛上柔下之義曰恒自豐來剛上居二柔下居初也亦通恒乆而不已也恒固能亨且无咎矣然必利於正乃為乆於其道不正則乆非其道矣天地之道所以長乆亦以正而已矣終則有始乆於其道終也利有攸往始也動静相應循環之理然必静為主也天地萬物之情可見極言恒久之道並本義正便能乆天地之道恒乆而不已這个只是説久問恒非一定之謂一定則不能恒矣曰物理之終始變易所以為恒而不窮然所謂不易者亦須有以變通乃能不窮如君尊臣卑分固不易然上下不交也不得父子固是親親然所謂命士以上父子皆異宫則又有變焉惟其如此所以為恒論其體則終是恒然體之常所以為用之變用之變乃所以為體之常物各有个情有个人在此決定是有那羞惡惻隠是非辭遜之情性只是个物事情却多般或起或滅然而頭面却只一般長長恁地這便是觀其所恒而天地萬物之情可見之義乃若其情只去情上面看並語録東萊吕氏曰彖曰恒乆也剛上而柔下雷風相與巽而動剛柔皆應恒恒之一字最難看可以見六十四卦之妙非獨可以見六十四卦之妙又可以見易之全體盖乾坤者易之門也外乾故剛上内坤故柔下雷動而風發此相應常乆之道故恒云巽而動初與四為應二與五為應三與上為應皆以剛柔相應而為恒曉此四字則六十四卦皆具見矣剛上柔下乃尊卑定分之常雷風相與乃運用變化之恒巽而動者天地萬物未嘗不順理而動也剛柔相應天下之理未嘗无對也此四者乃天地之常經大易之正義也恒亨无咎利貞乆於其道也大抵通天下萬世常行而无弊者必正理也若一時之所尚一人之所行則必不能乆故恒之亨利於貞亦如漢文帝好黄老至文帝之後則黄老之道不行梁武帝好浮屠至武帝之後則浮屠之道不行盖非正道則必不能乆天地之道常久而不已也不已兩字最要玩味天穹然在上使其无不已之道則乆而必墜地頺然在下使其无不已之道則乆而必陷惟是有不已之道方能乆利有攸往終則有始也終則有始如人之一身自少至老爪髪皮膚未嘗須臾不變若説終身不變則失其所以為身亦如水若止而不流則日涸一日惟其常流不息所以不窮日月得天而能乆照四時變化而能久成聖人久於道而天下化成觀其所恒而天地萬物之情可見矣此正與中庸所謂博厚所以載物也髙明所以覆物也悠乆所以成物也博厚配地髙明配天悠乆无疆之理同當玩味所恒二字人但見日月乆照四時乆成聖人乆道而不知所以乆照所以乆成所以化成處故所之一字讀易者當深體之並易説象曰雷風恒君子以立不易方伊川先生曰君子觀雷風相與成恒之象以常乆其徳自立於大中常乆之道不變易其方所也易傳龜山楊氏曰立不易方乃能常也易説藍田吕氏曰恒居常而可乆也通於衆處於无過守正而不變其道乃可乆也非常之道可暫而不久者也若夫逺而天下乆而萬世无所往而不利惟常道為然雷風雖若非常其所以相與則恒觀其所恒則天地萬物之情亦一雷以動之風以散之有天地以來其用未嘗易君子所立之方理義有常亦萬世所莫能易兼山郭氏曰雷以動之風以散之此可以為常矣然君子何取於立不易方盖君子敬以直内義以方外仁或有蔽焉義則无也故能窮則變變則通通則久始可以為常矣易説白雲郭氏曰方猶道也君子則立不可易易則不可常矣是以顔子拳拳服膺而弗失之也易説漢上朱氏曰雷風相薄極天下之動也而其正不動恒也恒自震三變九三立而不易君子以是處天下之至動而立不易方者理之所不可易者也巽股為立坤為方動而不易其方其不動者乎易傳東萊吕氏曰雷風恒君子以立不易方以雷言之或在南山之陽南山之側南山之下風或起於南海起於北海二者初未見其為常君子於此乃立不易方若與雷風之象不相闗渉盖立不易方乃立其所當立之地故也人於立處立猶風雷於起處起也且彖曰天地之道常久而不已象則曰立不易方此理雖新新不息然不曾離元來去處一歩此所謂立不易方也如始乎為士只是在此終乎為聖人亦只是在此雖是立不易方又不可乆非其位此全要人體會易説初六浚恒貞凶无攸利象曰浚恒之凶始求深也伊川先生曰初居下而四為正應柔暗之人能守常而不能度勢四震體而陽性以剛居髙志上而不下又為二三所隔應初之志異乎常矣而初乃求望之深是知常而不知變也浚深之也浚恒謂求恒之深也守常而不度勢求望於上之深堅固守此凶之道也泥常如此无所往而利矣世之責望故素而至悔吝一作咎者皆浚恒者也志既上求之深是不能恒安其處者也柔微而不恒安其處亦致凶之道凡卦之初終淺與深微與盛之地也在下而求深亦不知時矣居恒之始而求望於上之深是知常而不知一无知字度勢之甚也所以凶隂暗不得恒之宜也並易傳横渠先生曰柔巽在下以應於上持一作特用為常求之過深也故人道之交貴乎中禮且久漸而成也易説藍田吕氏曰初六始求可乆之道當與時消息而以隂居之執一不變渉於刻深取凶之道執一廢百无往而利龜山楊氏曰昏義曰敬慎重正而後親之禮之大體而所以成男女之别立夫婦之義也初與四為正應而居一卦之初未及敬慎重正而遽親之是始求深也故曰浚恒貞凶浚者治而深之也雖貞亦凶矣夫何利之有詩曰未見君子憂心忡忡亦既見止亦既覯止我心則降則其始求可知矣易説問以匹夫一日而見天子天子問焉盡所懐而陳之則事必有窒礙者不盡則為不忠如何曰事亦須量深淺孔子曰信而後諫未信則以為謗已也易之恒曰浚恒凶此恒之初也故當以漸而不可以浚浚則凶矣假如問人臣之忠邪其親信者誰歟遽為之辨别是非則有失身之悔君子於此但不可以忠為邪以邪為忠語言之間故不无委曲也荆州語録兼山郭氏曰初六自上下下故曰浚恒恒非可以浚求也易説白雲郭氏曰進道有漸而後可乆在恒之初浚而深求非其道也孔子曰欲速則不達孟子曰其進鋭者其退速是豈可乆之道乎以是為貞則凶矣不達退速之道何所利哉易説漢上朱氏曰初本泰之六四成巽九出六入有隂陽相求之象初入卦底在兊澤之下巽為股股入於澤下入之深者也浚之象故曰浚恒四震體躁動九陽剛處非其位不能下初不正不量而入始與四交求之太深非可久之道故凶夫人道交際貴乎知時而適淺深之宜故孟子三見齊王而不言或曰初六不正是以求之不可深曰動而正四亦不應雖正亦凶况不正乎浚恒之凶在始求太深人未必應情已不堪无所往而可也故曰貞凶无攸利易傳新安朱氏曰初與四為正應理之常也然初居下而在初未可以深有所求四震體而陽性上而不下又為二三所隔應初之意異乎常矣初之柔暗不能度勢又以隂居巽下為巽之主其性務入故深以常理求之浚恒之象也占者如此則雖正亦凶而无所利矣本義叔重説浚恒貞凶恐是不安其常而深以常理求人之象程氏所謂守常而不能度勢之意先生曰固未見其有不安其常之象只是欲深以常理求人耳語録東萊吕氏曰相應而相親者此常理也恒之初與四時位不同則不可以常理論何者初在下而賤四在上而貴又有二三間於中當自安分可也初六不達夫勢利之分區區責人之應已而以常理待人四又以尊貴居上而不與之應此其所以凶也交遊亦然始也相親相應亦固其常自夫一貴一賤之分而勢位異矣苟不知勢之異勞精神以求其應則亦有求深之凶然始字最當玩味大抵人情責己輕責人深不知勢位之既分而以始交之心求之故言始求深也易説九二悔亡象曰九二悔亡能久中也伊川先生曰在恒之義居得其正則常道也九陽爻居隂位非常理也處非其常本當有悔而九二以中徳而應於五五復居中以中而應中其處與動皆得中也是能恒久於中也能恒乆一无乆字於中則不失正矣中重於正中則正矣正未必中也九二以剛中之徳而應於中徳之勝也足以亡其悔矣人能識重輕之勢則可以言易矣所以得悔亡者由其能恒乆於中也人能恒乆於中豈止亡其悔徳之善也並易傳横渠先生曰以陽繫隂用以為常不能无悔以其乆中故免易説龜山楊氏曰處非其位宜有悔也然在下卦之中以陽居之能久其中也故悔亡易説兼山郭氏曰九二不當位悔也乆中則可以亡也顔氏之子得一善則拳拳服膺而弗失夫何悔之有易説白雲郭氏曰可久之道无他焉中而已矣過猶不及皆非可久也故中庸曰中者天下之大本也九二位雖失正非无悔之象能久於中則其悔亡矣九二无它辭特曰悔亡盖見止於守常无它事也易説漢上朱氏曰動而无悔乆處而不厭者其唯中乎恒乆之道也九二動而正其悔亡以正守中能乆中也能乆中則能恒易傳新安朱氏曰以陽居隂本當有悔以其乆中故得亡也本義東萊吕氏曰大抵天下事惟得中則可以无悔九二以陽居隂非中也何以謂之悔亡盖得形之中不若得理之中形之中上下之中也譬如屋之中央有定所若理之中則无往而不中也九二以陽居隂以中而處於下又應五之中居中而行中雖非得形之中而處中應中有理之中所以悔亡也是中也亘古今而不易歴萬世而无弊然悔亡兩字尤要看天下事本无致悔之道不須言悔亡亦猶本无致咎之道不須言无咎惟二非得形之中本自當有悔今也處之而得理之中故復云悔亡也大凡道无不常亦无不中在乎處之如何耳象曰能乆中也中庸曰人皆曰予知擇乎中庸而不能期月守也又曰中庸其至矣乎民鮮能乆矣九二所以悔亡由乆於理之中也觀此則見時中之義易説九三不恒其徳或承之羞貞吝象曰不恒其徳无所容也伊川先生曰三陽爻居陽位處得其位是其常處也乃志従於上六不惟隂陽相應風復従雷於恒處而不處不恒之人也其徳不恒則羞辱或承之矣或承之謂有時而至也貞吝固守不恒以為恒豈不可羞吝乎人既无恒何所容處當處之地既不能恒處非其據豈能恒哉是不恒之人无所容處其身也並易傳横渠先生曰進則犯上退則乘剛故動則招悔取辱惟常守一徳庶幾取容故曰不恒其徳則无所容也一有雖然貞吝徳則可常也易説龜山楊氏曰九三處雷風相與之際雷動之風散之宜不能安其處也故曰不恒其徳或承之羞或者疑之也盖陽得位疑若能常者故稱或焉或者不必之辭也易説人无常心无不為己巫醫慎疾者所頼尤不可為也易曰不恒其徳或承之羞夫君子之於易也居則觀其象而玩其辭動則觀其變而玩其占苟玩其占則不恒其徳知其或承之羞必矣其為不恒也盖亦不占而已矣語解兼山郭氏曰九三剛已過中而巽為不果進退无常不恒其徳者也詩云豈弟君子民之父母不恒其徳何所取容邪易説白雲郭氏曰人之於徳也過中則不恒不恒則日入於小人之域是以為機變之巧无所用恥焉雖或承之羞亦忍而固守方自以為得計而不知恥是可鄙也孔子曰人而无恒不可以作巫醫盖言不能容身於巫醫之賤况事君治民之職乎故曰无所容也伊川曰或承謂有時而至也易説漢上朱氏曰九三得其所處宜堅正守恒而巽究為躁動而不正可處而不處失恒也故曰不恒其徳将進而犯上則上為正将退而乘二則二得中雖躁動矣進退何所容乎不得已而復豈真能恒哉故曰无所容也三動成離為目三復成巽兊為口目動言巽羞之象三動而復二在下承之未嘗動也三於是始有羞矣故曰或承之羞或疑辭亦巽也九三可貞而吝是以及此夫子曰人而无恒不可以作巫醫况九三之處髙位乎易傳新安朱氏曰位雖得正然過剛不中志従於上不能乆於其所故為不恒其徳或承之羞之象或者不知其何人之辭承奉也言人皆得奉而進之不知其所自來也貞吝者正而不恒為可羞吝申戒占者之辭本義東萊吕氏曰事有未是則當去之既到是處則當守之故有正者必當居其正有其正而不能居則失其所以為正矣九三以陽居陽得其正矣不能固守而又求於隂乃反更慕上六是己正而不能居故羞惡或承之雖正而亦吝也象曰无所容也學者於此一句要看可以容身之處而不容将何所復容其身以九居三本自有容惟其不常故雖一身亦无容是舍可容之地而反至无容之地也大抵常之道在乎中正而已九二本非正而居中所以雖悔而亡九三雖居得正乃舍是而従非舍正而従邪故曰无所容也二爻須參看易説九四田无禽象曰久非其位安得禽也伊川先生曰以陽居隂處非其位處非其所雖常何益人之所為得其道則乆而成功不得其道則雖乆何益故以田為喻言九之居四雖使恒乆如田獵而无禽獸之獲謂徒用力而无功也處非其位雖乆何所得乎以田為喻故云安得禽也並易傳横渠先生曰田以時至則禽或可得處恒非位則功无以致故君子降志辱身不可常也易説藍田吕氏曰九四以陽居隂不處於位而逺於事者也君子之於天下可以仕則仕可以己則已不居所當居不事所可事以是為常卒於无所獲而已兼山郭氏曰九四以不正之剛居不中之地其才其時不可以成功者也雖曰恒之時亦乆非其位者也易説白雲郭氏曰居可乆之地故能成可乆之功居非其位而望其功是以沒世窮年而終不可得也其九四田无禽之謂歟初六以柔求深自用之過者也九四剛而不中居非其位不能自用以有獲者也皆非恒道語之聖人乆於其道則失之逺矣易説漢上朱氏曰九四本泰之初九初往之四二成巽巽為雞二在地上田也二應五則巽禽為五有矣九四處非其位待之於上則初不至與初相易則巽伏而不見四安得禽哉乆處非其位自无得禽之理此不知義之所當得而失其所欲者也冒榮招辱貪得致亡曷若守恒之无患學者亦然學无常位亦何所託業哉易傳新安朱氏曰以陽居隂乆非其位故為此象占者田无所獲而凡事亦不得其所求也本義東萊吕氏曰天下之事居得其正雖終身而不可舍苟居非其正雖一朝而不可居四以陽居隂處非其地是居不正不可一朝居者亦猶田獵必於廣澤大山乃有所得苟於田野之間求之雖使王良之善御后羿之善射亦終无所得故象言乆非其位謂以九居四不得其正故也不得其正苟泥其常乆居而不易終无禽之可獲也此一爻學者尤宜看如人為學不得正當門戸則雖伏几案廢寝興勞神弊志亦終无所得而已矣易説六五恒其徳貞婦人吉夫子凶象曰婦人貞吉從一而終也夫子制義從婦凶也伊川先生曰五應於二以隂柔而應陽剛居中而所應又中隂柔之正也故恒乆其徳則為貞也夫以順􅀙為恒者婦人之道在婦人則為貞故吉若丈夫而順􅀙於人為恒則失其剛陽之正乃凶也五君位而不以君道言者如六五之義在丈夫猶凶況一作豈人君之道乎在他卦六居君位而應剛未為失也在恒故不可耳君道豈可以柔順為恒也如五之従二在婦人則為正而吉婦人以􅀙為正以順為徳當終守於􅀙一夫子則以義制者也従婦人之道則為凶也並易傳龜山楊氏曰五以隂柔居中下應九二之剛而不失正故恒其徳貞然以隂柔居中下應九二以順為正也以順為正婦道也故婦人吉夫子􅀙婦則失制義之道故凶易説兼山郭氏曰六五柔而在中位有餘而才不足稱也能恒其徳婦人則吉夫子則凶何哉婦人従一而終可也夫子制義従婦之義可乎君子立不易方常而有變之義者也是以伯夷聖之清孟子謂之隘宋伯姬守禮而不去孔子取其恭於此可見也六五有震兊二體故有婦人夫子之義易説漢上朱氏曰坤順也六五順九二之剛坤徳之恒也恒其徳則正以順為正者婦人之徳坤於乾為婦恒其徳貞在婦人則吉正故吉也陽竒一也隂耦二也陽始之隂終之六五従九二終吉孰甚焉従一而終也故曰婦无再嫁之文六五一爻於巽為夫於乾為子又有兊金刻制之象去其不正而従正制義者也婦人嫁則従夫夫死従子適宜而已父令君命有所不従従婦則凶之道故曰従婦凶也易傳曰五君位也而不以君言者盖如五之義在夫子猶凶况人君乎君道尤不可以柔順為恒故也它卦六居君位而應剛則未為失矣易傳新安朱氏曰以柔中而應剛中常乆不易正而固矣然乃婦人之道非夫子之宜也故其象占如此本義問恒其徳貞婦人吉夫子凶徳指六謂常其柔順之徳固貞矣然此婦人之道非夫子之義盖婦人従一而終以順為正夫子則制義者也若従婦道則凶先生曰固是如此然須看得象占分明六五有恒其徳貞之象占者若婦人則吉夫子則凶大抵看易須是曉得象占分明所謂吉凶者非爻之能吉凶爻有此象而占者視其徳而有吉凶耳且如此爻不是既為婦人又為夫子只是有恒其徳貞之象而以占者之徳為吉凶耳又如恒亨恒固能亨而无咎然必占者能久於其道方亨而无咎又如九三不恒其徳非是九三能不恒其徳乃九三有此象耳占者遇此雖正亦吝若占者能恒其徳則无羞吝語録東萊吕氏曰乾健也天以剛為徳五居尊位所謂居天下之廣居立天下之正位宜發强剛毅以為尚今反以柔居上雖使常永貞固然在婦人則吉盖婦人之道專在於柔順居閨門之内當常守其柔順之徳而不變今六五以君之尊反以婦人之徳柔懦巽弱而不變又安足以濟事故在夫子則凶易説上六振恒凶象曰振恒在上大无功也伊川先生曰六居恒之極在震之終恒極則不常震終則動極以隂居上非其安處又隂柔不能堅固其守皆不常之義也故為振恒以振為恒也振者動之速也如振衣如振書抖擻運動之意在上而其動无節以此為恒其凶宜矣居上之道必有恒徳乃能有功若躁動不常豈能有所成乎居上而不恒其凶甚矣象又言其不能有所成立故曰大无功也並易傳横渠先生曰卦例於上爻多處之以貴而无位高而无民至恒又不可以此處但見其不常在上故大无功也易道灼然義理分明自存乎卦惟要人玩之乃得易説藍田吕氏曰上六居恒之終持守欲固以柔居上下應於三三亦不恒莫知所守當震之極動摇无止失守无功凶其宜也龜山楊氏曰震之極也上六以隂柔居動之極非安於常者也雖動而不息无功矣故振恒凶振者動之極也易説兼山郭氏曰上六居震之極以動為常窮而不知變者也庸无失乎易説白雲郭氏曰先人曰上六居震之極以動為常窮而不知變者也是以言其得失則凶語其道則終无功矣易説漢上朱氏曰上六處震動之極以動為恒不能乆其徳故震奮妄動如風振林木不安乎上而求有功上六九三正應也妄動則下不應誰與之成功上三相易兊為毁折大无功也大无功則凶成得臣諸葛恪是已易傳新安朱氏曰振者動之速也上六居恒之極處震之終恒極則不常震終則過動又隂柔不能固守居上非其所安故有振恒之象而其占則凶也本義東萊吕氏曰膠固純一故謂之常振動躁擾非常也上六以隂柔居上不能守常而振動是以不常為常所以凶也大抵立天下之功必悠乆膠固然後能成若振動躁擾暫作易輟安能成功故曰大无功也易説合訂刪補大易集義粹言卷三十六
