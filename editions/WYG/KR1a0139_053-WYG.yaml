body:
  text: 合訂刪補大易集義粹言卷五十一頭等侍衛納喇性德編坎下兌上伊川先生曰困序卦升而不已必困故受之以困升者自下而上自下升上以力進也不已必困矣故升之後受之以困也困者憊乏之義為卦兌上而坎下水居澤上則澤中有水也乃在澤下枯涸无水之象為困乏之義又兌以隂在上坎以陽居下與上六在二陽之上而九二陷於二隂之中皆隂柔揜於陽剛所以為困也君子為小人所揜蔽窮困之時也易傳困是處困之道道无時不可行游定夫録横渠先生曰困而不知變民斯為下矣不待困而喻賢者之常也困之進人也為德辨為感速孟子謂人有德慧術知常存乎疢疾以此自古困於内无如舜困於外无如孔子以孔子之聖而下學於困則其䝉難正志聖德日躋必有人所不及知而已獨知之者故曰莫我知也夫知我者其天乎語解困亨貞大人吉无咎有言不信伊川先生曰如卦之才則困而能亨且得貞正乃大人處困之道也故能吉而无咎大人處困不唯其道自吉樂天安命一作知命一作安義乃不失其吉也况隨時善處復有裕乎有言不信當困而言人誰信之易傳白雲郭氏曰天下之時不同而所以處之之道不能一也困為難處之時唯君子反諸其身以脩德不繫於困否故不失其亨也大人之貞寛裕有容如天地然何物足以困之是以吉而无咎以見小人匪正不能處困而凶咎必至也處困尚德而不尚言雖君子之言人亦未之信况衆人乎易説新安朱氏曰困者窮而不能自振之義坎剛為兌柔所揜九二為二隂所揜四五為上六所揜所以為困坎險兌說處險而說是身雖困而道則亨也二五剛中又有大人之象占者處困能亨則得其正矣非大人其孰能之故曰貞又曰大人者明不正之小人不能當也有言不信又戒以當務晦黙不可尚口益取窮困本義􅂏曰困剛揜也險以説困而不失其所亨其唯君子乎貞大人吉以剛中也有言不信尚口乃窮也伊川先生曰卦所以為困以剛為柔所揜蔽也陷於下而揜於上所以困也陷亦揜也剛陽君子而為隂柔小人所揜蔽君子之道困窒之時也險以説以卦才言處困之道也下險而上説為處險而能説雖在困窮艱險一作險難之中樂天安義自得其説樂也時雖困也處不失義則其道自亨困而不失其所亨也能如是者其唯君子乎若時當困而反亨身雖亨乃其道之困也君子大人通稱困而能貞大人所以吉也葢其以剛中之道也五與二是也非剛中則遇困而失其正矣當困而言人所不信欲以口免困乃所以致窮也以説處困故有尚口之戒並易傳藍田吕氏曰困窮而无可為也剛居中而為柔所揜剛不得伸故困險以説困而不失其所亨者顔子居陋巷不改其樂者也貞大人吉以剛中者孔子曰莫我知也知我者其天乎者也有言不信孔子欲无言者也白雲郭氏曰困之所以成卦以剛揜於隂不能自伸故為困也隂陷而能説不失其所亨之道人之難能也故唯君子能之君子亦大人也言其成德曰君子語其德之大則曰大人大人以貞而吉者有剛中之德也尚口乃窮者君子有德則以德濟身尚德也小人无德則以利口辯辭濟其身故云尚口也尚德則不失其所亨尚口則終窮矣孔子曰君子固窮小人窮斯濫矣君子小人唯困乃見故繫辭曰困德之辨也易説漢上朱氏曰二四五之剛為三上所揜又陷焉陷亦揜也陽剛君子隂柔小人陽剛為隂柔揜蔽而不伸君子窮困窒塞之時故曰困剛揜也以此一卦之爻言困也困自否來二之上坎險兑説也上九之二處乎險難之中樂天安義困而自説不失其所亨者心亨也亨通也困而亨則不窮矣古人塵視富貴夢視死生唯不失其所亨也唯君子能之夫子曰人不知而不慍不亦君子乎故曰險以説困而不失其所亨其唯君子乎此合二體兼九二言處困之才也大人君子通稱對而言之君子通乎大賢小賢而大人德配天地者也在困處之裕然不失其正吉且无咎非大人不能以剛中也剛或不足則困以智免而失其正者有之剛而不中則正或致凶於道皆有咎剛中而正文王周公孔子是已故曰貞大人吉以剛中也此以九五言大人處困之才也剛見揜者天也非人之所能為无怨尤可也已困而言人誰信之若崇尚口才以言説處困適所以増窮矣上六窮困兌為口有言也下无應有言不信也此聖人因上六以戒不善處困者也范諤昌曰􅂏文貞大人吉下脱无咎二字理或然也在卦氣為霜降故太𤣥準之以窮易傳新安朱氏曰困剛揜也以卦體釋卦名險以説以卦德卦體釋卦辭本義不失其所亨這句自是説得好困卦難理㑹不可曉易中有數卦如此繫辭云卦有小大辭有險易辭也者各指其所之困是个極不好底卦所以卦辭也做得如此難曉如蹇卦剥卦否卦睽卦皆是不好卦剥則分明是剥所以分曉只是困卦是个進退不得窮極底卦所以難曉其大意亦可見並語録象曰澤无水困君子以致命遂志伊川先生曰澤无水困乏之象也君子當困窮之時既盡其防慮之道而不得免則命也當推致其命以遂其志知命之當然也則窮塞禍患不以動其心行吾義而已茍不知命則恐懼於險難隕穫於窮戹所守亡矣安能遂其為善之志乎易傳横渠先生曰升而不已必困故受之以困困於險下柔不自振非窮而能亨致命遂志者也易説藍田吕氏曰澤以潤物為功今无水者功將安施困之象也推其窮之所由致而不可得此之謂致命致窮盡也知其无可奈何而安之此之謂遂志遂不撓也命雖不遂其志不撓也白雲郭氏曰澤水一物也語其為功利之名曰澤論其為功利之物則曰水也故澤必資水而利萬物澤无水則困而无以資物矣君子得位而後能澤加於民无位則困而窮處矣君子知命者也當其困也豈復怨天尤人哉一歸之天命而已故孔子曰道之將行也與命也道之將廢也與命也而孟子亦曰行止非人所能為也吾之不遇魯侯天也則孔孟之困皆致之天命而无怨也遂志者君子所志者道道不以困窮而變窮亦是道也通亦是道也故孔子曰用之則行舍之則藏遂志也孟子曰窮則獨善其身達則兼善天下亦遂志也遂志是以不失其所亨也易説漢上朱氏曰澤所以説萬物者水也澤无水則澤道困矣然水在澤下未嘗不通也君子處困窒之時澤不及物矣推致其所以然者命也巽為命命者消息盈虛之理君子聽命固窮自遂其剛大之志夫居下而无憂者則思不逺處身而常逸者則志不廣君子憤激自厲增益其所不能无若困之為速也易傳曰雖阨窮而不動其心行吾義而已所以遂其為善之志也易傳新安朱氏曰水下漏則澤上枯故曰澤无水致命猶言授命言持以與人而不之有也能如是則雖困而亨矣本義問澤无水困君子以致命遂志曰澤无水困君子道窮之時但當委致其命以遂吾之志而已致命猶送這命與他不復為我之有雖委致其命而志則自遂无囘屈伊川解作推致其命雖説得通然論語中致命字都是委致之致事君能致其身與士見危授命皆是此意授亦致字之意言將這命授與之也致命是送命與他自家但遂志循義理都不管生死不顧身命猶言置生死於度外並語録東萊吕氏曰君子以致命遂志人多謂困窮不能遂志往往言有其志而无其命此不能致其命者也故分命與志為兩事而其志每為命之所妨是烏知命之極哉惟致其命而後知命然富貴而致命遂志者易窮困而致命遂志者難富貴則所為者成所欲者得命與志偶合而不見其相違人但見其偶合則遂以為眞合豈暇思其所以然哉惟困窮之時所為者不成所欲者不得其志每為命所妨正君子用力進步之地此致命遂志所以獨言於困之象也易説初六臀困于株木入于幽谷三歲不覿象曰入于幽谷幽不明也伊川先生曰六以隂柔處於至卑又居坎險之下在困不能自濟者也必得在上剛明之人為援助則可以濟其困矣初與四為正應九四以陽而居隂為不正失一作夫剛而不中又方困於隂揜是惡能濟人之困猶株木之不能䕃覆於物株木无枝葉之木也四近君之位在它卦不為无助以居困而不庇物故為株木臀所以居也臀困于株木謂无所庇而不得安其居居安則非困也入于幽谷隂柔之人非能安其所遇既不能免於困則益迷暗妄動入于深困幽谷深暗之所也方益入于困无自出之勢故至於三歲不覿終困者也不覿不遇其所亨也幽不明也謂益入昏闇自陷於深困也明則不至於陷矣並易傳横渠先生曰處困者正乃无咎居非得中故幽而不明易説藍田吕氏曰初六以柔居下雖有正應為二所間臀困於株木繫而坐之卑柔不得行也入于幽谷蔽於九二幽隂不得明也三歳一閏天道小變困者必通終𫉬正應未滿三歲不可覿也白雲郭氏曰臀困内自困也困于株木外困於物也處困之初内不能自安外不能有行内外皆困而欲以柔濟之則困益甚矣是以入于幽谷三歲不覿也幽谷不明之所愈不能自安至於三歲之久无所見焉又不若困于株木之有物也既困于株木而處之非其道故有入于幽谷三歲不覿之象雖九四為應方且自困不能庇初故如株木不能庇物也然則處困之道何如唯脩德以致命遂志而已易説漢上朱氏曰四否艮在上體之下為臀巽木兌金傷之為株木困寒露節也與大過枯楊同象大過小雪之氣也四陽居隂不安其居臀困于株木者也初六柔而不正困于坎底妄動求濟於四不知四剛不中不安其居臀困于株木豈能濟人之困哉初既失援迷謬自四反二二又深陷猶入于幽谷也艮為山坎為水水注山谿間為谷坤為㝠晦入于幽谷也入于幽谷窮困益甚无自出之勢故三歲不覿於四乾為歲初覿四歷三爻三歲也私見曰覿見之不正也三離目不正覿也初出不知四之困入不知谷之幽晦而不明乎處困之道也初在坎下不明之象何謂處困之道安靜自守是已易傳又曰困九月霜降氣也故曰株木曰蒺藜蒺藜者秋成也大過十月小雪氣也故曰枯楊生稊枯楊生華姤五月夏至氣也故曰以把包瓜瓜生於四月中氣故也夬三月清明氣也故曰莧陸夬夬莧陸三月四月生也叢説新安朱氏曰臀物之底也困于株木傷而不能安也初六以隂柔處困之底居暗之甚故其象占如此本義問臀困于株木如何先生曰在困之下至困者也株木不可坐臀在株木上其不安可知又問伊川將株木作初之正應不能庇他如何先生曰恐説臀字不去語録九二困于酒食朱紱方來利用享祀征凶无咎象曰困于酒食中有慶也伊川先生曰酒食人所欲而所以施惠也二以剛中之才而處困之時君子安其所遇雖窮戹險難无所動其心不恤其為困也所困者唯困於所欲耳君子之所欲者澤天下之民濟天下之困也二未得遂其欲施其惠故為困于酒食也大人君子懷其道而困於下必得有道之君求而用之然後能施其所藴二以剛中之德困於下上有九五剛中之君道同德合必來相求故云朱紱方來方來方且來也朱紱王者之服蔽膝也以行來為義故以蔽膝言之利用享祀享祀以至誠通神明也在困之時利用至誠如享祀然其德既誠一作成自能感通於上自昔賢哲困於幽逺而德卒升聞道卒為用者唯自守至誠而已征凶无咎方困之時若不至誠安處以俟命往而求之則犯難得凶乃自取也將誰咎乎不度時而征乃不安其所為困所動也失剛中之德自取凶悔何所怨咎諸卦二五以隂陽相應而吉唯小畜與困乃戹於隂故同道相求小畜陽為隂所畜困陽為隂所揜也雖困於所欲未能施惠於人然守其剛中之德必能致亨而有福慶也雖使時未亨通守其中德亦君子之道亨乃有慶也並易傳横渠先生曰困危之際一作世物思所附九二以剛居中正大人之吉上下交説不施聰明美物方至然未可有為故以祭則吉以征則凶征雖或凶於義无咎易説藍田吕氏曰九二九五皆揜於柔而无應然皆剛中以自守困而不失其所亨者也九二以陽居隂困而能謙為衆之所致養故困于酒食為至尊之所下故朱紱方來朱者天子之服赤者諸侯之服也得天人之隂助故利用享人鬼祀天神也居困之時雖有上下幽明之助自守則可不可以有行困而行其窮必凶无所咎也九五以陽居陽困而用壯雖處尊位不為下之所服從迫之以威而未聽故劓刖困于赤紱謂諸侯也剛中守直久必信之故乃徐有説人雖未信天地鑒之故利祭地祇祀天神也白雲郭氏曰􅂏曰困剛揜也謂九二之剛揜於二隂所以為困非止三之揜二也然九二剛中之大人困而不失其所亨者特君臣未遇天禄未食君子困於家食之際无飲食宴樂之奉而已其道不可得而困也朱紱王者之象九五之君方將以同德而來求則困于酒食非所患矣利用享祀者天下之至難致者君之求至難通者鬼神之德而九二剛中之德至誠感物故无或不通以之待君之求則朱紱方來以之交鬼神則利用享祀是其至誠之道无所感而不通也茍不知是道而欲妄進以求用則先自失其所亨凶之道也將誰咎乎中有慶者大人以道自任豈以口腹酒食為困哉葢酒食以見君臣相遇交際之道不得乎此雖如伊尹樂堯舜之道不過老死萃野而已終无享天心革夏正之事也是知酒食之間有天下之大慶存焉故需卦於九五言需于酒食而詩人於鹿鳴言燕樂葢一義也易説漢上朱氏曰五動成震為稼二坎水往之為酒兌為口食也五不動二未可往困于酒食也酒食者人之所欲以施惠也朱紱亦謂九五也巽為股膝以上也乾為大赤坤為黄赤黃為朱乾為衣蔽乎膝上朱紱也九二剛中雖困于酒食而无所動其心則九五中正同德之君方來而相求共濟天下之困故曰朱紱方來九五來然後誠意通於上下故利用享祀上六宗廟五動二往震為長子艮為門闕有升自門闕長子奉宗廟之象享獻也祀者祭上下之通稱兼下言也若二動求五雖以正行亦凶凶自取之无所咎也故曰征凶无咎困于酒食者唯无所動其心則中中則進退遲速審而後動往有慶矣慶者朱紱方來得其所欲之謂也陽為慶征凶戒之也有慶勉之也易傳曰諸卦二五以隂陽相應而吉唯小畜與困乃厄於隂故同道相求小畜陽為隂所畜困陽為隂所揜也隂陽相應者自然相應也如夫婦骨肉分定也五與二皆陽爻以剛中之德同而相應求而後合如君臣朋友義合也易傳新安朱氏曰困于酒食厭飫苦惱之意酒食人之所欲然醉飽過宜則是反為所困矣朱紱方來上應之也九二有剛中之德以處困時雖无凶害而反困於得其所欲之多故其象如此而其占利以享祀若征行則非其時故凶而於義為无咎也本義朱紱赤紱若如伊川説使書傳中説臣下皆是赤紱則可詩中却有朱芾斯皇一句是說方叔於理又似不通某之精力只推得到這裏祭祀享祀想只説个祭祀无那自家活人却享它人祭之說問困于酒食本義作饜飫於所欲是如何先生曰此是困於好底事在困之時有困於好事者有困於不好事者此爻是好爻當困時則為困於好事如感時花濺淚恨别鳥驚心花鳥本是好娛戲底物這時却𤼵人不好底意思是因好物而困也酒食饜飫亦如此又問象云中有慶也是如何先生曰他下面有許多好事在問困之二五皆利用祭祀是如何先生曰他得中正又似取无應而心專一底意思並語録六三困于石據于蒺藜入于其宫不見其妻凶象曰據于蒺藜乘剛也入于其宫不見其妻不祥也伊川先生曰六三以隂柔不中正之質處險極而用剛居陽用剛也不善處困之甚者也石堅重難勝之物蒺藜刺一无刺字不可據之物三以剛險而上進則二陽在上力不能勝堅不可犯益自困耳困于石也以不善之德居九二剛中之上其不安猶藉刺據于蒺藜也進退既皆益困欲安其所益不能矣一作也宫其居所安也妻所安之主也知進退之不可而欲安其居則失其所安矣進退與處皆不可一有則字唯死而已其凶可知繫辭曰非所困而困焉名必辱非所據而據焉身必危既辱且危死期將至妻其可得見邪二陽不可犯也而犯之以取困是非所困而困也名辱其事惡也三在二上固為據之然茍能謙柔以下之則无害矣乃用剛險以乘之則不安而取困如據蒺藜也如是死期將至所安之主可得而一无而字見乎據于蒺藜謂乘九二之剛不安猶藉刺也不祥者不善之徵失其所安者不善之効故云不見其妻不祥也並易傳藍田吕氏曰六三以隂居陽不安於困處二剛之間求耦於非其耦四堅拒而不納二若芒刺而不可據焉進退失圖卒不得其耦妄動以取禍也故曰困于石據于蒺藜入于其宫不見其妻凶白雲郭氏曰石之為物堅不可犯知不可犯而不犯則无困焉知不可犯而犯之是以遇困也六三之柔不能以柔道自安反欲用剛上于二陽困于石也下乘九二之剛據于蒺藜也宫者自安之所也妻者所安之主也以進則非所困而困以退則非所據而據上下失自安之道雖有宫有妻將皆失之矣是以凶也象曰不祥也者其不能自安則不善之幾也至於不見其妻則不善之明應也故知處困而不自安終必至於名辱身危死期將至而後不祥之効終焉至於不能保妻子則他人可知矣易説漢上朱氏曰六三險而不正不善處困者也艮坎為石謂三石之堅不可以處者也巽交坎離為蒺藜中堅外鋭蒺藜之象謂乘三也蒺藜傷人不可以據者也三非其位非所困而困不度德也乘三之剛非所據而據不量力也不度德故名辱不量力故身危名辱身危死期將至故入于其宫不見其妻艮坤為宫坎為夫離為妻為目為見三困非其位而乘二剛凌人者也凌人者人亦凌之故二往乘三兩爻相易二入于其宫坎離象毁不見其妻矣又曰凶者不見其妻乃死亡將至之期所謂亡之兆非吉祥之兆坤為死故曰不祥也易傳新安朱氏曰隂柔而不中正故有此象而其占則凶石指四蒺藜指二宫謂三而妻則六也其義則繫辭備矣本義六三陽之隂上六隂之隂故將六三言之則上六為妻語録九四來徐徐困于金車吝有終象曰來徐徐志在下也雖不當位有與也伊川先生曰唯力不足故困亨困之道必有援助當困之時上下相求理當然也四與初為正應然四以不中正處困其才不足以濟人之困初比二二有剛中之才足以拯困則宜為初所從矣金剛也車載物者也二以剛在下載已故謂之金車四欲從初而阻於二故其來遲疑而徐徐是困于金車也已之所應疑其少已而之它將從之則猶豫不敢遽前豈不可羞吝乎有終者事之所歸者正也初四正應終必相從也寒士之妻弱國之臣各安其正而已茍擇勢而從則惡之大者不容於世矣二與四皆以陽居隂而二以剛中之才所以能濟困也居隂者尚柔也得中者不失剛柔之宜也四應於一无於字初而隔於二志在下求故徐徐而來雖居不當位為未善然其正應相與故有終也並易傳横渠先生曰心有偏係吝也以陽履柔故有終易説藍田吕氏曰九四以陽居隂知困而貞自守有所待者也志在於初而不與二爭其行不速故來徐徐四以陽剛為九五所乘故曰金車困於貴者所乘而失其正應吝道也雖不當位履謙自守物必與之故有終白雲郭氏曰當困之時以隂求陽者无它焉求濟而已初六之困甚矣而九四正應不能以濟者以九二剛中在下力足以相濟而初六近而可從也故有金車之象焉金有堅剛之象車有積中之德謂九二也來徐徐者初六既從二而於九四之應則徐徐其來也當困之時九二得濟難之權四不當位非其敵也故不能濟初之急而致徐徐其來也不能濟初之急是困於九二之權也困於九二而未能應初吝也雖吝而有終者正道終復而應也故初六言三歲以見雖乆而有期非若終凶者也與九四有終之義相符象言志在下者彼雖徐徐其來而四則未有忘初之志也有與者雖不當濟困之事以初六正應而有當與之道也易説漢上朱氏曰九四尚柔九二剛得中柔不足以濟困剛得中乃可濟初六近比九二逺於九四四與初應而九二礙之既疑其險矣又疑初捨已而從二故來徐徐徐徐者疑懼之辭巽為不果故志在下也乾變為金坤為輿坎為輪二剛而能載故曰困于金車四履不當位欲去則志初欲行則懼二處困有應而不能相濟吝道也然以陽居隂能説而巽明於處困不與二爭雖不當位終有與之者以困之時上下急於相求故也是以吝而有終易傳新安朱氏曰初六九四之正應九四處位不當不能濟物而初六方困於下又為九二所隔故其象如此然邪不勝正故其占雖為可吝而必有終也金車為九二象未詳疑坎有輪象也本義九五劓刖困于赤紱乃徐有説利用祭祀象曰劓刖志未得也乃徐有説以中直也利用祭祀受福也伊川先生曰截鼻曰劓傷於上也去足為刖傷於下也上下皆揜於隂為其傷害劓刖之象也五君位也人君之困由上下无與也赤紱臣下之服取行來之義故以紱言人君之困以天下不來也天下皆來則非困也五雖在困而有剛中之德下有九二剛中之賢道同德合徐必相應而來共濟天下之困是始困而徐有喜説也利用祭祀祭祀之事必致其誠敬而後受福人君在困時宜念天下之困求天下之賢若祭祀然致其誠敬一作至誠則能致天下之賢濟天下之困矣五與二同德而云上下无與何也曰隂陽相應者自然相應也如夫婦骨肉分定也五與二皆陽爻以剛中之德同而相應相求而後合者一无者字也如君臣朋友義合也方其始困安有上下之與有與則非困故徐合而後有一无有字説也二云享祀五云祭祀大意則宜用至誠乃受福也祭與祀享泛言之則可通分而言之祭天神祀地示享人鬼五君位言祭二在下言享各以其所當用也始為隂揜无上下之與方困未得志之時也徐而有説以中直之道得在下之賢共濟於困也不曰中正與二合者云直乃宜也直比正義差緩盡其誠意如祭祀然以求天下之賢則能一无能字亨天下之困而享受其福慶也並易傳横渠先生曰以陽居陽處困以剛威怒以求物之來是反為赤紱所困者也與九二之義反矣茍能徐以俟之乃心有説故曰乃徐有説物既自至以事鬼神然後福可致焉處困用中可以不失其守而已故言利用祭祀然非有為之時也易説白雲郭氏曰困之象上下皆揜於隂在常人處之受其困而已在有為之君必思所以去之是以有用刑之象劓刖者上下皆刑之也刑小人而去之所以進君子故九五劓刖以困于赤紱故也赤紱君子之服也病君子之不進故刑及小人也君子進則善者勸而不仁者逺何困之有且君子難進易退不求而致之不可得也故九五患赤紱之不進而九二有朱紱方來之辭以見九五之求之也九二中直之臣至而後有説故曰乃徐有説必曰紱者紱蔽膝也與黄裳之義同取其謙下之道也朱紱君也赤紱臣也九二以謙而不敢自進九五以謙而下求之故皆曰紱也君臣相與至誠而已其道雖鬼神可交况人乎故以九二事君之道用於享祀則利用享祀矣以九五下賢之道用於祭祀則利用祭祀矣此亦見其君臣同於至誠之德用於人用於神皆可也如是則天下其有不治者哉志未得者非樂於用刑也君子未進人君志未得之初不得已而用之也受福者與孔子祭則受福之義同葢是道也用於君子則必得賢用於鬼神則必受福人神雖不同其交感之道則一而已易説漢上朱氏曰九四君側強臣之象二五同德相求而四間之四動艮為鼻震為足四不動兌金刑之劓刖也劓則醜刖則不行五為四傷亨困之志未得行於二也故曰劓刖志未得也二坎為赤乾為衣往應五巽蔽膝之象赤紱諸臣之紱也二躊躇不往以征為凶五以无助而困困于赤紱也巽為不果徐也兌為說九五剛中而正動以直行中則思慮精審直則其行不撓如是則君臣相説之志乆而必亨九四豈能間之始也不果今則來説故曰乃徐有説以中直也上六宗廟五王假有廟祭祀者人君之所以徧及百神自上格下二五相易之象人君得九二之賢利用誠意感格之如祭祀然上下並受其福矣亨困之道莫利於用賢尚何困于赤紱哉艮為手下援九二受福也陽為福故曰利用祭祀受福也易傳新安朱氏曰劓刖者傷於上下下既傷則赤紱无所用而反為困矣九五當困之時上為隂揜下則乘剛故有此象然剛中而説體故能遲久而有説也占具象中又利用祭祀久當𫉬福本義上六困于葛藟于臲卼曰動悔有悔征吉象曰困于葛藟未當也動悔有悔吉行也伊川先生曰物極則反事極則變困既極矣理當變矣葛藟纒束之物臲卼危動之狀六處困之極為困所纒束而居最高危之地困于葛藟與臲卼也動悔動輒有悔无所不困也有悔咎前之失也曰自謂也若能曰如是動皆得悔當變前之所為有悔也能悔則往而得吉也困極而征則出於困矣故吉三以隂在下卦之上而凶上居一卦之上而无凶何也曰三居剛而處險困而用剛險故凶上以柔居說惟為困極耳困極則有變困之道也困與屯之上皆以无應居卦終屯則泣血漣如困則有悔征吉屯險極而困説體故也以説順進可以離乎困也為困所􅅶而不能變未得其道也是處之未當也知動則得悔遂有悔而去之可出於困是其行而吉也並易傳横渠先生曰處困之極重剛在下不得其肆居非所安舉則招悔取舍皆咎故行然後吉一云動悔有悔猶云動悔之悔也易説藍田吕氏曰上六以隂柔居困之極乘剛无應所處未當欲去則繳繞而莫之説欲居則臲卼而不得安故曰困于葛藟于臲卼曰自謂也當是時也自謂動必有悔雖有悔也不可茍安而不行困極必通行則吉矣故曰動悔有悔征吉白雲郭氏曰上六以柔居困之極不能脱困有葛藟􅅶糾之象復欲安而居之又甚危不可安也是處困之不能退不能遂者故曰困于葛藟于臲卼也曰動悔有悔者畏懦之過徒知悔吝生乎動不敢動乎悔中如是則必有悔至不知當困之極征而脱困則吉是未可與權之士也未當者處困之道未當也吉行者謂悔雖生乎動而困之上六吉在於行時有不得同也此爻葢聖人明處困失時之戒易説漢上朱氏曰上六困極而當動者也巽為草葛藟藤蔓葉艾白子赤六三乾巽之象上六困極求助六三柔而不中正以巽乎上為説不能相濟又􅅶繞之故困于葛藟言求六三為未當也上六動則不安其位不動則困於六三困于葛藟又困于臲卼之地也曰𤼵聲兌口象上六自謀曰動則失正失正則悔故安於困然不動乃有悔不知征則吉征以正行也以正而行吉且無悔矣是行而後吉也故曰吉行也范睢困於鄭安平虞卿困於魏齊猶能解相印以全其軀況體易君子乎易傳新安朱氏曰以隂柔處困極故有困于葛藟于臲卼曰動悔之象然物窮則變故其占曰若能有悔則可以征而吉矣本義合訂刪補大易集義粹言卷五十一
