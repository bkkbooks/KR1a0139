body:
  text: 合訂刪補大易集義粹言卷四頭等侍衛納喇性德編潛龍勿用下也見龍在田時舍也終日乾乾行事也或躍在淵自試也飛龍在天上治也亢龍有悔窮之災也乾元用九天下治也伊川先生曰此以下言乾之時勿用以在下未可用也時舍隨時而止也舍去聲行事進德修業也自試隨時自用也上治得位而行上之治也窮之災窮極而災至也天下治用九之道天與聖人同得其用則天下治也並易傳横渠先生曰九二居大中安止之地至于三四則不得所安也三四與二皆言所遇之時二之時平和見龍在田者則是可止之處也時舍時止也以時之和平故利見不至於有害三四則皆時為難危又重剛又不中至九五則是聖人極致處不論時也易説大而得易簡之理當成位乎天地之中時舍而不受命乾九二有焉及夫化而聖矣造而位天德矣則富貴不足以言之九五成性則躋聖而位天德九二正位於内卦之中有君德矣而非上治也九五言上治者言乎天之德聖人之性故捨曰君而謂之天見大人德與位之皆造也並正䝉白雲郭氏曰下也曰下言微也如有鰥在下也前言位之人也後言爻之時也時舍時可進故隨時而舍明有正中君德亦必待時行事興事造業大有為也自試君子謹失時之戒故或自試上治以天德位天位治所從出窮之災窮不知變故災至天下治知乾元之義而用天德則治矣並易説漢上朱氏曰易傳曰言乾之時也潛龍勿用時在下也見龍在田時可止也舍止也井初六為九五舍之與此象異二陽方進而未泰故可舍止音茇舍之舍九二變遯艮有止意終日乾乾進而行事之時非乾乾不能堪其事巽行事也或躍在淵上下進退无常自試時也飛龍在天在上而致治時也亢龍有悔陽窮於九隂窮於六位窮於上窮則變變則通通則乆上九窮不知變窮之災也天災曰災數極時也𤣥有三統九㑹陽以九終以極數也然天人有交勝之理故有悔天德不可為首用九不見其首則不過不過中也六位得中天下治也易傳新安朱氏曰時舍言未為時用也自試未遽有為姑試其可上治居上以治下天下治言乾元用九見與它卦不同君道剛而能柔天下无不治矣此第三節再申前意本義東萊吕氏曰乾元用九天下治也乾天也元聖人也天无時而不用九而天下有治不治者由居其下者无用九之聖人耳聖人與天同德則天下治矣易説又曰乾元用九天下治也易傳云天與聖人同得其用則天下治也葢天之用未嘗一日而息天下本合常治然一治一亂者只為人與天不相似不能得天之用所以不治故必待天與聖人同得其用然後天下治也紀聞潛龍勿用陽氣潛藏見龍在田天下文明終日乾乾與時偕行或躍在淵乾道乃革飛龍在天乃位乎天德亢龍有悔與時偕極乾元用九乃見天則伊川先生曰此以下言乾之義方陽微潛藏之時君子亦當晦隱未可用也天下文明龍德見於地上則天下見其文明之化也一作而化之與時偕行隨時而進也乾道乃革離下位而升上位上下革矣乃位乎天德正位乎上位當天德一作德矣與時偕極時既極則處時者亦極矣乃見天則用九之道天之則也天之法則謂天道也並易傳横渠先生曰乾二五皆正中之德五則曰大人造也又曰聖人作而萬物覩大人而升聖乃位乎天德也不言帝王而言天德位不足道也所性不存焉潛龍自是聖人之德備具但未發見見龍成性至飛龍則位天德九五言乃位乎天德葢是成聖實到也不言首出所性不存焉其實天地也不曰天地而曰天德言德則德位皆造故曰大人造也至此乃是大人之事畢矣五乾之極盛處故以此當聖人之成德言乃位即是實到為己有也若由思慮勉勉而至者止可言知不可言位也乃位則實在其所矣大抵語勉勉者則是大人之分也勉勉則猶或有退少不勉勉斯退矣所以須學問進德修業欲成性也成性則縱心皆天也所以成性則謂之聖者如夷之清惠之和不必勉勉彼一節而成性若聖人則於大以成性並易説廣平游氏曰揲蓍之法遇九六之數則變乾以純陽故陽極而亢坤以純隂故隂極而戰如其不變則亢而災戰而傷不能免也乾以用九則陽知險而變故无首而吉坤以用六則隂知阻而變故永貞而利乾坤純乎隂陽者也故有用九用六與他卦不同將來者進成功者退天之則也故乾元用九乃見天則易説龜山楊氏曰樂則行之憂則違之孔顔之所同天下文明則孔子而已矣毋固則與時偕行並語解兼山郭氏曰剛健中正純粹精乾之九五七者咸在故為一也為物不貳則其生物不測是以變動不居周流六虛莫有留礙者矣故曰飛龍在天乃位乎天德易説白雲郭氏曰陽氣潛藏則閉塞未亨之時天下文明君子出則道大明與時偕行時可行健君子應時行之行謂用也乾道乃革潛龍之義至四而革矣乃位乎天德有天德而得天位也與時偕極乾道極矣時不復矣而不知止故與偕極乃見天則惟天為大惟堯則之觀用九之義見天之可則也並易説漢上朱氏曰易傳曰言乾之義也乾伏坤見陽氣潛藏故曰潛龍勿用坤文離明德施之普光于天下人文明也故曰見龍在田三陽方行亦與之行故終日乾乾行不息也周公繼日待旦之時乎四人位五天位離人之天水火相息乾道革矣故曰或躍在淵天不可階而升也不曰位乎君位而曰位乎天德者成性躋聖也張載曰受命首出則所性不存焉故曰飛龍在天亢龍有悔上極也消息盈虛與時偕行則无悔偕極則窮故有悔也六九相變天地之道不可違之則也乾元始也於其始也用九其終不過矣以其不可過也故曰天則見天則則知中道乃固然之理非人能為之也易傳新安朱氏曰天下文明雖不在上位然天下已被其化與時偕行時當然也乾道乃革離下而上變革之時天德即天位也葢唯有是德乃宜居是位故以名之乃見天則剛而能柔天之法也此第四節又申前意本義問程易以文言中三段論潛龍以下六爻分作乾之用乾之時乾之義看來恐可移易説先生曰凡説經若移易得便不是本意看此三段只是聖人反復贊詠乾之德耳如潛龍勿用陽在下也便是第二段陽氣潛藏便是上段龍德而隱者也聖人反復發明以示人耳語録東萊吕氏曰象與文言論上九一爻曰亢龍有悔盈不可乆也又曰動而有悔又曰窮之災也又曰知進而不知退皆言亢之不可極至於所謂與時偕極葢諸處已説盛滿之當抑故此章特發此義謂時方盛滿道亦與之盛滿何適而非道也或躍在淵乾道乃革四去五為近並易説又曰程傳言正位乎上位當天德位稍偏則於天德不相當終日乾乾與時偕行在天之時寒往則暑來晝往則夜來初未嘗息至於人則朝氣鋭暮氣惰不能終日乾乾者葢梏於血氣不能與天地之氣相通故也若與天地之氣相通則與時偕行矣或躍在淵乾道乃革自凡入聖全在一躍四離下位而升上位如人自凡入聖也非一躍豈能變革乎乾元用九乃見天則用九之道在乎无首天敘有典天秩有禮本未嘗為首因其元有父子故有父子之典因其元有吉凶故有吉凶之禮本非天為首而創立之也此所謂天則紀聞又曰乾元用九乃見天則天則政在无首處己丑課程乾元者始而亨者也利貞者性情也乾始能以美利利天下不言所利大矣哉康節先生曰凡言大者无得而過之也亦未始以大為自得故能成其大豈不謂至偉者歟觀物篇明道先生曰性情猶言資質體段劉絢師訓伊川先生曰反復詳説以盡其義既始則必亨不亨則息矣乾之性情也既始而亨非利貞其能不息乎乾始之道能使庶類生成天下䝉其美利而不言所利者葢無所不利非可指名也故贊其利之大曰大矣哉並易傳元亨者只是始而亨者也此通人物而言通元本作詠字謂始初發生大槩一例亨通也及到利貞便是各正性命後屬人而言也利貞者分在性與情只性為本情是性之動處情又幾時惡故者以利為本只是順利處為性若情則須是正也吕與叔東見録利貞者性情也言利貞便是乾之性情因問利與以利為本之利同否先生曰凡字只有一箇用有不同只看如何用凡順理无害處便是利君子未嘗不欲利然孟子言何必曰利者葢只以利為心則有害如上下交征利而國危便是有害未有仁而遺其親未有義而後其君不遺其親不後其君便是利仁義未嘗不利楊遵道録横渠先生曰利貞者性情也以利解性貞解情利流通之義貞者實也利快利也貞實也利性也貞情也情儘在氣之外其發見莫非性之自然快利盡性所以神也情則是實事喜怒哀樂之謂也欲喜者如此喜之欲怒者如此怒之欲哀欲樂者如此哀之樂之莫非性中發出實事也易説白雲郭氏曰元亨者乾之始也利貞者乾之性情也乾之始大是也乾之性情健是也惟有大故元亨而健故利貞也利天下者始於乾元故彖曰大哉乾元萬物資始可言所利則其利小矣不言所利无所不利也並易説大哉乾乎剛健中正純粹精也六爻發揮旁通情也時乘六龍以御天也雲行雨施天下平也伊川先生曰大哉贊乾道之大也以剛健中正純粹六者形容乾道精謂六者之精極以六爻發揮旁通盡其情義乘六爻之時以當天運則天之功用著矣故見一作曰雲行雨施隂陽溥暢天下和平之道也易傳横渠先生曰剛健中正中爻之德剛健中正純粹精也主以中正為精也六爻發揮言時各異旁通情也情猶言用也並易説兼山郭氏曰乾之為乾剛健中正純粹精是也考乾之象則六爻不齊能盡乾之義就其中正而純全焉獨見乎九五所以取象於飛龍也必也考論其精微則七者咸在也葢陽德為剛乾德為健以位則中以才則正上下无異體故謂之純内外无偏係故謂之粹它卦莫能與之同故謂之精易説白雲郭氏曰剛健中正純粹精乾之德也六爻發揮旁通情乾之業也時乘六龍以御天乾之用也雲行雨施天下平乾之功也有是德則有是業有是用則有是功也然精者德之精情者卦之情乘六龍用九也天下平致美利也乾之大如此聖人之法乾也剛健中正以崇德發揮旁通以廣業時乘六龍崇德以致用也雲行雨施廣業之功成也易説漢上朱氏曰元者乾之始剛反而動亨在其中矣利貞者乾之性情也性情猶言資質也動而生物利也不有其功常乆而不已貞也貞正也始則亨亨則利利則貞在其中諸卦言利者指事而言之利於此或不利於彼乾始萬物資之天下之大无不䝉其利者不言所利則其利大矣故謂之元元又訓大故也夫子欲言乾道之大其辭有不能盡者故曰大哉乾乎乾總言之則剛不撓也健不息也健者積剛而成也悉數之則中正而不倚也純全而粹美也一三五正也二五中也中而正者其九五乎八卦皆紀也純而粹者其重乾乎故太𤣥準之以睟其首辭曰陽氣袀晬清明道至於純粹无以復加矣而六者皆原於一一者何乾始也天地之一本萬物之一源精之又精剛健中正純粹自此而出故曰剛健中正純粹精也易傳曰精謂六者之精極也以一言該之曰正正者乾之性也六爻發越揮散旁通於諸卦被於三百八十四爻无往而不利者乾之情也情變動也性不變者也時乘六龍者以御天而行也雲行雨施者天下平均也二者體元亨也元亨則利貞在其中矣葢雲行雨施品物流形則萬物各正其性命矣鄭康成本作情性易傳又曰乾為美又為嘉嘉美之至也乾坤合德乃有是象叢説新安朱氏曰乾元始則必亨理勢然也利貞收斂歸藏乃見性情之實乾始始者元而亨也利天下者利也不言所利者貞也或曰坤利牝馬則言所利矣剛以體言健兼用言中者其行无過不及正者其立不偏四者乾之德也純者不雜於隂柔粹者不雜於邪惡葢剛健中正之至極而精者又純粹之至極也或疑乾剛无柔不得言中正者不然也天地之間本一氣之流行而有動靜耳以其流行之統體而言則但謂之乾而无所不包矣以其動靜分之然後有隂陽剛柔之别也旁通猶言曲盡時乘言聖人乘六龍以御天則如天之雲行雨施而天下平也此第五節復申首章之意本義乾元者始而亨一段元亨是生出去利貞是收斂來方見性情所以周子言元亨誠之通利貞誠之復利貞者性情也是乾元之性情始而亨時是乾之發作處共是一箇性情到那利貞處一箇有一箇性情百榖草木皆有箇性情了元亨方是它開花結子時到這利貞時方見得它底性情就這上看乾之性情便見得這是利貞誠之復處問一陽動於下乃天地生物之心如何利貞處乃為乾之性情先生曰元亨者發見流行之處利貞乃其本體無所作用之實性情猶言情狀於其收斂无所作用方見得它情狀眞實問太極圖中言聖人定之以中正仁義而主靜何也先生曰中正仁義分屬動靜而聖人則主於靜葢正所以能中義所以能仁克己復禮義也義故能仁易言利貞者性情也元亨是發用處必至於利貞乃見乾之實體萬物到秋冬收斂成實方見得他本質故曰性情此亦主靜之説也問利貞者性情也先生云是對元亨言之性情是説本體不言所利明道説云不有其功常乆而不已者乾也此語説得好問乾不言所利程易謂无所不利故不言利如何曰是也乾則无所不利故但説利貞坤只利牝馬之貞則有利不利矣大哉乾乎陽氣方流行固已包了全體隂便在這裏了所以説剛健中正然不可道這裏卻夾雜些隂柔所以卻説純粹精又曰剛健中正純粹精也觀其文勢只是言此四者又純粹而精耳程易作六德解未安問乾剛健中正或謂乾剛无柔不得中正先生常言天地之間本一氣之流行而有動靜耳以其流行之統體而言則但謂之乾而无所不包以動靜分之然後有隂陽剛柔之别所謂流行之統體指乾道而言邪先生曰大哉乾元萬物資始乾道變化各正性命只乾便是氣之統體物之所資始物之所正性命豈非无所不包但自其氣之動而言則為陽自其氣之靜而言則為隂所以陽常兼隂隂不得兼陽陽大隂小隂必附陽皆此意也剛健中正為其嫌於不中正所以説箇中正陽剛自是全體豈得不中正這箇因近日趙善譽者著一件物事説道只乾坤二卦便偏了乾只是剛底一邊坤只是柔底一邊某説與它道聖人做一部易如何卻將兩箇偏底物事放在劈頭如何不討箇渾淪底放在那裏注中便是破它説又曰元亨是大通利貞是收斂情性又曰四端四德逐一言之則各自為界限分而言之則仁義又是一大界限故曰仁人心也義人路也如乾文言既曰四德又曰乾元者始而亨者也利貞者性情也並語録君子以成德為行日可見之行也潛之為言也隱而未見行而未成是以君子弗用也伊川先生曰德之成其事可見者行也德成而後可施於用初方潛隱未見其行未成未成未著也是以君子弗用也易傳横渠先生曰成德為行德成自信則不疑所行日見於外可也君子之道成身成性以為功者也未至於聖皆行未成之地耳顔子之徒隱而未見行而未成故曰吾聞其語矣未見其人也龍德而隱聖修而未成者也非如學者之未成凡言龍喻聖也若顔子可以當之雖伯夷之學猶不可言龍龍即聖人之德顔子則術正也並易説以能問不能以多問寡私淑艾以教人隱而未見之仁也語解白雲郭氏曰隱而未見時之未至也行而未成德未大成也是以確乎不可拔也成德者時乘之龍德也言之信行之謹善世不伐德博而化皆可見也初之潛未足以與此易説漢上朱氏曰君子積善成德以其成德行之為行日可見於外而不可掩者行也九二是也隱之為言隱伏而未見於世行而其德未成是以弗用張載曰未至於聖皆行而未成之地易傳新安朱氏曰成德已成之德也初九固成德但其行未可見耳本義問行而未成如何曰只是事業未就又問乾六爻皆聖人事安得有未成伊川云未成是未著莫是如此否曰雖是聖人畢竟初九行而未成又問此只論事業不論德否曰不消如此費力且如伊尹居有莘之時便是行而未成語録東萊吕氏曰君子以成德為行此漆雕開所以不仕歟己丑課程君子學以聚之問以辯之寛以居之仁以行之易曰見龍在田利見大人君德也伊川先生曰聖人在下雖已顯而未得位則進德修業而已學聚問辯進德也寛居仁行修業也君德已著利見大人而進以行之耳進居其位者舜禹也進行其道者伊傅也易傳廣平游氏曰乾之道不盡於九二故有學問坤之道盛於六二故不習无不利易説閑邪存誠此尊德性也非學以聚之問以辯之則擇善不明矣中庸解兼山郭氏曰九二見龍在田以君德而處臣位在君子方學以聚之問以辯之者也田非不可安安之非所宜也是以利見大人彚以待征學以待發故也易説白雲郭氏曰學聚問辯寛居之者期於仁以行之耳故潛龍勿用知其行而未成也見龍在田知其君德大成而可行也是以利見大人惟仁以行之為九二之事易説漢上朱氏曰初九正其始二益之而説學以聚之也聚者升而上也兌為口問以辯之也二動中虚虚則有容寛以居之也動而以巽行仁以行之也學聚問辯寛居仁行二與五應有君德也是以言行如上云易傳新安朱氏曰葢由四者以成大人之德再言君德以深明九二之為大人也本義學聚問辯聖人説得寛這箇便是上面所謂君德兩處説君德皆如此語録東萊吕氏曰學聚問辯而又曰寛以居之何也葢到此地位正須涵養此理迫則失之矣九二見龍在田德施既普自常情論之豈復更待學問而猶曰學以聚之問以辯之寛以居之仁以行之者葢健而无息之謂乾若以德施既普為足不復學問居行是有息也有息非乾也並紀聞又曰程氏傳聖人在下雖已顯而未得位則進德修業而已學聚問辯進德也寛居仁行修業也聖人兩字當看己丑課程九三重剛而不中上不在天下不在田故乾乾因其時而惕雖危无咎矣伊川先生曰三重剛剛之盛也過剛而居下之上上未至於天而下已離於田危懼之地也因時順處乾乾兢惕以防危故雖危而不至於咎君子順時兢惕所以能泰也易傳横渠先生曰乾三四位過中重剛時不可舍庸言庸行不足以濟之雖大人之盛有所不安外趨變化内正性命故其危其疑艱於見德者時不得舍也正蒙兼山郭氏曰九三上不在天下不在田位則人也故因時而惕進德修業之事也易説白雲郭氏曰在天為君在田為臣皆中正也三乘重剛而過中故為危懼之地易説漢上朱氏曰九三九四以剛乘剛而不中過乎剛也二為田九三居下位之上雖上不在天而下已離田動則危且有咎故乾乾不息因其可危之時而惕則雖危无咎矣易傳新安朱氏曰重剛謂陽爻陽位本義九四重剛而不中上不在天下不在田中不在人故或之或之者疑之也故无咎伊川先生曰四不在天不在田而出人之上矣危地也疑者未決之辭處非可必也或進或退惟所安耳所以无咎也易傳横渠先生曰此以六畫分三才也以下二畫屬地則四逺於地故言中不在人若三則止言不在天在田而已易説兼山郭氏曰九四或躍在淵上不在天下不在田中不在人乾道之革也是以進不安於進退不安於退處不安於處故疑也易説白雲郭氏曰四承重剛多懼之地上不為中正之君下不為同德之臣中非興事造業之任故於進退懼而或之也或之則毋必是以可進則進可退則退故无咎易説漢上朱氏曰四上不在天下不在田或進而之五則中不在人可懼之地也故疑而未決上下進退不必於處是以无咎九三之惕九四之疑可謂能用九矣雖重剛不中何患於過乎易傳新安朱氏曰九四非重剛重字疑衍在人謂三或者隨時而未定也本義夫大人者與天地合其德與日月合其明與四時合其序與鬼神合其吉凶先天而天弗違後天而奉天時天且弗違而況於人乎況於鬼神乎康節先生曰堯之前先天也堯之後後天也後天乃效法耳觀物外篇明道先生曰大人者與天地合其德與日月合其明非在外也至誠可以贊天地之化育則可以與天地參贊者參贊之義先天而天弗違後天而奉天時之謂也並劉絢師訓若不一本則安得先天而天弗違後天而奉天時吕與叔録伊川先生曰大人與天地日月四時鬼神合者合乎道也天地者道也鬼神者造化之迹也聖人先於天而天同之後於天而能順天者合於道而已合於道則人與鬼神豈能違也易傳天且不違況於鬼神乎鬼神言其功用天言其主宰游氏拾遺聖人與天地合德日月合明六尺之軀能有多少技藝人有身須用才聖人忘己更不論才也劉元承手編横渠先生曰浩然无間一作害則天地合德照无偏係則日月合明天地同流則四時合序酬酢不倚則鬼神合吉凶天地合德日月合明然後能无方體能无方體然後能无我先後天而不違順至理以推行知无不合也雖然得聖人之任皆可勉而至猶不害於未化爾大人與聖人自是一節妙處精義入神以致用也利用安身以崇德也以理計之如崇德之事尚可勉勉修而至若大人以上事則无修故曰過此以往未之或知言不可得而知也直待已實到窮神知化是德之極盛處也然而人為者不過大人之事但德盛處唯已知之黙而成之不言而信不怒而威如此方是成就吾之所行大人之事而已故於此爻却説大人者與天地合其德與日月合其明與四時合其序與鬼神合其吉凶如此則是全與天地一體然不過是大人之事惟是心化也故嘗謂大可為也大而化不可為也在熟而已葢大人之事修而可至化則不可加功加功則是助長也要在乎仁熟而已然而至於大以上自是住不得言在熟極有意大與聖難於分别大以上之事如禹稷臯陶輩猶未必能知然須當皆謂之聖人葢為所以接人者與聖同但已自知不足不肯自以為聖如禹之德斯可謂之大矣其心以天下為己任規模如此又克己若禹則與聖人直无間别孔子亦謂禹吾无間然矣久則須至堯舜有人於此敦厚君子无少異聖人之言行然其心與眞仲尼須自覺有殊在它人則安能分别當時至有以子貢為賢於仲尼者惟子貢則自知之人能以大為心常以聖人之規模為己任乆於其道則須化而至聖人理之必然如此其大即是天也又要細密處行之并暗隙不欺若心化處則誠未易至孔子猶自謂若聖與仁則吾豈敢儻曰吾聖矣則人亦誰能知故曰知我者其天乎並易説龜山楊氏曰聖人與鬼神合其吉凶則其禱也久矣語解兼山郭氏曰孔子釋飛龍而明之以四合何也葢在天地則合德在日月則合明在四時則合序在鬼神則合其吉凶雖四者之間各有所合而終无所留究其道則无不周考其迹則无可繫此莊子所謂反一无迹者也反一无迹惟飛龍能盡之不然釋飛龍何與於四合者也易説又曰嘗讀易至於乾之九五曰飛龍在天孔子曰天地合其德日月合其明四時合其序鬼神合其吉凶先天而天弗違後天而奉天時葢言誠者事也九二曰見龍在田子曰學以聚之問以辯之寛以居之仁以行之葢言誠之者之事也中庸解孔子於易之乾明大人之道則知大者乾道也浩然圖和靖尹氏曰寛問易曰夫大人者與天地合德云云有説此只是乾元九五之大人又云此只是説卦體如此答曰非也此説大人所以為大者以與天地日月合其道也伊川曰合其道葢為此若不知其道合箇甚底天地且就上著箇德字日月亦然不可日月却言德也葢且就上著一字形容只是要合其道令學者有下手處寛又問或謂此九五之大人非學之所能及何也曰聖人立言本為要學也至如誠敬若馴致之其至也非大人而何寛又問大人與聖人同否曰大以其大聖以其聖而言聖謂不可窺測若孟子説得甚詳充實而有光輝之謂大大而化之之謂聖聖而不可知之之謂神神也者葢妙萬物為言非謂别有神人也只是聖人如今之俗語曰如聖㑹聖葢孟子所謂不可知者乃形容聖之語也語録白雲郭氏曰天下至大也非有大德者不能有天下惟有大德故其德有容无私於覆載其明无不及无私於照臨其序有常无私於生養其吉凶有感无私於賞罰是以能同於天而无相違之道況於人鬼乎葢與天道同者不繫乎先天後天也究觀乾之一卦則包犧之畫明人配天地文王之重明聖人成天地之能周公之爻明有天德則居天位孔子之辭明合天地則可以治神人乃知君德不可以不大也故堯則天之大舜能有大禹為大禹皆九五之大人歟易説漢上朱氏曰道者循萬物之理而行其所无事者也天地之覆載日月之照臨四時之消長鬼神之吉凶豈有意為之哉大人其道與天地日月四時鬼神合故順至理而推行之先後天而弗違天且不違而況於人乎況於鬼神乎鬼神者流行於天地之間者也是以九五利見大人也易傳新安朱氏曰大人即釋爻辭所利見之大人也有是德而當其位乃可以當之人與天地鬼神本无二理特蔽於有我之私是以梏於形體而不能相通大人无私以道為體曾何彼此先後之可言哉先天不違謂意之所為黙與道契後天奉天謂知理如是奉而行之囘紇謂郭子儀曰卜者言此行當見一大人而還其占葢與此合若子儀者雖未及乎夫子之所論然其至公无我亦可謂當時之大人矣本義問先天而天弗違後天而奉天時聖人與天為一安有先後之殊曰只是聖人意要如此天便順從先後相應不差毫釐也因説人常云如雞伏子啐啄同時不知是如此否時舉云舊時閒常養雞時舉時為兒童日候其雛之出見他母初未嘗啄葢氣數才足便自横迸裂開有時見其出之不利因用手略助之則其子下來便不長進以此見得這裏一毫人力有不能與先生笑而然之問程易言天專言之則道也又曰天地者道也不知天地即道邪抑天地是形所以為天地乃道邪先生曰伊川此句某未敢道是天地或只以形言先天而天弗違者如禮雖先王未之有而可以義起之類葢雖天之所未為而吾意之所為自與道契天亦不能違也後天而奉天時如天敘有典天秩有禮之類雖天之所已為而理之所在吾亦奉而行之耳葢大人无私以道為體此一節只是釋大人之德其曰與天地合其德與日月合其明與四時合其序與鬼神合其吉凶將天地對日月四時鬼神説便只是指形而下者言先天而天弗違後天而奉天時葢聖人與天无間譬如朋友忘形行路之際或我在前而彼隨之或彼在前而我隨之並无形迹也不必分解如何謂之先天如何謂之後天並語録亢之為言也知進而不知退知存而不知亡知得而不知喪其唯聖人乎知進退存亡而不失其正者其唯聖人乎伊川先生曰極之甚為亢至於亢者不知進退存亡得喪之理也聖人則知而處之皆不失其正故不至於亢也易傳白雲郭氏曰孔子可仕則仕可止則止可久則久可速則速孟子稱為聖之時大哉隨時之義也一失其正而為亢則於進退存亡得喪之際尚不能周知況天下國家乎聖人釋爻至於四五者葢其道難以一義盡也易説漢上朱氏曰亢者處極而不知反也萬物之理進必有退存必有亡得必有喪亢知一而不知二故道窮而致災人固有知進退存亡者矣其道詭於聖人則未必得其正不得其正則與天地不相似知進退存亡而不失其正者其唯聖人乎故兩言之前曰大人此曰聖人知進退存亡不失其正則德合隂陽與天地同流而无不通矣此大而化之者也易傳新安朱氏曰所以動而有悔也知其理勢如是而處之以道則不至於有悔矣固非計私以避害者也再言其唯聖人乎始若設問而卒自應之也此第六節復申第二第三第四節之意本義王肅本兩箇其唯聖人乎一作其唯愚人乎此必是他自改所以亂説介甫以武王觀兵為九四大无義理兼觀兵之説亦自无此事如今日天命絶則今日便是獨夫豈容更留之三年今日天命未絶便是君也為人臣子豈可以兵脅其君安有此義並語録合訂刪補大易集義粹言卷四
