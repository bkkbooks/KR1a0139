body:
  text: 合訂刪補大易集義粹言卷六十七頭等侍衛納喇性徳編離下坎上伊川先生曰既濟序卦有過物者必濟故受之以既濟能過於物必可以濟故小過之後受之以既濟也為卦水在火上水火相交則為用矣各當其用故為既濟天下萬事已濟之時也易傳既濟亨小利貞初吉終亂伊川先生曰既濟之時大者既以亨矣小者尚有一有未字亨也雖既濟之時不能无小未亨也小字在下語當然也若言小亨則為亨之小也利貞處既濟之時一无之時字利在貞固以守之也初吉方濟之時也終亂濟極則反也易傳白雲郭氏曰已濟難為既濟方將濟難為未濟名卦之義甚明然則既濟之亨可知矣易六爻有應者八卦既濟未濟居其二而未濟不能濟難者以既濟六爻皆得位未濟六爻皆失位故也六爻皆應皆得位在六十四卦之中獨此一卦而已以是知欲濟者必在有應必得其位然後可也既濟亨小者小為衍字蓋緣未濟亨之下有小字故亦誤書於此又孔子彖言小者亨也因此遂不能去六十四卦无亨小之義如旅小亨巽小亨是誠小亨也既濟亨之大者也然則孔子言小者亨也者盖濟難大人之事故未濟言小狐汔濟以明小者不能濟故為未濟若既濟則雖小者亦有濟故孔子彖言小者亨也所以别未濟之義也小者如小道小徳亦有濟也又如大事雖濟小事亦濟也是皆為小如是則知舉无不濟矣使卦辭有小字則孔子彖辭當以既濟亨小者為句斷下句獨曰亨也殊无義理必以既濟亨為㫁句則見既濟亨為文王辭小者亨也為孔子釋之之辭也且大人於難无所不濟故既濟未濟不必論大人惟既濟之後雖小道小徳皆可亨未濟之時非小道小徳所能亨也故必以小者亨小狐濡尾為别也孔子於小亨増者也二字即文義與旅巽自不同矣初吉者既濟无不吉也道窮則變未濟終焉故終亂也既濟有初吉終亂之象未必濟者皆亂也終亂不亂則在人耳故聖人慎終如始所以復濟終亂之道也昔成湯黜夏命之後乃曰茲朕未知獲戾於上下慄慄危懼若將隕于深淵武王大告武成乃偃武脩文歸馬放牛示天下弗服若是者豈有終亂之道乎是以商周亨國久長由湯武有以濟終亂之道也有其象則卦言之而亂與不亂在人事者非卦所可盡言也易說新安朱氏曰既濟事之既成也為卦水火相交各得其用六爻之位各得其正故為既濟亨小當為小亨大抵此卦及六爻占辭皆有警戒之意時當然也本義既濟是已濟大事都亨了只小小底正在亨通若能戒懼得常似今便好不然便一向不好去伊川意亦是如此語錄彖曰既濟亨小者亨也利貞剛柔正而位當也初吉柔得中也終止則亂其道窮也伊川先生曰既濟之時大者固一无固字已亨矣惟有小者一有未字亨也時既濟矣固宜貞固以守之卦才剛柔正當其位當位者其常也乃正固之義利於如是之貞一有正字也隂陽各得正位所以為既濟也二以柔順文明而得中故能成既濟之功二居下體方濟之初也而又善處是以吉也天下之事不進則退无一定之理濟之終不進而止矣无常止也衰亂至矣盖其道已窮極也九五之才非不善也時極道窮理當必變也聖人至此奈何曰一无日字惟聖人為能通其變於未窮不使至於極也堯舜是也故有終而无亂並易傳横渠先生曰通其變然後可久故止則亂也易說藍田吕氏曰既濟成功无所事也終止則亂恃濟而不為則事弛而日入於敝所以亂也白雲郭氏曰小者皆亨故曰既濟小或未亨非既也既者皆盡之辭利貞者既濟以六爻剛柔皆當位而濟以是知其利貞也使不當位而可濟則非利貞矣六二柔得中也初二皆卦之始也故為初吉終止則亂者止謂難止則亂至也猶上六濡首之厲是也難止則亂至有不至者何也盖難止亂至者象當然也有不至者聖人維持之力也易說漢上朱氏曰既濟自泰來豐九四變也泰兊為澤九二之四成豐四已濟險而小者未盡亨九四之五則小者亨矣於濟為既其卦三隂得位三陽下之大者既濟小者亦亨子夏傳曰陽已下隂萬物既成不曰小亨而曰亨小者大者之濟為亨小者而濟非為己也禹思天下之溺猶己溺之稷思天下之饑猶己饑之亨至於小則小大畢亨故曰既濟亨小彖曰既濟亨小者亨也彖文當曰既濟亨小小者亨也脫一字此以三陽下三隂而言既濟也以陽下隂非正也亨之正剛君子也柔小人也剛柔不失其正君子小人各當其位无犯分躐等之非守既濟之道也故曰利貞剛柔正而位當也此以六爻當位而言既濟也自泰至賁二復三變始於二之四成豐次四之五成既濟其終五之上而成賁濟天下之難莫若剛過剛亦不可以濟失人心也方濟之初以柔濟剛則其柔得中剛者為用天下之難有不濟乎此既濟之初所以吉正則吉也既濟矣上六變艮成賁艮止也止而不進不復有為文飾而已濟終則極衰亂復起終以亂也盖其道已窮故曰初吉終亂彖曰初吉柔得中也終止則亂其道窮也終始時也治亂者道之窮通也晉隋有天下不旋踵而亂不知終止則亂之戒也易傳曰唯聖人為能通其變於未窮不使至於極也堯舜是也故有終而无亂此推原卦變以九五一爻言既濟之終始也在卦氣為十月故太𤣥準之以成易傳新安朱氏曰濟下疑脫小字位當以卦體言初吉指六二本義亨小當作小亨大率到那既濟了時便有不好去所以說小亨如唐時貞觀之盛便向那不好去初吉終亂便有不好在未後底意思並語錄象曰水在火上既濟君子以思患而豫防之伊川先生曰水火既交各得其用為既濟時當既濟惟慮患害之生故思而豫防使不至於患也自古天下既濟而致禍亂者盖不能思患而豫防也易傳白雲郭氏曰水性下而居上火性上而居下交則相濟是為既濟也既濟雖非有患之時而患必生於既濟之後故君子思患而豫為之防也成湯之危懼成王之小毖皆思患豫防之謂也故卦言終亂象言豫防爻有濡首之厲其義一也易說漢上朱氏曰水火相逮而後濟天地之道以坎離相濟以日言之日降則月升以月言之日交則月合以嵗言之寒來則暑往皆既濟也坎上離下既濟矣然既濟之極水火將反其初故既濟之象未濟藏焉君子不可不思慮以豫防其患坤土為思坎為險難患也土防水也在既濟之時而防險難豫也思患而豫防之則難伏而不作或曰五動坤變坎成震體豫而未濟之象毁矣易傳初九曳其輪濡其尾无咎象曰曳其輪義无咎也伊川先生曰初以陽居下上應於四又火體其進之志銳也然時既濟矣進不已則及於悔咎一作吝故曳其輪濡其尾乃得无咎輪所以行倒曳之使不進也獸之涉水必揭其尾濡其尾則不能濟方既濟之初能止其進乃得无咎不知已則至於咎也既濟之初而能止其進則不至於極其義自无咎也並易傳白雲郭氏曰既濟之初方出難矣是以有曳輪濡尾之象曳輪所以出難也濡尾以曳輪而濡也曳輪而濡尾則身出而難在後矣是以知其既濟也既濟故義无咎易說漢上朱氏曰三坎為輪初卦後為尾初九剛而離體炎上有應進於上其志必銳時既濟矣動而進不已必至於咎故戒之初動之四成艮艮為手曳也坎輪在水火爻中火欲上水欲下亦曳也曳其輪不輕進尾濡坎水不速濟止之於初持重緩進以全其剛而不至於極則於既濟之義為得矣故曰義无咎也易傳新安朱氏曰輪在下尾在後初之象也曳輪則車不前濡尾則狐不濟既濟之初謹戒如是无咎之道占者如是則无咎矣本義曳輪濡尾是只争些子時候是欲到與未到之間不是不欲濟是要濟而未敢輕濟如曹操臨敵意思安間如不欲戰老子所謂猶兮若冬涉川之象涉則畢竟涉只是畏那寒了未敢便涉語錄六二婦喪其茀勿逐七日得象曰七日得以中道也伊川先生曰二以文明中正之徳上應九五剛陽中正之君宜得行其志也然五既得尊位時已既濟无復進而有為矣則於在下賢才豈有求用之意故二不得遂其行也自古既濟而能用人者鮮矣以唐太宗之用言尚怠於終況其下者乎於斯時也則剛中反為中滿坎離乃為相戾矣人能識時知變則可以言易矣二隂也故以婦言茀婦人出門以自蔽者也喪其茀不可行矣二不為五之求用則不得行如婦之喪茀也然中正之道豈可廢也時過則行矣逐者從物也從物則失其素守故戒勿逐自守不失則七日當復得也卦有六位七則變矣七日得謂時變也雖不為上所用中正之道无終廢之理不得行於今必行於異時也聖人之一有為字勸戒深矣中正之道雖不為時所用然无終不行之理故喪茀七日當復得謂自守其中異時必行也不失其中則正矣並易傳白雲郭氏曰六二柔而得中者也當既濟之時在我者得其位則不失己在人者得其應則不失人内外无失又何患於喪乎有喪亦有復故勿逐七日得也如是則六二之象有得无失而辭言婦喪其茀者盖得失者消長循環之道方得之際失在前也猶既濟之終必復於難君子思患而豫防之勿謂其无喪而遂忘其喪也此六二所以言婦喪其茀之義柔中婦之象爾雅謂輿革後謂之茀而詩有簟茀魚服鄭氏謂茀之言蔽也故伊川曰婦人出以自蔽者也而馬氏王氏皆為首飾未詳其㫖伊川曰卦有六位七則變矣七日謂時變也雖不為上所用而中正之道无終廢之理也易說漢上朱氏曰二坤為輿三坎為輪二之五離變震坤離為文震為竹竹有文蔽車之前者茀也離為婦婦人乘車不露見有茀乃可以行五於既濟之時安其位无動而有為之意二雖有文明中正之徳不得遂其行婦喪其茀也五坎為美脊之馬二五相易震為作足之馬逐也五不下二二當以中道自守故戒以勿逐逐則失其素守而不正七日得自二數之至上為五復自初數之至二凡七日以中道也中道者天地之所不能違故坤極生乾七日必復而況人乎易傳曰自古既濟用人盖鮮矣以唐太宗之用言猶怠於其終況其下者乎雖不為上所用而中正之道无終廢之理不得行於今必行於異時易傳新安朱氏曰二以文明中正之徳上應九五剛陽中正之君宜得行其志而九五居既濟之時不能下賢以行其道故二有婦喪其茀之象茀婦車之蔽言失其所以行也然中正之道不可終廢時過則行矣故又有勿逐而自得之戒本義九三髙宗伐􅄦方三年克之小人勿用象曰三年克之憊也伊川先生曰九三當既濟之時以剛居剛用剛之至也既濟而用剛如是乃髙宗伐􅄦方之事髙宗必商之髙宗天下之事既濟而逺伐暴亂也威武可及而以救民為心乃王者之事也惟聖賢之君則可若騁威武忿不服貪土地則殘民肆慾也故戒不可用小人小人為之則以貪忿私意也非貪忿則莫肯為也三年克之見其勞憊之甚聖人因九三當既濟而用剛𤼵此義以示人為法為誡豈淺見所能及也言憊以見其事之至難在髙宗為之則可无髙宗之心則貪忿以殃一作殘民也並易傳横渠先生曰上六險而應此處卦之末濟以終亂者也故以比􅄦方无三以陽居陽文明而正故用師雖久困而必克小人用之取亡之道也易說藍田吕氏曰九三既濟之時以陽當位備文明之徳宜伐闇者也􅄦方幽闇之國髙宗有九三之徳者也居斯時也必如髙宗然後可以伐􅄦方猶至三年憊而後克之是雖以明伐闇不可易也小人勿用必亂邦也白雲郭氏曰髙宗中興之賢君也􅄦方至逺之伐也髙宗之中興其為政事豈伐逺方而已哉故知􅄦方之伐在髙宗為小事也小事猶克之以見小者亦亨也猶有三年之憊者既濟之難未至大亨也髙宗中興所謂既濟之大亨矣􅄦方小事猶且小人勿用則大者可知此其所以中興歟九三當既濟方興之時故有髙宗之象易說漢上朱氏曰坤為􅄦為方五坎為險帝繫有􅄦方氏􅄦方蓋國名小國於既濟之時恃險不來九五離體有戈兵用九三往伐之坤為年自四數之歴三爻三之上成巽巽為入入其險也上之三成坤順也既入其險􅄦方來順三年克之也克難辭也九三剛正君子也上六之三柔而不正小人也髙宗中興之賢君伐􅄦方氏之小國歴時之久至於三年而後克之其力亦憊矣況用小人乎坎為勞重坎憊也小人非貪慾不為其禍至於殘民肆慾遂喪其邦故戒以小人勿用爻言勿用小人象曰憊者聖人慮後世勤兵於逺託髙宗久伐以濟其欲勞民動衆三年克之雖髙宗行之亦憊也易傳新安朱氏曰既濟之時以剛居剛髙宗伐􅄦方之象也三年克之言其久而後克戒占者不可輕動之意小人勿用占法與師上六同本義髙宗伐􅄦方疑是髙宗舊日占得此爻故聖人引之以證此爻之吉凶又曰漢去古未逺想見卜筮之書皆存如文帝之占大横庚庚都似左傳時人說話又曰夏啟以光想亦是夏啟曾占得此卦問三年克之憊也此言用兵是不得已以髙宗之賢三年而克􅄦方亦不勝其憊矣先生曰言兵不可輕用也凡爻中言人者必是其人嘗占得此卦並語錄六四繻有衣袽終日戒象曰終日戒有所疑也伊川先生曰四在濟卦而水體故取舟為義四近君之位當其任者也當既濟之時以防患慮變為急繻當作濡謂滲漏也舟有罅漏則塞以衣袽有衣袽以備濡漏又終日戒懼不怠慮患當如是也不言吉方免於患也既濟之時免患則足矣豈復有加也終日戒懼常疑患之將至也慮既濟之時當畏慎如是也並易傳藍田吕氏曰六二六四皆處二陽之間皆有正應不私近比近不相得交來侵之二以居中履正不以喪茀易其志卒得其所喪四居多懼之地備衣袽以防舟之漏終日戒而不敢弛二不以己侵而改其操四疑其將侵而謹其備也白雲郭氏曰既濟思患豫防而六四又為多懼之地近君居險是以有繻有衣袽之戒袽敝衣也說文謂繻為繪采盖其意以謂勿以新繪而忘敝袽亦猶勿以既濟而遂忘未濟之難也終日者言无怠時也有所疑者雖未有患以多懼而豫防之也易說漢上朱氏曰四坎水也初之四成巽巽木在水上舟之象四未交初巽毁坎見舟漏也四坤為裳襦裳也初乾為衣艮為手袽塞也離日在下終日也兊為口戒也巽為不果疑也六四近君而正明於防患資初九之賢彌縫九五之闕終日相戒如奉漏舟不惟自竭而初九助之如有裳及衣袽塞其漏茍可以豫防者无不為斯能濟乎重險矣制治保邦之道患至而後慮之无及己心有所疑知禍亂之源必先事而塞之乃保既濟之道故曰終日戒有所疑也易傳曰不言吉者方免於患也既濟之時免患足矣无復有加矣易傳新安朱氏曰既濟之時以柔居柔能豫備而戒懼者也故其象如此程子曰繻當作濡衣袽所以塞舟之罅漏本義六四以柔居柔能慮患豫防盖是心低小底人便能慮事柔善底人心不麤慮事細宻剛果之人心麤不解如此語錄九五東鄰殺牛不如西鄰之禴祭實受其福象曰東鄰殺牛不如西鄰之時也實受其福吉大來也伊川先生曰五中實孚也二虚中誠也故皆取祭祀為義東鄰陽也謂五西鄰隂也謂二殺牛盛祭也禴薄祭也盛不如薄者時不同也二五皆有孚誠中正之徳二在濟下尚有進也故受福五處濟極无所進矣以至誠中正守之茍未至於反耳理无極而終不反者也已至於極雖善處无如之何矣故爻象惟言其時也五之才徳非不善不如二之時也二在下有進之時故中正而孚則其吉大來所謂受福也吉大來者在既濟之時為大來也亨小初吉是也並易傳横渠先生曰東鄰上六也西鄰六四也過於濟厚也㡬於中時也祭而合禮雖薄受福九五既濟之主舉上與下其義之得不言而著也易説藍田吕氏曰九五剛中居尊既濟之主也保既濟者不恃其全盛而恃其克誠物備而誠不至不如誠至而物不備故誠信可以感鬼神而不能保其邦家者未之有也白雲郭氏曰大難既濟為之君者何所事焉惟祭祀為先耳與萃渙二卦王假有廟同意牛祭祭之盛者也禴祭祭之薄者也祭之盛者非無誠也然以物為主祭之薄者非无物也然以誠為主物過於誠則物勝誠而誠日以衰誠過於物則誠勝物而誠日以著鬼神惟誠而後通物亦因誠而可薦則祭祀之道誠在所先而物在所後明矣是以東鄰殺牛不如西鄰之禴祭實受其福也象言西鄰之時葢君子誠之為貴方既濟之初未能備物為亨是得其時也吉大來者既濟亨矣其吉方興而未艾是猶天保之詩言吉蠲為饎是用孝亨禴祠烝嘗于公先王其卒章言如月之恒如日之升如南山之夀不騫不崩如松栢之茂无不爾或承謂之大來者如此伊川曰東鄰陽也謂五西鄰隂也謂二也易説漢上朱氏曰泰震為東兊為西三四鄰也兊為刑殺坤為牛坎為血離為夏震為聲上為宗廟九二之五有長子奉祀東鄰殺牛西鄰禴祭之象殺牛盛祭也禴尚聲薄祭也盛不如薄者時也二五均有中正之徳然二未濟有進也九自五來二以虚受故曰實受其福正吉陽為大吉大來也五既濟无所進也盈則當虛故曰不如西鄰之禴祭也理无極而不反者既濟極矣時已往矣五以中正守之能未至於反而已易傳曰至於極則雖善處无如之何矣易傳又曰伊川解既濟九五曰中實孚也與虞氏孚實之象同又曰中虚誠也與郭璞筮得中孚之需曰虛中象道若虚舟同也叢説新安朱氏曰東陽西隂言九五居尊而時已過不如六二之在下而始得時也又當文王與紂之事故其象占如此彖辭初吉終亂亦此意也本義上六濡其首厲象曰濡其首厲何可乆也伊川先生曰既濟之極固不安而危也又隂柔處之而在險體之上坎為水濟亦取水義故言其窮至於濡首危可知也既濟之終而小人處之其敗壊可立而待也既濟之窮危至於濡首其能長乆乎並易傳白雲郭氏曰上六處既濟之極當終止之亂是以有濡首之危非可乆於既濟之道也既濟之極難之始而未深也故但濡首而已惟聖人通其變而不至於極則无是危矣易説漢上朱氏曰上既濟之極以剛處之猶恐其反六安其位而不變必有顛隕䧟溺之患上反三乾為首濡於坎水之中濟而至於水濡其首尾極矣濟之窮也其可長乎巽為長易傳曰既濟之終小人處之其敗可立而須也易傳新安朱氏曰既濟之極險體之上而以隂柔處之為狐涉水而濡其首之象占者不戒危之道也本義問既濟上三爻皆漸漸不好去葢出明而入險四有衣袽之象曰有所疑也便不是好㡳端倪自此已露五殺牛則已自過盛上濡首則極而亂矣不知如何先生曰然時運到那時過了康節所謂飲酒酩酊開花離披時節所以有這様不好底意思出來語録合訂刪補大易集義粹言卷六十七
