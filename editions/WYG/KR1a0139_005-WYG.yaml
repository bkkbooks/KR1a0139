body:
  text: 合訂刪補大易集義粹言卷三頭等侍衛納喇性德編初九曰潛龍勿用何謂也子曰龍德而隱者也不易乎世不成乎名遯世无悶不見是而无悶樂則行之憂則違之確乎其不可拔潛龍也明道先生曰樂則行之憂則違之樂與憂皆道也非己之私也劉絢過汝所録伊川先生曰自此以下言乾之用用九之道也初九陽之微龍德之潛隱乃聖賢之在側陋也守其道不隨世而變晦其行不求知於時自信自樂見可而動知難而避其守堅不可奪潛龍之德也易傳横渠先生曰孔子喜弟子之不仕葢為德未成則不可以仕見行而未成者也故潛龍勿用龍德而未顯者也不成名不求聞也養實而已樂行憂違不可與德者語也遯世不見知而不悔聖人不為沽激之行以求時知依乎中庸人莫能知以此自信不知悔也樂則行之憂則違之主於求吾志而已无所求於外故善世博化龍德而見者也若潛而未見則為己而己不暇及人者也並易説用則行舍則藏唯我與爾有是夫顔子龍德而隱遯世不見知而不悔與聖者同能龍德聖脩之極也顔子之進則欲一朝而至焉可為好學也已並正蒙廣平游氏曰龍德而隱故不易乎世龍德而正中故曰善世而不伐不易乎世者用舍在我故遯世无悶不成乎名者非譽不在物故不見是而无悶確乎其不可拔則行一不義殺一不辜而得天下不為矣非伯夷栁下惠之徒何足以與此若孔子則聖人之時不專於勿用也其易世之志未嘗一日而忘故曰天下有道丘不與易也易説龜山楊氏曰辟世者若伯夷待天下之清是也非遯世无悶確乎其不可拔不足以與此孔子之門唯顔淵閔子未嘗仕葢隱而未見也樂則行之憂則違之確乎其不可拔於二子見之矣並語解藍田吕氏曰不易乎世與孔子所謂天下有道丘不與易也之易同孟子云夷子思以易天下亦然不成乎名與博學而无所成名同漢上朱氏曰乾之變化龍德也初九變坤謂之潛龍龍德而隱者也初之四變九為六易世也初九隱伏不易乎世也易如天下有道吾不與易也之易厯有元㑹運世世者辰也初九子之四易午故曰易世震為聲巽見震伏不成乎名也二為中二動為庸初九依乎中庸初之四成兑説遯世而无悶也初九變不正不見是而无悶者舉世非之而不加損也之四行也兑説樂也樂則行之也退而失位為憂憂則退違之也巽為木在下確乎其不可拔潛龍也初九一爻之四或曰遯或曰行何也曰自依乎中庸言之二隂遯也自初九之四言之行也此所謂曲而中也易傳白雲郭氏曰道與世合則出而見道與世違則隱而潛惟有德者能之古之人邦无道至死不變又曰邦无道則愚豈不易乎世不成乎名者歟遯世无悶獨善其身者也不見是而无悶人不知而不愠者也行其所可樂違其所可憂此顔子所以不改其樂而人不堪其憂也易説且聖人依乎中庸也遯世无悶不見是而无悶其龍德之隱者乎非吾夫子疇克之哉顔淵見其進未見其止不改其樂而无祇悔其殆庶幾乎中庸明聖人潛龍之義故先舉素隱終言遯世雖潛之中所不可廢當遵而行之者中庸之道也中庸解新安朱氏曰龍德聖人之德也在下故隱易謂變其所守大抵乾卦六爻文言皆以聖人明之有隱顯而無淺深也本義問行而未成如何曰只是事業未就又問乾六爻皆聖人事安得而未成伊川云未成是未著莫是如此否曰雖是聖人畢竟初九行而未成又問此只論事業不論德否曰不消如此費力且如伊尹居有莘之時便是行而未成潛龍勿用何謂也以下大概各就他要説處便説不必專説人事天道伊川説乾之用乾之時乾之義也難分别到了時似用用似義易如一个鏡相似看甚物來都照得如潛龍只有个潛龍象自天子至於庶人看甚人來都使得孔子説作龍德而隱不易乎世不成乎名便是就事上指殺説了然㑹看底孔子説也活不㑹看底雖文王周公説底也死了又曰須知得他是假託説是包含説假託謂不惹著事物包含是説箇影象在裏无所不包並語録東萊吕氏曰遯世而无悶者疑慮不萌於心確乎其不可拔也非離人而立於獨者不足以與此若不逺復者未免於有念慮也故中庸曰遯世不見知而不悔惟聖者能之樂則行之憂則違之則之二字須子細詳看凡人當樂當憂或為利害牽制或為私意所奪如何便行得違得惟聖人則便行便違也則便也此見聖人所為无滯礙處易説又曰不易乎世不成乎名二者最難兼紀聞九二曰見龍在田利見大人何謂也子曰龍德而正中者也庸言之信庸行之謹閑邪存其誠善世而不伐德博而化易曰見龍在田利見大人君德也濓溪先生曰聖誠而已矣誠五常之本百行之源也靜无而動有至正而明達也五常百行非誠非也邪暗塞也故誠則无事矣通書伊川先生曰以龍德而處正中者也在卦之正中為得正中之義庸信庸謹造次必於是也既處无過之地則惟在閑邪邪既閑則誠存矣善世而不伐不有其善也德博而化正己而物正也皆大人之事雖非君位君之德也易傳敬是閑邪之道閑邪存其誠雖是兩事然亦只是一事閑邪則誠自存矣天下有一箇善一箇惡去善即是惡去惡即是善譬如門不出便入豈出入外更别有一事也劉元承手編閑邪存其誠閑邪則誠自存而閑其邪者乃在於言語飲食進退與人交接之際而已矣暢潛道録閑邪則誠自存不是外面捉一箇誠將來存著今人外面役役於不善於不善中尋箇善來存著如此則豈有入善之理只是閑邪則誠自存故孟子言性善皆由内出只為誠便存閑邪更著甚工夫但是動容貌整思一作心慮則自然生敬敬只是主一也主一則既不之東又不之西如是則只是中既不之此又不之彼如是則只是内存此則自然天理明閑邪則固一有主字一矣然一作能主一則不消言閑邪有以一為難見不可下工夫如何一作行主一者无他只是整齊一作莊整嚴肅則心便一一則自是无非僻之好此意但涵養久久則天理自然明閑邪存誠閑邪則誠自存如人有室藩牆不修不能防冦冦從東來逐之則復有自西入逐得一人一人復至不如修其藩牆則冦自不至故欲閑邪也並入闗語録如何是閑邪非禮而勿視聽言動邪斯閑矣吕與叔録横渠先生曰庸言庸行葢天下經德達道大人之德施於是者溥矣天下之文明於是著矣然非窮變化之神以時措之宜則或陷於非禮之禮非義之義此顔子所以求龍德而正中乾乾進德思處其極未敢以方體之常安吾止也顔氏求龍德正中而未見其止故擇中庸得一善則拳拳服膺歎夫子忽焉前後也德博而化言化物也以其善世即是化也善其身自化也兼善天下則是化物也知化則是德化聖人自化也化之況味在學者未易見焉但有此次序並易説廣平游氏曰出門如見大賔使民如承大祭則亦閑邪存其誠而已語解藍田吕氏曰皆乾也九二之中君德也九五之中天德也君德使民有所視傚故曰見天德卓越積盛而至不可階而升故曰飛人倫者天下之常道百世所不易大君所先治也九二人道之極而位正中惟人倫之為務故庸言之信庸行之謹九二成德所以常久而不敝在乎閑邪不伐而已初潛學也二見用也三乾乾四或躍離乎人而未至於天也五絶羣離類位乎天也上過則亢大成若缺則不至乎亢以有悔也漢上朱氏曰九二之動龍德而正中者也庸者中之用也二之五兑為口為言上行為行言行也言中庸而應庸言之信也行中庸而正庸行之謹也言行變化不失其中故謂之庸初九九三上下正閑邪也九二動正中存誠也誠自成也非外鑠也閑邪則誠自存猶之煙盡火明波澄水靜閑之者誰與莫非誠也言信行謹閑邪存誠其德正中自二之五善渉乎世矣然且不自伐以正中而遊人間者也兑隱矣二不行矣不聞其言不見其行不伐也德施而光普博也文明而巽化也唯至誠為能化其德如是宜之五為君也是以利見九五之大人故曰君德五君位也顔子擇乎中庸而弗失之夫子告之以為邦九二君德故也易傳白雲郭氏曰初九潛而勿用故孔子言其隱德九二見而在田故孔子言其龍德之著見者由二爻以觀之中庸所謂誠則形形則著著則明明則動動則變變則化之序也庸言之信庸行之謹言行之見者安行之也惟正故能閑邪惟中故能存誠閑邪所以存其誠也有善世之功而不自伐故天下莫與汝爭功有正中龍德博而物化故能盡性盡人物之性豈非閑邪存誠之所致歟君之德正中而已九二所謂咸有一德者也易説庸言之信庸行之謹閑邪存其誠此龍德正中之事中庸之聖人也中庸解新安朱氏曰正中不潛而未躍之時也常言亦信常行亦謹盛德之至也閑邪存其誠无斁亦保之意言君德也者釋大人之為九二也本義庸言庸行盛德之至到這裏不消得恁地猶自閑邪存誠便是无射亦保雖无厭斁亦當保也保者持守之意問九二閑邪存誠與九三修辭立誠相似否曰他地位自别閑邪存誠不大段用力修辭立誠大段著氣力乾之九二處得其中都不著費力庸言之信庸行之謹閑邪存其誠善世而不伐德博而化而已若九三則剛而不中過高而危故有乾乾之戒利見大人君德也兩處説這个君德卻是要發明大人即是九二孔子怕人道别是个大人故如此互相發明使三百八十四爻皆恁地湊著豈不快活人只是中間多有湊不著底不可曉利見大人君德也夫子怕人不把九二做大人别討一个大人所以去這裏説个君德也兩處皆如此説龍德正中以下皆君德言雖不當君位卻有君德所以也做大人伊川卻説得這个大人做兩様問閑邪則固一矣主一則更不消言閑邪曰只是覺見邪在這裏要去閑他則這心便一了所以説道閑邪則固一矣既一則邪便自不能入便更不消説又去閑邪恰如知得外面有賊今夜用須防他則便惺了既惺了不須更説防賊並語録通書誠下釋義曰聖人之所以為聖不過全此實理而已即所謂太極者也五常仁義禮智信五行之性也百行孝弟忠信之屬萬物之象也實理全則五常不虧而百行修矣方靜而隂誠固未嘗无也以其未形而謂之无耳及動而陽誠非至此而後有也以其可見而謂之有耳靜无則至正而已動有然後明與達者可見也非誠則五常百行皆无其實所謂不誠无物者也靜而不正故邪動而不明不達故暗且塞誠則衆理自然无一不備不待思勉而從容中道矣並周子全書東萊吕氏曰龍德而正中者也庸言之信庸行之謹庸者常也惟常言常行自得正中之義又曰閑邪存其誠誠者中所固有但當於邪字上用力防之而已懲忿窒慾閑邪存誠尊德性也必學以聚之問以辨之又曰善世而不伐凡人之功有相敵者則矜伐之心生惟其已之善超邁於世人莫已敵如此自然不伐又曰見龍在田利見大人君德也九二臣位而言君德古人言君不獨有天下謂之君凡可以濟世長人者皆曰君可也易説九三曰君子終日乾乾夕惕若厲无咎何謂也子曰君子進德脩業忠信所以進德也脩辭立其誠所以居業也知至至之可與幾也知終終之可與存義也是故居上位而不驕在下位而不憂故乾乾因其時而惕雖危无咎矣明道先生曰忠信所以進德終日乾乾君子當終日對越在天也葢上天之載无聲无臭其體則謂之易其理則謂之道其用則謂之神其命於人則謂之性率性則謂之道修道則謂之教孟子於其中又發揮出浩然之氣可謂盡矣一作性故説神如在其上如在其左右夫小大事而只曰誠之不可揜如此夫徹上徹下不過如此修辭立其誠不可不子細理㑹言能修省言辭便是要立誠若只是修飾言辭為心只是為偽也若修其言辭正為立已之誠意乃是體當自家敬以直内義以方外之實事道之浩浩何處下手唯立誠才一作方有可居之處有可居之處則可以修業也終日乾乾夫小大事卻只是忠信所以進德為實下手處修辭立其誠為實修業處修辭立其誠文質之義也子貢之知亞於顔子知至而未至之也並李籲録知至則便意誠若有知而不誠者皆知未至爾知至而至之者知至而往至之乃吉之先見故曰可與幾也知終而終之則可與存義也知至至之主知知終終之主終劉絢師訓忠信為基本所以進德也辭修誠意立所以居業也此乃乾道由此二句可至聖人也朱公掞編儒者之所以必有窒礙者何也只為不致知知至至之則自无事可奪入闗語録伊川先生曰三居下之上而君德已著將何為哉惟進德修業而已内積忠信所以進德也擇言篤志所以居業也知至至之致知也求知所至而後一无後字至之知之在先故可與幾所謂始條理者知之事也知終終之力行也既知所終則力進而終之守之在後故可與存義所謂終條理者聖之事也此學之始終也君子之學如是故知處上下之道而无驕憂不懈而知懼雖在危地而无咎也易傳瑩中嘗愛文中子或問學易子曰終日乾乾可也此語最盡文王所以聖亦只是箇不已先生曰凡説經義如只管節節推上去可知是盡夫終日乾乾未盡得易據此一句只做得九三使若謂乾乾是不已不已又是道漸漸推去則自然是盡只是理不如此楊遵道録忠信所以進德者何也閑邪則誠自存誠存斯為忠信也忠信所以進德修辭立其誠所以居業修立在人並吕與叔所録知至則當至之知終則當遂一无遂字終之須以知為本知之深則行之必至无有知之而不能行者知而不能行只是知得淺饑而不食烏喙人不蹈水火只是知人為不善只為不知知至而至之知幾之事故可與幾知終而終之故可與存義知至是致知博學明辨審問愼思皆致知知至之事篤行便是終之如始條理終條理因其始條理故能終條理猶知至即能終之入闗語録金聲而玉振之此孟子為學者言終始之義也樂之作始以金奏而以玉聲終之詩曰依我磬聲是也始於致知智之事行所知而至其極聖之事也易曰知至至之知終終之是也唐棣所録知至至之如今學者且先知有至處便從此至之是可與幾也非知幾者安能先識至處知終終之知學之終處而終之然後可與存義或云九三知九五之位可至而至之大煞害事使人臣常懐此心大亂之道亦自不識湯武知至至之只是至其道也張繹所録或問忠信進德之事固可勉強然致知甚難曰子以誠敬為可勉強且恁地説到底須是知了方行得若不知只是覷卻堯學它行事无堯許多聰明睿智怎生得如他動容周旋中禮劉元承手編學者必知所以入德不知所以入德未見其能進也故孟子曰不明乎善不誠其身易曰知至至之胡氏拾遺横渠先生曰乾九三修辭立誠非繼日待旦如周公不足以終其業忠信所以進德學者止是一誠意耳若不忠信如何進德不驕德當至也不憂業當終也適在不安之位故曰因其時求致用者幾不可緩將進德者徙義必精此君子所以立多凶多懼之地乾乾德業不少懈於趨時也知至極盡其所知也並易説顔淵從師進德於孔子之門孟子命世修業於戰國之際此所以潛見之不同將修己必先厚重以自持厚重知學德乃進而不固矣忠信進德唯尚友而急賢欲勝己者親无如改過之不吝並正䝉廣平游氏曰忠信所以進德也如甘之受和白之受采故善學者其心以忠信為主不言則己言而必忠信也故其言為德言不行則已行而必忠信也故其行為德行止而思動而為无時而不在是焉則安往而非進德哉故為仁不主於忠信則仁必出於姑息為義不主於忠信則義必出於矯抗操是心以往則禮必出於足恭智必出於行險安往而非敗德哉而何進德之有焉譬之欲立數仞之牆而浮埃聚沬以為基亦没世不能立矣人而无信以輗軏為喻何也曰忠信所以進德而義也禮也以信成之人而无信則中无所主矣以之為仁則蹩躠而已以之為義則踶跂而已為智則誣為禮則偽无所施而可也輗軏大車小車所恃以行者也而有信則大德小德所資以進也故輪輿雖備而无輗軏則有車之名而无運行之實人而無信則雖居之似忠信行之似亷潔終不可入堯舜之道故其喻如此並語解龜山楊氏曰忠信乃為進德之基本无忠信則如在虚空中行德何以進語録修辭立誠而剛大之氣形諸外則鄙倍斯逺矣知至將以至之則見其進矣未至乎終之故未見其止也顔淵知至矣未至乎終之而死故孔子惜之也並語解藍田吕氏曰忠信進德如有諸已又知所以充實之也修辭立其誠正名是事行其實以稱之也所立卓爾而欲從之知至至之也於德有先見之明也人不堪其憂而不改其樂知終終之也於分有當安之義也漢上朱氏曰乾剛之德自初至三進德也九三動成巽巽為事業者事之成動而巽修業也兌為口正以動忠信也忠信所以進德也巽言不離於忠信修辭也二正誠也巽為股立也修辭以立誠誠立而其業定修辭所以居業也初九知中之可至則行而至之初可與乎幾也九三知中之不可過則動而終之三可與存乎義也義者時措之宜也𤣥曰諸一則始諸三則終二者其得中乎是故九三動而弗處居上位而不驕也初九遯而无悶在下位而不憂也是時乾乾者進德修業立誠以居之而已非安夫上位而不去也故乾乾因其時而惕雖危无咎巽為多白眼惕也九三之動危厲也離日在上為朝在五為晝在三四為日􅉴為夕為終日在三為暮夜為明入地中日在三故曰夕惕易傳白雲郭氏曰乾健也乾乾健之至其自強不息可知也葢不如是不足以進德修業大有為於天下也德在我者也非内盡忠信則德不可進事業措諸天下者也其修辭外見者未見其所以盡成已成物之道皆不足以居業也事之方來可至者至之君子知動之微作事謀始也事之已往當終者終之君子存謹終如始之義也卦至於三其道革矣自初至三可終之德業也自四以往可至之德業也既盡善始善終之道故居三之尊而不驕任五之事而不憂雖在危地何咎之有夫内以忠信而進德外以辭誠而居業知至之幾知終之義不驕不憂皆乾乾而夕惕者也修辭立其誠如臯陶矢厥謨之類是也發號施令皆修辭也以誠為主易説新安朱氏曰忠信主於心者無一念之不誠也修辭見於事者無一言之不實也雖有忠信之心然非修辭立誠則無以居之知至至之進德之事知終終之居業之事所以終日乾乾而夕猶惕若者以此故也可上可下不驕不憂所謂无咎也本義德者得也得之於心謂之德如得這个孝則為孝之德業是做得成頭緒有次第了不然汎汎做只是俗事更無可守德者得之於心如得這孝之德在自家心裏行出來方見得這便是行忠信是眞實如此進德修業這四个字煞包括道理德是就心上説業是就事上説忠信是自家心中誠實修辭立其誠是説處有眞實底道理進德修業最好玩味忠信進德便是意誠處至如惡惡臭如好好色然後有地可據而无私累牽擾之患其進德孰禦忠信所以進德忠信實也然從知上來吾心知得是非端的是如此心便實實便忠信吾心以為實然從此做去即是進德處修辭立誠又是進德事或問修業德亦有進否曰進德只就心上言居業是就事上言忠信如惡惡臭如好好色直是事事物物皆見得如此純是天理則德日進不成只如此了卻修辭立誠就事上理㑹所以居業也進則日見其新居則常而不厭忠信所以進德只是著實則德便自進居只是常常守得常常做去業只是這个業今日修辭立其誠明日又修辭立其誠問忠信所以進德曰忠信某嘗説是如好好色如惡惡臭是決定徹底恁地這便㑹進人之所以一脚進前一脚退後只是不曾眞實做如何得進知至至之是見得恁地一向徹去故可與幾忠信進德與知至至之可與幾也這幾句都是去底字修辭立誠與知終終之可與存義都是住底字進德是日日新居業是日日如此又曰進德是營度方架這屋相似居業是據見成底屋而居之忠信二字與别處説不同因舉破釡甑燒廬舍持三日糧示士卒必死无還心如此方㑹厮殺忠信便是有這心如此方㑹進德忠信猶言實其善之謂非主忠信與朋友交而有信之忠信也能實其為善之意自是住不得德不期進而自進猶饑之欲食自是不可已進德則所知所行自是而不已居業則只自此住了不去只看進字居字可見進者日新而不已居者一定而不易忠信進德修辭立誠居業工夫之條件也知至至之可與幾知終終之可與存義工夫之功程也此一段只是説終日乾乾而已問忠信所以進德修辭立誠所以居業先生曰忠信二字正是中庸之反諸身而誠孟子之反身而誠様誠字是知得眞實了知得決然是如此更攧撲不碎了只欠下手去做修辭立誠則是眞箇下手去做忠信是知得到那眞實極至處修辭立誠是做到那眞實極至處若不是眞實知得進个甚麽前頭黒淬淬地如何進得去既知得若不眞實去做那个道理也只懸空在這裏无个安泊處所謂忠信也只是虚底道理而已這裏極難説須是合中庸反諸身而誠與孟子反身而誠諸處看舊又有先生説孟子有諸已之謂信亦是易中所謂忠信非主忠信之忠信也若看不透且待他時看而今正是這忠信所以進德一節看未得所以那修辭立誠一段也看未得又問所以只説修辭者只是工夫之一件否曰言是行之表凡人所行者无不發出來也是一件大事又曰忠信是始修辭立誠是終知至至之是進德之事知終終之是居業之事又問至之是已至其處否曰未在是知得那至處方有箇向望處正要行進去知終終之是已至其處了終之而不去問忠信所以進德本義云忠信主於心者无一念之不誠也既无不誠則是成德恐非進德之事曰无一念之不誠然後有以為進德之地若有不實如捕風捉影更无下工處德何由進須是表裏皆實无一毫之偽德方日新矣又問修辭无一言之不實此易曉居業如何曰日日如此行是從生至死常如此用工夫无頃刻不相似某本義説見於事者是也又曰知崇禮卑亦是此意知崇進德之事也禮卑居業之事也問忠信所以進德也修辭立其誠所以居業也知至至之可與幾也知終終之可與存義也上面忠信與修辭立誠未是工夫到下面方是工夫否曰忠信所以進德修辭立其誠所以居業如何未是工夫只上面忠信與修辭立誠便是材料下面知至知終惟有實了方㑹如此大抵以忠信為本忠信只是實若无實如何㑹進如播種相似須是實有種子下在泥中方㑹日日發生若把个殻下在裏面如何㑹發生只是空道理須是實見得若徒將耳聽過口説過濟甚事忠信所以為實者且如孝須實是孝方始那孝之德一日進一日如弟須實是弟方始那弟之德一日進一日若不實卻自無根了如何㑹進今日覺見恁地去明日便漸能熟明日方見有一二分後日更見有三四分意思自然覺得不同立其誠誠依舊便是上面忠信修辭是言語照管得到那裏面亦須照管得到居業是常常如此不少間斷德是得之於心業是見之於事進德是自覺得意思一日強似一日一日振作似一日不是外面事只是自見得意思不同業是德之事也德則欲日進業要終始不易居是存而不失之意可與幾是見得前面个道理便能日進向前去存義是守這个義只是這个道理常常存在這裏好是心肯意肯之義譬如昨日是无奈何勉強去為善今日是心肯意肯要去為善問修業居業之别先生曰二者只是一意居守也逐日修作時是修常常為此是守進德修業進是要日新又新德須是如此業卻須著居修業便是要居他居如人之居屋只住在這裏面便是居不成道修些个了便了修辭便是立誠如今人揀擇言語的一確二一字是一字一句是一句便是立誠若還脱空亂語誠意如何立伊川解修辭立誠作擇言篤志説做兩事説得來寛明道只做一意説明道這般底説得條直問蘇季明以治經為傳道居業之實居常講習只是空言无益質之兩先生何如曰季明是横渠門人祖横渠修辭之説以立言傳後為修辭是為居業明道與言易上修辭不恁地修辭只是如非禮勿言若修其言辭正為立己誠意乃是體當自家敬以直内義以方外之實事便是表裏相應敬以直内義以方外便是立誠道之浩浩何處下手惟立誠才有可居之處則可以修業業便是逐日底事業恰似日課一般忠信所以進德為實下手處如是心中實實見得理之不妄如惡惡臭如好好色常常恁地則德不期進而進矣誠便即是忠信修省言辭便是要立得這忠信若口不擇言只管逢事便説則忠信亦被汨没動蕩立不住了明道便只辨它修辭二字便只理㑹其大規模伊川卻與辨治經便理㑹細密都无縫罅又曰伊川也辨他不盡如講習不止只是治經若平日所以講習父慈子孝兄友弟恭與應事接物有合講習或更切於治經亦不為无益此更是一个大病痛明道先生論修辭立其誠所以居業也説得來如此洞洞流轉若伊川以篤志解立其誠則緩了内積忠信一言一動必忠必信是積也知至至之全在知字知終終之在著力守之伊川説内積忠信積字説得好某實其善之説雖密不似積字好見得積在此而未見於事之意知至至之此知謂進德者也知終終之此知謂居業者也進德者日日新又日新進而不已也居業者日日守定在此也然必内有忠信方能修辭心不在時如何修得於乾言忠信者有健而无息之意於坤言敬者有順而有常之意知至至之主在至上知終終之主在終上至是要到那去處而未到之辭如去長安未到長安卻先知道長安在那裏從後行去這便是進德之事進德是要日新又新只管要進去便是要至之故説道可與幾未做到那裏先知得如此所以可與幾進字貼著那幾字至字又貼著那進字終則只是要守業只是這業今日如此明日又如此所以下个居字終者只這裏終居字貼著那存字終字又貼著那居字德是心上説義是那業上底道理知至雖未做到那裏然已知道業可居心心念念做將去修辭立其誠以終他終便是居了進德知至可與幾是一類事這般處説得精便與那崇德廣業知崇禮卑一般若是那始條理終條理底説得麁知至則知字是輕至字是到那處至之則至字是實之字是虚如知得要到臨安是知至須是行到那裏方是至之大學知至知字是重至字是輕問知至至之致知也知終終之力行也雖是如此知至知終皆致知事至之終之皆力行事然知至至之主於知故可與幾知終終之主於行故可與存義如何先生曰知至至之者言此心所知者眞个到那所知田地雖行未到而心已到故其精微幾密一齊在此故曰可與幾知終終之者既知到極處便力行進到極處此眞實見於行事故天下義理都無走失故曰可與存義所謂知者不似今人草草略知得而已其所知處此心眞个一一到那上也知至至之進德之事以知得端的如此此心自實從此實處做便是進德處也君子終日乾乾至夕猶點檢而惕然恐懼葢凡所以如此者皆所以進德修業耳問文言六爻皆以聖人明之有隱顯而無淺深但九三一爻又似説學者事豈聖人亦有待於學邪所謂忠信進德修辭立誠在聖人分上如何先生曰聖人亦是如此進德亦是如此居業只是在學者則勉強而行之在聖人則自然安而行之知至知終亦然又問如庸言之信庸行之謹在聖人則自然如此為盛德之至閑邪存其誠在聖人則為無斁亦保是此意否先生曰謹信存誠是裏面工夫無迹忠信進德修辭居業是外面事微有迹在聖人分位皆做得自别問忠信所以進德至居業也可以做聖人事否曰不可所以進德正是做工夫處聖人則不消説忠信了只説得至誠問如此則皆是學者事曰然這裏大槩都是學者事又問頃見某人言乾卦是聖人事坤卦是賢人事不知是否曰某不見得如此便是這物事勞攘説他是聖人事他這裏又有説學者處如初九云潛龍勿用子曰云云也可以做聖人事九二曰云云也可以做聖人説及至九三便説得勞攘只做得學者事矣問知至至之可與幾也知終終之可與存義也曰忠信所以進德也修辭立其誠所以居業也方説知至至之可與幾也知終終之可與存義也知至是知得到至處至之謂意思也隨他到那裏這裏便可與理㑹幾微處知終是知得到終處終之謂意思也隨他到那裏這裏便可與存義存謂存主今日也存主在這裏明日也存主在這裏又曰内積忠信所以進德也擇言篤志所以居業也擇言得是修省言辭篤志便是立誠知至至之便是知得進前去又曰知至便是眞實知得如惡惡臭如好好色至之便是眞个求到如惡惡臭如好好色之地知終便是知得進到這處了如何保守得便終保守便是終之如修辭立其誠便是知終終之可與幾是未到那裏先見得个事機便是見得到那裏可與存義便似守得个物事在一个是進一个是居進如日知其所亡只管進前去居如月無忘其所能只管日日恁地做又曰明道所云忠信所以進德至君子當終日對越在天也這个只是解一个終日乾乾忠信進德修辭立誠便無間斷便是終日乾乾不必更説終日對越在天下面説上天之載無聲無臭云云便是説許多事都只是一个天賀孫問夜來聞忠信所以進德終日乾乾君子當終日對越在天詳此一段意只是體當這个實理雖説出有許多般其實一理也曰此只是解終日乾乾故説此一段從上天之載無聲無臭説起雖是无聲臭其闔闢變化之體則謂之天然所以能闔闢變化之理則謂之道其功用著見處則謂之神此皆就天上説及説到其命於人則謂之性率性則謂之道修道則謂之教此是就人身上説上下説得如此子細都説了可謂盡矣問忠信所以進德修業如何是乾德敬以直内如何是坤德曰忠信所以進德是健底意思是便立脚做去敬以直内是順守意思是恁地收斂做去飛卿舉聖賢所言忠信處以求其同異曰公所舉許多忠信只是一个但地頭不同直卿問乾之忠信與他處所謂忠信正猶夫子之忠恕與子思所謂違道不逺之忠恕相似曰不然此非有等級也但地頭各别耳正如伊川所謂无妄之謂誠不欺其次也不欺也是誠但是次於无妄耳先生復問道夫昨所謂如何曰先生昨所舉如好好色如惡惡臭説忠信所以進德曰只是如此何不以此思之適所舉忠信只是對人言之者乾之忠信是專在已上言之者乾卦分明是先見得這个透徹便一直做將去如忠信所以進德至可與存義也都是徑前做去有勇猛嚴厲斬截剛果之意須是見得方能恁地又如樂則行之憂則違之確乎其不可拔亦是這般剛決意思所以生知者分明是合下便見得透故其健自然如此更著力不得坤卦則未到這地位敬以直内義以方外未免𦂳帖把捉有持守底意思不似乾卦見得來透徹道夫問易傳云内積忠信所以進德也積字又也似用力如何曰正是用力不用力如何得乾卦雖如此亦是言學但乾是先知得透故勇猛嚴厲其進莫之能禦履之問易之忠信莫只是實理曰此説實理未得只是實心有實心則進德自無窮已又曰實心便是學者之闗中河内必先有此而後可以有為若无此則若存若亡而已烏能有得乎有諸已之謂信意正謂此又曰程子謂一心之中如有兩人焉將為善有惡以間之為不善又有醜恥之心此正交戰之驗程子此語正是言意不誠心不實處大凡意不誠分明是吾大賊我要上他牽下來我要前他拖教後去此最學者所宜察道夫問忠信所以進德終日乾乾君子當終日對越在天也曰此一段只是解个終日乾乾在天之剛健者便是天之乾在人之剛健者便是人之乾其體則謂之易這便是横渠所謂坱然太虚升降飛揚未嘗止息者自此而下雖有許多般要之形而上者謂之道形而下者謂之器皆是實理以時節分段言之便有古今以血氣殻體言之便有人已理卻只是一个理也㬊亞夫問進德修業復云居業修居所以不同先生曰德則日進不已業如屋宇未修則當修之既修則居之問克己復禮乾道也持敬行恕坤道也曰乾是見羣龍无首吉既變則成坤故先迷失道後順得常西南得朋東北喪朋坤則都无頭但利牝馬之貞而已所以乾卦自君子進德修業以至於知至至之可與幾也知終終之可與存義也從知處説來如坤則但是敬以直内義以方外只就持守處説只説得一截如顔子克己復禮工夫卻是從頭做起來是先要見得後卻做去大要著手脚仲弓卻只是據見成本子做只是依本畫胡蘆都不問著那前一截了仲弓也是和粹但精神有所不及顔子是大賢故通曉向時陸子靜嘗説顔子不如仲弓而今看著似乎是克己復禮底較不如那持敬行恕底較无事但克己復禮工夫較大顔子似創業之君仲弓似守成之君仲弓不解做得那前一截只據見在底道理持守將去顔子極聰明警悟仲弓儘和粹又問仲弓寛洪簡重如何見得曰也只想得是恁地夫子許他南面將南面非如此不可如不佞等處也見得他簡重而今觀他説居敬行簡之類見得他工夫也大故細密克己復禮也是有知底工夫在前主敬行恕只是據見在依本分做將去或問修辭立其誠修辭所以立其誠意非徒修飾為也若修飾則秖不誠矣平居亦當察此而聖人獨言於九三者葢當危疑之地人情之變辭危則易亢辭遜則易枉亦難乎有言矣於是焉而能修之則誠立矣並語録廣漢張氏曰修辭乃是體當自家誠意深味曾子之所謂出辭氣者則可知矣於九三言之者大抵謂君子之學如是故能盡乎處上下之道也不必云於是焉而能修之則誠立也答俞秀才東萊吕氏曰乾之九三九四皆有進德之意葢九三九四皆重剛而不中處不安之地所以能進德修業凡人之為學者若自以為安且足則終不可以求進惟君子自處於不安故終日乾乾夕惕若厲无咎是以德可進業可修孔子推明其義曰忠信所以進德也修辭立其誠所以居業也大抵為學之道當先立其根本忠信乃實德也有此實德則可以進德修業根本不立則德終不可進業終不可修譬之播種有一粒之種潛萌於地中故春可生夏可長秋可成人但患无忠信若有忠信則德何患不進業何患不修故忠信所以立本也修辭立其誠此乃下工夫處大抵人之於辭當謹其所發辭之所發貴出乎誠敬修於外而不修於内此乃巧言令色非所謂修辭所謂修辭立其誠立之一字學者最當看人之於道須當先立其根本苟根本不立則遷轉流徙必為事物所奪必不能存其誠此辭之所發所以貴立其誠而使之内外一體然後可以居業也君子居業猶百工居肆以成其事事之所以成由百工之居肆君子進德修業安可无所居乎又曰忠信本也人能本夫忠信而端慤不欺則德業當進修矣業至大也居之必有自惟修辭立誠則為居業之所凡人有所作為必先見乎辭故疾人者有忌辭怒人者有忿辭辭既修則其中可知矣誠所以立也此正學者下手處又曰知至至之可與幾也知終終之可與存義也所見无毫髪不盡然後可與幾所謂義者乃當然之理須全體是義乃可與存義若以義為善而求為之亦不可與存義矣此乃聖人始終之學如自十五而志于學便見得七十不踰矩地位自可欲之謂善便見聖而不可知之謂神地位此皆致知力行之所致也學至於此可謂盡矣聖人方且曰是故居上位而不驕在下位而不憂自常情觀此數句以聖人處之為甚易不知聖人處之實難如中庸所謂君子尊德性而道問學致廣大而盡精微極高明而道中庸乃曰居上不驕為下不倍葢聖人始終之學既盡方知其為難故乾乾因其時而惕雖危无咎此亦自然之理論聖人終始之學雖曰甚難要之皆自不安中得之在下位而不憂憂私憂也因其時而惕惕所宜惕也憂與惕兩不相闗並易説又曰忠信所以進德也有根則苗自長紀聞九四曰或躍在淵无咎何謂也子曰上下无常非為邪也進退无恒非離羣也君子進德修業欲及時也故无咎伊川先生曰或躍或處上下无常或進或退去就從宜非為邪枉非離羣類進德修業欲及時耳時行時止不可常也故云或深淵者龍之所安也在淵謂躍就所安淵在深而言躍但取進就所安之義或疑辭隨時而未可必也君子之順時猶影之隨形可離非道也易傳横渠先生曰以陽居隂故曰在淵位非所安故或以躍德非為邪故進退上下唯義所適唯時所合故曰欲及時也能如此擇義則无咎也九四以陽居隂故曰在淵能不忘於躍乃可免咎非為邪也終其義也九四曰上下无常非為邪也進退无恒非離羣也君子進德修業欲及時也此時可上可下可進可退非為邪也即是直也天道不越乎直直方大則不須習行之自无不利非為邪則是陟降庭止也進德修業欲及時即是无然畔援无然歆羨誕先登于岸也言无畔去亦无援引亦无歆向亦无羨而不為誕知登于岸耳岸所處地位也此與進无咎同意唯志在位天德而己位天德大人成性也九三九四大體相似此二時處危難之大聖人則事天愛民不恤其他誕先登于岸並易説陟降庭止上下无常非為邪也進德修業欲及時也在帝左右所謂欲及時者歟正䝉藍田吕氏曰淵者水囘旋者也水之囘旋其下必深故淵亦為深物之隨流者至於波瀾囘旋則非強有力者莫之能出矣九四上不在天下不在田中不在人進而不已自於危疑之地或躍在淵者也漢上朱氏曰九四動之五進而上也復之四退而下也故曰或躍或疑辭也謂非必也九四動正也之五不正疑為邪四臣位五君位出乎臣之類離羣也三陽為羣然上下進退无常者乃九三進德修業至是欲及時爾故進則无咎不然四近君多懼安得无咎易傳曰聖人之動无不時也易傳白雲郭氏曰上下進退皆貴有常而不變而此无常者上下進退係乎時命也孔子嘗為委吏乘田矣豈捨正道而為此哉亦豈離類敗德而為此哉不得其時而已君子進德修業欲及時是以不忘於或躍也孟子以可仕則仕可止則止為聖之時而文言以或躍為欲及時其義一也由是知魯之司冦或躍之義存焉耳九四之處不以正疑其為邪也故言非為邪龍德在下而已違之疑其離羣也故言非離羣孔子懼進不以道而退不以義者故以及時釋或躍无咎之義易説新安朱氏曰内卦以德學言外卦以時位言進德修業九三備矣此則欲其及時而進也本義或問進德修業欲及時如何曰君子進德修業不但為一身亦欲有為於天下及時是及時而進問乾卦内卦以德學言外卦以時位言否曰此正説文言六段葢雖言德學而時位亦在其中非德學何以處時位此是子曰以下分説其後卻錯雜説了又曰文言多歸聖人上説問乾九二君德也説聖人之德已備何故到九三又卻説進德修業知至至之答曰聖人逐爻取象此不是言修德節次是言居地位節次乾之六爻皆是聖人之德只所處之位不同初爻言不易乎世不成乎名云云至潛龍也已是説聖人之德了只是潛而未用耳到九二卻恰好其化已能及人矣又正是臣位所以處之而安到九三居下卦之上位已高了那時節无可做只得進德修業乾乾夕惕恐懼到九四位便乖這處進退不由我了或躍在淵躍已離乎行而未至乎飛行尚以足躍則不以足一跳而起脚不踏地跳得便上天去不得依舊在淵裏也不可知伊川道淵是龍之所安某謂不是如此田是平所在縱饒有水也卻淺淵是深處那个不可測下離乎行上近乎飛上不在天下不在田中不在人故或之或之者疑之也不似九二安穩自在此時進退只聽天矣以聖人言之這處是舜之歴試文王三分天下有其二湯武鳴條牧野之時九三是伊周地位然已自是難了看來人處大運中无一時閒跳得時便做有德无位做不徹亦不失為潛龍吉凶悔吝无一息停如大車輪一般恁地滚將去聖人只隨它恁地去看道理如何在這裏則將這道理處之在那裏則將那道理處之上下无常非為邪進退无恒非離羣是不如此只要得及時又云如此説也好並語録東萊吕氏曰九四一章須看故无咎三字凡人規行矩步自然无失若進退无常豈能无咎惟九四或躍或潛或進或退乃无咎者以其進德修業之及時也葢進德修業不可先時不可後時須識得時中之義易説又曰進德修業所以言於九三何也葢九三乾乾夕惕危懼不安之地也人惟不安然後能進苟自以為安決无進益之理紀聞九五曰飛龍在天利見大人何謂也子曰同聲相應同氣相求水流濕火就燥雲從龍風從虎聖人作而萬物覩本乎天者親上本乎地者親下則各從其類也伊川先生曰人之與聖人類也五以龍德升尊位人之類莫不歸仰況同德乎上應於下下從於上同聲相應同氣相求也流濕就燥從龍從虎皆以氣類故聖人作而萬物皆覩上既見下下亦見上物人也古語云人物物論謂人也易中利見大人其言則同義則有異如訟之利見大人謂宜見大德中正之人則其辨明言在見前乾之二五則聖人既出上下相見共成其事所利者見大人也言在見後本乎天者如日月星辰本乎地者如蟲獸草木隂陽各從其類人物莫不然也易傳雲從龍風從虎龍隂物也出來則濕氣烝然自出如濕物在日中氣亦自出雖木石之微感隂氣尚亦有氣則龍之興雲不足怪虎行處則風自生入闗語録動植之分有得天氣多者有得地氣多者本乎天者親上本乎地者親下然要之雖木植亦兼有五行之性在其中只是偏得土之氣故重濁也吕與叔録或問孝天之經何也曰本乎天者親上輕清者是也本乎地者親下重濁者是也天地之常莫不反本人之孝亦反本之謂也時氏拾遺横渠先生曰谷神能象其聲而應之非謂能報以律吕之變也猶卜筮叩以是言則報以是物而已易謂同聲相應是也王弼謂命吕者律語聲之變非此之謂也聖人作萬物覩故利見大人本乎天者親上本乎地者親下此一章止為飛龍在天而發龍虎水火之喻葢明各逐一類去本在上者卻上去本在下者卻逐下德性本得乎天者今復在天是各從其類也並易説九五大人化矣天德位矣成性聖矣故既曰利見大人又曰聖人作而萬物覩正䝉龜山楊氏曰東坡云萬物覩乃是萬物欲見之言欲見之便非聖人作而萬物覩如日在天萬物便見聖人唯恐不作作則即覩矣作與覩同時事也蕭山語録白雲郭氏曰大哉君臣之道各從其類如是之至也故湯使聘之幡然而改者商之一德之臣也聞文王興而盍歸乎來者周之同德之臣也雖求之於上應之於下在人事如此而有必應必親之道者係乎龍德之同耳易説漢上朱氏曰五變之二成巽下有伏震巽風震雷同聲相應也二動之五成兌下有伏坎兑澤坎水同氣相求也五之二兌澤流坎水流濕也二之五離火見離燥卦火就燥也五變來之二二有伏震雲從龍也二巽往之五五兌成虎風從虎也九五中正而居天位聖人作也二震為萬物離目為覩萬物覩也九五變六六本乎地故親下而見二九二應五九本乎天故親上而見五易傳曰乾之二五則聖人既出上下相見共成其事所利者見大人也易傳又坎離天地之中圖曰坎離天地之中乾坤天地鬼神也坎離日月水火也艮兌山澤也震巽風雷也坎離震兌四時也坎離為天地之中也聖人得天地之中則能與天地日月四時鬼神合先天而天弗違聖人即天地也後天而奉天時天地即聖人也聖人與天地為一是以作而萬物覩同聲相應震巽是也同氣相求艮兌是也水流濕火就燥坎離是也雲從龍風從虎有生有形各從其類自然而已圖説新安朱氏曰作起也物猶人也覩釋利見之意也本乎天者謂動物本乎地者謂植物物各從其類聖人人類之首也故興起於上則人皆見之本義飛龍在天利見大人文言分明言同聲相應同氣相求水流濕火就燥雲從龍風從虎聖人作而萬物覩他分明是以聖人為龍以作言飛以萬物覩解利見大人只是言天下利見夫大德之君也今人郤别做一説恐非聖人本意語録東萊吕氏曰大凡聲不同則不相應氣不同則不相求物各從其類聖人與萬物非相類然聖人一作而萬物皆覩葢聖人萬物皆備於我故一作而萬物皆覩言萬物各以同聲同氣相從如水不流燥火不就濕雲不從虎風不從龍以其聲氣之異也聖人通天下之聲為一聲不見有異聲故无一聲之不相應通天下之氣為一氣不見有異氣故无一氣之不相求所以一出而萬物咸覩彼本乎天者親上不親乎下本乎地者親下不親乎上豈若聖人備萬物於我徧為萬物之類乎聖人作而萬物覩若以爻體觀之則同聲相應同氣相求至上下皆親固其常理然此何預學者事學者須詳體此意廣而推之吾胷中自有聖人境界吾能反而求之則當有應之者如克己復禮天下歸仁之意是也易説上九曰亢龍有悔何謂也子曰貴而无位高而无民賢人在下位而无輔是以動而有悔也伊川先生曰九居上而不當尊位是以无民无輔動則有悔也易傳横渠先生曰亢而自喪之也易説亢龍以位畫為言若聖人則不失其正何亢之有正䝉白雲郭氏曰貴而非其位不知退也高而无其民不知喪也賢人謂九三也九三之德知幾夕惕與此異矣德既不同則在下不應不為輔也動不知止其悔宜矣易説漢上朱氏曰九居上處極貴而失尊位无位也王弼謂初上无位誤也三變成坤坤為衆民也三不變高而无民也賢人九三剛正也不變以應之賢人在下位而上无輔也故動則有悔貴高而盈亢則窮也爻辭曰大人文言曰聖人聖人有大之極而不為其大大而化也易傳新安朱氏曰賢人在下位謂九五以下无輔以上九過高志滿不來輔助之也此第二節申象傳之意本義問王弼説初上无隂陽定位如何先生曰伊川説隂陽竒耦豈容无也乾上九貴而无位需上六不當位乃爵位之位非隂陽之位此説極好語録東萊吕氏曰過中則亢中不可過上過五故亢日中則􅉴月盈則食亢之理也賢者過之亦是道術之亢若清虚絶滅之學所見非不自高然至於无位无民无輔則皆不可用易无所不載故此亦可以言亢易説上九賢人在下位而无輔葢上九窮高極亢不能下賢所以賢人在下位而不輔之也紀聞合訂刪補大易集義粹言卷三
