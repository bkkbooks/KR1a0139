body:
  text: 合訂刪補大易集義粹言卷五十七頭等侍衛納喇性徳編艮下巽上伊川先生曰漸序卦艮者止也物不可以終止故受之以漸漸者進也止必有進屈伸消息之理也止之所生亦進也所反亦進也漸所以次艮也進以序為漸今人以緩進為漸進以序不越次所以緩也為卦上巽下艮山上有木木之髙而因山其髙一有而字有因也其髙有因乃其進有序也所以為漸也易傳漸女歸吉利貞伊川先生曰以卦才兼漸義而言也乾坤之變為巽艮巽艮重而為漸在漸體而言中二爻交也由二爻之交然後男女各得正位初終二爻雖不當位亦陽上隂下得尊卑之正男女各得其正亦得位也與歸妹正相對女之歸能如是之正則吉也天下之事進必以一作有漸者莫如女歸臣之進於朝人之進於事固當有序不以其序一作漸則陵節犯義凶咎隨之然以義之輕重㢘恥之道女之從人最為大也故以女歸為義且男女萬事之先也一有利貞字諸卦多有利貞而所施或不同有渉不正之疑而為之戒者有其事必貞乃得其宜者有言所以利者以其有貞也所謂渉不正之疑而為之戒者損之九二是也處隂居説故戒以宜貞也有其事必貞乃得宜者大畜是也言所畜利於貞也有言所以利者以其有貞者漸是也言女歸之所以吉利於如此貞正也盖其固有非設戒也漸之義宜能亨而不云亨者盖亨者通達之義非漸進之義也易傳横渠先生曰漸者天地之施一作始交女歸吉進得位皆指六四易説白雲郭氏曰漸之進不速而不已也天地之道進皆有漸况人乎舉人道而言之則進之漸者无若女之歸也女歸不以漸則奔也漸則為歸速則為奔故女歸以漸為吉也凡天下之進如女歸之漸无不吉也利貞者女歸之道正也固守之无不利矣然聖人制昬禮有納采問名納吉納徵請期之節其禮為尤備是以知其漸也鴻之進也有于干于磐于木于陸之漸豈不猶女歸之禮乎故卦辭言女歸而爻明鴻漸其義一也伊川曰諸卦多言利貞而所施或不同有渉不正之疑而為之戒者損之九二是也處隂居説故戒以宜貞也有其事必貞乃得其宜者大畜是也言所畜利於貞也有言所以利者以其有貞漸是也言女歸之所以吉而利者以如此貞也易説漢上朱氏曰易傳曰乾坤之變為巽艮巽艮重而為漸在漸體而言中二爻交也由二爻之交然後男女各得正位觀此則伊川亦用卦變矣叢說新安氏朱曰漸漸進也為卦止於下而巽於上為不遽進之義有女歸之象焉又自二至五位皆得正故其占為女歸吉而又戒以利貞也本義彖曰漸之進也女歸吉也進得位徃有功也進以正可以正邦也其位剛得中也止而巽動不窮也伊川先生曰如漸之義而進乃女歸之吉也謂正而有漸也女歸為大耳它進亦然漸進之時而隂陽各得正位進而有功也四復由上進而得正位三離下而為上遂得正位亦為進得位之義一有是徃而有功也六字以正道而進可以正邦國至於天下也凡進於事進於徳進於位莫不皆當以正也上云進得位徃有功也統言隂陽得位是以進而有功復云其位剛得中也所謂位者五以剛陽中正得尊位也諸爻之得正亦可謂之得位矣然未若五之得尊位故特言之内艮止外巽順止為安靜之象巽為和順之義人之進也若以欲心之動則躁而不得其漸故有困窮在漸之義内止静而外巽順故其進動不有一作至困窮也並易傳藍田吕氏曰漸徐進而不廹也艮止於下巽進而上不可以速故其進徐也女子之歸必待父母之命媒妁之言備禮以聘然後行故以漸進為吉君子之難進亦斯道也君子以漸進累其功小人以漸進養其姦故進以正然後利也進以正故累功可以正邦也得位得中故正而有功止而又巽无過越亢滿之憂故其動無窮白雲郭氏曰彖言漸之進如女之歸則吉所以明卦辭也盖世俗多失漸進之道獨女歸有漸存焉耳進得位者先明女歸之漸而後言人之進也凢人之進以漸得位則徃有功盖其進鋭者其退必速是以无功也進既以漸又能以正則可以正邦所謂不能正其身如正人何也凡進以漸者必不失正進不以漸而失正者多矣故孔子於漸進之時又并進以正而言之也其位剛得中者言五之徳也止而巽動不窮者言漸以止巽而動是以其進不窮也易說漢上朱氏曰漸否一變三之四成卦九四之剛下柔六三之柔上進漸柔之進也故曰漸之進也此以否六三之四言漸也女謂嫁曰歸自内之外也三坤之四成巽女徃也四乾之三成艮男下女也艮男下女然後巽女徃而進艮陽居三巽隂居四男女各得其正矣夫漸之進不一也臣之進於君人之進於事學者之進於道君子之進於徳未有犯分躐等而能進者而漸専以女歸為義者禮義㢘恥之重天下國家之本无若女之歸也故娶妻者非媒則不得非卜筮則不従納采問名納吉納成請期親迎莫不以漸女子之嫁也母醮之房中父命之阼階諸母戒之兩階之間三月廟見而後成婦亦必以漸如是而歸則正正則吉故曰漸女歸吉利貞彖曰女歸吉也言女歸之所以吉者利於貞也此以三四易位各得其正言漸之進也易傳曰在漸體而言中二爻交也横渠亦曰九三六四易位而居盖後之傳易者自伊川横渠二先生漸以卦變言之矣漸之進其徳有四進得位徃有功也進以正可以正邦也其位剛得中也止而巽動不窮也四者隂之位六徃居之得位也位者待才用之宅進而不得其位則无所施位過其才則力不勝進而得位徃必有功故曰進得位徃有功也四者諸侯之位坤土在上為邦君子之進正己而已己不正未有能正人者其始不正終必不正三以正進四以正交則四爻皆正邦國正也猶女得所歸男女既正家道不期於正而自正故曰進以正可以正邦也此兩者以六居四言漸也或曰剛得中謂九五誤也在九五當曰剛中而應如无妄萃是也當曰中正而應如同人是也此謂九三也剛陽徳也其位在六爻為一三五二始進也五進已極三得中也已極則不復進矣太𤣥曰月闕其膞不如開明於西剛得中其進未極漸如是可進矣故曰其位剛得中也此以九三言漸也内艮止也外巽巽也易傳曰人之進也以欲心之動躁而不得其漸則有困窮矣在漸之義内止靜而外巽順其動不窮也故曰止而巽動不窮也動言三四動動而正所以不窮此以兩體二爻言漸也在卦氣為正月故太𤣥凖之以銳易傳新安朱氏曰之字疑衍或是漸字可以正邦也以卦變釋利貞之意盖此卦之變自渙而來九進居三自旅而來九進居五皆為得位之正剛得中以卦體言謂九五也動不窮以卦徳言漸進之義本義象曰山上有木漸君子以居賢徳善俗伊川先生曰山上有木其髙有因漸之義也君子觀漸之象以居賢善之徳化美於風俗人之進於賢徳必有其漸習而後能安非可陵節而遽至也在已且然教化之於人不以漸其能入乎移風易俗非一朝一夕所能成故善俗必以漸也易傳横渠先生曰居可久之徳難從无徵之徳君子不以責人君子以賢徳自居不强率人待其心回故善俗自然一作不可推行无徵難従之徳易說藍田吕氏曰山上有木逮其成林長養有漸矣君子之處賢徳使成美材善風俗使成美俗其長養亦有漸也白雲郭氏曰合抱之木生於毫末則木之生未嘗不以漸也有山之髙而木生焉故其髙无窮猶漸之進其進有道故亦不窮也進之道何如止而巽是也先有所止不為妄進巽而入之則有漸矣居賢徳先有所止也善俗巽而入之也徳非一日可成也俗非一日可善也居賢徳善俗又漸之義也居賢徳而後善俗盖先自治而後治人彖所謂進以正可以正邦之道也易以巽主風教故此言善俗易説漢上朱氏曰山上有木止於下漸於上也君子進徳以漸善俗亦以漸九五易而可久賢人之徳也居賢徳則安之而不動矣居亦止也坤為民坎險也民險者惡俗之象然二三四正正為善艮止也君子在上進徳以漸安其徳而不動則惡俗自善險者漸正矣善俗之道也王肅本作善風俗易傳新安朱氏曰二者皆當以漸而進疑賢字衍或善字下有脱字本義山上有木木漸長則山漸高所以為漸語錄初六鴻漸于干小子厲有言无咎象曰小子之厲義无咎也伊川先生曰漸諸爻皆取鴻象鴻之為物至有時而羣有序不失其時序乃為漸也干水湄水鳥止於水之湄水至近也其進可謂漸矣行而以時乃所謂漸漸一无漸字進不失漸得其宜矣六居初至下也隂之才至弱也而上无應援以此而進常情之所憂也君子則深識逺照知義理之所安時事之所宜處之不疑小人幼子唯能見已然之事従衆人之一有所字知非能燭理也故危懼而有言盖不知在下所以有進也用柔所以不躁也无應所以能漸也於義自无咎也若漸之初而用剛急進則失漸之義不能進而有咎必矣雖小子以為危厲在義理實无咎也並易傳横渠先生曰鴻為水鳥漸進之始出至於干鴻鵠之志非小子所量見其出陸爭欲危之且疑其所處非君子信已而行義无咎也易説藍田吕氏曰漸六爻皆以鴻喻鴻集于澤其飛戾天其進必有漸矣然漸于干于磐于陸于木于陵皆謂所集而止之之地亦有漸也干水濵也磐水濵之石也陸於田之逺乎水者也初六以隂居下在水之濵也方進之始柔弱无應又位乎底下所比所應皆隂柔之質志不相得必忌其進故曰小子厲有言然在止之初其進以正人雖咎已義无咎也白雲郭氏曰易以象言之則一卦一爻之内天地萬物无不具焉聖人或取諸身或取諸物獨能舉其一以明之耳理不能盡也如艮則取諸身漸則取諸鴻非艮之象不在物而漸之象不在人也故卦言女歸彖言進位爻言鴻漸互相𤼵明无嫌於不同也世之論象者率拘於説卦已言八卦之象其所不言者不能明也況六十四卦之象古人未甞明言之且震為龍而乾稱龍乾為馬而坤稱馬坤為牛而離稱牛皆非説卦之象八卦无鴻而漸稱鴻故知易之取象天地萬物无不具聖人亦不能盡言姑舉八卦之畧使後世知所謂象者如此貴夫觸類而長之也鴻漸于干者鴻水鳥也干水涯也言進之漸未逺於水也君子能安於漸也小子細人也志務速進故以漸為厲危之而有言是不知在漸之初未能逺進者其於君子之義无咎也何危之有易説漢上朱氏曰初動離為飛鳥坎為水之二巽為進退水鳥而能進退者鴻也二坎水之涯干也三艮為少男小子也初之二艮變兊兊為口小子有言也初在下柔而无應自小子見之以為危厲者也不知在下所以有進之漸君子之柔其動也剛離隠處卑非援乎上也於義无咎夫明夷之初君子于行則主人有言漸之初鴻漸于干則小子厲有言進退之初非深識逺照不能處之而不疑豈常情之能窺測哉故曰君子所為衆人固不識也易傳又曰漸有進退之象故諸爻以鴻明之叢說新安朱氏曰鴻之行有序而進有漸干水涯也始進於下未得所安而上復无應故其象如此而其占則為小子厲雖有言而於義則无咎也本義六二鴻漸于磐飲食衎衎吉象曰飲食衎衎不素飽也伊川先生曰二居中得正上應於五進之安裕者也但居漸故進不速磐石之安平者江河之濵所有象進之安自干之磐又漸進也二與九五之君以中正之道相應其進之安固平易莫加焉故其飲食和樂衎衎然吉可知也爻辭以其進之安平故取飲食和樂為言夫子恐後人之未喻又釋之云中正君子遇中正之主漸進於上将行其道以及天下所謂飲食衎衎謂其得志和樂不謂空飽飲一无飲字食而已素空也並易傳横渠先生曰衎衎和樂貌飲食和樂不徒飽而已言獲志之多也易説藍田吕氏曰六二柔得中則所居安故曰鴻漸于磐應乎剛則所養充故曰飲食衎衎漸至六二養道始備故不素飽白雲郭氏曰磐石之可安者自干而磐已獲安矣飲食衎衎盖君臣相遇安而和樂也與詩所謂嘉賔式燕以衎同意漸進之道見於得君之禄安樂飲食雖小子亦無危厲之言是以吉也不素飽者不素餐之謂也伊川曰不素飽者君子漸進於上将行其道以及天下豈徒空飽飲食而已乎而王輔嗣謂本无祿養進而得之其為歡樂願莫先焉孔氏因之曰素故也故无祿養今日得之故願莫先也觀此益見伊川先生造次不忘於道二子所養如此而已昔孟子謂樂正子曰我不意子學古之道而以餔啜也飲食之事疑於餔啜故孔子言不素飽之義以明之而二子以得禄飬為歡樂豈不異哉易說漢上朱氏曰自二至五有巽離坎鴻之象二之五坎變巽為艮艮坎為石巽為髙坤為平石髙且平磐也磐大石也五之二坎變兊坎為水飲也兊為口食也兊為和説衎衎而樂也二五以中正相應進而安裕飲食衎衎而樂詩鹿鳴是也巽為目離為大腹二之五巽離毁不素飽也素飽者无功食祿徒飽也君子之進豈飲食而已哉上則道行於君下則澤加於民不徒飽也易傳新安朱氏曰磐大石也漸逺於水進於磐而益安矣衎衎和樂之意六二柔順中正進以其漸而上有九五之應故其象如此而占則吉也素飽如詩言素飱得之以道則不為徒飽而處之安矣本義九三鴻漸于陸夫征不復婦孕不育凶利禦冦象曰夫征不復離羣醜也婦孕不育失其道也利用禦冦順相保也伊川先生曰平髙曰陸平原也三在下卦之上進至于陸也陽上進者也居漸之時志将漸進而上无應援當守正以俟時安處平地則一无則字得漸之道若或不能自守欲有所牽志有所就則失漸之道四隂在上而宻比陽所説也三陽在下而相親隂所從也二爻相比而无應相比則相親而易合无應則无適而相求故為之戒夫陽也夫謂三三若不守正而與四合是知征而不知復征行也復反也不復謂不反顧義理婦謂四若以不正而合則雖孕而不育盖非其道也如是則凶也三之所利在於禦寇非理一作禮而至者寇也守正以閑邪所謂禦寇也不能禦寇則自失而凶矣夫征不復則失漸之正従欲而失正離叛其羣類為可醜也卦之諸爻皆无不善若獨失正是離其羣類婦孕不由其道所以不育也所利在禦寇謂以順道相保君子之與小人比也自守以正豈惟君子自完其己而已乎亦使小人得不陷於非義是以順道相保禦止其惡故曰禦寇並易傳横渠先生曰漸卦九三六四易位而居三離上卦四離下體故曰夫征不復婦孕不育然相與之固物莫能閒故利用禦寇也征不復者變為艮且得位也如六四之得桷三四非正合故曰失其道也易説藍田吕氏曰九三居下卦之上地不髙而逺乎水故曰陸與初六六二同處艮體舍之而求巽之六四既无正應其行不及四以近比其偶不正不正之偶既不孕何由育夫不夫婦不婦凶之道也同舟而濟胡越无異心雖非其正猶利禦寇三與四同順而相保也白雲郭氏曰初二之進也有漸而三則自任以剛其進欲速失漸之道是以致凶爾雅髙平曰陸自水而至於陸進之甚逺故有夫征不復之象進而比四不正之婦也故曰婦孕不育凶然九三之才有進无退患在失中獨用以禦寇則利也離羣醜者舍初二同體而進也失其道者比四之不正失漸之道也非所謂進以正可以正邦者也順相保者禦寇所以保其類也初二隂柔順九三之相保也䝉之上九利禦寇與漸九三同義盖它无所用獨可禦冦而已蒙之象言上下順者以己獨處上衆皆順之也此言順相保者初二順而相保而已易説漢上朱氏曰三至二有坎離巽鴻之象三艮為山四變三為坤坤為平地髙者平矣陸之象鴻離于水漸進于陸三若守正待時而不妄動則得漸之道三四无應隂陽相比而易合守正者戒之横渠曰漸至九三六四易位而居坎為夫離為婦為大腹征以正行也三不守正而合四夫征不復也夫征不復者以離羣醜也三隂爻為羣隂為醜言不正則離乎羣衆而往不能反也四不守正而合三則離毁矣婦孕不育也婦孕不育者不以正合而失其交之道也夫人所以致非道之交者罔不自已求之我无隙以乗之彼何自來乎故三不動則四坤不來矣君子自守其正不惟君子无失已之累而小人亦不陷於非義是以順相保利用禦冦之道坎為盜離為戈兵冦也象以三為君子又以坎為冦者反以戒三也坤為順各得其正順相保也易傳新安朱氏曰鴻水鳥陸非所安也九三過剛不中而无應故其象如此而其占夫征則不復婦孕則不育凶莫甚焉然以其過剛也故利禦冦本義漸九三爻雖不好夫征不復婦孕不育却利禦冦今術家擇日利婚姻底日不宜用兵利相戰底日不宜婚媾正是此意盖用兵則要相殺相勝婚姻則要和合故用不同也象曰順相保也言須是上下同心協力相保聚方足以禦寇語録六四鴻漸于木或得其桷无咎象曰或得其桷順以巽也伊川先生曰當漸之時四以隂柔進據剛陽之上陽剛而上進豈能安處隂柔之下故四之處非安地如鴻之進一作漸于木也木漸髙矣一无矣字而有不安之象鴻趾連不能握枝故不木棲桷横平之柯唯平柯之上乃能安處謂四之處本危或能自得安寧之道則无咎也如鴻之於木本不安或得平柯而處之則安也四居正而巽順宜无咎者也必以得失言者因得失以明其義也桷者平安之處求安之道唯順與巽若其義順正其處卑巽何處而不安如四之順正而巽乃得桷也並易傳横渠先生曰木非鴻所居如四之易位而在上也然本坤之爻進而為巽故或得其桷居之可安也順巽則衆所與也故得所安易説藍田吕氏曰六四居上體之下髙於陸而下於陵故漸于木漸進之時以柔居隂其進愈緩姑求所安順以巽焉不敢擇也故曰鴻漸于木或得其桷无咎鴻非集木之鳥雖得其桷非所安也桷木枝中乎桷者也白雲郭氏曰六四隂柔才有不足乗九三之剛従而比之非所安也故有于木之象桷平衡之柯或得則可安矣安則无咎象言順以巽者當不安之際惟巽與順可得安寧故也巽權道也繫辭曰巽以行權然六四順以巽終為无咎之爻而先言于木不安之象者盖六四之象有失有得獨言其得則人将莫知其失而不慎始者多矣聖人雖取其善終又欲人之善始是以兼明其失得也易説漢上朱氏曰六四之柔進而介於二剛之間猶鴻漸于木也鴻足蹼不能握木漸于木非所安之地四離飛鳥而有坎巽鴻之象巽為木漸于木也然上承五以巽事之下得三以順接之得所止焉惟順以巽故介於二剛之間得位而无咎猶或得其桷也桷椽之方者巽為長木艮為小木離為麗坤為方木小而方可麗於長木木之材中乎椽桷者也易傳曰横平之柯也易傳新安朱氏曰鴻不木棲桷平柯也或得平柯則可以安矣六四乗剛而順巽故其象如此占者如之則无咎也本義九五鴻漸于陵婦三嵗不孕終莫之勝吉象曰終莫之勝吉得所願也伊川先生曰陵髙阜也鴻之所止最髙處也象君之位雖得尊位然漸之時其道之行固亦非遽與二為正應而中正之徳同乃隔於三四三比二四比五皆隔其交者也未能即合故三嵗不孕然中正之道有必亨之理不正豈能隔害之故終莫之能勝但其合有漸耳終得其吉也以不正而敵中正一時之為耳久其能勝乎君臣以中正相交其道當行雖有間其間者終豈能勝哉徐必得其所願乃漸之吉也並易傳藍田吕氏曰九五進居尊位其地髙矣故曰漸于陵與六二為應而三四間之故婦三嵗不孕中正而應雖暫為所間卒得所願故終莫之勝吉白雲郭氏曰陵髙阜也君之象也二五正應君臣同中正之徳宜其吉矣然猶三嵗不孕者以三四為之間故也四不能間五而能間二九三禦冦之才足以間五然君臣同徳有間終合故終莫之勝也雖九五之尊猶有三嵗之久者亦為之以漸故也三言夫征不復五言婦三嵗不孕以卦辭言女歸吉故以夫婦為言易説漢上朱氏曰二至五有坎離巽鴻之象五巽為髙二艮為山二之五自山而進於髙復有山焉陵也大阜曰陵二進於五得尊位也鴻水鳥進至於陵其位髙矣然非所樂君子之樂王天下不與存焉故曰鴻漸于陵巽為婦離為大腹乾為嵗二五相易二至五歴三爻離毁巽見婦三嵗不孕漸之時道未可遽行其功未見於上下之間以三四相比而勝之也二艮為土三四為震木勝之五巽為木三四為兊金勝之勝之則四比五三比二而君臣離矣然二五相應中正之徳同其合乃中心之所願欲豈三四所能間哉其行有漸功成而復其所則孕矣故終莫之勝吉正也易傳又曰虞謂三動離毁上之三成既濟誤也九五婦三嵗不孕者天地不交之時六四柔進得位徃有功則既交矣六四婦貞九五之所願得也如明夷上六初登于天離明出地上以明後入于地此之謂曲而當又曰九五言陵亦借否象言之艮為山巽為髙大阜之象並叢説新安朱氏曰陵髙阜也九五居尊六二正應在下而為三四所隔然終不能奪其正也故其象如此而占者如是則吉也本義上九鴻漸于陸其羽可用為儀吉象曰其羽可用為儀吉不可亂也伊川先生曰安定胡公以陸為逵逵雲路也謂虚空之中爾雅九達謂之逵逵通達无阻蔽之義也上九在至髙之位又益上進是出乎位之外在它時則為過矣於漸之時居巽之極必有其序如鴻之離所止而飛於雲空在人則超逸乎常事之外者也進至於是而不失其漸賢達之髙致也故可用為儀法而吉也羽鴻之所用進也以其進之用況上九進之道也君子之進自下而上由微而著跬歩造次莫不有序不失其序則无所不得其吉故九雖窮髙而不失其吉可用為儀法者以其有序而不可亂也並易傳横渠先生曰无應於下羽潔无汙且處於髙故曰漸陸易説藍田吕氏曰上九居上體之上然居巽之極復漸于陸與下體同進退雍容其序而不亂者也其羽可用為儀吉儀謂可則而象之也白雲郭氏曰先人言陸當作逵逵者九達之衢雍曰漸進之極至是无所不通矣安與樂皆不足以盡之漸之六爻其辭皆聲音相協故初則干言二則磐衎三則陸復育四則木桷五則陵孕勝如此則上九為逵儀明矣具羽可用為儀者九達之地非止十目所視而已通道大都人之瞻仰者衆莫不以為儀表也漸進之吉孰大於是羽者外見之羙故人可則而象之也不可亂者至美外見獨異於衆人故人莫得而亂之也易説漢上朱氏曰鴻漸于陵已髙矣又升而至於上窮而不知反則亢是以君子不居焉進九三之賢升之於上已變而退之三艮為山上動之三成坤艮山變坤為平地陸也自下進上漸也上反三亦曰漸者進退相為用无退則无進之漸一進一退其動不窮矣離巽飛類也剛羽翰也柔其毛也九三之上成巽羽剛爻也所貴乎君子者謂其進退不失其時上九進退有序不失其時可用為儀也三隂爻羣也上九變而正退處而順不亂羣也亦可用為儀吉易傳又曰安定胡先生以陸作逵案虞氏所傳之象上之三成既濟三陸也夫上之所生者進也所反者亦進也兹所以動而不窮歟漸至九五極矣進至上九亢矣是以上反而之三然後安處考之鴻象坎象既退自南而北嚮之時也宜以陸為正或曰鴻漸至此千里之舉也曰不然鴻飛𠖇𠖇潔身而去之象也非漸也又曰上九極矣而言陸者明進退也並叢説新安朱氏曰胡氏程氏皆云陸當作逵謂雲路也今以韻讀之良是儀羽旄旌纛之飾也上九至髙出乎人位之外而其羽毛可用以為儀飾位雖極髙而不為无用之象故其占為如是則吉也不可亂者漸進愈髙而不為无用其志卓然豈可得而亂哉本義合訂刪補大易集義粹言卷五十七
