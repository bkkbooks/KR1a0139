body:
  text: 合訂刪補大易集義粹言易類提要臣等謹案合訂刪補大易集義粹言八十卷國朝納喇性徳編性徳字容若正黄旗滿洲康熙進士官至頭等侍衛是書乃性徳取宋陳友文大易集義曽穜大易粹言二書而合輯之者也友文書本六十四卷所集諸儒之説凡十八家又失姓名兩家穜書本七十卷所集諸儒之説凡七家以二書相校複重外集義視粹言實多得十一家惟粹言有繫辭説卦序卦襍卦而集義止於上下經故所引未能賅備性徳因於十一家書中擇其講論繫辭以下相發明者一一采集與粹言合編都為一書又為之刪其繁蕪補其闕漏勒成八十卷刋入通志堂經解之末今粹言尚有𫝊本已著於録集義流播較稀惟藉此以獲見其槩其中理數兼陳不主一説而宋代諸儒之微言精義實已蒐採無遺朱彞尊嘗謂其擇言精語焉詳庶幾有大醇而無小疵雖揄揚不無稍溢要其網羅排比􅁵然有章實便於後學之循覽固可與本書並行而不廢也乾隆四十六年二月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:1796283fc281b97101891ca2bfcc0f3e920425db61354d0dc514a459b3ab71c7
