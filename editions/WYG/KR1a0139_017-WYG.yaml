body:
  text: 合訂刪補大易集義粹言卷十五頭等侍衛納喇性徳編乾下坤上康節先生曰皇帝王伯者聖人之時也易詩書春秋者聖人之經也時有消長經有因革時有消長否泰盡之矣經有因革損益盡之矣否泰盡而體用分損益盡而心迹判體與用分心與迹判聖人之事業於是乎備矣觀物内篇又曰乾坤交而為泰變而為雜卦也觀物外篇伊川先生曰泰序卦履而泰然後安故受之以泰履得其所則舒泰泰則安矣泰所以次履也為卦坤隂在上乾陽居下天地隂陽之氣相交而和則萬物生成故為通泰易傳東萊吕氏曰履而泰然後安故受之以泰此最宜詳味履所履也履而不安則俯仰有愧安得泰易說泰小往大來吉亨康節先生曰諸卦不交於乾坤者則生於否泰否泰乾坤之交也觀物外篇伊川先生曰小謂隂大謂陽往往之一作居於外也來來居於内也陽氣下降隂氣上交也隂陽和暢則萬物生遂天地之泰也以人事言之大則君上小則臣下君推誠以任下臣盡誠以事君上下之志通朝廷之泰也陽為君子隂為小人君子來處於内小人往處於外是君子得位小人在下天下之泰也泰之道吉而且亨也不云元吉元亨者時有汙隆治有小大雖泰豈一槩哉言吉亨則可包矣易傳新安朱氏曰泰通也為卦天地交而二氣通故為泰正月之卦也小謂隂大謂陽言坤往居外乾來居内又自歸妹來則六往居四九來居三也占者有剛陽之徳則吉而亨矣本義彖曰泰小往大來吉亨則是天地交而萬物通也上下交而其志同也内陽而外隂内健而外順内君子而外小人君子道長小人道消也康節先生曰天與人相為表裏天有隂陽人有邪正邪正之由繫乎上之所好也上好徳則民用正上好佞則民用邪正邪之由有自來矣雖聖君在上不能无小人是難其為小人雖庸君在上不能无君子是難其為君子自古聖君之盛未有如唐堯之世君子何其多邪時非无小人也是難其為小人也故君子多也所以雖有四凶不敢肆其惡自古庸君之盛未有如殷紂之世小人何其多邪時非无君子也是難其為君子也故小人多也所以雖有三仁不能遂其善是知臣擇君君擇臣者是繫乎人也君得臣臣得君者是非繫乎人也繫乎天者也觀物内篇又曰樵者問漁者曰小人可絶乎曰不可君子禀陽正氣而生小人禀隂邪氣而生无隂則陽不成无陽則隂不成无小人則君子亦不成唯以盛衰乎其間也陽六分則隂四分隂六分則陽四分隂陽相半則各五分矣由是知君子小人之時有盛衰也治世則君子六分君子六分則小人四分小人固不勝君子矣亂世則反是君君臣臣父父子子兄兄弟弟夫夫婦婦謂各安其分也君不君臣不臣父不父子不子兄不兄弟不弟夫不夫婦不婦謂各失其分也此則由世治世亂使之然也君子常行勝言小人常言勝行故治世則篤實之士多亂世則縁飾之士衆篤實鮮不成事縁飾鮮不敗事多成國興多敗國亡家亦由是而興亡也夫興家興國之人與亾國亡家之人相去一何逺哉邵子外書伊川先生曰小往大來隂往而陽來也則是天地隂陽之氣相交而萬物得遂其通泰也在人則上下之情交通而其志意同也陽來居内隂往居外陽進而隂退也乾健在内坤順在外為内健而外順君子之道也君子在内小人在外是君子道長小人道消所以為泰也既取陰陽交和又取君子道長陰陽交和乃君子之一无之字道長也並易傳龜山楊氏曰往自内出也來自外至也陽大而陰小小者未往則陰為内主陽无自而到故小往而後大來否反泰者也故大往而後小來亦若是而已此陰陽之義君子小人進退之象也小人在内而能進君子者未之有也夫天地交則氤氲而化醇故萬物通上下交則貴貴尊賢之義明故其志同内陽而外陰以二體言也内健而外順以卦之才言也内君子而外小人君子道長小人道消以卦之時言也有其體而後有以成其才有其才而後有以御其時三者備則泰之為泰而吉亨之義盡於此矣易説兼山郭氏曰凡陽稱大陰稱小小者已往大者當來往者屈而來者伸則陽來而變陰上順而從下也其始也天氣下降地氣上騰故天地交其終也陽進而隂順故上下交夫天地交萬物生人道交功勲成凡賦形於天地受氣於陽隂无不泰也泰者主人道而言是以言君子道長小人道消也易說白雲郭氏曰泰通之大者也通不足以盡之故曰泰小大云者乾為大坤為小陽為大隂為小君上為大臣下為小君子為大小人為小總衆類而言之故特曰大小也三隂升而往三陽降而來故曰小往大來陽來故吉道交故亨天地交萬物之泰也上下交人道之泰也其志同者君臣同心同徳以泰天下者也内陽而外隂天地之道泰也内健而外順乾坤之道泰也内君子而外小人天下國家之道泰也消長者有漸之辭易說漢上朱氏曰小者自内而往大者自外而來隂陽之氣往來相交故亨交以正故吉吉亨者吉以亨也以天地言之乾坤交而成震震萬物通也天地之泰也以上下言之上下交而二五不失中其志同也君臣之泰也不交則不通不同則不交此再言泰小往大來所以吉亨也以氣言之内陽而外隂則通以徳言之内健而外順則通以天下言之内君子而外小人則通泰者通而治也是故君子内則其道日長小人外則其道日消如是乃能存泰而不入於否矣闗子明曰乾來内坤往外則君子闢小人闔故名之曰泰反是名之曰否作易者其闢君子而通小人之闔也故以君子名其卦在卦氣為正月故太𤣥凖之以達交易傳新安朱氏曰論隂陽各有一半聖人於泰否只為陽說道理看來聖人出來做須有一箇道理使得天下皆為君子世間人多言君子小人常相半不可太去治他急迫之却為害不然如舜湯舉皋陶伊尹不仁者逺自是小人皆不敢為非被君子夾持得皆革面做好人了語䤸東萊吕氏曰内陽外隂内健外順則兩得其處使陽在外則迫隂在内則暗弱矣内君子外小人則小人趨事赴功反為君子所役初不必去小人也葢内外止隔一壁在處之如何耳易說又曰泰内健而外順否内柔而外剛何也乾健也坤順也否則上下不交有天地之形而无乾坤之用故不言健順己丑課程象曰天地交泰后以財成天地之道輔相天地之宜以左右民伊川先生曰天地交而隂陽和則萬物茂遂所以泰也人君當體天地通泰之象而以財成天地之道輔相天地之宜以左右生民也財成謂體天地交泰之道而財制成其施為之方也輔相天地之宜天地通泰則萬物茂遂人君體之而為法制使民用天時因地利輔助化育之功成其豐美之利也如春氣發生萬物則為播殖之法秋氣成實萬物則為收斂之法乃輔相天地之宜以左右輔助於民也民之生必頼君上為之法制以教率輔翼之乃得遂其生養是左右之也易傳李嘉仲問裁成天地之道輔相天地之宜如何曰天地之道不能自成須聖人裁成輔相之如嵗有四時聖人春則教民播種秋則教民收穫是裁成也教民耡耘灌溉是輔相也又問以左右民如何古之盛時未嘗不教民故立之君師設官以治之周公師保萬民與此卦言左右民皆是也後世未嘗教民任其自生自育只治其鬬而已唐棣所編廣平游氏曰財成天地之道猶言燮理隂陽也輔相天地之宜猶言寅亮天地也寅亮者事功之所及如羲和之職是也此體天地交泰之事也至於燮理則非體道之全而與天地相流通者不足以與此此體天地交泰之道也財者節其過也猶言範圍成者補其虧也猶言彌綸範之使有常則日月无薄蝕陵谷无遷易四時常若風雨常均若此者範之者也圍之使无踰則春无淒風秋无苦雨冬无愆陽夏无伏隂若此者圍之者也彌之使不虧其體則覆燾者統元氣持載者統元形陽敷而能生隂肅而能成夫是之謂彌綸之使无失其叙則日月代明寒暑迭運將來者進成功者退夫是之謂綸易說龜山楊氏曰天地之氣交通成和泰之象也先王財成輔相體此道而已苟无是道雖有周公之法不行矣易說兼山郭氏曰復隂上而陽下隂往而陽來亦可以謂之交乎不可也復陽來而未中也臨四隂已用二陽當來亦可以謂之交乎未可也臨陽進而未壯也至於泰則上下中而隂陽分小者往而大者來是以謂之交也葢天施復於子地化紐於丑人生自寅成於申故子為天正丑為地正寅為人正自子至寅三陽生而三才之道備故泰者可以修人事以奉天時之時也故曰天地交泰后以財成天地之道輔相天地之宜以左右民后君也凡君道者當法之也今夫日月之代明四時之運行天之道也然而不能无過與不及之差天人之交勝也若乃聖王在上則日月不過而四時不忒財成之有道也凡物春生之夏長之秋成之冬藏之天地之宜也然而不能无有餘不足之異人事之不齊也若乃聖王在上則東作西成之有序輔相之有政也至於民受天地之中以生莫不有君臣父子天下謂之達道莫不有仁有勇天下謂之達徳良知良能皆出於人之性也其或有入於罟擭陷阱而莫之知避其或知中庸之道而莫知可能葢左右之无術也若乃聖王在上則左之右之俾輔翼之又從而振徳之左右之有方也然而三者之序亦何施而可乎葢上治之道有出於精神之運心術之動不可得而言之其有見於成法者如洪範之五行應之以五事而休咎之徵若合符節是以文王陟降在帝左右有不可勝言者也其下治之道則至於山川草木鳥獸蟲魚之化不可勝紀其有見於政事者若虞夏之九功洪範之八政山林有時藪澤有禁則穀與魚鼈不可勝食材木不可勝用至於九敘唯歌有不可勝陳者也在民則天命之謂性我則使生者有以養死者有以葬謂率性之謂道我則謹庠序之教申之以孝弟之義謂修道之謂教我則建用皇極而納之於大中及其至也嚮之者惠以五福違之者威以六極是以堯舜之民比屋可封用此道也嗚呼是三者非泰之時則不能行泰之時非内健外順之君則不可致君以是而君臨相以是而修輔故文武汲汲仲尼皇皇其有意於此乎易說后以財成天地之道輔相天地之宜賛化育之謂也中庸解和靖尹氏曰或問天地與我同生㑹否或疑之荅曰輔相天地之宜者是誰胡不思之天地設位而易行乎其中苟非其人道不虚行㑹否又問曰天之所以為天地之所以為地必由於人若无其人則不能為天地豈不是與我同生乎曰如何見得寛曰稷之播種禹抑洪水周公懲戎狄孔子作春秋孟氏闢楊墨易曰天地設位聖人成能成其能者人也於是天得以為天地得以為地乃知人之所負荷者可謂至重舜人也吾人也我猶未免為鄉人不能盡其道也先生曰甚善此語昔嘗聞於二先生也又曰寛借先生蜀本王弼注周易嘗點注其中有隔書紙上先生題曰易之道如日􅉴但患於理未精誠於機㑹則暗於理者也聖人復生恐不易我之言寛因請問寛見先生此說機㑹豈非當泰時便可裁成輔相當否時便可儉徳否先生曰非也吾看易逆數也故立是說若既是其時人誰不會如此做政在未到泰之上六便要知泰將極也未到否之上九便要知否欲傾也此謂機㑹此吾因易逆數而言白雲郭氏曰有復姤然後有臨遯有臨遯然後有否泰復姤臨遯隂陽之偏得其正者其泰否乎正故交偏則不交也故曰天地交泰六十四卦之中隂陽得其正而交者獨泰一卦而已此泰之時所以為難遇也泰之時萬物盛極而人不知有節故欲財成輔相焉葢聖人體天地交泰之道財而制之以成人道又因天地生物之宜為之播殖收斂東作西成以輔相之是以天地交泰之道左右吾民也易説漢上朱氏曰泰者天地交也財成輔相者以人道交天地也兊刻制坤成物因天地之道而財成之也則物不屈於欲震左兌右輔相也因天地之宜而輔相之則人不失其利左右亦震兊也坤為民財成輔相以左右民者立人道也財裁古通用易傳新安朱氏曰裁成以制其過輔相以補其不及本義財成是截做段子底輔相是佐助他底天地之化儱侗相續下來聖人便截作段子如氣化一年一周聖人與他截做春夏秋冬四時問裁成輔相字如何解曰裁成猶裁截成就之也輔相者便只是於裁成處以補其不及而已問裁成何處可見曰眼前皆可見且如君臣父子兄弟夫婦聖人便為制下許多禮數倫序只此便是裁成處至大至小之事皆是固是萬物本有此道理若非聖人裁成之亦不能得如此齊整此皆天地之所不能為而聖人能之所以賛天地之化育而功與天地參也問裁成輔相无時不當然何獨於泰時言之先生曰泰時則萬物各遂其理方始有裁成輔相處若否塞不通一齊都无理會了如何裁成輔相得並語録東萊吕氏曰天地交泰正極治之時也又何必裁成輔相為聖人則不然方且兢兢業業盡其裁成輔相之道葢天地交泰雖有時而不可久惟聖人自有胷中之天地胷中者交泰則有形之天地不期而自交泰是聖人未嘗有所待也易說初九㧞茅茹以其彚征吉象曰拔茅征吉志在外也伊川先生曰初以陽爻居下是有剛明之才而在下者也時之否則君子退而窮處時既一作將泰則志在上進也君子之進必與其朋類相牽援如茅之根然拔其一則牽連而起矣茹根之相牽連者故以為象彚類也賢者以其類進同志以行其道是以吉也君子之進必以其類不唯志在相先樂於與善實乃相賴以濟故君子小人未有能獨立不賴朋類之助者也自古君子得位則天下之賢萃於朝廷同志協力以成天下之泰小人在位則不肖者並進然後其黨勝而天下否矣葢各從其類也時將泰則羣賢皆欲上進三陽之志欲進同也故取茅茹彚征之象志在外上進也並易傳龜山楊氏曰茅之為物至潔而其用重㧞之則連茹而出君子以其彚征之象也否之時不能无君子泰之時亦不能无小人泰之初上下始交也小者未盡往則豈一君子之力獨能伸哉故以其彚征乃吉易說白雲郭氏曰君子小人各從其類不能相入也故言拔茅茹彚征則得志故吉志在外者君子以獨善為内而以澤加於民為外也昔堯用舜而野无遺賢者其㧞茅茹之謂乎易說漢上朱氏曰茅上柔下剛而潔白君子之象也㧞其一則其根牽引連茹而起君子引類之象也茹根也三陽同志外有應初九上應四四來援之成巽初往成震震為蕃鮮㢲為白茹者初九之剛也初往則二三同類牽連而進伏艮為手拔茅連茹以其彚征也征正行也利於正行故吉君子在上必引其類將以合君子之類併天下之力以濟其道於泰不然小人以朋比而强君子以寡助而弱亦何由泰哉易傳新安朱氏曰三陽在下相連而進拔茅連茹之象征行之吉也占者陽剛則其征吉矣郭璞洞林讀至彚字絶句下卦放此本義先生問時舉看易如何時舉云只看程易見其只就人事上說无非日用常行底道理先生曰易最難看須要識聖人當初作易之意且如泰之初九拔茅茹以其彚征吉謂其引賢類進也都不正說引賢類進而云㧞茅何耶如此之類要須思量某之啟蒙自說得分曉且試去看因云某少時看文字時凡見有說得合道理底須旁搜逺取必要看得他透今之學者多不如是如何時舉退看啟蒙晚往侍坐時舉云向者看程易只就注解上生議論却不曽靠得易看所以不見得聖人作易之本意今日看啟蒙方見得聖人一部易皆是假借虚設之辭葢縁天下之理若正説出便只作得一件用唯以象言則當卜筮之時看是甚事都來應得如泰之初九若正作引賢類進說則便只作得引賢類進用唯以拔茅茹之象言之則其他事類此者皆可應也啟蒙警學篇云理當既實事來尚虚用應始有體該本无便見得易只是虚設之辭看事如何應耳未知如此看得否先生然之語録東萊吕氏曰初九伊川說雖是但有未盡意當泰之初賢人彚征人君不能徧識必首先用一大賢則天下之賢人自然牽連而進如舜之選於衆舉皋陶則八元八凱皆進湯選於衆舉伊尹則旁招俊乂如仲虺之徒皆進象曰志在外也謂上三爻是外卦初言在外者葢否之時斂志在内今時既泰所志在外將以行其志也易說九二包荒用馮河不遐遺朋亡得尚于中行象曰包荒得尚于中行以光大也伊川先生曰二以陽剛得中上應於五五以柔順得中下應於二君臣同徳是以剛中之才為上所專任故二雖居臣位主治泰者也所謂上下交而其志同也故治泰之道主二而言包荒用馮河不遐遺朋亾四者處泰之道也人情安肆則政舒緩而法度廢弛庶事无節治之之道必有包含荒穢之量則其施為寛裕詳宻弊革事理而人安之若无含𢎞之度有忿疾之心則無深逺之慮有暴擾之患深弊未去而近患已生矣故在包荒也用馮河泰寧之世人情習於久安安於守常惰於因循憚於更變非有馮河之勇不能有為於斯時也馮河謂其剛果足一作可以濟深越險也自古泰治之世必漸至於衰替葢由狃習安逸因循而然自非剛斷之君英烈之輔不能挺特奮發以革其弊也故曰用馮河或疑上云包荒則是包含寛容此云用馮河則是奮發改革似相反也不知以含容一作𢎞之量施剛果之用乃聖賢之為也不遐遺泰寧之時人心狃於泰則苟安逸而已烏能復深思逺慮及於遐逺之事哉治夫泰者當周及庶事雖遐逺不可遺若事之㣲隠賢才之在僻一作側陋皆遐逺者也時泰則固遺之矣朋亾夫時之既泰則人習於安其情肆而失節將約而正之非絶去其朋與之私則不能也故云朋亡自古立法制事牽於人情卒不能行者多矣若夫禁奢侈則害於近戚限田産則妨於貴家如此之類既不能一无既不能字斷以大公而必行則是一有不字牽於朋比也治泰不能朋亡則為之難矣治泰之道有此四者則能合於九二之徳故曰得尚于中行言能配合中行之義也尚配也象舉包荒一句而通解四者之義言如此則能配合中行之徳而其道光明顯大也並易傳横渠先生曰中行中立之行也若朋比則未足尚也舜文之大不是過也易說藍田吕氏曰九二之徳以乾下坤上中正无頗此所以得尚乎中行龜山楊氏曰包荒在宥之而不治也治則或傷之矣用馮河過中者不弃也弃之則立賢有方矣不遐遺不忘逺也朋亡不泄邇也周公思兼三王以施四事如是而已此大臣之任也周公人臣也而思兼三王之事以上下交而志同故也夫為人臣若周公可也世儒謂周公為人臣不得為之功故得用人臣不得用之禮樂失其㫖矣易説兼山郭氏曰昔武王克商召太公而問之曰將奈其士衆何太公曰臣聞愛其人者兼屋上之烏憎其人者惡其儲胥咸劉厥敵靡使有餘王曰不可太公出召公入王曰為之奈何召公曰有罪者殺之无罪者活之王曰不可召公出周公入王曰為之奈何周公曰使各居其宅田无變舊新唯仁是親百姓有過在予一人王曰廣大乎平天下矣方是時皆商之頑民也武王周公處之如是况包荒馮河之徒歟泰之九二武王周公盡之矣謂之泰誓宜无媿也易說白雲郭氏曰泰之道甚大有三才成能之事故象言財成輔相非小人可居必大人君子用天徳者可以主之九二之臣是也九二得乾剛中之大徳故荒不治者包而治之馮河之勇者用之幽逺之士不遺焉是有含容之度而无忿疾之心者非天徳之臣不能至也如是則大者自來而无幽遯之志小者自往而无干進之心善惡各安其分而天下之朋比亡矣葢一於大公而无私心則天下有朋者未必用而无朋者未必遺君子小人率包而容之而其用者必有徳遺者必无徳也天下曉然知有徳必用而无徳必遺雖有朋何益也是為朋亡之道也此九二所以得尚于中行之君尚猶配也中行者六五為中以行願之君也洪範以凡厥庶民无有淫朋人无有比徳為皇極大中之道則象以九二為光大不亦宜乎九二以君徳而為臣觀爻象之辭盡坤含𢎞光大之義矣所謂大人之事也而不言大人者以否之辭可互見也故乾之九二善世而不伐徳博而化而泰之九二包荒用馮河不遐遺近之坤之六五黄裳元吉而泰之六五帝乙歸妹以祉元吉近之非有得於乾坤用九用六之道不足以成泰也九二所謂見羣龍无首者也六五所謂永貞以大終者也易說漢上朱氏曰兌為澤震為萑葦陂澤荒穢之象二之五以陽包隂包荒也坎為大川出乾流坤行於地中河之象也震足蹈川徒涉也徒涉曰憑憑河也勇於蹈難而不顧者也二近五逺不遐遺也陽與陽為朋二絶其類而去朋亡也人狃於泰政緩法弛之時當有包含荒穢之量以安人情用馮河越險之勇以去弊事民隠忽於荒逺人材失於廢滯故戒以不遐遺近己者愛之逺己者惡之大公至正或奪於私昵故戒以朋亡四者具乃得配六五而行中道所以然者光明顯大不狹且陋也六五柔中以下九二二剛中而配五坎離日月充滿六合而无私照其道光大如是則无一物不泰矣易言道大无所不容者曰光大思慮褊狹者未光大陋之謂也時已泰矣苟淺中不能容之則輕人才忽逺事植朋黨好惡不中不足以厭服人心天下復入於否六五曰中以行願也九二曰中行中道者所以存泰也横渠曰舜文之治不是過矣易傳新安朱氏曰九二以剛居柔在下之中上有六五之應主乎泰而得中道者也占者能包含荒穢而果斷剛決不遺遐逺而不昵朋比則合乎此爻中行之道矣本義問泰九二包荒得尚于中行以光大也以九二剛中有光大之徳乃能包荒耶為是包荒得尚于中行所以光大耶先生曰易中說以中正也皆是以其中正方能如此此處亦只得做以其光大說若不是一箇心胷明闊底如何做得語録東萊吕氏曰九二包荒用馮河伊川作兩句說亦好今只作一句包荒則既能包容雖馮河勇力之士亦能用也不遐遺言大抵人當否之時自然憂深思逺至泰時人民安富國家閒暇所失多由慮之不逺殊不知亂每基於治危每基於安詎可遐遺乎若朋亡言惟亂世智者効其謀勇者効其力不暇為朋黨當泰之時人臣各有朋黨是以漢之朋黨不起於髙帝光武創業之時而起於中葉之後唐之朋黨不起於髙祖太宗之時而起於文宗之際此泰所以貴於朋亡也惟能盡二者事庶得中道惟得中道故光大也雖然此卦六五君位九二臣位治泰之道盡具於二而不言於五何也葢以六五中順之君既能委任九二剛中正之大臣則人君之職舉不必自為也易說九三无平不陂无徃不復艱貞无咎勿恤其孚于食有福象曰无往不復天地際也伊川先生曰三居泰之中在諸陽之上泰之盛也物理如循環在下者必升居上者必降泰久而必否故於泰之盛與陽之將進而為之戒曰无常安平而不險陂者謂无常泰也无常往而不返者謂隂當復也平者陂往者復則為否矣當知天理之必然方泰之時不敢安逸常艱危其思慮正固其施為如是則可以无咎處泰之道既能艱貞則可常保其泰不勞憂恤得其所求也不失所期為孚如是則於其禄食有福益也禄食謂福祉善處泰者其福可長也葢徳善日積則福禄日臻徳踰於禄則雖盛而非滿自古隆盛未有不失道而喪敗者也无往不復言天地之交際也陽降於下必復於上隂升於上必復於下屈伸往來之常理也一作理之常也因天地交際之道明否泰不常之理以為戒也並易傳横渠先生曰因交與之際以著戒能艱貞則享福可必易說龜山楊氏曰平終必陂往極必復此天地之義隂陽之理也九三居天地之際將陂復之時也而在上者不知為君之難居下者不知為臣之不易世方无虞上下荒怠不知相與以警戒則否將至矣泰其可長乎九三在下卦之上人臣之尊位上交之極也知艱貞乃可以无咎不能正固以守之務為持禄保位之謀則小人之歸而禍將極矣雖有其位其能安享之乎故惟不恤其孚而後于食有福阿意以媚上恤其孚者也易說白雲郭氏曰否泰之道如循環終則有始可不豫戒乎城復于隍則无及矣九三下體之上位已過中故以平陂往復而思戒也艱若周公之无逸也貞若成王之持守也能艱能貞則无咎矣君子能為可信之道以无咎何恤人之必信否也艱貞无咎邦有道榖之時是以于食有福况太平之世既醉以酒既飽以徳君子萬年介爾景福則于食有福明矣九三六四是為天地相交之際天道終矣地道之始故曰天地際也過此以往則未之或知故君子思必陂必復之戒焉九三艱貞臣道非君道並易傳漢上朱氏曰初二上往四五復位坤平衍也化為山澤平者陂矣若九三不守其位而又往上六坤復泰將成否故戒之觀无平不陂則知无往不復矣九三在天地之際往者當復泰者當否時將大變唯艱難守貞確然不動乃无咎三與上六有孚者也陰陽失位為憂憂恤也三上相易恤其孚也天地反復之際外之小人必因内之君子有危懼之心乗隙而動著信於我君子應之則大事去矣禍至於覆其宗艱貞勿恤其孚不以利害之心移其守以拒險詖之勢以塞反覆之路自信而已于食有福矣兊為口三陽為福君子之干禄也修身俟命人之信否无以為也故能永享安榮為有泰之福或曰時運已往艱貞其如何曰天人有交勝之理闗子明曰象生有定數吉凶有前期變而能通故治亂有可易之理大哉人謨其與天地終始乎易傳新安朱氏曰將過於中泰將極而否欲來之時也恤憂也孚所期之信也戒占者艱難守貞則无咎而有福本義勿恤其乎只作一句讀孚只是信葢言勿恤後來信與不信耳問看否泰二卦見得泰无不否若是有手段底則是稍遲得先生曰自古自治而入亂者易由亂而入治者難治世稍不支吾便入亂去亂時須是大人休否方做得于食有福食如食舊徳之食乃東坡赤壁賦吾與子之所共食之食並語録東萊吕氏曰无平不陂无往不復氣運之常也艱貞无咎轉移之理也己丑課程六四翩翩不富以其鄰不戒以孚象曰翩翩不富皆失實也不戒以孚中心願也伊川先生曰六四處泰之過中以隂在上志在下復上二隂亦志在趨下翩翩疾飛之貌四翩翩就下與其鄰同也鄰其類也謂五與上夫人富而其類從者為利也不富而從者一无者字其志同也三隂皆在下之物居上乃失其實其志皆欲下行故不富而相從不待告戒而誠意相合也夫隂陽之升降乃時運之否泰或交或散理之常也泰既過中則將變矣聖人於三尚云艱貞則有福葢三為將中知戒則可保四已過中矣理必變也故專言始終反復之道五泰之主則復言處泰之義翩翩下往之疾不待富而鄰從者以三隂在上皆失其實故也隂本在下之物今乃居上是失實也不待告戒而誠意相與者葢其中心所願故也理當然者天也衆所同者時也並易傳横渠先生曰隂陽皆未安其分故家不富志不寧易說藍田吕氏曰小畜九五富以其鄰鄰志不同富以勸之也泰六四不富以其鄰鄰之所願不待勸也漢上朱氏曰陽實為富隂虚為貧以用也鄰五與上也陽必求隂隂必求陽隂陽之情也三陽在下上與三隂相應故隂得其主而安於上君子在内小人安於外之象也三陽相率而往三隂失實各復其所故翩翩然下之初六成巽巽為雞而五與上亦從之而復不富而用其鄰也不富者失實也翩翩者回翔而後下之意譬如葉墜井中翩翩而下以井氣扶之也君子初去位小人猶有顧忌君子盡去然後飛揚矣君子有益於世也如此可使一日去位乎兌口戒也上下相應孚也君子往則小人來兊象毁不戒以孚也不正之間獨行正者君子之願也衆正之間而行不正者小人之願也願皆出於中心而分君子小人者正不正之間耳是以君子艱貞聖人言此明天地將閉上下各復其所雖有聖智莫能止也易傳曰理當然者天也衆所同者時也泰既過中則變矣易傳龜山楊氏曰三陰在下之物而上行皆失實也故不富然翩翩相從而下復者能不富以其鄰也葢陰陽之往復天地之義理必至也四居天地之際求復之時也其相從而下非為利也出於中心之願故不俟告戒而其誠已孚矣易説白雲郭氏曰翩翩飛之疾也疾飛而趨下從陽葢見幾之君子也陽道常饒而為實陰道常乏而為虚乏而從饒虛而從實理之必然也故翩翩從陽以不富而失實也皆者三陰同志之辭鄰者五也上也不戒以孚則不約而從也不約而從以三陰中心之願同故耳不富主坤言與謙同易説新安朱氏曰已過乎中泰已極矣故三陰翩然而下復不待富而其類從之不待戒令而信也其占為有小人合交以害正道君子所當戒也隂虚陽實故凡言不富者皆隂爻也隂本居下在上為失實本義東萊吕氏曰泰六四翩翩不富以其鄰不戒以孚小人嗜利者也今乃不富以其鄰小人棄信者也今乃不戒以孚葢為三陽所迫同舟遇風之時也君子之於小人其可迫之已甚歟易隨時取義與内君子而外小人兩得其所自不相妨己丑課程六五帝乙歸妹以祉元吉象曰以祉元吉中以行願也伊川先生曰史謂湯為天乙厥後有帝祖乙亦賢王也後又有帝乙多士曰自成湯至于帝乙罔不明徳恤祀稱帝乙者未知誰是以爻義觀之帝乙制王姬下嫁之禮法者也自古帝女雖皆下嫁至帝乙然後制為一作其禮法使降其尊貴以順從其夫也六五以隂柔居君位下應於九二剛明之賢五能倚任其賢臣而順從之如帝乙之歸妹然降其尊而順從於陽則以之受祉且元吉也元吉大吉而盡善者也謂成治泰之功也以祉元吉所以能獲祉福且元吉者由其以中道合而行其志願也有中徳所以能任剛中之賢所聴從者皆其志願也非其所欲能從之乎並易說横渠先生曰雖隂陽義反取交際為大義易說藍田吕氏曰六五隂之貴盛者也位尊故曰帝體隂故曰乙乙亦隂之長也龜山楊氏曰六五柔順而履中忘勢而下交有帝乙歸姝之象焉故能以祉元吉九三處一卦之中上下交際泰之盛時也盛極必反葢天地之道理之必至也故戒之曰无平不陂无往不復言泰之不可恃也易而不知戒則否將復矣故唯艱貞乃吉九三有剛健之才能艱貞者也六四處下卦之上盛極而過中矣蓋陂復之時也隂柔不中无濟時之才恃運而往則羣隂下復以為否理之必至也其孰能禦之六五履尊位為泰之主時之盛衰係乎人君而已而天下隨之以為時也故復言處泰之道而不以時之往復為辭與三四異矣易說白雲郭氏曰泰之時有乾徳剛中之臣而上无飛龍之君不幾於不能用乎然泰之所謂天地交者以臣有乾徳而居下君有坤徳而居上是以謂之交也兼其乾坤之體而不得其全所以為聖人參天地之卦故象言財成輔相之道也六五以謙尊自居用坤之六得黄裳之道下下以成其政所謂上下交而其志同也有是君有是臣所以能福天下以元吉也元吉非一人之吉天下之吉也所謂斂時五福用敷錫厥庶民者也以祉者以福天下也六五之志在於用柔今之下下行用柔之願而已乙用柔也妹柔之至也非柔之至不足以盡黄裳之道故歸妹黄裳皆稱元吉葢一道也易說漢上朱氏曰史謂湯為天乙又有帝祖乙有帝乙陽虎謂帝乙為微子之父而子夏曰帝乙歸妹湯之歸妹也湯一曰天乙京房載湯嫁妹之辭曰无以天子之尊而乗諸侯无以天子之富而驕諸侯隂之從陽女之順夫本天地之義也往事爾夫必以禮義則帝乙湯也五君位乾九二居之帝也帝天徳也女以嫁為歸震為長男兊為少女由長男言之妹也六五降其尊位下交九二帝乙歸妹之象五以柔中下交九二剛明之賢而順從之九二復以剛中上交於五而其道上行五以是成治泰之功則以中道致福而獲元吉也故曰以祉元吉祉福也元吉者吉之至善也夫上交於五者豈唯九二之願亦六五之願二五道行君臣並吉非其願乎故曰中以行願也易傳新安朱氏曰以隂居尊為泰之主柔中虚已下應九二吉之道也而帝乙歸妹之時亦嘗占得此爻占者如是則有祉而元吉矣凡經以古人為言如髙宗箕子之類者皆放此本義帝乙歸妹今人只做道理譬喻推說看來須是帝乙嫁妹時占得此爻語録東萊吕氏曰泰與大有皆以六居五則人君之處盈成者可知矣己丑課程上六城復于隍勿用師自邑告命貞吝象曰城復于隍其命亂也伊川先生曰掘隍土積累以成城如治道積累以成泰及泰之終將反于否如城土頽圯復反于隍也上泰之終六以小人處之行將否矣勿用師君之所以能用其衆者上下之情通而心從也今泰之將終失泰之道上下之情不通矣民心離散不從其上豈可用也用之則亂衆既不可用方自其親近而告命之雖使所告命者得其正亦可羞吝邑所居謂親近大率告命必自近始凡貞凶貞吝有二義有貞固守此則凶吝者有雖得正亦凶吝者此不云貞凶而云貞吝者一无者字將否而方告命為可羞吝否不由於告命也城復于隍矣雖其命之亂不可止也易傳横渠先生曰泰極則否非力所支故不可以師其勢愈亂正以命令諭衆然終吝道也故知者先幾艱貞无咎著戒未然也易說藍田吕氏曰城復于隍上陵下替也勿用師征伐不自上出也自邑告命貞吝夷於列國不足以令諸侯也龜山楊氏曰治隍而為城隂上升之象城復于隍隂復其所之象也上六泰之終也平者陂往者復泰反為否上下分崩離析之時也命亂而不一衆其可用乎故曰勿用師夫邑者所居之邑也衆不可用而告命不出夫居邑則雖正亦吝矣然泰之終也有剛健之才處之則顛而扶危而持猶可為也故曰吝而已易說兼山郭氏曰九三无往不復上六城復于隍雖理之所必然亦始終之戒也六五坤柔也九二乾健也柔順之君剛健之臣而有應焉皆中而未正也故有歸妹之辭焉以斯道也當斯時也所以為泰也有祉福之盛故五曰以祉元吉二曰得尚于中行也禮云君佩倚則臣佩垂君佩垂則臣佩委若泰之甚无以復加惟歸妹則可矣堯降二女亦由此道非知進退存亡之君其孰能與於此易說白雲郭氏曰泰極必否故上六城復于隍方是時也紀綱法度頽毁將絶雖自治且不暇又安能行師以治人之罪乎故直曰勿用師然號令雖宣亦且塞而不通不過於告自邑止於近者小者而已雖固守是道益可鄙也且泰之過極則有君弱臣强不倡而和之象故九三无平不陂无往不復所以戒臣之剛也上六城復于隍所以戒君之柔也城之所以為城者以有立也城反于隍君道圯矣上下之命能无亂乎觀此則宜戒於城隍未復之時也不言凶者何哉泰有持守之道故也易說漢上朱氏曰上六治極而亂以一卦言之闕土為隍積而成城泰兊之象城髙而墜復歸于隍泰反為否也師衆也坤為衆城復于隍則天地閉塞君失其民故勿用師邑二也巽為命泰兌口為告坤為亂四之初成巽告命也五之二自邑告命也上之三成坤其命亂也當是時雖九五正其道不行于下貞吝也雖自邑人人而告諭之其命日亂不可正矣葢泰之方中君臣同心乃可以治泰過此則變必至於大亂而後已易傳新安朱氏曰泰極而否城復于隍之象戒占者不可力爭但可自守雖得其貞亦不免於羞吝也命亂故復告命所以治之也本義自邑告命是倒了邑是私邑却倒來命令自家雖便做得正人君到此也則羞吝且如城復于隍須有這箇城底象隍底象邑底象城隍邑皆土地在坤爻中自有此象問泰卦无平不陂无往不復與城復于隍因言否泰相乗如此聖人因以垂戒先生曰此亦事勢之必然治久必亂亂久必治天下无久而不變之理子善遂言天下治亂皆生於人心治久則人心放肆故亂因此生亂極則人心恐懼故治由此起先生曰固是生於人心然履其運者必有變化持守之道可也如明皇開元自是好了若但能把捉不至如天寶之放肆則後來亦不應如此狼狽叔重因言觀聖人立象繫辭當好時便須有戒懼收斂底意當不好時便須有艱難守正底意徹首徹尾不過敬而已卦中无全好者亦无全不好者大率敬即好不敬即不好先生頷之城復于隍隍是河掘其土以為城又因以固城也勿用師師是兵師凡坤有衆與土之象上九方泰極之時只得自治其邑程先生說民心離散自其親近者而告命之雖正亦吝然此時只得如此雖吝却未至於凶並語録合訂刪補大易集義粹言卷十五
