body:
  text: 合訂刪補大易集義粹言卷三十七頭等侍衛納喇性德編艮下乾上伊川先生曰遯序卦恒者久也物不可以久居其所故受之以遯遯者退也夫久則有去相須之理也遯所以繼恒也遯退也避也去之之謂也為卦天下有山天在上之物陽性上進山髙起之物形雖髙起體乃止物有上陵之象而止不進天乃上進而去之下陵而上去是相違遯故為遯去之義二隂生於下隂長將盛陽消而退小人漸盛君子退而避之一作避而去之故為遯也易傳遯亨小利貞伊川先生曰遯者隂長陽消君子遯藏之時也君子退藏以伸其道道不屈則為亨故遯所以有亨也在事亦有由遯避而亨者雖小人道長之時君子知幾退避固善也然事有不齊與時消息无必同也隂柔方長而未至於甚盛君子尚有遲遲致力之道不可大貞而尚利小貞也易傳白雲郭氏曰古之人有大德而无其時則遯方二隂浸長進而之否不利君子之時進則否而遯則亨也乾健也艮止也有剛健之德而止於上者大畜也有剛健之德而止於下此其所以為遯也孔子之德與天同矣而可以止則止遯之義也小利貞者可小事也是以孔子乘田委吏中都司寇皆屑為之至孟子為齊卿其道皆止於一國一邑一職之間在聖賢皆謂之小事也易説新安朱氏曰遯退避也為卦二隂浸長陽當退避故為遯六月之卦也陽雖當遯然九五當位而下有六二之應若猶可以有為但二隂浸長於下則其勢不可以不遯故其占為君子能遯則身雖退而道亨小人則利於守正不可以浸長之故而遂侵迫於陽也小謂隂柔小人也此卦之占與否之初二兩爻相類本義彖曰遯亨遯而亨也剛當位而應與時行也小利貞浸而長也遯之時義大矣哉伊川先生曰小人道長之時君子遯退乃其道之亨也君子遯藏所以伸道也此言處遯之道自剛當位而應以下則論時與卦才尚有可為之理也雖遯之時君子處之未有必遯之義五以剛陽之德處中正之位又下與六二以中正相應雖隂長之時如卦之才尚當隨時消息苟可以致其力无不至誠自盡以扶持其道未必於遯一作退藏而不為故曰與時行也當隂長之時不可大貞而尚小利貞者蓋隂長必以浸漸未能遽盛君子尚可小貞其道所謂小利貞扶持使未遂亡也遯者隂之始長君子知㣲故當深戒而聖人之意未便一作使遽己也故有與時行小利貞之敎聖賢之於天下雖知道之將廢豈肯坐視其亂而不救必區區致力於未極之間强此之衰艱彼之進圖其暫安苟得為之孔孟之所屑為也王允謝安之於漢晉是也若有可變之道可亨之理更不假言也此處遯時之道也故聖人賛其時義大矣哉或久或速其義皆大也並易傳横渠先生曰當位而應理不當遯以隂長故遯故曰與時行又曰小利貞又曰遯而亨也易説藍田呂氏曰遯逺於害也柔浸而長非貞不立可以自全不足以求勝故小利貞龜山楊氏曰二隂浸而長進而為否理之必至也止而不知去則患之所由生也遯而遠之斯亨矣故曰遯而亨也遯之時剛當位而應未至乎上下不交也故小利貞與時行也與屯之九五小貞吉之義同易説兼山郭氏曰遯非有亨之理其所亨者遯也案卦乾德廣運於外艮知行之宜於内所以能遯而亨其亂而不救必區區致力於未極之間强此之衰艱彼之進圖其暫安苟得為之孔孟之所屑為也王允謝安之於漢晉是也若有可變之道可亨之理更不假言也此處遯時之道也故聖人賛其時義大矣哉或久或速其義皆大也並易傳横渠先生曰當位而應理不當遯以隂長故遯故曰與時行又曰小利貞又曰遯而亨也易説藍田呂氏曰遯逺於害也柔浸而長非貞不立可以自全不足以求勝故小利貞龜山楊氏曰二隂浸而長進而為否理之必至也止而不知去則患之所由生也遯而遠之斯亨矣故曰遯而亨也遯之時剛當位而應未至乎上下不交也故小利貞與時行也與屯之九五小貞吉之義同易説兼山郭氏曰遯非有亨之理其所亨者遯也案卦乾德廣運於外艮知行之宜於内所以能遯而亨也易以陽稱大隂稱小六二柔順中正知動静不失其時是以言小利貞又言浸長也遯非可大之時然其義則大也老子曰功成名遂身退遯也莊子曰聖人鶉居而鷇食亦遯也充是二者得聖人之道多矣顧不大哉易説白雲郭氏曰常人之亨以得位失位言聖人之亨進退皆以道言道不必位亨雖遯亦亨也故曰遯而亨也剛當位而應五之應二也與時行者時止則止時行則行是為遯之義雖聖人亦不能自必也小利貞浸而長者隂浸而長不可大事之時也不可大事而彖言大矣哉者蓋有天德而止者謂之遯不然困窮逃難而已非聖人所謂遯也此遯之時義所以為大也雖堯舜授受亦不過於遯而已矣聖人懼人之不知天德之大徒以逃難避仇遠迹山林者皆謂之遯則遯之為義小矣故特曰遯之時義大矣哉也遯之小利貞睽之小事吉不知者遂以為小而不思也故孔子明其大而後知小利貞者有大義存焉小事吉者有大用存焉易説漢上朱氏曰遯坤再交乾也陽長則隂消柔壯則剛遯晝夜寒暑之道也二隂浸長得位於内君子之道漸消是以四陽遯去自内而之外故曰遯遯以全其剛小人不能害其身退而其道伸矣故曰遯亨遯而亨也或曰三隂進而至否五隂極而至剥君子猶居其間二隂方長君子何為遯哉曰否隂已盛剥隂將窮故否之九四九五上九剥之上九君子居之遯隂方長進而用事可不遯乎然君子之遯未嘗一日忘天下隂浸長而未盛五剛當位應二則與之應而不辭矣與時偕行豈必於遯哉孔子所以遲遲去魯孟子所以三宿而後出晝鄭康成曰正道見聘始仕他國亦遯而後亨也故曰剛當位而應與時行也此再以二五相應伸遯亨之義也二隂浸長方之於否不利君子貞固有間矣然不可大貞利小貞而已隂為小剛當位而應六二得乎中正也先儒謂居小官幹小事其害未甚我志猶行易傳曰聖賢之於天下雖知道之將廢豈忍坐視而不救哉苟可致力焉孔孟之所屑為也蓋遯非疾世避俗長往而不反之謂也去留遲速惟時而已非不忘乎君不離乎羣消息盈虚循天而行者豈能盡遯之時義故曰遯之時義大矣哉在卦氣六月也故太𤣥準之以逃唐易傳新安朱氏曰剛當位而應以九五一爻釋亨義浸而長以下二隂釋小利貞時義大矣哉者隂方浸長處之為難故其時義為尤大也本義問遯卦小利貞以彖辭小利貞浸而長也之語觀之則小當為隂柔小人如小往大來小過小畜之小言君子能遯則亨小人則利於守正不可以浸長之故而浸迫於陽也此與程傳遯者隂之始長君子知㣲故當深戒而聖人之意未遽已故有與時行小利貞之敎之意不同先生曰若程傳所言則於剛當位而應與時行也之下當云止而健隂進而長故小利貞今但言小利貞浸而長也而不言隂進而長則小指隂小之小可知況當遯去之時事勢已有不容正之者程説雖善而有不通矣問遯亨遯而亨也分明是説能遯便亨下更説剛當位而應與時行也是如何先生曰此其所以遯而亨也隂方㣲為他剛當位而應所以能知時而遯是能與時行不然便是與時背也問小利貞浸而長也是見其浸長故設戒令其貞正且以寛君子之患然亦是他之福先生曰是如此此與否初二兩爻義相似伊川説小利貞云尚可以有為隂已浸長如何可有為所説王允謝安之於漢晉王敦之事乃王導非謝安也恐也不然王允是算殺了董卓謝安是乗王敦之老病皆是他衰㣲時節不是浸長之時也兼他是大臣亦如何去此為在下位有為之兆者則可以去大臣任國安危君在與在君亡與亡如何可去又曰王允不合要盡殺涼州兵所以致敗並語録東萊呂氏曰遯亨遯而亨也彖所以發明前意遯本不可謂之亨然屈於道而自附小人之列身雖亨而道則未嘗亨也全道以自遯身雖遯而道未嘗不亨也故當小人方盛之時亨吾道者莫如遯故曰遯而亨蓋君子之所謂通塞與世俗之所謂通塞異也四陽在上非不强盛二隂在下亦自㣲弱君子何故便遯君子見幾察㣲知小人浸長必消君子於此而退乃君子之亨遯亨者身退則道亨也俯就則屈己道急退則忘天下故雖二隂浸長君子愛君之深憂民之切惓惓有不忍忘之意尚欲有為以安生民定社稷雖不可大用而猶可以小用也剛當位而應與時行也易變體不同以一卦言之二隂在下固小人也四陽在上固君子也此以勢論五為君子二為小人本不相應以爻言之五居中而適當其位而應於二二雖小人至得九五乃反應助於五此以理論二居中是輔九五為善之臣也故度時觀理猶可小有所行君子愛君深憂民切故其處位未嘗敢遽去雖小人方盛理之所不可不遯然必盡己之道資二之輔而思有以拯其難見於小有所為如孟子三宿出晝猶不忍去亦是意也君子之所為衆人固不識時未可去君子固不遽去時可去君子亦豈强留然豈如潔已好名節者知不可為遂恝然忘情於天下乎聖人於遯之義亦曰大矣哉蓋以此也然遯之時義尤為難識學者看此須别白得此理十分分明乃可以處進退之際矣又曰當遯之時尚可小利貞若否之時則不可為矣至剥之時則順止而已雖然遯否消長所爭不多時節最難看不可輕易處須是人意盡後時節方可見並易説象曰天下有山遯君子以遠小人不惡而嚴伊川先生曰天下有山山下一作上起而乃止天上進而相違是遯避之象也君子觀其象以避遠乎小人遠小人之道若以惡聲厲色適足以致其怨忿惟在乎矜莊威嚴使知敬畏則自然遠矣易傳横渠先生曰遠小人不惡而嚴惡讀為憎惡之惡遠小人不可示此惡也惡則患及之又焉能遠嚴之為言敬小人而遠之之義也易説藍田呂氏曰物居地上莫髙於山天之至髙雖非山比然山之勢與天並髙天若遠避遯之象也君子之遠小人如天之遠山不惡而嚴儼然望而畏之不可犯也龜山楊氏曰天下有山健而止也其藏疾也无所拒然亦終莫之陵也此君子遠小人之不惡而嚴之象也易説兼山郭氏曰天下有山内外之分也不惡而嚴全身潔己之道也豈若小人悻悻然見於面目而後去之邪易説白雲郭氏曰遯之為象取二隂浸長而消陽君子見幾而作故卦謂之遯天下有山蓋備二體之象非是名卦之意易如此類者亦多矣君子當遯之時畏小人之害道志在遠之而已雖山林江海為遠害之地然亦有以道遠之者遠之之道何如不惡其人而嚴其分是也孔子曰人而不仁疾之已甚亂也疾之則惡也不惡則不疾矣孔子曰君子无衆寡无小大无敢慢又曰君子正其衣冠尊其瞻視儼然人望而畏之皆嚴之謂也自古山林江海遯世之士多矣獨遯以道者孔孟而已若夫君臣授受亦有遯之道者蓋臣道上行君不得不為之遯也知其道而遯者堯舜也不知其道而固有者桀紂也然非舜禹湯武而遯則簒矣易説漢上朱氏曰山以下陵上天遯而去之不可干也三四五上君子初二小人小人内君子外遠小人也小人遠之則怨怨則所以害君子者无所不至初四二五相應不惡也四陽以剛嚴在上臨之不惡而嚴也不惡故不可得而疎嚴故不可得而親是亦莫之怨亦莫敢侮而君子小人各得其所矣易傳新安朱氏曰天體无窮山髙有限遯之象也嚴者君子自守之常而小人自不能近本義問遯卦遯字雖是逃隠大抵亦取遠去之意天上山下相去甚遼絶象之以君子遠小人則君子如天小人如山相絶之義須如此方得所以六爻在上而漸遠者愈善也先生曰恁地推亦好此六爻皆是君子之事語録廣漢張氏論蕭望之劉向所處得失曰甚矣二子之疎也況其所為自多不正用人要當公天下選而二子者不惟其賢惟其附已不知小人迎合於外者詎可保邪故以鄭朋之傾邪而使之待詔至於華龍之汙穢亦欲入其黨彼蓋有所召之也在易有之君子以遠小人不惡而嚴所謂嚴者嚴其在我者也二子處羣小之間而不嚴如是其可得乎南軒集史論東萊呂氏曰天下有山勢不相附之象君子觀小人浸長之時勢不可相附也不惡而嚴大凡小人之情近之則僭遠之則怨當待之以不嚴之威則自然遠矣語曰惟女子與小人為難養也近之則不遜遠之則怨要當思所以處之之道夫不惡而嚴最人之所難蓋常人不惡則不嚴苟欲其嚴必作意而為之亦如恭而安尋常人恭敬者為拘束才安肆則不恭矣惟性情涵養則自然嚴恭苟内不足則必待造作威而不猛亦其類也易説初六遯尾厲勿用有攸往象曰遯尾之厲不往何災也伊川先生曰他卦以下為初遯者往遯也在前者先進故初乃為尾尾在後之物也遯而在後不及者也是以危也初以柔處㣲既已後矣不可往也往則危矣㣲者易於晦藏往既有危不若不往之无災也見幾先遯固為善也遯而為尾危之道也往既有危不若不往而晦藏可免於災處㣲故也古人處㣲下隠亂世而不去者多矣並易傳横渠先生曰危而不往何也遯既後時往則取災故知者違難在乎先幾易説龜山楊氏曰二隂進矣而隨其後遯之尾也居遯之時不能遠之隨其後故厲然柔方變剛隨而往則浸而為否矣能无災乎故勿用有攸往而象曰不往何災也易説白雲郭氏曰易道貴早辨而君子欲知幾故自履霜堅冰之後早辨之道言於初者多矣而遯之初六獨止而不知去不能早辨者也故曰遯尾厲遯尾者遯之後時也為遯之尾是為難之首也其危宜矣勿用有攸往者言處遯尾之道雖危而災猶可避也蓋往之義在我能止而不往則何災之有故止而不退則為厲止而不往則无災矣易説漢上朱氏曰卦體以前為首後為尾四陽避患患未至而先遯初六止而在後所處不正危道也故曰遯尾厲往之四雖正成離坎自明其節而遇險災也不若退藏於下自晦其明不往則何災之有初六處下非當位者所處㣲矣是故不去猶可以免患易傳曰古人處㣲下隠亂世而不去者多矣易傳新安朱氏曰遯而在後尾之象危之道也占者不可以有所往但晦處靜俟可免災耳本義遯尾厲到這時節去不迭了所以危厲不可有所往只得看他如何賢人君子有這般底多問遯尾厲勿用有攸往者言不可有所往但當晦處静俟耳此意如何先生曰程傳作不可往謂不可去也言遯已後矣不可往往則危往既危不若不往之為无災某竊以為不然遯而在後尾也既已危矣豈可更不往乎若作占辭看尤分明並語録東萊呂氏曰初六一爻如獸之遯則尾在後衆賢皆去而已不去遯之尾也大抵君子見幾而作當小人道長之時固當奉身而退若羣賢既遯之後方欲去則不可去矣故有災正如蔡邕當獻帝時董卓擅權君子皆去獨邕未能遠遯其後卒為卓所用竟不能免然君子當遯之際雖无所往亦有道以處之如居下而為禄隠可也易云何災而蔡邕卒被戮者以其為卓顯用不能居下故也初以隂居下乃在㣲下者也不當柄用故但有厲而已他卦上為尾以其進而來也遯則初為尾以其遯而去也易説六二執之用黃牛之革莫之勝説象曰執用黃牛固志也伊川先生曰二與五為正應雖在相違遯之時二以中正順應於五五以中正親合於二其交自固黄中色牛順物革堅固之物二五以中正順道相與其固如執繫之以牛革也莫之勝説謂其交之固不可勝言也在遯之時故極言之上下以中順之道相固結其心志甚堅如執之以牛革也並易傳横渠先生曰黄牛中順也隂邪浸長二居君臣正合之位戡難救時莫若中順固志使姦不能干不然小人易間矣易説藍田呂氏曰六二以柔居中又處乎内故曰黄牛執言持革言堅固也方遯之時衆陽皆遯已不得而從之以守中行順堅持其志而不解知所自信者也龜山楊氏曰黄中色牛順物執之用黄牛之革中順之志也居隂進之時中而不倚和而不流執用黃牛之革則所執固矣外物莫能勝也故説若夫萬變陳於前則交喪於中尚能説乎哉易説兼山郭氏曰輔嗣云説解也六二柔靜中正有應於五志在君親之人也其執之堅其持之固庶幾遯世无悶不見是而无悶者也然彼剛也此柔也故有黄牛之革中順之辭焉易説白雲郭氏曰六二柔順中正上應九五可謂得君之臣矣而猶執用黃牛固志何哉方遯之時小利貞不可大事勿用有攸往雖應於君而遯之志不可不固也是以孔子於定哀孟子於齊梁非无應也而其道不可以少貶以從時好者所謂固志也六二為下體艮卦之主知時止而止故稱執焉柔順牛之象也中正黃之象也不能執用黃牛則見利忘義終不可大有為於天下而自衰其德多矣勝説或如字或作脱易以説為脱者有矣此義實近之而其言似膚淺故先儒有不從者也易説漢上朱氏曰艮手執也坤為牛坤中為黄艮為革執之用黃牛之革也二近初六而應五處於内近小人往從五則所執説矣二從五成離兑離火勝兑金兑為毁折有勝説之意六二知其不可以處而比初又不可往而從五乃堅固以執其志如執用黃牛之革則初莫之止五莫之勝確乎不可㧞孰能奪其所守哉故曰固志也六二柔中故執志如此乃能遯易傳新安朱氏曰以中順自守人莫能解必遯之志也占者固守亦當如是本義執之用黃牛之革莫之勝説此言象而占在其中六二亦有此德也説吐活反語録東萊呂氏曰大抵人情當屯難遯逃之際最易相親譬如魚相忘於水及其在平陸則相呴以濕相濡以沫當遯之時正人情相親之時以六二之才與九五相應其附麗固結若黃牛之革不可得而比喻正以其情易親故衛之北風曰北風其凉雨雪其雱惠而好我攜手同行又曰攜手同歸此亦相親密之意序言衛國並為威虐莫不相攜持而去焉則亦遯之時矣易説九三係遯有疾厲畜臣妾吉象曰係遯之厲有疾憊也畜臣妾吉不可大事也伊川先生曰陽志説隂三與二切比係乎二者也遯貴速而遠有所係累則安能速且遠也害於遯矣故為有疾也遯而不速是以危也臣妾小人女子懷恩而不知義親愛之則忠其上係戀之私恩懷小人女子之道也故以畜養臣妾則得其心為吉也然君子之待小人亦不如是也三與二非正應以暱此相親非待君子之道若以正則雖係不得為有疾蜀先主之不忍棄士民是也雖危為无咎矣遯而有係累必以困憊致危其有疾乃憊也蓋力亦不足矣以此暱愛之心畜養臣妾則吉豈可以當大事乎並易傳横渠先生曰為内之主得位之正立愛其下畜臣妾之道盡矣然以斯處遯危疾冝焉易説藍田呂氏曰九三獨近二隂為隂所係臣妾役於人者也隂為我役則雖近之而无害為隂所係則憊矣臣妾亦隂類也龜山楊氏曰一隂止乎上艮體也柔進而承之止而不能遠係遯也能无疾憊乎遯之時小利貞而已剛雖當位不可大事也故畜臣妾吉大貞之則難將作矣尚何吉之有易説兼山郭氏曰剥之六五以宮人寵言君位也遯之九三畜臣妾吉言臣位也位雖不同其義則近之矣易説白雲郭氏曰遯以艮止故六二止於下以固志九三過於止而係於遯也係於遯而不知變是以疾困而危其江海避世之徒歟畜臣妾吉者是道也施之於家則可施之於天下則不可若是者君子謂之隘其可大事乎易説漢上朱氏曰九三得位係於二隂而不能遯巽繩係也故曰係遯九三遯則陽失位以動為疾故安其位而不動故曰有疾隂方剥陽己私係之未失位也而曰厲以動為疾久則極憊困篤不可救己晉張華是也三極也有憊之意故曰係遯之厲有疾憊也九三為内之主二隂自下承之坤為臣伏兊為妾以此畜臣妾則吉正也若係志於鄙賤之人其可大事乎陽為大巽為事三動巽毁不可大事也故曰畜臣妾吉不可大事也易傳新安朱氏曰下比二隂當遯而有所係之象有疾而危之道也然以畜臣妾則吉蓋君子之於小人惟臣妾則不必其賢而可畜耳故其占如此本義問畜臣妾吉伊川云待臣妾之道君子之待小人亦不如是如何先生曰君子小人更不可相對更不可與相接若臣妾則終日在自家脚手頭若无以畜之則望望然去矣又曰易中詳識物情備極人事都是實有此事今學者平日只在燈窓下習讀不曾應接世變一旦讀此皆看不得某舊時也如此只管讀得不相入所以常説道易難讀語録東萊呂氏曰大抵遯者當遯即遯苟滯戀顧惜而不能則害於遯矣以九居三居下體之上位之尊顯處遯之時是當去者也今保戀顧盻下切比六二之隂又非正應乃牽制而不能决其遯是當遯而不能遯者也若以此道畜臣妾則吉若欲成天下之大事立天下之大節非有決斷之志者必至於疾憊危厲而後已君子之遯可如是乎所謂畜臣妾吉意不専在畜臣妾上但言如此係戀乃畜臣妾之道據臣妾之情常有戀戀之意耳亦如闚觀利女貞不在利女上易説九四好遯君子吉小人否象曰君子好遯小人否也伊川先生曰四與初為正應是所好愛者也君子雖有所好愛義苟當遯則去而不疑所謂克己復禮以道制欲是以吉也小人則不能以義處暱於所好牽於所私至於陷辱其身而不能已故在小人則否也否不善也四乾體能剛斷者聖人以其處隂而有係故設小人之戒恐其失於正也君子雖有好而能遯不失於義小人則不能勝其私意而至於不善也並易傳橫渠先生曰有應於隂不惡而嚴故曰好遯小人暗於事幾不忿怒成仇則私溺為累矣易説龜山楊氏曰健而止乎外而初以柔應之其遯非不得已也故曰好遯君子吉然居遯之時有應於下小人則相與而變剛矣尚何遯之有易説兼山郭氏曰九四處乾巽之間剛雖不中能遯以違之亦和而不流者也故有君子小人之辭焉内以其應柔外以其用健是以謂之好也中庸曰邦无道至死不變此其庶幾乎易説白雲郭氏曰遯自九四而上其遯皆美蓋乾德剛健中正何適而非美乎九四好遯所謂遯世无悶者也潛龍之義也君子安之故吉小人汲汲於富貴戚戚於貧賤一不得志將自經於溝瀆而莫之知又豈能好遯而安之哉故曰小人否也易説漢上朱氏曰好者情欲之所好也九四係於初六不正之隂而相應情好也君子剛決以義斷之當可遯之時舎所好動而去與應絶矣動則正正故吉蕭望之不顧王生之寵是也故曰君子吉曰小人否者九動成六六安於四又有小人不能去之象否者不能然也此爻與初六相應處隂而有所係故極陳小人之戒以佐君子之決易傳曰所謂克己復禮以道制欲者也是以吉小人則義不勝欲牽於私好相與陷於困辱危殆之途猶不知也易傳新安朱氏曰下應初六而乾體剛健有所好而能絶之以遯之象也惟自克之君子能之而小人不能故占者君子則吉而小人否也本義東萊呂氏曰九四以剛陽之才而遯雖有所好亦必決而遯矣曰好遯者謂九四與初為應雖有應好亦遯之而不顧惟君子則能是也然以九四之剛為君子者惟是見善明用心剛乃可小人溺於所好豈能果決而遯哉故以九居四應初六之隂必有小人否之戒不然則言君子吉足矣此一爻伊川説甚分明但有未盡處曰君子吉小人否者何哉蓋以陽居隂一消一長未可必苟君子進則小人必消小人進則君子必消正如學者用心非不剛然資質尚柔懦當此際有兩途苟用力於剛陽之地則為君子用力於卑柔之地則為小人此君子小人所以分以四剛柔相半故也九之剛勝便為君子四之柔勝便入小人君子小人无兩立之理此一爻最要理㑹所以兼君子小人言之易説九五嘉遯貞吉象曰嘉遯貞吉以正志也伊川先生曰九五中正遯之嘉美者也處得中正之道時止時行乃所謂嘉美也故為貞正而吉九五非无係應然與二皆以中正自處是其心志及乎動止莫非中正而无私係之失所以為嘉也在彖則槩言遯時故云與時行小利貞尚有濟遯之意於爻至五遯將極矣故惟以中正處遯言之遯一无遯字非人君之事故不主君位言然人君之所避遠乃遯也亦在中正而已志正則動必由正所以為遯之嘉也居中得正而應中正是其志正也所以為吉人之遯也止也惟在正其志而已矣並易傳橫渠先生曰嘉好義同然五居正處中能正其志故獲貞吉易説龜山楊氏曰剛當位而應能與時行也故為嘉遯然遯之時不可以有為也故其貞吉正其志而已易説漢上朱氏曰陽為美九五中正无以加焉美之至也剛中處外可行則行也當位而應可止則止也不後而往不柔而應不安於疾憊不係於情好遯之至美故曰嘉遯貞吉者以自正其志而安也正志者行止无累於物也此夫子所以疾固歟易傳曰在彖則槩言遯時故云與時行小利貞有濟遯之意也於爻至於五則遯將極矣故惟以中正處遯言之易傳兼山郭氏曰堯曰咨爾舜天之厯數在爾躬允執其中舜亦以命禹雖革運之有終其嘉遯之志則一也孔子曰武盡美矣未盡善也其有見於此乎易説白雲郭氏曰先人曰堯授舜舜授禹雖曰天之厯數在爾躬其為嘉遯之志則一也故孔子謂韶盡美又盡善也其是之謂乎雍曰九五剛健中正道全德備舉遯之世莫美於斯故曰嘉遯貞吉以正志者道至於此與時為對隨而不流无係也无執也无好也不事於外正其在我者而已矣此其所以為嘉也上非堯舜下非孔子皆不足以與此易説新安朱氏曰剛陽中正下應六二亦柔順而中正遯之嘉美者也占者如是而正則吉矣本義問九五嘉遯以陽剛中正漸向遯極故為嘉美未是極處故戒以貞正則吉先生曰是如此便是剛當位而應處是去得恰好時節小人亦未嫌自家只是自家合去莫見小人不嫌却與相接而不去便是不好所以戒他貞正語録東萊呂氏曰正之一字須當詳看常人多言求進須理㑹邪正若退避則雖有不正亦不害殊不知大抵人臣之進固不可不正遯亦不可不正貪位慕禄而不知退固是不正之行若輕世絶俗而亟於退亦非正矣差之毫釐繆以千里凡有一毫之不正皆不正也故曰以正志也正字須要看得定易説上九肥遯无不利象曰肥遯无不利无所疑也伊川先生曰肥者充大寛裕之意遯者惟飄然遠逝无所係滯之為善上九乾體剛斷在卦之外矣又下无所係是遯之遠而无累可謂寛綽有餘裕也遯者窮困之時也善處則為肥矣其遯如此何所不利其遯之遠无所疑滯也蓋在外則已遠无應則无累故為剛決无疑也並易傳龜山楊氏曰居卦之外而无應於内與九三係遯有疾憊異也則其遯也不疑其所行矣故曰肥遯无不利易説白雲郭氏曰肥者道之充實也道之充實放諸四海而準孟子所謂至大至剛塞乎天地之間者何所往而不利乎以是道而處遯世故无所係好其於進退綽綽然有餘裕矣夫何疑之有當遯之極所謂知變之大人也遯之時義觀九五上九可見易説漢上朱氏曰上九盈矣動成兊説見於外肥也上九處卦外内无應動則正无往不利其於遯也有餘矣故曰肥遯所以无不利者剛決不係於四无疑情也巽為不果疑也易傳新安朱氏曰以剛陽居卦外下无係應遯之遠而處之裕者也故其象占如此肥者寛裕自得之意本義東萊呂氏曰司馬相如云列仙之儒居山澤間形容甚臞若隠遯而未能與物相忘遲疑不決二者交戰安能心廣體胖故惟无所疑然後能肥遯也子夏出見紛華而説入聞夫子之道而樂二者交戰於胷中則不能无疑及其戰而道勝所以肥而樂也此子夏所謂始之癯終之肥也肥遯之肥蓋亦如此易説合訂刪補大易集義粹言卷三十七
