body:
  text: 合訂刪補大易集義粹言卷十九頭等侍衛納喇性德編艮下坤上伊川先生曰謙序卦有大者不可以盈故受之以謙其有既大不可至於盈滿必在謙損故大有之後受之以謙也為卦坤上艮下地中有山也地體卑下山髙大之物而居地之下謙之象也以崇髙之德而處卑下謙之義也易傳謙亨君子有終伊川先生曰謙有亨之道也有其德而不居謂之謙人以謙巽自處何往而不亨乎君子有終君子志存乎謙巽達理故樂天而不競內充故退讓而不矜安履乎謙終身不易自卑而人益尊之自晦而德益光顯此所謂君子有終也在小人則有欲必競有德必伐雖使勉慕於謙亦不能安行而固守不能有終也易傳他卦皆有悔凶咎唯謙未嘗有它卦有待而亨唯謙則便亨羅氏拾遺白雲郭氏曰繫辭曰勞而不伐有功而不德厚之至也故謙為不居其德之稱德且不居則富貴崇髙皆餘事矣孔子不居聖顔淵願無伐善無施勞之謂也然有德而不居亨在其中矣小人矜能伐功日損之道君子德日進而謙不已是有終也然一盈而有四害一謙而有四益是以君子拳拳而弗失之矣易説新安朱氏曰謙者有而不居之義止乎內而順乎外謙之意也山至髙而地至卑乃屈而止於其下謙之象也占者如是則亨通而有終謂先屈而後伸也本義謙便能亨又為君子有終之象語録東萊呂氏曰易六十四卦皆有凶爻此卦六爻無凶以能謙故也大凡學者要看謙卦當味伊川兩句曰達理則樂天而不競內充故退讓而不矜此兩句乃入謙道之門蓋天命所在自有定分初無一毫加損君子達其理則知求勝者徒然耳要之初無增損於其間也人惟中無所有則必誇人以為有譬如貧賤者恐人輕其貧賤必外以富有自誇無文學者恐人輕其無文學必外以詞采自衒實有者却不如此易説彖曰謙亨天道下濟而光明地道卑而上行天道虧盈而益謙地道變盈而流謙鬼神害盈而福謙人道惡盈而好謙謙尊而光卑而不可踰君子之終也康節先生漁樵對問人有禱鬼神而求福者福可禱而求邪求之而可得邪敢問其所以曰語善惡者人也禍福者天也天道福善而禍淫鬼神其能違天乎自作之咎固難逃矣天降之災禳之奚益修德積善君子常分安有餘事於其間哉樵者曰有為善而遇禍有為惡而獲福者何也漁者曰有幸與不幸也幸不幸命也當不當分也一命一分人其逃乎曰何謂分何謂命曰小人之遇福非分也有命也當禍分也非命也君子之遇禍非分也有命也當福分也非命也邵子外書明道先生曰易言天亦不同如天道虧盈而益謙此通上下理亦如此天道之運亦如此如言天且不違况於人乎況於鬼神乎此直謂形而上者言以鬼神為天地矣謝顯道録伊川先生曰濟當為際此明謙而能亨之義天之道以其氣下際故能化育萬物其道光明下際謂下交也地之道以其處卑所以其氣上行交於天皆以卑降而亨也以天行而言盈者則虧謙者則益日月隂陽是也以地勢而言盈滿者傾變而反陷卑下者流注而益增也鬼神謂造化之迹盈滿者禍害之謙損者福祐之凡過而損不足而益者皆是也人情疾惡於盈滿而好與於謙巽也謙者人之至德故聖人詳言所以戒盈而勸謙也謙為卑巽也而其道尊大而光顯自處雖卑屈而其德實髙不可加尚是不可踰也君子至誠於謙恆而不變有終也故尊光並易傳橫渠先生曰止於下故光明人樂尊之故光而不掩志下於人故人不能加天以廣大自然取貴人自要尊大須意我固必欲順己尊己又説己之情此所以取辱取怒也謙尊而光卑而不可踰夫尊者謙則更光卑者已謙又如何踰之此天德至虛者焉以其能謙故尊而益光卑又無人可踰蓋已謙矣復如何踰越也謙天下之良德並易説藍田呂氏曰謙持盈若不足也艮以陽下坤之隂而有止所謂天道下濟而光明者也坤以隂而居艮之上地道卑而上行者也謙道雖主於自下然不可以不執中尊者之謙有所止則光夷王下堂而見諸侯是太不自尊而無所止招辱而已不足光也卑者之謙不可為物之所踰庶人召之役則往役可也召之見則往見不可也可召而見是在卑而可踰也以謙下人無有不亨尊卑之謙不失乎中惟君子為能終之龜山楊氏曰謙也者致恭以存其位也故髙而不危滿而不溢君子所以有終也自天道下濟而下謙亨之道也夫謙德之柄也君子執之以為禮德盛道尊而不居厚之至也故自下而人髙之自後而人先之所以尊而光卑而不踰也易説兼山郭氏曰山非不髙也地非不卑也髙者下下卑者上行謙之道也山在地上則為剝殺瘦之象也山在地中則為謙畜德之象也是故滿則招損謙則得益自然之理也天道下濟而光明者艮也地道卑而上行者坤也天之虧益日月是也地之變流山河是也鬼神害福吉凶是也人之好惡得失是也故勞而不伐有功而不德有若無實若虛其謙亨之謂乎故在尊而光在卑而不可踰惟君子能終之易説白雲郭氏曰先人曰天之虧盈日月是也地之變流山河是也鬼神害福吉凶是也人之好惡得失是也以此居尊則益光以此居卑則不可踰故惟有德君子能終之伊川曰以地勢而言則盈滿者傾變而反陷卑下者流注而益增也雍曰四者非天地鬼神人有心如是其道自然如此故皆曰道艮之一陽即有天道下濟之象易説漢上朱氏曰復三變剝四變皆成謙彖辭以剝上九言之者在上而降下者謙也處下而能卑者常也未足以盡謙之義上九降三六三升乎上此謙所以亨也尊卑相去其位不同於是情暌勢隔上下不能通尊者既屈卑者獲伸然後上下交而功勳成矣以天地言之天道下濟地道上行萬物化生其道光明而所以光明者陽濟乎隂也非謙亨乎曰濟曰光明者坎象也此以剝之上九六三升降言謙亨也天陽地隂鬼神者天地之大用人也者參天地而行鬼神者也天地也鬼神也人也以分言之則殊以理言之則一故觀日月之進退則知天道之虧盈矣觀山川之髙卑則知地道之變流矣觀人事之得喪則知鬼神之禍福矣觀物論之取捨則知人情之好惡矣變禍為害者言不利也是數者無不以盈為去以謙為尚九在上盈也三往損之則為虧盈為變盈為禍盈為惡盈三在下謙也九來益之為益謙為流謙為福謙為好謙流之者坎也益之福之好之者陽也此再以上九六三論盈虛之理明謙也九三自上位降而言之則尊而光天道下濟是也自九三卑位言之則卑而不可踰山在地中是也謙之為德其至矣乎所處尊矣道則彌光也所執卑矣而德則彌尊也君子觀諸天地驗諸幽明故處卑而不爭居尊而能降愈久而不厭乃能有終故曰君子有終此再以九三言君子體謙而終也上者外卦之終三者內卦之終也以卦氣言之小寒也故太玄準之以少易傳屏山劉氏曰聖人明為善之大端使人向焉而不誘人以利心苟有冀焉不如其己謂人之為善苟有所希冀不如己之不為也謙者盛德之事也易但言其終吉而已安而行之尊而光卑而不可踰言之法也有曰自下者人髙之自後者人先之意同言異病行之有冀是計效課功也利心存焉出于矯激反悖其性有所歆慕益亂其真故無利心而為惡其惡可移有利心而為善其善日隳大躁靜其容大辨訥其口貪倚亷為地佞假真為媒非無善迹也利心存焉泯泯棼棼多見資吾術借聖言以濟其私者矣周公吐哺握髮謙之至也豈以此來天下之士而沽一時之名乎非也何為拳拳勤勤若是邪成其己也易曰謙以自牧謙之妙用也周公所行安有利心哉屏山文集新安朱氏曰謙亨言謙之必亨變謂傾壞流謂聚而歸之人能謙則其居尊者其德愈光其居卑者人亦莫能過此君子所以有終也本義變盈流謙揚子雲言山殺瘦澤增髙此是説山上之土為水漂下來山便瘦澤便髙虧盈益謙是自然之理鬼神言害言福是有些造化之柄問鬼神是造化之迹既言天地之道又言鬼神何邪先生云天道是就寒暑往來上説地道是就地形髙下上説鬼神是就禍福上説各自主一事而言耳謙之為義不知天地人鬼何以皆好尚之蓋太極中本無物若事業功勞又於我何有觀天地生萬物而不言所利可見矣謙尊而光卑而不可踰以尊而行謙則其道光以卑而行謙則其德不可踰尊對卑言伊川以謙對卑説非是但聖人九卦又引天道虧盈而益謙地道變盈而流謙此是説卦體語録東萊呂氏曰聖人言天地鬼神人道無不好謙然人多不能好謙何也不能捨己故也不能捨己則好勝人之心生欲求其尊必自髙大欲求其光明必自眩露欲求其不可踰者必自髙抗不知求尊者當自下求髙明者當自隱求不可踰者當自卑謙尊而光卑而不可踰常人之所謂謙乃易之所謂尊而光也常人之所謂卑乃易之所謂不可踰也君子之終者君子能達謙之理至於終吉也易説象曰地中有山謙君子以裒多益寡稱物平施明道先生曰謙者治盈之道故曰裒多益寡稱物平施劉絢師訓伊川先生曰地體卑下山之髙大而在地中外卑下而內藴髙大之象故為謙也不云山在地中而曰地中有山言卑下之中藴其崇髙也若言崇髙藴於卑下之中則文理不順諸象皆然觀文可見君子以裒多益寡稱物平施君子觀謙之象山而在地下是髙者下之卑者上之見抑髙舉下損過益不及之義以施於事則裒取多者增益寡者稱物之多寡以均其施與使得其平也易傳謙君子所以有終故不言吉裒取其多而增益其寡天理也羅氏拾遺橫渠先生曰隱髙於卑謙之象也易大象皆是實事卦爻小象則容有寓意而已言風自火出家人家人之道必自烹飪始風風也教也蓋言教家人之道必自此始也又如言木上有水井則明言井之實事也又言地中有山謙夫山者崇髙之物非謙而何多者寡者皆量宜下之並易説龜山楊氏曰地中有山謙髙者下之謙之象也多者裒之寡者益之是謂稱物均一無偏陂之私是謂平施蓋取虧盈益謙之義易説理一而分殊故聖人稱物而平施之兹所以為仁之至義之盡也何謂稱物逺近親踈各當其分所謂稱也何謂平施所以施之其心一焉所謂平也與伊川書附西銘解兼山郭氏曰天之道其猶張弓乎髙者抑之下者舉之有餘者損之不足者補之天之道損有餘補不足人之道損不足以奉有餘故非謙也裒多益寡德之盛也稱物平施禮之功也故孔子曰德言盛禮言恭謙也者致恭以存其位者也易説白雲郭氏曰謙地類也故象以地見其義地卑而山髙理之常也今地在上益之也山在下損之也非以山居地中為山謙也乃以地謙而致益也是為變盈流謙之義裒多益寡者損有餘補不足之道也稱物平施者裒多益寡之道也裒多益寡見於彼者也稱物平施行乎此者也天地鬼神莫不皆然故君子法之以此此君子有為之道易説漢上朱氏曰裒鄭荀諸儒讀作捊取也字書作掊山在地中則髙者降而下卑者升而上髙卑適乎劉表曰謙之為道降己而升人者也以象考之上三隂多也下二隂寡也艮為手掊也故君子取有餘益不足以貴下人則貴賤平矣以財分人則貧富平矣以德分人則賢不肖平矣然物之不齊物之情也所謂平者非漫無尊卑上下差等也稱物而施適平而止平者施之則也坎為水天下之平施者無若水也易傳新安朱氏曰以卑藴髙謙之象也裒多益寡所以稱物之宜而平其施損髙增卑以趨於平亦謙之意也本義裒多益寡便是謙稱物平施便是裒多益寡問謙卦裒多益寡看來謙雖是若放低去實是損髙益低使教恰好不是一向低去先生云大抵人都見得在己者髙在人者卑謙則抑己之髙而卑以下人便是平也語録又曰天地之間理一而已然乾道成男坤道成女二氣交感化生萬物則其小大之分親疏之等至於十百千萬而不能齊也不有聖賢者出孰能合其異而反其同哉西銘之作意蓋如此程子以為西銘理一而分殊可謂一言以蔽之矣蓋以乾為父以坤為母有生之類無物不然所謂理一也而人物之生血脈之屬各親其親各子其子則其分亦安得而不殊哉一統而萬殊則雖天下一家中國一人而不流於兼愛之敝萬殊而一貫則雖親疏異情貴賤異等而不梏於為我之私此西銘之大旨也觀其推親親之厚以大無我之公因事親之誠以明事天之道蓋無適而非所謂分立而推理一者也夫豈專以民吾同胞長長幼幼為理一而必默識於言意之表然後知其分之殊哉且所謂稱物平施者正謂稱物之宜以平吾之施云爾若無稱物之義則亦何以知夫所施之平哉龜山苐二書欲發明此意然言不盡而理有餘也故愚得因其説而遂言之西銘解義廣漢張氏曰陳平甫問心無內外心而有內外是私心也非天理也故愛吾親而人之親亦所當愛敬吾長而人之長亦所當敬今吾有親則愛焉而人之親不愛有長則敬焉而人之長不敬是心有兩也是二本也且天之生物使之一本而二本可乎答曰此緊要處不可毫釐差蓋愛敬之心由一本而施有等差此仁義之道所以未嘗相離也易所謂稱物平施稱物之輕重而吾施無不平焉此吾儒所謂理一而分殊也若墨氏愛無等差即是二本伊川先生答楊龜山論西銘書當熟玩味南軒集初六謙謙君子用涉大川吉象曰謙謙君子卑以自牧也伊川先生曰初六以柔順處謙又居一卦之下為自處卑下之至謙而又謙也故曰謙謙能如是者君子也自處至謙衆所共與也雖用涉險難亦無患害況居平易乎何所不吉也初處謙而以柔居下得無過于謙乎曰柔居下乃其常也但見其謙之至故為謙謙未見其失也謙謙謙之至也謂君子以謙卑之道自牧也自牧自處也詩云自牧歸荑並易傳自牧歸荑卑以自牧之意荑柔順意朱氏拾遺橫渠先生曰牧逸也易説藍田呂氏曰初六以隂居下其謙不一故曰謙謙君子能止於始而上無偏應可以涉難而無害龜山楊氏曰以柔順之資居一卦之下謙之至也故曰謙謙君子卑以自牧也謙之為德天地神人之所共與用是而往雖涉險難無不濟矣故吉易説恂恂一於誠也與國人交止於信故在鄉黨所先如此似不能言者以卑自牧不以言知先人也蓋鄉黨尚齒故其自牧如此語解兼山郭氏曰初六謙之言虛也中虛以涉難庸有不濟者乎易説白雲郭氏曰卦之六爻三言吉三言利是知謙之為道天地人鬼之所貴也謙謙者謙而又謙也謙而又謙是為有終君子能之昔舜戒禹曰汝惟不矜天下莫與汝爭能汝惟不伐天下莫與汝爭功曽子稱顔淵曰有若無實若虛是知謙謙非君子不能也書曰滿招損謙受益是謙為滿之反亦有虛之象也乘木舟虛故用涉大川吉易於乾健之才多言利涉大川如謙與中孚皆以虛而有濟耳卑則謙之道也卑以自牧言又能自養其謙以至於謙謙也易説漢上朱氏曰初六本復之六三以柔退居謙之下謙之又謙者也謙謙故能得衆用之可以犯大難況居平易乎三坎為大川初動之四成巽股涉大川也自牧者自養也牧畜者擾之得其宜一童子自後鞭之足以制其剛夫然後其剛可用也坤為牛艮為少男初處柔在內其動剛卑以自牧也君子卑以自牧則能謙謙則能得衆此爻施之於自牧則可施之於他則卑己甚矣易傳新安朱氏曰以柔處下謙之至也君子之行也以此涉難何往不濟故占者如是則利以涉川也本義東萊呂氏曰初六凡事不可太甚惟謙無窮極故謙而又謙雖涉大害亦吉卑以自牧人之病莫盛於有矜心勝心必欲醫此病須用謙譬如病之深者用藥過多亦無害欲救矜勝之心雖謙而又謙亦無害故曰謙謙君子卑以自牧也須著意看此四字牧如牧牛馬之牧牛馬不牧則蹊人之田傷人之稼人不以謙自牧則矜勝之心必為害易説六二鳴謙貞吉象曰鳴謙貞吉中心得也伊川先生曰二以柔順居中是為謙德積於中謙德充積於中故發於外見於聲音顔色故曰鳴謙居中得正有中正之德也故云貞吉凡貞吉有為貞且吉者有為得貞一有正字則吉者六二之貞吉所自有也二之謙德由至誠積於中所以發於聲音中心所自得也非勉一有強字為之也並易傳六二鳴謙處中得正而有德者故鳴謙者乃中心得也羅氏拾遺橫渠先生曰體柔居正故以謙獲譽與上六之鳴異矣故曰貞吉易説藍田呂氏曰六二以柔居下體之中謙道之至美故其聲逺聞反之中心而無憾君子之所固守而獲吉也龜山楊氏曰六二柔履中正謙德之盛也故和順積中而英華發外其鳴也出於中心之自得與鳴豫之鳴異矣是以貞吉易説白雲郭氏曰詩曰鶴鳴于九臯聲聞于天則鳴者聲必逺聞也易曰鳴鶴在隂其子和之則聲之有聞必有應焉六二得位得中謙德著聞而貞吉者也得位得中則非在隂之幽近於九三又非于天之逺況九三方以功下人如謙之近而有聞者無不應矣中心得者非有心於鳴以感人於外者也蓋修德於內而自然有聞者其得自於中心故也易説漢上朱氏曰謙自初六卑以自牧積其德至於六二柔順而中正其樂發於聲音而不自知故鳴謙動成兊兊為口為説雖鳴也而非求應以正為吉吉自有也是以求福不回守正而已非中心自得無待於外者能之乎何以知其自得以鳴謙也易傳新安朱氏曰柔順中正以謙有聞正而且吉也其占如此本義鳴謙在六二又言貞者言謙而有聞須得其正則吉蓋六二以隂處隂所以戒它要貞謙而不貞則近於邪佞上六之鳴却不同處謙之極而有聞則失謙本意蓋謙本不要人知況在人之上而有聞乎此所以志未得語録東萊呂氏曰六二鳴謙是謙之發於聲音者也然而謙之鳴當觀其所發處其發也出於真心則吉使其不出於真心而發於聲音笑貌則有凶易説九三勞謙君子有終吉象曰勞謙君子萬民服也伊川先生曰三以陽剛之德而居下體為衆隂所宗履得其一作正位為下之上是上為君所任下為衆所從有功勞而持謙德者也故曰勞謙古之人有當之者周公是也身當天下之大任上奉幼弱之主謙恭自牧夔夔如畏然可謂有勞而能謙矣既能勞謙又須君子行之有終則吉夫樂髙喜勝人之常情平時能謙固已鮮矣況有功勞可尊乎雖使知謙之善勉而為之若矜負之心不忘則不能常久欲其有終不可得也唯君子安履謙順乃其常行故久而不變乃所謂有終則吉也九三以剛居正能終者也此爻之德最盛故象辭特重能勞謙之君子萬民所尊服也繫辭云勞而不伐有功而不德厚之至也語以其功下人者也德言盛禮言恭謙也者致功以存其位者也有勞而不自矜伐有功而不自以為德是其德𢎞厚之至也言以其功勞而自謙以下於人也德言盛禮言恭以其德言之則至盛以其自處之禮言之則至恭此所謂謙也夫謙也者謂致功以存其位者也存守也致其恭巽以守其位故髙而不危滿而不溢是以能終吉也夫君子履謙乃其常行非為保其位而為之也而言存其位者蓋能致恭所以能存其位言謙之道如此如言為善有令名君子豈為令名而為善也哉亦言有令名者為善之故一作效也並易傳橫渠先生曰中心安之也有終則吉人所難能易説藍田呂氏曰九三居下體之上其才剛其德止謙尊而光者也為上下五隂之所歸而安於下體德有所止勞而不伐有功而不德者也德有止則可以有終位非中則慮其不克終故戒之以有終吉龜山楊氏曰卦惟一陽衆隂宗之止於下體而不過勞謙君子也禹之不矜不伐而天下莫與之爭此勞而謙君子所以有終而萬民服也易説白雲郭氏曰九三以一陽而為衆隂之主衆隂宗之而俱與之有終則其為勞也大矣勞而不伐是曰勞謙非君子能之乎故惟君子有終吉唐虞之際能盡勞謙之道者其禹歟克勤于拜而至於九功惟敘所謂勞也不自滿假而拜昌言所謂謙也至於詢謀僉同鬼神其依則天地人鬼莫不從有終之吉大矣萬民服者特其一而已然卦以一隂為主者難以一陽為主者易隂常失之不足非有至明之德不能也大有同人是也陽常失之太過非有至中之德不能也師比是也謙豫近師比而德不同者非中故也故謙以德下人則民服豫以順合衆則得志皆不失損剛從柔之道於中為近矣易説漢上朱氏曰坎勞卦三與五同功九三勞而有功以陽下隂安於卑下艮見兊伏勞而不伐有功而不德君子致恭以存其位之道也內卦以三為終故曰勞謙君子有終吉夫有血氣者必有爭心故有能而矜之有功而伐之未有不爭爭則危矣九三致恭上下五隂宗之萬民服矣其誰爭之所以能存其位存其位所以有終吉也萬盈數合乾坤隂陽之策乃盈是數唯天地之元始生萬物足以當之易言萬國萬民萬夫大之辭也易傳曰古人有當之者周公是也易傳新安朱氏曰卦惟一陽居下之上剛而得正上下所歸有功勞而能謙尤人所難故有終而吉占者如是則如其應矣本義東萊呂氏曰九三居下體之上甚髙之處大抵人自有驕矜之心又加之以功勞必益自尊安能謙惟君子雖有功勞而謙則有終此所以為吉民之所以不服者以上之人求以勝之故耳今君子雖有功勞尚以謙自處宜萬民之服也易説六四無不利撝謙象曰無不利撝謙不違則也伊川先生曰四居上體切近君位六五之君又以謙柔自處九三又有大功德為上所任衆所宗而已居其上當恭畏以奉謙德之君卑巽以讓勞謙之臣動作施為無所不利於撝謙也撝施布之象如人手之撝也動息進退必施其謙蓋居多懼之地又在賢臣之上故也凡人之謙有所宜施不可過其宜也如六五或用侵伐是也唯四以處近君之地據勞臣之上故凡所動作靡不利於施謙如是然後中於法則故曰不違則也謂得其宜也並易傳橫渠先生曰裒多益寡無不盡道舉措皆謙易説藍田呂氏曰六四以隂居隂其體則順謙之至者也然居上體之下卑而不可踰者也居謙之時卑不可踰不至卑柔不失乎法則之中故指撝進退無所不利龜山楊氏曰六四履近尊之位上承下比無所不用其謙則不違則矣蓋物各有則或過或不及皆違則也故曰無不利撝謙撝言發撝也初六處一卦之下自牧而已二則中心得而已三之勞謙不伐而已四則異於是上承柔巽之君下比勞謙之臣非撝謙不足以存其位也易説白雲郭氏曰六四以柔順之德兼四益之道天地人鬼何所不利哉故曰無不利然四有近君之權能撝而不有以尊勞謙之臣可謂得謙之道者矣合謙之道而無過焉故曰不違則也觀帝堯曰汝能庸命巽朕位嶽曰否德忝帝位有鰥在下曰虞舜若四嶽者可謂撝謙矣伊川曰撝如手之撝也易説漢上朱氏曰六四坤體柔順而正上以奉六五之君下以下九三勞謙之臣上下皆得其宜故曰無不利撝謙艮為手止也震起也手止而復起有揮散之象六四揮散其謙之道布於上下撝謙也所以奉上下下無不利者非事是君為容悅也非持祿養交也不違其則而已人之大倫天下之正理也理之所至天地萬物之所不能違故謂之則不違其則無往而不得其宜則無不利矣子夏曰撝謙化謙也言上下化其謙也京房曰上下皆通曰揮謙是也謂三撝之四化之誤矣易傳新安朱氏曰柔而得正上而能下其占無不利矣然居九三之上故戒以更當發撝其謙以示不敢自安之意也不違則言不為過本義撝謙言發撝其謙蓋四是隂位又在上卦之下九三之上所以更當發撝其謙不違法則撝謙是合如此不是過分事故某解其象云言不為過不違則是不違法則語録東萊呂氏曰六四無不利撝謙聖人作易只是教人處事且如今人方在難處之地而人教之以處之之道其幸如何四當大臣之位上有謙順之君下有勞謙之臣而已居其上須有處之之道如撝謙乃可如漢之楊敞車千秋當霍光上官事惟聽光所為却不足以當之蓋敞千秋乃無能而已易説又曰楊敞車千秋之流不足以當之己丑課程六五不富以其鄰利用侵伐無不利象曰利用侵伐征不服也伊川先生曰富者衆之所歸唯財為能聚人五以君位之尊而執謙順以接於下衆所歸也故不以富而能有其鄰也鄰近也不富而得人之親也為人君而持謙順天下所歸心也然君道不可專尚謙柔必須威武相濟然後能懷服天下故利用行侵伐也威德並著然後盡君道之宜而無所不利也蓋五之謙柔當防於過故發此義征其文德謙巽所不能服者也文德所不能服而不用威武何以平治天下非人君之中道謙之過也並易傳藍田呂氏曰六五以柔中居尊位其體又順不以威武臨天下者也然至於侵伐者得道者多助迫而後動不得已而後起故所征皆服也造攻自鳴條朕載自毫其迫而不得已可知矣龜山楊氏曰六五柔得尊位大中處謙之時以謙接下者也謙德之光而人之從之也輕故能不富以其鄰不富言以德而不以利合也夫侵伐先王不得已而用之非治世之利也然人君執謙以涖下不富而以其鄰宜無不從矣而猶有不服者焉縱而不治則亂羣必矣故利用侵伐征不服也以侵伐為利惟謙之時為然易説兼山郭氏曰六五尊位大中而謙以處之德盛禮恭統和天人而無間者也孟子曰得道者多助失道者寡助寡助之至親戚畔之多助之至天下順之以天下之所順攻親戚之所畔故君子有不戰戰必勝矣不富以其鄰利用侵伐無不利其理如是也孔子曰利用侵伐征不服也猶曰不服而後征蓋無不服無征可也六五全德之爻故戒之其詳如此益贊于禹曰惟德動天無逺弗屆滿招損謙受益時乃天道其斯之謂歟易説白雲郭氏曰先人曰孟子有言得道者多助失道者寡助寡助之至親戚畔之多助之至天下順之以天下之所順攻親戚之所畔故君子有不戰戰必勝矣雍曰謙之為卦五隂一陽隂虛之象以乾坤之策言之亦已耗矣故為不富不富非足也與泰之六四同義而六五尊位大中謙以居之德盛禮恭之主是以為衆所歸而能有其鄰也以其鄰故多助多助則戰必勝故利用侵伐也征不服者蓋有不服則征無不服則勿征也昔禹之徂征苗民逆命益贊于禹曰惟德動天無逺弗屆滿招損謙受益時乃天道蓋謙以德為主有謙之德則無不利其於侵伐用與不用在上之人耳非必於用師也六五坤道不足而不富故容有不服之征九三陽道有餘而有終故萬民無不服也易説漢上朱氏曰陽實富也隂虛貧也鄰謂四與上也以用也能左右之也富而能以其鄰者常也不富而能以其鄰者以六五處尊位而謙虛也能以其鄰則能得衆得衆故利用侵伐無不利五動成離坎上與四變有弓矢甲胄之象以其鄰也動之二入坎險侵伐也征者上伐下以正而行也司馬法曰負固不服則征之聖人慮後世觀此爻有干戈妄動不省厥躬者故發之曰征不服也六五謙虛六二恃險不應乃可以侵伐禹征有苗是也若我不謙虛彼不肯服自其宜也易傳新安朱氏曰以柔居尊在上而能謙者也故為不富而能以其鄰之象蓋從之者衆矣猶有未服者則利以征之而於他事亦無不利人有是德則如其占也本義富以其鄰言以富厚之力而能用其鄰不富以其鄰言不待富厚之力而能用其鄰語録東萊呂氏曰六五利用侵伐須先有不富以其鄰蓋我處人既盡而猶有不服方可用侵伐易説上六鳴謙利用行師征邑國象曰鳴謙志未得也可用行師征邑國也伊川先生曰六以柔處柔順之極又處謙之極極乎謙者也以極謙而反居髙未得遂其謙之志故至發於聲音又柔處謙之極亦必見於聲色故曰鳴謙雖居無位之地非任天下之事然人之行已必須剛柔相濟上謙之極也至於太甚則反為過矣故利在以剛武自治邑國己之私有行師謂用剛武征邑國謂自治其私謙極而居上欲謙之志未得故不勝其切至於鳴也雖不當位謙既過極宜以剛武自治其私故云利用行師征邑國也並易傳上六鳴謙乃有求者也有求之小止於征國邑而已故曰志未得也羅氏拾遺橫渠先生曰下應於三其迹顯聞故曰鳴謙最上用謙為衆所服故利用行師然聲鳴其謙必志有求焉非如六二之正也三止於下如邑國之未賔也一云鳴謙則師有名易説藍田呂氏曰上六以柔居最上之位與六二同德其聲皆可以逺聞然二居艮體之中正而得中中心得上居坤體之末至順而無位可以小有為不可以大得志龜山楊氏曰上六處謙之極過乎謙者也在一卦之外髙而無民雖鳴而天下無應之者與鳴鶴在隂異矣故曰志未得也然君子行有不得則反求諸己故曰利用行師征邑國也邑國私於己者也征邑國自治也不用剛克而能勝己之私者未之有也故利用行師征邑國易説白雲郭氏曰上六之鳴異乎六二之鳴也六二之鳴非有求於應而欲人之聞之也其聲之自聞而人自應之也所謂聲無逺而弗聞行無隱而弗彰者也上與三為應也有應而鳴以聲感三也九三止而不求又且為衆隂之主而無私焉此上六所以志未得也終以其應而有助故可用行師征邑國而已邑國小也非無不利之師也可者僅辭也謙道本亨六爻無凶咎悔吝危厲之變以此知德盛禮恭之事天地人鬼無不宜者矣然謙之為德非有挾泰山超北海之難能而人每患其不能行者此君子小人所以分也故卦皆以君子為言君子無大過人者特能行之耳易説漢上朱氏曰六五征不服上六又曰征邑國者征邑國非侵伐也克己之謂也君子自克人欲盡而天理得則誠誠則化物無不應有不應焉誠未至也上六極謙至柔九三當應止於下而不來故鳴隂陽相求天地萬物之情坤為牛應三震有鳴之象故曰鳴謙鳴而求應志未得也然則如之何反求諸己而已其在勝己之私乎克己則無我物我一則物亦以誠應之矣坤在諸侯位為國在大夫位為邑上至二體師上以正行之三征也三之上坎險平征邑國也故曰可用行師征邑國也易傳曰邑國己之私有也征邑國謂自治其私也易傳新安朱氏曰謙極有聞人之所與故可用行師然以其質柔而無位故可以征己之國邑而已隂柔無位才力不足故其志未得而至於行師然亦適足以治其私邑而已本義用之問謙上六云鳴謙利用行師征邑國象曰志未得也如何曰為其志未得所以行師征邑國蓋以未盡信從故也問程易説利用侵伐蓋以六五柔順謙卑然君道又當有剛武意故有利用侵伐之象然上九亦言利用行師如何先生曰便是此等有不通處問謙是不與人爭如何六五上六二爻皆言利用侵伐利用行師象曰利用侵伐征不服也若以其不服而征則非所以為謙矣先生曰老子言大國以下小國則取小國小國以下大國則取大國又言抗兵相加哀者勝矣孫子曰始如處女敵人開户終如脫兔敵不及禦大扺謙自是用兵之道只退處一步耳所以利用侵伐也蓋自初六積到六五上六謙亦極矣自宜人人服之尚更不服則非人矣故利用侵伐也如必也臨事而懼皆是此意問謙上六志未得也先生曰志未得所以行師亦如六五之意又問謙上六何取象於行師先生曰坤為衆有坤卦處多言師如泰上六城復于隍勿用師之類坤為土土為國故云征邑國也以此見聖人於易不是硬做皆是取象因有這象方就這上靣説並語録東萊吕氏曰此一卦兩鳴謙在六二則好在上六則不好六二處得中正上六謙之極發於聲音故宜以剛武自治大扺謙固美事若一向只見於聲音却不濟事須就內以剛武自治其邑國則可六五上六利用字須仔細看易説合訂刪補大易集義粹言卷十九
