body:
  text: 合訂刪補大易集義粹言卷九頭等侍衛納喇性德編乾下坎上伊川先生曰需序卦蒙者蒙也物之稚也物稚不可不養也故受之以需需者飲食之道也夫物之幼稚必待養而成養物之所需者飲食也故曰需者飲食之道也雲上於天有蒸潤之象飲食所以潤益於物故需為飲食之道所以次蒙也卦之大意須待之義序卦取所須之大者爾乾健之性必進者也乃處坎險之下險為之阻故須待而後進也易傳兼山郭氏曰序卦云需者飲食之道也文武以天保以上治內采薇以下治外始於憂勤終於逸樂如此而已至於蓼蕭廢則恩澤乖湛露廢則萬國離故需之為需豈曰小補之哉易傳需有孚光亨貞吉利涉大川伊川先生曰需者須待也以二體言之乾之剛健上進而遇險未能進也故為需待之義以卦才言之五居君位為需之主有剛健中正之德而誠信充實於中中實有孚也有孚則光明而能亨通得貞正而吉也以此而需何所不濟雖險無難矣故利涉大川也凡貞吉有既正且吉者有得正則吉者當辨也易傳橫渠先生曰剛健而不陷而能俟時故有孚於光亨也訟需坎皆言有孚必然之理也又如未濟飲酒濡首亦言有孚義同此易説藍田吕氏曰需有所待而進也乾健欲進而險在前姑有所待終必濟也有所待者久則孚孚則光亨乾之用也利涉大川剛健乃濟也白雲郭氏曰天地之大尚不能無所需以生萬物況人道乎有孚者充實之美也光亨者輝光之大也有是德衆之所需也需之亦以成是德也貞則吉需之道也利涉大川乾之健也易説漢上朱氏曰蘇氏解需光亨曰光者物之神也此關子明之説也或問神曰日月在上其明在地夫日月之形其大如盤盂光之所燭被乎萬物非神乎蓋神難言也故以光形容之君子動而有光廣大無所不及故易言未光未光大者皆狹且陋也叢説新安朱氏曰需待也以乾遇坎乾健坎險以剛遇險而不遽進以陷於險待之義也孚信之在中者也其卦九五以坎體中實陽剛中正而居尊位為有孚得正之象坎水在前乾健臨之將涉水而不輕進之象故占者為有所待而能有信則光亨矣若又得正則吉而利涉大川正固無所不利而涉川尤貴於能待則不欲速而犯難也本義問需卦大指先生曰需者寧耐之意以剛遇險時節如此只當寧耐以待之且如涉川者多以不能寧耐致覆溺之禍故需卦首言利涉大川語録東萊吕氏曰需乾下坎上以乾之健阻於坎險之下故需待而後進也然惟乾然後有所需非乾則素無所有將何所需乎需利涉大川惟能需待所以審細瞻顧涉大川而無虞紀聞又曰易傳有孚則能光明而亨通己丑課程彖曰需須也險在前也剛健而不陷其義不困窮矣需有孚光亨貞吉位乎天位以正中也利涉大川往有功也伊川先生曰需之義須也以險在於前未可遽進故需待而行也以乾之剛健而能需待不輕動故不陷於險其義不至於困窮也剛健之人其動必躁乃能需待而動處之至善者也故夫子贊之云其義不困窮矣五以剛實居中為孚之象而得其所需亦為有孚之義以乾剛而至誠故其德光明而能亨通得貞而吉也所以能然者以居天位而得正中也居天位指五以正中兼二言故云正中既有孚而貞正雖涉險阻往則有功也需道之至善也以乾剛而能需何所不利並易傳龜山楊氏曰五以剛正中履尊位而不疚故有孚光亨貞吉有孚剛中也光亨大亨也充實而有光輝之謂大則光斯大矣不曰大亨者以其有險而剛不掩焉故曰光亨也夫剛健而上行乾道也險在前而不進有需之義焉故曰需須也時行則行時止則止而動與時偕天行也故險難在前而不能陷其義不困窮矣以剛健之中需而後動則往無不濟矣故利涉大川易説白雲郭氏曰以卦言之乾猶需於五以爻言之五猶需於物故曰需須也以乾之剛健其遇險也止於不險不困窮而已則險之為義大矣能無需乎有其德以待天下之需者九五也故言位乎天位以正中為需之主宜矣易説漢上朱氏曰需須也剛健上行遇險未動待時者也故曰需須也險在前也坎險也陽陷於隂中陷也困者水在澤下也需自二而上有困反之象三陽剛而健能需以進動而不屈不陷于險善用剛健者也故曰剛健而不陷其義不因窮矣此以兩體言乎需也須以進者需有孚而後進也孚者已也孚之者人也豈能遽孚之哉需自大壯變大壯四陽同德四與五孚未進之時雖未得天位其德固己剛健有孚特道未彰爾及其自四而進則位乎天位乃光亨也光坎離之象光亨者以貞吉也九五正中待物之須而不匱者唯正中乎故曰貞吉需道至於光亨位乎天位為須之主萬物需之貞吉也二者夫子之待價也五者天下之望成湯也此以二五言需之才也坎為大川自四之五往也乾剛須時而往何難不濟故曰利涉大川往有功也於卦氣為二月故太玄凖之以耎傒易傳五峯胡氏曰文王雖有亹亹剛健之德既受命為人之主矣若遂欲進定天下則紂之才猶足以有為惡未貫盈人心未盡散時未可以定也文王逡巡不進退處於西伯而紂在上險在前也文王以服事殷其忠信于上下其誠動于殘賊故得行其號令于諸侯天下化之而紂不以為嫌剛健而不陷豈有困窮哉有孚光亨貞吉此之謂也若文王中非有孚則不足以動商紂而至於以兵相加文王雖得天下是篡也非位乎天位中正之義矣惟文王位乎天位中正而不過故孔子曰三分天下有其二以服事殷周之德其可謂至德也已矣夫以天道處之何事不濟故曰利涉大川易外傳新安朱氏曰需須也此以卦德釋卦名義需有孚以卦體及兩象釋卦辭本義需主事孚主心需其事而心能信實則光亨以位乎尊位而中正故所為如此利涉大川而能需則往必有功利涉大川亦承上文有孚光亨貞吉福州韓某云險而能忍則為需險而不能忍則為訟能通其變則為隨不能通其變則為蠱此是説卦對然只是此數卦對得好其它底又不然後世䇿士之言只説出竒應變聖人不恁地合當需時便需並語録東萊吕氏曰剛健者多陷溺蓋躁進而不待時故也惟剛健而有所需則無陷溺之患矣又曰天下有一等自好之士不肯輕出但併與已分工夫皆廢又非所謂吾斯之未能信君子雖不輕出不妨做立事業工夫故謂乾剛而能需何所不利並易説象曰雲上於天需君子以飲食宴樂伊川先生曰雲氣蒸而上升於天必待隂陽和洽然後成雨雲方上於天未成雨也故為須待之義隂陽之氣交感而未成雨澤猶君子蓄其才德而未施於用也君子觀雲上於天需而為雨之象懷其道德安以待時飲食以養其氣體宴樂以和一作養其心志所謂居易以俟命也易傳橫渠先生曰雲上於天需君子以飲食燕樂九五需于酒食貞吉未濟亦有孚于飲酒以隂在前無所施為唯于飲食而已易説藍田吕氏曰雲上於天下必得澤飲食燕樂以歡待下上之澤也廣平遊氏曰雲上於天則澤將下流天下之所徯望也故有需之象飲食人之大欲存焉而人非飲食不生則天下之所需莫急於飲食故需飲食之象而位乎天位以應天下之求亦曰需于飲食而已然幅員之衆烏得人人而飲食之哉亦曰養賢以及萬民而已故君子飲食燕樂者大亨以養聖賢使忠臣嘉賓得盡其心焉爾忠臣嘉賓盡其心則小民不失職而人人厭所欲矣九五之所需孰大於此易説白雲郭氏曰先人曰文武以天保以上治內采薇以下治外而始於燕羣臣嘉賓者需之道也雍曰序卦曰需者飲食之道也飲食朝夕之需也人無飢渴之害則飲食無需也屯蒙之後天下之所需者在君而君之所需者在賢雲上於天欲雨之象萬物之所需也飲食宴樂所以養賢膏澤將以及民亦天下之需也易説漢上朱氏曰雲上於天蓄膏澤而未降須也君子蓄其才德末施於用亦須也飲食以養其氣體燕樂以養其心志居易俟命待時而動蓋需有飲食之道膏澤所以養萬物也坎為水兌為口為和説易傳新安朱氏曰雲上於天無所復為待其隂陽之和而自雨爾事之當需者亦不容更有所為但飲食燕樂俟其自至而已一有所為則非需也本義需待也以飲食燕樂謂更無所為待之而已待之須有至時學道者亦猶是也語録東萊吕氏曰君子以飲食燕樂易傳曰飲食以養其氣體燕樂以和其心志此二句極有意味蓋君子於未遇之時涵養成就一旦有用則無施不可以非口體之養而已也易説需大象雲上於天需君子以飲食燕樂雲上於天而未成雨猶君子未施於用而需待之時也飲食燕樂涵養此理而已與後世不得志而麴糵之託昏冥之逃者大異紀聞又曰易傳云雲上於天有蒸潤之象飲食所以潤益於物故需為飲食之道己丑課程初九需于郊利用恆無咎象曰需于郊不犯難行也利用恆無咎未失常也伊川先生曰需者以遇險故需而後進初最逺于險故為需于郊郊曠逺之地也處于曠逺利在安守其常則無咎也不能安常則躁動犯難豈能需于逺而無過也處曠逺者不犯冒險難而行也陽之為物剛健上進者也初能需待于曠逺之地不犯險難而進復宜安處不失其常則可以無咎矣雖不進而志動者不能安其常也君子之需時也安靜自守志雖有須而恬然若能終身焉乃能用常也並易傳龜山楊氏曰乾道以上行為常方需之時險在前宜需而後進雖久於其所未為失常也易説白雲郭氏曰以乾之剛猶有畏難之義則險其可犯哉初九逺於難者也故言于郊于郊不犯難矣勿以逺而妄動乃盡畏難之義是以利用恆無咎可需則需不可需則勿需也可應則應不可應則不應也此需時用常之道易説漢上朱氏曰三乾天際也四在內外之交曰郊五坎為險難初九正應六四而險難在前當守正不動以需其應不先時而動不犯難而上行故曰需于郊不犯難行也風雷相與不失其正天地可久之道曰恆謂五變四動而交乎下也九五虛中以需六四屈已以下之如是應時之需則上下相與可久而無咎隂之從陽地道之常也初九陽在下需六四之應而以巽行以上下言之未失常也九五剛健中正而曰犯難者非其應而往無因而至前志未通也或問利用恆也順以巽也乾道乃革也何取於卦也曰卦變也所謂之某卦也需利用恆者需之恆也蒙六五順以巽者蒙之觀也乾九四乾道乃革者乾之小畜也小畜之中又有離兊故曰革是謂天下之至變易傳五峯胡氏曰夫人幼而學之壯而行之古之君子如伊尹之耕于有莘傅説之築于傅嵒吕望之釣于渭濱皆待時于郊野曠逺之地不冒犯世患而求進者也其耕也其築也其釣也用常而已非有驚時異衆之行也故無咎易外傳新安朱氏曰郊曠逺之地未近於險之象也而初九陽剛又有能常於其所之象故戒占者能如是則無咎也本義東萊吕氏曰初九九剛健之物不能無動需于郊則去險尚逺也利用恆無咎非謂去險雖逺而常行之事亦可為但能用其常以應天下之變則無咎矣不謂之守常而謂之用常此言亦可以意會易説又曰易傳云雖不進而志動者不能安其常也志動則身郊而心市己丑課程九二需于沙小有言終吉象曰需于沙衍在中也雖小有言以吉終也伊川先生曰坎為水水近則有沙二去險漸近故為需于沙漸近于險難雖未至于患害己小有言矣凡患難之辭大小有殊小者至于有言言語之傷至小者也二以剛陽之才而居柔守中寬裕自處需之善也雖去險漸近而未至于險故小有言語之傷而無大害終得其吉也衍寬綽也二雖近險而以寬裕居中故雖小有言語及之終得其吉善處者也並易傳龜山楊氏曰沙近水而不溺於水以其衍在其中而不迫於險也其犯難淺矣故小有言終吉易説白雲郭氏曰沙近水近難也近之必不能無難故小有言剛明之才居柔守中小言之傷不為大損是以終吉欲無小言之愆則逺於郊而用常可也二雖不能逺于郊而以寬裕居中是雖有言而吉終也叔孫武叔毁仲尼子貢曰其何傷於日月乎終吉之謂也易説漢上朱氏曰五坎為水二三兊為澤水往矣而其剛留于澤者剛鹵也二在澤中剛而柔沙之象沙近于險者也五不應二故二需之九二得中剛而能柔待時而動其動必以正積誠既久二五相合坎化為坤險難易而為平衍矣需于沙而不妄動則平衍固在其中矣故曰需于沙衍在中也六四與五近而相得四見二不應而需之與已異趨小有言宜矣兌口為言也君子自守亦何傷哉夫子不進猶不免于有言矧餘人乎二非終不進也動則正正則吉而兌毁雖小有言終無凶也故終吉象言以吉終者二之五以吉行故有終勉之也易傳五峯胡氏曰孔子孟軻執其規矩凖繩周行于諸侯見可而進需于沙者也近于世難矣然孟軻志在天下後世非私己也故不以煦煦為仁孑孑為義或以微罪行或三宿而後出晝道廣德𢎞其心甚大雖小有患害厄于陳蔡圍于匡人景子謂之不敬尹士謂之干澤於孔孟乎何傷故當時諸侯敬之重之萬世之下尊之仰之以吉終者此之謂也易外傳新安朱氏曰沙則近于險矣言語之傷亦災害之小者漸進近坎故有此象剛中能需故得終吉戒占者當如是也衍寬意以寬居中不急進也本義東萊吕氏曰九二去險漸近雖無大害亦有小虞幸而以九剛陽而居二之柔雖有言語之傷亦能含垢忍辱而不較蓋寬裕居中善處患難者也其終吉也固宜易説又戴衍字序曰需之既濟曰需于沙孔子象之曰衍在中也天下之至險莫如水水與泥際而泥復與沙際繇沙望水其險寖已逺矣履深淖而並驚瀾雖從臾使疾驅且不敢至於磧平如砥萬轡一馳獨能柅方奔之足於險未迫之時夫豈徒然哉是中非躁迫者所能駐舒徐容與久在此而不前殆必博大廣衍綽有餘地者也易象既言衍而繼以在中者將視所居以占所養歟在南曰橘在北曰枳失其所在則名去之心不在廣莫之鄉而強以衍自許疇諾之哉貌似間暇嗜利逞欲以蹈大險如晉之衍蓋辱其名矣東萊文集九三需于泥致冦至象曰需于泥災在外也自我致冦敬慎不敗也伊川先生曰泥逼于水也既進逼于險當致冦難之至也三剛而不中又居健體之上有進動之象故致寇也苟非敬慎則致喪敗矣三切逼上體之險難故云災在外也災患難之通稱對眚而言則分也三之致寇由已進而迫之故云自我寇自已致若能敬慎量宜而進則無喪敗也需之時須而後進也其義在相時而動非戒其不得進也直使敬慎毋失其宜耳並易傳龜山楊氏曰需而迫于險則致寇自我矣然乾健之極非險之所能陷故敬慎則不敗需而後動能慎者也若夫行險以徼幸雖有剛健之才能不敗者鮮矣易説兼山郭氏曰坎為險九三迫之災在外也于郊于沙于泥逺邇之象也剛健上行故曰自我致寇也易説白雲郭氏曰于泥則有難矣不能于郊而于沙不能于沙而于泥則于泥之寇自我致之也災自外來也敬慎而不敗者君子責已反身之道也躬自厚而薄責於人則逺怨矣何敗之有是以君子居易以俟命敬慎也小人行險以徼幸鮮不敗矣然君子雖因接物而有敬而敬當在物先故坤之直內言存於物先也需之九三上六見於用以接物而已易説漢上朱氏曰坎水坤土水澤之際為泥九三剛健之極進逼于險已將陷矣需于泥也上六坎在外為災故曰需於泥災在外也九三守正可也動則上六乘之坎為盜盜有戎兵寇也寇雖險我動不正而迫之已甚則至故曰致寇至上乘三成坤為輿坎為車多眚則敗也九三正而明能抑其剛健持之以敬慎而不動誰能敗哉敬者持其正也三四下有伏艮艮止也慎之象故曰自我致寇敬慎不敗也易傳五峯胡氏曰范滂李膺名冠天下激濁揚清進必以其道需于泥者也然時方多僻災在外也其氣剛其志鋭其行徑無所顧慮露其鋒刃欲以力除姦邪姦邪畏忌則思所以中傷之矣黨人禁錮豈無自而然哉皆自致之也若敬慎如陳實雖中常侍張讓父葬亦往弔焉敬慎之至也及黨人被誅而名士因實得免者甚衆使范滂李膺敬慎如此豈有誅死之敗乎易外傳新安朱氏曰泥將陷于險矣寇則害之大者九三去險愈近而過剛不中故其象如此外謂外卦敬慎不敗發明占外之意聖人示人之意切矣本義問敬慎不敗本義以為發明占外之意何也先生曰言象中本無此意所謂占外意也孔子曰聖人設卦觀象繫辭焉而明吉凶若不是占筮如何説明吉凶且如需九三需于泥致寇至以其逼近坎險有致寇之象象曰需于泥災在外也自我致寇敬慎不敗也孔子雖説推明義理這般所在又變例推明占筮之意需于泥災在外占得此象雖若不吉然能敬慎則不敗又能堅忍以需待處之得其道所以不凶或失其剛健之德又無堅忍之志則不能不敗矣需于泥致寇至此爻本自不好而象却曰自我致寇敬慎不敗也蓋卦爻雖不好而占之者能敬謹畏防則亦不至于敗蓋需者待也需有可待之時故得以思患預防而不至于敗也此則聖人就占處發明誨人之理並語録東萊吕氏曰九三近坎之隂故有災謂之在外者九三是內卦之終逼近于坎之外卦也故曰災在外也易説又曰災在外而我即之致寇非自彼也苟敬慎則何敗之有己丑課程六四需于血出自穴象曰需于血順以聽也伊川先生曰四以隂柔之質處于險而下當三陽之進傷于險難者也故云需于血既傷于險難則不能安處必失其居故云出自穴穴物之所安也順以從時不競于險難所以不至于凶也以柔居隂非能競者也若陽居之則必凶矣蓋無中正之德徒以剛競于險適足以致凶耳四以隂柔居于險難之中不能固處故退出自穴蓋隂柔一作柔弱不能與時競不能處則退是順從以聽于時所以不至于凶也並易傳橫渠先生曰以柔居隂不能禦強來則聽順而辟其路易説龜山楊氏曰乾健上行非險之所能陷而四以隂柔在前故需于血出自穴血隂傷也出自穴不安其所也隂雖不安其所而能順以聽則雖傷而不至于凶矣六四以柔居隂能順以聽者矣易説白雲郭氏曰以隂柔之質處衆剛之上不能違而避之反出自穴是自求禍也故需于血然應於初九自上應下能順以退聽故雖傷而無凶易説漢上朱氏曰乾變坎為血九五大壯乾變故曰血坎為隱伏兌為口穴也六四處險者也據坎兌之際三陽自下而進故曰出自穴六四安其位以一隂礙之有險在前進退不可則隂陽必至于相傷小人安險不傷不已故曰需于血為六四者不競而順以聽之則善故曰需于血順以聽也惟順以聽是以三陽出自穴而無違焉六四坤順也坎耳聽也易傳五峯胡氏曰漢桓既誅梁冀拔黃瓊首居大位天下想望異政瓊奏誅州郡貪汚者十餘人海內翕然稱之是時宦豎充朝正人處乎其間佞幸之所必中傷也需于血者也夫瓊之心豈止于誅州郡貪汚而已哉肅清廷列乃其志也少須暇之耳及嬖寵益橫瓊自度力不能制遂上疏極言稱疾不起不敢安其位出自穴者也瓊雖言之然一言不聽則不據其位而不去力言之而不止以與嬖寵爭也順聽時命委而去之雖其志壅遏不行傷于小人而無凶禍之及矣易外傳新安朱氏曰血者殺傷之地穴者險陷之所四交坎體入乎險矣故為需于血之象然柔得其正需而不進故又為出自穴之象占者如是則雖在傷地而終得出也本義穴是陷處喚做所安處不得分明有箇坎陷也一句柔得正了需而不進故能出于坎陷四又是坎體之初有出底道理到那上六則索性陷了語録東萊吕氏曰六四以內卦觀之固厄于險而不得進以外卦觀之又懼為三陽所逼六四居險之下而見逼于三陽其傷可知幸而六四以隂柔之質出穴以避故需于血而已耳不然則大有傷也易説九五需于酒食貞吉象曰酒食貞吉以中正也伊川先生曰五以陽剛居中得正位乎天位克盡其道矣以此而需何需不獲故宴安酒食以俟之所須必得也既得貞正所需必遂可謂吉矣需于酒食而貞且吉者以五得中正而盡其道也並易傳藍田吕氏曰九五陽居至尊中正之位三陽上進志同情悅需于酒食以交歡也交歡之事以道相待非苟悅也龜山楊氏曰需而至于位天位則險難既平無所事矣故需于酒食而已若既醉之詩是也然需于酒食而不以正則是自溺于荒腆耳能無凶乎故正乃吉易説兼山郭氏曰九五既醉以酒既飽以德人有士君子之行詩之所謂太平需之所謂貞吉者也易説白雲郭氏曰先人曰既醉以酒既飽以德人有士君子之行詩之所謂太平需之所謂貞吉也雍曰飲食非自養也養賢而已養賢以及萬民所以應天下之需也鹿鳴之君蓋得需于酒食之道天保之福所謂貞吉也易説漢上朱氏曰需至于五隂已退聽難已獲濟位乎天位應天下之須坎震為酒兌口在下飲食之象酒食所以養人者也故曰需于酒食九五為需之主應之以中正而已天下之需于五者無須不獲各足其量而止如飲酒者止于醉食者止于飽需者無窮應者不動故貞吉貞吉者以中而正也中則養之者不過過則應之有時而窮故曰酒食貞吉以中正也坎震為酒何也曰震為禾稼麥為麴糵東方榖也故東風至而酒湧易傳新安朱氏曰酒食宴樂之具言安以待之九五陽剛中正需于尊位故有此象占者如是而貞固則得吉也本義東萊吕氏曰九五需于酒食貞吉九五一爻在坎隂之中也常人之情處至險之中必惶懼逼迫無所聊賴五處至險而從容舒緩飲食宴樂是知險難之中自有安間之地也此卦下體阻于逺而需待是見險而止猶在險之外人之所可能也九五一爻入于險中而不害其為安間人之所不可能也易説上六入于穴有不速之客三人來敬之終吉象曰不速之客來敬之終吉雖不當位未大失也伊川先生曰需以險在前需時而後進上六居險之終終則變矣在需之極久而得矣隂止于六乃安其處故為入于穴穴所安也安而既止後者必至不速之客三人謂下之三陽乾之三陽非在下之物需時而進者也需既極矣故皆上進不速不促之而自來也上六既需得其安處羣剛之來苟不起忌疾忿競之心至誠盡敬以待之雖甚剛暴豈有侵凌之理故終吉也或疑以隂居三陽之上得為安乎曰三陽乾體志在上進六隂位非所止之正故無爭奪之意敬之則吉也不當位謂以隂而在上也爻以六居隂為所安象復盡其義明隂宜在下而居上為不當位也然能敬順以自處則陽不能陵終得其吉雖不當位而未至於大失也並易傳橫渠先生曰上無所出故降入自穴恭以納之雖處極上不至於失易説龜山楊氏曰隂宜下而在上不當位也以柔順居之而不為險難雖不當位未大失也當須之終處一卦之外逺于陽也與四異矣故入于穴穴隂所安也三陽需而進不速之客也陽方上行知敬而不為險難其吉宜矣若夫需道之終猶欲懷險以為難亦君子之所不容也能無凶乎易説兼山郭氏曰上六不當有事之地猶有需焉至於三陽彚征不能退聽以違之是以入于穴也敬之終吉未大失而已乃若鴻飛冥冥弋人何慕焉上六坎也故其道如此易説白雲郭氏曰先人曰上六不當有事之地至于三陽彚征不能退聽以違之雖敬之終吉未大失而已乃若鴻飛冥冥弋人何慕焉上六坎也故不足以進此雍曰上六據非其位不能退聽徒知入于穴以避焉僅免夫需血自傷而已故曰未大失也天道上行理之常來而敬之終無凶也夫需之時天下如飢之需食渴之需飲也故于郊于沙于泥出入于穴獨五安然是為需之主然水行需舟陸行需車莫非需也卦特言其大者耳易説漢上朱氏曰需者訟之反三陽自外而入坎兌為穴故曰入于穴客在外主人以辭速之曰吾子入矣主人須矣九五需之主也三陽乾兌居西北之位客也自外而入主人未應不速之客也三人者三爻也故曰不速之客三人來敬者持其正也上六九三當位而應九二初九不當位而不應君子固有至於是邦無上下之交者豈可以不速之客而不敬乎三陽同類也敬其一不敬其二則需之者所失大矣爻辭言不速之客三人來敬之終吉而象辭去其三人止曰不速之客來者為上六也上六於二於初為不當位也當位而應則得一人不當位而兼應之則得三人自不當位言之則失也自得三人言之則雖不當位未大失也終吉者不失其正故吉卦體需也有所失人則失需之義矣卦四陽君子二隂小人於六四戒之以順聽於上六戒之以敬客君子得位則小人必得其所故為小人謀者如此易説新安朱氏曰隂居險極無復有需有陷而入穴之象下應九三九三與下二陽需極並進為不速客三人之象柔不能禦而能順之有敬之之象占者當陷險中然於非意之來敬以待之則得終吉也以隂居上是為當位言不當位未詳本義東萊吕氏曰上六六與三相應更不須避故入于穴然應于一陽則三陽皆進不速之客謂此三陽不速之而自來也上六以隂柔之才處險之極又當三陽之進惟至誠盡敬以待之而不與之較庶幾可以免悔吝曰終吉者即象之所謂未大失也易説合訂刪補大易集義粹言卷九
