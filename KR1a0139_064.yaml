body:
  text: 合訂刪補大易集義粹言卷六十二頭等侍衛納喇性德編兊下兊上伊川先生曰兊序卦巽者入也入而後説之故受之以兊兊者説也物相入則相説相説則相入兊所以次巽也易傳兊亨利貞伊川先生曰兊説也説致亨之道也能説於物物莫不説而與之足以致亨然為説之道利於貞正非道求説則為邪諂而有悔咎一作吝故戒利貞也易傳白雲郭氏曰兊之為説非有意於説人亦非有意於求説天下有説之道在上者不違是道以臨人在下者得其志而自説耳使有心於其間非兊也兊之所以亨者此也何謂説之道即王道是也然使有心於其間則為常人私欲之情非天下之公説是以利貞惟貞則無私矣故兊因貞而利也易説新安朱氏曰兊説也一隂進乎二陽之上喜之見乎外也其象為澤取其説萬物又取坎水而塞其下流之象卦體剛中而柔外剛中故説而亨柔外故利於貞蓋説有亨道而其妄説不可以不戒故其占如此又柔外故為説亨剛中故利於貞亦一義也本義東萊吕氏曰兊以説為義人情憂則抑塞説則流暢所以亨也然人情相説則易流於其所順利者茍非正則必入於淫僻所利者正則説之正體也聖人彖兊之義而指正體以示人彖曰兊説也剛中而柔外以卦體論之上下卦中爻皆剛而外爻皆柔夫柔和樂易固為可説儻其中無所守則其所謂樂易可説者必易流動故惟剛中而柔外説以利正則至公無偏而上有以順乎天歡欣浹洽而下有以應乎人此則兊之大體也自説以先民而下則兊之用也大抵當適意時而説與處安平時而説皆未足為難惟當勞苦患難而説始見真説聖人以此先之故能使之任勞苦而不辭赴患難而不畏如文王之作靈臺庶民攻之不日成之則民忘其勞也楚莊王伐蕭軍士多寒王循而撫之三軍之士如挾纊此雖未足以望聖人之師是亦三代使民忘勞之遺意也至於説之大民勸矣哉又指説之正體而結上文也易説彖曰兊説也剛中而柔外説以利貞是以順乎天而應乎人説以先民民忘其勞説以犯難民忘其死説之大民勸矣哉伊川先生曰兊之義説也一隂居二陽之上隂説於陽而為陽所説也陽剛居中中心誠實之象柔爻在外接物和柔之象故為説而能貞也利貞之道宜正一作貞也卦有剛中之德能貞者也説而能貞是以上順天理下應人心説道之至正至善者也若夫違道以干百姓之譽者茍説之道違道不順天干譽非應人茍取一時之説耳非君子之正道君子之道其説於民如天地之施感於其心而説服無斁故以之先民則民心説隨而忘其勞率之以犯難則民心一無心字説服於義而不恤其死説道之大民莫不知勸勸謂信之而勉力順從人君一作君人之道以人心説服為本故聖人贊其大易傳藍田吕氏曰兊有所説而不觳也白雲郭氏曰兊之為象剛居中而柔在外剛居中則無私柔在外則足以説物無私則貞足以説物則亨此兊之所以亨利貞也順乎天而應乎人者兊説有道得其道則能順天而應人以盡天下之大公失其道則不能順乎天而溺於私心是亦不能應人之望也昔湯之征也東面而征西夷怨南面而征北狄怨曰奚為後我此得兊説之道者也武王自西自東自南自壯無思不服此亦得兊説之道者也所謂順乎天而應乎人者若湯武是已孟子論以德服人者中心悅而誠服也中心悅而誠服兊之道也是能應乎人者也能應乎人則順天矣其應人也非寒而衣之飢而食之又非有矜憐撫奄之言使之聞之也聖人惟知道耳故聖人知道而不知説天下知説而不知道道行有必致之説初非有期於民者也説以先民民忘其勞説以犯難民忘其死非聖人固如是以説人也在道論之則非民情之説聖人有所不敢為必説在事為之先則民可忘勞説在患難之先則民可忘死民或未説而欲覬其忘勞忘死雖聖人不能也是以聖人平居無事之日使民飽食暖衣養生送死無憾所謂説以先之也故文王事紂非不能説民也武王卒伐功非能説民也順天應人之道聖人不得私焉昧者充私情故勞而日拙聖人明公道故逸而日休天下可以無事處之矣説道之大有至於此是以視民之自勸皆可見説之大也孟子嘗謂齊宣王曰取之而燕民悅則取之取之而燕民不悅則勿取若孟子者所謂知説之先民者歟易説漢上朱氏曰兊以一隂居二陽之上隂説於陽而見乎外者也兊巽之反初六之上六四之三柔説於外二五不失其中以説行剛而剛柔皆亨故曰兊亨彖曰兊説也此合兩體卦變而言兊也剛中則實柔外則接物以和説而正則和而不流卦九五剛中而正九二剛中而又戒之以利貞者二三四不正不正則陷於邪諂悔吝將至故説道利正非道求説不利也亦何由亨哉故曰剛中而柔外説以利貞此以兩體六爻言兊也乾天也上五天位也坤順也初六之上而説順乎天也三四人位也六四九三相易而説應乎人也天人殊位順乎天者要在於應乎人而已天之説萬物隂陽相説降而為澤説之非其時則亦不能説矣湯武之征伐出其民於水火之中而民大説是所以順天也知人則知天知天則知説之道故曰順乎天而應乎人此以上六六三兩爻而言兊也坤為衆民也坎為勞兊決坎為大川險難也坤為死以內卦言兊先於坤説以先民也坤衆從之兊見坎伏民忘其勞也以外卦言之巽股而涉大川之險坤化為兊民忘其死也夫就佚辭勞好生惡死民之常情用之以説乃忘四體之勤決一旦之命而不顧非説之以道能如是乎古之人有行之者周公之東征是也故曰説以先民民忘其勞説以犯難民忘其死民和則氣和氣和則天地之和應説之大天地不能違而況於民乎故曰民勸矣哉此再合兩體兼伏爻而言兊也在卦氣為秋分故太玄準之以沈易傳新安朱氏曰兊説釋卦名義説之大民勸矣哉以卦體釋卦辭而極言之本義兊説若不是剛中便成邪媚下面許多道理都從這箇剛中柔外來説以先民如利之而不庸順天應人革卦就革命上説兊卦就説上説後人都做應天順人説了到了順天應人是言順天理應人心胡致堂管見中辨這箇也好説若不剛中便是違道干譽並語録東萊吕氏曰彖之言王者之事象之言乃學者之事此又聖人舉一隅以示人欲學者以三隅反而見易道之無窮也在王者觀之如此在卿大夫觀之如此在學者觀之又如此各隨所觀而見其義至於説之體則一也故易之觀象有指一卦之義而言之者如艮之象曰君子思不出其位之類是也有兼他義而言之者如革之治厯明時是也觸類而通則兊之象固可見矣麗澤兊兩澤相並之象大凡兩澤相麗則水氣相通浸潤浹洽兩有所資正如朋友之交相琢磨也大抵事皆不可過於説和易而過於説必入於淫邪恩義而過於説必至於煩瀆至於朋友講習最天下之可説雖説之過亦無害也講習之益朝夕相處不惟切磋琢磨之際有益也其意氣相浹洽如兩澤相並浸潤漸漬雖不言之中而更相感發者固多矣不惟就問能者然後有益雖不能者問於我亦可因以自覺無非有益於我者也今之學者惟其不專意於講習故羣居相與多至於爭是非較勝負使其一意講習則秪見處衆之可樂而不見其多事矣學者欲自驗為學者之進否觀其處衆之樂與否可也易説象曰麗澤兊君子以朋友講習濓溪先生曰人生而蒙長無師友則愚是道義由師友有之而得貴且尊其義不亦重乎其聚不亦樂乎通書康節先生曰兊説也其它説皆有所害惟朋友講習無説於此故言其極者也觀物外篇伊川先生曰麗澤二澤相附麗也兩澤相麗交相浸潤互有滋益之象故君子觀其象而以朋友講習朋友講習互相益也先儒謂天下之可説莫若朋友講習朋友講習固可説之大者然當明相益之象易傳天下之説不可極惟朋友講習雖過説無害兊澤有相滋益處一本注云兊澤有自相滋益之意語録藍田吕氏曰澤用麗則相漸潤朋友講習有相漸潤之益白雲郭氏曰麗者附著相連之意亦見上下之説誠意交而連結也説之大有見於順天應人而其微有見於朋友講習蓋順天應人之説與朋友講習之説大小不同其情一也孔子曰學而時習之不亦説乎有朋自逺方來不亦樂乎此朋友講習所以為説也況天下大説又有在於朋友講習之間乎易説漢上朱氏曰麗連比也澤水所鍾兩澤相麗重説也説之大者也天下之可説而無斁者無若朋友講習之為大也易傳曰兩澤相麗互有滋益朋友講習互相益也兊與兊同類為朋初上五始終以正相助為友兊為口為講兩兊為習九五初九之君子以朋友講其所知習其所行相滋相益體麗澤之象易傳新安朱氏曰兩澤相麗互相滋益朋友講習其象如此本義初九和兊吉象曰和兊之吉行未疑也伊川先生曰初雖陽爻居説體而在最下無所係應是能卑下和順以為説而無所偏私者也以和為説而無所偏一無偏字私説之正也陽剛則不卑居下則能巽處説則能和無應則不偏處説如是所以吉也有求而和則涉於邪諂初隨時順處一作處順心無所係無所為也以和而已是以吉也象又以其處説在下而非中正故曰行未疑也其行未有可疑謂未見其有失也若得中正則無是言也説以中正為本爻直陳其義象則推而盡之並易傳橫渠先生曰以陽居下無所比附出門同人行自信者也易説藍田吕氏曰初九居兊之初以剛在下剛柔不過者也以此行説未有疑之者故吉白雲郭氏曰初九固非知道者之事而知兊説在和其去道不逺矣是以得兊之吉也夫知和為説不和為非説則上不諂媚以從人而下無私情示人之失是則用和為貴何所疑乎疑者上不知説之在道次不知説之在和既惑於説與不説之際是以其行不能無疑也吉亦無自而至矣易説漢上朱氏曰初九剛而處説無偏係之私能可否相濟者也故曰和兊九四疾惡六三小人然體巽不果不果疑也初九動而上行以濟其決而巽毁九四相易六亦得位而正正則吉故曰和兊吉初九逺於六三無嫌於説小人九四未疑也是以能濟其決否則四疑矣晉訾祐實直而博范宣子朝夕顧之以問國事不正其身未有能決人之疑者故曰和兊之吉行未疑也易傳新安朱氏曰以陽爻居説體而處最下又無係應故其象占如此行未疑居卦之初其説也正未有所疑也並本義九二孚兊吉悔亡象曰孚兊之吉信志也伊川先生曰二承比隂柔隂柔小人也説之則當有悔二剛中之德孚信內充雖比小人自守不失君子和而不同説而不失剛中故吉而悔亡非二之剛中則有悔矣以自守而亡也心之所存為志二剛實居中孚信存於中也志存誠信豈至説小人而自失乎是以吉也並易傳橫渠先生曰私係於近悔也誠於接物信而不妄吉且悔亡易説白雲郭氏曰九二有剛中之德蓋賢者之能自治者也故知説之在我不在於天下不求説於天下而孚兊之道自信其志彼天下之説有不期而自至者矣是以吉而悔亡也使有心求説於天下而不知信其在我者則徇外忘內物我兩失之剛中之賢固如是乎有賢如此未有事是君為容説者也昔成湯克寬克仁彰信兆民蓋信在我而信之者在人雖君臣之道不同其與九二孚兊信志之理一也易説漢上朱氏曰六三小人非道來説九二比之以陽説隂宜有悔且凶九二誠實自信於中動則九五應之信孚於人久矣雖比於小人和而不同矣何疑於相比哉始雖未孚終必相説二動而正正則吉而悔亡故曰孚兊之吉信志也夫石碏石厚父子也叔向叔魚兄弟也子産伯有同族也雖比也豈能説之易傳曰志存誠信豈至説小人而自失乎易傳新安朱氏曰剛中為孚居隂為悔占者以孚而説則吉而悔亡矣本義六三來兊凶象曰來兊之凶位不當也伊川先生曰六三隂柔不中正之人説不以道者也來兊就之以求説也比於在下之陽枉已非道就以求説所以凶也之內為來上下俱陽而獨之內者以同體而隂性一作性隂下也失道下行也自處不中正無與而妄求説所以凶也並易傳白雲郭氏曰來兊求説也説自有道其可求乎失道求説是以凶也易説漢上朱氏曰兊巽之反初二三皆自外來柔不當位而乘剛求説於二説之不以道者也故曰來兊三髙位也柔邪而説髙位凶矣故曰來兊凶楚費無忌漢息夫躬唐伾文乎易傳新安朱氏曰隂柔不中正為兊之主上無所應而反來就二陽以求其説凶之道也本義九四商兊未寧介疾有喜象曰九四之喜有慶也伊川先生曰四上承中正之五而下比柔邪之三雖剛陽而處非正三隂柔陽所説也故不能決而商度未寧謂擬議所從而未決未能有定也兩間謂之介介限也地之界則加田義乃同也故人有節守謂之介若介然守正而疾逺邪惡則有喜也從五正也説三邪也四近君之位若剛介守正疾逺邪惡將得君以行道福慶及物為有喜也若四者得失未有定繫所從耳所謂喜者若守正而君説之則得行其陽剛之道而福慶及物也並易傳橫渠先生曰通其邪佞使進而上則小人道長而不寧以諂為疾而拒外之則終不失其得偶之慶也易説藍田吕氏曰九四商兊如賈求售上説乎五恐不獲乎上是以未寧能介六三諂邪之疾故有喜喜則有慶受上寵也白雲郭氏曰當兊之時處上下之際不妄從説而擬議不遑寧是知所擇者也為臣如此賢矣哉故終有介疾之喜也介然自守外患不能入故能全兊説之喜喜非獨一身而已終亦有及物之慶也昔伊尹五就湯五就桀湯三使往聘之然後幡然而改所謂商兊未寧者如此至於享天心革夏正所謂有喜有慶也且隂者陽所説也舍所説而比五故為商兊之義然兊之象剛中柔外其象上行九四舍三而比五上行也至於九五比上失在小人蓋亦上行之象雖其性均本乎象而得失之異則係乎爻伊川曰兩間謂之介介分限也故人之守節者謂之介易説漢上朱氏曰離兊為螺貝貨財也四動離為震噬嗑為市之象巽變之其於市也為利三倍商賈之象商賈度利而動故又為商度之象動承坎坎勞卦勞未寧也商兊未寧者擬議所從度利而未定者乎介者陽剛介於三五之間也從五正也從三不正也隂陽失位為疾九四陽失位六三隂失位九四以君子疾小人六三以小人疾君子九四宜有憂矣而有喜九五陽得位為喜四疾六三不與之交動而正上從於五則君臣相説而有喜矣夫唐虞文武之際得人為盛而四族三叔未嘗不疾君子然不害為治者從君子而不從小人可不慎其所從乎易傳曰若剛介守正疾逺邪惡將得君行道福慶及物為有喜也若四者得失未有定係所從耳易傳新安朱氏曰四上承九五之中正下比六三之柔邪故不能決而商度所説未能有定然質本陽剛故能介然守正而疾惡柔邪也如此則有喜矣象占如此為戒深矣本義九五孚于剝有厲象曰孚于剝位正當也伊川先生曰九五得尊位而處中正盡説道之善矣而聖人復設有厲之戒蓋堯舜之盛未嘗無戒也戒所當戒而已雖聖賢在上天下未嘗無小人然不敢肆其惡也聖人亦説其能勉而革面也彼小人者未嘗不知聖賢之可説也如四凶處堯朝隱惡而順命是也聖人非不知其終惡也取其畏罪而強仁耳五若誠心信小人之假善為實善而不如其包藏則危道也小人者備之不至則害於善聖人為戒之意深矣剝者消陽之名隂消陽者也蓋指上六故孚于剝則危也以五在説之時而密比於上六故為之戒雖舜之聖且畏巧言令色安得不戒也説之感人易入而可懼也如此戒孚于剝者以五所處之位正當戒也密比隂柔有相説之道故戒在信之也並易傳橫渠先生曰説六三之進則是孚于剝近危之道也故處乎盛位者佞不可親也當正位而進小人信乎剝之道也易説白雲郭氏曰當兊之時居九五中正之位宜其天下心説誠服而此有厲何哉蓋兊之象上行不知擇賢而比之反上親容悅小人之徒是以危也夫既得其位又得其時不能孚兊之道而上比小人故孔子惜其得位而失道則曰孚于剝位正當也剝者小人之事安足與語説之大乎古之人君或以小人之術自任雖茍一時之譽終不能究大人之造者孚于剝之謂也孟子曰舍其梧檟養其樲棘則為賤場師焉惜乎九五之未進此道也易説漢上朱氏曰剝隂消陽也六三在下進而上則四五消有剝牀之象故六三謂之剝九五正天位有剛健中正之德當乎位位與德非不足也然孚於六三之小人則九五危矣六三取説而已無獻可替否之義小人道長則君子之道日消安得不危易傳曰巧言令色孔壬舜且畏之其可忽諸易傳新安朱氏曰剝謂隂能剝陽者也九五陽剛中正然當説之時而居尊位密近上六上六隂柔為説之主處説之極能妄説以剝陽者也故其占但戒以信於上六則不危也位正當者與履九五同本義上六引兊象曰上六引兊未光也伊川先生曰他卦至極則變兊為説極則愈説上六成説之主居説之極説不知己者也故説既極矣又引而長之然而不至悔咎何也曰方言其説不知己未見其所説善惡也又下乘九五之中正無所施其邪説六三則承乘皆非正是以有凶説既極矣又引而長之雖説之之心不已而事理已過實無所説事之盛則有光輝既極而強引之長其無意味甚矣豈有光也未非必之辭象中多用非必能有光輝謂不能光也並易傳橫渠先生曰與三為類而引升之雖不傷類然未足多也易説白雲郭氏曰説有引之而説者從人也隂柔不足以有為引之則從人而説蓋上六不當有事之象無毁無譽特不能光大而已於道固無得而亦未至於失已故吉凶悔吝無得而言焉易説漢上朱氏曰上説道之成六正已輔九五剛健中正之君宜有膏澤下於民而未光何也以引六三之小人也三巽為繩離為光上六之説三相引之如舉繩然為山一簣之虧也此所以未光歟六三兊之小人也故初九剛正者不疑於三而行也九二剛中不比於三也而悔亡九四以三為疾九五孚於三而厲上六引三而未光小人以説進而為害其可不慮乎易傳新安朱氏曰上六成説之主以隂居説之極引下二陽相與為説而不能必其從也故九五當戒而此爻不言其吉凶本義合訂刪補大易集義粹言卷六十二
