body:
  text: 合訂刪補大易集義粹言卷一頭等侍衛納喇性德編上經乾下乾上康節先生曰不知乾無以知性命之理觀物外篇伊川先生曰上古聖人始畫八卦三才之道備矣因而重之以盡天下之變故六畫而成卦重乾為乾乾天也天者乾之形體乾者天之性情乾健也健而無息之謂乾夫天專言之則道也天且弗違是也分而言之則以形體謂之天以主宰謂之帝以功用謂之鬼神以妙用一無用字謂之神以性情謂之乾乾者萬物之始故為天為陽為父為君易傳後人解易言乾天道也坤地道也便是亂説論其體則天尊地卑論其道豈有異哉劉元承手編乾坤古無此二字作易者特立此二字以明難明之道乾坤毁則無以見易須以意明之以此形容天地間事語録橫渠先生曰不曰天地而曰乾坤言天地則有體言乾坤則無形故性也者雖乾坤亦在其中易説和靖尹氏曰昔見伊川問易乾坤二卦斯可矣伊川曰聖人設六十四卦三百八十四爻後世尚不能了乾坤二卦豈能盡也既坐伊川復曰子以為何人分上事對曰聖人分上事曰若聖人分上事則乾坤二卦亦不須況六十四卦乎二程全書又曰易之八卦皆在於乾坤故曰六子今考其畫觀其生卦處甚分明曰此事除康節理會得畫卦離曰隂陽之相麗如此中虛故明中虛能受如此等皆可推而知文王以是因之而六十四卦可謂盡矣揚雄復用此廣而作太玄蓋聖人初以乾而生八以八而生六十四卦推此以往天下萬物之理如是而已才再生之便贅也若物物事事而立一卦則百玄亦未能盡若其理則自乾生八自八生六十四已是儘説破這道理學者須要知此是以文王以八因六十四人不為非揚雄以六十四易而成玄人皆知其非也若仲尼只説箇一以貫之不可謂不盡也上蔡謝氏曰昔富彥國問邵堯夫云一從甚處起邵曰公道從甚處起富曰一起於震邵曰一起於乾問兩説如何謝曰兩説都得震謂發生乾探本也若會得天理更説甚一二邵子全書白雲郭氏曰包犧名卦必備三才之義故自太極離而為八名曰乾坤震巽坎離艮兑至文王重卦之後然後三才八卦不一而足而天地人之道或分矣獨分卦之名因之不改是以其義特異於諸卦也説卦曰乾為天故世之説乾者止於天不得其道又以天為體乾為用夫以乾止於天則乾象當一畫不當有人道地道而備三才也孔子曰乾陽物也自道言之乾坤天地人無非一物則是三才陽物皆乾之道故説卦曰乾為天在天之乾也為圜在象之乾也為君為父在人之乾也為玉為金為寒為冰為大赤為馬為木果在地在物之乾也以乾能備三才萬物之象而三才萬物之一物不能兼乾之象故不得獨名曰天而必名曰乾也又況乾坤道也天地物也得是道而後為物故天得乾之道而為天也八卦之名皆與此同義易説新安朱氏曰六畫者伏羲所畫之卦也一者竒也陽之數也乾者健也陽之性也本注乾字三畫卦之名也下者內卦也上者外卦也經文乾字六畫卦之名也伏羲仰觀俯察見隂陽有竒耦之數故畫一竒以象陽畫一偶以象隂見一隂一陽有各生一隂一陽之象故自下而上再倍而三以成八卦見陽之性健而其成形之大者為天故三竒之卦名之曰乾而擬之於天也三畫已具八卦已成則又三倍其畫以成六畫而八卦之上各加八卦以成六十四卦也此卦六畫皆竒上下皆乾則陽之純而健之至也故乾之名天之象皆不易焉本義問乾繫辭下解云聖人始畫八卦三才之道備矣因而重之以盡天下之變故六畫而成卦據此説却是聖人始畫八卦每卦便是三畫聖人因而重之為六畫似與邵子兩生四四生八八生十六十六生三十二三十二生六十四為六畫不同先生曰程子之意只云三畫上疊成六畫八卦上疊成六十四耳與邵子説不同康節此意不曾説與程子程子亦不及問之故一向只隨他所見去但他説聖人始畫八卦不知聖人畫八卦時先畫甚卦此處便曉他不得問乾者天之性情曰健之體為性健之用是情問乾坤天地之性情性是性情是情何故兼言之曰乾健也動靜皆健坤順也動靜皆順靜是性動是情乾坤是性情天地是皮殼其實只是一箇道理問天專言之則道也曰所謂天命之謂性此是説道所謂天之蒼蒼此是説形體所謂惟皇上帝降衷于下民此是説帝以此理付人便有主宰意又曰天道虧盈而益謙地道變盈而流謙此是形體問主宰謂之帝孰為主宰曰自有主宰蓋是箇至剛至陽之物自然如此運轉不息所以如此者必有為之主宰者此等處要人自見得非言語所能盡也因舉莊子孰主張是孰綱維是一段曰他也見得這道理乾後三畫是隂坤後三畫是陽乾卦連致知格物誠意正心都説了坤卦只是説箇持守柔順貞固而已坤卦是箇無頭物事都不能為首只是循規蹈矩依而行之乾父坤母意亦可見乾卦如創業之君坤卦如守成之君乾如蕭何坤如曹參如云先迷後得先迷者無首也後獲者迷於先而獲於後也乾則不言所利坤則利牝馬之貞每每不同所以康節云乾無十坤無一乾至九止竒數也坤耦數也或云乾無十者有坤以承之坤無一者有乾以首之曰然乾坤隂陽以位相對言固只一般然以分而言乾尊坤卑陽尊而隂卑不可並也以一家言之父母固皆尊然母終不可以並乎父所謂尊無二上也物物有乾坤之象雖至微至隱纎毫之物亦無不有者子細推之皆可見並語録乾元亨利貞濂溪先生曰元亨誠之通利貞誠之復大哉易也其性命之源乎通書康節先生曰元者春也仁也春者時之始仁者德之長時則未盛而德足以長人故言德而不言時亨者夏也禮也夏者時之盛禮者德之文盛則必衰而文不足以救之故言時而不言德故曰大哉乾元而上九有悔也利者秋之義也秋者時之成義者德之方萬物方成而獲利義者不通於利故言時而不言德也貞者冬也冬者時之末智者德之衰正則吉不正則凶故言德而不言時也故言利貞者性情也元亨利貞之德各包吉凶悔吝之事雖行乎德若違於時亦或凶矣觀物外篇明道先生曰亭毒化育皆利也不有其功常久而不已者貞也詩曰維天之命於穆不已者貞也劉絢師訓伊川先生曰元亨利貞謂之四德元者萬物之始亨者萬物之長利者萬物之遂貞者萬物之成唯乾坤有此四德在他卦則隨事而變焉故元專為善大利主於正固亨貞之體各稱其事四德之義廣大矣易傳讀易須先識卦體如乾有元亨利貞四德闕却一箇便不是乾須要認得楊遵道録夫易卦之德曰元亨利貞或為四曰元也亨也利也正也或為二曰大亨也利於正也其辭既同義可異乎所以異者何謂雜著䇿問橫渠先生曰乾之四德終始萬物迎之不見其首隨之不見其後然推本而言當父母萬物天下理得元也會而通亨也説諸心利也一天下之動貞也貞者專靜也又曰仁統天下之善禮嘉天下之會義公天下之和信一天下之動並易説和靖尹氏曰乾坤之外言元亨者固有也言利貞者所不足而可以有功也有不同者革漸是也隨卦可見豫遁姤旅言時義坎睽蹇言時用頤大過解革言時各以其大也藍田吕氏曰元所以本也亨所以交也利所以成功也貞所以為主也兼山郭氏曰乾道也元亨利貞者其德也乾之有是四德由天之有四時人之有四端莫之致而常自然與生俱生者也是故乾得之以成道天得之以成歲人得之以成性何莫由斯道也易説漢上朱氏曰乾健也元始也亨通也升降往來周流六虛而不窮者也利者得其宜也貞者正也初九九三九五正也九二九四上九變動亦正也故九二曰龍德而正中者也乾具此四德故為諸卦之祖程皓曰一德不具不足謂之乾伏羲初畫八卦乾坤坎離震巽兑艮因而重之歸藏之初經是也商人作歸藏首坤次乾夏后氏作連山首艮而乾在七其經卦皆六十有四至於文王首乾次坤以乾坤坎離為上篇震巽艮兑為下篇繫以卦下之辭周公繼之乃有爻辭易傳又曰正字足以盡貞乎曰不足以盡之貞有堅固守正之意有以守柔為正者有以守剛為正者有雖柔也當堅守乎其剛所謂用六也元亨利貞四者皆周流圓轉以盡易之用故非知變不足以盡之或厲或悔或吝不善用之者也叢説白雲郭氏曰文言之初言四德後又曰乾元者始而亨者也利貞者性情也又觀餘卦利牝馬之貞利君子貞之類則疑其以元亨二德為一利貞二德為一矣蓋自易論之乾陽物也坤隂物也由乾之一卦論之則元與亨陽之類也利與貞隂之類也是猶春夏秋冬雖為四時由隂陽觀之則春夏為陽秋冬為隂是以四德或為二義可也且四德者在卦則合天地人而言之曰元亨利貞在天地人别而言之雖亦曰元亨利貞然天之所謂元亨利貞者如立天之道隂與陽之類是也地之所謂元亨利貞者如立地之道柔與剛之類是也人之所謂元亨利貞者如立人之道仁與義之類是也天地人之隂陽剛柔仁義皆可謂之元亨利貞而卦之元亨利貞不可謂之隂陽不可謂之剛柔不可謂之仁義者以卦得兼三才而三才之一物不得以兼卦故也是以乾之道天得之而為天君父得之而為君父圜得之而為圜木果得之而為木果大小不同其具四者則一而已所謂語大天下莫能載語小天下莫能破其道一也文王之易乾卦六畫之下惟元亨利貞四字而已至周公益六位爻辭六十二字而易道備孔子彖象文言成今之易而後世明觀文王之易則知周公事業所謂郁郁乎文者也亦見文王無聲無臭同於上天之載天不已文王亦不已之義由文王以觀包犧之畫則知包犧範圍天地之道同於太極至矣易説五峰胡氏曰當時諸侯紀元乃是實事與後世改元者不同也聖人於元上見義若諸侯無元則亦不成為君矣如元享利貞乾坤四德在他卦亦有之不可謂乾坤方得有元他卦不得也文集新安朱氏曰元亨利貞文王所繫之辭以斷一卦之吉凶所謂彖辭者也元大也亨通也利宜也貞正而固也文王以為乾道大通而至正故於筮得此卦而六爻皆不變者言其占當得大通而必利在正固然後可以保其終也此聖人所以作易教人卜筮而可以開物成務之精意餘卦放此木義元亨利貞文王本只是説大亨而利於正至夫子然後解作四德元亨利貞譬諸穀可見穀之生萌芽是元苖是亨穟是利成實是貞穀之實又復能生循環無窮又曰元是未通底亨利是收未成底貞是已成底譬如春夏秋冬冬夏便是隂陽極處其間春秋便是過接處梅蕊初生為元開花為亨結子為利成熟為貞物生為元長為亨成而未全為利成熟為貞乾之四德元譬之則人之首也手足之運動則有亨底意思利則配之胸臟貞則元氣之所藏也又曰以五臟配之尤明白且如肝屬木木便是仁心屬火火便是禮肺屬金金便是利腎屬水水便是貞元亨利貞理也有這四段氣也有這四段理便在氣中兩箇不曾相離若是説時則有那未涉於氣底四德要就氣上看也得所以伊川説元者物之始亨者物之遂利者物之實貞者物之成這雖是就氣上説然理便在其中伊川這説話改不得謂有是氣則理便具所以伊川只恁地説便可見得物裏面便有這理若要親切莫若只就自家身上看惻隱須有惻隱底根子羞惡須有羞惡底根子這便是仁義禮智便是元亨利貞孟子所以只得恁地説若不恁地説更無説處仁義禮智似一箇包子裏面合下都具了一理渾然非有先後元亨利貞便是如此不是説道有元之時有亨之時元亨利貞只就物上看亦分曉所以有此物便是有此氣所以有此氣便是有此理所以易傳只説元者萬物之始至萬物之成不説氣只説物者言物則氣與理皆在其中元亨繼之者善也陽也利貞成之者性也隂也元亨利貞無斷處貞了又元今日子時前便是昨日亥時物有夏秋冬生底是到這裏方感得生氣他自有箇小小元亨利貞氣無始無終且從元處説元之前又是貞了元亨利貞在這裏都具了楊宗範却説元亨屬陽利貞屬隂此却不是乾之利貞是陽中之隂坤之元亨是隂中之陽問元亨誠之通利貞誠之復元亨是春夏利貞是秋冬秋冬生氣既散何以謂之收斂先生曰其氣已散乃其理耳又問冬間地下氣暖便也是氣收斂在內否先生曰上面氣自散了下面暖底乃自是生來却不是已散之氣復為生氣也乾元亨利貞與屯卦元亨利貞只一般聖人借此四字論乾之德然本亦非四件事也正字不能盡貞之義須用連正固説其義方全正字也有固字意思但不分明終是欠闕正如孟子所謂知斯二者弗去是也知斯是正意弗去是固意問乾元亨利貞猶言性仁義禮智先生曰然仁義中正同乎一理者也而析為用誠若有未安者然仁者善之長也中者嘉之會也義者利之宜也正者貞之體也而元亨者誠之通也利貞者誠之復也是則安得為無體用之分哉萬物之生同一太極也而謂其各具則亦有可疑者然一物之中天理完具不相假借不相凌奪此統之所以有宗會之所以有元也是則安得不曰各具一理哉又曰元者天之所以為仁之大德也又曰利貞者性情也一元之氣亨通發散品物區形天地之心盡發見在品物上但叢雜難看及到利貞時則萬物悉已收斂那時只有箇天地之心單單著見故云利貞者性情也正與復其見天地之心相似楊至之問通書水隂根陽火陽根隂與五行隂陽隂陽太極為一截四時運行萬物終始與混兮闢兮其無窮兮為一截混兮是利貞誠之復闢兮是元亨誠之通然孔門多説仁智如元亨利貞元便是仁貞便是智四端仁智最大無貞則元無起處無智則如何是仁易曰大明終始有終便有始也智之所以為大者以其有知也以元亨利貞分配繼善成性一段光祖問四德之元猶五常之仁偏言則一事專言則包四者曰元是初發生出來生後方會通通後方始向成利者物之遂方是成得六七分到貞處方是十分成此偏言也然發生中已具後來許多道理此專言也惻隱是仁之端羞惡是義之端辭遜是禮之端是非是智之端若無惻隱便都沒下許多到羞惡也是仁發在羞惡上到辭遜也是仁發在辭遜上到是非也是仁發在是非上又問這是猶金木水火是否曰然仁是木義是金禮是火智是水又溫底是元熱底是亨涼底是利寒底是貞以天道言之為元亨利貞以四時言之為春夏秋冬以人道言之為仁義禮智以氣候言之為溫涼燥濕以方言之為東南西北周貴卿問元亨利貞以此四者分配四時却如何云乾之德也曰它初只是説大亨利於正不以分配四時孔子見此四字好後始分作四件説孔子之易與文王之易略自不同伏羲易自是伏羲易文王易自是文王易孔子易自是孔子易易之元亨利貞本來只是大亨而利於正雖有亨若不正則那亨亦使不得了當時文王之意祗是為卜筮設故祗有元亨更無有不元亨祗有利貞更無有不利貞後來夫子於彖既以元亨利貞為四德更不做大亨利貞説了易只是為卜筮而作故周禮分明言太卜掌三易連山歸藏周易古人於卜筮之官立之凡數人秦去古未逺故周易亦以卜筮得不焚今人才説易是卜筮之書便以為辱纍了易見夫子説得許多道理便以為易只是説道理殊不知其言吉凶悔吝皆有理而其教人之意無不在也夫子見文王所謂元亨利貞者把來作四箇説道理亦自好故恁地説他但文王當時未有此意今若以元者善之長亨者嘉之會利者義之和貞者事之幹與求卜筮者豈不大糊塗了他要之文王者自不妨孔子之説孔子者自不害文王之説然孔子却不是曉文王意不得但它又自要一樣道理也聖人之動便是元亨其靜便是利貞都不是間底動靜道夫問天地生物氣象如溫厚和粹即天地生物之仁否曰這是從生處説來如所謂大哉乾元萬物資始至哉坤元萬物資生那元字便是生物之仁資始是得其氣資生是成其形到得亨便是它彰著利便是結聚貞便是收斂既無形迹又須復生至如夜半子時此物雖存猶未動在到寅卯便生己午便著申酉便結亥子丑便實及至寅又生他這箇只管運轉一歲有一歲之運一月有一月之運一日有一日之運一時有一時之運雖一息之微亦有四箇段子恁地轉運但元則是始初未至於著如所謂怵惕惻隱存於人心自恁惻隱地未至大段發出道夫曰它所以謂滿腔子是惻隱之心蓋以其未散也曰它這箇事事充滿如惻隱則皆是惻隱羞惡則皆是羞惡辭遜是非則皆是辭遜是非初無不充滿處但人為己私所隔故多空濶處耳戊己土律中黃鍾之宫詹卿以為陽生於子至午而盡到未又生出一黃鍾這箇即可説話某思量得不是恁地蓋似此元亨利貞黃鍾略略似箇乾字宫是在中字中間又似是非在惻隱之前其它春音角夏音徴秋音商冬音羽此惟説宫聲如京房準律十三短中為黃鍾不動十二維絃便柱起應十二月並語録又感興詩曰元亨播羣品利貞固靈根非誠諒無有五性實斯存世人逞私見鑿智道彌昏未若林居子幽探萬化原文集廣漢張氏曰或問孟子曰可欲之謂善伊川謂與元者善之長同理又曰乾聖人之分也可欲之善屬焉剛中嘗謂孟子言可欲非私欲之欲也自性之動而有所之焉者耳於可與不可之際甚難擇姑以近者言之如飲食男女人之所大欲人孰不欲富貴亦皆天理自然循其可者而有所之如飢而食渴而飲以禮則得妻以其道而得富貴之類則天理也過是而恣行妄求則非天理矣故書曰敬修其可願孟子又曰無欲其所不欲是也乾聖人之分豈謂聖人之動皆循天理而然歟以坤為學者之事莫是有馴致之意否元者天德也孟子所謂善豈指天理而言歟橫渠又曰明善必明於未可欲之際未可欲謂大本未發者否見於可欲則性之苗裔已發見者未可欲則本性全體渾然不容一毫之偽明之之功何自而先莫亦當先從事於可不可之際審擇而固執之否愚見如此中心亦未安恐伊川引乾元處别有深意答曰人具天地之心所謂元者也由是而發見莫非可欲之善也其不由是而發則為血氣所動而非其可矣聖人者是心純全渾然乾知大始之體也故曰乾聖人之分可欲之善屬焉在賢者則由積習以復其初坤作成物之用也故曰坤學者之事也有諸己之信屬焉今欲用工宜莫先於敬用工之久人欲寖除則所謂可者蓋可得而存矣若不養其源徒欲於其發見之際辨擇其可與不可則恐紛擾而無日新之功也答宋伯潛又作桂陽學記曰聖賢之書大要教人使不迷失其本心者也一人之心天地之心也其周流而該遍者本體也在乾坤曰元而在人所以為仁也故易曰元者善之長也而孟子曰仁者人也合而言之道也禮曰人者天地之心也而人之所以私偽萬端不勝其過失者梏於氣動於欲亂於意而其本體以陷溺也雖曰陷溺然非可遂殄滅也並南軒集東萊吕氏曰乾元亨利貞如堯欽明文思為堯舜濬哲文明為舜麗澤論説又曰人生而靜天之性也乃中正仁義之體而萬物之一源也中則無不正矣必並言之曰中正仁則無不義矣必並言之曰仁義亦猶元可以包四德而與亨利貞俱列仁可以包四端而與義禮智同稱此所謂合之不渾離之不散者也與朱元晦書初九潛龍勿用伊川先生曰下爻為初九陽數之盛故以名陽爻理無形也故假象以顯義乾以龍為象龍之為物靈變不測故以象乾道變化陽氣消息聖人進退初九在一卦之下為始物之端陽氣方萌聖人側微若龍之潛隱未可自用當養晦以俟時易傳乾六爻如欲見聖人曾履處當以舜可見在側陋時便是潛陶漁時便是見升聞時便是乾乾納于大麓時便是躍楊遵道録橫渠先生曰易雖以六爻為次序而言如此則是以典要求也乾初以其在初處下況聖德修而未成者可也上以居極位畫為亢聖人則何亢之有若二與三皆大人之事非謂四勝於三三勝於二五又勝於四如此則是聖可階也孟子不得已而用潛龍者也顔子不用潛龍者也孟子主教故須説豫豈好辨哉豫不得已也並易説漢上朱氏曰易有四象六七八九七八不變者也歸藏連山用七八易用六九而七八在其中變者以不變者為基不變者以變者為用陸績曰陽在初稱初九去初之二稱九二則初復七隂在初稱初六去初之二稱六二則初復八矣卦畫七八經書九六七八為彖九六為爻四者互明聖人之妙意也乾為馬六爻皆以龍言之何也乾體本坤陽以隂為基也自震變而為乾震變乾則乾為龍乾變震則震為馬故震其究為健易傳又曰或用一卦或用一爻或不可用即曰勿用天下之時無不可用者顧用之如何耳叢説又曰乾六爻震為龍而乾之六爻為龍何也曰奮乎重隂之下者震之動也潛升以時其用不窮者乾之健也乾者息震而成也天文東方之宿蒼龍之象其角在辰其尾在寅震者卯也乾始於子成於己故陽復於十一月者乾之初九也亦震也説卦震曰其究為健元之中冬至之氣象中孚也其次三木也東方也故曰龍出于中首尾信可以為庸元文曰龍出乎中何為也曰龍德始著者也隂不極則陽不生亂不極則德不形所謂隂極生陽則乾之初九也圖説白雲郭氏曰爻辭皆以人道為主龍雖非人而萬物皆人道之內又取以象聖人故乾爻稱之乾不為龍而稱之者龍有聖人之德不必拘以乾象也初始也聖人之始果行育德未可為時用或時亦未能致聖人皆潛可也此舜耕稼陶漁之時必至玄德升聞乃命以位故潛之時宜勿自用伊尹耕於有莘傅説隱於巖野二老避於海濵亦皆是道或喻漢祖及後世之隱者皆不足以當潛龍之義易説新安朱氏曰初九者卦下陽爻之名凡畫卦者自下而上故以下爻為初陽數九為老七為少老變而少不變故謂陽爻為九潛龍勿用周公所繫之辭以斷一爻之吉凶所謂爻辭者也潛藏也龍陽物也初陽在下未可施用故其象為潛龍其占曰勿用凡遇乾而此爻變者當觀此象而玩其占也餘爻放此本義東萊吕氏曰乾之初九曰潛龍勿用坤之初六曰履霜堅氷至陽者善之類也隂者惡之類也善端初發且要涵養惡念初生便須翦除讀易紀聞九二見龍在田利見大人明道先生曰九二利見大人九五利見大人聖人固有在上者在下者李籲所録伊川先生曰田地上也出見於地上其德已著以聖人言之舜之田漁時也利見大德之君以行其道君亦利見大德之臣以共成其功天下利見大德之人以被其澤大德之君九五也乾坤純體不分剛柔而以同德相應易傳龜山楊氏曰易言利見利用而終不言所以利故孔子罕言利或謂死與鬼神子路所不得而問蓋不曉一致之理故錯認聖人之言京師語録白雲郭氏曰君子學以聚之問以辨之寬以居之然後仁以行之至於仁以行之道大成矣故龍之潛也有必見之理聖人之學也有必行之道舜之相堯伊尹之就湯太公伯夷之歸文王皆利見九五之大人者也人臣地道也故見而在田人君天道也故飛而在天大人者其道甚大之人也故德合天地明合日月其序合四時其吉凶合鬼神不如是豈足以有天下之大而贊化育參天地乎君臣俱有大德而小人勿用此二帝三王之所以興也乾德以大為主故不言聖人而曰大人然則聖人之法乾法其大而已矣易説新安朱氏曰二謂自下而上第二爻也後放此九二剛健中正出潛離隱澤及於物物所利見故其象為見龍在田其占為利見大人九二雖未得位而大人之德已著常人不足以當之故值此爻之變者但為利見此人而已蓋亦謂在下之大人也此以爻與占者相為主賔自為一例若有見龍之德則為利見九五在上之大人矣本義占者當不得見龍飛龍則占者為客利去見那大人大人即九二九五之德見龍飛龍是也若潛龍君子則占者自當之矣其它爻象占者當之惟九二見龍人當不得所以只得把爻做客大人即是見龍利見大人與程傳説不同不是卦爻自相利見乃是占者利去見大人也須看自家占底是何人方説得那所利見大人六爻不必限定是説人君且如潛龍勿用若是庶人得之自當不用人君得之也當退避見龍在田若是衆人得之亦可用利見大人如今人所謂宜見貴人之類易不是限定這物伊川亦自説一爻當一事則三百八十四爻只當得三百八十四事説得自好不知如何到它解却恁地説乾卦他爻皆可作自家身上説惟九二九五要作自家説不得兩箇利見大人向來人都説不通九二甚麼形影如何教見大人某看來易本卜筮之書占得九二便可見大人大人不必説人君也並語録九三君子終日乾乾夕惕若厲無咎伊川先生曰三雖人位已在下體之上未離於下而尊顯者也舜之玄德升聞時也日夕不懈而兢惕則雖處危地而無咎在下之人而君德已著天下將歸之其危懼可知雖言聖人事苟不設戒則何以為教作易之義也易傳橫渠先生曰聖人神其德不私其身故乾乾自強所以成之於天耳易説龜山楊氏曰乾之九三獨言君子蓋九三人之位也履正居中在此一爻故文言於九四則曰上不在天下不在田中不在人於九三止言上不在天下不在田而已其曰君子行此四德者蓋乾之所謂君子也曰所以為君子者乃行此四德之人耳蕭山語録白雲郭氏曰三居臣道之尊當興事造業之任故終日乾乾法乾之健不遑休息此大禹三過其門不入之時然天下之理高則危滿則溢必戰戰兢兢然後無危溢之患是以九三位極之君子能朝夕惕然則雖處危地無咎矣若厲者雖危也禹曰豫思日孜孜舜稱其不自滿假孟子稱其聞善言則拜皆夕惕之意也乾之道堯舜得其大禹得其健雖欲不為帝王不可得已故堯舜禹之授受係乎道之自然聖人初無心於其間焉易説新安朱氏曰九陽爻三陽位重剛不中居下之上乃危地也然性體剛健有能乾乾惕厲之象故其占如此君子指占者而言言能憂懼如是則雖處危地而無咎也本義體無剛柔位有貴賤因它這貴賤之位隨緊慢説有那易處九三處一卦之盡所以説得如此九二位正中便不恁地問九三不言象何也先生曰九三陽剛不中居下之上有強力勞苦之象不可言龍故特指言乾乾惕若而己言有乾乾惕厲之象也厲無咎是一句它後面有此例如頻復厲無咎是也厲多是這陽爻裏説九三不説龍亦不可曉若説龍時這亦是龍之在那亢旱處所以説君子乾乾夕惕只此意乾之九三以過剛不中而處危地當終日乾乾夕惕若厲則雖危無咎矣聖人正意只是如此若旁通之則所謂對越在天等説皆可通大抵易之卦爻上自天子下至庶人皆有用處若謂乾之九三君德已著為危疑之地則只做得舜禹事使問君子終日乾乾是法天否曰才説法天便添著一件事君子只是終日乾乾天之行健不息往往亦只如此如言存箇天理不須問如何存它只是去了人欲天理自然存如顔子問仁夫子告以非禮勿視聽言動除却此四者更有何物是仁祖道舉乾九三君子終日乾乾是君子進德不懈不敢須臾寧否先生曰程子云在下之人君德已著此語亦是拘了記得昔常有人問程子胡安定以九四一爻為太子者程子笑之曰如此三百八十四爻只做得三百八十四件事理了此説極是到程子解易却又拘了要之此是通上下而言在君有君之用臣有臣之用父有父之用子有子之用以至事物莫不皆然若如程子之説則千百年間只有箇舜禹用得也大抵九三此爻才剛而位危故須著乾乾夕惕若厲方可無咎若九二則以剛居中位易處了故凡剛而處危疑之地皆當乾乾夕惕若厲則無咎也並語録東萊吕氏曰乾九三在下體之上未離乎下而尊顯最是危懼難處之地故以乾乾兢惕始能無咎且就學者分上言之在流俗中德行學業在衆人之上則忌疾者多非十分戒懼豈能免禍只為未離得流俗而名出流俗之上所以招忌疾也若是道尊德重已離流俗則自不須戒懼若已離得下體則為九四其爻云或躍在淵無咎蓋此爻已出下體之外亦如學者躍出流俗之外與流俗不相關無緣忌疾自然安穩不須戒懼淵龍之所安也讀易紀聞九四或躍在淵無咎伊川先生曰淵龍之所安也或疑辭謂非必也躍不躍惟及時以就安耳聖人之動無不時也舜之歷試時也易傳橫渠先生曰處隂故曰在淵易説兼山郭氏曰或躍者試之也在淵者終之也故無咎易説漢上朱氏曰初竒二偶三竒四偶五竒六偶卦有取於竒偶為象者如乾九四曰淵淵重坎也自四至上有重坎象叢説白雲郭氏曰初居下體之下潛者也潛則行而未成故不可用四居上卦之下猶有淵義雖乾道已革而無在田之位進退惟時固不可躍而進也然君子進德修業欲及時居近君之位時其可失乎是以疑於可進而自躍也可以仕則仕可以止則止所謂或躍也六爻之義大率以初為未仕四為已仕二為應君之臣三為人臣尊極之位蓋下卦以漸進而四為近君矣故二多譽得君也四多懼近君也三多凶危也易説新安朱氏曰或者疑而未定之辭躍者無所緣而絶於地特未飛耳淵者上空下洞深昧不測之所龍之在是若下於田或躍而起則向乎天矣九陽四隂居上之下改革之際進退未定之時也故其象如此其占能隨時進退則無咎也本義淵與天不爭多淵是那空虛無實底之物躍是那不著地了兩腳跳上去底意思問程易以乾之初九為舜側微時九二為舜田漁時九三為玄德升聞九四為歷試時何以見得如此先生曰此是推説爻象之意非本指也讀易若通得本指後便儘説去儘有道理可言敢問本指先生曰易本因卜筮而有象因象而有占占辭中便有道理如筮得乾之初九初陽在下未可施用其象為潛龍其占曰勿用凡遇乾而得此爻者當觀此象而玩其占隱晦而勿用可也它皆倣此此易之本指也蓋潛龍則勿用此便是道理故聖人為彖辭象辭文言節節推出無限道理此程易所以推説得無窮然非易本義也先通得易本指後道理儘無窮推説不妨若便以所推説者去解則失易之本指矣並語録九五飛龍在天利見大人伊川先生曰進位乎天位也聖人既得天位則利見在下大德之人與共成天下之事天下固利見夫大德之君也易傳橫渠先生曰飛龍在天況聖人之至若天之不可階而升也易説至健而易至順而簡故其險其阻不可階而升不可勉而至仲尼猶天其致一也正蒙兼山郭氏曰九五飛龍在天利見大人龍者變化而不測者也以天德而居天位是以謂之飛龍在天也猶之乘六氣御青天呼吸風雷震蕩下土及其霽也風沈電滅了不知其所之反視太虛廓然曾無遺迹惟九五之得一是以能體之如聖人有作於天下萬物覩之而蕩蕩巍巍不可得而名言者也利見大人者言有君必有臣有德必有鄰所以相應相求相須而治也初非不剛於位則不及二非不中於德則不正三正而不中四不中不正上則過而已亢者也過與不及非乾也不中不正非乾也就其中正而純全焉獨九五也昔之所謂得一者其是之謂乎所以取象乎飛龍也不稱潛躍者徒見其位不可階而升未見其德也並易説白雲郭氏曰孔子曰唯天為大唯堯則之孟子曰大舜有大焉則大人莫大於堯舜也然堯以不得舜為已憂舜以不得禹臯陶為已憂雖堯舜之大其憂尚如此此九五大人之君所以利見九二大人之臣也天位不可階而升也故稱飛龍焉二帝三王未有不得大人以興者漢唐之際雖莫不然然皆權謀變詐小人之徒爭雄竊國而止耳安知所謂利見大人之道哉易説新安朱氏曰剛健中正以居尊位如以聖人之德居聖人之位故其象如此而占法與九二同特所利見者在上之大人耳若有其位則為利見九二在下之大人也本義問程易於九二利見大人爻云利見大德之君矣又言君亦利見大德之臣以成其功天下亦利見大德之人以被其澤於九五利見大人爻云利見在下大德之人矣又言天下固利見大德之君兩爻互言如此不審的何所指先生曰此當以所占之人之德觀之若已是有九二之德占得此九二爻則為利見九五大德之君若常人無九二之德者占得之則為利見此九二之大人耳已為九五之君而有九五之德占得此九五爻則為利見九二大德之人若九二之人占得之則為利見此九五大德之人各隨所占之人以爻與占者相為主賔也太祖一日問王昭素曰九五飛龍在天利見大人常人何可占得此卦昭素曰無害若臣等占得則陛下是飛龍在天臣等利見大人是利見陛下也此説得最好又問曰如此看來易多是假借虛設故用不窮人人皆用得也先生曰此所謂理雖一定事應尚虛存體應用稽實待虛所以三百八十四爻而天下萬事無不可該無不周遍此易之用所以不窮也看來大人只是這大人無不同處伊川之病在那二五相見處卦畫如何會有相見之理只是説人占得這爻利於見大人萬物覩之便是見字且如下面説許多大人者言所以為大人者如此今却説二五相見却湊不著他這語脈取象各不同有就自己身上取底自己當不得這卦爻却就那人身上取如潛龍勿用是就占者身上言到那見龍自家便當不得須把做在上之大人九五飛龍便是人君大人却是在下之大人問龜山説乾卦九五飛龍在天取飛字為義以天位言之不可階而升以聖學言之非力行而至曰此亦未盡乾卦自是聖人之天德只時與位有隱顯漸次耳凡占得卦爻要緊在分賔主各據地位而推如九五飛龍在天利見大人若揣自己有大人之德占得此爻則如聖人作而萬物咸覩作之者在我而覩之者在彼我為主而彼為賔也自己無大人之德占得此爻則利見彼之大人作之者在彼而覩之者在我我為賔而彼為主也並語録上九亢龍有悔伊川先生曰九五者位之極中正者得時之極過此則亢矣上九至於亢極故有悔也有過則有悔唯聖人知進退存亡而無過則不至於悔也易傳橫渠先生曰上九亢龍緣卦畫而言須分初終終則自是亢極言君位則易有極之理聖人之分則安有過亢易説兼山郭氏曰亢龍有悔者位已過中德已過亢是以動而有悔也易説白雲郭氏曰九三過而惕故無咎上九過而亢故有悔然則龍德莫善於惕而莫不善於亢也亢則貪夫位慕夫祿不知進退存亡其悔宜矣堯老而舜攝舜亦以命禹伊尹復政厥辟周公復子明辟君臣之間皆有是道故知進退存亡者其唯聖人乎易説新安朱氏曰上者最上一爻之名亢者過於上而不能下之意也陽極於上動必有悔故其象占如此本義或問乾之六爻皆聖人之事乎曰盡其道者聖人也得失則吉凶存焉豈特乾哉諸卦皆然也又曰上九云亢龍有悔若占得此爻必須以亢滿為戒如這般處最是易之大義易之為書大抵於盛滿時致戒蓋陽氣正長必有消退之漸自是理勢如此又云當極盛之時便須慮其亢如當堯之時須交付與舜若不尋得箇舜便交付與它則堯之後天下事未可知又云康節所以看得透它説話多以盛滿為戒如云只喜成微醺不喜成酩酊又云康節多於消長之交看又云許多道理無本不可知之數惟是康節體得熟只管體來體去到得熟後看是甚麼事理無不洞見此皆伊川語東萊吕氏曰上九亢龍有悔健而無息之謂乾九極於上則疑於有息矣故聖人於上九而戒之以亢使人不可輕進蓋常留一位在前則有不息之意若處亢而止則息矣非乾也易説又曰中於五而亢於上是乾至五而不可進也苟不可進則曷謂健而無息乎蓋乾至於上而極有極則有息無極則無息己丑課程用九見羣龍無首吉伊川先生曰用九者處乾剛之道以陽居乾體純乎剛者也剛柔相濟為中而乃以純剛是過乎剛也見羣龍謂觀諸陽之義無為首則吉也以剛為天下先凶之道也易傳或問用九只在上九一爻非也六爻皆用九故曰見羣龍無首吉用九便是行健處天德不可為首言乾以至剛健又安可更為物先為物先則有禍所謂不敢為天下先乾順時而動不過處便是不為首六爻皆同楊遵道録龜山楊氏曰或問乾坤用九六荆公曰進君子退小人固非自然之理而正叔云觀河圖數可見何也曰此多有議論少有分明繫辭分明説云參天兩地而倚數九參天六兩地也南都語録藍田吕氏曰揲蓍三變歸竒於初其為四者有七則為少陽有八則為少隂有九則為老陽有六則為老隂占遇七八則不變不變者觀其彖辭而言吉凶彖即卦辭遇九六則變變者觀其爻而言吉凶也爻辭稱九六而不稱七八蓋變者有占占必有辭故繫辭於爻之下以定吉凶也乾坤稱用九用六者六爻皆九皆六則俱變故亦繫之以辭而有吉凶它卦之所無也左傳蔡墨以乾用九為遇乾之坤故知六爻皆變兼山郭氏曰用九用六獨乾坤有之乾純陽故曰羣龍坤純隂故曰永貞羣龍無首所以不至於亢永貞以終故無龍戰之災此所以異於它卦也易説漢上朱氏曰用以也天德者九也乾用九者謂天德不可為首也用之如何見羣龍無首吉也此存乎其人也坤用六者利永貞是也非謂夫用九用六也叢説白雲郭氏曰九天德也用天德者遍覆包含無所不容其於見羣龍而容之有餘裕矣夫是之謂大人大人有容天下之德而無長天下之志至於天下樂推首出庶物之際一以無心應之而已象言天德不可為首為者自為之辭無首者戒其無自為首也是以堯無能名舜有天下而不與文王三分有其二而事殷皆無首之道孔子曰天何言哉四時行焉百物生焉知此然後盡用九無首之吉也乾坤純備天地九六之道故稱用九用六它卦雜而不純雖有所用亦乾坤之九六也易説新安朱氏曰用九言凡筮得陽爻者也皆用九而不用七蓋諸卦百九十二陽爻之通例也以卦純陽而居首故於此發之而聖人因繫之辭使遇此卦而六爻皆變者即此占之蓋六陽皆變剛而能柔吉之道也故為羣龍無首之象而其占為如是則吉也春秋傳曰乾之坤曰見羣龍無首吉蓋即純坤卦辭牝馬之貞先迷後得東北喪朋之意本義問乾坤獨言用九用六何也先生曰此惟歐公説得是此二卦純陽純隂而居諸卦之首故於此發此一例凡占法皆用變爻占故凡占得陽爻者皆用九而不用七百九十二陽爻之通例也占得隂爻者皆用六而不用八百九十二隂爻之通例也蓋七為少陽九為老陽六為老隂八為少隂老變而少不變凡占用九用六者用其變爻占也此揲蓍之法遇乾而六爻皆變則為隂故有羣龍無首之象即坤利牝馬之貞也言羣龍而却無頭剛而能柔則吉也遇坤而六爻皆變則為陽故有利永貞之象即乾之元亨利貞也此發凡之言用九用六者變卦之凡例也言凡陽爻皆用九而不用七隂爻皆用六而不用八用九故老陽變為少隂用六故老隂變為少陽不用七八故少陽少隂不變獨乾坤二卦言之者以其在諸卦之首又為純陽純隂之卦也聖人因繫以辭使遇乾而六爻皆九遇坤而六爻皆六者即此而占之蓋羣龍無首則陽皆變隂之象利永貞則隂皆變陽之義也歐陽子曰乾坤之用九用六何謂也曰乾爻七九坤爻八六九六變而七八無為易道占其變故以其所占者名爻不謂六爻皆九六也及其筮也七八常多而九六常少有無九六者焉此不可以不釋也六十四卦皆然特於乾坤見之則餘可知耳此説發明先儒所未到最為有功陽進而隂退故九為老陽六為老隂老隂老陽為乾坤然而皆變少隂少陽亦乾坤然而皆不變老隂老陽所以變者無它到極處了無去處便只得變九上更去不得了只得變回來做八六下來便是五生數了也去不得所以却去做七老隂老陽不專在乾坤上亦有少隂少陽如乾坤六爻皆動底是老六爻皆不動底是少用九不用七且如得純乾卦皆七數這却不是變底它未當得九未在這爻裏面所以只占上面彖辭用九蓋是説變見羣龍無首王弼伊川皆解不成它是不見得那用九用六之説問用九見羣龍無首吉伊川之意似云用陽剛為天下先則凶無為首則吉先生曰凡説文字須有情理方是用九當如歐陽公説方有情理某解易所以不敢同伊川便是有這般處看來當以見羣龍無首為句蓋六陽已盛如羣龍然龍之剛猛在首故見其無首則吉大意只是要剛而能柔自人君以至庶人皆須如此若説為天下先便只是人主方用得以下更使不得也恐不如此又曰如歐陽説蓋為卜筮言所以須著有用九用六若如伊川説便無此也得並語録東萊吕氏曰用九見羣龍無首吉乾首出庶物為天為父為君無非為首安在其無首邪蓋乾者萬物之首非有心於首萬物也雖為首實未嘗為首也老子竊窺無首之義而曰後其身而身先居其後乃所以致其先迹雖不為首心實求為首也觀此可知老易公私邪正之辨又曰乾之無首坤之先迷是知君臣上下之間皆不可多上人也並紀聞合訂刪補大易集義粹言卷一
