body:
  text: 合訂刪補大易集義粹言頭等侍衛納喇性德編坎下乾上伊川先生曰訟序卦飲食必有訟故受之以訟人之所需者飲食既有所須爭訟所由起也訟所以次需也為卦乾上坎下以二象言之天陽上行水性就下其行相違所以成訟也以二體言之上剛下險剛險相接能無訟乎又人內險阻而外剛強所以訟也易傳東萊吕氏曰訟傳既有所須爭所由起無所須則無爭己丑課程訟有孚窒惕中吉終凶利見大人不利涉大川伊川先生曰訟之道必有其孚實中無其實乃是誣妄凶之道也卦之中實為有孚之象訟者與人爭辨而待決于人雖有孚亦須窒塞未通不窒則已明無訟矣事既未辨吉凶未可必也故有畏惕中吉得中則吉也終凶終極其事則凶也訟者求辨其曲直也故利見于大人大人則能以其剛明中正決所訟也訟非和平之事當擇安地而處不可陷于危險故不利涉大川也並易傳白雲郭氏曰需訟一體也相親而需則為需相違而訟則為訟性情之異耳然性情之異而有孚則同者親而無孚需之妄也訟而無孚訟之妄也窒者塞其源而不流也惕者謹其事而知懼也得其中則吉成其終則凶知此則知訟之為道矣非特訟者為然聽訟亦如之也好生之德洽于民心兹用不犯于有司窒之也欽哉欽哉惟刑之恤哉惕之也吕刑曰簡孚有衆又曰獄成而孚輸而孚有孚也故乃明于刑之中中吉也舜典之疑惟輕吕刑之疑有赦不成其終也易説漢上朱氏曰訟反需者也需四之五剛往而得位二隂避之故曰亨訟三之二剛來而失位二隂塞之故曰窒需有孚而亨于外故物需之訟有孚而窒于內故已訟之叢説五峯胡氏曰韓馮翊之訟蕭趙廣漢之訟魏皆中無孚實不知畏惕過而失中道者也故終極其事皆至于凶左雄周舉中吉也王渾王濬易外傳新安朱氏曰訟爭辨也上乾下坎乾剛坎險上剛以制其下下險以伺其上又為內險而外健又為己險而彼健皆訟之道也九二中實上無應與又為加憂且於卦變自遁而來為剛來居二而當下卦之中有有孚而見窒能懼而得中之象上九過剛居訟之極有終極其訟之象九五剛健中正以居尊位有大人之象以剛乘險以實履陷有不利涉大川之象故戒占者必有爭辨之事而隨其所處為吉凶也本義不利涉大川是上面三畫陽載不起壓了這船重問訟卦大指因言大凡卦辭取義不一如訟有孚窒惕中吉蓋取九二中實坎為加憂之象中實為有孚坎陷為窒坎為加憂為惕九二居下卦之中故曰有信而見窒能懼而得中也終凶蓋取上九終極于訟之象利見大人蓋取九五剛健中正居尊之象不利涉大川又取以剛乘險以實履陷之象此取義不一也然亦有不必如此取者此特其一例也先生曰卦辭如此辭極齊整蓋所取諸爻義皆與爻中本辭協亦有雖取爻義而與爻本辭不同者此為不齊整處也並語録東萊吕氏曰凡訟之道當以誠實為先誠實則利見大人事不實則不利見大人而利見昏迷之人矣雖誠實而不利涉大川恃其實而訟則訟極而陷溺其身矣易説衆人之言訟以勝為吉易之言訟以中為吉不中則雖勝亦凶也紀聞彖曰訟上剛下險險而健訟訟有孚窒惕中吉剛來而得中也終凶訟不可成也利見大人尚中正也不利涉大川入于淵也濂溪先生曰天以春生萬物止之以秋物之生也既成矣不止則過焉故得秋以成聖人之法天以政養萬民肅之以刑民之盛也欲動情勝利害相攻不止則賊滅無倫焉故得刑以治情偽微曖其變千狀苟非中正明逹果斷者不能治也訟卦曰利見大人以剛得中也噬嗑曰利用獄以動而明也嗚呼天下至廣主刑者民之司命也任用可不慎乎通書伊川先生曰訟之為卦上剛下險險而又健也又為險健相接內險外健皆所以為訟也若健而不險不生訟也險而不健不能訟也險而又健是以訟也訟之道固如是又據卦才而言九二以剛自外來而成訟則二乃訟之主也以剛處中中實之象故為有孚處訟之時雖有孚信亦必艱阻窒塞而有惕懼不窒則不成訟矣又居險陷之中亦為窒塞惕懼之義二以陽剛自外來而得中為以剛來訟而不過之義是以吉也卦有更取成卦之由為義者此是也卦義不取成卦之由則更不言所變之爻也據卦辭二乃善也而爻中不見其善蓋卦辭取其有孚得中而言乃善也爻則以自下訟上為義所取不同也訟非善事不得已也安可終極其事極意于其事則凶矣故曰不可成也成謂窮盡其事也訟者求辨其是非也辨之當乃中正也故利見大人以所尚者中正也聽者非其人則或不得其中正也中正大人九五是也與人訟者必處其身於安平之地若蹈危險則陷其身矣乃入于深淵也卦中有中正險陷之象並易傳藍田吕氏曰訟兩以曲直爭也險而健其勢必爭此所以訟也訟之時可以理勝而不可多上人不得已而訟求伸則已此有孚窒惕然後可訟中則吉終則凶也利見大人曲直當也訟險事也居訟之時不求理勝而以力爭是以健涉險必不濟矣需險在前非健不濟訟不尚力愈健愈屈此需所以利涉大川而訟所以不利所遭之時異也入于淵回旋而不得出也居訟之時隂爻終吉而陽多不克不尚力也龜山楊氏曰乾健而上行坎險而趨下居險健而不相與訟之所興也九二剛來而得中有孚也訟以有孚為主訟而無孚則刑隨之矣凶之道也剛來而陷乎險中見窒也見窒而後訟訟非得已也訟而惕焉中而止非成訟也是以吉非剛而得中疇克爾終凶以上九言也處訟之極不能復即命渝安正則成訟者也終凶不亦宜乎然訟非中正者不能聽而決故利見大人九五是也孔子曰聽訟吾猶人也必也使無訟乎大人能使無訟者若恃險健之才往而犯難則鮮不敗矣故不利涉大川易説兼山郭氏曰訟三升而三降乃剛來而得中也易説白雲郭氏曰訟不親也不親而健健而陷此所以為訟剛來居二而得中故二為成卦之主用中則吉也大人與天地合德日月合明無私之大者況訟乎是以利見之也險欲陷健逺之可也故不利涉大川涉之則自入于淵矣需之利涉大川險在前也訟之不利涉大川險在下而必陷也易説漢上朱氏曰乾健也坎險也兩者相敵所以訟也無險則無訟無健則不能訟險而健故訟此以兩體言訟也訟自遁來九三之二二有孚於五剛來掩於二隂之中剛實有孚信而見窒於人不窒則無所事於訟矣雖有孚也然剛失位見窒於二隂邪正是非上未辨也能惕懼處柔訟而不過乎中則免矣離為目巽為多白眼惕之象故曰有孚窒惕中吉剛來而得中也此以訟三之二言九二之才也訟剛過而不反終成其訟必凶故曰終凶訟不可成也此以成卦上九言訟之終也九五大人聽訟者也中正在上無所偏繫君子小人各得其平故九二利見之以中正為尚也離為目見也有善聽者然後孚信懼而得中吉故曰利見大人尚中正也此以九五言訟之主也訟一變巽二變鼎三變大過坎水變兌川壅為澤乾首沒于澤中入于淵也天下之難未有不起于爭剛險不相下君子小人不相容難始作矣聖人見其訟也戒之中正戒之不可成若濟之以爭是以亂益亂相激而為深矣漢唐之亂始於小人為險君子疾之已甚其弊至於君子小人淪胥以敗而國遂亡故曰不利涉大川入于淵也此以卦變終言一卦之義也在卦氣為清明三月節故太玄凖之以爭卦一變二變何説也曰在賁之彖曰柔來而文剛分剛上而文柔在無妄之彖曰剛自外來而為主於內此舉一隅也剛柔相變上下往來明利害吉凶之無常也是故一卦變六十有三此焦延夀易林之説也易傳或曰乾當在上處乎下則必升坤當在下處乎上則必降此言否泰可也於訟無妄不通矣訟曰剛來而得中無妄曰剛自外來而為主於內二卦陽爻皆四畫蓋訟者遁三之二無妄者遁三之初凡言來者皆自外來初二視三則外矣叢説新安朱氏曰險而健訟以卦德釋卦名義入于淵以卦變卦體卦象釋卦辭本義上剛下險是屬上句險而健訟是屬下句或問訟彖云剛來而得中也大抵上體是剛下體是柔剛下而變柔則為剛來今訟之上體既是純剛安得謂之剛來邪先生曰此等要須畫個圖子看便好以某觀之訟卦本是遁卦變來遁之六二上為訟之六三其九三下為九二乃為訟卦此類如柔來而文剛分剛上而文柔與夫剛自外來而為主於內皆是如此若畫圖子起便極好看更不待説若如先儒説則多牽強矣問卦變之義先生曰此訟卦變自遁而來為剛來居二此是卦變中二爻變者蓋四陽二隂自遁來者十四卦訟即初變之卦剛來居二柔進居三故曰剛來而得中又問細讀本義所釋卦辭若看得分明則彖辭之義亦自明只須略提破此是卦義此是卦象卦體卦變不必更下注腳矣先生曰某當初作此文字時正欲如此蓋彖辭本是釋經之卦辭若看卦辭分明則彖辭亦已可見但後來要重整頓過未及不知而今所解能如此本意否並語録象曰天與水違行訟君子以作事謀始伊川先生曰天上水下相違而行二體違戾訟之由也若上下相順訟何由興君子觀象知人情有爭訟之道故凡所作事必謀其始絶訟端於事之始則訟無由生矣謀始之義廣矣若愼交結明契劵之類是也易傳龜山楊氏曰天左旋而水東注違行也作事至於違行而後謀則無及矣易説兼山郭氏曰天體於上水行於下天道左旋水性右流皆違行而不相親故曰訟不親也不親所以為訟也孔子曰聽訟吾猶人也必也使無訟乎無訟在於謀始謀始在於制作契之不明訟之所以生也故有德司契而不責於人上古結繩以治後世聖人易之以書契良以此也方此為治訟之始未及夫化民之道易説白雲郭氏曰天水違行大不親矣作事謀始期無訟也邦無道免於刑戮在下之謀始也刑期無刑必也無訟在上之謀始也此謂窒惕之道易説漢上朱氏曰天西行水東行違行也行相違乃有訟巽為事乾陽始於坎作事而謀始則訟不作窒訟之源也易傳新安朱氏曰天上水下其行相違作事謀始訟端絶矣本義作事謀始言觀此等象便當每事謀之於其始天自向上去水自向下來所以為訟王弼言有德司契是借這個契字説言自家執這個契在此人來合得我便與它自家先定了這是謀始司契底意思並語録初六不永所事小有言終吉象曰不永所事訟不可長也雖小有言其辨明也伊川先生曰六以柔弱居下不能終極其訟者也故於訟之初因六之才為之戒曰若不長永其事則雖小有言終得吉也蓋訟非可長之事以隂柔之才而訟於下難以吉矣以上有應援而能不永其事故雖小有言終得吉也有言災之小者也不永其事而不至於凶乃訟之吉也六以柔弱而訟於下其義固不可長永也永其訟則不勝而禍難及矣又於訟之初即戒訟非可長之事也柔弱居下才不能訟雖不永其事既訟矣必有小災故小有言也既不永其事又上有剛陽之正應辨理之明故終得其吉也不然其能免乎在訟之義同位而相應相與者也故初於四為獲其辨明同位而不相得相訟者也故二與五為對敵也並易傳橫渠先生曰初於正應中有隂陽之間不無訟但以隂居下體為柔順履險方初不永所事其理辨直一作正故小有言終吉易説龜山楊氏曰險而健卦之所以為訟也險故興訟健故能訟居險之初柔不當位非險而健也無能訟之才故不永所事當上下違行之時隂柔在下而二以剛乘之近而不相與故小有言然有應在上順而不為險故其辨易明既已有言則非無訟也以其辨明故終吉夫訟非可長之事居訟之初謀始之時也故孔子因以戒之有不可之辭焉易説白雲郭氏曰訟之初未始不小有言也永其事則有成終之凶不永其事是以終吉言於初者戒之於始也初四在訟之應者是以其辨易明二五在訟之不應者是以不克而掇患也易説漢上朱氏曰初與四應九二間之此初六所以訟也初往訟二四來應初坎毁巽降兌見坎險也兌説也巽為事坎又為可不永所訟之事也訟事之險者不永所事以訟不可長也永其訟者未有不及禍者也兌為言隂為小小有言也初六往而直已九四體離而明四剛初柔各得其正故雖小有言而其辨易明明故終吉初以四為終也易傳曰在訟之義同位而相應相與者也故初與四為獲其辨明同位而不相得相訟者也故二與五為對敵也易傳五峯胡氏曰鄭興桓談易外傳新安朱氏曰隂柔居下不能終訟故其象占如此本義東萊吕氏曰尋常人爭訟所以拖延嵗月長久而不決者只為恥於小不勝故不肯住終至於凶若知訟之不可長不顧小有言之辱更不報復目下雖似可恥終久誰得計其利害不待辨説而明也紀聞九二不克訟歸而逋其邑人三百户無眚象曰不克訟歸逋竄也自下訟上患至掇也伊川先生曰二五相應之地而兩剛不相與相訟者也九二自外來以剛處險為訟之主乃與五為敵五以中正處君位其可敵乎是為訟而義不克也若能知其義之不可退歸而逋避以寡約自處則得無過眚也必逋者避為敵之地也三百户邑之至小者若處強大是猶競也能無眚乎眚過也處不當也與知惡而為有分也義既不敵故不能訟歸而逋竄避去其所也勢自下而訟其上義乖屈禍患之至猶拾掇而取之言易得也並易傳橫渠先生曰處險體剛好訟者也上下二隂俱非已應理為不直故不訟歸而逋竄使其邑人之衆無辜被禍故曰邑人無眚易説藍田吕氏曰九二居二隂之間上無正應比初則為四所拒比三則為上所拒剛體不屈自下訟上理卒不勝不如退就窮約克己自新亦庶乎無過也知歸而自反以居中也龜山楊氏曰以成卦之才言之則九二剛來而得中能有孚窒惕中吉也以爻言之二五正應也二以剛險而不應訟上者也而五以剛中正而履尊位訟之主也人所利見而取決焉不可得而訟也故不克訟然九二剛而中知義不克則非怙終者故歸而逋其邑人三百户無眚歸而逋者自反不縮逋竄而自逭也邑人三百户則其居寡弱矣不為險健也不為險健則訟息矣故無眚眚過也易説兼山郭氏曰孔子稱十室之邑必有忠信如丘者焉則三百户之邑亦不為小矣或謂下之敢訟上者以附己之衆為得之矣附己之衆上之所不容故置其邑而逋乃可無眚眚甚於凶明矣易説白雲郭氏曰先人曰十室之邑必有忠信則三百户不為小矣雍曰二五有君臣之位上下之分非可訟也訟之義不克也不克則置三百户之邑而歸逋竄之中可無眚矣蓋以下訟上其患自取苟不違其邑是速誅伐之禍也九二以剛中之才一陷險中而不克訟其取患如此況無其才者乎是以聖人貴夫窒惕而不利涉難也伯氏駢邑三百管仲奪之而沒齒無怨言豈有訟上之患者乎易説漢上朱氏曰二五本相應以兩剛不相下此二所以訟五也然五君也其德中正以不正而訟中正不可也況以臣訟君乎不克訟者義不克也故退歸而逋則其邑人三百户得以無眚不然五來討二禍及邑人矣歸者二自五而反逋者失位而竄坎為隱伏坤為衆坎動入于衆中竄也故曰不克訟歸逋竄也自下訟上於勢為逆於義為非禍患至於逋竄自取之猶掇拾也二變成艮手掇拾之象乾䇿三十有六坤䇿二十有四九二變則二三坤䇿四五乾䇿合而言之三百也坤為户二在大夫位為邑自三至五歷三爻坎在內為眚二動去位則無眚故曰其邑人三百户無眚太玄曰兩虎相牙掣者全也歸而逋之謂乎古者諸侯建國大夫受邑諸侯之下士視上農夫食九人中士倍下士上士倍中士大夫倍上士卿四大夫君十卿祿天子之大夫視子男大國之卿當小國之君然則諸侯之卿當天子之大夫也食二百八十有八人三百户舉全數也易外傳五峯胡氏曰楊惲易外傳新安朱氏曰九二陽剛為險之主本欲訟者也然以剛居柔得下之中而上應九五陽剛居尊勢不可敵故其象占如此邑人三百户邑之小者言自卑約以免災患占者如是則無眚矣掇自取也本義九二正應在五五亦陽故為窒塞之象三百户必須有此象今不可考王輔嗣説得意忘象是要忘了此象伊川又説假象是只要假借此象今看得不解得恁地全無那象只是不可知只得且從理上説乾為馬却説龍坤為牛却説馬離為龜却説牛做得箇例來括他方得並語録六三食舊德貞厲終吉或從王事無成象曰食舊德從上吉也伊川先生曰三雖居剛而應上然質本隂柔處險而介二剛之間危懼非為訟者也祿者稱德而受食舊德謂處其素分貞謂堅固自守厲終吉謂雖處危地能知危懼則終必獲吉也守素分而無求則不訟矣處危謂在險而承乘皆剛與居訟之時也柔從剛者也下從上者也三不為訟而從上九所為故曰或從王事無成謂從上而成不在己也訟者剛健之事故初則不永三則從上皆非能訟者也二爻皆以隂一作處柔不終而得吉四亦以不克而渝得吉訟以能止為善也守其素分雖一無雖字從上之一無之字所為非由己也故無成而終得其吉也並易傳橫渠先生曰履非其位處險之極若能不為他纍專應上九則雖危終吉故曰舊德以隂居陽又處成功必有悔吝故曰無成易説廣平遊氏曰訟之六三才不稱位故有食舊德之象食舊德者世其祿也世之構訟者皆出於忿欲而六三才不足則內省而無忮位已髙則知足而無求夫如是則從上而已奚其訟故食舊德而安也然當訟之時才不稱其位則人必有媢嫉之者故不能無危要之在己者貞固自守而無爭心故雖危而終吉也易説龜山楊氏曰六三以隂居陽無險健之才而承乘皆剛力不能訟也上九處剛健之極而下為之應柔而不能抗也則從上而已故曰食舊德貞厲蓋先王詔祿以功餼廩稱事食其食不任其責而惟上之從則唯食舊德可也當上下違行之時居險健之中雖以舊德而食然從之而不以貞安之而不知戒失義犯難將無所不至矣故惟貞厲乃終吉與之從事則無成矣易説白雲郭氏曰以隂柔而介二剛之間危懼也能不以訟為事所謂窒惕者也故能保舊德之祿而固守弗失與逋其邑而喪者異矣雖介二剛為危道而終獲吉者能窒其訟故也介二剛有道乎捨二之訟上從乾道代終而已從其大體者也故吉六三不以訟為事上從乾吉之大可謂德與位稱者矣然僅能食舊德而已九二自下訟上掇患已至又豈能保其舊邑哉逋竄宜矣易説漢上朱氏曰乾為剛德上九陽極而老舊也三之上成兌為口食舊德也食舊者食其素分猶言不失舊物也古者分田制祿公卿以下必有圭田以德而食其來舊矣公卿以下所食如周官家邑小都大都之田是也三公位乾上九郊之象六三當爭勝之時不喪其舊以不從四而從上也三從上而四間之宜有訟然三柔而明柔則不能訟明則知不可訟而止是以從上而食舊德六三介九二九四兩剛之間而失位厲也往從上九則上屈其剛就之無所事訟得位而食終吉也三之從上非苟從也或從王事以成功歸之已終其事不以無事而食是以食舊德也非從上之吉乎乾五為王巽為事三內卦之成上外卦之終故曰或從王事無成有終竇嬰訟田蚡上下相激至亡其身不知六三吉也易傳曰訟者剛健之事故初則不永三則從上二爻皆以處柔不終得吉四亦以不克而渝得吉訟以能止為善也易傳五峯胡氏曰郭子儀魚朝恩易外傳新安朱氏曰食猶食邑之食言所享也六三隂柔非能訟者故守舊居正則雖危而終吉然或出而從上之事則亦必無成功占者守常而不出則善也從上吉謂隨人則吉明自主事則無成功也本義東萊吕氏曰六三食舊德貞厲終吉或從王事無成象曰食舊德從上吉也易傳曰守其素分雖從上之所為非由己也故無成而終得其吉也蓋在下位者為上所寵任往往忘其素分臨事不能退托擅以為己功此所以多得禍也只如簿尉驟為郡守所委任遂忘自身元是簿尉遇事專輒偃然以成功自居豈不招忌病而致禍敗乎紀聞九四不克訟復即命渝安貞吉象曰復即命渝安貞不失也伊川先生曰四以陽剛而居健體不得中正本為訟者也承五履三而應一有于字初五君也義不克訟三居下而柔不與之訟初正應而順從非與訟者也四雖剛健欲訟無與對敵其訟無由而興故不克訟也又居柔而應柔亦為能止之義既義不克訟若能克其剛忿欲訟之心復即就於命革其心平其氣變而為安貞則吉矣命謂正理失正理為方命故以即命為復也方不順也書曰方命圮族孟子云方命虐民夫剛健而不中正則躁動故不安處非中正故不貞不安貞所以好訟也若義不克訟而不訟反就正理變其不安貞為安貞則吉矣安正能如是則為無失矣所以吉也並易傳橫渠先生曰體健而比於三理為不直故不克訟易説藍田吕氏曰二欲比初初應在四固已自辨九四不諒猶小有言初卒明辨九四之訟所以不克然四雖以剛致訟而居隂位能以理自反者也故曰復即命渝安貞吉龜山楊氏曰居非中正義不克訟也復即命變而為安貞則吉矣命天理也知義不克自反而即理則非迷而不復者其吉不亦宜乎易説白雲郭氏曰剛強之才未嘗下人非得位必多訟九四居上訟下為初辨明既不克訟復即初之命變而安於貞是以獲吉復即初命捨訟而應初也應初所以為正也是亦不失舊德之道苟非復即命渝安貞殆亦逋邑之流乎九四蓋嘗有訟能變而獲吉故不言舊德而象但言不失也既云不克訟則無德可言矣論訟則四優於二論德則三優於初其訟者上九乎亦愈於二之犯上也易説漢上朱氏曰訟生於讎敵故有忿爭不安其命者焉九四上承五下乘三而初為應五君也不可訟也三從上初從四無與為敵者故不克訟乃克其剛強欲訟之心而與初相應相應則情義相得各復其所何訟之有各復其所者復即命也命者正理也復即命則變前之失安於正理矣訟者始於剛強而不明九四處柔體離巽柔巽故無狠怒明則知可否斯九四所以能復者歟巽為命何也曰巽為風風者天之號令在人則命也受之於天也故先儒以巽為命為號令為事巽象曰申命行事正與否則繫乎爻位之得失陸績曰訟之復乾變而巽易傳五峯胡氏曰杜淹易外傳新安朱氏曰即就也命正理也渝變也九四剛而不中故有訟象以其居柔故又為不克而復就正理渝變其心安處於正之象占者如是則吉也本義復即命渝言復就命而變其不順之命語録東萊吕氏曰九四不克訟復即命渝安貞吉以九居四是剛強之人處不中正之地本好訟者也然所承者五五至尊而不敢與之訟所履者三三至柔而不至於生訟所應者初初既相應亦非與之為訟者也左右前後皆無可訟雖有好訟之心略不得騁則其心必自還而歸善故曰復即命渝命正理也好訟之心既無所施則必復就於正理變而為善也譬如水之泛溢欲擊東岸而其岸堅而不可動欲擊西岸而其岸又堅而不可動則必循循歸於故道矣心之所之只有善惡兩件於惡既不得騁不之於善將何之乎紀聞九五訟元吉象曰訟元吉以中正也伊川先生曰以中正居尊位治訟者也治訟得其中正所以元吉也元吉大吉而盡善也吉大而不盡善者有矣以中正之道何施而不元吉並易傳廣平遊氏曰訟元吉謂聽訟之主也非身有訟也九五得尊位大中以正決天下之訟已則何訟之有當訟之時至而以中正決之是以元吉也若虞芮質厥成文王蹶厥生則聽訟之道孰善於此吉孰大焉故卦言利見大人大人則九五之謂也且訟而有孚猶窒而後通惕而後寧中焉則吉終焉則凶自無元吉之理易説龜山楊氏曰剛中正而履尊位訟之所利見也故元吉元吉者大而盡善者也易説兼山郭氏曰九五利見大人尚中正也九五之象曰訟元吉以中正也則九五之無訟而為聽訟之主明矣詩曰虞芮質厥成文王蹶厥生則知訟元吉所以為中正也易説白雲郭氏曰九五中正大人也聽訟之主也天下之長也為天下之長以中正之德聽天下之訟人之所利見其為吉也大矣蓋非一人之吉實天下之吉也獄訟之歸虞舜虞芮之質文王其九五之謂也易説漢上朱氏曰九五聽訟之主未能使人無訟何謂元吉大人得尊位以中正在上無所偏繫邪枉之道不行故吉元吉者其始本吉吉之至善者也此皋陶淑問召伯聽訟之爻易傳五峯胡氏曰曹騰梁商賀若弼韓擒虎賈復寇恂和事天子易外傳新安朱氏曰陽剛中正以居尊位聽訟而得其平者也占者遇之訟而有理必獲伸矣中則聽不偏正則斷合理本義訟元吉便似乾之利見大人有占無象者爻便是象訟元吉九五便是語録東萊吕氏曰九五訟元吉象曰訟元吉以中正也九五聽訟者也訴訟之繁多至千百聽訟者欲其盡善而咸吉苟件件尋一道理以應之則亦不勝其勞矣殊不知聽訟所以能盡善而咸吉者本無多術只是一箇中正待之而已紀聞上九或錫之鞶帶終朝三褫之象曰以訟受服亦不足敬也伊川先生曰九以陽居上剛健之極又處訟之終極其訟者也人之肆其剛強窮極於訟取禍喪身固其理也設或使之善訟能勝窮極不已至於受服命之賞是亦與人讎爭所獲其能安保之乎故終一朝而三見褫奪也窮極訟事設使受服命之寵亦且不足敬而可賤惡況又禍患隨至乎易傳龜山楊氏曰以剛健居訟之終成訟者也成訟凶之道雖足以取勝而受服人所賤辱也故終朝而三褫之或錫非誠與也三褫者言疾之者衆也易説兼山郭氏曰上九許愼云鞶大帶也君子帶鞶婦人帶絲蓋爵命之服非所以賞訟也衆所不與故終朝三褫之言不足貴也易説白雲郭氏曰先人言鞶大帶也男子帶鞶婦人帶絲蓋爵命之服非所以賞訟也雍曰上九以訟而錫之鞶帶其招褫不足貴如此況自下訟上義不克者奪邑宜矣是不若六三不言訟而守舊德又不若九四復即命而不失也易説漢上朱氏曰三限乎上下之際腰之象也上九之三或錫之乾變為金腰以金飾鞶帶也三離日之上為終朝兌為毁折伏艮為手為受服三復位鞶帶毁有褫之象也故曰或錫之鞶帶終朝三褫之自五之三歷三爻三褫也敬者人以其正足憚故敬之上九成訟而居上位受服不以正知其雖有是物亦不足取敬於人內自愧恥不安其服是以終朝三褫之爭訟逆德非人之本心故不克訟則歸而逋竄以訟受服則愧而三褫易傳五峯胡氏曰來俊臣之徒主父偃易外傳新安朱氏曰鞶帶命服之飾褫奪也以剛居訟極終訟而能勝之故有錫命受服之象然以訟得之豈能安久故又有終朝三褫之象其占為終訟無理而或取勝然其所得終必失之聖人為戒之意深矣本義問觀訟一卦之體只是訟不可成初只不永所事九二不克訟六三守舊居正非能訟者九四不克訟而能復就正理渝變心志安處於正九五聽訟元吉上九雖有鞶帶之錫而不免終朝之褫首尾皆是不可訟之意故彖曰終凶訟不可成此句豈即本義所指卦體邪先生曰然因問易最難點如訟九四不克訟句復即命句渝句安貞句吉六三食舊德句貞句厲終吉句先生曰厲自是一句終吉又是一句易辭只是元排此幾句在此伊川作變其不安者為安貞作一句讀恐不甚自然語録東萊吕氏曰上九或錫之鞶帶終朝三褫之象曰以訟受服亦不足敬也説者多謂以訟受服終不能保必見褫奪此未盡爻象之意蓋以訟受服人情所最辱者若便見褫奪服不在身其辱亦除褫其服所以減其辱也惟其常著此服在身內則心自羞愧外則人共指目終朝之頃三次褫脫忸怩不寧一至於此其為辱也孰大焉若謂服為它人所褫則一褫便無何待至三所以言三褫者蓋其負愧懷恥視鞶帶如纆索時褫時服不能一朝居耳紀聞合訂刪補大易集義粹言卷十
