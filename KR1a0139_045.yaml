body:
  text: 合訂刪補大易集義粹言卷四十三頭等侍衛納喇性德編艮下坎上伊川先生曰蹇序卦睽者乖也乖必有難故受之以蹇蹇者難也睽乖之時必有蹇難蹇所以次睽也蹇險阻之義故為蹇難為卦坎上艮下坎險也艮止也險在前而止不能進也前有險陷後有峻阻故為蹇也易傳蹇是處蹇之道退無時不可行遊定夫所録新安朱氏曰屯是隂陽未通之象蹇是流行之中有蹇滯困則窮矣語録東萊吕氏曰睽者乖也乖必有難故受之以蹇蹇者難也夫患難者人之所同畏然知其患難之可畏而不知患難之本原睽乖者患難之本原也今人處患難而常懷乖異不平之心汨汨不反是猶惡熱而增焚惡醉而強酒何往而非患難哉故欲去險難必先去險難之本可也易説蹇利西南不利東北利見大人貞吉伊川先生曰西南坤方坤地也體順而易東北艮方艮山也體止而險在蹇難之時利於順處平易之地不利止於危險也處順易則難可紓止於險則難益甚矣蹇難之時必有聖賢之人則能濟天下之難故利見大人也濟難者必以大正之道而堅固其守故貞則吉也凡處難者必在乎一無乎字守貞正一無正字設使難不解不失正德是以吉也若遇難而不能固其守入於邪濫雖使茍免亦惡德也知義命者不為也易傳橫渠先生曰蹇之世大人乃能成功易説白雲郭氏曰蹇難也見難而知止謂之蹇故蹇為智者之事蹇之時得人則濟故利西南不利東北利見大人西南得朋之地也東北喪朋之地也大人足以濟大蹇者也得人之道先在反己其身正而天下歸之故貞吉也易説新安朱氏曰蹇難也足不能進行之難也為卦艮下坎上見險而止故為蹇西南平易東北險阻又艮方也方在蹇中不宜走險又卦自小過而來陽進則往居五而得中退則入於艮而不進故其占曰利西南不利東北當蹇之時必見大人然後可以濟難又必守正然後得吉而卦之九五剛健中正有大人之象自二以上五爻皆得正位則又貞之義也故其占又曰利見大人貞吉蓋見險者貴於能止而又不可終於止處險者利於進而不可失於其正也本義東萊吕氏曰蹇利西南不利東北利見大人貞吉大抵天下之理相反處乃是相治水火相反也而救火者必以水冰炭相反也而禦冰者必以炭險與平相反而治險必以平此聖人於蹇之卦所以特發明濟險之義西南坤位平易而順者也東北艮位艮為山險也遇險必以平易之道而濟則險難可治茍以險濟險則其難益甚矣貞吉者謂人之處蹇守正則吉也吉之一字最當看今人處患難往往不能固其所守又見古人亦有守正而身不免於難遂以為此義不足信殊不知所謂吉者非免於難為吉乃順理之吉也伊川説是以吉也一假最當看易説彖曰蹇難也險在前也見險而能止知矣哉蹇利西南往得中也不利東北其道窮也利見大人往有功也當位貞吉以正邦也蹇之時用大矣哉伊川先生曰蹇難也蹇之為難如乾之為健若易之為難則義有未足一作盡蹇有險阻之義屯亦難也困亦難也同為難而義則異屯者始難而未得通困者力之窮蹇乃險阻艱難之義各不同也險在前也坎險在前下止而不進故為蹇見險而能止以卦才言處蹇之道也上險而下止見險而能止也犯險而進則有悔咎一作吝故美其能止為知也方蹇難之時惟能止為善故諸爻除五與二外皆以往為失來為得也蹇之時利於處平易西南坤方為順易東北艮方為險阻九上居五而得中正之位是往而得平易之地故為利也五居坎險之中而謂之平易者蓋卦本坤由五往而成坎故但取往而得中不取成坎之義也方蹇而又止危險之地則蹇益甚矣故不利東北其道窮也謂蹇之極也蹇難之時非聖賢一有大人字不能濟天下之蹇故利於見大人也大人當位則成濟蹇之功矣往而有功也能濟天下之蹇者惟大正之道夫子又取卦才而言蹇之諸爻除初外餘皆當正位故為貞正而吉也初六雖以隂居陽而處下亦隂之正也以如一作如以此正道正其邦可以濟於蹇矣處蹇之時濟蹇之道其用至大故云大矣哉天下之難豈易平也非聖賢不能其用可謂大矣順時而處量險而行從平易之道由至正之理乃蹇之時用也並易傳橫渠先生曰見險能止然不可終止而已當見大人之德進之坤順致養之地則得其中若更退守艮止則難無時而解也故曰不利東北其道窮也至於解卦則曰其來復吉乃得中也與此互見矣蓋難在內外與震艮之動止則相反爾易説藍田吕氏曰蹇方涉於危難也利見大人謂九五以剛中處尊位也危難之世非大人不足以濟之非當位履正不足以正之龜山楊氏曰險在前而止卦之所以為蹇也居蹇之時居易以俟命而已行險以徼幸不可也故利西南西南順也止于險而不知變則道窮矣故不利東北也易説白雲郭氏曰險而止蒙者之事見險而能止智者之事蹇之與蒙用智不用智雖不同其於待人以濟險則一也猶屯解不同其於自動以濟險亦一也震之動剛其才足以自濟艮之止柔其才不足以自濟故蒙蹇必止而待人也蹇利西南往得中者謂九五也九五朋來而中節也不利東北其道窮者寡助之至至於親戚畔之道窮可知矣利見大人往有功者大蹇之時雖多善士亦不能有濟必大人而後有功也當位貞吉者所處知所止則無不當位之失無不當位之失則其身貞矣是以吉也古之聖人莫不先於治己大人正己而物正當位貞吉則正己者至矣所以為正邦之本也蹇之時以見大人為主雖乾龍飛見不過利見大人而止耳顧不大哉易説漢上朱氏曰蹇坎險難也艮止也坎在上險難在前止而不進故曰蹇難也險在前也此合雨體言蹇也離目為見見險者明也知其不可進則止而不犯者行其所知也知者精神之會水火之合坎離之象故曰見險而能止知矣哉此兼互體以卦才言處蹇之道也蹇自臨來小過變也九四往之五小過之五即臨之坤也坤西南體順而易坤衆也五中蹇難不解天下思治九四能順乎衆而往上居於五處順易以濟險難以順民心乃得中道所謂時中蹇之利也故曰蹇利西南往得中也艮止也東北方也見險而止非遂止不往也順時而處以有待也若遂止於險則過矣過則道不行天下益蹇非中道乃蹇之所不利故曰不利東北其道窮也此以卦變四五相易言濟蹇之道也大人九五也剛中而正量險而行其才足以濟難利見大人者六二也非剛健中正在上則六二柔中未有功也故曰利見大人往有功也此以二五言濟蹇也坤在四為邦國四諸侯位也故建侯康侯正邦無邦皆取此象蹇五爻皆正而初不正初不正者蹇之所由生也九五當位而正以正六四而邦國正邦國正則天下正而蹇難解矣正而吉也故曰當位貞吉以正邦也此再以九五六四言濟蹇也蹇之時或可止或可往往而有功非大人不能盡其用故曰蹇之時用大矣哉在卦氣為十一月故太玄準之以難易傳新安朱氏曰蹇難也以卦德釋卦名義而贊其美蹇利西南以卦變卦體釋卦辭而贊其時用之大也本義蹇利西南是説坤卦分曉但不知從何插入這坤卦來此須是箇變例聖人到這裏看見得有箇做坤底道理大率陽卦多自隂來隂卦多自陽來震是坤第一畫變坎是第二畫變艮是第三畫變易之取象不曽確定了它蹇無坤體只取坎中爻變如沈存中論五姓一般蹇利西南謂地也據卦體艮下坎上無坤而繇辭言地者往往只取坎中爻變變則為坤矣沈存中論五姓自古無之後人既如此呼喚即便有義可推語録東萊吕氏曰夫當患難之時必有處蹇之道坎為險在上是險在前也艮為止在下是見險而能止也坎卦本是坤卦只因第二爻變遂至於險使第二爻知坤順之可從而復歸於坤則無復蹇惟第二爻不肯變故止於蹇難也知矣哉知字最要看當平易之地則縱步至險危之地則駐足則又何以為知惟其預知其難而遂止所以為知也所謂見險而能止非畏其難怠惰而一無所為也故大象以君子反身修德明之易説象曰山上有水蹇君子以反身修德伊川先生曰山之峻阻上復有水坎水為險陷之象上下險阻故為蹇也君子觀蹇難之象而以反身修德君子之遇艱阻必反求諸己而益自修孟子曰行有不得者皆反求諸己故遇艱蹇必自省於身有失而致之乎是反身也有所未善則改之無歉於心則加勉乃自修其德也君子修德以俟時而已易傳蹇以反身修德故往者在外也在外必蹇來者在內也在內則有譽無尤來連朋來來碩皆反身修德之謂也蹇蹇不暴進內顧之象也暴進出外則無事矣連音平連則無窮也朋來則衆來言朋來未免於有思也至於來碩則來處於大人之事也故曰從貴羅氏拾遺藍田吕氏曰山上有水水行不利不得其地故蹇也水行不得其地猶君子之行不得於人不得於人反求諸已而已故愛人不親反其仁治人不治反其知禮人不答反其敬龜山楊氏曰居險難之時惟反身修德而己行險以徼幸君子不為也易説白雲郭氏曰古之君子窮則獨善其身達則兼善天下獨善之道無它修德而已蒙也蹇也皆君子遇險獨善之時也故蒙曰果行育德蹇曰反身修德也蹇利得朋而反身修德者君子愛人不親反其仁治人不治反其智禮人不答反其敬行有不得者皆反求諸已其身正而天下歸之故得朋之道莫大於反身修德之要也屯之難濟以動故君子以經綸困之難濟以説故君子致命遂志蹇之難在止於至善故曰反身修德難非一也故所以濟難亦不能同也易説漢上朱氏曰山上復有險行者蹇也六五反四而正反身修德之象易傳曰君子之遇蹇難必自省於身有失而致之乎有所未善則改之無歉於心則加勉易傳新安朱氏曰或説蹇與困相似君子致命遂志君子反身修德亦一般殊不知不然澤無水困是盡乾燥處困之極事無可為者故只得致命遂志若山上者水蹇則猶可進步如山上之泉曲折多艱阻然猶可行故教人以反身修德豈可與困為比只觀大象兩句便全然不同語録初六往蹇來譽象曰往蹇來譽宜待也伊川先生曰六居蹇之初往進則益入於蹇往蹇也當蹇之時以隂柔無援而進其蹇可知來者對往之辭上進則為往不進則為來止而不進是有見幾知時之美來則有譽也方蹇之初進則益蹇時之未可進也故宜見幾而止以待時可行而後行也諸爻皆蹇往而善來然則無出蹇之義乎曰在蹇而往則蹇也蹇終則變矣故上巳一作六有碩義並易傳橫渠先生曰蹇難之際用心存公無所偏係故譽美可獲易説龜山楊氏曰蹇之初險在前也往斯蹇矣見險而能止則知之事也來斯有譽矣故往蹇來譽易説白雲郭氏曰蹇為智者之事見難而止智也見難而往非智也故往則蹇而來則譽也夫知止而止則安榮知止而不止則危辱故言來譽來譽雖美未足以究蹇之實用故宜有待以濟也易説漢上朱氏曰蹇之初有險在前往則遇蹇知不可往來而止安時處順待可動而動則有見幾知時之譽初動而往離坎變兊兊口譽之往則蹇來則譽宜待也天下之險未有久結而不解者故伯夷太公居海濵以俟若先時而起則愈蹇矣鄭氏本作宜待時也易傳新安朱氏曰往遇險來得譽本義六二王臣蹇蹇匪躬之故象曰王臣蹇蹇終無尤也伊川先生曰二以中正之德居艮體止於中正者也與五相應是中正之人為中正之君所信任故謂之王臣雖上下同德而五方在大蹇之中致力於蹇難之時其艱蹇至甚故為蹇於蹇也二雖中正以隂柔之才豈易勝其任所以蹇於蹇也志在濟君於蹇一作艱難之申其蹇蹇者非為身之故也雖使不勝志義可嘉故稱其忠藎不為己也然其才不足以濟蹇也小可濟則聖人當盛稱以為勸矣雖艱一作蹇厄於蹇時然其志在濟君難雖未成功然一無然字終無過尤也聖人取其志義而謂其無尤所以勸忠藎也並易傳龜山楊氏曰九五險之中也六二險在前也所謂王臣蹇蹇也人之德慧術智常存乎疢疾君臣克艱尚何尤也易説白雲郭氏曰六二當位得中上應九五不私其身涉己之難以濟君之難非同德興王之臣不能至也孟子曰畜君何尤畜君者好君也夫畜君之德濟君之難其志皆同無尤宜矣初六以往為蹇六二以蹇蹇為無尤蓋九五大人也初六非見大人則當止不止則失身六二見大人則當往不往則失君此其所以異也易説漢上朱氏曰五乾王也二坤臣也二應五王臣也五在險中蹇也六二犯難濟五之險蹇之又蹇故曰王臣蹇蹇坤為身三折之目視下為躬二履當其位而艮體有保其躬之意二往濟五身任安危五坎變坤匪躬之故也蹇時非有才而剛上輔其君不能濟難二柔濟五才不足疑若有尤然志靖王室忘身以衛其上雖蹇之又蹇終無尤也易傳曰聖人取其志義謂其無尤所以勸忠藎也易傳新安朱氏曰柔順中正正應在上而在險中故蹇而又蹇以求濟之非以其身之故也不言吉凶者占者但當鞠躬盡力而已至於成敗利鈍則非所論也終無尤者事雖不濟亦無可尤本義九三往蹇來反象曰往蹇來反內喜之也伊川先生曰九三以剛居正處下體之上當蹇之時在下者皆柔必依於三是為下所附者也三與上為正應上隂柔而無位不足以為援故上往則蹇也來下來也反還歸也三為下二隂所喜故來為反其所也稍安之地也內在下之隂也方蹇之時隂柔不能自立故皆附於九三之陽而喜愛之九之處三在蹇為得其所也處蹇而得下之心可以求安故以來為反猶春秋之言歸也並易傳龜山楊氏曰險在前故往蹇也往蹇而來反則險得所恃矣故內喜之也易説白雲郭氏曰蹇難之際非見大人則皆當止故往蹇之義皆同反者既往復反之辭蹇自觀來九三復反於內故內喜之也初二隂爻故見剛反則喜之伊川謂反猶春秋之言歸九三之反實歸也易説漢上朱氏曰往則犯難反則得位九三重剛為下卦之主初二柔爻恃之以拒外險故往蹇來反以內喜之而反也陽得位故喜易傳曰反猶春秋之言歸也易傳新安朱氏曰反就二隂得其所安本義六四往蹇來連象曰往蹇來連當位實也伊川先生曰往則益入於坎險之深往蹇也居蹇難之時同處艱厄者其志不謀而同也又四居上位而與在下者同有得位之正又與三相比相親者也二與初同類相與者也是與下同志衆所從附也故曰來連來則與在下之衆相連合也能與衆合得處蹇之道也四當蹇之時居上位不往而來與下同志固足以得衆矣又以隂居隂為得其實以誠實與下故能連合而下之二三亦各得其實初以隂居下亦其實也當同患之時相交以實其合可知故來而連者當位以實也處蹇難非誠實何以濟當位不曰正而曰實上下之交主於誠實用各有其所也並易傳橫渠先生曰連順也序也蹇反當位正吉六四未能出險故可止而順序以俟難之解當位處隂之實易説藍田吕氏曰六四往則益險故曰往蹇來則當位與三五比連故曰來連二陽交以下雖無應所賴實矣龜山楊氏曰往則涉險來則乘剛故往蹇來連當位而止則不實矣易説白雲郭氏曰馬氏以連為難故輔嗣謂往來皆難伊川曰來則與下同志衆所從輔也雍曰往來皆蹇何取當位惟其來而能連在下之志故曰當位實也六四之位實以接下為職今得其實矣易説漢上朱氏曰六柔無應往則犯難故往蹇來則當位承五下連九三故來連連牽連也九三剛實四牽連之共濟五難當位而又得濟之實也處蹇難不以剛實濟之柔者安能獨濟乎陽為實易傳新安朱氏曰連於九三合力以濟本義九五大蹇朋來象曰大蹇朋來以中節也伊川先生曰五居君位而在蹇難之中是天下之大蹇也當蹇而又在險中亦為大蹇大蹇之時而二在下以中正相應是其朋助之來也方天下之蹇而得中正之臣相輔其助豈小也得朋來而無吉何也曰未足以濟蹇也以剛陽中正之君而方在大蹇之中非得剛陽中正之臣相輔之不能濟天下之蹇也二之中正固有助矣欲以隂柔之助濟天下之難非所能也自古聖王濟天下之蹇未有不由賢聖之臣為之助者湯武得伊吕是也中常之君得剛明之臣而能濟大難者則有矣劉禪之孔明唐肅宗之郭子儀德宗之李晟是也雖賢明之君茍無其臣則不能濟於難也故凡六居五九居二者則多由助而有功蒙泰之類是也九居五六居二則其功一作助多不足屯否之類是也蓋臣賢於君則輔君以君所不能臣不及君則贊助之而已故不能成大功也朋者其朋類也五有中正之德而二亦中正雖大蹇之時不失其守蹇於蹇以相應助是以其中正之節也上下中正而弗濟者臣之才不足也自古守節秉義而才不足以濟者豈少乎漢李固王允晉周顗王導之徒是也並易傳橫渠先生曰剛中之德為物所歸易説龜山楊氏曰履尊位大中而在險所謂大蹇也中正而應能反身修德者也入則無法家拂士出則無敵國外患者國常亡則居蹇修德其朋來宜矣易説白雲郭氏曰君道居蹇則天下難矣故云大蹇也九五以中正之道致匪躬之臣蓋所謂反求諸已而天下歸之者也故曰朋來大蹇朋來所謂西南得朋之利也故彖曰蹇利西南往得中也以中節者以中自反而致朋來也易説漢上朱氏曰險者人情之所不敢犯也五在險中獨安其險剛正足以任天下之難而不辭大者得位當蹇之時如是乃為得中陽與陽為朋朋謂九三也五下應二三來比之朋來也五為坎三來成兊水澤節之象節者處蹇之節也九五在險得中道應六二者有節則九三之剛不約而自來九三外應上六內為六二初六之所喜而又六四牽連而進同心協力斯可以濟天下之難故曰大蹇朋來以中節也若九五前郤應於下者失剛柔緩急之節則九三招之不來矣仲虺贊湯曰天錫王勇智武王曰今朕必往濟蹇大難者其要在於九五乎易傳新安朱氏曰大蹇者非常之蹇九五居尊而有剛健中正之德必有朋來而助之者占者有是德則有是助矣本義問九五大蹇朋來先生曰處九五尊位而居蹇之中所以為大蹇所謂遺大投艱于朕身人君當此大蹇之時則須屈羣䇿用羣力乃可濟也問蹇之九五大蹇朋來程傳以為無剛陽之臣不足以濟蹇其竊謂自古患無剛明之君耳未有有其君而無其臣者也傳又以李固王允等實之竊謂當時正以無剛明之君故耳設有之數子未必不能有為也先生曰讀易當看卦畫時節不可以此論問蹇九五何故為大蹇曰五是蹇之主凡人臣之蹇只是一事至大蹇須人主當之並語録上六往蹇來碩吉利見大人象曰往蹇來碩志在內也利見大人以從貴也伊川先生曰六以隂柔居蹇之極冒極一作隂險一作蹇而往所以蹇也不往而來從五求三得剛陽之助是以碩也蹇之道厄塞窮蹙碩大也寬裕之稱來則寬大其蹇舒矣蹇之極有出蹇之道上六以隂柔故不得出一作能耳得剛陽之助可以舒蹇而已在蹇極之時得舒則為吉矣非剛陽中正豈能出乎蹇也利見大人蹇極之時見大德之人則能一作利有濟於蹇也大人謂五以相比發此義五剛陽中正而居君位大人也在五不言其濟蹇之功而上六利見之何也曰在五不言以其居坎險之中無剛陽之助故無能濟蹇之義在上六蹇極而見大德之人則能濟於蹇故為利也各爻取義不同如屯初九之志正而於六二則目之為寇也諸爻皆不言吉上獨言吉者諸爻皆得正各有所善然皆未能出於蹇故未足為吉惟上處蹇極而得寬裕乃為吉也上六應三而從五志在內也蹇既極而有助是以碩而吉也六以隂柔當蹇之極密近剛陽中正之君自然其志從附以求自濟故利見大人謂從九五之貴也所以云從貴恐人不知大人為指五也並易傳橫渠先生曰與解繇義同易説藍田吕氏曰上六往則窮險來則獲內之應故曰往蹇來碩吉碩大也九三以陽居陽故大也利見大人九五比也龜山楊氏曰以柔居蹇難之極往則不足以出險而者應於內來則碩矣九五剛得尊位大中大人者也惟大人為足以解蹇之難比而從之其宜矣易説白雲郭氏曰居難之極難將革矣猶能以往為戒慎之至也故有來碩之吉利見大人者以居難之極志當濟難茍謹失身之戒則乖正邦之義矣故利見九五之大人也志在內者謹失身之戒也以從貴者明得君之義也內外兩盡其道宜其來碩而吉矣蹇自二至上五爻皆當位故彖言當位貞吉其曰來譽來反來連來碩碩大也反身修德至於盛大則至矣譽則次之反者衆之所喜連則當其實而已方險難之時無悔吝凶咎而有譽反連碩無尤中節之得斯其所以為智之事與易説漢上朱氏曰上六志在紓難然柔也才不足以柔犯難故往蹇柔自外來求助於九三三以剛濟柔則難紓志乃大得故曰往蹇來碩志在內也陽為大艮為石碩剛大也離目為見大人九五也故曰利見大人九五貴而有位足以行其道九三其德剛大佐五以濟天下之難上六志在內因九三利見九五斯可以出難故曰以從貴也陽為貴蹇難未解人不知所從上六因九三以從九五之貴則君臣之分定矣易傳新安朱氏曰已在卦極往無所之益以蹇耳來就九五與之濟蹇則有碩大之功大人指九五曉占者宜如是也本義問蹇卦往蹇來譽先生曰來往二字唯程傳言上進則為往不進則為來説得極好今人或謂六四往蹇來連是來就三九三往蹇來反是來就二上六往蹇來碩是來就五亦説得通但初六來譽則位居最下無可來之地其説不得通矣故不若程傳好只是不往為佳耳不往者守而不進故不進則為來諸爻皆不言吉蓋未離乎蹇中也至上六往蹇來碩吉却是蹇極有可濟之理既是不往惟守於蹇則必得見九五之大人與共濟蹇而有碩大之功矣語録東萊吕氏曰六爻初六曰往蹇來譽九二曰往蹇來反六四曰往蹇來連上六曰往蹇來碩皆以冒險而往為戒以知難而退為美至於六二九五兩爻一言王臣蹇蹇匪躬之故一曰大蹇朋來與四爻之義不同何也蓋五與二相應是君臣相與勠力以濟險難者也安得袖手而不為乎易説合訂刪補大易集義粹言卷四十三
