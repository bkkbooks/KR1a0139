body:
  text: 合訂刪補大易集義粹言卷五頭等侍衛納喇性徳編坤下坤上廣平㳺氏曰坤者純隂之卦也故初六隂生有履霜之戒六四重隂有天地閉之象易説五峯胡氏曰所以謂丑為地統者為是二陽也偶便是坤矣若隂則從陽者也豈可以為統乎與彪徳美書新安朱氏曰􅄲者偶也隂之數也坤者順也隂之性也注中者三畫卦之名也經中者六畫卦之名也隂之成形莫大于地此卦三畫皆偶故名坤而象地重之又得坤焉則是隂之純順之至故其名與象皆不易也本義東萊吕氏曰理一而已矣理雖一然有乾即有坤未嘗无對也猶有形則有影有聲則有響一而二二而一者也易説坤元亨利牝馬之貞君子有攸往先迷後得主利西南得朋東北䘮朋安貞吉伊川先生曰坤乾之對也四徳同而貞體則異乾以剛固為貞坤則一作以柔順而一作為貞牝馬柔順而健行故取其象曰牝馬之貞君子所行柔順而利且貞合坤徳也隂從陽者也待唱而和隂而先陽則為迷錯居後乃得其常也主利利萬物則主於坤生成皆地之功也臣道亦然君令臣行勞於事者臣之職也西南隂方東北陽方隂必從陽離䘮其朋類乃能成化育之功而有安貞之吉得其常則安安於常則貞是以吉也並易傳利字不聨牝馬為義如云利牝馬之貞則坤便只有三徳羅氏拾遺藍田吕氏曰馬之為畜為人服習乘之以行地者以柔順也牝馬不事奔踶柔順之至也柔順之弊必入於邪苟為利貞則吉兼山郭氏曰乾稱父坤稱母乾一也坤二也一以資始二則資生所以地大亦配天之極也坤配乾是以有元有亨有利獨无剛徳以終之故為牝馬之貞而已易説白雲郭氏曰乾健也坤順也天地大徳曰生則乾坤元亨皆一也利貞之體異者坤以順為正也牝馬順而健者也先順而後健坤之道也利牝馬之貞所謂言所利也言所利則不名為大故彖曰至哉坤元坤徳至順待唱而應不為物先故君子有所徃在物之先則失其道在物之後則得其道得其道斯能成其所利矣西南坤之類也故得朋東北反坤之類也故䘮朋世有以得為吉者堯之得舜是也有以䘮為吉者坤之䘮朋是也得朋則以順濟順可小事不可大事之道䘮朋則以健濟順天下无不濟矣坤道以䘮朋為正君子安此則吉孰大焉上言元亨利牝馬之貞蓋坤之爻辭自君子攸往之下皆人道也凡言吉凶皆人道之辭餘卦皆同並易説新安朱氏曰牝馬順而健行者陽先隂後陽主義隂主利西南隂方東北陽方安順之為也貞健之守也遇此卦者其占為大亨而利以順健為正如有所往則先迷後得而主於利徃西南則得朋徃東北則䘮朋大抵能安于正則吉也本義利牝馬之貞言利於柔順之正而不利於剛健之正利是箇虚字西南得朋固是好了東北䘮朋亦是不妨為有慶坤比乾都是折一半用底利牝馬之貞伊川只為説做那四徳所以説不通乾主義坤便主利占得這卦便主利這事不是坤道主利萬物乃是此卦占得時主有利隂體柔躁只為他柔所以躁剛便不躁躁是那欲動而不得動之意剛則便動矣柔躁不能自守所以説安貞吉並語録東萊吕氏曰坤君子有攸徃人只説坤靜而不動故聖人以君子有攸徃明之使人知至靜之中其動本未嘗息也讀易紀聞彖曰至哉坤元萬物資生乃順承天坤厚載物徳合无疆含𢎞光大品物咸亨牝馬地類行地无疆柔順利貞君子攸行先迷失道後順得常西南得朋乃與類行東北䘮朋乃終有慶安貞之吉應地无疆伊川先生曰資生之道可謂大矣乾既稱大故坤稱至至義差緩不若大之盛也聖人於尊卑之辨謹嚴如此萬物資乾以始資坤以生父母之道也順承天施以成其功坤之厚徳持載萬物合於乾之无疆也以含𢎞光大四者形容坤道猶乾之剛健中正純粹精也含包容也𢎞寛裕也光昭明也大博厚也有此四者故能成承一作順天之功品物一作類咸得亨遂取牝馬為象者以其柔順而健行地之類也行地无疆謂健也乾健坤順坤亦健乎曰非健何以配乾未有乾行而坤止也其動也剛不害其為柔也柔順而利貞乃坤徳也君子之所行也君子之道合坤徳也乾之用陽之為也坤之用隂之為也形而上曰天地之道形而下曰隂陽之功先迷後得以下言隂道也先唱則迷失隂道後和則順而得其常理西南隂方從其類得朋也東北陽方離其類䘮朋也離其類而從陽則能成生物之功終有吉慶也與類行者本也從於陽者用也隂體柔躁故從於陽則能安貞而吉應地道之无疆也隂而不安貞豈能應地之道彖有三无疆蓋不同也徳合无疆天之不已也應地无疆地之无窮也行地无疆馬之健行也並易傳先迷後得是一句主利是一句蓋坤道唯是主利文言後得主而有常處脱却一利字楊遵道録東北䘮朋隂必從陽然後乃終有慶也天地之中理必相直則四邊當有空闕處地之下豈无天今所謂地特於一作為天中一物耳如雲氣之聚以其乆而不散也故為對比地動者只是氣動凡所指地者一作損闕處只是土土亦一物爾不可言地更須要知坤元承天是地之道也東見録横渠先生曰坤先迷不知所從故失道後能順聽則得其常矣以西南為得朋乃安貞之徳也以東北為䘮朋雖得主有慶而不可懐也西南土之位東北木之位也西南得朋東北䘮朋江沱之間有嫡不以其媵備數是不能䘮朋也媵遇勞而无怨却是能䘮朋者其卒嘯也歌是乃終有慶也此婦人之教大者也西南致養之地東北反西南者也隂陽正合則隂相對者必陽也西南得朋是始以類相從而來也東北喪朋喪朋相忘之義聽其自治不責人不望人是䘮其朋也䘮朋則有慶矣江有沱有汜有渚皆是始離而終合之象也有嫡不以其媵備數是不能䘮朋媵遇勞而无怨是能䘮朋也以其能䘮朋故能始離而終合之子歸自嫡也不我以不我與不我過皆言其始之不均一也其後也悔嫡自悔也處既安既處之處也始離而終既處也歌是乃終有慶慶則同有慶並易説藍田吕氏曰乾之體大矣坤之效乾之法至乾之大而後已故乾元曰大哉坤元曰至哉廣平㳺氏曰乾曰大哉坤曰至哉大則无所不包至則无所不盡乾之大无方而坤則未離乎方也坤順承天則於乾之道亦无餘矣特不出於天之外而已故曰至哉坤元言地道於是為盡也天下之道至於易而盡故曰易其至矣天下之徳至於中庸而盡故曰中庸其至矣體易而崇徳則日新體易而廣業則富有故曰盛徳大業至矣哉其靜也翕故曰含𢎞含言无所不容𢎞言无所不有其動也闢故曰光大光言无所不顯大言无所不被四者坤元之徳也體坤徳以有行者非君子不足以與此故曰君子攸行天行健者天之不已也无不覆燾者天之无疆而地之持載足以配之故曰徳合无疆蓋无疆者以形言也徳合无疆者地之配天也應地无疆者君子之法地也知君子攸行應地无疆則知乃順承天之下徳合无疆者合乎天也並易説兼山郭氏曰乾坤二者方其對立於兩儀莫知所宗是以謂之先迷及其順以承天是以謂之後得主利也西南隂位也故謂之得朋得朋者趣其類也東北陽位也故謂之䘮朋䘮朋者順以從乾也安貞之吉吉者言其靜順之常也易說白雲郭氏曰大則无不至至則有所極此乾坤之異也始則未生生則成形坤之資生順承之道是為坤之至也一順未足以盡坤之道其能合乾无疆之大徳者厚載萬物而已元者四徳之首也故統天為乾之元而厚載為坤之元也无疆之徳健是也剛健中正此乾之所以大含𢎞光大此坤之所以至含𢎞言其靜而翕也光大言其動而闢也萬物資生而得咸亨者本於含𢎞光大而已乾為馬非坤也而坤有取於牝馬者欲合乾徳无疆故有取於馬也合乾而非乾故曰牝馬牝馬柔順而行健坤道至柔而動剛故能合乾之徳而行地无疆也君子法坤之道行此柔順利貞而已柔順至柔也利貞則動剛在其中矣且乾健坤順道之常也逆之則失其道也故坤先則迷而失常道後則順而得常道也然一隂一陽之謂道坤本隂而西南與類行是不知坤有剛柔動靜之道一於隂者也東北䘮朋則得至柔動剛之理坤道乃備是以乃終有慶矣聖人出庶物而寧萬國者法天之行健也安於後順䘮朋之正而終於吉者應地之无疆也坤合乾徳之无疆馬行類地之无疆聖人應坤之无疆此三言无疆之别也並易説漢上朱氏曰萬物資乾以始而有氣資坤以生而有形乾始而亨无所待也是以能大坤待乾而行乃能至於大有氣而後有形也故乾元曰大哉坤元曰至哉天健也坤順而承之故曰坤天先地後而生萬物坤為大輿自下載之積厚也天无疆者也坤所以配之者載物之徳合乎无疆故地配天坤合乾乾坤之始皆謂之元光者坎離也大者乾陽也靜翕含之也以育其根動闢𢎞之也以成其形一靜一動品物咸亨故曰亨品物咸亨者離之時也乾為馬坤變之為牝馬牝馬地類也无疆者乾之行也坤依乾而行以柔承剛以順承健乃能行地无疆故曰利牝馬之貞利牝馬之貞則非不言所利此坤之利所以異于乾之利歟君子乾之象柔順坤之徳一三五天也二四六地也陽以竒為正隂以偶為正陽先隂後柔順承乾乃得坤正則柔順者利于承乾以為正也是以君子體坤而行行者攸徃也故曰君子攸往猶乾言時乗六龍首出庶物也一三五不得其正先迷也失坤道也牝雞无晨宻雲不雨故曰先迷二順一四順三六順五順乾得主坤道有常有常者坤之利也臣待君唱女須男行故曰後得主利子夏傳曰先迷後得主也二進至三坤體成西南坤也止而不進成艮東北艮也坤隂生於午至申三隂成矣自申抵戌羣隂得朋宜若有得也而至亥成坤萬物皆虚故曰西南得朋乃與類行乾陽生于子至寅三陽成矣自寅抵辰隂類寖亡宜若有䘮也而至已成乾萬物皆盈故曰東北䘮朋乃終有慶是以得君者臣之慶得親者子之慶得夫者婦之慶三者未有不離其朋類而得者也故曰東北䘮朋乃終有慶坤以順為正而地之順天而无疆者順夫正也臣有獻替婦有警戒子有幾諌各安其正乃能悠乆而无窮安貞之吉應乎地之所以无疆也故曰安貞吉張載曰東北䘮朋雖得主有慶而不可懐也虞翻以月之生死論之曰從震至乾與時偕行消乙入坤滅藏於癸坤終復生隂陽之義配日月其大致則同易傳新安朱氏曰至哉坤元此以地道明坤之義而首言元也至極也比大義差緩始者氣之始生者形之始順承天施地之道也坤厚載物言亨也徳合无疆謂配乾也牝馬地類言利貞也馬乾之象而以為地類者牝隂物而馬又行地之物也行地无疆則順而健矣柔順利貞坤之徳也君子攸行人之所行如坤之徳也所行如是則其占如下文所云也先迷後得陽大隂小陽得兼隂隂不得兼陽故坤之徳常減于乾之半也東北雖䘮朋然反之西南則終有慶矣安貞之吉安而且貞地之徳也本義資乾以始便資坤以生不爭得霎時間坤之所生即乾之所始者徐渙云天之行健一息不停而坤不能順動以應其行則造物生生之功或息矣此語亦无病萬物資乾以始而有氣資坤以生而有形氣至而生生即坤元徐説亦通利牝馬之貞本无四徳底意彖中方有之彖中説四徳自不分曉前説元亨處却説得分明後面幾句无理㑹牝馬地類行地无疆便是那柔順利貞君子攸行本連下面縁它趂押韻後故説在此這般底難十分理㑹先迷後得東北西南大概是隂減陽一半就前後言沒了前一截就四方言沒了東北一截陽却是全體安貞之吉它這分段只到這裏若更妄作以求全時便凶了在人亦當如此伊川説東北䘮朋處但不知這處添得許多字否此是用王輔嗣説西南得朋乃與類行東北䘮朋乃終有慶既言終有慶則有慶不在今矣為它是箇柔順底物東北陽方非所安之地如慢水中魚去急水中不得自是䘮朋䘮朋於東北則必反于西南是終有慶也正如先迷後得為它柔順故先迷柔順而不失乎健故後得所以卦下言利牝馬之貞䘮朋先迷便是牝有慶後得便是馬將牝馬字分開却形容得這意思文蔚曰大抵柔順中正底人做越常過分底事不得只是循常守分時又却是做得它底事曰是如此問牝馬取其柔順健行之象坤順而言健何也先生曰守得這柔順亦堅確故有健象柔順而不堅確則不足以配乾矣又問柔順利貞君子攸行如何先生曰柔順利貞坤之徳也君子而能柔順堅正則其所行雖先迷而後得雖東北䘮朋反之西南則得朋而有慶蓋陽大隂小陽得兼隂隂不得兼陽坤徳常只得乾之半故常減于乾之半也如乾无所不利坤只利牝馬之貞皆是問君子有攸往何也先生曰此是虚句意在下句伊川只見彖傳辭押韻有柔順利貞君子攸行之語遂解云君子所行柔順而利且貞恐非也蓋言君子有所徃先迷後得主利也問東北䘮朋西南得朋何也先生曰隂不比陽隂只理㑹得一半不似陽兼得隂故无所不利隂半用故得于西南䘮于東北先迷後得亦然自王輔嗣以下皆不知此多錯解了乾卦連致知格物誠意正心都説了坤只説得持守一邊事如乾九三言忠信所以進徳修辭立其誠所以居業便連致知持守都説了坤從首至尾皆去却一个頭如云後得主而有常或從王事无成有終皆是无頭文蔚曰此見聖人賢人之分不同處曰然並語録東萊吕氏曰乾下彖元亨利貞止四字而已坤下彖自元亨利牝馬之貞以下凡數十言此乾坤之所以異君子有攸往人皆言坤體靜不知靜而有動乾動而坤當順乾故體易之君子當攸往大哉乾元至哉坤元物无兩大之理然於此又可以見天髙地下君尊臣卑上下之分自然如此易説天下惟有一理坤之彖止曰乃順承天徳合无疆而已蓋理未有在乾之外者也故曰效法之謂坤紀聞又曰西南得朋乃與類行東北䘮朋乃終有慶惟得朋然後能䘮朋厭薄其類者未必能出其類也己丑課程象曰地勢坤君子以厚徳載物伊川先生曰坤道之大猶乾也非聖人孰能體之地厚而其勢順傾故取其順厚之象而云地勢坤也君子觀坤厚之象以深厚之徳容載庶物易傳問坤卦是臣之事人君有用處否先生曰是何无用如厚徳載物人君安可不用楊遵道録兼山郭氏曰乾天道也故以氣言故曰天行健坤地道也故以形言故曰地勢坤氣則无不健也形則无不順也坤以地道主之故能厚徳載物靜順之道也易説白雲郭氏曰天得乾道之大者地得坤道之大者聖人從其大者故乾坤皆言天地而六子之象亦各舉其大者明之也乾言天行健則知天行得乾之健也坤言地勢坤則知地勢得坤之順也故君子法之厚其徳而无不載焉古之人自任以天下之重者以此易説漢上朱氏曰天髙西北地傾東南以順之故水潦有所歸而萬物各得其所君子積順徳而至博厚故能容載萬物易傳新安朱氏曰地坤之象亦一而已故不言重而言其勢之順則見其髙下相因之无窮至順極厚而无所不載也本義問坤言地勢猶乾言天行天行健猶言地勢順然大象乾不言乾而言健坤不言順而言坤説者雖多究竟如何先生曰此不必論只是當時下字時偶有不同必欲求説則穿鑿却反晦了當理㑹底問地勢猶言髙下相因之勢以其順且厚否先生曰髙下相因只是順若厚又是一个道理然惟其厚所以上下只管相因去只見得它順若是薄底物髙下只管相因則傾陷了不能如此之无窮矣惟其髙下相因无窮所以為至順也君子體之惟至厚為能載物天行甚健故君子法之以自强不息地勢至順故君子體之以厚徳載物地之勢常有順底道理且如這个平地前面便有坡陁處突然起底也自順並語録初六履霜堅冰至象曰履霜堅冰隂始凝也馴致其道至堅冰也伊川先生曰隂爻稱六隂之盛也八則陽生矣非純盛也隂始生於下至微也聖人於隂之始生以其將長則為之戒隂之始凝而為霜履霜則當知隂漸盛而至堅冰矣猶小人始雖甚微不可使長長則至於盛也隂始凝而為霜漸盛則至於堅冰一有也字小人雖微長則漸至於盛故戒於初馴謂習習而至於盛習因循也並易傳兼山郭氏曰乾一以健坤一以順而六爻之義何參差之不齊也蓋統而言之則為順者同别而言之則為順者異非異也所順者時之不同也初六之順言其理也隂能消陽柔能敗剛是以履霜未至於堅冰馴致其道則然矣是以防微於初故不可與長也孔子曰非一朝一夕之故其所由來者漸矣易説白雲郭氏曰陽主生隂主殺故春夏為陽秋冬為隂而陽為君子隂為小人坤之初六隂生之始而言履霜之漸以見聖人好生惡殺辨君子小人之分防微杜漸戒之於其蚤也霜之始殺未至於堅冰馴致其道有必至之理故也禍亂之作莫不由此是以大禹之戒言不見是圖而成王毖之於小宣王慎之於微詩書有取焉易説漢上朱氏曰隂者小人之道也一隂生於午剝乾之初也五隂而霜降六隂而堅冰初六之動柔成剛隂始凝也莫之禦焉駸駸然馴致乎盛隂而小人之道極矣故觀其所踐履則一隂始凝知其必至於履霜堅冰也震為足自下而進履也或曰坤之初六五月也何以有履霜堅冰之象曰所謂見微者也寒露者剥之初六也霜降者剥之六五也剥之初六即坤之初六也剥之六五即坤之六五也剥窮成坤上六也露者坤之氣寒氣入之故露為霜立冬水始冰亦坤之初六也於斗建為亥乾金之氣為冰故坤之初六一爻自姤卦言之為五月自剥卦言之為九月至五隂而霜降自坤卦言之為十月為亥至六隂而成冬𤣥所謂水凝地坼非見不見之形者其能知小人之禍於甚微之時乎易傳又曰坤初六乾為寒為冰何也曰坤坎之交乎乾也露者坤土之氣也至於九月坤交乎乾白露為霜故霜降為九月之候冰寒水也乾交乎坎也乾位在亥坎位在子大雪者十一月之節𤣥之難大雪也其辭曰隂氣方難水凝地坼陽弱於淵夫坤之初六五月之氣姤卦也是時豈唯无冰而露亦未凝何以言履霜堅冰至曰一隂之生始凝於下驗之於物井中之泉已寒矣積而不已至於坤之上六則露結為霜水寒成冰是以君子觀其所履之微隂而知冰霜之漸乾為金也故霜肅殺而冰堅强坤初六圖説新安朱氏曰六隂爻之名隂數六老而八少故謂隂爻為六也霜隂氣所結盛則水凍而為冰此爻隂始生於下其端甚微而其勢必盛故其象如履霜則知堅冰之將至也夫隂陽者造化之本不能相无而消長有常亦非人所能損益也然陽主生隂主殺則其類有淑慝之分焉故聖人作易於其所不能相无者既以健順仁義之屬明之而无所偏主至其消長之際淑慝之分則未嘗不致其扶陽抑隂之意焉蓋所以賛化育參天地者其㫖深矣不言其占者謹微之意已可見於象中矣案魏志象曰作初六履霜今當從之馴順習也本義問履霜堅冰至先生曰隂陽者造化之本所不能无但有淑慝之分蓋陽淑而隂慝陽好而隂不好也猶有晝必有夜有暑必有寒有春夏必有秋冬人有少必有老其消長有常人亦不能損益也但聖人參天地賛化育於此必有道故觀履霜堅冰至之象必有謹微之意所以扶陽而抑隂也語録六二直方大不習无不利象曰六二之動直以方也不習无不利地道光也伊川先生曰二隂位在下故為坤之主統言坤道中正在下地之道也以直方大三者形容其徳用盡地之道矣由直方大故不習而无所不利不習謂其自然在坤道則莫之為而為也在聖人則從容中道也直方大孟子所謂至大至剛以直也在坤體故以方易剛猶貞加牝馬也言氣則先大大氣之體也於坤則先直方由直方而大也直方大足以盡地道在人識之耳乾坤純體以位相應二坤之主故不取五應不以君道處五也乾則二五相應承天而動直以方耳直方則大矣直方之義其大无窮地道光顯其功順成豈習而後利哉並易傳或解直方大云因物之性而生之直也成物而不可易方也人見似好只是不識理如此是物先有个性坤因而生之是甚義理全不識也楊遵道録浩然之氣難識須要認得當行不慊於心之時自然有此氣象然亦未盡須是見至大至剛以直之三徳方始見浩然之氣若要見時且看取地道坤六二直方大不習无不利方便是剛大便是大直便是直於坤不言剛而言方者言剛則害於地道故下復云至柔而動也剛以其先言柔而後云剛无害大只是對小而言是大也剛只是對柔而言是剛也直只是對曲而言是直也如此自然不習无不利坤之六二只為己是地道又是二又是六地道之精純者至如六五便不同欲得學者且只看取地道坤雖是學者之事然亦有聖人之道乾九二是聖人之事坤六二是學者之事聖賢之道其發无二但至有深淺大小入關語録横渠先生曰地道之有孚者故曰光也易説大則直不絞方不劌故不習而无不利正蒙藍田吕氏曰理義者人心之所同然屈而不信私意害之也理義者天下之所共由畔而去之无法以閑之也私意害之不欽莫大焉无法以閑之未有不流於不義也直則信之而已方則匡之而已非有加損於其間使知不䘮其所有不失其所行而已二者克己復禮者也克己復禮則天下莫非吾體此其所以大也心誠求之雖不中不逺矣此所以不習无不利也六二居坤下體柔順而中君子存心治身莫宜於此廣平㳺氏曰坤之六二靜則為中正動則為直方坤之道盛於六二而直方因動而後見也不言直方則地道之光不可得而見矣故以動者言之易説龜山楊氏曰東坡言直方大云既直且方非大而何曰直方蓋所以為大然其辭却似不達孔子云敬義立而徳不孤徳不孤乃所謂大徳不孤即四海之内皆兄弟之意夫能使四海之内皆兄弟此所以為大也蕭山語録兼山郭氏曰六二柔順中正盡坤之美居无不當之位而上无異道之應故可以直可以方不疑其所行凡以順道故也且天得一以清地得一以寧乾之得一者九五是也坤之得一者六二是也六二柔順中正在下卦之中无應无承逺於君位可以直道而行者也以其能一而不私故能直以其依中正而行故能方以是而之焉故能大无所因也從容中道而已所以不習无不利也徳惟一動罔不吉其是之謂乎且天動而不息地靜而无為何取六二之動也曰天地相感合和于中亦感而後動動而有行與夫陽倡而隂不和男行而女不随者異矣是以初為防微終為失道亦見聖人之情也易説白雲郭氏曰臣道以順為正得順之至者其六二乎六二盡牝馬之道者也盡牝馬之道而言直方大者疑於陽徳也蓋不有是徳則一於柔順而已又豈能東北䘮朋而行地无疆乎故象以直方為六二之動而文言亦以其動也剛稱之然牝馬順而健性之自然非習之而後能也蓋君子盡在己直方大之徳而外物之來雖不習而可應猶所謂素富貴貧賤者也不習无不利者以敬義也素富貴貧賤者以誠明也臣道得此則動靜之際无所徃而不為利雖非乾之不言所利亦盡坤之利矣繫辭曰坤其靜也翕其動也闢闢則含𢎞光大品物咸亨所以為地道之光也地道之光非以其動而光乎舜曰重華禹曰文命皆地道之光者也易説漢上朱氏曰六二中正而動中故直正故方直者遂也方者不易其宜也易曰乾其靜也專其動也直是以大生焉又曰坤至柔而動也剛至靜而徳方而説卦乾為直坤為方方亦剛也故曰六二之動直以方也重坎為習二動成坎不習也動而之五得正不習无不利也坎為光光大也易傳曰二為坤之主中正在下盡地之道故以直方大三者形容其徳由直方大故不習而无不利不習謂自然也在坤道則莫之為而為也在聖人則從容中道易傳新安朱氏曰柔順正固坤之直也賦形有定坤之方也徳合无疆坤之大也六二柔順而中正又得坤道之純者故其徳内直外方而又盛大不待學習而无不利占者有其徳則其占如是也本義直方大是它隂爻居隂位无如此之純粹爻辭云直方大者言占者直方大則不習无不利却不是説坤徳直方大也且如元亨利貞彖裏面説底且随它説做一箇事後面説底四事又儘随它説去如某之説爻无許多勞攘坤卦中唯這一爻最純粹蓋五雖尊位却是陽爻破了體了四重隂而不中三又不正惟此爻得中正所以就這説箇直方大此是説坤卦之本體然而本意却是教人知道這爻有這箇徳不待習學而无不利人占得這箇時若能直能方能大則亦不習无不利却不是要發明坤道伊川有這箇病從頭到尾皆然劉用之問直方大不習无不利曰坤是純隂卦諸爻皆不中正五雖中亦以隂居陽惟六二居中得中為坤之最盛者故以象言之則有是三者之徳而不習无不利占者得之有是徳則吉用之又問不習无不利或以為此成徳之事或以為學者須時習然後至於不習曰不是如此聖人作易只是説此爻中有此象若占得此爻便應此事有此用未説到時習至於不習與成徳之事在學者固當如此然聖人作易未有此意在用之曰然不習无不利此成徳之事也先生曰亦未説到成徳之事只是卦爻中有此象而已人若占得便應此象都未説成徳之事也某説易所以與先儒不同正在於此問坤直方大曰直方然後大積習而至然後能不習无不利又云易不是聖人要説出六爻如此只是為占得此卦合當如此不如此不足以合此卦問坤之道直方大六二純正故能得此以為徳否先生曰不可説坤先有是道而後六二得之以為徳坤是何物六二是何物畢竟只是一箇坤只因這一爻中正便見得直方大如此伊川云卦爻有相應看來不相應者多且如乾卦如其説時除了二五外初何嘗應四三何當應上坤卦更都不見相應似此不通先生謂時舉曰程易中有甚疑處可更商量看時舉問坤六二爻傳云由直方而大竊意大是坤之本體安得由直方而後大邪先生曰直方大是坤有此三徳若就人事上説則是敬義立而徳不孤豈非由直方而後大邪並語録六三含章可貞或從王事无成有終象曰含章可貞以時發也或從王事知光大也明道先生曰章外見之物含章可貞來章有慶須要反己李籲所録伊川先生曰三居下之上得位者也為臣之道當含晦其章美有善則歸之于君乃可常而得正上无忌惡之心下得柔順一作恭之道也可貞謂可貞固守之又可以常乆而无悔咎一作吝也或從上之事不敢當其成功唯奉事以守其終耳守職以終其事一有者字臣之道也夫子懼人之守文而不達義也又從而明之言為臣處下之道不當有其功善必含晦其美乃正而可常然義所當為者則以時而發不有其功耳不失其宜乃其時也非含藏終不為也含而不為不盡忠者也象只舉上句解義則并及下文它卦皆然或從王事而能无成有終者是其知之光大也唯其知之光大故能含晦淺暗之人有善唯恐人之不知豈能含章也並易傳横渠先生曰六三以隂居陽不獨有柔順之徳其知光大含藴文明可從王事者也然不可動以躁妄故可靜一以俟時不可有其成功故无成乃有終也易説兼山郭氏曰六三不正之隂處下卦之上其才為不足其位為過中以順而過中可以含章代終而已易説白雲郭氏曰坤以六二為一卦之主三非任時之責者雖有美徳可明含而固守之可也或從王事謂從天下大務无成天之功終地之徳而已然含章則不茹終於必吐而後已此待時之義也待時者待從王事之時也知固守含章以待從王事之時則含𢎞光大之義得矣三居下卦之上其位非不尊雖有從王事任天下之道而六二中正已當其位矣故或之含章可貞非小道也故知六二之外三之徳可以任重易説漢上朱氏曰坤離為文明三文之成為章坤見離伏含章也人臣當含章不耀以其美歸之君六三不正非容悦者也可正也六三動則正惟含章也故當可動而動以時發也坤徳含𢎞光大含章者坤之靜也以時發者坤之動也靜而含動而𢎞坤之所以承天歟乾為王伏巽為事三内卦之上為成上為外卦之終或從王事者三之上也坤作成物无以成功自居有終其事而已為臣而終其事職當然也六三以是從王事得恭順之道知光大矣坎離合為知知如日月之明光大也邵雍曰陽知其始而享其成隂效其法而終其勞易傳新安朱氏曰六隂三陽内含章美可貞以守然居下之上不終含藏故或時出而從上之事則始雖无成而後必有終爻有此象故戒占者有此徳則如此占也本義六三便夾些陽了隂則渾是不發底如六三之爻有陽所以言含章若无陽何由有章含章為是有陽半動半靜之爻若六四則渾是柔了所以括囊語録東萊吕氏曰或從王事无成有終凡人多不達此意所為之事當做十分只做五六分多懐不須做盡之心如此乃是无成无終也君子則不然雖不居其成功而其所為不以小大逺近未嘗有一毫之不盡一毫不盡則失有終之義矣无成有終者雖不居其成而不敢有一毫不盡之心乃可易説含章可貞以時發也大凡人出來做事多被人疑忌只為預先多露圭角不能含章惟含章然後可以時發初不是兩件事或從王事知光大也易傳云或從王事而能无成有終者是其知之光大也惟其知之光大故能含晦此極有意味尋常人欲含晦者多只去鋤治驕矜深匿名迹然愈鋤愈生愈匿愈露者蓋不曽去根本上理㑹自己知未光大胸中淺狹纔有一功一善便无著處雖强欲抑遏終制不住譬如瓶小水多雖抑遏固閉終必泛溢若瓶大則水自不泛溢都不須閒費力紀聞六四括囊无咎无譽象曰括囊无咎慎不害也伊川先生曰四居近五之位而无相得之義乃上下閉隔之時其自處以正危疑之地也若晦藏其知如括結囊口而不露則可得无咎不然則有害也既晦藏則无譽矣能慎如此則无害也並易傳問括囊事還作得在位使否先生曰六四位是在上然坤之六四却是重隂故云賢人隠便作不得在位楊遵道録康節先生曰漁樵對問竊人之美謂之徼其始取之也惟恐其不多也及其敗露也惟恐其多矣夫譽與毁一事也而兩名者名與實故也邵子外書兼山郭氏曰六四坤道之革由乾之四也有近君之嚴履多懼之地才徳未孚危疑實甚以其上下不交故言天地閉以其无承无應故言賢人隠當斯時也可以括囊无咎无譽而已易説白雲郭氏曰六五之君柔弱在上而四又以柔徳獨近之其道危矣唯六四知幾之君子一以柔徳自處既絶直方之動又異含章之發括而絶物斯无咎矣善惡括而不形故无譽好惡括而不萌故不害天下徒知毁之為害而六四又知夫譽之為害也不其慎之至歟孔子言賢人隠非隠其身也隠其徳也善夫知幾君子之隠乎然則括囊果為臣之道歟曰時使之然耳非得已也易説漢上朱氏曰坤為囊六四動成艮艮為手括囊也六四正動則不正四有伏兊兊為口不正无譽可也无咎何邪六四當天地否塞賢人遯藏之時不利君子正故止其口而不出者慎也慎以全身故於義不害若立人之本朝道不行矣而括囊緘黙罪也安得无咎故此爻不以位言之易傳新安朱氏曰括囊言結囊口而不出也譽者過實之名謹宻如是則无咎而亦无譽矣六四重隂不中故其象占如此蓋或事當謹宻或時當隠遯也本義東萊吕氏曰六四括囊无咎无譽居此地者須是如括結囊口都无一條縫始得紀聞六五黄裳元吉象曰黄裳无吉文在中也伊川先生曰坤雖臣道五實君位故為之戒云黄裳元吉黄中色裳下服守中而居下則元吉謂守其分也元大而善也爻象唯言守中居下則元吉不盡發其義也黄裳既元吉則居尊為天下大凶可知後之人未達則此義晦矣不得不辨也五尊位也在它卦六居五或為柔順或為文明或為暗弱在坤則為居尊位隂者臣道也婦道也臣居尊位羿莽是也猶可言也婦居尊位女媧氏武氏是也非常之變一作大不可言也故有黄裳之戒而不盡言也或疑在革湯武之事猶盡言之獨於此不言何也曰廢興理之常也以隂居尊位非常之變也黄中之文在中不過也内積至美而居下故為元吉並易傳藍田吕氏曰六五充實之至將至于有光耀大人之學至矣兼山郭氏曰六五以位則尊以才則柔以體則坤蓋坤地道也妻道也臣道也柔而用中是以謂之黄裳也黄中之色也裳下之飾也柔而用中故黄中通理正位居體美在其中暢於四支發於事業者也易説白雲郭氏曰坤雖臣道而五實君位雖以柔徳不害其為君也猶乾之九二雖有君徳亦不害其為臣故乾有兩君徳而无兩君坤有兩臣徳而无兩臣皆一義也六五以柔居尊下下之君也江海所以能為百谷王者以其善下之也下下本坤之道也黄中色也色之美者也裳下服也是以至美之徳而下人也昔堯有允恭克讓之徳而後能得舜舜有温恭允塞之徳而後能得禹臯陶文王有徽柔懿恭之徳而後能得閎夭泰顛然則黄裳之徳其為元吉宜矣元大也一人有慶兆民賴之元吉也二五之爻蓋聖人明直方之臣非有黄裳之君不能致也文在中者言美徳在中故暢於四支發於事業皆天下之至美是以天下蒙其福也六四明柔徳近君著一時之變與六五辭不相通不可符合易之辭類如此觀二爻文言斯得之矣易説漢上朱氏曰五尊位六居之人臣當此惟守中居下乃得元吉否則必凶黄地之中色文者地道之美見於山川動植者也裳下體之飾曰黄則守中有地道之美而不過故曰文在中也曰裳則居下雖處尊位而不失坤之常唯守中不過斯能居下矣以是而動動則得二元吉也元吉者言其始本自吉非變而吉也故元吉在吉為至善易傳又曰坤雖臣道五實君位故為之戒云黄裳元吉黄中色裳下服言守中居下則无吉蓋伊尹周公之事也或曰安知非妻道也曰妻道之美盡於六三爻叢説新安朱氏曰黄中色裳下飾六五以隂居尊中順之徳充諸内而見於外故其象如此而其占為大善之吉也占者徳必如是則其占亦如是矣春秋傳南蒯將叛筮得此爻以為大吉子服恵伯曰忠信之事則可不然必敗外彊内温忠也和以率貞信也故曰黄裳元吉黄中之色也裳下之飾也元善之長也中不忠不得其色下不共不得其飾事不善不得其極且夫易不可以占險三者有闕筮雖當未也後蒯果敗此可以見占法矣文在中者文在中而見於外也並本義六五黄裳元吉這是那居中處下之道乾之九五自是剛健底道理坤之六五自是柔順底道理各随它隂陽自有一箇道理其為九六不同所以在那五處亦不同這箇五之柔順從那六裏來黄裳元吉不過是在上之人能以柔順之道黄中色裳是下體之服能似這箇則无不吉六五文在中而見於外先生曰易申言占者有其徳則其占如是言无其徳而得是占者却是反説如南蒯得黄裳元吉疑吉矣而蒯果敗者蓋卦辭明言黄裳則元吉无黄裳之徳則不吉也又如直方大不習无不利占者有直方大之徳則不習而无不利占者无此徳即雖習而不利也如奢侈之人而得恭儉則吉之占明不恭儉者是占為不吉也它皆倣此如此看自然意思活並語録東萊吕氏曰六五黄裳元吉文在中也此最難在中易説六五黄裳元吉黄中之色也裳下之服也中无定所坤以下為中紀聞上六龍戰于野其血𤣥黄象曰龍戰于野其道窮也伊川先生曰隂從陽者也然順極則抗而爭六既極矣復進不已則必戰故云戰于野野謂進至于外也既敵矣必皆傷故其血𤣥黄隂盛至于窮極則必爭而傷也並易傳藍田吕氏曰上六隂柔之物極則變居上則不利兼山郭氏曰上六坤道之窮窮而不知變者也隂生于午而始復于巽自巽至乾厯三時而終以位則不為不久以氣則不為不壯然進則不知陽之當來退則不知隂之可去是以疑而必戰戰而俱傷傷而不知悔亡其所謂坤順者也由是言之六爻之順者時焉而已凡易貴陽而賤隂非賤之也蓋陽主生隂主殺陽主徳隂主刑陽知進退之義隂无過亢之悔是以非克之則不去也始也履霜則難與之進終也龍戰則難與之退不知進退存亡是以謂之賤也易説白雲郭氏曰隂道柔順待陽唱而後動者也故陽不唱則隂不動君不唱則臣不和有不待唱進而干陽者上六之過也進而干陽逼也逼則疑而戰矣野者在外之地言陽之拒隂必使不侵其内也龍戰于野則為臣之道既窮而在君之義亦闕矣其血𤣥黄蓋君臣兩傷之謂也觀二帝三王之時君臣一體如元首股肱夫人无尺寸之膚不愛豈自傷其元首股肱哉漢唐之君屠戮臣下如異類其臣固有得罪者而彰君之惡大矣非特𤣥黄而已嗚呼上无黄裳之君下无直方之臣幾何不道窮而龍戰哉易説漢上朱氏曰上六坤之窮十月也其位在亥乾之位十一月復震震變乾為龍上六變乾乾為天卦外天際也野之象野莫知所適之地坤道已窮動而不已臣疑于君乾坤交戰君臣相傷不知變通故也易傳又曰天𤣥地黄何也曰乾言其始坤言其終也坎為黒乾之初九始于坎息而至巳午為火火赤也坎黒也赤黒為𤣥坤之初六始于離離之中爻坤也息而至亥成坤故十一月陽氣潛萌于黄宫者乾始于坤也坤之上六隂陽交戰坤終而乾始故曰𤣥黄震者乾始也太元謂十月之氣曰深合黄純廣含羣生又曰冬至及夜半以後者近𤣥之象也冬至夜半子也坎也乾之始也坤上六圖説新安朱氏曰隂盛之極至與陽爭兩敗俱傷其象如此占者如是其凶可知本義子耕問龍戰于野曰乾无對只是一箇物事至隂則有對大抵隂常虧于陽時舉問坤上六隂極盛而與陽戰爻中乃不言凶且乾之上九猶言有悔此却不言何邪曰戰而至于俱傷其血𤣥黄不言而凶可知矣並語録用六利永貞象曰用六永貞以大終也伊川先生曰坤之用六猶乾之用九用隂之道也隂道柔而難常故用六之道利在常永貞固隂既貞固不足則不能永終故用六之道利在盛大於終能大於終乃永貞也並易傳兼山郭氏曰用六永貞且欲其大終於順也易説白雲郭氏曰柔順而動剛坤之徳也可乆之道也用六之義用此而已用此可乆能勿大終乎用九非獨君也臣亦可用九二是也用六非獨臣也君亦可用六五是也易説漢上朱氏曰六隂柔之極不濟之以陽剛則邪佞之道故以九用六乃能永乆不失其正杜欽曰地道貴斂陽始之隂終之未始離陽故曰以大終也易傳新安朱氏曰用六言凡得隂爻者皆用六而不用八亦通例也以此卦純隂而居首故發之遇此卦而六爻俱變者其占如此辭蓋隂柔不能固守變而為陽則能永貞矣故戒占者以利永貞即乾之利貞也自坤而變故不足于元亨云初隂後陽故曰大終並本義用六永貞以大終也陽為大隂為小如大過小過之類皆是以隂陽而言坤六爻皆隂其始本小到此隂皆變為陽矣所謂以大終也言始小而終大朱震説卦畫七八爻稱九六它是不理㑹得老隂老陽之變且如占得乾之初爻是少陽便是初七七是少不㑹變便不用了若占得九時九是老老便㑹變便占這變爻此言用九用六亦如此乾吉在无首坤利在永貞這只説二用變卦乾吉在无首言卦之本體元是六龍今變為隂頭面雖變渾身却是龍只一似無頭底龍相似坤利在永貞不知有何闗捩子這坤却不得見它元亨只得它永貞坤之本卦固自有元亨變卦却无問坤體貞靜承天而行未嘗為始而嘗代終故自坤而變陽為羣龍而无首有利貞而无元亨是否先生曰坤雖變而為陽然坤性依舊在它本是箇无頭底物如婦從夫臣從君地承天先迷後得東北䘮朋西南得朋皆是無頭處也坤六爻雖有重輕大概都是持守收斂畏謹底意並語録合訂刪補大易集義粹言卷五
