body:
  text: 合訂刪補大易集義粹言卷五十九頭等侍衛納喇性德編離下震上伊川先生曰豐序卦得其所歸者必大故受之以豐物所歸聚必成其大故歸妹之後受之以豐也豐盛大之義為卦震上離下震動也離明也以明而動動而能一無能字明皆致豐之道明足以照動足以亨然後能致豐大也易傳豐亨王假之勿憂冝日中伊川先生曰豐為盛大其義自亨極天下之光大者唯王者能至之假至也天位之尊四海之富羣生之衆王道之大極豐之道其唯王者乎豐之時人民之繁庶事物之殷盛治之豈易周為可憂一作患慮宜如日中之盛明廣照無所不及然後無憂也易傳橫渠先生曰宜日中不宜過中也易説白雲郭氏曰豐者盛大之名盛大所以亨極天下之盛大唯王能至之蓋王者有道之王也然物極太盛者憂必將至唯用中道自持則可無憂故欲勿憂則宜如日之方中也日過中則昃豐過盛則衰一道也聖人欲持滿以中故言宜日中然噬嗑與豐皆明動之卦噬嗑先動而求明得明而後可亨也豐已明而後動則不期而自亨矣故噬嗑亨繼以利用獄利於求明故也豐無不亨故特曰王假之而已亦猶乾之不言所利也易説新安朱氏曰豐大也以明而動盛大之勢也故其占有亨道焉然王者至此盛極當衰則又有憂道焉聖人以為徒憂無益但能守常不至於過盛則可矣故戒以勿憂宜日中也本義彖曰豐大也明以動故豐王假之尚大也勿憂宜日中宜照天下也日中則昃月盈則食天地盈虛與時消息而况於人乎况於鬼神乎伊川先生曰豐者盛大之義離明而震動明動相資而成豐大也王者有四海之廣兆民之衆極天下之大也故豐大之道唯王者能致之所有既大其保之治之之道亦當大也故王者之所尚至大也所有既廣所治既衆當憂慮其不能周及宜如日之盛明普照天下無所不至則可勿憂矣如是然後能保其豐大保有豐大豈小才小知之所能也既言豐盛之至復言其難常以為誡也日中盛極則當昃眣月既盈滿則有虧缺天地之盈虛尚與時消息况人與鬼神乎盈虛謂盛衰消息謂進退天地之運亦隨時進退也鬼神謂造化之迹於萬物盛衰可見其消息也於豐盛之時而為此誡欲其守中不至過盛處豐之道豈易也哉並易傳橫渠先生曰月盈則食中弦盈之極也此人鬼所以惡盈禍盈也易説藍田吕氏曰豐致廣大也明而不動則明不大動則大大故豐動而大無不亨也大則物無非我王者之中也假之者惟王者能至之也日中則昃月盈則食豐之極者未有不耗此物之所共憂也若夫致其廣大擴而充之如日之中則必昃為己憂惟以照天下為吾事王道之盛者也白雲郭氏曰非動則不能致豐不明以動又無自而豐惟明以動是以豐也豐之為道尚也大也非盡王之道者不至之也日未中則不及既中則過皆偏照也惟日中無偏照故王者宜法是道以照天下是以聖人貴夫持之而不失也日中而後有昃月盈而後有食昃食皆有憂矣蓋以其道失中故也此再明勿憂宜日中之義也豈特日月而已乎雖天地盈虛尚與時為進退如春為陽中秋為隂中過是皆隂陽之極矣況在人與鬼神者乎孔子作彖略及豐大而言中為詳者大其時也中其道也詳其道所以垂戒亦見豐之時非易處者矣易説漢上朱氏曰豐泰九二之四也乾變離明坤易震動明以動則亨亨則大豐大也故曰豐亨彖曰豐大也明以動故豐此合兩體言致豐之道也假至也乾在上之象王者明以動其道亨乃能至於豐大九二上行至四王假之也王假之者尚大也四海之廣萬物之衆無一物不得其所無一夫不獲自盡非小道之所能至故曰王假之尚大也此以九四言乎豐之才也二四失位為憂離下有伏坎為加憂離見坎伏故憂也然明以動勿憂其至於大也進而至於五則得位矣故曰勿憂此以兊二之四言乎豐之才也離日震動日當五為中日動於下升於東方明動不已九四進五何憂乎不至於中而無所不照哉日之大明萬物咸覩宜照天下也乾為天五離應二照天下也太玄曰日正於天何為也曰君子乘位為車為馬車駖馬􅧊可以周天下故利其為主也宜日中則正於天利其為主之謂也故曰勿憂宜日中宜照天下也此以九二進而至五言乎豐之才也五復降四坎離象變離成兊日在西日中則昃也坎成兊巽兊為口月闕於巽辛月盈則食也四乾陽長於震二坤隂生於離陽長盈也息也隂生則盈者虛消者息矣有天地然後有人有鬼神鬼神往來於天地之間者也豐大之時所宜憂者不在乎未中而常在乎日之既中也何則日中俄且昃矣月盈俄且食矣盈者必虛息者必消天地之所不能違者時也而況天地之間聚而為人散而為鬼神乎明動不己未有能保其大者也保此道者其唯中乎故曰日中則昃月盈則食天地盈虛與時消息而況於人乎況於鬼神乎此復以坎離升降明豐之戒也在卦氣為六月故太玄凖之以大廓易傳又曰豐彖不取二之四為義而以兩體明之曰明以動故豐叢説新安朱氏曰明以動以卦德釋卦名義宜照天下釋卦辭況於鬼神乎此又發明卦辭外意言不可過中也本義豐亨王假之須是王假之了方且勿憂宜日中若未到這個田地更憂甚底王亦未有可憂宜照天下是貼底間句或問豐卦宜日中宜照天下是人君之德如日之中乃能盡照天下否曰易如此看不得只是如日之中則自然照天下不可將作道理解它日中則昃月盈則食天地盈虛與時消息而況於人乎況於鬼神乎自是如此物事到盛時必衰雖鬼神有所不能違也問此卦後面諸爻不甚好曰是他忒豐大了這物事盛極去不得了必衰也人君於此之時當如奉盤水戰兢自持方無傾側滿溢之患若才有纎毫驕矜自滿之心即敗矣所以此處極難紹聖中羣臣創為豐亨豫大之説當時某論某人曰當豐亨豫大之時而為因陋就簡之説君臣上下動以此藉口於是安意肆志無所不為而大禍起矣並語録象曰雷電皆至豐君子以折獄致刑伊川先生曰雷電皆至明震並行也二體相合故云皆至明動相資成豐之象離明也照察之象震動也威斷之象折獄者必照其情實惟明克允致刑者以威於一作其姦惡唯斷乃成故君子觀雷電明動之象以折獄致刑也噬嗑言先王飭法豐言君子折獄以明在上而麗於威震王者之事故為制刑立法以明在下而麗於威震君子之用故為折獄致刑旅明在上而云君子者旅取慎用刑與不留獄君子皆當然也易傳橫渠先生曰盛明如天大之至也動於上而明於下故折獄致刑民不惑矣易説藍田吕氏曰雷電皆至明且震也折獄致刑明則當理震則莫敢犯白雲郭氏曰噬嗑動以求明故雖為雷電而未極其至豐先明而後動則動無不善是以極其至也故曰雷電皆至蓋明之至而動亦至也折獄斷弊也致刑麗於刑也方動而有明有不明故明罰勑法以申戒之求於明也既明而後動則無疑矣是以斷弊而致之刑也易説漢上朱氏曰雷電皆至萬物豐大之時豐則生訟故君子法其威明並用以治刑獄電明照也所以折獄雷威怒也所以致刑折獄者以正折其不正初二三正也而二有伏坎為獄不明則枉者不伸致刑者刑其不正而已四五不正也兊為刑殺不威則小人不懼噬嗑其明在上君子在上之事也故為明罰飭法豐用明在下君子在下之事也故為折獄致刑易傳新安朱氏曰取其威照並行之象本義初九遇其配主雖旬無咎往有尚象曰雖旬無咎過旬災也伊川先生曰雷電皆至成豐之象明動相資致豐之道非明無以照非動無以行一作亨相須猶形影相資猶表裏初一無初字九明之初九一無九字四動之初宜相須以成其用故雖旬而相應位則相應用則相資故初謂四為配主已所配也配雖匹稱然就之者也如配天以配君子故初於四云配四於初云夷也雖旬無咎旬均也天下之相應者常非均敵如隂之應陽柔之從剛下之附上敵則安肯相從唯豐之初四其用則相資其應則相成故雖均是陽剛相從而無過咎也蓋非一有剛字明則動無所之非動則明無所用相資而成用同舟則胡越一心共難則仇怨協力事勢使然也往而相從則能成其豐故云有尚有可嘉尚也在他卦則不相下而離隙矣聖人因時而處宜隨事而順理夫勢均則不相下者常理也然有雖敵而相資者則相求也初四是也所以雖旬而無咎也與人同而力均者在乎降己以相求協力一作心以從事若懷先一作先懷己之私有加上之意則患當至矣故曰過旬災也均而先已是過旬也一求勝則不能同矣並易傳橫渠先生曰所之在進光大其宜也故往而有尚非均是陽爻則蔀暗之災與六二疑疾無以異也易説藍田吕氏曰初九與九四為配陽雖為無應然居豐之初所尚者大以陽之陽兩陽合大卒無咎者往有尚也十日謂之旬旬盈數也兩陽合大得其所尚雖盈無咎過盈必溢故曰災也白雲郭氏曰有為之世所莫先者明動而已豐者有為之時也明與動相配之道也初之遇四以明遇動故言配主非遇配主則不能有為矣輔嗣曰旬均也配主雖均而可與有為故雖均亦無咎而往則有尚是宜往配以有為也過旬災者才力既均則當相資以有成一欲偏勝則為災矣是以初以四為配主四以初為夷主迭自為賔而莫適為主斯無過旬之災矣王氏以旬為均者以初九九四均陽爻也非正應也易説漢上朱氏曰泰九二之四成豐故九四為豐之主配者隂陽相匹孟氏鄭氏本作妃嘉耦曰妃妃嫓也亦匹配之意初九九四陽也六五隂也初與四不應六五亦無應四雖不應初可因四為主而配五隂陽相配故九四為配主遇者不期而會四不應初而初九主之不期於會而會故曰遇其配主旬均也初九九四均也然明動相資致豐之道非明則動無所之非動則明無所用是以均無咎無咎者初九以正相資也初九遇四往而相易以致用則初得尚於五而豐之道上行矣尚亦配也與尚於中行之尚同故曰往有尚也夫初九遇九四所以得尚於五者以正相資而成豐譬之共難則仇怨協力勢使之然若妄動不正過四而有其位明動不相為用過旬也過旬則失其配主往而無所尚與坎險相會災至矣豐道亡所以災也故曰過旬災也初動有小過象故曰過旬謂之均者六甲周行乘八節其數四百八十而成鈞鈞勻也初九離納已九四震納庚自已至庚凡十日十日周而復始故訓勻易傳又曰初九配四與上同然以初因適五五亦求陽為均則不同叢説新安朱氏曰配主謂四旬均也謂皆陽也當豐之時明動相資故初九之遇九四雖皆陽剛而其占如此也過旬災戒占者不可求勝其配亦爻辭外意並本義六二豐其蔀日中見斗往得疑疾有孚發若吉象曰有孚發若信以發志也伊川先生曰明動相資乃能成豐二為明之主又得中正可謂明者也而五在正應之地隂柔不正非能動者二五雖皆隂而在明動相資之時居相應之地五一作乃才不足一有耳字既其應之才一無才字不足資則獨明不能成豐既不能成豐則喪其明功故為豐其蔀日中見斗二至明之才以所應不足與而不能成其豐喪其明功無明功則為昏暗故云見斗斗昏見者也蔀周匝之義用障蔽之物掩晦於明者也斗屬隂而主運平象五以隂柔而當君位日中盛明之時乃見斗猶豐大之時乃一作而遇柔弱之主斗以昏見言見斗則是明喪一作喪明而暗矣二雖至明中正之才所遇乃柔暗不正之君既不能下求於己若往求之則反得疑猜忌疾暗主如是也然則如之何而可夫君子之事上也不得其心則盡其至誠以感發其志意而已茍誠意能動則雖昏蒙可開也雖柔弱可輔也雖不正可正也古人之事庸君常主而克行其道者已之誠意一無意字上達而君見信之篤耳管仲之相桓公孔明之輔後主是也若能以誠信發其志意則得行其道乃為吉也有孚發若謂以己之孚信感發上之心志也茍能發則其吉可知雖柔一作昏暗有可發之道也並易傳橫渠先生曰凡言往者皆進而之上也初進而上則遇陽而有尚二既以隂居隂而又所應亦隂故往無所發愈增疑疾能不纍於私信然接物乃吉宜日中而所應得隂故曰見斗五在君位故以斗喻夜見之象易説藍田吕氏曰六二體雖離明而以隂居隂故豐其蔀日中見斗所應亦隂不足以發故往得疑疾然履中當位能信以發志孚達於外所蔽者必開所疑者必釋卒反其離明之質故吉白雲郭氏曰六二為離明之中而有豐蔀之暗者以隂居隂才位不足上非正應所以有從暗之象也蔀者覆障而致暗之謂也居明而豐於暗自致之也故至於日中見斗蓋豐於暗則暗必至焉天下之理明則無疑暗則疑六二用明投暗往得疑疾乃其宜也然天下之無信者生於不中不正既中且正斯為有孚矣任其中正有孚而發則動無不吉舍中正有孚之德而從居隂從暗之義則惑矣是其所以疑也信以發志者由固有之明信發中正之志則吉也六二有中正離明之德足以致吉有居隂從暗之義足以蔽明是以聖人之辭兩及之然有為則在人耳故人守德不妄動則吉舍德而妄動則疑理之必然也有孚發若內也主在己之德言也豐其蔀外也主在外之事言也是以君子不明則不動終無豐蔀見斗之患唯智者能之然日中無見斗之理是之謂疑疾猶睽之載鬼一車也易説漢上朱氏曰震巽為草二在草中有固匝掩蔽之意故曰蔀陸震曰厯法凡十九年閏分盡為一章四章凡七十六年為一蔀五蔀周六甲凡三百八十年而厯象小成豐蔀之名蓋寓此意離目為見豐為日中五兊伏艮艮離為天文賁之象也震少陽其䇿七震為動有星在上動於中而其數七斗之象也二有至明中正之才以豐時遇暗弱不正之君猶當晝而夜至於見斗其昏甚矣坤為冥晦暗之象五既不能下賢二自往見反得疑疾自往者亦取疑之道巽為不果六五隂失位疾也然二五相應之地有孚之理二積中正不已盡其誠信以感發其志則五動而應之乃吉易傳曰茍誠意能動雖昏蒙可開也雖柔弱可輔也雖不正可正也古之人事庸君常主而克行其道者已之誠上達而君見信之篤耳易傳又曰涑水以六二蔀覆幽塞不見知於人張弼以巽為蔀案震巽為草莽上與坤交亦有蔀之象然則豐其蔀其沛其蔀其屋皆就本爻言之又曰輔嗣曰蔀覆曖鄣光明之物又略例曰大暗之謂蔀鄭康成作菩云小席也陸希聲曰茂盛周匝之義也案坤為冥暗震巽為草莽豐之離在震巽之下而交於坤是明為草莽周匝蔽蔀之象並叢説新安朱氏曰六二居豐之時為離之主至明者也而上應六五之柔暗故為豐蔀見斗之象蔀障蔽也大其障蔽故日中而昏也往而從之則昏暗之主必反見疑惟在積其誠意以感發之則吉戒占者宜如是也虛中有孚之象本義九三豐其沛日中見沫折其右肱無咎象曰豐其沛不可大事也折其右肱終不可用也伊川先生曰沛字古本有作斾字者王弼以為幡幔則是斾也幡幔圍蔽於內者豐其斾其暗更甚於蔀也三明體而反暗於四者所應隂暗故也三居明體之上陽剛得正本能明者也豐之道必明動相資而成三應於上上隂柔又無位而處震之終既終則止矣不能動者也它卦至終則極震至終則止矣三無上之應則不能成豐沫星之微小無名數者見沫暗之甚也豐之時而遇上六日中而見沫者也右肱人之所用乃折矣其無能為可知賢智之才遇明君則能有為於天下上無可賴之主則不能有為如人之折其右肱也人之為有所失則有所歸咎曰由是故致是若欲動而無右肱欲為而上無所賴則不能而已更復何言無所歸咎也三應於上上應而無位隂柔無勢力而處既終其可共濟大事乎既無所賴如右肱之折終不可用矣並易傳橫渠先生曰所應在隂故曰豐沛能折其右肱絶去上六而不纍其明則可免咎也光大之上隂柔之終不可用也易説藍田吕氏曰九三尚大之時以陽居陽其明宜廣而應於上六一隂蔽之油然作雲沛然下雨日中盛明不免障蔽比之見斗雖有間矣然不能不晦故曰豐其沛日中見沫言見斗者如夜之暗無所照也見沫者晝雖晦猶可作也猶可作故可小事不可大事也豐大之時以陽應隂隂乃在上吉事尚右右肱之象隂暗而小則右肱偏廢左體雖完不便於事終不可用也白雲郭氏曰王氏謂沛為幡幔之屬然凡偏蔽之象皆謂之沛非必幡幔之類也沫昧也隱昧不明之象也自蔽其明至於隱昧不明之地則傷其明矣人之有為也目有所見而後手足可為今自傷其明至於幽昧無所見焉是不能有為也故有折其右肱之象無咎者猶雖凶無咎之義蓋言折其右肱疑於凶而無咎也且豐居甚大之際最為大有為之時非天下之至明不足以盡其道今自損其明如豐沛見沫則其才不可以有為也自知其才不可以有為而強為之則其為過甚矣知其才不可以有為而不為亦可謂自知之明矣是所以折其右肱無咎也象言不可大事者既失其明不可有為故也必言折者蓋絶其有為之資示終不可用也九三過中而從隂故有是象右肱偏體也易説漢上朱氏曰沛古本作斾王弼以為幡幔震為玄黃兊金斷之斾也幡幔圍蔽於內故豐其斾沫斗後小星微昧之光子夏傳及字林作昧三之上成艮艮離為天文星在斗之後隨斗而動者昧也三明極而剛正處豐之時上六暗極矣猶日中當明而反見斗後之星其暗尤甚巽為事陽為大伏坎為可豐尚大也豐其斾往見則不明故退而守正以不可大事故也兊為右伏艮為肱兊折之折右肱也上六暗極不可用之以有為從之必罹其咎故自折其右肱示終不可用則無咎易傳新安朱氏曰沛一作斾謂幡幔也其蔽甚於蔀矣沫小星也三處明極而應上六雖不可用而非咎也故其象占如此本義九四豐其蔀日中見斗遇其夷主吉象曰豐其蔀位不當也日中見斗幽不明也遇其夷主吉行也伊川先生曰四雖陽剛為動之主又得大臣之位然以不中正遇隂暗柔弱之主豈能致豐大也故為豐其蔀蔀周圍掩蔽之物周圍則不大掩蔽則不明日中見斗當盛明之時反昏暗也夷主其等夷也相應故謂之主初四皆陽而居初是其德同又居相應之地故為夷主居大臣之位而得一作德又有同字在下之賢同德相輔其助豈小也哉故吉也如四之才得在下之賢為之助則能致豐大乎曰在下者上有當位為之與在上者下有賢才為之助豈無益乎故吉也然而致天下之豐有君而後能也五隂柔居尊而震體無虛中巽順下賢之象下雖多賢亦將何為蓋非陽剛中正不能致天下之豐也位不當謂以不中正居髙位所一作非以暗而不能致豐一冇乎字謂幽暗不能光明君隂柔而臣不中正故也陽剛相遇吉之行也下就於初故云行下求則為吉也並易傳橫渠先生曰無應於下近比於五故亦云見斗正應亦陽故云夷主易説藍田吕氏曰九四體雖陽明而居隂與二同故亦曰豐其蔀日中見斗豐其蔀自蔽覆而不見其明明豐於蔀中而己不見日而見斗其幽如夜也然而初九為應皆陽爻也與我等夷故曰主豐尚乎大兩陽合大其行吉也白雲郭氏曰二之豐蔀見斗以重隂而非正應也而有孚發若吉者中正也四之豐蔀見斗非中正也而遇其夷主吉者應初之求而有遇也反復參考之則二爻之義實相類故其辭同而皆終之以吉有為之時明動必相濟然後有成故初謂四為配主四謂初為夷主夷等也等亦匹配之義迭稱主者均為陽剛特明動相須不能専任以有為莫適賔主惟足於明者知求動以為主居於動者知求明以為主故也象言位不當者非中正也遇其夷主則行斯吉矣易説漢上朱氏曰四動成坎離光明也不動成震巽震巽為草掩蔽周匝蔀也四在蔀中處不當位自蔽其光明故曰豐其蔀兊有伏艮四應離初艮離為天文震動也其䇿七有星動於上而其數七斗之象離目為見四處不當位又不能變若動而交初則幽者明坎為隱伏故也以能處豐猶日中之時而反見斗處幽暗而己不明故曰幽不明也九四不正其不明自取之異於二三矣夷主者謂初也九四與初九均為陽而上下不敵四忘其勢下夷於初四者初之所主也故曰夷主初正正則吉初九助四而上行以資其明吉行也易傳曰居大臣之位得在下之賢同德相輔其助豈小哉易傳又曰四適五五為夷主謂九四當位則明照天下似通乎象矣叢説新安朱氏曰象與六二同夷等夷也謂初九也其占為當豐而遇暗主下就同德則吉也本義問豐九四近幽暗之君所以有豐其蔀日中見斗之象亦是它本身不中正所致故象云位不當先生曰也是如此語録六五來章有慶譽吉象曰六五之吉有慶也伊川先生曰五以隂柔之才為豐之主固不能成其豐大若能來致在下章美之才而用之則有福慶復得美譽所謂吉也六二文明中正章美之才也為五者誠能致之在位而委任之可以致豐大之慶名譽之美故吉也章美之才主二而言然初與三四皆陽剛之才五能用賢則彚征矣二雖隂有文明中正之德大賢之在下者也五與二雖非隂陽正應在明動相資之時有相為用之義五若能來章則有慶譽而吉也然六五無虛已下賢之義聖人設此義以為教耳其所謂吉者可以有慶福及於天下也人君雖柔暗若能用賢才則可以為天下之福唯患不能耳並易傳橫渠先生曰來章反比陽則明也有慶得配於四也易説藍田吕氏曰六五豐大之時以柔居尊不私其應不自滿假與物無私物不占而來德不見而章所以有慶譽吉白雲郭氏曰觀豐之世以無所豐為大不知此而徒欲務豐於外是蔽於豐者也蔽於豐故惟見斗見沫而已非處豐之道也猶為之君者居豐盛之世上欲豐於朝廷下欲豐於民物或欲豐其貨財或欲豐其土地城邑宫室車徒之類是不知豐之世盛大無以加又求豐之是無厭也故必有一偏之蔽然後從而損其明則向之欲豐今反損矣聖人貴夫持盈守成而不以豐大為務故書有滿招損之戒而易著豐蔀豐沛之失且卦辭言王假之又言勿憂宜日中則知能行道者乃能極其至而持之以中道者又所以無憂也是以六爻之中稱豐者皆無善道而六五不言豐獨為可尚也來章章之也所以章豐之盛大也豐在彼者也豐之來我能章之而已苟豐之來我亦豐之是二三見斗見沫之不明也章之之道何如持之守之保而弗失使豐之道久亨於世無加損焉是為章之之道也此五所以獨能至之也不知出此而有一偏之蔽則所豐者小道而損豐之大所豐者末務而忘豐之本是日中而求昃月盈而求食非聖人章豐之道也來章如是則其慶其譽何時而已邪是為六五之吉也不然茍務豐而不知善終之道聖人無取焉故豐其屋蔀其家固非有期於窺其戶閴其無人而其為應必至是而後已可不戒哉易説漢上朱氏曰六五屈體來下於四與之共天位九四之明上行之五相錯成坤離為文章者文之成也九四上行則初應四二應五三應上六爻並用成豐大之慶五屈己下賢四志行乎上人自譽之兊為口譽之者也五得正吉也易傳又曰六五來章為虛已以來二陽謂之來者我來彼也叢説新安朱氏曰質雖柔暗若能來致天下之明則有慶譽而吉矣蓋因其柔暗而設此以開之占者能如是則如其占矣本義上六豐其屋蔀其家窺其户閴其無人三嵗不覿凶象曰豐其屋天際翔也窺其户閴其無人自藏也伊川先生曰六以隂柔之質而居豐之極處動之終其滿假躁動甚矣處豐大之時宜乎謙屈而處極高致豐大之功在乎剛健而體隂柔當豐大之任在乎得時而不當位如上一無上字六者處無一當其凶可知豐其屋處太高也蔀其家居不明也以隂柔居豐大而在無位之地乃高亢昏暗自絶於人人誰與之故窺其户閴其無人也至於三嵗之久而不知變其凶宜矣不覿謂尚不見人蓋不變也六居卦終有變之義而不能遷是其才不能也六處豐大之極在上而自高若飛翔於天際謂其高大之甚窺其户而無人者雖居豐大之極而實無位之地人以其昏暗自髙大故皆棄絶之自藏避而弗與親也並易傳橫渠先生曰豐屋蔀家自蔽之甚猶大明之世而夷墨其行窮大而失居者也處上之極不交於下而居動之末故曰天際翔也易説白雲郭氏曰屋之覆障非特蔀沛而已而豐其屋蔀其家又為自厚於一身一家之事者也於豐之道豈不小哉然天下之理有謙盈之異效雖欲自厚其如天地鬼神何故豐屋蔀家者固非有期於窺其户閴其無人而其為應必至是而後已也久而無所見其凶甚矣見斗見沫猶有見焉上六既極故不覿而凶也天際翔者天際之髙不可極也髙不可極猶欲至而翔焉是不知豐大之無以加遂窮無厭之欲者也故為豐其屋之象自藏者其無人也非由人致之實自致之耳序卦曰窮大者必失其居其是之謂與班固言許史三王丁傅之家皆重侯纍將窮貴極富見其位矣未見其人也豈閴其無人之謂乎易説漢上朱氏曰自二至上體大壯棟宇之象上六動隂變陽為大豐其屋言自處髙大也二為家震巽為草豐盛周匝以掩蔽之蔀其家言所居不明也自處髙大所居不明以髙亢自絶於人如飛鳥務上翔於天際豈復能降哉上動成離離為飛鳥乾為天在外卦之際天際也豐之時九四忘其敵已下資初九三與上六正應也其能忘乎故三自下往庶幾發其昏暗知處豐之道九三離目為見往窺之坤户闔而不應閴寂乎其無人聲太玄所謂外大抗中無人也三於是退而自藏於坎中乾為嵗三自四歷三爻三嵗不覿也豐其屋蔀其家自絶於人也三嵗不覿人絶之也上六動不正凶也不直曰凶者有應焉猶冀乎下交也至於三嵗不覿人亦厭之而凶至矣窺小見也覿私見也自上六言之謂之窺隂為小也自九三之上言之謂之覿私見也私不正也易傳又曰蘇氏曰六五上六處上而暗者也初九六二九三九四處下而明者也案豐本泰卦二之四成豐所謂九四即乾之九二往而成離者也故皆有明象五六本坤隂故皆有暗象又胡旦論豐上六曰乾極則亢泰極則隍豫極則冥萃極則洟履考祥而元吉賁白賁而無咎井勿幕而有孚艮敦艮而厚終人道之難可不念哉並叢説新安朱氏曰以隂柔居豐極處動終明極而反暗者也故為豐大其屋而反以自蔽之象無人不覿亦言障蔽之深其凶甚矣藏謂障蔽本義合訂刪補大易集義粹言卷五十九
