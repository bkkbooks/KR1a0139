body:
  text: 合訂刪補大易集義粹言卷二十五頭等侍衛納喇性德編震下離上伊川先生曰噬嗑序卦可觀而後有所合故受之以噬嗑嗑者合也既有可觀然後有來合之者也噬嗑所以次觀也噬齧也嗑合也口中有物間之齧而後合之也卦上下二剛爻而中柔外剛中虚人頤口之象也中虚之中又一剛爻為頤中有物之象口中有物則隔其上下不得嗑必齧之則得嗑故為噬嗑聖人以卦之象推之於天下之事在口則為有物隔而不得合在天下則為有强梗或讒邪間隔於其間故天下之事不得合也一无也字當用刑法小則懲誡大則誅戮以除去之然後天下之治得成矣凡天下至於一國一家至於萬事所以不和合者皆由有間也无間則合矣以至天地之生萬物之成皆合而後能遂凡未合者皆為間也若君臣父子親戚朋友之間有離貳怨隙者葢讒邪間於其間也除去之則和合矣故間隔者天下之大害也聖人觀噬嗑一作齧合之象推之於天下萬事皆使去其間隔而合之則无不和且治一作洽矣噬嗑者治天下之大用也去天下之間在任刑罰故卦取用刑為義在二體明照而威震乃用刑之象也易傳東萊吕氏曰噬嗑傳聖人觀齧合之象推之於天下萬事使皆去其間隔而合之顔子未達一間亦間也鑚仰之勤其噬嗑之用乎己丑課程噬嗑亨利用獄伊川先生曰噬嗑亨卦自有亨義也天下之事所以不得亨者以有間也噬而嗑之則亨通矣利用獄噬而嗑之之道宜用刑獄也天下之間非刑獄何以一作不可以去之不云利用刑而云利用一无利用字獄者卦有明照之象利於察獄也獄者所以究察情偽得其情則知為間之道然後可以設防與致刑也易傳横渠先生曰子路禮樂文章未足盡為政之道以其重然諾言為衆信故片言可以折獄如易所謂利用獄利用刑人皆非卦爻盛德適能是而已焉正蒙白雲郭氏曰噬嗑之名有二義合而言之則噬而後合嗑而後亨事之序也别而言之則方噬者未合既嗑者不噬噬為始也嗑為終也終始之義分焉文王之辭兼始終故言亨謂嗑之終也言利用獄謂噬之始也噬之始立卦之義也嗑之終卦成之義也周公論立卦之始故爻辭言噬而不言嗑非无嗑義也舉一以明之耳孔子於彖從文王葢釋文王之辭也於象從周公葢釋周公之辭也於繫辭極其終葢明文王周公之所未言也故言日中為市致天下之民聚天下之貨又曰嗑者合也物不可以苟合而已皆以嗑為義而不及噬也如是則知方立卦之始主於噬而卦成之後主於嗑矣主於噬故利用獄嗑亨之時非利用矣是以聖人於道徳仁義无時不用刑獄雖設而其用有時者葢本噬嗑之義故也唐虞之民不犯成康刑措不用方是時則不以用獄為利也故知利用特在於有間之時易之為辭其㫖逺哉然頤中有物事之至小者也而名卦之義有取於此者葢易之道觸類而長之雖大而天下莫能載小而物莫能破者其道皆一也又況頤中至小猶須震之動離之明而後可斷矧有大於此者乎是以聖人欽慎之而不忽也易説新安朱氏曰噬齧也嗑合也物有間者齧而合之也為卦上下兩陽而中虚頤口之象九四一陽間於其中必噬之而後合故為噬嗑其占當得亨通者有間故不通齧之而合則亨通矣又三隂三陽剛柔中半下動上明下雷上電本自益卦六四之柔上行以至於五而得其中是以隂居陽雖不當位而利用獄葢治獄之道惟威與明而得其中之為貴故筮得之者有其德則應其占也本義東萊吕氏曰利用獄須是去其間所以言獄者又須是推究病源所在不曰用刑而曰用獄者葢獄者察其情也當察其何處間隔然後治之譬如人固是被私意間隔處各不同苟不察見間隔所在則枉用力噬嗑縁有物間隔故須用明與威治之然後无間不特治天下如此且如人身本與天地无間只為私意間之故與天地相逺苟見善明用心剛去私意之間則自與天地相近易説又曰噬嗑而亨不噬嗑而欲自亨者世之所謂无礙者也己丑課程彖曰頤中有物曰噬嗑噬嗑而亨剛柔分動而明雷電合而章柔得中而上行雖不當位利用獄也伊川先生曰頤中有物故為噬嗑有物間於頤中則為害噬而嗑之則其害亡乃亨通也故云噬嗑而亨剛柔分以卦才言也剛爻與柔相間剛柔分而不相雜為明辨之象明辨察獄之本也動而明下震上離其動而明也雷電合而章雷震而電耀相須並見合而章也照與威並行用獄之道也能照則无所隠情有威則莫敢不畏上既以二象言其動而明故復言威照並用之意六五以柔居中為用柔得中之義上行謂居尊位雖不當位謂以柔居五為不當而利於用獄者治獄之道全剛則傷於嚴暴過柔則失於寛縱五為用獄之主以柔處剛而得中得用獄之宜也以柔居剛為利用獄以剛居柔為利否曰剛柔質也居用也用柔非治獄之宜也並易傳電者隂陽相軋雷者隂陽相擊也軋者如石相磨而火光出者電便有雷擊者是也吕與叔録横渠先生曰九五分而下初六分而上故曰剛柔分合而章合而成文也六自初而進之於五故曰上行並易説龜山楊氏曰上麗而下動一剛間之頤中有物之象也噬而嗑則間去矣故噬嗑而亨也夫噬嗑者除間之卦也除間以刑為用故利用獄獄者所以治間而求其情也治而得其情則刑之而天下服矣故不言利用刑而曰利用獄也夫剛柔分以爻言也動而明雷電合而章以二體言也繫辭曰爻有等故曰物物相雜故曰文剛柔分而不相雜非文也用文非所以治獄故也動而明雷電合而章則威明並著而无留獄矣此治獄之道也六五柔得中而上行用獄之主也人君阻法度之威而濟之以剛果則片言折之可也然刑者侀也一成而不可變則人君所宜恤也故古之治獄者史以獄成告於正正聽之正以獄成告於大司寇司寇聽之棘木之下大司寇以獄之成告於王王命三公參聽之三公以獄成告於王王三宥之而後制刑此以柔用刑不以剛決之意也人君以剛健為德五君位也而柔居之不當位也故所利惟用獄而已易説兼山郭氏曰噬嗑自否出者也否乾上而坤下乾剛而坤柔初六一變而為六五離柔也九五一變而為初九震剛也昔之剛者今則分而下為柔昔之柔者今則分而上為剛故曰剛柔分剛在下而動柔在上而明動而明初未章也合而後章而六五居上无剛健之材利獄除間而已老子曰天地之道虚而不屈動而愈出此間之不可不除而利獄以除間者人事也易説白雲郭氏曰先人曰噬嗑自否來否乾剛而坤柔初六升而為離柔也九五降而為震剛也雍曰剛柔之分葢以乾之三剛分一以成震坤之三柔分一以成離也否泰二體乾坤之純故噬嗑與賁皆稱分焉噬嗑之彖葢具三義自已成一體論之合六爻而言有頤中有物之象自乾坤之變論之則有剛柔分之義自震離二體而言故曰動而明雷動也電明也雷與電合則天威於是乎章動而且明則聖人之威於是乎立此聖人法天之道而用獄也柔得中六五也上行則法天動而必明之意也故雖无剛健之才以當其位亦可為噬嗑之主而用獄矣由是知聖人用獄无私情一本天道而已然則漢唐之興卒无三代之治者不明法天故也其惡之大尤見於用獄之際不知雷電之必合以盡動而明之義復蹈秦皇慘毒之政其傳祀數百年亦已幸矣是以游聖門者羞稱之易説漢上朱氏曰離震合而成體為頤中有物之象九四之剛頤中之物嗑合也噬而合之剛決而上下亨矣推之人事上下之際有間之者强梗讒邪奸宄弗率噬而合合而亨易傳曰君臣父子親戚朋友之間有離貳怨隙者葢讒邪間於其間也除去之則合矣間隔者天下之大害也故曰頤中有物曰噬嗑噬嗑而亨此合兩體言噬嗑與亨之義也夫互體之變難知也聖人於噬嗑彖明言之其所不言者觀象玩辭可以類推固者為之彼將曰艮震頤也責離而求艮離豈艮哉故曰知者觀其彖辭則思過半矣噬嗑自否來否之時剛柔不分天地閉塞九五之剛分而之初剛下柔也初六之柔分而之五柔上行也剛柔分則上下交矣動而明則否塞通矣以隂陽言之震陽也離隂也雷動電明剛柔相文合一而成章則天地亨矣故曰剛柔分動而明雷電合而章此以初五相易合兩體以言噬嗑之才也噬嗑除間之卦不止於用獄言利用獄者専以六五言噬嗑之用坎為律為棘獄象也六五之柔得中而上行下據九四之坎用獄也所謂上行者以柔道行之於上也五君位唯剛健中正足以當之六五柔中不當位也雖不當位而施之於用獄則无若柔中之為利矣或曰柔中足以用獄乎曰人君者止於仁不以明斷稱也古之用獄者史以獄成告於正而正聽之正以獄成告於大司寇大司寇聽之棘木之下大司寇以獄之成告於王王命三公參聽之三公以獄之成告於王王三宥之然後制刑宥之者柔也三宥之然後制刑者剛中也制刑者有司之事不得已而聽而制刑者人君之德德歸於上有司不失其職於下是以其民畏而愛之愛之斯戴之矣故曰人君之用獄无若柔中之為利也臯陶之美舜曰與其殺不辜寧失不經好生之德洽于民心夫殺不辜則民將以虐我者為讎好生之德洽于民心則天下樂推而不厭曽子曰上失其道民散久矣如得其情則哀矜而勿喜士師有司也曽子告之如此況人君乎觀臯陶曽子之言則在於寧失也在於哀矜也不在乎明斷審矣自易失其傳參之以申韓之學人君用明斷決獄訟躬行有司之事其弊至於刻薄少恩民心日離思與之偕亡讀易不察之過也故不可不與之辨焉卦氣秋分也故大𤣥準之以䦯易傳新安朱氏曰噬嗑以卦體釋卦名義又以卦名卦體卦德二象卦變釋卦辭本義彖辭中剛柔分以下都掉了頤中有物只説利用獄爻亦各自取義不説噬頤中之物問易中言剛柔分者二一是噬嗑一是節此三字何義先生曰據某所見只是一卦三隂三陽謂之剛柔分曰易中三隂三陽卦多獨於此言何也先生曰偶於此言之其他卦别有義並語録象曰雷電噬嗑先王以明罰敕法伊川先生曰象无倒置者疑此文互也雷電相須並見之物亦有嗑象電明而雷威先王觀雷電之象法其明與威以明其刑罰飭其法令法者明事理而為之防者也易傳藍田吕氏曰噬嗑有所決而後合也噬嗑亨合乃亨也利用獄獄必決而後合也剛柔分動而明雷電合而章皆明斷之義柔得中而上行有恕心存焉龜山楊氏曰先王觀雷電威明之象而致慎焉故明罰敕法明則不濫敕則不苛易説兼山郭氏曰春秋書震夷伯之廟左氏曰展氏有隠慝焉書之金縢曰今天動威以彰周公之德故知雷電之威无隠而弗及也易之取象噬嗑與豐无以異此噬嗑者先動而後明初未明也故不敢折獄致刑豐則先明而後動初已明也故不待明罰勅法而後用也天之動威其行如此則先王之用刑其有不慎者乎故書曰欽哉欽哉惟刑之恤哉於此可見矣然則噬嗑與豐施設之序何異也曰猶之天也將先春而後秋乎將先秋而後春乎故折獄致刑葢有不得已而然矣易説白雲郭氏曰先人曰噬嗑先動而後明初未明也故不敢折獄致刑豐則先明而後動初已明也故不待明罰敕法而後用也雍曰二卦先後之象盡於此矣然噬嗑方動以期於明必先明其罰敕其法以示天下使天下知所避然後犯於有司者可以麗其罪若周官大司寇縣刑象之法于象魏小司寇令以木鐸曰不用法者國有常刑令羣士乃宣布于四方憲刑禁至於士師又憲禁令于國及郊野此之謂明罰敕法也豐則已明而動是已布刑也已令憲也動則麗之刑矣若大司寇邦典定之邦法斷之邦成弊之小司寇以五刑聽萬民之獄訟附于刑用情訊之至于甸乃弊之士師察獄訟之辭以詔司寇斷獄弊訟致邦令此之謂折獄致刑也是皆聖人之政見於有迹者也若其至仁内充推恩四海葢不可得而見焉特於聖人之言得其大槩而已觀舜戒羣后曰欽哉欽哉惟刑之恤哉其戒臯陶曰惟明克允又曰明于五刑以弼五教又曰刑期于無刑而臯陶稱舜亦曰好生之德洽于民心兹用不犯于有司知此則盡噬嗑之用獄矣然舜之命臯陶必先曰蠻夷猾夏寇賊姦宄然後曰汝作士葢蠻夷猾夏寇賊姦宄利用獄之時也由是知非噬嗑之時聖人未嘗以用獄為利也易説漢上朱氏曰勅當作敕明其罰之輕重使人曉然易避效電之明也正其法令以警懈墯效雷之動也九四坎為律法也三不正敕法也上三爻不正明罰也先王將明罰必先敕法非謂法其威怒以致刑此卦至爻變始有用刑之象易傳新安朱氏曰雷電當作電雷本義問諸卦象皆順説獨雷電噬嗑倒説何邪曰先儒皆以為倒寫二字二字相似疑是如此問雷電噬嗑與雷電豐似一般先生曰噬嗑明在上動在下是明得事理先立這法在此未有犯底人留待異時之用故云明罰敕法豐威在上明在下是用這法時須是明見下情曲折方得不然威動於上必有過錯也故云折獄致刑此是伊川之意其説極好並語録又作盡心堂記曰予惟王制之篇雖傳以為漢博士官所出然其所謂刑一成而不可變故君子盡心焉者語約而意周教明而戒密意其或者古之遺言也與今伯崇既躬行之而又以名其堂欲其出入起居仰而見之常有以自警也以為未足又取夫大易電雷之象明斷之義與夫剛柔上下淺深難易之説金矢黄金艱貞厲之戒揭於坐右而以蚤夜覽觀焉此其志豈以一得其情而遽喜者哉文集初九屨校滅趾无咎象曰屨校滅趾不行也伊川先生曰九居初最在下无位者也下民之象為受刑之人當用刑之始罪小而刑輕校木械也其過小故屨之於足以滅傷其趾人有小過校而滅其趾則當懲懼不敢進於惡矣故得无咎繫辭云小懲而大誡此小人之福也言懲之於小與初故一有後字得无咎也初與上无位為受刑之人餘四爻皆為用刑之人初居最下无位者也上處尊位之上過於尊位亦无位者也王弼以為无隂陽之位隂陽繫於竒偶豈容无也然諸卦一作爻初上不言當位不當位者一作不言位當不當者葢初終之義為大臨之初九則以位為正若需上六云不當位乾上九云无位爵位之位非隂陽之位也屨校而滅傷其趾則知懲誡而不敢長其惡故云不行也古人制刑有小罪則校其趾葢取禁止其行使不進於惡也並易傳横渠先生曰戒之在初小懲可止故无咎易説龜山楊氏曰先王之用刑期於无刑而已當用獄之初未至於惡積而罪大猶足以遷善也故屨校滅趾使不進於惡而已所以小懲而大誡也易説白雲郭氏曰伊川曰初最下上過尊位皆无位也无位受刑者也王弼謂无隂陽之位非也雍曰觀輔嗣傳文曰无位而已伊川謂无隂陽之位者以略例言初上无隂陽定位故也易之於爻以二三四五為人道之著初上雖為始終然既居六畫之内安得謂之无位若謂非有位用事之象則可也是以在噬嗑為受刑之人夫以聖人仁覆天下於小罪輕刑固宜赦宥而此初九屨校滅趾不以為過何哉葢小懲於早所以大誡於後使惡不進是為无刑之本此聖人之大仁也不然姑息不忍長惡孰甚焉校者械之通名在足之校屨之而没其趾大其校使之不能行也乃所以戒其惡之不行也易説漢上朱氏曰否下體艮為指在下體之下為趾巽變震為足為草木以草木連足指象没矣屨校滅趾也荀卿曰菲䋽屨䋽枲也尚書大傳曰唐虞之象刑上刑赭衣中刑雜屨雜屨即傳所謂藨蒯之屨要之中刑之屨或菲或枲或藨或蒯皆草為之疑古者制為菲屨赭衣當刑者服之以示媿恥非无肉刑也慎子謂以屨當刖誤矣周官掌囚下罪桎桎足械也械亦曰校大罪者小罪之積否初六不正其行不已故屨校以没其足使止而不行所懲者小所誡者大乃所以无咎震為行艮止之不行也无咎正也卦以初上為受刑二至五為用刑者用刑貴中也王弼謂初上无位非也六爻非竒則偶豈容无位易傳新安朱氏曰初上无位為受刑之象中四爻為用刑之象初在卦始罪薄過小又在卦下故為屨校滅趾之象止惡於初故得无咎占者小傷而无咎也滅趾又有不進於惡之象本義東萊吕氏曰初九受刑者也大抵為惡先從發足處制之則惡必不能長矣屨校滅趾禁之使不得行也既不入於惡必自進於善矣所以无咎也昔周公治商之頑民不急於他事乃切切在於禁其羣飲之患夫何故商民染紂之沈酣遂致頑而不淳周公察其所從來自其所以為惡之本原而制之豈後人區區制其末流之比哉易説六二噬膚滅鼻无咎象曰噬膚滅鼻乗剛也伊川先生曰二應五之位用刑者也四爻皆取噬為義二居中得正是用刑得其中正也用刑得其中正則罪惡者易服故取噬膚為象噬齧人之肌膚為易入也滅没也深入至没其鼻也二以中正之道其刑易服然乗初剛是用刑於剛强之人刑剛强之人必須深痛故至滅鼻而无咎也中正之道易以服人與嚴刑以待剛强義不相妨深至滅鼻者乗剛故也乗剛乃用刑於剛强之人不得不深嚴也深嚴則得宜乃所謂中也並易傳横渠先生曰六二居有過之地而已噬之乗剛而動為力不勞動未過中故无咎易説龜山楊氏曰六二以中正之德處用獄之時則刑當而罪得矣故有噬膚之象焉膚言噬之易也鼻者息之出入往來而不窮也九四為間者也而初應之二剛合則為間大而難噬矣故乗之絶其往來乃无咎易説兼山郭氏曰六二噬嗑柔得中而上行葢才不足而資物以為用者也柔順中正裕於矜恤之仁而略於剛斷之義然而噬膚之易有滅鼻之深葢乗剛之過也六二且以為戒況其他乎易説白雲郭氏曰二三四五皆言噬葢用刑除間之爻也膚柔脆之物易噬也夫六二柔順中正之德宜其用刑无過舉矣今噬膚之易而有滅鼻之深者葢六二以柔乗剛患在不及能勉於用剛焉乃能乗剛故此噬深亦无咎也古者刑亂國用重典豈非噬膚乗剛之義乎四爻必假膚腊胏肉見義者以噬嗑之名本取頤中之象故也易説漢上朱氏曰艮隂為膚柔而近革噬之為易六三是也何以知艮隂為膚剥六四曰剥牀以膚坤剥乾成艮也六三不當六二噬之中正而動剛乗剛而往所刑者當兊為口故曰噬膚艮為鼻二動兊見艮毁滅鼻也鼻在面中滅鼻則當息不息則勢不能久言雖不當而二之用刑亦不過中故无咎二動宜有咎也易傳新安朱氏曰祭有膚鼎葢肉之柔脆噬而易嗑者六二中正故其所治如噬膚之易然以柔乗剛故雖甚易亦不免於傷滅其鼻占者雖傷而終无咎也本義膚腹腴滅没也謂因噬膚而没其鼻於器中也語録東萊吕氏曰六二乗初剛是用刑於剛强之人刑剛强之人必須深痛故至滅鼻而无咎也二居中正之位用刑之峻如此得非過於中乎治剛强而用嚴刑正如病深者用藥猛方得適宜乃所謂中也居中得正用刑之君子也乗初九之强暴而用刑以制之故不得不下毒手也人皆謂刑平國用中典即謂君子之中道殊不知以深刻之刑制强暴之惡正聖人之中也觀孔子温和之氣象在朝廷便便言唯謹爾處鄉黨則恂恂似不能言一旦見原壤之箕倨則以杖叩其脛見冉求之聚斂則鳴鼓而攻之聖人以嚴御惡政所謂中也易説六三噬腊肉遇毒小吝无咎象曰遇毒位不當也伊川先生曰三居下之上用刑者也六居三處不當位自處不得其當而刑於人則人不服而怨懟悖犯之如噬齧乾腊堅韌之物而遇毒惡之味反傷於口也用刑而人不服反致怨傷是可鄙吝也然當噬嗑之時大要噬間而嗑之雖其身處位不當而强梗難服至於遇毒然用刑非為不當也故雖可吝而一无而字亦小噬而嗑之非有咎也六三一无三字以隂居陽處位不當自處不當故所刑者難服而反毒之也並易傳横渠先生曰所間在四四為剛陽故曰腊肉非禮傷義故曰遇毒能以為毒而舍之雖近不相得小有吝而无咎也易説龜山楊氏曰頤中有物謂九四也則噬嗑之為間惟九四而已故有腊肉之象焉腊肉物之全體也六三柔不當位而居動之極上當九四之剛故噬腊肉而遇毒也噬腊肉而遇毒故可吝然噬終必合故无咎易説白雲郭氏曰六二雖乗剛而能噬深者中正故也六三之柔又非中正其噬難矣而能擇乾物之小者噬之猶如治小獄決小罪可謂度德而量力者也然其德威終不足以服人適足以招怨懟而致悔吝以其刑既小是以止於小吝而无大咎也鄭氏周官注以小物全乾為腊馬氏以有骨謂之胏其義最得之毒害也猶人不勝其噬而疾作也易説漢上朱氏曰鳥獸全體乾之為腊噬之最難者也九四不正間於上下之際强梗者也艮為黔喙之屬離為雉日熯之腊肉之象六三位不當以柔噬剛刑人而不服必反傷之故遇毒毒坎險也何以知坎為毒師曰以此毒天下謂坎也小吝者六三位不當而柔也然无咎者動則正兊見坎毁强梗去矣兊口噬也荀爽曰噬腊謂四也易傳新安朱氏曰腊肉謂獸腊全體骨而為之者堅韌之物也隂柔不中正治人而人不服為噬腊遇毒之象占雖小吝然時當噬嗑於義為无咎也本義東萊吕氏曰六三以隂居陽處不當位自不正而欲正人難矣哉然而彼有罪惡之可誅則當誅之而不宥在我亦自无咎聖人言此真有深意存乎其間何者噬腊肉而遇毒當於此知正己之道雖吝而无咎小人有惡從而治之在我則實无罪聖人不長小人之惡之意也聖人之言譬如倉公扁鵲用一藥而治二病立一言而正彼己其意深矣易説九四噬乾胏得金矢利艱貞吉象曰利艱貞吉未光也伊川先生曰九四居近君之位當噬嗑之任者也四已過中是其間愈大而用刑愈深也故云噬乾胏胏肉之有聫一无聫字骨者乾肉而兼骨至堅難噬者也噬至堅而得金矢金取剛矢取直九四陽德剛直為得剛直之道雖用剛直之道利在克艱其事而貞固其守則吉也九一无九字四剛而明體陽而居柔剛明則傷於果故戒以知難居柔則守不固故戒以堅貞剛而不貞者有矣凡失剛者皆不貞也在噬嗑四最為善凡言未光其道未光大也戒於一作以利艱貞葢其所不足也不得中正故也並易傳横渠先生曰五為隂柔故喻乾胏能守正得剛直之義故艱貞吉其德光大則其貞非艱也易説龜山楊氏曰九四合一卦言之則為間者也以爻言之則居大臣之位任除間之責者也易之取象不同類如此夫處羣隂之中當除間之責其任難勝矣故有噬乾胏之象焉胏肉之有骨者堅而難噬也噬胏而得金矢以剛克遇之也葢剛過中故有金矢之象焉夫用獄之道君子所宜盡心也一之以剛直則獄有不得其情者故利艱貞吉孔子曰聽訟吾猶人也必也使無訟乎雖利艱貞未能使无訟也故曰未光也易説白雲郭氏曰先人曰胏肉之乾堅强難噬者也噬嗑皆以柔而四為頤中之間上下二隂三五之所同欲以噬者也故在訟則為難聽之訟在獄則為難折之獄而九四以剛明而聽之能得其情者也古者以兩造禁民訟以兩造聽之而无所偏受則不直者自反而民訟禁矣入束矢於朝不直則入其矢所以懲不直也以兩劑禁民獄而无偏信則不信者自反而民獄禁矣入鈞金三日乃致于朝不信則入其金所以懲不信也方九四之聽訟也既得其矢則不直者自反而服其非又得其金則不信者自反而服其罪則難折之獄既折而得其情矣尚且曰利艱貞吉則人之於獄訟其可易言之哉故曰刑者侀也侀者成也死者不可復生刑者不可復續言一成而不可變也故於聽之始也如此之審於其成也則又可知矣雍曰九四有至難之噬而得束矢鈞金猶曰利艱貞吉者曽子所謂如得其情則哀矜而勿喜葢聖人明慎欽恤之意也雖然刑期于无刑必也使无訟如是則得金矢亦安足以為聖人之光哉所謂聽訟猶人者也帝堯之光被四表文王之光于四方其道有大於此者矣故孔子之象以九四為未光也易説漢上朱氏曰附骨之肉謂之胏胏古文作􅳨横渠謂五也六五柔中有剛在二剛之中日熯之乾胏之象胏比腊為易比膚為難九四剛直不撓往則克之得金矢也乾變為金巽為木坎為矯為弓離為兵矯木施金加於弓上矢也金剛矢直噬之則剛直行矣四五易坎毁成頤噬乾胏得金矢也九四不正動而正唯恐其不正不正不足以噬故利艱貞乃吉不然則凶艱貞乃吉者以其道未光道光則安用艱貞哉或曰五君位四噬之可乎曰噬嗑爻辭取上下相噬明用刑難易而已不以君位言之卦五不以君位言者六卦訟也噬嗑也恒也遯也明夷也旅也訟不言君者人君不以聽訟為主故風美召伯頌言臯陶而已恒不言君者君道不可以柔為恒遯不言君者君不可遯也明夷不言君者失君之則也旅不言君者君不可以旅也春秋天王居于鄭書出諸侯去國書奔噬嗑決獄有司之事非人君之職若以五為君則二大夫三公四侯相噬何哉易不可一端盡也易傳新安朱氏曰胏肉之帶骨者與胾通周禮獄訟入鈞金束矢而後聽之九四以剛居柔得用刑之道故有此象言所噬愈堅而得聽訟之宜也然必利於艱難正固則吉戒占者宜如是也本義荆公已嘗引周禮鈞金之説問噬嗑得金矢不知古人獄訟要鈞金束矢之意如何先生曰這不見得想是詞訟時便令他納此教他无切要底事不敢妄來又問如此則不問曲直一例出此則實有寃枉者亦懼而不敢訢矣先生曰這箇須是大切要底事古人如平常事又别有所在如劑石之類問九四利艱貞六五貞厲皆有艱難正固危懼之意故皆為戒占者之辭先生曰亦是爻中元自有此道理大抵纔是治人彼必為敵不是易事故雖時位卦德得用刑之宜亦須以艱難正固處之至於六三噬腊肉遇毒則是所噬者堅韌難合六三以隂柔不中正而遇此所以遇毒而小吝然此亦是合當治者但難治耳治之雖小吝終无咎也並語録東萊吕氏曰九四此爻為間最大大凡噬乾胏乾肉皆去間之理也九四為間既大須用力深則所得亦大大抵人情當患難未平之時則克艱其事及患難既平之後則忘其艱貞故聖人特於此致戒後漢董卓為漢大間王允誅之至其終而不能艱貞漢遂復亂正此爻之所戒也易説六五噬乾肉得黄金貞厲无咎象曰貞厲无咎得當也伊川先生曰五在卦愈上而為噬乾肉反易於四之乾胏者五居尊位乗在上之勢以刑於下其勢易也在卦將極矣其為間甚大非易嗑也故為噬乾肉也得黄金黄中色金剛物五居中為得中道處剛而四輔以剛得黄金也五无應而四居大臣之位得其助也貞厲无咎六五雖處中剛然實柔體故戒以必貞固而懷危厲則得无咎也以柔居尊而當噬嗑一作堅之時豈可不貞固而懷危懼哉一作忘危懼也貞厲所以能无咎者以所為得其當也所謂當居中用剛而能守正慮危也並易傳龜山楊氏曰人君任天下之重而以柔居之欲除天下之間噬之亦難矣故有乾肉之象焉然據天下之利勢噬之雖難與噬乾胏則異矣居中而處剛得黄金也噬乾肉得黄金雖不當位而居中則不過處剛則不茹得當也其除間也能勝其任矣故於貞厲而无咎易説兼山郭氏曰六五聽獄之道兩造具備師聽五辭五辭簡孚正于五刑五刑不簡正于五罰五罰不服正于五過五過之疵惟官惟反惟内惟貨惟來然噬嗑之義有審克之斷无五過之疵可以明于刑之中率乂于民非彝者也故噬乾肉得黄金亦庶幾居中之得也尚且曰貞厲无咎何也曽子曰上失其道民散久矣如得其情則哀矜而勿喜孔子曰聽訟吾猶人也必也使无訟乎故六五之貞厲才得當而已質之虞芮質厥成其亦未優乎易説白雲郭氏曰先人曰噬嗑之義有審克之斷无五過之疵可以明于刑之中率乂于民棐彝者也故噬乾肉得黄金亦庶幾居中之得也又曰六五之貞厲才得當而已質之虞芮質厥成其亦未優乎雍曰乾肉之噬易於乾胏六五柔而用中有可噬之道故得黄金然猶貞厲者葢未能盡為君之道故也觀舜命臯陶作士而戒以无刑孔子與仲由折獄而自任以无訟葢君道无事於獄不必有乾肉之噬矣易説漢上朱氏曰噬上也上剛而居柔離日熯之乾肉之象乾肉比膚為難比胏為易五與上易成兊口故曰噬乾肉黄中色離中之坤也上乾變為金故曰得黄金言自五噬上噬之亦難噬之而服則於剛為得中矣九居五貞也故曰貞五未易上有强不能噬於正為厲於德為有咎噬上九而當雖厲終无咎也故曰厲无咎得當也得當者於五剛中為當也或曰用刑言噬何也曰此聖人之深意也夫示之德讓使人安於至足之分則不爭不爭則无訟今物至於噬而後合德下衰矣噬之當也猶愧乎无訟矧噬之有不當乎末流之禍怨亂並興反復相噬且萬物同體而使物至於噬自噬之道也故四之剛直上九之剛未免於噬夫子曰必也使无訟乎叔向曰三辟之興皆由叔世聖人之意不其深乎易傳新安朱氏曰噬乾肉難於膚而易於腊胏者也黄中色金亦謂鈞金六五柔順而中以居尊位用刑於人人无不服故有此象然必貞厲乃得无咎亦戒占者之辭也本義東萊吕氏曰剛在四則為直而已五得中則為剛中大抵剛直中正之道本自我有患不能去其為間者耳間既去則所得非自外來易説上九何校滅耳凶象曰何校滅耳聰不明也伊川先生曰上過乎尊位无位者也故為受刑者居卦之終是其間大噬之極也繫辭所謂惡積而不可揜罪大而不可解者也故何校而滅其耳凶可知矣何負也謂在頸也人之聾暗不悟積其罪惡以至於極古人制法罪之大者何之以校為其无所聞知積成其惡故以校而滅傷一无傷字其耳誡聰之不明也並易傳藍田吕氏曰頤中有物四之謂也三與五為四所間皆欲噬而合之故四爻皆言噬六二噬六三六三六五噬九四九四復噬六三六五凡噬遇柔則易膚與乾胏是也遇剛則難腊肉乾肉是也二下乗剛噬柔過分至於滅鼻然噬而求合不失乎中故无咎六三以隂居陽位既失當所以遇毒然物之所間不可不噬雖以失當小吝不進卒能噬之故无咎九四一卦之體已為之間上下二隂噬之雖易理苟不直不能无凶故鈞金束矢必得其直利於艱貞然後獲吉不足光也六五以隂處陽以柔噬剛雖正而厲也居中得直故得黄金以中噬不中雖厲而當故无咎也腊比乾肉禽獸全體有骨堅焉其噬也難五以上噬下故易三以下噬上故難龜山楊氏曰為間之極至於惡積而罪大以其聰不明也使之聞過而改寧至是夫易説白雲郭氏曰小人不積小善不去小惡終至於不可揜不可解之際故有何校滅耳之凶則其聰之不明可知也葢能明善惡安危之戒必无是凶矣然初六滅鼻上九滅耳或以滅為刑而疑之獨孔氏以為滅没也葢屨校何校則刑也屨校桎其足也桎大而没趾也何校械其首也械大而没耳也噬膚之易而深噬焉自没其鼻用力之過也此皆没之義也若以滅耳為刵滅鼻為劓滅趾為剕則上九復不為凶而初二又不為无咎也書註劓刵輕刑也考之吕刑剕辟為重故漢重斬趾同於棄市方初九小懲固不當斷趾上九罪大復不當輕刑以是知三者言滅皆非刑也初二无咎上九則凶葢戒之於蚤故終為无咎上九已極雖戒亦晚矣然則械其首者安知終不麗于大辟乎故為重刑也易説漢上朱氏曰四坎為耳上九之三巽為木巽見坎毁何校滅耳也上九有耳不明乎善罪大惡積陷於凶而不知宜曰耳不聰而曰聰不明何也坎水離火日月之光火外景也於目為視水内景也於耳為聽視聽之用无非明也氣交則通精併則専瞶者専視併耳之用於目也瞽者専聽併目之用於耳也上之三離目毁无見善之明又不能専聽是聰復不明何校滅耳責其有耳之形无耳之用也易傳新安朱氏曰何負也過極之陽在卦之上惡極罪大凶之道也故其象占如此滅耳葢罪其聽之不聰也若能審聽而蚤圖之則无此凶矣本義東萊吕氏曰上九為惡之大一至於此為桀紂為盜跖皆以不能聽人之言也易説合訂刪補大易集義粹言卷二十五
