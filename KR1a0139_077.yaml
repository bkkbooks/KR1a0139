body:
  text: 合訂刪補大易集義粹言卷七十五頭等侍衛納喇性德編子曰夫易何為者也夫易開物成務冒天下之道如斯而已者也明道先生曰開物成務有濟時之才遊定夫所録橫渠先生曰開物成務物凡物也務事也開明之也成處之也事無大小不能明何由能處雖至粗至小之事亦莫非開物成務譬如不深耕易耨則稼穡烏得而立唯深也故能通天下之志唯幾也故能成天下之務是則開物成務者必也有濟時之才易説廣漢張氏曰此堯帝之命羲和厯象日月星辰推此以敬授人時者也武王之訪箕子以陳洪範以立九疇演此以相協民居者也萬物所聽者命命此而已萬物所由者道道此而已而易果何為哉未嘗贅虧於其間也未嘗損益於其間也易之開物則因其數之自生者從而與之開也如出乎震相見乎離説言乎兑勞乎坎俾之流通而無所壅遏者歟易之成務則因其數之自成者從而與之成也如制禮於履作樂于豫明政于賁設教於臨俾之就緒而無所墜廢者歟夫開物則物咸得其性成務則物咸有成功凡道之在範圍之中者莫不冒之而無所遺此易所以用數而不役於數者歟易説白雲郭氏曰易之道難窮不可以一言盡故此章又明其開物成務冒天下之道也以言乎天地之間則易無不備故能冒天下之道蓋言天下之道無不具于其中也易説漢上朱氏曰萬物在天地間不離乎五十有五之數聖人雖不言其能逃乎然則易之為書何為者也物有理易則開之事有時易則成之聖人冒天下之道所謂易者如斯而已者也冒天下之道者日月所照霜露所墜舟車所至凡有血氣者必待此道而後覆冒易傳新安朱氏曰開物成務謂使人卜筮以知吉凶而成事業冒天下之道謂卦爻既設而天下之道皆在其中本義問易開物成務冒天下之道是易之理能恁地而人以之卜筮又能開物成務否曰然讀繫辭須見得如何是開物如何是成務又如何是冒天下之道須要就卦中一一見得許多道理然後可讀繫辭也蓋易之為書大抵皆因卜筮以設教逐爻開示吉凶包括無遺如將天下許多道理包藏在其中故曰冒天下之道如利用為大作一爻象只曰下不厚事也自此推之則凡居下者不當厚事如子之於父臣之于君僚屬之于官長皆不可以踰分越職縱可為亦須是盡善方能無過所以有元吉無咎之戒繫辭自大衍數以下皆是説卜筮事若不曉他盡是説爻變中道理則如所謂變動不居周流六虛之類有何憑著今人説易所以不將卜筮為主者只是嫌怕小却這道理故憑虛失實茫昧臆度而已殊不知由卜筮而推則上通鬼神下通事物精及于無形粗及于有象如包罩在此隨取隨得居則觀其象而玩其辭動則觀其變而玩其占者又不待卜而後見只是體察便自見吉凶之理聖人作易無不示戒乾卦才説元亨便説利貞坤卦才説元亨便説利牝馬之貞大畜乾陽在下為艮所畜三得上應又畜極必通故曰良馬逐可謂通快矣然必艱難貞正又且曰間輿衛然後利有攸往設若恃良馬之壯而忘艱貞之戒則必不利矣乾之九三君子終日乾乾固是好事然必曰夕惕若厲然後無咎也凡讀易而能句句體驗每存兢栗戒謹之意則于己為有益不然亦空言爾並語録是故聖人以通天下之志以定天下之業以斷天下之疑橫渠先生曰能通天下之志者為能感人心易説廣漢張氏曰惟天地之數能開物也故聖人用之其深足以通天下之志惟天地之數能成務也故聖人用之其幾足以定天下之業惟天地之數能冒天下之道也故聖人用之其神足以斷天下之疑易説白雲郭氏曰孔子言易道于上必繼以聖人用易於下以見聖人無適而非易也此章先言開物成務冒天下之道繼之以通天下之志本乎易之開物也以定天下之業本乎易之成務也以斷天下之疑本乎易之冒天下之道也故聖人有為有行未當不本于易易説漢上朱氏曰關子明曰象生有定數吉凶有前期變而能通則治亂有可易之理天命人事其同歸乎故聖人以此通天下之志謂其極深也以此定天下之業謂其成務也以此斷天下之疑謂其受命如響也天下之業定則務既成矣易傳新安朱氏曰是故聖人以通天下之志以定天下之業以斷天下之疑此只是説蓍龜若不是蓍龜如何通之定之斷之語録又曰自夫易何為者也至以斷天下之疑此言易之書其用如此文集是故蓍之德圎而神卦之德方以知六爻之義易以貢康節先生曰蓍德圎以況天之數故七七四十九也五十者存一而言之也卦德方以況地之數故八八六十四也六十者去四而言之也蓍者用數也卦者體數也用以體為基故存一也體以用為本故去四也圎者本一方者本四故蓍存一而卦去四也圎數有一方數有二竒耦之義也六即一也十二即二也天圎而地方圎之數起一而積六方之數起一而積八變之則起四而積十二也六者常以六變八者常以八變而十二者亦以八變自然之道也八者天地之體也六者天之用也十二者地之用也天變方為圎而常存其一地分一為四而常執其方天變其體而不變其用也地變其用而不變其體也六者并其一而為七十二者并其四而為十六也陽主進故天并其一而為七隂主退故地去其四而止于十二也是陽常存一而隂常晦一也故天地之體止於八而天之用極于七地之用止於十二也圎者刓方以為用故一變四四去其一則三也三變九九去其三則六也方者引圎以為體故一變三并之四也四變十二并之十六也故用數成於三而極於六體數成於四而極於十六也是以圎者徑一而圍三起一而積六方者分一而為四分四而為十六皆自然之道也圎者一變則生六去一則五也二變則生十二去二則十也三變則生十八去三則十五也四變則二十四去四則二十也五變則三十去五則二十五也六變則三十六去六則三十也是以存之則六六去之則五五也五則四而存一也四則三而存一也三則二而存一也二則一而存一也故一生二去一則一也二生三去一則二也三生四去一則三也四生五去一則四也是故二以一為本三以二為本四以三為本五以四為本六以五為本也方者一變而為四四生八并四而為十二八生十二并八而為二十十二生十六并十二而為二十八十六生二十并十六而為三十六也一生三并而為四也十二生二十并而為三十二也二十八生三十六并而為六十四也圎者六變六六而進之故六十變而三百六十矣方者八變故八八而成六十四矣陽主進是以進之為六十也圎者星也厯紀之數其肇于此乎方者土也畫州井地之法其倣於此乎蓋圎者河圗之數方者洛書之文故羲文因之而造易禹箕敘之而作範也並觀物外篇橫渠先生曰圎神故能通天下之志方知故能定天下之業爻貢所以斷天下之疑易書成三者備民患明聖人得以洗濯其心而退藏于密矣易説廣漢張氏曰甚哉天地之數所以成變化行鬼神大而日月寒暑微而草木昆蟲未有不冒於此者聖人之意以謂青黃黼黻吾固見之也謂天下皆離婁可乎金石絲竹吾固聞之也謂天下皆師曠可乎將欲家至户曉而形之於言則言有不可傳者將欲雄編大䇿而載之於書則書有不可盡者於是生蓍立卦而著其六爻之義者是乃示天下後世以天地之數者也故蓍之四十九其分其挂其揲以四歸竒於扐運量無窮者此圎而神也卦之六十四或竒或偶有小大之異别隂陽之殊致吉凶已定者此方以知也至於六爻或征而吉則以動而有功者貢於人也或征而凶則以動而有咎者貢於人也其得失存亡憂虞悔吝雜然貢于人而均獲其利者此六爻之義交易而貢於人也易説白雲郭氏曰蓍卦六爻各言其德固非易道之大全聖人用之亦所以通志定業斷天下之疑也圎而神故能通志方以知故能定業易以貢故能斷疑聖人之於易也取而用之左右逄其原矣貢猶告也易説新安朱氏曰圎神謂變化無方方知謂事有定理易以貢謂變易以告人本義蓍之德圎而神以下却是從源頭説而未是説卜筮蓍與卦以德言爻以義言只是具這道理在此而已故聖人以此洗心退藏於密六爻之義易以貢今解貢字只得以告人説但神知字重貢字輕却曉不得並語録蓍以七為數是未成卦時所用未有定體故其德圎而神所以知來卦以八為數是因蓍之變而成已有定體故其德方以知所以藏往卦惟三易有之皆筮法也若灼龜而卜則謂之兆見於周禮可考也答何京叔書聖人以此洗心退藏於密吉凶與民同患神以知來知以藏往其孰能與於此哉古之聰明睿智神武而不殺者夫伊川先生曰安有識得易後不知退藏於密密是用之源聖人之妙處河南語録離了隂陽便無道所以隂陽者是道也隂陽氣也氣是形而下者道是形而上者則是密也退藏於密密是甚知不專為藏往易言知來藏往主蓍卦而言並入關語録橫渠先生曰吉凶可以正勝非聖人之患也開物於幾先故曰知來明憂患而弭其故故曰藏往示人吉凶其道顯矣知來藏往其德行神矣語蓍龜之用也神武不殺神知之大者使知懼而不犯神武者也並易説龜山楊氏曰六經不言無心惟佛氏言之亦不言修性惟揚雄言之心不可無性不假修故易止言洗心盡性記言正心尊德性孟子言存心養性荆州語録廣漢張氏曰夫蓍之四十九乃衍天地之數也卦之六十四乃備天地之數也爻之三百八十四乃通天地之數也聖人以此而示天下之人其心休焉一疵不染滌除澡雪無遑遽之勞無怵迫之患退藏於密恬淡無為是乃善與人同患者也非以蓍卦六爻濟斯民之患而洗心退藏者乎大抵厥初生民不知多寡也聖人為斗量以畀之則不必為之較籥合而民咸知其多寡矣民不知輕重也聖人為權衡以畀之則不必為之較錙銖而民咸知其輕重矣夫民之于吉凶其甚於多寡輕重也聖人為之蓍為之卦為之六爻以濟民行使天下之人咸知其是非利害得失臧否吾又何必營為以憂其故耶以此洗心退藏於密是乃吉凶與民同患者乎説者云屏思慮而安其厥躬者聖人同患於民而不汩其身也察安危以存其古訓者天下知其吉凶而均獲其利也如此天下之民皆即蓍之神以知其來可以探賾而索隱可以鈎深而致逺見不見之形抽不抽之緒三揲而一爻具十八變而一卦成衍忒以是而決臧否由是而著此神以知來蓍可以窮天地之數也即卦之知以藏其往可以鑒古昔之興衰可以察前日之得失堯舜致衣裳之治湯武成炳蔚之文考明夷而知箕子觀既濟而知髙宗囊括大始包裹太極此知以藏往卦可以該天地之數也能盡此以推之天下與來世乃古之聰明睿智神武而不殺者夫今夫伏羲之始作八卦神農之制耒耜黃帝之迎日推䇿堯之厯象日月星辰舜之在璿璣玉衡以齊七政夏禹之連山成湯之歸藏文王之重卦武王之洪範孔子之十翼皆覺之於心悟之于性其聰所以聞天下之不聞其明所以見天下之不見其睿則默識心通不待教而能者乎其知則神解意悟不待學而知者乎夫聰明睿知則智周乎萬物必思道濟天下此神武而不殺俾民知懼無有師保如臨父母甲兵不施刑措不用而人為君子之歸者此聖人濟民行者乎易説白雲郭氏曰以此洗心者以易洗心也聖人之用易也隨用隨取隨取隨足故能無思無慮以滌其心蓋其酬酢應變在易不在心則心無留事亦無應變之方非洗心而何故其修身齊家治國治天下之道莫不一本於易微而至於耒耜舟楫􅍫杵弧矢之用亦必取諸益取諸渙取諸小過取諸睽聖人皆無容心焉是所以能洗心而退藏於密也彼愚而好自用者雖竭精神逞智力而天下之志未必能通天下之業未必能定天下之疑未必能斷又安知聖人通天下之志者用易開物之道也定天下之業者用易成務之道也斷天下之疑者用易冒天下之道也天下之事不過於志業疑三者而已聖人用易亦不過三者之道也所謂洗心用易者如此雖聖人吉凶之患不得不與民同然無心受之亦無妄之道也夫何患焉若是者非神之妙足以知方來非知之崇足以藏已往又安能與於洗心之道哉古之聰明睿智之君神武不殺而天下治者蓋得洗心退藏之道也是知心之為物用之則塵滓不用則清明衆人不知不用之術而聖人獨明不用之道故聖人洗心在此而衆人莫之知也易説漢上朱氏曰聖人於天地五十有五之數蓋有超然獨得而遺乎數者是故蓍運無窮可以前知其德圎而神也聖人以此洗心酬酢萬變一毫不留於胸中卦成不易爻見而䇿藏其德方以知也聖人以此退藏遁于無形深不可測六爻之義唯變是適上下內外相易以告吉凶聖人以此吉凶與民同患夫洗心退藏若絶倫離類則過矣是以吉凶與民同患開物於幾先故曰知來所謂可以前知也明憂患而弭其故故曰藏往所謂爻見而䇿藏也惟吉凶與民同患是以有開物成務冒天下之道此所謂不與聖人同憂者也若舍是道唯數而已則易於天地為贅矣上言蓍神卦知爻義而總之以神知者言卦則爻在其中孰能與於此者哉古者聰明不蔽於耳目睿知不蔽於思慮有武而不殺者夫有武不殺萬物自服故謂之神武易傳又曰關子明曰接物者言接之而已非同之也故濯物心無所瀆汙謂之洗心言洗濯其接物之心無所瀆汙故謂之洗心而注者誤以為洗濯萬物之心叢説新安朱氏曰聖人體具三者之德而無一塵之纍無事則其心寂然人莫能窺有事則神知之用隨感而應所謂無卜筮而知吉凶也神武不殺得其理而不假其物之謂本義聖人以此洗心退藏於密是以那易來洗濯自家心了更沒些私意小智在裏許聖人便似那易了不假蓍龜而知卜筮所以説神武而不殺這是他有那神以知來知以藏往下又説箇齋戒以神明其德皆是得其理不假其物前面一截説易之理未是説到蓍卦卜筮處後面方説卜筮聖人之心渾只是圎神方知易貢三箇物事更無别物一似洗得來淨潔了前面此字指易之理言武是殺底物事神武却不殺便如易是卜筮底物事這箇却只是説他理未到那用處到下面是以明於天之道方是説卜筮以此洗心者心中渾然此理別無他物退藏於密只是未見於用所謂寂然不動也下文説神以知來便是以蓍之德知來知以藏往便是以卦之德藏往洗心退藏言體知來藏往言周然亦只言體用具矣而未及使出來處到下文是興神物以前民用方發揮許多道理以盡見於用也然前段必結之以聰明睿知神武而不殺者只是譬喻蓍龜雖未用而神靈之理具在猶武是殺人底事聖人却存此神武而不殺也以此洗心注云洗萬物之心若聖人之意果如此何不直言以此洗萬物之心乎大抵觀聖賢之言只作自已作文看如本説洗萬物之心却止云洗心於心安乎退藏於密時固是不用這物事吉凶與民同患也不用這物事用神而不用蓍用知而不用卦全不犯手退藏於密是不用事時到他用事也不犯手事未到時先安排在這裏了事到時恁地來恁地應退藏於密密是主靜處萬化出焉者動中之靜固是靜又有大靜萬化森然者神以知來知以藏往一卦之中凡爻卦所載聖人所已言皆具已見底道理便是藏往占得此卦因此道理以推未來之事便是知來聖人此心虛明自然具衆理潔淨精微只是不犯手卦爻許多不是安排對副與人看是甚人來自然撞著易如此聖人也如此所以説箇蓍之德卦之德神明其德聖人胸中都無纎毫私意都不假卜筮只是以易之理洗心其未感物也湛然純一都無一毫之纍更無些迹所謂退藏於密也及其吉凶與民同患却神以知來知以藏往是誰人會恁地非古人聰明睿知神武而不殺者不能如此神武不殺者聖人於天下自是所當者摧所向者伏然而他都不費手腳如揲蓍然當其未揲也都不知揲下來底是隂是陽是老是少便是知來底意思及其成卦了則事都絣定在上面了便是藏往下文所以云是以明於天之道察於民之故設為卜筮以為民之鄉導故只是事聖人於此又以卜筮而齋戒以神明其德並語録又曰此言聖人所以作易之本也蓍動卦靜而爻之變易無窮未畫之前此理已具於聖人之心矣然物之未感則寂然不動而無聯兆之可名及其出而應物則憂以天下而所謂圎神方智者各見於功用之實矣聰明睿智神武不殺言其體用之妙也心具衆理變化感通生生不窮故謂之易此其所以能開物成務而冒天下也圎神方知變易三者闕一則用不妙用不妙則心有所蔽而明不遍照洗心正謂其無蔽而光明耳非有所加益也寂然之中衆理畢具而無聯兆可名其密之謂歟必有怵惕惻隱之心此心之宰而情之動也如此立語何如聖人以此洗心此字指蓍卦之德六爻之義而言洗心言聖人玩此理而默契其妙也退藏于密但言未感物之時耳及其吉凶與民同患則所用者亦此理而已其所以知來者向之所謂圎而神者也其所以藏往者向之所謂方以知者也神武不殺言聖人之不假卜筮而知吉凶也是以明于天之道以下乃言教民卜筮之事而聖人亦未嘗不敬而信之以神明其德也此章文義只如此程先生説或是一時意到而言不暇考其文義今但玩味其意別看可也若牽合經旨則費力耳並答王子合書是以明於天之道而察於民之故是興神物以前民用聖人以此齋戒以神明其德夫明道先生曰聖人齋戒敬也以神明其德惡人齋戒亦敬也故可以事上帝朱公掞問學拾遺易要玩索齋戒以神明其德夫劉絢師訓橫渠先生曰言天之變遷禍福之道由民之逆順取舍之故故作易以先之民患除憂疑亡用利身安故可退藏於密窮神知化以崇髙其德也自此而下又歷言其德之出而異名也並易説廣漢張氏曰今夫變化之推遷隂陽之運量七宿軫轉六甲內馴無非天之道也禍福之倚伏利害之相摩進退存亡吉凶悔吝無非民之故也聖人知幽明之故知死生之説知鬼神之情狀所謂天之道固已明之也久矣吉事有祥象事知器占事知來所謂民之故固已察之也熟矣奈何知進而不知退知存而不知亡昧於消息盈虛者又烏能明于天之道邪安其危而利其災樂其所以亡暗於得失利害者又烏能察于民之故邪聖人憂之是興神物以前民用乃所以為天下後世設也蓍植物也足以揲天地之數龜動物也足以見天地之象故天能生之而不能興之惟聖人用其四十九而幽贊於神明者所以興其蓍也鑽之七十二而置之前者所以興其龜也天下之民其終不倦而樂於有為亹亹不忘而勇於行者以其有蓍龜以前之也聖人深居簡出利用安身齋以去其不一之思戒以防其不測之患神明其德有莫知其所以然者矣易説白雲郭氏曰聖人明天之道察民之故無或不通故興神物以前民用則無有逺近幽深遂知來物聖人初無與焉是以能齋戒其心休休然以神明其德也神物易也前言聖人用易而不自用其心故曰洗心此又追本而言聖人作易之時亦無容心焉因神物固有獨能興之而已故既興神物以前民用是乃所以齋戒神明其德夫齋戒所以洗心也洗心所以神明其德也易説漢上朱氏曰物之蒙蔽動違諸理不得已而用刑至於殺之豈得已哉聖人憂之是以明于天之道察於民之故明于天之道而不察於民之故知天而已非聖人也無非物也天地五十有五之數見於蓍龜故謂之神物是興神物前百姓之日用示之以吉凶之理使知違順取舍其效至於刑措不用兵革不試何殺之有然非聰明睿知豈能明察如此聖人以此齋潔戒慎恐懼於不聞不覩所謂誠也神明其德者配天地也故其民有肅心而不欺民至於不欺至矣易傳新安朱氏曰神物謂蓍龜湛然純一之謂齋肅然警惕之謂戒明天道故知神物之可興察民故故知其用之不可不有以開其先是以作為卜筮以教人而於此焉齋戒以考其占使其心神明不測如鬼神之能知來也本義明於天之道以下方説蓍龜乃是發用處是興神物以前民用聖人既具此理又將此理復就蓍龜上發明出來使民亦得前知而用之也聖人以此齋戒以神明其德德即聖人之德又即卜筮齋戒以神明之聖人自有此理亦用蓍龜之理以神明之聖人見得天道人事都是這道理蓍龜之靈都包得盡于是作為卜筮使人因卜筮知得道理都在這裏面問明于天之道而察于民之故天之道便是民之故否曰論得到極處固只是一箇道理看時須做兩處看方看得周匝無虧欠處問天之道只是福善禍淫之類否曰如隂陽變化春何為而生秋何為而殺夏何為而暑冬何為而寒皆要理會得問民之故如君臣父子之類是否曰凡民生日用皆是若只理會得民之故却理會不得天之道便即民之故亦未是在到得極時固只是一理要之須是都看得周匝始得是興神物以前民用此言有以開民使民皆知前時民皆昏塞吉凶利害是非都不知因這箇開了便能如神明然此便是神明其德又云民用之則神明民德聖人用之則自神明其德蓍之德以下三句是未涉於用聖人以此洗心是得此三者之理而不假其物這箇是有那神以知來知以藏往明道愛舉聖人以此齋戒以神明其德夫一句雖不是本文意思要之意思自好幹因問此恐是君子篤恭而天下平之意曰否只如上蔡所謂敬是常惺惺法又問此恐非是聖人分上事曰便是説道不是本文意思要之自好並語録又曰洗心聖人觀象玩辭理與心會也齋戒聖人觀變玩占臨事而敬也答何京叔書洗心齋戒特觀象玩辭觀變玩占之大者但方其退藏而與民同患之用已具及其應變則又所以齋戒而神明其德此則非聖人不能與精義致用利用崇德亦頗相類此下所言闔闢往來乃易之道易有太極則承上文而言所以往來闔闢而無窮者以其有是理耳有是理則天地設位而易行乎其中矣兩而生四四而生八至於八則三變相因而三才可見故聖人因之畫為八卦以形變易之妙而定吉凶至此然後可以言畫耳前所謂易有太極者恐未可以畫言也答蔡季通書聖人以此齋戒以神明其德夫此言用易之事也齋戒敬也聖人無一時一事而不敬此特因卜筮而言尤見其精誠之至如孔子所慎齊戰疾之意也湛然純一之謂齋肅然警惕之謂戒玩此則知所以神明其德之意也文集是故闔户謂之坤闢户謂之乾一闔一闢謂之變往來不窮謂之通見乃謂之象形乃謂之器制而用之謂之法利用出入民咸用之謂之神明道先生曰闔闢便是易一闔一闢謂之變羅氏拾遺伊川先生曰凡物之散其氣遂盡無復歸本原之理天地間如洪爐雖生物銷鑠亦盡況既散之氣豈有復在天地造化又焉用此既散之氣其造化者自是生氣至如海水潮日出則水涸是潮退也其涸者已無也月出則潮水生也非却是將已涸之水為潮此是氣之終始開闔便是易一闔一闢謂之變又曰真元之氣氣之所由生不與外氣相雜但以外氣涵養而已若魚在水魚之性命非是水為之但必以水涵養魚乃得生耳人居天地氣中與魚在水無異至於飲食之養皆是外氣涵養之道出入之息者闔闢之機而已所出之息非所入之氣但真元自能生氣所入之氣止當闔時隨之而入非假此氣以助真元也並入關語録後一條增橫渠先生曰闔户靜密也闢户動逹也形開而目覩耳聞受於陽也一動一靜是道之常專於動靜則偏也一闔一闢謂之變人之有息蓋剛柔相摩乾坤闔闢之象也因其變而裁制之以教天下聖人之法也用之不窮莫知其鄉故名之曰神並易説物之所以相感者利用出入莫知其鄉一萬物之妙者歟虛明一作靜照鑒神之明也無逺近幽深利用出入神之充塞無間也並正蒙廣漢張氏曰夫自太極既判兩儀肇焉故闔户之坤所以包括萬物而得隂也闢户之乾所以敷生萬物而得陽也即乾坤之一闔一闢所以謂之變即乾坤之往來不窮所以謂之通夫乾坤者生成萬物之體也變化者乃乾坤生化萬物之用也其覆載範圍之中可得而見者謂之象也可指其形者謂之器也有聖人制而用之所以謂之法也利用出入民咸用之而不可測者謂之神也易説白雲郭氏曰繫辭論變通最為易之要道而人多略之變通者易之道也用易之道也故孔子于繫辭三致意焉蓋其義微而難知也因其微而難知故以闔户闢户言之蓋聖人舉近人而易曉者莫若户之為用也固非乾坤之道止於闔户闢户而已也因闔户闢户以明變通則又并及象器法神而言者以見乾坤變通以至制法盡神之妙舉一户之義足以兼明之則聖人所以探賾索隱鈎深致逺者如是其至也然一户至末也猶必盡此道而後可用於天下後世則聖人所以治天下者其可不盡變通之道乎故易曰神農氏沒黃帝堯舜氏作通其變使民不倦神而化之使民宜之易窮則變變則通通則久是以自天祐之吉無不利然則變通之道是乃黃帝堯舜氏得之以治天下者也可不務乎且坤隂物也故有闔户之象乾陽物也故有闢户之象既能闔復能闢是所謂變也朝闢之暮闔之日復一日往來闔闢不窮是所謂通也通也者通其變也至於其户之可見則曰象也其有形則曰器也制而用此者則曰法也利於出入之用而天下之民無不用之者又其所以為神也如是則一户之設豈茍徒哉故治天下之道無它焉如制一户之法使之變通可久斯得之矣雖黃帝堯舜之治不過於此易説漢上朱氏曰坤自夏至以一隂右行萬物從之而入故曰闔户謂之坤乾自冬至以一陽左行萬物從之而出故曰闢户謂之乾坤闔則陽變而隂乾闢則隂變而陽故一闔一闢謂之變闔者往也闢者來也一闔一闢往來相感其機有不得息者故往來不窮謂之通氣聚而有見故謂之象象成而有形故謂之器利用此道以動靜出入而蚩蚩之民咸日用之莫知其然故謂之神七者同出而異名其變化之道神之所為乎知闔闢變通者明於天之道知利用出入民咸用之者察於民之故乾天坤地而曰明于天之道者乾兼坤也闔闢以一嵗言之寒暑也以一日言之晝夜也以一身言之出入之息死生之變也無闔則無闢無靜則無動此歸藏所以先坤歟易傳聖人用易立法制器變通不倦故曰利用出入民咸用之謂之神叢説新安朱氏曰闔闢動靜之機也先言坤者由靜而動也乾坤變通者化育之功也見象形器者生物之序也法者聖人修道之所為而神者百姓自然之日用也本義問闔户謂之坤一假只是這一箇物以其闔謂之坤以其闢謂之乾以其闔闢謂之變以其不窮謂之通發見而未成形謂之象成形謂之器聖人修禮立教謂之法百姓日用則謂之神曰是如此又曰利用出入者便是人生日用都離地不得又曰民之於易隨取而各足易之于民周遍而不窮所以謂之神所謂活潑潑地便是這處闔闢乾坤理與事皆如此者亦如此這箇只説理底意思多知禮成性橫渠説得別他道是聖人成得箇性衆人性而未成並語録是故易有太極是生兩儀兩儀生四象四象生八卦八卦定吉凶吉凶生大業康節先生曰太極既分兩儀立矣陽下交於隂隂上交于陽四象生矣陽交于隂隂交于陽而生天之四象剛交于柔柔交于剛而生地之四象于是八卦成矣八卦相錯然後萬物生焉隂陽生而分二儀二儀交而生四象四象交而成八卦八卦交而生萬物故二儀生天地之類四象定天地之體四象生日月之類八卦定日月之體八卦生萬物之類重卦定萬物之體類者生之序也體者象之交也推類者必本乎生觀體者必由乎象生則未來而逆推象則既成而順觀是故日月一類也同出而異處也異處而同象也推此以往物焉逃哉並觀物外篇樵者謂漁者曰子可謂知易之道矣吾敢問易有太極太極何物也曰無為之本也太極生兩儀兩儀天地之謂乎曰兩儀天地之祖也非止為天地而已也太極分而為二先得一為一後得一為二一二謂兩儀曰兩儀生四象四象何物也曰大象謂隂陽剛柔有隂陽然後可以生天有剛柔然後可以生地立功之本於斯為極曰四象生八卦八卦何謂也曰謂乾坤離坎兊艮震巽也迭相盛衰終始於其間矣因而重之則六十四卦由是而生也而易之道始備矣外書濂溪先生曰無極而太極太極動而生陽動極而靜靜而生隂靜極復動一動一靜互為其根分隂分陽兩儀立焉陽變隂合而生水火木金土五氣順布四時行焉五行一隂陽也隂陽一太極也太極本無極也五行之生也各一其性無極之真二五之精妙合而凝乾道成男坤道成女二氣交感化生萬物萬物生生而變化無窮焉惟人也得其秀而最靈形既生矣神發知矣五性感動而善惡分萬事出矣聖人定之以中正仁義而主靜立人極焉故聖人與天地合其德日月合其明四時合其序鬼神合其吉凶君子修之吉小人悖之凶故曰立天之道曰隂與陽立地之道曰柔與剛立人之道曰仁與義大哉易也斯其至矣太極圖説伊川先生曰范文甫問四象曰左右前後楊中立問四象曰四方時氏拾遺橫渠先生曰四象即乾之四德四時之象故下文云變通莫大乎四時盡吉凶之理則能盡天人之助而成位乎其中矣故下云崇髙莫大乎富貴有吉凶利害然後人謀作大業生若無施不宜則何業之有易説龜山楊氏曰問易有太極莫便是道之所謂中否曰然若是則本無定位當處即是太極邪曰然兩儀四象八卦如何自此生曰既有太極便有上下有上下便有左右前後四方有左右前後四方便有四維皆自然之理也南都語録廣漢張氏曰易有太極者函三為一此中也如立天之道曰隂與陽而太極乃隂陽之中者乎立地之道曰柔與剛而太極乃剛柔之中者乎立人之道曰仁與義而太極乃仁義之中者乎此太極函三為一乃皇極之中道也是以聖人作易所謂六爻者乃三極之道故三才皆得其中是乃順性命之理也爰自太極既判乃生兩儀者在天為隂陽在地為柔剛在人為仁義雖曰隂陽不可指為隂陽雖曰柔剛不可指為柔剛雖曰仁義不可指為仁義乃儀則具存而有對代者也夫有兩儀則一與六共宗二與七共朋三與入同道四與九相友存一而六具有二而七存有三而八著有四而九生此七九八六乃易之四象天一之水得六而居北於卦為坎地二之火得七而居南于卦為離天三之木得入而居東于卦為震地四之金得九而居西於卦為兑是以坎之數六去三而餘三此三畫之乾所以生于西北離之數七去三而餘四此四畫之巽所以生于東南兊之數九去三而餘六此六畫之坤所以生于西南震之數八去三而餘五此五畫之艮所以生于東北乃四象生八卦也及夫八卦既具則乾之䇿乃四九三十六䇿坤之策乃四六二十四䇿震坎艮之䇿乃七之䇿也巽離兊之䇿乃四八之䇿也道之妙也由是而顯德之粗也由是而神可與祐神可與酬酢則吉凶豈有不定者乎吉凶既定則知其利之可興害之可除伏羲之興網罟神農之制耒耜黃帝堯舜之垂衣裳與夫帝之所興王之所成所以舉而措之天下之民者無非本於此也易説垂諭太極之説某妄意以為太極所以形性之妙也性不能不動太極所以明動靜之藴也極乃樞極之義聖人于易特名太極二字蓋示人以根柢其義微矣若只曰性而不曰太極則只去未發上認之不見其用曰太極則性之妙都見矣體用一源顯微無間其太極之藴歟所謂太極天地之性語意亦未圎不若云天地亦形而下者一本於太極又曰易也者生生之妙也太極者所以生生者也曰易有太極而體用一源可見矣並答吳晦叔書太極動而二氣形二氣形而萬物化生人與物俱本乎此者也存齋記並南軒集五峰胡氏曰易有太極是生兩儀故天地之間物必有對感則必應出則必反不易之理也是以禹湯保天下而天下歸之桀紂虐天下而天下棄之文集白雲郭氏曰太極者三才未分之名統三才之道者也兩儀猶曰二象也謂有乾坤天地之二象而未為乾坤天地也四象者九八七六隂陽老少之象此與大衍之序同大衍太極也分而為二兩儀也揲之以四四象也四象既生然後太極分而為三才兩儀定而名乾坤入卦以成吉凶以定而大業生焉吉凶者入卦之所有而非八卦之所生大業者聖人之所造吉凶定則易道成矣易道成故聖人用之以崇德廣業也易説漢上朱氏曰此以下言是興伸物極中也太極中之至歟易有太極四十有九合而為一乎四象八卦具而未動謂之大極在人則喜怒哀樂之未發者也隂陽匹也故謂之儀太極動而生陽陽極靜而生隂隂極復動而生陽始動靜者少也極動靜者老也故生四象乾老陽也震坎艮少陽也坤老隂也巽離兊少隂也故四象生八卦卦有爻爻有位剛柔相交有當否故八卦定吉凶有吉凶則有利害人謀用矣故生大業八卦定吉凶者開物也吉凶生大業者成務也易傳又曰太極者中之至也天地之大本也所以生天地者也天地分太極萬物分天地人資天地之中以生觀乎人則天地之體見矣故曰惟皇上帝降衷于下民而人之心者又人之中也寂然不動太極含三也感而遂通則天地位矣萬物育矣自一嵗言之冬至也自一日言之夜半也此太玄八十一首所以起於中歟太極者隂陽之本也兩儀者隂陽之分也四象者金木水火土也八卦者隂陽五行布于四時而生萬物也故不知八卦則不知五行不知五行則不知隂陽不知隂陽則不知太極人孰知太極之不相離乎不知太極則不可以語易矣故曰易有太極兩儀生四象孔氏謂金木水火稟天地而有土則分王四季且金木水火有形之物安得為象哉孔氏失之逺矣鄭康成言四象曰布六于北方以象水布八于東方以象木布九于西方以象金布七于南方以象火備為一爻而正謂四營而成並叢説新安朱氏曰一每生二自然之理也易者隂陽之變太極者其理也兩儀者始為一畫以分隂陽四象者次為二畫以分太少八卦者次為三畫而三才之象始備此數言者實聖人作易自然之次第有不假絲毫智力而成者畫卦揲蓍其序皆然有吉有凶是生大業並本義易者隂陽之變太極其理也太極中全是具一箇善若三百八十四爻中有善有惡皆隂陽變化以後方有周子康節説太極和隂陽滚説易中便擡起説周子言太極動而生陽靜而生隂如言太極動是陽動極而靜靜便是隂動時便是陽之太極靜時便是隂之太極蓋太極即在隂陽裏如易有太極是生兩儀則先從實理處説若論其生則俱生太極依舊在隂陽裏但言其次序須有這實理方始有隂陽也其理則一雖然自見在事物而觀之則隂陽函太極推其本則太極生隂陽問易有太極是生兩儀兩儀生四象四象生八卦曰此太極却是為畫卦説當未畫卦前太極只是一箇渾淪底道理裏面包含隂陽剛柔竒耦無所不有及各畫一竒一耦便是生兩儀再於一竒畫上加一耦此是陽中之隂又於一竒畫上加一竒此是陽中之陽又于一耦畫上加一竒此是隂中之陽又于一耦畫上加一耦此是隂中之隂是謂四象所謂八卦者一象上兩卦每象各添一竒或一耦便是八卦嘗聞一朋友説一為儀二為象三為卦四為象如春夏秋冬金木水火東西南北無不可推矣易有太極便有箇隂陽出來隂陽便是兩儀儀匹也兩儀生四象便是一箇隂又生出一箇陽是一象也一箇陽又生出一箇隂是一象也一箇隂又生一箇隂是一象也一箇陽又生一箇陽是一象也此謂四象四象生八卦是這四箇象生四箇隂時便成坎震坤兊四卦生四箇陽時便成巽離艮乾四卦以物論之易之有太極如木之有根浮圖之有頂但木之根浮圖之頂是有形之極太極却不是一物無方所頓放是無形之極故周子曰無極而太極是他説得有工夫處太極之所以妙太極却不離乎兩儀四象八卦如一隂一陽之謂道指一隂一陽為道則不可而道則不離乎隂陽也太極如一木生上分而為枝幹又分而生花生葉生生不窮到得成果子裏面又有生生不窮之理生將出去又是無限箇太極更無停息只是到成果實時又却少歇不是止到這裏自合少止正所謂終始萬物莫盛乎艮艮止是生息之意林黃中論易有太極是生兩儀兩儀生四象四象生八卦就一卦言之全體為太極內外為兩儀內外及互體為四象又顚倒取為八卦先生曰如此則不是生却是包也始畫卦時只是箇隂陽竒耦一生兩兩生四四生八而已方其為太極未有兩儀也由太極而後生兩儀方其為兩儀未有四象也由兩儀而後生四象方其為四象未有八卦也由四象而後生八卦此之謂生若以為包則是未有太極已先有兩儀未有兩儀已先有四象未有四象已先有入卦矣林又曰太極有象且既曰易有太極則不可謂之無濂溪乃有無極之説何也曰有太極是有此理無極是無形器方體可求兩儀有象太極則無象林又言三畫以象三才曰有三畫方看見似箇三才模樣非故畫以象之也卦畫既立便有吉凶在裏蓋是隂陽往來交錯于其間其時則有消長之不同長者便為主消者便為客事則有當否之或異當者便為善否者便為惡即其主客善惡之辨而吉凶見矣故曰八卦定吉凶吉凶既決定而不差則以之立事而大業自此生矣此聖人作易教民占筮而以開天下之愚以定天下之志以成天下之事者如此並語録又曰此一節乃孔子發明伏羲畫卦自然之形體次第最為切要古今説者惟康節明道兩先主為能知之故康節之言曰一分為二二分為四四分為八八分為十六十六分為三十二三十二分為六十四猶根之有幹幹之有枝愈大則愈小愈細則愈繁而明道先生以為加一倍法其發明孔子之言又可謂最切要矣蓋以河圗洛書論之太極者虛其中之象也兩儀者隂陽竒耦之象也四象者河圖之一合六二合七三合八四合九洛書之一含九二含八三含七四含六也八卦者河圖四正四隅之位洛書四實四虛之數也以卦畫言之太極者象數未形之全體也兩儀者一為陽而一為隂陽數一而隂數二也四象者陽之上生一陽則為而謂之太陽生一隂則為而謂之少隂隂之上生一陽則為而謂之少陽生一隂則為而謂之太隂也四象既立則太陽居一而含九少隂居二而含八少陽居三而含七太隂居四而含六此六七入九之數所由定也八卦者太陽之上生一陽則為而名乾生一隂則為而名兊少隂之上生一陽則為而名離生一隂則為而名震少陽之上生一陽則為而名巽生一隂則為而名坎太隂之上生一陽則為而名艮生一隂則為而名坤康節先天之説所謂乾一兊二離三震四巽五坎六艮七坤八者蓋謂此也至於八卦之上又各生一隂一陽則為四畫者十有六經雖無文而康節所謂八分為十六者此也四畫之上又各有一隂一陽則為五畫者三十有二經雖無文而康節所謂十六分為三十二者此也五畫之上又各生一隂一陽則為六畫之卦六十有四而入卦相重又各得乾一兊二離三震四巽五坎六艮七坤八之次其在圖可見矣今既以七八九六為四象又以揲之以四為四象疑或有未安也河圖洛書愚竊以大傳之文詳之河圖洛書蓋皆聖人所取以為八卦者而九疇亦并出焉今以其象觀之則虛其中者所以為易也實其中者所以為洪範也其所以為易者已見于前段矣所以為洪範則河圖九疇之象洛書五行之數有不可誣者恐不得以其出於緯書而略之也與郭沖晦書邵子云太極既分兩儀立矣陽上交於隂隂下交于陽而四象生矣陽交于隂隂交于陽而生天之四象剛交於柔柔交於剛而生地之四象八卦相錯而後萬物生焉此來教所引邵先生説也今子細辨析奉呈幸詳考之方可見其曲折未遽可輕議也然此亦是就六十四卦已成之後言之故其先後多寡有難著語處乍看極費分疏猝然曉會不得若要見得聖人作易根原直截分明却不如且看卷首橫圖自始初只有兩書時漸次看起以至生滿六畫之後其先後多寡既有次第而位置分明不費辭説于此看得方見六十四卦全是天理自然挨排出來聖人只是見得分明便只依本畫出元不曽用一毫智力添助蓋本不煩智力之助亦不容智力得以助于其間也及至卦成之後逆順縱橫都成義理千般萬種其妙無窮却在人看得如何而各因所見為説雖若各不相資而實未嘗相悖也蓋自初未有畫時説到六畫滿處者邵子所謂先天之學也卦成之後各因一義推説邵子所謂後天之學也今來喻所引繫辭説卦三才六位之説即所謂後天者也先天後天既各自為一義而後天説中取義又多不同彼此自不相妨不可執一而廢百也若執此説必謂聖人初畫卦時只見一箇三才便更不問事由一連便掃出三畫以擬其象畫成之後子細看來見使不得又旋劃壁添出後一半截此則全是私意杜撰補接豈復更有易邪來喻條目尚多然其大節目不過如此今但於此看破則其餘小小未合處自當迎刃而解矣據邵氏説先天者伏羲所畫之易也後天者文王所演之易也伏羲之易初無文字只有一圖以寓其象數而天地萬物之理隂陽始終之變具焉文王之易即今之周易而孔子所為作傳者是也孔子既因文王之易以作傳則其所論固當專以文王之易為主然不推本伏羲作易畫卦之所由則學者必將誤認文王所演之易便為伏羲始畫之易只從中半説起不識向上根原矣故十翼之中如八卦成列因而重之太極兩儀四象八卦而天地山澤雷風水火之類皆本伏羲畫卦之意而今新書原卦畫一篇亦分兩義伏羲在前文王在後必欲知聖人作易之本則當考伏羲之畫若只欲知今易書文義則但求之文王之經孔子之傳足矣兩者初不相妨而亦不可以相雜來教乃謂專為邵氏解釋而於易經無所折衷則恐考之有未詳也並答袁機仲書東萊吕氏曰太極圖義曰無聲無臭而造化之樞紐品彚之根柢系焉竊謂太極即造化之樞紐品彚之根柢也恐多系焉兩字太極圖義曰太極道也隂陽器也竊謂此固非世儒精粗之論然似有形容太過之病太極圖義曰太極立則陽動隂靜而兩儀分竊謂太極無未立之時立之一字語恐未瑩並答朱侍講是故法象莫大乎天地變通莫大乎四時縣象著明莫大乎日月崇髙莫大乎冨貴備物致用立成器以為天下利莫大乎聖人探賾索隱鉤深致逺以定天下之吉凶成天下之亹亹者莫大乎蓍龜廣漢張氏曰夫易有太極而降以生兩儀兩儀生四象四象生八卦八卦定吉凶吉凶生大業此易之興乎世聖人之興乎易易所以垂之天下後世者也雖然物固有法象至於法象之大者莫大乎天地物固有變通至于變通之大者莫大乎四時水火固著明矣然垂象著明惟在天之日月為莫大也爵齒固崇髙矣然崇髙之極惟寶位之冨貴為莫大也以至備物致用立成器以為天下利俾民養生喪死仰事俯育用之不窮者所以莫大於聖人也探賾索隱鉤深致逺定天下之吉凶俾民避害趨利去危即安以前民用者所以莫大于蓍龜也易説白雲郭氏曰自論乾坤變通至天生神物四事皆首以是故為言蓋因洗心齋戒用易而有是四事明文義相屬也聖人洗心齋戒用易以應天下之務蓋用易不用心故用乾坤變通而至於利用出入之神用太極兩儀之道而至于生大業由聖人用易備物致用為天下利故與天地四時日月蓍龜同為莫大神明之德終言聖人效象天地神物皆不自用其心皆有所則象亦洗心用易之道也且天下物理有形名氣象者固不可槩舉也然有法象者非一而莫大于天地變通者非一而莫大於四時縣象著明者非一而莫大于日月崇髙者非一而莫大于冨貴備物致用者非一而莫大於聖人探賾索隱者非一而莫大於蓍龜冨貴者人君之勢位道必假此而後行也故位為大寶聖人亦人也以能用易故莫大也然法象變通著明崇髙備物致用探賾索隱皆易之道而天地四時日月冨貴與聖人蓍龜得之皆成莫大之德又以見易之開物成務冒天下之道無乎不備如是之大也易説漢上朱氏曰法象莫大乎天地故定乾坤也變通莫大乎四時故明六爻也縣象著明莫大乎日月故用坎離也積而崇髙者冨貴也冨貴然後可與人共位食祿行道爻之尊位是也故莫大乎冨貴備百物致民用立成器如網罟耒耜之類以為天下利唯聖人能之象言先王大人君子之所以者是也故莫大乎聖人天地鬼神之奧幽賾隱伏深逺而難窮探取之搜索之鈎出之使自至之以定吉凶之未形以成亹亹之不已唯蓍龜能之故莫大乎蓍龜聖人觀天地四時日月又考之蓍龜而作易以通神明之德以類萬物之情處崇髙之冨貴備物致用立成器建卜筮然則通天下之志定天下之業斷天下之疑非聖人其孰能之是以成位兩間與天地並立故曰大哉人謨舍此而能覆冒天下者未之見也易傳新安朱氏曰冨貴謂有天下履帝位立下疑有闕文亹亹猶勉勉也疑則怠決故勉本義以定天下之吉凶成天下之亹亹莫大乎蓍龜人到疑而不能自明處往往便放倒不復能向前動有疑阻既有卜筮知是吉是凶便自勉勉住不得其所以勉勉者是卜筮成之也筮雖出於自然然一爻成則止有八卦四爻成則止有四卦五爻成則止有二卦這二卦便可以著意揣度了不若卜龜文一兆則吉凶便見更無移改全不可容心所以古人言筮短龜長易占不用龜而每言蓍龜皆具此理也筮即蓍也筮短龜長不如從長者謂龜有鑽灼之易而筮有扐揲之煩龜之卦一灼便成亦有自然之意洪範所謂卜五占用二者卜五即龜用二即蓍曰雨曰霽曰蒙曰驛曰克即是五行雨即水霽即火蒙即土驛即木克是金曰貞曰悔即是內外卦也占龜土兆大橫木兆直或曰火兆直只周禮曰木兆直金兆從右邪上火兆從左邪上或曰木兆從左邪上水兆曲以大小長短明暗為吉凶或占凶事又以短小為吉又有旋者吉大橫吉大橫庚庚庚庚是爆起恁地庚庚然不是金兆也程沙隨説大橫庚庚為金兆取庚辛之義他都無所據只云得之卜者不知大橫只是土兆蓋橫是土言文帝將自諸侯而得天下有大土之象也庚庚乃是龜文爆出也卜兆見洪範疏云橫者為土漢卿説鑽龜云先定四嚮欲求甚紋兆順則為吉逆則為凶正淳云先灼火然後觀火之紋而定其吉凶曰要須先定其四嚮而後求其合從逆則凶如亦惟洛食乃先以墨畫定看食墨如何筮短龜長古人固重此洪範謂龜從筮逆若龜筮共違于人則用靜吉用作凶卜必先以墨畫龜看是卜何事要得何兆都有定例或火或土便是墨畫之要拆鑽處拆痕依此墨然後灼之以火鑽鑽鑽略過久求其兆拆痕順食此墨晝之處謂之食熟讀六十四卦則覺得繫辭之語直為精密是易之括例要之易書是為卜筮而作如云定天下之吉凶成天下之亹亹者莫大乎蓍龜又云天生神物聖人則之則專為卜筮也魯可幾曰古之卜筮恐不如今日所謂火珠林之類否曰以某觀之恐亦自有這法如左傳所載則支于納音配合之意似亦不廢如云得屯之比既不用屯之辭亦不用比之辭却自別惟一法恐亦不廢這理也易中言帝乙歸妹箕子明夷髙宗伐鬼方之類疑皆當時帝乙髙宗箕子曽占得此爻故後人因而記之而聖人以入爻也如漢書大橫庚庚余為天王夏啓以光亦是啓曽占得此爻也火珠林亦如此火珠林猶是漢人遺法並語録是故天生神物聖人則之天地變化聖人效之天垂象見吉凶聖人象之河出圖洛出書聖人則之伊川先生曰孔子感麟而作春秋然麟不出春秋豈不作大抵須有發端處如畫八卦因見河圖洛書果無河圖洛書八卦亦須作入關語録因見賣兔者曰聖人見河圖洛書而畫八卦然何必圖書只看此兔亦可作八卦數便此中可起古聖人只取神物之至著者耳劉元承手編橫渠先生曰天生書龜聖人則之以占兆一云占之以兆天地變化聖人作易以著效之故曰聖人效之作易以示人猶天垂象見吉凶作書契效法猶地出圖書一云猶河洛出圖書易説造化所成無一物相肖者以是知萬物雖多其實一物無無隂陽者以是知天地變化二端而已萬物形色神之糟粕性與天道云者易而已矣並正蒙廣漢張氏曰天生神物謂蓍龜之探頤索隱鉤深致逺者是也聖人則之以明易之象數天地變化謂隂陽之消息盈虛往來進退者是也聖人效之而為六十四卦天垂象謂天之經緯錯雜縱橫昭著者是也聖人象之而為三百八十四爻夫易之象數卦爻聖人皆得於心而必參之天地者蓋聖人之心與天地之心相似其愛人之心初未嘗不同也然天欲雨山川必先雲氣況易之興也豈無先至之祥乎是以聖人必終之以河出圖洛出書而又則之者其則皇天以興其易者乎又況河圖不出吾已矣夫孔子嘗有是嘆九洛之事治成德備莊周嘗有是言聖人則之度其時以卜其道之將以興於世也大抵通于天者河也有龍馬負圖而出此聖人之德上配于天而天降其祥也中于地者洛也有神龜載書而出此聖人之德下及于地而地呈其瑞也聖人則之故易興於世然後象數推之以前民用卦爻推之以濟民行而推之天下後世也而世儒之説乃謂伏義得河圖洛書以作八卦果如是則不當曰伏羲始畫八卦也而鄭康成溺于緯書乃云河圖有九篇洛書有二篇而孔安國又以河圖為八卦洛書為九疇此皆蕪穢聖經者矣甚者以天生神物天地變化與夫天垂象河出圖洛出書為四象者此尤不經學者不可不辨易説屏山劉氏曰河圖昧乎太極則八卦分而無統洛書昧乎皇極則九疇滯而不通文集白雲郭氏曰聖人用易無它焉欲不自用其心耳蓋自用其心則是有心于成敗好惡皆私心也不自用其心則酬酢萬變皆取諸易成敗好惡聖人無容心焉此所謂洗心也聖人不獨用易以酬酢萬變也凡天地萬物可則象者皆則而象之故天生神物則則之天地變化則效之天垂象則象之河圖洛書則則之以見洗心之道皆有則象未嘗自用其私智如此河圖洛書先儒之説多不同至於取緯為證者尤非學易之事也然河出圖而後畫八卦洛出書而後定九疇故河圖非卦也包犧畫而為卦洛書非字也大禹書而為字亦猶箕子因九疇而陳洪範文王因八卦而演周易其始則肇於河圖洛書書畫於八卦九疇成於周易洪範其序如此易説漢上朱氏曰蓍一根而百莖龜具八卦五行天地之數神物也故聖人則之天地變化四時行焉萬物生焉故聖人效之日月五星天象也天不言示之以象吉凶見矣故聖人象之河圖九宫洛書五行聖人則之效之者效之以六爻之動故曰爻者效天下之動者也象之者象也故曰象也者像也于蓍龜圖書言則之者大衍之數八卦五行作易者則之故乾坤坎離震巽艮兊三畫之卦爻合皆九六七八數皆十五水六火七木八金九五行之數具焉傳曰聖人以蓍龜而信天地四時日月之象數以河圖洛書而信蓍龜之象數信矣其不疑也于是乎作易易傳又曰水一火二木三金四土五五行之生數也水六火七木八金九土十五行之成數也一三五七九竒數二十五二四六八十耦數三十竒耦之數五十有五此五行分天地五十有五之數也太玄三八為木四九為金二七為火一六為水五五為土五五者十也洛書之數也叢説新安朱氏曰此四者聖人作易之所由也本義論雖以四十五者為河圖五十五者為洛書然序論之文多先書而後圖蓋必以五十五數為體而後四十五者之變可得而推又況易傳明有五十有五之文而洪範又有九位之數邪答程泰之書數日病中方得紬繹所云圖書卦書二説初若茫然不知所謂因復以妄作啓蒙考之則見其論之之詳而明者偶未深考是以致此紛紛多説而愈致疑耳夫以河圖洛書為不足信自歐陽公以來已有此説然終無奈顧命繫辭論語皆有是言而諸儒所傳二圖之數雖有交互而無乖戾順數逆推縱橫曲直皆有明法不可得而破除也至如河圖與易之天一至地十者合而載天地五十有五之數則固易之所自出也洛書與洪範之初一至次九者合而具九疇之數則固洪範之所自出也繫辭雖不言伏羲受河圖以作易然所謂仰觀俯察近取逺取安知河圖非其中之一事邪大抵聖人制作所由初非一端然其法象之規模必有最親切處如鴻荒之世天地之間隂陽之氣雖各有象然初未嘗有數也至於河圖之出然後五十有五之數竒偶生成粲然可見此其所以深發聖人之獨智又非泛然氣象之所可得而擬也是以仰觀俯察逺求近取至此而後兩儀四象八卦之隂陽竒偶可得而言雖繫辭所論聖人作易之由者非一而不害其得此而後決也答袁機仲書易有四象所以示也繫辭焉所以告也定之以吉凶所以斷也廣漢張氏曰易自太極既判兩儀生四象夫四象既具而列於四方分為五行而七九八六之數乃生八卦此易所以示者言其示于人也是以聖人當辨物正言而又斷之以辭故為繇辭而又為爻辭為之彖辭而又為之象辭皆繫續其辭所以告者言其告于人也夫易有四象以示其人示其吉凶也至於不得已而有辭以告其人者告其吉凶也夫示人以吉凶告人以吉凶無非俾人自探也然猶有安其危而利其災樂其所以亡者故定之以吉凶如畫一之易知如白黑之易辨斷然使人易知也故征吉貞凶貞吉征凶大吉終吉之類有凶終凶之類聖人至此可謂至矣盡矣易説白雲郭氏曰四象所以示變繫辭所以告得失吉凶所以斷行事自易有四象以下與前文不相屬又非別章疑其錯簡易説漢上朱氏曰易有四象聖人所以示吉凶也繫辭焉而命之所以告吉凶也易于吉凶有以利言者有以情遷者有義命當吉當凶當否當亨者一以貞勝而不顧非聖人不能定也定之者所以斷之也易傳又曰易有四象所以示也此象謂爻卦之象也叢説新安朱氏曰四象謂隂陽老少示謂示人以所值之卦爻本義天地之間只是隂與陽兩箇字看是甚麼物事都離不得只就身上體看才開眼不是隂便是陽密拶拶在這裏都不著得别物事不是仁便是義不是剛便是柔只自家要做向前便是陽才收退便是隂意思才動便是陽才靜便是隂未消別看只是一動一靜便是隂陽伏義只因此畫卦以示人若只就一隂一陽又不足以該衆理於是錯綜為六十四卦三百八十四爻初只是許多卦爻後來聖人又繫許多辭在下如他書則元有這事方説出這箇道理易則未曽有此事先假託都説在這裏如書便有箇堯舜有箇禹湯文武周公出來做許多事便説許多事今易則元未曽有聖人預先説出時人占考大事小事無一能外于此聖人大抵多是垂戒又曰雖是一隂一陽易中之辭大抵陽吉而隂凶間亦有陽凶而隂吉者何故蓋有當為有不當為若當為而不為不當為而為之雖陽亦凶又曰聖人因卦爻以垂戒多是利于正未有不正而利者如云夕惕若厲無咎若占得這爻必是朝兢夕惕戒謹恐懼可以無咎若自家不曽如此便自有咎如云直方大不習無不利若占得這爻須是將自身已體看是直是方是大去做某事必得其利若自家未是直不曽方不曽大則無所往而得其利此是本爻辭如此到孔子又是添説了如云敬以直內義以方外本來只是卜筮聖人為之辭以曉人便説許多道理在上今學易非必待遇事而占方有所戒只平居玩味看他所説道理於自家所處地位合是如何故云居則觀其象而玩其辭動則觀其變而玩其占孔子所謂學易正是平日常常學之想見聖人之所謂讀異乎人之所謂讀想是胸中洞然於易之理無纎毫蔽處故云可以無大過又曰聖人繫許多辭包盡天下之理止緣萬事不離乎隂陽故因隂陽中而推説萬事之理今要占考雖小小事都有如占得不利有攸往便是不可出路利涉大川便是可以乘舟此類不一語録右第十一章新安朱氏本義曰此章専言卜筮易曰自天祐之吉無不利子曰祐者助也天之所助者順也人之所助者信也履信思乎順又以尚賢也是以自天祐之吉無不利也伊川先生曰履信謂履五五虛中信也思順謂謙退不居尚賢謂志從於五大有之世不可以盈豐而復處盈焉非所冝也六爻之中皆樂據權位惟初上不處其位故初九無咎上九無不利上九在上履信思順故在上而得吉蓋自天祐也易傳橫渠先生曰自易曰自天祐之此篇冝在立心勿恆凶下蓋上言莫益之故此言多助也易説廣漢張氏曰在天有理惟順以循其理則天必眷顧而不違在人有心惟信以結其心則人必歸往而來輔大有上九以為吾之信固足以感乎人矣然賢者人之所望也詎可不以吾之信以信其賢乎我之順固足以格乎天矣然賢者天之所賚也詎可不以吾之順以順其賢乎始焉盡信順之德獲天人之助終焉推信順之德以之而尚賢如此則其謙足以格天其誠足以動天自天祐之吉無不利固其冝也由此觀之則天不妄祐人而人當反求諸已如大有之上九庶幾獲祐而無所愧也易説白雲郭氏曰已順故天助之以順已信故人助之以信大有之君履不失信下足以感人思不失順上足以動天又以尚賢是以吉無不利也橫渠張先生謂此章冝在立心勿恆凶之下亦疑與前文義不相屬也若然則當在易曰憧憧往來之前蓋自易者象也至小人之道也結句助辭多稱也與所以示也所以告也所以斷也皆相類自憧憧往來因于石公用射隼皆稱易曰故自天祐之冝在其前也上篇擬議七爻自鳴鶴在隂皆不稱易下篇十一爻自憧憧往來皆稱易曰與自天祐之文意同易説漢上朱氏曰易曰自天祐之吉無不利大有上九辭也乾為天為人祐助也坤為順五與二孚信也天之所助者順理也人之所助者信相與也六五履信而思乎順又自下而尚賢是以自天祐之吉無不利言此者明獲天人之利然後吉無不利聖人明於天之道察於民之故合天人者也易傳新安朱氏曰釋大有上九爻義然在此無所屬或恐是錯簡冝在第八章之末本義子曰書不盡言言不盡意然則聖人之意其不可見乎子曰聖人立象以盡意設卦以盡情偽繫辭焉以盡其言變而通之以盡利鼓之舞之以盡神康節先生曰易有意象立意皆所以明象統下三者有言象不擬物而直言以明事有像象擬一物以明意有數象七日八月三年十年之類是也象起於形數起於質名起於言意起於用天下之數出于理違乎理則入於術世人以數而入術故失于理也有意必有言有言必有象有象必有數數立則象生象生則言著言著則意顯象數則筌蹄也言意則魚兔也得魚兔而謂必由筌蹄可也舍筌蹄而求魚兔則未見其得也並觀物外篇明道先生曰鼓動萬物聖人之神知則不可名遊定夫所録伊川先生曰言貴簡言愈多於道未必明杜元凱却有此語云言髙則旨逺辭約則義微大率言語須是涵養而有餘意所謂書不盡言言不盡義精義橫渠先生曰理勢既變不能與時順通非盡利之道鼓天下之動者存乎神神一作辭天下之動神鼓之也神則主於動故天下之動皆神為之也辭不鼓舞則不足以盡神辭謂易之辭也於象固有此意矣又繫之以辭因而駕説使人向之極盡動之義也歌舞為巫風言鼓舞之盡神者與巫之為人無心若風狂然主於動而已故以好歌舞為巫風猶之如巫也巫主於動以至於鼓舞之極也故曰盡神因説鼓舞之義故取巫以為言語其動而已並易説廣漢張氏曰言蔓衍而無窮非書之簡册所能載意幽深而罔測非言之聲音所能窮也然則聖人之意其不可見乎此立象所以盡意也又況以言告人告之愈切而認其言者求之愈逺不若立象而示人以意是以瞽者不識日問人而人告之曰日之明也如燭他日有捫其籥以為日者又告之曰日之圓如盂他日有捫其盤以為日者矣夫告之以其明如燭其圎如盂言之切者也奈何認其言而失之逺者乃捫籥以為日而捫盤以為日焉此言不能盡意也聖人憂之所以立天以象乾立地以象坤以至以雷以水以山而象震坎艮焉以風以火以澤而象巽離兊焉凡易者象也象也者像此者也無適而非象者欲其即象以求其意非吝於言也慮天下後世求之于言而失之逺也賾不易見也聖人見賾而立象此象所以盡意也變不易觀也聖人觀變而立卦此卦所以盡情偽也情不易知也聖人逹情而為辭此繫辭所以盡其言也凡此三者聖人作易而寓於書者也若夫變而通之者俾民仰事俯育養生送死耕而食織而衣舟楫以濟其川塗室宇以禦其風雨一日不可無萬世不可易均獲其利者此推其卦象繫辭變而通之以盡其利者歟鼓之舞之其道密庸其化罔測動靜變化易其思慮德威之震疊德風之搖蕩由之而罔覺用之而不知咸妙於神者此推其卦象繫辭鼓之舞之以盡其神者歟易説白雲郭氏曰聖人作易所以盡言意易之一書為言亦備矣為意亦盡矣猶曰書不盡言言不盡意者言意豈苟然哉所以明乎道於以見道之難明也如此若是則聖人之意其不可見乎蓋夫子又欲明言意之盡也且意不可以言盡也故立象以盡之情偽不可以遍舉也故設卦以盡之言非一説可盡也故卦爻彖象文言互為之辭以盡之若是則易道明矣於是乎極其變通又盡其美利窮其鼓舞又盡其至神則易之為道無遺藴矣然立象設卦繫辭皆聖人作易以盡道者也變通鼓舞又明聖人用易之盡其道者也變而通之則經所謂通其變使民不倦之意鼓之舞之所謂神而化之使民冝之也聖人以書必不能盡其所欲言言必不能盡聖人之意故立象繫辭智者觀之則見其可盡也昧者亦未之知易説漢上朱氏曰言之難論者不能盡形之于書意之難傳者不能盡見之於言然聖人之意終不可見於天下後世乎夫有意斯有名有名斯有象意至賾也聖人於無形之中建立有象因象而得名因名而得意則言之所不能盡見者盡矣君子小人情偽而已矣情則相應偽則相違聖人陳卦以示之斷之以中正而君子小人見然後著情去偽而其意誠矣繫之卦辭又繫之爻辭以吉凶明告之與卦象相發則書之所不能盡形者盡矣隂極變陽陽極變隂當變而變則通不變則窮窮非道也變而通之則無所不利而道行矣鼓舞者鼓之于此舞之于彼動止應節莫知其然神也易傳新安朱氏曰言之所傳者淺象之所示者深觀竒耦二畫包含變化無有窮盡則可見矣變通鼓舞以事而言兩子曰字疑衍其一蓋子曰字皆後人所加故有此誤如近世通書乃周子所自作亦為後人每章加以周子曰字其設問答處正如此也本義問書不盡言言不盡意一章曰立象盡意是觀竒耦兩畫包含變化無有窮盡設卦以盡情偽謂有一竒一耦設之於卦自是盡得天下情偽繫辭便斷其吉凶變而通之以盡利此言占得此卦隂陽老少交變因其變便有通之之理鼓之舞之以盡神未占得則有所疑既占則無所疑自然使得人腳輕手快行得順便如大衍之後言顯道神德行是故可與酬酢可與祐神定天下之吉凶成天下之亹亹皆是鼓之舞之之意乾坤其易之緼邪乾坤成列而易立乎其中這又是言立象以盡意設卦以盡情偽易不過只是一箇隂陽竒耦千變萬變則易之體立若竒耦不交變竒純是竒耦純是耦去那裏見易易不可見則隂陽竒耦之用亦何自而辨問在天地上如何曰關天地什麼事此是説易不外竒耦兩物而已化而裁之謂之變推而行之謂之通這是兩截不相干化而裁之屬前項事謂漸漸化去裁制成變則謂之變推而行之屬後項事謂推而為别一卦了則通行無礙故為通舉而措之天下謂之事業便只事定天下之吉凶成天下之亹亹者極天下之賾者存乎卦謂卦體之中備隂陽變易之形容鼓天下之動者存乎辭是説出這天下之動如鼓之舞之相似卦即象也辭即爻也神而明之一假却是與形而上之道相對説自形而上謂之道説至于變通事業却是自至約處説入至粗處去自極天下之賾者存乎卦説至於神而明之則又是由至粗説入至約處默而成之不言而信則説得又微矣問書不盡言言不盡意是聖人設問之辭曰也是如此亦是言不足以盡意故立象以盡意書不足以盡言故因繫辭以盡言又曰書不盡言言不盡意是元舊有此語又曰立象以盡意不獨見聖人有這意思寫出來自是他象上有這意設卦以盡情偽不成聖人有情又有偽自是卦上有這情偽但今曉不得他那處是偽如下云中心疑者其辭枝誣善之人其辭遊也不知如何是枝是遊不知那卦上見得又曰看來情偽只是箇好不好如剝五隂只是要害一箇陽這是不好底情便是偽如復如臨便是好底卦便是真情問立象設卦繫辭是聖人發其精意見於書變通鼓舞是聖人推而見于事否曰是嘗謂伏羲畫八卦只此數畫該盡天下萬物之理陽在下為震震動也在上為艮艮止也陽在下自動在上自止歐公却説繫辭不是孔子所作所謂書不盡言言不盡意者非蓋他不曽看立象以盡意一句惟其言不盡意故立象以盡之學者於言上會得者淺於象上會得者深變而通之以盡利鼓之舞之以盡神立象設卦繫辭皆謂卜筮之用而天下之人方知所以避凶趨吉奮然有所興作不知手之舞之足之蹈之之意故曰定天下之吉凶成天下之亹亹者莫大乎蓍龜猶催迫天下之人勉之為善相似問變而通之如禮樂刑政皆天理之自然聖人但因而為之品節防範以為教於天下鼓之舞之蓋有以作興振起之使之遷善而不自知否曰鼓之舞之便無所用力自是聖人教化如此又曰政教皆有鼓舞但樂占得分數較多自是樂會如此而不自知因舉橫渠云云巫其舞之盡神者巫從工兩邊人字是取象其舞巫者託神如舞雩之類皆須舞蓋以通暢其和氣逹於神明並語録乾坤其易之緼邪乾坤成列而易立乎其中矣乾坤毁則無以見易易不可見則乾坤或幾乎息矣明道先生曰生生之謂易天地設位而易行乎其中矣乾坤毁則無以見易易不可見則乾坤或幾乎息矣易畢竟是甚又不只是這一部書是易之道也不要將易又是一箇事即是盡天理便是易也吕與叔東見録伊川先生曰乾健坤順人亦不曽果是體認得乾坤毁則無以見易經説橫渠先生曰隂陽剛柔仁義之本立而後知趨時應變乾坤毁則無以見易感而後有通不有兩則無一故聖人以剛柔立本乾坤毁則無以見易乾坤既列則其間六十四卦爻位錯綜以為變易苟乾坤不列則何以見易易不見則是無乾坤乾坤天地也易造化也聖人之意莫先乎要識造化既識造化然後有理可窮彼惟不識造化以為幻妄也不見易則何以知天道不知道則何以語性並易説見易則神其幾矣正蒙龜山楊氏曰或問乾坤毁則無以見易如此則易不屬無矣曰易固非無張橫渠深闢老子有無之論莫有見於此否曰然才説無便成斷滅去如釋氏説空又曰非空到了費力聖人只説易最為的當因言孟子論養氣到此方見有功於前聖曰如孟子者方是能曉易如説必有事焉非見得分明此説如何撰得南都語録和靖尹氏曰乾坤成列而易立乎其中矣聖人便是易師説廣漢張氏曰乾坤其易之門邪言易出入於乾坤也乾坤其易之緼邪言易含畜於乾坤也故乾成位乎上坤成位乎下而易立乎其中矣故乾坤者人之四支而易者人之精神也方其首圎足方胸南背北則精神有所託而立乎其中矣若夫四支隳廢則精神散而之他而手足亦幾乎息矣夫乾坤初未嘗毁而易亦未嘗不可見也聖人設此辭者欲天下後世求易者當即乾坤以求之歟易説白雲郭氏曰乾坤與易其名雖異其道一也易之道緼於乾坤故易之書成則乾坤成列而易立乎其中如是則乾坤有體而易無體也有體則成毁從之故上言成列下言乾坤毁易以無體託於乾坤故乾坤之卦毁則無以見易易不可見則乾坤之道亦因以息矣此蓋言易之道固不繫於有書無書而無書則易不可見而乾坤之道亦息以明聖人不得不作易之意也易説漢上朱氏曰橫渠曰辭不鼓舞則不足以盡神爻至於變通以盡利辭至於鼓舞以盡神則聖人之意幾無餘緼矣乾坤成列則象爻變動緼於其中乾坤體也象爻變動用也體毁則用不可見用不可見則體因是息矣易傳新安朱氏曰緼所包蓄者猶衣之著也易之所有隂陽而已凡陽皆乾凡隂皆坤畫卦定位則二者成列而易之體立矣乾坤毁謂卦畫不立乾坤息謂變化不行本義向論衣敝緼袍緼是綿絮胎今看此緼字正是如此取義易是包著此理乾坤即是易之體骨耳乾坤成列便是乾一兊二離三震四巽五坎六艮七坤八都成列了其變易方立其中若只是一陽一陽則未有變易在又曰有這卦則有變易無這卦便無這易了又曰易有太極則以易為主此一假文意則以乾坤為主乾坤成則易立乎其中矣乾坤只是説二卦此易只是説易之書與天地定位易行乎其中之易不同行乎其中者却是説易之道理問天地設位而易行乎其中乾坤成列而易立乎其中如易行乎其中此固易曉至如易立乎其中豈非乾坤既成列之後道體始有所寓而形見其立也有似如有所立卓爾之立乎曰大抵易之言乾坤者多以卦言易立乎其中只是乾坤之卦既成而易立矣況所謂如有所立卓爾亦只是不可及之意後世之論多是説得太髙不必如此説乾坤毁則無以見易此乾坤只言卦易只是隂陽卦畫沒這幾箇卦畫憑箇甚寫出那隂陽造化何處更得易來這只是反覆説易不可見則乾坤或幾乎息矣只是説揲蓍求卦更推不去説做造化之理息也得不若前説較平並語録自易道統體而言則乾陽坤隂一動一靜乃其緼也自乾坤成列而觀之則易之為道又不在乾坤之外惟不在外故曰乾坤毁則無以見易然易不可見則乾自乾坤自坤故又曰易不可見則乾坤或幾乎息矣答張敬夫書是故形而上者謂之道形而下者謂之器化而裁之謂之變推而行之謂之通舉而錯之天下之民謂之事業明道先生曰如形而上者謂之道不可移謂字在之字下此孔子文章朱公掞問學拾遺灑掃應對便是形而上者理無大小故也故君子只在愼獨佛氏不識隂陽晝夜死生古今安得謂形而上者與聖人同乎並劉絢所録形而上為道形而下為器須著如此説器亦道道亦器但得道在不繫今與後己與人李籲師訓氣形而下者謝顯道記平日語形而上者之謂道形而下者之謂器若如或者以清虛一大為天道則乃以器言而非道也有形皆器也無形為道繫辭曰形而上者謂之道形而下者謂之器又曰立天之道曰隂與陽立地之道曰柔與剛立人之道曰仁與義又曰一隂一陽之謂道隂陽亦形而下者也而曰道者惟此語截得上下最分明元來只此是道要在人默而識之也並劉絢師訓橫渠先生曰一隂一陽不可以形器拘故謂之道乾坤成列而下皆易之器乾坤交變因約裁其變而别之故謂之變推而行其變盡利而不遺遺一作匱可謂通矣舉盡利之道而錯諸天下之民以行其典禮易之事業也運於無形之謂道形而下者不足以言之形而上是無形體者也故形以上者謂之道也形而下是有形體者也故形以下者謂之器無形迹者即道也如大德敦化是也有形迹者即器也見於事實如禮義是也凡自形以上者皆謂之道惟是有無相接與形不形處知之為難須知氣從此首蓋為氣能一有無無則氣自然生是道也是易也約裁其化而指别之則名體各殊故謂之變聖人因天地之化裁節而立法使民知寒暑之變故謂之春夏秋冬亦化而裁之一端耳並易説變則化由粗入精也化而裁之謂之變以著顯微也谷神不死故能微顯而不掩正蒙廣漢張氏曰道不離形特形而上者也器異於道以形而下者也試以天地論之隂陽者形而上者也至於穹窿磅礴者乃形而下者歟離形以求道則失之恍惚不可為象此老莊所謂道也非易之所謂道也易之論道器特以一形上下而言之也然道雖非器禮樂刑賞是治天下之道也禮雖非玉帛而禮不可以虛拘樂雖非鐘鼓而樂不可以徒作刑本遏惡也必託於甲兵必寓於鞭撲賞本揚善也必表之以旗裳必銘之於鐘鼎是故形而上者之道託於器而後行形而下者之器得其道而無弊聖人悟易於心覺易於性在道不泥於無在器不墮於有微妙並觀有無一致故化而裁之者明乎道器窮而能變也推而行之者察乎道器變而能通也舉而措之天下之民以至於為網罟為耒耜作舟車作書契天下後世不可無萬世不可易乃推其道器舉而措之天下而世之人指之為事業也易説五峯胡氏曰形而上者謂之道形而下者謂之器更曽細觀語録入思慮否隂陽亦形而下者此語如何理趣須是自通貫隨人言語不可也某見侯先生説此句信以為是更不致思前日頓省猶未是也經可易讀乎如尹先生語解亦未可輕易恐髙明之人有蚍蜉撼大樹之笑也如何與彪美書白雲郭氏曰道無形故言形而上器有形故言形而下形而上者杳然而難知形而下者炳然而易見其不同如是其為變通則一也化而裁之謂如一闔一闢不執一也推而行之謂可運行無窮也如是則可以舉而措之天下矣前言乾坤變通自言易道之變通也此言道器變通言聖人用易道之變通也曰化而裁之推而行之聖人之事也下言象爻卦辭言易書之中象爻卦辭各有變通也其化而裁之推而行之言用易之象爻卦辭亦存乎聖人之變通也且大而天地細而萬物物物各具變通之理天地不變通則不能長且久人與萬物不變通則死矣故舉人而言之朝而作闢之道也暮而息闔之道也一作一息變也與日無窮通也苟朝而不能作暮而不能息非死則病矣然則聖人尚象制器制法以利天下不知變通之道其可乎故包犧神農黃帝堯舜之王天下所以大過人者無他焉能通其變而已是以聖人以此洗心不敢自用其私智也易説漢上朱氏曰乾健也坤順也健順者意也謂之乾坤者名也乾竒坤偶者象也象成而著者形也形而上者謂之道變通也形而下者謂之器執方也然則變通者易之道執方者易之器是故語道而至於不可象則名言亡矣變通一也離而言之則二今天地之化一息不留聖人指而裁之則謂之變故晝夜六時寒暑六氣剛柔六位因其化而裁之以著其變之微故曰化而裁之謂之變晝夜相推為一日寒暑相推為一嵗剛柔相推為一卦推之則通故曰推而行之謂之通故曰剛柔相推變在其中矣知此則知變通一也舉此道而措之于天下謂之事業又曰通變之謂事知此則知事業通變一也易傳新安朱氏曰卦爻隂陽皆形而下者其理則道也因其自然之化而裁制之變之義也變通二字上章以天言此章以人言本義形是這形質以上便為道以下便為器這箇分別得最親切故明道云惟此語截得上下最分明又曰形以上底虛渾是道理形以下底實便是器問形而上下如何以形言曰此言最的當設若以有形無形言之便是物與理相間斷了所以謂截得分明者只是上下之間分別得一箇界止分明器亦道道亦器有分別而不相離也道是道理事事物物皆有箇道理器是形迹事事物物亦皆有箇形迹有道須有器有器須有道物必有則形而上謂道形而下謂器這箇在人看始得指器為道固不得離器于道亦不得且如此火是器自有道在裏形而上者指理而言形而下者指事物而言事物可見而其理難知即事即物便要見得此理只是如此看但要真實於事物上見得這箇道理然後於己有益為人君止於仁為人子止於孝必須就君臣父子上見得此理大學之道不曰窮理而謂之格物只是使人就實處窮竟事事物物上有許多道理窮之不可不盡也問如何分形器曰形而上者是理才有作用便是形而下者問隂陽如何是形而下者曰一物便有隂陽寒暖生殺皆見得是形而下者事物雖大皆形而下者堯舜之事業是也理雖小皆形而上者問形而上者謂之道一假只是這一箇道理但即形器之本體而離乎形器則謂之道就形器而言則謂之器聖人因其自然化而裁之則謂之變推而行之則謂之通舉而措之則謂之事業裁也行也措也都只是裁行措這箇道曰是化而裁之化是因其自然而化裁是人為變是變了他且如一年三百六十日須待一日日漸次進去到那滿時這便是化自春而夏夏而秋秋而冬聖人去這裏截做四時這便是變化不是一日內便頓然恁地底事人之進德亦如此三十而立不是到那三十時便立須從十五志學漸漸化去方到橫渠去這裏説做化而裁之便是這意柔變而趨於剛剛變而趨于柔與這箇意思也只一般自隂來做陽其勢寖長便覺突兀有頭面自陽去做隂這只是漸漸消化去這變化之義亦與鬼神屈伸意相似變化二者不同化是漸化如自子至亥漸漸消化以至於無如自今日至來日則謂之變變是頓斷有可見處橫渠説化而裁之一段好橫渠説化而裁之謂之變一句説得好不知本義中有否曰無但尋常看此一句只如自初九之潛而為九二之見這便是化就他化處截斷便是變曰然化是箇亹亹地去有漸底意思且如而今天氣漸漸地涼將去到得立秋便截斷這已後是秋便是變問如此則裁之乃人事也曰然並語録大傳既曰形而上者謂之道矣而又曰一隂一陽之謂道此豈真以隂陽為形而上者哉正所以見一隂一陽雖屬形器然其所以一隂而一陽者是乃道體之所為也故語道體之至極則謂之太極語太極之流行則謂之道雖有二名初無兩體周子所以謂之無極正以其無方所無形狀以為在無物之前而未嘗不立於有物之後以為在隂陽之外而未嘗不行乎隂陽之中以為通貫全體無乎不在則又初無聲臭影響之可言也今乃深詆無極之不然則是直以太極為有形狀有方所矣直以隂陽為形而上者則又昧於道器之分矣又於形而上者之上復有況太極乎之語則是又以道上別有一物為太極矣此又理有未明而不能盡乎人言之意者四也若以隂陽為形而上者則形而下者復是何物更請見教若愚見與其所聞則曰凡有形有象者皆器也其所以為是器之理者則道也如是則來書所謂始終晦明竒偶之屬皆隂陽所為之器獨其所以為是器之理如目之明耳之聰父之慈子之孝乃為道耳如此分別似差明白不知尊意以為何如並答陸子靜書是故夫象聖人有以見天下之賾而擬諸其形容象其物宜是故謂之象聖人有以見天下之動而觀其會通以行其典禮繫辭焉以斷其吉凶是故謂之爻極天下之賾者存乎卦鼓天下之動者存乎辭化而裁之存乎變推而行之存乎通神而明之存乎其人默而成之不言而信存乎德行濓溪先生曰聖人之道入乎耳存乎心藴之為德行行之為事業彼以文辭而已者陋矣通書明道先生曰易因爻象論變化因變化論神固神論人因人論德行大體通論易道而終于默而成之不言而信存乎德行大全集拾遺佛有一箇覺之理可以敬以直內矣然無義以方外其直內者要之其本亦不是譬之贊易前後貫穿却説得是有此道理然須默而成之不言而信存乎德行處是所謂自得也吕與叔東見録伊川先生曰學者要得不錯須是學顔子學顔子便有準的參也魯竟以魯得之默而識之不言而信存乎德行也謝顯道録子貢之智亞於顔子知至而未至之者也劉絢師訓或問繫辭自天道言中庸自人事言似不同曰同繫辭雖始從天地隂陽鬼神言之然卒曰默而成之不言而信存乎德行中庸亦曰鬼神之為德其盛矣乎視之而不見聽之而不聞體物而不可遺使天下之人齊明盛服以承祭祀洋洋乎如在其上如在其左右詩曰神之格思不可度思矧可射思夫微之顯誠之不可掩如此夫是豈不同劉絢所録橫渠先生曰化而裁之存乎變存四時之變則周嵗之化可裁存晝夜之變則百刻之化可裁推而行之存乎通推四時而行則能存周嵗之通推晝夜而行則能存百刻之通上天之載無聲臭可象惟儀形文王當冥契天德而萬邦信説故易曰神而明之存乎其人不知上天之載當存文王默而成之存乎德行學者常存德性則自然默成而信矣神而明之存乎其人道至有難明處而能明之此則在人也凡言神亦必待形然後著不得形神何以見神而明之存乎其人然則亦須待人而後能明乎神並易説天下之動神鼓之也辭不鼓舞則不足以盡神易謂不言而信存乎德行又以尚辭為聖人之道非知德逹乎是哉並正蒙觀其會通以行其典禮此方是真義理也行其典禮而不逹會通則有非時中者矣今學者則須是執禮蓋禮亦自是會通制之者語録廣平遊氏曰非思非慮非視非聽了然遺照而獨存者神而明之之謂也神存而明之非有心之所能知也此道之所以明無處無出無從無違確乎其能事者默而成之之謂也性成而成之非有為之所能得也此道之所以行易説龜山楊氏曰子貢能言者也而天下之理有言之不能喻者故子曰豫欲無言以發之易曰默而成之不言而信存乎德行記曰天道至教聖人至德其斯之謂乎語解廣漢張氏曰聖人見天下之賾所以立象者示人以賾也聖人見天下之動所以生爻者示人以動也然象固示人以賾矣茍不寓之於卦何以極天下之賾乎爻固示人以動矣茍不託之於辭何以鼓天下之動乎故由象而畫卦自爻而為辭聖人之於天下何其憂之甚深而慮之甚切也然象之與卦爻之與辭皆載在方册化而裁之不失其中必存乎能通其變者乎推而行之無有紀極必存乎能變而通者乎神而明之傳之於心者存乎其人如伏羲神農堯舜文王周孔者是也默而成之悟之於理者不言而信存乎德行如文王之亨于岐山箕子之明夷利貞顔子之殆庶幾而得其不逺復孟子之明仁義而終身未嘗言者是也大傳後世所傳聖人之言其終之以神而明之存乎其人默而成之不言而信存乎德行深慮天下後世徒泥其簡册言語而不能求聖人之心者乎易説白雲郭氏曰象爻卦辭易之書也化而裁之推而行之神而明之默而成之皆聖人用易也易之道知之則可用故直曰謂之變謂之通易之書擬議而後可用故言存乎變存乎通雖存乎此不思則不得其道觀夫子之辭自繫辭首章以及于此莫不以用易之道終之以是知易之為書用道之書也然易道廣大以言乎天地之間無不備故聖人修身齊家治國乎天下皆可取而用之以成日新之德冨有之業又何必焦心勞思任一已之獨智而後可以有為于天下乎夫是之謂洗心易説漢上朱氏曰聖人見天下之至賾將以示人故擬諸其形容象其人物之宜形一定也剛柔以立本也容變動也變通以趨時也是故謂之象立象則卦也變通在其中矣聖人見天下之至動既觀其會通之時損益典禮以行之矣又繫之辭以斷其疑曰如是而吉如是而凶是故謂之爻繫辭則變通在其中矣然則體易者欲極天下之至賾者存乎卦可也存乎卦則見象矣欲鼓天下之至動者存乎辭可也存乎辭則見變通矣化而裁之其化有漸存乎爻之變可也推而行之其利不窮存乎爻之通可也神而藏用明而顯仁存乎古之人可也革存乎湯武明夷存乎文王箕子復存乎顔氏之子故曰存乎其人默而成之言不下帶而道存者以心感心也存諸已也故曰不言而信存乎德行易至於存乎德行則得意忘象我與聖人一也上繫終於默而成之不言而信下繫終於六辭語默一也易傳新安朱氏曰卦即象也辭即爻也卦爻所以變通者在人人之所以能神而明之者在德本義問化而裁之謂之變又云存乎變是如何曰上文化而裁之便喚做變下文是説變處見得化而裁之如自初一至三十日便是化到這三十日裁斷做一月明日便屬後月便是變此便是化而裁之到這處方見得裁是裁截之義謂如一嵗裁為四時一時裁為三月一月裁為三十日一日裁為十二時此是變也又如隂陽兩爻自此之彼自彼之此若不截斷則豈有定體通是通其變將已裁定者而推行之即是通謂如占得乾之履便是九三乾乾不息則是我所行者以此而措之于民則謂之事業也化皆以漸而化不見其化之之迹化而裁之方是分下頭項推而行之便是見於事如堯典分命羲和許多事便是化而裁之到敬授人時便是推而行之問易中多言變通通字之意如何曰處得恰好處便是通問往來不窮謂之通如何曰處得好便不窮通便不窮不通便窮問推而行之謂之通如何曰推而行之便就這上行將去且如亢龍有悔是不通了處得來無悔便是通變是就時就事上説通是就上面處得行處説故曰通其變只要常教流通不窮問如貧賤冨貴夷狄患難這是變行乎冨貴行乎貧賤行乎夷狄行乎患難至于無入而不自得便是通否曰然並語録右第十二章合訂刪補大易集義粹言卷七十五
