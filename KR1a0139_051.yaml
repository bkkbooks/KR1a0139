body:
  text: 合訂刪補大易集義粹言卷四十九頭等侍衛納喇性德編坤下兌上伊川先生曰萃序卦姤者遇也物相遇而後聚故受之以萃萃者聚也物相會遇則成羣萃所以次姤也為卦兌上坤下澤上於地水之聚也故為萃不言澤在地上而云澤上於地言上於地則為方聚之義也易傳橫渠先生曰與渙卦義同故繇辭互見易説萃亨王假有廟利見大人亨利貞用大牲吉利有攸往明道先生曰萃渙皆享于帝立廟因精神之聚而形於此為其渙散故立此以收之謝顯道録古者祭祀用尸極有深意不可不深思蓋人之魂氣既散孝子求神而祭無尸則不享無主則不依故易於渙萃皆言王假有廟即渙散之時事也魂氣必求其類而依之人與人既為類骨肉又為一家之類已與尸各既已潔齊至誠相通以此求神宜其饗之李籲師説伊川先生曰王者萃聚天下之道至於有廟極一無極字也羣生至衆也而可一其歸仰人心莫知其鄉也而能致其誠敬鬼神之不可度也而能致其來格天下萃合人心總攝衆志之道非一其至大莫過於宗廟故王者萃天下之道至於有廟則萃道之至也祭祀之報本於人心聖人制禮以成其德耳故豺獺能祭其性然也萃下有亨字羡文也亨字自在下與渙不同渙則先言卦才萃則先言卦義彖辭甚明天下之聚必得大人以治之人聚則亂物聚則爭事聚則紊非大人治之則萃所以致爭亂也萃以不正則人聚為茍合財聚為悖入安得亨乎故利貞萃者豐厚之時也其用宜稱故用大牲吉事莫重於祭故以祭享而言上交鬼神下接民物百用莫不皆一作當然當萃之時而交物以厚則是享豐富之吉也天下莫不同其富樂矣若時之一無之字厚而交物以薄乃不享其豐美天下莫之與而悔吝生矣蓋隨時之宜順理而行故彖云順天命也夫不能有為者力之不足也當萃之時故利有攸往大凡興功立事貴得可為之時萃而後用是以動而有裕天理然也並易傳橫渠先生曰萃而不見大人之德吝道也易説上蔡謝氏曰或問先生祭享鬼神則甚曰是他意思别三日齊五日戒求諸隂陽四方上下蓋是要集自家精神所以假有廟必於萃與渙言之如武王伐商所過名山大川致禱山川何知武王禱之者以此雖然如是以為有亦不可以為無亦不可這裏有妙理於若有若無之間須斷置得去始得曰如此却是鶻突也曰不是鶻突自家要有便有自家要無便無始得鬼神在虛空中辟塞滿觸目皆是為他是天地間妙用祖考精神便是自家精神語録白雲郭氏曰萃聚之世既庶既富之時也故萃有亨之道孔子曰既富矣又何加焉曰教之故聖人設教必於富庶之後而設教之道莫先於孝享以為天下先故觀之神道設教亦必以盥而不薦為首與萃之時王假有廟致孝享之意同利見大人亨者天地萬物萃聚之時主之者不得其道則亂由以生故非見大人則萃不能亨也大人為道之大足以容民畜衆者也所以利見大人者利貞故也正故能亨不正則不亨矣始言萃亨王假有廟統言之也自利見大人之下詳言其事也見大人則正正則得主萃之道故天下可以用大牲而致孝享因萃之盛足以有為是以利有攸往矣由是觀之萃非大人適所以致亂也故卦辭先言萃有亨之道而後言見大人則亨也易説新安朱氏曰萃聚也坤順兌説九五剛中而二應之又為澤上於地萬物萃聚之象故為萃亨字衍文王假有廟言王者可以至乎宗廟之中王者卜祭之吉占也祭義曰公假於太廟是也廟所以聚祖考之精神又人必能聚己之精神則可以至於廟而承祖考也物既聚則必見大人而後可以得亨然又必利於正所聚不正則亦不能亨也大牲必聚而後有聚則可以有所往皆占吉而有戒之辭本義王假有廟是祖考精神聚於廟又為人必能聚己之精神然後可以至於廟而承祖考今人擇日祀神多取神在日亦取聚意也語録彖曰萃聚也順以説剛中而應故聚也王假有廟致孝享也利見大人亨聚以正也用大牲吉利有攸往順天命也觀其所聚而天地萬物之情可見矣伊川先生曰萃之義聚也順以一作而説以卦才言也上説而下順為上以説道使民而順於人心下説上之政令而順從於上既上下順説又陽剛處中正之位而下有應助如此故能聚也欲天下之萃才非如是不能也王者萃人心之道至於建立宗廟所以致其孝享之誠也祭祀人心之所自盡也故萃天下之心者無如孝享王者萃天下之道至於有廟則其極也萃之時見大人則能亨蓋聚以正道也見大人則其聚以正道得其正則亨矣萃不以正其能亨乎用大牲承上有廟之文以享祀而言凡事莫不如是豐聚之時交於物者當厚稱其宜也物聚而力贍乃可以有為故利有攸往皆天理然也故云順天命也觀萃之理可以見天地萬物之情也天地之化育萬物之生成凡有者皆聚也有無動靜終始之理聚散而已故觀其所以聚則天地萬物之情可見矣並易傳橫渠先生曰聚而致享必有廟乃盡其實聚不以正私邪勝也富聚之世順天之命用大牲有所進為宜散而通之順天命而不凝一作疑於物也並易説藍田吕氏曰萃而得其所主也己之所聚則庶事備庶事備而後道可通故曰萃亨天下以大聚不知其本則陵慢爭奪之禍生王者治天下之大聚所生者有本焉順以説知所以報其本剛中而應知所以正其本親者類之本故王假有廟致孝享以報本也有德有位者治之本故利見大人亨利貞立名分以正本也天者生之本故用大牲吉順天命以報本也白雲郭氏曰其道不順其情不説則無萃聚之理剛中而應九五也萃之主也非剛則不能為衆聚之主非中則不可為主茍無其應又不能為之主也是以順以説為物聚之理剛中而應為能聚之道致孝享者嘉會之時理在所先也萃之致孝享亦以身化天下也聚以正者見大人則聚以正道非大人則聚以不正之道故大人所以為時利見也用大牲吉利有攸往者因時而可有為也時則所謂天命也當可為而為所以順天命也然天地萬物之情所以聚者不過順説而已其道不順則無由以聚其情不説則不能聚矣故天地萬物之情既不過順説是以彖言可見也易説漢上朱氏曰坤順兌説也上順民心以説之民亦順上以説其政令上下皆順以説上以是聚下以是從此合二體而言萃也九五剛得位以剛中為萃之主下有六二柔中之臣應之君臣聚會以聚天下此合二五而言萃也具是四者然後能聚不然民不可得而聚矣故曰萃聚也順以説剛中而應故聚也萃自臨來小過三之五艮為門闕巽為髙上為宗廟四本震爻長子也三自門闕升高至宗廟有長子奉祀之象民之所聚必建邦設都宗廟為先宫室次之王者萃天下之道至於有廟則萃道至矣假至也謂五也王格祖考則諸侯大夫士各致其孝報本反始教民不忘其親易傳曰萃合人心總攝衆志之道非一其至大莫過宗廟故曰王假有廟致孝享也此以九五言萃之道也天下既聚未見大人其聚未必正凡有血氣必有爭心萃不以正適所以致爭奪安得亨乎九五示之以大人之德六二以正而往聚之則人倫正民志定物情相交而亨九六聚成離離目為見故曰利見大人亨利貞聚以正也此以九五六二相易而言萃之道也聖人隨時而已萃聚之世物之所聚者大故所用不可不大用大牲則鬼神福之禮以時為大坤為牛兌為刑殺殺牛以奉宗廟用大牲也物聚則力贍動而有成何往不利哉謂三之五也舉宗廟之禮則百禮無不洽矣所謂隨時者順天理而行天理即天命也巽為命故曰用大牲吉利有攸往順天命也此以九三之五言萃之道也天地之氣聚而有物散而無形散者必聚鬼神耗荒至幽也而各享其類萬物散殊至衆也而各從其類故曰觀其所聚而天地萬物之情可見矣此以小過九三萃於上六五萃於下推廣萃之義也在卦氣為八月故太玄準之以聚易傳新安朱氏曰萃聚也以卦德卦體釋卦名義王假有廟至順天命釋卦辭天地萬物之情可見極言其理而贊之本義大率人之精神萃於己祖考之精神萃於廟順天命説道理時倣佛如伊川説也去得只是文𫝑不如此它是説豐萃之時若不用大牲則便是與以天下儉其親相似也有此理這時節比不得那利用禴之事他這彖辭散漫説説了王假有廟又説利見大人又説用大牲吉大率是聖人觀象節節地看見許多道理看到這理見有這箇象便説出這一句來又看見那箇象又説出那一箇理來然而觀象則今不可得見是如何地觀矣問萃言王假有廟是卦中有萃聚之象故可以為聚祖考之精神而為享祭之吉占渙卦既散而不聚則本象何由亦有立廟之義將是卦外立義謂渙散之時當聚祖考之精神邪為復是下卦是坎有幽隱之義因此象而設立廟之義邪先生曰坎固是有鬼神之義然渙卦未必是因此為義今且作因渙散而立廟説大抵似這處都見不得並語録東萊吕氏曰敬德之聚無如王假有廟利有攸往不可以久聚也順天命時當爾也順以説剛中而應治道當寬也觀其所聚而天地萬物之情可見矣天地所以無窮以其聚散也凡物之聚最可觀衆人之觀如觀士於庠序觀商於市㕓觀農於畎畝觀山野則知鳥獸之所聚觀河海則知魚龍之所聚固皆能觀物之聚矣而不能觀其所以聚則天地萬物之情未必可見也伊川曰凡有者皆聚也有無動靜終始之理聚散而已學者能玩味此語則太極之妙可以默喻且以老子論之老子之論有無曰無名天地之始有名萬物之母此所謂有無也至於其所以有所以無豈能知之學者當觀此易説象曰澤上於地萃君子以除戎器戒不虞伊川先生曰澤上於地為萃聚之象君子觀萃象以除治戎器用戒備於不虞凡物之萃則有不虞度之事故衆聚則有爭物聚則有奪大率既聚則必多故矣故觀萃象而戒也除謂簡治也去弊惡也除而聚之所以戒不虞也易傳藍田吕氏曰澤上於地則物物蒙潤旱乾所不能害有豫備不虞之象白雲郭氏曰澤上於地萃之象也然天下之理順極者必逆説極者必怨聚極者必散乖爭陵犯莫不由此以生所以萃之時君子豫為之防除戎器而戒不虞也除謂除弊惡而新之易説漢上朱氏曰萃自小過變澤上於地萬物萃聚之時虞翻謂三四之正小過明夷變也明夷離為甲胄戈兵坎為弓變小過巽為繩為工艮為石巽納辛繕甲兵修弓矢去弊惡而新之象也小過變萃聚所除之器也明夷坎為冦兌為口上六既安之時聚以相告銷冦於未形戒不虞也萃則多故君子過為之防是以萃而無患非用明於至微者不能也故此象以三卦明之原始要終以遏禍亂聖人之憂患後世深矣乎秦銷鋒鏑唐銷兵卒至大亂豈知戒不虞哉易傳新安朱氏曰除者修而聚之之謂本義問澤上於地萃君子以除戎器戒不虞曰大凡物聚衆盛處必有爭故當豫為之備又澤本當在地中今却上出於地上則是水盛長有潰決奔突之憂故取象如此語録東萊吕氏曰聚而無防則衆生心王注説好易説初六有孚不終乃亂乃萃若號一握為笑勿恤往無咎象曰乃亂乃萃其志亂也伊川先生曰初與四為正應本有孚以相從者也然當萃時三隂聚處柔無守正之節若舍正應而從其類乃有孚而不終也乃亂惑亂其心也乃萃與其同類聚也初若守正不從號呼以求正應則一握笑之矣一握俗語一團也謂衆一有聚字以為笑也若能勿恤而往從剛陽之正應則無過咎不然則入小人之羣矣其心志為同類所惑亂故乃萃於羣隂也不能固其守則為小人所惑亂而失其正矣並易傳橫渠先生曰萃聚之世物各以近相求所處逺者雖有其應不能專一初六履不以中萃而志亂故為衆輕侮若能啼號齎咨專一其守不恤衆侮則往而無咎易説藍田吕氏曰居萃之時與應者為聚初六與九四應宜其見信而得聚而六三間之四之所以交於初者或信或否故有孚不終初不得其聚而志亂則或聚或散故乃亂乃萃四既不信初既志亂或信或否或聚或散則或悲或懼故若號一握為笑號號哭也一握為笑握手相歡笑也正不可奪久必信之故勿恤往無咎白雲郭氏曰初與四為正應誠信之應也而初六舍應從類不終其道乃惑亂相聚非聚以正之道也雖有一握為笑之暫何可長也故必勿恤其類往從正應以終有孚則無咎矣何以知初六之不終蓋隂柔不能有立當萃之時見其類則必聚今二隂在上故知其舍應從類也其志亂者其志惑於其類而失應故云亂也易説漢上朱氏曰初六柔不中正進則疑六三之間已退不能專一以待應乃亂者退而亂於三隂之中乃萃者欲進而與四相萃也其志惑亂不決是以有孚不終故曰乃亂乃萃象曰其志亂也初應四巽為進退故也若號謂四也兌為口巽為號若四在上號召之三隂不正惡初之往合於四一握其手笑以喻意微動之也艮為手三往易四一握手也兌為口為説離喜説動而出聲笑也為笑者獻笑也巽為工有造為之象故曰一握為笑萃聚之世上下相求以隂從陽動而得正何恤乎小人之笑而不往哉往而相應何咎之有否則與小人為徒非萃之正也故曰勿恤往無咎自古不知堅守其節從應以動舍君子之正義畏小人之非笑相率陷於非義皆不知萃之道易傳新安朱氏曰初六上應九四而隔於二隂當萃之時不能自守是有孚而不終志亂而妄聚也若呼號正應則衆以為笑但勿恤而往從正應則無咎矣戒占者當如是也本義六二引吉無咎孚乃利用禴象曰引吉無咎中未變也伊川先生曰初隂柔又非中正恐不能終其孚故因其才而為之戒二雖隂柔而得中正故雖戒而微辭一作其辭微凡爻之辭關得失二端者為法為戒亦各隨其才而設也引吉無咎引者相牽也人之交相求則合相待一作持則離二與五為正應當萃者也而相逺又在羣隂之間必相牽引則得其萃矣五居尊位有中正之德二亦以中正之道往與之萃乃君臣和合也其所共致豈可量也是以吉而無咎也無咎者善補過也二與五不相引則過矣孚乃利用禴孚信之在中誠之謂也禴祭之簡薄者也菲薄而祭不尚備物直以誠意交於神明也孚乃者謂有其一作其有孚則可不用文飾專以至誠交於上一有下字也以禴言者謂薦其誠而已上下相聚而尚飾焉是未誠也蓋其中實者不假飾於外用禴之義也孚信者萃之本也不獨君臣之聚凡天下之聚在誠而已萃之時以得聚為吉故九四為得上下之萃二與五雖正應然異處有間乃當萃而未合者也故能相引而萃則吉而無咎以其有中正之德未遽至改變也變則不相引矣或曰二既有中正之德而象云未變辭若不足何也曰羣隂比處乃其類聚方萃之時居其間能自守不變逺須正應剛立者能之二隂柔之才以其有中正之德可覬其未至於變耳故象含其意以存戒也並易傳橫渠先生曰物思其萃之時能自持不變引而後往吉乃無咎凡言利用禴皆誠素著白於幽明之際未孚而略禮則神怒而民怨易説藍田吕氏曰六二居純柔之中不變淳一寡欲雖與五應俟引之而後往若有失時之咎不失守正之義故吉無咎當聚之時不求所聚所用約矣如見信於四雖約亦亨故孚乃利用禴禴薄祭也白雲郭氏曰二雖隂柔而有中正之德猶牽於羣類不能自逹必九五引而後應以見柔之不能盡萃聚之道也應而得吉吉乃無咎無咎則得聚之道矣得聚之道則既庶既富是以可薦誠而用禴也禴祭簡薄以誠為主茍誠不至則不可以禴故以孚先之中未變者柔道好從而易變如初六改應從類是也二之所以引吉蓋以得中故未變也二以用禴故知得萃之道初之乃亂乃萃知其失矣易説漢上朱氏曰萃聚之時初三同體之隂皆萃於四已於其間得位守中不變其志須五牽引之而後應不急於萃者也然隂從陽靜而待唱引而後往其聚也有吉無咎矣巽為繩艮手持繩相應引也故曰引吉無咎象曰引吉無咎中未變也不變之中有孚相應孚者萃之本其誠素著不假外飾譬之祭也精意承之雖薄可以薦也禴夏祭以聲為主祭之薄者上六宗廟六二與五相易離為夏五本小過震震為聲為長子有長子用禴祭之象故曰孚乃利用禴夫君臣以道相感精迎誠致不言而動蛟潛於淵陵卵自化至於既孚二五相易乃利用禴矣易傳曰萃之時能自守不變逺須正應剛立者能之二隂柔之才以其有中正之德猶冀其未至於變耳故象含其意以存戒也易傳新安朱氏曰二應五而雜於二隂之間必牽引以萃乃吉而無咎又二中正柔順虛中以上應五剛健中正誠實而下交故卜祭者有其孚誠則雖薄物亦可以祭矣本義孚乃利用禴説如伊川固好但若如此却是聖人説箇影子却恐不恁地想只是説祭升卦同語録六三萃如嗟如無攸利往無咎小吝象曰往無咎上巽也伊川先生曰三隂柔不中正之人也求萃於人而人莫與求四則非其正應又非其類是以不正為四所棄也與二則二自以中正應五是以不正為二所不與也故欲一無欲字萃如則為人棄絶而嗟如不獲萃而嗟恨也上下皆不與無所利也唯往而從上六則得其萃為無咎也三與上雖非隂陽正應然萃之時以類相從皆以柔居一體之上又皆無與居相應之地上復處説順之極故得其萃而無咎也易道變動無常在人識之然而小吝何也三始求萃於四與二不獲而後往從上六人之動為如此雖得所求亦可小羞吝也上居柔説之極三往而無咎者上六巽順而受之也並易傳白雲郭氏曰三以其類在下常失所聚故有嗟如之嘆無應無類何所利乎然與其上無應而下失初二不若往從上六雖非正應而萃之時或復以同類而可聚也是以無咎然求之非其道能無吝乎上巽者以上六有柔巽之德故有可往而從之之理也易説漢上朱氏曰六三履非其位欲萃於四四應初欲萃於二二應五莫知所萃故萃如巽為號兌為口嗟也故嗟如上下不與雖嗟之無所利故無攸利上六無與據高慮危孤立求助六三動而往則正正則無咎然三欲萃於四二之間故小吝隂為小三往從上上來應三成巽巽則不亢三宜往而萃也小吝過矣易傳新安朱氏曰六三隂柔不中不正上無應與欲求萃於近而不得故嗟如而無所利唯往從於上可以無咎然不得其萃困然後往復得隂極無位之爻亦可小羞矣戒占者當近舍不正之強援而逺結正應之窮交則無咎也本義九四大吉無咎象曰大吉無咎位不當也伊川先生曰四當萃之時上比九五之君得君臣之聚也下比下體羣隂得下民之聚也得上下之聚可謂善矣然四以陽居隂非正也雖得上下之聚必得大吉然後為無咎也大為周遍之義無所不周然後為大無所不正則為大吉大吉則無咎也一作矣夫上下之聚固有不由正道而得者非理枉道而得君者自古多矣非理枉道而得民者蓋亦有焉如齊之陳恆魯之季氏是也然得為大吉乎得為無咎乎故九四必能大吉然後為一作能無咎也以其位之不當疑其所為未能盡善故云必得大吉然後為一作能無咎也非盡善安得為大吉乎並易傳橫渠先生曰位非極顯而有物之萃非大吉則悔吝必矣易説白雲郭氏曰九四之言大吉無咎道之至美者也而注釋之家皆反其意未以為美故伊川亦以象言位不當疑其所為未能盡善故云必得大吉然後無咎也且以卦爻觀之萃之六爻獨有二陽下皆有應四又上比於君得其所聚莫吉於斯故言大吉無咎也位不當者四得上下之聚有大君之象而位非君位不充其德故言不當也以萃聚而得吉之大固其所宜而又曰無咎者以臣而有君聚之象其位不當疑於有咎故也萃之成卦在九四故為萃之主與豫之九四同易説漢上朱氏曰九四上比於五君臣聚也下據三隂民所聚也然其所處位不當疑於上下之聚理有未正九四動則得正上承於五下納三隂上下皆正是謂大吉大吉則無不當位之咎陽為大大者吉也易傳曰非理枉道而得君得民者蓋亦有焉齊之陳恆魯之季氏是也得為大吉乎得為無咎乎易傳新安朱氏曰上比九五下比衆隂得其萃矣然以陽居隂不正故戒占者必大吉然後得無咎也本義東萊吕氏曰九四上比九五下比羣隂是得上下之萃者也以臣居多懼之地故必大吉然後無咎易説九五萃有位無咎匪孚元永貞悔亡象曰萃有位志未光也伊川先生曰九五居天下之尊萃天下之衆而君臨之當正其位修其德以陽剛居尊位稱其位矣為有其位矣一作也得中正之道無過咎也如是而有不信而未歸者則當自反以修其元永貞之德則無思不服而悔亡矣元永貞者君之德民所歸也故比天下之道與萃天下之道皆在此三者王者既有其位又有其德中正無過咎而天下尚有未信服歸附者蓋其道未光大也元永貞之道未至也在修德以來之如苗民逆命帝乃誕敷文德舜德非不至也蓋有逺近昏明之異故其歸有先後既有未歸則當修德也所謂德元永貞之道也元首也長也為君德首出庶物君長羣生有尊大之義焉有主統之義焉而又恆永貞固則通於神明光於四海無思不服矣乃無匪孚而其悔亡也所謂悔志之未光心之未慊也象舉爻上句王者之志必欲誠信著於天下有感必通含生之類莫不懷歸若尚有匪孚是其志之未光大也並易傳橫渠先生曰居得盛位不能見以大人之德係應於二故曰有位履非不正故無咎然非君人之大信為德非厚不能無悔故元永貞而後侮亡易説藍田吕氏曰九五雖以剛居尊而下之三隂來萃為四所有貴而無民僅有位號以保無咎而已未足光也既不見信於下物莫之助若與四爭其悔可必唯守夫元永貞之德則悔可亡也白雲郭氏曰居萃之時得位之當者九五而已然有其位斯有其事主天下之萃則其事也能充其道故為大人不能充其道則僅有其位無過亦幸矣湯之克寬克仁彰信兆民豈有位無咎而已哉故九五為匪孚也匪孚者未能大信於天下也不能信於天下則將有悔矣唯元永貞可以無悔元者盡君長之道也永可久也貞正也得位而孚充是三者之道則大君之能事畢矣湯文是也得位而匪孚未能信於天下故特悔亡而已此象所以言志未光也九五宜能充其道而爻象弗與何哉蓋九四下比羣隂非其位而有其道矣萃聚之權獨在九四凡以九五未能孚於天下故也此爻辭弗與之義也必曰萃有位又見徒有其位而已所以甚言無其道也然九四大吉無咎而象曰位不當九五萃有位而象曰志未光者以見九四得萃聚之道而無君位可行九五雖有君位而其志未光大也易説漢上朱氏曰九五得尊位天下皆萃而歸之於是觀其所孚可以知其志而專於六二係應至狹所萃者有定位得近遺逺聚道不全能無悔乎才足以自守免咎而已於人君恢宏廣博無所不萃之志未為光大匪所謂孚也故曰萃有位無咎匪孚象曰萃有位志未光也蓋初可萃四二可萃五三可萃上獨五不可專萃於二萃則陋矣五萃二有坎離坎離為光而曰未光者於無所不萃之志未光也九五剛中而正當有君德而永貞元者善之長大人體此以仁覆天下永久也貞正也體仁在上久正而不變唯九五不動而應二乃具此三者如是則無偏無黨其悔乃亡若五以萃二為光失是道矣故曰元永貞悔亡橫渠曰居得盛位不能見大人之德係應於二故曰有位一本作未光大也無志字易傳新安朱氏曰九五剛陽中正當萃之時而居尊固無咎矣若有未信則亦修其元永貞之德而悔亡矣戒占者當如是也未光謂匪孚本義問九五萃有位以陽剛居中正當萃之時而居尊位又安有匪孚先生曰此言有位而無德則雖萃而不能使人信故人有不信當修其元永貞之德而後悔亡也問萃九五一爻亦似甚好而反云有位志未光也是如何先生曰見不得讀易似這樣且恁地解去若強説便至鑿了並語録東萊吕氏曰或問萃九五匪孚元永貞傳曰苗民逆命帝乃誕敷文德舜德非不至也蓋有逺近昏明之異故其歸有先後豈苗虐腥聞有所格絶而氣不通感乎答曰政當看舜德已至猶自反之意不必深問苗民所以未格别集上六齎咨涕洟無咎象曰齎咨涕洟未安上也伊川先生曰六説之主隂柔小人説高位而處之天下孰肯與也求萃而人莫之與其窮至於齎咨而涕洟也齎咨咨嗟也人之絶之由已自取又將誰咎為人惡絶不知所為則隕穫而至嗟涕真小人之情狀也小人所處常失其宜既貪而從欲不能自擇安地至於因窮則顛沛不知所為六之涕洟蓋不安於處上也君子愼其所處非義不居不幸而有危困則泰然自安不以纍其心小人居不擇安常履非據及其窮迫則隕穫躁撓甚至涕洟為可羞也未者非遽之辭猶俗云未便也未便能安於上也隂而居上孤處無與既非其據豈能安乎並易傳橫渠先生曰以隂居上極物之萃非所堪也易説白雲郭氏曰衆隂可與之聚則逺而在下二陽可從之而聚而已獨乘之當萃之時失其所聚者上六也故有齎咨涕洟之象然能齎咨涕洟不敢自安於上猶為知懼之人故雖失其所聚亦無咎矣易説漢上朱氏曰上六以柔乘剛處上獨立當萃之極六三柔不正不足以為援齎持也咨嘆息也艮為手上三相持嘆息憂其所宜憂也上之三成巽巽多白眼艮為鼻兌澤下流在目曰涕在鼻曰洟出涕洟也然乘剛必危處上獨立則無助萃之極以柔居之則不堪兼是數者其可久安上位乎亦必至於求萃而之三動而憂則無咎故曰齎咨涕洟未安上也易傳又曰儀禮少牢饋食資忝注云今文咨作齎今易文齎注作咨解則齎咨古通用也叢説新安朱氏曰處萃之終隂柔無位求萃不得故戒占者必如此然後可以無咎也本義合訂刪補大易集義粹言卷四十九
