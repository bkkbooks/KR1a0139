body:
  text: 合訂刪補大易集義粹言卷十三頭等侍衛納喇性徳編乾下巽上伊川先生曰小畜序卦比必有所畜故受之以小畜物相比附則為聚聚畜也又相親比則志相畜小畜所以次比也畜止也止則聚矣為卦巽上乾下乾在上之物乃居巽下夫畜止剛健莫如巽順為巽所畜故為畜也然巽隂也其體柔順唯能以巽順柔其剛健非能力止之也畜道之小者也又四以一隂得位為五陽所説得位得柔巽之道也能畜羣陽之志是以為畜也小畜謂以小畜大所畜聚者小所畜之事小以隂故也彖専以六四畜諸陽為成卦之義不言二體葢舉其重者易傳或以小畜為臣畜君以大畜為君畜臣先生云不必如此說大畜只是所畜者大小畜只是所畜者小不必指定一件事便是君畜臣臣畜君皆是這箇道理隨大小用楊遵道録又曰小畜是所畜小及所畜雖大而少皆小畜也不必專言君畜臣臣畜君唐棣録東萊吕氏曰或問小畜一卦如何看曰以卦觀之柔以巽順之道畜剛以爻觀之陽不受畜在人分言之卑之畜尊下之畜上固當以巽順之道然有剛明之才者亦豈可受畜於人耶易説又曰小畜傳止則聚矣心散則道不積己丑課程小畜亨宻雲不雨自我西郊伊川先生曰雲隂陽之氣二氣交而和則相畜固而成雨陽倡而陰和順也故和若陰先陽倡不順也故不和不和則不能成雨雲之畜聚雖宻而不一有能字成雨者自西郊故也東北陽方西南陰方自陰倡故不和而不能成雨以人觀之雲氣之興皆自四逺故云郊據四而言故云自我畜陽者四畜之主也易傳暢中伯問宻雲不雨自我西郊曰西郊陰所凡雨須陽倡乃成隂倡則不成矣今雲過西則雨過東則否是其義也所謂尚往者隂自西而往不待陽矣唐棣所編自東自北而風則雨自南自西則不雨何者自東自北皆屬陽坎卦本陽陽倡而隂和故雨自西自南隂也隂倡則陽不和蝃蝀之詩曰朝隮于西崇朝其雨是陽來倡也故雨蝃蝀在東則是隂先倡也莫之敢指者非謂手指莫敢指陳也猶言不可道也易言密雲不雨自我西郊言自西則是隂先倡也故雲雖密而不雨語録横渠先生曰自我西郊剛陽之氣進而不已也易說白雲郭氏曰剛徳天徳也天徳畜之則止不能畜則失聖人之所以為聖以能畜天徳而已然畜有二道有止而畜之者畜之大也故為大畜有入而畜之者畜之小也故為小畜舍是皆不能畜矣能大畜天徳則理非不亨小畜疑於未亨故言亨也密雲不雨言畜之而未及用也自我西郊明其自我畜之也自我畜之而未及用君子成己之道未至於成物所以為小畜易說漢上朱氏曰小畜以隂畜陽惟九三一爻受畜所畜者寡矣履以柔履剛六三不有其位履之而不處也叢說新安朱氏曰巽亦三畫卦之名一隂伏於二陽之下故其徳為巽為入其象為風為木小隂也畜止之之義也上巽下乾以隂畜陽又卦唯六四一隂上下五陽皆為所畜故為小畜又以隂畜陽能係而不能固亦為所畜者小之象内健外巽二五皆陽各居一卦之中而用事有剛而能中其志得行之象故其占當得亨通然畜未極而施未行故有密雲不雨自我西郊之象葢密雲隂物西郊隂方我者文王自我也文王演易於羑里視岐周為西方正小畜之時也筮者得之則占亦如其象云本義小畜言以巽之柔順而畜三陽畜他不住大畜則以艮畜乾畜得有力所以喚作大畜小畜亨是說陽縁隂畜它不住故陽得自亨横渠言易為君子謀不為小人謀凡言亨皆是說陽到得說隂處便分曉說道小人吉亨字便是下面剛中而志行乃亨問嘗見人說此卦作巽體順是小人以柔順小術畜君子故曰小畜不知如何先生曰易不可専就人上説且就隂陽上看分明巽畜乾隂畜陽故謂之小若配之人事則為小人畜君子也得為臣畜君也得為因小小事畜止也得不可泥定一事說並語録彖曰小畜柔得位而上下應之曰小畜健而巽剛中而志行乃亨宻雲不雨尚往也自我西郊施未行也伊川先生曰言成卦之義也以隂居四又處上位柔得位也上下五陽皆應之為所畜也以一隂而畜五陽能係而不能固是以為小畜也彖觧成卦之義而加曰字者皆重卦名文勢當然單名卦唯革有曰字亦文勢然也健而巽以卦才言也内健而外巽健而能巽也二五居中剛中也陽性上進下復乾體志在於行也剛居中為剛而得中又為中剛言畜陽則以柔巽言能亨則由剛中以成卦之義言則為隂畜陽以卦才言則陽為剛中才如是故畜雖小而能亨也畜道不能成大如密雲而不成雨隂陽交而和則相固而成雨二氣不和陽尚往而上故不成雨葢自我陰方之氣先倡故不和而不能成雨其功施未行也小畜之不能成大猶西郊之雲不能成雨也並易傳宻雲不雨尚往則氣散先隂變風氣隨風散語録藍田吕氏曰小畜大畜據其所自得也所得有小大故謂之大畜小畜柔得位而上下應之畜之小者也剛上而尚賢畜之大者也以巽畜健所畜小也以止畜健所畜大也雲自東而徂西則雨自西徂東則不雨隂生於西陽生於東陽往交隂隂能固之乃雨隂往交陽而陽不應則何從而雨故自我西郊者言雲自西而徂東也龜山楊氏曰卦五陽而一隂則一隂為之主四以隂居隂柔得位也為一卦之主而上下應之以隂畜陽也陽大而隂小小者畜也此以六四一爻言之也健而巽剛中而志行乃亨合一卦之才言之也葢小者畜則无亨之道所畜亦小矣合一卦之才則三陽健而進一隂體巽而上行九五剛得中與之合志則志行矣是以亨也雲者氣之上升也一隂畜之未能上達故宻雲不雨尚往也往則交通咸和而為雨矣西郊隂所也東多風西多雨隂陽之義故詩曰朝隮于西崇朝其雨自我西郊則亦朝隮于西之意有雨之兆焉特施未行而已言未則非終不行也易說白雲郭氏曰初之應四而曰上下應者陽道過盛喜於從隂雖非其位而其志皆應之也剛中二之天徳也志行四之巽志也剛徳居中而巽志行是以亨也尚往者其道方行行猶未已也施未行者澤未下也宻雲尚往則澤有必下之理君子成已有必能成物之道盡其道則為大畜施未行故為小畜也易說漢上朱氏曰柔自姤進而上行至四得位上下五剛說而應之說則見畜矣一柔畜五剛則小畜大臣畜君也五爻非所應亦曰應之隂者陽之所求也故曰柔得位而上下應之曰小畜此以六四言小畜之義也下乾健也上巽順也九二九五剛中也健而濟之以巽則易入剛不過乎中則志行於上下兩者得則柔道亨而陽為隂所畜矣故曰健而巽剛中而志行乃亨此以兩體二五言小畜之才也兊盛隂也宻雲者兊澤之氣上行也雨者陽為隂所得相持而下者也六四志在畜君以往為尚畜君者好君也不得於君其能畜乎故曰宻雲不雨尚往也此再以六四言小畜也乾天也在内外之交而見天際郊之象兊西也我者内為主柔自下升天地之理陽倡則隂和西郊隂也宻雲不雨隂先倡也以臣畜君雖尚往也然不待倡而先之則其施未行施者膏澤下流也柔得位待倡而往則君施行矣故曰自我西郊施未行也聖人言此示臣强之戒且曰隂畜陽小畜大終不可以成大事乾天下之至健至難畜者非剛健篤實輝光日新其徳豈能畜之在卦氣為四月故太𤣥準之以斂易說新安朱氏曰小畜柔得位至曰小畜以卦體釋卦名義柔得位指六居四上下應謂五陽健而巽至乃亨以卦徳卦體而言陽猶可亨也密雲不雨尚往也言畜之未極其氣猶上進也本義尚往是隂包他不住陽氣散了做雨不成所以云尚往也問宻雲不雨自我西郊先生云此是以巽畜乾巽順乾健畜他不得故不能雨凡雨者皆是隂氣盛凝結得宻方濕潤下降為雨且如飯甑葢得宻了氣鬱不通四畔方有濕汗今乾上進一隂止他不得所以彖中云尚往也是指乾欲上進之象到上九則以卦之始終言畜極則散遂為既雨既處隂徳盛滿如此所以有君子征凶之戒並語録象曰風行天上小畜君子以懿文徳伊川先生曰乾之剛健而為巽所畜夫剛健之性唯柔順為能畜止之雖可以畜止之然非能固制其剛健也但柔順以擾繫之耳故為小畜也君子觀小畜之義以懿美其文徳畜聚為藴畜之義君子所藴畜者大則道徳經綸之業小則文章才藝君子觀小畜之象以懿美其文徳文徳方之道義為小也易傳廣平游氏曰風行天上柔巽之上行也君子觀象於此則美其文徳也天以剛健故其事武地以柔順故其事文風之柔无所不入地類也故有文徳之象舜之格有苗文徳之懿也詩稱仲山甫柔嘉維則令儀令色則所以畜宣王者文徳而已矣故有明哲保身之說異乎伊尹之於成湯太甲也易說龜山楊氏曰小畜之時以柔畜剛故君子以懿文徳孔子曰逺人不服修文徳以來之則畜剛莫尚乎文徳也易說兼山郭氏曰巽之畜乾隂之畜陽非可大也君子體之懿文徳而已與夫多識前言往行以畜其徳者異矣六四之畜正也猶巽從而後能之使非正而行是妾婦之道也易說白雲郭氏曰文徳美徳也坤言文在中而文言曰美在其中而暢於四支發於事業美之至也然則畜之道必先畜美徳以成己而後可見於事業也大畜之以畜其徳則天徳之大皆止而畜之矣乾之不言所利猶大畜以畜其徳坤利牝馬之貞猶懿文徳也風行天上是為巽入之道是我入而畜之也天在山中則為來畜於我大小之辨如此易說漢上朱氏曰天剛徳文柔徳風行天上剛為柔所畜小者畜也君子以是懿文徳傳言太虚無礙大氣舉之易傳新安朱氏曰風有氣而無質能畜而不能久故為小畜之象懿文徳言未能厚積而逺施也本義風行天上小畜君子以懿文徳言畜它不住且只逐些子發洩出來只以大畜比之便見得大畜說多識前言往行以畜其徳小畜只是做得這些箇文徳如威儀文辭之類問風行天上小畜象義如何曰天在山中大畜葢山是堅剛之物故能力畜其三陽風是柔軟之物止能小畜之而已耳並語録初九復自道何其咎吉象曰復自道其義吉也伊川先生曰初九陽爻而乾體陽在上之物又剛健之才足以上進而復與在上同志其進復於上乃其道也故云復自道復既自道何過咎之有无咎而又有吉也諸爻言无咎者如是則无咎矣故云无咎者善補過也雖使爻義本善亦不害於道不如是則有咎之義初九乃由其道而行无有過咎故云何其咎无咎之甚明也陽剛之才由其道而復其義吉也初與四為正應在畜時乃相畜者也並易傳横渠先生曰以理而升進之於應也藍田吕氏曰乾體本上乃今居下求復者也乾雖求復當畜之時巽隂固之而求獲乎復然乾體當復自道也巽雖固乾其體則巽六四以隂居隂獨為正應以斯而復雖若犯上其義則吉無所疑也龜山楊氏曰六四隂得位為一卦之主而初與之為應受畜於四者也過未形而畜之其復自道矣夫何咎之有故其義吉也易說白雲郭氏曰天徳之大而人畜之雖曰小畜亦已艱矣唯早辯者易為力而不能早見者難為功故小畜雖同而有初九九三之異也易為力則復自道復自道則鮮失焉是以其義吉而无咎也然小畜之道何與於復而初九九二曰復何哉葢大畜畜而无失无失故无復小畜未能无失是以不免有復也學者不能大畜則有小畜不能小畜則有復雖初无異道葢力行有淺深耳易説漢上朱氏曰聖人欲明陽不受畜於陰之義故以履小畜二卦反復明之小畜履之反初本在上二本在五三本在四故初二皆以復言之三受畜而不得復者也初者九之位九之位正也正者君子之道初九不受畜而復四猶未為得所宜有咎然由正道而復四亦以柔道下之何其咎哉於義吉也易説五峯胡氏曰郭子儀雖為魚朝恩所忌然朝聞命夕引道信命而行復自道者也是以姦邪莫之能害而終吉也若李光弼因讒邪之間遂擁衆不朝則不能復於道矣易説新安朱氏曰下卦乾體本皆在上之物志欲上進而為隂所畜然初九體乾居下得正前逺於隂雖與四為正應而能自守以正不為所畜故有進復自道之象占者如是則无咎而吉也本義問初九復自道何其咎吉此爻與四相應正為四所畜者乃云復自道何邪曰易有不必泥爻義者如此爻只平看自好復自道便吉復不自道便凶自无可疑者矣復自道之復與復卦之復不同復卦言已前不見了這陽如今來復復自道是復它本位從那道路上去如无往不復之復並語録東萊吕氏曰小畜初九復自道何其咎吉九二牽復吉九陽也陽非久為隂所畜者也故其志皆欲進復於上焉然則安於豢養而不復進者非可恥邪紀聞九二牽復吉象曰牽復在中亦不自失也伊川先生曰二以陽居下體之中五以陽居上體之中皆以陽剛居中為隂所畜俱欲上復五雖在四上而為其所畜則同是同志者也夫同患相憂二五同志故相牽連而復二陽並進則陰不能勝得遂其復矣故吉也曰遂其復則離畜矣乎曰凡爻之辭皆謂如是則可以如是若已然則時已變矣尚何一有教字誡乎五為巽體巽畜於乾而反與二相牽何也曰舉二體而言則巽畜乎乾全卦而言則一隂畜五陽也在易隨時取義皆如此也二居中得正者也剛柔進退不失乎中道也陽之復其勢必强二以處中故雖強於進亦不至於過剛過剛乃自失也爻止言牽復而吉之義象復發明其在中之美並易傳横渠先生曰初反自道三為說輻二以彚征在中故未為失易說藍田吕氏曰巽雖固乾而九五陽得尊位與二同物二不敢進牽五求復居中无邪又不失乾當復之義龜山楊氏曰二之與五以剛畜剛非如初九之於六四也故牽而後復所以吉者以其在中也居小畜之時以剛畜剛非其道宜於自失矣而二五皆剛而中故不自失也易說白雲郭氏曰不能辨之於早至二尤艱矣故牽而後復也牽者强勉之義雖無自復之易然强勉能復猶為吉也非二有剛中之徳亦將自失矣易說漢上朱氏曰小畜以一隂畜五陽五本二之位五動則二應同志者也二乾體剛健五巽體柔巽二進而欲復其所五以同志牽挽而復之巽為繩為股艮為手牽復也二牽挽而後復者畜之已深不若初九自道而復為易然在小畜之時五能下之引類自助為得中道二復而在中亦不自失其正而吉兩得之也易傳曰同患相憂二五志同故相牽連而復二陽並進則隂不能勝得遂其復矣易傳新安朱氏曰三陽志同而九二漸近於隂以其剛中故能與初九牽連而復亦吉道也占者如是則吉矣亦者承上爻義本義東萊吕氏曰易傳云二五皆陽剛為隂所畜俱欲上復陽之復其勢必强二以處中故雖强於進亦不至於過剛元祐諸賢似當深體此義己丑課程九三輿說輻夫妻反目象曰夫妻反目不能正室也伊川先生曰三以陽爻居不得中而宻比於四隂陽之情相求也又暱比而不中為隂畜制者也故不能前進猶車輿說去輪輻言不能行也夫妻反目隂制於陽者也今反制陽如夫妻之反目也反目謂怒目相視不順其夫而反制之也婦人為夫寵惑既而遂反制其夫未有夫不失道而妻能制之者也故說輻反目三自為也夫妻反目葢由不能正其室家也三自處不以道故四得制之不使進猶夫不能正其室家故致反目也並易傳横渠先生曰近而相比故說輻而不能進反為柔制故曰反目非其偶也故不能正其室易說藍田吕氏曰九三一爻雖比六四當畜之時隂為主故三陽不得進上雖巽體以陽居上陰之盛者與三合志畜之愈固説輻而行反目不媒者也龜山楊氏曰重剛而不中則身不行道矣身不行道不行於妻子故輿説輻夫妻反目輿説輻不能有行也切比於四為陰所畜不行於妻子也至於夫妻反目則正家之道可知矣故曰不能正室也易説白雲郭氏曰大畜有止畜之義説輻則止而不行也小畜入而畜之有復之象焉復貴早辯過中則危矣此牽復之後所以言説輻也説輻則害於行道故又有夫妻反目之象夫妻反目道不行於一家何以正天下是如輻壞而車不能行也孔子曰大車无輗小車无軏其何以行之哉意與此同求其所以然葢本於不能正室不能止室者其身不正故也是以君子必篤於成已而後可以成物為是故也大畜輿說輹止於二也良馬逐行道於三也小畜牽復於二未為成徳故說輻於三不能行也輹可說者也輻不可說者也易說漢上朱氏曰子夏傳虞翻本輻作輹當作輹上九九三本相應若動而成震坤其輿也陽畫輿下横木也為輹九三見畜不可動兊為毁折輿說輹矣其能進乎震為夫離為妻為目巽為多白眼九三剛而不中見畜而怒故反目相視妻制其夫男女失位不能正室也三四巽離有家人象故以室言之妻齊也敵夫之辭震離同象故曰夫妻初二畜於巽而復獨九三畜於六四而不復者九三失道比於四而悅之也陽无失道隂豈能畜之聖人詳言此者為陽畜於隂之戒易傳曰未有夫不失道而妻能制之也春秋傳晉獻公筮嫁伯姬於秦遇歸妹之暌史蘇占之曰車脫其輹歸妹外卦震也上六變離震毁車脫其輹與此爻及大畜九二同象易傳新安朱氏曰九三亦欲上進然剛而不中迫近於隂而又非正應但以隂陽相說而為所繫畜不能自進故有輿說輻之象然以志剛故又不能平而與之争故又為夫妻反目之象戒占者如是則不得進而有所爭也程子曰說輻反目三自為也本義小畜但能畜得九三一爻而已九三是迫近它底那兩爻自牽連上來語録六四有孚血去惕出无咎象曰有孚惕出上合志也伊川先生曰四於畜時處近君之位畜君者也若内有孚誠則五志信之從其畜也卦獨一隂畜衆陽者也諸陽之志繫於四四苟欲以力畜之則一柔敵衆剛必見傷害唯盡其孚誠以應之則可以感之矣故其傷害逺其危懼免也如此則可以无咎不然則不免乎害矣此以柔畜剛之道也以人君之威嚴而㣲細之臣有能畜止其欲者葢有孚信以感之也四既有孚則五信任之與之合志所以得惕出而无咎也惕出則血去可知舉其輕者也五既合志衆陽皆從之矣並易傳横渠先生曰以隂居隂其體不躁故曰有孚能上比於五與之合志雖為羣下所侵被傷而去懷懼而出於義无咎易說龜山楊氏曰柔得位得柔巽之道也為一卦之主而下當三陽之進勢不足畜之則傷而去惕而出矣然得柔巽之道有孚也上承九五與之合志則下不能害也雖惕而出終无咎也易說白雲郭氏曰以人畜天以柔畜剛非天下之至誠其孰能與於此此六四有孚之道也六四以有孚之道主於中又且惕然知懼此其所以免害而血去且无咎矣葢一柔五剛有害而傷之之理故也上合志者合九五有孚之志故志行也唯其上合志是以能畜也易說漢上朱氏曰五君位體巽四近而相得以正相比臣畜君者也四不繫應於初誠信孚於上有孚也三陽務進而上四以一隂乗之若畜之以力隂陽相傷可不惕懼乎唯誠信孚於上而與上之志合則物莫之傷而惕懼逺矣伏坎為血為加憂巽為多白眼惕也血去惕出者四五相易合志之象象辭不言血去葢惕出則血去可知九五之剛六四在下止畜其欲非誠信感之上下志合是嬰龍鱗也豈能畜哉惟其有孚志合守正而見信故以此處上下之際而无咎自古人臣得位上畜乎君下畜乎衆君子不如六四之有孚未有不傷霍光之於魏相蕭望之卒見傷也易傳五峯胡氏曰漢明帝察察剛急治楚王英獄无辜連逮不可勝數羣臣希㫖无敢以情恕者獨侍御史寒朗心傷其寃出萬死為无辜一言其言發於忠誠惻怛有孚者也其情既伸其辭既達其義既明故帝卒從其言死罪免而恐懼亡矣正君心救无辜何咎之有易外傳新安朱氏曰以一隂畜衆陽本有傷害憂懼以其柔順得正虚中巽體二陽助之是有孚而血去惕出之象也无咎宜矣故戒占者亦有其徳則无咎也本義九五有孚攣如富以其鄰象曰有孚攣如不獨富也伊川先生曰小畜衆陽為隂所畜之時也五以中正居尊位而有孚信則其類皆應之矣故曰攣如謂牽連相從也五必援挽與之相濟是富以其鄰也五以居尊位之勢如富者推其財力與鄰比共之也君子為小人所困正人為羣邪所厄則在下者必攀挽於上期與同進在上者必援引於下與之勠力非獨推己力以及人也固資在下之助以成其力耳有孚一有而字攣如葢其鄰類皆牽攣而一无而字從之與衆同欲不獨有其富也君子之處艱厄惟其至誠故得衆力之助而能濟其衆也並易傳横渠先生曰六四為衆陽之主已能接之以信攣如不疑則亦為衆所歸故曰富以其鄰易說藍田吕氏曰九五為二所牽二中无邪乾體當復不能深距者也然陽居尊位全盛之勢可以及鄰鄰志不同均富及之冀為吾用鄰為四與上也龜山楊氏曰剛巽乎中正有孚也居得尊位剛巽以畜而上下從之攣如者也攣如言從之固也從而與之共天位食天禄能富以其鄰者也六四柔得位而不尊為小畜之主三陽下進不足以畜之故傷而去懼而出雖與上合志能无咎而已唯九五以剛巽乎中正而衆陽從之故能富以其鄰而不獨富也夫小畜以柔畜為主而九五以剛者以其居巽體故也居巽之極故雖剛而不過易說白雲郭氏曰九五合六四誠信之志攣衆剛而畜之是富以其鄰者也富以其鄰則以畜衆為富不以獨智為富矣此明畜之君道如大舜善與人同取諸人以為善是也易言富以其鄰者乾之象也不富以其鄰者坤也乾大也坤吝嗇也易說漢上朱氏曰五近四相得无應以分其志有孚也易言交如者異體交也言攣如者同體合也四五同巽體君臣合志攣如也小畜一隂畜五陽常恐力不足而見傷五於畜時雖得尊位而不能畜以其富也委之於鄰併力而畜之有孚攣如則衆陽皆為我所用矣陽實為富隂虚為貧四虚五實而五與之共位食禄四得盡其心能以富用其鄰也以如師能左右之曰以相比為鄰巽離亦鄰也富以其鄰不獨富謂富善人也易傳五峯胡氏曰舜既受堯之命有天下而堯朝舊臣如共工讙兜伯鯀佐堯治天下其執權利之日久矣舜江海陶漁之人也雖以堯命聴居其上其志未嘗不欲専命使舜不得有為於天下也然舜以天徳居天位其有孚可知固將分天職與天下聖賢共治之分天禄與天下聖賢共食之列天位與天下聖賢共守之豈姦邪之臣所能遏哉是以九官命而不仁者逺矣攣如富以其鄰此之謂也易外傳新安朱氏曰巽體三爻同力畜乾鄰之象也而九五居中處尊勢能有為以兼乎上下固為有孚攣固用富厚之力而以其鄰之象以猶春秋以某師之以言能左右之也占者有孚則能如是也本義富以其鄰以上合志是說上面巽體同力畜乾鄰如東家取箇西家取箇取上下兩畫也此言五居尊位便動得那上下底攣如如手把攣住之象孚有在陽爻有在隂爻伊川謂中虚信之本中實信之質問小畜卦以一隂而畜五陽而九五乃云富以其鄰是與六四之隂并刀而畜下三陽不知九五何故反助隂邪先生曰九五上九皆為隂所畜又是同巽之體故反助之也並語録上九既雨既處尚徳載婦貞厲月幾望君子征凶象曰既雨既處徳積載也君子征凶有所疑也伊川先生曰九以巽順之極居卦之上處畜之終從畜而止者也為四所止也既雨和也既處止也隂之畜陽不和則不能止既和而止畜之道成矣一作畜道之成也大畜畜之大故極而散小畜畜之小故極而成尚徳載四用柔巽之徳積滿而至於成也隂柔之畜剛非一朝一夕能成由積累而至可不戒乎載積滿也詩云厥聲載路婦貞厲婦謂隂以隂而畜陽以柔而制剛婦若貞固守此危厲之道也安有婦制其夫臣制其君而能安者乎月望則與日敵矣幾望言其盛將敵也隂已能畜陽而云幾望何也此以柔巽畜其志也非力能制也然不已則將盛於陽而凶矣於幾望而為之戒曰婦將敵矣君子動則凶也君子謂陽征動也幾望将盈之時若已望則陽已消矣尚何戒乎既雨既處言畜道積滿而成也隂將一作既盛一有則字極君子動則有凶也隂敵陽則必消陽小人抗君子則必害君子安得不疑慮乎若前知疑慮而警懼求所以制之則不至於凶矣並易傳廣平游氏曰以臣畜君至於和且至則畜道成矣猶當尚徳以載之不可以賢臨之也尚徳者无所不用徳也故象以為徳積載何則君臣夫婦人合也人合者易以睽故雖貞而厲若恃此以行而不止則隂疑於陽月盈而逼矣故雖君子之道猶為凶也所謂有疑者隂疑於陽之謂也易説龜山楊氏曰三陽下進一隂畜之不能固故宻雲不雨尚往也至上九則往極矣故既處夫隂陽和則雨而婦以順為正雖畜而至於雨以是為正則厲矣夫月遡日以為明者也望則與日敵矣故幾望則不可過君子至是而猶征焉則凶之道也葢小畜以隂畜陽為主其極必有疑陽之戰故戒之如此易說白雲郭氏曰小畜宻雲不雨之象至上九畜道成而後既雨也既雨則小畜之道盡矣是安於畜者也故曰既處君子於成終之際未嘗不思戒焉戒而尚徳則无顛覆之憂婦人以順為貞不知尚天徳之大以持守之是以危也幾望將盈也将盈之時居位之極知進不知退是以征凶有所疑者盈滿皆有疑之時故君子戒之孔子言知及之仁能守之所謂尚徳者如此夫畜徳既成尚戒其失況畜之未成者乎易說漢上朱氏曰大畜畜之以止畜極則散小畜畜之以巽極則畜道成矣上九動而畜三九三止而見畜坎見兊澤流既雨也既雨則陽與隂和矣九三不往而還其所既處也既處則不進矣陽剛健既雨既處豈一日畜之哉柔巽易入陽說而受制則剛者退避柔者尚之積之甚㣲至於載之而有不知也坎為輪乾陽徳也而在下巽陰徳也而在上陽反載之矣巽為婦當以柔巽從夫為徳隂而畜陽柔而畜剛非徳之正以是為正守而不變危厲之道譬之月也望則陰道盛滿即復虧而成巽巽畜乾豈婦徳哉坎為月離為日在兌西月望之時也六四未中幾望也君子上九也陰盛陽消君子有害動而去之則正征以正行也然不可動動則凶故不得已而處有所疑也巽為不果疑也可動者其唯小畜之初乎易傳五峯胡氏曰東漢閹宦之盛自孝和永元中鄭衆始得與聞政事且宦者出入禁闥以奉承為事者也暱比則易以親順事則易以信其後遂得天寵日侵朝權至永興之時中官近習手握王爵口含天憲政令一由之出矣然賢者猶或用勢已張而未成也及元熹之末遂黨錮賢智舉不得進其勢於是乎成矣所以及此者以其暱比順事足以惑媚人君而桓靈之君心與之同性與之合既雨既處也彼趙忠張讓之徒豈知其非日以益甚終受誅戮固其宜矣婦貞厲也雖然閹豎也而執國柄政自己出侵逼人主月幾望矣陳蕃竇武以區區之力不復顧慮誦言誅之欲以一日而奪百有餘年憑藉之權不亦難乎孔子曰有所疑者戒當時君子必知疑慮徐思所以制之則不至於凶矣易外傳新安朱氏曰畜極而成陰陽和矣故為既雨既處之象葢尊尚陰徳至於積滿而然也陰加於陽故雖正亦厲然陰既盛而抗陽則君子亦不可以有行矣其占如此為戒深矣本義上九爻辭殊不可斷若人占得此爻則吉凶未可知然易占法有活法聖人因事教人如有是徳而得是爻則為吉无是徳而得是爻則不應須如此看乃活如輿説輻夫妻反目一爻可謂不好然能以剛自守則雖得此爻而凶不應矣上九雖是隂畜陽至極處和而為雨畢竟隂制陽是不順所以雖正而厲既雨既處言便做畜得住了做得雨後這氣畢竟便透出散了徳積是說隂徳婦人雖正亦危月才滿便虧君子到此亦行不得這是那隂陽皆不利底象並語録東萊吕氏曰既雨既處尚徳載而繼之曰婦貞厲周公之憂懼有以也己丑課程合訂刪補大易集義粹言卷十三
