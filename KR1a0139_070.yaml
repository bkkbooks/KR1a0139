body:
  text: 合訂刪補大易集義粹言卷六十八頭等侍衛納喇性德編坎下離上伊川先生曰未濟序卦物不可窮也故受之以未濟終焉既濟矣物之窮也物窮而不變則無不已之理易者變易而不窮也故既濟之後受之以未濟而終焉未濟則未窮也未窮則有生生之義為卦離上坎下火在水上不相為用故為未濟易傳先生過成都坐於所館之堂讀易有造桶者前視之指未濟卦問焉先生曰何也曰三陽皆失位先生異之問其姓與居則失之矣易傳曰聞之成都隱者酉室所間云田夫釋耒者悮時氏拾遺未濟亨小狐汔濟濡其尾無攸利伊川先生曰未濟之時有亨之理而卦才復有致亨之道惟在慎處狐能度水濡尾則不能濟其老者多疑畏故履冰而聽懼其陷也小者則未能畏慎故勇於濟汔當為仡壯勇之狀書曰仡仡勇夫小狐果於濟則濡其尾而不能濟也未濟之時求濟之道當至慎則能亨若如小狐之果則不能濟也既不能濟無所利矣易傳白雲郭氏曰易六十四卦終於既濟未濟者凡人事之終始惟曰濟與不濟而已故以是二卦終焉先既濟而後未濟者猶泰之與否也泰極則否既濟窮則未濟天道人事莫不然也聖人之為戒深矣既濟曰亨未濟亦白亨者既濟之亨已然之亨也未濟之亨將然之亨也既濟言濡其尾而未濟亦言濡其尾者既濟之濡其尾以曳輪既濟而濡尾也未濟之濡其尾以小狐幾濟而濡尾也夫濟難大人之事豈狐疑小人之所能哉宜其濡尾而無攸利此其所以為未濟也幾濟而濡尾不喪其生亦幸矣何所利乎若夫飛龍在天大人之造何難不濟是以有不言所利之大易説新安朱氏曰未濟事未成之時也水火不交不相為用卦之六爻皆失其位故為未濟汔幾也幾濟而濡尾猶未濟也占者如此何所利哉本義未濟取狐為象上象頭下象尾語録彖曰未濟亨柔得中也小狐汔濟未出中也濡其尾無攸利不續終也雖不當位剛柔應也伊川先生曰以卦才言也所以能亨者以柔得中也五以柔居尊位居剛而應剛得柔之中也剛柔得中處未濟之時可以亨也小狐汔濟據二而言也二以剛陽居險中將濟者也又上應於五險非可安之地五有當從之理故果於濟如小狐也既果於濟故有濡尾之患未能出於險中也其進鋭者其退速始雖勇於濟不能繼續而終之無所往而利也雖隂陽不當位然剛柔皆相應當未濟而有與若能重慎則有可濟之理二以汔濟故濡尾也卦之諸爻皆不得位故為未濟雜卦云未濟男之窮也謂三陽皆失位也斯義也聞之成都隱者並易傳藍田吕氏曰未濟有為而未有功也白雲郭氏曰未濟知其亨者以六五柔中知其有濟是以亨也小狐幾濟未能出險之中故濡其尾無攸利未能終其濟也有始有卒者其唯聖人乎是以續終之事固非狐疑小人之所能也六爻雖不當位而剛柔皆相應雖處已有失然亦未嘗失於人故得人之助是以有終亨之象而小狐之濟亦止於無攸利而已不然則凶及之矣易説漢上朱氏曰未濟自否來既濟之反也否塞之時六二之柔得中而上行天地相交否者亨矣柔而不中則介於二剛其能亨乎故曰未濟亨柔得中也此以二五言未濟也艮坎為狐小狐初爻也艮之初爻為小狐猶中孚之豚亦初爻也爾雅曰􅠟汔也詩曰汔可小康鄭康成曰汔幾也四為坎險五為中出險也初往之四幾濟而未及於五未出中也狐首輕尾重老狐聽冰負尾而濟其剛不息是以終濟卦以成卦言之上為首為前初為尾為後以畫卦言之初為始為本上為終為末上九剛也初六柔也小狐不度而進未能審慎其前則剛其後乃柔四坎濡其尾往無攸利以其剛不足不續終也然則濟險者其在於審慎始終如一剛健不息者乎孟喜曰小狐濟水未濟一步下其尾故曰小狐汔濟未出中也濡其尾無攸利不續終也此以初六九四相易言初六之柔不足以濟險難也未濟六爻雖不當位而剛柔相應茍量力度時慮善而動上下內外相與未有不濟者也故曰雖不當位剛柔應也此以六爻申未濟有可濟之理也在卦氣為十一月故太玄凖之以將易傳新安朱氏曰柔得中指六五言本義未濟與既濟諸爻頭尾相似中間三四兩爻如損益模樣顛倒了他曳輪濡尾在既濟為無咎在此卦則或吝或貞吉這便是不同了易不是説殺底物事只可輕輕地説若是確定一爻吉一爻凶便是揚子雲太玄了易不恁地兩卦各自説濡尾濡首不必拘説在此言首在彼言尾大槩既濟是那日中衙晡時候盛了只是向衰去未濟是那五更初時只是向明去聖人當初見這箇爻裏有這箇意思便説出這一爻來或是從隂陽上説或是從卦位上説他這箇説得散漫不恁他逼拶他他這箇説得疏到他密時盛水不漏到他疏時疏得無理會若只要就名義上求他便是今人説易了大失他易底本意周公做這爻辭只依稀地見這箇意便説這箇事出來大段散漫趙子欽尚自嫌某説得疏不知如今煞有退削了處譬如箇燈籠安四箇柱這柱已是礙了明若便剔去得豈不更是明亮所以説不可為典要可見得他散漫問未濟所以亨者便是有濟之理而柔得中又自有亨之道曰然小狐汔濟汔字訓幾與井卦同既曰幾便是未濟未出坎中不獨是説九二爻通一卦之體皆是未出乎坎險所以未濟不續終也是首濟而尾濡故不能濟蓋不相接續去故云不續終也狐尾大濡其尾則濟不得矣並語録象曰火在水上未濟君子以慎辨物居方伊川先生曰水火不交不相濟為用故為未濟火在水上非其處也君子觀其處不當之象以慎處於事物辨其所當各居其方謂止於其所也易傳藍田吕氏曰火炎上而水潤下上下各當其所者也白雲郭氏曰火性炎上而在上水性潤下而在下二氣不交不相為用是以為未濟亦猶天地不交而為否也物之有可辨者如水火之性是也居方者猶居上居下是也君子觀未濟之象而慎於辨物居方者欲其所居各得交濟之道無若火在水上而不相為用也不然則物自各止其所在君子何慎之有易説漢上朱氏曰未濟自否變否艮止也慎之象離為明辨也火隂物也居南水陽物也居北二物有相濟之理火上水下各居其所未濟也君子觀此慎辨萬物使各居其所有辨然後有交辨之以正其體交之以致其用不辨則不交有未濟乃有既濟而未濟合既濟之象易傳新安朱氏曰水火異物各居其所故君子觀象而審辨之本義初六濡其尾吝象曰濡其尾亦不知極也伊川先生曰六以隂柔在下處險而應四處險則不安其居有應則志行於上然已既隂柔而一無而字四非中正之才不能援之以濟也獸之濟水必揭其尾尾濡則不能濟濡其尾言不能濟也不度其才力而進終不能濟可羞吝也不度其才力而進至於濡尾是不知之極也並易傳藍田吕氏曰初六未濟之始以柔居險之下不可以有進也然上應於四不量其力陷溺於難不能以自濟故濡其尾不可進而進宜有悔而曰吝者私於其應不能忘懷以蹈濡尾之難終吝道也白雲郭氏曰初六隂柔在下居險之中而上應九四是則小狐欲濟之象然不能有終而濡其尾是隂柔不足以有濟故吝也極至也度可至而至之智者之事不度才力而妄欲有濟是不知可至之道也無凶而止於吝者得其應以為之助耳易説漢上朱氏曰卦後為尾坎水濡之濡其尾也初處險下而上有應其志欲動在未濟之時剛動則出險於濟為得其分量矣極分量之極也初柔九二又以剛在前厄之雖有應可動而柔不能動吝也於是而欲濟是亦不知極也猶獸欲濟而力柔水濡其尾則不能舉終亦不出乎險矣坎水為知易傳新安朱氏曰以隂居下當未濟之初未能自進故其象占如此極字未詳考上下韻亦不叶或恐是敬字今且闕之本義九二曳其輪貞吉象曰九二貞吉中以行正也伊川先生曰在他卦九居二為居柔得中無過剛之義也於未濟聖人深取卦象以為戒明事上恭順之道未濟者君道艱難之時也五以柔處君位而二乃剛陽之才而居相應之地當用者也剛有陵柔之義水有勝火之象方艱難之時所賴者才臣耳猶當盡恭順之道故戒曳其輪則得正而吉也倒曳其輪殺其勢緩其進戒用剛之過也剛過則好犯上一無上字而順不足唐之郭子儀李晟當艱危未濟之時能極其恭順所以為得正而能保其終吉也於六五則言其貞吉光輝盡君道之善於九二則戒其恭順盡臣道之正盡上下之道也九二得正而吉者以曳輪而得中道乃正也並易傳藍田吕氏曰九二剛中而應志在出險雖曳輪於險中猶行之不止中以行正其難必濟故曰貞吉濡尾曳輪在既濟則為始濟之象於未濟則為涉難已深之象故其義不同白雲郭氏曰曳其輪者將以有行也九二以剛中之才居險難之中剛而有濟故曳其輪貞吉也夫六五之君柔中未能有濟必得九二剛中之臣相與為應乃可濟矣是以有曳輪濟難之漸固守是道無不吉也中以行正者其曳輪也所以輔其君以有濟道之正也以九居二剛中之德也以中之德行道之正故曰中以行正也既濟初九曳輪而已濟者也未濟九二曳輪而將濟者也夫濟者宜有用舟之象而二卦皆言曳輪者以見濟難之時用力甚艱而後有濟故也易説漢上朱氏曰坎為輪二往五應艮為手曳其輪也坎輪在水火爻之中水欲下火欲上亦曳也二中也九二之五中以行正也未濟時六五柔處尊位五所賴者九二剛中也剛非臣德之正也剛或好犯恭順之道或有不足故戒以曳其輪則緩進以盡恭順於臣為中於道為正行中以行正者正未必中中以行正則盡矣易傳曰唐郭子儀李晟當艱難未濟之時能保其吉者用此道也易傳新安朱氏曰以九二應六五而居柔得中為能自止而不進得為下之正也故其象占如此九居二本非正以中故得正也本義六三未濟征凶利涉大川象曰未濟征凶位不當也伊川先生曰未濟征凶謂居險無出險之用而行則凶也必出險而後可征三以隂柔不中正之才而居險不足以濟也未可有濟之道出險之用而征所以凶也然未濟有可濟之道險終有出險之理上有剛陽之應若能涉險而往從之則濟矣故利涉大川也然三之隂柔豈能出險而往非時不可才不能也三征則凶者以位不當也謂隂柔不中正無濟險之才也若能涉險一無險字以從應則利矣並易傳橫渠先生曰有強援於上故利涉大川非義躁進凶之道也易説藍田吕氏曰六三隂不當位不中不正執此以行非止未濟取凶必矣居二剛之間所比者正當是時也以不正進則凶比於正而濟乎難則利白雲郭氏曰三非中正之才不足以有濟必欲力征而有濟斯取凶之道也然二卦謂之濟者非獨濟其身而已有載上濟下之道故皆有曳輪之象茍濟其身則為小狐之事也非濟之大者也六三雖非中正之才而處險之上險不能害以之自濟則可濟衆則不可是以雖征凶而利涉大川也征凶以其濟衆也利涉大川自濟也必曰未濟征凶言欲以未濟之道而征是以知其欲大濟也征凶固不若九二曳輪之吉而利涉大川復優於小狐濡尾之吝以此見六三之才居初二之間特以不當濟難之位往濟則凶也易説漢上朱氏曰三處險中惟至剛乃可以出險六柔不當位未濟也以柔而行外援上九則乾首沒於坎中淪胥以溺之象雖正亦凶竇武何進是也故曰征凶三四非應當未濟之時三資其助四近而協力巽股出險利涉大川矣易傳新安朱氏曰隂柔不中正居未濟之時以征則凶然以柔乘剛將出乎坎有利涉之象故其占如此蓋行者可以水浮而不可以陸走也或疑利字上當有不字本義九四貞吉悔亡震用伐鬼方三年有賞於大國象曰貞吉悔亡志行也伊川先生曰九四陽剛居大臣之位上有虛中明順之主又已出於險未濟已過中矣有可濟之道也濟天下之艱難非剛健之才不能也九雖陽而居四故戒以貞固則吉而悔亡不貞則不能濟有悔者一無者字也震動之極也古之人用力之甚者伐鬼方也故以為義力勤而逺伐至於三年然後成功而行大國之賞必如是乃能濟也濟天下之道當貞固如是四居柔故設此戒如四之才與時合而加以貞固則能行其志吉而悔亡鬼方之伐貞之至也並易傳橫渠先生曰剛陽之德迫近至尊非正而吉悔所招也初處險中叛而未一奮動討伐其勢必克堪上之任是以有賞易説藍田吕氏曰九四與既濟九三皆離之體有文明之德利伐幽暗故皆曰伐鬼方既濟九三陽剛當位故曰髙宗斯爻以陽居隂剛德不盛故必貞吉悔亡然後可以行其志震用伐者先之以威也不曰克之而曰有賞於大國者既濟九三強剛之質尚力以取勝斯爻不純以武修文德以服之不戰而服故不曰克之而曰有賞也白雲郭氏曰四居近君之位有剛強可濟之才而能固守居柔之貞是以吉也吉則未濟之悔亡矣故可以震用伐鬼方震用伐鬼方則其才足以逺濟非獨自濟其身而已故其君報能濟之功是以有賞於大國也必言三年以見未濟之時艱於有為也自古觀之舜有大功三十而後為天子禹八年於外而後平水土湯十一征而天下信之文王九年而大統未集周公東征三年而歸未濟之難如此則九四之三年有賞未為久也志行者上有六五虛明柔中之君故九四得以行其志而有鬼方之伐不然則自濟不暇又安能濟逺人乎既濟九三與未濟九四皆有伐鬼方之象者二卦三四為反對故其象同與損益二五言十朋之龜夬姤三四言臀無膚其行次且同義稱髙宗則知伐鬼方為小亨言震用則知伐鬼方為大事矣係乎其人大小不同也易説漢上朱氏曰九居四有悔動而正正則吉而悔亡四動體震震為威怒坤為鬼方坎為險四近君剛而明有濟之道初恃險未順四用其威怒以入其阻伐鬼方也自三至初歷三爻坤為年三年而後順克之也克難辭艮山坎川坤土田賞之象坤四為國陽為大有賞於大國非貞吉悔亡其志行於上下乎二卦言伐鬼方者借此以明必濟之義天下之弊固有盤結而難去者四凶頑民歷世既久乃能去之故曰貞吉悔亡易傳曰古之人用力之甚者伐鬼方也故以為義力勤而逺伐至於三年然後成功而行大國之賞必如是乃能濟四居柔故戒以此易傳新安朱氏曰以九居四不正而有悔也能勉而貞則悔亡矣然以不貞之資欲勉而貞非極其陽剛用力之久不能也故為伐鬼方三年而受賞之象本義益損二卦説龜一在二一在五是顛倒説去未濟與既濟説伐鬼方亦然不知是如何語録六五貞吉無悔君子之光有孚吉象曰君子之光其暉吉也伊川先生曰五文明之主居剛而應剛其處得中虛其心而陽為之輔雖以柔居尊處之至正至善無不足也既得貞正故吉而無悔貞其固有非戒也以此而濟無不濟也五文明之主故稱其光君子德輝之盛而功實稱之有孚也上云吉以貞也柔而能貞德之吉也下云吉以功也既光而有孚時可濟也光盛則有暉暉光之散也君子積充而光盛至於有暉善之至也故重云吉並易傳藍田吕氏曰六五離明之體居尊履中光之盛者然柔而不強或流於不正故貞吉然後無悔然後全其君子之光光達於外而有暉則離德充矣故曰有孚吉凡言悔亡者已有悔而今使之亡也無悔未有悔而不使之有悔也白雲郭氏曰六五柔中文明之君虛己而有容故賢者樂為之輔以濟天下之難是以九二有曳輪之吉而九四有鬼方之伐也人君不以尊位自居而樂於虛己待賢固守是道宜其吉而無悔矣貞吉而無悔是以未濟之悔可亡於九四也為君之德孰有光於是者乎此其所以為文明之君有孚虛中也虛中故能尊賢而容衆是以吉也上言貞吉始之吉也下言有孚吉終之吉也此所謂能續終者也昔文王之為君也徽柔懿恭所謂柔中也光於四方顯於西土非君子之光乎至於得賢而用之則有若虢叔閎夭散宜生泰顛南宫適之徒以為疏附先後奔走禦侮之臣故在詩則文王獨稱大明而在易則未濟六五亦獨為君子之光也易説漢上朱氏曰六五文明之主柔居尊位悔也虛中而下九二二往五正以剛濟柔故貞吉無悔坎為光君子之光謂九二也五離為明二與五應光明相燭有孚也暉者光之散管輅曰日中為光朝日為暉朝日初出其光暉散也言二五未交其德暉之所及已孚於上下則吉濟險難者君必剛正臣必有不言之信然後委任篤下無間言功濟天下而無後患不然凶必至矣易傳新安朱氏曰以六居五亦非正也然文明之主居中應剛虛心以求下之助故得貞而吉且無悔又有光輝之盛信實而不妄吉而又吉也暉者光之散也並本義上九有孚於飲酒無咎濡其首有孚失是象曰飲酒濡首亦不知節也伊川先生曰九以剛在上剛之極也居明之上明之極也剛極而能明則不為躁而為決明能燭理剛能斷義居未濟之極非得濟之位無可濟之理則當樂天順命而已若否終則有傾時之變也未濟則無極而自濟之理故止為未濟之極至誠安於義命而自樂則可無咎飲酒自樂也不樂其處則忿躁隕穫入於凶咎矣若從樂而耽肆過禮至濡其首亦未能安其處也有孚自信於中也失是失其宜也如是則於有孚為失也人之處患難知其無可奈何而放意不反者豈安於義命者哉飲酒至於濡首不知節之甚也所以至如是不能安義命也能安則不失其常矣並易傳橫渠先生曰飲酒而至於濡首不節之甚也其必失此樂也有孚易説藍田吕氏曰上九以剛居未濟之終濟未濟者也既濟則無所事而佚樂矣無事佚樂之志形於外可以飲酒而無咎故曰有孚于飲酒無咎無事佚樂之志形於外飲酒可也不知其節至於濡首則有孚之過也故曰濡其首有孚失是白雲郭氏曰六五有孚於賢者故為君子之光上九有孚於飲酒適足自養而已安能有濟哉然自養者獨善其身雖無大咎至於難將及已濡首而不變是不知進退存亡之節者也向之謂有孚今則失是矣上九剛明之才可用而不知變故聖人之辭戒之如此昔伊尹始則耕於有莘之野終則幡然而改所謂知進退存亡之節者又安有濡首之失乎易説漢上朱氏曰上孚於三三震坎為酒上反三成兊坎流於兊口有孚於酒也三之上得正無咎也未濟之極無極而自濟之理非剛健之才得時得位上下孚應終不濟也上九君子有才而不當位與六三相應而無可濟之資以其有孚矣相與飲酒樂天順命以俟可濟之時則於義無咎上反三乾首濡於酒中則從樂耽肆亦不知節矣坎兊節之象也有孚若然失是義矣晉魏之交士多逃於麴糵無濟時之志以故世復大亂聖人之戒不其深乎易傳曰人之處患難知其無可奈何而放意不反者豈安於義命者哉易傳新安朱氏曰以剛明居未濟之極時將可以有為而自信自養以俟命無咎之道也若縱而不反如狐之涉水而濡其首則過於自信而失其義矣本義問居未濟之時未可動作初柔不能固守而輕進故有濡尾之吝九二陽剛得中得正曳其輪而不進所以貞吉曰也是如此大槩難曉某解也且備禮依衆人説又曰坎有輪象所以説輪大槩未濟之下卦皆未可進六三未離坎體也不好到四五已出乎險方好上九又不好故曰濡首分明只是狐過水而濡其首今象云飲酒濡首皆不可曉舊嘗有人著書以彖象文言為非聖人之書只似是這樣處頗費分疏所以渠有是説未濟看來只陽爻便好隂爻便不好但六五上九兩爻不如此六五得中故以為吉上九有濟時之才又當未濟之極可以濟矣却云不吉更不可曉問未濟上九以陽居未濟之極宜可以濟而反不善者竊謂未濟則當寬靜以待九二九四以陽居隂皆能靜守上九則極陽不中所以如此先生曰也未見得是如此大扺時運既當未濟雖有陽剛之才亦無所用况又不得位所以如此並語録合訂刪補大易集義粹言卷六十八
