body:
  text: 合訂刪補大易集義粹言卷六十三頭等侍䘙納喇性徳編坎下巽上伊川先生曰渙序卦兊者説也説而後散之故受之以渙説則舒散也人之氣憂則結聚説則舒散故説有散義渙所以繼兊也為卦巽上坎下風行於水上水遇風則渙散所以為渙也易傳渙亨王假有廟利涉大川利貞明道先生曰萃渙皆享于帝立廟因其精神之聚而形於此為其渙散故立此以收之謝顯道録伊川先生曰渙離散也人之離散由乎中人心離則散矣治乎散亦本於一作必由中能一有利貞字收合人心則散可聚也故卦之義皆主於中利貞合渙散之道在乎正固也易傳横渠先生曰萃王假有廟渙然後聚道乃久故王假有廟互見於此凡言有廟者聚道之極也易說龜山楊氏曰或問禘之説孔子曰不知也則其說葢有言論之所不能及也非求之度數之末所能知也惟先王報本反始之義與夫觀盥不薦渙萃假有廟之象則聖人所以自盡其心者於是為至非深知鬼神之情状其孰能知之知此則於治國乎何有中庸解白雲郭氏曰渙者離散之義天下離散為渙而散天下之難亦為渙居渙得散而亨散天下之難亦亨也王道至而有廟則難散矣萃與渙其義相類難渙則萃萃則渙難故當萃聚難渙之時宜莫先於有廟以致孝享也利涉大川木行水上之象也利貞者渙難以是為徳之先也經曰孝莫大於嚴父嚴父莫大於配天王者有廟孝享必至於嚴父配天而後其道盡故象又言享于帝立廟所以終王假有廟之義也易說新安朱氏曰渙散也為卦下坎上巽風行水上離披解散之象故為渙其變則本自漸卦九來居二而得中六徃居三得九之位而上同於四故其占可亨又以祖考之精神既散故王者當至於廟以聚之又以巽木坎水舟楫之象故利涉大川其曰利貞則占者之深戒也本義彖曰渙亨剛來而不窮柔得位乎外而上同王假有廟王乃在中也利涉大川乘木有功也伊川先生曰渙之能亨者以卦才如是也渙之成渙由九來居二六上居四也剛陽之來則不窮極於下而處得其中柔之徃則得正位於外而上同於五之中巽順於五乃上同也四五君臣之位當渙而比其義相通同五乃從中也當渙之時而守其中則不至於離散故能亨也王假有廟之義在萃卦詳矣天下離散之時王者收合人心至於有廟乃是在其中也在中謂求得其中攝其心之謂也中者心之象剛來而不窮柔得位而上同卦才之義皆主於中也王者拯渙之道在得其中而已孟子曰得其民有道得其心斯得民矣享帝立廟民心所歸從也歸人心之道无大於此故云至於有廟拯渙之道極於此也治渙之道當濟於險難而卦有乘木濟川之象上巽木也下坎水大川也利涉險以濟渙也木在水上乘木之象乘木所以涉川也涉則有濟渙之功卦有是義有是象也並易傳横渠先生曰財散則民聚王乃在渙中之一也易説藍田吕氏曰渙離其羣而散也渙之為卦自否而成否之九四來居於二離乾之羣與初六六三相比故曰剛來而不窮六二上居於四離坤之羣上承九五故曰柔得位乎外而上同剛柔皆離其羣故曰渙離羣而上下交故亨萬物之散剛得尊位而在中則人神有主矣故王假有廟渙則物離非涉難有功不足以濟故利涉大川巽在坎上乘木涉川之象也白雲郭氏曰渙之成卦自否來故剛自四來而為二柔自二升而為四剛來得中而不窮柔自内升位乎外而上同此言成卦之義也王乃在中者以王居渙難之中故難散而後假有廟也大川難也乘木濟難之方也濟難有功則難散矣此渙之所以亨也易說漢上朱氏曰渙否九四之變也險難離散否塞解釋剛柔皆亨故曰渙亨此以卦變言乎渙也九二之剛自四而來動於險中二隂不能陷解難散險又處之以中者也險豈能窮之哉五得中道出乎險外六四之柔自二而徃正位乎外而以巽順上同於五君臣協比能守其中者也天下之難患處之者不以道及其出險又或不以道守之則亂者不解解者復亂二五之剛四之柔處之守之皆不失中故曰剛來而不窮柔得位乎外而上同此以二四五三爻言渙之才所以致亨也天下離散不安其居者本於人心失中鬼神依人而行離散則鬼神不饗聖人推原其本将以聚之故建國設官以為民極而宗廟為先宗廟者收其心之渙散而存之也人孰不有父母知報本則知祭祀出於人心復其本心則離散者可合而天下无事矣治渙之道也假至也謂五也上為宗廟艮為門闕王王位中者心之位九五有入自門闕至宗廟得人心而存之之象易傳曰卦之才皆主於中王者拯渙之道在得其中而已故曰王假有廟王乃在中也此再以九五而言渙之才也利貞者五也坎為大川巽為木為股據正體巽四二皆為我用以之濟難而功歸於五言乘木有功則利貞在其中矣合天下之離散非正其可乎故曰利涉大川利貞彖曰乘木有功也此再以九五二四言渙之才也易言木者三益渙中孚存五行也在卦氣為六月故太𤣥準之以文易傳新安朱氏曰剛來柔得位以卦變釋卦辭中謂廟中本義渙是散底意思物事有當散底號令當散積聚當散羣隊當散剛來不窮是九三來做二柔得位而上同是六二上做三此說有些不穩却是六三不喚做得位然而某這箇例只是一爻互換轉移无那隔驀兩爻底此卦只是卜祭吉又更宜涉川王乃在中是指廟中言宜在廟祭祀伊川先生說得那道理多了它見得許多道理了不肯自做它説須要寄搭放在經上易不須說得深只是輕輕地說過問渙卦剛來而不窮窮是窮極來處乎中不至窮極否先生曰是居二為中若在下則是窮矣並語録象曰風行水上渙先王以享于帝立廟伊川先生曰風行水上有渙散之象先王觀是象救天下之渙散至於享帝立廟也收合人心无如宗廟祭祀之報出於其心故享帝立廟人心之所歸也係人心合離散之道无大於此易傳藍田吕氏曰風行水上波瀾必作振蕩離散不寧之時王者求以合其散莫若反其本享帝立廟所以明天人之本也白雲郭氏曰水難也風行水上則无不散矣此渙難之象也享于帝立廟者天地祖考王祭之大也難渙之時莫急於此也能此則治天下可運諸掌不能此則亂将復矣是以先王不敢後也易說漢上朱氏曰風行水上渙然離散之象離散之時天下之險難方作先王以是享于上帝以一天下之心使知无二主也立廟以合天下之渙散則人知反本鬼有所歸享于帝立廟離散者一矣帝乾上九也上又為宗廟巽股為立坤為牛坎為血享于帝也觀此則知魯用郊晉祀夏郊魯有周廟鄭有厲王之廟非先王意也秦位在藩臣臚於郊祀天子不能制反致文武胙卒併天下揚雄曰僭莫僭於祭祭莫重於地地莫重於天雄其知渙之說矣易傳新安朱氏曰皆所以合其散本義初六用拯馬壯吉象曰初六之吉順也伊川先生曰六居卦之初渙之始也始渙而拯之又得馬壯所以吉也六爻獨初不云渙者離散之勢辯之宜早方始而拯之則不至於渙也為敎深矣馬人之所託也託於壯馬故能拯渙馬謂二也二有剛中之才初隂柔順兩皆无應无應則親比相求初之柔順而託於剛中之才以拯其渙如得壯馬以致逺必有濟矣故吉也渙拯於始為力則易時之順也初之所以吉者以其能順從剛中之才也始渙而用拯能順乎時也並易傳横渠先生曰處險之下故必用拯无應於上順比九二之剛拯而馬壯其吉宜也易說藍田吕氏曰初六居渙之初以柔在下力弱難濟用拯斯難馬壯乃吉乘車者馬在前前遇九二之剛故曰馬壯與明夷六二同義柔能乘剛其體順也白雲郭氏曰初六難之始也方難之始而能竭其至健之才以拯之則難无不濟矣是其所以吉也天下之事辯之於早則順而易舉故象曰初六之吉順也卦以初二四五皆為渙難者初能比二四能比五故也三與上私於其應能免其身幸矣明夷用拯馬壯吉曰順以則也此言順也是知馬以健順為義故坤之彖有取於馬也易說漢上朱氏曰虞翻陸震本作壯吉悔亡拯古本作抍音承舉也六四得位近君正而巽可以濟渙然莫或助之初欲抍四才柔位下而在坎中且四不相應乃舎四用二用二乃所以抍四也二剛中之才坎為美脊之馬初二相易成震震為作足馬美脊而作足馬之壯健者也四艮為手震為起起手以承六四抍之象是則足以資六四之剛而載其上矣故曰用拯馬壯吉正則吉而悔亡初六處不當位本有悔也六坤柔順以隂求陽始渙而拯之亦順也故曰初六之吉順也五爻皆言渙初獨不言易傳曰渙難之勢辯之宜早方渙而拯之不至於渙也易傳新安朱氏曰居卦之初渙之始也始渙而拯之為力既易又有壯馬其吉可知初六非有濟渙之才但能順乎九二故其象占如此本義九二渙奔其机悔亡象曰渙奔其机得願也伊川先生曰諸爻皆云渙謂渙之時也在渙離之時而處險中其有悔可知若能奔就所安則得悔亡也机者俯憑以為安者也俯就下也奔急徃也二與初雖非正應而當渙離之時兩皆无與以隂陽親比相求則相頼者也故二目初為机初謂二為馬二急就於初以為安則能亡其悔矣初雖坎體而不在險中也或疑初之柔微何足頼葢渙之時合力為一作而勝先儒皆以五為机非也方渙離之時二陽豈能同也若能同則成濟渙之功當大一有吉字豈止悔亡而已机謂俯就也渙散之時以合為安二居險中急就於初求安也頼之如机而亡其悔乃得所願也並易傳横渠先生曰奮於險中進而之前則難解悔亡故曰奔其机三四皆險故曰得願若退累於初則險不能出其悔終存易說藍田吕氏曰九二杌可憑依以為安物之在下而靜止者也二乘初六柔静在下杌之象也俱无正應近而相得渙散之時得所憑依獲所願也白雲郭氏曰九二之剛自外來而得中得去危就安之義故有奔其机之象馬剛不得中則不可有為而其道窮道窮則其志失矣惟得中就安故彖所以言不窮而象言得願此悔之所以亡也言奔與悔亡皆去危之義易說漢上朱氏曰四巽為木坎為揉震為足艮為手在上體為肱揉木令曲而有足肱據其上杌也二四合乃有此象二有剛中之才處儉而不當位宜有悔二能奮身出險上奔於四四來憑之以安杌憑之以安者也是以悔亡震足動奔也故曰奔其杌二本否四在二者渙散之時也二之情不忘乎四猶逃亡之人不忘故國奔則得中心之所欲二者中心之位也故曰得願也易傳新安朱氏曰九而居二宜有悔也然當渙之時來而不窮能亡其悔者也故其象占如此葢九奔而二杌也本義渙奔其杌以卦變言之九二自四來居二得中而不窮所以為安如杌之安也即是依文解義說終是不見得四居二之為安二居四之為得位是如何奔其杌也只是九來做二人事上說時是來就那安處並語録六三渙其躬无悔象曰渙其躬志在外也伊川先生曰三在渙時獨有應與无渙散之悔也然以隂柔之質不中正之才上居无位之地豈能拯時之渙而及人也止於其身可以无悔而已上加渙字在渙之時躬无渙之悔也志應於上在外也與上相應故其身得免於渙而无悔悔亡者本有而得亡无悔者本无也並易傳横渠先生曰援上而進惟求自脫於險无悔而已非能及物者也易說藍田吕氏曰六三獨應上九挺身出羣雖未離險志已在外故得无悔白雲郭氏曰渙離之時六三知應於上而不知有所擇而比之以行渙難之志是其志之小者也故其為道止及其身而已終无濟時之義然不失正應終亦不為悔也志在外者志應上九也易說漢上朱氏曰所以致渙者險在内也四五濟險之位六三處不當位近險宜有悔然不與險争動而之上自脫於險非拯時之渙以濟人者也其正躬卑巽以逺於悔者乎坤為身三上相易析坤成巽離目視下鞠躬之象故曰渙其躬无悔象曰志在外也之外則无悔三上合而得正也蘧伯玉聞衛亂而出近闗杜洩葬叔孫豹而行之時乎易傳新安朱氏曰隂柔而不中正有私於己之象也然居得陽位志在濟時能散其私以得无悔故其占如此大率此上四爻皆因渙以濟渙者也本義六四渙其羣元吉渙有丘匪夷所思象曰渙其羣元吉光大也伊川先生曰渙四五二爻義相須故通言之彖故曰上同也四巽順而正居大臣之位五剛中而正居君位君臣合力剛柔相濟以拯天下之渙者也方渙散之時用剛則不能使之懐附用柔則不足為之依歸四以巽順之正道輔剛中正之君君臣同功所以能濟渙也天下渙散而能一无能字使之羣聚可謂大善之吉也渙有邱匪夷所思贊美之辭也邱聚之大也方渙散而能致其大聚其功甚大其事甚難其用至妙夷平常也非平常之見所能思及也非大賢智孰能如是稱元吉者謂其功徳光大也元吉光大不在五而在四者二爻之義通言也於四言其施用於五言其成功君臣之分也並易傳横渠先生曰已處險外无私其應常以拯衆為心則其志光大獲吉若志在所歸之地近累於五則非能平均其慮者也易說藍田吕氏曰六四自否六二上居於四離隂之羣上比於陽出幽谷而遷喬木者也知反其本故元吉邱處乎髙謂九五也散而升髙雖進於光大然自下而上疑非所安心不得平故匪夷所思白雲郭氏曰六四之柔自下而升故有上同之義夫以柔道上行而輔君為臣之至美故君臣相濟能渙天下之難也羣者天下罹於難者也能渙天下之難則其道大矣非止於其躬而已故元吉難雖渙散猶若有邱焉勿謂難之小而弗戒也有邱則匪夷矣有邱匪夷之思其可一日忘乎此雖已濟難不敢忘難之意也是亦其亡苞桑之義昔禹平水土成湯伐夏救民皆渙其羣者也成王懲而毖後患所謂匪夷之思也元吉光大之義於夏商可見然易之卦變屢見於彖至渙尤眀見於二爻之辭不然則九二剛中自无奔杌之象而六四至柔豈能具渙羣之吉乎惟究成卦之變則二爻之辭可得也易說漢上朱氏曰坤為衆渙三隂羣也四巽順而正居近君之位上以巽乎五下以巽乎二二剛中有濟渙之才而二隂比之四屈已濟難與衆同患得九二之助隂服矣則渙者合異者同共圗天下之渙是以元吉元吉則濟渙之志光且大矣坎為光陽為大也渙之時用剛則不足以懐之用柔則不足以制之四二協力剛柔共濟渙而至於羣天下始可以聚矣五艮為山半山為邱邱聚也六四得九二以合其羣其心思之所存者在五五得位羣隂之所聚如物之聚於邱五中正善羣然非四合之亦不得而羣矣四視二隂等夷也四正初與三不正坤土思也所思匪若二隂之所思不正故九二為用二隂服之否則渙散矣其能效美於君有邱之實乎故曰渙有邱匪夷所思宣王承厲王之後天下離散召伯之徒佐王建國親諸侯遣使勞來安集渙其羣也易傳新安朱氏曰居隂得正上承九五當濟渙之任者也下无應與為能散其朋黨之象占者如是則大善而吉又言能散其小羣以成大羣使所散者聚而若邱則非常人思慮之所及也本義是東坡㑹做文字了却湊著它語脉如渙其羣元吉諸家皆云渙散了却成羣都不成語句惟東坡説道渙散它小小羣聚合成一大羣如那天下混一之際破散它那小羣成大羣如此方成文理老蘇云渙之六四曰渙其羣元吉夫羣者聖人之所欲渙以混一天下者也此說雖程傳有所不及如程傳之説則是羣其渙非渙其羣也葢當人心渙散之時各相朋黨不能混一惟六四能渙小人之私羣成天下之公道此所以元吉也老蘇天資髙又善為文章故此等説話皆能達其意大抵渙卦上三爻是以渙濟渙也渙其羣言散小羣做大羣如将小物事㡬把解來合做一大把東坡說這一爻最好縁他㑹做文字理㑹得文勢故說得合並語録九五渙汗其大號渙王居无咎象曰王居无咎正位也伊川先生曰五與四君臣合徳以剛中正巽順之道治渙得其道矣惟在浹洽於人心則順從也當使號令洽一作浹於民心如人身之汗浹於四體則信服而從矣如是則可以濟天下之渙居王位為稱而无咎大號大政令也謂新民之大命救渙之大政再云渙者上謂渙之時下謂處渙如是則无咎也在四已言元吉五惟言稱其位也渙之四五通言者渙以離散為害拯之使合也非君臣同功合力其能濟乎爻義相須時之宜也一作而已王居謂正位人君之尊位也能如五之為則居尊位為稱而无咎也並易傳横渠先生曰為渙之主使物徧被其澤正位凝命可以免咎不私於應故為均布其大號也渙然廓大以王道自居乃无咎易說藍田吕氏曰九五剛得位尊而在中為渙之主者也渙道既行散上下之否而隂陽交物情大通渙然浹洽發號出令而民恱服故曰渙汗其大號天之隂陽交則雨人之隂陽交則汗也渙王居无咎正位居中而為之主也白雲郭氏曰令出惟行弗惟反則號令之出其猶渙汗乎一出不反之義也是以王者重慎之四五君臣合徳以渙天下之難其號大矣故渙之大號則王居之渙羣之功則六四主之王居渙號則正位以令天下得君道也故无咎六四主渙羣之功則宣力四方盡臣職也吉孰大焉故元吉此君臣之義不同也易說漢上朱氏曰有疾者閉塞不通陽降隂升浹於腠理否者亨矣否乾降二坤隂升四降者成坎坎水浹於上下汗出之象號令如之巽為號陽為大九五出號令者也故曰渙汗其大號五至三體觀有風行地上省方設教之象能𤼵新命以順民上下交通險難解釋渙汗其大號也渙時民思其主故王居正位乃无咎在它時安居不能順動則有咎矣故禹别九州而終於冀湯勝夏而歸於亳武勝商而至於豐王正位則渙散者知所歸矣乾五為王艮為居止也得正則无咎然九五非六四之賢與上同志安能𤼵大號居其所而治哉易傳曰再言渙者上謂渙之時下謂處渙如此則无咎易傳新安朱氏曰陽剛中正以居尊位當渙之時能散其號令與其居積則可以濟渙而无咎矣故其象占如此九五巽體有號令之象汗謂如汗之出而不反也渙王居如陸贄所謂散小儲而成大儲之意本義渙汗其大號聖人當初就人身上說一汗字為象不為无意葢人君之號令當出乎人君之中心由中而外自近而逺雖至幽至逺之處无不被而及之亦猶人身之汗出於中而浹於四體也渙汗其大號號令當散如汗之出千毛百竅中迸散出來這箇物出不㑹反却不是說那號令不當反只是取其如汗之散出自有不反底意思散居積須是在它正位方可並語録上九渙其血去逖出无咎象曰渙其血逺害也伊川先生曰渙之諸爻皆无係應亦渙難之象惟上應於三三居險陷之極上若不從於彼則不能出於渙也險有傷害畏懼之象故云血惕然九以陽剛處渙之外有出渙之象又居巽之極為能巽順於事理故云若能使其血去其惕出則无咎也其者所有也渙之時以能合為功獨九居渙之極有係而臨險故以能出渙逺害為善也若如象文為渙其血乃與屯其膏同也義則不然葢血字下脫去字血去惕出謂能逺害則无咎也並易傳横渠先生曰乘剛在上若係於三害不可免能絶棄隂類逺去其難則可免咎易說藍田吕氏曰上九雖與三應而逺處物外隂陽之所不爭名位之所不累全身逺害得散之義故血去逖出无咎白雲郭氏曰難不能散則傷之者至矣上九知見傷之憂故渙其血去逖出而後无咎也逖逺也違難必逺乃可免害此與渙其躬者无以異葢止於一身之謀非天下之大計也夫同聲相應同氣相求二爻之應亦其志同耳然渙之六爻皆无凶悔者以皆知濟難及保身之道也茍不能有道以濟天下之難又不能眀哲以自保其身是皆凶悔之徒歟此葢不必六爻有象而後知之故易之辭觀吉可以知凶由凶可以見吉斯得知微知彰之義矣易說漢上朱氏曰先儒讀渙其血作一句去逖出作一句以象考之當從先儒九二坎坤為血血者相傷之象渙五爻不應上九獨應六三六三近險見傷上九下應之三上相易上復成坎而傷故曰渙其血言上三俱傷也上九能去六三逺出乎險之外自處以巽不陷於險則是去而逺害於義无咎逖逺也故曰渙其血去逖出无咎一本作去惕出巽為多白眼有惕懼之象然象曰逺害當從逖矣渙時以合渙為功上九居不用之地故逺害无咎係於六三而不去其傷自取也若施之用事之地則有咎仲由死於䘙季羔避禍而去一也易傳新安朱氏曰上九以陽居渙極能出乎渙故其象占如此血謂傷害逖當作惕與小畜六四同言渙其血則去渙其惕則出也本義合訂刪補大易集義粹言卷六十三
